body:
  text: 方輿勝覽卷三十五宋祝穆撰德慶府端溪瀧水建置㳂革越地牛女之分野秦屬南海郡漢置蒼梧郡及端溪縣晉分蒼梧立晉康郡隋廢郡以端溪縣屬端州煬帝時屬信安郡唐髙祖置南康州又置康州太宗復置南康州已而去南字改晉康郡復為康州皇朝為端州尋復舊以瀧州瀧水縣來屬以髙宗潜邸改升德慶府仍為永慶軍節度今領縣二治端溪事要郡名晉康風俗夷獠相雜寰宇記云云康瀧一同其俗食稻與魚隋書形勝居西江上游郡志土産果下馬虞衡志土産小駟以出德慶之瀧水者為最髙不踰三尺駿者有兩脊骨山川端山在端溪縣有樹冬榮子大如杯味似猪肉藿山在端溪山有草如藿香山一名利人山出五色石瀧峽張子壽詩霜清百丈山風落萬重林三洲巖在端溪縣西江之三島也錦石在端溪陸賈使南越時設錦帳于此西江在端溪端溪在縣南亭榭壽康亭在雙門之內艤舟亭在郡治之東祠墓忠景廟郭功父題趙康州石磬編後詩一賊鳴銅鼓孤城隕使星形骸糜矢石忠義貫丹青皎皎張巡傳聖俞新新季子銘荆公吾詩愧㳙滴何以助南溟五龍廟蕭注字巖夫新喻人少侍父之官康州過悅城題五龍廟詩五龍兄弟古英名今日拏舟過悅城莫向草茅久盤屈早施霖雨治蒼生孔道輔見其詩曰未可量也登慶厯第為畨禺令儂智髙圍廣州注突圍出募壯士二千人解圍與賊格鬪焚其舟數百斬首五千級溫媪墓南越志昔冇溫氏媪端溪人常捕魚忽於水側得一物如守宫能入水捕魚媪後治魚誤斷其尾遂去數年乃還媪曰龍子復來也後媪殞瘞于江濱龍子常為大波縈浪轉沙以成墳土今在悅城鄉之東名宦皇朝趙師旦字叔潜楚州人倦游録云儂賊破雍州偶江漲遂乘桴㳂流入畨禺時趙師旦知康州到任始一日賊既迫境諭官屬吏民使避賊守城而死乃監兵洎吾之職也城陷趙與監兵皆死先是一日趙方出其妻藏於山谷道上生一子棄草中賊去凡三日復歸見之尚生人謂忠義之感康人立祠祭祀馮拯以左正言知州題詠與子避地西康州杜甫送長沙李十一云云洞庭相逄十二秋已交鴻鴈早隨陽李涉謫康州詩惟將直道信蒼蒼可料無名抵憲章隂隲却應先有謂云云四六疏榮渙綍來牧晉康地居嶺嶠俗雜蠻猺土曠人稀不富蠶桑之業山環水繞頗為魚稻之鄉居東廣之上游為中興之潜邸雖云僻郡環井邑於山光水色之中猶幸大江通商賈於蠻煙瘴雨之外封州封川開建建置㳂革古南越之地星紀之次秦為南海郡漢置蒼梧郡今州即漢蒼梧郡之廣信縣也晉屬蒼梧郡又屬晉康郡宋文帝分置開建縣齊因之梁置梁信郡燕置成州陳改成州為封州煬帝時廢以縣屬蒼梧郡唐復立封州改臨封郡復為封州國朝升為望郡紹興間併封州入德慶府未幾復為封州今領縣二治封川事要郡名臨封封川風俗其民知義臨封志云云蘇子瞻作司馬溫公神道碑云公薨封州父老相率致祭且作佛事公之至誠無所不感而封之民獨見稱於坡公亦足以見丨丨之丨丨也民淳訟簡同上茅簷葦戶郡國志其俗荒陋市肆鮮陶瓦而多云云形勝據三江口臨封志丨雍桂賀丨丨丨誠控扼之地山川東山去城一里舊於山為三舍學基西山在州西隔江下有寺登髙山在州治後山上舊有花藥圃郡人九日遊此忠讜山在開建北七十里舊經居人多忠讜龍石山出石膏猿居山在州北二十里多猿猱麒麟山在州東八十里視諸山最髙風溪在州南三十里源出豐夀山入大江西江源出雍州經潯融象桞州入州界合桂江南越志漢武帝自巴蜀檄夜郎兵下牂牱江㑹畨禺即此水封溪源出賀州馮乘縣合封口入大江龍吟水在金鏤村有莫狀元讀書堂山水清響人呼為龍吟堂舍宅生堂郭功父題李封州丨丨丨詩鱗鱗鴛瓦構新堂意在黔烏恩澤長峴首去思猶墮淚召南遺愛有甘棠水光送月浮珍席山勢和雲插畫梁安得才如張相國為君重賦宅生章五友堂在城西沈清臣有記取江山風月與太守而五致爽樓在州宅之西亭臺吸江亭在州治之東望雲臺在州北太守沈清臣有記名宦皇朝陳升之為守時稱循良後為相孔延世嘉祐間為守遺愛在民有三子曰文仲武仲平仲後人榜其讀書之所曰桂堂曹覲建安人修古之子皇祐中以儂賊死節建州守臣魏矼奏賜諡忠肅魏詩云轉戰譙門日再晡空拳猶自把戈鈇身埀虎口方安坐命棄鴻毛更疾呼柱下杲卿存大節袴間杵臼得遺孤可騰三尺英雄氣不愧山西士大夫方維詩云青膽雄於金斗大赤心堅比鐡山髙鄭夷甫吳郡志郡人也嘉祐中監髙郵稅遇一術士曰年不過三十五調封州判官預知死日至期沐浴更衣公舍冇靣溪一亭夷甫至其間親督灑掃方揮手指畫間屹然立化猶作指畫之狀見墨客揮犀人物陳欽漢書云封川人也武帝時治左氏傳莫宣卿開建人唐大中間狀元及第名賢李甘葛常之詩話載唐史丨丨嘗論鄭注不可相故有封州之謫杜牧之贈甘詩云太和八九年訓注極虓虎吾君不省察二凶日威武喧喧皆傳言明晨相登注和鼎顧豫云我死有處所明日詔書下謫斥南荒去題詠唯放日髙衙田開臨封十詠秋冬三釀酒風景四時花守官其吏隱云云海上荔支莊同上嶺南蕉子國云云民有千年壽家存十嵗糧荔支莊去城十里四六光膺渙渥榮涖臨封地分千里水合三江燕寢凝香把西山之佳致虎符奏最歸北闕之清班眷封川之小郡乃嶺嶠之名區宅生有賴請稽郭功父之名章報政既優當踵陳秀公之盛事英德府真陽浛光建置㳂革禹貢揚州之域天文牽牛婺女之分野古百越地戰國屬楚秦為南海郡漢屬桂陽郡吳晋屬始興郡宋屬廣興郡齊復屬始興郡梁置衡州及陽山郡隋改衡州為洭州廢湞陽縣入曲江尋廢洭州以含洭縣𨽻廣州唐置洭州五代時南僞漢竊據嶺表於真陽縣置英州皇朝潘美克英雄二州紹聖五年以潜藩升英德府宣和賜名真陽郡今領縣二治真陽事要郡名真陽風俗頗同中夏圖經婚嫁禮儀云云俗樂商販同上云云巨産之家得米則東下於廣州糶買鈔鹽以取嬴貧則採山之竒石以貨焉地廣人稀同上云云為農者擇沃土而耕磽地不復用力茅簷土床楊廷秀詩人人藤葉嚼檳榔户户丨丨覆土床只有春風不寒乞隔溪吹度柚花香形勝地接南海圖經云云有魚鹽之利土産英石同上丨之山丨名擅天下鄉評云峯巒聳秀巖竇分明無斧鑿痕冇金玉聲山川湞山在真陽北四十里尉他為城於此堯山在浛光北四十餘里寰宇記四靣瀑布傾㵼萬丈始興記丨巡狩經此丨或謂此山然而髙故名米元章詩信美此山髙穹窿逺朝市暑木結蒼隂飛泉落晴翠龜岡在郡東八里蓋郡之印山鳴弦峯在州南二里相傳虞舜南巡撫琴於此查許國詩木葉蕭蕭江水清幅巾藜杖繞山行忽然行到山深處聽得鳴弦一兩聲南巖在州南鳴弦峯之前石壁上有唐人元傑所刻涵暉谷銘通天巖在州西十五里與碧落洞相去二里有竅通天真陽峽在真陽東南十五里崖壁千仭碧落洞在州南十五里懸石如霓旌羽蓋狀洞中有蛻骨皆勾連因號為蛻仙臺南越志有沈侍郎隱于丨丨丨旁之雲華堂唐元和六年真陽令侯著來遊蘇子瞻詩槎牙亂峯合晃蕩絶壁橫遙知紫翠間古來仙釋并陽崖射朝日髙處連玉京隂谷叩白月夢中遊化城果然石門開中有銀河傾幽龕入窈窕别戶生虛明泉流下珠琲乳湔交縵纓我行畏人知恐為仙者迎小語輒響答空山雷自驚䇿杖歸去來治具煩方平涵暉谷在州南中有潜靈洞棲雲洞晞𤾉島飛霞嶺夢弼巖桃花洞牯牛石在縣南十九里真陽峽中諺云過得丨丨抄丨灘寄書歸去報平安溱水一名始興江亦名真水避仁廟嫌羅溪在浛光西四十六里桃溪在浛光縣東五里桂溪在浛光縣光水在浛光縣本名洭水避廟諱改今名樓榭煙雨樓在府治之東千巖萬壑羅列逺近為一郡登臨之勝郭功父詩江路分韶廣城樓壓郡東妓歌星漢上客醉水雲中寒翠亭在晞𤾉島之北石壁東坡留題云蜀人蘇子瞻南遷惠州艤舟巖下與幼子過同遊聖壽寺遇隱者石君汝礪話羅浮之勝至暮乃去紹聖元年書鳯凰驛郭功父詩晚泊丨丨丨得名知謂何鳯凰不可見篁竹空婆娑驛吏指英州兩舍皆平坡天寒無瘴癘虛市饒雞鵝橋梁何公橋今名政和橋容齊三筆英州小市江水貫其中郡守建安何智甫始疊石為橋橋方成而蘇子瞻還自海外智甫求文以記蘇子瞻作詩云天壤之間水居其多人之往來如鵜在河順水而行雲駛鳥疾惟水之利千里咫尺亂流而涉過膝則止惟水之害咫尺千里沔彼濫觴蛙跳鯈游溢而懷山神禹所憂豈無一木支此大壞舞于盤渦氷拆雷解坐使此邦畫為兩州雞犬相聞胡越莫救允毅何公甚勇于仁始作石梁其艱其勤將作復止更此百難公心如鐵匪石則堅公以身先民以悅使老壯負石如負其子疏為玉虹隱如金堤直欄橫檻百賈所棲我來與公同載而出歡呼闐道抱其馬足我嘆而言視此滔滔未見剛者孰為此橋願公千嵗與橋壽考持節復來以尉父老如朱仲卿食于桐鄉我作銘詩子孫不忘名宦侯著唐朝為真陽令題名在涵暉洞皇朝王仲逹景德間為守建涵暉書院慶厯中建學始移宣聖祠於州學蘇軾紹聖初御史論軾知英州道貶惠州過英州憩小㕔西今名坡公堂米芾作浛光尉唐介為臺官廷疏宰相文彥博之失仁廟怒責英州别駕仍命中官押赴任朝中士夫以詩送行者衆獨李師中待制一篇為人傳詩云孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並遊英俊顔何厚已死姦諛骨尚寒天為吾皇扶社稷忍教夫子不生還人物石汝礪真陽人問學淹該撰易解易圖擬進于朝為荆公所抑有水車賦刻南山石壁馮安上真陽人元祐間父子相繼登科名賢孔平仲坐黨籍英州安置鄭俠貶英州劉安世紹聖初章子厚入相安世坐謫英州洪皓奉使北庭得歸秦檜嫉其功皓謂檜憶錫納否錫納者北庭用事之人也檜深憾之出知饒州又謫英州題詠萬室通釀酤梅堯臣作英州别駕唐子方送行詩英州五千里瘦馬行䭿䭿妻拏不同塗風浪過蛟窟越林多蔽天黃柑雜丹橘云云撫逺無禁律醉去不論錢醒來弄琴瑟萬疊青山一水間李孝博次蔣頴叔韻維舟亭下號三灣云云偏愛澄江照天碧飛來幾片白雲閒支與真陽幾石山楊廷秀詩郡官不患無供給云云四六維此東衡介于南服矧真陽之小壘控東廣之上流家乏百金之産郡無一嵗之儲真陽山石誠齊夸供給之珍碧落洞天坡老紀神仙之勝仙風冉冉數千年碧落洞天佳氣葱葱五百嵗潜龍福地韶州曲江仁化翁源乳源樂昌建置㳂革禹貢揚州之域星土分野與廣州同春秋為百越地戰國皆楚地漢初趙他有國地屬南粵武帝平南粵而曲江以縣𨽻桂楊郡統於荆州後漢因之置始興都尉三國屬吳晋以始興郡屬廣州宋更郡名曰廣興齊復為始興陳霸先為始興太守起兵討侯景陳於此置東衡州隋改為韶州唐置畨州又更名韶州改始興郡皇朝為韶州領縣五治曲江廣東提刑置司事要郡名始興韶陽曲江余靖韶州真水館記真水出大庾嶺與武水合回曲而流故名曲江風俗其民短力弱材圖經云云不能勤作故啙窳偷生而無積聚習朴而不雜同上云云淳而不漓拳勇善戰通鑑何無忌拒盧循殷闡曰始興溪子云云為農者不力於耕云云而運販鹽鈔嵗月可以致富為士者鮮力於學云云而臺府奏公頥指可以如意故其人優吏而不知儒惟簡質之是安云云而市井貿易自日用飲食之外珍竒之貨不售焉並郡志士多願慤朱元晦濓溪祠堂記云韶故名邦云云少浮華可與進於道者蓋有張文獻余襄公之遺風士之名聲抗衡上國圗經如王鄧之世科陸續謂王式子陶孫履鄧戡子堂孫弼亮也蕭氏之棣蕚連輝蕭雄弟雅及維也翁源氣候之異同上翁源在萬山之間氣候又異地峻山髙嵐氣四合朔風初厲則黃蜂四集蔽塞窗牖土人謂之黃蜂瘴形勝控扼五嶺余安道修州衙記云云韶為交衝咽喉交廣同上云云脣齒江湘唐開北嶺唐徐浩張文獻碑始興北嶺峭嶮巉絶大庾南谷坦然平易公乃獻狀詔委開道曽不閲時行可方軌嶺道九十里余安道撰真水館記云云為馬上之役餘皆篙工楫人之勞地髙氣清皇甫集朝陽樓記韶郡最大余安道望京樓記廣之旁郡一十五而韶最大越之北門九朝通略潘美長驅至韶州奏云此地越之北門也在畨禺北余安道州衙記韶丨丨丨之丨樂石竒怪許申撰張曲江祠記嶺嶠之南舜遊之地云云而甲出曹溪甘爽而泌湧八泉㑹而同沼二流合為曲江山水之名聞天下韶石圖記土産鍾乳桞文與崔連州書丨丨始興為上次乃廣連山川韶石在州東北八十里郡國志斗勞水間有兩石相峙髙百仞廣五里相去一里大小略均似雙闕州取名焉此外又有三十六石各有名相傳舜登此石奏韶歌隋開皇九年取以名郡蓮花山在州東五里以形得名州治對山芙蓉山在州西五里許渾芙蓉寺詩宋玉含悽夢亦驚丨丨丨響一猿聲越王山在州北六里有廟太守初至皆欵謁焉大峒山余安道丨丨丨序韶之景富于山水而佛剎相望于野靈鷲山山似天竺丨丨丨因名始興記嶺南佛寺此為最唐沈佺期有詩浮山在州東北五里躡地一處百餘步地動桂山在州西北四十里蓋一郡之望靈池山在翁源縣池中有石人或隱或見自號老翁人居此源皆享壽考因名翁水源曰翁源昌山在樂昌士庶嬉遊之所帽子峯州治主山書堂巖在城東十五里白芒渡相對巖洞劃然泉清石潔張曲江讀書之所錦石巖在仁化南十七里有三巖其徑彎環直二千餘級夾道杉松髙凌霄漢紫微洞在州西南十餘里紹興間朱新仲自詞掖謫居曲江遇父老指示始得此洞可容數百人石室在樂昌西五里舊經石髙三千餘丈室外藤蘿交聨登之者攀援而上有石牀石臼仙經七十二福地此係泐溪福地有陸羽題名湞水在城東六步源出大庾嶺南流三百六十里入曲江合武水桞宗元酬裴韶州詩湞水想澄灣是也勞水韶石在水中武水在城西二十步復出桂陽監南流合真水盧水在曲江縣與武水合處其險名曰新潼有太守周昕廟即始開此潼者舟人放雞散米以祈福忌濕衣入廟云瀧水在樂昌自臨武東南流入曲江界韓愈詩南行踰六旬始下樂昌丨險惡不可狀船石相舂撞滄湖在樂昌東南十里周迥回三十五里曹溪在曲江縣東南三十五里源出本縣界牛嶺下西流五十里合大江真水南流下英州以土人曹叔良捨宅為寺因名丨丨雲水源在曲江縣有湯泉沸湧每至雪霜其上蒸氣髙數丈生物投之俄而熟矣韓愈詩韶州南去接宣溪丨丨茫茫日向西臨水源在曲江縣其山有石室室前盤石上羅列十銀瓶昔縣人封驅之奴株蒙竊銀瓶行未數里為大蛇所螫封驅驚悟尋奴則奴已死而瓶存井泉大涌泉在曲江南渡真水十里余襄公作涌泉亭後朱新仲記自有天地便有此泉振髙僧之錫而蠟騷人之屐多矣若據石臨清舉白盡醉則自我輩始卓錫泉在大庾嶺圖經云六祖大鑒禪師自黃梅傳衣鉢之曹溪五百大衆相逐至大庾嶺取五祖所傳衣鉢回大衆久立告渴者半祖師手拈錫杖㸃石眼寒泉遂湧清冷甘美大衆驚駭樓臺韶陽樓許渾丨丨夜宴詩待月江丨卷翠羅玉杯瑶瑟近星河簷前碧樹窮秋密窗外青山薄暮多鴝鵒未知狂客舞鷓鴣先讓美人歌使君不惜通宵醉刀筆初從馬伏波朝陽樓唐李守建皇甫湜有記九成臺在州宅蘇子瞻丨丨丨銘云韶州太守狄咸新作丨丨丨玉局散吏為之銘曰自秦并天下滅禮樂韶之不作蓋千二百二十有三年矣其器存其人亡則韶既已隱矣而况人器兩亡而不傳雖然韶則亡矣而有不亡者存蓋嘗與日月寒暑晦明風雨並行乎天地之間世無南郭子綦則耳未嘗聞地籟也而况得聞其天籟使耳得聞天籟則凡有形有聲皆吾羽旄干戚管磬匏絃嘗試與子登夫韶石之上舜峯之下望蒼梧之渺莾九疑之聫綿覽觀江山之吐吞草木之俯仰鳥獸之鳴號衆族之呼吸往來唱和非有度數而均節自成者非韶之大全乎上方立極以安天下人和而氣應氣應而樂作則夫所謂簫韶丨丨來鳯凰而舞百獸者既已粲然畢陳于前矣逍遙臺隋薛道衡刺史創水東有遺址張九齡陪王司馬登臺詩常聞薛公淚非直雍門琴竄逐留遺迹悲凉見此心府中因暇裕江山幸招尋人事已成古風流獨至今堂亭思古堂在州宅守狄咸建蘇子瞻名并書清淑堂在九成臺下圖經王介甫天聖間侍其父令公守韶日讀書于此政寶堂有蘇黃石刻楊廷秀跋云蘇黃皆落南而嶺南無二先生帖大似魯人不識麟惟韶有之耿光異氣上燭南斗下貫碧海矣又有米帖楊廷秀跋云萬里學書最晚雖遍參諸方然䄂手一瓣香五十年未拈出今得此帖乃知李密未見秦王耳盡善亭在建封寺蘇子瞻詩雙闕浮空照短亭至今猿鳥嘯青熒君王自此西巡狩再使魚龍舞洞庭蜀人文賦楚人詞堯在崇山舜九疑聖主若非真得道南來萬里亦何為整冠亭梁安世記云左瞰真水右俯武溪方山衮衮悉在目前韓愈詩暫欲係船韶石下上賔虞舜丨丨裾望韶亭楊廷秀題丨丨丨詩新隆寺後看韶石三三兩兩略依稀金坑津頭看韶石十十五五不整齊一來望韶亭上看九韶八音堆一案金鍾大鏞浮水涯玉瑟瑶琴倚天半堯時文物也粗踈禮樂猶帶鴻荒餘茅茨殿上槌土鼓葦葉聲外無笙竽黃能郎君走川嶽領取后䕫搜禮樂嶧山桐樹夜半鳴泗水石頭清晝躍山祇川后爭獻珍姚家制作初一新帝思南嶽來時巡宫琛廟寶皆駿奔曲江清徹碧瓊軟海山孤尖翠屏展天顔有喜后䕫知一奏雲韶供亞飯帝登九疑忘却歸不知班盡湘笛枝后䕫一脛跛莫隨坐委衆樂江之湄儀鳯舞獸掃無迹獨留一狻守其側至今喚作獅子石雨淋日炙爛不得洞庭張樂已莓苔犍為獲磬亦塵埃不如九韶故無恙戞擊尚可起冬雷何時九秋霜月裏來聼湘妃瑟聲美曲中莫道不見人江上數峯是誰子韶亭余安道記賢人君子樂夫佳山水者蓋將寓閒曠之目託髙逺之思滌蕩煩紲開納和粹故逺則攀蘿拂雲以躋乎杳冥近則築土飭材以寄乎觀望惟韶山去州治八十里自元精胚胎陽結陰流不知爐錘者誰獨秀兹境在昔虞舜南狩蒼梧九韶之樂奏于石上山之得名起於是矣國家丕冒海隅擇材綏逺殿省丞潘君伯恭特膺詔選來守嶺陀鋤強扶弱有意於古下車朞年人用休息乃曰山為州鎮厥名尤著自秦開五嶺迄今千載憑軾之使泛舟之賔大麓之下往還如織不知觀矚之地以為山榮豈守之者詳近而略逺哉遂按郡諜而相之背山東渡五里而近得地曰靈溪即道左建亭而山之竒秀森然在目矣伻來以圖授之矩畫先是賜紫僧法崇者推誠導慕衆所欽信嘗於康衢搆榭以壯州邦既勤基締將賁髹雘太守曰吾以敦朴化人無事於侈可去華就實移其用於兹亭崇曰明使君之言非唯集事兼存為政之體繇是捨飾畫之浮費市楩梓之美材持畚築運斧斤者子來而樂成矣越再出魄而亭就則兹山具美纎芥無隱屹者如闕闤者如庾平者如臺呀者如谷向者如鬪背者如逃人立鳥跂霞明霧暗碧玉千仞青螺萬疊殊形詭制紛不可名驅鬼役物巧不能備信方外之絶區也既而請名太守曰亭以山搆而能盡山之美其名韶云寺觀南華寺梁天監元年有天竺國僧智藥自西土來泛舶至漢土尋流上至韶州曹溪水口聞其香掬嘗其味曰此水上流有勝地尋之遂開山立石寶林乃云此去一百七十年當有無上法寶在此演法今六祖丨丨丨是也六祖姓盧名惠能新州人得法於黃梅五祖忍大師傳其衣鉢唐萬嵗通天初則天皇后錫賚宣詔元和間賜塔曰靈照之塔桞宗元為記其寺為嶺外禪林之冠唐曹松詩西土文殊留印跡大中皇帝舊參禪蘇子瞻詩前身便是盧行者楊廷秀詩南斗東頭第一山白頭初得扣禪關祖衣半似雲來薄金鎖才開霧作團光運寺在水西即始興內史王導故宅廣果寺宋之問詩影殿臨丹壑香臺隱翠霞巢飛銜象鳥砌踏雨空花寶鐸搖初霽金池映晚沙莫愁歸路逺門外有三車天慶觀祥符間創依終南山太平宫玉皇殿樣式造其勝妙出諸州上祠廟虞帝廟在州西北七里皇岡嶺有石刻朱文公迎送神樂歌見靜江府張相國祠在郡東墓在武臨原唐子西云張相鐡胎韶人相傳以為明皇悔時所鑄郭功父詩常平致主陳金鏡後世宫祠見鐡胎周濓溪祠在州學朱文公記云秦漢以來道不明於天下而士不知所以為學言天者遺人而無用語人者不及天而無本專下學者不知上逹而滯於形器必上逹者不務下學而溺於空虛優於治已者或不足及人而隨世以就功名者又未必自其本而推之也先生言聖學之有要而下學者知勝私復禮之可以馴致於上逹明天下之有本而言治者知誠心端身可以舉而措之天下脉絡分明而規模宏逺矣余襄公祠在相國廟東偏名宦王導晋人為內史蕭道成為內史即齊髙祖范雲為內史郡多盜賊雲撫以恩德曲江有修仁水雲酌而飲之賦詩云三楓何習習五溪何悠悠且飲修仁水不挹背邪流皇朝許申天僖初為太守栽官道松榕數萬株至今行者感其德王益天聖間為守初夷越無男女之别公一切窮治未幾男女之行别於塗周頥熙寧間為提刑不憚瘴毒荒崖絶島人迹所不至皆緩視徐按以洗寃澤物為己任已病來知南康軍楊萬里為憲臨汀有警勢連潮梅公即日召諸郡兵直抵循梅賊懼就擒有詩云不是潢池赤白囊何緣杖屨到潮陽官軍已掃狐兔穴歸路莫孤山水鄉林光朝自號文軒為憲嘗擊茶寇人物鄧文進始興人為本州刺史移州於水西蕭銑叛發兵攻樂昌城文進堅守纍有戰功廟食樂昌張九齡曲江人七嵗知屬文擢進士調校書郎中初武惠妃謀陷太子遣官奴誘公為援公叱去之安祿山以范陽偏校入奏事九齡謂裴光庭曰亂幽州者必此人也及討奚契丹師敗又奏請誅之帝不聽祿山犯闕帝思其忠遣使祭於韶州厚幣恤其家方明皇千秋節衆獻服玩公奏金鑑録以針規之皇朝余靖曲江人為集賢校理范仲淹以言事忤意貶饒州諫官不敢言靖上疏論仲淹不當貶出知秦州題詠薜荔搖青氣宋之問詩云云桄榔翳碧苔南中雖可悅北思日悠哉炎海韶州牧杜甫送韋員外牧韶州詩云云風流漢署郎分符先令望同舍有輝光白首多年疾秋天昨夜凉洞庭無過鴈書疏莫相忘看取北來魚同上養拙江湖外朝廷記憶疏雖無南過鴈云云江曲山如畫許渾送竇司直詩云云貪程亦駐舟行舟傍越岑張曲江真陽詩云云窈窕越溪深水暗先秋冷山晴當晝陰曲江水滿花千樹韓愈同張籍遊曲江寄白居易詩漠漠輕陰晚自開青春白日映樓臺云云有底忙時不肯來曲江山水聞來久韓愈將至韶州先寄張史君借圖經詩云云恐不知名訪倍難願借圖經將入界每逄佳處便開看乘船泛鷁下韶湍唐胡曽自嶺下泛舟清逺峽詩云云絶景方知在嶺南薜荔雨餘山似染蒹葭煙盡水如藍日遊蕭帝新松寺夜宿嫦娥桂影潭不為篋中書未獻便來此地結茅庵怪石巉巉上泬寥王介甫送崔左藏之廣東詩云云昔人於此奏簫韶水清但有嘉魚出風暖何曽毒草搖今日淹留君按節當時嬉戲我埀髫因尋舊政詢遺老為作新詩變俚謡四六眷是始興舊為南粵雖曰炎州實為樂土惟炎海之遐陬有曲江之名郡山明水秀九成之韶樂可賔人傑地靈千秋之鑑録未泯濓溪持節備殫問俗之勞坡老作銘妙得聞韶之意張曲江千秋之録寫作忠規余襄公四諫之名凛有生氣江濵執别悵九成韶石之音嶺外重來賦萬里梅花之句方輿勝覽卷三十五
