body:
  text: 方輿勝覽卷八宋祝穆撰台州臨海寧海黃巖仙居天台建置㳂革禹貢揚州之域南斗須女之分春秋時屬越秦屬閩中郡漢屬東甌國後立為冶縣東漢末吳分冶縣為東南二部都尉東部臨海南部建安後以會稽東部為臨海郡梁改為赤城郡隋屬永嘉郡唐改為台州國朝因之今領縣五治臨海事要郡名天台真誥丨丨山上應台星故曰丨丨州以此名霞城孔靈符㑹稽記赤城山色皆赤狀似晨霞亦謂丨丨臨海見㳂革注風俗閭閻興禮遜陳述古鄭閻中仙居詩云云囹圄長榛蕪有海陸之饒圖經云川澤沃衍云云形勝託靈越以正基神雍山圖采浮屠氏說以為閻浮震旦國極東處又號靈越故孫綽賦云云臨海越谷杜牧台州制三方岸江湖吕伯恭作修城記臨海郡南東西云云秋水時至北限大江蹙不得騁怒齧堤足生聚凛凜恃城以為命距海百餘里逋亡剽俠之所遭惡嵗輒睢盱洲溆睥睨郛郭徼警者不敢弛柝故閉修之政在是郡為首務蓋所以逺菑害銷姦萌非徒區畫封表偹侯邦之制也距海百餘里見上春遊天台續志云云風日和暢秋遊雁蕩巖壑呈露各因其時之所宜也山川大固山紹興間道士費德泓卓菴斸地得晉斷碑有龍顧山字亦曰龍顧即郡之主山在州西北三十步髙八十丈周回五里按舊經晉隆安末孫恩為冦刺史辛景於此掘塹守之恩不能犯遂以丨丨小固名丨巾子山在州東南一里一百步連小固山橫峙江之下流在城中雨峯如恰幘其頂雙塔差肩有明慶塔院塔之南有翠微閣北有廣軒下瞰闉闍南眺郊藪㕓市山川之盛一目俱盡故其勝槩名天下登臨者必之焉有曲肱齊齊側有蹙雲軒又其顛有息庵今廢任翻詩絶頂新秋生夜凉鶴飛松露滴衣裳前峯月照半江水僧在翠微開竹房天台山在天台縣西一百一十里臨海記丨丨丨超然秀出山有八重視之如一髙一萬八千丈周迥回八百里又有飛泉埀流千仭似市洞天福地記丨丨丨名上清玉平之天即桐柏真人所理亦名桐柏山孫綽字興公為永嘉太守意將解印以向幽寂聞丨丨丨神秀可以長往因使圖其狀遙為之賦賦成示友人范榮期榮期曰此賦擲地必作金聲遊天台賦云丨丨丨者蓋山嶽之神秀也涉海則有方丈蓬萊登陸則有四明天台皆𤣥聖之所遊化靈仙之所窟宅夫其峻極之狀嘉祥之美窮山海之瓌富盡人神之壯麗矣所以不列於五嶽闕載於常典者豈不以所立冥奧其路幽逈或倒景於重溟或匿峯於千嶺始從魑魅之塗卒踐無人之境舉世罕能登陟王者莫由禋祀故事絶於常篇名標於竒紀然圖像之興豈虛也哉非夫遺世玩道絶粒茹芝者烏能輕舉而宅之非夫逺寄冥搜篤信通神者何肯遙想而存之余所以馳神運思晝詠宵興俯仰之間若已再升者也方解纓絡永託兹嶺不任吟想之至聊奮藻以散懷太虛遼豁而無閡運自然之妙有融而為川瀆結而為山阜嗟台嶽之所竒挺實神明之所扶持䕃牛宿以曜峯託靈越以正基結根彌於華岱直指髙於九嶷應配天於唐典齊峻極于周詩邈彼絶域幽邃窈窕近智者以守見而不之之者以路絶而莫曉哂夏蟲之疑氷整輕翮而思矯理無隱而不彰啓二竒以示兆赤城霞起以建標瀑布飛流以界道覩靈驗而遂徂忽乎吾之將行仍羽人于丹丘尋不死之福庭茍台嶺之可攀亦何羡乎層城釋域中之常戀暢超然之髙情被毛褐之森森振金策之鈴鈴披荒榛之蒙籠陟峭崿之峥嶸濟楢溪而直進落五界而迅征跨穹窿之懸磴臨萬丈之絶冥踐莓苔之滑石摶壁立之翠屏攬樛木之長蘿援葛藟之飛莖雖一冒於埀堂乃永存乎長生必契誠於幽昧履重險而逾平既克隮於九折路威夷而修通恣心目之寥朗任緩步之從容藉萋萋之纎草䕃落落之長松覿翔鸞之裔裔聽鳴鳳之嗈嗈過靈溪而一濯疏煩想於心胸蕩遺塵於旋流發五蓋之遊䝉追羲皇之絶軌躡二老之𤣥蹤陟降信宿迄于仙都雙闕雲竦以夾路瓊臺中天而懸居朱閣玲瓏於林間玉堂隂映於髙隅彤雲斐亹以翼檽皎日炯晃於綺疏八桂森挺以凌霜五芝含秀而晨敷惠風佇芳於陽林醴泉湧溜于隂渠建木减景於千尋琪樹璀璨而埀珠王喬控鶴以冲天應真飛錫以躡虛騁神變之揮霍忽出有而入無于是遊覽既周體靜心間害馬已去世事都捐投刃皆虛目牛無全凝思幽巖朗詠長川爾乃羲和停午遊氣髙搴法鼓琅以振響衆香馥以揚煙肆覲天宗爰集通仙挹以𤣥玉之膏潄以華池之泉散以象外之說暢以無生之篇悟遣有之不盡覺涉無之有間泯色空以合迹忽即有而得𤣥釋二名之同出消一無於三幡恣語樂以終日等寂默于不言渾萬象以冥觀兀同體於自然韓愈送惠師詩惠師浮圖者乃是不羇人發迹入四明梯空上秋旻遂登天台望萬壑皆璘珣夜宿最髙頂舉頭看星辰光芒相照燭南北爭羅陳兹地絶翔走自然嚴且神微風吹木石澎湃聞韶鈞夜半起下視波光銜月輪杜荀鶴詩一到天台寺髙低景旋生共僧巖上坐見客海邊行野色人耕破山根浪打鳴忙時向閒處不覺有閒情方干詩路入仙溪氣象清埀鞭樹石罅中行霧昏不見西陵岸風急先聞瀑布聲李白天台曉望詩天台鄰四明華頂髙百越門標赤城霞樓棲滄海月慿髙逺登覽直下見溟渤雲埀大鵬翻波動巨鼇沒風潮爭洶湧神怪何翕忽觀竒疏無倪好道心不歇攀條摘朱實服藥鍊金骨安得生羽毛千秋卧蓬闕蔡天啓詩天台四萬八千丈玉京五城十二樓欲乘西風跨獨鶴直度南斗騎牽牛赤城山在天台縣北六里一名燒山其上石壁皆如霞色望之如雉堞然故後人以此名山天姥山在天台縣之西北有一峯崛起孤峭秀拔與天台山相對李白有夢遊丨丨吟云天姥連天向天橫勢拔五嶽掩赤城台山一萬八千丈對此欲倒東南傾瀑布山乃天台山之别岫有瀑布埀流千丈聲若雷霆觀者為之震掉寒石山在天台縣西北七十里其山深邃當暑有雪亦名寒巖南有泉如屋霤寺僧縻竹綆引之轉西二里亂泉釃流巖竇間散若虬髯因號髯洞蓋台山勝絶處也郭三益詩道人棲碧山雲居在空曲十年海潮音外物緣已熟時携貝葉書步入深林讀宵眠護禪虎晝引穿花鹿菴中三昧語藥我貪嗔毒何當脫雙鳬藜杖追髙躅劉阮山在縣西北二十里先是漢永平有劉晨阮肇入山採藥失道食盡見桃食之覺身輕行數里至溪滸持杯取水見一杯流出有胡麻糝溪邊有二女子笑曰劉阮二郎捉向所失流杯來便迎歸作食有胡麻飯山羊脯甚美後欲求去㑹集奏樂共送劉阮指示元路既出無復相識至家子孫已七世矣元稹題詩云芙蓉脂肉緑雲鬟罨畫樓臺青黛山千樹桃花萬年藥不知何事憶人間東橫山在天台縣東十里許渾宿東橫瀨詩孤舟路漸賖時見碧桃花溪雨灘聲急巖風樹勢斜韋羌山在天台山西四十里上有石壁字如科斗陳述古詩去年曾覽韋羌圖云有仙人古書千尺石巖無路到不知蝌蚪是何書福應山在仙居縣東二里隂陽家謂其邑居龍首得地之勝邑人建浮圖其上自是取青紫不乏焉上有盡美亭張景修記仙居邑之美者也而一山盡焉丨丨丨之美者也而一亭盡焉盡美於亭者非盡一山之謂也盡一邑之謂也蓋竹山在臨海縣中有洞名長耀寶光之天金鼇山在臨海縣東南百二十里有普濟院西有軒下臨長江前挹海門諸峯雲抄漫録載建炎四年天子航海泊丨丨丨留十四日幸永嘉復幸金鼇捷書至航海由四明還委羽山在黃巖縣南五里世傳仙人劉奉林於此控鶴輕舉嘗墜羽故名真誥云天下第二洞號大有空明之天雲王龜齡詩龜山㰩翠日開屏羽客逍遙此閉扄早起留閒放鶴夜來伴月靜看經巖前方石有多好竈裏丹砂且是靈應有赤城鸞鳳過一聲長嘯入青冥雙巖在縣南十五里峭峻並峙為江南諸山之冠州治對焉白巖在臨海縣南二十四里孤絶秀異上皆白石華頂峯在天台縣東北六十里蓋天台第八重最髙處髙一萬丈絶頂東望滄海俗號望海尖草木薰郁殆非人世孫綽所謂陟降信宿迄乎仙都是也玉霄峯在天台縣北三十五里重崖疊嶂松竹葱蒨且産香茅世號小桐柏焉皮日休詩青冥向上丨丨丨元始先生戴紫蓉曉按瓊文光洞壑夜壇香氣惹杉松間迎仙客來為鶴靜噀靈符去是龍子細捫心無俗骨欲隨師去肯相容瓊臺雙闕在赤城山兩峯萬仭森倚相向石橋在縣北五十里即五百應真之境相傳有方廣寺有石梁架兩崖間龍形龜背廣不盈咫其上雙澗合流泄為瀑布梁既峭危且多莓苔甚滑下臨絶澗過者心悸石罅有木瓜華時有蛇盤紏至實落供大七乃去號為護聖瓜趙湘詩白石峯猶在橫橋一徑微多年無客過落日有雲歸水净苔生髮山寒樹著衣如何方廣寺千古去人稀丹丘孫綽天台賦仍羽人於丨丨丹霞洞在天台觀東北玉京洞在縣北七里赤城山右蓋第六洞天許邁常居之因與王羲之書曰自天台至臨海多有金堂玉室仙人芝草余爽詩東臨滄海宴羣仙誤入桃源小洞天一局棋殘消幾刻老龍鬚甲已蒼然括蒼洞在天台縣東南三十里按塵外記丨丨成德隱元之天蓋第十丨天也蒼嶺在仙居西北五十里髙五千丈黃巖溪孫應時詩云得雨溪聲壯無風雲氣多山花依翠竹灘石亂寒莎青溪在天台縣謝靈運詩旦發丨丨隂尾閭在仙居縣東海中與海門馬筯相直惟髙山可望其水湍急陷為大渦者十餘舟楫不敢近舊傳為東海泄水處詳見夷堅志東湖在崇和門外為春夏行樂之勝境堂閣靜鎮堂在州治唐李嘉祐為守竇常贊之有丨丨方州之句三瑞堂洪公弼為寧海主簿時建適以荷花桃實竹幹有連理之瑞已而生子適故適以二車行縣題詩云久矣馳魂夢今登丨丨丨故山有喬木近事話甘棠展驥慚充位占熊憶問祥白雲留不住極目是吾鄉巖老堂在仙居縣㕔東令陳襄建自注云嘗穿池引水分繡閣在添倅㕔洪景伯為記玉霄閣在天台寺陸務觀詩竹輿曽兩到天台緑樹隂中小閣開榜作玉霄君㑹否要知小吏按行來亭榭交翠亭在寧海縣㕔洪景伯建赤城竒觀在郡圃後山上萬壑風煙在倅㕔後寺觀國清寺在天台縣北十里隋僧智顗夢定光告曰寺若成國即清故名李雍記栁公權書額時以齊州靈巖荆州玉泉潤州棲霞台州丨丨為四絶今名景德丨皮日休詩十里松門國清路飯猿臺下菩薩樹怪來煙雨路晴天元是海風吹瀑布崇道觀在桐柏山山間環有九峯玉女卧龍紫霄翠微玉泉蓮華華琳香琳玉霄是也唐崔尚碑連山峩峩四野皆碧茂木鬱鬱四時並青雙峯如闕中天開豁一道瀑布洞門長松夾道孟浩然桐柏觀詩海泛信風帆夕宿逗雲島捫蘿亦踐苔輟棹窮幽討鄭薰詩深山桐柏觀殘雪路猶分數里踏紅葉全家穿碧雲月寒巖障曉風逺蕙蘭芬明日出林去吹笙不可聞趙師秀詩山深地忽平縹眇見殊庭瀑近春風濕松多曉日青石壇遺鶴羽粉壁剝龍形道士王靈寶輕强滿百齡祠廟滕侯廟東萊修城記宣和中盜發仙居闖虛罙入城薄欲登則有户掾滕君膺師厲吏士圉以方略冦不為患父老紀焉郡人為立祠於郡側山上朱元晦有記天王祠舊說唐太宗從髙祖起義兵有神自稱毗沙門天王願同力定亂將有猪首象鼻者故所向成功及即位詔天下公府皆祀之天寶初又詔諸郡於城隅置祠仍建佛寺俱以天王為額古跡狀元塘在州東一里舊為普濟寺陳侍郎公輔居之客忽謂曰此寺為池當有擢上第者後徙寺地竟為池陳果魁辟雍遂以名其塘僉㕔宣和間台州守奏今尚書省公相㕔已改作都㕔內外都㕔並行禁止欲將本州都㕔以丨丨為名詔從之此丨丨得名之始也名宦孫綽為臨海令嘗作天台賦詳見前謝靈運為內史江淹嘗為臨海王長史鄭䖍貶司户杜甫懷台州鄭司户詩天台隔三江風浪無晨暮鄭公縱得歸老病不識路皇朝畢士安為守真宗有君子人之稱章得象為守夏竦大中祥符元年為通判值山水泛濫率僚屬禱于山椒忽見黃衣道士泛舟冒雨而來衣不沾濕目竦曰若遂修道可登真籙答以欲作顯官以報罔極道士曰亦須位極人臣拂衣登舟而去見王樂道談淵陳襄號古靈知仙居縣和鄭閎中詩十一首皆以我愛仙居好發端曾肇為黃巖簿建中初為翰林學士時治上封事異趣者因追求肇草求言詔貶濮州又徙台州元絳吕伯恭記云慶歷之水幾不為郡元章簡公來守而城復立趙汝愚吕伯恭修城記乾道九年里旅不戒於火延及郡城堵頺甃圯徑踰無禁害氣來格民訛不寧間一嵗太守丨侯丨丨自信徙鎮暇日循行落曰屏蔽廢撤若是其何以待不虞土功於古雖有常律傳春秋者復出啓塞從時之例豈非城闉之啓塞實有邦之大紀隨時築治有不得而已者耶又云大抵取具於莊城之籍間民願即工者厚酬之不願勿强維侯憂民急病之意既達於下而精思周慮又足以綜理之故公無羡費人無留力工無餘技役事首尾歷再時版臿並作觀堞崛興而後郊之氓初未嘗釋隴畝也尤袤自號遂初嘗為守禱旱有詩云三日霪霖已渺漫未晴三日又言乾從來說道天難做天到台州分外難人物顧歡隱天台山早孤讀詩至哀哀父母輒廢書慟哭由是受學者廢蓼莪篇不講王逺知異人記台州道士丨丨丨善易知生死禍福作易說千五百卷一日雷雨雲霧中一人叱逺知曰所泄者其人何在上帝命吾攝六丁雷電追取逺知惶懼據地旁有六人青衣已捧書立矣老人責曰上方禁文自有飛天保衛金科祕藏𤣥都汝何者輒藏緗帙逺知曰青邱元老傳授也韓愈詩天官勑六丁雷電下取將蓋用此也司馬承禎續仙傳字子微隱於天台山玉霄峯自號白雲子蜀女謝自然泛舟將詣蓬萊求師船為風飄到一山見道人指言天台山丨丨丨丨名在丹臺身居赤城此真良師也蓬萊隔弱水三萬里非舟楫可往非飛仙不到自然回來承正受度後白日上升皇朝吕頥浩濟南人寓于台謝深甫為宰相自深甫始左譽自稱中谷道人為杭州司録丁難居鄉謝恭政為守簽一僧開堂疏見一聫云盡十方佛真教進步無門此一瓣香未審何人有分大喜既登政府遂薦之謝常舉以自代有謝啓云知揚雄之竊比孟氏嘗有是心雖孔子謂不如顔淵何害於聖名賢陳瓘南劔人字瑩中號了翁初為司諫上疏論神宗實録辨宣仁誣謗得罪京卞編置台州諡文肅陳與義西洛人自號簡齊紹興恭知大政建中避地臨海題詠剖竹赤城邊李白送楊山人我家小阮賢云云詩人多見重官燭未曾燃興引登山屐情催泛海船石橋如可度携手弄雲煙藥少覺山貧杜牧詩魚多知海熟云云台州地闢海冥冥唐杜甫送鄭著作詩云云雲水長和島嶼青山城别是武陵源劉長卿送李使君詩露冕新承明主恩云云花間五馬時行縣户外千峯常在門海邊津吏棹船迎方干詩山下縣僚張樂送云云髙低無處不泉聲方干送孫百篇詩遊天台東南去路落斜行入樹穿村見赤城逺近常聞皆藥氣云云映巖月向牀頭沒濕燭雲從柱底生更有仙花與靈草恐君多半不知名一江寒水抱城斜舒信道詩聞說天台太守家全家日日在煙霞四郭青山連市合云云四六塗芝天闕剖竹台城升華奎閣作鎮霞城疏恩丹陛趣鎮赤城眷是天台介于日甸惟天台之古郡實海嶠之奧區惟是赤城之壤實鄰翠向之封惟赤城本今古之福庭在靈越為東南之佳郡霞起赤城獨擅興公之賦雲和青嶼繼傳子美之篇摩挲壁記分符多入於黃扉㸃檢圖經得道或升於丹闕託靈越以正基山夸神秀說天台之為郡家住煙霞弦歌小試古靈老子之曽遊簿領卑棲南豐先生之不鄙海深山復素稱魚稻之鄉事簡民醇各遂蠶桑之業海闊冥冥雲水長和於島嶼色齊兩兩星躔上映於台符碧雲紅葉聊尋野徑之幽流水胡麻頗覺仙源之近濵水三方當謹嚙城之患距海百里或多藏藪之姦方輿勝覽卷八
