body:
  text: 方輿勝覽卷二十三宋祝穆撰湖南路潭州長沙湘鄉善化湘潭衡山益陽安化瀏陽醴陵湘隂攸縣寧鄉建置沿革禹貢荆州之域三苗之境其星土當鶉尾之次翼軫之度長沙自有一星在軫中周成王分封屬楚長沙之名始見於威王之時春秋戰國屬楚黔中地秦分黔中置長沙郡漢髙徙吳芮為長沙王都臨湘景帝封子發為長沙定王晉置湘州隋改為潭州又改長沙郡唐為長沙郡復為潭州領欽化節度皇朝降為防禦使復為武安節度升為帥府統郡十領縣十二治長沙善化湖南轉運置司事要郡名長沙郡以丨丨星得名寰宇記引闞駰十三州記云西自湘江至東萊萬里故曰丨丨夀沙晉隋天文志長沙明則主夀星沙見上熊湘昔熊繹始封於此故名三湘寰宇記湘潭湘鄉湘源風俗有舜遺風湘中記其俗丨丨之丨丨人多純朴今猶好彈五絃琴及為漁父吟頗雜越風湖南風土記茅廬為室云云長沙卑濕同上云云俗信鬼好淫祀漢書長沙定王發景帝二年立以母微無寵故王丨丨貧國應劭注時諸王來朝有詔更前稱夀歌舞定王但張袖小舉手左右笑其拙怪問之對曰臣國小而地狹不足以回旋帝乃以武陵零陵桂陽屬之焉其人徑悍決烈隋書云云頗同揚州瀟湘為洙泗王黃州碑云云荆湖為鄒魯形勝雲陽之墟遁甲經長沙福地云云可以避難可以隱居雲陽氏古仙人也列山氏之故墟圖經云云三苗國之南境同上云云南以五嶺為限元和郡縣志云云北以洞庭為界右吞夏汭唐飛文應詔曰云云左控荆門邑連溪洞帥董華表唇齒荆雍晉譙王承為湘州刺史元帝謂曰湘州控上流之形勢據三江之會云云依負喬嶽長沙志云云襟帶重湖居三江五湖之中大觀升州為帥府詔云云地大物衆山川秀麗稱衡湘見後歐公送廖倚序瀟湘八景湘山野録本朝宋迪度支工畫有平沙鴈落逺浦帆歸山市晴嵐江天暮雪洞庭秋月瀟湘夜雨煙寺晚鐘漁村落照謂之八景云土産鵩鳥土風碑有云巴蛇食象空見於圖書丨丨似梟但聞於詞賦厥草惟蘭孫杜若荃衡留夷藒車出焉蘭蓀見上注山川麓山盛𢎞之荆州記長沙西岸有丨丨蓋衡山之足又名靈麓峯乃嶽山七十二峯之數自湘西古渡登岸夾徑喬松泉澗盤繞諸峯疊秀下瞰湘江嶽麓寺道林寺嶽麓書院皆在此焉湘山在益陽洞庭之中即熊耳山相君所遊處亦曰君山秦皇至丨丨祠大風不得度遂赭其山山海經洞庭之山浮於水上下有金石絲竹之聲楚懷王以四仲遊山舉四仲之氣以為樂章任鵠君山詩波濤四面白雲木一堆青昭山元和志在長沙南七十里臨湘水下有凝潭曰昭潭州之得名因此寰宇記昔昭王南征而不返沒於此潭故曰昭潭玉笥山甄烈湘中記屈潭之左有丨丨丨屈平之放棲於此山而作九歌焉輿地廣記在湘陰隋於此置玉州雲陽山在攸縣即雲陽之壇雲母山在湘潭北九里列女傳長沙雲母服之不朽小廬山在益陽似九江廬山故曰丨丨丨晏類要即浮丘公上升之所上有消修寺張敬夫詩峯勢香爐直溪添峽水潺居然一蘭若喚作丨丨丨尖山在長沙西一名土峯讖云丨丨青宰相生南嶽一名衡山在衡山縣西三十里晉因山以名郡湘中記度應斗衡位直離宮故曰丨丨又名霍山爾雅疏泰與岱衡與霍皆一山有二名南嶽記衡山者朱陵之靈臺太虛之寶洞上承翼軫鈐總萬物故名衡山下踞離宮統攝火師故號南嶽赤帝館其嶺祝融宅其陽逮于軒轅以灊霍二山副焉長沙志軒翔聳拔九千餘丈尊卑差次七十二峯巖洞溪澗泉石之聲交錯於中又有數十洞十五巖三十八泉二十五溪九池九潭六源八橋九井三穿三漏此最著者七十二峯最大者五祝融紫蓋雲密石廪天柱而祝融為最髙杜甫望嶽詩南嶽配朱鳥秩禮自古王歘汲頓地靈鴻洞半炎方邦家用祀典在德非馨香巡守何寂寥有虞今則亡洎吾隘世綱行邁越瀟湘渴日絶壁出漾舟清光旁祝融五峰尊峯峯次低昻紫蓋獨不朝爭長鄴相望恭聞魏夫人羣仙夾翺翔有時五峯氣散風如飛霜牽迫限修途未暇杖崇岡歸來覬命駕沐浴休玉堂三嘆問府主曷以贊我皇牲壁忍衰俗神其思降祥劉禹錫詩東南倚蓋卑維嶽資柱石前當祝融居上拂朱鳥翮青𡨕結精氣磅礴宣地脈還聞膚寸陰能致彌天澤李白詩衡山蒼蒼入紫冥下看南極老人星回飈吹散五峯雪往往飛花落洞庭盧肇登南嶽蘭若詩祝融絶頂萬餘層䇿杖攀蘿步步登行到月宮霞外寺白雲相伴兩三僧祝融峯位直離宮盧載詩五千里地望皆見七十二峯中最髙朱元晦自上封登祝融絶頂次南軒韻衡嶽千仞起祝融一峯髙羣山畏突兀奔走如曹逃我來雪月中歷覽快所遭捫天滑青壁俯􅊤崩銀濤所恨無十犗一掣了六鰲遄歸青運宮坐對白玉毫重閣一倚徙霜風利如刀平生山水心真作貨食叨明朝更清徹再往豈憚勞中宵撫世故劇如千蝟毛嬉遊亦何益嵗月今滔滔起望東北雲茫然首空搔又下祝融峯我來萬里駕長風絶壑層雲許蕩胸濁酒三杯豪氣發朗吟飛下祝融峯聖燈巖在衡山之青玉壇張敬夫詩陰壑傳聞炯夜燈幾人髙閣費追尋山間光景秪常事堪笑塵寰萬種心朱元晦詩神燈遊夜唯聞説皓月當空不用尋箇裏忘言真得所便應從此正人心金牛岡在長沙湘中記載赤牛渡江糞金於沙中舟人迹逐至山不見乃掘地求之掘處尚存謂之丨丨丨今在城中之嚴福寺有裴休書堂在焉清風峽在嶽麓寺下泉石清徼南軒有詩朱陵洞在衡山南嶽記名大虛小有之天三十六洞天中第三靈龜洞在安化東南四十里上有石屋水㵼洞前三十丈前後賦詩者甚衆湘江在長沙羅含湘中記湘水至清深五六丈下見底了了石子如樗蒲白沙如雪霜赤岸若朝霞長沙志涉湘千里聞漁父吟中流相和其聲綿逺可聽所謂汲清湘燃楚竹款乃一聲山水動色此豈俗漁境界耶洞庭湖長沙志洞庭之水瀦為七百里日月出入其中史記黃帝南至於江登熊湘作咸池張樂於洞庭之野或題詩云湖光秋月兩相和潭面無風鏡未磨遙望洞庭水水翠白雲槃裏一青螺青草湖志南曰青草北曰洞庭所謂重湖黃魯直詩乙丑越洞庭丙寅渡青草東湖在長沙戴叔倫詩偶回丨丨東復東數聲雞唱翠微中遙知楊桞是門處似覺芙蓉無路通湘灕一水而背流丨猶相也丨猶離也以言湘水有所合而灕則違湘而南也湖嶺之間湘水貫之無出湘之右者凡水皆會焉但以瀟水合則曰瀟湘以蒸水合則曰蒸湘以沅水合則曰沅湘耳昭潭在昭山下屈潭在湘陰縣六十里酈道元水經云汨水西經玉笥山又西為屈潭即羅潭也屈原漁父篇原既放遊於江潭行吟澤畔顔色憔悴曰寧赴湘流彛於江魚腹中乃作懷沙之賦自投汨羅而死圖經今有屈原冢在江側或謂楚人招魂葬焉又有屈大夫碑而字滅無迹矣賈誼渡湘為賦以弔原史遷亦嘗經此水荆楚嵗時記屈原以五月五日投汨羅水楚人哀之至此曰輒以竹筒貯米祭之人或夢原曰多為蛟龍所食願以綵索繫角黍以投庶免此患今俗因此韓昌黎詩猿愁魚躍水翻波自古流傳是汨羅蘋藻滿盤無處奠空聞漁父扣絃歌舜溪在衡山安上峯相傳舜因陟方過此禹溪在雲密峯郡守石才詩須知此溪水名著百王前青楓浦在瀏陽縣杜子美詩輟棹丨丨丨雙楓舊已摧雷池在祝融峯側劉莘老詩九千丈外雲間寺一萬年餘石上松引手莫髙疑觸斗臨池母久恐興龍張栻丨丨觀日詩云朝曦何處升倣佛認微紅金鉦忽湧出滉蕩浮雙曈乾坤豁呈露羣物光芒中誰知雷池景乃與日觀同銅官渚在寧鄉縣界三十里舊志楚鑄錢處杜子美有丨丨丨阻風詩橘洲類要在長沙西南四十里湘江中泗洲曰丨丨曰直洲曰誓洲曰白小洲江中水泛惟此不沒上多美橘故名晉永興生此洲諺曰昭潭無底丨丨浮駱駝觜在瀏口諺云丨丨丨圓出狀元井泉碧泉在湘潭西南七十里澄碧如染溉田五千畝南入湘胡安國朱晦庵曾遊有詩五峯胡宏創亭曰有本學校嶽麓書院南軒張敬夫記云湘西故有藏室背陵向壑木茂而泉潔為士子肄業之地始開寶中郡守朱洞百度基創宇以待四方學者李允則來為州請於朝乞以書藏方是時山長周式以行義著祥符八年召見便殿拜國子學主簿使歸教授詔以丨丨丨丨名璔賜中祕書紹興辛亥更兵革灰燼乾道改元建安劉侯珙下車既揚蠧夷姦民俗安靜郡人合辭以書院請侯竦然曰是固章聖皇帝加惠一方以風厲天下者而可廢乎來半嵗而屋成某從多士往觀焉曰侯之為是舉也豈特使子羣居侯談但為決科利祿計乎亦豈使子習為言語文辭之工而已乎蓋欲成就人才以傳道而濟斯民也其傳果何歟曰仁也仁人心也率性立命知天地而宰萬物者也孟子曰惻隱之心仁之端也於此焉求之則不差矣嘗試察吾事親從兄應物處事是端也茍能充而達之則仁之大體豈不可得乎及其至也與天地合德鬼神同用悠久無疆變化莫測而其則初不逺也是雖約居屏處庸何損得時行道事業滿天下而亦何加於我遂書斯言以厲同志俾無忘侯之德文定公書院胡公安國渡江而休于衡嶽買地結廬名曰書堂十五年不出五峯書堂胡宏所築在寧鄉縣之靈峯城南書院在臨湘門街乃南軒先生講學之地題扁筆勢豪徑張紫微平生得意書也其間鑿池以匯息澤之水本屬納氏故名納湖張敬夫詩積雨欣始霽清和在此時林葉既敷榮禽聲亦融怡鳴泉來不窮湖風起淪漪西山卷餘雲逾覺秀色滋層層叢録間愛彼松柏姿青青初不改似與幽人期坐久還起來堤邊足逶迤遊魚傍我行野鶴向我飛敢忘昔賢志亦復咏而歸寄言山中友和我和平詩朱元晦跋云久聞敬夫城南景物之勝常恨未得往遊其間今讀此詩便覺風篁水月去人不逺然敬夫道學之懿為世醇儒今之乃欲以筆札之工追蹤前作豈其戲耶不然則敬夫豪放奔逸與西臺之溫厚靚深必有能辨之者詩云詩筒連畫卷坐看復行吟想象南湖水秋來幾許深堂觀敬簡堂在府治張紫微建以為燕室兩壁書中庸大學中屛書顔淵問仁一章皆張自筆侍講張栻記云蓋心宰萬物而敬者心之道所以生也生則萬理森然而萬事之綱總攝於此凡至乎吾前者吾則因其然而酬酢之也故動雖微而吾固經緯乎趨吉之先事雖大而吾處之若飲食之常此所謂居敬而行簡者歟故先覺君子謂飾私智以為竒非敬也簡細不故而自崇非敬也非敬則是心不存而萬事乖析矣可畏歟雖然若何而能敬克其所以害敬者則敬立矣害敬莫甚於人欲自容貌辭氣之間而察之天理人欲絲毫之分則敬在其中引而達之則將有常而日新日新而無窮矣朱元晦敬簡堂詩煌煌定方中農隙孟冬月君侯敞齋扉華榜新未揭我來適兹時亦有大夫苃清湘不留行晤語得超越更看雷雨勢翻動龍蛇窟襟懷頓能輸肝膽亦已竭老仙來何方湖海氣硉矹君侯斂袂起顛越承屨襪坐人驚創見引去殊卒卒伊余不忍逝頓首願有謁人生均秉彛天造豈停歇云何利害判所較無一髮兹焉辨不早大本恐將蹶吾言實自針君聽未宜忽後林栗易以靜香堂湘山觀在漕廳東張安國書臺閣定王臺俗傳定王載米博長安土築臺于此以望其母唐姫墓張安國名曰定王臺自為書扁朱元晦詩寂寞畨君後光華帝子來千年餘故國萬事只空臺日月東西見湖山表裏回定知爽鳩樂莫作雍門哀楚樓在郡城上清風閣在湘潭縣歸鴻閣在瀏陽縣楊中立建後為祠張敬夫記亭館望湘亭鄭谷詩湘水似伊水湘人非故人登臨獨無語風桞自搖春湘江亭孟賓於有丨丨丨詩云獨宿大中年裏寺樊籠得出事無心寒山夢覺一聲磬霜葉滿林秋正深風雩亭張敬夫序云嶽麓書院之南有曾丘焉於登覽為曠建安劉公作亭其上以為青襟遊息之地廣漢張敬夫名以風雩碧湘門冷齋夜話黃魯直南遷與豫會于長沙留丨丨丨者一月陶弼詩城中煙樹緑波漫幾萬樓臺樹影間天濶鳥行疑沒草地卑江勢欲沉山長沙驛桞宗元有詩三元坊淳熙乙巳上舍釋褐魁易祓丁未省元湯濤狀元王容皆邦人佛寺道林寺在嶽麓山下距善化縣八里寺有四絶堂保大中馬氏建謂沈傳師裴休筆札宋之間杜甫篇章治平間蔣永叔作記曰彼以杜詩沈書為絶吾豈敢議若夫遺歐陽詢書二也杜詩三也韓詩四也此之謂四絶杜甫嶽麓山道林二寺詩玉泉之南麓山殊道林林壑爭盤紆寺門髙開洞庭野殿腳插入赤沙湖五月寒風冷佛骨六時天樂朝香爐地靈步步雪山草僧寶人人滄海珠塔劫宮牆壯麗敵香厨松道清涼俱蓮花交響共命鳥金榜雙回三足烏方丈涉海費時節玄圃尋河知有無暮年且喜經行近春日兼蒙暄暖扶飄然斑白身奚適旁府此煙霞茅可誅桃源人家易制度橘洲田土仍膏腴潭邑中甚淳古太守庭內不喧呼昔遭衰世皆晦迹今幸樂國養微軀依止老宿亦未晚富貴功名焉足圖久為野客尋幽慣細學何顒免興孤一重一掩吾肺腑山鳥山花吾友于宋公放逐曾題壁物色分留與老夫韓愈陪杜侍御遊湘西寺詩長沙千里平勝地猶在險况當江濶處斗起勢匪漸深林髙玲瓏青山上琬琰路窮臺殿闢佛事煥且儼剖竹走源泉開廊架崖廣又云客堂喜空涼華榻有清簟澗蔬煮蒿芹水果剝菱芡又云小樓黑無月漁火燦星點夜風一何喧杉檜屢磨颭猶疑在波濤怵惕夢成魘靜思屈原沈逺憶賈誼貶椒蘭爭妬忌綘灌其讒諂誰令悲生腸坐使淚盈臉翻飛乏羽翼指摘困瑕玷珥貂藩維重政化類分陜禮賢道何優奉己事苦儉大厦棟方隆巨川楫行剡經營誠少暇遊宴固已歉旅程愧淹留徂嵗嗟荏苒平生每多感柔翰遇頻染展轉嶺猿鳴曙煙青焰焰崔班詩臨湘之濱麓之隅西有松寺東岸無松風十里擺不斷竹泉㵼入于僧厨宏梁大棟何足貴山寺難有山泉俱四時唯夏不敢入燭龍安敢停斯須逺公池上種何物碧羅扇底紅鱗魚香閣朝鳴大法鼓天宮夜轉三乘書野花市井裁不著山雞飲啄聲相呼金鑑僧回步步影石盆水濺聫聫珠北臨髙處日正午舉手欲摸黃金烏遙江大船小於葉逺村雜樹齊如蔬潭州城郭在何處東邊一片青模糊今來古往人滿地勞生未了歸丘墟長鄉之門久寂寞五言七字誇規模我吟杜詩清入骨灌頂何必須醍醐白日不照來陽縣皇天厄死飢寒軀明珠大貝採欲盡蚌蛤空滿赤沙湖今我題詩亦無味懷賢覽古城長吁不如興罷過江去已有好月明歸途韋蟾詩石門逈接蒼梧野愁色陰深二妃寡廣殿崔嵬萬壑間長廊詰曲千巖下靜聽林飛念佛鳥細看壁畫馱經馬暖日斜明螮蝀梁濕煙散羃鴛鴦瓦北方部落檀香塑西園文書貝葉寫壤欄迸竹醉好題窄路垂藤困堪把沈裴筆力鬭雄壯宋杜詞源兩風雅他方居士來施齊彼岸上人投結夏悲我未離擾擾徒勸我休學悠悠者何時得與劉遺民同入東林逺公社裴説詩獨立憑危欄髙低落照間寺分一派水僧鎖半房山對面浮生隔垂簾到老聞煙雲與塵土寸步不相關嶽麓寺在山上百餘級乃至今名惠光寺下有李雍麓山寺碑晉杉庵世傳晉太尉陶㑆手植今存者七八株其圍三丈中空空如庵絶頂有道鄉臺昔鄒道鄉謫新州道過潭潭守溫益下逐客之令逆旅之人不敢舍夜渡湘江湘西琳禪師公鄉人以火迎之公贈詩八年之中三往回道人一意金石開非關桑梓有分好自是針水無嫌猜焚香説了四句偈把手直上千尺臺洞庭青草不我隔東吳可歸歸去來浩字志完為右正言因論元符事貶沈傳師詩承明年老輒自論乞得湘守東南奔為問富國富山水青嶂邐迤僧家園含香珥筆皆眷舊謙挹自忘臺省尊不令執簡候亭館直許攜手遊山樊忽驚列岫晚來逼朔雪洗盡煙嵐昏碧波回嶼三山轉丹檻繚郭千艘屯華鑣蹀躞徇步大斾綵錯輝松門樛枝競鷙龍蛇勢折幹不滅風霆䀶相重古殿倚巖腹别引新徑縈雲根目傷平楚虞帝魂情多思逺聊開樽危絃細管逐歌揚畫鼓繡靴隨節翻鏘金七言陵老杜入木八法蟠髙軒嗟余潦倒久不利忍復感激論元元羅隱春日湘中題僧院蟾宮虎穴兩皆休來憑危欄送逺愁多事林鶯遷謾語薄情邊鴈不回頭春融只恐乾坤醉水濶深知世界浮欲共髙僧話心迹野花荒草奈相尤劉長卿自道林寺西入石路至麓山寺過法崇禪師故居詩山僧侯谷口石路掃莓苔深入泉源去遙從樹杪回香隨青靄散鐘過白雲來野雪空齋掩嵐風古殿開桂寒知自發松老問誰栽惆悵湘江上何人更渡杯大溈寺在寧鄉西百五十里唐元和中司馬頭陀開山上封寺在祝融之絶頂早秋已氷夏亦夾衣木之髙大者不過七八尺謂之矮松上有雷池題詠甚多祠廟文帝廟在湘西漢景帝三年置定王廟在長沙東北一里南嶽廟在衡山西三十里南嶽記南宫四面險絶無得至者漢武帝移於霍山隋文帝移於今所韓愈謁衡嶽廟遂宿南嶽寺題門樓詩五嶽登秩皆三公四方環鎮嵩居中火維地荒足妖怪天假神物專其雄噴雲泄霧藏半腹雖有絶頂誰能窮我來正逢秋雨節陰氣晦昧無清風潛心默禱若有應豈非正直能感通須臾靜掃衆峯出仰見突兀撑青空紫蓋連延接天柱石廪騰擲堆祝融森然魄動下馬拜松柏一徑趍靈宮粉墻丹桂動光彩鬼物圖畫填青紅升階傴僂薦脯酒欲以菲薄明其衷廟令老人識神意盱睢偵伺能鞠躬手持杯珓導我擲云此最吉餘難同竄遂蠻荒幸不死衣食才足甘長終侯王將相望久絶神縱欲福難為功夜投佛寺上髙閣星月掩映雲瞳朧猿鳴鐘動不知曙杲杲寒日生於東范至能驂鸞記衡山縣西望嶽山岧嵬半空湘中山既皆岡阜迤邐至嶽山乃獨雄尊特起若衆山遜其髙寒者八日入南嶽半道憩食望雲亭夾路古松三十里至嶽市宿衡嶽寺嶽市者環廟皆市區江浙川廣衆貨之所聚生人所須無不有既憧憧往來則汚穢喧雜盜賊亡命多隱其間或期會約結於此官置巡檢司焉南嶽廟四河各有角樓兩廡士偶仗衛皆取則帝所正殿獨一神座監廟與禮直官日上香火後殿乃與后並處湖南馬氏所植古松滿庭殿後東西北三廊壁畫後宮武洞清所作紹興二十五年火發殿上乃燒後廊壁本不圮官不時覆護漸為風雨所壞帥司亟遣衆工摸拓新廟成用摸本更畫雖不復武氏筆法然位置意象十存七八自宴樂優戲琴博圖書弋釣紉織下至搗練汲井凡宮中四時行樂作務粲然畢陳良工運思苦心有如此者朵殿父畫嬪御上直奩香篝衣之事尤為精研廟吏常鐍後宮門非命官盛服毋得擅入黃陵廟在湘陰北八十里韓愈作廟碑云湘旁有廟曰黃陵自前古立以祠堯之二女舜二妃者庭有古碑乃晉太康九年其額曰虞帝二妃之碑李白詩洞庭西望楚江分水盡天南不見雲日落長沙秋色逺不知何處弔湘君許渾詩九疑望斷幾千載班竹淚䀶今更多三閭大夫廟在湘陰之羅洲名忠潔侯戴叔倫詩沅湘流不盡屈子怨何深日暮秋風起蕭蕭楓樹林賈誼廟在長沙南六里即誼故宅有井上圓下方有局腳石床猶存古迹鄴侯書堂唐李泌當肅宗時崔圓李輔國疾之泌畏禍願隱衡山有詔賜隱士服為治室廬戴氏堂桞宗元記云𢎞農公刺潭三年因東泉為池環之九里丘陵林麓距其涯坻島洲渚交其中其岸之突而出者水縈之苦玦焉池之勝於是為最公曰是非離世樂道者不宜有此卒授賓客之選者譙國戴氏曰簡為堂而令居之堂成而勝益竒望之若連艫縻艦與波上下就之顛倒萬物遼濶眇忽樹之松柏杉櫧被之菱芡芙蕖鬱然而陰粲然而榮凡觀望浮遊之美專於戴氏矣戴氏以文行纍為連率所實禮貢之澤宮而志不願仕與人交取其退遜受諸侯之寵不以自大其離世歟好孔氏書旁及莊文莫不總統以至虛為極得受益之道其樂道歟賢者之舉也必以類當𢎞農之選而專兹地之勝豈易得哉地雖勝得人焉而居之則山若增而髙水若闢而廣堂不待飾而已奐矣戴氏以泉池為宅居以雲物為朋從攄幽發粹日與之娛則行宜益髙文宜益峻以道宜懋交相贊者也既碩其內又揚於時吾懼其離世之志不果矣君子謂𢎞農公刺潭得其政為東池得其勝授之得其人豈非動而時中者歟于戴氏堂也見公之德故不可以不記文昭園在濟川門外興國間何承矩守園吏云昔屬馬家今歸趙氏因聞提壺有感作詩云馬家公子好樓臺鑿破青山碧沼開啼鳥不知人事變數聲猶傍水邊來長沙土風碑張謂銘并序天文長沙一星在軫四星之側上為辰象下為郡縣遁甲所謂沙土之地雲陽之墟可以長往可以隱居者焉其山麓山其水湘水其畜宜鳥獸其穀宜粳稻厥草惟繇杜若荃蘅留荑藒車出焉厥木惟喬椅桐桂柳貞松文梓生焉篠簜嬋娟於原野碔砆昭曜於崖谷昔熊繹始在此地番君因之而後定王國至漢道陵遲董卓狼顧文臺以三湘之衆績著勤王梁朝覆沒侯景虎視僧辨以一州之人勳成定國桓文之舉亦何加焉至於致禮舊君請尸歸葬桓氏之子可謂忠也殞身強冦有死無辱尹氏之女可謂貞也軾蔡鄧之宅足以厚儒風表古初之墳足以敦素行齊魯之俗其何逺哉巨唐八葉元聖六載正言待罪湘東郡臨江湖大抵卑濕修短疵癘未違天常而云家有重膇之人鄉無班白之老談者之過也此邊嶺瘴大抵炎熱寒暑晦明未愆時序而云秋有赫曦之日冬無凛冽之氣傳之者差也巴蛇食象空見于圖書鵩鳥似梟但聞於詞賦則知前古之善惡凡今之毁譽焉可為信哉因徴故老之言用紀仙山之石辭曰舜去黃屋於焉巡遊逢逢玄夷於焉滯留五嶺南指三湘北流鄰聨滄浪邊遙岣嶁湘山之下青青衆草有蕙有蘭在江之島煙雨冥𡨕波瀾浩浩不采不擷棄捐逺道湘山之上青青衆木有栝有松在巖之麓風霜凄凄柯葉沃沃不攘不棟老朽空谷陸有玉璞水有珠胎隋侯云卞卞氏不來湘云莽蒼湘月徘徊貞石紀事層城之隈名宦賈誼漢文帝時謫為長沙王太傅誼在長沙三年有鵩飛入誼舍誼以長沙卑濕自恐壽命不永作賦以自廣謝朓齊武帝時有忝役湘州與吏民别詩禇遂良唐髙宗時以爭立后遷潭州都督楊憑韓愈作荆潭裴垍楊憑倡和序從事有云愈以荆潭酬唱詩者愈既受以卒業因仰而言曰夫和平之音淡薄而愁思之聲要妙歡愈之辭難工而窮苦之言易好也是故文章之作常發於羇旅草野至若王公貴人氣滿志得非性能好之則不暇以為今公開鎮蠻荆統郡惟九常侍楊公領湖南之壤地二千里德刑之政益勤爵祿之報兩崇乃能崇志乎詩書寓辭乎詠歌往復循環有唱斯和搜竒抉怪雕鏤文字與違布里閭憔悴專一之士較其毫釐分寸鏗鏘發金石幽渺感鬼神信所謂材全而能巨者也兩府之從事與部屬之外屬而和之茍在編者咸可觀也宜乎施之樂章紀諸册書從事曰所言是矣告於公書以為荆潭唱和序沈傳師自中舍除刺史楊儀之楊儀之支使歸湖南序今中丞之在朝愈日侍於門下其來鎮兹土也有問湖南之賓客者愈曰知其客可以知其主者宣州也知其主可以信其客者湖南也去年冬奉詔為邑於陽山然後得謁湖南之賓客於幕下於是知前之信之也不失矣及儀之之來也聞其言而見其行則向之所謂羣與博者於吾何先後焉儀之智足以造謀材足以立事忠足以勤上惠足以存下而又侈之以詩書六藝之學充聖人之德音以成其文而輔其質宜乎從事於是府而流聲實於天朝也夫樂道人之善以勤其歸者乃吾之心也謂我為邑長于斯而媚夫人云者不知言者也工乎詩者歌以繫之皇朝冦凖以工侍知張詠知益陽縣唐介湘山野録潭州籍一巨賈皆明珠太守而下悉輕其估以自售時介為倅偶分珠獄發奏方入仁宗謂近臣曰唐介必不肯買果然趙抃為武安節度推官有偽造印者以疑讞之得免死趙宏曽子固送行序云荆民與蠻合為冦潭傍數州被其害天子宰相以潭重鎮守臣不勝任為改用人又不勝復改之守至上書乞益兵詔與撫兵三百天水趙君希道實護以往希道雅與豫接間過豫道潭之事豫曰潭山川甲兵如何食幾何賊衆寡強弱如何豫不能知能知者書書之載若潭之事多或合數道之兵以數萬卒絶山谷而進其勢非不衆且健也然而卒殱焉者多矣或單車獨行寇可以無事龔遂張綱祝良之類是也義信不足以致之雖合數道之兵以卒數萬卒殱焉適重冦耳致平耶楊旻裴行立之類是也則兵不能致平致平者在太守身耳明也前之守也果能此天子宰相烏用易之必易之為前之守者不能此也今往者復曰請益兵何其與書之云云者異耶豫憂潭民之重困也冦之益張也往時潭吏與旁近郡靳力勝賊者暴骸者戮降者有之今之往者將特不為是而已耶抑猶不免乎為是也天子宰相任之之意其然耶潭守近侍臣使撫覘潭者即吏御史博士相望為我諗其賢者曰今之言古書往往曰迃然書之事乃已試者也師已試而施諸治與時人之自用孰為得失耶愚言儻可以平潭之患今雖細然大中祥符之間南方之憂常劇矣夫豈階於大哉為近臣郎吏御史博士者獨得而不思也耶希道固喜事者因其行遂次第其語以送之楊時張敬夫歸鴻閣記云瀏陽實潭之屬邑公嘗辱為之宰嵗飢發廩以振民而部使者以催科不給罪公公之德於民多矣劉珙知潭州一新嶽麓書院張孝祥以集撰知周必大以少保判朱熹以祕撰知人物屈平字原楚詞云屈原既放遊於江潭行吟澤畔顔色憔悴形容枯稿漁父見而問之曰子非三閭大夫歟何故至於斯屈原曰世人皆濁我獨清衆人皆醉我獨醒是以見放漁父曰聖人不凝滯於物而能與世推移舉世皆濁何不滑其泥而揚其波衆人皆醉何不餔其糟而啜其醨何故深思髙舉自令放為屈原曰吾聞新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎寧赴湘流葬於江魚腹中安能以浩浩之白蒙世俗之塵埃乎漁父莞爾而笑鼓枻而去乃歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足遂去不復與言賈誼弔屈原賦恭承嘉惠兮俟罪長沙仄聞屈原兮自湛汨羅造託湘流兮敬弔先生遭世罔極兮乃殞厥身烏呼哀哉兮逢時不祥鸞鳯伏竄兮鴟梟翺翔闒茸尊顯兮讒諛得志賢聖逆曵兮方正倒植謂隨夷溷兮謂跖蹻廉莫邪為鈍兮銘刀為銛于嗟默默生之無故兮幹棄周鼎寶康瓠兮騰駕罷牛驂蹇驢兮驥垂兩耳服鹽車兮章甫薦屨漸不可久兮嗟若先生獨罹此咎兮誶曰已矣國其莫吾知兮子獨抑鬱其誰語鳯飄飄其髙逝兮夫固自引而逺去襲九淵之神龍兮沕淵潛以自珍偭梟獺以隱處兮夫豈從蝦與蛭蚓所貴聖之神德兮逺濁世以自藏使麒麟可繫而羈兮豈云異夫犬羊般紛紛其離此郵兮亦夫子之故也歷九州而相其君兮何必懷此都也鳯凰翔於千仞兮覽德輝而下之見細德之險微兮遙矰擊而去之彼尋常之汚瀆兮豈容吞舟之魚橫江湖之鱣鯨兮固將制於螻蟻朱元晦楚詞序原之為人其志行雖或過於中庸而不可以為法然皆出於忠君愛國之誠心原之為書其辭旨雖或流於跌宕怪神怨懟激發而不可以為訓然皆生於繾綣惻怛不能自已之至意雖其不知學於北方以求周公仲尼之道而獨馳騁於變風變雅之末流以故醇儒莊士或羞稱之然使世之放臣屏子怨妻去婦抆淚謳吟於下而所天者幸而聽之則於彼此之間天理民彛之善豈不足以交有所發而增夫三綱五常之重此豫所以每有味於其言而不敢直以詞人之賦視之也蔣琬湘鄉人為廣都長諸葛亮常曰琬社稷之器非百里才歐陽詢臨湘人為太子率更令子通夏官尚書父子俱善書號大小歐陽體皇朝廖倚歐陽永叔送廖倚歸衡山序元氣之融結為山川山川之秀麗稱衡湘其蒸為雲霓其生為把梓人居其間得之為俊傑秀才生於衡山之陽而秀麗之精英者得之尤多故其文則雲霓其材則把梓始以進士舉於有司不中遂遊公卿間所至皆虛館設席爭以禮下之今永興太原公雅識沉正器君尤深其初鎮秦川也請君與俱行遂趍函關以覽秦都則西方士君子得以承望乎風采矣凡居秦幾嵗而東將過京師以歸豫嘗以上計吏客中都識君於文逵辱之以益友當君之西也獲餞於國門及夫斯來又相見於洛道語故舊數日乃行夫山川固能産異物而不能畜之者誠有利其用者爾今君之行也余疑夫不能久蓄於衡山之阿也胡安國建人寓居南嶽之下著春秋傳有子曰寅曰宏曰寧胡寅嘗著讀史管見號致堂先生胡宏嘗見楊中立於京師又從侯師聖於荆門居五峯之下餘二十年張浚字德逺廣漢人寓世長沙封魏公號紫巖朱元晦拜墓下有詩云衡山何巍巍湘流方湯湯我公獨何往劒履在此堂念昔中興初孽竪倒冠裳公時首建議自此扶三綱精忠貫宸極孤墳磨穹蒼元戎二十萬一旦先啓行西征奠梁益南轅撫江湘上心既豫附國威亦張皇縞素哭新宮哀聲連萬方強敵聞裭魄經營久倣徨玉帛驟往來士馬且伏藏公謀適不用拱手遷南荒白首復來歸髮短丹心長拳拳冀感格汲汲勤修攘天命竟難諶人事亦靡常悠然謝台鼎騎龍白雲鄉坐令此空山名與日月彰張栻浚之子號南軒先生朱元晦嘗為之贊曰廣仁義之端至於可以彌六合謹義利之辨至於可以折秋毫拳拳乎其致主之勤汲汲乎其幹父之勞仡仡乎其信道之篤卓卓乎其立心之髙知之者識其春風沂水之樂不知者以為湖海一世之豪彼其揚休山立之姿既與其不可傳者死矣觀於此者尚有以卜其見伊呂而失蕭曹耶題詠夜醉長沙酒唐杜甫詩云云曉行湘水春岸花飛送客檣燕語留人風壤帶三苗杜甫詩雲山兼五嶺云云秋晚嶽增翠杜甫詩曰云云風髙湖捲波衡霍生春草杜甫詩云云潭湘共海浮兩邊楓作岸張九齡詩征鞍窮郢路歸棹入湘流云云𢾗處橘為洲楚岫干峰碧韋昭寄杜甫詩云云湘潭一葉黃洞庭值秋晚韓愈送李正字歸湖南詩長沙入楚深云云人隨鴻鴈少江共蒹葭逺雲水洞庭寬張祐送韋整尉長沙詩逺逺長沙去憐君利一官風帆彭蠡疾云云木客提蔬束江烏接飯凡莫言卑濕地未必乏新歡水溢洞庭湖賈至送王員外赴長沙詩攜手登臨處巴陵天一隅春生雲夢澤云云共嘆虞翻枉同悲阮籍途長沙舊卑濕今占不應殊雲日楚天暮賈至送長沙韋明府之任詩秋入長沙縣蕭條旅宦心煙波連桂水官舍映楓林云云沙汀白露深遙知訟庭裏佳政在鳴琴江煙作夕嵐戎昱送張秀才之長沙詩君向長沙去長沙僕舊諳雖云桂嶺北終是洞庭南山靄生朝雨云云松醪能醉客慎勿滯湘潭潭府邑中甚淳古杜甫詩云云便領吳王第一州郭獬送吳中復詩初登西漢文章府云云繞郭白雲衡嶽近滿帆明月洞庭秋四六出綸天闕作屏星沙一札由中三湘謀帥出綸鳯掖作牧熊湘長沙巨鎮南楚上流眷長沙之巨屏居南紀之上遊天開熊楚之封星炯壽沙之次惟翼軫牛女之墟接猺獠蛋黎之俗全楚號古要區長沙為今巨屏控百粵以分封包九疑而奠壤洞有羈縻之獠俗野無鬬鬩之猺民彬彬禮樂之鄉濟濟文物之盛惟荆楚之奧區控江湖之孔道陸梁屢嘯於猩鼯搜獵久勤於貔虎眷此鬻熊之壤鄰於蠻獠之居壯三營之甲胄鏘兩學之衣冠方休兵爭買於犢牛而小醜肆為於虺蜴嶽麓置書院而復建學官鴻儒接迹武安總州兵而增屯禁旅虎士奮威比植纛建牙於此地多運籌秉軸之大臣洞庭青草之波澄無非惠澤嶽麓道林之境勝盡入詩篇長沙千里之平寄隆嶽牧洞庭九州之大責重藩垣控重湖而亘九疑郊圻甚廣餉三營而給兩學賦入頗難逺則邊鄙守禦之計未撒近而軍旅調發之費不資泰階騰兩兩之輝旁連翼軫維石鞏巖巖之勢特鎮湖湘五營將卒萃犀角以雲屯兩學儒生紛苧袍而雪委學兼嶽麓修明逺自於前賢壤帶洞庭鎮拊近煩於元老方輿勝覽卷二十三
