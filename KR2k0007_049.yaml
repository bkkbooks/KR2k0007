body:
  text: 方輿勝覽卷四十九宋祝穆撰和州厯陽烏江含山建置沿革禹貢揚州之域于天文直南斗魁下春秋戰國属楚秦為厯陽縣𨽻九江郡漢属淮南國後属九江郡而厯陽為治所後漢揚州移理于此三國呉為重鎮晉立厯陽郡宋為南豫州治厯陽後齊立和州隋唐或為厯陽郡或為和州陽皇朝因之嘗兼管内安撫今領縣三治厯事要郡名厯陽風俗取協和之義劉禹錫㕔壁記云梁之亡也北齊圗霸功擁正陽侯淵明以歸王僧辨来迎㑹于兹地二國協和故以州名男夫尚墾闢同上云云無即山近監之逸女工尚堅全無文章交錯之竒無㳺人異物以遷其志同上形勝内險之地郭功父含山縣記方用兵時而含山為云云當江淮水陸之衝故鋭師宿將嘗屯營于此實為要津李白天門山銘梁山博望關扃楚濵夾據洪流云云城髙而堅劉禹錫記云云亞父所營常留重兵劉禹錫曰自孫權距六代云云上岸擊賊呉欲擊楚諸將曰云云洗足上船呉魏相持扵此晏類要南岸吴築城北岸魏置柵云云月餘山川梅山在厯陽南五十里昔曺操指山上梅林軍士渇止盖此山也王安上詩將軍馬上設良謀遙望青山指梅樹梁山郡縣志在厯陽南七十里俯臨厯水侯景之亂梁王僧辨軍次蕪湖與景將侯子鑒戰于丨丨大破之江東有博望山属姑孰二山隔江相對如門南朝謂之天門山兩岸山頂各有城並王元謨所築自六代皆于此屯兵扞禦厯陽山在厯陽縣西北四十里吴志云丨丨丨石文理成字八公山在郡城北耒山之左世説有八仙人圍棊㑹飲于此故名張祁謂仙風對八公盖一郡之勝槩雞籠山在厯陽西北四十里道家第四十福地淮南子云麻湖初䧟之時有一老母提雞籠以登此山因化為石今有石狀如雞籠故名劉禹錫詩雞籠為石顆龜眼入泥坑隂陵山在烏江西北四十五里即項羽迷失道處四潰山在烏江縣西北三十里直隂陵山項羽既敗于垓下走至東城所従惟二十八騎漢兵追者千餘羽乃引騎依此山為圎陣濡須山在含山西南七十五里與無為軍七寳山對峙中為石梁鑿石通水山川險阻最為控扼之雄吴魏必争之地陸士衡論孫權聞曹公来築此城塢拒之狀如偃月詳見無為軍華陽山在含山縣北十八里本名蘭陵山下有華陽亭因名山有洞曰華陽至和初王介甫逰焉洞有二前洞逰者甚衆後洞則介甫所逰寺僧言山嶺有天梯洞石湖關紹興辛酉烏珠再犯境張浚以兵五千守丨丨丨敵遂遁去大江自岷山西南流過厯陽烏江三縣界劉禹錫詩海潮随月丨丨水應春生柵江在厯陽縣西南百五十里與無為軍分界丨丨口古濡湏口也厯湖在厯陽縣西三十里今謂之麻湖盖訛為厯字淮南子云厯陽之郡一夕為湖劉禹錫詩憶昔泉源變斯湏地軸傾烏江浦在烏江縣東四里即亭長艤舟待項王處當利浦在州城東十二里晉時王濬過三山王渾遣人邀之濬曰風利不得泊遂先入石頭故名横江浦建安初揚州刺史劉繇遣將樊能于麋屯横江孫策破之對江南之采石往来濟渡處􅷇溪在厯陽西一里其源出金泉寺之山唐李聪詩水通滴瀝落氷崖盖其流雖小而泠然也王安上詩泠泠一帯清溪水逺逺来穿厯陽市㳙㳙出自碧湖中流入楚江煙霧裏井泉沸井圖經在郡西百步郭璞筮云厯陽井當沸劉禹錫詩丨丨今無湧烏江舊有名堂亭惠政堂在郡治堂扁乃孝宗居青宫時親洒宸翰賜守臣胡昉三老堂元祐孫賁建三老即劉摯傅堯俞范純仁也胡彦國詩厯陽賓主昔多賢三老風流二十年獬豸冠中曽補衮鳳凰池上迭擎天雲䕃軒劉莘老詩古木無年嵗新亭記舊樓衣錦亭劉莘老詩隂隂佳木與城齊襟袖迎風弄晚曛凌雲亭劉莘老詩軒宇慿虚出半天忽驚身寄碧雲端水心亭在三老堂前唐張籍詩送客特過山口堰看花多向丨丨丨祠廟西楚霸王廟在烏江縣東南二里號靈惠廟紹興辛巳金主欲渡江乞杯珓不從大怒欲焚廟俄大蛇遶出屋梁殿後林木中鼔噪發聲若數千兵金主大驚左右皆駭散杜牧詩勝負兵家事不期包羞忍辱是男兒江東子弟多才俊卷土重來未可知李山甫詩為虜為王盡偶然有何羞見漢江船平分天下猶嫌少可要行人贈紙錢王介甫詩百戰疲勞壯士哀中原一敗勢難逥江東子弟今雖在肯與君王卷土來胡曽詩争帝圗王勢已傾八千兵散楚歌聲烏江不是無船渡恥向東吳再起兵許表詩千載興亡莫浪愁漢家功業亦荒丘空餘原上虞姬草舞盡春風未肯休龍洞山廟游文清九言禱雨辭并序慶元庚申夏不雨燥風挾日播植蕉黄九言涖邑全椒徧禱莫孚或言烏江有龍洞山山出青蛇神龍之裔人多崇之因民之憂越境躬造自湯泉入山未百步有蛇而藍者遒絶中道從者喜曰龍也凡禱雨類索于山幸遽得之勿失余疑焉夫山川吐雲霈為潤澤盖天地隂陽之氣也人一氣相為流通精神懇惻乃有感動龍靈物能乘隂陽變化故言興雨必求之若可捕也龍其何神挹洞水足矣捕蛇非禮也既至酌奠甫畢忽顧石楯之上翠鱗驤首盤不盈握目光警耀若竚而竢衆亦驚怪奉以潔器雲隂䕶行空濛絲散用彰厥應明日飄潤草木又明日簷溜璁琤四民喜驩炷香再拜餞龍之日遂大傾注溪澗充盈豐登有兆嘗觀天下至毒螫莫過虺蟲江南有號青竹者脩細如筯螫人若針芒死者十九幸而一活肢膚已殘今蛇無異青竹唯弗傷人以手掬之夷猶不懼復能吸酒盖形雖同而善惡逺甚兹為龍裔歟古今以来君子小人狀貌固同唯交際而情遂見蛇亦然哉蛇本螫類而慈祥若此是尤可敬異也已湯泉主僧道海曰蛇室洞傍弗捜弗獲今先五里而見其相迎也又知世雖我捐而神不余斁也既感龍君之恵廼為辭曰山㞹峨兮岩幽望君居兮大江流斂變化兮嵌竇起霈澤兮九州烏燄燄兮暘空鼓坎坎兮阿丘儼裔孫兮戾止吸巵酒兮嬉㳺謂余不来兮盍䖍脩瀐泉瀦兮石冽老木毅兮枝樛御雲氣兮顯晦靈夭矯兮千秋古跡厯陽城劉禹錫厯陽書事一夕為湖地千年列郡名霸王迷路處亞父所封成漢置東南尉梁分肘腋兵本吴風俗剽兼楚語音傖沸井今無湧烏江舊有名土臺遊柱史石室隠彭鏗老君適椘有臺存焉彭祖石室在含山縣曹操祠猶在須濡塢未平名宦范増封厯陽侯張萬福為和州刺史徳宗謂江淮草木亦知威名劉禹錫為刺史白居易答劉和州詩換印雖頻㑹未通厯陽湖上又秋風不教才展休明代為罰詩争造化功我亦思歸田舍下君因厭卧郡齋中好相収拾為閒伴年齒官稱約畧同皇朝范純仁為成都轉運坐失察僚佐燕逰左遷知和州劉摰為守傅堯俞以論濮邸出知和州鄭居中為守胡宗愈為守呉居厚太守為宰執者凡六人㳺酢知和州因家焉人物紀瞻晉朝自丹陽徙厯陽以方直知名何蕃和州人朱泚反諸生將従亂蕃正色叱之故六館之士無受汙者韓愈為傳張籍烏江人與韓愈㳺有宅在通淮門裏報恩寺是也有讀書處在縣西五里紫極觀後桃花塢皇朝彭思永明道程先生之母舅也明道年方十二三思永異之許妻以女其鑒裁賢于人逺矣魏矼厯陽人為監察御史㑹金入冦矼勸髙宗親征罷講和二字忤秦檜退寓常山僧舍十四年沈文通皇祐魁多士張孝祥紹興魁多士題詠一夕為湖地劉禹錫詩云云當利江頭㝡僻州傅堯俞寄王㣲之詩云云懐人惟是數登樓今年送君守厯陽蘇子瞻送吕希道知和州詩去年送君守觧梁云云觀君崛鬰負竒表便合劔佩趨明光胡為小郡屡奔走征鞍未觧風帆張四六疏恩北闕分壘兩淮捍禦邊頭控持江面既江山登覽之稀亦井邑蕭滌之甚居四達之衝此為孔道有兩山之峙兹乃要津當吴魏戰争之境實異偏州居江淮来往之衝是為孔道連属邑須濡之城塢猶存拱陪京采石之波濤不湧堂標三老既推先達之曽来郡有䨇魁可謂異才之間出安慶府懐寧望江桐城太湖宿松建置沿革禹貢揚州之域為斗分野春秋時皖國匽姓咎繇之後亦為舒國桐國之地皆為楚所㓕戰國時属楚秦属九江郡二漢属廬江郡魏為重鎮梁置豫州陳曰晉州隋曰熙州後廢為同安郡唐初為東安州改為舒州皇朝因之政和陞徳慶軍紹興以康州陞徳慶府改本軍為安慶軍乂以寧宗潜邸陞安慶府今領縣五治懐寧事要郡名龍舒郡縣志漢為廬江統縣十二有皖有潜有舒有丨丨又云舒冇五名舒丨丨庸舒舒鳩舒城其實一也又曰羣舒按合肥志今舒城縣属廬州引春秋注且曰廬江南有舒城舒城西南有丨丨當考皖城見上桐城同安風俗人性躁勁隋地理志云云風氣果决風土清美圗經序率性真直寰宇記云云賤商務農粳稻之饒圗經形勝其山深秀而頴厚郡志云云其川迤邐而蕩平有魚鼈麥禾之饒九江之北潜山賦丨丨丨丨三楚之南介于夀春合肥之間郡志舒附楚而廹于吴云云淮服之屛蔽朱綽壁記云云江介之㑹衝江表得之亦以患中國徐鍇潜山詩序云中國得之可以制江表云云故孫權克皖而曹魏不寧世宗平淮而李氏窮蹙山川潜山一名潜嶽在懐寧西北二十里魏左慈居此山有煉丹房皖山在懐寧西十里皖伯始封之地漢地理志與潜山天柱峯相連三峯鼎峙疊嶂重巒拒雲槩日登陟無由東有激水冬夏懸流狀如瀑布下有九井有一石牀可容百人其井莫知深淺若出旱則殺一犬投其中即䧏雲雨犬亦流龍眠山在桐城西北六十里又属廬之舒城黄魯直詩諸山何處是龍眠舊日龍眠今不眠聞道已随雲物去不應只雨一方田石鏡山在懐寧北其西有石裂皎然望之如玉鑑一名玉照黄魯直詩仙人持玉照留在潜峯西三祖山在郡西有唐三祖禪師志公塔主簿山在玉鏡山之東昔唐相畢諴讀書于此司空山在太湖東北百三十里李白避地司空原言懐詩南風昔不競豪聖思經綸我則異于是光皖水濵卜築司空原比將天柱隣雪霽萬里月雲開九江春俟乎泰階平然後託㣲身傾家事金鼎年貌可長新所願得此道終然保清真㺯景奔日馭攀星戲河津一随王喬去長年玉天賔投子山劉興言詩三雄分漢鼎郊野戰羣龍將軍偶敗此投子空山中周美成詩緬懐魯將軍兵敗携部曲来投衲子衣觧甲飯戎菽誰令名此山異代有餘辱浮渡山在桐城東九十里上有三十五巖其可居可遊者三十六西南有獨山直上千仞大江環遶望之若浮夷堅雜志丨丨丨名刹也巖名大通者居半山間視諸巖最勝泉瀑千仭真竒觀也西硤山在桐城縣北四十七里吕䝉甘寧伐皖張遼救之至硤石聞城已㧞乃退築丨丨丨天柱峯在皖山髙三千七百丈周二百五十里山東有瀑布漢武帝嘗登此山即司元洞府九天司命真君所主也獨孤及詩早嵗慕五嶽嘗為塵機礙孰知丨丨丨今與郡齋對漢皇南遊日望秩此昭配法駕到谷口禮容振荒外燔柴百神趨執玉萬方㑹如今封禪壇唯見雲雨晦大江在懐寧南百八十里中流與江州池州分界南湖在郡南舊名南園三面依城古木參天湖浸甚廣潛水出潛山皖水自霍山縣流入經懐寧縣北二里又東南流三百四十里入大江呉塘陂在懐寧南二十里皖水所注曹公遣朱元光屯皖大開稻田吕䝉上言皖地肥美若一收熟彼衆必増宜早除之乃征皖破之此塘即朱元光所開也王介甫封舒國詩開國桐鄉已白頭國人誰復記前遊故情但有吳塘水轉入東江向我流堂閣静山堂在郡圃以王介甫詩命名詩云皖城終日静如山府掾應從到日閒一水碧羅裁繚繞萬峯蒼翠刻孱顔舊遊筆墨苔今老浪走塵沙髩已斑攬轡羨君橋北路春風枝上鳥關關英輔齋在太平寺東乃王禹玉讀書之地公自舒發解至登台輔守朱綽易此名天柱閣在郡圃郭功父詩羣山奔來一峯起千丈芙蓉碧霄裏老松自作孤鳳吟潮浪時生三井水峯閣在倅㕔乃王介甫通判日讀書之地擢秀閣在彰法寺乃陳瑩中讀書之所自此登第黄魯直名而書之亭館橋公亭在懐寧北即漢末橋公故居今廢為雙溪寺涪翁亭在山谷寺石牛相對西溪館在城西一里刺史吕渭所創帶山夾沼為一州勝處寺觀山谷寺在懐寧西二十里梁大同二年以山谷名寺東北隅有三祖璨大師塔王介甫留題三祖丨丨丨石壁云水泠泠而北出山靡靡以旁圍欲窮源而不得竟悵望以空歸西北有石牛洞其洞如牛唐李翺諸賢題詠甚多李伯時畫黄魯直坐石牛上魯直因自號山谷道人仍題詩石上云鬱鬱窈窈天官宅諸峯排霄帝不隔六時謁帝開關鑰我身金華牧羊客羊眡野草我世間髙真衆靈思我還石盆之中有甘露青牛駕我山谷路又書小石橋下有詩云司命無心播物祖師有記傳衣白雲横而不渡髙鳥倦而猶飛神霄宫在桐城縣西南五里本為投子名寺政和間改為丨丨萬夀宫宦周大夫皖伯始封于此朱邑字仲卿少時為桐鄉嗇夫㢘平不苛所部吏民愛敬焉入為大司農後病且死曰我故以桐鄉吏其民必愛我死必葬桐鄉縣人為立生祠今有墓在縣西吕蒙初魏遣朱元光大田皖城蒙建議攻皖拔之拜蒙廬江太守又見吴塘陂注陶侃領摐陽令有能名獨孤及權載之集其理舒州属嵗飢旱而舒人不知凶年發廪賑貸李翺為刺史麯令為望江令禱雨即應百姓為之立祠後歿因葬焉白居易詩我聞望江縣丨丨撫惸嫠攀轅不得去留葬此江湄皇朝樊若水張編云若水江南人言事不報遂謀北歸先釣魚采石以小舫載絲繩以度江之廣狭開寳中遂詣闕自言有策可取江南令學士院試賜及第授舒州團練推官如若水之策造大艦及黄龍船数千艘將浮江以濟也王安石以殿中丞通判舒州及為相又封舒國黄庭堅知州召為儀部貟外郎㳺酢為太守人物文翁舒人為蜀郡守周瑜字公瑾廬江舒人孫策取荆州以為中䕶軍攻皖㧞之得喬公兩女策納大喬瑜納小喬後破曹公于赤壁李白安祿山反轉仄宿松匡廬間皇朝潘閬劉貢父詩話閬字逍遥為詩有唐人風因得罪匿舒州潜山寺為行者題詩鐘樓云頑童趂暖貪春睡忘却登樓打曉鐘孫僅見之曰此逍遥也今寺僧呼之潘已亾去李公麟黄魯直有送李伯時歸舒州龍眠詩則當為舒人又見廬州名賢徐鉉以直道忤世貶舒三年徐俯字師川山谷之甥也崇觀間僑居同安題詠古國羣舒地唐司空水部詩云云當前桐柏關溪長二水流徐師川詩有云久留舒子國慣作北門逰山逺三峯出云云白水千丈瀑徐師川詩云云吴塘千頃波月黒虎䕫藩容齋随茟黄魯直宿舒州太湖觀音院詩汲烹寒泉窟伐燭古松根相戒莫得出云云按杜甫課伐木詩序云有虎必昏黒摚突䕫人屋壁所謂䕫人者述其土俗耳本無抵觸之義盖誤用之松竹二喬宅黄魯直築室皖公城木末置曲欄嵗晚對烟雨人家橘柚門獨秀司命峯衆邱遜髙寒云云雪雲三祖山龍舒太守人中傑唐人殷文圭詩云云風韻堂中心似月二十七峯常對門徐師川詩云云當時我自愛桐鄉王介甫封舒國公詩桐鄉山逺復川長紫翆連城碧滿隍今日桐鄉誰愛我云云行問嗇夫多不記王介甫到舒州答平甫詩云夜别江船曉觧驂秋成氣象亦潭潭山從樹外青争出水向沙邊綠半涵云云坐論公瑾少能談祗愁地僻無賔客舊學従誰得指南外邑官閒應得看潜峰羅隠送宿松縣傅堅詩云離江漠漠樹重重東過長淮到宿松縣好也知臨皖水云云春生綠野吳歌怨雲霽平郊楚酒濃留取餘波待張翰明年歸棹一従容四六疏榮鳳闕出鎮龍舒古稱佳郡今號潜藩市邑頗繁里閭不擾雖號次邊實為重鎮矧羣舒之劇郡控九江之奥區唯此邦土之封昔者官逰之壤近居潜皖之旁宻接光黄之境皖伯古城立咎繇之祀潜峯勝地經漢武之㳺北連大霍乃司命之别宫南眺康廬實衆真之靈洞一麾出守寵分刺史之符八柱承天實表元臣之象考于方志舊為椘國之附庸驗彼民風尚有漢臣之遺愛符分銅虎皆循吏之遺風洞紀石牛有前賢之陳迹久陶聖化非復魯僖之所懲積習仁風乃嘗朱邑之見愛濵江為郡古稱沙脚之卑建議築城今號石頭之固真仙所㳺司命有集靈之宇禪林特盛祖師開説法之堂蘄州蘄春廣濟蘄水羅田黄梅建置沿革禹貢揚州之域楚地翼軫之分野春秋戰國並属楚西漢為蘄春縣𨽻江夏郡三國時属魏吴為蘄春郡晉以為縣属弋陽郡東晉改蘄春為蘄陽縣避宣太后諱也北齊置齊昌郡及羅州後周改為蘄州隋廢為郡唐復為蘄州皇朝因之今領縣五治蘄春事要郡名蘄陽曹公與喬㽔戰于丨水之丨蘄春風俗淳龎近古李常廣濟寺記其人丨丨而丨丨秀民樂扵為儒同上云云而不輕釋其業彬彬好學有鄒魯道風形勝南距江王之義蘄州舊治記云云北接光蔡西連黄岡東峙潜皖左舒右黄張子師廣教院記蘄春古郡云云佳山秀水環絡千里有鼔吹白雲之勝濵帶江淮唐大詔令李勣制蘄春之地云云居江湖絶處余章三泉堂記云云占淮壖之上腴關詠神光觀記蘄西故封浠水故邑溪山重複云云居三楚之中史記楚文王徙都于郢江陵為西楚云云土産蘄簟韓愈謝鄭羣贈簟詩蘄州笛竹天下知鄭君所寳尤瑰竒携来當晝不得卧一府争看黄琉璃體堅色浄义藏節滿眼凝滑無瑕疵法曹貧賤衆所易腰腹空大何能為自従五月困暑濕如坐深甑遭蒸炊手磨袖拂心語口慢膚多汙真相宜日暮歸来獨惆悵有賣直欲傾家貲誰謂故人知我意卷送八尺含風漪呼奴掃地鋪未了光彩照耀驚童兒青蠅側翅蚤蝨避肅肅疑有清風吹側身酣寢百疾愈却顛天日常炎曦明珠青玉不足報贈子相好無時衰白居易寄簟與元九詩笛竹出蘄春霜刀劈翆筠織成䨇入簟寄與獨眠人卷作筒中信舒為席上珍滑如鋪薤葉冷似卧龍鱗清潤宜乗露鮮華不受塵通州炎瘴地此物最闗身蘄笛劉禹錫武昌老人説笛歌武昌老人七十餘手把庾令相聞書自言年少學吹笛早事曹王曽賞激往年征鎮戍蘄州楚山蕭蕭笛竹秋當時買林恣捜索典却身上烏貂裘古苔蒼蒼封老節石上孤生飽風雪商聲五音随指發水中龍應行雲絶曽將黄鶴樓上吹一聲占盡秋江月如今老去興猶遲音韻髙低耳不知氣力已無心尚在時時一曲夢中吹山川蔡山出大龜尚書九江納錫大龜即此山也茶山在蘄水縣北每年造貢茶之所白雲山在城北四里盤龍山在城南十五里鳳凰山在城北羅真人飛昇于此静明山在城東三十里三角山在州北七十里有龍潭四祖山在黄梅縣北二十五里即大醫禪師道塲五祖山在黄梅東北二十五里即大滿禪師道塲烏牙山在黄梅東北五十里有靈峯院白居易張商英碑記存焉綀巖在羅田縣西三十里有瀑泉大江上接黄州過伍州巴河蘭溪蘄河下流入舒州宿松界蘄河源出大浮山謂之蘄陽口巴河源出板石山浠水源出于雲山蘭溪在蘄水縣産竹之地井泉三泉余章丨丨記米芾書鳳山之隂蘭溪之陽有泉出石罅為蘭溪其在寺庭之除為陸羽烹茶之泉其在鳳山之隂為逸少澤茟之井蘭溪于茶之品第三茶之所㝡宜王陸二水皆蘭溪一源耳在蘄水縣西蘇子瞻云㳺清泉寺洗茟泉水極甘王元之題陸羽泉詩甃石封苔百尺深試嘗茶味少知音惟餘夜半泉中月留得先生一片心亭閣四見亭在州北塔後范忠宣名涵暉閣在郡治子城之上蘇子瞻在黄客有道其勝而誦所賦霽容天在水春態栁藏橋之句先生欣然謂以態易色字此葢賦丨丨丨也自是丨丨之名益著郭功父寄題呈太守章子平詩天垂星斗數尋近地卷雲山千里来名宦貟半千為刺史皇朝王元之元之自黄州移蘄州聞啼鳥問其名或曰此名蘄州鬼元之大惡之未㡬果卒于蘄蘇子瞻作禽言詩云使君向蘄州更唱蘄州鬼我不識使君寧知使君死人生作鬼㑹不免使君已老知何晚范純仁為殿中侍御史時議濮王典禮出通判安州徙知蘄州人物吴公瑛瑛比部安道之子壯年以母憂服除遂致仕歸隠温公贈以詩題詠下車書奏龔黄課白居易寄蘄州李使君詩云云動茟時傳鮑謝風江郡謳吟夸杜母洛城歡㑹憶車公笛愁春盡梅花裏簟冷秋生薤葉中不道蘄州歌酒少使君難稱與誰同春風門外有紅旗白居易送蘄春李十九使君赴郡詩可憐官職好文詞五十専城未是遲曉日鏡前無白髪云云郡中何處堪携酒席上誰人觧和詩惟共交親開口笑知君不及洛陽時松花滿椀試新茶劉禹錫送李蘄州詩薤葉照人呈夏簟云云四六疏榮禁掖擢守邉城蘄陽古壘淮右極邊内則牧民外而固圉當嚴兵備庸折邊鋒雖仰官爐之羨不勝偽冶之多既郡計之空窮亦兵威之單弱粤由淮南行鐡以来以至蘄口置監而後邊塵滿目每懐蹂􅏳之餘郡政勞心尤切癢疴之念土産無竒簟特稱于薤葉泉源有品茶可試于松花處江湖之絶處據地則偏當淮甸之極邊恃人而險堅甲利兵抗方張之兵勢深溝髙壘得固守之民心方輿勝覽卷四十九
