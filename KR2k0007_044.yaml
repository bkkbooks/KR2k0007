body:
  text: 方輿勝覽卷四十四宋祝穆撰淮東路揚州江都泰興建置沿革禹貢淮海惟揚州唐虞淮海之間皆州域也于天文為斗牛之分星紀之次春秋時屬吳故吳城𨝍溝通江淮後屬越越後屬楚秦屬九江郡漢為荆王國又為吳王國景帝更江都國武帝更廣陵國東漢為廣陵郡三國初屬魏後屬楚西晉屬廣陵郡宋改為南兖州北齊改東廣州後周為吳州隋唐為揚州皇朝升莭度安撫今統郡九領縣二治江都本路安撫制置置司事要郡名廣陵江都淮海維揚蕪城𨝍城僧皎然詩别渚望𨝍城風俗江南之氣躁徑元和郡志云云故曰揚州土俗輕揚孔六帖李濟翁謂其云云故名揚州朴而不爭廣陵志其俗云云有學而好文富庶甲天下通鑑唐昭宗曰揚州云云故稱揚一益二俗喜商賈唐書李襲譽傳云揚州江湖大都會云云不事農遷徙貿易皆出揚州沈存中云自淮南之西大江之東南至五嶺蜀漢十一路百州丨丨丨丨之人往還丨丨丨丨之下舟車日夜灌輸京師者居天下之七容齋隨筆唐鹽鐵轉運使揚州判官多至數十人故稱揚一益二杜牧之有看春風十里珠簾捲之句張祐詩有十里長街市井連月明樓上神仙本朝承平百七十年尚不能及唐之仆一今日真可酸鼻也形勝據淮距海秦少遊揚州集序北丨丨東南距海江湖之間盡有其地王觀揚州賦南于距海之滸北壓乎長淮之流枕江臂淮王觀揚州賦曰揚州古都會也云云與益部號為天下望故有唐以來節鎮首稱揚益也重江復關文選鮑昭登廣陵城作蕪城賦云云之險四會五達之衢土甚平曠南齊地理志云云刺史每以秋月出海陵觀濤江左大鎮通典云云莫過荆揚宋書割荆江置郢州議江左以來以揚州為根本東南佳麗廣陵志序長淮之區錦亘數百里揚其都會也迷樓九曲鳯池螢苑之名甲於前代而十里珠簾二十四橋風月之景尤為丨丨以至春風蕩城郭滿耳沸笙歌與夫重城向夕絳紗萬户珠翠填咽於街陌者又天下所無也土産芍藥王觀序云有三十二種蘇子瞻志林揚州丨丨為天下冠蔡繁卿為守始作萬花會用花十餘萬枝既殘諸園又吏因緣為姦久亦必為民患也會當有罷之者錢惟演為留守始置驛貢洛花識者鄙之此宫妾愛君之意也孔武仲丨丨譜云州宅舊有丨丨廳在都廳後聚一州絶品於其中今鎮淮堂是也山川浮山去地才髙三尺二寸其狀似鐵不生草木大銅山在江都縣西北七十二里漢書吳王濞即此山鑄錢其處也崑崙山一名廣陵鮑君蕪城賦拖以漕渠軸以金銀池又河圖括地象曰丨丨山橫為地軸此陵交帶崑崙故曰廣陵也權德輿廣陵行云廣陵實佳麗隋季此為京八方稱輻湊五達如砥平蜀岡舊傳地脈通蜀或曰丨丨産茶味如蒙頂故曰丨丨大江在江都縣南四十五里郡國志西北自六合縣界流入舊濶四十餘里昔魏文帝登廣陵觀兵戎卒數十萬旌旗數百里臨江見波濤洶湧歎曰吾武騎萬隊何所用之嗟乎固天地所以限南北也晉元帝以祖逖為奮威將軍豫州刺史渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈江面舊有揚子鎮與京口對岸而瓜洲乃江中一洲耳故潮水悉通城中李紳與季頻詩云鸕鷀山頭片雲晴揚州城裏看潮生自大厯後潮水始不通揚子江楊廷秀詩天將天塹護吳天不數殽函百二關萬里銀濤奔鐵甕一雙玉塔表金山旌旗隔岸淮南近鼓角吹霜塞北寒多謝江神風色好滄波千頃片時間伊婁河即揚子鎮以南至江運河也潤州刺史齊浣所開自隋以前末有此河澗唐時江濵始積沙至二十五里故穿此河南泠水李秀卿至維揚逄陸鴻漸李白聞陸君别茶揚子丨丨丨又殊絶二妙千載一遇命軍士謹畏者入江取丨丨丨及至陸以杓揚水曰江則江矣非丨丨臨岸者乎既而傾丨及陸又以杓揚之曰此似南泠者矣使者蹶然曰某自丨丨賫至舟蕩覆過懼其眇挹岸丨增之處士乃神覽也其敢隱焉茱茰灣郡國志云在江陽縣東北九里隋仁壽四年開以通漕運其側有丨丨村故名又吳王濞嘗開茱茰溝以通海陵倉灣口坡詩丨丨猶屢送淮口王介甫望淮口詩白煙瀰漫接天涯黯黯長室一道斜有似錢塘江上望晚潮初落見平沙瓜洲渡在江都縣南四十里江濵昔為丨丨村蓋揚子江中之沙磧也沙漸漲出其狀如瓜接連揚子江口民居其上唐為鎮今有石城三面丨丨為丨介於江淮之間南之瀟湘北走秦隴鄭谷詩揚子江頭楊栁春楊花愁殺渡江人數聲風笛離亭晚君向瀟湘我向秦孟浩然楊子津望京口詩北固臨京口夷山近海濵江風白浪起愁殺渡頭人楊廷秀過丨丨鎮詩夜愁風浪不成眠曉渡清平却宴然數棒金鉦過江步一檣霜月到淮船佛狸馬死無遺骨河亮臺傾只野田土人云金主亮辛已南下築臺望江誅死其上南北休兵三十載桑疇麥壠正連天𨝍溝左傳哀公九年吳城丨丨通江淮注云於𨝍江築城穿溝東北射陽湖西北至末口入淮通糧道也今廣陵韓江是郡縣志云合瀆渠在江都縣東二里昔吳王夫差將伐齊北霸中國自廣陵城東南築𨝍城下掘深溝謂之𨝍江亦曰丨丨自江東北通射陽湖今謂之官河亦謂之山陽濁又云漕河貫城中即丨丨也薔薇溝在江都縣東北六十里接髙郵永安港耆舊云昔之丨丨村也雷塘在州東北十里煬帝平昔遊之多從宫人故時耕出寶叉焉蘇子瞻詩云丨丨水乾禾秦滿寶叉耕出餘鸞龍煬帝葬其上羅隱題場帝陵詩入郭登橋出郭舟紅樓日月柳年年君王思把平陳業只換雷塘數頃田唐李襲譽為刺史引丨丨水灌田故又名雷陂新塘在城外紹定間以張燈之夕販逆賊李全於此露布有云奮幟麾軍開關延敵實精兵於堡寨蹙酋虜於丨丨其後又云羣戈既奮遂舂鄋瞞之喉異服空遺俱識智髙之面井泉蜀井在蜀岡上井水最宜煎茶蘇子瞻詩刺覔丨岡新丨水蘇子由詩信腳東遊十二年甘泉香稻憶歸田行逄丨丨恍如夢試煮山茶意自便短綆不收容盥濯紅泥仍許置清鮮早知鄉味勝為客遊宦何須更著鞭秦少遊次韻蜀岡秀氣蓄多年故有清泉發石田乍飲肺肝俱藻雪久窺杖屨亦清便炊成香稻流珠滑煮出新茶潑乳鮮坐使二公鄉思動放杯西望欲暉鞭堂舍平山堂在州城西北大明寺側慶厯八年二月歐陽公來牧是邦為堂於大明寺􅒉之坤隅江南諸山拱列簷下若可攀取因目之曰丨丨丨沈括為記洪邁撰丨丨丨後記云揚為州最古南傳海北犍淮井而方之蓋萬里後世華離鈲析殆且百郡獨廣陵得鼎其名故常稱巨鎮為刺史治所為總管府為大都督府為淮南節度使方唐盛全蜀尚列其下有揚一益二之語入本朝事權雖衰而太守猶一道鈐轄安撫使品其域望他方莫與京也迷樓九曲珠簾十里二十四橋風月登臨氣槩政以突兀扳今古兹堂最後出前志謂江南諸蜂植立欄户且肩摩領接若可取山既佳而又歐陽實張之故聲筮宇宙如揭日月搢紳之東西以身不到為永限意謂層城閬風中天之臺抑未耳然餘百年間屢盛屢歇瓦老木腐因之以傾侈薦之以兵革而禾黍離離無復一存荒煙白露蒼莾滅沒使人意象蕭然誦山色有無之句付之三嘆而巳吳興周琮復興是堂王介甫詩云城北橫岡走翠虬一堂髙視兩三州淮岑日對朱欄出江岫雲齊碧瓦浮墟落耕桑公豈弟杯觴談笑客風流不知峴首登臨處壯觀當時有此不蘇子瞻丨丨丨次王居卿韻髙會日陪山簡醉狂言屢發次公醒酒如人面天然白山向吾曹分外青江上飛雲來北固檻前修竹憶南屏六朝興廢餘丘壠空使姦雄笑寧馨蘇子由詩堂上平看江上山晴光十里對憑欄海門僅可一二數雲夢猶吞八九寬簷外小棠隂蔽芾壁間遺墨尚汍瀾人亡坐覺風流動遺搆仍須子細觀秦少遊次韻棘宇髙開古寺間盡收佳處入雕欄山浮海上青螺逺天轉山南碧玉寬雨檻幽花滋淺淚風巵清酒漲微瀾遊人若論登臨美須作淮東第一觀劉原父詩蕪城此地遠人寰盡借江南萬疊山後歐公在翰林原父出守公作朝中措詞餞之有曰平山欄檻倚晴空山包有無中手種堂前楊柳别萊幾庭春風文章太守揮毫萬字一飲千鍾行樂直須年少樽前看取衰翁蘇子瞻西江月三過丨丨丨下半生彈指聲中十年不見老仙翁壁上龍蛇飛動欲弔文章太守仍歌楊柳春風休言萬事轉頭空未轉頭時己夢淮海堂在州宅四并堂韓忠獻建于郡圃谷林堂在大明寺元祐中建郡守蘇子瞻詩深谷下窈窕髙林合扶踈是也館驛水館李紳宿揚州丨丨詩舟依淺浦參差合橋映晴虹上下連輕楫過時搖水月逺燈繁處隔秋煙却思海嶠還悽歎近涉江濤更凛然間憑欄干指星漢尚疑軒蓋在樓船臨都驛唐白居易詩揚子江頭月丨丨丨裏登亭榭斗野亭東坡秦觀孫覺黃庭堅蘇子由米芾皆有詩黃魯直詩維斗天司南其下百瀆傾盤淮海間風煙浸十里九曲亭按圖志藝祖之破李重進也駐蹕九江池上有龍鬬於池今有丨丨丨在池上鮮於侁廣陵雜詩序煬帝奏樂于此也初帝欲幸江都命必樂府撰水詞九曲工人王令言謂子曰此曲無宫聲又無回韻汝不還又蘇子由丨丨丨詩嵇老清彈怨廣陵隋家水調寄哀音可憐丨丨遺聲盡只有一池春水深無雙亭與后土廟瓊花相對歐陽公名前賢賦詠甚多摘星亭秦少遊次韻崑崙左右兩招提中起孤髙雉堞西不見燒香成宿霧虛傳裁錦作障泥螢流花苑飛星亂苔滿蕪城緑髮齊長憶憑欄風雨後斷虹明處海天低障泥事見李商隱隋宫詩樓閣文選樓王觀揚州賦曰帝子久去兮空文選之樓圖經云文樓巷即其處曰煬帝嘗幸焉迎仙樓髙駢建羅隱詩云仙境是誰知處所人間空自造樓臺摘星樓在城西角江淮南北一目可盡鎮淮樓在南城上規模甚壯賞心樓孔字六帖云揚州有丨丨丨雲山閣吕申公公著守維揚建詩見秦觀注寺觀法雲寺謝安故宅劉禹錫有雙檜詩禪智寺杜牧留題雨過一蟬噪飄蕭松桂秋青苔滿階砌白鳥故遲留暮靄生深樹斜陽下小樓誰知竹西路歌吹是揚州羅隱春日獨遊詩逺樹連天水接空幾年行樂舊隋宫花開花謝長如此人去人來自不同鸞鳯調髙何處酒吳牛蹄健滿車風思量只合騰騰醉煮海平陳盡夢中石塔寺小説載王播少孤貧客揚州木蘭院隨僧齋粥僧厭苦之飯後擊鐘其後播鎮揚州訪舊處題詩曰上堂已了各西東慚愧闍黎飯後鐘後二紀播出鎮是邦向所題巳碧紗龍之矣乃續云三十年來塵撲面如今始得碧紗籠蘇子瞻云世傳王播飯後鐘詩蓋揚州丨丨院事也詩云飢眼眩西東詩腸忘蚤晏雖知燈是火不悟鐘非飯山僧異漂母但可供一莞胡為三十年記憶作此訕齋厨養若人無益祇遺患乃知飯後鐘闍黎蓋具眼又有石塔試茶詩云禪窗麗午景蜀井出氷雪坐客皆可人鼎器手自潔蕃禧觀即古之后土廟有瓊花擅天下無雙之名香如運花清馥可愛唐詩紀事云揚州唐昌觀玉蘂花拆有仙人遊或云唐所植即李衛公所謂玉蘂花也康駢劇談録謂有女子遊其下劉禹錫詩玉女來看玉樹花異香先引七香車攀枝弄雪時回首驚怪人間日易斜雪蘂瓊絲滿院春羽衣輕步不生塵君平簾下徒相問長伴吹簫别有人玉蘂天中樹金閨昔共窺落英間舞雪密葉作低帷後約韶華逺前惟歲月移今來想顔色還似憶瓊枝王元之云揚州后土廟有花一株潔白可愛且其樹大而花繁不知實何木也俗之謂瓊花因賦詩以狀其態云春氷薄薄壓枝柯分與清香是月娥忽似暑天深澗底老松擎雪白婆娑劉邍父云自淮南遷東平移后土廟瓊花植於濯纓亭此花天下獨一株爾永叔為揚州作無雙亭以賞之彼土人别號八仙花或云李衛公所賦玉蘂即此也詩云淮海無雙玉蘂花異時來自八仙家魯人未覩天中樹乞與春風賞物華古迹故城羅隱題故都詩江南江北兩風流一作迷津一拜侯畢競不如隋陽帝破家猶得到揚州孟遲廣陵城詩紅繞髙樓緑送城城邊春草傍墻生隋家不向此中盡汴水應無東去聲郭𨽻知揚州以為丨丨憑髙下臨四面國初李重進始夷而改卜今相距三十里處勢畢泄遭金襲瞰則圍在掌股中金主之來厥咎可鑒請即遺址建築俯壕相通轉餉緩急足以相赴為九曲池即建樓為籌邊登高舒眺見百里秋毫以杜他日伏戎之患三塘既豐運河常溢卓為上策隋宫李義山丨丨詩紫泉玉殿鎖煙霞欲取蕪城作帝家玉璽不緣歸日角錦帆應是到天涯於今腐草無塋火終古垂楊有暮鴉地下若逄陳後主豈宜重問後庭花玉鈎斜桂苑叢話唐李蔚自大梁移鎮淮海見郡寡勝遊之地命于戲馬亭西連丨丨丨道葺亭名之曰賞心坡詩路失玉鈎芳草合騎鶴仙太平廣記有四人各言所願甲曰願多財乙曰願為揚州太守丙曰願為仙丁曰願腰纒十萬貫騎鶴上揚州蘇子瞻詩曰野無佩犢子府有乙丨乙來蘇舞因類載杜邠公守維揚耽於遊燕有獄市之譽宣宗聞除崔鉉為代以詩送之有一方獄市喜來蘇之句揚州押衙傳希聞之即教習丨乙丨以迎崔谷邠公頗銜之迷樓九曲廣陵志揚州建新宫成帝幸之曰若使真仙遊此亦自當迷杜牧詩煬帝需塘路迷藏有舊樓誰家唱水調明月滿揚州駿馬宜間出千金好暗遊喧闐醉中少半脫紫貂裘洙簾十里承平時東南之士試京師取髙第往來皆經維揚其詞曰玉京此去春猶淺正雪絮馬頭零亂嫦娥剪就緑雲袍待來到蟾宫與換來年三月排花岸棹雙槳浪平煙暖揚州十里小紅樓盡捲上珠簾一半杜牧詩娉娉嫋嫋十三餘豆蔻梢頭三月初春風丨丨揚州路捲上丨丨總不知吹臺琴室徐湛之為南兖州刺史建於城圯今無其處水亭獨孤及有丨丨泛舟望月宴集賦詩序徐知浩每夜引宋齊兵於丨丨屏語獨置大爐相向坐不言以畫灰為字隨即滅去故所謀人莫得而知東府齋梁宣城王為揚州刺史顧野王及王褒為賔客野王好丹青於東府起齋令野王畫七賢命王褒書贊稱為兩絶二十四橋隋置並以城門坊市為名後韓今坤省築州城分布阡陌别立橋梁所謂丨丨丨丨者或存或廢不可得而考杜牧之寄韓判官詩雲山隱隱水迢迢秋盡江南草木凋丨丨丨丨明月夜玉人何處教吹簫歐公自揚州移汝西湖詩云緑芰紅蓮畫舸浮使君非復憶揚州都將丨丨丨丨月換作西湖十頃秋後蘇子瞻自汝移揚州作詩曰丨丨丨丨亦何有换此十頃玻璃風三十六陂在江都縣王介甫題西太乙宫壁丨丨丨丨春水云云皂角林紹興金兵南下劉琦自淮隂回軍瓜洲金將髙景山以兵十萬直搗瓜洲琦伏於丨丨丨破金兵斬景山楊廷秀詩云水漾翳風冷客襟苔封戰骨動人心河邊獨樹知何木今古相傳丨丨丨雙檜在法雲寺張祐詩謝家雙植本南榮樹老人亡地變更朱頂鶴知深蓋偃白眉僧見小枝生髙臨月户秋雲影靜入風簷夜雨聲縱使百年為工燾緑隂終借暫時行酒肆柱間詞黃魯直謂州東酒肆或書詞云秋風吹渭水落葉滿長安黃塵軍馬迄獨清間自然墟鼎虎繞與龍盤九轉丹砂就琴心三疊蘂宫看舞胎仙便萬釘寶帶貂蟬富貴欲薰天黃梁炊未熟夢驚殘再遊漁浦廬山後有醉道士於廣陵市上歌此曲或云即吕洞賔也名宦韓信漢人為楚王董仲舒出為江都相張綱為守張嬰等冦亂揚徐綱單車之職將吏卒十餘人過嬰壘賊面縛歸降謝安築新城偃謝玄領廣陵相何遜為揚州法曹廨舍有梅花盛開遜吟詠其下後居洛思梅因請再往至適梅花方盛遜對之倣徨終日遜嘗有梅詩云兔園標物序驚時最是梅衝霜當路發映雪凝寒開香浮却月觀花繞凌風臺應知先百卉故逐上春來以月觀風臺為揚州勝景故也李德裕父吉甫年五十淮出鎮淮南五十四自淮南復相及德裕鎮南後入相一如父之年杜牧性踈放會丞相牛僧孺出鎮揚州辟節度掌書記唯以遊宴為事揚州勝地也每重城向夕樓上常有絳紗燈萬數輝耀空中九里三十步街珠翠填咽邈若仙境牧常出沒馳逐其間初無虛夕有街卒三十易服隨後潛護之僧孺之密教也而牧自謂人不知之及召拜僧孺餞之發一書簏乃街卒之密報也悉曰某夕杜書記過某家無恙杜鴻漸唐宋遺史劉禹錫為蘇守嘗赴揚州大司馬丨丨丨宴醉歸宿傳舍臨醒見二娀在側驚問之乃曰郎中席上與司空詩因這某等問其詩何言曰髙髻雲髮宮祿粧春風一曲杜韋娘司空見慣渾間事惱亂蘇州刺史腸皇朝陳升之為守髙麗遣使入貢所經州縣悉要地圖升之紿使者欲盡見所得地圖效其規模供造及圖至聚而焚之鄒浩字志完嘗為穀授吕申公守維揚命撰樂語鄒不允公曰使教授他時作翰林學士將何如鄒答曰使為翰林學士則可為國子司業則不可後首薦之韓琦魏公守維揚王介甫為僉判每讀書逹旦假寐日巳髙亟上府多不及盥斑甜公意其年少夜蝕謂公曰少年母廢書不可自棄公不答退而言曰韓公非知我者及魂分薨芥甫有挽詩曰慕府少年今白髮傷心無路送靈輀又有望揚州詩云落日平村一水邊蕪城掩映祗蒼然白頭追想當年事幕府青衫最少年猶不忘前事也魏公自樞副出守維揚初夏郡圃芍藥盛開忽於叢中得黃緣稜者四朵土人呼為金繫腰云數年間或有一二不常見也魏公開宴時王岐公圭監郡王荆公安石為幕官陳秀公升之初授衛尉丞忽經由公召同賞各簮一朵其後四人相繼皆登宰輔果花瑞也歐陽修與魏公為代有手帖云廣陵幸遵遺矩獨平山堂占勝蜀罔江南諸山一目千里以至大明井瓊花二亨此三者拾公之遺以繼盛美云吕公著公守維揚蘇子瞻自黃岡移汝海經從見公公置酒終日不交一語子瞻昏睡歌者唱夜來陡覺羅衣薄子瞻驚覺小語云夜來走却羅巫博也歌者匿笑後子瞻書歌者圑扇公見之亦無語蘇軾車都事略軾喜作詩言者妄詆以龍圖閣學士知潁州徙揚州俄以兵部尚書召還兼侍讀朝補之子瞻知揚州無咎作倅汙瞻作點絳唇詞云獨倚胡床庾公樓外峰千朵誰與同坐明月清風我别乘一來有唱終須和還知麼自從添介風月平分破朝詠之字之道蘇子瞻知揚州無咎為倅以其弟詩文獻子瞻子瞻曰有才如此獨不令識一面耶詠之時以蔭入官為揚州司法未上具參軍禮入謁子瞻下堂挽而上之謂坐客曰此竒才也韓世忠紹興四年烏珠與大帥托卜嘉合三路兵並進自泗取揚步兵自楚取髙麗塵覆飛烏時建康鎮江淮東宣撫使丨丨丨自鎮江濟師親提隊騎以當淮泗之鋒伐木為柵自斷歸路會朝廷遣魏良臣使金至維揚世忠置酒送别杯未再行世忠曰有詔移屯守江乃徹炊爨班師良臣喜疾馳出境世忠乃上馬令軍中曰租吾鞭所向由面並進金太半乞降凱旋論者以玭粟為中輿武功第一人物陳淋魏太枉語瑀所草檄能愈頭風張祐宮淮南幕中赴宴時杜紫徴為支使坐中有屆意處索殼于臘酒牧之段吟日轂于逮巡襄于拈無因得兒玉隸鐵祐應磬曰但知報道金鉏墜活佛還應露指尖李雍唐人未冠且李嶠自言竒書未墳願一見祕書李妻豈之子注文選李紳溏托言李紳鉦揚州謂章孝標駐春雪詩云六出花飛處處飄粘窗拂劭上寒條朱門珂曉難杯尺盡是三軍喜秉銷淳於萊喙廣陵宅南有古槐葶室大槐安國王以女妻之命理南柯郡几二十載卒葬於盤龍山遂覺因尋古槐下穴可容一榻上有土壤為城郭臺殿之狀有蟻數斛即槐安都邑也南枝則郡也腐龜則山也一穴盤屈若龍蛇狀有小冢隆然即盤龍岡也棼墓今在縣北十里俗呼為南柯太守墓徐鉉與韓熙載齊名謂之韓徐皇朝張方平天性頴悟凡書皆一閲終身不再讀屬文未嘗起草秦觀字少遊髙郵人吕申公守維揚以舉子謁見時適中秋雲山閣成宴客其上公素聞秦才名即煩撰樂語云雲山簷楯接晴空公宴初開氣鬱蔥照海旌旗秋色裏激天鼓吹月明中香槽旋滴珠千顆歌扇驚團玊一叢二十四橋人望處台星已在廣寒宫吕溱溱應舉作鯤化為鵬詩九霄宗離海嶠一息到天池之句仁見之升為第一時有三魁謂丨丨王昴李易也名賢陳瓘遭紹聖崇寧黨錮之禍與任伯雨相繼內徙是州俱不幸死兩家子弟奉遺命丘壠對封於西山之下題詠揚州隋故都武元衡詩云云竹使漢名儒海雲助兵氣韋應物詩雄藩鎮楚郊地勢鬱岧嶤雙旌擁萬戟中有霍嫖姚云云寶貨益軍饒嚴城動寒角晚騎踏霜橋潮吞海門石劉長卿氣混京口雲云云秋色上蕪城劉長卿寒潮落瓜步云云紅斾擁雙節白居易送牛僧孺鎮揚州坐移丞相閣春入廣陵城云云白髮無一莖煙花三月下揚州李白送孟浩然之廣陵故人西辭黃鶴樓云云孤帆逺影碧山盡惟見長江天際流蒜山晴日照揚州獨孤及詩蕪城西眺極滄流漠漠春煙暗曙樓瓜步早潮催建業云云維揚景物勝西川杜荀鶴詩見説西川景物繁云云青春花柳樹臨水白日綺羅人上船夜市千燈照碧雲王建詩云云樓髙紅袖客紛紛如今不似承平日猶自笙歌徹曉間故人多在芙蓉幕杜荀鶴維揚冬末寄幕中二從事江上數株桑棗樹自從離亂更荒涼那堪旅館經殘臘秪把空書寄故鄉典盡客衣三尺雪錬精詩句一頭霜云云應笑孜孜道未光江蹙海門帆散出羅隱開元寺閣上作滿檻山川漾落暉檻前舊事去如飛雪中雞犬劉安過月裏笙歌煬帝歸云云地吞淮口樹相依紅樓翠幕知多少長向東風有是非五馬雙旌何處逄劉長卿詩眇眇雲山去幾重依依獨聽廣陵鐘明朝借問南來客云云灞陵殘雨夢依依趙嘏送盧緘歸揚州詩曽向畨塘寄掩扉荀家燈火有餘輝關河日暮望空切揚州渡頭人獨歸隋苑荒臺人裊裊云云今年春色還相誤為我江頭謝釣磯春風十里珠簾捲黃魯直早春過廣陵詩云云髣佛三生杜牧之紅藥梢頭初繭栗揚州風景鬢成絲淮南二十四橋月黃魯直詩云云馬上時時夢見之想得揚州醉年少正圍紅袖寫烏絲飛雪堆盤膾魚腹黃魯直次王定國揚州見寄韻云云明珠論斗煮雞頭團臍紫蟹脂填腹蘇子瞻揚州以土物寄少遊詩鮮鯽經年祕醽醁云云後春蓴出滑如酥先社薑芽肥勝肉鳬子纍纍何足道點綴盤飱亦時欲淮南風俗事瓶􅑥方法相傳竟留蓄且同千里寄鵝毛何用孜孜飫麋鹿四六光奉宸綸宏開制閫維今重鎮自古雄藩廣陵奧區淮甸重鎮開大幕府號小朝廷惟江都之舊壤亦海道之要衝眷揚楚之重鎮據吳越之通塗載惟南渡財賦之淵尤藉東淮醝茗之利分淮海之巨屏控東南之要津昔號往來之會今當守禦之衝禹别九州斯為奧壤唐分十道是曰大邦海陵於焉而致敗李全即此以就誅陜以東周公分權尊甚重閫以外將軍制令肅威行練卒勵兵固藩籬於江面出師搗賊壯聲逺於邊頭龍蛇飛動重尋歐子之詩貔虎鼓行尚繼韓王之績竹西歌吹遙瞻刺史之居山東捷書行入詩人之詠萬竈雲屯盡屬元戎之節制羣凶風靡皆驚大將之威名靜而固境或為牽制之謀動以除凶直作掃清之舉歌珠簾十里之詩略無舊觀和風笛數聲之句空有羈情分閫令嚴肯作棘門兒戲平戎捷奏當符爪步童謡數百萬騎之甲兵頻聞奏凱二十四橋之風月靜聽傳更韓忠獻之規模惟歐公而可繼蘇東坡之風月非朝子而莫分淮海維揚州襲夏后平成之號江吳大都會為唐朝繁盛之區方輿勝覽卷四十四
