body:
  text: 方輿勝覽卷二十四宋祝穆撰衡州衡陽常寧耒陽荼陵安仁建置沿革禹貢荆及衡陽為荆州當鶉尾之次翼軫之分野春秋屬楚秦屬長沙郡漢屬桂陽郡及長沙國吳置湘東郡晉立湘州宋為國齊為郡梁置衡州陳置東衡州以本州為西衡州隋置衡州煬帝改為衡山郡唐復為衡州國朝因之領縣五治衡陽湖南提刑提置司事要郡名衡陽郡在衡山之陽故曰衡陽古酃漢為酃縣蒸湘見蒸水注風俗民豐土間南齊志湘州之奧云云人多純朴寰宇記有舜之遺風云云必有魁竒之民見下韓文形勝東傍湘江郡縣志云云北背蒸水瀟湘帶其左圖經衡之為郡直鴈峯北云云獨衡山為宗韓文南方之山巍然髙大者以百𢾗云云神氣所感必有魁竒忠信才德之民生其間詳見桞州回鴈為首徐靈期曰南嶽周回八百里云云麓嶽為後山川之秀麗歐陽永叔云云接衡湘人得之為俊傑詳見潭州山川石鼓山在城東三里有東巖西溪前峯後洞酈道元水經注云臨蒸縣有石鼓山湘水所徑鼓鳴則有兵革之事熊耳山在安仁縣東南七十里衡嶽在衡陽縣寰宇記宿當翼軫度應璣衡書所謂南嶽也乃朱陵之靈臺太虛之寶洞國初緣舊制祠官所奉止東西北中四嶽開寶元年有司按祭典請祭南嶽於衡山從之詳見潭州岣嶁峰在衡陽北湘水記衡山南有一山名丨丨東西七十里南北三十里髙一千五百丈禹登山獲金簡玉牒治水之書山上承翼宿鈴得鈎物故名岣下據離宮攝統火師故名嶁韓愈詩岣嶁山尖神禹碑字青石赤形摹竒科斗拳身薤葉披鸞飄鳯泊拏虎螭事嚴跡怪鬼莫窺道人獨上偶見之我來咨嗟涕漣洏千搜萬索何處有森森緑樹猿猱悲回鴈峰在衡陽之南鴈至此不過遇春而回故名或曰峯勢如鴈之回紫蓋峯山海經山有玉牒遙望如陳雲有峯名紫蓋禹治水登而祭之遇元夷蒼水使者授金簡玉字果得治水或曰其形如蓋兜率峰陶弼詩云兜率一峰旁林開見寶幢鳥行髙避縣山骨下連江白雲峰在南嶽下有龍潭又有碧雲峰明月峰香爐峰天柱峰石廩峯石菌峯芙蓉峯曽青岡出曽青可合仙藥酃湖郭仲堅湘中記衡陽縣東二十里有丨丨周二十里深八尺湛然緑色土人取以釀酒其味醇美晉武帝平吳始荐酃酒於太廟吳都賦飛輕軒而酌緑酃茶溪寰宇記茶陵有茶水黃溪呂溫詩云偶尋丨丨日欲沒早梅未盡山櫻發無事江城閉此身不得坐待花間月湘水自陽海發源至零陵而營水㑹二水合流謂之瀟湘蒸水衡陽本漢酃縣屬長沙國吳分酃縣立臨蒸縣今郡西七十里蒸陽故城是也郡國志俯臨蒸水其氣如蒸故曰臨蒸耒水在耒陽縣一名歷水中有大歷可容百斛宜溪水在耒陽湘州記傍有穴天旱以水灌之輒致暴雨吳都賦所謂龍穴所蒸靈雨所瀦是也瀟湘水栁宗元湘口館詩序瀟湘二水所㑹上潢水在衡陽縣出岣嶁山屈曲流六十里㑹湘水勝小舟大别水水經注丨丨丨所出耒陽水簾在朱陵洞畢田詩洞門千尺掛飛流玉碎珠簾冷噴秋今古不知誰捲得緑羅為帶月為鈎青草渡在衡陽縣北一里即蒸水學校石鼓書院朱元晦記石鼓山據蒸湘之㑹江流環帶最為一郡佳處故有書院起唐元和間州人李寬之所為至國初時常賜敕額其後乃復稍徙而東以為州所則書院之迹於此遂廢而不復修矣淳熙十二年部使者潘侯畤德夫始因舊址列屋數間榜以故額將以俟四方之士有志於學而不屑於課試之業者居之未竟而去今使者成都宋侯若水子淵又因其故而益廣之别建重屋以奉先聖先師之象且摹國子監及本道諸州印書若干卷而俾郡縣擇遣修士以充入之蓋連帥林侯栗諸使者蘇侯詡官侯鑑衡守薛侯伯宣皆奉金齎割公田以佐其後踰年而後落其成焉於是宋侯以書來曰願記其實以詔後人且有以幸教其學者則所望也豫惟前代庠序之教不修士病無所於學往往擇勝地立精舍以為羣居講習之所而為政者乃或就而褒表之若此山若嶽麓若白鹿洞之䫫是也逮至本朝慶歷熙寧之盛學校之官遂遍天下而前日處士之廬無所用則其舊迹之蕪廢亦其勢然也不有好古圖舊之賢孰能謹而存之哉抑今郡縣之學官置博士弟子員皆未嘗㢭其德行道藝之素其所授受又皆世俗之書進取之業使人見利而不見義士之有志於為已者蓋羞言之是以常欲别求燕閒清曠之地以共講其所聞而不可得此二公所以慨然發憤於斯役而不敢憚其煩蓋不獨不忍其舊迹之蕪廢而已也故特為之記其本末以告來者使知二公之志所以然者而無以今日學校科舉之意亂焉又以風曉在位使知今日學校科舉之害將有不可勝言者不可以是為適然而莫之救也若諸生之所以學而非若今人之所謂則昔者吾友張子敬夫所以記夫嶽麓者語之詳矣顧於下學之功有所未究是以誦其言者不知所以從事之方而無以蹈其實然今亦何以他求為哉亦曰養其全於未發之前察其機於將發之際善則廣而充之惡則克而去之其亦如此而已矣又何俟於豫言哉亭榭合江亭在石鼓山後唐刺史齊映建韓愈自山陽令徙江陵掾過衡陽有合江亭寄鄒使君詩云江亭枕湘江蒸水㑹其左瞰臨渺空濶緑淨不可唾維昔經營初邦君實王佐翦林遷神祠買地費家貨梁棟宏可愛結搆麗匪過伊人去軒騰兹宇遂摧挫老郎來何暮髙唱久乃和樹闌盈九畹栽竹逾萬個長綆汲滄浪幽溪下坎坷波濤夜俯聽雲樹朝對卧初如遺宦情終乃最郡課人生誠無幾事往悲豈那蕭條綿嵗時契濶繼庸瑣勝事誰復論醜聲曰已播中丞黜凶邪天子閔窮餓君侯至之初閭里自相賀淹滯樂間曠勤苦勸慵惰為余掃塵階命樂醉衆坐窮秋感平分新月憐半破願書巖上石勿使塵泥涴望嶽亭在縣南唐韋虛丹建祠墓木居士廟韓愈詩火透波穿不計春根如頭面幹如身偶然題作木居士便有無窮求福人羅隱題木居士廟詩鳥噪殘陽草滿庭此中枯木似人形只應水物長為主未必浮槎即有靈八月風波飄不去四時黍稷荐惟馨南朝庾信無因賦牢落祠前水氣醒元豐初耒陽令禱旱無雨祈而薪之今所祀者乃寺僧再刻也杜子美墓本傳大厯中出瞿唐下江流泝沅湘以登衡嶽因客耒陽游嶽祠大水遽至涉旬不得食縣令具舟迎之乃得還令嘗饋牛炙白酒大醉一夕卒劉斧托遺小說謂子美由蜀往來得以詩酒自適一日過江上舟中飲醉不能復歸宿酒家是夕江水暴漲子美為驚湍漂泛其尸不知落於何處𤣥宗還南內思子美詔求之聶令乃積空土於江上曰子美為白酒牛炙脹飫而死葬於此矣以此聞𤣥宗故唐史氏因有牛炙白酒大醉一夕卒之語信哉史氏之訛也元稹作墓志云扁舟下荆楚竟以寓卒旅殯嶽陽其后嗣業啓柩襄祔事於偃師途次於荆拜余為志韓愈詩今春偶客耒陽路悽慘去尋江上墓招手借問牧童兒牧兒指我祠堂處一堆空土煙蕪裏空使詩人悲嘆起怨聲千古寄西風寒骨一夜沉秋水當時處處多白酒牛炙如今家家有飲酒食肉今如此何常人無飽死捉月走入千尺波忠諌便沉汨羅底固知天意有所存三賢所歸同惡一水過客留詩千百人千古醜聲竟誰洗明時好古疾人應以我意知終始王介甫題杜子美像云吾觀少陵詩謂與元氣侔力能排天幹九地壯顔毅色不可求浩蕩八極中生物豈不稠醜妍巨細千萬殊竟莫可以窮雕鎪惜哉命之窮顛倒不見收青衫老更斥餓走半九州瘦妻僵前子仆後攘攘盜賊森戈矛吟哦當此時不廢朝廷憂常願天子聖大臣各伊周寧令吾廬獨破受凍死不忍四海赤子寒颼颼傷屯悼屈只一身嗟時之人我所羞所以見公像再拜涕泗流推公之心古亦少願起公死從公遊名宦呂溫為刺史皇朝張齊賢廷試唱名得㫖一榜盡除通判冦凖凖之貶雷州也天下莫不冤之初過零陵行囊為溪冦所掠其酋長聞而趣還之踰年遷衡州司馬劉摯為御史裏行上疏論常平免役法十害責監衡州鹽倉人物蔡倫有宅在耒陽縣有池及搗紙臼題詠中有古刺史杜甫詩云云盛才冠巖廊扶顛持柱石獨坐飛秋霜郡邑地卑饒霧雨唐郭受寄杜子長詩云云江湖天濶足風濤湖南為客動經春杜甫詩云云燕子銜泥兩度新衡陽太守虎符新唐韓翊詩湘竹班班湘水春云云可獨衡山解識韓蘇子瞻詩四六疏渥龍墀分符鴈嶠剛辰啓籕蒸水建牙湖右奧區衡陽名郡地雄州望星炯倉臺瞻言蒸水之邦乃析長沙之地載惟翼軫之區莫重荆衡之域豈伊南服之州尚屈東方之騎符分漢室之魚開藩有俶書寄衡陽之雁賀厦敢稽詩述昌黎閭里賀使君之至句成杜老巖廊輟刺史之臨揖衡嶽之五峯正須彈壓分湖湘之千里有賴撫摩開天柱紫蓋之雲民嵓洞見澄洞庭青草之水地險彌堅皂蓋朱轓豈鴈峯之久駐黃扉青瑣即鳯閣之遄歸肅擁州麾直可開衡山之雲氣頻過書院又將詠沂水之春風韓昌黎之叙衡山必多忠信魁竒之士朱文公之記石鼓欲聞性命道德之談道州營道寧逺江華永明建置沿革禹貢荆州之域舜封象於有庳國即其地也楚越之分翼軫之星春秋戰國屬楚秦屬長沙郡漢武分長沙置零陵郡吳分零陵郡置營陽郡今州是也以郡在營水之南故名南齊為營道郡梁改永陽郡唐改南營州尋改道州皇朝因之今領縣四治營道事要郡名舂陵長沙定王封中子買為丨丨侯有故城在寧逺縣風俗俗尚韶歌晏類要云云因舜二妃泣望於瀟湘號曰相君湘夫人遂作此歌其來久矣島夷卉服同上引風俗記云别有山徭白蠻倮人三種書所謂云云是也形勝僻在嶺隅元結曰臣州云云其實邊裔有九疑山山海經注云蒼梧之川云云在零陵界與五嶺接寰宇記云云有炎熱而無瘴氣南控百粵之徼掌禹錫壁記云云北凑三湘之域土産州産侏儒陽城傳城為道州刺史云云謂之矮奴城奏州民奴盡短自是罷貢州人感之以陽名子白居昜矮詩道州之民多侏儒長者不過三尺餘市作矮奴年進送號為道州任土貢一自陽城來守郡不進矮奴頻詔問城云臣按六典書任土貢有不貢無道州水土所生者只有矮民無矮奴吾君感悟璽書下嵗貢矮奴宜悉罷道州民欲說使君先下淚仍恐兒孫忘使君生男多以陽為字山川營道山在丨丨縣西四十五里其始名曰營陽又曰南營又曰洪道瀟山在營道縣西九疑山在寧逺縣南六十里亦君蒼梧山九峯相似望而疑之謂之丨丨丨有九峯峯各有一水四水流灌於南海五水北注合為洞庭其一曰朱明峯其下湘水源二曰石城峯其下沱水源女其冠魯妙典所居三曰石樓峯其下巢水源四曰娥皇峯下池水源五曰舜源峯其下瀑水源亦曰華蓋此峯最髙六曰女英峯其下砅水源七曰蕭韶峯其下渀水源八曰桂林峯其下洑水源九曰梓林峯其下湎水源舊録所載不同與九峯不相涉蒼梧九疑之辨檀弓云舜葬於蒼梧之野晉習鑿齒云虞舜葬零陵元和郡縣志亦云九疑舜之葬也按太史公曰舜南狩行死于蒼梧之野歸葬於江南之九疑是為零陵則是舜死于蒼梧之野歸葬於零陵之九疑山海經云舜之所葬在今道州零陵縣界蒼梧九疑當是兩處后人誤引舜死之地以為舜葬之所耳太史遍歷天下名山大川必有所據當從史記及山海經舂陵山在營道縣北七十五里五山相接山勢峭秀舂陵水所出即漢舂陵含暉巖在營道縣南五里唐劉夢得記云薛君景晦為道州得異境有石室穹然如夏屋因名其地曰丨丨丨斜巖在縣南二百餘步古木蒼煙石田棊布巖竇可二丈其中深不可極或云通天執炬而入但見峻巖峭壁寒泉冷風滴乳如佛像如車蓋如花果如器皿如飛走唐薛伯髙命名至道初太守張觀名曰紫虛洞有冦萊公題名在焉玉琯巖在古舜祠之側漢哀帝時零陵郡文學奚景得玉琯十二于此今舜祠后石室是也前有天皇元年舜碑尚焉月陂巖在田村梁武帝時有雙師自南嶽來止于黃庭觀居白馬巖一日臨溪浴既隱去留所衣丨丨在杉林間數百年不壞巖中坐席舊迹宛然髙士巖在舜祠西二里間舊名野猪巖丘順甫欽若改曰丨丨丨昔有獵者見羣豕逐入巖不見因得樂器一部無為觀道士以獻之朝時見唐王維賀表龍巖在丹桂鄉耽坡墟之側瀕江湘傳若聞巖有龍吟之聲即其鄉有登科級者陽華巖在營道縣東南七里山下有大岩向東元次山名之作銘命邑大夫瞿令問以二體篆書刻之崖石元次山招陶别駕家陽華詩云海內厭兵革騷騷二十年陽華洞中人似不知亂焉班竹巖在營道縣南五十里多小班竹相傳云舜葬九疑二妃尋湘水以乎拭淚把竹遂成班色也劉長卿詩梧桐在何處班竹自成林㸃㸃流殘淚枝枝寄在心白茫嶺在江華縣西亦名氓渚五嶺之一世說五嶺一大庾二永明三白茫四臘嶺五臨源白茫嶺在江華杜甫云五嶺皆炎熱此居其一永明嶺在永明蓋五嶺之一也暖谷在寒亭傍治平四年邑尉李伯英得之邑大夫蔣褀名之蔣頴叔作記謂方盛寒入此谷中其氣溫然雖挾纊熾炭不若也碧虛洞水流通碧橋南注舜溪亦名嘉魚洞其實碧虛池也元次山名曰無為洞篆刻在焉洞在永福寺東十步上有正元間李嶠篆刻行五里間有南北二徑一徑適舜峯一徑通紫虛洞行二十里有石穴上通于天有元次山永泰年題名自天聖中寺僧雲亮於洞前百步築堤為塘瀦水溉田洞遂為池左湖在州東濓溪在營道縣西二十里洄溪在江華縣三十里四山之間乳竇松膏之所漬泉甘宜稻飲之者夀元次山宿洄溪翁宅詩序云翁代宗時人姓黃舂溪在故大歷縣即都溪也右溪在城西水流石間元次山名之有游右溪勸學者詩薛伯髙即其旁建學溪在學之東元次山詩吾愛石魚湖石魚在湖裏魚皆有酒尊繞魚是湖水兒童作小舫載酒勝一杯且欲坐湖畔石魚長相對二十四灘亦能病舟瀟水在營道縣西北南流一百里至州城東南與沱水合營水在營道西一里井泉七泉元結銘序云道州東郭有泉七穴命其五曰潓􅪙涍汸淔欲飲者有所感發一曰漫泉自旌漫浪一出山東命曰東泉垂流特異樓閣萊公樓在州治之西公貶道州司馬既去人為之建樓以萊公名之初尞王安中書額鼓角樓天聖間司理掌禹錫記云鼓角之制有自來矣肇帝鴻之御宇戰蚩尤於涿野克壯乎虎旅取象乎龍吟爾後始皇備於鹵簿稷嗣定于雅樂前征烏于之國遂寢乎兜勒之曲後分熊軾之寄乃限乎天驕之奏故有屹壤湖之峻雌敞雲構之飛譙三吹之調彌切七萃之師咸肅丕顯乎威武底寧乎邊鄙則知聖人備物致用其利博哉亭榭粲粲亭在州治後蓋取杜詩丨丨元道州之句欣欣亭同上取道州民歌老者幼者何丨丨之句振振亭同上取桞子厚文宣王廟碑丨丨薛公之意肅肅亭同上取杜甫餞裴道州詩丨丨秩初筵之意欵乃亭元結有詩云下瀧船似入深淵上瀧船似欲升天瀧南欲到九疑郡應絶髙人乘興船白雲亭元結詩有云出門見南山喜逐松徑行窮髙欲極逺始到丨丨丨潓泉亭在惠泉北元結詩云問吾常燕息泉上何處好獨有丨丨丨令人可終老天寒宜泉溫泉寒宜大暑誰到丨丨丨其心肯辭去寒亭在江華縣隔江唐瞿令問棧險道入洞穴因作亭于石上元結大暑登之疑天時將寒故名菊圃在州治元結有詩古跡舜陵或云在女英峯之下寰宇記云名永陵自古禁樵採置守陵六戶有庳國舜封象于有庳後世以道州為有庳之國國始封今失其地唐通典為有鼻桞宗元記薛伯髙刺道州斥鼻亭神事亦有庳為有鼻云麓狀三級在舜廟前蕭韶峯之東北無為觀後相去十餘里古有道之士作之以棲息修真四壇第一壇乃第一麓林上有茜草長丈餘如虎鬚古人鍊丹之地鐵臼鐺釡猶存第二壇乃第二麓狀有清池東流上有鐵臼鐵磬觀其文云齊永明五年四月五日國主為一切舍識造鐵磬十二枚第三壇上有石狀筀竹圍大者幾二尺第四壇有石盆水流不竭九井在九疑山世傳何侯採藥九疑山錬丹於此汲一井而八井皆動窊樽在城中報恩寺之西元結集云道州城外左湖東二十步有小石山山巔有窊穴可以為樽乃為亭樽上元結詩巉巉小山石𢾗峯載窊亭窊石堪為樽狀類不可名五如石在下津門之外江之北左如旋龍右如驚鴻前如飲虎後如怒龜坐于石巔如乘靈槎亦元結名之初尞石在州子城西開圥寺前江中王安中謫居每乘舟往坐其上有刻字祠廟舜祠在舜峯下濓溪祠魏華父記營道之西十八里為濓之源又東流二十里為濓溪保左曰龍山右曰豸則故居之實也名宦裴虬為刺史歐陽永叔集古録怡亭跋尾稱虬為道州刺史蓋亭銘裴虬所撰徐履道元結道州刺史記天下太平方千里之內生植齒類刺史能存亡休戚之天下丘興方千里之內能得黎庶能援患難在刺史耳凡刺史若無文武才略若不清亷肅下若不明惠公直則一州生類皆受其害於戲自至此州見井邑丘墟生民幾盡試問其故不覺涕下前政刺史或有貪猥惛弱不分是非但以衣服飲食為事數年之間蒼生䝉以私欲侵奪兼之公家馳迫非姦惡彊富殆無存者問之耆老前後刺史能恤養貧弱専守法令有徐公履道李公廙而已遍問諸公善或不及徐李二公惡有不堪說者故為此記與刺史作戒自置州已來諸公改授遷絀年月則舊記存焉李廙詳見上徐履道注元結本傳結為刺史搜攪山水佳處被之詩歌由是此邦山水甲天下又奏免百姓所負租稅十三萬八千餘緍容齊三筆元結為刺史作舂陵行又作賊退示官吏一篇杜甫覽結二詩亦志之曰今盜賊未息知民疾苦得結輩十數公落落然參錯天下為邦伯萬物吐氣天下少安可待矣陽城城至道州治民如治家不以簿書介意課當上考功成自書曰撫字心勞摧科政拙考下下薛伯髙唐元和七年由刑部郎為州刺史遷州學於城西桞宗元為記皇朝冦凖景德間與畢士安同相以謀廢丁謂事泄出知州未幾貶道州司馬公之謫此也百姓兢荷土木為廨舍守土者以聞遂有海康之行人物李郃太和元年擢進士第一崔郾為坐主或謂即與劉蕡同應賢良方正科者何堅韓愈送何堅序何與韓同姓為近堅以進士舉于吾為同業其在太學也吾為博士堅為生生與博士為同道其識堅也十年為故人同姓而近也同業也同道也故人也於其志不得願而歸其可以無言耶堅道州人道之守陽公也道于湖南為屬州陽公賢也堅為民堅又賢也湖南得道為屬道得堅為民堅歸倡其州之父老子弟服陽公之令道亦倡其縣與其比州服陽公之令吾聞鳥有鳯者常出于有道之國當漢時黃霸為頴川守是鳥實集而鳴焉若史可信堅歸吾將賀其見鳯而聞其鳴也已皇朝周頥始名惇實改避舊諱年十五偕母往京師依舅家居用舅氏向思補將作監簿調洪州分寧縣主簿南安軍司理郴州郴縣令桂陽令又知洪州南昌縣合州判官䖍州通判永州通判遷駕部郎受廣東運判就轉虞部郎提刑以疾求南康上印分司南京卜居九江廬山名曰濓溪書堂葬江州先生初往京師不知其師誰也年未不惑已為二程師先生有通書四十章舊無太極圖程氏本有之在通書之后或曰傳於穆修修𫝊先天圖於种放放傳於希夷先生陳摶此殆其學之一師也通書有章其篇目則後人為之五峯胡公宏為序焉題詠粲粲元道州杜甫和元使君舂陵行云遭亂髮盡白轉衰病相嬰沉綿盜賊際狼狽江漢行歎時藥力薄為客羸瘵成吾人詩家秀博采世上名云云前聖畏後生觀乎舂陵作歘見俊哲情復覽賊退篇結也實國楨賈誼昔流慟匡衡嘗引經道州憂黎庶詞氣浩縱橫兩章對秋月一字偕華星致君唐虞際純朴憶大庭何時降璽書用爾為丹青獄訟久衰息豈惟偃甲兵悽惻念誅求薄斂近休明乃知正人意不茍飛長纓凉颷振南嶽之子寵若驚色沮金印大興含滄溟清我多長卿病日夕思朝廷肺枯渴太甚漂泊公孫城呼兒具紙筆隱几臨軒楹作詩呻吟內墨淡字欹傾感彼危苦詞庶幾知者聽肅肅秩初筵杜甫湘江餞裴道州詩白日照舟師朱旗散廣川羣公餞南伯云云朝餐是草根元結舂陵行詩舟小經亂亡遺人實困疲大鄉無十家大族今單羸云云暮食乃木皮隼旟辭瀟水劉禹錫送李䇿一麾出營陽惠彼蚩蚩民云云居者皆涕零路入畫屏中呂溫道州途中詩秋桂佳山水營陽舊日同經途看不暇遇境說難窮疊嶂青時合澄湘漫處空舟移明鏡裏云云巖壑千家接松蘿一徑通漁燈生漂渺犬吠隔璁瓏戲鳥留餘翠幽花吝晚紅光翻沙瀨日香散橘園風信美非吾土分憂屬賤躬守愚資地僻恤隱望年豐且保心能靜那求政必工課始如免戾歸養洛城東余昔發軔於蒼梧屈原離騷經曰云云歷沅湘以南征兮就重華而陳詞登九疑兮望青川李白悲清秋賦云云見三湘之潺湲四六乃眷舂陵實鄰炎嶠瀟湘名邦濓溪遺俗雖云地僻尤幸民淳山近九水俗同五嶺乃眷蒼梧之野爰分左竹之符弔靈均於湘水呌虞舜於蒼梧民貧而土地希入俗悍而蠻獠雜居陽誎議字民之政此意可稽周濂溪育秀之鄉斯文有賴郡臨瀟水居多蠻徼之民地近嶺隅漸有炎荒之象撫字心勞寧愧當時之陽子品題句妙重逢今代之漫郎豈特矮民猶誦陽公之德抑令黎庶能知元子之憂方輿勝覽卷二十四
