body:
  text: 方輿勝覽卷五宋祝穆撰建德府建德分水淳安遂安桐廬壽昌建置沿革禹貢揚州之南境斗之分野春秋時属越秦以為鄣㑹稽兩郡之境漢以𨽻呉郡及丹陽郡東漢仍之建安十三年分丹陽郡之歙縣立始新新定等縣置新都郡晉改郡曰新安而縣改新定曰遂安隋仁壽三年割杭之桐廬立遂安縣置睦州大業改睦州為遂安郡唐復為睦州而析桐廬為嚴州七年廢嚴州属東睦州八年去東字乾元復為睦州建國初錢氏納土始入版圖太宗以親王領防禦使政和陞為建德軍節度又為髙宗潜邸方臘平改軍曰遂安軍州曰嚴州咸淳元年八月㫖係今上潜藩之地陞為建德府今領縣六治建德事要郡名新定嚴陵桐廬風俗俗號輯睦圖經序云云因以名邦可以無事治不可以多事理民貧而嗇同上州地山谷居多云云穀食不給仰給它州形勝號清凉國新定志桐廬溪山秀妙陸魯望所謂云云浙江上游錢勰浮橋記羣峯回環蘇子容靈香閣記郡自晉宋以來文士多稱述之城邑閭井皆坦途平陸與它州無異及登髙而望則丨丨丨丨一水縈帶不離指顧而萬景在目錦峰繡嶺費衮云圖經載嚴陵山清麗竒絶號丨丨丨丨乃子陵隱居之所後以名山然嚴陵山水稱號率有經據如杜若汀洲見於杜紫微詩云杜若芳洲翠嚴光釣瀬喧如丁溪見於杜紫微詩云翠巖千尺倚溪斜曽見嚴光作釣家越嶂逺分丁字水江梅遲見二年花蔡天啟牋遂用此作四六云溪壑縈回二水合而成字山城寂歴一葉墜而亦聞莫不有所據又如呉根越角亦見杜牧詩昔事文皇篇中云溪山侵越角風壤帶呉根獨未知丨丨丨丨圖經何所據而云州在萬山中見杜牧樊川集云云山嶮而土嶢曹耜告詞桐廬居浙右上流云云民貧而俗悍土産蒸茶割漆圖經惟蚕桑是務且云云以要商賈貿易之利山川松巖在城東雉山在淳安縣西一里山形如雉嚴陵山在桐廬縣西本漢富春縣避晉簡文帝鄭太后諱改曰富陽按嚴光傳耕於富春山圖經不載此山但云今名丨丨丨者是其所耕處却載嚴光富陽人耕於富春山沈約宋書呉時分富春之地置桐廬縣則丨丨丨即所耕富春山無疑矣桐君山在桐廬有人採藥結廬桐木下人問其姓指桐木示之江山因以桐名郡曰桐廬西征記自衢歴婺至新定曰睦州觀二江之水㑹合亭下有山巍然直壓其首如渇鰲怒鯨奮迅鬐鬛奔而入水之狀上有丨丨祠乃戴顒飛仙之地也武強山在遂安縣西山極險峻人常保焉盗不能攻故名靈巖山在遂安縣北十五里有洞上有泉分注三井溢為瀑布二百尺許戴村桐廬縣東北宋戴顒隱處錦沙村在淳安縣西林木森翠波流澄澈映石如錦冠軍呉喜曰名山美石故不虛賞浙江在州南十里新安東陽水合流入江洞溪一名紫溪水自此溪至於潜有十六瀬嚴灘乃第二瀬也七里灘距州四十餘里與嚴陵瀨相接諺云有風七里無風七十里謝靈運七里瀬詩自覩嚴子瀨想属任公釣井泉孝子泉九域志州民夏孝先䘮父廬於墓側嘗有野火奄至俄而火為之㓕尋復涌泉出其地亭榭環溪亭在郡中方干詩為是仙才登望處風光便似武陵春閑花半落猶迷蝶白鳥䨇飛不避人樹影興餘侵枕簟荷香坐乆着衣巾暫來此地非多日明日那容借冦恂千峰榭在州宅自唐有之范希文喜登後名思范方干詩豈知平地似天台朱户深沉别徑開曵響露蟬穿樹去斜行沙鳥向池來窓中早月當琴榻墻上秋山入酒盃何事此中如世外應縁羊祜是仙才祠廟嚴先生祠在釣臺先生名光字子陵漢光武少與光同㳺學及即位首以物色訪之得於齊國累召不至拜諫議不受去耕釣於富春山今有釣䑓祠堂又作九隴寺以奉香火子陵本姓莊避明帝諱改姓嚴范希文作祠記云先生漢光武之故人也相尚以道及帝握赤符乘六龍得聖人之時臣妾億兆天下孰加焉惟先生以節髙之既而動星象歸江湖得聖人之清泥塗軒冕天下孰加焉惟光武以禮下之在蠱之上九衆方有為而獨不事王侯髙尚其志先生以之在屯之初九陽德方亨而能以貴下賤大得民也光武以之盖先生之心出乎日月之上光武之器包乎天地之外微先生不能成光武之大微光武豈能遂先生之髙哉而使貪夫亷懦夫立是大有功於名教也某來守是邦始構堂而奠焉乃復為其後者四家以奉祠事又從而歌曰雲山蒼蒼江水泱泱先生之風山髙水長吕伯恭記明道二年范文正自右司諫守是邦始築屋祠先生而為之記瀬之旁白雲源乃唐人方處士故廬文正公之遊釣臺也嘗絶江訪其遺跡以其象寘祠之左文正公殁郡人思之遂侑食於右坐古跡釣臺在桐廬西南二十九里東西二䑓各髙數百丈西征記自桐君祠而西有羣山蜿蜒如兩蛇對走於平野之上三江之水並流於兩間驚波間馳秀壁䨇峙上有東漢故人嚴子陵丨丨孤峯特操聳立千仞奔走名利汨沒為塵埃客一過其下清風襲人毛髪豎立使人有芥視功名之意權載之詩云絶頂聳蒼翠清湍石粼粼先生晦其間天子不得臣潜驅東漢風日使薄者淳焉用佐天下持此報故人許渾詩潮去潮來州渚春山花如綵草如茵嚴陵臺下桐江水解釣鱸魚有幾人范希文詩漢包六合網英豪一箇冥鴻惜羽毛世祖功臣三十六雲臺争似丨丨髙黄魯直詩平生乆要劉文叔不肯為渠作三公能令漢家重九鼎桐江波上一絲風又詩古風蕭索不言歸貧賤交逰富貴希世主若非天下量嚴陵那得釣魚磯潘德乆詩貂蟬未必似羊裘出處當年已熟籌既有諸公依日月不妨老子卧林邱英雄陳迹千年在香火空山萬木秋堪笑紅塵吹帽客要來祠下繫行舟項安世題丨丨詩二首辣闒山頭破草亭只須此地了生平﨑嶇狹世才伸足又被劉郎賣作名君房足下竟成諛只有韓歆已被除豈有江湖釣竿手與君䑓閣奉文書朱文公水調歌詞云不見嚴夫子寂寞富春山空餘千丈巖石髙挿碧雲端想象羊裘披了一笑兩忘身世來把釣魚竿不似林間翮飛倦始知還中興主功業就鬢毛班驅馳一世豪傑相與濟時艱獨委狂奴心事不羡癡兒鼎足放去任踈頑爽氣動星斗千古照林巒朱池距城三十里朱買臣有祠名宦房琯明皇雜録云開元中丨丨之宰桐廬也邢真人和璞自太山來琯虚心禮敬因以携手閑歩行數十里之夏口村過一廢佛寺松竹森映和璞坐於松下以杖叩地令侍者掘數尺得一瓶子瓶中皆是婁師德與永公書和璞謂房曰省在此乎方記其為僧時永公即房之前身也蘇子瞻詩夏口甕中藏畫像謂此杜牧號紫微為守皇朝范仲淹以論廢郭后出知睦州趙抃為殿院求郡得睦胡寅以待制知州張栻為守陸游為守人物嚴光詳見前祠記方干故居在白雲源其子孫登科知名者相繼范希文詩風雅先生舊宅存子陵䑓下白雲村唐朝三百年冠盖誰聚詩書教子孫公又有詩與方楷曰髙尚繼先君巖居與俗分有泉皆漱玉無地不生雲鄰里多垂釣兒孫半属文幽蘭在深處終日自清芬皇甫湜新安人以卞急數忤同省至不容於朝其分司東都也適遇裴晉公以德量禮士因修福先寺求文於白樂天而湜怒其舍已逮援筆立就厚贈遺之復怒以為薄公謝之韓愈寄丨丨丨詩敲門驚畫睡問報睦州吏手把一封書上有皇甫字拆書放床頭涕與淚埀泗昏昏還就枕惘惘夢相值悲哉無竒術安得生兩翅皇朝江公望徽宗初任左司諫抗䟽極論時政及宫禁事坐廢終身詹良臣以罵方賊死子大方後為簽樞王縉並郡人為右司諫與江諫議並以風節著題詠瀟洒桐廬郡范希文云云烏龍山靄中使君無一事心共白雲空不聞歌舞事又瀟洒桐廬郡家家是道情云云遶舍石泉聲浙水半江分方干呉山中路斷云云湍險方自兹晏公類要浙江潮信至桐廬其水泝流故任彦升詩云滄江路窮此云云疊嶂易成響重以夜猿悲嵐翠撲衣裳杜牧詩水聲侵笑語云云夜潮人到郭張祐詩云云春樹鳥依山因君水更清劉長卿詩今日新安郡云云頻年經虎害翁卷送嚴州守詩云云人望使君來地重分旄節州清管釣臺部伍雜閩音許棠寄睦州侯郎中詩云下國多髙趣終年半是吟潮濤通越分云云曉郭雲藏市春山鳥䕶林東浮雖未遂日日至中心名是東南俗阜州張伯玉詩碧泉千脉㵼金溝云云任昉舊詩題縣壁賀齊髙壘照江流四六淛水上游嚴陵名郡近止朝廷隱然藩輔桐溪列壤木瀬横江䟽渥禁嚴分符新定眷東京漁釣之郷乃中興龍潜之邸辭闕未更於積日編居半雜於山林駈東已届於新封稔嵗尤艱於衣食氣象欎葱上聖肇興王之迹溪山瀟洒前賢餘髙世之風民淳事簡俗相尚於儉勤山髙水長郡素稱於瀟洒莭麾增重文正之遺愛猶存江水益清髙齋之餘風可挹嚴先生之清節山髙水長方處士之遺芬源深雲繞雖土嶢山瘠號民俗之素貧然勢便地親接皇畿而宻邇廬依桐姓之人幸逄仁政門扣睦州之吏忽遺素書呻嘆嘔吟宜朝傳而暮達撫摩涵養當月裕以嵗豐賣絲糶穀農未裕於養生割漆蒸茶人亦甘於逐末江隂軍江隂建置㳂革禹貢揚州之域於天文為須女之分呉地斗分野古延陵邑之地季札封于延陵故其地属呉秦漢以來郡則㑹稽呉郡縣則毗陵鄉則暨陽晉武置毗陵郡併置暨陽縣属焉梁敬宗時始於此置江隂郡及江隂縣隋廢唐置暨州南唐始建江隂軍皇朝嘗三廢為縣中興復為軍繼以知縣兼軍使及金人用兵復為軍其廢也並為毗陵属邑其復也皆為軍今領縣一治江隂事要郡名澄川保大元年招隱院記暨陽見沿革注申浦春申君所開今名申港風俗人秀而文葛邲貢院記得江山之助故其丨丨丨丨有淮楚之風故其人愿而循理長栰巨舶輻輳蔣靜黄田港閘記富商大賈丨丨丨丨夷蠙海錯魚塩果布之属丨丨城市故居民富饒井邑繁盛珠犀魚蠏之富黄田港記蘇子瞻賡唱大誇丨丨丨丨丨丨形勝左控姑蘇唐郁羣老建興寺碑云云右接毗陵東連海道向子豐奏劄邉臨大江正是下流北與通㤗相對云云西接鎮江最為控扼背山嚮江君山浮逺堂記蕞爾邑介於數大郡之間貢輸之入不能當他郡之十二三惟云云風物殊勝山川黄山在軍治之北六里其峯如席帽相傳其下乃郭璞宅青山在江陰縣西十里有干將鑄爐九所君山在軍北澄江門外盖軍之鎮山也上有松風亭下有寺暨陽湖在江隂東十五里香灣十國紀年呉徐温張可淙以江隂之兵敗呉越於丨丨即此井泉玉乳泉又有金沙泉劉握有詩堂亭江隂道院澠水燕談江隂北距大江地僻鮮過客將迎之煩所𨽻一縣民醇士簡士大夫謂丨丨為兩浙丨丨真樂土也䨇檜堂在郡治後張安國書清白堂在郡圃浮逺堂在君山上取蘇子瞻江逺欲浮天之句北臨大江南望城市東睨鵝鼻西俯黄田號為勝槩孫覿詩月墮山城晚沙寒水國秋雲根㧞地起氷柱觸天浮紫翠分鰲嶺青紅雜蜃樓舟船通萬里城郭數三州練江亭在郡圃子城上楊公濟詩晚日蕭蕭聞落葉晴天歴歴數飛鷗翠光亭蔣静詩君山堆翠出危尖練水浮光照短簷古跡釣臺在縣東南二十里其石廣一丈三尺舊經云即姜太公釣魚之所石虎石橋東有石如虎相傳王氏開酤每夜失酒道人過之曰山際有石如虎為祟即鑿其足虎今猶存聖跡聖英祠劉遴之神録曰或曰魚子英廟按列仙傳子英英鄉人因捕得一魚愛之養以榖食後遂生角翅天忽雨子英上魚背騰空而去名宦李嘉祐為江隂令皇朝楊蟠為江隂僉判人物庾冰有宅今為祥符寺題詠鄉多釣浦人方干送江隂霍明府遥遥去舸新浸郭葦兼蘋樹列巢灘鶴云云江分陽羡雨浪隔廣陵春知竟三年化琴書外是貧孤城對海安李嘉祐詩萬室邉江次云云朝霞晴作雨濕氣晚生寒魚蝦接海隨時足朱昌叔寄王介甫憶江隂詩云城上城隍古鏡中城邉山色翠屏風云云稻米連湖逐嵗豐太伯人民堪教育春申溝港可䟽通萬里風檣看賈舡王介甫酬朱昌叔黄田港口水如天云云海外珠崖常入市人間魚蠏不論錢四六眷惟申浦實控江津雖云斗大實禦風寒裂地雖微去天為近乃眷江城素稱道院雖江隂之小壘實浙右之要區以江城之斗大當海道之風寒昔者為邦僅曰雷封之小今焉陞郡亦唯引壘之微征商稅畆特如劇邑之封送使留州僅足公家之用人近珠犀之市頗亦富饒郡居魚蠏之鄉未為岑寂封疆狹小實分輔郡之魚符節制尊嚴兼縂戍江之虎士雖江流之天險足壯蕃宣然海道之風寒當嚴偹禦考葛相貢闈之記有取其文觀荆公港口之詩欲求此郡天近帝畿已覺王公之貴冠名道院諒无刺史之難江環海繞巨艘長筏之畢輸地僻海迃駟馬髙車之罕至負海瀕江外控臨於淮甸連呉引楚内屏蔽於京畿方輿勝覽卷五
