body:
  text: 方輿勝覽卷三十宋祝穆撰常德府武陵龍陽桃源沅江建置沿革禹貢荆州之域星土為翼軫鶉尾之次殷周為蠻蛋所居春秋戰國時屬楚秦為黔中郡漢更武陵郡今州是也梁置武州隋改為辰州煬帝更武陵郡唐因之復為朗州昭宗置武勝軍節度後唐為武平郡國朝祥符避聖祖諱改鼎州升永安軍改靖康軍升武平軍節度乾道以孝宗潛邸升為常德府今領縣四治武陵事要郡名古鼎舊名鼎以神鼎出于此故名武陵晉書潘京丨丨漢夀人辟主簿太守問曰貴郡何以名武陵京曰本名義陵在辰陽縣界與夷獠相接光武移東山遂得完共議易號傳曰止戈為武詩注髙平曰陵於是名焉義陵初項羽殺義帝於郴武陵人縞素哭於招屈亭髙帝聞而義之故曰丨丨常武詩序有常德以立武事風俗人氣和柔伍安貧武陵記云云多淳孝少宦情以黃老自樂有虞夏之遺風信鬼而好巫屈原九歌云昔楚南郢之邑沅湘之間俗云云其祠必作樂鼓舞以樂諸神以漁獵山伐為業西漢地理志云云形勝東抵洞庭樓圖南奏狀云云西接夜郎右控五溪郡志云云沅湘之濵劉禹錫為鼎州司馬上杜司徒求澧陽曰云云寒暑一候陽雁不到華言罕聞古黔中地郡志在昔黔中為楚之南宇左包洞庭之險右控五溪之要秦以虎狼之威志在吞楚而必欲得楚之黔中故楚由是衰武陵實黔中郡也故郢之裔邑劉禹錫楚望賦武陵云云夜郎諸夷雜居乃張若之遺址郡縣志在州東五十步初秦昭王使白起伐楚張若築此城以拒楚自義陵移治武陵今州東是也桃源八景如桃川仙隱白馬雪濤緑蘿晴晝梅溪煙雨尋陽古寺楚山春晚沅江夜月童坊曉渡亦一方之佳致也提舉五州兵馬乾道九年府守樓圖南奏本府東抵洞庭盜賊之所淵藪西鄰夜郎蠻夷之所巢穴乞依舊丨丨鼎澧辰沅靜丨丨丨丨盜賊節推兼提舉山川柱山宋起居注云元嘉中武陵大水丨丨崩聳石闕其髙數丈宛若雕刻元和郡縣志一名善德山在武陵縣東九里此山本名柱山開皇中刺史樊子蓋以善卷嘗居此名善德山武山山半有盤瓠石水出謂之武陵溪梁山在武陵縣北三十九里舊名陽山按舊注云陽山之女雲夢之神嘗以夏首秋分獻魚唐天寶六載始改丨丨漢梁嵩廟食于此故以名山桃源山在丨丨縣二十里圖經云山下有桃川宫西南一里即桃源洞云是昔秦人避亂之地有洞如門巨石屏蔽靈迹猶存有水自中流出涓涓不絶陶潛桃花源記云晉太元中武陵人捕魚為業沿溪行忽逢桃花夾岸芳華鮮美落英繽紛漁人異之前行盡水源便得一山有小口捨舟從口入豁然開朗屋舍儼然有良田美池桑竹之屬男女衣著悉如外人黃髮垂髫見漁人驚問還家設酒殺雞作食自云先世避秦時亂來此問今是何世乃不知有漢無論魏晉停數日辭去得其船便扶向路處處志之及郡下詣太守説如此太守即遣人隨其往迷不復得路後遂無問津者任安貧武陵記晉太康中武陵漁人黃道真泛舟自沅泝流而入道真既出白太守劉歆歆與俱往則已迷路與陶記略同李白尋桃源序水引漁者花藏仙溪春風不知從來落英何許流出三十六洞别為一天耶陶潛敘桃源事初無神仙之説梁任安貧為武陵記亦祖述其語耳後人不深考因謂秦人至晉猶不死遂以為地仙洪駒父云介甫桃源行子瞻和桃源詩皆得之王摩詰韓退之劉夢得諸人以為神仙皆非是陶潛詩嬴氏亂天紀賢者避其世黃綺之商山伊人亦云逝往迹寖復湮來區遂蕪廢相命肆農耕日入從所憩桑竹垂餘蔭菽稷隨時藝春蠶收長絲秋熟靡王稅荒路曖交通雞犬互鳴吠俎豆猶古法衣裳無新製童孺縱行歌班白觀遊詣草榮識節和木衰知風厲雖無紀厯志四時自成嵗怡然有餘樂于何勞智慧竒蹤隱五百一朝敞神界淳薄既異源旋復還幽蔽借問逰方士焉測塵囂外願言躡輕風高舉尋吾契子瞻和陶淵明詩凡聖無異居清濁共此世心間偶自見念起忽已逝欲知真一處要使六用廢桃源信不逺藜杖可小憩躬耕任地力絶學抱天藝臂雞有時鳴尻駕無可稅苓龜亦晨吸狗把或夜吠耘樵得甘芳齕齧謝炮製子驥雖形隔淵明已心詣髙山不難越淺水何足厲不知我仇池髙舉復幾嵗從來一生死近又等癡慧蒲澗安期境羅浮稚川界夢往從之遊神交發吾蔽桃花滿庭下流水在户外却笑逃秦人有畏非真契韓愈桃源圖行神仙有無何渺茫桃源之説誠荒唐流水盤回山百轉生綃數幅垂中堂武陵太守好事者題封逺寄南宮下南宮先生欣得之波濤入筆驅文辭文工畫妙各臻極異境恍惚移於斯架巖鑿谷開宮室接屋連牆千萬日嬴顛劉蹶了不聞地坼天分非所恤種桃處處惟開花川原逺近蒸紅霞初來猶自念鄉邑嵗久此地還成家漁舟之子來何所物色相猜更問語大蛇中斷喪前王羣馬南渡開新主聽終辭絶共悽然自説經今六百年當時萬事皆眼見不知幾許猶流傳爭持酒食來相餽禮數不聞尊俎異月明伴宿玉堂空骨冷魂清無夢寐夜半金雞啁哳鳴火輪飛出客心驚人間有纍不可住依然離别難為情船開棹進一回顧萬里蒼蒼煙水暮世俗寧知偽與真至今傳者武陵人王介甫詩望夷宮中鹿為馬秦人半死長城下避世不獨商山翁亦有桃源種桃者一來種桃不計春採花食實枝為薪兒孫生長與世隔知有父子無君臣漁郎放舟迷逺近花間忽見驚相問世上空知古有秦山中豈料今為晉聞道長安吹戰塵春風回首亦沾巾重華一去無消息天下紛紛經幾秦劉商詩桃花流出武陵洞夢想仙家雲樹春今看水入洞中去却是桃源洞裏人古汴高士詩山前溪是當時水源上桃非舊日花多是黃郎露消息洞門從此鎖桃花劉禹錫桃源行漁舟何招招浮在武陵水拖綸擲餌信流去誤入桃源行數里清源尋盡花綿綿踏花覔徑至洞前洞門蒼黑煙霧生暗行數步逢虛明俗人毛骨驚仙子爭來致詞何至此須臾皆破氷雪顔笑言委曲問世間因嗟隱身來種玉不知人世如風燭筵羞石髓勸客餐燈熱松脂留客宿雞聲犬聲遙相聞曉光蔥蘢開五雲漁人振衣起出户滿庭無路花紛紛翻然恐失鄉縣處一息不肯桃源住桃源滿溪水似鏡塵心如垢洗不去仙家一出尋無蹤至今流水山重重王維桃源行漁舟逐水愛山春兩岸桃花夾古津坐看紅樹不知逺行盡清溪忽值人山口潛行始隈隩山開曠望旋平陸遙看一處攢雲樹近入千家散花竹樵客初傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳靜日出雲中雞犬喧驚聞俗客爭來集競引還家問都邑平明閭巷掃花開薄暮漁樵乘水入初因避地去人間及至成仙去不還峽裏誰知有人事世上遙望空雲山不疑靈境難聞見塵心未盡思鄉縣出洞無論隔山水辭家終擬長逰衍自謂經過舊不迷安知峰壑今來變當時只記入山深清溪幾度到寒林春來遍是桃花水不辨仙源何處尋漁隱叢話載子曕云世傳桃源事多過其實淵明所記止言先世避秦來此則漁人所見似是其子孫非秦人不死者也又云殺雞作黍豈有仙而殺者乎使太守得而至焉則已化為爭奪之場久矣緑蘿山在桃源縣南下有潭聞山在武陵縣西百四十里武陵記曰昔臨沅人黃道真在此山釣魚見桃花源即陶潛所記是也白馬洞第三十五洞天樊坡在武陵縣北八十九里後漢丨重隱於此有肥田數千畝橘洲在龍陽縣北五十里周回三里按盛𢎞之經云李衡字平叔仕吳為丹陽太守每欲理産業妻習氏不許衡密遣人於武陵龍陽泛洲種橘千株臨終謂其子曰汝母惡吾營家故貧如此吾於泛洲種橘乃千頭木奴不費汝衣食太史言江陵千株丨其人與千户侯等蓋謂此也今丨上民數百家橘不存矣玉帶河端拱元年太守龔頴嘗篆秀水斗門四字熙寧中有神仙海蟾翁劉易逰斗門曰此秀水河乃武陵郡一條玉帶也他年必有繫玉帶之人故又謂之丨丨丨熙寧中章子厚來平辰州蠻寄居張待制頡為章條畫蠻事及章歸朝起復張充東南發運使仍畀以白玉帶一條延溪寰宇記云在武陵縣有柘樹千餘頭枝條茂暢昔有烏集其上枝下垂著地烏去枝偶振折羣烏號嘯楚人取其枝為弓名曰烏號武陵溪在縣西二十里亦名德勝泉五溪司馬錯為秦將定黔中據城以厄丨丨酈道元水經注武陵有五溪謂雄溪樠溪酉溪蕪溪辰溪是為蠻夷所居謂之丨丨蠻朗水在武陵縣其水西南自辰錦州入郡界經郡城入大江謂之丨江漢書何邵所封於此沅水經武陵南二十步枉水出武陵縣南蒼山名曰枉渚善卷所居時人號曰枉水楚詞云朝發枉渚夕宿辰陽亦謂此也芷水即沅水之别派其兩岸多生杜衡并白芷仍以杜衡為材名西水在龍陽縣東百八十里漢志云武陵郡酉陽水所出滄浪水在龍陽縣二十里浪水與滄水合故名滄浪水寰宇記云在武陵縣西二水合流禹貢又東為丨丨之丨乃漁父濯纓之處鼎口寰宇記云在武陵縣有水名丨丨蓋沅澧二江最深之處尤多魚按朗陵地圖云昔有神鼎出乎其間井泉萊公泉在武陵縣北六十里皇朝類苑云鼎州甘泉寺介官道之側始冦萊公南遷日題于東楹曰平仲酌泉經此回望北闕黯然而去未幾丁晉公又過之題於西楹曰謂之酌泉禮佛而去後范諷留詩於寺曰平仲酌泉回北望謂之禮佛向南行煙嵐翠鎖門前路轉使髙僧厭寵榮詩牌猶存崔嶧詩云二相南行至道初記名留詠在精廬甘泉不洗天涯恨留與行人鑒覆車淳熙中南軒張敬夫榜曰丨丨丨亭榭招屈亭在城南相傳三閭大夫以五月五日由黔中投汨羅土人以舟救之為何由得渡湖之歌其名咸呼云何在佛寺甘泉寺麈史云在武陵縣北二十里許有丨丨丨行人多憩止焉寇萊公往雷州凡題三十字曰庚申年秋九月平仲南行至甘泉院僧以詩板視之征途不暇吟詠代記年月後丁晉公謫朱崖過寺留題云翠影人疏度波光瑟瑟凝帝家金掌露仙署玉壺氷曉井侵星汲宵厨向月澄豈惟蠲肺渴灌頂助三乘因而至寺下者多所賦詠祠墓伏波祠劉禹錫詩蒙蒙篁竹下有路上壺頭漢壘麏鼯泣蠻煙暮雨愁安義王廟在武陵縣之梁山即梁松也劉禹錫陽山廟觀賽神詩漢家都尉始征蠻血食于今配此山春申君墓在開元寺丨丨坊即其故宅杜牧詩烈士思酬國士恩春申誰與快幽魂三千賓客總珠履欲使何人殺李園古迹采菱城在桃源縣武陵記云其湖産菱殼薄肉厚味特甘香楚平王嘗采之有丨丨亭張顛墨池龍陽淨照寺有小池乃張旭學書于此名宦馬援征五溪蠻以薏苡能辟瘴而食之其後載數車還有讒之者以援所載皆文犀蠙珠也李翺字習之為朗州刺史今有文集在郡齋劉禹錫居朗州十五年惟以文章吟咏陶冶情性作為新詞以教巫祝故武陵溪洞間夷歌多禹錫之詞黃蓋吳人為武陵太守擊蠻有功劉伯寵為太守皇朝薛居正國初平湖湘以居正知郎州有亡卒數千為盜監軍使疑城中釋子為應欲盡殺之居正以計緩其事因擒賊首汪端詰之乃知釋子千數無與謀者咸得免唐介嘗為武陵尉繼為沅江令人物善卷武陵縣東一十五里柱山之上有丨丨壇按南華真經云舜以天下遜於善卷曰余逍遙於天地之間而心意自得吾何以天下為哉遂不受而去古傳丨丨隱此山後人為之立觀國朝政和間訪天下道迹賜號曰遁世髙踏先生郡守李燾嘗為壇記劉禹錫詩曰先生見堯心相與去九有斯民説已治我得安林藪道為自然福名是無窮夀瑶壇在此山識者嘗回首伍安貧梁朝漢夀人撰武陵記皇朝管師復自號白雲先生又弟師常齊名號二管陳公襄以公與伊川經明行修荐為學官栁拱辰其先青州人五季避地荆楚為武陵之青陵人年六十即有挂冠之志創亭於青陵館名橋曰歸老南豐曽鞏為之記題詠百雉俯清沅劉禹錫詩西漢開支郡南朝號戚藩四封當列宿云云茗坼蒼溪秀蘋生枉渚暄李衡墟落存前人沈約臺榭故云云西南奠遐服劉禹錫司馬錯故城詩將軍將秦師云云故壘清江上蒼煙晦喬木楚塞鬱重壘蠻溪紛詰曲蠻陬相犬牙劉禹錫登武陵城詩星象承鳥翼云云俚人祠竹節仙洞閉桃花十見蠻江白芷生劉禹錫酬朗州崔員外昔日居鄰招屈亭楓林橘樹鷓鴣聲一辭御苑青門路云云百姓縣前挽魚罟劉禹錫龍陽歌縣前白日無塵土云云武陵控扼五溪徭皇朝大觀初楊川詩云云路入京城萬國朝石匱雄排抗水勢浮圖高聳接雲霄四六光奉渙恩出臨常武潛龍舊邸分虎新綸剖竹新疆種桃遺俗總提列戌彈壓五溪報武陵之善政賦仙洞之新篇惟今南楚之上遊式據重湖之舊壤左連川蜀舟車之衝右控辰沅溪洞之險雲蒸秦洞之桃香泛沅川之芷眷今股肱之名郡為古神仙之舊遊利兵堅甲兼制五州大纛髙牙長維千里挹江芷之香風悉為德化酌溪桃之流水總是恩波青草洞庭無復鯨鯢之為患桃花流水又皆雞犬之相聞專城剖竹雖逺控於蠻溪流水種桃乃幸鄰於仙境農桑千里劇談太守之風流雞犬萬家依舊仙源之和樂澧州澧陽石門安鄉慈利建置沿革禹貢荆州之域為翼軫鶉尾之次春秋戰國皆屬楚秦屬黔中郡漢改為武陵郡屬荆州今州理即漢武陵之零陽縣地吳立天門郡晉置南平郡及南義陽郡陳廢郡置松州尋改澧州以州在澧水之北故以為名仍廢天門郡為石門縣尋改澧陽郡唐改澧陽郡復為澧州國朝因之今領縣四治澧陽事要郡名澧陽涔陽見屈原離騷風俗有屈原之遺風元微之行澧州刺史制澧旁荆之劇郡沅湘沉怨抑激云云南州美莫如澧栁宗元送南涪州移澧州序自漢而丨丨之丨者丨丨丨風俗夷獠唐戎昱頌水陸吳楚云云形勝東接洞庭樓大防澧陽樓記云云西連施黔右接巫峽陳相之郡守題名記左界洞庭云云衡嶽峙其前漢沔荆峴𢃄其後彭阜聳其西圖經云云藥山列其東蘭江前陳仙州外蔽所謂神仙窟宅也江陵在其北樓大防澧陽樓記武陵在其南云云湖廣之孔道倚連岡以起伏唐戎昱新城云云靣長江以演漾登觀則山川在目雄鎮則黔巫可航荆之近庸同上澧州云云國之南屏山川彭山丨丨廟碑曰崇山連天外界越雋岡阜靡迤如舞如馳遏千重之勢于洞庭之野屹瞰郡治並為丨丨蓋澧邦之所曕也藥山在澧陽縣南八十里昔多芍丨大浮山在澧陽縣西南一百三十五里圖經載石門縣亦有浮山以為浮邱先生學道之所蓋浮山濶逺跨據數縣也崇山輿地廣記云昔舜放歡兜於此黃山在安鄉縣北六十里有謝晦廟南麓有唐處士洪古墓栁宗元作志天門山在慈利縣寰宇記云古嵩梁山也有十六峯相次最高為天門空明透徹明貫山頂其上有泉門之兩向有竹罄折垂地搖拂無塵人謂天帚圖經慈利縣亦有丨丨丨五代有道之士周朴有題天門十六峰詩赤松山在慈利縣天門山相對耆老相傳以為赤松子隱遁之鄉舊有赤松庵而上下數十里號赤城村長嘯峰僧惟儼禪夜登山見雲開月現大嘯一聲聞數里李翺嘗贈詩花石在慈利縣武口寨石上自然有花如牡丹之狀枝葉繚繞雖精於畫者莫能及或以物擊其花應手而碎既拂拭之其花復見重疊非一莫不異之蘭江楚詞云捐余珮兮澧浦因稱珮浦又云澧有蘭故曰丨丨洳溪寰宇記在澧陽縣源出龍洳山極清昔楚莊辛説楚襄王飲丨丨之流是也雙溪在慈利縣乃前後江合流之口有芙蓉洲至菱花渡今為一邑之勝澧水在澧陽縣南六十步楚詞湘夫人曰遺余褋兮澧浦淡水在澧陽縣東二十里王仲宣詩悠悠丨澧水井泉廉泉在大同山唐人有銘池館明月池在郡圃東李羣玉逰息之地也八桂堂在州治胡明仲記以堂之前有一叢桂生八幹故名之譙門延平羅荐可為守日建胡明仲為記云古之為城也非曰必可恃也其為門也非曰必可鍵也蓋立制度焉耳茍得民心雖畫地而守植表而限效死者莫肯去冒死者不能入不然崇城到天嚴扉重閉金鋪而銅環鐵扇而石闕無以內固民心至于內携而外叛曽不若折栁之樊吾圃也澧陽舊苦衆溪羡溢嵗築隄防然後郊與市咸得奠厥居嵗在己酉南盜南騖有守者闕隄召水以自保賊既引去城亦隨陷他日立郡于荆榛瓦礫中天水時至沈灶産稚耋病之太守羅侯下車訪民疾苦莫先斯事即帥百姓修缺補壞乃作譙門徇民之欲閾內外謹闔開置壺箭以謹時棲鼓角以警軍匠則庸工役則鳩兵材則斬浮屠氏之山泛流以來未幾告成而民不與焉古迹隋朝柏在石門范希文詩百尺參天隋代柏可憐終老棟梁材范公讀書堂在安鄉縣范希文幼孤從母歸朱氏來宰安鄉與俱來讀書此地名宦彭思王諱元則高祖之子嘗為刺史民懷其惠至今祠之李泌字長源大厯中為澧州刺史更築新城澧人德而歌之戎昱為之頌杜悰以駙馬都尉為澧州刺史人物申鳴劉向新序曰楚士丨丨以孝聞王相之白公勝為亂申鳴曰始吾父之孝子也今吾君之忠臣也何以得全身遂殺白公其父亦死王欲賞之鳴遂自殺云白善將軍白公勝之族為楚將白公欲亂其國乃召之將軍曰從子而亂其國則不義於君背子而發其私則不仁於族遂棄其祿築圃灌園以終其身人名之曰丨丨丨丨藥園今其地在州東藥園寺車武子博學不倦家貧不常得油夏月練囊盛螢火照書江夏紀詠張俞有車湖詩云憶昔車公居此地遺黎繚繞臨清淵惜哉斷石文尚在野老不識投波瀾自為之注云武子墓下得碑其文尚存田父斷而沉之江則武子及墓皆在車湖上李羣玉裴休入相以詩荐之遂授校書郎題詠上有清使君唐戎昱作李泌新城頌云云下有清江流涔陽兮極浦庾信哀江南賦云云雄風吞七澤劉禹錫詩云云異産控三巴秋原被蘭蘂春渚長桃花夷音語嘲哳白居易詩云云蠻態舞睢盱水市通闤闠前人詩云云煙林混舳艫吏征魚户稅前人詩云云人納火田租謂冠漢南州樓鑰忠以申鳴著學首車公優外挹蘭溪水下俯仙明洲讀書記羣玉採藥思浮邱况得子厚語云云蘭浦蒼蒼春欲暮杜牧之詩云云落花流水動離襟澧水店頭春盡日白居易詩云云送君馬上適通川鄰境諸侯同舍郎劉禹錫詩云云芝江蘭浦恨無梁秋風門外旌旗動曉露庭中橘柚香新賜魚書墨未乾劉禹錫寄澧州元郎中詩云云賢人暫屈逺人安朝驅行斾頒時令夜見星辰憶舊官梅蘂覆階鈴閣暖雪峯當户戟枝寒寧知楚客思公子北望長吟澧有蘭一話涔陽舊使君杜牧登澧州驛寄京兆韋尹詩云云郡人回首望青雲四六疏恩楓扆紆紱蘭江湖右名州涔陽極浦澧浦小邦荆湖佳郡夷音嘲哳漁户腥膻訪文正之遺祠每懷賢德讀致堂之壁記當固民心士風甚陋地頗近於風寒郡計未優財尤難於天雨眷涔陽之極浦備著楚騷夸漢南之美州更陳栁序辰州沅陵辰溪盧溪淑浦建置沿革古蠻荆地槃瓠之後楚地翼軫分野春秋屬楚秦置黔中郡漢置武陵郡屬荆州而沅陵辰陽酉陽義陵皆以水得名東漢屬武陵郡三國時或吳或蜀自晉及宋齊並為武陵郡地隋改為辰州取辰溪為名煬帝改為沅陵郡唐復置辰州明皇改盧溪郡復為辰州皇朝熙寧中章子厚置沅州割辰之麻陽招諭二縣以𨽻焉今領縣四治沅陵事要郡名酉陽以水得名辰陽郡在辰水陽取辰溪為名風俗頗雜徭俗郡縣志夷獠雜居其處城市者衣服言語皆華人而山谷間丨丨丨丨裔出蠻瓠同上蠻瓠者蓋雄溪樠溪辰溪酉溪武陵之五溪蠻是也漢建武二十三年精夫相單程等叛劉尚擊之為所敗復遣伏波將軍馬援馬武等擊破之始乞降本朝太祖既下荆湖冇辰州徭人秦再雄者身長七尺武健多謀厯山飛塹捷如猿猱及至闕下除為辰州刺史官其一子使自辟吏屬盡與一州租田蠻徭遂皆向化大抵蠻徭種類狫不一挾山阻谷依林積木以為之居人迹罕至椎髻跣足登走巖險如履平地言語侏􅍣衣服斒孄畏鬼神喜淫祀刻木為契不能君長持弓挾矢匿草射人復讐報怨視死如歸板竹覆屋圖經云風俗尚治屋宇五溪俗誇辰州鬪屋今連甍接楝皆覆以板竹意古今貧富有不同也仰給鼎澧荆嶽風土記曰辰沅靖三州朝廷非有望其賦入也往時本路轉運使每嵗于鼎州撥支錢七萬貫絹二千五百匹紬四百匹布五百匹嶽州撥紬二千七百匹綿七十兩澧州撥絹一千匹綿一萬兩荆門軍撥絹一千匹以此當一嵗之計而沅靖所入亦稱是故兵廩贍給足以控制自紹興初湖盜踵相竊發之後而辰之嵗計不行支撥止于鼎州支錢四千五百貫自是官兵俸給日窘至隆興初守臣徐彭年有請于朝嵗添給二千緡終未能少紓其窘也形勝內控諸蠻咽喉辰州風土記云大抵辰當沅靖諸蠻咽喉出沒之地內可以控諸蠻而外為武陵障蔽諸蠻不由此則商販不通武陵不得此則諸蠻不通雖欲高枕而卧不可得也非古夜郎貞觀八年以龍標置敘州析其地為夜郎縣九年省以唐志考之奬州二峩山渭溪皆夜郎更名則龍標夜郎不𨽻辰久矣唐人以為夜郎者以其風聲氣習相近耳五溪十洞寰宇志按沅陵記云云頗為邊患自馬伏波征南之後雜為郡縣其民叛擾蓋恃險所致土産輸賨布古者蠻夷無稅漢興始以口計賦丨丨丨辰砂不出於辰辰砂本出麻陽縣唐以麻陽縣及開山洞為錦州今𨽻沅州不屬辰也其地産丹砂而砂井之名有九皆在猺獠窟穴之中而錦之舊城猶在焉遇嵗寒獠以薪竹燔火爆石以取之時出與土人貿易不知者以辰砂為辰所出也山川光明山在沅陵縣一名龍門山有砂井土人採取入井把火行二里燒石取之壺頭山在沅陵縣百三十里寰宇記云後漢馬援征蠻穿山為室以避炎氣武陵記曰山邊有石窟即援所居石室也明月山在沅陵縣東百三十里山下有明月池兩岸素崖若被雪寒松如插翠芋山寰宇記在沅陵縣山有蹲鴟如兩斛大食之終身不飢今民取之蔥山寰宇記在沅陵縣有孤山岩石上有蔥如人植人往取輒絶禱神而求不拔自出武陵記謂之蔥嶺武山在盧溪縣西百八十里後漢書南蠻傳云昔高辛氏有犬戎之寇帝患其侵暴而征伐不克乃訪募天下有能得犬戎之將吳將軍者賜黃金千鎰邑萬家又妻以少女有畜狗其毛五彩名曰槃瓠下令之後槃瓠俄銜人頭詣闕下羣臣怪而診之乃吳將軍首也帝大喜且謂槃瓠不可妻之以女又無封爵之道議欲報之而未知所宜女聞以為皇帝下令不可違信因請行帝不得已以女配槃瓠瓠得女負而走入南山石室中險絶人迹不至經三年生六男六女槃瓠死後因自夫妻好色衣服製裁皆有尾其母後歸以狀白帝於是使迎諸子衣裳斕斑言語侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷今長沙武陵蠻是也武山本作潕其五溪之一唐章懷太子注後漢云在今辰州之盧溪縣小酉山又名烏速山在酉溪口方輿記云山下有石穴中有書千卷秦人避地隱學于此梁湘東王謂訪酉陽之逸典是也耆舊相傳堯時善卷唐張果老皆嘗隱居于此又名為大酉華妙洞天或云自酉溪西北百餘里有洞五城山在辰溪縣東南三百六十里武陵記云楚威王使將軍莊蹻定黔中因山造此城無時山坤元録云在溆浦縣西北三百五十里此山之下蠻俗當吉慶之時親族會集歌舞於此五溪水經云武陵有五溪謂雄溪樠溪酉溪潕溪辰溪悉是蠻夷子孫後漢書注云今在辰州界元和郡縣志亦曰丨丨盡在辰州武溪在盧溪縣善類録曰馬援門生善吹笛援作歌以和之名曰武溪琮其曲曰滔滔武溪深復深鳥飛不能渡獸逰不能臨嗟哉武溪多毒淫辰溪即五溪之一也沅水在沅陸縣西南五里盧水在盧溪縣西二百五十里即武溪所出唐王昌齡作箜篌引云盧溪郡南夜泊舟夜聞兩岸羌戎謳溆浦在溆浦縣出鄜梁山祠墓善卷先生墓見莊周書有墓在辰溪縣西南龍溪觀本朝封塋立祠古迹銅柱銘在會溪城一里天福五年溪州刺史彭士狄納士求盟楚王馬希範請于朝以立之學士李皇為銘胡曽銅柱詩云一柱高標險塞垣南蠻不敢犯中原功成自合分茅土何事翻銜薏苡寃名宦宋均為辰陽長其俗少學者而信巫鬼為立學校禁絶淫祀皇朝張綸辰州溪洞蠻寇邊以綸知辰州賊遁去後擢為辰澧沿邊安撫諭蠻酋使修貢與之盟刻石于境上邵隆繫年録云紹興中在商州披荆棘立官府州界金人隆怏怏不已秦檜怒以隆知辰州名賢段成式唐人著酉陽書數十篇皇朝王庭圭胡銓鄉人也銓過海以詩送之曰癡兒不了公家事男子要為天下竒又云百辟動容觀秦牘幾人回首愧朝班得責辰州居題詠夕宿辰陽離騷朝發枉渚云云山留槃瓠迹晏類要云云洞有秦人書草市人朝醉陶弼云云畲田火夜明瀧江入地㵼棧道出雲行蠻帥引旌旗韓翊送辰州李中丞詩巴人迎道路云云入溆浦而邅回離騷云云一曲清溪一曲山陶弼題白霧壁云云鳥飛魚躍白雲間採金人簇青莎岸陶弼詩詔條符節古連今王澤漸濡豈不深賦役未行中國法謳歌猶帶逺夷音云云射虎兵圍黃葉林寄語湖頭灘上客預將忠信待浮沉四六出綸午位分竹辰陽湖右名區辰陽小郡被剖竹之新榮訪佩蘭之幽致一札十行寵被循良之選五溪十洞往宣彈壓之威朱幡皂蓋肯臨竹屋之蕭條丹詔紫沈即覲楓宸之嚴邃言語侏􅍣俗尚遺於蠻瓠威聲赫奕政當效於伏波衝蠻煙瘴雨於千嶂之間僕宜久處揖光風霽月於九霄之上公亦肯來方輿勝覽卷三十
