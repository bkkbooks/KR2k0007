body:
  text: 方輿勝覽卷三十四宋祝穆撰廣東路廣州南海東莞畨禺増城清逺新㑹懐集香山建置沿革禹貢揚州之域在天文牽牛婺女則越之分野兼得楚之交春秋時百越之地秦置南海郡趙佗自立為南海王漢因封之武帝既定越地以為南海蒼梧鬱林交阯九真日南珠崖儋耳郡按南海即秦故郡也属交阯刺史獻帝末孫權以歩隲為交州刺史遷州于畨禺即今之州理也孫休以交州土壤太逺廼徙交州理龍編分交州置廣州領郡十理畨禺晉因之安帝時盧循䧟畨禺執廣州刺史吴隠之自稱平南將軍為裕所敗宋齊皆為廣州理畨禺隋置縂管府改廣州以為畨州煬帝改為南海郡唐置廣州縂管府後以廣桂容邕安南五府皆𨽻廣州以廣州為嶺南五府莭度五管經畧使理所曰清海軍經畧使又曰桂管經畧使曰容管經畧使曰鎮南經畧使曰邕管經畧使名嶺南五管陞五管為嶺南莭度改為南海郡復為廣州自杜佑為嶺南莭度當兼五府經畧適執政者遺脱佑獨不兼唐末分為東西道改嶺南莭度使為東道莭度黄巢攻破廣州以士卒疾疫乃去掠湖湘賜東道為清海軍莭度皇朝平嶺南地歸版圗仍舊為清海軍莭度領廣南東路兵馬鈐轄帶本路經畧安撫使陞為帥府今統郡十四領縣八治南海畨禺二縣廣東轉運提舉廣南市舶置司事要郡名南海畨禺五羊羊城風俗質直尚信隋書地理志其俚人則云云椎髻箕踞同上其人性並輕悍云云乃其舊風胡賈雜居余安道知廣州謝表越臺之俗云云俗雜五方余安道羅漢院記畨禺大府莭制五嶺秦漢以来號為都㑹云云喜則人怒則獸見後昌黎韓愈送鄭權序云云下潦上霧馬援曰吾在浪泊西里聞虜未㓕時云云毒氣薫蒸仰視飛鳶跕跕墮水中黄茅瘴五代史成汭鎮荆門與宰相徐彦若不平銜之及彦若出鎮南海路過江陵汭思嶺外有丨丨丨患者髪落乃謂彦若曰丨丨丨望相公保重彦若應聲荅曰南海丨丨丨不死成和尚盖譏汭曽為僧也汭甚愧可以避地五代史劉隠傳唐末天下已亂中朝士人以嶺外最逺可以避地故多逰焉唐人皆客嶺表劉隠傳唐世名臣謫死南方者往往有子孫皆客嶺表賈胡齎貨許得已撰南海廟達奚司空碑云禺控引海外諸國賈胡嵗具大舶齎竒貨渉巨浸以輸中國鉅海敵其陽見後昌黎韓愈送竇平從事序云云五嶺峙其北蒋頴叔州學記云云大海環其東衆水滙于前羣峯擁于後氣象雄偉五嶺乃大庾始安臨賀桂陽掲陽也祝融之宅見後韓愈南海廟碑云云謂之嶺表類要廣南越分云云負山險阻西漢南越傳云畨禺云云南北數千里地控百粤史通云云境接羣蠻許致撰魏公遺愛碑逖彼畨禺去都萬里云云地居海涘環水而國以百數栁宗元集云云則統于押畨使焉以保南藩史記南粤叙傳集揚越云云以殿南服見後韓愈南海廟碑云云選帥重扵他鎮同上云云獨為大府韓愈送鄭尚書序嶺之南其州七十其二十二𨽻嶺南莭度府其四十餘分四府府各置帥然獨嶺南莭度為大府大府帥始至四府必使其佐啟問起居謝守地不得即賀以為禮嵗時必遣賀問致水土物大府帥或道過其府必戎服左握刀右属弓矢帕首袴鞾迎于郊及既至大府帥先入據館帥守屛若將趍入拜庭之為者大府與之為讓至一至再乃敢改服以賔主見適位執爵皆興拜不許乃止䖍若小侯之事大國有大事咨而後行𨽻府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多州島颿風一日踔數千里漫瀾不見蹤跡控御失所依險阻結仇黨機梳毒矢以待將吏撞搪呼號以相應和蜂屯蟻雜不可爬好則人怒則獸故常薄其征入簡莭而疎目時有所遺漏不究切之長養以兒子至紛不可治乃草薙而禽獮之盡根株痛斷乃止其海外雜國若躭浮羅流求毛人夷亶之州林邑扶南真臘于陀利之属東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中若嶺南帥得其人則一邊静治不相寇盗賊殺無風魚之災水旱癘毒之患外國之貨日至珠香象犀玳瑁竒物溢于中國不可勝用故選帥常重于他鎮非有文武威風知大體可畏信者則不幸往往有事戎服袴鞾迎于郊同上云云南海一都㑹隋地理志自嶺以南二十餘郡云云尉佗霸迹南齊志云丨丨餘基亦有丨丨土産鹽洪邁鹽倉記吾州南肘大海厥土廣鹵牢盆取贏百他郡珠香犀象玳瑁見韓愈送鄭尚書序云云荔支杜甫詩憶昔南海使奔騰獻丨丨山川畨山在南海縣南十餘里禺山在畨禺縣即尉佗葬處畨山在南禺山在北堯山在南海盛𢎞之荆州記頳巖迭起冠以青林郡國志云丨丨髙四千丈自畨禺迄交阯見之峡山在清逺縣東三十里崇山峻峙如擘太華中通江流廣慶寺居丨丨之中有殿甚古梁武帝時物也舊傳黄帝二庶子善音律採崑崙竹為黄鍾之管隠于此山祠在東廡詳見丨丨寺注寳山在東莞有銀場今廢猊山在増城東南二十里多婆娑羅竹圍三四尺至堅里人以為弓崑山在新㑹縣有道人卓菴扵上其巔有井崙山在新㑹縣上有白龍池羅浮山在南海本名蓬莱山一峯在海中與羅山合因名山有洞通勾曲又冇璇房瑶房七十二所裴淵廣州記云羅浮二山隠天唯石樓一路可登羅浮山記曰羅浮者盖二山縂名在増城博羅二縣之境靈洲山在南海南越志肅連山西十二里有靈洲焉其山平原彌望郭景純云南海之間有衣冠之氣者斯其地也唐志靈洲山在鬰水中有寳陁院蘇子瞻詩靈洲峯上寳陀寺白髪東坡又到来前世法曇今我是依稀猶記妙髙臺抱旗山在水南觀亭山一名中宿峡在清逺縣東三十五里譚子和修海嶠志云二月五月八月有潮上此峡逐浪返五羊一宿而至故曰中宿峡又云晉時縣人使洛有一人寄書云吾家在觀亭山石間懸藤即其處也還者如其言果有人出水與書同入泉中主禮畢遣出雖經潜泳水不沾濡石鼓山在東莞東南四百里南越志其土有亂則鼓鳴昔盧循来寇隠然有聲循敗大奚山在東莞海中有三十六嶼慶元間提舉徐安國捕鹽島民嘯聚為盗商榮用火箭射之賊遂大敗白水山在増城有五距鳥有瀑布四時不竭佛迹山在佛迹寺上有大盤石中有佛足獅子象迹宛然亂石山在蒲澗後杜審言詩乍將雲鳥極還與星河次山聳忽如飛下臨如欲墜九曜山郭功父詩畨禺城西偏九石名丨丨危根挿滄浪古魄鎮臨洮文茟峯在水南與州相對滴水巖在蒲澗上峭壁屹立飛泉下瀉勢若建瓴蘇子瞻詩千章古木臨無地百尺飛濤㵼漏天二巖在蒲澗寺後李羣玉詩五仙騎五羊何代䧏兹鄉澗有堯時韭山餘禹代糧楼臺籠海色草樹羨天香吟嘯秋光裏浮溟興甚長標幡嶺在峡山嶺上唐大厯間哥舒晃叛廣州遣將平之夢神人謂曰見幡即囬及賊平囬師果見掛二幡扵禺山上乃二神之助云石門在州西北二十里西山對峙横截巨浸漢樓船將軍楊僕將精卒破丨丨即其地南海在南海縣南沓潮劉禹錫集元和十年終風駕潮南海羨溢南人曰丨丨也率三更嵗一有之鰐湖在東莞之東監舊有鰐魚黄木灣韓愈南海廟碑云在州東十八里東溪在州東夹流皆刺桐郡人踏青之地牛潭一名金鎻潭在清逺縣東三十里秦時崑崙貢犀牛帶金鎻走入潭中菖蒲㵎在州東北二十里㵎舊有菖蒲一十九莭昔咸平中桃成甫採菊于丨丨丨側遇一丈夫曰此澗菖蒲昔安期生所餌可以忘老今有寺郭功父詩丨丨丨中生九莭流水遂作菖蒲香安期服之已仙去謾脱䨇舄留秦皇蘇子瞻詩云舊日菖蒲方士宅後来簷蔔祖師禪如今只有花含笑笑道秦皇欲學仙藥洲在西園之石洲郭功父獨逰丨丨懐頴叔修撰驅車欲何適獨往觀丨丨荒蘆喧鳥雀怪石森龍虬大亭挿層城玉虹跨深溝䨇門控西渚石門九星聚中流九曜石其名何壯哉像貌儼可求鋹王卷國去故物惟此留滄溟霸氣㓕落日孤烟浮空畦已無藥草蔓春柔柔常年一百五載酒傾城逰炎炎二聖作徳澤覃海陬大帥用文儒静鎮十五州請公握鴻筆刻蘚揮戈矛仍要水宫月一笑挹浮丘蓬莱自兹往穏踏金鰲頭荔支洲在南海東四十五里周廽五十里劉氏創昌華苑于上圎沙郡志昔有賴布衣改遷邑基留䜟云沙頭圎出狀元聖池在新㑹縣北二里山頂有塘花果不種而生樵夫採之輒雷雨貪泉在畨禺縣西二十里石門北岸郡國志吕嘉拒漢積石江中為門因名石門晉吴隠之為廣州刺史酌泉賦詩古人云此水一㰱懐千金試使夷齊飲終當不易心堂亭廣平堂在州治以宋璟得名十賢堂在子城上滕脩吴隠之王綝宋璟李商隠盧奐李勉孔戣賈鈞蕭倣八賢堂在十賢堂東潘美向敏中余靖魏瓘邵曄陳世卿陳從易張頡浴日亭在扶胥鎮南海王廟之右小丘屹立亭冠其巔前瞰大海茫然無際蘇子瞻詩劔氣峥嶸夜挿天瑞光明㓕到黄灣坐看𤾉谷浮金暈遥想錢塘湧雪山楊廷秀詩南海水為四海魁扶胥絶境信竒哉日從若水梢頭轉潮到占城國裏囬㝡愛五更紅浪沸忽吹萬里紫霞開天公管領詩人眼銀漢星槎借一来樓臺海山樓在城南陳去非詩百尺欄干横海立一生襟抱與山開岸邉天影随潮入樓上春容帯雨来石屏臺在經畧㕔西有池百餘歩池中列石其狀若屏或云南漢時玉液池也郭功父詩丨丨丨下玉池泉遶岸石屛青齒齒輦置應須費萬金園囿森羅供燕喜劉韔族盡已無餘此石猶存舊基址寺觀資福寺在東莞一百六十歩有羅漢閣蘇子瞻為之記蘇公又以犀帶并藏閣上及作舍利閣銘廣慶寺在峡山傳竒小説載廣徳中有孫恪者逰洛中遇袁氏艾遂納為室後十餘年因至峡山寺袁氏欣然改服理鬢詣老僧乃持一碧玉環獻僧曰是此院舊物僧初不曉及齋罷有野猿數十悲嘯捫蘿而躍袁氏惻然俄命茟題詩云無端變化㡬湮沉剛被恩情役此心不如逐伴歸躍山去長嘯一聲煙霧深詩畢遂裂衣化為老猿追嘯者附而去老僧方悟曰乃貧道為沙門時所養者碧玉環則胡人所施繫于其頸者也李翺詩傳者不足信見景勝如聞一水逺赴海兩山髙入雲魚龍晴自戲猿狖晚成羣醉酒斜陽下離心草自薫許渾詩夜醉晨方起孤吟恐失羣海鰌潮上見江鵠霧中聞未臘梅先實終冬草自薰樹随山崦合泉到石稜分虎跡空林雨猿聲絶頂雲蕭蕭異鄉鬂明月共絲棼薄暮㳂西峡停橈一訪僧鷺巢横卧栁猿飲倒垂藤水曲嵓千疊雲重樹百層山風寒殿磬溪雨夜舡燈灘漲危槎沒泉衝恠石崩中臺一襟淚嵗杪别良朋蘇子瞻赴恵州賦詩云天開清逺峡地轉凝碧灣我行無遲速攝衣歩孱顔山僧本幽獨乞食况未還雲碓水自舂松門風為闗石泉觧娱客琴筑鳴空山佳人劔翁孫逰戲暫人間忽憶嘯雲侣賦詩留玉環林深不可見霧雨埋煙鬟楊廷秀詩清逺望峡山山脚無半里小舟行雲間五日翆未已並馳兩青龍中夹一玉水送我到英州渠當自囬轡誰開峡山寺正要避世喧深潭無来路斷崖有青天療飢摘山果擊磬煩嶺猿人跡今擾擾只緣一漁船五仙觀在南海寰宇記昔髙固為楚相有五仙人騎五色羊各持榖穂一莖六出以遺州人騰空而去今呼為五羊其城周十里初尉佗築之後為歩隲脩之既而為黄巢所焚郭功父廣州五仙謡畨禺五仙人騎羊各五色手持六秬穂翺翔遶城壁翩然去乗雲諸羊化為石至今留空祠異像猶可識曽聞經猛火毫髪無痕跡五仙寕復来三説頗難測只憂風雨至半夜随霹靂君不見𦍑廬劉越之洞天萬象森羅無一尺祠墓南海廟東廟在州東即南海王廟西廟去城十五里盖勑封靈恵助順顯衛妃行祠也韓愈南海廣利王廟碑海扵天地間為物㝡鉅自三代聖王莫不祀事考扵傳記而南海神次㝡貴在北東西三神河伯之上號為祝融天寳中天子以為古爵莫貴扵公侯故海岳之祀犧幣之數放而依之所以崇極扵大神今王亦爵也而禮海岳尚循公侯之事虚王儀而不用非致崇極之意也由是冊尊南海神為廣利王祝號祭式與次俱升因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黄木之灣常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常莭度五嶺諸軍仍觀察其郡邑扵南方事無所不統地大以逺故常選用重人既貴而富且不習海事又當祀時海常多大風将往皆憂戚既進觀顧怖悸故常以疾為辭而委事扵其副其来已久故明宫齋廬上雨旁風無所盖障牲酒瘠酸取具臨時水陸之品狼籍籩豆薦祼興俯不中儀式吏滋不恭神不顧享盲風怪雨𤼵作無莭人蒙其害元和十二年始詔用前尚書右丞國子祭酒孔公為廣州刺史兼御史大夫以殿南服公正直方嚴中心樂易祗慎所職治人以明事神以誠内外單盡不為表襮至州之明年将夏祝冊自京師至吏以時告公乃齋祓視冊誓羣有司曰冊有皇帝名乃上所自署其文曰嗣天子某謹遣某官某敬祭其恭且嚴如是敢有不承明日吾将宿廟下以供晨事明日吏以風雨白不聼扵是州府文武吏士凡百數交謁更諫皆揖而退公遂陞舟風雨少止櫂夫奏功雲隂觧駮日光穿漏波伏不興省牲之夕載陽載隂将事之夜天地開除月星明穊五鼓既作牽牛正中公乃盛服執笏以入即事文武賔属俯首聽位各執其職牲肥酒香樽爵净㓗䧏登有數神具醉飽海之百靈祕怪恍惚畢出蜿蜿蜒蜒来享飲食闔廟旋艫祥飈送颿旗纛旄麾飛揚晻靄鐃鼓嘲轟髙管噭譟武夫奮棹工師唱和穹龜長魚踴躍後先乾端坤倪軒豁呈露祀之之嵗風災熄㓕人厭魚蠏五榖胥熟明年祀歸又廣廟宫而大之治其庭壇改作東西兩序齋庖之房百用具脩明年其時公又固往不懈益䖍嵗仍大和耋艾歌詠始公之至盡除他名之税罷衣食扵官之可去者四方之使不以資交以身為帥燕賞有時賞與有莭公藏私蓄上下與足扵是免属州負逋之緡錢十有八萬米三萬二千斛賦金之州耗金一嵗八百困不能償皆以丐之加西南守長之俸誅其尤無良不聼令者由是皆自重慎法人士之落南不能歸者與流徙之胄百二十八族用其才良而廪其無告者其女子可嫁者與之錢財令無失時刑徳並流方地數千里不識盗賊山行海宿不擇處所事神治人其可謂備至矣咸願刻廟石以著厥美而繫以詩曰南海之墟祝融之宅即我祀于旁帝命南伯吏惰不恭正自今公明用享錫佑家邦惟明天子惟慎厥使我公在官神人致喜海嶺之陬既足既濡胡不均𢎞俾執事樞公行勿遲公無遽歸匪我私公神人具依楊廷秀詩羅浮山如萬石鐘一股南走如渇龍雷奔電邁遮不住直抵海濵無去處低頭飲海吐綘霞舉頭仰戴祝融家珠宫玉室水精殿萬水一日朝兩衙青山四圍作城郭海濤半浸青山脚客来莫上浴日亭亭上見海君始驚青山缺處如玉玦潮頭飛来打䨇闕晴天無雲奔碎雪天下都無此竒絶大海更在小海東西廟不如東廟雄南来若不到東廟西京未睹建章宫海神喜我著綺語為我改容収霧雨乾坤軒豁未能許小試日光穿漏句趙佗墓在南海孫權使交趾求𤼵其墓卒不能得得其子嬰齊墓得珠襦玉璽之類古跡越王臺在州北悟性寺唐子西記云臺據北山南臨小溪横浦牂牱之水輻輳扵其下顧瞻則越中諸山不召而自至却立延望則海外諸國盖可髣髴扵溟濛杳靄之間陸龜蒙和皮日休寄南海詩城連虚踞山圗麗路入龍編海舶遙江客漁歌衝白荇野人貪語映紅蕉庭中必有君遷樹莫向空臺望漢朝交州記云有君遷樹有朝漢臺尉佗望海所築許渾登尉佗樓劉項持央鹿未窮自乗黃屋島夷中南来作尉任囂力北向稱臣陸賈功達磨井在悟性寺前梁達磨指其地曰下有黄金貪者力鑿泉渫而金亡甘泉池在州東北五里畨禺雜記云晉陸史君以海水味鹹導以給民唐莭度盧仝鑿山取泉以廣之名曰甘泉劉王花塢乃劉氏華林園在郡治六里名泮塘廣州古磚皇朝類苑魏侍郎瓘知廣州忽子城一角頽得古磚範四大字云委扵鬼工盖合而成魏也乃大築子城未㡬儂智髙寇廣外城一擊而摧獨子城堅完名宦鍾離牧意之孫仕吴遷南海太守陶侃仕晉為廣州刺史在州無事朝暮運甓常惜分隂吴隠之隆安中為刺史嘗酌貪泉賦詩滕脩為刺史獲一巨蝦鬚長四丈四尺王琨齊書琨為廣州刺史南土沃實在任者常致巨富世謂廣州刺史但經城門一過便得三十萬也琨無所取納表獻祿俸之半及罷任孝武知其清問還資多少琨曰臣買宅百三十萬餘物稱之帝悦其對宋璟邢州人開元初徙廣州刺史廣人以竹茅覆屋多火璟教之陶瓦築堵賈至為璟作遺愛碑云駕五管之政教總三軍之而鼓旗不怒而威不言而信雖有文身衣卉種落異俗化齊言語不通而心喻矣鄭權韓愈送鄭公序前叚見形勝注長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫往踐其任鄭公嘗以莭鎮襄陽又帥滄景徳𨽻厯河南尹華州刺史皆有功徳可稱道入朝為金吾將軍散騎常侍工部侍郎尚書家属百人無數畝之宅僦屋以居可謂貴而能貧為仁者不富之效也及是命朝廷莫不悦將行公卿大夫士茍能詩者咸相率為詩以美朝政以慰公南行之思韻必以来字者所以祝公成政而来歸疾也盧鈞擢嶺南莭度不取商舶珍貨時人稱其㢘㓗李勉拜嶺南莭度使素稱㢘㓗及召歸至石門盡捜家人所蓄犀珍諸物投諸江中孔戣初明州嵗貢淡菜蚶蛤戣奏罷之憲宗擢授廣州刺史陸鴻漸佐南海隴西公幕府自號也東園先生即廣州東郊園竇平韓愈送竇從事序云踰甌閩而南皆百越之地扵天文其次星紀其星牽牛連山隔其隂鉅海敵其陽是維島居卉服之民風氣之殊著在古昔唐之有天下號令之所加無異扵逺近民俗既遷風氣亦随雪霜時䧏疫癘不興瀕海之饒固加于初是以人之扵南海者若東西州焉皇帝臨御天下二十有二年詔工部侍郎趙植為廣州刺史盡牧南海之民署從事扶風竇平平以文詞進扵其行也其族人殿中侍御史牟合東都交逰之能文者二十有八人賦詩以贈之扵是昌黎韓愈嘉趙南海之能得其人壯從事之荅扵知我不憚行之逺也又樂貽周之愛其族叔父又能合文辭以寵榮之是為序皇朝向敏中知廣州至荆南市南藥以往以清徳聞馬亮知廣州冝賊未就戮上面遣之委以綏靖至則輯睦余靖廣之畨舶裝船舊皆取税公奏罷之以来逺商又請立法戒當任官吏不得市南藥及公北歸不載廣南一物方滋容齋四茟秦氏當國先忠宣公鄭亨仲胡明仲宋新仲皆在謫籍分置廣東方務徳為經畧待之盡禮秦頗云云客曰方之為人唯以周旋為志非獨遷客然也汪應辰通判廣州人物區冊韓愈送丨丨序前叚見連州愈待罪扵斯且半嵗矣有區生者誓言相好自南海拏舟而来升自賔階儀觀甚偉坐與之語文義卓然莊周云逃空虚者聞人足音跫然而喜矣况如斯人者豈易得哉入吾室聞詩書仁義之説欣然喜若有志扵其間也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭乎貧賤也嵗之初吉歸覲其親酒壺既傾序以識别題詠南斗避文星杜甫送李大夫赴廣州詩斧鉞下青冥樓船過洞庭北風随爽氣云云日月籠中鳥乾坤水上萍王孫丈人行垂老見飄零文章落上台杜甫送翰林張司馬南海勒碑冠冕通南極云云詔從三殿去碑到百蠻開漢節梅花外杜甫寄廣州叚功曹詩云云春城錦水邊葢海旌幢出韓愈送鄭尚書赴海南詩畨禺軍府盛欲説暫停盃云云連天觀閣開衙時龍戸集同上云云上日馬人来風静鶢鶋去官㢘蚌蛤廽貨通獅子國同上云云樂奏越王臺事事皆殊異無嫌屈大才邑里雜鮫人岑參送楊瑗尉南海詩縣樓重蜃氣云云海暗三山雨江明五嶺春毛㲲家家織王建送鄭權尚書詩戍頭龍腦鋪關口象牙堆云云紅椒處處栽榔葉瘴雲集張籍送蠻客詩云云桂枝鸞鳥聲逺人来百越劉真卿送徐大夫赴廣州詩云云元老事三朝霧繞龍川暗山連象郡遥海對羊城闊髙適送柴司户判官之嶺外詩云云山連象郡髙規外布星辰交廣間南極浸髙北極浸低圎規度外星辰至衆大如曜者數十皆不在星經元㣲之和樂天詩波心湧樓閣云云鳶跕路難登髙適餞宋判官之嶺外詩猿啼山不斷云云海岸出交趾江城連始興花鳥名皆别杜荀鶴送友人逰南海詩云云寒暄氣不均巨舶通蕃國張少愚廣州城樓詩朔風驚瘴海霧雨破蠻荒云云孤雲逺帝鄉海虚争翳翆許渾詩云云溪邏鬭芙蓉翆耀孔家禽張祐送蘇紹之歸嶺南詩夜月江流濶春風嶺路深珠繁楊氏果云云蠻唱與黎歌蘇子瞻將至廣州詩云云餘香猶杳杳石有羣星象余安道題廣州西園詩云云謂九曜石也花多外國香皆海舶来嶺北所無嶺南封管送圗經張籍送鄭尚書詩海北蠻夷来蹈舞云云此處莫言多瘴厲天邊看取老人星徴入中臺作侍郎韓愈贈馬總紅旗照海壓南荒云云梅花蠻草連天有張籍送侯判官詩云云行處無家不滿船經冬来往不踏雪朱慶餘詩越嶺向南風景暑人人傳説到羊城云云盡在刺桐花上行映日颿多寳舶来劉禹錫詩連天浪静長鯨息云云銅鼓臨軒舞海夷劉禹錫詩象筵照日㑹詞客云云百粤酋豪稱故吏十州風景助新詩外邑乳蕉花𤼵訟庭前皮日休送李明府五羊城在蜃樓邉墨綬垂腰正少年山静不應聞屈鳥草深從使翳貪泉蟹奴晴上臨潮檻燕婢秋随過海船一事與君消逺宦云云候吏多来拾翆洲陸龜蒙居人愛近沉珠浦云云賨税盡應輸紫貝陸龜蒙詩云云蠻童多學佩金鈎退公祗傍蘇勞竹皮日休送南海二同年詩云云移宴多随茉莉花人瞻颶母識隂晴余安道詩客聼潮鷄迷早夜云云黒面羌人耳帶環丘濬詩碧睛蠻婢頭蒙布云云㡬處樓䑓皆枕水四周城郭半圍山四六進職西清擁旄東廣䟽恩鳳闕入閫羊城申命紫宸宣威玉帳升班東觀宅牧南郊眷畨禺之古郡實嶺海之名藩島夷載新扵卉服滄海自息於鯨波髙牙指黄木之灣大幙開紅蓮之府念嶺嶠之地偏去闕庭之天逺宋廣平古之遺愛吴隠之直哉惟清舟車之㑹水陸之衝商旅所藏蕃猺所聚自晉唐置守僅數扵十賢而蕃漢錯居㡬重乎九譯威聲所暨掃清鯨海之波濤號令初傳改觀羊城之風物萬里鯨波既息宼攘之警千村犢佩各安耕耨之常戎服迎郊選帥夙推于大府鋒車載道覲君即簉于近班貪泉酌水已知隠之之心祥飈送颿佇應孔戣之召聞隠之貪泉之賦坐想清風續廣平徳政之碑佇攄逺業専方面十四城雞犬相聞制水屯數萬竈貔貅肅立地聨夷島象犀寶貨之川流境接閩山韋布衣冠之都㑹琱戈茸纛稱嶺外之雄藩衮衣繡裳仰海濵之大老使扶胥黄木之灣民皆自樂則甘泉紫荷之橐王曰遄歸肇慶府髙要四㑹建置沿革古百粤之地分野星土與廣州同本秦南海郡地漢武置蒼梧郡髙要以縣属焉東漢因之宋文帝創南海郡四㑹等縣置綏建郡梁立髙要郡隋廢髙要立端州煬帝罷端州為信安郡唐立端州以州當入廣西之要口也為髙要又以四㑹縣置南綏州改綏州為真州尋廢真州以四㑹縣𨽻廣州改髙要郡復為端州皇朝平嶺南地歸版圗以徽宗潜邸陞興慶軍莭度廣東運判燕瑛奏元係端州今為潜邸欲望親灑宸翰賜以美名遂賜名肇慶府仍為肇慶軍莭度今領縣二治髙要事要郡名古端端溪髙要見上注風俗土曠民惰郡國志不力扵耕同上云云惟運鹽鈔以為業夷獠雜居郡國志一日之間有四時龔茂良詩晴雲當午僧揮扇曉雨生寒人著綿此是嶺南天氣候日中常有四時天形勝北望頂湖圗經云云萬仭峙其後南瞻銅鼓同上云云四峯列其前白羊岡居其左腐柯山居其右州當西江口元和志丨丨丨丨入廣西要口土産端硯栁公權曰端州有溪曰端溪其硯有赤白黄色㸃者謂之鸜鵒眼或脉理黄者謂之金線紋郡志云有青紋者謂之音絛其短者謂之眼筯下巖石亦有之色㣲斑者謂之火黯下巖無此又有曰赤裂曰黄霞曰鐵線曰白鑚圎而深如鑚眼曰壓矢其色班駮其舊坑則有龍巖汲綆黄圃三石汲綆全無眼其新坑則有後厯小緗唐竇黄坑蚌坑鐵坑六處皆不及上三石蘇易簡硯譜端溪硯水中者石色青山半者石色紫山頂石尤潤如猪肝色者佳若匠者識山之脉理鑿一窟自然有圎石青紫色者琢而為硯可直千金謂之子石硯東軒茟錄魏泰曰端溪硯有三種曰巖山曰西坑曰後磨石石色深紫襯手而潤叩之清逺有青綠圎小鸜鵒眼乃巖石其次色赤呵之乃潤鸜鵒眼色紫紋慢而大此乃西坑石也其下青紫色向明側視有碎星光㸃如沙中雲母乾而少潤謂之後磨石西坑硯三當巖石之一後磨石三當西坑之一其品可知李賀紫石硯歌端州石匠巧如神露天磨刀割紫雲紗帷晝睡墨花春輕漚漂沫松麝薰昔丁寳臣知端州以詩送綠石硯扵介甫所謂玉堂新樣者介甫以詩報之云玉堂新樣世争傳况以蠻溪綠石䥴嗟我長来無異物愧君持贈有新萹久埋瘴霧看猶濕一取春波洗更鮮還與故人袍色似論心扵此亦同堅蘇子瞻硯銘千夫挽綆百夫運斤篝火下縋以出斯珍蠻布寰宇記有夷夏人織蕉竹苧麻都落等布以自給翆羽韓翊送端州馮使君玉樹羣兒争翆羽金盤少妾㨂明珠山川北山在城北七里峡山在城西二百里奢山在城南九十里上有砂夷人語說為奢爛柯山在髙要東三十六里峯頂常有紫霞按衢州亦有爛柯山盖二郡名信安衢在吴為信安則去王質時為近端名信安乃始扵隋不應載晉人事跡不可不辨此山産美石為硯銅鼓山在南岸府治之對山石室山在城北六里南北有聳石如二門土人謂之嵩䑓繆瑜竹記又有七星巖郭功父詩䨇峡天開控江水水自䍧牱来萬里端州正在䨇峡間石室嵩䑓壓孤壘扶盧山在四㑹縣東四十里上有池水相傳六祖嘗隠于此六祖姓盧故名三足山在四㑹縣西百五十里有人姓蘇仙者下巖在大江中又名北壁有龍潭硯㝡佳騰豻嶺在髙要縣山有人豻即沐猴之類似人髪覆面又有飛儡山翬龍子嶺又有鳳頭岡淳熙丁酉邑宰蘇邦平縣基得古碑乃鹿鳴燕士詩云龍嶺行歌龍已化鳳頭將見鳳齊鳴西江在髙要縣四㑹水東在古津南湞江西有建水北有龍江四水俱㑹故名新江水在髙要南六里源出新州端溪在髙要縣堂榭相堂在四㑹簿尉㕔先是郭其姓者作尉丞相梁克家嘗館焉故名此雲秀䑓在髙要西北八里祥符間五色雲現扵臺峯之上郡守范雍建古跡陳霸先墓在府治南五十里有茍逕山有載碑石龜其大數尺鵠奔亭干寳捜神記漢九江何敞為交趾刺史行部至蒼梧髙要縣暮宿丨丨丨夜未半有女子從樓下呼曰明使君妾寃人也妾本廣信縣脩里人嫁為同縣施氏妻薄命夫死有雜繒百二十疋及婢名致富之旁縣賣繒日暮為亭長龔夀操刀刺脇下乂刺致富立死合埋于樓下取財物而去故来訴告敞乃掘尸以騐令吏捕夀拷問具伏初𤼵尸時有䨇鵠奔其亭故名郭功父詩新江自南来西與端江滙屹然丨丨丨遺意溢千載桄榔亭李翺與監察御史韋君皆自東京来嶺南約偕行翺居信安四十餘日比及西江韋君已前行矣上丨丨丨見韋紀姓名且有念我之意李翺題名宦李紳唐人貶端州司馬皇朝鄭端義真陽人為守築外城有記陳堯叟詩話縂龜云丨丨丨知端州􅋈舟扵廬陵阻風數日有胡僧謂公曰骨方神清身當極貴但虎目猿聲當有攀附然後有所立因贈詩云虎目猿聲形㝡貴祗因攀附即升髙知君今向端州去願助清風泛怒濤包拯為守嵗貢硯前守所取輒数十倍以遺權貴公命製者纔足貢數嵗滿不持一硯歸郭祥正為守人物李積中寓居豫章良弼安國大性大異大理大東皆其後也譚惟寅梁榜乙科讀書一覽終身不忘題越井人南去賈至送陸協律云云湘川水北流西江瘴癘多張説端州别髙六詩南海風潮壯云云扵焉須判手此别傷如河四六昔號信安今稱髙要土風醇厚民物夥繁推髙要之潜藩乃炎荒之名郡地重潜藩亦是羊城之亞民歌政績即為鳳闕之歸不持一硯足知包孝肅之清来擁䨇旌已卜陳文忠之貴方輿勝覽卷三十四
