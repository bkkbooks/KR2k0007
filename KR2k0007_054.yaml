body:
  text: 方輿勝覽卷五十四宋祝穆撰彭州九隴濛陽崇寧建置沿革禹貢揚州之域秦地鶉首井鬼分野在周為彭國秦属蜀郡新繁縣属焉漢晉因之宋曰晉夀梁置東益州後周州廢置九隴郡隋郡廢後置濛州尋廢入蜀郡唐初又置濛州尋又廢以縣属益州尋分益州四縣置彭州始𨽻劍南道後分劍南為東西川而彭𨽻西州改濛陽郡又復為彭州後為威勝軍國朝平蜀來属今領縣三治九隴事要郡名濛陽彭門風俗其人敏惠隋地理志云云頗慕文學士多英才元符中袁騭東湖記地宜嘉禾云云美發西南聞于天下大旱不旱古語有云云蜀有彭漢以其土地沃饒也形勝號為斗城忠濟王楊晟守彭州王建來攻城晟曰此斗也比之郫邑益州記彭之土地肥良云云號小郫九峰高峙袁騭記云云濛水濬發湖分東西同上云云樓閣亭軒隠映於茂林修竹間小成都圗經云宋元嘉間有樵人扵山左見羣鹿引弓將射之有一麝所趍險絶進入石穴行數十步則豁然平衍邑屋連接阡陌交通問是何所有人答云丨丨丨後更往尋之不知所在土産牡丹彭門丨丨在今蜀為第一承平洛陽花最盛獨彭門有小洛陽之稱按酉陽雜俎隋朝文士集中無丨丨歌詩隋種植法七十卷丨丨亦不著録丨丨之號起唐天寳間而蜀亦未有成都記載偽蜀王氏宣華苑所植多自梁洋間移本秦州董城村僧院紅丨丨至掘土方丈盛以木匣厯三千里而致之及孟氏以丨丨名苑時彭門為輔郡典州者多其戚里得之上苑而彭門花之所始也天彭亦謂之花州而牛心山下謂之花村宋景文帥蜀以彭門丨丨錦被堆為第一山川彭門山兩峰如闕相去四十步名天彭門因以名州又曰彭祖出入此山因名彭門九隴山古彭州之西山一㐲隴二亘隴三秋隴四龍奔隴五走馬隴六駱駝隴七千秋隴八較車隴九横擔隴至徳山在郡西三十里上有廣明院蜀王衍專事逰幸嘗登是山患其高險今於福唐寺東别開一徑凡數里廣可二丈栽松砌石以達於寺從官悉騎以從松枯石恠尚有存者金城山在九隴縣西北五十里即二十四化之一大隋山在堋口鎮北三十五里昔神照禪師居之有瀑布張天覺記云西山之勝在彭門者大隋為甲中隋山在大隋山後又上三十里至光相閣三月半間掃去積雪峰頂下視葛仙白鹿大隋真培塿也白鹿山在濛陽縣西北二十里有大乗金覺禪寺本晉佛圖澄所建曲尺山在城北五十里有雲居院春時逰覽之所葛仙山有崇真觀在濛陽北四十里二十四化之第五化也葛仙翁璝楊仙翁昇賢於此得道大同中蒲仙翁髙逺復於此白日上昇梁武帝錫名上清觀劉孝先作碑以紀其事按成都記韋皋夢神人謂曰異日富貴無忘葛璝也後尹成都再夢乃復新觀宇化之東有明月宮千人龕洞穴八十一所及二十四峰有韋皋記羅江在九隴縣西北二十餘里東湖在倅㕔政和間眉山蘇元老頗加開浚西湖唐元和間守王潛蕭祐創瀘水丨丨在濛陽縣井泉夏氷泉在城北駱氏家池水清瑩為避暑之計樓閣南樓在郡圃中范百禄有記望雪樓在子城上古跡誓水碑集古録載秦李氷為蜀守鑿山導江以去水患其神怒化為牛出沒波上君操刀入水殺之因刻石以為五犀牛立之水旁與江誓曰後世淺無至足深無至肩謂之丨丨丨立在彭州名宦高適為彭州刺史皇朝馬知節年十八監彭州兵馬嚴飭見憚如老將李順之亂公討平之題詠彭門地里遙杜甫詩蜀路江干窄云云城勢誠斗絶唐蘇頲經三泉詩天彭信方隅云云忝曳尚書履叨兼使臣節巴牋染翰光杜甫寄彭州髙使君適虢州岑使君参詩有云彭門劍閣外虢畧鼎湖旁荆玉釵頭冷云云豈異神仙宅俱兼雲水鄉竹齋燒藥竈花嶼讀書床交情老更親杜甫簡高使君詩當代論才子如君復幾人驊騮開道路鷹隼離風塵行色秋将晚云云天涯喜相見披豁對吾真何時救急難杜甫寄高彭州詩百年已過半秋至轉飢寒為問彭州牧云云皂盖能忘折嶺梅杜甫集王侍御攜酒至草堂邀髙使君同到詩綉衣屢許攜家醖云云戯假霜威促山簡須成一醉習池廻今年復拜二千石高適春酒歌去年留司在東京云云盛夏五月西南行彭門劍門蜀山裏東來誰迎使君車蘇子瞻送宋朝散知彭州迎侍二親詩云云知是丈人屋上烏丈人今年二毛初登樓上馬不用扶使君負弩為前驅蜀人不復談相如老㓜化服一事無有鞭不施安用蒲春波如天漲平湖鞓紅照座香生膚幐韝上夀白玉壺公堂登歌鳳將雛諸孫微笑争挽鬚蜀人畫作西湖圖四六輟班漢闕出守彭門榮膺芝檢來涖花州人夸剖竹嘗經髙使君之吟俗善栽花亦有小洛陽之號漢州雒縣緜竹什邡徳陽建置沿革禹貢梁州之域秦地井鬼之分野秦属蜀郡漢分蜀郡為廣漢郡今州即廣漢郡之雅縣也後漢為益州刺史理所劉焉徙益州治於成都郡如故西漢分置新都國宋齊為廣漢郡後周至隋郡廢以其地併入蜀郡唐分益州雒縣等五縣復立漢州改為漢陽郡復為漢州今領縣四治雒縣事要郡名廣漢風俗土地沃美華陽國志以蜀郡廣漢犍為三蜀云云人士俊乂同上士為世師式三國時夏侯纂為廣漢太守纂問主簿王朴曰至於貴州養生之具實絶餘州矣不知士人何如餘州也樸對曰先漢以來其爵位或不如餘州乃若著作為世師式則不負於餘州也大亂不亂唐章仇置成都市刻誓文曰云云蜀有廣漢大荒不飢蜀有蹲鴟形勝西接汶山華陽國志云云北接梓潼東接巴蜀咽喉外蜀圖經云云而臂視諸郡浸以緜洛蜀都賦云云謂緜水洛水也蜀人稱郫繁曰膏腴綿洛為浸沃分巴割蜀華陽國志高帝分巴郡置廣漢郡武帝又兩割巴蜀郡置犍為郡故世本曰云云以成犍廣土産鵝兒酒杜甫詩鵝兒黄似酒對酒愛新鵝故陸務觀詩云兩川名醖避鵝黄乃漢中酒名蜀中無能及者山川章山在什邡縣又名洛通山華陽國志李水導洛水通於此龍居山在什邡縣有等慈院飛瀑千尺虚亭屹然橋横路轉萬柏擁翠大蓬山在什邡縣高崖矗天而立瀑布飛落最為竒觀有保聖院小蓬山在緜竹縣有石洞極䆳中有石柱左右隠出白龍十二蜿蜒如畫龍角山在緜竹北三十里以形得名紫巖山在緜竹縣去無為山十里皆西北勝絶處武都山在緜竹縣即蜀王妃所生之地蜀王本紀丨丨丨精化為女子顔色美絶蜀王納以為妃未幾物故乃發卒之武都擔土葬於成都郭中庚除山在緜竹縣二十四化之一山有石室二國初有霽雲子者入洞中見樓䑓金碧門者呵止之曰子凡骨可亟去不然及禍霽雲子囘後再入石洞遂迷故道東武山有江沲出白蓴為一州之最鴈江在雒縣南曽有金鴈故名又有鴈橋記云廣漢境中獨洛鴈二水最盛太史公河渠書著離堆而略洛口兩漢地理志名洛水而遺鴈水何耶房公湖又名西湖蘇子由詩酒壓郫筒憶舊沽花傳邱老出新圖此行真勝成都尹直為房公百頃湖玉妃溪在緜竹縣成都耆老傳載妃與五丁同生父母棄之溪中後聞呱呱之聲就視乃一女五男女即蜀文併妃男即五丁洛水在州東寰宇記水性剛直宜淬刀有犀橋大抵州境上下衆水皆會于金堂縣同出峽謂之内江緜水在雒縣東三十里源出緜竹縣紫巖山灌田頗廣井泉七星井相傳嚴君平鑿如北斗象八角井在什邡縣石碑鎮相傳龎真人浴丹於此患瘡者洗之立愈濯纓泉在什邡縣之水陸院上有閣范蜀公嘗留題程珦詩云丨丨丨潔存遺跡促軫亭空想舊風公暇未應無客會春逰更喜與民同堂榭清心堂在倅㕔文與可為倅日造房湖亭榭按壁記房相上元初牧此邦其時始鑿湖有詩存焉同時高達夫杜子美皆嘗賦詠李贊皇劉賔客相繼有作迨國朝程丈簡宋景文司馬文正趙清獻韓子蒼文與可留題者甚衆治平間郡守韓標叙云今亭館皆非房公時事房琯逰西湖詩高流纒峻隅城下緬邱墟决渠信浩蕩潭島成江湖結宇依囘渚水中還可居三伏氣不蒸四達暑自徂杜甫得房公池鵝詩房相西湖鴈一羣眠沙泛渚白於雲鳳皇池上應囘首為報籠隨王右軍趙閱道詩廣漢園池蜀所無却思房相未如吾淛東歸去君恩重乞得蓬萊與鑑湖王之望詩金鴈橋南二頃湖房公遺墨未烟蕪人逰杜牧晚晴賦境對王維别墅圖經始園林心自巧折衝廊廟術何迂當時只作幽人訃留得陳濤四萬夫宋子京詩丞相于蕃日疏湖訟閣西疑從濟川地冩出釣璜溪古跡蠶女冢在什邡緜竹徳陽三縣界每嵗祈蠶者雲集蜀之風俗塑女像披馬皮謂之馬頭娘以祈蠶焉初高辛氏有女子父為人所掠所乘馬其母誓於衆曰有得父還者以女嫁之馬聞其言振迅而去數日父乘馬歸自此馬嘶鳴不已父怒射殺之曝其皮於庭蹶然而起卷女飛去旬日皮掛桑上女化為蠶食葉吐絲成繭一日蠶女乘雲駕馬謂父母曰太上以我心不忘義授以九宮仙嬪矣名宦雍齒封什邡侯陳寵後漢人為郡守閻憲後漢人為緜竹令邑人夜行得遺錦平明送縣憲曰行得遺物是天賜也何為将來曰縣有明府犯此則慙蔣琬廣漢志云先主擢為什邡令許遜晉南人為徳陽令房琯為守開湖皇朝文同為倅有畫墨竹題詩云興來雷出土萬籜起崖谷今畫與詩皆亡矣程珦為守二子曰顥曰頤實侍焉公為郡日嘗以書幣請綿竹宇文之邵典學士人從學者甚衆邦人今繪三先生之像祠于學人物嚴遵字君平或云廣漢人詳見成都姜詩廣漢人姑好江水及魚妻每汲旦出雙鯉赤眉亂經詩里弛兵而過曰驚大孝必觸鬼神國朝賜廟曰孝感蘇子瞻詩廣漢有姜子孝弟行里閭赤眉雖豺虎弛兵過其墟至今空清泉無復雙鯉魚皇朝張浚字徳逺南渡以來士大夫唱為和議公毅然以敵未㓕為已責子栻號南軒張栻以䕃補官召為侍講諡宣公寓居長沙題詠召還當有詔蘇子瞻送周朝議守漢州詩茶為東南病氓俗記二李何人折其峰矯矯六君子君家尤出力流落初坐此謂當収桑榆華髮㸔劍履胡為犯風雪嵗晚行未已念歸誠得計顧自為謀耳吾聞江漢間瘡痏猶未起莫輕龔遂老君王付尺箠云云挽袖謝鄰里猶堪作水衡供帳園林美松桂影中旌斾色唐蔣防詩比來初入漢州城郭邑樓䑓觸目驚云云芰荷風裏管絃聲八年漢州為刺史陸務觀詩房公一跌叢衆毁云云遶城鑿湖一百頃島嶼屈曲三四里四六榮佩銅魚出臨金雁維今廣漢實古雒城元和宰相之舊逰紫巖先生之故里疏鑿成湖來訪房公之陳迹召還有詔願賡坡老之名篇登橋而訪君平挹河漢之逺派臨池而憶諸葛懐宇宙之大名綿州巴西羅江彰明鹽泉魏城建置沿革禹貢梁州之域周併於雍秦之分野鶉首之次秦属蜀郡漢分蜀郡為廣漢郡今州即廣漢郡之涪縣荐曰統睦東漢復曰涪縣劉備分廣漢郡立梓潼郡涪縣亦属馬宋為巴西梓潼二郡梁置西潼二州西魏别置潼川舊梓潼城在今劍州界隋文帝改潼州為綿州改為金山郡唐復為綿州改巴西郡復為綿州國朝因之中興以來兼綿茂石泉沿邊安撫節制屯戍軍馬今領縣五治巴西事要郡名左綿以綿水經其左故謂之左綿左太冲蜀都賦於東則有左綿巴中綿者綿厯也金山涪陵巴西風俗文而不華郡縣志郡界東西二州北負梁雍風氣所濡各得其偏故其俗云云淳而不魯剛而不狠柔而不弱人饒地腴文同通判㕔伐木堂記巴西郡處二蜀之㑹云云財貨繁茂有巴渝舞郡國志實人銳氣而喜舞故云云形勝北接漢中郡國志東接巴西南接廣漢西接隂平云云北負果雍古涪志介乎東西二川之間云云西臨涪水元和郡縣志按州城理漢涪縣也去成都三百五十里依山作州東據天池云云形如北斗卧龍㐲焉梁天監中張齊為太守更造樓櫓却敵有東西門東門久塞富樂山氣所衝門開則䘮亂宋元嘉初太守王懷素開之果致䘮敗爾後復塞控扼二川通判陳君璋壁記云云舟車輻凑水陸四衝古涪志序左綿據涪上流云云為蜀重地為三川之襟帶張演撰㢘泉堂記云東介於梓遂而北與漢中接云云山川靈山在巴西縣郡志山南絶頂有方石相傳神女擣衣于此康山在彰明縣北杜甫寄李白詩不見李生久佯狂貞可哀世人皆欲殺吾意獨憐才敏㨗詩千首飄零酒一盃丨丨讀書處頭白早歸來容齊續筆引吳曽漫録取李白新墓碑云白本宗室子厥先避地客蜀居蜀之彰明太白生焉彰明綿之属邑有大小康山白讀書於大康山有讀書堂在清㢘鄉後廢為隴西院盖以太白得名院後有太白像吳君以是證杜甫詩盖蜀之康山非盧山也郡志又名戴天山太白集有訪戴天山道士不遇詩犬吠水聲中桃花帶雨濃樹深時見鹿溪午不聞鐘野竹分青靄飛泉掛碧峰無人知去處愁倚兩三松富樂山在巴西縣東五里劉備自蠻荆入蜀劉璋延之於此山望見蜀之全盛飲酒樂甚故得丨丨之名又有石盆山迎真觀卧佛院洞靈觀在山之麓雍有容詩當時四海一劉備至此已堪悲失脚出語畨為樂國想是人止可偏方著大漢曽封隆準翁聞道山河錦繡中安能鬱鬱久居此睥睍三秦日欲東唐子西詩富樂之名誰所留建安年中劉豫州擁兵入蜀萬貔貅孱璋送國来迎頭軍中釃酒椎千牛炙如巴山酒如涪酒酣握手登高邱極日紫芋蹲春疇富樂之名此其由君聞此説還信不當時兵起四十秋拆屋不足供誅求生靈嗷嗷鼎中油山中胡為乃爾優想今富樂萬倍劉端能容我逃窮愁山僧笑言客罷休天池山在州城北二十餘步即郡之主山也山頂有池方數丈冬夏不竭唐子西詩上到山椒窮始覺天池尊延賢山即郡之南山岸曲有巨石初有父老釣於涪水因名涪翁釣磯後漢書云郭玉嘗傳其學故延賢之名因此得之范鎮有詩文同有記白馬山在魏城縣西山勢高峻上有龎統墓杜甫詩云連山西南斷俯見千里豁靈臺山在彰明縣北一名天柱山即漢張道陵昇仙之所郡志云天柱崖下有一桃樹高五丈餘道陵與王長趙昇試法於此桃迄今不朽有小碑記之竇圌山在彰明縣李白題丨丨丨詩樵夫與耕者出入畫屏中又送竇主簿詩願隨子明去煉火燒金丹竇子明名圌隠此山故名羅江在本縣兩水相蹙成羅文故名芙蓉溪在郡北官道傍有亭下瞰一名蚌溪唐子西詩人間八月秋霜嚴丨丨丨上春酣酣二南變盡魯叟筆七國戰處鄒軻談人間二月春光好溪上芙蓉迹如埽周家盛處伯夷枯漢室隆時賈生老小兒造化誰能窮幾囘枯枿還芳叢只應人老不復少有酒且發衰顔紅涪水自龍州入州界㢘水在彰明縣北平地泉出宋書范柏年梓潼人明帝因問卿卿土有貪泉否柏年曰臣梁益間冇㢘遜水不聞有貪泉帝嘉之即拜蜀郡太守或云人飲此水則㢘遜故名潺水水經注云源出潺山有金銀礦下注流涪水合羅江梓潼水經鹽泉縣八十里東津杜甫觀打魚歌緜州江水之東津魴魚潑潑色勝銀漁人漾舟沉大網截江一擁數百鱗衆魚常才盡却棄赤鯉躍出如有神潛龍無聲老蛟怒迴風颯颯吹沙塵饔子左右揮雙刀鱠飛金盤白雪高徐州禿尾不足惜漢陰槎頭逺遁逃魴魚肥美知第一既飽歡娱亦蕭瑟君不見朝来割素䰇咫尺波濤永相失樓閣越王樓在城西北唐顯慶中太宗子越王正為緜州刺史日建杜甫詩緜州州府何磊落顯慶年中越王作孤城西北起高樓碧瓦朱甍照城郭樓下長江百丈清山頭落日半輪明君王舊迹今人賞轉見千秋萬古情李偓詩越王曽牧劍南州因向城隅建此樓横玉逺開千嶠雪暗雷下聽一江流江樓枕城之東隅上有唐江亭記杜甫送嚴侍郎到綿州同登杜使君丨丨宴詩野興每難盡丨丨延賞心歸朝送使節落景惜登臨稍稍烟集渚微微風動襟重船依淺瀬輕鳥度層隂檻峻背幽谷窻虛交茂林觀此句則蜀之江樓在南山下燈光散逺近月彩静高深城擁朝来客天横醉後參窮途衰謝意苦調短長吟此㑹共能幾諸孫賢至今不勞朱户閉自待白河沈捫參閣在天池寺據山之巔堂亭六一堂在司户㕔舊為推官㕔昔歐陽文忠父鄭公觀嘗為推官公實生兹地思賢堂在州宅畫揚子雲杜子美李白樊紹述蘇易簡歐陽永叔司馬君實蘇子瞻唐子西九賢之像十賢堂繪涪翁龎統蔣琬杜公微尹公黙李白陳該蘇易簡王仲華歐陽修共十人南山亭在城南治平院有范蜀公留題在焉驛舎萬安驛在羅江縣西舊經云唐明皇幸蜀至此聞驛名歎曰一安尚不可况丨丨乎移宿真明寺舊驛碑所載如此張演有詩云勁兵重作付匃奴歐雀敺魚訃自疎地入萬安知幾許却憐此邑始囘車古跡桃花犬楊大年談苑淳化中州貢羅江犬常卧於御榻前太宗不豫犬不食及上僊號呼涕泣以至疲瘠見者隕涕参政李至作丨丨丨歌以寄史館錢若水末句云白麟赤雁且勿書願君書此警浮俗姜楚公畫鷹陸務觀劍南詩藁云在緜州録參㕔杜甫有詩名宦霍峻字仲邈南郡枝江人先主定蜀嘉峻之功分廣漢為梓潼郡以峻為太守嚴武舊唐書自綿州刺史遷東川節度皇朝唐庚為倅人物李白李陽氷草堂集序丨丨興聖皇帝之几世孫其先非臬謫居條支神龍之始逃歸於蜀之昌明按彰明縣自先天以前止曰隆昌後避元宗始曰昌明而五代時改曰彰明又按唐詩紀事東蜀楊天惠彰明逸史云李白本邑人隠居戴天大匡山皇朝蘇易簡母薛氏朞而弗談有虹入室少選散去井池釜盎水皆涸俄而易簡生十嵗能誦五經属詞賦名傳京師太平興國中進士第一後為翰林太宗書玉堂之署以賜後參大政題詠淡煙喬木隔緜州羅隠魏城逢故人詩一年兩度錦江逰前值東風後值秋芳草有情皆礙馬好雲無處不遮樓山將别恨和心斷水帶離聲入夢流今日因君試囘首云云四六寵分左竹来涖東緜右蜀奥區左緜佳郡越王樓和少陵之傑句隴西寺訪太白之舊逰登富樂山懐劉備之遺業酌㢘遜水挹柏年之清風然富樂之山固有富樂之實在磊落之府正須磊落之人方輿勝覽卷五十四
