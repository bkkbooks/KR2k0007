body:
  text: 方輿勝覽卷五十五宋祝穆撰雅州嚴道百丈名山榮經盧山建置沿革禹貢梁州之域東井輿鬼之分野鶉首之次秦之分也周屬雍州秦滅蜀為嚴道縣漢為蜀郡屬縣後漢屬漢嘉郡自李雄竊據夷獠雜居西魏僑立蒙山縣後置雅州煬帝廢為臨邛郡唐復為雅州後改為盧山郡復為雅州孟蜀置永平軍治雅州皇朝平蜀始入版圗仍提舉黎州兵甲領縣五治嚴道事要郡名雅安風俗地多嵐瘴圗經州治舊在雅安山上大中祥符間國子博士何昌言為守以云云聞於朝徙山之麓黎風雅雨梁益記大小漏天在雅州西北山谷高深沉晦多雨黎州常多風故謂云云皇祐始有登科者郡縣志自國初曹光實父子以忠義奮云云形勝西通碉門郡志道路序云云南通沉黎北通盧山東出者與臨卭之蒲江嘉定之洪雅相接左據蔡山王大象卭崍關記云云右依蒙頂又孫漸招應廟記其山蔡蒙其關卭崍巽巖逰蔡山序蜀惟岷山蔡蒙二山雅獨兼有之控帶夷落謝湜太守題名記抵接沉黎云云在蜀最為都會孫漸清嘯樓記云襟帶邛筰羈縻諸蕃南詔之咽喉張旦遷城記西蜀之襟帶云云當西南夷孔道張方平奏乞用雷大簡知雅州以云云古漢嘉地巽巖記公孫述據蜀青衣不賓光武嘉之後因改青衣曰漢嘉古稱青衣漢嘉今雅州之嚴道名山盧山三縣實當之土産蒙頂茶圖經丨丨有丨受陽氣全故茶芳香白樂天琴茶行云李丞相德裕入蜀得蒙餅以沃於湯餅之上移時盡化以驗其真文彥博謝人惠丨丨丨詩舊譜最稱蒙頂味露芽雲液勝醍醐吳中復謝惠茶詩我聞蒙山之巔多秀嶺煙巖抱合五峰頂峨嵋氣象壓西垂惡草不生生菽茗紫竹梅聖俞蒙山丨丨鞭詩蜀道之峭壁兮如快刀一削平無痕春雷驚龍走竹鞭山川蔡山禹貢曰蔡蒙砥平葉少藴解蔡在嚴道蒙在漢嘉即嚴道也舊傳諸葛亮於此夢見周公因立廟為文憲王廟遂號周公山巽岩詩巖巒最高頂雲氣時蔚薈倣佛羣仙宅宫闕耀珠貝蒙山在嚴道南十里山有五頂前一峰最高曰上清岸産甘露茶常有瑞雲及現相影現盧山在本縣北九里接邛州火井縣界孟山在榮經東十里前臨大江曰七縱渡即孔明擒孟獲之地雅安山郡以此山名離崖山秦蜀守李氷所鑿以導江崖音雅翠屏山在嚴道旗頭山環列如屏金雞山在嚴道北三十五里俗傳有金雞鳴于此龍頭山在廬山前後峽綿亘四十里夭矯如龍接蕃部實為要害百丈山去本縣十五里邛崍山自邛筰而來距百丈山西南九十里阻峻如羊腸即漢書王尊所謂九折坂一云在榮經縣詳見黎州瓦屋山在榮經縣東百二十里形如瓦屋上有念佛烏婆羅花其巖朝現辟支午現普賢夜有神燈或問禪惠大師瓦屋何故却似木皮蓋師曰錦府豈從機上織劍門寧自匣中開巽巖詩瓦屋如案平金仙閲光景萬勝岡在州西有龍興寺其趾曰百丈山自邛峽或起或伏環雅州治漏閣在嚴道縣宇文溥新路賦惟天下之至險有嚴道之漏閣焉孤峰上絶於青天湍波下走於長川斷崖橫壁立之岸飛溜濺千尺之泉靈關在盧山縣北十里蜀都賦闢丨丨以為門其地甚險一人守之可以當百有峽口淵三丈長二百步俗呼為丨丨去蕃界句日程以繩為橋外此不知里數平羌江在嚴道東北城下嘉州亦號丨丨丨竹溪在郡西三十里郡士胥九鼎所居陶仙洞在馬有林泉之勝沫水自盧山發源注于郡之平羌江夾洪雅大江與沉黎之陽山江合流陽山江即沫水也丙穴在州城南出嘉魚興州雅州皆有之堂亭雙鳳堂在設廳後為二蘇設至和中老泉擕二子謁太守雷簡夫雷以書薦于張文定公及韓魏公歐陽文忠公其後太守樊汝霖作堂以表其事無弦亭在州學南長濆江側隱士王潛所居也潛好琴趙清獻公為榜其亭曰濯纓文同書萬壑亭在雅安山頗有勝概名宦皇朝雷簡夫至和初儂智高走入雲南蜀人相驚知益州張方平乞用簡夫為守既至而蜀人遂安虞允文嘗為名山監茶今北廳在清溪橋左有梅及槐柳皆虞雍公手植壁間有公遺墨尚存李燾嘗為監酒繫年録紹興中欲增簡州鹽策以其事屬雅州推官丨丨燾力拒之張浚謂其有臺諌風人物高頤後漢人字貫方弟君實字貫光而文三乃其子一門三舉孝廉貫光厯仕至益州刺史見所存石碑曹光實百丈縣人為銀夏都巡檢使擒李繼遷之母以獻克明乃光實從子李順之亂攻復雅州後又平溪洞賊賜推誠保順功臣題詠江聲捲出風雷響李文詩云云山色攜將圖畫來四六郡貫平羌江連邛峽適蠻貃之邦入狼夷之界邛筰兩關之壁峙蔡蒙四靣之屏開凝香舊治蓋東坡潁濱之曽來管庫微官乃雍公巽巖之不鄙豁開蒙頂之雲近依堯日收斂漏天之雨霈作商霖茂州汶山汶川建置沿革禹貢梁州之域秦地井鬼之分野蜀近入井三度古氐羌地周武興師羌髳八國始從征伐至秦漢時君長十數冉駹最大漢武誅且蘭君冉駹請臣遂以冉駹為汶山郡宣帝罷汶山郡東漢為汶山道安帝復為汶山郡晉𨽻汶陽郡梁置繩州後周改曰汶州隋改為蜀州又改為會州煬帝罷為汶山郡唐改南會州太宗改為茂州改通化郡復為茂州國朝因之治汶川縣置威武軍使復為茂州今領縣二治汶川事要郡名通化汶山史記曰南越破後冉駹等皆懼請臣置吏以冉駹為丨丨太守隴蜀寰宇記隴山之南首故曰丨丨風俗夷俗耐飢寒圖經疊石為􅠼同上夷俗云云以居如浮圖數重門內以梯上下貨藏于上人居其中畜圂于下高二三丈者謂之籠雞後漢書謂之邛籠十餘丈者謂之碉亦有板屋土屋者自汶州以東皆有屋宇不立碉􅠼豹嶺以西皆織毛毯蓋屋如穹廬氊裘雜揉見王咨防邊五事云盛夏凝凍華陽國志汶山郡云云不釋故夷人冬則避寒入蜀庸賃自食夏則反荗避暑習以為常蜀人謂之筰氐詩書之訓闕如寰宇記此州本戎羌之人好弓馬以勇悍相高云云耕作者多舊經其俗漸漬聲教云云號為難理唐回車院記土惟高潤産多諸珍岷沱之源東注于海雖節候攸敘咸若京華而冉駹之俗云云並無兩稅寰宇記自古及今丨丨丨丨形勝東接蜀郡華陽國志云云南接漢嘉西接梁州華陽志云云酒泉北接陰平西近邛筰西漢志云云筰馬旄牛古氐羌地後漢志冉駹有六夷七羌九氐各有部落其王侯頗知書而法制嚴重地當西極宣和西嶽神加封敕詞云維彼通化云云金天氏之分域也控制吐蕃圗經全蜀巨屏同上岷山巉絶崛立實捍阻羌以丨丨倚為丨丨即灌口之障蔽淳熙五年胡元質奏曰唐之季年吐蕃入冦必入黎文南詔入冦必入沉黎吐蕃南詔合入冦必出灌口其文黎兩州去成都尚千里關隘險阻足以限隔唯灌口一路去成都止百里又皆平陸朝發夕至威茂兩州云云大率沿邊諸州城資堡寨以為蔽堡寨賴州城以為援惟此兩州不然堡寨參錯於中州城孤立於外而屬部蕃落周分環據二三百里之問官路僅留一線以達于兩州若邊事不寧孤城坐見隔絶山川岷山即汶山去青城石山百里天色晴明望見成都山嶺停雪當深百丈夏月始泮張敬夫西嶽碑丨丨之祠見于秦其禮與五嶽侔在茂州之列鵝村其跗曰羊膊則江所出也郡志岷山俗謂之鐵豹嶺熙寧九年靜州楊文緒導蕃董阿丹作亂聲援俱絶至書木牌投于江以告急朝廷遣內侍王中正將兵旁出雞宗山擊之楊文緒等伏誅中正請割石泉軍屬綿州舊路與茂通者斷絶之政和間蕃衆復作亂朝廷遣兵屠其一村明年詔石泉為軍專一控制自是蕃部始服王咨上備邊五事云近年蕃僧自熙河來至鐵豹嶺下云自此平地二十程可至熙州茂濕山郡志州以此名雞宗山在州南四十里扼羌人出入之路熙寧九年置鎮羌寨玉壘山在汶川縣東四里出璧玉七盤山去汶川縣九里相公嶺州之主山桃關在汶川縣之南八十里逺通西域公私經過唯此一路關北當風穴其一二里間晝夜起風飛沙揚石龍洞在牛溪鎮入洞數步向南石壁有穴可通無路可陟掌洞道人附巨竹一枝於穴內令逰人攀竹而上汶江郡國志即大江發源在當州故當州號江源郡玉輪江在汶川縣北三里龍溪水引水城內至光孝寺以兩池瀦之居民常汲飲龍湫在巨人山號黑丨丨山其湫四山環繞百二十里堂亭雪峯堂在州治列岫堂在州治鄭薇記九頂列於南屏風盤臺列於西巨人橐駝列於東練光亭王咨留題云汶江自徼外東繞汶山郡西北出極目可百里許每朝陽舒彩夜月流天之際一望水光若萬丈長虹夭矯其上而吐吞之也舊有亭曰觀瀾據城之隅不與景會因取少陵賦岷山沱江圗川霓飲練光之句因以丨丨題其額西亭李新詩水出吐蕃分黑白地窮巴蜀隔幽陰祠廟大禹廟在州東門元和志禹本汶山廣柔人生於石紐村其石緑色古石紐在茂州故有廟今石紐𨽻石泉軍江瀆神圗經神薑姓生於汶川禹導江岷山神佐之是為昭靈孚應威烈廣源王山海經云岷山神馬首龍身祠用雄雞瘞用黍則風雨可致焉又云大禹生於石紐江瀆神生於汶川名宦皇朝趙抃言行録茂州蕃部鹿明玉等蜂聚剽掠趙清獻公遣兵討之夷人乞降願殺婢以盟公使人喻之曰人不可用三牲可也聞命歡呼以聽訖不殺一人家定國眉州人為永康軍司法韓絳帥蜀欲治西山道定國謂蜀近夷恃險以安昔唐中衰吐蕃三入冦一出汶川今鑿平塹為坦途將貽蜀憂韓然其言為之罷役題詠雨雪閉松州杜甫西山詩辛苦三城戍長防萬里秋煙塵侵火井云云松州會解圍杜甫詩玉壘雖傳急云云夷界荒山頂杜甫西山詩云云蠻州積粟邊轉粟上青天同上築城依白帝云云朔雲邊雪滿西山杜甫軍城早秋詩昨夜秋風入漢關云云更催飛將追驕虜莫遣沙場匹馬還玉帳分弓射虜營杜甫詩秋風嫋嫋動高旌云云已收滴博雲間戍更駕蓬婆雪外城雪迷夏禹從前宅李新靜坐詩四六佩銅虎竹臨鐵豹嶺責賦無三品之金羈縻近十州之獠越岷峨深入不毛古松州強名曰郡江山炳靈雖神禹之故宅夷獠雜處乃冉駹之舊都凝薌靜治對白雪於西山選表趣環侍紅雲於北闕永康軍導江青城建置沿革禹貢梁州之域秦地東井輿鬼之分野秦𨽻蜀郡太守李氷堰流以灌平陸因名灌口漢屬蜀郡郫綿虒江原三縣蜀置安都縣屬文陽郡晉徙安都於灌口屬汶山郡後魏置灌口鎮後因廢郡以汶山縣屬益州隋屬蜀郡唐改汶山縣為盤龍縣尋改為導江又割屬濛州太宗於灌口鎮地立為鎮靜軍唐末易名灌州國朝改永安軍治灌口鎮尋改永康軍兼渠堰事又廢為灌口寨復即導江縣置永康軍使兼知縣復專為永康軍今領縣二治導江事要郡名灌口風俗其俗剛悍圗經云云頗尚氣節頗雜夷風同上民知力耕同上形勝上應井絡河圖括地象云岷山之地云云下奠坤維今岷山實在永康其星分上應東井明矣外控夷詔熙寧七年趙抃知成都日乞復永康軍奏狀云云內悍成都嘉定二年知軍虞剛簡五事曰本軍近接威茂并青城一帶山不五七十里即是夷界唐吐蕃入冦自此塗出又距成都百二十里而近其為緊切甚於黎雅正控西山熙寧置永康軍詔云云六州軍隘口古魚鳬國成都記魚鳬治在導江縣井陘之地元和志灌口鎮在導江縣西二十六里後魏置自灌口坂迄千須山五百里間兩岸壁立有瀑布飛流十里而九昔人以為云云泉源為四瀆之首秦宓曰江河淮濟四瀆江為之首山川汶山在導江縣西北三十里即岷山詳見茂州揚雄蜀王本紀汶山為天彭門二峯相對如闕高臺山在岷山上有天池晉朝立天宫於上號曰上清宫夜燈火飛行滿空或謂草木之精所為登高山在郡城之西北一峯卓立舊有亭灌口山在導江縣西北二十六里漢時蜀文翁穿渝江灌溉故以名山玉壘山在導江縣西北二十九里漢地理志云湔水所出青城山在本縣北三十二里玉匱經黃帝封為五嶽丈人乃嶽瀆之上司真仙之崇秩一月之內羣嶽再朝一名赤城一名青城都亦為第五大洞寶仙九室之天上有流泉懸澍一日三時灑落謂之潮泉天倉諸峰屹然三十有六前有十八謂之陽峰後有十八謂之陰峰杜光庭丨丨丨記岷山連峰接岫千里不絶青城乃第一峰也此山前號青城後曰大面山其實一耳有七十二小洞應七十二候有八大洞應八節乃神仙都會之府也五嶽真形圗洞天所在其下别有日月分精以照張天師道陵於此山與鬼兵為誓福地記上有甘露芝草天池醴泉杜甫詩自為青城客不唾青城地為愛丈人山丹梯近幽意丈人祠西佳氣濃緣雪擬住最高峰掃除白髮黃精在君看他時氷雪容天倉山在延慶觀南分為三十六神仙以為帑庫鬼城山在丈人觀西北大面山在三溪之北慈母山在青城山東導江人馮大量與八仙相遇入隱此山蠶崖關在導江縣西五十里以振西山之走集牡丹平自青城之長平山捫蘿而上由鳥道三十里許有平阜數十畝高樹蔽天春深先花後葉狀如芙蕖香類牡丹譙定天授季浩太素二先生隱其中云范至能詩十丈牡丹如錦蓋人間姚魏敢爭春老人村在大面山之北如秦人之桃源昔人避難居其中多享年夀故名或云潛夫張不羣因入山採藥浹旬不返見一叟致敬而問之曰吾族本丞相范賢之裔范公知李雄之年不永挈吾輩居此為終焉之計圗經云即老澤也蘇子瞻云蜀青城山丨丨丨有五世孫者道極嶮逺生不識鹽醯而溪中枸杞根如龍蛇飲其水故夀近嵗道漸通漸能致五味而夀亦益衰岷江禹貢岷山導江郡縣志岷山在茂州直西北裂鵝村水之上原曰羊膊裂為三派一入大渡河一入征南一入溢村至石紐則禹之所導江也湔水在導江縣出玉壘山味江水在青城縣其水甘美故名沱江水在導江縣西北二十里源出岷江白沙水在導江縣西三十里源出灌口獠澤在青城縣北百三十里或曰諸葛亮征羣獠於青城山下故名或曰丨丨即老人村花洲在軍城南百步王子俊為賦魏華父為記堂亭玉壘堂在軍治致爽軒范至能詩夕陽塵外漲郊墟六六峯頭夢覺餘竹色喚人來下馬亂蟬深處有圗書陸務觀詩黃塵赤日汗沾裾竹裏煎茶喜有餘堪笑放翁窮意巧就君池館讀君書子焞詩團圞竹色繞郊居勾引清風百畝餘憶昔敲門蘇內翰而今下馬范中書廣莫亭在軍北朝天門守吕汲公建李壁記危簷飛襤負城四出觀覽之勝甲於東南出金馬門過朝天寺登丨丨丨憑欄下視一目千里佛寺飛赴寺在青城縣飛赴山下名昌聖院乃唐左軍容使嚴君美捨宅有四望亭呂汲公詩最勝西峰下林梢四望亭江山觀掌握梁益布丹青香積寺在青城縣香積山有瀑布及雞骨禪師塔張孝芳詩雞骨埋靈塔龍山對佛龕巽巖詩斷碑唐日寺遺像晉時僧道觀丈人觀在青城北二十里今名會慶建福宫舊記云昔寧封先生栖於北巖之上黃帝師焉乃築壇拜寧君為五嶽丈人或云故基在今重慶府天國寺中胡叔豹詩宫徙瀆山方得地閣藏宸翰不知年陸務觀丈人觀詩黃金篆書榜朱門夾道巨竹屯蒼雲崖嶺劃若天地分千柱耽耽壓其根纓冠肅謁丈人君廣殿空庭吹實薰摩挲畫墻手為皸異哉山夔與土羵物怪齾齾冠邱墳仙人佩玉雜帨帉手整貂冠最不羣欲去不忍恨日曛道翁采藥晝夜勤松根茯苓獲兼斤人芝植立強骨筋狗杞羣吠聲狺狺山爐小甑炊幽芬朱顔不飲常自醺我亦宿誦五千文一念之差墮世紛逝將從翁走如麇隱書祕訣何由聞又題丨丨丨道院壁詩斷雲浮月磬聲殘木影如龍布石壇偶駕青鸞塵世窄間吹玉笛洞天寒竒香滿院晨炊藥異氣穿巖夜浴丹却笑飛仙未忘俗金貂猶帶侍中冠長生觀舊名碧落觀在青城縣北二十里昔有范寂字無為劉先主時棲止青城山中以修煉為事先主徵之不起就封為逍遙公得長生久視之道劉禪易其宅為丨丨丨有巨楠高數十尋圍三十尺世傳長生手植上有赤城閣臨眺甚逺胡叔豹詩更􅓯盤根藏大藥也令嘉樹得長生張孝芳詩老龍拏空欲輕舉山靈地祗挽之住清都觀自延慶觀上二三里有觀曰洞天宋逸士費元規讀書于此唐道士薛昌飲章陸酒得道有浴丹井杜光庭亦尸解於此文潞公鎮蜀與張俞定交市觀側之地以贈之號白雲隱居任宗易詩懶隨六詔上丹闕高卧一峯藏白雲延慶宮自會慶宫西行一二里有觀曰常道乃古黃帝祠觀乃隋時建有張天師遺迹及唐明皇御札碑其南有六時水六時灑水以代晷漏於陰時即飄然而灑陽時即無吕汲公詩巖暉萬古照泉漏六時飛京鏜詩八千里隔東西境十二時分晝夜泉有九株松范蜀公詩九松峥嶸姿一一大夫封儲福宫在天倉峰下有唐代宗女玉真公主及明皇像乃公主修真之地有天峰閣望三十六峯如列屏焉沈少南玉真像詩割盡齊封奉魯元鑿開沁水占名園何如帝子空山外落日騎驢芳草原胡叔豹詩棄形如遺但養神阿兄爛醉梨園春人百撼之耳不聞何物女子乃獨醒徑來空山卧白雲不見漁陽胡馬塵朝公遡詩天風夜半剪水花三十六峯如玉立趙雄詩三十六峰如不到青城還是不曽逰陸務觀詩路轉屏風疊雲藏帝子家上清宫在高臺山丈人祠之側晉朝立宫于上夜則神燈遍空其東北麓有天師手植栗十七株仁宗踐阼之六年宫庭木生異花曰太平瑞聖花范至能詩但覺星辰垂地上不知風雨滿人間王叔曕詩神燈點點光可燭星斗熒熒低欲捫處士孫知微詩臺殿壓平青嶂頂松杉插破白雲根古迹張天師誓鬼壇一曰石日月日在延慶觀東北月在溪西崖中並徑五尺六寸半一曰石天地天形有十二角地形正方濶六七尺在常道觀北楊妃池按樂史楊太真人傳云貴妃小字玉環父玄琰為蜀州司户貴妃生於蜀嘗誤墮此池中在導江縣今為唐氏居花蘂夫人宅後山詩話費氏蜀之青城人以才色入蜀宫後主嬖之效王建作宫詞百首國亡入備後宫太祖聞之召使陳詩誦其國亡詩云君王城上豎降旗妾在深宮那得知十四萬人齊解甲寧無一箇是男兒孫太古畫范長生像劍南詩藁云青城山中有孫大古畫碧落侍中范長生舉手整貂蟬像特妙其詩云浮世深沉何足計丹成碧落珥貂蟬名宦李氷漢河渠書蜀守丨丨鑿離堆在軍之南避沫水之害穿二江成都之中此渠皆可行舟有餘則用灌溉百姓享其利立廟祠之嵗祭羊以數萬計皇朝劉隨景德中為軍判官得蠻人心後擢右正言趙抃事見容齋隨筆吕大防圖經云嘉祐辛丑宰青城至今邑人誦之人物張俞字少愚居岷山之白雲溪六辭召命有詩云欲作外臣誰是友白雲孤鶴在巖扉宋汝為字師禹東海豐邑人吕頥浩為相使之致書劉豫靣陳朝廷密意遇烏珠軍師禹入金壁見烏珠不屈乃送之京師見豫勉以忠義不從乃謀劫豫南歸陰遣蠟彈事泄逃歸後金人講和知蠟彈始於師禹遂以姓名來求師禹時為處州倅乃改姓名為趙復而字逸老入青城山其後金人叛盟朝廷始求師禹而師禹巳死葬青城山乃官其子南強朱元晦嘗録其遺事譙定劍南詩藁青城大靣山有二隱士一曰丨先生丨字天授建炎初召至揚州留之講筵不可拜通直到而先生致仕今百三十餘嵗巢居絶人不能年輒一出山前人亦罕有見之者姚平仲同上其一曰姚太尉平仲字希晏靖康初在圍城中夜將士攻賊營不利騎驢逸去建炎初所在揭榜以觀察使召之不出淳熙間乃或見之於丈人觀道院年近九十紫髯長委地蓋皆得道於山中題詠江從灌口來杜甫詩竹瘦青城人云云蠶崖鐵馬瘦杜甫詩云云灌口米船稀玉壘浮雲變古今杜甫詩云云四六疏綍彤庭分符玉壘古號魚鳬之國今多鵙舌之蠻外當夷徼之要衝內作成都之捍蔽職方之籍用列附庸公車之章乃容專達對玉壘之浮雲未妨吟咏訪青城之仙境不憚躋攀郡惟斗壘似稍鬱於經綸地近氊裘實有資於撫御方輿勝覽卷五十五
