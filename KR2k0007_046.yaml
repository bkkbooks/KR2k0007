body:
  text: 方輿勝覽卷四十六宋祝穆撰淮安軍山陽淮隂鹽城建置㳂革禹貢揚州之域在牽牛之分春秋時屬呉後屬越戰國屬楚秦屬九江郡西漢屬臨淮郡及廣陵陵國東漢屬廣陵郡及下邳國三國屬魏東晉祖逖屯淮隂庾希自下邳退屯於山陽謝元自彭城退屯於淮隂又分廣陵置山陽郡宋以山陽為重鎮宋蕭道成鎮淮隂為北兖州東魏復為山陽郡隋廢郡為楚州唐初為臧君相所據曰東楚州尋歸於唐改曰楚州皇朝爲團練州寶慶以逆全之亂降爲淮安軍今領縣三治山陽事要郡名山陽境内有地名丨丨東楚淮隂許氏説文水之北為陽水之南為隂縣在淮水之南故曰丨丨風俗其俗勁悍輕剽隋志云云士任氣節同上其丨則俠任丨丨好尚賔遜盖楚之風焉戰爭詐偽晋伏滔正淮論其俗尚材氣而多勇悍其人習丨丨而多丨丨豪右兼并之家十室而九藏甲挾劍之民比屋皆是急則以驟戎馬新志聞之故老物盛人衆足為一都㑹今擬以窮邊極塞云云緩則以宅狐兎土産唐鹽課四十五萬石郡縣志云今闗中置鹽監以收其利毎歳煑鹽四十五萬石阮昇之南兖州記云鹽城海水有南兖州鹽池百二十所縣人以魚鹽為業畧不耕種擅利巨海用致沃饒公私商運充實四逺舳艫徃來常以千計此呉王所以富國强兵而抗漢室也形勝北有清泗南齊志云云臨淮守險屏蔽淮東紹興十一年髙宗謂大臣曰山陽要地云云無山陽則通泰不能固賊來竟趍蘇常水陸交通晋荀羡北征議淮隂藩鎮地形都要云云易以觀釁沃野有開殖之利方舟漕運亦無他阻揚楚要衝長編云太宗朝王化基澄清畧云江淮諸郡丨丨最曰丨丨水陸兩塗咽喉數國務穰事衆地廣民繁淮南控扼之地繫年録左正言呉表臣言楚州實云云南北必爭之地繫年録徐宗偃云山陽俯臨淮海實云云我得之可以挾制山東東晉為重鎮廣陵記云云元帝嘗使劉隗守淮隂有道之齊魯山東新志一道自南渡門絶淮則之齊魯山東一道自淮隂放洪澤閘逹淮則入汴入洛山川羽山崔國輔石頭瀬詩云悵矣秋風時予臨石頭瀬因髙見逺望盡此楚州内丨丨一㸃青海岸雜花碎日暮千里㠶楚色有㣲靄鐵柱岡在鹽城北門外二里海岸故老相傳秦王繫馬處也金牛岡在山陽縣北七十里周世宗宿兵於此大海在鹽城南一里淮水在山陽北五里水經注云丨丨之㑹即城角也左右兩川夾翼二水以入即泗口也自鼈山之北縈囬楚城東入於海詩云淮有三洲今山陽灣對岸有上洲中洲下洲豈其此歟淮河楊廷秀登楚州城詩云望中白處日爭明箇是丨丨凍作氷此去中原三里許一條玉帯界天横清河在淮隂縣北七十里新河去磨盤古跡八十歩乾道中開老鸛河在城西周世宗至此艦大不能過遂開此河以通其道故沙河在山陽縣西北十里滿蒲閘之南避山陽灣清河口風濤之患射陽湖在山陽縣東八十里今與府鹽城分湖為界縈回三百里䢴溝自寳應縣北流入淮左傳哀公九年呉城䢴溝通江淮隋大業元年發淮南民十萬開丨丨自山陽至揚子入江渠廣四十歩王介甫詩云將母丨丨上留家白紵隂月明聞杜宇南北揔闗心公路浦即淮口也寰宇記袁術字公路向九江將奔袁譚路出斯浦因名捍海堰在鹽城縣詳見泰州吕東萊記亭榭南昌亭在山陽縣西三十五里史記云韓信布衣就丨丨丨亭長寄食長竟絶之信為楚王召亭長賜錢百萬曰公小人為徳不竟籌邊樓在郡治輪奐壯麗甲於隣郡宴花樓趙嘏題楚州丨丨丨詩門外煙横載酒舡謝公携客醉華筵尋花偶坐將軍樹飲酒方重刺史天幾曲艶歌春色裏斷行髙鴈暮雲邊分明聽得行人語願及行春更一年橋梁跨下橋在淮隂縣即韓信為少年所辱之處祠墓淮隂廟錢諌議討築壇拜處恩雖厚躡足封時慮已深隆凖若知同烏喙將軍應有五湖心劉禹錫詩將畧兵機命世雄蒼黄鐘室嘆良弓遂令後代登壇者毎一尋思怕立功羅昭諌詩剪項移秦勢自雄布衣還是負深功寡妻稚女俱堪恨休把餘盃奠蒯通許澤詩朝言雲夢暮南循已為功名少退身盡控兵權猶不得更將心事託何人汪遵詩秦季賢愚混不分只應漂毋識王孫歸榮使累千金贈為報當時一飯恩張文潜詩雲夢何湏偽出遊遭讒猶得故鄉侯平生蕭相真知已何事還同女子謀東西塜在縣北八里莊東塜韓信母墓也本傳云信行營髙燥地令旁可置萬家即此也西塜即漂母墓也羅昭諌漂母墓詩云寂寂荒墳一水濵蘆洲絶島自相親雖然寂莫千秋魄猶是韓侯舊主人古跡紫極觀畵壁李伯時常於壁間畵猴戯馬驚而圉人鞭之時稱竒筆東坡題其後曰吾觀沐猴以馬為戯至使此馬竊銜詭轡人言沐猴宜馬而今為累真虚言耳陳后山亦有詩曰沐猴自戲馬自驚圉人未解猴馬情猴其天資馬何罪意欲防患猶傷生異類相宜亦相失同類相傷非所及志行萬里因一悟吐豆乾荄甘伏櫪舊有石刻今不存名宦張敞守山陽乆之渤海膠東盗起拜膠東相盗悉平鄭𢎞𢎞遷淮隂大守行春天旱隨車致雨白鹿方𢎞夾穀而行𢎞恠問主簿黄國曰鹿為吉為凶國拜賀曰聞三公車轓畵作鹿明府必為宰相祖逖屯淮隂嘗誓清中原皇朝蔣之竒為太守米芾自無為移守山陽韓世忠繫年錄紹興五年都督張浚出江勞師至鎮江召丨丨丨親諭上㫖使移屯楚州以撼山東世忠欣然受命即日舉軍渡江又云山陽凋弊之餘世忠披荆棘立軍府與士同力役軍壘既成乃撫集流散通商恵工遂為重鎮岳飛至楚州視兵籍始知世忠止有衆三萬而在楚十餘年金人不敢犯猶有餘力以侵山東可謂竒特之士也人物韓信淮隂人封侯枚乘淮隂人有舊宅基在縣南二百歩枚臯淮隂人並見漢書本傳皇朝徐積字仲車本州人從安定胡先生學事母至孝年四十不婚不仕鄉人勉就舉偕毋之京既登第未調官母亡遂不仕監司上其行諡曰節孝處士張耒淮隂人也從蘇子瞻學有文集趙師旦本川人也常守康州儂智髙亂率羸師血戰而死名賢陳瓘因彈蔡京謫居合浦著尊堯集益加竄逐最後移楚州居住題詠蕪城枕楚田温庭筠送淮隂縣令隋堤楊柳煙孤棹正悠然蕭寺通淮戍云云魚鹽橋上市燈火雨中舡故老青葭岸先知宓子賢淮水東南第一州白居易贈郭使君詩云云山圍雉堞月當樓野人懐恵欲移家劉商送元使君自楚移越詩露冕行春向若耶云云東風二月淮隂近惟見棠梨一樹花家在枚臯舊宅邊唐趙嘏憶山陽詩云云竹軒晴與楚波連芰荷香透埀鞭䄂楊柳風横聞笛舡士林皆賀振家聲劉禹錫送李楚州緹騎朱旗入楚城云云兒童但喜迎賢守故吏猶應記小名山陽太守政嚴明白居易枸杞井詩云云吏靜人安無犬驚不知靈藥根成狗恠得時聞吠夜聲韓枚歩隲建三亭淮隂有丨丨丨亭晁端彦詩云云故顯當時將相名秋燈㸃㸃淮隂市陳羽宿淮隂縣作云云楚客連檣宿淮水夜深風起魚鼈腥韓信祠堂月明裏劉伶臺下稻花晚許用晦詩云云韓信廟前楓葉秋雜耕今是一雄藩楊廷秀望楚州新城詩已近山陽望漸寛湖光百里見千付人家四面皆臨水柳樹雙垂便是門全盛向來元孔道云云金湯再葺真長策此外猶須子細論四六維今東楚實國北門大江前流長淮却阻長淮奥壤表海名邦既䕶藩籬孰窺堂爼郡居江北恰遥拱於近畿路出山東更掃清於小醜邦人還定各安鴻鴈之心海道肅清更息鯨鯢之浪襲韓信之故封冝知兵畧訪枚臯之舊宅益倡文風兵衛森羅既作淮壖之重鎮舟師畢集又居海道之要衝寶應州寶應建置㳂革星土與淮安軍同本漢平安縣屬廣陵國王莾常改為杜鄉隋地理志云梁置陽平郡及東筦郡開皇初郡廢為安宜縣又廢石鼈縣入焉安宜溪在縣界因此得名唐武徳立倉州領安冝一縣及州廢縣屬楚州上元三年縣屈真如獲定國十三寶以其年為寳應元年改安宜縣為寶應皇朝因之寶慶三年六月以䝉國進寳璽詔年穀屢豐雨晹時若可謂受寳之應以寶應縣陞寶應州今領縣一事要郡名安宜風俗與淮安軍同形勝地居四塞郡志丨丨丨丨之衝無險可守山川箕山在州東六十里寰宇記今無山唯邱阜百餘雲山在城西南百二十里山下有白龍潭射陽湖在州城北十五里其西頗多邱阜清水湖在城南五里范光湖在城西南三十里安宜溪在州城西南四十餘里白水陂在城西八十里乃鄧艾所築濶三十里橋梁孝仙橋在城北市蘇子瞻曰秦少游言寶應民有以嫁娶㑹客者客一人徑起出門至橋下若將赴水者主人急持之客曰婦人以詩招我其詩曰長橋直下有蘭舟破月衝煙任意游金玉滿堂何所用爭如年少去來休倉皇就之不知其為水也然客亦無他古跡神寶唐楚州刺史鄭輅撰記曰肅宗元年建子月十六夜女尼真如忽見二皂衣引至一所見天帝因出寶授真如曰汝徃令刺史崔侁進逹於天子肅宗寢疾方甚視寶召代宗謂曰汝自楚王為皇太子今上天賜寶獲於楚州天祚汝也宜保愛之代宗再拜受賜即日以寶應紀年云髙黎王城在縣西八十里金牛城在縣南十五里石鼈城在縣西八十里本石丨縣寰宇記以為石鼈山引郡國志云山有石鼈游因名之山下有鄧艾築城猶存今驗其處無山有城以為山誤也荀羡傳曰羡鎮淮隂屯田於東陽之石鼈通典載宋因晉以山陽為重鎮曰比對清泗臨淮守險有平陽石鼈稻田豐饒盖歴代皆屯田於此舊志𨽻山陽非是名宦當考人物闕當考題詠賤買魚蝦已厭烹吕本中行次寶應有詩云半升濁酒試蓴羮云云淺水依蒲有舡過淡煙籠月更人行聞説徳宗曽到此陶應題寶應縣詩雪樓當月動清寒渭水梁山鳥外看云云吟詩不敢倚欄干四六疏綍宸廷分符邊壘粤由男國陞建侯邦既重蠶桑之務亦為魚稻之鄉石鼈置城昔號屯兵之地銅魚分治今為固圉之邦寶璽紀祥盖古今之嘉瑞銅符疏渥當南北之要衝廣陵東楚既應援之匪遥渭水梁山亦鼓行之甚易城惟斗大雖云猶劣於十同地近風寒要使雄當於一面高郵軍髙郵興化建置㳂革禹貢揚州之域分野與揚州同春秋時屬呉戰國屬楚秦因髙郵置郵傳為髙郵亭漢屬廣陵晋屬臨淮郡東晉有三阿宋屬廣陵郡梁置廣業郡尋以有嘉禾為神農郡隋屬江都郡唐屬䢴州皇朝始建為髙郵軍中興以來陞為承州割泰之興化縣來屬置鎮撫使尋為髙郵縣蒹軍使復陞為髙郵軍今領縣二治髙郵事要郡名盂城郡志謂地形四隅皆底城基特髙狀如覆盂秦郵同上一名丨丨見㳂革注髙沙有丨丨館風俗俗厚而勤稼題名舊記土髙而亷於水丨丨丨丨於丨好談儒學郡志自孫覺秦觀諸公以文章政事名至今云云其間桀黠之民好以訟相雄徃徃挾法律以議吏是非然亦終不敢犯長吏故易治而難服人足於衣食楊公濟衆樂園記云髙郵當東南衝㑹邑居繁盛加之魚稻之富云云形勝東漸於海郡志云云南接大江北據長淮同上西有土山云云南逼真揚馬仲荀記云云北連楚泗古稱大邑皇朝開寶間建軍詔惟彼髙郵云云舟車交㑹水陸要衝冝建軍名以隆地望南北水道之要衝趙侯修水門記髙郵古䢴州盖䢴溝所經云云介於揚楚之間葉宗古太守題名記云云號為東南咽領連帶陂湖轉入江淮水深而岸峻昔令孤綯節度淮南徐卒龎勛等逃歸禆將李湘曰髙郵之北云云我以鋭卒焚荻舟塞其前勁兵蹙其後盡可殪也形便而勢利舊經髙郵據諸郡眷扼亢拊背云云莫之能禦山川土山在髙郵縣西南六十里上有石井石臼俗傳謝安公煉丹於此孤山在興化縣東南七十里陽山在興化縣西四里舊有廟史記楚世家昭陽為楚懐王令尹出入將相此即其廟五湖去城六十里黄魯直詩九陌黄塵烏㡌㡳五湖春水白鷗前扁舟不為鱸魚去收取聲名二十年秦少游詩髙郵西北多巨湖纍纍相連如丨丨蔣頴叔詩三十六湖水所瀦其間尤大為丨丨三湖繫年録承楚相距有樊梁等三湖甓社湖去城三十里東南長七十里南北濶五十里湖有明珠崔伯易賦序云夜見大珠其光屬天嘗問諸漁者皆云或遇於它湖中有竊謀之者則風輙引舡而去又云明珠光熖類火炬然不徒見不有大喜必有大灾圖經髙郵西北有新開甓社塘下五湖平阿七里張良珠湖又有羑里石臼鵝兒白凡十一湖相連内有一灣名子子灣楊廷秀詩云為愛湖中似掌平忽逄巨浸却心驚怪來萬頃不生浪凍合五湖都是氷碧玉湖寛容我到白銀池滑沒人行兹遊只道清無價清殺詩翁老不勝孫莘老於丨丨丨上讀書夜見明珠而登第黄魯直遺詩云丨丨丨中有明月淮南草木借光輝建炎中光竟夜繼而賊犯郡白沙湖在興化縣南十里得勝湖本名率頭湖張榮賈虎嘗掩擊金帥達蘭於此南溪在興化縣范希文宰邑日冇馴鷗詩平淮堰在髙郵縣境内李吉甫築溉田數千頃捍海堰范希文監西溪倉悉力修之詳見泰州井泉玉女井崔伯陽記在髙郵縣治之東圖經云東齊郟公道光與其女居井旁煉丹見神仙傳少西有望仙橋今其側盖闤闠之地蔣頴叔詩蒼龍脱角瑩且澤解𤓰自與風雷俱郟家女子已仙去尚有故井存通衢堂榭燕堂楊公濟詩吏隱盂城九十旬豐年日日是佳辰五壇芍藥齊教放何處揚州更覔春瞻衮堂在軍北城上紹興四年都督丞相張公撫臨侯衛次於淮東後人名之威敵堂在軍治之後濯纓亭在税務前范文正公建有詩云素心愛雲水此日東南行笑解塵纓處滄浪無限清又滄浪清可愛白烏鑑中飛不信有京洛風塵化客衣寄老庵黄魯直有賦四逹齋蘇子瞻集髙郵趙使君晦之作齋東圃户牖四逹因以名之眉山蘇軾過而為之銘曰有蔵於中必謀於外惟慢與謹皆盗之誨孰知此間空洞無物户牖開闔廣焉丨丨擊去盗易使無盗難我無可攘以守則全趙侯無心得法赤溪四出其丨以逹民迷文游臺在城東二里舊傳東坡與王鞏孫秦諸公及李伯時同遊論文飲酒因以名之伯時畵為圖刻之石祠廟露筋廟去城三十里舊傳有女子夜過此天隂蚊盛有耕夫田舎在焉其嫂止宿女曰吾寧處死不可失節遂以蚊死其筋見焉歐陽永叔詩云近聞髙郵間有虎夜凌辱哀哉丨丨女萬刼讎不復古跡䢴溝左傳哀公九年呉城䢴溝杜預注云於丨丨築城穿溝東北通射陽湖西北至末口入淮通糧道唐為䢴州以此得名三阿即今北阿鎮在晋為丨丨即謝安破堅將彭超之地唐為下阿徐敬業屯兵下阿溪魏思温破之於此名宦李承唐人始創捍海堰李吉甫為淮南節度於髙郵築陂塘溉田皇朝范仲淹監西溪又宰興化楊蟠字公濟有詩名張浚初薛慶據髙郵軍公自徃安撫之留公三日而外間不知朝廷議遽罷公樞筦奉祠慶以兵衛公出乃赴行在韓世忠金人自建炎初蹂踐淮楚北鄙之警畧無寧歳及丨丨丨節制淮東募敢死士號背嵬軍教以擊刺戰射之法無不一當百與敵遇於天長大儀間其帥貝勒托雲擁鐵騎來背嵬百過百克敵以為神轉戰至髙郵卒擒托雲等俘獻於朝紹興四年劉豫借援入冦歩騎數萬蕩然如風雨至公以鋭士絶江殱其衆於髙郵之北門乘勝駐軍淮楚以遏敵衝並見郡志人物皇朝孫覺字莘老其先邵武人卜居髙郵遷吏侍坐元祐黨孫覽覺之弟知諌院崔公度字伯陽直龍圖閣王鞏字定國從蘇子瞻遊朱壽昌父守雍日年三歳母劉氏嫁民間母子不相知者五十年熈寜初棄官入秦尋訪行次同州遂獲其毋相持慟哭感動行路乃迎以歸王荆公而下皆有孝子詩數百篇後徙居髙郵名其里曰彰孝喬竦以鄉先生教授鄉里莘老其徒也喬執中以經術教授淮壖與孫秦齊名秦觀字少游與張耒黄庭堅晁補之號四學士有淮海閒居集黄魯直贈詩云國士無雙秦少游全篇見揚州觀進士不中元祐中蘇軾以賢良方正薦於朝除太學博士校書遷正字兼國史院編修紹聖中坐黨籍通判杭州以御史劉拯論其増損實録責監處州酒税又編置郴州横雷二州至滕州而卒觀長於議論文麗而思深蘇軾嘗以其詩薦之於王安石安石曰公竒秦君口之而不置我得其詩手之而不釋秦覿字少章有詩名坡谷皆稱之馬永卿從劉元城遊題詠過淮風氣清蘇子瞻過髙郵寄孫君孚詩云云一洗塵埃容水木漸幽茂菰蒲雜遊龍可憐夜合花青枝散紅茸美人游不歸一笑當誰供故園在何許已偃手種松我行忽失路歸夢千山重聞君有負郭二頃收横從卷夜畢秋獲殷床聞夜舂樂哉何所憂社酒粥面濃宦游豈不好毋令到千鍾地據揚楚脊秦少游詩吾鄉如覆盂云云環以萬頃湖粘天無四壁濛濛春雨濕䢴溝歐陽永叔詩云云蓬㡳安眠晝擁裘知有故人家在此速將詩卷洗窮愁霜落䢴溝積水清秦少游詩云云寒星無數傍舡明菰蒲深處疑無地忽有人家笑語聲城外城中四通水楊廷秀詩解纜維揚破夕陽過舟覆盎已晨光夾河漁屋都編荻背日舡蓬尚滿霜云云堤南堤北萬垂楊一州斗大君休笑國士秦郎此故鄉四六輟班禁陛作鎮江淮勢若覆盂俗皆奠枕西臨滄海北控清淮州維斗大地控風寒處秦郵之髙阜壁壘最堅控隋漕之通津舟車畢集昔者繹騷遺患幾成於飬虎今而安集務農皆願於買牛淮海之髙文大冊可想英風紫巖之妙畧深籌尚存陳迹長安日近豈容聖化之不霑瀚海波澄抑使邊烽之自息方輿勝覽卷四十六
