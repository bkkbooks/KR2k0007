body:
  text: 方輿勝覽卷六十二宋祝穆撰潼川府路瀘州瀘川合江江安建置沿革禹貢梁州之域天文東井輿鬼之分野春秋戰國為巴子國秦屬巴郡漢武帝分置犍為郡而犍為之江陽符縣即今之州城是也東漢末劉璋立為江陽郡晉寄治武陽穆帝置東江陽郡宋齊因之梁置瀘州取瀘川以為名移治馬湖江口隋為瀘川郡唐復為瀘州改瀘川郡復為瀘州皇朝升為上州又升為節度賜名瀘川軍中興以來四路建帥府分委邊防而夔路鈐轄猶兼於瀘南張魏公奏請夔梓各專其任乃各升本路安撫其後以瀘南為潼川府路安撫使自梁介始今統郡十五領縣三治瀘川本路安撫置司事要郡名瀘川瀘南江陽風俗朴野少儒學華陽國志江陽之俗云云氣候偏陽勾公權瀘川縣廨記江陽云云夏秋多炎燠冬無苦寒每夏秋蒸溽如榜挹大爐鞴畬田刀耕寰宇記地無桑麻每嵗云云火種形勝東接巴郡華陽國志云云南接牂牱西接犍為北接廣漢西連𤏡道鎮遠樓記云云東接巴渝南望夜郎牂牱本漢江陽華陽國志瀘川縣云云昔漢光武微時過江陽有一子望氣者言江陽有貴兒孫王求之縣人殺之光武怒為子立祠謫江陽人不使冠帶肘江負山劉正字李園序瀘為州云云古巴子國任伋開福寺記瀘云云淙流東北貫其隅墮山西南蟠其址枕帶雙流輿地廣記據江􅏖會舟車之衝照庵記江安隋舊邑也號為丨丨往來丨丨其外即與西南夷接自唐閣羅鳯之師出入於此而國朝元豐以來問罪之師亦由此啓行最近蠻獠通略太祖開寶八年召新瀘州錢文敏見於講武殿謂之曰瀘州云云尤宜綏撫為邊隅重地孫羲叟修城記瀘控西南諸夷遠逮㸑蠻最云云元豐以來用武守其後始更置儒守權任益重李􅌫西山堂記乾道升領劒南一道十五州云云土産鹽井華陽國志土地雖迫山川特美丨丨魚地一郡豐沃瀘茶茶經云瀘州之茶樹夷獠常攜瓢穴其側每登樹採摘茶必含於口中待其展然後置瓢中旋塞其竅歸必置於暖處故味極佳荔支杜甫過瀘川詩憶過瀘戎摘丨丨青楓隱映石逶迤京中舊見君顔色紅顆酸甜只自知山川寶山在城南初名堡子山為巡檢廨陳公損之移廨山西建堂其上袁公説友名其堂曰江山平遠易堡子為丨丨皆大書揭之下瞰城郭萬瓦鱗集兩江合流郡國志一名瀘峯山高三十丈地多瘴三四月渡之必死唯五月上旬渡之即無害故諸葛亮云五月渡瀘即今之丨丨李􅌫西山堂記云以常璩華陽國志及辛怡顯雲南録考之乃在越嶲之地明甚非瀘之丨丨也方山距州三十五里又名回峯山其山八面下瞰江有魏武帝廟南夀山在城西南三十五里山既高且秀安樂山圖經在合江西五里三峯俱秀有溪及延真觀有石匱為仙人藏經之所岐而左有爛柯迹後有仙魚影隱隱在石壁中岐而右歷木楠臺仙人屋十二盤至剪刀峽循山有八洞通南巖有石曰許由瓢又有芙蓉城滴水崖白猿洞此三峯之景也任伋遊安樂山詩安樂溪上峯萬木森翠羽孤撑切天心橫拓壓坤股氣勢西吞夷光芒南定楚雲泉出石竇淋漓灑玉宇煙蘿纒林梢搖曳垂翠組山有天符葉一夕大風雨拔去後得於容子山如荔枝葉而長上有紋如蟲蝕宛如蟲篆或以為劉真人仙迹蘇子瞻詩天師化去知何日玉印相傳世共珍故國子孫今尚在滿山秋葉豈能神鏡子山在江安縣南五里又名照山一峯中峙兩峰旁翼二溪交流峯巒蔥蒨庵廬梵室金碧交輝旁有二潭為龍所居禱旱輒應山有眠雲石襲淵橋玎璫巖磨鎌溪為一邑勝遊之地木龍巖在寶山之趾有古榕木盤結夭矯如龍黃魯直為題榜東巖在汶江之東紹興中邦人開創大像依巖不足以庇風雨近嵗有庖者祁氏親死廬墓棄俗奉香火於此巖邦人信之不十年重樓復屋佛宮經藏甲於一境北巖在城北舊有小庵尚書楊汝明創為大剎及創五峯書院以為士友會課之所焉龍女洞在城東南二十五里高岸之半有二穴俗傳為丨丨丨李巽巖嘗遊有留題汶江出岷山東流入合江縣界瀘江按辛怡顯雲南録及唐書志姚州雲南郡下有瀘南縣則瀘水當在姚州李􅌫西山堂記云郡得名為瀘者蓋始因梁大同中嘗徙治馬湖江口置瀘州蓋馬湖即瀘水下流因遠取瀘水以名州中江一名綿水經瀘川縣北三里出麩金涇灘在江安縣南三十里灘上有山刺天瀑布飛下相傳武侯誓蠻之地黃龍堆在瀘江中有大石闕每季春則黃龍堆沒此闕亦平水經云尹吉甫生子伯奇至孝後母譖之自投江中衣苔帶藻忽夢水仙賜之美樂揚聲悲歌船人學之吉甫聞其聲援琴作子安之操即瀘川縣之黃龍堆也韓文公履霜操亦援此事井泉雙井在城西偏紹興中掘濠塹得碑乃唐乾元中蘇德充所開也滴乳泉在城西真如寺自崖石中流出味甚甘魯直經行大書此三字堂樓袞繡堂在州治以趙衛公出鎮於此改今名整暇堂在郡圃之內西山堂在寶山南定樓在州治取出師表語陸務觀詩行遍梁州到益州今年又作渡瀘遊江山重復爭供眼風雨縱橫亂入樓亭觀四香亭在州治淳熙趙公建自題云永嘉何希深之言曰荼䕷香春芙蓉香夏木犀香秋梅花香冬斯名以之偶住亭在江安縣之對建中初魯直自𤏡道還過邑宰石諒同遊此亭書琴操後改為渡瀘亭有范百録平蠻碑在焉海觀在州治侍郎閻蒼舒詩雲南之陰大江東二水奔騰如海衝誰能具此壯觀眼南定樓中今臥龍名宦諸葛亮按敘州李嘉謀武侯祠堂記云武侯南征使李恢自建寧馬忠自牂牱而身自出越嶲五月渡瀘世未有原其説者蓋吳蜀之分五溪諸夷遙接益州四郡雖不能為害然有事之際得之即強故先主伐吳使馬良招五溪諸蠻授以官爵五溪之南即益州牂牱郡界及先主敗於秭歸益州四郡皆叛應吳高恣睢於越嶲雍闓跋扈於建寧朱褒反叛於牂牱闓又受吳之爵執蜀刺史張裔以與吳安然不忌此非獨以險遠為心蓋益州四郡上可撼巴峽以為奇下可通湘廣以備敗自漢以來益州四郡皆士大夫主之非獨蠻夷而已公之南伐蓋以杜塞四郡歸吳之心使四郡根據於吳遙結五溪諸夷則巴峽非漢有也傳所謂因其酋豪擒縱孟獲使之不叛者特公之餘略耳柳玭通鑑昭宗景福二年以渝州刺史丨丨為瀘州刺史柳氏自公綽以來世以孝悌禮法為士大夫所宗玭為御史大夫上欲以為相宦官惡之故久謫於外皇朝錢若水以右贊善為守太祖召見於武德殿謂之曰瀘州最近蠻尤宜綏撫鄧綰為江安令有安樂溪記人物尹吉甫江陽人有祠在城南又報恩觀建清穆堂以祠之皇朝唐庚字子西來自眉家於瀘之安夷門外有文集題詠地兼夷漢重任伋題安樂山詩云云江帶梓夔寒瀘戎瘴癘屋劉望之荔支詩云云閩粵山水鄉如何産此物爛然照炎荒餘甘渡頭客艇唐子西瀘川六言百斤黃鱸鱠玉萬户赤酒流霞云云荔支林下人家牛羊村落晚晴處唐子西雲南老人行云云煙火樓臺日暮時安排春織待新篇唐子西贈瀘倅詩寄語江陽夷洛道云云自注云淯井夷人蠻布織梅聖俞詩歌唱竹枝終日楚同上云云笛吹梅弄數聲羌四六西瀼奏功東川徙鎮若時江陽實聨益部宏開帥府盡護兵權地控雲南之六詔疆連井洛之三邊維瀘川之大郡控巴徼之羣蠻地望隆重視古元侯民俗怡熙為今道院鳥言夷面雖久被於文明狼子野心然易萌於嘯聚占一星之入蜀謂合遄歸不五月而渡瀘却疑深入元戎小隊復班石谷之春方國細書趣侍雲臺之下尹吉甫之清風穆如可挹唐子西之遺範炳若猶存潼川府郪縣鹽亭平江飛烏涪城銅山通泉東關射洪永泰建置沿革禹貢梁州之域東井輿鬼之分野春秋戰國為蜀地漢高帝分置廣漢郡郪縣與焉後漢因之先主定蜀分廣漢蜀梓潼郡晉又分置新都郡蕭紀於郪縣置新州西魏置昌城郡隋改新州為梓州因梓潼水為名煬帝廢為新城郡唐改為梓州又改為梓潼郡復為梓州肅宗以梓州為東川節度治所前蜀為武德軍國朝改靜戎軍又改安靜軍又詔梓州稱劒南東川升為潼川府以梓州為潼川府路乾道間升瀘南為潼川府路安撫使而潼川守臣兼果渠懷安廣安五郡兵馬事今領縣十治郪縣本路提刑置司事要郡名梓潼東川左蜀風俗俗好勝尚氣舊經云云不耻貧賤士通經學古舊經曰云云罕為異習人傑地靈圖經梓州出趙㽔之智術陳子昻之文章所謂人傑地靈者也岑象求趙巖記東漢以來人物可見者僅數人其間以禮自持不應辟命者殆居其半形勝左帶涪水通典云云右挾中江居水陸之衝要東控瀘敘乞升潼川府奏狀云云西扼綿茂江山形勝水陸之衝為劒外一都會與成都相對古廣漢郡劉甲人物志序唐以前凡稱梓潼者即今之隆慶稱涪者即今之綿州惟稱郪及廣漢縣乃潼川也元和志州城宋元嘉中築不及西川一大縣鄧良能南樓記云自唐為東川節度名有十邑與西川等而壤地瘠薄民物之産云云通泉為梓名邑楊天惠撰通泉縣連鰲閣記梓於西南為大都云云江山秀潤土田平夷土産桃竹杜甫丨丨杖詩江心蟠石生桃竹蒼波噴浸尺度足斬根削皮如紫玉江妃水仙惜不得梓潼使君開一束滿堂賔客皆歎息憐我老病贈兩莖出入爪甲鏗有聲老夫復欲東南征乘濤鼓枻白帝城路幽必為鬼神奪杖劒或與蛟龍爭重為告曰杖兮杖兮爾之生也甚正直慎勿見水踴躍學變化為龍使我不得爾之扶持滅迹於君山湖上之青峯噫風塵澒洞兮豺虎咬人忽失雙杖兮吾將曷從山川牛頭山在郪縣西南二里形似丨丨丨四面孤絶俯臨州郭下有長樂寺樓閣為一方勝槩圖經有云羅漢洞在巖之半永福寺據其頂廣化寺據其岡羅漢院據其麓東山在城東杜甫陪王侍御同登東山最高頂宴姚通泉晚攜酒泛江詩姚公美政誰與儔不減昔時陳太邱邑中上客有柱史多暇日陪驄馬遊東山高頂羅珍羞下顧城郭銷我憂清江白日落欲盡復攜美人登綵舟笛聲憤怒哀中流妙舞逶迤夜未休燈前往往大魚出聽曲低昻如有求三更風起寒浪湧取樂喧呼覺船重滿空星河光破碎四座賔客色不動請公臨深莫相違回船罷酒上馬歸人生歡會豈有極無使霜露霑人衣大雄山在中江有真武祠杜甫有題玄武禪師屋壁詩即此東武山在射洪縣東十里唐陳伯玉集云陳方慶好道隱於此有唐朝道觀遺址金華山在射洪縣有陳拾遺學堂杜甫詩涪右衆山內金華紫崔嵬上有蔚藍天垂光抱瓊臺繫舟接絶壁杖策窮瀠洄四顧俯層巔淡然川谷開雪嶺日色死霜鴻有餘哀焚香玉女跪霧裏仙人來陳公讀書堂石柱側青苔悲風為我起激烈傷雄材白崖山在射洪縣南十五里郪江在郪縣西南源出銅山縣赤岸溪涪江在郪縣北通遂州射江涪江水東南流與射江合鵝溪在鹽亭縣境其地産絹梓潼水在鹽亭縣其源出劒州沈水在通泉縣北公孫述令延岑盛兵固守丨丨漢臧宮進兵縱擊之斬首溺死者萬餘人即此堂亭名世堂在府治畫司馬相如王褒楊雄嚴君平屈原陳子昻李太白蘇子瞻八人來袞堂在府治以趙丞相更名西郊亭蒲公規亭記云蜀相高平公所建野亭在通泉縣東杜甫陪王侍御宴通泉東山丨丨詩江水東流去清樽日復斜異方同宴賞何處是京華亭影臨山水村煙對浦沙狂歌遇形勝得醉即為家山亭杜甫登牛頭丨丨詩云路出雙樹外亭窺萬井中江城孤照日山谷遠含紅兵革身將老關河信不通猶殘數行淚忍對百花叢水亭杜甫章梓州丨丨詩城晚通雲霧亭深到芰荷吏人橋外少秋水席邊多館驛通泉驛杜甫詩溪行衣自濕亭午氣始散冬溫蚊蚋集人遠鳬鴨亂驛樓哀柳側縣郭輕煙畔一川何綺麗盡日窮壯觀寺觀慧義寺杜甫陪章梓州詩云春日無人境虛空不住天鶯花隨世界樓閣倚山巔遲暮身何得登臨意惘然誰能解金印瀟灑共安禪前人送王少尹赴成都詩云苒苒谷中寺娟娟林表峯欄干上處遠結構坐來重騎馬行春徑衣冠起暮鐘雲門青寂寂此别惜相從牛頭寺杜甫詩青山意不盡袞袞上牛頭無復能拘礙真成汗漫遊花濃春寺靜竹細野池幽何處鶯啼切移時獨未休望丨丨丨詩牛頭見鶴林梯徑繞幽深春色浮山外天河宿殿陰傳燈無白日布地有黃金休作狂歌客回看不住心兜率寺在南山名長夀有劉蛻文冢碑及蛻三詩刻之石杜甫詩兜率知名寺真如會法堂江山有巴蜀棟宇自齊梁庾信哀雖久何顒好不忘白牛連遠近且欲上慈航望丨丨丨詩樹密當山徑江深隔寺門霏霏雲氣重閃閃浪花翻不復如天大空餘見佛尊時應清盥罷隨喜給孤圍東山寺名普惠寺在城東涪江之外去城三里寺有蘇公泉臨川門下瞰涪江香積寺在涪城縣有官閣杜甫詩寺下春江深不流山腰官閣逈添愁諸天合在藤蘿外昏黑應須到上頭東臺院在鹽亭縣郎中任伯傳於山上建亭讀書十年而兄弟子孫登科者十餘人其孫任源有記玉京觀在射洪縣北金華山上東晉陳勳學道山中白日仙去梁天監中建觀有唐明皇所鑄老君像有陳拾遺讀書堂及盧藏用祭文祠廟白崖廟在白崖山圖經云神姓陸諱弼梁天監中為瀘州刺史卒於官歸舟過此山下舟皆沈沒後為立廟勾溪廟在中江縣即天齊王祠子瞻有看畫古叢祠之句見後題詠名宦郭元振唐詩紀事元振神龍間尉通泉任俠使氣不事小節武后召欲詰問既與語奇之索所為文章上寶劒篇后覽之嘉歎杜甫過代公宅詩豪傑初未遇其迹或脫略代公尉通泉放意何自若及夫登袞冕直氣森帷薄磊落見異人豈伊常情度定策神龍後宮中翕清廓俄頃辨尊親指揮存顧託羣公甫慙色王室無削弱逈出名臣上丹青照臺閣我行得遺迹池館皆疏鑿壯公臨事斷顧步涕橫落高詠寶劒篇神交付冥漠蘇榮唐相味道之父為梓州參軍致書鄉人曰項注吏部州參子號縣帶郪名由來不涉老身併是婦兒宫職時人賞之柳仲郢公綽之子字諭蒙為東川節度使美績流間又孫光憲北門瑣言曰西川人言梓州者我車門之草市也仲郢為東川節度使聞之曰吾仕朝廷三十年清津備歷今日始與西川作市令耶李商隱唐大中時為東川判官今護彌勒巖佛頌及南禪四證堂碑皆商隱文皇朝燕肅天聖中為守作蓮花漏張雍德安人知梓州值李順之亂士遜蠲煩苛尚簡素弔死恤孤歌頌之聲溢於道路范百祿淳熙間為提刑會瀘夷反命熊本措置夷數千請命將欲屠之百祿不可遂受其降人物王渙郪人為洛陽舍寬猛得宜人為立祠王堂郪人遷汝南太守委功曹陳蕃匡理政務郡內稱治並東漢時趙㽔鹽亭人篤學不仕輿李白善著書號長短經陳元敬子昻之父瑰偉倜儻弱冠豪俠屬鄉人阻飢散粟萬斛以濟貧民年二十二擢第天后居攝遂山棲餌术見趙淡頌陳子昻射洪人唐興文章徐庾餘風天下祖尚子昻始變雅正武后時上書言事為右拾遺後為縣令假簡所害盧藏用云道喪五百載而得陳君子昻有感興詩墓在獨坐山學堂遺址在金華山顧彥暉郡人以忠義稱皇朝蘇易簡銅山人太平興國五年狀元文同字與可永泰人文潞公守成都奇之致書與可云襟韻灑落如晴雲秋月塵埃不可到司馬溫公蘇文忠公尤敬重之有丹淵集題詠官柳著行新杜甫郪城送李判官詩云慿高送所親久坐惜芳辰遠水非無浪他山自有春天際傷離别離筵酒太頻野花隨處發云云江水流城郭杜甫春日登梓州城樓詩行路難如此登樓望欲迷身無却少壯迹有但羈棲云云春風入鼓鼙雙雙新燕子依舊已銜泥五馬何時到杜甫送梓州李使君之任詩近看除刺忠還喜得吾賢云云雙魚會早傳江清歌扇底杜甫陪李梓州泛江有女樂在渚舫戲為艷曲詩上客回空騎佳人滿近船云云野曠舞衣前玉袖臨風並金壺隱浪偏競將明媚色偷眼艷陽天立馬千山暮前人白日移歌袖青霄近笛牀翠眉縈度曲雲鬢儼分行云云回舟一水香使君自有婦莫學野鴛鴦銜恩到梓州姚合送楊尚書赴東川詩郤縠詩書將云云繞身垂印綬護馬執戈矛劒閣和銘峭巴江帶字流從來皆惜别此别復何愁漢女輸橦布王維送梓州李使君詩萬壑樹參天鄉音聽杜鵑山中一半雨樹杪百重泉云云巴人訟芋田文翁翻教授不敢倚先賢得郡書生榮蘇子瞻送周正孺知東川詩云云還家昔入重而況東西川千騎擁上冢里門下車日父老自驚聳端如何武賢不事長卿寵清時養材傑杞梓方培擁未應遺合抱取用及把拱如君尚出麾顧我宜耕隴告歸謝先手求去悔不勇豈云慕廉退實自知衰冗為君掃棠隂畫像或相踵東川得望郎蘇子瞻次前韻云云坐與西爭重高峯傾石室舊學鄙文冢蜀人安使君所至野不聳竹馬迎細侯大錢送劉寵遙知勾溪路老稚相扶擁看畫古叢祠百怪朝幽拱牛頭與兜率雲木蔚堆壠醉鄉追舊遊筆陳賈餘勇聊將詩酒樂一掃簿書冗西風吹好句珠玉本無踵水散巴渝下五溪杜甫野望詩金華山北涪溪西仲冬風月始凄凄山連越嶲蟠三蜀云云從來不奉一行書杜甫投簡梓州幕府兼簡韋郎詩幕下郎官安穩無云云固知貧病人須棄能使韋郎迹也疏一門三鎮擁朱輪潼川舊記鮮于叔明功德碑載嚴氏詩三院四人簮白筆云云訓練強兵動鬼神杜甫寄章侍御詩淮安維揚一俊人金章紫綬照青春指麾能事回天地云云關西不得歸關羽河內猶宜借冦恂朝覲從容問幽側勿云江漢有垂綸鞭指金門望轉清張順之送大諫赴闕詩一萬餘家留戀意二三十里管絃聲惠加棠水流難盡云云深僻還如樗社村張順之寄唐山人詩梓潼江口涪江上云云鳯凰城裏花時别陳羽梓州與溫商夜别詩云云玄武江邊月下逢客舍莫辭先買酒相門曽忝共登龍近風騷屑千家竹隔水悠揚五夜鐘明日又行西蜀路不堪天際遠山重外邑高山擁縣青杜甫行次鹽亭寄嚴遂州蓬州二使君詩馬首見鹽亭云云雲溪花淡淡春郭水泠泠全蜀多名士嚴家有德星登臨意無極好為老夫聽山縣早休市杜甫倚杖詩自注在鹽亭時作看花隨郭內倚杖即溪邊云云江橋春聚船狎鷗經白浪歸鴈喜青天物色兼生意凄涼憶去年烏好人亦好杜甫贈射洪李四丈丈人屋上烏云云人生意氣豁不在相逢早薛公十一鶴杜甫通泉縣署屋壁後薛少保畫鶴詩云云皆寫青田真威遲白鳯態非是倉庚鄰赤霄有真骨耻飲汙池津冥冥任所往脫略誰能馴江頭且繫船杜甫題郪縣郭明府茅屋壁云云為爾獨相憐雲散灌壇雨春青彭澤田頻驚適小國一擬問高天别後巴東路逢人問幾賢四六出綸北闕賜履東川蜀川巨鎮郪道名邦地接三江鎮分二蜀輟從楓陛分竹使以鼎來坐使梓潼與錦城而爭重柳侯見薄苐言市令之如坡老送行乃以望郎而重建臺移治蓋田諫議之言持節䇿名有趙清獻之烈陳伯玉之故鄉風生諫草杜少陵之遺迹月冷詩壇接漏天之霧雨隔畨冢之煙雲方輿勝覽卷六十二
