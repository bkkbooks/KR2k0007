body:
  text: 方輿勝覽卷六十一宋祝穆撰涪州涪陵武龍樂溫建置沿革禹貢梁州之域周為雍州之地東井輿鬼之分野鶉首之次春秋為巴國地秦置巴郡在西漢領縣十一東漢領縣十四而涪陵與枳縣居其二蜀先主以其地控巴江之源因於此立涪陵郡領漢平漢葭縣晉以涪郡理枳縣地宋齊並屬涪陵及巴郡後周於故枳城立涪陵鎮隋改為縣唐置涪州改涪陵郡復為涪州皇朝平蜀隸峽路今隸夔路領縣三治涪陵事要郡名涪陵龜陵風俗人多戇勇華陽志山險水灘云云刀耕火種郡志峽路在巉巖嶮峻之中其俗云云惟涪梁重慶郡稍有稻田俗有夏巴蠻夷郡志云云夏則中夏之人巴則廪君之後蠻則槃瓠之種夷則白虎之裔巴夏居城郭蠻夷居山谷地暖早熱龜陵志五月半早稻已熟便可食新七八月間收割已畢云云與中州氣候不同形勝東接巴東華陽志云云南接武陵西接牂牱北接巴郡州在涪江之西元和志州在蜀江之南今云云在今為要魏華父題名記江出汶山合西南衆水至重慶至嘉陵水至涪陵受黔水故涪陵云云控瞿唐上流郡志序會川蜀之衆水云云與荆楚接境寰宇記土産荔支寰宇記地産丨丨尤勝諸郡圖經相傳城西十五里有妃子園其地多荔支昔楊妃所嗜當時以馬遞馳載七日七夜至京人馬多斃於路百姓苦之故杜牧之過華清宮詩云長安廽望繡城堆山頂千門次第開一騎紅塵妃子笑無人知道荔支來又朝説之詩荔支一騎紅塵後便有漁陽萬騎來謂此也然蜀中荔支瀘敘之品為上涪州次之合州又次之涪州徒以妃子得名其實不如瀘敘也蘇子瞻荔支歎十里一置飛塵灰五里一候兵火催顛坑仆谷相枕藉知是荔支龍眼來飛車跨山鶻橫海風枝露葉如新採宮中美人一破顔驚塵濺血流千載永元荔支來交州天寶嵗貢取之涪至今欲食林甫肉無人舉觴酹伯遊我願天公憐赤子莫生尤物為瘡痏雨順風調百榖生民不飢寒為上瑞君不見武夷溪邊粟粒芽前丁後蔡相籠加爭新買寵各出意今年鬭品充官茶吾君所乏豈此物致養口體何陋耶洛陽相君忠孝家可憐亦進黃姚花漢永元間交州進荔支龍眼十里一置五里一候奔騰死亡罹猛獸之害者無數唐羌字伯遊為陵武長上書言狀和帝罷之扇假民記涪州出丨為時所貴松屏出石山間相傳爾朱先生種松於此映山之石皆有松紋匠人欲採先祈禱山神焚爇方得佳者不加人力天然成文茶磨江邊細密之石名曰青蟆可作丨丨山川龜山在黔江東岸州治據其上形如龜故州以此名鐵匱山舊經一名吳君山橫亘江北與涪陵縣相對雄壓諸山遊蘭山在高松鄉地名羅雲蘭真人修煉之處人至洞門望見丹竈真人題字巖石自搖欲墜駭不可至巾子山在樂溫縣北百里北巖在大江之北相傳王真人修煉於此石甕磧與州治相對東渡高峯之上耆舊云國初太守吳侯來遊遇一婦人打繖步行指石甕磧云我久居其地又取玉環一付廂吏云為我以此謝史君異日當顯仕子孫復來守此州言訖不見涪江自思州之上費溪發源經五十八節名灘方至黔州溉自黔州溉與施州江會流九十里經彭水武德二縣凡五百餘里與蜀江會于州之東水常湛然徹底以其出於黔州又呼黔江坡詩合水來如電黔江緑似藍又名內江昔司馬錯泝此水南上擊奪楚黔中地蜀江發源岷山經嘉敘瀘重慶至城下自成都登舟十三程至此會合黔江過忠萬雲安夔歸峽至荆南一千七百七十里鑑湖有景物之勝白鶴灘在州之上流錦繡洲在銅柱灘東北洲人能織錦罽故名井泉鹹泉在武龍縣距白馬津東三十餘里江岸有丨丨初康定間有程運使舟次鶻岸聞江中有硫黃氣襲人太甚謂此必有丨丨駐舟召工開之果得鹹脈是時兩岸薪蒸贍足民未知烹煎之法乃於忠州遷井竈户十餘家教以煮鹽之法末幾有四百餘竈由是兩岸林木芟剃悉成童山堂樓朋樂堂黃魯直命名并記鈎深堂在北巖紹聖丁丑伊川謫居於涪即普淨院闢堂傳易閲再嵗而成元符庚辰徙夷陵會太史黃公自涪移戎過其堂因榜曰丨丨嘉定丁丑范仲武請為北巖書院正堂奉安伊川先生塑像其左待制尹公祠其右為直閣譙公祠簡池劉光祖為之記四賢樓在北巖謂程黃尹譙也古迹江心石魚在涪陵縣江心有雙魚刻石上每一魚三十六鱗一銜蓂草一銜蓮花有石稱石斗在傍三五年或十年方一出出必豐年唐大順元年鐫詩甚多名宦張濬唐先啓中為守郡少井泉濬乃窮山泉之源以竹引之民賴其利今廢惟吳公溪上俗猶呼為水筒埡今千福院濬之記尚存人物皇朝譙定字天發樂溫縣玉溪人深於易自號涪陵居士伊川魯直相繼謫居于涪聞其名未之識遂率伊川往訪之從此深加敬仰後隨伊川入洛靖康初許右丞薦至維揚從駕授通直郎直祕閣未幾冦至不知所之或以為得道隱青城山淵聖皇帝召涪陵處士譙定至京師處以諫職定以言不用力辭杜門不出名賢程頤字正叔紹聖謫居寓于北巖先生嘗自言昔貶涪州過漢江中流船幾覆舉舟之人皆相視號泣伊川正襟安坐心存誠敬已而船及岸於同舟衆人有老父問伊川曰當船危時君坐甚莊何以伊川曰心存誠敬耳老父曰心守誠敬固善不若無心伊川尚欲與之言因忽不見尹焞字彥明避亂於涪獨處一室范沖舉自代靖康中朝廷以布衣特起既至京師懇辭還山賜號和靜處士建炎召充崇政説書黃庭堅字魯直紹聖間謫涪州别駕黔州安置題詠暮過高唐雨張祜送李長史歸涪州詩涪江江上客嵗晚却還鄉云云秋經巫峽霜急灘船失次疊嶂樹無行好為題新什知君思不常文風齊兩蜀宋翰題涪陵郡中詩錦繡洲猶在熊羆夢已無云云仙洞接三都白石從天設青崖見地圖荔支妃子國不復曩時輸舟楫三川會馬提幹涪州五十韻地據咽喉重城踰雉堞堅東漸鄰楚分南望帶夷邊云云封疆五郡連許雄山苦峻馬援埧相連灘急羣豬沸崖高落馬懸石魚占嵗稔鐵匱鎖晴天地暖冬無雪人貧嵗不綿巖標山谷字觀塑爾朱仙人家避水半危樓陸務觀詩官道近山多亂石云云四六銅虎疏榮石魚標瑞帷涪陵之名郡控夔峽之上流眷龜陵千里之邦為夔門一道之冠臨荔子之邦詩請賡於杜牧玩松紋之石迹難訪於爾朱連五郡之封疆此為要地薰四賢之德義尚挹遺風咸淳府臨江南賔墊江龍渠建置沿革禹貢梁州之域輿鬼之分野入參八度春秋戰國為巴地秦屬巴郡漢屬益州巴郡之臨江縣東漢屬永寧郡梁於此立臨江郡後周兼置臨州隋煬帝罷臨州以縣屬巴東郡恭帝重立臨州唐改忠州又為南賔郡復為忠州隸荆南皇朝隸夔路咸淳元年八月有旨係今上潛藩之地升咸淳府今領縣五治臨江事要郡名南賔風俗氣候差熱清化志其地與恭涪氣候等視他郡差熱要不至與桂嶺並為瘴鄉其地荒遠瘴癘黃魯直復古記云云士頗尚氣進士題名記有巴蔓子仗節死義之遺風故云云有甘興霸文廣休任俠之遺風故士頗倜儻守節不屈清化志嚴顔云云因改名忠寰宇記以地邊巴徼當懷忠信為名四君子相望復古記云云謂劉晏陸贄李吉甫白居易也形勝古巴子國清化志在恭涪夔萬之間南賔志土産馴鹿唐假文昌記珍禽丨丨荔支白居易在忠州有郡中丨丨十八韻及寄荔支與楊使君詩丹橘假文昌記素奈丨丨山川倚天山在臨江縣石堡山在臨江縣東五十里平都山在豐都縣東北一里神仙傳後漢陰長生於此山上升有煉丹遺迹屏風山即夏祠山引藤山在龍渠縣東十五里山出引藤俗用以取酒岷江自豐都縣南五十步流入臨江縣界鳴玉溪在州北十里有懸崖瀑布高五十餘尺潭洞奇邃古木蒼然樊石灘在豐都縣張無盡有詩東澗在開元寺白公丨丨種柳詩野性愛栽植植柳水中坻三年末離郡可以見依依東池在開元寺白公有東池春草詩樓閣巴東道院在州治荔支樓在城西南隅白公置公有荔支樓對酒詩荔支新熟雞冠色燒酒初開琥珀香欲摘一枝傾一盞西樓無客共誰嘗東樓白公詩山束邑居窄峽牽氣候偏林巒少平地霧雨多陰天隱隱煮鹽火漠漢燒畬煙賴此東樓夕風月時翛然慿軒望所思目斷心悁悁背春有鴈去上水無來船西樓白公詩悄悄復悄悄城隅隱林杪山郭燈火稀峽天星漢少年光東流水生計南枝鳥月沒江沉沉西樓殊未曉四賢閣黃魯直記忠州漢巴郡之臨江墊江縣也其治所在臨江故梁以為臨川後周以為南賔郡唐貞觀八年始為忠州其地荒遠瘴癘近臣得罪多出為刺史司馬故劉尚書以刺史貶一年死陸宣公以别駕貶十年死李忠懿公以刺史居六年白文公以刺史居二年其後喜事者以四公俱賢圖像為丨丨丨故相贈司徒鄭州刺史南華劉晏士安故相贈兵部尚書嘉興陸贄敬輿中書侍郎平章事贈司徒安邑李吉甫宏憲刑部尚書贈左僕射下邽白居易樂天由開元以來訖于會昌四君子相望凛然猶有生氣忠民書以此自負而郡守至者必矜式焉紹聖三年正月知州事營邱王君闢之聖凃下車問民疾苦曰吏驁而民困故聖凃為州拊養柔良知其飽飢鉏冶猾姦幾於傷手治聲翕然邑中豪吏故時受賕舞文法者相與謀曰屬且無類即以智籠小騃吏郡訴於部使者聖凃不為變且歎曰白頭老翁安能録録畏吏民苛民耶亦會部使者察其為姦而聖凃治成時休車騎野次咨問故老詠四賢之逸事而三君之政寂寥無聞蓋士安即賜死而敬輿别駕不治民宏憲雖在州六年亦默耳樂天由江州司馬除刺史為稍遷故為郡最暇豫有聲迹又其在州時詩見傳東樓以宴賔佐西樓以瞰鳴玉溪登龍昌上寺以望江南諸山張樂巴子臺以會竹枝歌女東坡種花東澗種柳皆相傳識其處所於是一花一竹皆考於詩復其舊貫種荔支數百株移木蓮且十本忠於一時遂為三峽名郡聖凃乃以書誇涪翁曰為我記之涪翁曰聖凃急鰥寡之病使遠方沐浴縣官之澤可謂知務矣掃除四賢之室思欲追配古人可謂樂善矣樂天去忠州於今為二百七十有九年在官者鰓鰓然常憂瘴癘之病已數日求去故樂天之遺事蕪沒欲盡聖凃齊人也蓋不能巴峽之風土又其擊強撥煩材有餘地而晚暮為遠郡守乃能慨然不倦興舊起廢使郡中池觀花竹鬱然如元和己亥時追樂天而與之友聖凃於是賢於人遠矣聖凃為州之明年六月而涪翁為之記東坡亭在郡圃白公於此種花詩云何處殷勤重回首東坡桃李種新成又云最憶東坡紅爛熳野桃山杏水林檎蘇子瞻别杭州詩云平生自覺出處老少粗似樂天非東坡之名偶爾同也又有西坡白公亦有詩東亭白公詩緑樹為間客紅蕉當美人南亭白公詩高城直下視蠢蠢見巴蠻安可施政教尚不通語言舉杯亭在城東石盤山寺觀龍昌寺在臨江縣今為治平寺白公嘗於寺傍植柳柳盛則寺興柳衰則寺廢僧愛此柳比之甘棠龍興寺陸務觀有龍興寺弔少陵先生寓居詩中原草草未承平戍火胡塵到兩京扈蹕老臣身萬里天寒來此聽江聲寺門聽江聲甚壯景德宮在平都山舊名仙都觀即白鶴觀也自豐都縣東行二里許始登山石徑縈廽可一二里平瑩如掃林木邃茂夾徑皆翠柏殆數萬株有老柏十數云皆千年物也麂鹿時出沒林間皆與人狎甚又名禹廟又名平都福地乃前漢王方平得道之所張孝祥為書紫府真仙之居陸務觀詩唐碑多斷蝕梁殿半欹傾祠墓禹祠在臨江縣南過岷江二里杜甫詩禹廟空山裏秋風落日斜荒庭垂橘柚古屋畫龍蛇雲氣生虛壁江聲走白沙早知乘四載疏鑿控三巴屈原塔在臨江縣東蘇子瞻丨丨丨詩楚人悲屈原千載意未歇至今滄江上投飯救飢渴遺風成競渡哀呌楚山裂南賔舊屬楚山下有遺塔應是奉佛人恐子就淪滅陸宣公墓在玉虛觀南三十步舊經陸宣公嘗藁葬於此或曰宣公已歸葬而忠南特虛塜耳然杜子美已歸葬偃師而耒陽之墓自若李太白已移殯青山而采石之塜猶存則敬輿此墓宜封殖之古迹巴子臺在臨江縣白公登城東古臺詩迢迢東郊上有土青崔嵬不知何代物疑是巴王臺巴歌久無聲巴宮沒黃埃黃葛木景德觀前有古木大數十圍枝柯盤鬱如蓋山中人云此黃葛木千年物也黃心木白公木蓮樹詩自序云巴人呼為丨丨丨大者高四五丈涉冬不凋身如青楊葉如桂花如蓮香色豔膩皆然獨房蘂有異四月初花自開逮謝僅二十日忠州鳴玉溪生者穠茂尤異又有詩云如折芙蓉栽旱地似拋芍藥挂高枝雲埋水隔無人見惟有南賔太守知名宦嚴顔三國時劉璋使守巴郡為張飛所擒顔曰有斬頭將軍無降將軍飛怒命斬之顔色不變曰斫頭便斫頭何必怒耶今臨江縣西南二十里有嚴太守祠東坡嚴顔碑詩注云在忠州詩曰先主及劉璋兵意頗不義孔明古豪傑可以為此事劉璋固庸主誰為死不二嚴子獨何賢談笑傲砧幾國亡君已執嗟子死何為何人刻山石使我空涕淚劉晏坐與元載有仇貶忠州刺史陸贄以論延齡姦佞貶忠州别駕公在忠州十年避謗不著書集古今名方五十卷號集驗方今紫極觀有宣公墓王介甫詩英英陸忠州學問輔明智低徊得坎軻勳業終不遂李吉甫吉甫初為陸贄所擬出為明州刺史及贄貶忠州時宰欲殺之起李吉甫為忠州刺史使甘心焉既至置怨結歡人益重其量贊皇公來為忠州時李獻公生於巫峽之中歸時已六嵗矣白居易初盜殺武元衡公首請捕賊貶江州司馬久之徙忠州刺史居忠二年政事之美吟詠之什至今忠人以夸耀四方皇朝胡旦為守王旦知臨江縣壁記人物巴蔓子巴人也周末國亂將軍巴蔓子請師於楚許以三城楚王已救巴使請城蔓子曰藉楚之靈克濟禍難誠許楚王城可持吾頭往謝城不可得也乃自刎使者以蔓子首歸報楚王王曰使吾得臣如巴蔓子者用城何為乃以上卿之禮葬其首巴亦舉其尸以上卿之禮葬之施州今有廟焉題詠井邑聚雲根杜甫詩忠州三峽內云云小市常爭米孤城早閉門空看過客淚莫覔主人恩淹洎仍愁虎深居賴獨園巫峽中心郡白居易感春詩云云巴城四面春峽深田地窄白居易詩城暗雲霧多云云薰草鋪坐席白居易郡中春宴詩云云藤枝注酒尊蠻鼓聲坎坎巴女舞蹲蹲山上巴子城白居易詩云云山下巴江水中有窮獨人強名為刺史時時竊自哂刺史豈如是食粟餧家人黃縑裹妻子注云忠州刺史已下悉以畬田粟給祿食以黃絹支給充俸可憐島夷師白居易忠州詩云云自稱為使君勿笑風俗陋勿欺官府貧蜂窠與蟻穴隨分有君臣吏人生硬都如鹿白居易初到忠州詩好在天涯李使君江頭相見日黃昏云云市井疏蕪只抵村隻蘭船當驛路百層石磴上州門更無平地堪行處虛受朱輪五馬恩悶取藤枝引酒嘗白居易春至詩間拈蕉葉題詩句云云圖經云蜀地多山多種黍為酒民家亦飲粟酒地産藤枝長十餘尺大如指中空可吸謂之引藤屈其端置醅中注之如晷漏本夷俗所尚土人效之耳徒使花袍紅似火白居易著刺史緋詩故人安慰善為辭五十專城未是遲云云其如蓬鬢白成絲黃茅岸上是忠州白居易寄向侍御詩明月峽邊逢制使云云忠萬樓中南北望白居易答楊萬州見憶詩詳見萬州多是通州司馬詩白居易竹枝歌江畔諸人唱竹枝前聲斷咽後聲隨怪來調苦緣詞苦云云夔人所歌劉禹錫九章今南賔所傳有白文公四章謾載其一四六西蜀奧區南賔大郡按楚峽之上遊有唐賢之遺烈乃眷雲根之聚正當月峽之間皂蓋朱轓尚覺官儀之盛黃縑紅粟未嫌俸入之微巴子故城遺俗尚餘於氣節樂天舊部勝遊殆遍於詩歌珍州樂源綏陽建置沿革禹貢荆州之域為翼軫之分野古山獠夜郎國自古非臣服之地南夷君長以十數夜郎最大漢武帝時唐蒙請置夜郎縣及牂牱郡晉分牂牱置夜郎郡宋南齊因之隋無所經見唐太宗開山洞置珍州并置夜郎麗臯洛源三縣改為舞州又為鶴州復為珍州憲宗廢屬溱州五代復為蠻夷皇朝復賜珍州舊名繼改高州以廣西有高州改為西高州徽宗時大駱解上下族帥駱世華駱文貴等獻地立珍州亦曰樂源郡今領縣二治樂源事要郡名樂源夜郎風俗其俗夷獠圖經遵義軍宣和改為寨隸樂源縣其俗以射獵山伐為業信巫鬼重謠祝好詛盟外癡內黠安土重舊凡交易刻木為書契結繩以為數其桀黠能言議屈服種人者謂之耆老其昏姻以銅器氈刀弩矢為禮其燕樂以銅鑼鼓橫笛歌舞為樂其所居無城池之固架木為閣聨竹為壁開忩出箭以備不虞出入佩刀弩自衛至與華人交易略無侵犯禮義之風凡賔客聚會酋長乃以漢服為貴其民以耕殖為業同上丨丨端龎淳固丨丨丨丨丨天資忠順悉慕華風形勝古夜郎郡圖經云云唐改珍州黔中故壤見圖經云夷州之境同上云云與黔思犬牙相錯又云夷州乃古夜郎牂牱郡故地山川豹子山在州北八里山多産豹羅蒙山在州西南二百九十里東松山在州南三百五十里西松山在州南三百二十五里綏陽山在州西二百四十里白崖堡乃官軍於此把守之地有麗臯堡思義堡安定堡夀山堡三江去州三十里一名明溪虎溪在州東十七里思溪在州西北百八十里出南平軍與明溪合貫珠溪在州東南五十里人物尹珍漢威帝時牂牱人珍自以居於荒裔不知禮義乃從汝南許慎應奉受經書圖緯學成還鄉里教授於是南域始有學焉名賢李白蔡寬夫詩話云太白之從永王璘世頗疑之唐書載其事甚略亦不為明辨其是否獨其書自序云半夜水軍來潯陽滿旌旃空名適自誤迫脅上樓船從賜五百金棄之若浮煙辭官不受賞翻謫夜郎邊以此觀之則太白豈從人亂者哉題詠夜郎萬里道唐李白寄江夏韋太守詩云云西上令人老山繞夜郎城張文昌送蠻客詩借問炎洲客天南幾日行江連惡溪路云云夜郎遷客帶霜寒李白寄韋南陵詩君為張掖近酒泉我竄三巴九千里天地再造法令寬云云四六夔路奧區樂源古郡雖云夷俗實慕華風古不居於臣服令久被於皇靈萬里朱轓暫撫夜郎之俗一封紫詔即歸曉禁之班粵從漢代尹珍之教化始行循至唐朝太白之詩歌尤盛思州務川安夷建置沿革楚地翼軫之分野戰國土地與黔中同楚為黔中地秦置郡自漢至吳並為武陵郡酉陽縣地吳分置黔陽郡隋屬清江郡又置務川屬庸州即今之黔江縣是也尋廢屬巴東郡唐以務川當牂牱要路置務州太宗改為思州以思邛為名明皇改寧夷郡復為思州黔州之美胥而為夷皇朝平蜀思州不豫大觀元年蕃部長田祐恭願為王民始建思州而夔路化外州郡凡十而思居其首尋省為務川城高宗中興復以務川城為思州就以田祐恭為守今領縣三治務川事要郡名務川思南風俗蠻獠雜居寰宇記俗同黔中地在荒徼之外云云言語各異漸被華風圖經思南之地云云飲食言語素所服習椎髻之俗徑悍之性靡然變易矣形勝當牂牱要路唐招慰使冉安昌以務川云云須置郡以撫之縣名思王元和志故老相傳漢陳立為牂牱太守阻兵保據思邛水漢將夜郎王兵數萬破立於此撫安百姓時人思慕遂名思王縣郡非古城輿地廣記本朝但據夷人所指以為縣涪州夏判官謂思州舊城去今城百八十里一寨四堡運使龎恭孫建築思州奏州治務川因山川控扼建云云以備要害山川唐山在州東四里南連河只水北枕內江水思王山在州西南三百七十里抵貴州思邛山在思王縣東南都來山在思邛縣東二十五里接錦州界都波山在思邛縣東接錦州界無黨山去思邛縣田十里四面懸絶巴江水出城西南牂牱界河只水在務川縣東二十里河只者獠姓名羅多水在務川縣東八十里羅多亦獠姓名亭榭名宦人物題詠並闕四六夔路奧區思南要地畫地以守變戎而華雖曰黔中之地實為徼外之州周職方之不及固遠華風秦郡國之肇分久漸王化在天一涯雜鵙舌侏􅍣之俗環地千里藉虎符彈壓之威方輿勝覽卷六十一
