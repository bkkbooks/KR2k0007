body:
  text: 方輿勝覽卷六十六宋祝穆撰利州東路興元府南鄭褒城亷水西縣城固建置沿革禹貢梁州之域秦楚之交東井輿鬼翼軫之分野周合梁於雍又属雍州春秋戰國属秦楚秦為南鄭及漢中郡項羽封漢髙為王都於此漢改梁曰益王莽改曰新城都後漢張魯據漢中改曰漢寜漢武復置漢中郡蜀先主為漢中王晉為梁州自宋以來多理南郡後魏亦立梁州及漢中郡後周改為漢川郡隋廢梁州為漢川郡唐為梁州又以梁凉聲相近更名褒州尋復故名改漢中郡復為梁州德宗以朱泚之亂幸梁洋陞興元府皇朝乾德鑄興元尹印分益梓利䕫四路興元府為利州路後分利州東西路而興元為利東路今統郡十領縣五治南鄭本路安撫提刑置司事要郡名漢中天漢蕭何諫髙祖曰丨丨其稱甚美劉禹錫㕔壁記丨丨之邦實居右部南鄭褒中褒陽風俗其氣彊梁東漢志西方之氣丨丨故曰梁州其民質直華陽志云云好義土風朴厚有先民之風多事畋漁隋志漢中之人朴質無文不甚趨利性嗜口腹丨丨丨丨雖柴門蓬室食必兼味秦資其富華陽國志序云云用兼天下漢用以興同上漢祖用之奄有四海又以帝業所興不封藩王形勝南接廣漢華陽國志東接南郡云云西接壠西隂平北接秦川厥壤沃美貢賦所出畧似三蜀前瞰三秦紹興孫道夫秦漢中云云後蔽四川黄權以為蜀之股肱楊洪以為蜀之咽喉故諸葛亮蔣琬費褘之徒皆駐兵于此前控六路之師張魏公德逺奏漢中形勢之地云云後據兩蜀之粟左通荆襄之財右出秦隴之馬為巴蜀捍蔽元和志漢中云云故蜀先主待漢中曰曹公雖來亦無能為也是以公孫述劉備李雄據蜀漢中皆䧟蜀之股臂按三國蜀志黄權傳曰今若失漢中則三巴不振此為刮蜀之股臂也成都之喉嗌隋書南鄭要險云云秦蜀出入之衝太守文同奏云云誠山西浩瀼之奥區地形險固曹洪曰漢中云云四嶽三塗皆不及也連髙夾深歐陽詹秦之坤蜀之艮云云九州之險也隂谿窮谷萬仞直下犇崖峭壁千里無土為威禦之鎮寰宇記氐羌接畛云云山川中梁山去南鄭縣十三里南方之美者有梁山之犀象焉州因山名鎮梁州之中故以為之號漢山山在南鄭縣西南二十里四峯八面其南接巴山山有池水天臺山在南鄭縣非四十里山頂平坦如臺興元坐其岡脉石有金星可作硯金華山在南鄭縣西南七十里峭峯特起青銼山在南鄭縣西南五十里山頂一石如銼梁州山在南鄭縣東南百八十里與孤雲兩角相接大山四圍其中三十里許甚平或云古丨丨治也孤雲山在簾水縣東南百八十里兩角山與孤雲山相連玉堂閒話云興元之南有太行路通於巴州其路險峻三日而逹于山頂其絶髙處謂之孤雲兩角去天一握淮隂廟在焉仙臺山在簾水縣道經云仙人玉女所居之地有韓信廟云蕭何追信至此斗山在城固縣道經云山有五穴一通崑崙一通隴山一通武光一通青城一通長安三嵎山在城固縣西北四十里三峯鼎立萬仞箕山在褒縣北十五里鄭子真隱於此山諸葛亮嘗遣趙雲鄧芝等據箕谷卓筆山去西縣二十里一峯峭出如筆定軍山在縣西南十里北臨沔水三國志建安三十二年劉備營於丨丨丨夏侯淵引兵爭之即此有武侯墓嶓冡山在故金牛縣東二十八里漢水所出石臼嶺歐陽詹詩鳥企蛇盤地半天下窺千仞到浮煙因髙囬望沾恩處認得梁州落日邉褒谷在褒城縣北郡國志謂北口曰斜南口曰褒長四百七十里同為一谷兩谷髙峻中間谷道褒水所流乃張良送髙祖至褒中説燒棧道曹操出斜谷遮要以臨漢平諸葛亮由斜谷取郿皆此道也斜谷在府西北入丨丨路至鳯州界百五十里有棧閣二千九百八十九間板閣二千八百九十二間士人云其間有一溪可行舟孫資曰昔武帝征南鄭取張魯陽平之役危而後濟又自徃拔出夏侯淵軍􅂾言南鄭直為天嶽中斜谷其道為五百石穴言其深險喜㧞出淵軍之辭也駱谷崔覲詩髙峯堰蹇雲崔嵬層崖巨壑長峽開龍蛇縦横虎豹亂石棧朽㓕埋深苔子午谷詳見洋州武鄉谷諸葛亮封武鄉侯即此百牢關在西縣三十里元和志隋置白馬關後以黎陽有白馬關故更此名李義山送叔梓州詩莫􅂾萬重山君還我未還武關猶在望何况丨丨丨石頂關在西縣東南三十里今置關最為險要七盤路在褒城北二十里元稹有詩見題詠門石門在褒城縣西北元稹詩東凌丨丨險西表金華瑞韋蘇州有懷谷口詩云念昔白衣士結廬在丨丨盖石門即谷口鄭子真所居也街亭三國志魏張郃與蜀將馬謖戰于此華陽水在褒城縣西北十五里黑水在城固縣西北太白山南流入漢禹貢華陽丨丨惟梁州諸葛亮箋云朝發南鄭暮宿丨丨亷水出大巴山北宻谷中詳見范栢年註遜水其源起於亷水溉田之餘東南流至古亷水城之側文水在城固縣北褒水出太白山下褒中即山河堰也或云本蕭何堰訛為山河丙水源出褒城縣西北牛頭山有丙穴出嘉魚堂樓桂石堂在府園文與可詩嘗間陽朔山萬尺從地起孤峯立亭下此石無乃似天漢樓在府治子城上山川環繞為一郡登覽之勝處亭榭四照亭在府園文與可詩云蠻嶺附梁山汀洲隨漢水秋容上屏障左右三百里此景誰能論殘霞獨憑几盤雲塢在府園文與可詩幾曲上層城盤盤次文石館驛褒城驛孫樵記丨丨丨天下第一及得寓目視其沼則淺混而茅視其舟則離敗而膠庭除甚蕪堂廡甚殘烏覩其所謂宏麗者訊於驛吏則曰忠穆公嘗牧梁州以褒城控二節度治所龍節虎旗馳馹奔軺以去以來轂交蹄劘由是崇侈其驛以示雄大盖當時視他驛為壯且一嵗賔至者不下數百輩茍夕得其庇飢得其飽皆暮至朝去者寧有顧惜心耶至如掉舟則必折篙破舷碎鷁而後止魚釣則必枯泉汨泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汙敗室廬糜毁器用官小者其下雖氣猛可制官大者其下益暴横難禁由是日益破碎不與曩類某曹八九輩雖以供饋之隟一二力治之其能補數百人殘暴乎語未既有老甿笑於旁且曰舉今州縣皆驛也吾聞開元中天下富蕃號為理平踵千里者不裹糧長子孫者不知名今者天下無金革之聲而户口日益破疆場無侵削之虞而墾田者益寡生民日益困財力日益竭其故何哉凡與天子共治天下者刺史縣令而已以耳目接於民而政令速於行也今朝廷命官既已輕任刺史縣令而又促數於變易且刺史縣令逺者三嵗一更近者一二嵗再更故州縣之政茍有不利於民可以出意革去者其在刺史縣令則曰我即去何用如此當愁醉醲當飢飽鮮囊帛匱金笑與秩終嗚呼州縣者真驛耶矧更代之隙黠吏因縁恣為姦欺以賣州縣者乎如此而欲望生民不困財力不竭户口不破墾田不寡難哉予直揖退老甿條其言書於褒城驛壁古跡媯墟世本云在城固縣西北舜之居也劉禹錫驛路記云鎮于丨丨褒城胡曽詩恃寵驕多得自由驪山舉火戲諸侯秪知一笑傾人國不覺胡人滿玉樓八陣圖在西縣定軍山下郡志毎隂曀則有鼓之聲名宦田叔華陽國志蕭何守關中以田叔為漢中守叔既饋以軍饟又致名材帝嘉之魏延蜀先主遷治成都當得重臣以鎮漢中衆論必在張飛飛亦以心自許先主乃拔延為督漢中范柏年宋人為州將劉亮使至京師諮事明帝言及廣州貪泉因問柏年卿州亦有此水否荅曰梁州惟有文川武鄉亷泉遜水又問卿宅在何處荅曰臣所居在亷遜之間帝美其對温造以興元軍亂殺李絳衆謂造可夷其亂乃授節度使李德裕以李訓用事為節度使元結少遇亂浮沉人間蘇元明薦結於肅宗上時議三篇上恱擢山南西道節度使元稹為刺史孟郊興元節度使鄭餘慶奏為叅謀皇朝許遜祥符間為守府有堰溉田萬頃世傳蕭何所為迺躬治木石修之堰成嵗大豐歐公為記其事魯宗道祥符中以祕丞知城固縣張浚宣和中為士曹言行録謂調褒城令劉子羽紹興四年為守初宣司移軍閬中公留關外䕶軍明年呉玠戍河池王彦戍金州二鎮大飢興元帥閉關塞褒斜二鎮病之張公浚乃承制拜公知興元至之日盡弛其禁通商輸粟二鎮乃安人物鄧先城固人多竒計呉楚反帝誅錯先為校尉擊呉楚還上問曰七國聞誅錯兵罷否曰七國為謀反數嵗發怒削地非為錯也帝曰公言善張騫城固人建元中使月氏開西南夷封愽望侯鄭子真褒中人成帝時王鳯備禮聘之不應家于谷口楊王孫城固人治黄老家累千金厚自奉養臨終告其子曰我死祼葬以復吾真李郃南鄭人通五經善河洛風星知有二使者入益部詳見成都李固南鄭人為太尉以欲立清河王蒜為梁冀所害皇朝楊冲逺魏公張德逺試吏興元理椽往别鄉先生楊用中曰公嘗往來梁洋其人士有與子遊者乎楊曰興元楊仲逺可以為師洋州雍退翁可以為友公至興元遂與為友雍諱冲退翁其字也方元祐大臣變更政事冲居大學士上書數其罪誅之有㫖移興元府自訟齋許尹紹聖中知興元召對言今日莫若重蜀重蜀以興元為本髙宗嘉納其説安守忠長編王師克興元上召安守忠謂曰逺俗困於苛虐南鄭走集之地為撫和之遣知興元府題詠梁惟西南屏韓獻鄭相公云云山厲水刻窟禀生肖勦剛難諧在民物榮公鼎軸老烹斡力健倔帝咨女子往牙纛前坌坲威風挾惠氣葢壌兩劘拂緑樹滿褒斜劉禹錫送趙中丞參山南幕府詩云云西南蜀道賖驛門臨白草棧道過黄花棧道與雲齊趙氏雜言寄杜羔詩梁州秦嶺西云云棧想武侯征元徼之褒城贈黄明府詩序元稹為刺史奉使東川至褒城驛有黄明府見迎艤舟同載因徧問其褒陽山水則褒姒所奔之城在其左諸葛亮所征之路次其右作贈黄明府詩迤邐七盤路坡陁􅂾丈城花疑褒女笑云云後騎踏橋聲劉禹錫送令狐相公鎮梁州詩雲樹褒中路風煙漢上城前旌轉谷去云云詩書理漢中姚合送鄭尚書赴興元儒有登壇貴何人得此功紅旗燒宻雪白馬踏長風斧鉞来天上云云方知百勝畧應不在彎弓孤鶩入洋州崔覲城樓詩斷煙横沔水云云一身騎馬縣官迎元稹詩今日清明江上去云云忽驚身在古梁州元稹詩云驛吏呼人排馬去云云計程今日到梁州白居易寄元稹詩花時同醉破春愁醉折花枝作酒籌忽憶古人天際去云云聽唱梁州䨇管篴李聰西城聽唱梁州詞行人夜上西城宿云云此時秋月滿關中何處關山無此曲萬轉江山通蜀國羅隱送人赴任褒中詩云云兩行珠翠見褒人海棠花謝東風老應念京都共苦辛戮盡鯨鯢漢水清劉禹錫送温尚書出鎮興元詩旌旗入境太無聲云云從此世人開耳目始知名將出書生棧底江含雪水寒劉禹錫送令狐楚詩山中花帶煙嵐晚云云漢中沃野如關中黄冕仲言和糴之病作罷糴行云云四五百里煙䝉蒙黄雲連天夏麥熟水稻漠漠吹秋風七月八月䆉稏紅一家往往収千鍾雲棧屏山月月遊陸務觀漢中詩云云馬蹄初喜踏梁州地連秦雍川原壯水下荆揚日夜流外邑月明西縣驛南樓元稹漢江聞笛詩小年為冩游梁賦最説漢中聞笛愁今夜聽時在何處云云四六出綸天上趣鎮漢中眷西陲之要地有南鄭之名邦褒姒所奔之城諸葛出征之路昔炎圖之肇造由此而興今全蜀之欲安頼兹以守青天上蜀道乆嚴分闔之權黑水惟梁州允頼安邉之傑宣化承流分五馬䨇旌之寄躋危歴險在孤雲兩角之邉張留侯棧道之絶陳迹可尋鄭子真谷口之耕清風猶凜谷號褒斜漢功臣之所保水名亷遜宋名士之攸居出鎮梁州歴旌谷騎橋之險大書褒驛嚴匱金囊帛之詞利州綿谷昭化葭萌嘉川建置沿革禹貢梁州之域井桞之分鶉首之次春秋戰國為蜀地蜀王封其弟葭萌於漢中號苴侯因命其邑曰葭萌秦置巴蜀及漢中郡而葭萌𨽻蜀郡漢分置廣漢郡今州即廣漢郡之葭萌地蜀先主改為漢壽縣属梓潼郡晋武改為晋壽縣尋䧟於李雄宋文帝時䧟於楊難當齊分晋壽之興安縣置東晋郡於烏奴城郡對烏奴山即其故地也魏為西益州梁改為黎州又為西益州又改為利州隋煬帝改為義成郡唐又為利州益昌郡復改為利州初𨽻感義軍更感義曰昭武軍治利州五代前蜀仍為昭武軍後唐平蜀改曰益州後蜀因之皇朝改昭武軍為寕武軍中興以來張浚以宣撫使退保利州鄭剛中虞允文以宣撫使置司利州王炎始移司興元安丙仍乞置司移州今領縣四治綿谷四川總領本路轉運置司事要郡名寜武益川益昌小益圖經呼為丨丨對成都為大益也劔外寜武序卜丨丨一大都會風俗土瘠民貧寳峯亭記云云城郭庳而居室陋民貧役重蘇子瞻跋鮮于子駿益昌八詠云云壤錯羗氐司馬公祠堂記郡丨故丨丨丨與上庸百濮微髳彭盧俱雜以秦語寜武志自城以南純帶巴音由城以北云云形勝南走劔門陳恢倅㕔題名記益昌之丨陸丨丨丨過劔而東西川在焉水走閬果由閬果而去適䕫峽焉西則趣文龍二州東則會集壁諸郡故益昌於蜀最為一方之都會後通巴蜀寜武志前接關表云云前界關表寜武志云云後據劔北實為重地西臨嘉陵元和志州城云云為蜀北門重修學記云云據秦巴之衝司馬温公祠堂記云云據川陸之會寜武志云云咽喉要路蜀志先主使陳戒絶馬鳴閣魏武聞之喜曰此閣遇漢中之隂平乃丨丨之丨丨綿谷驛記利控蜀之吭四集之國也四戰之地唐周庠説王建曰葭萌云云難以乆安蜀檮杌曰利州四會五逹山川烏奴山在綿谷山北六十里以李烏奴得名峭壁如削有洞髙不可上五代時王真人舉家上昇於此龍門山梁州記葱嶺石穴髙數十丈如門亦名龍洞山朝天嶺在州北五十里路徑絶險其後即朝天程舊路在朝天峽棧閣遂開此道人甚便之文與可丨丨丨詩嶺若畫屏隨峽勢水如衣帶轉巖隂漫天嶺長編乾德二年王師伐蜀蜀主燒絶棧道退保葭萌遂擊金山寨又破漫天寨蜀人退保大漫天寨㧞之追至利州郭奕見閬州詩五盤嶺杜甫詩五盤雖云險山色佳有餘仰凌棧道細俯映江木踈地僻無綱罟水清反多魚好鳥不妄飛野人半巢居喜見厚朴俗坦然心神舒東郊尚格闘巨猾何時除故鄉有弟妹流落隨邱墟成都萬事好豈若歸吾廬岑參早上丨丨丨詩平旦驅駟馬曠然出五盤江逈兩崖闘日隠羣峯攅蒼翠煙桑曙森沉雲樹寒松疎露孤驛花密蔵廻灘棧道溪雨滑畬田巖草乾此行為知已不覺蜀道難白衛嶺在昭化縣南與劍門相接有白衛鋪唐詩記事載明皇幸蜀登丨丨丨眺覽良乆歌李嶠詩山川滿目泪沾衣富貴榮華能幾時不見只今分水上惟有年年秋雁飛曰李嶠真才子也龍門閣在綿谷縣一里馮鈐幹田云其他閣道雖險然在山腰亦微有徑可以増置閣道獨惟此閣石壁斗立虚鑿石竅而架木其上比他處極險杜甫龍門閣詩清江下龍門絶壁無尺土長風駕髙浪浩浩自太古危塗中縈盤仰望埀線縷滑石歌誰鑿浮梁裊相拄目眩隕雜花頭風吹過雨百年不敢料一墜那得取飽聞經瞿唐足見度大庾終身歴艱險恐懼從此數石櫃閣杜甫詩季冬日已長山晚半天赤蜀道多草花江間饒竒石石櫃層波上臨虚蕩髙閣清暉囬羣鷗暝色帶逺客羇棲負幽意感嘆向絶跡信甘孱懦嬰不獨凍餒廹優游謝康樂放浪陶彭澤吾衰末自由謝爾性有適馬鳴閣在昭化縣劔閣在綿谷葭萌縣又見隆慶府劍門關註歐陽詹棧道銘斜根玉壘旁綴青泥揔庸蜀之道塗統岐雍之康莊李白送友人王炎入蜀作劍閣賦云若明月出於劍閣兮與君兩卿對酒而相憶大劔城元和志即秦張儀司馬錯伐蜀所由路又謂之石牛道詳見劍門關小劔城在益昌西北五十里去大劍門三十里連山險絶飛閣通劍故謂劍也潭毒關在州北九十里有御前軍屯駐于此下瞰大江路皆滑石登陟頗艱異時撒離合破興元帥劉子羽屯兵于此以悍蜀口又其下深潭有一鐵索見則兵動明月峽晏公類要巫峽巴峽明月峽三峽惟明月在此界石欄橋在綿谷縣一里自城北至大安軍界管橋欄閣共一萬五千三百一十六間其著名者為石櫃龍洞焉西漢水一名嘉陵江在綿谷西一里潜水出綿谷縣東北龍門山書沱潜既道藍溪在葭萌縣出龍鼻山流入閬州界南渡温庭筠利州南渡詩澹然空水空斜暉曲島蒼茫接翠微波上馬嘶㸔掉去桞邉人歇待船歸数藂沙草羣歐散萬頃江田一鷺飛誰解乘舟尋范蠡五湖烟水獨忘機桔栢潭在昭化縣今昭化驛有古栢土人呼桔栢故以名潭杜甫詩青冥寒江渡駕竹為長橋竿濕煙漠漠江水風瀟瀟連笮動嫋娜征衣颯飄颻急流鷁散絶岸黿鼉驕西轅自兹異東逝余可要髙通荆門路濶會蒼海潮孤光隱顧盼遊子悵寂寥無以洗心胷前登但山椒南池劍南詩藁云杜甫所謂安和有蒼池者即此地或云在閬州堂亭公居八詠鮮于侁題靈溪寺曰桐軒竹軒栢軒巽堂山齋燕間亭會景堂寳峯亭凡五言八句司馬温公范蜀公蘇潁濵文與可皆有詩會景堂鮮于子駿詩金城環雉堞雪屋瞰闤開雙林聳江右九隴覘天外寳峯亭司馬君實詩䯽鬟烏奴翠衣帶嘉陵碧霞生白水尾日没九隴脊鮮于子駿舟航日上下車馬不少閑近邑凑商賈逺峯自雲煙文與可嘉陵抱江回平衍出横澨中間築雄壘獨據兩川會行臺敞嚴府磊落北城外潭潭走翠楹直上巒嶺背山齋范蜀公詩云衆山四面合二水南北流蘇頴濵詩簡書日填委杖屨毎幽獨古跡望鄉臺九域志武元衡送桞郎中詩望鄉臺下秦人去學射山中杜魄哀望喜驛李義山詩嘉陵江水北東流望喜樓中憶閬州若到閬州還赴海閬州應更有髙樓嘉陵驛武元衡詩悠悠風斾遶山川山驛空濛雨作煙路半嘉陵頭已白蜀門西更上天青籌筆驛在綿谷縣去州北九十九里舊傳諸葛武侯出師嘗駐此杜牧詩三呉列婺女九錫獄孤兒覇主業未半本朝心是誰永安宫受詔籌筆驛沉思畫地乾坤在濡毫勝負知艱難同草創得失計毫釐寂然經千慮分明混一期川流縈智慮山聳助扶仗持慷慨匡時畧從容問罪師褒中秋鼓角渭曲晚旌旗義懸無敵鳴攻固有辭若非天奪去豈復慮能支子夜星纔落鴻毛鼎便移郵亭世自換白日事長垂何處躬耕者猶題殄瘁詩李義山詩魚鳥猶疑畏簡書風雲長為䕶儲胥徒令上將揮神筆終見降王走傳車管樂有才終不忝關張無命欲何如佗年錦里經祠廟梁父吟成恨有餘羅隱題抛擲南陽為主憂北征東討盡良籌時來天地雖同力運去英雄不自由千里山河輕孺子兩朝冠劔恨譙周惟餘巖下多情水猶解年年傍驛流薛逄題天地三分魏蜀呉武侯崛起賛訏謨身依豪傑傾心術目對雲山演陣圖赤伏運衰功莫就皇綱力振命先徂出師表上留遺恨猶自千年激壯夫陸游題一等人間管成子不堪譙叟作降牋名宦武士矱九域志士矱為利州都督生武后于此今皇澤寺有武后真容殿沈長源按歐陽詹集正元中呉興沈公長源牧利州其為政五年予旅遊乎利覩人安俗阜欽所以美作益昌行詩有曰驅馬至益昌倍驚風俗和耕夫壟上行負者塗中歌何易于唐史見循吏傳易于為益昌令刺史崔朴嘗泛舟出益昌索民挽繂易于即腰笏身引舟朴驚問狀易于曰方春百姓耕且蠶惟令不事可任其勞朴愧疾驅去顔真卿自蓬州遷利州刺史皇朝王素為守司馬池天聖間為轉運使按烏奴山祠堂記云公侍其先君駐節此邦春秋纔十有四已和鮮于子駿寳峯之詩鮮于侁為轉運副使有益昌八詠又嘗為京東運使司馬公以福星稱之虞允文蜀帥呉璘卒以公為四川宣撫使公開幕於利州時軍政乆弛公首劾大將之病民十一人薦其可為將帥者三人諸軍歡呼相慶焉題詠葭萌氐種逈杜甫愁坐作詩云云坐擔大戎屯棧道籠迅湍岑參云云行人貫層崖關山同一照杜甫呈漢王詩云云烏鵲自多驚青原帶秦疆蘇子由詩嘉陵横其隂劔門屹其陽黒水環禹跡云云不覺蜀道難前人此行為知己云云朝登劔閣雲隨馬岑參嘉州和裴相公發益昌云云晚渡巴江雨洗兵百里夷塗無十歩陸務觀木𤓰鋪詩鼓樓坡前木𤓰鋪嵗晚悲辛利州路當車礧礧石如屋云云馬經斷棧危無路陸務觀次益昌詩云云風掠枯茅颯有聲暮雪烏奴停醉帽陸務觀詩云云秋風白帝放歸船四六輟自朝端出臨劔外畫千里地依五盤山旁聮四邑對峙兩臺帝念葭萌地隣嶓冡昔開帥閫中興曽駐於重兵今號侯藩全蜀此為之都督木牛轉粟路即逹於褒斜銅虎剖符師可臨於秦隴山川險阻多杜陵叟之詩篇亭舘清幽有范蜀公之賦詠驛名籌筆羣賢之詩句常存山號劔門千古之碑銘不泯方輿勝覽卷六十六
