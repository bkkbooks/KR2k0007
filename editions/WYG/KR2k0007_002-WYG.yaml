body:
  text: 方輿勝覽卷二宋祝穆撰平江府吳縣常熟長洲吳江崑山嘉定建置沿革禹貢揚州之域漢地理志吴地斗分野晉天文志星紀之次周為吴國封太伯扵此至闔閭强盛浙西盡為吴有後吴地又盡為越有楚㓕越封黄歇扵吴秦㓕楚置㑹稽郡漢髙帝封荆王賈吴王濞並有㑹稽之地東漢以浙西為吴郡浙東為㑹稽郡三國屬吴孫氏陳為吴州隋平陳改蘇州唐因之國朝太平興國改為平江軍政和陞平江府領縣六治吴縣長洲兩縣浙西提刑提舉置司事要郡名姑蘇因山得名吴郡見沿革注吴㑹圗經吴東南一都㑹吴門吴中風俗俗好用劔郡國志丨丨丨丨輕死盖湛盧屬鏤干將要離之遺風所化者逺圗經序太伯遜天下季札辤一國徳之丨丨丨丨矣更厯晉漢風俗清美昔呉太守麋豹出行屬城問功曹唐景風俗所尚景曰處家無不孝之子立朝無不忠之臣文為儒宗武為將帥時人以為善言士夫淵藪繫年錄諫議鄭殻言陛下南渡當擢吴中之秀以為用况平江常潤湖杭明越號為呉中丨丨丨丨好儒好佛圗經盖朱買臣陸機顧野王之徒顯名扵當代而人尚文支遁道生慧嚮之儔倡法于羣山而人尚佛有所自来也驕奢好侈同上然丨丨丨丨自古有之帝都賦云競其區宇則倂疆兼巷矜其宴居則珠服玉饌亦非虚語上元燈毬郡志丨丨丨影巧麗他郡莫及有萬眼羅及琉璃丨者尤妙天下七夕摩睺羅同上土人工于泥塑所造摩睺羅尤為精巧四郊無曠土同上吴中自昔號盛云云髙下悉為田人無貴賤往往皆有常産故多奢少儉有海陸之饒隋志田澤衍沃云云無墊溺之患舊經城中未嘗有墊溺蕩析之患形勝具區在西漢地理志北枕大江漢武帝賜嚴助書㑹稽東接于海南近諸越云云水國之勝范至能吴江主簿㕔壁記松江太湖云云當天下第一旁連湖海徐嘉告詞眷惟中吴宻拱行闕丨丨丨丨外控江淮枕江連海沈度告詞吴門价藩云云為東南冠孫尚書普明院記自唐白公為刺史時時即事賦詩已謂八門六十坊三百橋十萬户丨丨丨之丨詩云茂苑太繁雄是也逮乾符光啓間大盜蠭起争為强雄而武肅王錢鏐以破黄巢誅董昌之功盡有浙東之地五代分裂諸藩據數州惟王獨嘗順事中國有宋受命盡籍土地府庫率其属朝京師遂去其國盖自長慶宣和更七代三百年吴人不見兵革覆露生養至四十三萬家而吴太伯廟棟猶有唐昭宗寧海軍鎮東莭度使錢鏐姓名書其上可謂盛矣土産彩牋郡志吴中所造名聞四方以諸色粉和膠刷牋隠以羅紋然後砑花唐皮陸有唱和魚牋詩曰向日乍驚新繭色臨風時辨白萍紋注魚子曰白萍此豈用魚子耶今其法不傳而所造品第尤新竒蠟牋畫牋尤精絶云太湖石郡志出洞庭西以生水中者為貴石在水中嵗久為波濤所衝擊皆成嵌空石面鱗鱗作靨名曰彈窩亦水痕也沒人縋下鑿取極不易得石性温潤竒巧扣之鏗然如鐘磬在山上者名旱石枯而不潤或贋作彈窩以售亦得善價白居易記見安吉州蓴鱸郡志生松江後漢左慈嘗在曹操座曰今日髙㑹珍羞畧備所少吴江鱸魚耳慈曰求銅盤貯水以竹竿餌釣于盤中須臾引一鱸魚出操使膾之周浃㑹者金谷園記謂鱸魚常以仲秋後􅀙海入江菰葉南越人以箭笋和為羮甚珍魚白如玉菜黄如金隋人已呼為金羮玉膾云蘇子美論風俗丨丨稻蟹可以適口山川虎丘山在城西北九里又名海湧山遙望平田中一小丘越絶書吴王闔廬葬丨丨丨下𤼵五都之士十萬人共治葬穿土為川積壤為丘池廣六十歩水深一丈五尺銅棺三重澒池六尺黄金珠玉為鳬鴈扁諸之劔魚腸之干在焉葬三日金精上騰為白虎蹲踞于上世説始皇嘗登此阜將𤼵塜取寳鍔俄有白虎始皇拔劍刺虎虎隠入山因名虎丘後避唐諱改虎為武山有雲巖寺范至能再到詩不過溪橋又兩年偶随笻竹訪幽禪有縁再踏雲岩路無處重尋石井泉擬輟半山分座住先携一枕借床眠覺来飽喫紅蓮飯正是塘東稻熟天葉正則詩虎丘之名嵗二千虎丘之丘何眇然衆山争髙隠日月笑此拳石埋平田雖然培塿疑異物劃開隂崖十丈懸冡中有恨索遺指亭上無語傳枯禪徧是吴人愛山急逐面分方夸凭立屋承隋唐良穏稱墨題熙豐尚新濕松梢莫遺風雨横石盤自添苔蘚澁春来春去吴人逰足蠒層顛踣應泣靈巖山在城西二十四里又名硯石山吴王之别苑在焉有館娃宫琴臺響屧廊西施洞山頂有池生葵蒓下瞰太湖望洞庭兩山滴翆叢碧在白銀世界中亦宇内絶景山前十里有採香徑因置秀峰寺天平山在城西二十里巍然特髙羣峰拱揖郡之鎮也楊備詩人間多少嶮巇路縦是天平還不平蘇子美詩吴㑹括衆山戢戢不可數其間號天平突兀為之主傑然鎮西南羣嶺争拱輔吾知造物意必以屏大府清溪至其下仰觀勢飛舞偉石如長人聚立欲言語捫蘿緣險嶝爛熳松竹古中腰有危亭前對紺壁舉石竇落玉泉泠泠四時雨源生白雲間顔色若粉乳旱年或播灑潤可足九土奈何但泓澄未為應龍取予方棄塵中巖壑素自許盤桓擇雄勝至此快心膂庶得耳目清終甘心扵虎姑蘇山在吴縣西三十里或曰姑胥或曰姑餘越絶書闔閭就山起臺三年聚材五年乃成髙見三百里史記吴破越越進西施請退軍吴王許之王得西施多逰姑蘇子胥諫曰臣恐姑蘇不久為麋鹿之逰王不聼太史公嘗登姑蘇臺以望五湖李白詩舊苑荒臺楊栁新菱歌清唱不勝春只今惟有西江月曽照吴王宫裏人劉禹錫詩故園荒臺在前臨震澤波綺羅随世盡麋鹿占時多築用金槌力摧因石䑕窠昔年彫輦路唯有採樵歌包山在吴縣西南百二十里又名洞庭山中有洞庭深逺吴王使威靈丈人入洞穴十七日不能盡因得禹書又有林屋洞十大洞之一也蘇子美水月院記中有山七十二惟洞庭稱雄其間地占三鄉户率三千環四十里民俗魯朴以橘柚為常産每秋髙霜餘丹葩朱實與長松茂樹相差間于岩壑間望之若圖畫陽山在長洲西北三十里又名秦餘杭山有龍母廟相傳東晉隆安中有繆氏女遇一白衣老人歸而有妊産一肉塊驚棄水中倐化為龍夭矯母前母遂驚絶葬此山下人為立祠紹興間犇雲靉靆起于是山俄頃肓風暴雨龍自郡城過捲去女墻數百丈居民余氏小亭吸入雲中有負販者被吸去復墜而無傷華山在吴縣西六十里故老云山頂有池生千葉蓮華人服之能羽化故名丨丨巖石甚竒勝山半有大壑曰天池最佳處也石公山山前有石板皮日休詩翆石數百歩如板漂不流空疑水妃意浮出青玉洲中若瑩龍劍外惟疊蛇矛狂波忽然死浩氣清且浮似將翆黛色抹破太湖秋安得三五夕携酒棹扁舟召取月夫人嘯歌于上頭又恐霄景闊虚皇拜仙侯欲建九錫碑立當十二樓瓊文忽然下石板誰能留此事少知者唯應波上鷗黿山在洞庭西出青石可以壓砌緣池横山在吴縣西南十里據湖山之中以鎮西南三江書云丨丨既入震澤厎㝎丨丨者北江中江南江也厯丹陽毗陵者為北江今之大江也首受蕪湖東至陽羨者為中江分扵石城過宛陵至具區者為南江三江在震澤上下而皆入扵海松江在吴江縣一名笠澤范希文詩有浪即山髙無風還練静秋宵誰與期月華三萬頃陳希元詩平波渺渺煙蒼蒼菰蒲纔熟楊栁黄扁舟繫岸不忍去秋風斜日鱸魚鄉王介甫詩宛宛虹霓墮半空銀河直與此相通五更縹緲千山月萬里凄凉一笛風鷗鷺稍囬青靄外汀洲時起綠蕪中騷人自欲留佳句忽憶君詩思已窮呉江王介甫詩莽莽昔登臨秋風一散襟地留孤嶼小天入五湖深柑橘無千里魚蝦有萬金吾雖輕范蠡終欲此幽尋五湖舊經謂貢湖逰湖胥湖梅梁湖金鼎湖酈善長謂長塘湖上湖滆湖與太湖而五韋昭云胥湖蠡湖洮湖滆湖就太湖而五虞仲翔云太湖之水通五道謂之丨丨太湖在吴縣南五十里皮日休詩三萬六千頃頃頃玻瓈色疎岑七十二露寸㦸陸龜蒙詩嘗聞咸池氣下注作清質至今涵青霄尚且浴白日蘇子美詩杳杳波濤閲古今四無邉際莫知深潤通曉月為清露氣入霜天作暝隂笠澤鱸肥人膾玉洞庭柑熟客分金風煙觸目相招引聊為停橈一楚吟石湖在盤門西南十里葢太湖之派范蠡所􅀙入五湖者本朝范至能所居孝宗御書丨丨二字賜之滬瀆在吴縣陸龜蒙叙矢魚之具云列竹扵海澨曰滬許浦乃海道風寒之衝大軍屯于此井泉石井在虎丘張又新水品第三松江第四橋水第六今丨丨實勝劔池井旁有亭以為烹茶宴坐之所白雲泉在天平山為吴中第一水憨憨泉在寳華山寺之東極清冽相傳為得道僧名丨丨者卓錫所出堂舍州宅後臨大池白居易詩紅紫共紛紛祗承老使君移舟木蘭棹行酒石榴裙水色窓窓見花香院院聞戀他官舍住䨇鬢白如雲黄堂郡志今太守所居之宅即春申君之子為假君之殿也因數失火塗以䧺黄故曰丨丨以厭火灾木蘭堂嵐齋錄唐張摶為刺史植木蘭花于堂前嘗盛開宴客命即席賦之陸龜䝉後至張聨酌浮之徑醉彊索筆題兩句云洞庭波浪渺無津日日征帆逺送人頽然醉倒客續之皆莫詳其意既而龜蒙稍醒續曰㡬度木蘭船上望不知元是此花身遂為絶唱白檜堂在州治池中小山上有檜相傳白公手植今非矣樓閣齊雲樓在郡圃子城上宏敞壯麗白居易齊雲晚望詩重複江山壯平舒井邑寛丨丨丨北面終日凭欄干西樓在郡治子城門上白居易丨丨夜宴詩風月萬家河兩岸笙歌一曲郡西樓六經閣建安志載張伯玉守吴郡語司户曽子固曰我方作丨丨丨子為我記之子固呈藁終不合意遂自為之子固一見歎服其詞曰丨丨丨諸子百家皆在焉不書尊經也吴郡州學始由髙平范公經紀之至今尚書富郎中十年更八政學始大成經南嚮史西嚮子集東嚮標之以油素掲之以油黄澤然區處如蛟龍之鱗麗如日月之在紀不可得而亂矣判天地之極致皇王之髙道生人之紀律舉在是矣亭榭西亭即今西齋白居易詩幸有酒與樂及時且歡娱怱其觧郡印他人来此居滄浪亭在郡學東蘇子美記予以罪廢無所歸扁舟南逰旅扵吴中始僦舍以處時盛夏蒸燠土居皆褊狭不能出氣思得髙爽虚曠之地以舒所懐不可得也一日過郡學東顧草樹欝然崇阜廣水不類乎城中並水得㣲徑于雜花脩竹之間東趍數百歩有棄地縦廣函五六十尋三向皆水也杠之南其地益廣旁無民居左右皆林木相虧蔽訪諸舊老云錢氏有國近戚孫承祐之池館也㘭隆勝勢遺意尚存予愛而裴囬遂以錢四萬得之築髙北碕號滄浪焉前竹後水水之陽又竹無窮極澄川翆榦光影㑹合扵軒戸之間尤與風月為相宜予時榜小舟幅巾以往至則洒然㤀歸觴而浩歌踞而仰嘯野老不至魚鳥共樂形骸既適則神不煩觀無邪則道以眀返思向之汨汨榮辱之場日與錙銖利害相磨戛隔此真趣不亦鄙哉噫人固動物耳情横于内而性伏必外寓于物而後遷寓久則溺以為當然非勝是而易之則窒而不開唯仕宦溺人為所至深古之才􅈒君子有一失而至于死者多矣是未知以自勝之道予既廢而獲斯境安于冲曠不與衆駈因之復能乎内外失得之原沃然有得笑閔萬古尚未能忘其所寓自用是為勝焉三髙亭蘇子瞻戲書吴江三賢畫像范蠡詩誰将射御教吴兒長笑申公為夏姬却遣姑蘇有麋鹿更憐夫子得西施張翰陸龜蒙詩已見人物松江亭白居易携樂觀魚宴宿震澤平蕪岸松江落葉波在官常夢想為客始經過水面排􅊻網船頭簇綺羅朝盤鱠紅鯉夜燭舞青蛾鴈斷知風急湖平得月多繁絃與促管不觧和漁歌吴江亭蘇子美詩氣象清雄天與隣世間不合有埃塵擬將累勺酬佳景只恐江山觧笑人垂虹亭米元章有詩云斷雲一葉洞庭帆玉破鱸魚霜破柑好作新詩繼桑苧垂虹秋色滿東南姑蘇臺在山上楊廷秀詩有云我亦閒来散病身㳺人不用避車塵挿天四塔雲中出隔水諸峯雪後新道是逺瞻三百里如何不見六千人吴亡越霸今安在臺下年年花草春館驛姑蘇館在盤門裏河西城上紹興中為國信館待之所下有百花洲平望驛張祜題一派吴興水西来此驛分路遙經㡬日身去是孤雲雨氣朝忙蟻雷聲夜聚蚊何堪秋草色到處重離羣松江驛方干題丨丨丨便向中流出太陽兼疑大岸逼浮桑門前白道通丹闕浪裏青山占㡬鄉帆勢落斜依浦溆鐘聲斷續在滄茫古今悉不知天意偏把雲霞媚一方橋梁臯橋在閶門内漢臯伯鸞居此劉夢得泰娘詩有時粧好乗天氣走上丨丨折花戲風流太守韋尚書路旁忽見停隼旟乗魚橋在子城西前志琴髙扵此見大鯉魚長丈餘遂乗魚飛騰上昇垂虹橋在吴江縣即利往橋東西千餘尺用木萬計前臨具區横絶松陵湖光海氣蕩漾一色乃三吴之絶景橋之中有亭曰垂虹蘇子美詩長橋跨空古未有大亭壓浪勢亦豪王介甫詩三江五湖口地與天不隔日月所蔽虧東西渺然白漫漫浸北斗浩浩浮南極誰投此虹蜺欲濟兩間阨中流雜蜃氣欄楯相承翼初疑神所為㓕沒有頃刻晨興坐其上傲兀至中昃獨憐造化功不謂因人力今君持酒漿談笑顧賓客頗誇九州物壯麗此無敵熒煌丹砂柱璀璨黄金壁中家不慮始助我皆豪殖喟予獨不可還當采民力鄭毅夫詩三百欄干鎖畫橋行人波上踏瓊瑶挿天蝃蝀玉腰闊跨海鯨鯢金背髙路直鑿開元氣白影寒壓破大江豪此中自是銀河接不必仙槎八月濤小長橋在石塘累石為之王逢原詩老匠鐵手風運斤一挟刅入千山髠明堂有柱不見用此為失地猶濟人西瀦巨澤江海通陽侯利溺驚濤風當道獨能支地險更東安得與天窮莫比垂天紳莫比跨地帶渇龍乾死枯無鱗絶海失舟鯨踏背秦帝東逰逐仙迹累重肉多飛不得三洲之水盡朝宗安得身乗破浪風為約他年可歸處獨倚欄干不思去季鷹范蠡不足竒待我為名千古歸新橋在松江蘇子美中秋對月和栁令之什月晃長江上下同畫橋横截冷光中雲頭灔灔開金餅水面沉沉卧彩虹佛氏觧為銀色界仙家多住玉華宫地雄景勝言不盡但欲追随乗曉風三百九十橋白居易三月三日閑行詩黄鸝巷口鶯欲語烏鵲河頭氷欲消綠浪東西南北水紅欄丨丨丨丨丨此乃城内官橋大數也佛寺虎丘寺在城西北九里晉司徒王珣及弟珉捨宅為寺白居易詩香刹看非逺祗園入始深龍蟠松矯矯玉立竹森森恠石千僧坐靈池一劍沉海當亭兩面山在寺中心酒熟慿花勸詩成倩鳥吟寄言軒冕客此地好抽簮又夜逰詩不厭西丘寺閑来即一過舟舡轉雲島樓閣出煙蘿摇曵䨇紅斾娉婷十翆娥香花助羅綺鐘梵雜笙歌領郡時將久逰山數㡬何一年十二度非少亦非多蘇子瞻丨丨丨詩入門無平田石路細穿嶺隂風生㵎壑古木翳潭井湛盧誰復見秋水光耿耿鐵花秀巖壁殺氣噤蛙黽幽幽生公堂左右立頑獷當年或未信異類服精猛胡為百嵗後仙鬼互馳騁窈然留清詩讀者為悲哽東軒有佳致雲水麗千頃熙熙覽生物春意頗凄冷我来屬無事暖日相與永喜鵲翻初旦愁鳶蹲落景坐見漁樵還新月溪上影悟彼良自嗤歸田行可請李徳裕追和太師顔公同清逺道士逰寺韻茂苑有靈峯嗟予未逰觀藏山半平陸壞谷多髙岸岡繞數仞墻巖潜千丈榦乃知造化意囬斡資竒玩鏐騰昔虎踞劍沒嘗龍煥潭黛入海厎崟岑􅋍霄半層巒未升日哀狖寧知旦綠篠夏凝隂碧林秋不換冥捜既窈窕囬望何蕭散川晴嵐氣收江春雜英亂逸人綴沂藻前􅈒留篇翰共扣哀玉音皆舒文綉段難追彦囬賞徒起興公嘆一夕如再升含毫星斗爛王元之詩蘚墻圍却碧潺湲曽是當年海湧山盡把好峯藏寺内不教幽景落人間劍池草色終冬在石座苔花自古斑珍重晉朝吾祖宅一囬来此便㤀還生公講堂在虎丘寺生公異僧竺道生也講經于此無人信者乃聚石為徒與講至理石皆㸃頭劉禹錫詩生公説法鬼神驚身後空堂夜不扃髙坐寂寥煙漠漠一方明月可中庭劔池在虎丘寺始皇試劍于此乃石罅深數十丈濶丈餘水無厎寺中日汲此水其聲潺湲極可聼千人坐在虎丘山側有平石可坐千人顔真卿詩劍池穿萬仭盤石坐千人靈巖寺在吴縣西南三十里舊名秀峯孫覿殿記梁天監中以吴館娃宫故地為丨丨丨白居易詩娃宫屐廊尋已傾硯池香徑又欲平二三月時但草綠㡬百年来空月明使君雖老頗多思携觴領客處處行承天寺舊名重光寺在長洲縣西北二里庭列怪石有銅佛像韋應物詩時暇陟雲構晨霄澄景光始見吴都大十里鬱蒼蒼山川表明麗湖海吞大荒合沓臻水陸駢闐㑹四方俗繁莭又喧雨順物亦康禽魚各翔詠草木遍芬芳于兹記甿俗一用勸農桑誠知虎符逺但恨歸路長楓橋寺在吴縣西十里唐人張繼詩月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客船崑山寺在縣西北三里孟郊詩昨日到上方片霞封石床錫杖莓苔青袈裟松栢香晴磬無短韻晝燈含永光有時乞鶴歸還訪逍遙塲王介甫次韻僧蹊蟠青蒼莓苔上秋床露翰飢更清風蘤逺亦香掃石出古色洗松納空光久逰不忍還廹迮冠盖塲張殿詩寳殿依山險凌虚勢欲吞畫簷齊木末香砌壓雲根逺景窓中岫孤煙竹裏村凭髙聊一望歸思隔吴門峯嶺千出沒江湖相吐吞園林浮海角臺殿逺山根百里見漁艇萬家藏水村地偏来客少幽興祗桑門水月禪院在洞庭山蘇子美記予乙酉嵗夏四月来居吴門始維舟即登靈巖之巔以望太湖俯視洞庭山嶄然特起雲霞綵翆浮動于滄波之中予時據欄竦首精爽下墮欲乗清風跨落景以翺翔乎其間莫可得也自爾平居紆然思欲一到惑于險説而未果行則常若有物腷塞于胸中是嵗十月遂招徐陳二君子輕舟出横金口觀其洪川蕩潏萬頃一色不知天地之大所能并容水陸􅘦洄七十里而達初宿社下踰日乃至入林屋洞陟毛公壇宿包山精舍又泛明月灣南望一山上摩蒼煙舟人指云此所謂縹緲峯下也即岸歩自松間出數里至峯下有佛廟號水月者閣殿甚古像設嚴煥旁有澄泉潔清甘凉極旱不枯不類他水梁大同四年始建佛寺至隋大業六年遂廢不存唐光化中有浮屠志勤者厯逰四方至此愛而不能去復于舊址結廬誦經後因而屋之至數十百楹天祐四年刺史曹珪以明月名其院勤老且死其徒嗣之迄今七世不絶國家大中祥符初有詔又易今名予觀震澤受三江吞囓四郡之封其中山之名見圗誌者七十有二唯洞庭稱雄其間地占三郡户率三千環四十里民俗真朴厯嵗未嘗有訴訟至于縣吏之庭下皆樹桑梔甘柚為常産每秋髙霜餘丹苞朱實與長松茂樹相差間于巖壑間望之若圗繪金翆之可愛縹緲峯又居山之西北深逺處髙􅋍出于衆山為洞庭勝絶之境居山之民已少事尚有嵗時織紃樹藝捕採之勞浮屠氏本以清曠逺事物已出中國禮法之外復寂居湖山深逺勝絶之地壤斷水接人迹罕至數僧宴坐黙于泉石之間引而與語殊無纎芥世俗間氣韻其視舒舒而行于于豈世上之遺民者耶予生平病悶鬱塞至此嚗然破散無復餘矣反復身世惘然莫知但如蜕觧俗骨傅之羽翰飛出乎八荒之外吁其快哉後二年其徒恵源造予乞文識其居之廢興欣其見請攬茟直述且叙昔㳺之勝焉耳慶厯七年十一月五日記祠墓言偃吴公祠朱元晦記云平江府常熟縣學吴公祠者孔門髙第弟子言偃子㳺之祠也按太史公記孔門諸子多東州之士獨子㳺為吴人而此縣有巷名子㳺有橋名文學相傳至今圗經又言公之故宅在縣西北而舊井存焉則今雖不復可見而公為此縣之人盖不誣矣然自孔子之沒以至于今千有六百餘年郡縣之學通祀先聖公雖以列得從腏食而其鄉邑乃未有能表其事而出之者慶元三年七月知縣事㑹稽孫應時乃始即其學官講堂之東偏作為此堂以奉祠事是嵗仲冬長至之日躬率邑之學士大夫及其子弟奠爵釋菜以安其靈而以書来曰願有記也某惟三代之前帝王之學率在中土以故徳行道藝之教其行于近者著而人之觀感服習以入焉者深若夫勾吴之墟則在虞夏五服是為要荒之外爰自太伯採藥荆蠻始得其民而端委以臨之然亦僅沒其身而虞仲之後相傳累世乃能有以自通于上國其俗盖亦樸陋而不文矣公生其間乃獨能悦周公仲尼之道而北學于中國身通受業遂因文學以得聖人之一體豈不可謂豪傑之士哉今以論語考其話言類皆簡易疎通髙暢宏達其曰本之則無者雖若見詘于子夏然要為知有本也則其所謂文學固宜有以異乎今世之文學矣既又考其行事則武城之政不小其邑而必以詩書禮樂為先務其視有勇足民之効盖有不足為者至使聖師為之莞爾而笑則是與之之意豈淺淺哉及其取人則又以二事之細而得滅眀之賢亦其意氣之感黙有以相契者以故近世論者意其為人必當敏于聞道而不滯于形器豈所謂南方之學得其精華者乃自古而然也耶矧今全吴通為畿輔文物之盛絶異曩時孫君于此又能舉千載之闕遺稽占崇徳以勵其學者則武城絃歌之意于是乎在故某喜聞其事而樂為書至于孔門設科之法與公之言所謂本所謂道及其所以取人者則願諸生相與勉焉以進其實使此邑之人百世之下復有如公者出而又有以洒夫媮懦憚事無㢘耻而耆飲食之譏焉是則孫公之志而亦某之願也公之追爵自唐開元始封吴侯我朝政和禮書已號丹陽公紹興御賛猶有唐封至淳熙間所朌位次又改稱吴公云尹和靖祠在虎丘寺黄直卿祠記和靖尹先生寓居平江府虎丘西菴榜曰三畏齋所題雜錄論語觧皆可考所寓即上方也去之七十有五年郡守直祕閣陳君芾通守太學博士丁君焴始度菴空地為屋繪先生像祠焉尊前賢厲後學也先生諱焞洛陽人年二十師伊川程子舉闈策士議誅元祐黨人不荅遂棄舉子業靖康初以布衣召不至詔褒為和靖處士洛陽䧟家殱焉先生死復甦竄長安山谷中逆豫以禮聘溺水逃去展轉蜀道累年紹興五年以崇政殿説書召凡二十辭八年冬始入見除祕書郎明年遷少監太常少卿權禮部侍郎每遷輒力辭其冬除徽猷閣待制提舉萬夀觀辭不已遂奉外祠即虎丘以居年已七十矣貧無以為歸也後二年竟沒于㑹稽之寓舍先生所遇于世如此盖嘗考先生之所學篤于踐行不為虚語未嘗求人之知人亦莫能窺其所藴也今其可見者經帷進講門人記錄耳惟即其所遇于世者觀其所處然後知先生之扵道卓乎不可及矣利害者人心之私義理者道心之公公私之間迭為勝負一取一舍而賢不肖可知也至于厯險難之極而不變處貴顯之驟而不動抱仁戴義終其身而不悔非盛徳能若是乎理義充于中則禍福成敗榮辱得失膠轇萬變日陳乎前而此心自若也程子之門􅀙逰之士皆閎博俊偉極天下之選而于先生亟稱之其察之審矣顔淵退然如愚而夫子稱之亦曰簞瓢陋巷不改其樂又曰庶乎屢空然則先生者程門之顔氏歟里巷小人顛冥于利害之塗不足道學士大夫則知理義矣臨利害未毛髪許棄其所守者可嘆也聞先生之風得無少愧有志于道者亦可以自勉歟二君為是祠有禆于名教大矣故述其躬行之大節以示學者庶㡬騐之身而得先生之道云三髙祠范至能記乾道三年二月吴江縣新作丨丨丨成三髙者越上將軍姓范氏是為鴟夷子皮晉大司馬東曹椽姓張氏是為江東歩兵唐右補闕姓陸氏是為甫里先生三君生不並世而鴟夷子皮又嘗一用人之國功大名顯而去之季鷹魯望蕭然臞儒使有為于當年其所成就固不可隃度要皆以得道見徴脱屣天刑清風峻節相望扵松江太湖之上故天下同髙之而邑人獨私得奉嘗以夸于四方曰此吾東家丘云爾見大夫趙伯䖒以故祠偪陋將改作鄉老王份獻其地雪灘乃築堂于上告遷而奠焉且屬郡人范成大為之識傳曰不有君子其能國乎今乃自放寂寞之濵人又􅀙而以為髙此豈盛際之所願哉後之人髙三君之風而跡其所以為世道計者可以懼矣至于豪傑之士或肆志乎軒冕宴安留連卒悔于後者不將有感于斯堂而某何足以述之然屈平既􅀙彭咸而桂叢之賦猶招隠士疑若幽處林薄不死而仙况如三君蟬蜕溷濁得全于天者嘗試倚楹而望水光浮空雲日下上風颿煙篷飄忽晦明意必往来其間其亦何足以見之姑效小山作歌三章以招焉遂從而歌之曰若有人兮扁舟撫五湖兮逺逰衆芳媚兮髙丘忽獨君兮不可留長風積兮浪波白蕩摇空明兮南極一色鏡萬里兮鞭魚龍列星剡剡兮其下孤蓬眇顧懐兮斯路與凉月兮入滄浦戰争蝸角兮昨夢一笑水雲得意兮垂虹可以檥櫂僊之人兮夀無期樂哉垂虹兮去復来載歌曰若有人兮横大江秋風起兮歸故鄉鴻冥飛兮白鷗舞吴波鱗鱗兮而在下嗟人胡為兮天地四方美無度兮吾之土膾脩鱸兮雪霏登菰蓴兮芼之水仙繽兮胥命君可望兮不可追頫倒景兮揮碧寥娭燕息兮江之臯菉蘋堂兮廡杜若一杯之酒兮我為君酌又歌曰若有人兮北江之渚披雲而晞兮類煙雨菊莎兮杞棘嵗晼晚兮何以續君食偭五鼎兮腥腐羞三泉兮終千古秋風露兮歸来故墟月明無人兮蒼不與語牛宫洳兮生蒲荷潮西東兮下田一波訪南涇兮隣曲山川良是兮丘隴多稼九畹兮今其刈聊舂容兮兹里是嵗六月既望書遺邑人使習之以侑祠趙伯䖒請遂刻記吴延陵季子廟蕭定改修廟記有吴之興也太伯讓以得之有吴之衰也季子讓以失之為讓之清同而興衰之體異何哉太伯之讓讓以賢也故周有天下而吴建國焉季子之讓賢以讓也當周徳之衰而吴喪邦焉或曰非所讓而讓之使宗祀冺絶而不血食豈曰能賢斯至可謂知存而不知亡者矣夫治亂時也興亾運也故至而不可却終終而不可留黄河既濁阿膠無以正其色鹽池斯鹹弊簞不能匡其味與夫當濁亂之世召力勝之戎讓與争孰勝乎易曰知㡬其神則季子之見可謂知㡬矣季子之明可謂知進退存亡而不失其正矣至于聼樂辨列國之興亡交賢知世數之存殁挂劔存不言之信避國保無欲之貞故有吴之祀寂寥而延陵之饗如在𤣥風可想至徳興歎美之辭􅈒人其萎表墓著嗚呼之篆向㣲徳仁兩至則夫子不復歎焉詳其精義被物鈎深致逺之㫖烏可究其津涯而窺其墻仭哉是知讓之為徳在于生靈不獨其子孫明矣國有祀典人懐永思定忝列藩條欽崇懿範于以加敬嚴乎閟宫别閨壼之内外正衆神之序位舊以太伯在于蘇臺而制季子之祠像設列于軒廂春秋禮薦爼豆當陳于正寢俾觀像者識賢人之遺風同律審度者知經徳之禮秩無差末學陋辭不足頌其休烈寒来暑往敢用同扵紀年時唐大厯十四年己未八月戊戌􅃋二十七日甲子記仲雍墓在常熟虞山之東古跡吴王城按越絶書曰吴大城即闔閭之所築周四十七里陸門八以象天八風水門八以象八卦城中有水城周十三里吴都賦重城結隅通門二八謂此也劉夢得詩二八城門開道路五千兵馬引旌旗吴城五門春秋諸國之門止一字今椘與越皆亡矣惟吴中諸門獨仍古不變焉閶門孫權記注云吴西郭門夫差作以天門通閶闔故名之後春申君改為昌門陸機詩昌門何峩峩飛閣跨通波胥門晏公類要吴相伍貟氏子胥家于此後以諫死令抉其目垂于此門觀越兵之入因以為名匠門本名干將門有干將墓後訛為匠盤門郡國志古作蟠呉嘗刻木為蟠桃之象以厭勝越又吴地記水陸縈囬屈曲故謂之盤齊門吴越春秋齊女質吴吴為太子聘之女少思齊而病闔閭乃起望齊門令女逰其上孟子云齊景公涕出而女扵吴即此長洲苑在本縣西南七十里吴都賦佩丨丨之茂丨白居易詩春入長洲草又生鷓鴣飛起少人行年深不辨娃宫處夜夜蘇臺空月明館娃宫在硯石山上盖以西施得名劉禹錫詩云宫館貯嬌娃當時意太誇艶傾吴國盡笑入楚王家月殿餘椒壁天花代舜華惟餘採香徑一帶繞山斜響屐廊在靈巖寺以西子行則有聲皮日休詩丨丨丨中金玉歩真娘墓在虎丘吴之樂妓文士多題詠陸羽泉在吴縣西北九里鴻漸以此泉為天下第三水王元之詩甃石封苔百尺深試茶嘗味少知音唯餘半夜泉中月留得先生一片心南園在城西吴越錢氏元璙創石林過庭錄王黄州初登科知吴縣已有盛名蘇州丨丨為一郡勝處有詩云他年我若成功去乞取丨丨作醉鄉後為守者因以醉鄉名其堂政和初蔡魯公罷政事欲歸吴下詔以丨丨賜之公戲賦詩曰八年帷幄負清時更賜丨丨寵退師堪笑當年王内翰功名未有便題詩鬭鴨欄陸龜蒙有丨丨一丨頗極馴養一旦驛使過焉挟彈斃其尤者龜蒙曰此鴨善人言欲附蘇州上進使者奈何斃之使人懼盡與橐中金以窒其口徐使人問其狀龜蒙曰能自呼名耳鶴市在閶闔門外吴越春秋吴王有小女王與夫人㑹食蒸魚王嘗半女怨曰王食魚辱我不忍久生乃自殺闔閭痛之甚葬于郭西舞白鶴于吴市中令萬人随觀逐男女與鶴入羡門因塞之以送死栁毅泉在太湖側按異聞集唐儀鳳中有儒生丨丨靈姻于此名宦太伯王季厯之兄太王欲立季厯扵是太伯與弟仲雍乃奔荆蠻斷髪文身示不可用鄧攸為守載米之郡俸祿無所受惟食吴水而已嵗飢攸輒開倉救之後去郡百姓數千人留牽攸船歌曰紞如打五鼓雞鳴天欲曙鄧侯挽不来謝令推不去韋應物為蘇州牧惟凝香齋館哦詩自娱白居易作虎丘路劉禹錫為刺史張旭為常熟尉一日有父老来為判其狀不數日屢至張甚怒以為好訟欲罪之父老叩頭曰非敢訟也誠見少公筆勢殊妙欲家藏之耳皮日休為郡􅀙事王仲舒變瓦屋隄松江為路皇朝王元之為長洲宰由此拜拾遺張方平知崑山縣范仲淹吴縣人景祐間為守開五河公有義宅在普濟橋之側使其族屬世世居焉又有義田以贍羣族錢君倚義田記曰范文正公蘇人也平生好施與擇其親而貧疎而賢者咸施之方貴顯時置負郭常稔之田千畝號曰義田以養濟羣族之人日有食歲有衣嫁娶㓙葬皆有贍擇族之長而賢者主其計而時其出納焉日食人一升歲衣人一縑嫁女者五十千再嫁者三十千娶婦者三十千再娶者十五千葬者如再嫁之數葬㓜者十干族之聚者九十口歲入給稻八百斛以其所入給其所聚沛然有餘而無窮仕而家居俟代者與焉仕而居官者罷其給此其大較也初公之未貴顯也嘗有志於是矣而力未逮者二十年既而為西帥及參大政於是始有禄賜之入而終其志公既殁後世子孫修其業承其志如公之存也公雖位充禄厚而貧終其身殁之日身無以為斂子無以為喪惟以施貧活族之義遺其子而已昔晏平仲弊車羸馬桓子曰是隱君之賜也晏子曰自臣之貴父之族無不乘車者母之族無不足於衣食者妻之族無凍餒者齊國之士待臣而舉火者三百餘人如此而為隱君之賜乎彰君之賜乎於是齊侯以晏子之觴而觴桓子予嘗愛晏子好仁齊侯知賢而桓子服義也又愛晏子之仁有等級而言有次也先父族次母族次妻族而後及其疏逺之賢孟子曰親親而仁民仁民而愛物晏子為近之今觀文正公之義田賢於平仲其規模逺大又疑過之嗚呼世之都三公位享萬鍾禄其邸第之雄車輿之飾聲色之多妻孥之富止於一巳而已而族之人不得其入者豈少哉況於施賢乎其下為卿為大夫為士廩稍之充奉養之厚止乎一巳而已而族之人操壺瓢為溝中瘠者又豈少哉況於他人乎是皆公之罪人也公之忠義滿朝廷事業滿邊隅功名滿天下當必有史官書之者予可畧也獨高其義因書以遺於世云孫冕為守甫及引年而去詳見臨江胡翼之景祐中范希文以内閣典藩請於朝立學自安定先生丨丨丨首居於此而博洽有道之士如王逄張芻張伯玉之儔繼處其任學者甚衆故滕正議元發錢翰林醇老稍稍出焉張伯玉為守人物言偃見前祠廟注季札兄弟四人丨丨賢父欲立之不可吳人必欲立丨丨札逃去後事闔廬夫差澹臺滅明有墓在呉縣南八十里朱買臣吳人為㑹稽守前漢縂謂之㑹稽嚴助呉人守㑹稽數年不聞問天子賜書曰君厭承明之廬勞侍從之事懷故土出為郡吏間者濶焉久不聞問具以春秋對上書謝願奉三年計最張翰呉人齊王冏辟翰為大司馬東曹翰因秋風起乃思吳中蓴菜羮鱸魚膾曰人生貴得適志何能羈官數千里以要名爵乎遂命駕而歸蘇子瞻詩浮世功名食與眠季鷹真得水中仙不須更説知幾事只為鱸魚也自賢陸機吴郡人祖遜吴丞相父抗大司馬機少有文章弟雲六嵗能文與兄齊名陸龜䝉居松江甫里自號江湖散人天隨子蘇子瞻詩千首文章二頃田囊中未有一錢㸔却因養得能言鴨驚破王孫金彈丸陸德明蘇州人顧野王吴人陳朝著玉篇梁鴻吴縣西四里有墓皇朝元絳字厚之參大政居是邦蘇舜欽字子美舉進士為大理丞為人倜儻長於古文歌詩行草士大夫収之以為墨寳范仲淹薦其才得集賢校理監進奏院用故紙祠神㑹賔為御史所糾除名舜欽既廢居蘇州買水石作滄浪亭以自適後二年得湖州長史卒范成大參政自號石湖黄由狀元題詠土風清且嘉陸機吴趍行楚妃且勿歎齊娥且莫謳四座並清聽聽我歌吴趍吴趍自有始請從閶門起閶門何峨峨飛閣跨通波重欒承璇極回軒起曲阿藹藹慶雲被泠泠鮮風過山澤多藏育云云太伯導仁風仲雍揚其波穆穆延陵子灼灼光諸華王迹頺陽九帝功興四遐大皇自富春矯首頓世羅邦彦應興運粲若春林葩屬城咸有士吴邑最為多八族未足珍四姓實名家文德熙淳懿武功侔山河禮讓何濟楚流化自滂沱淑美難窮紀首按為此歌兵衛森畫㦸韋應物郡中與諸文士讌集詩云云燕寢凝清香海上風雨至逍遥池閣涼煩痾正消散嘉賓復滿堂自慙居處崇未覩斯民康理㑹是非遣性達形迹忘鮮肥屬時禁蔬果幸見嘗俯飲一盃酒仰聆金玉章神歡體自輕意欲凌風翔吴中盛文史羣彦今洋洋方知大藩地豈曰財賦疆人家盡枕河杜荀鶴送人遊吴君到姑蘇見云云古宫閑地少水港小橋多夜市賣菱藕春船載綺羅遥知未眠月鄉思在漁歌東下姑蘇臺杜甫壯遊詩云云已具浮海航到今有餘恨不得窮扶桑王謝風流逺闔閭丘墓荒劍池石壁側長洲芰荷香嵯峨閶門北清廟映迴塘每懷吴太伯撫事淚浪浪盈筐盛菱芡陸龜蒙吴中苦雨詩笠澤卧孤雲桐江釣明月云云滿釜煮鱸鱖乘船向山寺張籍送從弟戴𤣥之蘇州楊栁閶門外悠悠水岸斜云云著屐到人家夜月紅柑樹秋風白藕花江天詩境好迴日莫全賒書後欲題三百顆韋應物詩聞君病後思青橘欲摘猶酸亦未黄云云洞庭猶待滿林霜蘇州刺史例能詩劉禹錫詩云云西掖吟來替左司家家門外泊舟航白居易詩閶門四望鬱蒼蒼始覺州雄上俗强十萬夫家供課税五千子弟守封疆闔閭城碧鋪秋草烏鵲橋紅帶夕陽處處樓頭飄管吹云云雲埋虎寺山藏色月耀娃宫水放光曽賞錢塘并茂苑今來未敢苦誇張七堰八門六十坊白居易詩半酣慿檻起四顧云云逺近高低寺間出東西南北橋相望京兆平反一笑春蘇子瞻和蘇州太守王規父侍太夫人觀燈之什余時留滯京口不及赴此命其詩云不覺朱轓碾後塵争看翠幰錦纒輪洛濵侍從三人貴云云但逐東山携妓女那知後閤走窮賔滯留不見榮華事空作賡歌第七人外邑草履隨船賣杜荀鶴送人宰吴縣詩云云綾梭隔水鳴蕭條江縣去鳴絃王介甫送吴江宰詩邂逅都門誰載酒云云猶疑甫里英靈在到日慿君為艤船四面漁家遶縣城李貫吴江縣詩四六維時淛部有古吴門在昔吴都于今漢輔二浙雄藩三吴近輔疏渥漢廷移牧吴㑹矧闔閭之故城為浙江之上郡由喉舌司牧股肱郡矧是蘇臺密依行闕俗號富饒民多輕剽惟吴㑹之奥區寔日畿之巨屛冠黄圖三輔之雄森畫㦸千兵之衛矧長洲茂苑之雄視馮翊扶風之盛襟帶江湖壯虎丘之形勢輔陪畿甸環象魏之觚稜沃壤平疇稻蠏獨吴中之最澄湖别溆蓴鱸亦天下之稀燕寢凝香樂郡齋之暇日鱸魚膾玉尋澤國之勝遊蘭棹榴裙頗稱使君之行樂金柑玉膾每形文士之清吟樓櫓萬艘據要衝於海道袴襦千里為屛蔽於京畿割雲翻雪腴田利及於他州饌玉服珠鉅室習成於侈俗軍餉轉輸舟運自此邦而去户租充羨倉儲亦他郡所無若論禮遜有太伯季子之遺風細考詩篇皆夢得樂天之陳迹方輿勝覽卷二
