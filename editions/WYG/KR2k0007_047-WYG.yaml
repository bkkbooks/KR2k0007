body:
  text: 方輿勝覽卷四十七宋祝穆撰滁州清流全椒來安建置㳂革禹貢揚州之域呉地斗分野春秋時屬呉楚之交秦為九江郡二漢因之晉屬淮南郡宋屬新昌郡梁於此立譙州今之州城是也又改北譙為臨滁郡而南譙領新昌臨滁髙塘三縣隋改南譙為滁州唐析揚州地置滁州皇朝因之中興為濠滁鎮撫使今領縣三治清流事要郡名滁陽臨滁滁上永陽王元之詩淮邊永陽郡南譙韋應物詩今嵗卧南譙風俗風俗淳厚常安民州學記滁之人雖云云而尚氣易以徳化難以力服地僻事簡章衡重建醉翁亭記滁陽云云其俗安閑年豐事少同上命世之士至焉曽子開二賢堂祝文滁在江淮號為僻陋然磊落瑰偉丨丨丨丨亦或丨丨賢士君子居焉歐陽永叔答李大臨書永陽窮僻而多山林之景又嘗得云云形勝羣峯環於西南慶厯前集䟦滁陽古名郡云云清溪注於東北形勢深秀實甲淮海李衛公普懐嵩之記李庻刻泉石之銘韋應物形野渡之詠清淮灌其北林希望撰白鶴觀記云云烏江蕩其南環滁皆山歐陽永叔醉翁亭記滁當偹禦周必大奏世賢説淮南形緩急欲守滁臣謂不然滁有山林之阻若廬和嬰虜衝此則當偹禦山川豐山在清流縣西南五里歐公於此建豐樂亭有漢髙帝廟琅琊山在清流縣南十里有丨丨洞舊經云晉元帝為丨丨王避地於此曽子開滁州集序泉石林亭之勝至聞天下顧况詩東晉王家在此溪南山樹色隔牎低碑沉字滅昔人逺谷鳥猶向寒花啼八公山在來安縣西南十三里即淮南丨丨憇石之處五湖山在全椒縣東北十八里山下有丨丨在縣境最為險要九鬬山一名隂陵山在全椒縣南九十餘里昔項羽兵敗欲東渡烏江經此山與漢兵一日丨丨故名幽谷即豐樂亭地有紫㣲泉歐陽永叔詩滁陽丨丨抱山斜我鑿清泉手種花故事留傳父老説世人合作畵圖誇石屏路梅聖俞詩尋常畵屏多畵山何意此山還作屏峭排直下幾千尺下有石路莓苔青滁水在全椒縣南六十里其源出廬州菱水在清流縣出永陽嶺西經皇道山下歐陽永叔有菱溪石記云本名荇溪避楊行宻嫌名改名曰菱清流水晏公類要云自全椒縣界流入蓮溪見呉卓南譙郡城十詠明月溪在琅琊山王元之詩惜哉幽勝事盡落唐賢手惟餘舊時月團圓照山口西澗韋蘇州詩獨憐幽草澗邊行上有黄鸝深樹鳴春潮帯雨晩來急野渡無人舟自横井泉真珠泉在清流縣西三十里泉水濺射有若跳珠紫㣲泉吕元中記歐陽文忠公以右正言知制誥謫守滁上明年得讓泉於醉翁亭之東南隅一日會僚屬於州廨有以新茶獻者公敕吏汲泉未至而汲者仆出水且慮後期遂酌他泉以進而公巳知其非釀泉窮問之得丨丨丨于幽谷下文忠愽學多識而又好竒既得是泉乃作亭以臨泉上名之曰豐樂亭當時名公宿儒皆為賦詩以紀其事由是丨丨丨始盛闐於天下今帖所稱酒名豈非滁陽官釀庻子亭在琅琊山寶應寺唐李㓜卿守滁州今有丨丨丨盛度詩深藏西竺寺寒擁九譙城石字贊皇古泉銘丨丨清歐陽永叔叙云右丨丨丨銘李陽氷撰并書慶厯五年余自河北都轉運使貶滁陽屢至陽氷刻石處未嘗不裴徊其下丨丨丨昔為流溪今為山僧填為平地起屋其上問其泉則指一大井曰此丨丨丨也可不惜哉六一亭在琅琊山園井東園在郡城東隅唐李紳有詩梅執禮叙云滁陽舊無郡圃而醉翁豐樂諸亭皆在闗外李紳所謂東園者南直琅琊諸山北通西澗修木交映左右又適介守貳宅固一佳處也醉翁亭在琅琊寺慶厯中太守歐陽永叔記云環滁皆山也其西南諸峯林壑尤美望之蔚然而深秀者琅琊也山行六七里漸聞水聲潺潺而瀉出乎兩峯之間者釀泉也􅄘囬路轉有亭翼然臨於泉上者丨丨丨也作之者誰山之僧曰智仙也名之者誰太守自謂也太守與客來飲於此飲少輒醉而年又甚髙故自號曰丨丨也丨丨之意不在酒在乎山水之間也山水之樂得之心而寓之酒也若夫日出而林霏開雲歸而巖穴暝晦明變化者山間之朝暮也野芳發而幽香佳木秀而繁隂風霜髙㓗水落而石出者山間之四時也朝而徃暮而歸四時之景不同而樂亦無窮也至於負者歌於塗行者休於樹前者呼後者應傴偻提携徃來而不絶者源人遊也臨谿者而漁溪深而魚肥釀泉為酒泉香而酒洌山肴野蔌雜然而前陳太守宴也宴酣之樂非絲非竹射者中奕者勝觥籌交錯坐起而諠譁者衆賔懽也蒼顔白髪頽乎其間者太守醉也巳而夕陽在山人影散亂太守歸而賔客從也樹材隂翳鳴聲上下游人去而禽鳥樂也然而禽鳥知山林之樂而不知人之樂人知從太守游而樂而不知太守之樂其樂也醉能同其樂醒能述以文者太守也太守謂誰廬陵歐陽修也滁陽郡志云記成刻石逺近爭傳疲於模打山僧云寺庫有毡打碑用盡至取僧堂卧毡給用凡商賈來供施亦多求其本所過闗征以贈監官可以免税豐樂亭歐陽叔記云脩既治滁之明年夏始飲滁水而甘問諸滁人得於州南百歩之近其上則丨山聳然而特立下則幽谷窈然而深藏中有清泉滃然而仰出俯仰左右顧而樂之於是疏泉鑿石闢地以為丨而與滁人徃遊其間滁於五代干戈之際用武之地也太祖皇帝嘗以舟師破李景兵十五萬於清流山下生擒其將皇甫暉姚鳳於滁東門之外送以平滁脩嘗考其山川按其圖記升髙以望清流之闗欲求暉鳳就擒之所而故老皆無在者盖天下之平乆矣自唐失其政海内分裂豪傑並起而爭所在為敵國何可勝數及宋受命聖人出而四海一向之憑恃險阻剗削消磨百年之間漠然徒見山髙而水清欲問其事則遺老盡矣今滁介於江淮之間舟車商賈四方賔客之所不至民生不見外事而安於畎畆衣食以樂生送死而孰知上之功徳休養生息涵育百年之深也修之來此樂其地僻而事簡又愛其俗之安間既得斯泉於山谷之間乃日與滁人仰而望山俯而聽泉掇幽芳而䕃喬木風霜氷雪刻露清秀四時之景無不可愛又幸其民樂其嵗物之豐成而喜與予遊也困為本其山川道其風浴之美使民知所以安其豐年之樂者幸生無事之時也夫宣上恩徳以與民共樂此刺史之事也遂書以名其丨云醒心亭在琅琊山曽子固記滁州之西南泉水之涯歐陽公作亭曰豐樂自為記以見其名之意既又直豐樂之東築其亭曰丨丨而望以見夫羣山相環雲煙之相滋曠野之無窮草木衆而泉石嘉使目新乎其所覩耳新乎其所聞則其心洒然而醒更欲乆而忘歸也故即其所以然而為名取韓子退之北湖之詩云噫其可謂善取樂於山泉之間而名之以見其實又善者矣雖然公之樂吾能言之吾君優游而無為於上吾民給足而無憾於下天下之學者皆為材且良夷狄鳥獸草木之生者皆得其宜公樂也一山之隅一泉之傍豈公樂哉乃公所以寄意於此也若公之賢韓子歿數百年而始有之今同遊之賔客尚未知公之難遇也後百千年有慕公之為人而覽公之迹思欲見之有不可及之歎然後知公之難遇也則凡同遊於此者其可不喜且幸歟西清詩話云歐陽公作丨丨醉翁兩丨於琅琊山命植花卉有詩云淺深紅白宜相間先後仍湏次第栽我欲四時携酒去莫教一日不花開常安民詩為愛昌黎湖上句醉來直上丨丨丨吹醒不待仙風解卧讀殘碑已自醒茶仙亭在琅琊寺紹聖中建南豐記杜牧之詩云誰知病太守猶得作茶仙堂樓四賢堂在琅琊寺張商英詩文昭文定二曽與文忠歐内翰元之共四公政事風流俱第一典刑人物更誰同能只有東坡老到處唯尋六一翁欲遣滁陽招作客五星同聚此堂中北樓在郡治後唐李徳裕貶滁州作此樓又作懐嵩賦後名懐嵩樓又名贊皇樓古跡統軍池在郡治後曽文昭詩長山漫刻金芝頌宫相空吟石竹詩事徃歳深無處問北園唯見孟家池注云孟元喆淳化中以龍武丨丨知軍事鑿丨北園清流闗在丨丨縣西南二十餘里舊傳南唐置闗地尤險要周世宗征淮唐將皇甫暉姚鳳率衆塞丨丨丨太祖擊走之生擒暉及鳳遂下滁州名宦韋應物為守李徳裕為刺史獨孤及為刺史皇朝趙普為判官後封韓王王元之為翰林學士嘗草繼遷制送馬五十疋以偹濡潤丨丨以書不如式却之出守滁州丨丨到郡謝表云諸縣豐登苦無公事一家飽煖全荷君恩歐公嘗用以作詩歐陽修初仁宗朝社韓范富以黨議罷公上疏言之為言事者所誣詔獄坐左遷知滁州修之在滁作亭琅琊山以醉翁名之張方平慶厯知州曽肇紹聖知州張商英為守羅畸字疇元嘗授滁州法椽或曰滁山郡也以公髙才處此非宜公曰此歐陽之醉鄉也雖草木禽魚皆能出祥光發妙音庻子紫薇香泉萬斛以為供給琅琊幽谷白雲千頃以為職田何謂貧僻耶人物南唐張洎全椒縣人仕南唐知制誥參預機宻太祖朝為參政茅革為池州貴池令黄魯直為墓誌題詠古國郡舒地司空曙送永陽崔明府詩云云前當桐栢闗淹綿江上雨稠叠楚南山分竹守南譙韋應物詩云云或謂韋應物守亳不知南譙乃滁州也晦庵云耳山郡多暇日韋蘇州寒食日滁州作詩云云社時放吏歸典郡清淮旁王元之詩今年四十二云云卧錦郎位正腰金服色光偷詠左司篇韋應物自左司刺滁有詩後李紳為刺史和登北樓詩君愴風月夕余當童稚年閑牎讀書罷云云芭蕉葉上獨題詩韋應物詩盡日髙齋無一事云云時傍青山去問農梅聖俞眷亭詩林下鳴鳩拆紅杏田間水慢春溶溶使君固自足風味云云公餘多愛入林泉王元之詩忽從天上謫人間知向山州住幾年俸外不教收果實云云朝簮未解雖妨道官路無機即是禅鈴閣悄然私自問郡齋何異玉堂前此心長在水雲間王元之詩名雖為翁實少年歐陽永叔詩云我昔被謫居滁州云云滁人思我雖未忘前人詩云云見我今應不能識諸縣豐登少公事前人題王元之畵像云云一家飽煖荷君恩教得滁人解吟咏蘇子瞻詩君看永叔與元之坎軻一生遭口語又云云至今里巷嘲輕肥四六疏榮北闕出守南譙淮右奥區滁陽名郡雖曰山城實鄰邊徼地僻山深民淳俗阜自間闗百戰之場僅生聚十室之邑雖依山而為固隱若長城然弛偹而弗修寧無外患山秀水清風流可想年登事少賦詠猶存六一記文勝景盡推於佳郡東坡字畵豐碑爭掛於髙堂琅琊舊俗户户魚鹽魯國大夫人人絃誦不能五十里之國獨占林泉其惟二千石之良庻安田里環滁皆山名已聞於天下釀泉為酒恨不到於亭間五馬雙旌自得游山之樂也四郊多壘安能髙枕而卧哉招信軍盱眙招信天長建置㳂革禹貢揚州之域於天文為鶉尾星紀之次春秋時為呉善道之地後屬楚戰國時楚殆為縣秦二世時項羽立懐王都於此西漢為盱眙縣屬臨淮郡東漢屬下邳國西晋為臨淮郡治盱眙東晋立盱眙郡南齊北兖州自淮隂移鎮盱眙魏置盱眙郡陳置北齊州唐改西楚州改𨽻泗州皇朝屬楚州復𨽻於泗中興以來陞為盱眙軍紹定間金之殘黨合納敏珠爾乞降改招信軍今領縣三治盱眙事要郡名都梁見山注風俗尊儒慕學隋書地理志盱眙本屬下邳隋書謂其地在列國為楚魯之交云云有洙泗之俗東南之秀章綱記欝欝葱葱之氣萃於東南而云云實起於此東魯之遺風郡守沈該勸學文云地連洙泗有云云郡有㩁場郡志云云南北懋遷凡物與土産無異焉形勝阻山帶海圖經云云自漢以來屢為戰守之地漢建安初袁術攻劉偹備使張飛守下邳自將拒術於盱眙晉姚襄屯於盱眙紹興間張浚駐兵於盱眙與金對壘後以和議徹戍而劉錡亦嘗屯守盱眙襟帶呉楚章綱撰東南起秀記云云屏翰京邑盖神州赤縣之地非榆闗沙漠之比也仰觀天宇下瞰郛郭清淮耀明古汴􅉼景江淮要衝宋沈琰以為云云為國北門都梁志序云云為今重鎮江淮本原魏髙閭以為壽陽盱眙云云也梁宋呉楚之衝陸務觀翠屏堂記盱眙實云云山川東山在郡治之東有石洞有南山十景此居其首郡治霍箎重修治之界以方池映以朱户洞中曲折相通宛然洞府左曰雲闗右曰劔壁軍山在盱眙北六里鄧艾於此築堰溉田斗山在盱眙縣西南當淮水之險峻故名龜山在盱眙縣北三十里其西南上有絶壁下有重淵廣記禹治水以鐵龜鎻淮涡水神無支祁於丨丨之足按張商英丨丨水陸院記以佛書考之則五百梵僧遊止之地以仙經考之則太真元君之别治也周明老題龜山囬文詩云迢迢緑樹淮天曉靄靄紅霞海日晴遥望四山雲接水碧峯千㸃數帆輕浮山在招信縣西七十里梁天監築堰於此秦少游有丨丨堰賦横山在招信縣南五十里劉綱保聚於此第一山在郡東一名南山米元章詩莫論衡霍撞星斗且是東南丨丨丨楊廷秀詩第一山頭第一亭聞名未到負平生不因王事畧小出那得髙人同此行萬里中原青未了半篙淮水碧無情登臨不覺風煙暮腸斷漁燈隔岸明寶積山在郡南與都梁相接為郡朝山都梁山在盱眙縣隋於此置都梁宫出都梁香古詩博山爐中百和香欝金蘇合與都梁盱眙山在縣東南四十里一名馬鞍天寶改今名望州山在盱眙縣南五里自南而登見泗州城臺子山在盱眙縣東一里宋書云宋將臧質守盱眙以拒魏師魏造弩臺以射城中因以為名長圍山在盱眙縣北七里宋臧質守盱眙魏太武遂於都梁山築長城造浮橋絶水路即此三臺山在招信縣南九十里上可屯十萬衆青平山在招信縣東南二十五里紹興間劉澤保聚於此金不敢近嘉定末武統制敗金於此杏花巖在崇福寺後蔣頴叔召之陳述古諸賢皆有題名繡谷在普濟院南其石巖多花木春日如錦丨淮水經盱眙縣故城西新河在龜山鎮蔣之竒開河以避淮蘇子瞻詩云故人宴坐虹梁南丨丨巧出龜山背東溪在都梁山東五里曲溪在盱眙縣西南十里周顯徳五年張永徳敗泗州兵于丨丨堰長沙汀在盱眙縣北自淮河渡南接牛場巷長一里餘髙丈餘淮水泛漲時頼捍禦蘇子瞻詩云十里清淮上長隄隱雪龍是也井泉玻瓈泉在第一山之下張文潜詩丨丨美酒舊知名崇寧中劉晦叔名之曰丨丨丨楊廷秀有詩云清如淮水未為佳泉迸淮山好煑茶鎔出丨丨開海眼更和月露㵸春芽仰看絶壁一千丈削下青瓊無㸃瑕從事不澆愁肺渇臨泓帶雪吸氷花堂亭清淮堂在百花巖前取蔣頴叔緑野有佳氣丨丨無㸃塵之句以名之淮山堂在第一山起秀亭下後即玻瓈泉雲山堂郡守霍箎創取東坡一看丨丨遶淮甸之句以名左山右淮北眺中原咸在几席飛歩亭在東山楊廷秀和太守霍和卿韻杏花巖左近東巖驅使淮山指顧間招信上流揔奔赴僧伽孤塔正灣環今來古徃皆陳迹逺草斜陽秪慘顔走馬看山真懡㦬忙中拾得片時間起秀亭在玻瓈泉上舊名㑹景後曰參雲曰覽冀郡守呉説改曰淮山偉觀淳熈庚子郡守王渥昜名東南丨丨面對汴口下瞰城郭亭後石壁峭列東坡米元章諸公皆有詩詞刻於上寺觀靈巖寺在浮山頂上白居易宿寺上院高高白月上青林客去僧歸獨夜深葷血屏除唯對酒歌鐘放散只留琹更無俗物當人眼但有泉聲洗我心最愛小亭東望好太湖煙水緑沉沉趙嘏宿寺詩明月溪頭寺䖝聲滿橘洲倚欄香徑晚移石太湖秋古樹雲歸盡荒臺水更流無人見惆悵獨上最髙樓羅鄴夏日宿寺宗公院詩寺入千巖石路長孤吟一宿逺公房臥聽半夜杉壇雨轉覺中峯枕簟凉花界已無悲喜念塵襟自足是非妨他年縱使重來此息得心猿鬢已霜蘇子瞻詩人言寺是六鰲宫升降隨波與海通共坐舡中那復見乾坤浮水水浮空名宦沈璞宋元嘉末為守嘗與臧質共守盱眙魏太武以三十萬衆攻之三旬不克而去臧質以璞城主使之上露版璞固辭歸功於質上聞而嘉之孫堅熹平問除鹽瀆丞徙盱眙丞又徙下邳丞江表傳曰堅歴佐三縣所在有稱黄巾賊起堅身當一面登城先入衆乃蟻附遂大破之拜堅司馬皇朝江夢孫知天長縣民爭馬二年不决馬繫於官夢孫曰吾聞管仲以老馬識路王忳馬知其故第遂縱馬郊外馬乍釋覊束果奔入其主家訟遂息包拯知天長縣有訟盗割牛舌者公使歸屠其牛鬻之既而有告私屠牛者拯曰何為割其家牛舌而又告之盗色變遂引伏徙知端州後為樞宻使諡曰孝肅人物武渉盱眙人嘗説韓信以三分天下皇朝沈晦分定録云晦赴省至天長中夢身騎大鵬摶風而上因作大鵬賦以紀其事已而果魁天下題詠落帆逗淮鎮韋應物云云停舫臨孤舘白煙横海戍崔峒送陸明府之官盱眙詩陶令之官去窮愁慘别魂云云紅葉下淮村雲濕淮南樹喻坦之晚泊盱眙詩廣葦夾深流蕭蕭到海秋宿舡横月浦驚鳥遶霜洲云云笳清泗上樓徒縣鄉國思覊跡尚東遊平沙依鴈宿常建泊舟盱眙詩泊舟淮水次霜降夕流清夜乆潮侵岸天寒月近城云云堠舘聽雞鳴鄉國雲霄外誰堪羇旅情繫舟清洛尾蘇子瞻送程表弟詩云云初呉淮南山淮山相媚好曉鏡開煙鬟山凝翠黛孤峰逈李紳入淮至盱眙詩云云淮起銀花五丈髙天外綺霞明海鶴日邊紅樹艶仙桃岸驚目眩同奔馬浦溢心疑覩抃鼇寄謝雲帆疾飛鳥莫誇廽鴈卷輕毛黄塵欲礙龜山出王介甫詩云云白浪空分汾水來隔淮雲海暗人家蘇子瞻詩照汴玉峯明佛刹云云清淮濁汴爭强雄蘇子由詩云云龜山下閟支祁宫魚躍銀刀正出淮水多美魚白魚尤為世所珍故蘇子由有是句舡頭出汴翠屏間自京洛抵都梁山始有山淮汴渦池皆㑹於此實山川之㑹故米元章詩京洛風塵千里還云云淮増汴水長流急李昭玘詩云云城睨南降不遜髙四六近控長淮俯臨古汴矧都梁之畫境實北鄙之要藩河海東縈而西帯川塗南徃而北來蘘淪左祍之區訖從效順今際右文之世可兾升平邊烽未息適當敵境之要衝郡政素修庸作淮壖之保鄣瘡痍未復驚䳋有待於慰安唇齒相依虓虎當嚴於守衛况貿遷有無欲阜通於商旅而還定安集在摩撫於人民方輿勝覽卷四十七
