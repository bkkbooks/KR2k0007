body:
  text: 方輿勝覽卷四十宋祝穆撰象州陽壽武仙來賔建置沿革古百粤之地于天文屬翼軫之度鶉尾之次秦始皇南取百粤以為桂林象郡象郡之名始此然非今之象州漢初為南越王趙佗所據漢武平南越以桂林地置鬱林郡而秦之象郡更名日南今之象州即鬱林郡之中溜潭中二縣也東漢因之吴孫皓分鬱林置桂林郡晉桂林郡有潭中而無中溜宋桂林郡有中溜而無潭中陳置象郡隋置象州此則象州之所從始也煬帝廢象州為縣屬桂林郡唐以陽夀桂林縣置象州皇朝因之今領縣三治陽夀事要郡名象臺象郡風俗俗好􅁋祀郡縣志云云以雞骨卜吉凶人多騁獵同上云云郡少秀民地無桑柘象郡志云云民不事蠶作雖間有之不能繅絲第為綿絮而已或水熟而紉縷之以為粗紬婦女以緝麻織布為業多膏腴之田象郡志云云長腰玊粒為南方之最旁郡亦多取給焉形勝控扼畨洞象郡志連屬桂林外接交邕云云徃來要衝居嶺嶠之表邊公珝撰新井記云云接蠻貊之疆當䍧牱龍江之㳂流象郡志郡跨三邑之封云云城門畫象嶺外代答象州郡治西樓正面西山山腹忽起白雲狀如白象經時不滅然不常有案秦象郡乃交趾非象州也今象州城門畫一白象不審何義然象州自昔不遭兵革凡有大盗皆相戒以不宜犯象鼻然則城門之畫象豈著此也耶水泉甘潔郡志民富魚稻云云不减中州土産水清魚肥郡志踰桂嶺而南云云為南方之最貨多珠翠瑶光堂記地宜稻梁云云山多麈麋同上山川象山在陽夀縣西五里以形得名又見城門畫象注西山與象山相連風土記云刀兵永不見丨丨最高現說者以儂智高陳進之猖獗至境或自退或敗亡土人以為應䜟象臺山近栁州界三十里平地突起巋然一臺盖古之州治也唐武徳始遷治陽縣今猶相承謂州為象臺云銅鼓山在武仙縣西十里下有銅鼓瀨昔馬援南征獲駱越銅鼓廣化志狸獠鑄銅為鼓惟以高大為貴面濶丈餘初成掛于庭尅辰置酒招置同類來者盈門雙泉巖在來賔縣西北百里夏凉冬温土人多扵巖中結課舊傳山中患無水忽一日雙泉湧迸因名大江在來賔縣西五十歩至武仙縣通廣州入海雷江在來賔西北三十里舊經有毛雷捕魚于此因名牂牱水郡國志嚴州州門有長水自䍧牱流下来賔陽水在陽夀縣大藤溪在武仙縣東南源出潯州大立山今延賔驛前溪是也井泉靈泉在陽夀縣堂樓扶踈堂在城外東南街土人謝氏建竹木深邃王右丞孫尚書寓此壁間有舊題率齊郡守陳太和建孫覿記瑶光樓在西城上俯瞰溪山景物勝絶今為西峯樓名賢薛仁貴絳州人吐蕃入㓂命為邏婆道行軍總管兵敗扵大非川貶象州後召為都督擊突厥大破之皇朝王安中字履道自號初寮道人宣和中遷尚書右丞靖康謫象州孫覿紹興中謫象州題詠島夷通荔浦陳陶南海送韋七使君赴象州一鶚韋公子新恩領郡符云云龍節過蒼梧地理金城近天涯玉樹孤聖朝朱紱貴從此展雄圖炎凉頃刻分陶弼題太平驛詩云急雨随風至云云人家多住竹棚頭張籍詩瘴水漫江入洞流云云青山海上無城郭惟見松排出象州瘴雲如海蹴天浮孫覿詩過嶺逢人問象州云云四六䟽恩鳳闕作鎮象臺眷此象臺邈在駱粤地控百蠻疆連五嶺地罕蠶農俗饒魚稻雖雕題交趾之俗滋變華風而含哺鼓腹之人雅安淳政象郡自秦既入中州之境虎符分漢是資循吏之功竹使虎符允謂人生之貴桂林象郡諒增地望之䧺夷通荔浦既蠻俗之雜居人住竹棚亦土風之甚樸潯州桂平平南建置沿革粤地牽牛婺女之分野秦平百粤屬桂林郡漢改桂林為鬱林郡今潯州之桂平即鬱林郡布山之地梁置桂平郡隋以布山縣置桂平縣屬鬱林郡唐初屬鷰州太宗以鷰州之桂平大賔等三縣置潯州尋廢隷龔州後復割龔州桂平大賔三縣置潯州改潯江郡復為潯州皇朝平嶺南廢隷貴州尋復置今龔州之平南即猛陵縣地中興廢龔州為平南縣隷潯州自是以後合龔潯二水為一州今領縣二治桂平事要郡名清潯潯江風俗民淳訟簡郡志云云人多儒業地瘠民貧趙善惹奏狀僻處山間云云土無坌惡慶厯學記潯為善地鬱江東注云云溪蠻洞獠不際其境民之從化豈間然㦲形勝實有三州之地同上封域廣袤云云繡州鷰州龔州是也限以二江郡志云云左黔右鬱黔之源出䍧牱鬰之源出交趾合于山之麓曰潯水山水竒秀同上潯雖為古荒服沃壤頗多云云李邦彦留題白石云潯江窮瘴嶺之南郡雖僻旁與都嶠勾漏為隣而白石近在境上其江山氣象之秀有足嘉者山川白石山在州南六十里下有洞曰白石洞天内有清真觀傍有夀聖寺洞門自下透入容州勾漏洞天世傳葛仙翁徃來其間閬石山在州北有梁狀元嵩讀書巖暢巖在郡西龍華寺之上郡守姚嗣宗詩寒谷常流九秋氣丨丨别是一壺天羅叢巖在郡西南六十里巖中明快可容三百人内有三教殿東曰碧虛洞西曰靈源洞又曰水月巖超然亭實潯之勝槩潯江在桂平縣北二十歩鬱江在州南一里黔江在州北二十歩烏江在平南縣西渌水在平南縣南十五里曠野之中天然怪石甃其傍泉水深碧而澄清中有巨魚人不敢捕堂亭清心堂在郡治平政堂在郡治清凉境界郡圃祠廟廣祐廟在思靈山郡甞苦虎守禱扵神信宿虎交死廟樹間范希文甞言其事姚嗣宗記其靈驗古跡鷰石在平南縣東南十二里圖經云春夏燕巢其上故唐置鷰州糖牛大賔縣南山有丨丨與蛇同穴牛嗜鹽里人以皮裹手塗鹽入穴探之其角如玉取以為器名宦皇朝姚坦甞守潯州東都事畧載越王元傑甞作假山召僚屬置酒共觀之翊善姚坦曰坦見血山不見假山太宗亦為假山或以坦言聞亟命毁之程珦皇祐間守龔州二子隨侍乃明道伊川也人物梁嵩郡人南漢時狀元及第仕至翰林學士故龔以公為大魁歴顯仕因獲蠲一郡之丁賦以迄于今郡人感公立白馬廟題詠西巖境獨清姚嗣宗詩井邑倦炎酷云云兩江横截壯金湯廖徳明南樓詩三里之城渺大荒云云唐家設險基猶在聖代増陴慮更長嶺外此州為道院石應孫題南山詩孤鶩去邉天浩渺萬家窮處水灣環云云風烟殊不䫫南蠻四六塗鵶畫省分虎清潯地控兩江之會境環三郡之封惟清潯之郡境有白石之洞天訟簡民淳夙號嶺南之道院山竒水秀亦稱物外之洞天皂盖分榮此郡頗優于地望玉堂揮翰昔賢曾破于天荒藤州罈津岑溪建置沿革古百粤地秦屬南海郡漢地理志牽牛之分野即唐志所謂韶石以西朱崖以東為星紀之分是也漢属蒼梧郡之猛陵縣地晉分蒼梧立永平郡宋晉以後因之隋廢永平郡置石州又改為藤州煬帝復為永平郡唐置藤州初領永平猛陵安基武陵隋建陽安普寧戎城寧人淳人大賔賀川等十二縣後以武林屬龔州普寧屬容州猛陵屬梧州以隋建屬龔州改義感郡復置藤州廢南儀州以涔溪縣𨽻藤皇朝平嶺南移州治于大江南岸今領縣二治罈津事要郡名罈江古藤風俗俗不知嵗寰宇記云云唯用八月酉日為臘長㓜相賀以為年以白布裹頭同上男兒以白布為頭巾女兒以白布為衫以青石為刀劍郡國志其俗云云如鐵婦人亦以為環玦代珠玊也形勝郡居大江之南郡志土産竹枝霜上人㳂江種甘蔗冬初壓取汁作糖以净器貯之蘸以丨丨皆結丨蒌藤土人採取雜蜃灰并梹榔㗖之左思作吳都賦所引石帆水松東風扶留此其一也一名扶留又産大藤及波羅宻樹竹子布山川羅山在故南儀州山有冷泉羅幔山在罈津縣秀峯山在岑溪縣鳳山在岑溪縣罈江一名鬱江彂源自辰州之罈嶺濛江自昭州立江縣来經城外古鷰州地與潯江合繡江自容江来經州東南與鬱江合樓觀江月樓在州宅以坡詩名鬱秀樓在州城東南浦亭在州城東名宦裴敬業隋人為永平縣丞得民夷心人物皇朝蘇軾子瞻自恵州謫昌化子由亦貶雷州相遇于藤同途至雷秦觀紹聖初御史劉拯論其增損實録謫藤州以居觀甞作詞云醉卧古藤隂下杳不知南北時以為讖陳師道字無已號后山謫藤州黄魯直罈江即事詩閉門覓句陳無已對客揮毫秦少㳺二子不知溫飽味西風吹涙古藤州題詠嶠南瘴毒地蘇子瞻藤州城下對月詩江月照我心江水清我肝端如徑寸珠墮此白玉盤我心夲如此月滿江不湍起舞者誰歟莫作三人看云云有此江月寒乃知天壤間何人不清安牀頭有白酒盎若白露􅄎獨醉還獨醒夜氣清漫漫仍呼邵道士取琴月下彈相將乘一葉夜下蒼梧灘繫舟藤城下蘇子瞻詩松如遷客老酒似使君醇云云弄月罈江濵躋險緑中行宋之問彂藤州朝夕苦遄征孤魂長自驚汎舟依鴈渚投館聽猿鳴石髪縁溪蔓林衣拂地輕雲峯刻不似苔壁畵難成露裛千花氣泉和萬籟聲攀幽紅處歇云云戀結芝蘭砌悲纒松栢塋丹心江北死白髪嶺南生魑魅天邉國窮愁海外情勞歌意無限今日為誰明四六塗鴉禁掖分虎罈江雖居炎嶠實號名邦惟火江之最近宜毒霧之潜銷聞滕君之仁政皆願受㕓歌蘇子之月詩何妨舉酒民夷雜處昔雖劣于華風名勝辱居今實為于佳郡梧州蒼梧建置沿革禹貢荆州之域越地婺女牽牛之次舜帝南廵至扵蒼梧之野秦取百粤屬桂林郡漢武以其地為蒼梧郡之廣信縣後于蒼梧郡兼置交州治廣信更漢立交州牧治蒼梧後徙治畨禺晉宋齊梁陳為郡不改梁析廣信郡兼置成州隋改為封州隋于廣信縣置蒼梧縣属静州唐置梧州皇朝因之今領縣一治蒼梧事要郡名蒼梧以丨丨名郡始扵漢武然不知何所夲檀弓云舜𦵏扵蒼梧之野傳以為南越地湘中記九疑舜之所𦵏漢書載漢武望祀虞舜扵九疑又與檀弓不合漢文穎注曰九疑山半在丨丨半在零陵如淳曰舜𦵏九疑九疑在丨丨之馮乘縣九域志謂九疑山亦名丨丨山未免皆牽合按太史公云舜南狩行死扵丨丨之野歸𦵏扵江南之九疑是為零陵則是舜死扵丨丨之野歸𦵏扵零陵之九疑山太史公徧歴名山大川必有所㩀風俗質直尚信隋志自嶺以南二十餘郡大率下濕瘴癘人性輕悍俚人則丨丨丨丨諸蠻則勇敢自立皆重財輕死樂音閒美蒼梧志丨丨節丨丨有京洛遺風廣西俗語推遜亦謂梧州樂韶州角云又善為渠犀舞為善地吴具七賢祠記云蒼梧扵南紀為善地地氣歊瘴史通蒼梧云云形勝襟喉五羊丘翔蒼梧郡賦唇齒湖湘云云距封圻扵高要窮津源扵邕江山連五嶺史通地緫百越云云交趾之域東漢郡守喻猛頌於惟蒼梧云云土産鍾乳南越志孟陵縣山多丨丨及石英翠羽舊孟陵縣山多丨丨暘夷勃盧南越志暘夷之甲以錫箔飾之雜以丹漆昭耀昱晃左思所謂云云山川火山寰宇記山下有丙穴嘉魚生焉虞衡志嘉魚状如小鰣魚味極腴美出梧州火山山上有火春末尤多毎三五夜一見如野燒之狀或言其下水中有寶氣或言越王尉佗藏神劔扵山阿故深夜騰熖如火沈佺期詩身經火山熱顔入瘴郷消大蟲山在州東三里捜神記扶南王范尋常養虎五六頭若有犯罪投與虎不噬乃赦之因名鬱水南去縣八里雷水出戎縣城赤溪在大江之西有茂林修竹小橋流水之勝旁冇古寺與李太白讀書臺相對井泉冰井在州東北一里味甘且冷元結過郡目曰丨丨又為銘刻石泉上有火山無火冰井無冰之句皇朝宣和間郡守蕭磐訪求得之詩云井名未磨滅自我發沉晦堂觀習隱堂在東山太守李亨伯有記蒼梧道院在郡圃江山偉觀在子城上寺觀白鶴觀唐開元置咸通末宰相鄭畋自翰林承旨謫官蒼梧太守增修觀宇臨江建水閣因題詩云松隂如盖水如羅秋夕山青白鳥過獨坐一庵心正寂數聲何處竹枝歌名宦范曄宋人為守皇朝陳執中七賢祠序公為郡陶以豈弟愛山水為篇章以道其登覽之勝至作相猶眷眷不忘人物陳元蒼梧廣信人明左氏春秋後漢時辟司徒府吴士燮蒼梧廣信人為交趾太守學問優博兄弟四人一為合浦太守賄為九真太守武為南海太守題詠南國無霜霰宋之問經梧州云云連年見物華青林暗換葉紅蘂續開花草沒嘉魚穴陶商翁送吕濤典獄詩峽口蒼梧縣城依南斗魁江渾潮海上地熱火山來云云雲封拜表臺到應無獄訟荳蔻酒頻開看發蒼梧太守船張籍送王梧州詩楚江亭上秋風起云云千里同行從此别相逢又隔㡬多年蒼梧獨在天一方蘇子瞻詩九疑連綿屬衡湘云云孤城吹角烟樹裏落月未落江茫茫幽人撫枕坐歎息我行忽至舜所藏他年誰作輿地志海南萬里真吾鄉鬱鬱蒼梧海上山蘇子瞻詩云云蓬萊萬丈有無間自注鬱洲山自蒼梧浮來蒼梧之邦舜逰處郭功父和梧守蔡希蘧留别詩惟君萬里分符去云云九疑七澤皆相連墨海濡毫寫長句四六榮分符竹來蒞蒼梧地乃舜逰郡因漢置居百粤五嶺之中連九疑七澤之勝北接湖湘而為唇齒之邦下通畨禺而有咽喉之勢潮海火山曾入陶商翁之句青林紅蘂備陳宋之問之詩地望匪輕曾是陳恭公之舊治人才亦盛尚尋吴太守之故家貴州鬱林建置沿革虞商暨周並為荒裔古西甌駱越之地牽牛婺女之分野其次星紀秦平百越置桂林郡而貴州乃桂林之南境徙謫人以居之秦末尉佗自王其地漢武平吕嘉改為鬱林郡廣鬱縣𨽻焉吴立隂平縣晉武改為鬱平縣梁武割鬱林寧浦二郡立定州後改南定州隋置鬱林郡改南定州為尹州又改尹州為鬱州尋罷為鬱林郡唐平蕭銑置南尹州又改為貴州又更貴州為懷澤郡復為貴州國朝因之廢懷澤義山潮水入鬱林縣後孝宗為貴州防禦使本州不曾陳乞恩例今領縣一治鬱林事要郡名懷澤風俗土風尚樸懐澤志云云不事華飾不機巧趨利人性輕悍隋志云云而椎髻箕踞乃其舊風民力耕為業風土記云云不産蠶絲民貧地瘠崇寧加封二侯廟制茅葦彌望守趙汝鉞奏狀蕞爾之區閑田瘠土云云而無原隰膏腴之地以富為雄舊經俚人質直重貨輕死云云盖古者夷獠之俗如此夷獠雜處郡志懷澤乃漢廣鬱之地與云云自谷永陸績出守是邦始廸以詩書禮樂之化異物志郡北連山數百里俚人皆烏滸諸蠻巢居鼻飲以射翠求珠為業形勝連山數百里見上負郭二千家圖經有唐盛時丨丨丨丨丨山川東山在州東二十里峯巒秀峙古經云唐時有何特進履光二人隠此山化為石今山狀如二人立西北一峯望之如婦人搭帔簪花號為新婦巖南山在州南十里羣峯秀異甲扵一郡山有石笋佛象相傳葛仙翁扵此煉丹西山在郡西三十里多躑躅花北山在城北十里山髙聳上有瀑布有池周數十丈禪人羽客多棲止焉古經云周穆王時山上有物相聞有羣女號泣云吾乃山神因金牛星驅雷電與山上池中神物相鬭今神物已化為石牛矣世傳石牛神每嵗禱旱無不應祭則殺牲取血和泥塗于牛背用鹹鹵塗扵牛口鄉人歌放牛之歌以樂之祀畢即雨泥盡乃晴龍影山在州南石壁上有五色畵龍鬱江來自邕横經州界入清潯寶江在州西二里又名浮江水來自賔州紫水鬱江有丨丨兩𣲖若流出即有異其對州門流下者郡守必除擢在州向上而流下者應在僚屬井泉東井在州東北二里中有怪石谷永井在州治東北漢丨丨鑿古刻猶存陸績井在城内東有橘一株乃乾和中刺史劉傳古所種嘉魚井在州西井泉通江風土記水足丨丨臨水觀之歴歴在目有亭臺舊基存焉亭榭南澗井在城西二里守唐弼詩云伏泉地脉能通海疊玉山峯喜近城巢蓮亭在郡治蓮池北亭有蘇子瞻墨刻薫風亭子瞻為梁詔書名宦谷永為鬱林太守今之縣名故附見之陸績為鬱林太守今水南有懷橘坊存焉人物皇朝梁詔州東下郭人少孤事母至孝任廣東提幹未㡬以母病掛冠而歸母卒廬墓側手植松柏號碧林亭有甘露降芝草生蘇子瞻海外聞其孝節徃見之易亭名曰甘露林名曰瑞松坡皆為親染題詠鬱江清徹底運判董端逸詩云云十里郡城南萬山飛不出運使王繁舍山驛詩云云守令最相親二十四峯尖郡守俞括詩云云参差列郡南半空擎鷲宇絶頂寄僧龕二十四峯稱小桂郡守陳嗣昭鹿鳴宴詩朝衣駝裘暮揮扇陳享伯詩冬來行部駕軺車一日之間氣候殊云云未應嵐瘴得全無盖泛言南中氣候也四六眷今懷澤析古鬱林眷懐澤之小邦亦炎荒之樂土賦少而供億亦稀民淳而獄訟頗簡鼻飲巢居雖雜逺夷之俗山環水遶不虚小桂之稱民既力耕有斗米三錢之俗郡無嚚訟乃人生五馬之榮昭州平樂龍平茶城立山建置沿革禹貢荆州之域古百粤之地牽牛婺女之分野秦為桂林郡地二漢並屬蒼梧郡吴置始安郡仍置平樂縣𨽻焉晉宋齊因之至隋不改唐以平樂縣置樂州又以茶城縣來属與永平縣而四更名昭州取昭潭以為名改平樂郡復為昭州皇朝仍為昭州今領縣四治平樂事要郡名昭潭昭平風俗風俗視沅湘伯仲昭潭志序云風聲氣習布衣韋帯之士肩摩袂屬視沅湘以南猶伯仲决科入仕不乏鄒道鄉得志軒記云丨丨丨丨毎毎丨丨朝廷興崇學校而中上舍者三人貢辟雍者二人大法塲嶺外代答云嶺外瘴毒不必深廣之地如海南之瓊管海北之㢘雷化化雖曰深廣而瘴乃輕昭州與湖南靜江接境士大夫反指反為丨丨丨言瘴毒之多也如横邕欽貴其瘴殆與昭等然今俗又以廣東之新州為大法塲英州為小法塲也形勝與清湘九疑犬牙相入昭潭志序居蒼梧始安之間云云灘瀧至昭而中分俗謂自静江漓川合樂川以至梧丨丨三百六十丨丨丨丨丨自昭而上至静江不甚險惡自昭而下至梧多銳石灘高而水湍激兩岸皆懸崖峭壁山川西山在平樂縣西有巨石徑百尺屹立水中如神龍戯珠狀縈山寰宇記山多曲折有木客形似小兒行坐衣服不異人而能飲山居崖宿時出市易作器人亦無别昭潭岡在郡北陶李峒在平樂縣有二仙廟相𫝊唐陶英太尉謫居與李氏聨姻後此二姓居峒數百家世為婚姻云平樂溪在縣南三里其西岸曰昭潭周回一里在今光孝寺考槃澗之口漓水自州合流東南過梧州㑹邕江容江達廣入扵海漢戈船將軍下漓水即此荔水源出桂之荔浦井泉感應泉夷堅已志鄒忠公冄謫昭州江水不可飲汲扵數里山中人暑月殊以為苦所居仙宫嶺下忽有泉涌清冷瑩㓗因䟽為小池日得四五斛遂給用名曰丨丨丨將有北歸之命數日前泉乃涸旋有人大醉至門厲聲呼曰侍郎歸矣尋求不可見明日命下故龜山先生楊中立為公挽詞有甘泉不出户客至豈無神之句盖指二事也亭閣天繪亭夷堅志郡圃有亭名天繪郡守以與金國年號同欲乞名扵徐師川易之忽積壤中得片石其畧云予擇勝得此亭名曰丨丨後某年月日當有俗子易名清暉者可為一笑鄒道鄉詩江山天繪出留待主賔同十愛亭在城内光孝寺門側刺史梅摯作仍有十愛詩石刻今存焉雙榕閣在州治東二里江邊二榕之間祠廟鄒公祠張敬夫記按郡城之西北有所謂得志軒者公所甞㳺歴也下臨長塘曰木梁廣數十畆羣山環扵前其秀曰龍嶽舊為郡士張雲卿之居公實名而記之棟宇今無復存者乃即其地為屋四楹繪公像扵中俾張氏之後人居而丗守之名宦韋陟貶平樂尉楊國忠忌才諭守令脅陟使憂死土豪諭以輕舟泛溪峒丨丨曰我無負神理命之合爾其敢迯刑嵗餘復起為郡守皇朝胡銓紹興八年為宻院編修上䟽乞斬王倫并秦檜孫近乃以銓監昭州鹽倉銓之行也諫院陳剛中以啟送之云屈膝請和知廊廟禦侮之無䇿張膽論事喜樞廷經逺之有人身為南海之行名若泰山之重又云知無不言願請上方之劔不遇故去聊乘下澤之車亦坐謫知贑州安逺縣梅摯為太守人物周渭字得臣㳟城人建隆初由桃源舉進士走京師以書干藝祖皇帝畫下嶺表之䇿召對稱㫖賜進士出身調滑州司馬簿太宗時為御史乞不受錫賜願充昭州所收百姓秋苗耗米鄉人徳之為立祠徐俯為記韓逈郡人以太子中舍致仕號東山野叟仍作書院年八十有三運使李師中以詩贈之曰未衰前已得懸車骨立清風八十餘松竹最宜貧宅舍江山偏照白髭鬚名賢鄒浩東都事畧有田畫者志義之士也與浩善浩徐言官一日報立皇后劉氏畫曰鄒君不言可以絶矣又一日鄒以書約晝㑹潁昌自云得罪留連三日臨别浩出涕畫正色責之曰使君隱黙官京都遇寒疾不汗五日死矣豈獨嶺海之外能死人㢤願毋以此自滿徐俯宇師川避亂抵昭州紹興間召除諫議大夫遂執政題詠猿上驛樓啼李義山昭州詩桂水春猶早昭州日政西虎當官路鬭云云䋲爛金沙井松乾乳洞梯鄉音吁可駭仍有醉如泥千家不禁燒俗名酒謂之燒故梅公十愛有此句此亦唐人燒春之義至國朝以南方瘴霧特弛其禁家自市魯酒偷閑少送迎陶弼詩假守昭平郡云云亭標梅老句堂識敬公名詔移丞相木蘭舟許渾聞昭州李相公移拜郴州詩云云桂水潺湲嶺北流青漢夣歸雙闕曉白雲吟過五湖秋外邑燈火似漁村陶弼過龍平詩數家深峽裏云云入城人半是漁樵立山縣劉君詩度暑田夫竹作衫立山縣俚婦長扵縷績吉貝蕉落之類甚細輕又能以竹作衫充暑服劉詩云云即此也四六桂嶺遐陬昭潭佳郡雖居廣右實接湘南鄒陳辱臨遂彂江山之秀周韓挺出足為人物之英烏鳴柏府當知人傑而地靈猿上驛樓可想境幽而郡僻入仕决科備著道鄉之記凝香索句尚存梅老之詩方輿勝覽卷四十
