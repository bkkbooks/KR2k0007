body:
  text: 方輿勝覽卷九宋祝穆撰瑞安府永嘉平陽瑞安樂清建置㳂革禹貢揚州之域斗牛須女之分野春秋屬越秦屬閩中郡漢初為東海王之都武帝時東甌舉國内徙屬㑹稽郡之回浦縣後改回浦為章安縣章帝分章安縣東甌鄉置永寕縣吴孫亮以㑹稽東郡都尉為臨海郡晉明帝分臨海郡五縣立永嘉郡隋改括州唐初置東嘉州復為括州髙宗分括州置温州後建静海軍使國朝降為軍事咸淳元年八月㫖係今上潜藩之地陞瑞安府今領縣四治永嘉事要郡名永嘉見㳂革注東嘉同上東甌寰宇記永嘉為丨丨欝林為西甌風俗俗少争訟隋志永嘉之丨丨丨丨尚歌舞俗喜競渡舊俗以端午日競渡於㑹昌湖里人遊觀彌岸綺翠綵艦鱗集數里華麗為它郡㝡婦勤紡績同上丨之丨於丨丨有夜浣紗而旦成布者俗謂之雞布富貴不務本郡志土狹民貧云云嗇用嫁娶以財氣相髙䘮葬以緇黄自固織紝工而器用備永嘉志温居塗泥之鹵土薄艱植民勤於力而以力勝故地不宜桑而丨丨丨不宜漆丨丨丨丨不宜粟麥而稲足同上海育多於地產商舶貿遷云云名流繼踵同上此邦素號多士學有淵源近嵗丨丨勝士丨丨而出以齒不以爵每嵗旦於郡學養源堂上交拜敘賀鄉曲聚㑹云云郡守致酒三爵而退至今以為常自許横塘始其俗剽悍以嗇席益告詞永嘉閩粤之交云云其貨纎靡其人多賈其士風任氣而矜節形勝城當斗口郡志始議建城郭璞登山相地錯立如北斗城之外曰松臺曰海壇曰郭公曰積穀謂之斗門而華葢直其口瑞安門外三山曰黄土巽吉仁王則近類斗柄因曰若城于山外當驟致富盛然不免兵戈水火之虞若城繞其顛冦不入斗則安逸可以長保於是城于山且鑿二十八井以象列宿又曰此去一千年氣數始旺云負山瀕海趙㞦㕔壁記温之為州㝡浙東之窮處云云冬無祁寒夏無盛暑百里荷花郡志自百里坊至平陽嶼一丨丨皆丨丨王羲之自南門登舟賞荷花即此也土産柑宴繫年錄民有柑實毎霜後郡例科市於民以遺權要張子韶為州罷丨丨故事上元燈夕上御端門以温州所進柑分賜從臣謂之傳柑山川東山在子城西南二里一名海壇童江心謡海壇沙漲温州出相西山去城三里連嶂疊巘永嘉登覽勝處謝靈運詩遥望西城岑華葢山去子城一里山有洞乃容城太玉之天第十八洞天也楊蟠詩七山如北斗城鎻幾重重斗口在何處正當丨丨峯鳴山在平陽之萬全鄉山腹月大洞宂舊常有聲故名其上多亭樹鴈蕩山在樂清縣敘山云此山數百谷邃峯疉行者不能徧分而為東西谷列而為十八寺始有駐足之地能仁寺今為雁山第一刹靈巖寺所擅竒恠為丨山第一峯又北有白巖石溪九折仙橋跨焉斯水之竒也南雁蕩在平陽縣北自穹嶺丨迤至西五十里間皆丨丨山也初吴越錢王與僧願齊同參韶國師於天台願齊遊永嘉禮智覺真身聞平陽明王峯頂有鴈蕩山天晴則鐘梵相聞杖錫尋訪喜旦曰此山水盡處龍雁所居豈非西域書所謂諾矩羅震雁蕩龍湫者耶結茅其間黃冕仲云觀此則平陽雁蕩五代時已著樂清雁蕩乃祥符間始見沈存中筆談温州雁蕩山天下竒秀然自古圖牒未嘗有言者祥符中因造玉清宫伐山取材方有人見之此時尚未有名按西域書阿羅漢諾矩羅賛有雁蕩經行雲漠漠龍湫宴坐雨濛濛之句此山南有芙蓉峯下有芙蓉驛前瞰大海然未知雁蕩龍湫所在因伐木始見此山頂有大池相傳以為雁蕩下有二潭水以為龍湫又有經行峽宴坐峯皆後人以貫休詩名之也謝靈運為永嘉守凢佳山水處遊歴殆徧獨不言此山葢當時未有雁蕩之名予觀雁蕩諸峯皆峭拔險恠上聳千尺穹崖巨谷不類它山皆包在諸谷中自嶺外望之都無所見至谷中則森然干霄原其理當是為谷中大水衝激沙土盡去惟巨石巋然挺立如大小龍湫水簾初月谷之類皆是水鑿至之穴自下望之則髙巖峭壁從上觀之適與地平以諸峯之頂亦低於山頂之地面世間溝壑中水鑿之處皆有植土龕巖亦此類耳今成臯陜西大澗中立土動及百尺逈然聳立亦雁蕩具體而㣲者但此土彼石耳既非挺出地上則為深谷林莽所蔽故古人未見靈運所不至不足恠也白鶴山在樂清縣一名丹霞舊傳王右軍訪文君遁入竹中右軍不獲見而去李建中詩云玉簫峯下仙君宅千樹巖花幾百春當日㑹稽王内史如何不見竹間人白石山在樂清縣名嶼鄉謝靈運有詩王龜齡詩路從飛鳥上頭過人在白雲髙處行青奥山在永嘉海中宋郡守顔延之于此立亭大若巖在城北百五十里其山水石清激勝處大略如雁蕩又有水簾谷醉翁巖在平陽之鳳棲鄉王龜齡詩兩石如丨丨格清兀然相對坐丨扄啼春山鳥自相勸滿地落花猶未醒孤嶼在城北江中東西有雙峯謝靈運詩江南倦歴覽江北曠周旋懐雜道轉逈尋常景不延亂流趍正絶丨丨媚中川雲日相輝映空水共澄鮮表靈物莫賞藴真誰為傳想象崑山資緬邈區中縁始信安期術得盡養生篇李白與周生宴清溪玉鏡潭詩康樂上官去永嘉遊石門江亭有丨丨千載迹猶存温嶺去永嘉縣一百六十里其地常燠少寒丹芳嶺一名四十九盤自此入雁山境永嘉江在丨丨縣瑞安江東連大海㑹昌湖在州西南受三溪水謝靈運詩昏旦變氣候山水含清輝南塘在雁山之南舊多荷花夾岸多橘圃象浦在樂清縣六十七里謝靈運詩廨宇隣蛟室人煙接島夷龍潭在瑞安縣東北四十里有瀑布四道皆懸流數百尺龍湫在鴈蕩山陳去非詩白龍三十丈欲下層顛來范宗尹詩丨丨信竒絶飛泉落雲間晚投野僧家山作碧玉環趙師秀詩一𣲖落虚空如何盡得同髙風吹作雨低日射成虹西域書曾説先朝路始通或言龍已去幽處别為宫井泉蒙泉在城内深二尺許其味極清甘今汲以醸酒堂亭西堂在州宅謝靈運知族弟惠連有竒才謂人曰每對惠連輒得佳句嘗於永嘉丨丨思詩竟日不就忽夢恵連即得池塘生春草之句登池上樓詩潜虬媚幽􅐾飛鴻響逺音薄霄愧雲浮棲川怍淵沉進德智所拙退耕力不任徇禄反窮海卧疴對空林衾枕昧節候褰開暫窺臨傾耳聆波瀾舉目眺嶇􅋂初景革緒風新陽改故隂池塘生春草園栁變鳴禽祁祁傷豳歌萋萋感楚吟索居易永乆離羣難處心持操豈獨古無悶徴在今西射堂在城西南十里謝靈運晚出丨丨丨詩歩出城西門遥望城西岑連嶂疉巘崿青翠杳深沉曉霜楓葉丹夕曛嵐氣隂節往嵗不淺感來念已深羈雌戀舊侣迷鳥懐故林含情尚勞愛如何離賞心撫鏡華緇鬢束帶緩捉衿安排徒空言幽獨頼鳴琴戯彩堂在倅㕔通判趙㞦迎其父清獻公抃來遂以名堂蘇子由詩春晚安輿遍浙東永嘉别乘喜無窮槖裝已笑分諸子吏道何妨問薛公南亭在城郡之南一里許謝靈運有遊丨丨詩云時竟夕澄霽雲歸日西馳宻林含餘清逺峯隐半規久痗昏墊苦旅館眺郊岐澤蘭漸被徑芙蓉始發池未厭青春好已覩朱明移慼慼感物歎星星白髪埀藥餌情所止衰疾忽在斯逝將候秋水息景偃舊崖我志誰與亮賞心惟良知北亭在州東五里圖經云太守謝靈運於此與吏民别詩云晚末愛餘榮憇泊甌海濱前期眇已往後㑹邈無因樓觀思逺樓劉述建對西山羣峯瞰㑹昌湖里人於此觀競渡今人歌丨丨丨前路之詞即此是也寺觀龍翔院在永嘉縣江中二峯對峙舊有斷流截其中建二浮圖于上程兵部詩東西二寺絶塵嚻齊鼓全慿早晚潮解事江流更分斷與君題作小金焦建炎四年髙宗皇帝幸是刹御書清暉浴光二軒名天慶觀在華葢山殿閣壯觀名官孫綽王右軍引為長史後為守王羲之守永嘉庭列五馬綉鞍金勒出即控之今有五馬坊謝靈運本傳出為永嘉太守郡有名山水靈運素所愛好出守既不得志遂肆意遊遨理人聽訟不復闗懐所至輒為詩詠以致其意在郡一周稱疾去職靈運因祖父之資生產甚厚鑿山浚湖功役無已尋山陟嶺嘗着木屐上山則去其前齒下山去其後齒嘗自始寕南山伐木開徑直至臨海從者數百太守王琇驚駭謂山賊未知為靈運也李繁韓愈撰孔子廟碑云刺史鄴侯丨丨新作孔子廟其為政知所先後可歌也已張又新為守自孤嶼以下賦三十五篇顔延之為守作五君詠丘遲為守嘗於吹臺山採琴撲寄吴興栁暢皇朝楊蟠嘗為守有百韻詩張九成紹興間出守時米斛匹絹率倍其輸曰重斂疲民二千石之責斗尺皆立定制人物皇朝周行已為太學博士求便養親詔授本州敎授從程氏學發明中庸之㫖此邦始知有伊洛之學劉安節紹聖間與弟安上從程氏學俱以學行見推鄉里仰忻家于永嘉以孝行稱徐履紹興為省元時相秦檜欲以女妻之履乃陽狂廷對不答一字乃附第五甲末時人為之語曰殿榜君還顛倒掛丨丨依前作狀元王十朋紹興魁多士有梅溪文集朱元晦為之序云子嘗切推易説以觀天下之人凢其光明正大踈暢洞達如青天白日如髙山大川如雷霆之為威而雨露之為澤如龍虎之為猛而麟鳳之為祥磊磊落落無纎芥可疑者必君子也而其依阿淟涊囘互隐㐲紏結如蛇蚓𤨏細如蟣蝨如鬼蜮狐蠱如盜賊詛呪閃倐狡獪不可方物者必小人也而况於事業之際尤所謂燦然者彼小人者雖曰難知亦豈得而逃哉又云所謂光明正大踈暢洞達磊磊落落而不可揜者太子詹事王公龜齡其亦庻幾乎此者矣陳𫝊良字君舉號止齋蔡幼學為南省魁葉適字正則號水心題詠述職期闌暑謝靈運之郡初𤼵都詩云云理棹變金素秋岸澄夕隂火旻團朝露平昔誰為情逰子值頺暮愛似莊念昔久敬曽存故如何懐土心持此謝叔度李牧愧長袖郤克慙躧歩良時不見遣醜狀不成惡曰余亦支離依方早有慕生幸休明世親䝉英達顧空班趙氏璧徒乖魏王瓠從來漸二紀始得傍歸路將窮山海迹永絶賞心悟虚館絶争訟謝靈運齋中讀書詩昔余逰京華未嘗廢邱壑矧乃歸山川心迹雙寂寞云云空庭來鳥雀卧疾豐暇豫翰墨時間作懐抱觀古今寢食展戲謔既笑沮溺津又哂子雲閣執㦸亦已疲耦耕豈云樂萬事難並歡達生還可託促裝返柴荆謝靈運初去郡詩彭薛裁知耻貢公未遺榮或可優貪競豈足稱達生伊予秉㣲尚拙訥謝浮名廬園當栖巖卑位代躬耕顧已雖自許心迹猶未并無庸方周任有疾象長卿畢娶類尚子薄逰似邴生恭承古人意云云牽􅁝及元興解龜在景平負心二十載於今廢將迎理棹遄還期遵渚騖修坰遡溪終水渉登嶺始山行野曠沙岸静天髙秋月明憇石挹飛泉攀林褰落英戰勝􅋯者肥止鑒流歸亭即是羲唐化獲我擊壌聲夷歌出煙島顧况詩東甌傳舊俗風月江邉好何處樂神聲云云從來喚作小杭州楊公濟詩一片繁華海上頭云云水如棊局分香陌山似屏風繞畵樓海國甌鄉浙水東宋綬詩云云暫煩良守此慿熊分野長如二月天方干送王明府詩云波濤不應三春雨云云地與剡川分水石趙嘏送張又新除温州詩云東晉江山稱永嘉莫辭紅斾向天涯凝絃夜醉松亭月歇馬曉尋溪寺花云云境將蓬島共煙霞却愁明詔徴非晚不得秋來見海槎嚴城鼓動魚驚海陳陶贈温州韓使君康樂風流五百年永嘉鈴閣又登賢云云華屋樽開月下天内史筆鋒光案牘鄢陵詩句滿山川今來誰似韓家貴越絶麾幢雁影連土宜多説似吴風方干送永嘉王明府雖展縣圖如到縣王程猶入縉雲東山間閣道盤花底海界孤村在浪中禮法未聞離漢制云云字人若用非常術唯要旬時便立功四六出綸西掖剖竹東嘉輟班朝路出守海邦環地千里負海一偶人才最盛文獻可稽土俗頗淪于奢侈民生多務于貿遷郡當甌粤之窮地負海山之險維此東甌之勝實居左淛之窮躋攀雁蕩請稽沈氏之筆談顧盼龍湫更和簡齋之詩句地近海鄉頗富魚鹽之利郡隣仙境號為龍雁所居詩成孤嶼棹舟尚想於長庚訟息空庭蠟屐宜追於靈運報政東嘉之郡愛滿甘棠賦詩西射之堂夢生春草雁蕩幾千年康樂未窺於勝槩龍湫三十丈簡齋曾託於雄觀鈴齋多暇聊成夢草之章貢篚所將行侍傳柑之宴周太𫝊明伊川之學葢得正傳朱夫子序梅溪之文尚存勁氣陳止齋之文足為模範葉水心之學信有淵源處州麗水縉雲龍泉青田松陽慶元遂昌建置㳂革禹貢揚州之域古縉雲之墟天文吴地斗分野春秋時屬越秦屬㑹稽郡後越王無疆七世孫搖佐漢有功立為東越王都東甌今温州永嘉是也後以甌地為廻浦縣東漢改為章安吴立臨海郡晉分臨海立永嘉郡隋改為處州尋改為括州領括蒼麗水二縣唐為松州元宗改為縉雲郡德宗又改為處州大歴間以處士星見詔更州名國朝因之今領縣七治麗水事要郡名括蒼見㳂革注古括同上縉雲同上風俗地瘠人貧圖經縉雲連山瀕溪云云故躬儉嗇尚朴素家習儒業同上自郡侯李繁興學之後云云賦輸素辦楊大年與章廷評書獄訟甚稀云云形勝宛在窮山楊大年書郡齋岑寂云云引領寓目羣峯倚天清溪南奔淺深見底人家櫛比多在煙嵐中湍流險阻郡志云云九十里間五十六瀬黃牛卧處好安州舊城在州東南七里今呼為舊州唐末郡人盧約竊㨿是州遂徙今地舊傳約之將徙訪三平和尚云云因訪近山適有黄牛吪寢因徙于此郡齋夐在霄漢楊大年與李起居書云云石磴盤屈䇿馬登臨嵐靄滴衣煙霞滿目山川括蒼山福地為七十二福地之一小括山髙三十五丈周廽三里州治在其上其路屈曲為九盤以入譙門寰宇記云括蒼山在台州今之蒼嶺是也隋志云處州有括蒼山天王山在州西北隅城壁繞其上有唐時天王像故名縉雲山在麗水縣舊傳黃帝遊仙之處有孤石特起髙二百丈峯數十或如羊角或如蓮花有龍鬚草云是羣臣攀龍髯所墜者徐凝題丨丨丨詩黄帝旌旗去不回空餘片石碧崔嵬有時風卷鼎湖浪散作晴天雨㸃來仙都山在縉雲東三十里謝靈運名山記山傍有孤石屹然髙二百尺三面臨水周圍一百六十丈山頂有湖生蓮花輿地志云即三仙子都曺唐詩孤峯疑碍目一柱自擎天吏隐山在州東北五十里山南有唐李陽氷為縉雲令秩滿退居于此為窪樽瀑布飛泉灑落三百餘尺上有四井周廻四丈因名丨丨丨留題刻至今人寶之瀑布山在縉雲縣北三十五里詳見上注謝公巖好溪上亦名康樂巖馮公嶺在縉雲西亦名木合嶺胡升詩萬山髙處更髙峯俯瞰茫茫雲滿空石門洞在青田縣七十五里兩峯壁立髙數十丈相對如門因名有瀑布直㵼至天壁凡三百尺自天壁飛洒至下潭凡四百尺有亭曰噴雪道書載青田山元鶴洞天即此好溪在麗水縣東五里舊名惡溪内多水恠唐叚成式為刺史有善政恠族自去改名好溪洄溪大溪之源雙溪在遂昌靈溪在龍泉東一里崇因薦福院北其溪夾長洲為兩𣲖里䜟云沙洲到寺上龍泉出宰相沙洲到寺前龍泉出狀元後何執中拜相劉知新釋褐為首葢符其䜟云鼎湖在仙都山頂相傳以為黄帝上仙處幞頭壇在遂昌縣東五里大溪中其狀似之水涸則見謠言丨丨丨上岸遂昌官一半今溪南漲沙與山􅅢等去壇纔數尺而登桂籍者相望堂亭州宅長編咸平二年知處州楊意言本州城壁舊在平隰唐末冦亂移於山上吏民不便請復之上以嵗旱不許照水堂在郡治米元章書㸃易亭在南園唐明皇贈葉法善詩青溪道士人不識上天下天鶴一隻洞門深鎻碧忩寒滴露研硃丨周丨樓閣煙雨樓在州治范至能書錢仲韶詩風雲出沒有時有丨丨空濛無日無洄溪閣在州宅取謝靈運對嶺臨丨丨之句少㣲閣在州治少㣲乃郡之星也留槎閣在龍泉縣濟川橋畔有東坡留題何才翁詩朱户夜開千嶂月畵簾秋捲兩溪風名官李邕為刺史叚成式嘗為守詳見好溪注李陽冰為縉雲令詳見前吏隐山皇朝楊億為守人物皇朝葉致逺王介甫贈丨丨丨直講詩云葉侯越著姓冑出實楚葉縉雲雖窮逺冠葢傳累葉何執中龍泉人為太宰葉夢得字少藴累遷左丞號石林先生名賢秦觀紹聖中坐蘇子瞻黨謫監酒稅題詠路創李北海李白送王屋山人魏萬詩縉雲川谷難石門㝡可觀瀑布掛北斗莫窮此水湍噴壁灑晴雪空濛生晝寒却寕懼惡溪惡咆哮七十灘水石相噴薄云云謝巖開康樂來守縉雲城楊大年詩逺辭金虎觀云云官舍類樓居楊大年郡齋書事征途㳂木合嶺名云云生齒三萬家楊大年詩括蒼古名郡云云溪清玉有聲沈約禮好溪詩山碧煙無色云云瀑布和雲落姚令送薛員外赴處州詩云云仙都與世疎勸耕滄海畔劉長卿送齊郎中典括州星象移何處旌麾獨向東云云聴訟白雲中樹影雙溪合猿聲萬嶺同石門康樂在幾里枉帆通巖險煩登陟孫逖送楊法曹按括州東海天台山南方縉雲驛溪澄問人隐云云潭壑隨星使軒車繞春色儻尋琪樹人為報長相憶郡城孤峭似仙居方䧺飛贈段郎中詩云幸見仙材領郡初云云杉蘿色裏登臺閣瀑布聲中閲簿書德重自將天子合情髙元與世人疎寒潭是處清連底賔席何心望食魚連屬君家弟與兄杜荀鶴寄處州朱尚書并呈軍倅崔太博詩縉雲名郡昔推名云云教化静師龔渤海篇章髙體謝宣城山從海畔粧吟景水自城根演政聲今日老輸崔博士不妨疎逸傍雙旌雲開逺樹層城出班宏送李處州詩云云路轉千峯五馬遲聲聲弦誦半儒家姚述堯過青田詩簇簇魚鹽喧古市云云四六出綍嚴城分符古括眷是縉雲介于浙水括山名郡浙水窮源雖連浙部實控閩山何太宰之名邦既䧺地望葉石林之故里亦富人才維縉雲山之墟實為古郡當少㣲星之分宜屬名流瀑飛湍噴好賡太白之名篇縣古山深更訪陽氷之遺刻雲蔵州宅覺嵐翠之染衣月映譙樓聽江流之喧枕宅在雲霄内相之書詞備述樓名煙雨石湖之題扁猶存鄴侯興學郡始盛於儒風成式化民溪自銷於恠族閲簿書於瀑布聲中抑何清也聴弦誦於魚鹽市裏可謂盛哉郡齋岑寂既訟獄之素稀編户樸淳亦賦輸之易集方輿勝覽卷九
