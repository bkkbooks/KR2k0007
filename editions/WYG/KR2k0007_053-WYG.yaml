body:
  text: 方輿勝覽卷五十三宋祝穆撰眉州眉山丹稜彭山青神建置㳂革禹貢梁州之域觜觽參主益州秦地井鬼分野秦属蜀郡之武陽縣漢武帝分蜀地置犍為郡武陽縣𨽻焉昭帝時武陽為犍為郡治王莽改武陽曰戢成後漢仍以武陽為郡治齊分置齊通郡梁立青州取漢青衣縣為名西漢改青州為眉州因峨眉山為名後周復曰青州改為嘉州隋又改為眉州又為眉山郡唐復曰嘉州又别置眉州尋移令治所改為通義郡復為眉州皇朝陞為防禦今領縣四治眉山事要郡名眉山眉陽峩眉通義風俗俗近古者三見蘇子瞻逺景樓記學者獨盛張剛通義儒榮圖序後世以蜀學比齊魯而蜀之丨丨亦丨丨於通義政和御筆西蜀惟眉州學者最多以詩書為業修譙樓記其民云云以故家文獻為重夜燃燈誦聲琅琅相聞以名節相尚華陽志公孫述據蜀時犍為拒守不屈述攻之曹朱遵逆戰死任永忠閉戸費貽素隱光武嘉之曰士大夫之郡也圖經云唐張文紀出於武陽名節卓犖照映古今本朝士大夫尤盛元祐之黨而此州乃有八人焉元符之黨而此州有二十六人焉靖康之禍而眉之忠義死守者猶有四人焉舉禮部者四十五人蘇子瞻上范舍人書通義蜀之小州眉山又其一縣去歲云云得者十三人其他可知矣蠶市二月十五日村人鬻器于市因作樂縱觀以為丨丨蘇子瞻詩蜀人衣食常苦艱蜀人遊樂不知還千人耕種萬人食一年辛苦一春閒形勝古犍為之地毛敏列仙樓記介岷峨之間張剛序通義云云前揖三峨後通岷江象耳鎮於後唐盧拯羅城記云云峨眉列乎前山秀水清通義志昔人評吾州丨不髙而丨丨不深而丨通衢平直同上吾邦之勝似乎洛陽眉之云云廣衍夾以槐栁綠隂蓊然山川峨眉山在眉山縣詳見嘉定府蟇頥山在眉山縣東七里狀如蟇頥因名有至德觀有氽朱淘丹泉傳記所載以為軒轅氏丹宅山腹有穴曰龍洞傳者以為四目老翁唐末有楊太虚得道於此今祠中有三仙像四目居中焉人日出東郊渡江遊丨丨丨眉之故事也蘇子瞻詩人日東郊尚有梅石佛山在眉山之南蘇子瞻寄子由詩卜田向何許丨丨丨下路下有氽家山千畦種秔稌山泉宅龍蜃平地流膏乳熊耳山在青神縣蜀志曰望帝以褒斜為前門丨丨靈關為後戸崌崍山在彭山縣東二十里象耳山在彭山縣有楊祐甫十事記一曰丨丨丨二曰彭祖宅三曰大悲道場四曰寳現磨鍼二溪五曰太白書臺有石刻太白留題云夜来月下卧醒花影零亂滿人襟袖疑如濯魄於氷壺也六曰師俉志栖二大士會昌寺七曰薛范二詩八曰龍池蠏泉九曰千嵗松柏十曰石恪畵䕶法身金華山在彭山縣東五里有丈六佛像夜多神燈盤石山在彭山縣有普照寺巖腹有石室范文忠公留題云窮幽訪盤石細徑入荒凉踏葉履屦濕觸花衣袂香平葢山在彭山縣北二十四化之一也李文簡平盖觀詩平盖神仙院武陽山水鄉打鼻山在彭山縣南十餘里山形孤起東臨大江昔周鼎淪於此或見其鼻故名鵝􅈹山在長泉北五里長泉士人毎登科而歸鄉人迓之於此三酌史幹詩云龍泉五盞張㠶去鵝􅈹三盃衣錦歸寄語長泉後生者年年盛事莫相違上巖去中巖五里唐末有佛刹號垂拱寺相傳巖下龍聼僧講經於此由是建寺中巖在青神縣諾矩羅尊者道場逰者渡江入巖口有喚魚潭循山三里許始至寺中有羅漢洞即牛頭以木鑰扣石笋處下巖馮當可題三峯詩古院無人僧作佛碧潭有水魚化龍當年矩諾小逰戯一石擊碎成三峯小桃源小南城門村家多竹籬桃樹春色可愛橋之下流皆花竹楊栁之舟其間鄉人謂之丨丨丨蘇子由詩彷彿城南路繁香撲市橋蜀江在城外一名玻璃江輿地志後漢安帝以蜀郡廣漢犍為為三蜀故名丨丨蘇子瞻送楊孟容詩我家峨眉隂與子同一邦相望六十里共飲玻璃江陸務觀詩玻璃江上栁如絲行樂家家要及時只怪今朝空巷出使君人日宴蟇頥大江一名汶江李膺記山下有灘昔周衰鼎淪没其一每雲開風息則曉然見之導江在眉山縣東四里源出岷山芙容溪在青神縣岸有芙容因名磨鍼溪在象耳山下世傳李太白讀書山中未成棄去過是溪逢老媪方磨鐡杵問之曰欲作針太白感其意還卒業嫗自言武姓今溪傍有武氏巖繫龍潭在彭山縣北四里舊經後漢漢安元年仙人瞿君武入峨眉山得道乘龍還家每年往丨丨于丨龎籍詩巢鳯閣邉勞逺夢丨丨丨下認前題喚魚潭劍南詩藁云在中巖客至撫掌魚輙羣出陸務觀詩春枕悠然夢何許兩枝笻杖丨丨丨魚蛇水在青神縣二十里源出陵州木梓山合導江有魚似蛇故名玉津陸務觀舟過丨丨詩玻瓈江上送殘春疉鼓催帆過丨丨井泉猪龍泉漁隱叢話載蘇子瞻云青神縣百年前有牝猪伏於此化為二鯉在泉中而莫有見者余一日偶見之以告妻兄王愿愿疑余誕余因禱于泉已而二鯉復出老人泉梅聖俞寄蘇明允詩泉上有老人隱見不可常蘇子居其間飲水樂未央淵中必有魚與子自徜徉淵中茍無魚子特翫滄浪日月不知老家有雛鳯皇百鳥戢羽翼不敢言文章去為仲尼歎出為盛時祥方今天子聖母滯彼泉傍樓閣逺景樓蘇子瞻記云吾州之俗有近古者三其士大夫貴經術而重禮教其民尊吏而畏法其農夫合耦以相助葢有三代漢唐之遺風而他郡莫之及也始朝廷以聲律取士而天聖以前學者猶襲五代之弊獨吾州之士通經學古以西漢文詞為宗師方是時四方指以為迂闊至於郡縣胥吏皆挾經載筆應對進退有足觀者而大家顯人以門族相尚推次甲乙皆有定品謂之江鄉非此族也雖貴且富不通婚姻其民事太守縣令如古君臣既去輒畵像事之而其賢者則記錄其行事以為口實至四五十年不忘富商小民常儲善物而别異之以待官吏之求家藏律令往往通念而不以為非雖薄刑小罪終身有不敢犯者歲二月農事始作四月初吉榖稚而草壯耘者畢出數十百人為曹立表下漏鳴鼓以致衆擇其徒為衆所敬畏者二人一人掌鼓一人掌漏進退坐作惟二人之聼鼓之不至至之不力皆有罰量田計功終事而會之田多而丁少則出鈔以償衆七月既望斬艾而草衰則仆鼔决漏取罰金與償衆之錢買羊釃酒以祀田祖作樂飲食醉飽而去歲以為常其風俗盖如此故其民皆聪明才智務本而力作易治而難服守令始至得其言語輙了其為人其明且能者不復以事試終日寂然茍不以其道則陳義秉法以譏切之故不知者以為難治今太守黎侯希聲軾先君子之友人也簡而文剛而仁明而不苛衆以為易事既滿將代不忍其去相率而留之上不奪其請既留三年民益信遂以無事因守居之北墉而増築之作逺景樓日與賓客僚友逰處其上軾方為徐州吾州之人以書相往來未嘗不道黎侯之善而求文以為記嗟夫軾之去鄉乆矣所謂逺景樓者雖想見其䖏而不能道其詳也然則人之所以樂斯樓之成而欲記焉者豈非尚有易治之俗也哉孔子曰吾猶及史之闕文也有馬者借人乘之今亡矣夫夫是二者於道未有大損益也然且録之今吾州近古之俗獨能累世而不遷盖耆老昔人豈弟之澤而賢守令撫循教誨不倦之力也可不錄乎若夫登臨覽觀之樂山川風物之美軾將歸老於故丘布衣幅巾從邦君於上酒酣樂作援筆而賦之以頌黎侯之遺愛尚未忘也清風閣蘇子瞻記云文慧大師應符居成都玉溪上為閣曰丨丨求文為記天地之相磨於虚空與有物之相推而風於是焉生執之而不可得也逐之而不可及也汝為居室而名之吾又為汝記之不亦惑歟又云風起於蒼茫之間彷徨乎山澤激越乎城郭道路虚徐演漾以汎汝之軒窓欄楯幔帷而不去也汝隱几而觀之亦有得乎力止於所激而不自為力故不勞形生於所遇而不自為形故不窮嘗試以是而觀之臨風閣唐沈逈有詩烟霞生座右林沼匝城隈明霞閣在蟇頥山至德觀又有春風樓嘉祐閣枕羅城繪三蘇於上刻和陶詩於壁間堂榭大雅堂丹稜人楊素從黄魯直逰黄謫戎州嘗曰安得一竒士而有力者盡刻杜子羙東西川及䕫州詩使大雅之音復盈三巴之耳哉素聞之欣然拏舟訪黄於戎請攻堅珉募善工作華堂以宇之黄偉其言悉書子美詩遺之因以大雅名其堂且為之記借景亭黄魯直文集在青神尉㕔下瞰史家園嘗有詩云當官借景未傷民恰似鑿池取明月披風榭在郡治祠墓孟拾遺祠在蟇頥山僖宗幸蜀政事悉出内侍田令孜之手左拾遺孟昭圖右補闕常濬上䟽論事昭圖坐貶令孜遣人投之蟇頥津賜濬死後人為立祠裴澈詩一章何罪死何名千載推君與屈平從此蜀江烟雨夜杜鵑應作兩般聲張綱墓在崌崍山東花卿冡漁隱叢話載黄魯直云在丹稜之東館鎮至今有英氣血食其鄉老泉墓蘇明允葬於蟇頥山東二十里地名老翁泉名宦蘇味道楊繪題名序丨丨丨練逹臺閣王方慶深明禮典髙仁厚中和二年以西川牙將訃羅夫子之亂凡出軍六日賊皆平張琳許昌人蜀檮杌載五代前蜀時為眉州刺史修章仇通濟堰溉彭山通義青神田萬五千頃民被其惠歌曰前有章仇後章公疏决水利秔稲豐南陽杜詩不可同何不用之代天工山行章盧拯記行章攝守眉州時郡無羅城山侯合五縣之力城之逮淳化中李順之亂攻圍半載竟不能下皇朝梁周翰太祖時以左拾遺通判眉州叚思恭眉城人乾德三年全師雄之黨攻眉州思恭募先登者許以厚賞賊遂敗走思恭矯詔出上供錢帛給之其後度支劾思恭上嘉其果幹命知軍事李簡淳化中為守四年盗起䧟州郡冦至設方略堅壁固守賊力屈解圍去人物蘇洵眉山人號老泉先生二子軾仕至翰林學士禮部尚書轍仕至門下侍郎天下號曰三蘇蘇軾貶黄州築室於東坡自號東坡居士贈太師制云朕承絶學於百聖之後探微言於六籍之中將興起於斯文爰緬懐於故老雖儀刑之莫覿尚簡册之可求掲為儒者之宗用錫帝師之號故禮部尚書端明殿學士贈資政殿學士諡文忠丨丨養其氣以剛大尊所聞而髙明博觀載籍之傳幾海涵而地負逺追正始之作殆玉振而金聲知言自况於孟軻論事肯卑於陸贄方嘉祐全盛嘗膺特起之招至熈寜紛更乃陳長治之䇿歎異人之間出驚讒口之中傷放浪嶺海而如在朝廷斟酌古今而善幹造化不可奪者嶤然之節莫之致者自然之名經綸不䆒於生前議論嘗公於身後人傳元祐之學家有眉山之書朕三復遺書乆欽髙躅王佐之才可大用恨不同時君子之道闇而彰是以論世儻九原之可作庶千載以同風惟而英爽之靈服我衮衣之命蘇轍致仕卜築於許號頴濵遺老王元之賛受之於天超出乎萬物之表而充塞乎天地之間者氣也施之於事業足以消沮金石形之於文章足以羽翼元化惟軾為不可及矣故置之朝廷之上而不為之喜斥之嶺海之外而不為之愠邁往之氣折而不屈此人中龍也轍之名跡與軾相上下而心閑神至學道有得是以年益加而道益邃道益邃則於世事愈泊如也不有所守而然哉楊繪題名序楊紫微以諌諍顯孫抃字夢得權御史中丞内侍任守忠建節抃奏罷之張貴妃卒追册為后且議建陵廟抃固争丞相陳執中嬖妾笞殺婢抃䟽十二上罷執中抃喜藏書為樓置書其上號書樓孫氏任孜字師聖伋字師中東坡謂之大任小任陳希亮字公弼早孤其兄使治息錢三十餘萬希亮悉召逋家焚劵從學登天聖第復知鳳翔時東坡為僉書子慥字季常號方山子孫與義有簡齋集行於世唐庚字子西丹稜人張商英薦其才後坐貶恵州杜莘老甫十三世孫遷殿中侍御史論王繼先泰檜任盡言秦檜死推湯鵬舉為侍御史盡言以啟賀曰敢以三尺之童連冠兩科之士老牛䑛犢溺愛誰先野烏為鸞欺君孰甚程仁霸蘇子瞻記其外祖丨公逸事云公諱丨丨眉山人以仁厚信於鄰里蜀平中朝士大夫憚逺官闕選士人有行義者攝公攝録事參軍眉山尉有得盗蘆菔根者而所持刀誤中主人尉幸賞以刼聞獄掾受賕掠成之太守將慮囚囚坐廡下泣涕衣盡濕公適過之知其寃咋謂盗曰汝寃盍自言吾為直之盗果稱寃移獄竟殺盗公坐訹囚罷歸不及爿尉掾竟暴卒後三十餘年公晝日見盗拜庭下曰尉掾未定服待公而决前此地府欲召公暫對我叩頭争之曰不可以我故死公是以至今公夀盡今日我為公荷擔而往暫對即生人天子孫夀福朱紫滿前矣公具以語家人沐浴衣冠就寢而卒某㓜時聞此語已而外祖父夀九十舅氏始貴顯夀八十五曾孫皆仕有聲而獄掾之子孫微矣紹聖二年三月九日某在恵州讀陶淵明所作外祖孟府君傳云凱風寒泉之思實鍾厥心意凄然悲之乃記公之逸事以遺程氏亦庶幾淵明之心也李燾丹稜人孝宗朝仕至禮侍同修國史本朝典故尤為該洽續資治通鑑長編千卷號巽岩先生子垕中賢良壁參政􅌫亦為參政題詠劍門倚青漢賈島送眉州穆少府詩云云君昔未曽過日暮行人少山深異鳥多狖啼和峽雨棧盡到江波一路白雲裏飛泉灑薜蘿江花照錦衣司馬君寳送石昌言詩鄉樹迎朱轂云云臨卭不足並榮耀古今稀江山秀氣聚西眉李熈績詩云云人有儒宗學有規郡齋閑靜似僧居李熈績詩民俗畏公無訟事云云王署歸封詔檢泥龎籍詩眉山秋色無多戀云云峨眉翠埽雨餘天蘇子瞻寄黎眉州詩膠西髙䖏望西川應在孤雲落照邉瓦屋寒堆春後雪云云白魚紫笋不論錢蘇子瞻有詩云想見青衣江畔路云云外邑官閒日閉門仲昻丹稜即事慮澹常髙枕云云主人王事簡文與可留題彭山縣詩公館静寥􅋁園亭景物饒溪光明短釣樹影映危譙山鳥忽䨇下池魚時一跳云云文酒且逍遥四六東坡故國通義名邦西眉古壘右蜀名區今得蟇頥大似雞肋或秉耒而耦耕亦戴經而絃誦名山大川鍾蘇氏一門之秀皇天后土鍳坡老千古之忠家有眉山之書人知元祐之學丙穴維舟竟欲歸耕於谷口庚書傳置顧令改牧於峨眉為政未善盖負薪必議於市中讀書不知雖斵輪亦笑於堂下然四蜀衣冠之郡宜煩禮樂之英在三蘇翰墨之鄉合着文章之守然好文而慕權勢至今餘西漢之風其事守如古君臣近世異北墉之記隆州仁夀貴平井研籍建置㳂革禹貢梁州之域東井輿鬼分野鶉首之次秦為蜀郡治漢武置犍為郡又為蜀郡後漢三國因之晉仍属犍為及蜀郡宋属犍為寜蜀二郡齊因之梁置懷仁郡西魏置隆山郡置陵州因張道陵井為名隋煬帝為隆山郡唐為陵州改仁夀郡復為隆州國朝平蜀陞為團練廢為陵井監改仙井監陞為隆州今領縣四治仁夀事要郡名隆山陵陽風俗有古淳質之風郡縣志俗愿慤而好静公議而無私云云地左俗樸韓子蒼進士題名記其土瘠故無萬鍾之家其丨丨故無千金之賈其俗朴不樂迂徙地塉而力耕何丞相㮚作仁夀縣學記云云側耕危穫文同復二井記家貧而好學仁夀學記頗慕文學隋志云隆山風俗與漢中不别而云云形勝牛鞞在其東隆山志前距漢嘉後距廣都云云鼎􅈹崌崍在其西南臨鹽井元和志州城東北二面懸岸斗絶西面顯厰云云州以跨鼇名李石超覺寺記云云者居三嵎山之概也居三嵎中圖經郡治丨丨丨之中兩山環合有自然之勢在髙山上蘇子瞻玉堂硯銘曰文與可將赴陵州孫洙巨源以玉堂大硯贈之子瞻為之銘又曰硯大如四磚許而陵州云云難得水故以戯之土産鹽井古名陵井寰宇記按圖經漢時有山神號十二玉女為道人張道陵開鹽井因此名陵州今有玉女廟甚靈若以火墜井中即雷引沸湧烟氣上衝濺泥漂石甚可畏也或云井泉傍通江海微有敗舡木浮出其井煎水為鹽歴代因之唐萬歳通天二年右補闕郭文簡奏賣水一日得四十五函半百姓貪利失業長安二年停賣水依舊稅鹽先天二年加課利歲有三千六百二貫偽蜀井塞國朝乾德三年平蜀陵州通判賈璉重開舊井一晝一夜汲水七十五函每函煎塩四十斤日獲三千斤至雍熈元年春冬日妆三千八百一十七斤秋夏日收三千四百四十七斤盖水源之有長短也郡國志云井乃東漢張道陵所開曰狼毒井有毒龍蔵井中及鹽神玉女十二為崇天師以道力驅出毒龍禁玉女於井下然後人獲鹽泉之利又云在仁夀縣縱廣三十丈深八十丈益部鹽井甚多陵井最大以大牛皮囊盛水引出之役作甚苦以刑徒充役後廢陵井更開狼毒井今之煑井是也又有正井官有兩灶二十八鑊一旦夜收鹽四碩又有營井蒲井在籍縣及研井稜井律井在井硯縣沈存中筆談云陵州鹽井隂氣襲人入者輙死候雨入井則隨雨施工後人以木盤滿中貯水底鑿小竅釃水如雨點設於井上謂之雨盤終日不絶井榦於是一新張天覺治平生主文是邦閲其山川起伏盤礴謂此英靈秀粹之氣必生異人熬波出素利及全蜀非所稱也山川印山在跨鼇山之􅉾捫膝先生喻公故居之工麟山與井硯縣治相對鳯山與井研縣學相對登科者題名於此龜山在井硯縣南鐡山在井研縣東北六十里出鐡諸葛亮取以為兵器其鐡剛利堪充貢焉鼎􅈹山在仁夀縣南一里其山隆起又曰隆山州葢以此得名三嵎山在仁夀縣之東南隅三山相對去鹽井一里東曰飛泉南曰翳嘶西曰跨鼇即州衙坐山也民謡云三嵎青陵陽榮三嵎翠陵陽貴郡守何公嘗於東山之下作靑榮臺以表之張紹祖山扉記曰有岡北來莫窮所自不亟不徐勢趨東南欲薄城下岐而為三行且五里虎踞盤礴不復去此陵陽之所謂三山也飛泉山舊名東嵎山隋仁夀元年獠亂百姓城於山頂避亂其上無水百姓致禱丨丨湧出由是建廟於山頂立二碑以紀其靈焉跨鼇山上有跨鼇亭每歲上元重九太守率僚属燕其上玉屏山距城西二十里西山環聚玉屏為之冠虞丞相父祺功德院在焉石城山在仁夀院石壁似城絶頂望見峨眉山瑞雲山在仁夀院東四十里丞相何公始生之日此山夜半有紅霧亘天執笏山在井硯縣南五里一峰突出下有青陽氏登科不絶唱車山在貴平縣南九里漢宋辰為巴郡守有恵於人州人送辰到蜀廻至此為辰立廟以其山近鹹井聞推車唱歌之聲故名艷陽洞在州城至道觀之後昔天師既誓玉女於井因藏去其衣念藏之未固徑取鎖之石室或謂之蔵衣洞洞在重巖之下㟏岈幽􅆼晦明變化千態萬状雖距闤闠不數舉武而若與世隔盖張道陵修煉之所也石姥在跨鼇山頂歲旱里人轉徙之天即黯靉雨四注文同嘗賦之云上簪岑之飛泉兮披薈蔚之榛莾爰有石之跂跂兮旁無他而相伍其逺睨之若人兮廹猶疑其蹲虎里俗神而甚恭兮號相尊而曰姥息壤在籍縣南一里有地畆餘踏之軟動蟠溪在飛泉山下丞相何公居其側蘭溪在貴平縣北四十里唐末隱士張鴻所居亭閣樂道園在州東鳯門外城中遊賞惟此最盛文與可有詩蓬萊閣在艷陽洞之前秦少游詩千尋傑閣跨峥嶸席上風雲指顧生千里勝形歸爼豆七州和氣入簫笙人遊晚岸朱樓逺鳥度晴空碧嶂横今夜請看東越分藩星應帶少微明程公闢次韵半天鐘鼓宴峥嶸早晚晴隂景旋生湖暖水香春載酒月寒雲白夜聞笙金鼇破海頭争並玉露排烟陣自横我是蓬莱東道主倚䦨先占日初明平雲閣在郡圃文與可詩云陵陽郡事全稀少嬾守長嬴半日閑晚後須來上髙閣就中無厭是雲山祠廟玉女祠在仁夀縣今名靈真夫人郡國志昔張道陵於此得鹽井後人因祀玉女於井内初丨丨無夫每年取一少年擲置井中不爾水即竭又蜀郡西山有大蠎蛇吸人上有丨號曰西山神每嵗土人莊嚴一女置祠傍以為神妻蛇輙吸去周氏平蜀宇文貴為益州總管乃擇日設樂送玉女像以配西山神自是之後無復此害翳嘶神廟相傳為巴郡太守嚴顔之祠名宦皇朝賈璉再闢陵井孫明復為倅文同梓州人為守嘗奏鹽井為民害乞從買樸蘇恊為州推官其子易簡生於官舍中張商英司文是邦人物范雍籍縣人張詠冦準所薦天聖間拜樞使黄千井硯人以選人上書詆時相入黨籍陳祐為諫官後入黨籍李新仁夀人元符上書入黨籍喻汝礪靖康初為祠部員外郎不附割三鎮之議金賊立張邦昌遂掛冠號捫膝先生何㮚政和五年狀元及第後為相不肯割三鎮死於國事與兄棠弟榘號為三鳯虞允文仁夀人事親篤孝嗜學好修紹興三十一年冬完顔亮入冦以中書舍人督視府參謀督師敗之於采石自此名聞一時歴兵部尚書四川宣撫荆襄制置還朝為僉樞參政知院宣撫四川召還拜相韓駒字子蒼題詠岳牧用詞人杜甫送陵州路使君詩云王室比多難髙官皆武臣幽燕通使者云云國待賢良急君當㧞擢新佩刀成氣象行盖出風塵戰伐乾坤破創痍府庫貧衆僚宜㓗白萬役但均平霄漢瞻佳士泥塗任此身秋天正揺落回首大江濵俊髦始接迹員安輿有詩云國初吾鄉民萬戸一縫掖盖自咸平後云云蕭條官宇巖嶺上文與可送通判喻郎中詩前年請郡得隆時不謂其州陋如此云云零落民家坑谷裏近日簿書全簡少文與可詩云云吏人惟聴兩衙休歸來便只尋冠履遶遍林亭山上頭寂寥都不似州城同上可笑山州為刺史云云若無書籍兼圖􅀞便不教人白髮生四六地重跨鼇㤙隆分虎陵井熬波夙擅牢盆之利嵎山毓秀率為鈞軸之才雖封疆不足於千里而風俗未歉於四川陋州如此至形文可與之詩縫掖者稀亦著員安輿之詠方輿勝覽卷五十三
