body:
  text: 方輿勝覽卷三十三宋祝穆撰棗陽軍棗陽建置沿革本漢蔡陽縣地属南陽郡後漢分蔡陽立襄陽縣属義陽郡後復置南荆州西魏改昌州後周改襄陽縣曰廣昌縣隋改廣昌曰棗陽縣唐改昌州曰唐州以棗陽縣属焉國朝因之中興以来属随州莫將申請陞為軍尋䧏軍使後因京湖制置趙方申請陞棗陽軍今領縣一治棗陽事要郡名棘陽風俗佳氣鬱葱按東漢長沙定王𤼵子舂陵戴侯仁求徙南陽元帝以蔡陽白水鄉徙仁為舂陵侯蔡陽属南陽郡望氣者蘇伯阿見舂陵城郭唶曰氣佳哉鬱鬱葱葱則南陽之舂陵也世祖即位幸舂陵復其徭役改曰舂陵形勝漢白水鄉圖經武帝封長沙王子買為舂陵侯至戴侯仁以舂陵地形下濕上書請徙南陽元帝許之以蔡陽之白水上塘二鄉徙仁為舂陵侯光武其後也故張衡賦曰白水龍飛是也晉改舂陵曰安昌郡隋属昌州為襄外屛戰守編襄峴為今巨鎮而棘陽又云云宻邇虜境荆湖制置趙方申照得随州棗陽縣云云彈壓為先官府稱卑體面不振知縣雖兼軍使境土實𨽻随州俾自為郡宻䕶風寒庶壯邉城山川資山在軍北其上深邃濶逺居其間者可以耕種修竹巨木環山之民皆資焉故名舊属随縣新撥𨽻棗陽赤睂山在棗陽縣東北八十里世傳昔赤睂嘗軍此山下地名北寨武王山在棗陽縣南七十里世傳楚武王獵于此觀崗見戰守編槲林崗同上白水即白河濜水源出濜山南流入昆水西北入襄陽縣界張衡南都賦滍澧濼濜是也瀴水丨丨出棗陽縣經襄陽縣界古跡光武宅按本紀注丨丨舊丨在今棗陽東南宅旁二里有白水是也岑彭馬城在縣東北水中有石羊虎存焉驌驦橋左傳云唐成公有兩驌驦馬今唐城鎮之南北地名唐里有石刻丨丨丨三字蔡倫池荆州記在棗陽縣名宦岑彭棘陽人王莽時守本縣後䧏光武人物鄧艾棘陽人司馬宣王辟為掾後為將㓕蜀岑文本棘陽人其父之象仕隋為邯鄲令坐為人訟不得伸子文本年十四詣司𨽻理寃令作蓮花賦合臺嗟賞焉題詠魯堰田疇廣孟浩然次夕陽館詩聼歌知近椘投館忽如歸云云章陵氣象㣲重岡九十九邢居實棗陽道中詩春仲賦南征嵗暮復北走岐路劇羊腸云云馬痩須栁著鞭袖短難藏手與君􅀙此别把袂倚衰何處南陽有近親韓愈題廣昌館詩白水龍飛已㡬春偶逢遺跡問耕人丘墳𤼵掘當官道云云四六疏榮芝檢共理棘陽昔乃雷封今為斗壘眷惟斗大之城實控風寒之地昔非要地苐聞百里之絃歌今乃極邊庸作重城之保障雖號小邦實襄陽之外屛正須賢守為并郡之長城氣望鬱葱難訪白水真人之故宅兵嚴守衛今為黃堂太守之新疆郢州長夀京山建置沿革禹貢荆州之域楚分鶉尾之次春秋属楚為郊郢秦属南郡二漢属江夏郡雩杜縣之地魏立郢州尋廢晉分江夏郡立竟陵郡宋立郢州梁為南司北新二州之境西魏平漢東以石城為守境改南司州為安州改北新州為温州又立富水郡隋廢温州入安陸郡又廢郢州入竟陵郡唐初扵長夀縣復立郢州後為富水郡復為郢州皇朝因之今領縣二治長夀事要郡名富水風俗民俗朴儉石才孺風土考古記云云土饒粟麥同上其丨丨丨丨有西北之風聲氣習焉形勝西浮江漢唐刺史劉丹記楚郢之境云云東騖京嶺東抵安陸考古記丨丨丨丨西抵荆門南徑荆湖張聲道圗經序東走江淮西通梁漢云云北則馳騖乎陳蔡汝潁之郊北抵襄陽考古記云云南抵景陵盖通荆襄川陕陳蔡汝潁舟車往来水陸之衝也䢵子之國左傳古石城戍唐崔耿紀今郢之理丨丨丨丨也郡跨大江之東因山以為固圗經子城三面墉基皆天造正西絶壁下臨漢江石城之名本此臨漢水以為限圗經序水急㟁髙晉庾亮欲移鎮石城蔡謨曰自沔以北云云魚貫泝流水陸異勢山川章山在長夀縣南西魏平漢東立基州仍統丨丨郡即是山也又見徳安荆門注木山在長夀縣見左傳楚武王事大洪山在京山詳見隋州注石人山在京山形像如人漢江在州之西自北来經石城而南厯漢陽入大江泗河在京山西四十里東入竟陵縣界臼水在京山南四十里左傳楚昭王奔随將渉成臼即此曲水池寰宇記梁太清四載邵陵王綸為富水郡太守雅好賓客效王右軍為丨丨丨鹿湖池在長夀縣聊屈山之麓舊傳有白鹿入水禱雨即應今為善利廟井泉煉丹井在長夀縣東南八十歩舊傳今縣治乃梅福宅嘗煉丹于此有井在焉潮井在州北深谷中有泉出于石日再潮至則有聲如雷樓臺白雪樓選宋玉問客有歌于郢中者其始曰下里巴人國中属而和之者数千人其為陽春白雪属而和者不過数十人故其曲彌髙其和彌寡今在郡治謝諤重建樓記曰楚地諸州皆有樓觀收攬竒秀而郢之白雪尤雄勝王介甫寄題丨丨丨詩折楊黄花笑者多陽春白雪和者少知音四海無㡬人况乃區區郢中小千載相傳始欲慕一時獨唱誰能曉古心以此分㝠㝠俚耳至今徒擾擾朱樓碧瓦何年有榱桷連空欲驚矯郢人爛漫醉浮雲郢女參差躡飛鳥丘墟餘響難再得欄檻兹名復誰表秋来欲歌聲更苦石城寒江暮空繞西樓張繼郢城丨丨吟連山盡塞水瀠洄山上戍門臨水開朱欄直下一百丈日煖逰鱗自相向昔人愛險閉層城今人復愛門江清沙洲楓岸無來客草綠花開山鳥鳴蘭臺在州城龍興寺宋玉所逰堂亭五客堂唐李昉嘗畫五禽于壁間以鶴為仙客孔雀為南客鸚鵡為隴客鷺鷥為雪客白鷴為閑客孟亭唐詩紀事王維過郢畫孟浩然像于刺史㕔後名以浩然咸通中刺史鄭閒以賢者之名不可斥改曰丨丨皮日休郢州丨丨記北齊美蕭慤有芙蓉露下落楊栁月中疎先生則有㣲雲淡河漢疎雨滴梧桐樂府美王融日霽沙嶼明風動甘泉濁先生則有氣蒸雲夢澤波撼岳陽城謝眺之詩句精者有露濕寒塘草月映清淮流先生則有荷風送香氣竹露滴清音此與古人争勝于毫釐也陽春亭在通判㕔古跡宋玉石凡二石李昉守郡日得之扵榛莽間今移在白雪樓前莫愁村古樂府云莫愁石城人在今漢江之西而名傳于魯史禮樂志意其為宋人乎容齋二筆云梁武帝河中之歌曰河中之水向東流洛陽女兒名莫愁莫愁十三能織綺十四採桑南陌頭十五嫁為盧家婦此莫愁者洛陽人也近世周美成西河一闋専詠金陵有莫愁艇子曽繫之語豈非誤指石頭城為石城耶鄭谷詩石城昔有莫愁鄉意愁魂散石城荒江人依舊棹舴艋江㟁還飛䨇鴛鴦帆去帆来風浩渺花開花落春悲凉烟濃草逺望不盡千古漢江閒夕陽名宦許志雍韓愈送許郢州志雍序愈嘗以書自通于于公頔累数百言其大要言先達之士得人而託之則道徳彰而名聞流後進之士得人而託之則事業顯而爵位通下有矜乎能上有矜乎位雖常相求而有不相遇于公不以其言為不可復書曰足下之言是也于公身居方伯之尊蓄不世出之才而能與卑鄙庸陋相應荅如影響是非忠乎君而樂乎善以國家之務為己任者乎愈雖不敢私其大恩抑不可不謂之知已常矜而誦之情已至而事不􅀙小人之所不為也故扵使君之行道刺史之事以為于公贈凡天下之事成扵自同而敗扵自異為刺史者常私扵其民不以實應乎府為觀察使者常急于其賦不以情信乎州繇是刺史不安其官觀察使不得其政財已竭而斂不休人已窮而賦愈急其不去為盗也亦幸矣誠使刺史不私扵其民觀察使不急扵其賦刺史曰吾州之民天下之民也恵不可以獨厚觀察使亦曰某州之民天下之民也賦不可以獨急如是而政不均令不行者未之有也其前之言者于公既已信而行之矣今之言者其有不信乎縣之扵州猶州之扵府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其孰能􅀙之愈扵使君非燕逰一朝之好也故贈行不以頌而以規皇朝王安石孔夷甫有送王介甫赴郢州京山丞詩岳飛為江西制置復郢州偽州荆超投崖而死人物申包胥郢人與伍子胥友善宋玉郢人名賢尹洙謫居吕大防謫居題詠郢客吟白雪李白詩云云遺響飛青天徒勞歌此曲舉世誰為傳試為巴人唱和者乃數千吞聲何足道歎息空凄然日與政聲流錢起送元使君詩遙聞江漢水云云山川鬱重複李百藥郢城懐古客心悲暮序登墉瞰平陸林澤窅芊綿云云王公資設險名都距江隩方城次北門溟海窮南服長策挫吴豕雄圗競周鹿萬乗重沮漳九鼎輕伊榖大蒐雲夢掩壯觀章華築人世更盛衰吉凶良倚伏遽見鄰交斷仍覩賢臣逐南風忽不競西師日侵蹙運圮属驅除時屯恣敲扑莫救夷陵火無復秦庭哭鄢郢遂丘墟風塵俄慘黷狐兔竟逰踐霜露日沾沐釣渚曲池平神臺層宇覆陣雲埋夏首窮隂慘荒谷悵矣舟壑遷悲哉年代倐雖異三春望終傷千里目縷切魚膾肥司馬君實送張伯常移居郢州詩楚江白逶迤楚山碧參差玉吹稻粒長云云四六疏恩金闕行紱石城土風朴陋郡政清閒但觀政理而訟平可謂調髙而和寡政聲洋溢與漢水以俱流歡誦揄揚皆郢人之相和郡樓嘯詠不妨和白雪之歌朝路論思行即侍紅雲之列均州武當鄖鄉建置沿革禹貢豫雍之域秦韓之交角亢氐東井輿鬼之分野春秋為麋戰國属韓及楚秦漢属南陽漢中二郡地魏属南鄉郡晉属順陽郡永嘉之亂僑置始平郡齊因之又置齊興郡梁為南始平郡後魏改為武當郡梁置興州西魏改為豐州隋改為均州又為淅陽郡又為武當郡唐復置均州皇朝陞為武當莭度今領縣二治武當事要郡名均陽風俗俗好楚歌晏類要云云民多秦音圗經桑麻蔽山陸愷宗海樓記云云衣食自足公庭無事同上民人朴野云云風物秀美同上云云泉甘土肥魚稻之鄉同上擷芳珍而鱠紫鱗盖丨丨丨丨也形勝東連襄沔均陽郡志序云云西徹梁洋南通荆衡同上云云北抵襄鄧襄陽保障郡守題名記當襄鄧之衝通鑑唐僖宗紀均州云云山川西山一名寳葢在鄖鄉縣西南三里其山北有崖號星牖武當山荆州記在縣南二百里一名仙室一名大和斯山乃嵩髙之參佐五嶽之流輩武當記云周廽四五百里中有一峯名曰參嶺清明之日然後見峯山有三十六巖郭仲南雍州記學道者常以百數羣學者心有隆替輒為百獸所逐有石門石室相傳尹嘉所棲之地山在南陽界而去洛陽甚近圗經引道書載真武開皇三年三月三日生生而神靈􅊎除妖孽救䕶羣品捨俗入道居武當山四十三年功成飛昇遂鎮此方人召而至語以其故妖氣遂息因曰爾後每遇庚申甲子及三七日當下人間斷㓕不祥五龍觀即其隠處天柱山在武當山上有三石門金鎻嶺在武當山前有流水相傳國師鎻獮猴扵此水涸乃放去法華巖在俞公巖西俞公巖古記隋僧慧􅈒往巖中誦蓮花經有白衣老人自謂曰我東溟之子謫居此地限滿得還斯我所居願奉仁者陳圖南題詩云萬事若在手百年聊稱情他時南嶽去記得此巖名漢水在武當縣北四十里中有滄浪洲即漁父棹歌處均水前漢地理志丹水東来折入丨丨龍池在武當山頂祈禱無不應者鹽池在武當東南百里水氣所染著草木如霜雪工人呼為鹽花樓亭宗海樓陸愷記下臨清漢江山映帯景物之變無窮太和樓向太和峯為一州之壯觀紫雲亭晁端夫記云南迎武當之叠嶂左瞰漢川之巨浸古跡濮王故宫唐濮王泰薨妃閻氏捨宫地建延福寺今乾明寺是也仙李園潘岳閒居賦房陵朱仲家有縹李世所希有在千丈峯下社栢樹圗經南陽武當南門有丨丨丨大四十圍梁蕭欣為守伐之忽有大蛇􅀙樹腹中出群蛇随入南山其聲如風雨名宦皇朝梁翰太宗征蜀以翰為均州刺史鑿山開道商旅以濟人物張士遜均州人按士遜乃光化人嘗為鄖鄉簿或者㳺官就居于此歟名賢尹洙謫監均州酒税范純粹坐元祐黨謫均州題詠二紀重来愧此身張順之雍熙中植桐于蕭寺壬辰登科後告老留題于寺云桐枝手植有桐孫云云三世衣冠聫貴仕十州軒冕接清塵耕桑雖喜多新隴耆艾堪嗟少故人蕭寺門前題粉壁又書丁巳對壬辰四六疏恩天上紆紱漢濵郡臨漢水地近洛陽畫為均水之封疆用作襄城之保障民俗相安盡是桑麻之野江流所溉亦為魚稻之鄉山名佐岳乃仙聖之所居水號朝宗亦臣民之所慕土風秀美人或育扵竒才民俗朴淳郡亦稱扵易治房州房陵竹山建置沿革禹貢梁州之域楚地翼軫之分野鶉尾之次舜封丹朱于房古麋庸二國之地春秋為房子國戰國属楚秦属漢中郡西漢因之東漢立房陵郡又置上庸郡魏合房陵上庸西城三郡為新城厯晉宋齊為新城上庸二郡梁置岐州理房陵改新城為光遷國後州為遷州隋為房陵郡唐改遷州又扵竹山縣置房州皇朝雍熈陞為保康軍以劉繼元為莭度使中興置金房開達四州安撫使房𨽻金今領縣二治房陵事要郡名房陵防渚圗經云其地即春秋之丨丨也風俗有蠻夷之風唐書韋景駿傳州窮陋云云兼秦楚之俗郡縣志房自戰國時更秦属楚故其民云云少􅀙學之士同上男子燒畬為田婦人則績麻為布以給衣食云云無兵火之患陳希夷撰修城記云厯五代亂離云云誠久安之地也形勝東聫襄鄧譙樓記云云西接金商當南北風寒之衝據楚俗咽喉之㑹三面際水水經注云上庸郡云云居萬山底庾斯助房渚貢銀記龍馬渡江京右為北鄙属郡凡六獨防渚云云隍塹有法畫墁集修城記房陵為州隘陋無逰適之地獨是城矗矗言言而門觀丨丨一如邊壘皆丨丨度其地四塞險固華陽志秦始皇以云云徙吕不韋舍人萬家于房陵又載蜀將孟達云所在深險司馬公必不来吾無患矣漢周綰至喜館記房在畿右為僻郡兵火之後以險獲全繁盛甲扵一路有江漢川澤山林之饒地理志有建鼓馬鬛之崔嵬吕昌明登凝嵐門賦其險也云云其勝也有睡嶽龍光之幽宻山川房山在房陵西南四十三里山四面有石室似房因名景山在房陵西南二百里山海經荆州之首曰丨丨南山在房陵南三里陳去非有遇虜奔入丨丨詩石門泄風無晝夜古水截道藏雲雷定山吴曽謾錄此山有朱仲李園三十六所筑山在房陵縣又有筑水昔劉備屯兵筑口是也白馬山元和志在竹山縣西南三十里山似石馬曹孟徳歎金城千里即此也荆州記孟達為新城太守登白馬寨而嘆曰劉封申躭據金城千里而不能守豈丈夫哉建鼓山在房陵縣袁崧記登句將山見馬鬛建鼓屹然半天與馬鬛山相接方城山又名庸城山在竹山縣東三十里山上平坦四面險固山南有城周十餘里春秋庸地楚使盧戢黎侵庸方城在上庸縣女媧山在竹山縣與燕子山相對沮水出景山入于漢江堵水在竹山縣即今南江水通漢江粉水源出房陵水宜淘粉浸水在王家山下宜染纑紗上庸水源出庸嶺下南流入孔陽水有一潭投石其中即有雷雨亭館道院在郡治至喜館在房陵縣北二十里舊名悔来館名宦崔述唐人權載之集述為房州刺史惻隠所被四封喜静韋景駿李白贈詩曰惟君固房陵誠莭冠古今皇朝陳希亮富弼薦知房州素無兵備希亮以牢城卒雜山河户得百人日夜部勒聲振山南盜不敢入境許安世為倅元豐間有曰三花仙来自京師嘗簮三朶花㳺于市㕓頗能詩安世以告蘇子瞻有詩序因云郡守李侯在京師與之相善扣以前事則至房中説之及侯守房三花曰記房中之言否既見李侯七日而尸觧人物尹吉甫圗經世傳為房陵人今城西三里有廟房之人尹姓為多豈其苗裔歟黄香後漢時為吏書名賢張舜民謫房州號浮休居士題詠售用無非竹張舜民詩云云衣裾盡是麻未恨落房州陳去非詩同行得快友勝處頻淹留乗除了身世云云南北兩巖花前人紙坊山絶頂直下夕陽斜却看来時路云云十里平郊連郡堞周洵詩云云一溪清水溉民田四六疏榮宸扆出守房陵分千里地在萬山間矧房陵之小壘介邊𤨏之窮鄊舟車少而行旅弗通田畝狭而農夫告病邑舍稀疎殆若三家之市山蹊險阻甚于九折之途民染蠻夷之俗有待撫摩士稀文學之風正須教養地惟險阻足為自固之圗時茍繹騷獨號久安之地光化軍光化建置沿革禹貢豫州之域韓地角亢氐之分野春秋榖伯國楚地隂國所遷秦漢為隂縣及鄼縣属南鄉郡後漢末魏武分南鄉郡晉武改南鄉為順陽郡梁立鄼城郡領隂鄼二縣後周廢為縣属襄陽郡隋改隂曰隂城唐立鄼州領榖城郡城二縣尋廢為鎮𨽻襄陽之榖城縣皇朝陞隂城鎮為光化軍後為通化軍復為光化軍今領縣一治光化事要郡名鄼城南陽風俗其俗朴陋圗經注形勝蕭何所封漢書蕭何傳注云鄼屬南陽縣即沛之鄼縣也山川固封山在軍城西北九里晉順陽王城西舊經本名崇山唐天寳改馬窟山在鄼城東南六里雍州記漢時有馬百匹􅀙此窟出故名漢水出嶓冡是水有四名曰漾曰沔曰漢曰滄浪特以地為别耳温水在城南三里西南流入漢江白河在城東百五十里泌河在城東南樓閣霽景樓李豸詩層樓壓清漢初上便忘歸夕靄蔵平野晴烟滿翆㣲名宦蕭何封鄼侯今軍城内有廟皇朝葉康直四眀志為光化令人歌之曰衡葉光化豐榖城清如水平如人物張士遜光化人皇朝類苑退𫝊少孤貧讀書武當山有道士見而異之曰子有道氣可随我學仙公不欲道士曰不然亦位極人臣題詠溪山動越吟沈存中光化道中遇雨詩望逺初翻葉随風已結隂雨篷宜倦枕鄉夢入寒衾蓑笠侵鄖俗云云烟波千里去誰識魏牟心四六疏榮宸陛擢守邊城粤由一鎮陞作十同惟鄼城之小壘實京峴之要區有社稷有民人豈輕郡寄非城池非兵甲當固人心地近窮邊正欲風寒之䕶郡屯勁卒初何斗大之嫌内而農畝買牛自此相安外則邊疆牧馬至于不敢昔雄地望乃蕭相國賜履之區今盛人才亦張退傅垂弧之地方輿勝覽卷三十三
