body:
  text: 方輿勝覽卷四十三宋祝穆撰瓊州瓊山臨高澄邁樂㑹文昌建置㳂革非禹貢所及春秋所治古楊越地牽牛婺女之分野漢武遣路博徳平南粤以其地為珠崖儋耳郡至昭帝時凡六反遂罷儋耳併屬珠崖至元帝時珠崖又反賈捐之建議不當擊遂罷珠崖郡東漢立珠崖屬合浦郡呉大帝于徐聞立珠崖郡又於其地立珠官一縣招撫竟不從化晉省珠崖入合浦尋又廢珠官梁置崖州又于徐聞立珠崖郡竟不有其地隋焬帝更置珠崖郡立十縣又置儋耳臨振二郡唐立都督府管崖儋振三州太宗以崖州之瓊山置瓊州領瓊山萬安二縣又割崖州之臨機來屬浙置曽江顔羅容瓊縣又置樂㑹縣皇朝平南漢割崖州之地入瓊州以舍城文昌澄邁來屬後省舍城入瓊山以儋崖振萬安四州𨽻瓊州守臣提舉儋崖萬安等州于水陸轉運事改瓊管安撫昌化萬安吉陽三軍𨽻焉政和元年陞静海軍節度今𨽻廣西經畧司領縣五治瓊山事要郡名瓊管瓊臺在譙樓下臨放生池葢置使時以使臺得名風俗其俗朴野郡志云云若叔伯兄弟之子不以齒序伯之子雖少皆以兄自居而叔之子雖耄亦為弟也氣候不甚寒熱郡志夏不至熱冬不甚寒鄉邑多老人風土則見於東坡數語蘇子瞻帖云食無肉出無友居無屋病無醫冬無炭夏無寒泉語雖不多已盡風土之大槩夏無蠅蚋則可喜也夷人之俗寰宇記夷人無城郭俗異居非譯語難辨其言不知禮法須以威服號曰生黎巢居深洞績木皮為衣以木綿為毯性好酒每醖釀用木草葉代麴蘖熟則以竹筩吸之打鼔吹笙以為樂男則髽首挿梳帶人齒為瓔飾好弓矢削竹為弦箭鏃鋭而無羽女人文領穿耳垂環病無藥餌但烹犬羊祀神而已長編開寳八年瓊州之俗無醫民疾病但求巫祝詔以方書本草給之生黎熟黎繫年錄初知瓊州定南寨劉荐貸黎人王文滿銀香馬錢而不償文滿破定南寨遂掠臨髙澄邁二縣紹興三十劉祚為瓊管安撫擊逐之奪其地以賜有功者以聞黎海南四郡島上蠻也島直雷州有黎母山諸蠻環居號黎人其去省地逺不供職役者號生黎耕作省地者號熟黎丨丨之外始是州縣四郡各占島之一陲珠崖在島南既不可取徑則復桴海循海島而南所謂再渉鯨波也四郡之人多黎姓盖其裔族而今黎人乃多姓王郡民皆服布漢志云云如单被穿中央為貫頭島夷卉服郡志瓊無火麻採産苧麻嵗四收閩廣專用之常得倍利南中所出木綿吉布苧蕉麻皮無非卉也以檳榔為命瓊人云云其産於石山者最良嵗過閩廣者不知其幾非㯽榔之利不能為此一州也以藷菜為糧海南所産秔稌不足於食乃以藷蕷為粮雜菜作粥蘓子瞻有云海南藷為粮几米之十六以安石榴醸酒崖州婦人着緦緶以為土釡器用匏瓢無水人飲惟石汁以安石榴花着釡中經旬即成酒其味香美仍醉人賜一監書慶厯間提刑彭次雲廵歴至此奏請云云詔俞其請多麋無虎漢志云云民有五畜山多麋郡志今其地無虎而馬實繁形勝居海中洲漢書賈捐之傳初武帝立儋耳珠崖郡皆在南方海中洲居廣袤千里合十六縣户二萬三千其民暴惡自以阻絶数犯吏禁吏亦酷之率数年一反通典瓊崖環海尤難賔服南極之外交州記朱崖在大海云云南望連山蘇子瞻伏波廟記云云詳見雷州注如囷廪大元和志珠崖云云與徐聞對渡北風舉帆一夕一日而至潮候不同嶺外代答江浙之潮自有定候欽亷之潮則朔望大潮謂之先水日止一潮謂之小水瓊海之潮半月東流半月西流潮之大小隨長短星不移月之盡衰豈不異哉土産瓊枝出樂㑹縣海岸惟此邑有之販者徑自取載以徃瓊人莫之用也椰子無時而生樹似㯽榔葉如鳳尾海漆海南有野花如芍藥日為倒粘子漬以為膠可代杮油東坡命名長節竹黎母山有水五派流入四郡其源有巨竹節長不啻丈許知風草叢生若藤蔓土人視其葉之莭有無以知一嵗之風候㯽榔水郡城環百里絶無水惟烈村有石井諸村三五十里内盡取焉毎用葫蘆負水以歸其人經月不盥手毎取草上露濡手遇雨則㯽榔樹下溜水甕中雖乆不壊五色雀海南謂鳳凰乆旱而見則雨坡詩仁心知憫農常告雨霧符囬翔天壌間何必隠此都紅藤簟北户錄云方言謂之笙亦曰籧蒢烏觜蘇子瞻云余来儋耳得犬曰丨丨甚猛而馴隨不余遷合浦過澄邁泅而濟路人皆驚詩云長橋肯遥渡清深浦何當寄家書黄耳乃其祖山川瓊山在本縣有丨丨白玉二村其石皆白似玉而潤種藷其上特美所産㯽榔其味尤佳州以此山而得名郍射山在瓊山縣其人以射獵為生黎母山圖經島上四州以丨丨丨為主山特髙每日辰巳後雲霧収歛則一峯聳翠挿天申酉間復蔽不見此必所謂南極星芒所降之地也虞衡志云山極髙常在雲霧中黎人自鮮識之乆晴海氣清明時見翠尖浮半空劉誼平黎記故老相傳雷攝一蛇卵在此山中生一女號為丨丨食山果為粮巢林木為居嵗乆致交趾之蠻過海採香因與之結昬子孫衆多方開山種粮又云天将降雨則祥光夜見望氣者謂南極星降又云婺女星見此山因名黎婺後訛呼為丨丨雲露山在瓊山縣西南六十里有三潭俗傳䧟屋潭上潭林木隂森人不敢近次二潭有小石如橄㰖有竅可穿嵗旱禱雨故名毗耶山在臨髙縣有廟毎有黎人叛則神驅蜂以禦之官軍遂勝東峱山在文昌縣其鄉之民如猿峱然峱婦紡績吉貝細宻瑩白浮丘山郭功父詩仙翁得仙二千嵗碧海變田田變海丨丨却接畨禺西罇跡篙㾗至今在銅鼓嶺在文昌縣俗傳民得丨丨乃諸葛武矦征蠻之鉦神應港名曰沙津畨舶所聚之地其港不通大舟而海岸又多風濤之虞王帥光祖􅁒直開一港以便商旅已開而沙復合忽􅄓風吹開一港尤径今遂名丨丨丨時淳熈戊申也井泉䨇泉乃兩井相去咫尺而異味昔東坡寓比後紹興間李光貶瓊州亦居此九年再貶昌化惠通泉蘓子瞻記云唐相李文饒好飲惠山泉置驛以取水有僧言長安昊天觀井與惠山泉通雜以它水十餘缶僧獨指其一曰此惠山泉也文饒為罷水驛瓊州之東五十餘里有三山庵庵下有泉味類惠山泉東坡居士後過瓊庵僧惟徳以水餉焉且求為名名之曰惠通泉卓錫泉在州東北二十里雲峯巍然聳㧞分兩臂並趍西南一泉中湧相傳景泰禅師之所丨丨也有七仙為守其地開山得石履藏寺中學校州學朱元晦瓊丨丨記云昔者聖王作民君師設官分職以長以治而其教民之目則曰父子有親君臣有義夫婦有别長㓜有序朋友有信五者而已盖民有是身則必有是五者而不能一日離有是心則必有是五者之理而不能一日離也是以聖王立教因民固有還以導之使不㤀乎其初然又慮其由而不知無以乆而不壊也則為之擇其民之秀者群之以丨校而聨之以師儒開之以詩書而成之以禮樂凡所以使之明是理而守之不失傳是教而施之無窮者盖亦莫非因其固有而發明之而未始有所務於外也夫如是是以其教易明其學易成而其施之之博至於無逺之不暨而無㣲之不化此先王教化之澤所以為盛而非後世所能及也淳熈九年瓊管帥守長樂韓侯壁既新其丨之丨而使以圗来請紀曰吾州在中國西南萬里炎天漲海之外其民之能為士者既少幸而有之其記誦文詞之習又不能有以先於北方之學者故其功名事業遂無以自白於當世僕切悲之今其公堂序室則既修矣然尚懼其未能知所興起也是以願有謁焉吾子其有以振徳之某竊惟國家教學之意不爲不廣斯人蒙化之日不為不深然猶有如侯之所慮者豈前日之所以教者未嘗導之以其身心之所固有而徒強之以其外是以若彼其難予因為之書其所聞於古者以告之使瓊之士大夫所以為學者不外於身心之所固有而用其一日之力焉則其徳成行修而無所疑於天下之理将無難者而凡所為功名事業云者其本已在是矣若彼記誦文詞之末則本皆吾事之所急而又何足為輕重乎嗚呼瓊士勉旃天生蒸民有物冇則民之秉彛好是懿徳是豈有古今之間逺近之殊哉侯於是邦政多可紀已具刻於池亭之石因不復書而是役之面勢功程又非侯所以属筆之意也亦略不論著云亭軒知樂亭郡守韓壁建朱元晦記云瓊管在中州西南萬里鯨波浩溔之外其長吏常以領護島中四郡鎭撫民夷為職委寄甚重然以其險且逺也朝廷徃徃不暇擇人冒而徃者意或私有所私固不復知所謂承流宣化為何等事是以其地今為王土数百年而舊俗未盡革論者因鄙夷之以為是果不足與中國之聲教其人盖深耻之而未有以雪也淳熈八年今帥守韓侯始以經略使亷察表行州事而天子許之至則為之正田畝之籍簿塩米之征教之以耕耨灌溉之法而絀其官吏之無状者民業既有經矣然後日為陳説禮義亷耻之意以開曉之既又表其從化之民以厲其不率教者出入阡陌勞来不怠行之期年民吏浃和俗以一變化外黎人聞風感慕至有願得供田稅比省民者於是侯亦自喜其政而幸其民之不我違也乃取荘生濠上之語作知樂之亭於放生池上北望觀闕於雲天縹緲之間以為嵗時瞻仰祝延之地且曰其使邦人士女嘉辰勝日有所詠歌鼓舞以自樂其得被聖化而不愧於王民也間而以書属予記之予謂韓侯之於此邦其勤至矣不但一亭之作為可書也然其為政本末之序則於此亦有可觀者因為書之以告後人使凡居侯之位而逰於是者必以侯之心為心又觀於其政而取法焉則庻乎民生日厚民徳日新而王化之純無逺邇矣世豈有絶不可教之民哉茉莉軒在臨髙縣治胡邦衡有題丨丨丨詩楼閣海山楼在州城南陳瑩中詩勝事荒烟乆山城觀閣宜均勞青瑣客餘事丨丨詩鍳空楼在城西五十里金利崇福寺前瞰江流蘇子瞻詩明月本自明無心孰為境掛空如水鑑冩此山河影吾觀大瀛海巨浸與天永九州居其間何異蛇盤鏡空水兩無質相照但耿耿通明閣在澄邁縣蘓子瞻詩倦客愁聞歸路遥眼明飛閣俯長橋貪看白鷺横秋浦不覺青林没晚潮古跡鉄柱南海志云劉氏鑄丨丨十二築乾和殿後柯述取四柱植於設㕔今於城東濠水中尚存其二餘莫知所在焚艛平黎記云漢武發兵至雷州海岸造艛舡渡兵黎人不出降亦無兵粮李将軍於海岸焚舟而囬故名雞窠小兒錢易洞㣲志云李守為承㫖奉使過海至瓊道逄一翁自稱楊避舉年八十一其父叔皆年一百二十餘又見其祖宋卿年百九十五次見丨丨中有丨丨出頭下視宋卿曰此九代祖也不語不食不知其年嵗名宦皇朝蘓軾紹聖自惠州再謫瓊州别駕昌化軍安置元符量移亷州由澄邁北渡人物姜唐佐字君弼郡人也黄門云余兄子瞻謫居儋耳瓊士丨丨丨遂從之逰氣和而通有中州士人之風子瞻贈之一聫曰滄海何曾㫁地脉白袍端合破天荒後姜以詩示子由坡已下世子由續之云錦衣他日千人看始信東坡眼目長題詠四州環一島蘓子瞻詩云云百洞蟠其中我行西北隅如度月半弓登髙望中原但見積水空此生當安歸四顧真途窮眇觀大瀛海坐詠談天翁區區魏中梁一米誰雌雄幽懐忽破散永嘯来天風千山動鱗甲萬谷酣笙鍾安知非羣仙鈞天晏未終喜我歸有期舉酒屬青童急雨豈無意催詩走羣龍夢雲忽變色笑電亦改容應怪東坡老顔衰語徒工乆矣此妙聲不聞蓬萊宫南方到海行文與可送使君赴瓊州兼五州招討使分竹雄兼使云云臨門䨇斾引隔嶺五州迎猿鶴同枝宿蘭蕉夹道生雲垂前騎失山豁去帆輕雨露蒸秋岸潮濤震夜城政閑開逈閣欹枕島風清青山一髪是中原蘓子瞻題澄邁驛通明閣詩餘生欲老海南村帝遣巫陽招客魂海濶天低鷗沒處云云兹遊竒絶冠平生蘓子瞻過海北歸詩九死南荒吾不恨云云脚力行盡地盡州胡邦衡題茉莉軒詩眼明漸見天涯驛云云萬山行盡逄黎母胡邦衡到瓊和李参政詩落網從前一念斜崖州前定復何嗟云云䨇井渾疑似若耶行止非人十年夢廢興有命一浮家此行所得誠多矣更願從今泛北槎四六拜命玉宸分符瓊管領瓊管之一麾渉鯨波之萬里據百蠻通道之要津兼四國于蕃之重寄䨇旌五馬有隆節制之權一島四州盡入蕃宣之域鯨波萬里暫同季路之乗桴鳳闕九重遥想子牟之馳志東坡之勉瓊士賦詩合破于天荒文公之訓邦民作記願霑于聖化吉陽軍寧逺建置㳂革星土分野並同瓊州本漢珠崖郡地漢武帝初置珠崖儋耳二郡至昭帝併儋耳入珠崖元帝用賈捐之議遂罷珠崖郡東漢立珠崖縣属合浦郡吳於徐聞縣立珠崖郡於其地置珠官縣晉省珠崖入合浦梁立崖州隋文以臨振縣為洗夫人湯沐邑煬帝置臨振郡唐改為振州析延徳置吉陽縣改為延徳郡復為振州本朝割舊崖州之地𨽻瓊州改振州為崖州又為朱崖軍又改吉陽軍今軍城非崖與振之古城乃吉陽縣基也中興以来廢為寕逺縣未幾復為軍又以軍使兼知縣事未幾依舊為軍今𨽻瓊管領縣一治寕逺事要郡名朱耶延徳珠崖漢武紀元鼎六年應劭注郡在大海之中崖岸之邊出珠故曰丨丨風俗地狭民稀郡志吉陽云云氣候不正春常苦旱渉夏方雨樵牧漁獵與黎獠錯雜出入持弓矢婦女不事蠶桑止織吉具多隂陽拘忌胡邦衡云吉陽夷俗云云有数十年不𦵏其親者水土無他惡國朝盧多遜以開寳六年貶崖州李符謂趙普曰崖州云云地僻無書李徳裕窮愁志序形勝西則真臘交趾瓊管志其外則烏里蘓宻吉浪之洲南與占城相對云云東則千里長沙萬里石塘上下渺茫千里一色無復陸途同上至吉陽則海之極處云云東西兩路並無鋪兵縁昌化萬安兩界道路不通遞角皆由海道再渉鯨波同上瓊去吉陽隔越黎洞雖有陸路已八十年不通赴官者以云云為可畏自知寨陳維翰方誘羣黎開通道路自昌化縣泛海三日而至軍城阻風則月餘若徃儋耳則無阻焉去儋尤近地多髙山郡志吉陽云云峯巒秀㧞所以郡人間有能自立者崖州為大丁公言謫崖州嘗問客天下州郡孰為大客曰京師也公言曰不然朝廷宰相作崖州司户参軍則丨丨丨丨也聞者絶倒瓊管志海南以丨丨丨著郡崖州舊治在今瓊州之潭村土人猶呼為舊崖州山川南山在城西南十里枕海黎莪山在吉陽縣東七十里澄島山寰宇記石舡在南嶺之南距海数歩長丈餘形如舡旁有峻嶺名試劍峯石盤去城三十里平如掌周圍数丈可坐十客林木荗宻傍有澗水臨川水在吉陽縣藤橋水在吉陽縣堂亭洗兵堂郡西過江二里胡邦衡名取挽天河洗甲兵之義相公亭在亭南十五里地名力競田天聖間丁晋公謫是郡續有旨拘於荒僻不近人烟之䖏郡乃建屋數椽名曰相公亭名官李徳裕唐人貶崖州司户瑣言云徳裕為寒進開路及南遷或有詩曰八百孤寒齊下淚一時南望李崖州新繁縣有東湖徳裕為宰日所鑿夜夢一父老曰潛形其下幸庇之明府富貴今鼎来七九之年當相是於萬里外後於土中得一蟇徑数尺投之水中而徳裕以六十三卒於朱崖果應七九之䜟公卒見夢於令狐綯曰公幸哀我使我歸𦵏綯曰衛公精爽可畏不言禍将及乃白於帝得以喪還韋執宜執宜自卑官常諱言嶺南州縣名觀職方圗毎至嶺南閉目不視至拜相還所坐堂北壁有圗乃崖州也甚惡之永正元年坐王叔文黨貶崖州司戸此雖非古崖州聊附見焉皇朝丁謂字公言初字謂之蘓州人也真宗既相李廸未幾亦拜謂同中書門下平章事加司空封晋國公尋貶崖州司户参軍謂在朱崖凡五年嘗以家財與士人商販蠲其息其人問所􅁒曰願貴家書至洛陽爾仍戒其人俟有中貴人至與留守宴即投之其人如教留守得之大驚不敢拆其書遂奏之乃謂作陳情表假守書以達之其表叙其受遺冊立之功有云臣有彌天之罪亦有彌天之功章獻后與仁宗覧之惻然遂徙雷州歸田錄云丁公言貶雷州時權臣實有力焉後十二年丁以秘監召還光州致仕時權臣出鎮許田丁以啟謝之其畧曰三十年門館逰從不無事契一萬里風波往復盡出生成其婉約若此又自䕫漕召還知制誥謝兩府啟云效謹宻於孔光不言温樹體風流於謝傅且詠蒼苔公在朱崖有詩近百篇號知命集其警句有云草觧􅁯憂憂㡳事花名含笑笑何人趙鼎紹興九年以與秦檜議和戎及議宗子出閤不合貶潮州後移吉陽軍中興遺史紹興十七年八月丨丨安置在海外者凡数年秦檜降朝㫖令吉陽軍月具存亡申尚書省鼎遣人呼其子至委之曰檜必欲我死也我若不死必當誅及一家死則汝曹無患矣付以後事不食而死年六十三容齋随筆趙忠簡公謫朱崖士大夫畏秦氏無敢寄聲張淵道為廣西帥遣書持藥及酒麫為餽忠簡答書今存張氏又夷堅志趙丞相居朱崖桂林帥遣使臣徃致酒米之餽自雷州浮海而南越三日方張帆早行風力甚劲顧見洪濤間紅旗靡靡相逐而下極目不㫁逺望不可審疑為海冦或外國兵甲呼問舟人舟人摇手令勿語愁怖之色可掬急入舟被髪持刃出蓬背立割其舌出血滴水中戒使臣使閉目坐舡内凡經兩時頃聞舟人相呼曰更生更生乃言曰朝来所見盖巨鰌也平生未嘗覩所謂旗者海鰌耳世所傳吞舟魚何足道使是鰌與吾舟相值在数里之間身一展轉則已淪溺於鯨波中矣吁可畏哉是時舟南去而鰌北上相望兩時彼此各行数百里計其身當千里有餘荘子鯤鵬之説非寓言也此説張子思得之使臣云胡銓繋年錄紹興十八年自新州移貶吉陽軍知新州張𨽻奏其自賦詞云欲駕巾車歸去有豺狼當轍為譏諷容齋三筆紹興中丨丨竄新州再貶吉陽軍主張生乃右列指使遇之無状邦衡有性命之憂朝不謀夕是時黎酋聞邦衡名遣子就學其居去城三十里嘗邀邦衡入山見軍守者荷枷絣西廡下酋指而語曰此人貪虐已甚吾将殺之邦衡曰此人固無状要之為一邦之主合以告海南安撫司不行則訟於宻院不應擅殺人酋悟釋之明日詣邦衡謝人物裴瑑字聞義趙丞相為作家譜本裴晋公十四代孫瑑守雷州時中原亂不得歸召為吉陽守遂居吉陽焉題詠鳥飛猶用半年程李徳裕望亭詩云獨上江亭望帝京云云碧山也恐人歸去百匝千遭遶重城聞道崖州一萬里名賢詩話云晋公舊有園在保康門内園内有仙逰亭及洞景趣瀟洒有道士劉遁相往来遁作仙逰亭詩贈公曰謫官三年尚未囘故人今日又重来云云今朝須盡数千盃又云屡上仙逰亭上醉仙逰洞裏杳無人他時駕鶴逰滄海同看蓬萊海上春公初莫曉其意及南遷遁往見公於崖公方悟乃知遁異人也與之泛舟海上而飲公曰今日之逰成子之詩意也户口都無三百家丁公言到崖見丨丨蕭條賦詩今到崖州事可嗟夢中常若在京華程途何啻一萬里云云夜聼猿啼孤樹逺曉看潮上瘴烟斜吏人不見中朝禮麋鹿時時到縣衙人生何處不相逄湘山野録云初㓂忠愍南貶曰丁當秉茟謂馮相曰欲與竄崖令再渉鯨波如何馮但唯唯丁乃除擬雷州及丁之貶也適當馮相秉筆謂魯参曰丁相欲貶㓂於崖嘗有鯨波之嘆今暫屈丁公渉鯨波一廵竟鑿崖州時人為之語曰傳語崖州㓂司户云云生前定合到朱耶胡邦衡在新州夢趙丞相後十五年乃遷朱崖舘丞相之舊居李参政詩夢裏分明見黎母云云南来怕入買愁村胡邦衡䟦裴氏家譜云遷朱崖時行臨髙道中買愁村云古未有對馬上口占云北注長思聞善縣云云區區萬里天涯路野草荒烟正㫁魂四六朱耶古郡黎母名山郡毋薄於朱耶民實均於赤子惟猿猱之路莫通故鯨鯢之波再渉四州環一島不異中原大海控百蠻是為逺徼賈捐之八百餘言足知夷俗丁晉公三千二字偹見土風昌化軍宜倫昌化感恩建置㳂革星土分野與朱崖同本漢儋耳郡以其人鎪離其耳為名昭帝罷儋耳郡併入朱崖自漢至陳更不得其本地梁置崖州隋即宜倫縣為朱崖郡至煬帝分珠崖置儋耳郡隋亂陷賊唐平蕭銑置儋州領義倫昌化感恩富羅四縣州城即漢儋耳郡城初𨽻髙州緫管𨽻嶺南道瓊州都督府又分昌化置普安縣尋廢割𨽻廣州又𨽻崖州改昌化郡復為儋州又置洛場縣五代為南漢所有國朝平嶺南更議倫曰宜倫省富羅洛場二縣入宜倫詔改三賜為軍而儋州賜名昌化軍中興以来廢為宜倫縣𨽻瓊州復為昌化軍仍𨽻瓊管今領縣三治宜倫事要郡名儋耳風俗民服单被西漢志儋耳珠崖郡民所服如单被穿中央為貫男則耕稼禾稻紵麻女子桑蠶績織民有五畜山多麈麖兵則矛戈木弓弩竹矢或骨為鏃自初為郡縣吏卒中國人多侵陵之故率数嵗一反元帝遂罷棄之數百家之聚蘓子瞻謂葛延之曰儋州雖云云州人所湏取之市而足山川峻靈山在昌化縣西北有廟黎母山寰宇記黎毗山在宜倫縣之北六十里黎曉山在宜倫縣西四十里毗耶山在宜倫縣山有獸似大䖝俚人呼為毗耶故名感勞山在感㤙縣南龍江在感㤙縣黎虞山在感㤙縣東五十里落膞岡在昌化縣西北二十里南崖江在昌化縣南湘江同上延澄江在感㤙縣東北黎水在宜倫縣東棊子灣在峻靈山側有石如棊子毎取之即以紙錢抛神山之下所取不得㨂選取畢視之黒白相均清水池在城東四季荷花不絶城南池在蘓子瞻所居之側温湯寰宇記在感㤙縣北七十里夏即清冷冬即沸熱有患疥癬者浴之皆愈井泉白馬井唐咸通中命辛傅李趙四将部兵來湳灘将過海兵馬渇甚有白馬嘶噉以足跑沙美泉湧出乳泉蘓子瞻居儋耳天慶觀得泉甚甘作乳泉賦相泉趙丞相謫吉陽過儋耳十五里盛暑渇甚鑿井数尺得泉以濟從者之渇堂亭吏隠堂在軍治栽花蒔竹疊石為山李參政光命名因賦詩云旋移松石成岩􅊤時引笙歌入醉鄉吏散簾垂公事畢清風一榻傲羲皇賔燕堂李参政光云海南羣花早發至春時已盡獨荷花自四五月至窮臘與梅菊相接雖花蘂稍小而香色可爱蘓端明詩云城南有荒池瑣細誰復採幽枝小芙渠香色獨未改盖此池也胡邦衡詩危亭涵風漪盛夏秋色凉載酒堂在城南儋耳人黎氏之居蘓子瞻訪之為名其堂仍作詩云城南兩黎子室邇人自逺今我釣其池人魚兩忘返使君亦命駕恨子林塘淺秀香堂在陳氏北園李参政名之取醉翁記中語有詩云月林夜動參差影花徑時供自在香問漢亭州人築亭橋上胡邦衡名李参政詩云河畔牽牛織女星東西相望幾千亭乗槎我欲機邉坐應觧停梭問姓名息軒在天慶觀司命宫蘓子瞻詩無事此静坐一日似兩日若活七十年便是百四十黄金幾時成白髮日夜出開眼三十秋速於駒􅂈隙是故東坡老貴汝一念丨時来登此丨日送過海席家山歸未得題詩寄屋壁祠廟峻靈王廟在丨丨山上有巨石極為靈異祈禱多應蘓子瞻作廟碑云古者王室及大諸侯皆有寳周冇琬琰大玉魯有夏后氏之璜皆所以守其社稷鎮其人民也唐代宗之世有比丘尼若夢恍惚見上帝得八寳以獻諸朝且傳命曰中原兵乆不觧腥聞于天故以此寳鎮之則改元寳應以是知天亦分寳鎭世也自徐聞渡海歴瓊至儋耳又西至昌化縣西北有山秀峙海上石峯巉然若巨人冠帽西南向而坐者里人謂之山洛愽而偽漢之世封其山神鎮海廣徳王五代之末南夷有望氣者曰是山有寳氣上逹於天艤舟而下斵山發石以求之夜半大風浪駕其舟空中碎之石峯之右夷皆溺死儋之父老猶有及見敗舡山上者今獨有矴石存焉耳天地之寳非人所得睥睨者晋張華使其客雷煥發豐城獄取寳劍佩之終以忠遇禍坐此也今夫此山之上上帝賜寳以奠南極而貪冒無知之夷欲以力取而已有之其誅死宜矣元豐五年七月瓊州别駕蘓軾以罪譴於儋元符三年五月有詔徙亷州自念謫居海南三載飲鹹食腥凌暴􅄓霧而得生還者山川之神實相之謹再拜稽首向西而辭焉且書其事碑而銘之山有石池産紫鱗魚民莫敢犯石峯之側有荔枝黄柑得就食持却則風雹之變銘曰瓊崖千里塊海中民夷雜居古相蒙方壷蓬莱此别宫丨丨獨立秀且雄為帝守寳甚嚴恭庇䕃嘉糓嵗屡豊大小逍遥遂蝦龍鷄鶋安棲不避風我浮而西今復東碑銘􅂱然詔無窮洗氏廟高凉人適馮融之子寳在隋時以忠義佐國有平宼之功封譙國夫人至唐武徳夫人之孫馮盎以地降髙祖儋人事之甚嚴蘓子瞻詩云馮洗古烈婦翁媪國於兹名官皇朝裴聞義知昌化父紹為吉陽守胡邦衡題其堂曰盛徳陳中孚字中正為方寕令黎賊犯城居守有勞擢知昌化軍子適為臨髙尉儋耳民王髙叛適徑造賊壘諭以禍福賊遂乞去後辟知昌化有繼美堂胡公邦衡作記人物王霄以貢士住辟雍建炎間歸鄉潜徳不仕年九十六推為鄉先生王公輔字王六公蘓子瞻雅重之年百單三名賢蘓軾紹聖四年自惠州再謫昌化寓城南天慶觀初軾與弟轍相别渡海既登舟笑謂曰豈所謂道不行乗桴浮於海者耶元符三年徽廟登極量移亷州由澄邁北渡有九死南荒吾不恨兹逰竒絶冠平坐之句費衮云東坡在儋耳儋守張中事之甚至且日從叔黨棊以娱東坡洎張解官北歸東坡凡三作詩送之東坡在儋耳一日過黎子云遇雨乃從農家借篛笠戴之着屐而歸婦人小児相隨争笑邑犬羣吠竹坡周少隠有詩云持節休誇海上蘓前身便是牧羊奴應嫌朱紱當年夢故作黄冠一笑娱遺跡與公歸海外清風為我襲庭隅凴誰喚起王摩詰畵作東坡戴笠圗今時亦有畵此者然多俗筆也黄魯直作東坡賛二首子瞻堂堂出於峨眉司馬班揚金馬石渠閲士如墻上前論事釋之馮唐言語以為階而投諸雲夢之澤東坡之酒赤壁之笛嬉笑怒罵皆成文章解覊而歸紫㣲玉堂子瞻之徳未變於初爾名之曰元祐之黨貶之朱崖儋耳方其金馬石渠不自知其東坡赤壁也及其東坡赤壁不自意其紫㣲玉堂也及其紫㣲玉堂不自知其朱崖儋耳也九州四海知有東坡東坡歸矣民笑且歌一日不朝其間容戈其一丘一壑則無如此道人何岌岌堂堂如山如河其爱之也引之上西掖鸞坡是亦一東坡非亦一東坡槁項黄馘觸時干戈其􅁖之也投之鯤鯨之波是亦一東坡非亦一東坡計東坡之在天下如太倉之一稊米至於臨大莭而不可奪則與天地相終始吕公著貶昌化司户参軍任伯雨謫居折彦質自號葆真居士建炎間謫居李光自號轉物老人紹興間謫居題詠莎草山城小嚴維送李秘書往儋州詩魑魅曾為伍蓬莱近拜郎臣心瞻北闕家事在南荒云云毛州海驛長𤣥城知必大寕是泛滄浪自古無戰場蘓子瞻和擬古詩少年好逺遊蕩志隘八荒九夷為藩維四海環我堂稍喜海南州云云竒峯望黎母何異松與邙飛泉㵼萬仭舞鶴䨇低昂芋魁倘日可飽無肉亦奚傷與雕題親蘓子瞻與晋殷安别詩云乆安儋耳陋云云南極多老人李光與杜秀才詩云云及見九代孫君生古儋州氣質清且温今年八十二頗覺行歩奔白鬚映紅頰疑是羲皇人四六疏綍宸庭分符海島凡􅍢耳以為氓皆銘心而感徳維南海之小邦有東坡之遺跡民本島夷漢代始稱於儋耳海環郡治坡仙嘗擬於蓬莱非循良則不足以分逺俗之竹符非重厚則不足以作此邦之寳鎮萬安軍萬寕陵水建置㳂革十道志萬安軍萬安郡與朱崖同唐置萬安州星土分野並同瓊州南海序云海南諸國漢武有焉元帝棄之唐析文昌縣置萬安縣并皇置富雲愽遼二縣屬瓊州尋屬崖州又立萬安州明時移理陵水更州為萬全郡復為萬安州五代為劉氏所㩀皇朝更為軍移軍於陵水洞又移於博遼後移今䖏未幾提刑董芬奏廢為萬寕縣以軍使兼知縣𨽻瓊州安撫王趯奏復為軍今領縣二治萬寕事要郡名萬全風俗其俗質野圗經此邦與黎蜑雜居云云而畏法不喜為盗牛羊被野無敢冒認居多茅竹同上云云絶少瓦屋信尚巫鬼同上以織貝為業同上云云不事文綉服色頗異同上女人以五色布為帽以班布為裙似袋號曰都籠以班布為衫方五尺當中開孔但容頭入名曰思便山川南山在陵水縣南八十里靈山去陵水縣三十里聲山在陵水縣内獨洲山在城東南五十里其峯挿天赤隴山在萬安縣東南三十里湳陵山在萬寕縣西南二里金牛嶺在城西北有寳氣都籠水在陵水縣東北十五里金仙水在萬寕縣北三十里堂亭愛民堂在萬安軍治凝香亭在軍治名宦皇朝湯鷽南創人以武舉守郡南洞王利學叛鷽平之民為立祠名賢李綱建炎元年以尚書左僕射落職自鄂移澧自澧移萬未及軍而還楊煒以排和議貶題詠萬安無市井蘓東坡夜卧濯足詩云云斗水寛百憂天低瘴雲重地薄海氣浮四六疏㤙一札出守萬全漢棄其地唐創為州當海邦之窮處與黎蜑以雜居臬使騰嚢嘗廢軍而為邑帥臣奏疏復自邑而陞軍鳥言夷面非譯語而莫通茅屋荆扉亦土風之甚陋方輿勝覧卷四十三
