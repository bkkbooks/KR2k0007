body:
  text: 方輿勝覽卷六十九宋祝穆撰利州西路沔州畧陽長舉建置㳂革禹貢梁州之域秦分東井輿鬼之分野戰國時為白馬氏之東境秦属蜀郡漢分白馬氐置武都郡今州即武都郡之沮縣也蜀置梁州治漢中之沔陽西晋末氐人楊荗搜自號氐王㨿武都後分王武興即今之州理是也宋立東益州梁立武興蕃王國西魏改東益為興州因武興郡為名隋為順政郡唐復置興州皇朝因之中興以來為利西路帥司治所開禧逆曦之變改為沔州今統郡八領縣二治畧陽本路安撫置司事要郡名武興元和志州城即古丨丨城也蜀以處當衝要置武興督以守之城雖在平地甚牢實周囬五百許歩唯開西北一門外有壘三面周匝風俗人性質直隋志順政郡人尤勁悍性多質直務農習獵同上皆丨於丨事土丨射丨連雜氐羗同上云云形勝崖谷險峻桞宗元興州江運記興州之西為戎居嵗備亭障實以精卒以道之險隘兵困于食守用不固御史嚴公牧于梁患之曰自長舉北至於青泥山又西抵於成州過栗亭川踰寳井堡云云十里百折負重而上若蹈利刄若是者綿三百里而餘自長舉而西可以導江而下二百里而至乃即山僦功轉巨石仆大木焚以炎火沃以食醯摧其堅剛化為灰燼畚鍤之下易其朽壤隨山之曲直以休人力順地之髙下以殺湍悍於是决去壅土䟽導江濤雷騰雲奔百里一瞬既會既逺淡為安流烝徒謳歌枕卧而至戍人無虞專力待㓂惟我公之功疇可侔也是用假辭謁工勒而存之用永憲於後祀云十里百折見上人居山上隋志山髙水峻云云種殖甚微唯以負販為業禮樂之道未聞山川龍山在州西五里山形夭矯如龍下有水泉鳯凰山一名巾子山去州一里如鳯之翔武興山在州西一里古興州城於此烽燧山在州東一里偽蜀時多舉烽燧於此大景山在州南七十里與小景山相連本作丙以避諱改相傳北有丙穴産嘉魚飛仙山在州東三十里相傳徐佐卿化鶴跧泊之地故名飛仙上有閣道百餘間即入蜀路杜甫丨丨丨詩見隆慶府青泥嶺在長舉縣西北五十里懸崖萬仞上多雲雨行者多逄泥淖藥水巖去州七里有院院南有二石洞洞門有泉能療疾鮮于侁詩千峰環郡宇二石繞城堞每憐山水佳况復聞崖穴殺金平在長舉縣紹興四年金人遣四太子進攻鐡山於仙人関髙嶺立大柵下瞰吴玠營関傍有丨丨丨玠堅壘於平土嚴兵以備敵直攻玠營會玠弟璘由七方関入援兵禦之敵遂退沔水圖經亦名沮水源出鳯州界按沔州在嘉陵江之側漢中在沔水之濵沔州之江即非沔水州以此名更當詳考東池在城東三里唐鄭谷詩南連郡郭流澄碧浸晴楼徹底千峰影無風一片秋宋餘慶與賈島東池避暑詩四面無炎氣環流闊復深蝶飛逄草住魚戲見人沉司馬君實寄題晁都官東治詩夕郎遊勝地公跡繼風流昔為題詩著今因好事脩四山相映照五馬屡淹留想見波光净依然一片秋蘇子瞻寄晁都官東沼詩百畆新池傍郭斜居人行樂路人誇自然官長如靈運能使江山似永嘉樓閣郙閣在靈巖寺閣上有漢銘文與可詩南征曽讀浯溪頌西遡今觀郙閣銘館驛青陽驛在順政縣東五十里石才孺詩幸蜀奔波為禄兒聞鈴夜雨有餘悲青陽一夕難髙寢黼幄千宫减盛儀錦綳只擬情方昵綉襪那知禍已成自古覆車循一轍哲王寜不玷聰明名宦嚴震唐人為沔州團練使為政清嚴理行第一嚴礪權載之集嘗為興州刺史郡志云元和中為節度自長舉縣而西䟽嘉陵江三百里通漕以饋成州皇朝薛奎嘗知興州向敏中薦其才擢監察御史邵伯温建炎元年逆賊史斌㨿興州守臣向子寵望風遁去賊自武興謀入蜀鈐轄盧法原提刑邵伯温遣兵扼劔門以拒之斌乃去蜀賴以安題詠武興山水郡文與可靈巖寺詩云云左右有佳處仙巖兩蟬殻佛宇一玉樹人已作秦音郡守楊粹中題青泥驛詩山猶連蜀道云云坐聽嘉陵江水聲唐鄭谷興州江舘詩向蜀還秦計未成寒蛩一夜透床鳴愁眠不稳孤燈盡云云山遶興州萬疊青蘇子由東池詩云云池開近郭百泉并江上宅尋吴御史邵博詩云云池邉詩覔鄭都官四六輟班文石分閫武興千峰環列二水交流控梁益之間雜氐羗之俗陞西閫之帥權有隆彈壓集東池之賔從不廢吟哦開藩飛仙嶺之旁實為重鎮䕶塞殺金平之畔當繼前功天水軍天水建置㳂革禹貢雍州之域東井秦之分野周以前為西戎地至周孝王時其地始有秦邑即天水隴西縣秦亭是也至武公伏邽兾戎滅初縣之即邽戎邑也兾郡属天水郡今軍為上邽治境即秦之舊縣也始皇時属隴西郡漢武帝分置天水郡治平襄取天水湖以為名王莽改曰鎮戎郡東漢改天水郡為漢陽郡治冀魏立秦州晉復曰天水郡治上邽復為秦州後魏秦州有兩天水郡隋廢唐平薛舉改置秦州初治上邽以地震移治成紀之敬親川改天水郡還治上邽復為秦州又置天水縣属秦州徙治成紀而上邽廢唐末復置石晋時徙治赤沙川即今之軍治也皇朝中興金䧟秦州分畫南北界而天水縣属于我始撥𨽻成州金侵天水徙治米谷寨又徙治榆林又徙興州平又以秦州之太平社隴城之東阿社來属及和議成復歸於天水自承平時議者欲升縣為軍以尊表國姓會兵興乃寢及敵騎西來陕右百城盡䧟惟天水獨存議者以為當陞軍為四川宣撫使安丙奏乞將天水縣剏為軍仍置天水縣今領縣一治天水事要郡名隴西鎮戎風俗人性質直隋地理志其丨丨尤丨丨然尚儉約習仁義勤於稼穡多蓄牧無復㓂盗矣以射獵為生漢地理志云云以材力為官同上漢興郡家子選給羽林期門云云名將出焉尚氣槩先勇力朱元晦詩解曰岐豐之地文王用之以興二南之化如彼其忠且厚也秦人用之未幾而一變其俗見於詩者大扺云云已捍然有招八州而朝同列之氣矣葢雍州土厚水深其民端重質直不為浮靡以善導之則易以興起以猛驅之則其强毅果敢之資亦足以強兵力農而成國家富強之業也形勝天水本𨽻秦史記秦本紀曰周孝王時非子好馬及善畜養孝王曰昔栢翳為帝主牧蓄多息故有土賜姓嬴今其後世亦為朕息馬遂分土地為附庸邑之秦使續嬴氏同谷志云云在汧隴之西秦仲始以車馬禮樂革其戎狄之習古為六郡地隋地理志天水云云廹近戎狄班固地理志天水云云花石屏在艾蒿下鎮峽中有石青質黒理其紋有松栢人物溪橋水石山林樓屋日月之狀可為屏山川兊山堯本紀申命和仲宅西土曰眛谷鄭康成注西者隴西之西今人謂之丨丨今天水縣古上邽西縣地也嶓冡山通典嶓冡一在天水郡之上邽一在漢中之金牛同谷志一在西縣大安之間一在天水即西漢水之所出也米谷山去天水縣四十里去成州百餘里唐寳應吐蕃䧟天水邑人保聚於此山麥積山在天水縣東百里狀如麥積為秦地林泉之冠上有姚秦所建寺杜甫秦州山寺詩麝香眠石竹鸚鵡啄金桃即此山之北曰鵰巢谷又有隗囂避暑宫對面瀑布㵼出於蒼崖之間亦勝景也又有魏乙弗后墓李師中詩曰路入青松翠靄間斜陽倒影下溪灣此中猿鶴休相顧謝傅東歸自有山黒谷山在天水北五十里大山喬林連跨數縣有黒谷関紹興初郡守程俊置以防秦鞏來路最要衝太祖山在天水縣南九十里山巖聳秀下瞰数州歴歴可辨鐡堂山在天水縣東五里有石笋青翠長者至丈餘小者可以為礪杜甫詩見成州醉仙崖在天水縣連鳯山魯百能詩云髙倚青冥挿酒星山涯誰作醉仙形從來天地為衾枕應笑人間有獨醒石榴関去天水縣九十五里現子関去天水縣百里對壟州吴山路東柯谷在天水縣杜甫詩傳道丨丨丨深藏數十家又痩地翻宜栗陽坡好種𤓰紹聖間栗亭令王知彰作祠堂杜工部嘗棄官寓東柯姪佐之居湫池堡天水縣七十里靖安堡去天水縣三百里皂郊堡在天水縣東北四十里去秦州纔三十里地網自金䧟陕西天水長道並當邉面地勢平衍金騎四布縱横無礙歩兵不能捍禦隆興中四川宣撫吴璘乃剏地網其制於平田間縱横鑿為渠每渠濶八尺深丈餘連綿不斷如布網然明年金犯天水礙以地網始不得肆天水元管三百六十條後増為五百五十四條四川制司利西帥司每歳農隙差民開淘近嵗雨水湮塞已損於舊矣木門去天水縣十里張郃追諸葛亮於丨丨中飛矢死即此也天水發源栗亭縣清水古丨丨縣杜甫所謂清渠一邑傳是也寺院華藏院在天水東溪山頗勝瑞應院在麥積山後秦姚興鑿山而修千崖萬象轉崖為閣乃秦川勝境又有隋時塔杜甫詩亂石通人過懸崖置屋牢五代王仁裕詩躡盡懸崖萬仞梯等閑身與白雲齊簷前下頋羣峰小掌上平分落日低名宦姜謩上邽人髙祖平薛仁杲擢謩秦州刺史帝曰昔人稱衣錦故鄉今以本州相處謩至邉撫以恩信盗賊衰息人喜曰不意復見太平官府人物趙充國隴西上邽人叚會宗上邽人為西域都䕶姜維天水人諸葛亮軍出祁山以維為倉曹椽遷征西將軍皇朝王仁裕天水人又見西和州嘗知貢舉王溥李昉和凝范質皆其門生皆至宰相劉愿天水人潜心洛學以八行舉董湜天水人好讀書教子經四登賢書綬及緯約並皆擢第題詠清渭無情極杜甫秦州雜詩秦州城北寺勝迹隗囂宫隗囂㨿隴西天水郡寺即其故居関雲常帶雨杜甫寓目詩云云塞水不成河羗女輕烽燧胡兒制駱駝四六出綸中禁剖竹上邽維郡名之甚雅在國姓以當崇至秦而入於版圖迨漢而列於郡邑土厚水深實𨽻雍州之域地靈人傑亦多漢代之賢分符欲扞於坤維豈輕郡寄設險具存於地網盍謹邉防鳯州梁泉河池兩當建置㳂革禹貢梁州之域鶉首之次春秋為氐羗之所居戰國及秦時為隴西郡地漢髙帝分置廣漢郡武帝置武都郡領縣九其属有固道河池二縣今州即二縣之地東漢因之魏明帝時其地沒於蜀初楊氐部落居仇池至難當傾國南冦宋文帝遣裴文明討之難當奔魏後魏拓定仇池於此置固道郡南齊以固道郡置南岐州西魏改歸真郡又改南岐州曰鳯州隋置河池郡唐復為鳯州改河池郡復為鳯州前蜀王建置武興軍皇朝䧏為團練州分川峽為四路𨽻秦鳯路中興以來以鳯州𨽻利西路今領縣三治梁泉事要郡名鳯城南岐志鳯之名州其疆理與鳯翔府相鄰有周之興鸑鷟嘗鳴於岐翺翔至於南而集焉是以西岐曰鳯翔府南岐鳯州南岐丨丨志鳯州居岐之南與関中相表裏四塞險固風俗質直好義同上大抵務農力穡云云有豳風之餘同上西岐鄰壤相接云云形勝大散扼其東郡志云云武休鄣其西北限秦嶺同上云云西通漁梁重蠻疊嶂亭障聫絡隠然為蜀門之重東綿秦漢寰宇記云云北接蕃戎萬山盤踞郡志云云関隘險固土産金絲桞邵堯夫詩楊桞垂金絲風動如飛盖元豐間有㫖下本州取香醪百瓶丨丨丨百根山川豆積山在梁泉縣北一里冲妙先生之别隠淳熈中憲使李大正大書遯跡山三字䥴於石山之麓後袁桂有詩辨之云通元靈異不勝多此處名山未是訛豆積更名為遯跡西康麥積合如何御愛山在梁泉縣松陵堡之側唐韋莊入蜀記云大散嶺之北唐僖宗廵幸歴山下愛翫不能去王素知成都賦詩曰當日蒙塵極險難猶逄蒼翠強開顔吾皇髙拱巖廊上只愛生靈不愛山紫柏山在梁泉縣七十里山有七十二洞仙人多隠于此鳯凰山在河池縣東五里鸑鷟山在兩當東木皮嶺在河池縣西十里詳見成州杜甫發同谷取路栗亭南入郡界歴當房村度木皮嶺由白水峽入蜀即此大散闗在梁泉縣係極邉為秦蜀要路按漢髙祖引兵從固道敗章邯於陳倉諸葛出散関圍陳倉曹操自陳倉出散闗趋河池後魏尉遲逈自散闗伐蜀後唐郭崇韜入散闗取鳯州石敬瑭伐蜀入散関後周王璟出兵自散関趍秦州王仁裕詩鐡鎖寨門扄白日火張旗幟挿青天仙人関雲抄漫錄自講好後関中之地中分為界如南関大散仙人饒風武休等皆為我有丨丨丨外分左右道自成州經天水縣出皂郊堡直抵秦州頃年呉璘大軍嘗由此以出西道地皆平衍即其地壕塹縱横引水縷行名曰地網以遏奔衝此丨丨丨左出之路也自兩當縣趍鳯州直出大散関拒和尚原纔咫尺彼常慿原下視散関僅如塏垤故其勢易以危卒有緩急仙人関可恃耳此仙人右出之路也武休饒風闗鳯州之東興元之西褒斜谷在焉谷口三山翼然對峙南曰褒北曰斜在唐為驛路所以通巴漢旁連丨丨関又極東為丨丨丨地斗入糧運難致異時獨倚饒風以控商虢由武休以逹長安故當関為蜀之咽㗋向來薩里罕侵饒風以廹仙人吴玠劉子羽以死守故不失四蜀則今諸関其可不嚴其備乎紹興十二年金人遣賀景仁來分劃乃割商秦之半存土津豐陽天水三邑及隴西成紀餘地棄和尚原方山原以大散関為界於関内則興趙原為控扼之所和尚原朝野雜記紹興初金陕西選鋒都統羅索死烏珠會諸道及女真兵数萬人造浮梁跨渭親攻丨丨丨吴武安以陕西都統制出竒邀撃大破烏珠中流矢二獲其麾盖自金入中原未嘗如此敗衂也知成都張燾曰丨丨丨最為衝要自原以南則入川路散失此原是無蜀也嘉陵江源出大散関之西去州九十里循城下入兩當河池黄花川在梁泉縣大散水流入丨丨丨唐有黄花縣後併為梁泉王維有詩紫金水在河池縣北一里㳂流自武休関入漢中為山河堰即褒水也源出太白山井泉香泉在城北泉自石眼中流出清冽而甘宜釀酒堂舍嘯歌堂在郡治取魯直丨丨山水重之句館驛黄花驛唐薛逄詩孤戍迢迢蜀路長鳥鳴山舘客恩鄉更㸔絶頂煙霞外數樹巖花照夕陽李瑞送人詩黄花西上路何如青壁連天雁亦踈兩當驛兩當縣東抵京都西抵益州皆三十六程故曰兩當趙閲道丨丨丨詩云里数三千七百餘兩當冬夜宿中途名宦蕭瑀隋朝遷内史侍郎言事忤㫖出守河池至唐為相皇朝唐庚眉山人為州學椽以文名世趙鼎為兩當尉紹興為相人物張果老夏居豆積冬居鸑鷟明皇聘之不至呉郁兩當人為侍御史以言事被謫居家不仕與杜子美交游今杜集中有吴御史江上宅詩名賢皇朝文彦博公微時嘗客兩當富民郇氏之舘教授諸生邵雍嘗登郡楼詩紀一時觀覧之勝留九十日而去題詠仙鳯歴遺墟王勃晚届鳯州詩寳雞辭舊域云云蜀門自兹始陳伯玉西還至散関詩攬衣度函谷銜涕望秦川云云雲山方浩然散関三尺雪李義山至散関遇雪詩云云囬夣舊鴛機鳥去林自空邵堯夫郡楼書所見吟云云雲移山不礙晚角時斷續層崖迎明晦殘陽掛踈紅逺水生微瀬塞目煙岑宻都城若天外猿啼鬼迷店陸務觀秋夜感舊詩徃者秦蜀間慷慨事征戍云云馬噤飛石鋪鬼迷店在大散関下飛石鋪在小益道中頻行鳯集南陸務觀追懐從戍南鄭徃來興鳯詩昔戍蠶叢北云云二王陳吕四宗臣韓魏公詩云云繼擁輕軺諭蜀民稱職簡心俱入輔後來何德接芳塵乘軺相繼有三王王拱辰詩聖神深意念遐方前後皆馳諭蜀郎從此郵亭為盛事云云四六出綸鰲禁慿軾鳯城為蜀西鄙在周南岐郡楼吟詠乃邵康節之舊遊使節經行亦韓魏公之嘗歴承流千里載臨鳯集之邦守險諸関小試龍韜之績千騎載驅問道黄花之驛十行即下趣環玉筍之班方輿勝覧卷六十九
