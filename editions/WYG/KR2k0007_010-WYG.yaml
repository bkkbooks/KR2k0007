body:
  text: 方輿勝覽卷十宋祝穆撰福建路福州閩縣長樂侯官福清連江永福懐安閩清寧徳古田羅源建置㳂革禹貢揚州之域星紀牛女須之分野古閩越地周為七閩地後屬楚秦為閩中郡其後七世至閩君摇佐諸侯平秦髙帝復以摇為越王王閩中故地都冶武帝屬㑹稽郡後漢始有侯官縣又改曰東侯官又分冶地為㑹稽東南二部吴分南部置建安郡晉屬揚州陳置閩州隨改泉州煬帝為閩州尋改建安郡治東侯官唐置泉建二州又移泉州於晉江縣置而此復為閩州更閩州為福州自此福建泉三州始不相紊唐末王潮之弟審知入福州升為威武軍後封國王周改威武為彰武軍皇朝屬兩浙西南路復為威武軍雍熈分為福建路陞為帥府今統郡八領縣十二治閩侯官兩縣西外宗正福建提刑置司事要郡名合沙郭璞遷城䜟南臺沙合河口路通先出狀元後出相公三山在城裏故名長樂閩中記地名丨丨居者安之福唐見㳂革注閩中見道山亭記東冶漢立冶縣以越王冶鑄得名東甌舊經閩越地即古丨丨今建亦其地七閩職方氏注閩子孫分為七種故曰丨丨風俗民俗紓緩長樂志由建劍溪湍而下泉蒲潮漲而上適至是而平民生其間故其性紓緩其志强力可以久安無憂真樂土也産薄用嗇長樂志丨懼丨以勤羡丨喜丨以實華君子内魯外文同上其云云而小民謹事畏法女作登於男同上市廛阡陌之間云云四民皆溢同上云云雖樂嵗無狼戾能執伎以遊四方者亦各植其身海濱㡬及洙泗圖經晉永嘉衣冠趨閩自是畏亂無復仕神龍中州人薛令之始登上第其後李錡常衮皆以崇重學校為意於時云云如歐陽詹林藴咸登於朝焉百里三狀元乾道丙戌狀元蕭國梁居永福之重峯第二科己丑狀元鄭僑居永福界上之龜嶺第三科壬辰狀元黄定居永福之龍淑遇兵不饉郭璞遷城有銘曰泰康之載遷挿歐基四色牢城層巒三徑洪許南流瑞龍地應其主螺女現對花峯千載不雜世代興隆諸邦萬古繁盛仁風其城形狀如鸞似鳳勢氣盤拏云云遇荒不掠逢灾不染其甲子滿廢而復興上元燈毬郡志燃燈弛門禁自唐先天始本州準假令三日舊例官府及在城乾元萬嵗大中慶成神光仁王諸大刹皆掛燈毬蓮花燈百花燈琉璃屏及列置盆燎惟左右二院各三或五並徑丈餘簇百花其上燃蠟燭十餘炬對結綵樓争靡鬭熖又為紙偶人作縁竿履索飛龍戯獅之象士民觀賞者通夕不絶形勝東帶滄溟舊記百川叢㑹控清引濁隨潮去來北抵永嘉同上云云南出莆田西連延平南望交廣郡志云云北睨淮浙渺在天外乘風轉拖不過三數日嵗小儉穀價薄涌南北艦囷載倐至順流東下同上自劍津云云縈紆數百里危陘狹徑行者蠒足輕舟朝發一夕可至吻海派江沈亞之閩城祀云云附山以居越地肥衍韓愈作歐陽詹哀詞有云閩丨丨丨丨有山泉禽魚之樂其地坦夷舊記上四州多溪山之險謂建劍汀邵下四州云云謂福泉漳莆也東南一都會何述祭文無諸國為云云土産荔支按丨丨譜有曰江家綠曰十八娘紅曰狀元紅曰將軍紅此皆絶品也程公闢詩水浮蓬島通賓館日出扶桑照㦸門一等翠林無别木四邊惟有丨丨園素馨蔡君謨詩素馨出南海萬里來商舶末麗蔡君謨詩團團丨丨叢繁香暑中坼漁鹽郡志其地瀕海故擅丨丨之利壽山石出懷安縣稷下里潔浄頗如玉柔而易攻蓋珉類山川烏石山在州西南一里形如龜亦曰閩山其東則九仙山其北則粤王山此三山皆在城裏歐陽光祖皇華館記仙人釋子之宫縹緲於三山煙翠間九仙山在閩縣又名于山相傳何氏兄弟九人登仙於此其上有四徹亭蔡君謨詩偶爾尋幽上翠微遊人啼鳥侣前期花間行印露沾紙山下放衙雲滿旗艷艷舞衣朝日處飄飄商櫓落潮時傳盃且與乗春醉身世悠悠兩自遺越王山在城内九域志丨丨無諸九月九日嘗宴於此大石為樽尚存鼓山在閩縣有石狀如丨故名或云每雷雨作中若鼓聲有銘曰鼓屴崱頂峯特窮島夷鴵封城上有亭朱元晦書天風海濤四大字趙子直嘗賦詩云㡬年奔走厭塵埃此日豋臨亦快哉江月不隨流水去天風直送海濤來故人契闊情何厚禪客飄零事已灰堪嘆人生祇如此虚欄獨倚更徘徊鐘山在城西内有山時聞鐘聲故名方山在州南王逵詩衆狀皆窮險兹山獨擅方坦夷中砥礪端正外青蒼長樂山在州南六里越王時有神仙騎白馬來又名白馬山鳳池山在閩縣有丨丨寺按十國紀年云閩王葬夫人任氏於此山其後忠懿亦葬焉釣龍臺山在州南九里臨江舊記昔越王餘善於此釣得白龍怡山在侯官縣南梁王霸善黄老術嘗登此山福山在長樂縣郡國志上有神人祼身散髮人見必有福又云董奉嘗隱此山故其名遂著霍童山在寧徳北七十里洞天記所謂霍林洞天是也唐武后時司馬煉師於此修煉後駕鶴昇天遂賜名鶴林又吴郡人鄧元鹽官人禇伯玉沛國王𤣥甫於此授餐青精飯白霞丹景之法太姥山在長溪縣王烈蟠桃記堯時有老母得九轉丹法登仙此山有三十六峯石竹山在福清縣南一里有林真君𤣥光煉丹於此南交山在海洋中鼇頭峯在閩縣嘉福院乃陳誠之肄業之所王逵詩眼看滄海近身與白雲髙逥影連三島盤根壓六鼇梨嶺歐陽詹詩南北風煙即異方連峯危棧倚蒼蒼哀猿煙水偏髙處誰不沾衣望故鄉宿猿洞在烏石山怪石森聳藤蘿翁鬱昔隱者蓄一猿俗因以名林迥詩荔支影裏安吟榻紅藕香中繫釣舟榴花洞在閩縣之東山唐永太中樵者藍超遇白鹿逐之渡水入石門始極窄忽豁然有雞犬人家主翁謂曰吾避秦人也留卿可乎超云欲與親舊訣乃來與丨丨一枝而出恍如夢中再往竟不知所在靈巖洞在鼓山蔡君謨詩孤青浮海山長白掛天瀑西洋在巨海中莫知畔岸金﨑江在閩縣東南七十里昔漁者於此釣得金鏁螺江在侯官縣西北二十五里搜神記閩人謝端得一大螺如斗畜之家每歸盤飱必具宻伺之乃一姝麗甚問之曰我天漢中白水素女天帝遣妾具君膳令去留殻與君其米常滿浴鳳池在鼓山大頂峯北唐末樵者見五色雀羣浴於此龍首澗在閩縣東山乃許將肄業之所蘇溪在福清䜟語云丨丨不用船此時出狀元鯤潭在永福縣䜟云丨丨生芝草溪沙架髙數此時出公侯東湖在閩縣西二里西湖在閩縣北三里陳長卿詩鑿開百頃碧瀜瀜潁上錢塘約畧同楊栁兩堤連緑䕃芰荷十里馥香風波涵翠巘層層出潮接新河處處通輿誦載塗農事起從今歳歳作年豐井泉湧泉在鼓山有一竇自平地丨出湯泉在湯院僧可遵詩云必待衆生塵垢盡我方清冷混常流學校州學朱文公丨丨經史閣記福州之學在東南為最盛弟子員常數百人比年以來教養無法師生相視漠然如路人以故風俗日衰士氣不作長老憂之而不能有以救也紹熈四年今教授臨卭常君濬孫始至既日進諸生而告之以古昔聖賢斆學之意又為之飭厨饌葺齋館以寧其居然後謹其出入之防嚴其課試之法朝夕其間訓誘不倦於是學者兢勸始知常君之為吾師而常君之視諸生亦閔閔焉惟恐其不能自勉以進於學也故常慮其無書可讀而業將病於不廣則又為之益置書史合舊為若干卷故度御書閣之後更為書屋以藏之而以書來請記其事且致其諸生之意曰願有以教之也子惟古之學者無他明徳新民求各止於至善而已夫其所明之徳所止之善豈有待於外求哉識其在我而敬以存之其亦可矣其所以必曰讀書云者則以天地隂陽事物之理修身事親齊家及國以至於平治天下之道與凡聖賢之言行古今之得失禮樂之名數下而至於食貨之源流兵刑之法制是亦莫非吾之度内有不可得而精粗者若非考諸載籍之文沈潜參伍以求其故則亦無以明夫明徳體用之全而止其至善精微之極也然自聖學不傳世之為士者不知學之為本而唯書之讀則其所以求於書不越乎記誦訓詁文詞之間以釣聲名干利祿而已是以天下之書愈多而理愈昧學者之事愈勤而心愈放詞章愈麗議論愈髙而其徳業事功之實愈無以逮乎古人然非書之罪也讀者不知學者之有本而無以為之地也今觀常君之為教既開之以古人斆學之意而後為之儲書以博其問辨之趣建閣以致其奉守之嚴則亦庶乎本末之有序矣予雖有言又何以加於此哉然無已而有一焉則亦曰姑俟二三子者知夫為學之本有無待於外求者而因以致其操存持守之力使吾方寸之間清明純一真有以為讀書之地而後宏其規宻其度循其先後本末之序以大玩乎閣中之藏則夫天下之理其必有以盡其纖悉而一以貫之異時所以措諸事業者亦將有本而無窮矣因序其事而并書以遺之二三子其勉之哉堂亭止戈堂在州治汪彦章題程學士丨丨丨詩此老胷中百萬兵暫勞試手犬羊羣山頭不復望廷尉柱後何妨用恵文解帶為城聊戯劇賣刀買犢便耕耘三山勝處開華屋千載人傳舊史君睂壽堂在州宅張丞相浚為其母秦國夫人建道山亭曽子固丨丨丨記閩故𨽻周者也至秦開其地列於中國始并為閩中郡自粤之太末與吴之豫章為其通路其路閩者陸出則阨於兩山之間山相屬無間斷累數驛乃得一平地小為縣大為州然其四顧亦山也其塗或逆坂如縁絙或垂崖如一髮或側徑鈎出於不測之溪上皆石芒峭發擇地然後可投步負載者雖其土人猶側足然後能進非其土人罕不躓也其谿行則水皆自髙㵼下石錯出其間如林森立如士騎滿野千里上下不見首尾水行其隙間或衡縮蟉糅或逆走旁射其狀若蚓結若虫鏤其旋若輪其激若矢舟泝㳂者投便利失毫分輒破溺雖其土長川居之人非生而習水事者不敢以舟楫自任也其水陸之險也如此漢嘗處其衆江淮之間而虚其地蓋以其陿多阻豈虚也哉福州治侯官於閩為土中所謂閩中也其地於閩為最平以廣四出之山皆逺而長江在其南大海在其東其城之内外皆涂旁有溝溝通潮汐舟載者晝夜屬於門庭麓多桀木而匠多良能人以屋室鉅麗相矜雖下貧必豐其居而佛老子之徒其宫又特盛城之中三山西曰閩山東曰九仙山北曰粤王山三山者鼎趾立其附山蓋佛老子之宫以數十百其瓌詭殊絶之狀蓋已盡人力光祿卿直昭文館程公為是州得閩山嶔崟之際為亭於其處其山川之勝城邑之大宫室之榮不下簟席而盡於四矚程公以謂在江海之上為登覽之觀可比於道家所謂蓬萊方丈瀛洲之山故名之曰道山之亭閩以險且逺故仕者常憚往程公能因其地之善以寓其耳目之樂非獨忘其逺且險又將抗其思於埃􅅽之外其志壯哉程公於是州以治行聞既新其城又新其學而其餘功又及於此蓋其嵗滿就更廣州拜諌議大夫又拜給事中集賢院修撰今為越州字公闢名師孟云春野亭在州宅蔡君謨詩云江潮漲晚綠山麓延朝紅環峯亭在越山吉祥寺亭占山巔乾道間賜宸翰碧巖亭王汝舟詩云人去已升蓬島路客來空愛玉溪泉仙翁世界藏仙洞佛子樓臺出半天樓閣萬象樓在州治衣錦閣在州治以大理余復常典鄉郡故名佛寺雪峯寺在侯官縣西百餘里唐咸通中真覺禪師義存遊吴楚至武陵傳法於五祖徳山乃歸閩居芙蓉山石室其徒蝟集於是得象骨峯誅茅為菴一日登嶺遇雪留宿其上因名雪峯閩中實錄閩王問雪峰禪師住象骨峯有何異荅曰山頂暑月常有積雪審知曰可稱丨丨寺中無字碑或人題詩云一片如屏紫翠間風吹日炙蘚花斑莫言个無文字正要當人着眼看囊山寺在城西有石屏蔡君謨書陳伯孫詩六合萬籟息秋林月正輝琴中彈不盡石上坐忘歸大乗寺在州西寺有榴花洞神移泉黄蘖寺在福清縣西南有瀑布數十丈丁公言題詩云莫言塵世人來少幾許遊方僧到難名宦常衮韓愈作歐陽生哀詞云閩越雖有長才秀民通文書吏事與上國齒者未嘗肯出仕丨丨為福建諸州觀察使往治其地衮以文詞進縣鄉小民有能誦書作文詞者衮故宰相有名於時臨涖其民親與之為客主之禮未幾皆化皇朝蔡襄東都事畧襄以右正言直史館知福州以便親遂為福建路觀察轉運使仁宗聞其母老特賜冠帔以寵之遷龍圖閣直知開封府進宻直知泉州徙福州復移泉州又秦減閩人五代時丁口税之半曽鞏以龍圖知召赴闕元絳以天章待制知在任遷給事中張浚先謫後知繼奉祠陳俊卿以觀文知後再知史浩以節度使判梁克家以資政殿學士知胡銓出為僉判人物皇朝陳襄侯官人為御史知雜乞罷青苗貶斥王安石吕恵卿以謝天下熙寧中在經筵薦司馬光等三十三人皆為名臣許將魁嘉祐進士仕至門下侍郎時章子厚羅織元祐臣僚言者欲發司馬光墓將曰發人之墓非盛徳事哲宗曰朕意與卿同鄭俠福清人曽師事王安石調光州司法秩滿至京師見安石具言青苗免役用兵之害安石不荅久之監安上門㑹大旱又上疏云今天下憂苦質妻鬻女父子不保遷徙逃竄困頓藍縷拆屋伐桑争貨於市輸官糴米皇皇不給之狀繪為一圖此臣安上門所見陛下觀臣之圖行臣之言自今以往十日不雨即乞斬臣以正欺罔之罪神宗出圖以示宰執且責之安石遂出知江寧命下之日京師大風雨後詔赴獄編管英州陳烈髙卧七閩屢詔不起初與蔡君謨同研席君謨鎮福唐先生往見焉聞其嚴察不入謁留題津亭曰溪山龍虎蟠六月夜衾寒殷懃祝舟子移棹過前灘公見之為少霽威嚴鄭穆字閎中篤學修飭周希孟字公闢通五經尤長於易劉彞字執中少師事胡安定先生陳祥道博學嘗著禮書陸祐刻意禮書余深為太宰以衞國公知本州朱倬右相陳誠之狀元蕭國梁狀元黄定狀元蔡伯倫應童子科真宗賜詩七閩山水多竒俊四嵗兒童出盛時家世應傳清白行嬰孩自謂老成姿纔方學步來朝謁未及能言便賦詩更勵孜孜圖進益青雲千里有前期題詠雲海訪甌閩唐孟浩然詩云云風濤泊島濱海隅山谷間王介甫送元厚之知福州詩云云人物最多處平旦息相吹連城黦如霧閩王舊宫室丹漆美無度今為大帥府千里來赴愬元侯文章翁更以吏能著峩峩中天閣鳴玉新改步衘詔出梨嶺方為逺人慕旌旗滿流水冠蓋東西駐四座共咨嗟賢侯不當去張仲稱孝友樊侯正求助名城雖云樂行矣未宜遽忽擁貔貅鎮越城劉禹錫送唐舍人暫辭鴛鷺出蓬瀛云云北畔是山南畔海杜荀鶴閩中秋思雨沾紫菊叢叢蘂風弄紅蕉葉葉聲云云不堪圖畫只堪行中華地向城中盡韓偓詩云云外國雲從島上來四序有花長見雨一冬無雪却聞雷巷南巷北讀書聲東萊吕伯恭送朱叔賜赴閩中詩路逢十客九青衿半是同牕舊弟兄最憶市橋燈火静云云家家同念佛經聲連真詩除却弦歌庠序外云云萬戸青帘賣酒家黄康民詩三山寳刹棲禪地云云蒼煙巷陌青榕老龍昌期詩云云向露園林紫蔗甜潮上百川皆倒行黄通詩云春歸萬木不知老云云百貨隨潮船入市龍昌期詩云云萬家沽酒戸垂簾潮田種稻重收穀謝泌長樂集云云山路逢人半是僧盤餐唯候兩潮魚龍昌期詩飲宴直嘗千戸酒云云魚蝦入市不論錢鮑祗詩兩信潮生海接天云云戸無酒禁人争醉地少冬霜花正然夜間七塔萬枝燈謝泌詩城裏三山千簇寺云云四六抗章九陛作牧三山輟班八座謀帥七閩矧是福唐冠於歐越三山鼎峙八都支分惟南閩之都㑹有東魯之文風既襟山而帶海亦控廣而連吳惟閩越東歐之俗本㑹稽南郡之邦三山鼎峙疑海上之仙家千刹星聯實人間之佛國騎麒麟而上閭闔方覩儀朝擁貔貅而鎮粤城忽聞謀帥十連謀帥適臨荔子之邦八郡承休盡是棠隂之愛河圖寓直峻躋七閣之班聯畫錦還鄉喜動八州之歌詠海山環境古稱富庶之邦人物瑞朝今曰詩書之國三山七塔少供但坐嘯之娱一札十行即有不俟駕之召道山記在特暫訪於蓬萊文石班髙即趣歸於禁籞彬彬文物有唐常衮之遺風井井提封實秦閩君之故壤大魁十年三度自古則然進士三萬終場於今尤盛燈火静而讀書東萊之詩特美文詞工而干祿雲谷之訓甚嚴陳古靈之薦賢此邦鉅望蔡端明之便養當日至榮天風海濤飛動朱文公之妙畫稻田僧路形容謝長樂之新詩付屏翰於魏公正禮樂詩書之謂也求學記於朱子豈辭章議論之云乎邵武軍邵武泰寧光澤建寧建置㳂革星土分野與建寧府同本漢治縣之地吳於此立昭武鎮屬建安郡晉平吳更昭武曰邵武縣至隋郡縣俱廢尋復立邵武縣屬撫州唐屬建州石晉復為昭武縣劉漢又改為邵武縣皇朝陞為邵武軍仍割建之三縣來屬又添置光澤縣𨽻焉今領縣四治邵武事要郡名昭武見㳂革注武陽樵川風俗人性獷直郡志云云尚氣治生勤儉力農重穀儒雅之俗同上昭武人喜以儒術相髙是為云云里人獲薦登第則厚贐慶賀是為樂善之俗葉惇禮泰寧縣記云弦誦之聲相聞地狹山多郡志云云田髙下百疊賈售他州郡志云家有餘夫則賫健往丨丨於丨丨形勝東抵富沙同上云云西抵盱江南抵臨汀北抵廣信前據重岡胡明中作軍治記云云後帶鹿水三峯峙其南郡志云云一水界其北甌閩西戸胡明仲軍治記四州之上游郡志云云其封畧與江東西接如在碧玉環中同上其土夷曠其氣清淑其勢蜿蜒抱負云云袁轂詩云邦人遊冶處如在月輪中山川登髙山在郡西嵳峩聳特下瞰城郭為邦人嵗時遊觀之地上有熙春臺釣魚臺守張師中建菴其上號吉老七臺山在邵武縣東百里山有七級峯巒相比故名磅礴於邵武汀劔三州之境昔福劉道人居之號劉聖者善役虎豹勑封真濟慧應大師雞籠山在邵武縣西以形得名土人祠龔劉二聖者於其上水旱必禱有飛蜂之應雞鳴山在邵武東二十五里昔盧絳叛兵入閩人未知逃避夜有雞鳴山頂人皆起而賊適至一方免害故以名之龍湖山在郡西五十里寳乗院在焉唐僖宗子圓覺道場山頂有天湖溉田三萬餘頃相傳有老蛟穴其中烏君山在光澤縣寰字記秦漢間有徐仲山於此山遇神仙其妃偶多假烏皮為羽飛走上下故名爐峯山在泰寧縣治之西圓峙如香爐乃一邑之勝㮣金鐃山在泰寧縣跨建泰寧化三邑陳軒詩巨為三縣鎮雄據衆山尊道人峯在邵武縣八十里負長溪面樵水秀峙於城南數十里外為郡山之冠其最險處曰紫雲巖下臨絶壑上有盤石嵗旱禱雨置净瓶石下有水滴瓶中水滿自止極為神異郡志云昔有道人結菴巖下號修竹菴喜乗龍往來頗有異迹勑封神濟妙應大師瑞豐巖在泰寧縣西四十里上有院初闢時得龍骨數車取其牙刻觀音像至今存中有金身羅漢五百尊莊嚴巧絶甘露巖在泰寧縣西南二十五巖外石門天成秖通單騎往來俯瞰溪流澄碧數十頃尋幽者以不到為恨飛猿嶺在邵武縣西百七十里其地産紙衾百丈嶺在建寧縣乃閩楚分界鳥道懸絶昔越王築臺之所筆笏石在泰寧縣南七十里雙峙雲外有卓筆植笏之象樵溪在邵武縣此溪凡九曲正朝郡治前杭溪在光澤縣東二里龍潭郡志灘江之水自何山下環遶泰寧縣治遂儲為潭其勢漸若斗角故老傳有何潭流斗角此地出三元之䜟館前洲在縣東水心狀如游魚出水楊栁生其上有游魚出鬛侍郎生之䜟亭臺㑹景亭在登髙山最髙絶處前視井邑萬瓦鱗次左瞰清流右臨碧巘熙春臺在登髙山頂蓋一郡最髙處祠廟廣祐廟在邵武縣西五十里王諱祐姓歐陽洛陽人也隋義寧中為溫陵太守代還舟過大乾愛其江山之勝顧夫人崔氏曰此可立廟發舟之夕江水暴漲王夫婦溺焉其尸㳂流而下至向所艤舟處輒止見者隨流送之二十里翌日泝流復返再送之加十里又如之於是衆驚異歛而葬之屢出靈響逺近争來椎牛刺豕以祭有龍湖山圓覺大師憫戕物命遺偈以告遂以齋羞易血食或云師嘗與神以道力角勝負廟傍有大松師舉手以梢拂地者三神僅能再遂屈而從之水旱之禱如響邵武謂之去天五十里云按夢録士有以前程來謁夢者皆騐李公綱字伯紀邵武人嘗造祠下夢王者降階延接遜以主位李固辭王曰他日更仗主盟及為相值王加封果與署名葉公祖洽字惇禮邵武泰寧人先名光字亨父謁廟夢王者令掌籍判官檢簿與看即無葉光止有葉祖洽名字遂用之當年果領舉赴省謁廟王者將一片犬肉置於几上命食之又殿下有竹一束王者指示云此是題目莫曉其義明年作大魁方悟一片犬肉乃狀字置於几上乃元字殿下竹一束者以前廷對出賦題殿試問策自祖洽時始竹一束乃策字也黄公中字通老方勝冠同友二三人詣正殿黄於中途適值親戚酌以大斗及到祠下酣猶未醒是夜俱無夢惟友人之臧亦宿於廟夢王者云荷你秀才來甚至誠只有一个黄尚書如何喫得恁地醉後黄作大魁以有官人降第二果仕至尚書八十五嵗終贈端明而友人者止為秀才云袁公樞字機仲建寧府人嘗到祠下夢云溫黄前後並殿下不須行覺而惡之以並病同音後省試木待問作省元乃溫州人第二名黄洽袁以賦魁第四是嵗諒隂榜不放殿試即殿下不須行也曽公從龍溫陵人也慶元戊午之秋即於私居遥禱正殿是夕夢云兩爵並躍於今秋一薦獨横於天下又夢一人屈指數云四十年事是科兄弟同發舉所謂兩爵並躍於今秋明年從龍作狀元所謂一薦獨横於天下四十年者葢泉州自梁克家作大魁之後到從龍時恰四十年也福唐人蘇大章治易其家瞻奉香火甚勤慶元戊午之秋即於私居齋宿有禱中夢一朱衣吏分明報云今年發舉名位已排定第十一語之再三及覺頗異其事詰旦告人人稍疑之試期遂為衆士人經州投狀而絶無曉示及開榜至十一名府主不許拆號懷中出士人前所投詞遂於待補中取一名易卷對號及拆卷乃是蘇大章而待補却是為狀首之人明年蘇作狀元亦豈偶然江俞建昌人也治聲律詣祠下有禱中夜夢王者坐於殿庭屏退左右之人呼而告之曰俗不如古語之至于數四及覺莫之曉次夜復假宿其夢如初於是專誌之後於壬子年解試出聖上樸以皇質賦韻脚以聖上以此還民之淳初欲押還字民字之字俱不穩忽思夢中之句遂押淳字破云俗不如古聖期再淳以此皇風之質樸夫天下之人主司批破題四字冠場遂中魁選髙宇夢得詩云碧瓦朱簷天外聳黄花六葉掌中開纔登第娶黄司業女六娘為妻碧瓦朱簷乃髙宇也建安詹必勝兄弟三人謁夢得詩云萬里無雲天一色秋風吹起鴈行髙乃倒書之及秋闈同預薦果弟先而兄後餘不勝紀悉見謁夢錄李忠定祠在軍學朱元晦記云少有大志自為小官即切切然以天下事為己憂宣和初一日大水猝至㡬冐都城人莫能究其所自來相與震懼而無敢以為言者公時適為左史以為此水主兵戈之象亟上䟽言之遂以謫去數嵗得召還則敵騎已入塞而長驅向闕矣公復慨然圖上内禪之策言未及發而大計已决敵圍既迫羣小方謀挾至尊犯不測為幸免計公又獨扣殿陛力陳大義得復城守以退敵兵然自是割地講和之議遂起公又再謫而大事去矣光堯太上皇帝受命中興首召公宰相方誅僭逆而小人有害公者遂三謫以去而不復還矣古跡瑞榴之䜟海錄碎事郡庭有石榴士人觀所實之數以為登科之信熙寧間結二實頗大是年葉祖洽上官均名在一二祖洽詩云已分桂葉争雲路不負榴花結露根名宦皇朝張士遜知邵武縣後為相石中立知軍後參政蘇為知軍能詩宋咸建陽人知軍建公廨創學舍置田以給生徒李泰伯作庄田記上官均郡人廷試第一厯御史論蔡確謫知光澤吳逵知泰寧縣愛民如赤子馭吏如束濕尹師魯知光澤縣沈該知光澤縣人物葉祖洽神宗初革聲律命以策廷試多士祖洽陳數千言貫穿古今擢為第一孫諤邵武人字正臣王介甫集雨未止孫正臣欲行以詩留之紛紛應接使人愁與子從容喜問酬它日故將泥自庇今朝欲以雨相留黄履再登右轄李綱殿撰李䕫之子右丞黄履之甥相髙宗纔七十五日而罷黄潛善為右僕射時李綱左僕射黄中字通老仕至端明朱元晦作墓誌黄渙南省第一題詠登臨髙下樓郡守蘇為詩愛重八九月云云紅雲何處起寒瀨泊漁舟東南千里遥司馬君實送張景陽知邵武詩閩嶺知何在云云路入樵溪似到家方雄飛詩舟停漁浦方為客云云溪上千峯碧玉環葉儀鳯詩云云瞰溪臺榭紫雲間烏啼花落非人世似在金鏊山上山天鍾秀氣魁文陛前人詩云云池湧仙源接武夷四六疏榮芝檢作鎮樵川樵川小郡閩水上游郡多顯族代有聞人賦甚蠒􅁝鹺為命脉眷武陽之名壘據閩嶠之上游昔時最盛於文風今日乃餘於獷俗山川之秀甲於全閩人物之興盛於今日昔號雷封本建安之支邑今稱斗壘乃閩越之上游元魁繼作皆元祐之聞人鈞軸對持有建炎之盛事斗絶一隅在衣冠而獨盛雲蒸多士亦絃誦之相聞雖里閭安集業寖復於耕桑然井邑蕭條地或餘於荆棘樵川邑小懷師魯之舊遊㑹景亭高訪蘇為之妙句妙斡神機多唐代禪棲之侣黙持文柄有隋朝廟食之賢方輿勝覽卷十
