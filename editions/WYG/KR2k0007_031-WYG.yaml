body:
  text: 方輿勝覽卷三十一宋祝穆撰沅州盧陽黔陽麻陽建置沿革鶉尾楚分春秋元命苞曰軫星散為荆州昔秦昭王使白起侵楚取蠻夷地為黔中郡漢髙帝改為武陵郡属舞陽地武帝置䍧牱郡属益州梁置沅陵郡隋以郡為陕州唐析辰溪置麻陽縣以龍標置巫州更曰沄州復為巫州為漳陽郡又更巫州為叙州本朝熙寧命章子厚收復其地置沅州今領縣三治盧陽事要郡名沅陵潭陽風俗槃瓠之後隋地理志嗜好居處頗與巴渝同俗本承丨丨丨丨服章多以斑布為飾今州西南有狤狑獠其名皆犬属乃其子孫俗好巫鬼西漢南夷傳地多雨潦云云江山風物之所蕩劉禹錫集及謫于沅湘間為云云往往指事成歌詩形勝䍧牱武陵之交圗經云云四塞重阻隋地理志溪山阻絶郡縣志云云非人跡所履山川明山郡主山也崗巒重複朝抱郡治飛雲濃嵐如列畫屏武陽山郡國志龍標武陽山有仙人每土人聚即来入衆莫能辨惟脚趾向後而踵向前以刀斫之不死唯以杉木為刀礙之方得其去辰山在麻陽縣包茅山在麻陽西南三百五十里武陽記云上有三脊茅可以縮酒寰宇記云即楚國入貢之茅九疊山山勢盤紆九峯相次每遇天晴日明煙斂峯巒争翆儼若畫圗之狀太谷洞在黔陽去州三十三里洞中深邃泉流不絶芙蓉江来自湖南盖唐之芙蓉縣溪也雄溪郡志即渠河潭江沅江及沅州等㑹衆水入于此江九溪之中昔所謂丨丨江也九溪曰郎曰㵲曰雄曰辰曰龍曰叙曰武曰柱曰酉而雄其一也鑿字溪元豐癸亥通道于廣西溪旁得古碑乃唐乆視中遣將王思齊率甲兵征蠻過此山路危險負舟而濟刻石以記嵗月而夷人以為丨丨丨今分入廣西界作零溪堡龍溪在鎮江寨界今謂之龍門溪沅水在黔陽㵲水在盧陽新經曰巫無㵲潕舞一水而五名聲之變耳名宦王昌齡新唐書王昌齡江寧人為詩縝宻而清新自江寧縣丞貶為龍標縣尉皇朝章子厚為湖北常平使者收復沅州夜築城西偏一面比曉而畢東南北三面三日而成東臯雜錄子厚扵熙寧間奉詔城沅州時陶弼知辰州贈詩云善戰無如新息侯漢兵纔渡綠蘿洲愛君挽我陶溪粟直到䍧牱水口頭今有詩在洪江寨正與䍧牱水相直王憲之政和間黄安俊叛死于賊邦人為立祠汪長源靖康間為州太守集修戰具禦退曹宼題詠人臨沅水望釋無可送沅江宋眀府璟之任祁聞􅀙事日鄂渚動芳菲一遂鈞衡薦今為長吏歸云云雁映楚山飛唯有𫝊聲政家風重𤼵揮沅有芷兮澧有蘭楚詞云云思公子兮未敢言聞説龍標過五溪唐王昌齡嘗尉是邑李白以詩送之云楊花落盡子規啼云云我寄愁心與明月随君直到夜郎西注云龍標在古夜郎東南今之辰溪縣乃隋之夜郎此云西者以隋地理志言之也州符就領五蠻溪陶弼詩云使介直登䨇御闕云云争雄白鵲臨崖鬭憶子𤣥猿遶澗啼溆浦潭陽隔楚山王昌齡送别詩十萬屯田古未耕陶弼寄新沅守謝麟詩險盡天開溪路平詩書新將典新城三千戍卒今無㡬云云属縣乞除防虎檻生蠻願獻採砂坑四六拜恩宸陛往鎮蠻溪肅擁州麾逺臨蠻徼地近䍧牱種遺槃瓠撫摩以恵彈壓以威香溢沅江之芷宜入詠歌隂濃召國之棠更覃恵愛山深溪阻雖蠻俗之雜居地僻人稀亦土風之素朴朱轓地重敢論五馬之榮畫㦸兵森聊化九溪之俗雖喜則人怒則獸性固靡常然賣爾劍買爾牛化之亦易靖州永平通道㑹同建置沿革鶉尾楚分野春秋為荆州秦置黔中郡漢更黔中為武陵郡武帝置䍧牱郡属益州唐為夷播叙二州之境後周時莭度使周行逢死叙州刺史鍾存志奔武陽而楊正巖以十洞稱徽誠二州皇朝十洞酋長楊通藴送欵内附楊通寳来貢朝廷以通寳為誠州刺史其子復為誠州刺史又詔於武岡之西作城在河渠之陽為誠州廢為渠陽軍尋廢為寨𨽻沅州復置誠州改為靖州盖自崇寧再歸職方今領縣三治永平事要郡名渠陽見沿革注風俗槃瓠餘種圗經丨丨之丨丨今尚有狤狑犵獠之號其計嵗月率以甲子其要約以木鐡為契其樂器有愁笛壺笙其兵器與中國等東通于邵南通于融北通于沅土風不惡魏華父與人書靖為天下窮處其蕞陋又在峡郡下而丨丨丨丨民俗亦醇時嵗豐則物賤如土形勝漢䍧牱武溪之間圗經與澧州同與蠻壤相犬牙汪彦章靖州營造記云初夷人散居溪谷間各為酋長及上版圗職方氏為王民與彼之山川壤比疆連犬牙相入也嵗久聲教所覃去椎髻之俗而飾冠巾轉侏􅍣之音而通字畫奉官吏約束一如中州山川飛山在州北十五里比諸山為㝡髙四面絶壁千仞九疊注見沅州福湖山在州南四十里通道縣北之諸山㝡為蒼翆元豐通道廣西出是山之間青蘿山在州南二十里属永平縣煙蘿蒼翆故名沅江出西南蕃界郎江源出湖耳山青陂湖在會同縣寶溪在州城之東北属永平縣大抵洞中諸溪皆産金武溪九溪之一井泉金井邪直深淺不等寳之所生皆有䃪石以為之墻壁而礦在其中善取者乃得真礦辨礦之術銅豆為先黄窠烏窠次之若金星見于石則為興廢之兆也有罏院有水池臨池作亭乃監官閲視之所名宦吕師周楚書云馬氏偏霸之初飛山洞酋潘全盛遣其黨楊承磊略武岡馬氏遣丨丨丨討之援蘿躡石晝夜兼行直抵飛山分軍布柵全盛大駭曰此真􅀙天䧏也承磊来戰師周破其軍縳䧏者為鄉導襲飛山擒全盛斬之盡平飛山巢穴今環飛山有濠塹而遺址尚存名賢程子山魏華父觀亭記靖為州南距廣西東障湖南北抵沅辰西極夜郎四竟之外自靈均後代有顯人播之詩歌靖以晚出未嘗有顯者来惟丨丨丨以忤檜居嵗餘土人為作觀亭今渠江之左僅存遺址魏了翁以謫居築鶴山書院云山囚瀬縶益得循念昔愆人物闕題詠闕四六簡求郡將鎮撫蠻猺自易州麾始雄地望湖右奥區渠陽名郡地近䍧牱種餘槃瓠十洞創州肇自聖明之世䨇旌出守遴求豈弟之賢九溪十洞蠻丁舊属于羈縻五馬䨇旌郡將茲為之彈壓徳安府安陸孝感應城雲夢建置沿革禹貢荆州之域楚地翼軫之分野春秋鄖子之國秦属南郡漢置江夏郡安陸預焉東漢晉因之宋置安陸郡齊寄治司州梁置南司州復為安陸縣西魏置安州隋煬為宣郡唐改安州又改安陸郡置安黄州莭度又號奉義軍梁置宣威軍後唐改安逺軍莭度皇朝為安逺軍後以神宗潜邸陞徳安府依舊軍額今領縣四治安陸事要郡名安陸風俗其土風醇厚茇堂記其士多秀傑同上云云其民多隠徳承平時宦逰者樂焉俗喜儒學李元衡記云云名勝相望李元衡記近世云云由進士擢天下苐一者三人謂王世則宋庠鄭獬也地多磽确李元衡學田記云云殖貨不饒郡務甚簡張師亮知江陵府乞知安州云云可以頤養醫藥形勝西枕溳水郡縣志北接漢東李元衡鎮楚堂記云云南望沔鄂偃然足為一都㑹也控荆衡之逺勢李白代淮南夀山荅孟少府文云云唐之督府武徳改為大都督府人境之勝前人記西挹白兆峯巒秀出其下李太白之廬想見拏舟丹砂撫青海而凌八極北夀山即太白所謂攅吸霞雨隠若靈仙者也云云如此山川石巖山在府南十里晉張昌作亂扵丨丨丨織竹為鳥形衣以五彩聚肉于其旁而集百鳥詐云鳳皇䧏而建元神鳳即此山也陪尾山在府東北即禹貢丨丨丨白兆山在安陸西三十里北史于翼為安州刺史遇旱禱雨扵丨丨丨李白有桃花崖寄李侍御詩紫金山在今府治西北峭壁斗絶石皆紫色故名有跨鰲亭大安山在安陸縣西六十里李白忤髙力士放還而黄山晦叔桃花巖詩云大安婦翁舍時来枕流眠則許負相國師家此山下夀山在安陸縣西北六十里昔山民有夀百嵗者鳳山在府東南以形得名章山在安陸縣東四十里古人以為内方山京山在應城有温泉五家山在應城東三十里王得臣麈史云伍氏所居之地九嵕山在孝感縣疊嶂深林景物幽邃范雍詩山竒號九嵕名與雍州同長安亦有此山桃花巖在白兆山即李白讀書處蔡持正詩聞説丨丨丨石畔讀書曽有謫仙人司馬巖在郡圃鳳凰崗在孝感縣晉永和鳳産其上雲夢澤在安陸南五十里杜預云南郡枝江縣有雲夢城安陸縣亦有雲夢城此澤江南江北皆有詳見岳州溳水在安陸西北繞城西隅入雲夢漳水在安陸西五十里沈存中茟談清濁相揉者為漳章文也别有雲夢之漳與溳合流色理如螮蝀数十里方混澴水出應城縣唐置環州于此井泉玉女泉在應城縣西四十里相傳玉女煉丹之地佛寺救苦寺在府西四里今名勝業院李白有春㳺丨丨丨詩又有周世宗㣲時洗脚石古檜一株云柴氏所植堂舍黄堂郡守滕甫建記曰據紫金之秀面碧玉之竒鄖溪鳳臺如拱如揖四賢堂始連氏之父舜賔有隠徳歐陽永叔表其墓二子庶庠􅀙學扵二宋相繼登第與二宋同學于法興寺張文潜作丨丨丨記五桂堂在書記㕔元豐中方城范公茂為掌書記官舍西偏有桂甚後范公之子致君致明致虚致祥致厚相繼登第致君記其事後周洪道為之記云七相堂在府治西郡守陸世良詩七相聲名俱属此尚期他日更添君跨鰲堂鄭昻記云平沙囬岸縈帯城郭商帆漁舟出沒煙波瀟湘有江鄉之興楚山水之觀未有以易此者也亭樓車葢亭在郡治西北隅魏文帝詩西北有浮雲亭亭如車葢是也漁隠叢話云蔡確守安州日登丨丨丨賦詩云紙屛石枕竹方牀手倦抛書午夢長睡覺莞然成獨笑數聲漁笛在滄浪殊有閒適之意浮雲樓杜牧之有題安州丨丨寺丨詩周顯徳中毁寺改建黄堂而楼遂備宴逰滕甫詩舉頭便是長安日弄袖時飄夢澤風茂苑久抛飛鳥外楚臺遥在碧雲中古跡蒲騷城在應城北三十里左傳有云鄖人軍于蒲騷即此釣魚臺在安陸縣石淙村云是郝處俊遺跡蔡確詩矯矯名人郝甑山忠言直節上元間釣臺蕪沒知何處歎息思公俯碧灣東都事略蔡確𫝊知漢陽軍吴處厚奏確在安州作詩借郝處俊事以譏訕太皇太后宣仁太后怒曰蔡確以吾比武后當重謫確奏曰臣在安州州有溳溪舊有郝處俊釣臺盖上元中髙宗令其子周王等分朋角勝為樂及欲傳位于武后皆為處俊議論所囬故臣詩因歎其忠直今太后以帝之祖母垂簾聼政而輙無故引唐髙宗遜位與皇后之事上凟聖聽其誣罔可見西湖村去孝感九十里太祖潜龍日因渇索酒飲村姥家姥持酒以進言𣙜禁甚嚴此私釀當宻之與金不受及至太祖既貴宥丨丨丨酒禁至今置萬户酒名宦傅介子封義陽侯皇朝張齊賢知江陵謝病乞知安州范純仁坐議濮王典禮出通判安州有題名在九􅉄山寺中范雍為太守謝良佐為應城宰朱元晦作應城縣上蔡先生祠記云先生名良佐字顯道學于河南程夫子兄弟之門初頗以該洽自多夫子笑曰可謂玩物䘮志矣先生爽然自失乃盡棄所學而學焉如以生意論心以實理論誠以常惺惺論敬以求是論窮理其命意皆精當而直指居敬窮理為入門則于夫子教人之法又最得其綱領中間嘗宰是邑胡文定公以典學使者行部過之不敢問以職事顧因紹介請以弟子禮見入門見吏卒植立庭下如土木人肅然起敬遂禀學焉人物楚鬭􅂖於菟生于䢵通典安州春秋䢵子之國黄香江夏安陸人京師為之語曰天下無䨇江夏黄童子黄瓊郝處俊為中書令請唐髙宗毋遜位武后許紹安陸人葬縣東名宰相林皇朝令狐揆卜築溳溪南雪中跨馬入城詣侯君旁借書令小童携書簏負琴皂繒暖帽委轡長吟曰借書離近郭冒雪渡寒溪後有布衣林逸善繪為令狐雪中渡寒溪圖張君房安陸人為著作郎真宗日日夲遣使入貢詔本國建寺夷使乞詞臣撰寺記時直院之文多君房代為之既宣令撰寺記夷使待命而君房醉飲市肆索之不得直院大窘後楊億作閑忙令曰世上何人最號忙紫微夫却丨丨丨鄭獬仁宗重于選士廷試既考㝎前一日取首卷焚香祝之曰願得忠孝狀元而公遂魁天下宋庠父玘為應山令嘗因僑寓安陸今城中錦標坊即其所居與弟祁俱以文學顯夏英公嘗守安陸有書表吏鄭生者鄰二宋情跡甚熟凡郡守所欲牋狀多二公為之英公怪而問焉若將學而自為此耶對曰非也乃二宋秀才之文英公他日見之得其所著大嗟賞因命賦落花莒公一聨曰漢臯佩冷臨江濕金谷樓危到地香景文公一聯曰將飛更作囬風舞已落猶成半面粧英公曰詠落花而不言落大宋君異日作宰相小宋君非所及然亦須登嚴近後皆如其言初其母錢氏夢人以文選一部與之遂生子京小名選郎云名賢李白有上裴長史之書曰見鄉人相為大夸雲夢之事云楚有七澤遂来觀焉而許相公家見招妻以孫女便憇跡于此至移三霜焉皇朝寇準自相州徙安州後又貶道州司馬吕大防紹聖初安州居住嘗寓郡齋有吕公亭題詠蒹葭出夢中韓愈自袁州除官還京行至安陸先寄周随州詩行行指漢東暫喜笑言同雨雪離江上云云面猶含瘴色眼已見華風嵗暮難相值酣歌未可終民淳詞訟少范伯純詩安陸號方鎮江邊無事州云云務簡官政優遥泛扁舟安陸郡王昌齡送人赴安陸詩云云天邉何處穆陵關春風只到穆陵西劉文房行次安陸詩暮雨不知溳口處云云孤城盡日花空落三戸無人但鳥啼朱欄流水牧之詩錢勰詩夢澤盤山長卿賦云云四六光膺鳳綍来鎮龍藩古為重鎮今號潜藩維北夢之奥區實南京之名部俗多尚朴故訟筒之亦稀民稍力農故輿賦之僅足世屬升平深有宦㳺之樂時方俶擾遂為争戰之場棣蕚相輝有四賢之擢秀竹符分寵竚七相之聮芳宋莒公毓秀之鄉文風獨盛謝上蔡宦逰之地道學有𫝊復州景陵玉沙建置沿革禹貢荆州之域楚地翼軫鶉尾之次春秋戰國並属楚秦屬南郡在漢即江夏之竟陵縣晉宋齊因之梁置沔陽郡周武改置復州取復地湖以為名隋改沔州又為沔陽郡唐改復州獨理沔陽改竟陵郡又為復州皇朝因之熙寧州廢元祐復立今領縣二治景陵事要郡名景陵孫宗鑑東臯雜錄曰自蔡州南至信陽軍始有山路險隘迤邐至安防又丙驛至復州皆平地南至大江並無丘陵之阻渡江至石首始有淺山謂之竟陵者陵至此而竟謂之石首者石自此而首也沔陽見沿革風俗人性淳和舊經地多卑濕云云風俗之美陸羽自傳曰云云無出吾國多雜蠻俗隋地理志民足魚􅈉復州從事㕔壁記地濵江漢之洳云云之饒形勝襟帶隋郢朱昻廣澤廟序云云腹背吴楚沅湘之間椘辭南郢之邑云云有古帝王之祀二曰伏羲氏曰神農氏夢澤之南舊經雲丨七丨丨丨率皆水鄉地窪而卑朱昻序云云水漾而瀦山川五華山在竟陵縣東七十里即古風氏國之城也風國即伏羲之後子城上有伏羲廟胡明仲為記又臨津門外有神農廟天門山在景陵縣西六十里唐鄒夫子别墅在焉陸羽自傳云負書于丨丨丨鄒子别墅三陽湖在玉沙縣西二里東曰朝陽南曰南陽北曰水陽故曰三陽三澨水書曰過丨丨左傳有漳澨雍澨皆丨邉地名七里沔周地圗記夏水合諸水同入漢自漢入瀦名為丨丨丨即屈原逢漁父處亭榭境㑹亭祥符間因創鼓角樓掘得一塊石乃唐竇使君丨丨丨記故名鴻軒右史張文潜謫居景陵日所創遺址在菜園湖後起倅黄州有望復州詩云他年若問丨丨人堂下薔薇應觧語盖其處植薔薇故也今黄州亦有丨丨豈如老杜之在䕫三易居而皆以髙齋命名也耶夢野竒觀景祐間郡守王琪作于子城西南隅後晏殊宋祁吴育楊徽之蘚紳石延年皆有詩寺觀西塔院今名廣教有文學井謂陸羽也裴拾遺詩竞陵文學泉蹤跡尚空虚不獨支公任曽經陸羽居草堂荒散蛤茶井冷生魚謂此也紫極觀有皮陸讀書堂日休襄陽人但龜蒙乃吴人何為皆讀書于此然龜蒙有寄日休讀書襄陽耆舊傳日休次韻有云結彼世外交遇之于邂逅則或邂逅于此耳古跡范溉市在玉沙西四十里瀕漢江晉鄭交甫南逰漢江遇二女佩兩珠交甫與言願得子之佩二女觧佩與交甫懐去十餘歩探之亡矣囬視二女亦失所在名宦韋放梁人為竟陵守狄仁傑唐人為刺史李齊物為守見陸羽扵伶人中異之授以詩崔訂韓愈送崔復州序有地數百里自長史司馬已下數十人其祿足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼大丈夫官至刺史亦榮矣雖然幽逺之小民其足跡未嘗至城邑茍有不得其所能自直于鄉里之吏者鮮矣况自能辨于縣吏乎能自辯扵縣吏者鮮矣况能自辨于刺史之庭乎由是刺史有所不聞小民有所不宣賦有常而民産無恒水旱疾疫之不期民之豐約懸扵州縣令不以言連帥不以信民就窮而斂愈急吾見刺史之難為也崔君為復州其連帥則于公愈以為崔君之仁足以蘚復人于公之賢足以庸崔君有刺史之榮而無其難為者將在于此乎愈嘗辱于公之知而舊逰于崔君慶復人之將䝉其休澤也于是乎言皇朝王彦超後周為復州刺史按國史建隆二年太祖幸作坊燕射酒酣顧王彦超曰卿曩在復州朕往依卿何不納我彦超䧏階頓首曰臣當時一刺史勺水豈可容神龍乎使臣容陛下陛下安有今日上大笑而罷之人物陸羽號竟陵子有煎茶碣舊傳雁橋乃得丨丨處初見羣雁翔集覆小兒扵下僧史種師得而育之既長以易筮之得蹇之漸曰鴻漸于陸其羽可用為儀乃氏以陸名以羽字以鴻漸因以雁目其橋唐書有僧得之水濵既長以易筮之事同皇朝張徽以能詩名有滄浪集司馬温公范忠宣公皆與之友善題詠八十年前棠樹隂李齊物為竟陵太守生李監察後復為竞陵太守故周愿三感吟云云竞陵太守公先人家家門外一渠蓮皮日休送弟歸復州詩羨爾優㳺正少年竟陵煙月似吴川車螯近岸無妨取舴艋随風不費牽處䖏路旁千頃稻云云慇懃莫笑襄陽住為愛南逰縮頸鯿所至先傳喜雨詩吕本中寄適道寺丞刻江漢樓柱詩聞道復州賢太守只如前在武陵時相逢未説為州樂云云四六疏綍掖垣分符澤國惟兹七澤之南實在重湖之右乃眷竟陵之郡實居沔水之鄉地多斥鹵本稱魚稻之鄉郡有循良化作蠶桑之俗天威大震掃空狡兔之群王澤旁流安集驚鴻之衆畫千里之封圻莫非王土宣九重之徳意共為帝臣信陽軍信陽羅山建置沿革禹貢荆豫二州之域鶉尾之分古申國之地春秋時屬楚秦屬南陽郡漢立平氏縣𨽻荆州之南陽縣魏分置義陽郡宋文帝于北義陽復立司州又置宋安郡梁改北司州尋罷北宋又改郢州周武帝改申州隋煬帝改為義州尋為義陽郡唐立申州改為義陽郡後復為申州即今之軍治皇朝以户口少䧏為義陽軍改信陽軍今領縣二治信陽事要郡名義陽古申風俗申伯遺俗元和志申在周為侯伯此其遺俗也形勝北接陳汝寰宇記云云控帶許洛齊宋以来常為邉鎮三關之險左傳定公四年蔡侯與吴子唐侯伐楚還塞太隧直轅宜阸所謂大隧即黄峴關直轅宜阸乃武陽平靖也黄峴今名九里關在郡南百里武陽在今大寨嶺郡東南九十里平靖今名行者坡在軍南七十五里自中原失守談兵者謂堅守三闗則安陸以南可無虞莫汲嘗論之曰三闗險矣闗外百里皆險也若虜人得信陽將與我分險而守營要陂以抗武陽營雞頭以抗平靖營石門以抗黄峴若棄信陽是舉三闗併棄之也信陽與三闗勢如首尾欲全三闗必固守信陽鄱陽志余童知信陽軍終更圗上山川形勢以為欲復宛洛則必自此地始當使與三關控扼緩急相應上覽之喜擢知蘄州與徳安相表裏繫年錄紹興三十一年金人圍信陽軍趙樽屯徳安曰信陽雖小云云不可失也自將所部馳赴之敵騎徑去山川金山在軍南一十里通鑑梁天監七年魏辛祥堅守義陽梁遣將胡武成陶平虜州南丨丨之上連營侵廹辛祥遂夜出襲其營義陽山寰宇記云在軍治東五十歩即郡之主山也石城山在軍東南五十五里輿地廣記云有石城山甚髙峻史記曰魏攻宜阨葢謂此山也吕氏春秋言九塞宜扼其一焉扵此山置義陽郡今廢城猶在鵲山在羅山縣南九里霸山比扵諸山最髙大每出雲則必雨雪陪尾九域志冥阨塞在軍東南五十五里屬信陽又有大小石門皆鑿山為道以通往来荆楚守隘之地也淮南子云大維㝠阨荆院方城濠阪井陘勾注居庸是謂九塞淮水西自唐州桐柏縣流入溮水南至随縣界流入江樓閣白雲楼在子城東北咸喜堂在軍治取申伯周邦咸喜之意相公園范忠宣公為郡日創後人因以相公名園古跡武城在軍東二十五里今有遺址而吴楚之争有丨丨里謂令尹子常治于此方城圗經方城塞在軍東三十里左傳呉伐楚司馬戌謂子常曰子沿漢而與之上下我悉丨丨之外以毁其舟謝城在軍東三十里申伯所封之邑也詩曰于邑于謝是也曹城在軍城南三十五里有曹店即曹景宗鑿峴口所築名宦申伯周宣封國于申傅介子封義陽侯姚崇坐與宋璟謀出太平公主扵東都坐貶申州刺史皇朝吕公著封申國范純仁知軍劉安世哲宗朝為右正言論蔡確責嶺外後為知軍人物鄧禹新野人来歙同上並仕漢鄧艾義陽棘陽人後封鄧艾為征西將軍費褘江夏鄳人也後代軍蔣琬為大將孟嘉陶潜為嘉立傳以為鄂人而晉史以為鄳人乃今信陽軍羅山縣也題詠山空水復清方雄飛過甲州詩凉風吹古木野火燒殘營寥落千餘里云云獨憐溮水在劉文房至申州云云時亂亦能清城邊一水抱城流郡志載古詩曰云云城外羣山擁郡樓春来芳草滿雞頭郭箎義陽懐古郡有雞頭山四六拜命宸庭承流申國屹是謝城臨于溮水惟義陽之名郡乃京右之要區城惟斗大劣于千里之封地有風寒幸以三闗之險邦人咸喜競騰良翰之歌天子載嘉即簉禁塗之列内控荆襄固重蕃宣之寄外連宛洛足為進取之圗市邑蕭條頗覺文書之省江山環遶不妨嘯詠之清方輿勝覽卷三十一
