body:
  text: 方輿勝覧卷三十七宋祝穆撰循州龍川長樂興寕建置㳂革古揚州之境其分野應粤地其次星紀其星牽牛春秋為百越地戰國属楚秦置南海郡龍川以縣属焉而趙佗為龍川令漢呉因之晉割龍川縣地置興寕縣𨽻東官郡故又為南海東官之地隋於歸善縣置循州煬帝改循州為龍川郡唐復為循州總管府改海豐郡復為循州國朝平嶺南地歸版圖宣和賜名博羅郡今領縣三治龍川事要郡名循陽龍川海豐風俗為最饒富林諮大㕔記循户四萬嵗出租米僅十萬名於番禺都㑹中云云今租米僅三萬耳資奉易足余安道普安寺記云地有魚鹽之饒士多江海之樂故云云藉蘇陳為光榮循陽志蘇子由陳次升遷徙兹土蘇著龍川志陳有論諫循之談者云云無大寒盛暑蘇子瞻黙化堂序略云嶺南云云秋冬之交勾萌盗𤼵春夏之際柯葉潜改形勝重山峻嶺循陽志東南抵惠東北接梅潮西連汀贑云云數百尉佗故基郡志紹興十五年韓京遷於城東即丨丨城之丨丨漢之名部余安道普安寺記龍川郡者云云越之沃野常屯甲兵林諮㕔記梁唐晉漢周之間常為總管府甲兵屯焉土産碧雞鸚鵡寰宇記羽則五距丨丨越鳥丨丨楩楠杞梓林諮大㕔記循之山林云云罔不畢具水精出長樂縣山間山川嶅山在城西北五里霍山在龍川東北八十里山有佛迹石逕石樓多海中草木曹松詩七千七百七十丈丈丈藤蘿入九天西土文殊曽印迹大中皇帝舊参禪月將河漢廵巖轉僧與龍蛇共穴眠直是畫工須閣筆更無名畫入流傳博羅山郡國志有山浮海而來丨着丨丨故名詳見惠州丞相嶺在興寕即循廣二州分水嶺也唐常衮除潮州經此領人呼為丨丨丨浰溪一名龍川裴氏廣州記龍川本博羅之東鄉有龍穿地而出即穴泉流因以為名循江在河源縣界蚌湖在興寕東北四十里有老蚌大數尺夜吐光嶅湖在州北周囘數里龍潭之水注焉龍潭在嶅山上有三潭龍藏焉祈雨必應堂閣黙化堂在郡治蘇子瞻在惠州時為循守周彦質命名大書其榜水心閣在城廣福寺前嶅塘環繞前峯疊秀為一郡登臨勝處名宦趙佗西漢南粤王傳佗為龍川令李翺知循州詳見文集李義山有謝循州刺史表人物韋思明唐詩紀事載李彚征客循州宿丨丨丨家年八十餘與彚征談論至李渉詩酷稱善羅孟郊五代時自南昌遷守興寕官至翰林學士有茒屋數間號翰林堂旁有泉曰羅公滌硯池名賢皇朝陳次升仙遊人為御史論章子厚蔡京卞又乞留陳瓘湔洗鄒浩謫循州蘇轍謫循州撰龍川志巢谷眉山人蘇子瞻謫黄州與谷同鄉因與之遊及軾與弟轍在朝谷未嘗一見軾轍謫嶺海平生親舊無相聞者谷慨然自眉山徒歩訪兩蘇谷見轍握手相泣時已七十三矣將復見軾於海南自循至新遂病死題詠地說炎蒸極盧綸得循州趙司馬書因寄回使詩瘴海寄䨇魚中宵逹我居兩行燈下涙一紙嶺南書云云人稱老病餘殷勤報賈傅莫放酒杯踈昔我游龍川蘇子由贈廖有象詩云云不見平生人傾囊買破屋風雨庇病身頎然一道士野鶴墮雞羣飛鳴閭巷中稍覺季子親時叨送米續晨炊蘇子瞻答周循州詩蔬飯藜牀破衲衣掃除習氣不吟詩前身自是盧行者後學過呼韓退之未敢叩門求夜話云云知君清俸難多輟且覔黄精與療饑藍輿觸熱道龍川李伯記詩海嶠經行陟兩年云云只愁青草黄茅瘴敢意江風佳月天四六䟽榮鰲禁作鎮龍川郡濵嶺海地接潮梅惟尉佗之故基乃隋代之名部濵江控海俗頗擅於魚塩跨漢歴隋權遂專於保鄣粤從五季之間嘗為㑹府及至先朝之盛亦號名藩摩挲壁記尚尋李商隱之舊題㸃撿圖經盍訪蘇潁濵之陳迹連州桂陽連山陽山建置㳂革禹貢荆州之域翼軫之分野春秋時楚地秦為長沙郡之南境西漢有桂陽郡而桂陽陽山以縣属焉呉分桂陽置始興郡宋改始興為廣興郡齊復為始興郡梁武帝分置陽山郡隋廢郡置連州因黄連嶺以為名煬帝改熈平郡唐復置連州改連山郡復為連州國朝因之今領縣三治桂陽事要郡名陽山九域志日出先照故名丨丨連山劉禹錫云州以山得名湟川以水得名風俗風俗醇厚朱葆石路記溪山鍾美云云視南方為佳郡炎裔之凉墟劉禹錫記環峯宻林激清儲隂海風歐温交戰不勝觸石轉柯化為凉颷城壓赭岡路髙負陽土伯噓濕抵堅而散襲山逗谷化為鮮雲故罕嘔呭之患亟有華皓之齒信荒服之善部而云云也地大民衆劉勃鼓角樓記云云過於他郡商賈阜通劉若冲連山縣記人物富庶云云嘗有小梁州之號鳥言夷面韓愈送區册序陽山天下之窮處也陸有邱陵之險虎豹之虞水有江流悍急横波之石亷利侔劔㦸舟上下失勢破碎淪溺者徃徃有之縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆丨丨丨丨始至言語不相通畫地為字然後可告以出租賦奉期約是以賔客從遊之士無所為而至陽山天下之窮處荒茅篁竹之間並見上湟川八景一䨇溪春漲二龍潭飛雨三楞伽曉月四静福寒林五中峯逺眺六秀巖滴翠七星峯晚靄八巖湖秋巘南軒有賦形勝北接九疑歐陽經雲関記云云南連衡嶽其清粹秀爽之氣鍾為勝槩賢傑繼出介楚越間費佖閱武亭記連云云號為會衝地控荆湖詹礪西園記熈平古郡云云犬牙畨禺劉禹錫㕔壁記由壤制與畨禺相犬牙觀民風與長沙同祖習無土山濁水武陽震學記地接湖湘云云秀徹之氣凛然浮空山水為嶺南冠歐陽實蔣氏三徑記云云竒峯恠石游烈興造記荆粤之偏是惟連州土壤寒殖溪山岑峻云云森若圖繪土産石鍾乳劉禹錫記山秀而宣靈液渗漉故丨丨丨為天下甲嵗貢三百銖紵蕉劉禹錫記原鮮而膴卉物柔澤故丨丨為王服貴嵗貢十笥林富桂檜同上云云土宜陶旊故居室以壯聞石侔琅玕水孕金碧故境物以麗聞山川桂山在桂陽縣方山在桂陽對九疑山靜福山在桂陽縣北五十里梁廖冲詩為本郡主簿後於此山飛昇陽巖山在陽山縣西二十里黄連嶺在桂陽縣西南百五十里巾子嶺州之案山天際嶺陶弼詩南來未見此髙峯下底際滄溟上際空辛苦限蠻成事坐看嵩華作三公同冠峽韓文次丨丨丨詩今日是何朝天晴物色饒落英千尺墮遊絲百尺飄泄乳交巖脉懸流掲浪標無心思嶺北猿鳥莫相撩貞女峽在桂陽縣南十五里郡國志有石臨水狀若婦人云秦時女子採螺於風雨中忽化為石韓愈詩云江盤峽束看湍豪雷風戰闘魚龍逃懸流轟轟射水府一㵼百里翻雲濤漂舡擺石萬瓦裂咫尺性命輕鴻毛陽山關史記云尉佗移檄丨丨丨曰盗兵且至急絶道聚兵自守今縣北當騎田嶺路秦於此立關湟谿關在陽山縣劉勃鼓角樓記連雖介於楚越之間僻在一隅秦於此置丨丨丨漢武誅建德兵出桂陽下湟水實此地也湟水在桂陽縣即漢伏波將軍路博討南越之所桂水源出桂山之陽東入于湘五溪在桂陽西合為一江龍宫灘韓愈有詩海陽湖在桂陽東北二里唐大厯間元結到此創湖通小舟遊泛劉禹錫賦丨丨丨十詠井泉潮泉在桂陽縣南有山泉每二月已後至初秋每日丑時水湧流至申時住八月已後至初春從申時湧流至丑時住亭榭海陽亭吕温荅崔連州丨丨丨詩云吏中習隠好躋攀不擾疲人便自閑聞説殷勤海陽事令人轉憶舜祠山宴喜亭在州城韓愈記太原王𢎞中在連州與學佛之人景常元慧者游異日從二人者行於其居之後荒邱之間上髙而望得異處焉斬茅而嘉樹列𤼵石而清泉激輦糞壤焚椔翳却立而視之出者突然成邱䧟者呀然成谷窪者為池而缺者為洞若有鬼神異物隂來相之自是𢎞中與二人者晨徃而夕忘歸焉乃立屋以禦風雨寒暑既成愈請名之其邱曰竢德之邱蔽於古而顯於今有俟時之道也其石谷曰謙受之谷瀑曰振鷺之瀑谷言德瀑言容也其土谷曰黄金之谷瀑曰秩秩之瀑谷言容瀑言德也洞曰寒居之洞志其入時也池曰君子之池虛以鍾其美盈以出其惡也泉之源曰天澤之泉出髙而施下也合而言之以屋曰丨丨之丨取詩所謂魯侯宴喜者頌也於是州民之聞者相與觀焉曰吾州之山水名天下然而無與燕喜者比經營於其側者相接也而莫直其地凡天作而地藏之以遺其人乎𢎞中自吏部貶秩而來次其道途所經自藍田山入商洛渉浙湍臨漢水升峴首而望方城出荆門下岷江過洞庭上湘水行衡山之下繇郴踰嶺猿􅎜所家魚龍所宫極幽遐瓌詭之觀宜其於山水飫聞而厭見也今其意乃不足傳曰智者樂水仁者樂山𢎞中之德與其所好可謂叶矣智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣遂刻石以記李貺後記余自㓜伏覧外祖父昌黎文公丨丨丨記則知連州山水之殊亭之稱因記為天下所嘉連為郡既逺且秀亦因亭而髙時談山水可娯者較數連矣中州人既以連遐逺不可得與遊皆依記以圖為館宇飾味山水者莫不目登心到焉如此則亭豈可荒記豈可仆乎三年冬余侍行氶紐于連水陸南馳幽無所攄志無所用乃縱業于山水以資養志况又外祖所記亭在是耶昔聞今見必矣踵于郛則訪焉耆老曰無矣吁昔奚寵遇而讃詠之如彼今遭何人廢棄之如此豈亭之屯耶竊嘆數月得刺史武公至嘆之尤甚且曰不修則過及余矣遽揮徒而窮尋之冒翳履淖抵巇擘蔓得餘趾焉級塼缺擲棟欀垣瓦寸折片碎蓊汚其甚石記斷僵莓昧其字公整而修之徵記本於余家易石而琢之不旬就矣於舊不移不損煥而為新命余記其迹余辭小子豈敢措筆以並前記公曰不與記實此則又毁後人知子至而不顧子過矣余何别不修者乎余曰諾十詠亭劉禹錫序元次山作海陽湖後人作亭榭標之曰丨丨曰吏隠丨切雲亭雲英潭𤣥覧亭裴溪飛練瀑䨇溪月窟象池棼絲瀑即十咏也名宦劉禹錫唐永正元年自屯田郎出為連州刺史又以尚書郎得譴刺連山禹錫云重領連山郡印綬居五年不得調滯念歘起因作問大鈞賦韓愈作栁宗元墓誌云中山劉夢得亦在譴中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無子母俱徃理請於朝將拜疏願以桞易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕恱酒食游戯相征逐詡詡強笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髪比反眼若不相識落䧟穽不一引手救反擠之又下石焉者皆是也此宜禽獸所不忍為而其人自視以為得計聞子厚之風亦少媿矣韓愈自監察御史出為陽山令有惠及下百姓多以公之姓命其子王晙唐肇武德迄光化己未凢二百八十二年作太守者九十一人惟王晙位至將相皇朝李若谷自開寳三年至熈寜戊申凡九十九年假守者四十五人惟李若谷嘗参大政名賢張浚丨丨紹興十六年以排講和連州居住題詠窮冬或摇扇韓愈詩逺地觸塗異吏民似猿猴山獰知忿狠辭舌上嘲啁白日屋簷下雙鳥闘鵂鶹有蛇類兩頭有蟲羣飛游云云盛夏或重裘􅄓起最可畏訇哱􅉫林邱毒霧怕熏晝韓詩投荒誠職分領邑幸寛赦湖波翻日車嶺石坼天罅云云炎風每燒夏何處好畬田劉夢得詩云云團團縵山腹鑚龜得兩卦上山燒卧木下種暖灰中乘陽坼牙蘖蒼蒼一雨後苕頴如雲𤼵忽有飛詔從天來韓和張十一詩陽山鳥路出臨武驛馬拒地驅頻隤踐蛇茹蠱不擇死云云唯有青山畫不如劉禹錫詩剡中若問連州事云云邊鴻不到水南流唐劉禹錫詩云謫在三湘最逺州云云連州萬里無親戚盧肇詩云云舊識唯應有荔支外邑出宰山水縣韓詩云云讀書松竹林蕭條捐末事邂逅得初心哀狖醒俗耳清泉潔塵襟詩成有共賦酒熟無孤斟青竹時黙釣白雲日幽尋南方本多毒北客恒懼侵譴謫甘自守滯留愧難任投章類縞帶佇益逾兼金四六有華銀嶺逺畀銅符䟽恩北闕宅牧南郊地接中州若無瘴癘舶通蠻徼素號劇繁陽山篁竹之地不圖見於是人曲江櫻笋之天儻共談於今夕皂盖朱轓聊訪湟川八景清香畫㦸細和湖亭十詩昌黎宰縣而賦詩頗嗟毒霧夢得為州而作記乃謂凉墟失計兹來悔長安日邊之逺相逄一笑說陽山天下之窮南雄州保昌始興建置㳂革禹貢揚州之域越地牽牛婺女之分野春秋為百越地戰國属楚秦属南海郡漢平南粤而曲江以縣𨽻桂陽郡統於荆州三國属呉孫皓分桂陽為始興郡治曲江而始興以縣属焉宋属廣興郡齊復属始興梁陳因之隋廢始興郡属廣州唐初属韶州後分其地置須昌縣五代劉氏割據割韶之湞昌始興二縣置雄州國朝潘美征嶺南克英雄二州自此復歸版圖以河北有雄州故加南字宣和賜名保昌郡今領縣二治保昌事要郡名淩江詳見名宦凌皓注保昌風俗俗雜夷夏倅㕔題名記地當衝要云云無珍異之産洪勲修學記地雖褊小云云以來四方之民有膏沃之田同上而土性温厚云云以為家給之具擅八行之殊選洪勲修學記大觀元年天子親製孝弟睦婣任恤忠和八行之選每路以三人為率廣十五郡無應選者惟南雄得譚煥歐陽班許孜三人以其行間奏以八行一路殊選而南雄擅之操翰墨取青紫者相属同上本朝以來丨丨丨以丨丨丨丨比比丨丨形勝兩路喉襟倅㕔題名記南雄古郡丨丨之丨丨由東度嶺而南由南度嶺而東足跡所接舟車所㑹其地甚重焉襟㑹百粤同上控帶羣蠻修城記州獨以雄名盖以其云云襟㑹百粤傑然峙於一隅山川巾山在州北州之主山青嶂山在城東南五十里有神仙隱几一鍋似玉磨琢瀑布潺湲相傳龍王居此祈禱有應桂山在始興桂木叢發人多以為藥故名丹鳯山在始興西北天監中有鳯翔此山天柱峯在始興西二十里峭秀竒㧞無支峯贅阜屹然撑天梁天監中九鳯翔集亦名九鳯山傳大士講經于下玲瓏巖在始興縣南石峯平地㧞立有石室虗曠葛仙嘗煉丹于此揚歴巖距城西北二十里山巔方廣百餘丈飛泉㵼空有龍祠祈禱輙應仙女巖在州東北闞天封寺杉檜欎翳水石潺湲中有二仙像謂秦時二女子於此得道飛仙梅嶺在始興即大庾嶺一名塞嶺在五嶺東詳見南安軍羅漢洞在州東天漢中有丨丨數尊現相正陽峽張九齡詩行舟傍越吟窈窕越溪深水暗先秋冷山晴當晝隂重林間五色對石聳千尋此物生遐逺誰知造化心放鉢石在雲封寺章希言詩石上曽經轉鉢盂石邊南北路﨑嶇行人不見空嗟嘆還識西來意也無朔水在始興縣東三十五里水出贑州遇月朔即漲晦即减修仁水在城南二十里齊范雲為守至此嘗酌水賦詩井泉龍井在州北道傍寺中深百餘尺舊傳通海眼時有龍躍蘇子瞻張順之皆有詩霹靂泉昔太鍳禪師得法南歸經庾嶺有卓錫遺跡後人從而屋之遂為一方名藍詳見南安軍堂院景郇堂在州宅道院李俠修黄匪躬記樓亭城樓齊祖之詩漢初開郡出南夷萬壑千巖足嶮巘天上斗牛應共域人間江嶺自分岐通越亭在庾嶺余安道詩嶺嶠古來稱絶徼梯航從此識通津古跡鼻天子墓在始興縣不知何代相傳云昔有人掘之銅人数十擁笏列侍俄聞擊鼓大呼震動山谷遂返張九齡書堂在始興縣南山幽水秀花木長春几案庭戸皆石琢就名宦楊僕漢人為楼舡将軍出豫章下横浦即此皇朝章得象為守後入相封郇公凌皓知保昌興水利開導江水農人感德號曰凌江蕭渤為守預築城以禦儂賊人物張九齡祖居始興縣今墳墓宅基皆在焉本傳謂韶州曲江人盖雄州未建之前均𨽻曲江既又析曲江為雄州則九齡乃雄州始興縣人也今子孫盡在南雄皇朝鄧戒始興縣人與弟闢聫名登第顧希甫保昌人與子衮相繼登科李邵保昌人與子琰俱登第名賢呉元美任福建帥幹坐作賦譏時宰又其家有潜光亭商隱堂鄭曄併作啟上秦公檜云亭號潜光盖有心於黨李堂名商隱本無意於仕秦後遷南雄以死題詠庾嶺南邊第一州章希言詩凌江清淺繞城流云云惟有梅花傳逺信只慿萱草綏離憂一麾逺在百蠻中前人黄梅雨歇荔支紅前人青草瘴深盧橘熟云云兩州南北䕶梅關章頴詩云云盡日人行石壁間四六榮分漢竹來訪嶺梅斗牛共域江嶺分岐惟凌水之名邦號廣南之道院章郇公舊治之邦尚存善政度嶺而南尚接中州之美俗張相國始生之地可想髙風浮江而下實為東廣之上游南恩州陽江陽春建置㳂革禹貢揚州之域斗牛之分野春秋時為百粤地秦属南海郡漢置合浦郡今州即合浦之髙凉縣地也呉属髙興縣置海安縣宋属東官郡齊置齊安郡海安以縣属焉梁置陽春郡隋廢郡入髙州置髙凉郡以海安陽春二縣𨽻焉唐立春州太宗又立恩州改恩州為恩平郡後為恩州皇朝廢春州以其地𨽻恩州尋復置春州仁宗時以河北路具州為恩州仍於舊恩州上加南字今領縣二治陽江事要郡名恩平鼉山唐郡風俗與夷䝤雜居春州記瘴癘以春州為首同上四方言云云故凢補吏得罷必加優賞焉五馬名目倦游錄載陳亞滑稽之語云使君之五馬䨇旌名目而已螃蠏之一文兩箇真實不虗其地下濕宜稻同上耕種多在洞中寰宇記土地多風多旱云云郡兼山海之利恩平志云云富於魚鹽形勝南濵巨海郡守丁璉學記恩平古郡漢属合浦云云耳目逺於中州阻山瀕海圖經恩平與廣右接境云云孤絶海隅李觀翠巖亭序襟帶巖洞春州記東南凑大海纔百里環山繞林云云昔春勤三州之地鼉山志序云今之陽江盖併唐之三縣而陽春乃云云當五州之要路投荒錄當海南五郡泛海之路頗有廣陵會稽賈人循海而至故呉越所産不乏於斯山川東山在州之東舊築熈春䑓於其上羅琴山在州西二十里昔羅含嘗携琴遊此射木山在陽春縣春州記丨丨之丨以為望龍鼉山在陽春縣為南服之冠鳯凰山一名北甘山倦游錄此山壁立千仭有瀑水飛下猿猱不能至鳯皇巢其上遇大風雨或飄墮其雛鐡坑山在陽春縣東胡邦衡詩初疑金谷嶺元是丨丨丨人云兹地惡我愛碧孱顔峒石山在陽春縣巖谷幽邃胡邦衡詩兹處山皆石他山盡不如固非從地出疑是補天餘下漏一拳小髙凌千仭虚竒章應未見名不到中書望海岡在州南二里金雞石在州西北郡國志石上時有丨丨漠陽江在陽江西流入大海恩平江在城界平城山發源亭臺揖秀亭胡邦衡詩云青山如髙人可揖不可致熈春臺在州東北髙跨嶺首下視南溟望海臺胡邦衡南遷賦詩君恩寛逐客萬里聽歸來未上凌煙閣聊登丨丨丨山為翠濤湧潮拓碧天開目斷飛雲處終身愧老萊古跡劉王女冢素馨花舊名邦悉茗昔劉王女名素馨冢上生此花傅伯成詩見泉州名宦皇朝李綸邴之子寓居泉南所至有清操提舉廣東常平日適伯氏繼出守恩平酌别江濵相勵以清白綸慷慨臨江矢天曰儻負君民有如此水遂投盃于江盃停不沒名賢胡銓謫居自號澹菴題詠荒城斗様大郡守王子明賦西樓詩云西江横玉虹西山羅畫屏云云此樓何崢嶸炎嶺狀隴蜀三洲通蓬瀛人煙幾村落数㸃如晨星誰謂海一涯好峯無数青簿書休吏早黄状元度隆䕃堂詩云云花鳥向人閒縣古松杉老胡邦衡詩云云人居水竹間字民無獄訟携客有江山四六縯綸鼇禁剖竹鼉山畫地千里負海一隅包春勤二州之地得嶺嶠五馬之名海舶所經當五州之要路郡城雖小介二廣之提封山石補天餘乃胡澹菴之見賞簿書休吏早有黄文昌之留題新州新興建置㳂革古南越之地星土分野與廣州同秦属南海郡漢置臨允郡属合浦郡呉属蒼梧郡東晋穆帝始分蒼梧立新寕郡又分臨允地置新寕縣以属焉梁武改置新州立新興縣隋廢州以新興縣属信安郡唐又置新州改新昌郡復為新州後國朝因之陞威塞軍節度今領縣一治新興事要郡名新昌見㳂革注臨允元和志云今州即漢合浦郡之丨丨也風俗瘴氣最惡郡縣志云云嶺外代答今俗以新州為大法塲英州為小法塲俗以雞卜郡志丨丨丨骨丨吉凶漢書越巫以雞卜即此民薄産而多貪崔頥題名記地僻境隘云云䘮祭則鳴銅鼓寰宇記豪渠之家云云召衆則鳴春堂此路荆棘元祐間范忠宣為右僕射有呉處厚者以蔡確題安州車盖亭詩來上以為謗訕宣仁太后怒曰蔡確以吾比武后當重謫吕汲公為左丞不敢言初議貶確新州忠宣謂汲公曰云云已七八十年吾輩開之恐自不免土産異花有花曰優曇鉢似琵琶無花而實異木寰宇記山多香木謂之宻香辟惡氣殺鬼精斷續藤山行渇則斷取汁而飲之號曰東風菜勾縁藤南人績以為布木葵可以為扇異禽越王鳥似鳶而勾可受二升南人以為酒盃雲白鳥能禁蛇乾闥婆城二有䴊鳥似山雞以家雞闘之則可擒其翬有光漢以餙侍中冠桂山有翡翠孔雀異獸桂山有黒猿鼷䑕江中有潜牛形似魚能上岸與牛闘山川龍山在州南錦山在州南金山在信安縣銀山出白金天露山在州東南二十里髙於諸山雲秀山在州東二十五里寳盖山在州西五里瑞峯山在州北七里桂山在新㑹縣西南三十四里南海在新㑹縣南百五十里有浮洲襟帶甚逺山挺方木水食珠母新江新興縣南二百里階湍寰宇記在永固縣南魚鼈不可至雖吕梁之險無以過石如階級故也三章溪允吾縣南溪有三源新昌水經永順縣南二里院宇道院在州宅郡守魏彦琳建澹庵在嶽祠東胡邦衡居焉覺軒在龍山寺方丈後左丞王覆道為銘曰本自不迷何者為丨惟無舌人滿口道着龍山名丨無病求藥從而銘之分一半錯園亭十仙園在郡西南謂新昌官属自郡守而下止十員訟簡用足宦遊若神仙焉䨇溪亭彭德逺丨丨丨詩碑乃唐光府君清德碑一沉東江之上故詩云雨過畫橋横蝃蝀月明玉塔卧清瀾景全堪作吾鄉冠還有沉碑客未看相遊亭在秀羅寺後蔡持正喜遊之僧因以名橋梁仁義橋在東門外跨江三十六間覆以瓦屋名宦張柬之武三思使鄭愔告柬之與王同皎通謀貶新州司馬皇朝梁立則熈寕中為守於郡西十里得白蟮坑决其水灌田至今為利黄濟靜江府人紹興間守新州舊無城濟以竻竹環植之羔豚不能徑號竹城至今以為利名賢郭元振遷吏部尚書元宗講武驪山軍容不整流新州皇朝劉摯字莘老以論新法貶新州鄒浩為正言乞追停劉后册禮編管新州蔡確謫居胡銓為宻院編修上書乞斬秦檜謫新州胡寅為起居郎排和議忤秦檜謫新州題詠仁義橋邊楊桞斜蔡持正詩云云洗亭岡畔種桑麻龍山水遶祖師塔前人國恩禪寺乃六祖故居寺有木塔安祖師像夏院雲埋宰相家前人四六炎嶺窮陬新昌小郡雖曰炎荒實稱道院地居嶺海之窮郡自晋唐而創事簡訟稀官属有十仙之號民貧地僻州城劣千里之封郡在炎陬雖逹宦美官之罕至時稱惡地乃騷人遷客之辱臨方輿勝覽卷三十七
