body:
  text: 方輿勝覽卷二十八宋祝穆撰鄂州江夏咸寜蒲圻通城崇陽嘉魚建置沿革禹貢荆州之域於天文為翼軫鶉尾之次自周夷王時入于楚楚雄渠封其子紅為鄂王春秋時謂之夏汭秦屬南郡漢置江夏郡領鄂縣獻帝時黄祖為江夏太守始於沙羡置屯今郡治是也呉孫權自公安徙治鄂更名曰武昌晉立鄂縣惠帝分荆州置江州而武昌改𨽻江州江夏仍𨽻荆州宋江夏郡治夏口宋武立郢州治江夏為是郢城隋改鄂州後為江夏郡唐復為鄂州陞武昌軍節度皇朝因之或兼制置或兼安撫或兼漕今領縣六治江夏湖廣總領湖北轉運置司事要郡名鄂渚在江夏西黄鶴磯上一二百歩輿地記雲夢之南是為丨丨其名於離騷見之晏類要隋立鄂州似渚故名武昌呉破黄祖於沙羨遂改名丨丨江夏見沿革注内夏汭書注水北曰汭亦名夏口風俗人多勁悍圖經火耕水耨以漁稻為業云云决烈形勝地接荆峴喬大觀南楼賦云云江吞雲夢扼束江湖記室新書云云襟帶呉楚通接梁雍何尚之議夏口在荆江之中云云實為津要江漢為池呉趙咨對魏王曰呉帶甲百萬云云江漢合流通典江漢二水在州西合流禹貢江漢朝宗于海三國争衡郡國志夏口魯口呉置督將於此云云呉之要害山川鳯凰山在江夏縣北二里其形如鳯故名江夏山本名峽山唐天寳改名黄鶴山一名黄鵠在江夏東九里遺縣西北二里有黄鶴磯李白詩東望黄鶴山雄雄半空出四面生白雲中峯倚紅日巖巒行穹跨峯嶂亦宜宻頗聞列仙人於此學飛術一朝向蓬海千載空石室金竈生烟埃玉潭祕清謐地古遺草木庭寒老芝术蹇余羡攀躋因欲保閑逸觀竒徧諸岳兹嶺不可匹結心寄青松永悟客情畢赤壁山郡縣志在蒲圻西百二十里北岸烏林與赤壁相對即周瑜用黄盖䇿焚曹公舡處今江漢間言赤壁者五漢陽漢川黄州嘉魚江夏惟江夏之説為近烏林與赤壁即非一地葢赤壁初戰操軍不利引次江北而後有烏林之敗則烏林當在江北詳見黄州注李白詩二龍争戰决雌雄赤壁楼舡掃地空烈火漲天照雲漢周瑜於此破曹公杜牧詩折㦸沉沙鐡未銷自將磨洗認前朝東風不與周郎便銅雀春深鎖二橋大觀山在江夏東南五十里巖壑頗勝金城山在江夏東南二百里呉將陸渙屯兵于此蒲磯山在嘉魚縣境葢蒲圻縣初置于此幕阜山在通城東南五十里周五百里跨三縣呉太史慈拒劉表于此置營幕故名黄龍山即幕阜之東頂有湫池中有黄魚能致雨有瀑泉鍾臺山在咸寕東南百里有桃花洞即李邕讀書之所石室尚存龍泉山在崇陽西南六十里周二百里山有洞石渠泉流清駛鄉人號魯溪巖有茶甘美夏口一名魯口似指夏水之口然何尚之云夏口在荆江之中正對沔口浦大容舫於事為便而章懐太子注東漢亦謂夏口戍在今鄂州故唐史皆指鄂州為夏口本在江北自孫權取對岸夏口之名以名之而江北之名始晦東湖在城東四里有東園為近城登覽之勝南湖在望澤門外周二十里舊名赤欄湖外與江通長堤為限長街貫其中四旁居民蟻附太平湖在嘉魚縣南三十里須嵗中涸夜有光恠誌其處而掘之得古銅鐘秦少游為吊鎛鐘文即此蒲圻湖晏公類要湖多蒲草呉大帝時蒲圻縣於湖側南浦在江夏南三里離騒云送美人兮丨丨水出景首山西入大江冬涸夏盈商舟聚泊今名新開港黄金浦在鸚鵡洲上以呉將黄葢屯軍于此得名盧洲孫仲謀泛江遇大風柂師請所之仲謀欲徃丨丨其僕谷利以力擬柂師使泊樊口鑿山通道歸武昌今謂之呉王峴有洞穴土紫色可以磨鏡鸚鵡洲在江中黄祖殺禰衡處衡賦鸚鵡故名初孔融薦衡於操操不能容送與劉表表不能容送與江夏太守黄祖祖善待焉祖長子射尤善於衡時大㑹賔客人有獻鸚鵡者請賦以娛嘉賔衡攬筆而作文不加㸃後以言不遜祖竟殺之李白詩魏帝營八極蟻視一禰衡黄祖斗筲人殺之受惡名呉江賦鸚鵡落筆超羣英鏘鏘振金玉句句欲飛鳴鷙鶚啄孤鳯千春傷我情五嶽起方寸隱然詎可平才髙覽何施寡識冒大刑至今芳洲上蘭蕙不忍生鸚鵡來過呉江水江上洲傳鸚鵡名鸚鵡西飛隴山去芳洲之樹何青青煙開蘭葉香風暖夾岸桃花錦浪生遷客此時徒極目長洲孤月向誰明萬金堤在城西南隅紹熈間夫軍築壓江亭於其上樓亭南樓晉庾亮在武昌諸左史殷浩之徒乘秋夜共登丨丨俄而庾至諸人將避之亮曰諸人可住老子於此興復不淺便據胡床與浩等談詠竟夕在郡治南黄鶴山頂上有登覽之勝舊基不知其處中間改為白雲閣元祐間守方澤重建復舊名記丈以為庾亮所登故基非也亮所登乃武昌安樂宫端門也李巽巖燾作鄂州丨丨記云呉孫氏更名漢鄂曰武昌今州東百八十里武昌縣是也今鄂州乃漢沙羡當晉咸康時沙羨未始有鄂及武昌之名庾亮安復至此李白陪宋中丞武昌夜飲懷古詩清景丨丨夜風流在武昌庾公愛秋月乘興坐胡床龍笛吟寒水天河落曉霜我心還不淺懷古醉餘觴黄魯直登丨丨詩江東湖北行畫圖鄂州丨丨天下無髙明廣深勢抱合表裏江上來畫閣雪筵披襟夏簟寒胷吞雲夢何足言庾公風流冷似鐡誰其繼之方公悦四顧山光接水光凭欄十里芙荷香清風明月無人管併作南楼一味凉黄鶴樓在子城西南隅黄鶴山上此樓因山得名蓋自南朝已著矣南齊志仙人子安乘黄鶴過此閻伯理記州城西南隅有丨丨丨者圖經云費禕登僊嘗駕黄鶴返憇于此遂以名樓事列神僊之傳迹存述異之志觀其聳構巍峩髙標籠嵸上倚河漢下臨江流重簷翼舒四闥霞蔽坐窺井邑俯拍雲煙亦荆呉形勝之最也何必賴鄉九柱東陽八詠迺可賞觀時物㑹集靈僊者哉刺史兼侍御史淮西租庸使鄂岳沔等州都團練使河南穆公名寕下車而亂䋲皆理發號而庶政其凝或逶迤退公或登車送逺遊必於是宴必於是極長沙之浩浩見衆山之纍纍王室載懷思仲宣之能賦僊蹤可揖嘉叔偉之芳塵迺喟然嘆曰黄鶴來時歌城郭之並是浮雲一去惜人世之俱非有命抽毫紀兹貞石時皇唐永㤗元年嵗次大荒落月孟夏日庚寅記張敬夫云丨丨丨以山得名也而唐圖經何自而為恠説謂費文禕仙去駕鶴來憇于此閻伯理記中乃實其事而或者又引梁任昉記所謂駕鶴之賔乃荀叔偉非文禕也此皆因黄鶴之名而世之喜事者妄為之説後來者既不之察又從而並綠増餙之楼旁有石照亭不知何妄男子題詩窓間遽相傳曰此仙人吕洞賔所書也文人才士又為之夸大其事而蘇子瞻亦載馮當世之説有羽衣著屐之詩吁世亦寕有是理哉甚矣世俗之好惟也李白聽黄鶴楼吹笛詩一為遷客去長沙西望長安不見家黄鶴楼中吹玉笛江城五月落梅花又送孟浩然詩故人西辭黄鶴楼煙花二月下揚州孤帆逺影碧空盡惟見長江天際流崔顥黄鶴樓詩昔人已乘白雲去此地空餘黄鶴楼黄鶴一去不復返白雲千載空悠悠晴川歴歴漢陽樹芳草凄凄鸚鵡洲日暮鄉關何處是煙波江上使人愁蘇子瞻云李公澤求黄鶴樓詩因記舊所聞於馮當世者詩曰黄鶴楼前月滿川抱闗飢卒老不眠夜聞三人笑語言羽衣著屐響空山非鬼非人意其仙石扉三扣聲清圓洞中鏗鈜落門開縹緲入石如飛煙鷄鳴月落風馭還迎拜稽首願執鞭汝非其人骨腥膻黄金乞得重莫肩持歸包裹弊席氊夜穿茆屋光射天里閭來觀已變遷似石非石鉛非鉛或取而有衆忿喧訟歸有司今幾年无功暴得喜欲顛神人戱汝真可憐願君與考然不然此語可信馮公傳石鏡亭在黄鶴樓西臨崖有石如鏡為西日所照則烱然發光賀鑄詩西戍夕陽晴東城石鏡明有山分八字供作兩眉横壓雲亭在黄鶴山椒𨽻統制司江漢亭在倅㕔張芸叟記云因古城為之寺院頭陁寺在黄鶴山上北南齊王中作寺碑遂為古今名利黄魯直詩頭陁全盛時宫殿梯雲級城中空金碧雲外僧濈濈人亡經緯盡屋破龍象泣惟有簡西碑文章巍然立靈竹院在江夏本孟宗泣竹之所天聖中孫晟有記今安逺樓即其故基祠壇社稷壇朱元晦記云清江劉君清之行州事遂屬錄事叅軍周明仲行視得城東黄鶴山廢營地一區東西十丈南北倍差按政和五禮畫為四壇而屬其役事於兵馬監押趙伯烜其月壇成東社西稷居前東風伯西雨雷師居後少郤壇皆三成有壝壝四門前二壇趾皆方二丈五尺崇盡二寸後二壇趾皆方一丈六尺五寸崇八寸其再成方面皆殺尺崇四分而去一三成方殺亦如之而崇不復殺前二壇皆方四丈二尺門六尺間丈五尺後二壇皆方二丈八尺門五尺間四丈九尺其崇皆四尺社有主崇二尺五寸方尺剡其上培其下半石也南五丈為門三間北二丈有竒為齋廬五間繚以重垣甃以堅甓而植以三代之所宜木又云某按社實山林川澤邱陵墳衍原隰五土之秪而后土勾龍氏其配也稷則專為原隰之秖能生五穀者而后稷周棄氏其配也風師箕也雨師畢也是皆著於周禮領於大宗伯之官唯社稷自天子之都至於國里通得祭而風雨之神則自唐以來諸郡始得祀焉至於雷神則又唐制所與雨師同壇共牲而祀者也名宦庾亮鎮武昌見南楼注黄祖劉表以為江夏太守陶侃鎮武昌商浩庾翼皆為佐史時號多士孔覬為内史每醉彌日不醒醒則判决未嘗有壅衆云孔公一月二十九日醉勝他人二十九日醒也陸遜輔孫登於武昌令建昌侯慮毁撤鬬鴨牛僧孺陶甓甃城元稹為武昌節度使周瑜孫䇿以瑜為江夏守討黄祖始治夏口自此以前江夏太守乃治安陸耳桞公綽韓愈與鄂州桞公綽書淮右殘孽尚有巢窟環冦之師殆且十萬瞋目難語自以為武人不肯循法度頡頏作氣勢竊爵自尊大者肩相摩也不聞有一人援桴鼓誓衆而前者但月令走馬來求賞給助㓂為聲勢而已閣下書生也詩書禮樂是習仁義是修法度是束一旦去文就武鼓三軍而進之陳師鞠旅親與為辛苦慷慨感激同食下卒將二州之牧以壯士氣斬所乘之馬以祭踶死之士雖古名將何以加兹皇朝張詠為崇陽令民以茶為業公曰茶利厚官將㩁之命拔茶而置桑民以為苦其後搉茶而崇陽之桑已成張商英為守時蔡京行方田又築圜土囚罪人公謝表曰方田擾安業之民圜土聚徙鄉之惡人傳以為口實人物丁固母作大被以招賢學李邕文名天下時稱李北海元結始稱猗琅子又稱浪士又稱漫即客樊上更曰聱叟孟嘉按陶潜作孟府君傳云嘉江夏鄂人也庾亮以帝舅民望鎮武昌并領江州辟君部廬陵從事亮引見問風俗得失封曰嘉不知亮以麈尾掩口而笑曰嘉故是盛徳人也又為安西將軍庾翼府功曹再為江州别駕征西大將軍譙國桓温叅軍九月九日温逰龍山叅佐畢集四弟二甥咸在坐時佐吏並著戎服冇風吹君帽墮落君初不覺良乆如厠温命取以還之仍命孫盛為文嘲之君請筆作答文辭超卓四座嘆之温問君酒有何好而卿嗜之君曰明公但不得涌中趣爾淵明先親君之第四女也凱風寒泉之思實鍾厥心謹採行事撰此傳馮京字當世江夏人自鄉選至廷封俱為第一名賢王欽若祖郁官鄂渚時其母李氏將免娠江水驟溢已逼廨舍亟遷黄鶴楼生男即公也李綱以侍御史張浚論鄂州居住黄庭堅謫監州稅題詠鐃吹發夏口王維送江夏南康守云云乘鄂渚而反顧屈平渉江有曰云云兮欵秋冬之緒風過夏首而西浮屈平哀郢云云兮顧龍門而不見落帆黄鶴之浦庾信哀江南云云藏船鸚鵡之洲路指鳯凰山北雲唐岑參詩云云衣沾鸚鵡洲邉雨漢水北吞雲夢入游儀云云蜀江西帶洞庭流雲開逺見漢陽城盧綸晚次鄂州詩云云猶是孤帆一日程估客畫眠知浪静舟人夜語覺潮生三湘愁鬢逢秋色萬里歸心對月明舊業已隨征戰盡更堪江上鼓鼙聲四六武昌上流湖右巨鎮武昌屏翰江左衿喉逺控湖湘旁帶漢沔萬騎雲屯一江天險眷兹沔鄂之雄實控江淮之勢仍以攸臨之郡就煩兼部之勞眷洞庭彭蠡之間接牂牁夜郎之境臺隍枕呉楚之郊形勢盡湖湘之秀夏口武昌三國之山川如舊江沱漢廣諸侯之風化一新惟武昌大都㑹之邦實江國最上流之地誦崔李黄鶴之詩層楼故在考周曹赤壁之戰折㦸未銷舟車輻輳商賈之徃來貔虎雲屯軍民之雜處南楼乘興當知天下之所無北闕歸班即慶日邉之有召浩渺波濤來舳艫於千里崢嶸城壘屯貔虎於列營鎮臨鄂渚常兼漕節之榮彈壓淮壖更總制垣之重左洞庭右彭蠡據湖湘形勢之區東夏口西武昌覽呉魏興亡之迹壽昌軍武昌建置沿革呉以前並同鄂州孫權改鄂曰武昌郡晋宋齊梁因之隋以江夏為鄂州武昌以縣屬焉唐及五代以至國朝並屬鄂州嘉定十五年陞為軍使尋又陞武昌軍以與鄂州節鎮之名相類因玉寳壽昌文錫名夀昌軍今領縣一治武昌事要郡名東鄂晉地理志樊楚水經注風俗土地塉确呉陸抗䟽丨丨危險而丨丨形勝捍禦上流郡志晉庾翼欲移鎮樂鄉王述與庾氷牋武昌實江東鎮戊之中非但云云而已呉晉重鎮舊唐志云云呉主故宫張文潜呉故宫賦云登武昌之故墟弔西門之衰桞是丨丨之丨丨兮昔仲謀之所有山川武昌山在縣南百九十里舊云孫權都鄂欲以武而昌故名樊山在武昌西三里一名西山下有寒溪蘇子瞻云鄧聖求為武昌令遊寒溪西山余時居黄與武昌相望常徃來溪山間後與聖求㑹宿玉堂話舊作詩云春江緑漲蒲萄醅武昌官栁知誰栽憶從樊口載春酒歩上西山尋野梅西山一上十五里風駕兩腋飛崔嵬同遊困卧九曲嶺褰衣獨到呉王臺中原北望在何許但見落日低黄埃歸來解劔亭前路蒼崖半入雲濤堆浪翁醉處今安在石臼杯飲無尊罍爾來古意誰復嗣公有妙語留山隈至今好事除草棘常恐野火燒蒼苔當時相望不可見玉堂正對金鑾開豈知白首同夜直卧看椽燭髙花摧江邉曉夢忽驚斷銅環玉鎻鳴春雷山人帳空猿鶴怨江湖水生鴻鴈來請公作詩寄父老徃和萬壑松風哀石門山在武昌縣兩石對峙如門郭功父詩雙崖屹然起剔蘚認題字乃知賢令尹曽同漫叟醉唐武昌令馬安與元次山同遊石刻存焉東方山在縣南百五十里有石刻云東方朔故隱西塞山在縣東百三十里介于兩山之間為闗塞也土俗編呉楚舊境孫策擊黄祖子射于此袁宏賦沿西塞之峻崿吉祥山在武昌東七十里呉主微時嘗隱此羅隱詩呉主當時隱此山呉都去後緑潺潺郎亭山在樊山西路出武昌退谷中朱梁時朱友㤗鑿山開道射以強弩遂㧞武昌即此西山武昌丨丨天下勝處也自孫氏讌集以來至元子始顯逾二百年鄧安惠公為邑訪元子之跡為之作窪樽銘則又顯東坡先生謫居黄岡間徃遊焉愛其山水多見於文字中翻鴉落雪之句雖畫工不能盡也則又加顯夫物之興廢有時到天下勝處終不可掩必有賢人君子為之品題而况於人乎方二公對直玉堂刻燭揮制曽不及人間名利事而詩章徃來獨夢寐於寂寞之濵則其胷中所期盖相索於閬風之上矣今安惠之孫俁能追斂其酬唱以貽好事之玩真不墜其家聲者嗚呼元子逺矣二公之流風餘韻既不可復得而一時金馬石渠文士之盛亦豈可多得哉三復遺音為之興歎呉王峴輿地志孫權於樊口被風破船鑿樊嶺而歸因名退谷在郎亭元結故名𤓰圻在縣西南十里何頡詩序有云呉王種𤓰于此也蟠龍石在縣東北江上舊傳有龍蟠於此庾信哀江南賦龍蟠鳯集之鄉杯樽石在郎亭西孟仕源居其下有石臨樊水有窊元結命為杯樽銘曰時俗澆狡日益偽薄誰能杯飲共守淳朴車湖在武昌縣東三十里有車武子墓南湖在武昌縣東八里寰宇記舊名南浦江淹别賦送君南浦即此樊溪在武昌縣亦名袁溪寒溪在樊山下有菩薩泉東坡銘郡志云呉王有避暑殿在丨丨山間西山寺即故基釣臺在北門外大江中郡志孫權常整陳於丨丨崢嶸洲在縣西劉毅嘗破桓元於此蘆洲在武昌西子胥去楚出關於江上求渡漁父曰灼灼兮侵已私與子期兮蘆之漪子胥既渡解劔與之直千金不受子胥令其勿露漁父知其意遂覆舟而死井泉異泉在西塞山郡志天寶中泉出山巔埀流四百仞元結命曰丨丨白巖泉在武昌縣南百六十里泉石幽絶有馬祖禪師道塲樓閣南樓見鄂州丨丨注松風閣在西山寺黄魯直命名詩依山築閣見平川夜闌箕斗挿屋椽我來名之意適然老松魁梧数百年斧斤所赦今參天風鳴媧皇五十弦洗耳不須菩薩泉亭榭殊亭臨大江馬向理武昌日作元結取其材殊政異故以名亭怡亭蔣頴叔序云丨丨銘刻于江濵巨石上乃李陽氷李莒八分書裴虬作銘廣讌亭在樊山相傳呉主游宴于此元結有記九曲亭蘇子由序子瞻遷於齊安無名山而江之南武昌諸山中有浮屠精舍西日西山東曰寒溪適西山行於羊腸九曲而獲少平乃營亭而西山之勝始具名宦陸遜孫權遷都建業留遜輔太子登掌武昌留事陶侃鎮武昌課種桞都尉夜盗桞為已種侃問西門桞何以盗種都尉驚怖謝罪劉禹錫詩一辭温室樹幾見武昌桞庾亮與庾翼庾氷俱鎮武昌人物孟嘉武昌人孟陋嘉之弟桓温召之不至名賢元結逃亂居樊山有子曰叔閑直者故詩曰將牛何處去耕彼西山陽叔閑修農具直者畔我耕又有子曰叔静正者故詩曰將船何處去釣彼大回中叔静能鼓橈正者隨弱翁題詠樊山開廣讌謝元暉和伏武昌登孫權故城詩炎靈遺劔璽當塗駭龍戰聖期缺中壤覇功興㝢縣鵲起登呉山鳯翔陵楚甸襟帶窮巖險帷帟盡謀選北拒溺驂鑣西戡收組練江海既無波俯仰流英聁裘冕類禋郊卜揆崇離殿釣臺臨講閱云云文物共葳㽔聲明且葱蒨三光厭分景書軌欲同薦參差世祀怱寂寞市朝變舞館識餘基歌梁想遺轉故林衰木平荒池秋草徧雄圖悵若兹茂宰深遐睠幽客滯江臯從賞乖纓弁清巵阻獻詶良書限聞見幸藉芳音多承風采餘絢于役儻有期鄂渚同游衍不食武昌魚呉初欲都武昌陸凱上䟽言武昌土地危險磽确非王者之都且童謡云寕飲建業水云云寕還建業死不向武昌居人心所在天意可知津亭踈桞風錢起詩曉泊武昌岸云云􅂾株曽手植好事憶陶公起來望樊山唐孟彦深為武昌令元次山居樊山新春大雪彦深以詩問之江山十日雪雪深紅霧濃云云但見群玉峯武昌無限新栽桞韋蟾罷鄂州祖席嘗書文選云悲莫悲兮生别離登山臨水送將歸以牋授賔從請繼其句逡廵有妓泫然起曰妾不才不敢染翰遂占兩句曰云云不見楊花滿院飛家家開門枕江水鄧伯温次子瞻韻武昌山水誠佳哉當年五桞親栽培云云春風照耀桃與梅亦復不厭武昌居王介甫寄鄂州張使君詩云昔人寕飲建鄴水共道不食武昌魚公來建鄴毎自如云云武昌山川今可想緑水逶迤煙莽蒼白鷗晴飛隨雨槳岸薺茸茸映魚網投老留連陌上塵思公一語何由徃四六出綍西垣剖符東鄂鎮臨要郡控禦上流惟義昌之小壘乃鄂渚之故封訪樊口之梅何妨覔句折武昌之桞聊可贈行若論勝境乃元郎題詠之鄉雖曰小邦亦庾亮鎮臨之地分鄂渚之鋭兵足知地重開樊山之廣讌姑俟時清方輿勝覽卷二十八
