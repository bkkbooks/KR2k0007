body:
  text: 方輿勝覽卷六十三宋祝穆撰遂寜府小溪青石蓬溪遂寜長江建置沿革禹貢梁州之域東井輿鬼之分野春秋戰國為蜀地秦為蜀郡地漢分為廣漢郡今州為廣漢縣又分為德陽縣東晉於德陽縣界東南置遂寜郡後周置遂州又改名曰石山郡唐改為遂州改遂寜郡復為遂州陞東川防禦使又陞武信軍節度皇朝因之提舉合邃等七州兵甲徽宗潜邸陞遂寕府今領縣五治小溪本路轉運置司事要郡名古遂武信風俗民醇有古風張震賦序云云人物富繁馬咸記云云江山灑落形勝東連巴蜀圖經四逹之區西接成都云云劔南大鎮曲阜行李延制遂寜云云涪水上游馬咸㨿云云乃東川㑹邑東蜀都㑹劉儀鳯南楼記平原沃野貫以涪江氣象寛舒為云云山原肥沃華陽志云云有澤漁之利遂居蜀腹白居易行刺史李繁制有城如斗唐節度使夏魯竒檄文云云有壁如金土産蔗霜容齋五筆宣和初王黼剏應奉司遂寜嘗貢糖霜黄魯直在戎州作頌答雍熈長老寄糖霜詩逺寄蔗霜知有味勝如崔子水晶盤山川鳯凰山在府城西書臺山在府城西南以張九宗得名連寶臺與金魚山為三峯今建學宫於上玉堂山在小溪縣北十里巖巒聳秀傘子山在小溪縣白水鎮唐大厯間有禪師跨一白驢抵此山結茅以居環山之民素以植蔗凝霜為業和尚所騎白驢頗食民蔗居民苦之詣和尚請焉和尚曰汝知糖之為糖而不知糖之為霜其利十倍因示以訣遂寜糖霜其色如琥珀遂為上品鼓樓山在蓬溪縣北十里䨇峯對峙山髙千餘仭王蜀時嘗置鼓樓望烽火於其上赤城山在蓬溪縣東二里廟山在長江縣南十里孤峯峭拔下臨江島明月山在長江縣西南二里賈島詩長江微雨後明月衆星中五龍山在長江東五里青石山在青石縣有祠甚嚴九州要記云天下青石無加於此可為鐘磬招隱洞在長江縣南二十里内有唐員半千題字涪江源出廣魏涪縣南至小廣魏與梓潼合赤溪自蓬溪縣西流入小溪東合涪江郪水自銅山飛烏縣合衆流歴長江㑹涪水井泉火井在長江縣客館鎮之北二里伏龍山下地窪若池以火引之則有聲隱隱然發於池中少頃熾炎夏月積雨停水則熖生水上水為之沸而寒如故水涸則土上有熖觀者至焚其衣裾堂院靜治堂孝宗御書三字賜丁逄東蜀道院在郡治晁子西為記寺院廣利寺在小溪縣西五里巖壑之勝甲於一方丁公言詩出城數里即青山路入青松白石間只合歩行尋石徑不宜呵喝入松關資聖院在小溪靈泉山孫諤詩四山藏一寺方丈壓諸峯囬首坐禪處白雲深幾重名宦顔杲卿調遂州司法性剛直嘗為刺史詰責正色别白賈島字浪仙唐文宗時謫長江縣主簿有墓在焉杜荀鶴詩謫官自麻衣衘怨至死時山根三尺墓人口數聨詩仙桂終無分皇天似有私暗松風雨夜空使老猿悲唐安錡過其墓題詩曰倚恃才難斷昻藏貌不恭騎驢衝大尹奪卷悟宣宗馳譽超先輩吟詩下我儂司倉舊曹署一見一心冲張九宗小溪人德宗時持節列侯歸典鄉郡其榮禄詩牛羊啣草窺環佩鳥雀離花聽管絃皇朝司馬池乾興初為小溪大夫初正版籍賦役子温公方四嵗識者已知其非凡兒矣趙抃為轉運使李壽蜀人為守號巽巖馮檝小溪縣人苗劉之變檝為正字貽書諭以禍福累遷給事知瀘州題詠肩輿太守醉張震詩春苗半沒脛社酒期滿腹云云燈火歸騎趣惟有漢月明依然照山曲劔嶺横天古棧微司馬君實送張兵部中庸知遂州詩云云相如重駕傳車歸雙親倚門望已乆千騎踏雪行如飛人間富貴非不有似君榮耀世亦稀聞道西川有遺像使我涕泗空沾衣謫官何事謫詩仙鄭谷旅次遇裴晤員外謫居於此因寄詩云誰解登髙問上𤣥云云不知幾首南行曲留與巴兒萬口傳四六武信舊藩遂寜新府土田肥沃人物阜繁㨿涪水之上游乃東川之都㑹地重潜藩節鎮素雄於一靣權専㑹府甲兵兼總於七州道院邃清備載晁子西之記襌闗勝絶更稽丁晉公之詩順慶府南充相如西充流溪建置沿革禹貢梁州之域秦楚之交鶉首之次參井之分春秋戰國為巴子國秦滅巴立為巴郡即漢蜀郡之安漢縣也亦為充國縣地二縣並属益州之巴郡漢劉璋分墊江置巴西郡宋於安漢故城置南宕渠郡隋罷宕渠郡以安漢縣属隆州改安漢縣為南充縣改隆州為巴西郡唐割隆州南充相如二縣置果州𨽻山南西道改南充郡復為果州改為充州尋復為果州偽蜀為永寜節度皇朝平蜀𨽻梓州路以寜宗潜邸陞順慶府今領縣四治南充事要郡名巴西南充風俗其民喜商賈程涇社稷壇記郡當舟車徃來之衝云云而怠穡事人才之盛郡守趙不拙鼓角楼記果之為州山深水長秀氣所鍾古今人物不絶紀將軍忠節練御史史才謝真人飛昇程仙師尸解牧牛峯大名尊宿顕顕在人耳目吕好問覽秀亭記思史謙恕竇泌之遺風弔譙周陳子昻之舊績想陳練師謝自然之仙蹤慕張嶷陸績之英躅開漢志在漢以忠節名義著在唐以神仙浮屠顯在本朝以文章學術名形勝本安漢城馮休文宣王廟記地属梁雍云云巴子舊封邵伯温詞云云充城樂土大江襟帶開漢志嘉陵云云於左金泉栖樂諸山雄峙於右羣峯矗於四望馮耘灌口廟記果之郛㕓夷溪水迤其西南云云號小成都郡志自邵伯温守此邦名山勝景題品無遺至以小成都目之郡守楊濟開漢樓記自號小益不復數潼遂又云果州雖亞於潼遂而士民之盛則過之土産黄柑邵伯温詩果山仙果秀天香處處圓金樹樹芳山川果山在南充縣南八里郡以此名郡人御史陳壽隱於此有祠金泉山在城西果山之足唐謝自然於此上昇有青霞觀韓愈作謝自然詩果州南充縣寒女謝自然童騃無所識但聞有神仙輕生學其術乃在丨丨丨一朝坐空室雲霧生其間須臾自輕舉飄若風中煙入門無所見冠屣同蛻蟬大方山距城十五里又有小方山千峯萬嶺有若洞天寳臺山距州城西與金泉對峙有覽秀亭清泉山距城十里有古刹下瞰龍門諸山有邵太史留題朱鳯山在州南十里乃爾丨仙及李淳風養煉之地回視郡城如在掌握其山有鳯凰集因置丨丨觀清居山在南充縣内有四亭白雲亭光相亭吸江亭五友亭南岷山距西充縣十五里有十三小峯漢何岷者隱其上遂以名山大耽山在龍溪縣隋居士楊耽居此修養冬居丨丨丨石窟中夏居小耽山之絶頂肖巖在西充縣小陵鎮東巖竇空潤泉水清潔嘉陵江在相如縣東二百歩韋應物聽丨丨丨水寄深上人詩水性自云靜石中本無聲如何兩相激雷轉空山驚西溪在丨充縣東四十歩又有東丨大小洲圖經載昔鐵冠過此云丨洲連丨丨此地出公侯井泉滴浮泉在小方山道士何志全飲此水年八十面如桃紅樊汝顔紅賢詩雲液落山腹脉與崑崙通云何山中叟八十桃樓閣開漢樓郡守楊濟記云聖朝褒綸冇實丨丨業之語摘二字以名是丨見紀信注仙鶴樓在郡城後子城上下瞰大江邵伯温詩鶴樓端勝庾公樓覽秀亭在南充縣寶臺山上為鄉士期集題名之所清暉閣在南充縣下俯大江其景清絶名宦韋貫之白居易集云坐考䇿收直言者出為果州刺史崔元亭為守史謙恕海録碎事謙恕為果州刺史百姓歌曰使君來何晚昔日無儲今有飯皇朝查道字湛然知果州王均之亂賊黨相語曰查果州以仁義撫此境頗得衆心未可攻也抵城而宵遯又云道微服單馬造賊所諭以詔意乃相率投兵羅拜請䧏邵伯温康節之子妙得先天之㫖時相欲傳其易學公力拒之後守果州人物紀信郡城太平門有忠祐廟誥詞云以忠狥國代君任患實開漢業使後世知君為重身為輕雖糜捐不避者侯有力焉司馬相如在相如縣南三十五里宅濵嘉陵江有琴臺又水北有相如坪譙周安漢人陳壽常師之孫譙秀陳壽安漢人撰三國志譙秀李商隠懷譙秀詩梓潼不見馬相如更欲南行問酒壚行到巴西覔丨丨巴西惟是有寒蕪皇朝馮休南充人真廟朝不應辟召歸山著書題詠褒斜不容幰唐王維詩云云之子欲何之鳥道一千里猿啼十二時五馬過窮巷王維謝鄭果州相過詩云云雙童送老身騎吏縁青壁姚合果州刺史崔元亮詩云云旌旗度白雲劔銘生蘚色巴字疊成文華省思仙侣疲民愛使君閬苑南邉第一州邵伯温果山即事云云江山絶勝對城樓又老守自慙無善政衰翁不稱作遨頭萬家燈火春風陌邵伯温詩從昔遨遊盛兩川充城人物自駢闐云云十里綺羅明月天傾城出送舊遨頭邵伯温離果州詩曰今日行人去果州云云蜀人喚作小成都邵伯温過充城詩云自昔充成號奥區云云四川惟説好充城邵伯温充城口號詩山圍翠合水連雲萬室樓臺照眼明勝地風淳真樂國云云充城繁盛冠東川前人云云四六維今開漢號小成都紀侯之忠節謝女之仙風維東梓之奥區有南充之佳郡内輸邦賦視資普而後先外給軍儲與嘉眉而甲乙疲民愛使君盍繼崔元亮之政勝地真樂土願􅆳邵伯温之詩資州盤石内江資陽龍水建置沿革禹貢梁州之域東井輿鬼之分野入參三度周属雍州春秋戰國為蜀地秦置蜀郡漢武分置犍為郡即犍為郡之中資縣地自晉雄之亂夷䝤居之西魏析武康郡之安陽縣置資州理今簡州陽安縣界古資陽城後周於今簡州陽安縣移資州於漢資中故城為治所仍改資中為盤石隋併郡於安陽縣煬帝又置資陽郡唐改為資州𨽻東川復𨽻西川徙治内江復治盤石皇朝因之今領縣四治盤石事要郡名資川資中風俗地狹民貧宋京至道觀記資中云云無土以耕在蜀為窮僻之地為多士國李浩大晟樂記資在東梓云云自圖經云王褒起資以文詞鳴褒以來如董鈞范崇凱李鼎祚皆以文顯詞客才士未嘗一至宋京至道觀記資中江山瑰竒自古王公貴人云云故不得見於歌詠而為浮圖老子氏之學者徃徃擅而有之夷漢雜居唐韋臯奏䟽資與瀘境相接山川連結云云形勝長江帶其南李石企仙樓記靈巖盤其右傳耆盤石縣遷治舍記支江流其前谷神隱其北醮壇㨿其左云云大溪繚其北企仙樓記云云有山岌然中峙為郡治勝處東抵昌瀘圖經資在東蜀云云北通普遂南接榮嘉西逹隆簡山水之秀劉光祖狀元樓記蜀東十數郡云云不敢與資中抗山川鳯凰山在州北小譙山後形若鳯故名重龍山在州南二里􅍶崒盤屈隱若龍轉亭閣之勝及諸梵列跨其上江山城市歴歴可觀氈帽山在州南四里玉清山在州南二里左瞰平湖侯真人遺跡在焉玉京山在州西南五十里峭險壁立得道山在州北十五里有張開光遺跡存焉月山在州北三十里醮壇山在州北二里張道陵李阿真人修煉於此資山在資陽縣范淳甫詩丨丨巖谷多神仙鸞車鳯馬隨飛煙神女蕭蕭來暮雨浮邱徃徃下雲軿德林山宋京李觀有題錢氏丨丨丨詩平岡山在盤石縣西三里李阿傳仙宗崔中古崔逵居之華蕚山距内江縣十里昔唐范崇凱於此讀書詳見名宦鼇山在龍水縣西北一里孟巖唐楊禹珪題丨丨詩郡雖饒勝境偏愛丨丨山東巖距州城三里若剖大甕下深千尺溪壑深杳林木葱蒨西巖在城西六里山行踰百歩石壁夾道如城如峽宋京䟦資中四巖獨丨丨幽深山水富足南巖去盤石縣五里北巖去郡城半里等慈寺之東唐盧并等慈寺詩地靈無俗草巖静有仙禽郡志崖峻不可游息其巔古像半灑苔蘚乳泉滴瀝四時不絶宋京丨丨記云東蜀領郡十六而山川瑰竒資中為之甲資中勝遊十數而北巖又為之最琵琶峽在盤石縣南三里盤石在州城北二里狀若盤陀因以名縣珠江相傳江中有光夜現如燈燭劉光祖狀元樓記資號丨丨以地之靈出産瓖異中江在資陽縣西沈約宋書資江為中水涪江為内水龍溪在龍水縣西北樓閣台星樓即東城門乃趙魏公建黄裳為之記省元樓在譙樓南為郡人趙雄建狀元樓在譙楼東為郡人趙逵建企仙閣一名蓬萊在郡治之北髙㨿絶頂得一郡之要李石記李傳侯張各㨿一山合四山而拱揖故名亭榭瀛洲亭在郡圃繪唐十八學士故名鮮于侁記云千巖萬壑綺綰綉錯如拱如揖顧接不暇道勝亭梅堯臣題龍水縣錢氏丨丨丨詩龍川舊山下髙卧一儒生有室羅經史無心繋組纓名宦韋臯唐丨丨時東蠻數為邉患能綏服之又戰有功蠻部震服乃建安夷軍於資州維制諸蠻盧并文宗時守資中長於歌詠有詩刻在等慈寺皇朝范祖禹治平中宰龍水宋京政和間為郡幕喜於詩翰李新字元應隆州人為資州司録東坡命賦墨竹常稱賞之人物萇𢎞資中人即夫子問樂者也王褒資中人有聖主得賢臣頌今墓前有石碣髙一丈字已磨滅惟滌硯池尚存董鈞東漢永平中為愽士嘗與議禮樂范崇凱内江人善属文明皇命作華蕚賦入奏為第一弟元凱皇朝趙逵盤石人廷對第一不附秦檜趙雄内江人類試為第一孝宗朝為相題詠元戎鎮靜無邉事羊士諤資州宴行營囬將詩几劔盈庭酒滿巵戍人歸日及𤓰時云云遣向營中偃畫旗日落琵琶峽口風宋京詩云雲生氊帽山頭雨云云外邑縣門倚巖石范淳甫宰龍水日賦詩云云終日對青峯初仕借為宰讀書過三冬忘機狎鷗鳥觀稼親老農訟庭可羅雀銅印苔蘚封資水通巫峽范淳甫詩云云誰家萬里船四六蜀左名區資中佳郡山川甲於左蜀人物擬於西川褎然龍首之英卓矣鳯池之彦地雖窮僻洞蠻溪䝤之雜居山獨瑰竒釋子仙翁之多占粤從漢代名髙作頌之文人迨至本朝秀毓秉鈞之賢相普州安岳樂至安居建置沿革禹貢梁州之域秦地東井輿鬼之分野春秋戰國為巴蜀之境秦為巴蜀二郡地今州即漢之資中牛鞞墊江後漢之德陽四縣之境晉因之梁置普慈郡于此後周武帝於郡立普州又置多葉縣于此隋改多葉縣為普慈縣煬帝罷属資州唐初又置普州改為安岳郡復為普州皇朝領縣三治安岳事要郡名東普普慈風俗地僻俗固唐文若學記云云土瘠民貧馮山州學記俗為近古黎持文宣王廟記普慈之人有無相通憂患相恤最為近古少而羣萃者遜弟而聽從退而里居者無倦於教育士多於民唐文若安居縣學記安居普下邑地狹而賦寡古籍為士者多於民王平彭公堂記其民朴厚而俗美士雅素而篤學排村徧井云云故其俗尚禮義尊愛賢者冠帶並西眉四賢堂記冠帶之盛與西蜀並稱何耆仲進士題名記蜀東西州論士所出必曰眉曰普普居山谷間不能當眉之属縣而人物表殆相頡頏形勝普之秀以石郡志云眉之秀以水閬之秀以山云云介萬山間普慈志序云云無土地肥饒之産無舟車貨利之聚為東蜀下州馮山州學記土産棗梨藕郡土磽瘠無珍異之産惟鐡山棗崇龕梨天池藕三者皆陳希夷所種山川鳯凰山在郡治後形如飛鳯福濟廟居其絶頂舞鳯亭當其勝州治㨿其脊左為惠民院右為白馬廟延袤數里氣象雄勝雲居山在城南一里其上為真相寺有葛仙洞為近城游覽勝處大雲山在鐡山門外二里安岳以邑治在山下四面險故曰丨丨艮巖在安岳之清流鎮杜孝嚴有記西巖郡守李耽有詩月巖在安居髙灘福聖院相對隱士趙鷟居之後巖尤竒岳陽溪在安岳縣天聖中郡守彭乘鑿石為曲水後名翰林灘每嵗脩祀事于此雙溪在郡西七里與岳陽溪合而東大安溪在安居故老云孟蜀嘗取魚於此當時號禁溪井泉破石井在城西其水清洌乃一巨石鑿開而得水云陳摶相地所開堂閣清簡堂在郡治玉虹閣在郡治寺院報恩寺在安岳有會景亭便於眺覽福勝院在安居縣南五里依巖架屋下瞰韓朋溪有巖泉之勝棲巖寺寺有李洞讀易洞雍州人避朱泚之難入蜀於大雲山鑿石為洞讀易其中嘗師事賈島祠廟鐡山神祠在州西神姓姚諱景澈隋文帝時普昌瀘三州夷作亂帝命神為都統將兵討平之卒𦵏韓朋鎮石城山後人為立廟嘉定乙夘紅巾作亂於益昌遂入普屯於廟山是夕暴風雷雨掀掲寨舍賊首莫簡見空中神異謁廟謝過探籖得擒賊先擒王之句已而就擒普應廟在鳯凰山神姓多名岳天彭人自孟蜀時授徒於普國初未有登科者端拱間門人牟衮廷試第七自是儒科相踵實自侯而始侯既殆牟衮率諸弟子葬之鳯凰山遂立祠名宦賈島蘇絳銘序云島字浪仙范陽人長材間氣超卓挺生属思五言孤絶之句記在人口罹謗責授遂州長江主簿自長江簿遷司倉參軍又遷普州司户參軍終焉有祠在城南三里韓愈詩孟郊死葬北邙山日月星辰頓覺閑天恐文章中斷絶故教賈島在人間皇朝彭乘益州華陽人為漢陽軍判官顧望鄉閭悵然曰親老矣乞歸侍養冦凖薦之召為集賢校理求便親得知普州舊制蜀人不許赴蜀官特恩自乘始慶厯中與歐陽文忠公宋景文公張文定公同在翰林今東溪上曰翰林灘者公遺跡也文同潼川人以親老自内職丐外守普州人物陳摶字希夷普州崇龕人也隱於武當山及華山太宗令見真宗於藩邸及門而返曰王門厮役皆將相材也何必見王按祥符舊經謂陳摶崇龕人既長辭父母去學道或居亳為亳人或居洛中則為洛人或居華山則為華山人此説最有理祥符去國初甚近李宗諤博物君子撰定圖經必得其實牟衮永興人國初登科自衮始兄弟皆繼踵擢第謂一門四桂諸馮自唐馮宿之後為彰明令因家于蜀在普有南宗北宗之别南宗則有馮如晦能辨范公純仁之誣獄馮宗則與陳東同伏闞上書北宗則有馮光戬能戒大將楊瓊之殺䧏馮澥之忤蔡京遭貶題詠石秀山囬氣象雄郡守郭卭詩地靈人勝風流古云云文属君華武硬弓馮如愚詩地靈人秀誰稱首云云牟衮字君華破荒及弟劉澤武藝精絶從太祖定天下號劉硬弓四六䟽綍北門分符東普維千里地介萬山間地望在東普而最卑人才與西眉而相埒試考圖經地最蜀東之陋載觀形勝石為天下之竒賈浪仙宦遊之國詩句難磨陳希夷毓秀之鄉清風可挹方輿勝覽卷六十三
