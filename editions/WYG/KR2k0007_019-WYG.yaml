body:
  text: 方輿勝覽卷十九宋祝穆撰江西路隆興府南昌武寕新建豐城奉新進賢分寕靖安建置沿革禹貢揚州之域星分翼軫春秋戰國屬楚秦屬九江郡漢髙祖始置豫章郡東漢因之隋為洪州唐置洪州總管改曰都督府又置觀察使陞節度使後避代宗諱止稱章郡加鎮南節度南唐遷都南昌國朝復為洪州以為江南西路兵馬鈐轄升馬歩軍都總管升安撫使以孝宗皇帝潜藩賜府額今統郡十一領縣八治南昌新建兩縣江西轉運置司事要郡名豫章陳留風俗記曰豫章以木氏都酸枣以棘名邦應劭漢官儀曰有丨丨生于庭中木嘗枯晋永嘉中一旦更茂咸以為中興之祥其後元帝果興大業焉南昌見前沿革注洪都王勃記丨丨新府星子志隋文帝以洪崖所居遂以名州風俗俗同呉中隋志豫章之丨丨丨丨其君子善居室小人勤耕稼風土爽塏豫章記云云山川特秀土沃人庶白居易行裴堪制云云今之奥區人傑地靈王勃宴滕王閣記人好經學晋書范宣豫章人以講誦為業譙國戴逵聞風宗師自逺而至太元中太守范甯亦立鄉校教授常数百人由是並好經學化二范之風也人尚黄老雷次宗豫章記丨丨丨丨清浄之教重于隠遁盖洪崖徐孺子之風也人自得於江湖之外見後韓愈重修滕王閣記形勝地接衡廬見後王勃滕王閣序上控百粤唐杜牧文集呉頭楚尾職方乘記豫章之地為丨丨丨丨左九江右洞庭獨孤及記襟三江帶五湖見後王勃序當淮海之襟帶封敖滕王閣記有長江巨湖為之浸有靈嶽名山為之鎮云云作呉楚荆蜀之把握扼甌閩交廣之吭汪彦章記云云東南一都㑹南豐門記其境屬于荆閩南粤方数千里其田宜秔稌其賦粟輸于京師為天下最在江湖間丨丨丨丨丨也凡十一州五十六縣官吏皆受約束鄭升卿五賢堂記土産雙井茶黄魯直送丨丨丨與蘇子瞻詩人間風日不到處天上玉堂森寶書想見東坡舊居士揮毫百斛䨇明珠我家江南摘雲腴落磑霏霏雪不如為君喚起黄州夣獨載扁舟向五湖山川南昌山雷次宗記在丨丨丨髙水激逺灑如風雨西山余安道記在縣西四十里岩岫四出千峯北來嵐光染空髙二千丈屬連三百里水經云有天寶洞天唐宋詩話載詩僧詩洪州太白方積翠倚穹蒼萬古遮新月半江無夕陽大雄山即呉猛得道之所勢出群山唐宣宗詩丨丨真跡枕危巒古梵層楼峻萬般日月毎從肩上過山河長在掌中觀仙花不間三春秀佛境無時六月寒更有上方人罕到寒鍾朝磬碧雲端南山在分寕隔溪跨橋穿石竇而入懸崖峭壁下瞰修水有釣磯石玉溜石有黄山谷題字與鳯山對矗周覽一縣之景鳯山在分寕多靈草幕阜山在分寕西百四十里黄魯直詩山行十日雨沾衣幕阜峯前對落暉始豐山在豐城南七十里即神仙三十七福地之一也桞山在武寕縣西四十里縣之絶景唐史丨惲棄官隐于武寕丨梅嶺在西山極峻處相傳梅仙棄官學道于此清水巖在分寕東北二十里南有石室北多蘭􅊉黄魯直云丨丨丨為天下勝處岩前平衍可坐千人亦有詩洪崖去郡三十里楊傑記西山洪崖在翠岩應真宫之間石壁峭絶飛泉北來其下井洞深不可測毎嵗六七月時水髙一二丈湍激可畏其傍人語不相聞及過井洞即聲勢斗殺鑠流出山前代有異人居之世以為丨丨先生云先生三皇時人盖得道之士也巒岡西有鶴嶺鳴水洞在分寕縣黄龍山之東水行石詩間髙数十丈聲如雷霆韓駒有天寳洞在新建西八十里西山勝絶處也道經所載第八洞天楊無為詩云丨丨丨中如不到西江元似不曽來章江源出豫章東湖在郡東南周廣五里後漢太守張恭築塘謂之南塘宋太守宋興宗更築小塘唐地理志韋丹開斗門南豐徐孺子祠堂記云南昌城西有孺子宅又李侍郎虚已徐樞宻俯皆卜築湖上俯自號丨丨居士郭功父詩云丨丨入望晚波平蒲葉團荷各自青不用更尋徐孺宅編茅搘竹一碑亭宫亭湖西有宫亭神能分風上下日月湖䜟云丨丨丨明良將出石人灘在進賢北䜟云石人灘合狀元生投書渚殷羡為豫章守乃去郡人多附書一百餘封行至江西石頭渚岸以書投水中祝曰沉者自沉浮者自浮殷洪喬不是寄書郵時人號丨丨丨龍沙在郡北堆阜逶迤潔白髙峻而形似龍舊俗九日登髙于此孟浩然詩龍沙豫章北九日掛㠶過風俗因時見湖山𤼵興多南浦在廣潤門外劒池曹續廟記在豐城縣之故址隂鏗詩清池自湛淡神劒乆遷移無復連星氣空餘似月池修水在分寕西六十里其源自郡城東北流六百三十八里至海昏又東流百二十里入彭蠡湖以其逺故曰修水井泉䨇井在分寕縣西二十里黄山谷所居之南溪有二井土人汲以造茶為草茶之第一湯泉在奉新縣九仙院側學校東湖書院漕趙崇憲創于添倅㕔之舊基滕強恕以逼近市㕓請于朝遷之東湖晏家山上堂亭民安堂胡徽猷陛辭日上有使民安業之語故名正義堂在漕司取理財正辭之義張安國書扁南浦亭在廣潤門外往來艤舟之所唐已有之王介甫詩南浦隨花去囘舟路已迷暗香無覔處日落畫橋西愛蓮亭在南昌縣治以濓溪嘗宰是邑故名幽谷亭在靖安縣曽子固詩行盡車馬塵豁見水石環誰為千家縣正在清華間石頭驛汪彦章丨丨記云自豫章絶江而西有山屹然並江而出者石頭渚也阻江負城十里而近韓愈次丨丨丨寄江西王中丞詩凴髙囘馬首一望豫章城人由戀德泣馬亦别羣鳴寒日夕始照風江逺欲平黙然都不語應識此時情樓閣物華楼舊在西城上王介甫詩千里名城楚上㳺江山多在丨丨丨滕王閣在郡城西唐髙祖之子滕王元嬰所建夾以二亭南曰壓江北曰挹秀自唐至今名士留題甚富初滕王閣成九月九日都督大宴滕王閣宿命其婿作序以夸客因出紙筆徧請客莫敢當勃欣然不辭都督怒起更衣遣吏候其文輒報一再報語益竒乃矍然曰天才也王勃秋日宴滕王閣詩序南昌故郡洪都新府星分翼軫地接衡廬襟三江而帶五湖控蠻荆而引甌越物華天寶龍光射斗牛之墟人傑地靈徐孺下陳蕃之榻雄州霧列俊彩星馳䑓隍枕夷夏之交賓主盡東南之美都督閻公之雅望棨㦸遥臨宇文新州之懿範襜帷暫駐十旬休睱勝友如雲千里逄迎髙朋滿座騰蛟起鳯孟學士之詞宗紫電清霜王將軍之武庫家君作宰路出名區童子何知躬逄勝餞時惟九月序屬三秋潦水盡而寒潭清煙光凝而暮山紫儼驂騑於上路訪風景於崇阿臨帝子之長洲得仙人之舊館層巒聳翠上出重霄飛閣流丹下臨無地鶴汀鳬渚窮島嶼之縈廽桂殿蘭宫列岡巒之體勢披綉闥俯雕甍山原曠其盈視川澤盱其駭瞩閭閻撲地鍾鳴鼎食之家舸艦迷津青雀黄龍之軸虹銷雨齊彩徹雲衢落霞與孤鶩齊飛秋水共長天一色漁舟唱晚響窮彭蠡之濵鴈陣驚寒聲斷衡陽之浦遥吟俯暢逸興遄飛爽籟𤼵而清風生纎歌凝而白雲遏雎園緑竹氣凌彭澤之樽鄴水朱華光照臨川之筆四美具二難并窮睇盼于中天極嬉遊于暇日天髙地逈覺宇宙之無窮興盡悲來識盈虚之有数望長安于日下指呉㑹于雲間地勢極而南溟深天柱髙而北辰逺闗山難越誰悲失路之人萍水相逄盡是他鄉之客懷帝閽而不見奉宣室以何年嗟乎時運不齊命途多舛馮唐易老李廣難封屈賈誼于長沙非無聖主竄梁鴻于海曲豈乏明時所賴君子安貧逹人知命老當益壯寕知白首之心窮且益堅不墜青雲之志酌貪泉而覺爽處涸轍以猶懽北海雖賖扶摇可接東隅已逝桑榆非晚孟嘗髙潔空懷報國之情阮籍猖狂豈效窮途之哭勃三尺微命一介書生無路請纓等終軍之弱冠有懷投筆慕宗慤之長風捨簮笏于百齡奉晨昏于萬里非謝家之寳樹接孟氏之芳隣他日趨庭叨陪鯉對今晨捧袂喜托龍門楊意不逄撫凌雲而自惜鍾期既遇奏流水以何慙嗚呼勝地不常盛筵難再蘭亭已矣梓澤邱墟臨别贈言幸承恩于偉餞登髙作賦是所望于羣公敢竭鄙懷恭疏短引一言均賦四韻俱成滕王髙閣臨江渚佩玉鳴鑾罷歌舞畫棟朝飛南浦雲珠簾暮捲西山雨閒雲潭影日悠悠物換星移幾度秋閣中帝子今何在檻外長江空自流韓愈重修滕王閣記云愈少時則聞江南多登臨之美而滕王閣為第一有瑰竒絶特之稱及得三王所為序賦記等壯其文辭益欲往一觀而讀之斥守掲陽又不得過南昌償所願焉至州之七月詔以太原王公為御史中丞觀察江南西道洪江饒處吉信撫袁悉屬治所八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春施秋殺陽開陰閉今修于庭户数日之間而人自得于湖山千里之外吾雖欲出意見論利害聽命于幕下焉而吾州乃無一事可假而行者則滕王閣又無因而至前公為從事此邦適治新之公所為文實書在壁今三十年而公來為邦伯于是棟楹桷榱折者以新之既訖功以書命愈曰子其為我記之愈既未得造觀竊喜載名其上雖老矣如獲從公㳺尚能為公賦之杜牧詩滕王閣中綺席開柘枝蠻鼓殷晴雷垂楼萬幕連雲合破浪千㠶陣雨來未掘雙龍牛斗氣髙懸一榻棟梁材連巴控蜀知何事珠翠沉檀處處催王介甫白浪翻江無已時陳蕃徐孺去何之愁來徑上滕王閣反覆文公一片碑王平甫詩滕王昔日好追遊髙閣依然枕碧流勝地幾經興廢事夕陽偏照古今愁城中樹宻千家市天際人歸一葉舟極目煙波吟不盡西山重疊亂雲浮秋屏閣在大梵寺之側一目可盡江山之勝潘逍遥有詩云窺魚白鳥明殘照抱石幽雲㸃半山寺院上藍院唐馬祖道一禪師道場今為府城叢林第一䨇林院在靖安縣北五里栁公權書額雲溪寺在新建縣西二十里曽子固王介甫來遊樂其山水之勝後于其旁卜居今為西上勝處香城寺在豫章西山陳陶有詩云十地嚴宫禮竺皇旃檀楼閣半天香祗園樹老梵聲小雪嶺花香燈影長霄漢落泉供月界蓬壺靈鳥侍雲房何年七七空人䧏金錫珠壇滿上方道觀玉隆萬壽觀在新建縣界舊名游帷觀初許旌陽學道于丹陽黄堂嘗以五色錦帷施于黄堂及旌陽上升錦帷飛還故宅俄復升天晋遂立遊幄觀唐有道士胡惠超有道術能役鬼神其剏觀也以夜興工至曉則止今正殿雄麗非人工所能致其扁榜有游帷之觀四字乃徐錡書祥符中改賜玉隆萬壽觀額楊無為詩四十日升金闕去半千年後玉函開鐡柱觀政和間改建真宫許旌陽既斬蛟蜃謂豫章濵水之城地百恠叢居吾上升之後或害人鑄丨丨二一在子南縻以鐡索封鎮蜃穴又奉新縣延真觀有鎮蛟石尚存祠墓梅山祠在南昌尉㕔楊廷秀詩梅郎絳節朝玊臺朝遊五城暮九垓遺民香火答遺愛何年祠屋荒蒼苔劔津詩客子張子住持仙壇判山水上書台斗大居士作縁氷漕皇華使二臺併檄孔家兄經始新祠不日成西山南浦作賀賓野梅官桞俱歡聲濓溪祠堂朱元晦祠記隆興府學教授南康黄君灝既立丨丨先生之祠于其學而以書來語某曰先生之學自程氏得其傳以行于世至于今而學者益尊信之以故自其鄉國及其平生遊官之所歴皆有祠于學以致其瞻仰之意若此邦者盖益先生之仕國也而視于其學獨未有所祠奉灝也既言于府而教立之且奉程氏二先生以配焉又將竊取其書日與學者誦習之而患未知其所以説也吾子盖嘗為是以幸教吾邦之人是殆有以識其意者願得一言以記兹事庶乎有以發也某謝不敏而黄君要之不置某惟先生之學之奥固非末學所敢知抑不敢謂無其志者矧黄君之請之勤若是亦安得不為之言乎盖常切謂先生之言其髙極乎無極太極之妙而其實不離乎日用之間其幽探乎陰陽五行造化之􅄨而其實不離乎仁義禮智剛柔善惡之際其體用之一源顯微之無間秦漢以來誠未有臻斯理者而其實不外乎六經論語中庸大學七篇之所傳也盖其所謂太極云者合天地萬物之理無不在是故曰無極而太極以其見天地萬物之理而無氣與形故曰太極本無極也是豈離乎生民日用之常而自為一物哉其為隂陽五行造化之􅄨者固此理也其為仁義禮智剛柔善惡者亦此理也性此理而安焉者聖也復此理而執焉者賢也自堯舜以來至于孔孟其所以相傳之説豈有一言以易此哉顧孟氏既沒而諸儒之智不足以及此是以世之學者茫然莫知所適髙則放于虚無寂滅之外卑則游于雜博華侈之中自以為道固如是而莫或知其非也及先生出始𤼵明之以傳于程氏而其流遂及于天下天下之學者于是始知聖賢所以相傳之實乃出于此而有以用其力焉此先生之教所以繼徃聖開來學而有大功于斯世也今黄君既立其祠以及于程氏而又欲推其説以傳學者是必有以黙契于心而無疑矣而若有待于某之言者豈將以是輔其説而乆其傳耶既不得辭乃叙其事而并書是語以復焉黄君幸以為不悖于先生之言則願刻之石厝之祠門以告來者庶幾其或小補云徐孺子墓圖經章水者逕南昌城西歴白社其西有孺子墓又北歴南塘其東為東湖其北土洲上有孺子宅號孺子臺呉嘉禾中太守徐熈于孺子墓隧種松太守謝景于墓側立碑太守夏侯嵩于碑旁立思賢亭拓䟦魏時謂之聘君亭墓失其地臺可考而知詳見曽南豐所作記楊廷秀孺子墓詩并序南昌尉㕔之右有孺子墓墓前故有思賢亭後經兵餘亭毁墓湮今慰劒津張敬之因葺公廨披榛得墓按圖諜墓旁有九里井求之得井又有􅺅耕栢伊墓下得甓三款識云晋平南將軍墓去聘君墓七里驗其遐邇而信因表其墓復其亭云敬為賦之有客棲霞外無名涴黨中南州一髙士東漢獨清風舊國已禾女荒阡猶石翁更煩吹笛鬼端為洗榛叢名宦熊逺獨孤及記由陽朔而來千有二百餘年其間名帥材大夫賢君子有丨丨雷次宗胡藩沈季銓楊相如蜚其英李勉魏少遊裴胄沈𫝊師周墀為之帥李秘甄濟崔祐甫權徳輿杜牧賛其治又禮賢若陳仲舉有道若徐孺子直言若梅子真興學若范武子遺愛若韋文明端可師表梅福為南昌尉後去官嘗上疏譏刺王鳯元豐間封壽春真人有廟陳蕃為守不接賔客惟禮徐孺子時設一榻孺子去則懸之雷煥為豐城令掘獄基得劒詳見延平范甯為守見前風俗注張九齡為都督韋丹韓愈曰丹為刺史教為瓦屋又築堤捍江皇朝章得象以屯田郎知後拜相唐介事略仁宗朝知誎院論陳升之交結中人凡九奏卒罷升之介出知洪州曽鞏嘗知洪州㑹嵗疫責醫候視散藥全活者甚衆張商英為守周頥初任分寕縣簿有疑獄乆不决先生至一訊立辨邑人驚詫曰老吏不如也後知南昌邑人見其來咸曰是能辨分寕獄者吾属得所訴矣趙鼎知州召還為叅政後為相李綱紹興制置大使人物徐穉字孺子南昌人蘇子由過豫章詩白屋可能無孺子黄圭不是欠陳蕃古人冷淡今人笑湖水年年刺舊痕雷次宗南昌人呉猛晋書藝術傳豫章西安人邑人丁義授以神方因還洪州江波甚急猛不假舟楫畫水而渡觀者異之後封真人許遜南昌人太康元年為蜀旌陽令師事女真諶母永嘉末海昏大蛇斷道遂仗劒斬之寕康二年四十二口與雞犬皆上升今封為真君陳陶䴡情集載南唐處士陳陶隠西山操行清潔時嚴撰牧豫章欲撓之遣小妾蓮花徃侍焉陶殊不顧妾乃獻詩求去曰蓮花為號玉為腮珍重尚書遣妾來處士不生巫山夣虚勞雲雨下陽臺陶答云近來詩思清于水老去風情薄似雲已向昇天得門户錦衾深愧卓文君皇朝陳執中郡人為相黄庭堅其先婺之金華人六世祖贍知分寕縣因家焉始庭堅與秦觀張耒晁補之皆㳺蘇軾之門號四學士而庭堅于文章特長于詩獨江西君子以庭堅配蘇軾謂之蘇黄云徐俯與郡守陳瓘為㤀年友洪師民南昌人娶黄氏山谷之女弟也生三子長曰明字龜父次曰芻字駒父山谷嘗稱其才及為諫議大夫有職方乘及老圃集今傳于世㓜曰炎字玉父髙宗召為中舍題詠分野連荆俗王介甫詩丨丨丨丨丨經綸屬漢疆氷壺幕下清韋應物寄洪州幕府盧侍郎忽報南昌令乘驄入郡城同時趨府客此日望塵迎文苑臺中妙云云洛陽相去逺猶使故林榮南昌城郭枕江煙唐韋莊晚眺詩云云章水悠悠浪拍天芳草緑遮仙子宅落花紅襯賈人船畫船挿幟摇秋光王介甫送程公闢之豫章詩云云鳴鐃伐鼓水洋洋豫章太守呉郡郎行指斗牛先過鄉鄉人出郭航酒漿炰鱉膾魚炊稻粱芡頭肥大菱腰長釂醻喧呼坐滿床恠君三年滯瞿塘又躍傳馬登太行纓旄脫盡登大梁翻然出走天南疆九江左股貢與章揚瀾吹漂浩無旁老蛟戯水風助狂盤涡忽拆千丈強君聞此語悲慨慷迎吏乃前持一觴鄙州歴選多俊良鎮撫時有諸侯王拂天髙閣朱鳥翔西山盤上遶羊腸水中林下逄衲子東西南北古道王中户尚有黄金藏漂田種秔出穰穰沉檀珠翠雜萬商大舟如山起牙檣輸㵼交廣流荆楊輕裙利屣列名娼春風踏謡能斷腸平湖灣㵼烟渺茫樹石珍恠花草香幽處徃徃聞笙簧地靈人秀古所臧勝兵可使酒可嘗十州將吏隨低昻談笑指揮囬雨𤾉非君才髙力方剛豈得跨有此一方無為聽客欲霑裳使君謝吏趣治裝我行樂矣未渠光外邑豐城邑巖巖黄魯直集丨丨津亭其上有李衛公劒池賦世父長善作石隄記其詩云云水重六萬户石隄眠長虹輟棹日沉霧今君政有聲新亭延客歩涙落世父碑心傾文饒賦憶昔兩神兵理獄思武庫寒光射漢津兩賢䊸一顧張公拆中台木拱孔章墓不能從兒嬉嵗晚龍蛇去空餘寒泉泓因雨長蛙鮒鈆刀藏寶室萬世同此度為吏要清心黄魯直送徐景道尉分寧詩李苦少人摘酒醇無卷深當官莫避事云云葛藟松千尺寒泉綆百尋公朝有汲引吾子茂徽音黄綬補一尉還依水竹居身隨南渡馬書寄北來魚風俗諳鄰並艱難試事初官閑莫歌舞教子誦詩書士多儒雅出公侯孔平仲送分寕宰詩西安瀟洒我嘗遊多自修川泛小舟民本豐饒矜氣節云云梅山晚翠屏當户茶吐香芽滿雪甌豫想弦歌富閒暇白雲深倚鳯凰楼故人為邑士多稱王介甫送張頡知奉新縣詩云云繇賦寛賒獄訟平老吏閉門無重糈荒山開隴有新粳方揮玉塵日邉坐又綰銅章天外行去去料君歸不乆挾材如此即公卿四六光膺一札出縂千連蜚綸北闕分閩西江抗章丹陛出帥洪都襟帶七閩咽喉百粤惟南昌之故郡控全楚之上流控甌閫而奠壤直牛斗以交躔眷是真主之潜龍允為大臣之歇馬天開翼軫之鄉地控江湖之國尚書向台斗之躔都督居翼軫之分大纛髙才之雲擁朱簾畫棟之春生帝謀連帥付江湖襟帶之區公以名儒當禮樂詩書之選九重圖任起東府之元勲十乘申咨撫南昌之故郡雲飛南浦未訪尋閣上之詩夜直北扉行入草禁中之詔南浦飛雲目極滕王之閣東湖設榻夢逰孺子之亭騷人社下足白鷗野水之盟帝子樓前餘孤䳱落霞之興燕寢蘇州暫凝香之森衛鑾鳴滕閣又雅望之遥臨魁台齊色益足光牛斗之墟霖雨思賢㑹即騎箕尾之上設榻東湖豈君侯之有靳迷津南浦歎病叟之無縁徽皇定慰安之府肇自政和忠獻登齋鉞之壇適當皇祐賓客鼎來屡下凝塵之榻江山改觀一新捲雨之楼總百官均四曲真廊廟之瞻襟三江帶五湖壯籓維之勢洪督府寔江湖襟帶之地滕王閣為東南壯觀之游分翼軫接衡廬壯于蕃之勢履星辰運樞紐諧爰立之求夜醉長沙曉行湘水朝飛南浦暮捲西山地接衡廬而星分翼軫允謂上流令修庭户而人樂湖山乆安美政山為翠浪水作玉虹方出臨于千里雨捲珠簾雲飛畫棟俄易鎮于十連連峯去天枯松倚壁不辭蜀道之難珠簾捲雨晝棟飛雲盡領洪都之勝袁州宜春萍鄉分宜萬載建置沿革禹貢揚州之域呉地斗分野春秋属呉戰國属楚秦属九江郡地漢為宜春縣属豫章郡後漢因之呉立安成郡領宜春等六縣晋属江州又避太后諱改宜春為宜陽縣隋廢安成郡置袁州因袁山以為名唐改宜春郡復為袁州皇朝因之今領縣四治宜春事要郡名宜春見沿革注宜陽同上注風俗土俗愿樸汪聖錫序宜春云云並蒙珥筆之名因傅氏求詩作数句為邦人洗之曰只今頭上半儒冠誰肯公庭弄筆端試問毛錐將底用奪標他日萬人㸔細民險而健黄魯直江西道院賦序云云士夫秀而文薄義而喜争曽子固分宜縣雲峯記云分宜人勤生而嗇施云云其土俗然也長少族坐里閭相講語以法律意向少戾則相告訐結黨詐張事關節以勤視聽甚者刻畫金木為章印摹文書以紿吏立縣庭下變偽一日千出雖鞭朴徒死交跡不以属心其喜爭訟豈比他州縣哉民雖勤而習如是漸涵入􅇧髓故賢令長佐使比肩常病其未易洽而教使移也士力學知亷恥阮閎無訟堂記丨丨而丨丨丨民樂耕而好儉嗇形勝州小地狹韓愈謝表丨丨丨丨賦税及時民安吏循閭里無事微臣惟當布陛下維新之澤守國家承平之規勸以農桑使無怠惰山水秀䴡寰宇志湘閩孔道郡志曰云云山川袁山在州東北五里郡志昔有髙士丨京居之故名仰山在州南八十里為州之鎮山周囬一千里髙聳萬􅌇不可登陟只可仰觀以此得名有寺曰太平興國寺及二神廟舊傳二神捐地與小釋迦結菴于此山有水分流㑹于正祠胡致隆詩山下清泉迸石流山後松竹自春秋猿吟古寺偏深處雲集諸峯最上頭一老有靈飛窣堵二神無語瑣寒湫諸天更在藤蘿外欲到峯前恨未由鍾山在分宜縣東十里水中有大丨其銘秦時所造因名王孚記其山臨水兩岸湍洑有沙如米若一岸沙湧則其方豐穰謝山在萬載北七十里因丨康樂封邑得名謝真君上昇之地丹灶存焉毛仙山在萍鄉縣東二十三里方輿記昔人行過此逄一人徧身有毛自云姓毛異于凡人後不見因以為名羅霄山在萍鄉縣東六十里有石孔大旱祠之以大木長三四丈投井即雨水溢木湧出而止盤龍山在州南五十里自大路至山頂三十六曲楊岐山在萍鄉縣北七十里世傳丨朱泣丨之所羊腸峯在州東十里龍成巖在州西五里唐李衛公嘗讀書于此後因為祠頂有浮圖其西建妙峯亭盡登臨勝處震山巖在州西有弋林乃盧氏隱居石乳洞在州東三十里滴乳成佛像教授鄭王賓記其事洪陽洞在州西四五里有石室七十二間及晋宋人留題神仙傳葛洪婁陽二仙所居裏大洞在萍鄉縣南三十里兩洞相接可客千人建炎初巨㓂張成叛人于此避㓂縣北有石陂洞石筍在萬載北二十里南唐鍾傳所居東湖在丨城之外九曲水在州城南五里縈迴二十里宜春水在縣西五里宜釀酒王烈記丨丨醇酎隨歳入貢雷塘在州東北七里方三頃昌黎有丨丨祈雨文釣渚在震山岩乃彭氏隱居西陂在州丨四十里唐刺史李將順决丨入城以通航舡時人謂之李渠學校州學唐天寶五載太守房琯始立夫子廟于城北門外五十歩國朝皇祐五年郡守祖無擇以舊居陿隘乃改營于州治之東今學是也學成旰江李㤗伯為記京兆章友直額河東桞淇書世號三絶熈豐間第天下學記以袁為冠盱江李泰伯記皇帝二十有三年制詔丨縣立丨惟時守令有哲有愚有屈力單慮祇順德意有假宫僣師茍具文書或連数歳亾弦誦聲倡而不和教尼不行三十有二年范陽祖君無擇知袁州始至進諸生知學官闕狀大懼人才放失儒效闊踈無以稱上意有通判潁川陳君侁聞而是之議以克合相舊夫子廟陿隘不足改為乃營治之東厥土燥剛厥位靣陽厥材孔良瓦甓黝堊丹漆舉以法故殿堂室房廡門各得其度生徒有舍庖廩有次百爾器備並手偕作工善吏勤晨夜展力越明年成舍菜且有日旴江李覯諗于衆曰惟四代之學考諸經可見已秦以山西鏖六國欲帝萬世劉氏一呼而闗門不守武夫健將賣䧏恐後何耶詩書之道廢人惟見利而不聞義焉耳孝武乘豐富世祖出戎行皆孳孳學術俗化之厚延于靈獻今代遭聖神爾袁得賢君俾爾由庠序跡古人之迹天下治則譚禮樂以陶吾民一有不幸當伏死大節為臣死忠為子死孝使人有所頼且有所法是惟朝家教學之意若其弄筆以邀利逹而已豈惟二三子之羞亦為國者之憂齋閣四益齋在郡齋張杓刻魏公所書丨丨碑隱齋在郡治太守張杓建南軒張敬夫命名仍為作記云盖取孟子惻丨之義朱元晦詩大專槃萬生異體實同氣云胡分彼此直以私自蔽君家桂林伯德學妙一世閉户不忘憂簮纓矧行義眷言介弟賢四益謹先畀千里各分符一心同盡瘁逺題齋户册來表棲息地系述冩心胷俯仰資惕厲陽嘉既滌蕩陰慝失封閉介然彼疴癢赫若我黥劓拊摩極哀恫征取敢亾藝戰兢一日力洋溢四封被君看物我間隠顯豈殊致願反振民功更懋根本計云栖霞閣在城内髙真觀王定國詩眷漬苔紋㳂石塔月含松韻雜琴聲潺潺閣在仰山廟右廡下娄乾德詩一𣲖丨丨繞檻清塵襟洗滌自凉生夜深好夣纔驚破疑是半天風雨聲亭䑓介亭南東湖之南廣漢張公杓知州事南軒先生栻過之為書東湖扁榜且易盧石堂為丨丨仍題榜側云丨丨之石本盧肇家故物也挺然特立望之有汲黯在朝之氣象予既取豫卦六二之義以題其亭并告來者紅陰亭在倅㕔王冀公布衣時作記今猶存宜春臺在郡城劉隆題詩云風送江聲穿郡閣日推雲影下峯巒館驛毛山驛在萍鄉縣朱元晦書驛壁人言毛女住青冥散髪吹簫夜夜聲却是郵僮解端的向儂説道野狐精佛寺蟠龍寺在宜春之丨丨山湍瀑飛㵼盖勝境也五峯寺黄魯直送宻老住丨丨詩我行髙安過萍鄉七十二度遶羊腸水邉林下逄衲子東西南北古道場五峯秀出雲雨上中有寳坊如側掌去與青山作主人不負法昌老禪將祠廟昌黎廟在州治東三十歩祖無擇剏仰山廟故老相傳昔有邑人徐潘再至大孤山見一人稱蕭大分一人稱蕭陸云居宜春丨丨石橋與同載而歸至浦東告别而去期後至石橋相尋後潘見二龍于此㑹昌三年洪水推山忽平髙就下出由丨丨移丨于文明鄉去城三十里古跡龍鱗木在萍郷縣東本檀香木客有用錢六十緍市其木將伐之其木夜生丨丨不敢伐至今猶存羅漢松在萍鄉縣寶積寺有黄山谷手植丨丨丨士夫題詠者甚多名宦謝靈運封安樂侯今萬載縣是也房琯為守韓愈元和貶潮州刺史又改袁州詩云北望距令隨塞鴈南遷纔免塟江魚李德裕為長史皇朝祖無擇知州李㤗伯入學講説建韓公祠修鄭都官墓張希賢范延貴者為殿直押兵過金陵張忠定公為守因問曰天使沿路來還曽見好官員延貴曰昨過袁州萍鄉縣邑宰丨丨丨著作雖不識之知其好官員也忠定曰何以知之延貴曰自入萍鄉境驛傳橋道皆葺治田萊墾闢野無惰農及至邑則􅆵肆無賭博市易不敢喧爭夜宿邸中聞更鼓分明以是知其必善政也忠定大笑曰希賢固善矣天使亦好官員也即日同薦于朝黄大臨山谷之兄宰萍鄉山谷來省焉孫逄吉宰萍鄉後為吏書謝諤新喻人為分宜宰後為禮書張杓自左司為守人物陳重漢丨丨宜春人與同郡雷義為友曰膠漆自謂堅不如雷與陳盧肇宜春人李德裕為宜春長史嘉肇文行及肇薦送而德裕為太尉曰喜今榜已得狀元肇詩喚道是龍君不信果然奪得錦袍歸易重㑹昌五年狀元時内庭再考復中魁選寄宜春弟詩云一春攀折兩重枝鄭谷五代史補云谷在袁州與僧齊已俱有詩名齊已賦早梅詩曰前村深雪裏昨夜􅂾枝開谷見之曰􅂾枝非早也不若一枝自是遂呼為一字師名賢鄒浩責監袁州酒稅陳瓘除名安置袁州題詠江山多勝逰韓愈送上涯詩莫以宜春逺云云宜春城郭繞楼臺王介甫送袁守曹伯玉詩云云想見登臨把一盃濕濕嶺雲生竹菌冥冥江雨熟楊梅政成定入邦人詠詩就還隨驛使來錯落風沙侵病眼不知何日為君開公移猥甚叢生笋黄山谷寄袁守廖獻卿詩云云訟牒紛如蜜分窠幸得曲肱成夢蝶不堪衙吏報鳴鼉已荒里社田園了可奈春風桃李何想見宜春賢太守無書來問病維摩袁州司法多兼局黄山谷用韻和袁州劉司法詩云云日暮來歸印幾窠詩罷春風榮草木書成快劒斫蛟鼉遥知吏隱情如此應問卿曺果是何頗憶病餘居士否在家無意食羅摩四六陞華奎閣出守春臺郡方開府人已登臺接衡湘之奥壤有韓謝之遺風土風甚朴虚存弄筆之名郡望頗髙寔有把麾之樂訟牒紛如黄山谷形于紀詠土風朴甚汪端明與之解嘲李㤗伯州學之記孰擬斯文朱文公隱齋之詩克施有政雖康樂賜履之鄉難尋遺迹然昌黎分符之地蔚有流風土風頗盛實循盧肇之髙蹤稼穡盈疇閭里相安于無事里俗相安尚有昌黎之遺化旌旗小隊江山宜訪于勝遊宜春多勝盖具見韓昌黎之詩爾袁得賢亦足考李㤗伯之記有新澤勸農桑請驗昌黎之表得賢君游庠序自有㤗伯之文方輿勝覽卷十九
