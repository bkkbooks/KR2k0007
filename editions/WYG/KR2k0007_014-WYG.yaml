body:
  text: 方輿勝覽卷十四宋祝穆撰江東路建康府上元溧水江寧溧陽句容建置㳂革禹貢揚州之域吳地斗分星紀之次春秋屬吳戰國屬越後屬楚初置金陵邑秦改曰秣陵屬鄣郡漢改鄣郡為丹陽郡吳大帝自京口徙此因改為建業晉武帝改為秣陵又分秣陵北為建業改業為鄴後避愍帝諱改為建康東晉元帝渡江復都焉又為丹陽郡宋齊梁陳因之隋廢郡更於石頭城置蔣州唐為揚州置江寧為潤州屬縣後改為􅂌州偽吳改為江寜府國朝尅復為昇州仁宗以昇王建國復陞江寧府建康軍節度六飛駐蹕詔改建康府建行都紹興八年移蹕錢塘置行宫留守司今統郡八領縣五治上元江寧淮東總領江東轉運置司事要郡名陪都見文選吳都賦建康志序坐鎮江淮以為丨丨金陵楚威以其地有王氣埋金鎮之故曰丨丨或曰以其地接華陽金壇之陵勝盱江曾極百詠詩丨丨云鑿池破除函谷帝埋金厭郢中王興亡總不闗君事五百年前枉斷腸秣陵詳見秦淮注建業見㳂革注白下在上元縣西北十四里唐武德移江寜於此故名丨丨王介甫贈上元宰詩云丨丨有賢宰能詩如紫芝風俗衣冠萃止通典永嘉以後云云藝文儒術為盛同上云云有顔謝徐庾之風有風㠶海舶之饒胡安定云三吳為東門荆蜀為西戸丨七閩二廣丨丨丨丨丨丨為南府形勝西以峨嵋為壁壘唐李白為宋中丞請都金陵表云云東以滄海為溝池守海陵之倉獵長洲之苑南以長淮為伊洛藝文類聚丹陽尹序東以赤山為城臯云云北以鍾山為曲阜西以大江為黄河北據大江胡安定文集云云外阻長淮内控湖海繫年録衞膚敏言外運江淮云云為東南要㑹之地長江天塹陳孔範曰云云豈能飛渡耶金陵天險繫年録劉珏云云前據大江可以固守龍蟠虎踞諸葛亮謂呉大帝曰鍾阜龍蟠石城虎踞真帝王所都也黄旗紫葢司馬德操與徐恭嗣書丨丨丨丨運在東南戰艦所聚通監梁徐温以金陵形勝云云經營四方之根本王導曰金陵帝宅孫仲謀劉𤣥德皆言欲經營四方者未嘗不以此為根本憤言行録張德逺謂人主居此則北望中原常惕不敢暇逸實王者之都衞敷敏云建康倚山𢃄江云云可以控扼險阻以建不拔之基山川鍾山在上元縣東北十八里尉輿地志古曰金陵山縣名因此又名蔣山漢末秣陵蔣子文討賊死事於此呉大帝為立廟子文祖諱鍾因改曰蔣山此山本無草木東晉時刺史還任者栽松三千株下至郡守各有差一名北山齊周顒隠於此丈王介甫丨丨詩偶向松閒覔舊題野人休誦北山移夫出處非無意猿鶴從来自不知小雨輕風落棟花細紅如雪㸃平沙槿籬竹屋江村路時見宜城賣酒家投老歸来供奉班塵埃無復見鍾山何須更待黄梁熟始信人間是夢間樂蒼藤翠木江南山激激流水兩山間山髙水深魚鳥車馬迹絶人長閒雲埋樵聲隔葱蒨月弄釣影臨潺湲黄塵滿眼衣可濯夢寐惆悵何時還東山在上元縣南三十里丹陽記晉太傅謝安舊隠㑹稽丨丨築此擬之無巖石又名土山王介甫詩定林瞰土山近乃在眉睫攝山在城東北四十五里有齊文惠太子鑿石為佛見存江乘地記村有草可以攝生故名陳軒有丨丨十詠曾極詩詠一丈唐碑今露立十尋梵塔已低摧層層石佛雲間出坐閱齊梁成刼灰三山在上元縣西南四十五里京謝𤣥暉晚登三山還望京邑詩㶚溪望長安河陽視縣白日麗飛甍參差皆可見餘霞散成綺澄江靜如練喧鳥覆春洲雜英滿芳甸去矣方滯滛懐哉罷歡宴佳期悵何許淚下如流霰有情知望鄉誰能鬒不變方山葛𤣥煉丹之地虚曽極百詠人間㡳事有方壺劔截青瑶界碧試上殊庭瞻醉葛仙雲垂帶䕶儲胥湯山在溧水縣東北五十里其山不甚髙有湯泉大小六處鳳臺山在城南二里餘保寜寺是也宋元嘉中鳯凰集於是山乃築臺山以旌嘉瑞唐李白詩置酒延落星金陵鳳凰臺長波冩萬古心與雲俱開昔時有鳯凰鳯凰為誰来鳳凰去已久正當今日回明君越羲軒天老坐三台豪士無所用彈琴醉金罍東風吹山花安可不盡杯六帝没幽草深宫冥緑苔置酒勿復道歌鐘但相催宋齊丘詩磋峨壓洪泉岝客撑碧落宜哉秦始皇石駈炙不鑿上有布政臺八顧皆城郭山蹙龍虎健水墨螭唇作白虹欲吞人赤驥相􅏼燦畫棟泥金碧石路盤墝埆倒挂哭月猿危蛇立思天鶴鑿池養蛟龍栽桐棲鸑鷟梁間燕教雛石罅懸殻養花如養賢去草如去恶日晚嚴城鼓風来蕭寺鐸掃地駈塵埃剪蒿除鳥雀金桃帶葉摘緑李和衣嚼貞竹無盛衰媚柳先摇落塵飛景陽井草合臨春閣芙蓉如佳人迴首似調謔當軒有直道無人肯駐脚夜半鼠勃􅌥灭隂鬼敲㧻松孤不易立石醜難安著自憐啄木鳥去蠧終不錯晚風吹梧桐樹頭鳴嚗嚗峩峩江令石青苔何淡薄不話興亡事舉首思眇邈吁哉未到此我褊劣同尺蠖龍鶴羡鳬毛猛虎愛蝸角一日賢太守與觀槖籥徃徃獨自語天帝相唯喏風雲偶不来寰宇銷一畧我欲烹長鯨四海為鼎鑊我欲取大鵬天地為増繳安得生羽翰雄飛上寥廓牛頭山在上元縣南四十里兩峯如闕幕府山在郡西二十五里晉琅琊王初渡江丞相王導建幕府於其上三茅山在句容縣南五十里君山記云漢時有三茅各乘一鶴来此故名焉秦始皇聞民一冇謡曰神仙得者茅初成駕龍上界入太清時下三洲􅃧赤城繼世而往在我盈於是有尋仙之意後有茅盈茅固茅哀即三茅君也大茅山𤣥帝命東海神埋大銅鼎於上有盤石鎮之秦始皇命李斯篆壁文道王介甫登大茅山頂詩一峯高出衆山顛擬隔塵沙里千俯視烟雲来不極仰攀蘿蔦去無前人間已換嘉平帝地下誰通句曲天陳迹是非今草莽紛紛流落尚師仙中茅山司命真君埋玉門丹砂以鎮之石上有徐鍇篆字王介甫詩云百年風雨草苔昏尚有當年寶墨存祇恐終隨嶧碑盡西風吹燒滿秋原中王介甫小茅山詩捫蘿路到半天窮下視茅州杳靄物外真逰来几席人間榮願付苓通白雲坐處龍池杳明月歸時鶴馭空四首三君誰更似子房家世有高風覆舟山在城北五里晉北郊壇宋藥園壘樂遊苑冰井甘露亭皆在此山極詩六代興亡貉一丘繁華夢逐水東流操蛇神曽三百年向山前笑来幾覆舟樂官山南唐初下時諸將置酒樂人大慟殺之聚瘞此山故名曾極詩城破轅門宴賞頻伶倫執樂淚横巾駢頭就戮縁家國愧死南歸結綬人天門山又號東西梁山詳見太平川建曽極詩鯨翻鰲負倚江潭天險由来客倦談高屋瓴無計取二梁剛把當殽函雞籠山寰宇記在城西北九里宋雷次宗居此元嘉中改曰龍山以黑龍常現於真武湖此山臨湖上千佛嶺在攝山棲霞寺之側按江總棲霞寺碑明僧紹居士子仲􅟴為臨沂令於西峯石壁與度禪師䥴造無量夀佛嶺之中道有沈𫝊師徐鉉張稚圭王雱題名西原曽極詩衰草寒雲雁一行牽愁水似九廻腸逰人欲問千官事翁仲無言卧夕陽龍洞在清凉寺前平曽極詩江流遠引皆烟嵐陸何年重舉帆斷岸插天危欲墜六朝龍去祇空巖段石岡在上元縣南三十里丹陽記云有大碣石長二丈折為三段紀呉功德其文東觀令華覈作其字大篆或又六皇象書也梅聖俞詩云岡頭雖斷石文字未全訛年算赤烏逺書疑皇象多鍾阜在縣東北周回六十里之南史宋散騎常侍劉勔經始鍾嶺南以為棲息又雷次宗元嘉中文帝為築室於此山又陳後主與張機遊是山嘗以松枝代麈尾故梅摯詩有千松麈尾之句三巖石在臺城内千福禪院本梁同泰寺有小石池言是陳時景陽井今有古石井欄其上有刻字惟戒哉二字可辨三品石曽極詩一士真能重本朝中原勍敵是天驕無情石却登三品不念忠賢屈下僚鍾山石此山有石脉理皆紅潤殷曽極詩戰血潛流石脉中蒼崖鑿斷見紅千年殺氣方回薄草木無春山盡童梁金華宫石蕭梁故基在青溪旁石今在府治曽極詩云照影青溪眩耀竒推遷十代市朝非莫欺蘚眼蒼苔面曽見昭明識蔡妃大江魏文帝出廣陵望丨丨曰嗟乎此天所以限南北也得曽極詩刀兵嵗嵗涉江干將帥誅求盍少寛未三軍如挾纊憑誰數處䕶風寒秦淮在縣南三里始皇時望氣者言金陵有天子氣使朱衣鑿山為凟以斷地脉改金陵為秣陵晉陽秋秦開故曰丨丨或云淮水發源屈曲不類人工知杜牧詩烟籠寒水月籠沙夜泊丨丨賣酒家商女不亡國恨隔江猶唱後庭花石曽極詩鑿斷山根役萬人祖龍癡絶更東廵城幾度更新主嬴得淮流尚繫秦元武湖在上元縣北十里宋元嘉間有黒龍見故名今為後軍寨唐李義山詩丨丨丨中玉漏催雞鳴埭口繡襦廻誰言瓊樹朝朝見不及全蓮步歩来馬曽極詩當日湖光澈鐃心龍旗風吹此登臨而今鐵迴旋地斜照黄塵一尺深丹陽湖在溧水縣西南二十八里四太子河曾極詩上東門嘯本同科天誘金人智詐多刀斗夜鳴兵四合五更平陸已成河青溪宋都記鼎族多居其側建康志吴大帝鑿通城北塹以洩𤣥武湖水發源於鍾山接於秦淮及楊􅄎城金陵丨丨始分為二在城外者自城濠合於淮在城内者湮塞僅存新林浦去城二十里永謝眺之宣城出丨丨丨詩云江路西南歸流東北鶩天際識歸舟雲中辨江樹旅思倦摇摇孤遊昔已屢既懽懷禄情復協滄洲趣囂塵自兹隔賞心於此遇雖無𤣥豹姿終隠南山霧西浦張碩遇杜蘭香處粧曽極詩珠璫錯落江臯佩羅韈輕盈洛浦欲採蘋花擲春信停梳難覔杜蘭香桃葉渡一名南浦渡之金陵覽古在秦淮口桃葉者晉王獻愛妾名也獻之詩云桃葉復桃葉渡江不用楫但渡無所苦我自迎接汝渡不用楫者謂横波急也獻之歌此送之曾景建裙腰芳草抱長堤南浦年年怨别離水送横波山斂翠一如桃葉渡江時采石渡事見揮麈前録及談苑塵曽景建石琢浮屠遍水濵興亡嵗久已成長江靜夜蘆花月莫信牽愁撥棹人五馬渡晉元帝渡江童謡云丨丨丨江一化龍識者謂呉越之地當興王曽景建仲逹欺孤與操同豈能長世撫提封瑶圖暗换君知否班特浮江自化龍白鷺洲丹陽記在江中心南邉新林浦西邊丨丨丨上多白鷺故名圍曽景建江水悠悠緑染衣淮山渺渺翠成南朝鷺序歸何處惟見滄洲白鷺飛蔡洲在上元縣西二十五里元和志宋高祖於此擒盧循黄天蕩曾景建受金縱敵將何知曹沬功名失此時鴈足不来貔虎散沙頭蚌鷸謾相持三十六陂曾景建渺然丨丨丨丨春石黛潮生嵗嵗新楊柳杏花渾好在吟邉只欠跨驢人覆盃池在城北三里一名西池因晉元帝頗以酒廢政王導諌帝丨丨於此丨落义池在誌公塔之東悟真庵前舊傳迦毗羅神隋梵僧密多至此與神交戰丨丨於此丨横塘金陵覽古樓江口㳂淮築池謂之丨丨詩呉都賦曰丨丨查下臺之盛天下莫比李白人言丨丨好我言横江惡一風三日吹倒山白浪髙於瓦棺閣潮溝金陵覽古呉大帝以引潮抵於秦淮霹靂溝建康志在城西五里騎王介甫詩丨丨丨西路柴荆四五家憶曽欵段隨意入桃花直瀆呉後主孫皓所開楊修詩注云瀆在幕府山東北長十四里濶五丈深二丈初開之時晝穿夜復自塞經年不就傷足役夫卧其側夜見鬼物来填因嘆曰何不以布囊盛土棄之江中使吾徒免殫力於此傷者異之曉白有司如其言乃成瀆道直故名丨丨北征記吳將甘寧墓在此俗云墓有王氣孫皓恶之乃鑿其後為直瀆孫盛晉春秋云方山有丨丨甫唐人詩雲開丨丨三千里青葢何曽到洛陽王介詩山蟠丨丨輸淮口水挹長干轉石頭井泉臙脂井曽景建寒泉玉甃没春蕪石染丨丨丨不枯杏怨桃紅嬌欲墮猶將紅淚灑黄奴寳公井在市心苔曾景建一片當街百尺深行人環轍免侵塵容俗狀暫窺影欲汲寒泉洗此心湯泉在上元縣東六十里行宫大内即舊