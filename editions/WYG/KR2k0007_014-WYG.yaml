武帝九月九日宴羣臣於孫陵岡即此也去城南十五里王介甫詩九日無歡可得追飄然隨意歴山陂蔣陵西曲風烟澹也有黄花一兩枝華隠樓即陶隠居宅㸔曽極詩松聲聽罷獨雲丨丨丨中控鶴身治國神方難自獻祇將本草語時人華林園曽極詩羽葆来臨鼓吹停華林暢飲倒長瓶萬年天子瞢騰眼錯認長星作酒星養種園後主於宫中作紅羅亭賞紅梅韓熈載獻詞云桃李不須誇爛熳已輸了春風一半林曽極詩百花堂裏賞芳菲江左覊臣淚濺衣腸斷上桃李樹春風一半未全歸樂遊苑在覆舟山南宋文帝楔飲於丨丨丨㑹者賦詩顔延之為序潑墨池在茅山費長房學道處圖經云石墨池葢大小二酉山藏異書見穆天子傳唐人穴石為硯注道德經見隠逸傳曽極詩二酉珍儲已徧窺仙班寧肯列愚癡注經穴石須勤苦留得千年丨丨丨商飈館即九月臺也地産胭脂菊曾曽極詩商飈基在昔人非草木猶為富貴移是六朝歌舞地黄花一半染胭脂夢筆驛曾極詩晉尚清談筆力衰文章髙下亦隨時景純不作文通死五色毛錐付與誰蛇盤驛曽極詩枳籬華屋半雕殘列肆屠羊客缷鞍霸氣銷沉形勝歇龍盤何事作蛇盤朱雀橋晉孝武建朱雀門上有兩銅雀故橋亦以此得名去烏衣巷不遠朱雀航在城東南四里至王敦作亂温嶠燒絶是始用杜預河橋法作之邀笛歩舊名蕭家渡在城東南青溪橋之古今上水闡是也晉書云桓伊善樂盡一時之妙為江左第一有蔡邕柯亭笛常自吹之王徽之赴召京師泊舟青溪側伊素與徽之不相識令人諭之曰聞君善吹笛為我一奏徽便下車據胡床為作三弄畢便上車去客主不交一言故名天水碧南唐末時前數年宫人挼薔薇水染生帛一夕忘收為濃露所漬色倍鮮翠因令染坊染必經宿露之號為丨丨丨宫中競效之識者以為天水趙之望也彎碕吳都賦左稱丨丨右號臨硎閽闥名也王介甫詩殘暑安所適丨丨北窓北伐翳作清曠培芳衞岑寂射雉場曽極詩不整軍容北射狐却資媒翳取歡娱山梁飲啄闗何事浪費君王金僕姑陸機宅圖經云在縣南五里秦淮之側有二陸讀書堂在焉王李白題王處士水亭云齊朝南苑是丨丨丨其詩云子躭𤣥言賢豪多在門好鵝尋道士愛竹嘯名園樹色老荒苑池光蕩華軒北堂見明月更憶陸平原掃地清玉簟為余置金樽醉罷欲歸去花枝宿鳥喧何時復来此再得洗囂煩江令宅陳尚書令江總宅也建康實録云南朝鼎族多夾青溪丨丨丨尤占勝地後主嘗幸其宅竹劉禹錫詩南朝詞臣北朝客歸来惟見秦淮碧池臺樹三畝餘至今人道江家宅今城東段大夫之宅正臨青溪即其地也居南史尚書令沈約陳起部尚書孫瑒皆青溪呉隠之宅在縣東南五里屋隠之罷廣州刺史並無還資籬垣仄陋妻子寒露茒六間女嫁謝安移㕑助之使人至日髙蕭然乃令其婢牽一犬入市賣其清操如此烏衣巷在秦淮南去朱雀橋不遠晉紀瞻立宅丨丨丨王導自卜烏衣宅靈南史謝宻傳叔父琨風格髙亢少所受納唯與從子運瞻晦等並以文義賞晏居住丨丨丨其外雖髙流時譽莫敢造門王劉禹錫詩朱雀橋邉野草花丨丨丨口夕陽斜舊時謝堂前燕飛入尋常百姓家楊歸叟詩話丹陽陳輔毎嵗清明過金陵謁湖隂先生德逢清談終日元豐癸亥訪之不遇因題一詩於壁云北山楊柳未飄花白下風輕麥脚斜身似舊時王謝燕一年一度到君家湖隂吟賞王介甫笑曰此王指君為尋常百姓家耳湖隂亦大笑舟異聞小説唐王榭居金陵以航海為業一日海風飄破榭獨附一板扺一洲驀見翁嫗皆皂服揖榭曰吾主人郎也何由至此榭以實對乃引至其家住月餘又引見王翁曰某有小女年方十七此主人家所生也欲以奉君乃擇日備禮成婚因訪其國曰烏衣國也女忽墮淚曰恐不久暌别王果遣人謂榭曰君某日當回命取飛雲軒来令榭入其中戒以閉目不爾即墮大海榭如其言但聞風聲濤響既久開目已至其家四顧無人惟梁上有雙燕呢喃乃悟所至葢燕子國也後人因目榭所居為烏衣巷云居曾極詩吳兵曾駐黒雲都江左夷吾此卜休把烏衣輕馬巷懸鶉結駟總丘墟馬糞巷王氏别族居之鍾山番人窟曽極詩單于結隊逺来侵鋻穴丨丨用意深天塹連空遮不斷烽烟且到海中心名宦王導賔禮顧榮賀循庾亮修石頭城鮑昭宋人為秣陵令顔真卿為刺史皇朝張詠為守王安石自知制誥知州後除翰林又以觀文知州復拜平章又以使相拜鎮爐有郡齋詩談經投老􅂸悠悠為吏文書了即休深炷香閉髙閣卧聽簷雨㵼髙秋心事悠悠只自知强顔於世轉參差移床獨向秋風裏卧㸔蜘蛛結綢絲吕頤浩為大使張浚為大使號紫岩先生吕䝉正作倅蘇頌知江寧縣程顥主上元簿日始茅山有龍蛇其形如蜥蜴而五色祥符間中使取二龍至中途忽奏一龍飛空而去自昔嚴奉以為神物公捕而脯之使人不惑朱文公作祠記云邑有上元者先生少日官逰之處也考之書記圴田塞隄及民之政為多脯龍折竿教民之意亦備陳俊卿再任張孝祥為帥人物陶𢎞景秣陵人讀書萬卷掛冠神武門隠於句曲山時人謂之山中宰相紀瞻秣陵人石勒入冦元帝以為都督勒退帝稱為社稷臣周顒字彦倫隠北山後應詔為海鹽令欲過北山孔稚圭假山神之意作文以却之曰鍾山之英草堂之靈馳烟驛路勒移山庭夫以耿介拔俗之標瀟灑出塵之想度白雪以方潔干青雲而直上吾方知之矣若其亭亭物表皎皎霞外芥千金而不盻屣萬乘其如脱聞鳯吹於洛浦值薪歌於延瀬固亦有馬豈有終始參差蒼黄翻覆淚翟子之悲慟朱公之哭乍迴跡以心染或先貞而後黷何其謬哉嗚呼尚生不存仲氏既往山阿寥寥千載誰賞世有周子儁俗之士既文既博亦元亦史然而學道東魯顔圔習隠南郭竊吹草堂濫巾北嶽誘我松桂欺我雲壑雖假容於江臯乃纓情於好爵其始至也將欲俳巢父拉許由倣百氏蔑王侯風情張日霜氣横秋或歎幽人長往或怨王孫不逰談空空於釋部覈𤣥𤣥於道流務光何足比涓子不能儔及其鳴騶入谷鶴書赴隴形馳魄散志變神動爾乃眉軒席次袂聳筵上焚芰製而裂荷衣抗塵容而走俗狀風雲凄其帶憤石泉咽而下愴望林巒而有失顧草木而如䘮至其紐金章綰墨綬跨屬城之雄冠百里之首張英風於海甸馳妙譽於浙右道帙長擯法筵久埋敲扑喧囂犯其慮牒訴倥偬裝其懷琴歌既斷酒賦無續常綢繆於結課每紛綸於折獄籠張趙於往圖架卓魯於前籙希蹤三輔豪馳聲九州牧使我髙霞孤映明月獨舉青松落䕃白雲誰侣磵户催絶無與歸石徑荒凉徒延佇至於還飈入幕冩霧出楹蕙帳空兮夜鶴怨山人去兮曉猿吟昔聞投簪遺海㟁今見解蘭縳塵纓於是南嶽獻嘲北隴騰笑列壑爭譏攅峯竦誚慨遊子之我欺悲無人以赴弔故其林慚無盡磵愧不歇秋桂遣風春蘿罷月騁西山之逸議馳東臯之素謁今又促裝下邑浪拽上京雖情投於魏闕或假歩於山扄豈可使芳杜厚顔薜荔無耻碧嶺再辱丹崖重滓塵遊躅於黄路汙緑池以先耳冝扄岫幌掩雲闗歛輕霧藏鳴湍截来轅於谷口杜妄轡於郊端於是叢條瞋膽疊穎怒魄或飛柯以折輪乍低枝而埽迹請迴俗士駕為君謝逋客名賢李白嘗於城西孫楚酒樓翫月乘醉著紫綺裘烏紗巾與酒客棹歌秦淮往石頭訪崔侍御題詠江南佳麗地謝元暉鼓吹曲云云金陵帝王州逶迤帶綠水迢遞起朱樓飛甍夾馳道垂楊䕃御溝凝笳翼高葢疊鼓送華輈獻納雲臺表功名良可收金波麗鳷鵲謝元暉夜發新林至京邑贈西府同僚詩大江流日夜客心悲未央徒念闗山近終知返路長秋河曙耿耿寒渚夜蒼蒼引顧見京室宫雉正相望云云玉繩低建章驅車鼎門外思見昭丘陽馳暉不不可接何况隔兩郷風雲有鳥路江漢恨無梁常恐鷹隼擊時菊委嚴霜寄言罻羅者寥廓已髙翔山為龍虎蟠李白詩晉家南渡日此地舊長安地即帝王宅云云金陵空壯觀天塹淨波瀾醉客迴橈去吳歌且自歡巨海一邉靜李白贈昇州王使君詩六代帝王國三吳佳麗城賢人當重寄天子惜髙名云云長江萬里清應須救趙䇿未肯葉侯嬴禮樂秀羣英李白别金陵諸公作詩云至今秦淮間云云地扇鄒魯學詩騰顔謝名雁入石頭城曹松秋日送方干遊上元詩天髙淮泗白料子趣修程汲水疑山動揚帆覺岸行雲離京口樹云云後夜分遥念諸峯霧露生石頭巉巖如虎踞李白金陵歌云云凌波欲過滄江去鍾山龍蟠走勢来秀色横分歴陽樹四七餘帝三百秋功名事迹隨東流白馬小兒誰家子泰清之嵗来闗囚金陵昔時何壯哉席卷英豪天下来冠葢散為烟霧盡金輿玉座成寒灰扣劔悲吟空咄嗟梁陳白骨亂如麻天子龍沉景陽井誰歌王樹後庭花此地傷心不能道目下離離長春草送爾長江萬里心他年来訪南山皓千尋鐵鎻沉江底劉禹錫金陵懷古詩王濬樓船下益州金陵王氣黯然收云云一片降幡出石頭人事幾回傷往事山形依舊枕寒流今逢四海為家日故壘蕭蕭蘆荻秋禾黍髙低六代宫杜牧金陵懷古詩玉樹歌殘王氣終景陽兵合戍樓空松楸逺近千官塜云云石燕拂雲晴亦雨江豚吹浪夜還風英雄一去豪華盡惟有青山似洛中只縁一曲後庭花劉禹錫詩黍城六代競豪華結綺臨春事最奢萬戸千門成野草云云祇有青山繞建康蘇子瞻詩江令蒼苔圍故宅謝家語燕集華堂先生笑説冮南事云云東府舊基留佛刹王介甫金陵懷古霸祖孤身取二江子孫多以百城降豪華盡出成功復逸樂安知與禍雙云云後庭餘唱落船窓黍離麥秀從来事且置興亡共酒缸山水雄豪空復在天兵南下此橋江敵國當時指顧降云云君王神武自難雙留連落日頻回首想像餘墟獨倚窓却怪夏陽纔一葦漢家何事費􅎆缸山水寂寥埋王氣地勢東回萬里江雲間天闕古来雙兵纒四海英雄得聖出中原次第降云云風烟蕭颯滿僧窓廢陵瓌塚空冠劔誰復沾纓醉一缸紫氣空收劔一雙憶昨天兵下蜀江將軍談笑士爭降黄旗已盡年三百云云破堞自生新樹木廢宫誰識舊軒窓不須搔背尋遺事且倒花前白玉缸以上並王介甫詩萬事朝雲隨逝水劉貢父和韵虎踞羣山龍繞江為誰興國為誰降髙臺麋鹿㸔無數廢沼鳬鷖去自雙云云百年西日過虚窓白門酒羙東風快笑數英雄盡一缸亟傳單騎馘王雙樓船兩下勢横江元帥旌旗就約降旋報前師覆張悌云云燕焚正自當烟突蟻潰何堪值水窓酒千缸回首三軍歡奏凱萬牛行肉浩唱庭花倒玉缸楚貢来時詭問江漢收羣䇿士心降一言已重黄金百再見仍䝉白璧雙狎客脱身裹馬革老儒投筆謝書窓豈知三閣酣詩酒云云潮聲半夜来寒渚頽垣落水半平江喬木呼風不易降耕出珠璣時得一道逢麟鳳不成雙云云月色深秋照舊窓唯有魚鹽城下市巢烏相望集瓶缸前人雜題展上公髙辛時人居王李溪杲曽極詩浩刼循環無始終年年王李春空初成未占兹山頂古老惟傳丨丨丨川東晉曾景建斷簡殘編迹可尋諸賢興復不闗心末應全罪王夷甫一任神州自陸沉漁父後主召一隠者問近曽作何詩云有丨丨詩風雨揭却屋全家醉不知曽極詩智士旁觀當局迷滄浪釣叟出陳詩江頭風怒掀漁屋底事全家醉不知昇元閣鐸石柱二見屹立右軍教場中復曾景建摩挲石柱鮮痕班亡國如鴻去不還無切雲三百尺祇傳風鐸在人間孫陵鵝眼錢曽景建六代初終幾變遷孫陵無樹起寒烟青蚨細薄如榆莢猶是當年買笑錢澄心堂紙曾極詩禇生王面務深藏未肯横陳翰墨埸一幅金牋何用許價髙縁冩宋文章德慶堂字李主所書南唐但餘此物李主筆法有鐵鈎𤨏見浮休集山谷集曽極詩森然筆勢聚干將氣軋鍾王未肯降惆悵當年鐵鈎鎻可能無意鎻長江南唐金銅香爐曽極詩製作元從建業官形模竒古雜金銅煙昏廛暗君休笑曾在紅鸞扇影中南唐宫中殘獐丨丨丨丨忽得丨丨一枚陳陶云是夜狼星上直生曽極詩周廬廵徼列千兵那得殘獐墮禁庭塵走􅁄光有象天文未必直狼星南唐遣使曽極詩談鋒亹亹折强鄰専對當年亦有人國老胸中兵百萬不將全力靠江神玉樹後庭花曽極詩結綺臨春成草莽繁華都入暮烟中後庭玉樹迎秋色猶帶張妃臉上紅三段石孫權時碑今移在府中據曽極詩凜然星象法書存重屋應無野火焚割英雄餘一念斷碑千載尚三分没字碑曽極詩漫漫荒池浸緑蕪殘碑一丈載龜趺當年刻劃書勲閥雨打風吹字已無校官碑在溧陽縣官廨同曾極詩風摧雨剥丨丨丨集古先生竞不知是光和千嵗刻未容苦縣獨稱竒石麒麟地名田曽極詩短樊長塹起寒煙知是何人古墓千嵗石麟相對立肘騣􅈩熖故依然難石歩道中有丨丨丨數十又詩云地悴天荒丘隴平從野老問衰興蒼烟落日低迷處折足麒麟記壞陵水精大珠真廟所賜照物皆倒又物影沉在下上叚無影曾極詩氷玉摩尼如鵠卵大千世界倒懸中何人提向江頭照照見神州一半空輜車曾極詩婭姹吳音今古同宫粧袨服已成空雕文結角丨丨巧猶有梁陳宫掖風决囚燈後主聽死囚燃佛燈决之囚家賂左右竊益膏油輙得不死曾極詩五詳三覆始施刑明滅蘭膏豈足憑可惜當年殺嚴續無人為益丨丨丨江南録事見荆公集曾極詩自古嬰鱗或似狂暗誅潘佑事堪傷憑誰寄語徐常侍不殺忠臣國未亡蜀海棠曽極詩傳芳遠遠自西鄰錦傘高張熨眼新花睡覺来紅淚落年年如憶故宫春鳳州柳鳳州柳蜀主與江南結婚求得其種鳳州出手柳酒醁曾極詩蜀主函封遣使時芳枝原自鳳州移柔荑今安在唯有青絲拂地垂南燭草木曽極詩駐采還年枉費功羞將老色照青銅仙方石䭀無消息南燭垂珠顆顆紅榠樝形如木𤓰熟時金黄陶𢎞景五和糝中用之和曽極詩舟人進饌色㣲黄仙老調胹有禁方五糝竒無處覔丨丨新熟壓枝香青松路曽極詩致君堯舜事何難投老鍾山賦考槃愁殺天津橋上客杜鵑聲裏兩眉攅自王介甫手種松又詩云彚進羣奸卒召戎萌芽培養熈豐當時手植留遺愛只有巖前十八公四六況鳳疏恩玉麟分閫疇咨上宰居守陪京光奉宸綸出司留鑰行宫萬鑰禁旅千營乃眷留都之重仍兼制閫之隆眷建康之故都乃江右之雄鎮惟大江襟帶之區實前代綺羅之地況六朝之故國控三路之要津控四路之要津揔三軍之㑹府宜襟𢃄咽喉之地屬股肱心膂之臣往司管鑰之嚴乃總兵符之重六朝都邑之舊四面山川之雄萬屯霜肅於貔貅列宿風清於刁斗兹惟虎踞之邦實藉龍韜之畧前代創業之邦仁祖興王之國京都非它鎮之比管鑰異在符之分襟帶控禦昔傳天塹之雄管鑰留司今接日畿之近人物浩繁盖南北要衝之地江山佳麗號古今形勝之區龍蟠虎踞坐増形勢之雄箕張翼舒頓覺精神之改元帥領下連之重兼總兵民别宫備萬乘之臨實司管鑰其令父老復見漢官之儀亦冀士夫不作楚囚之泣湘水岸花我正哦公之留詠鍾山雪竹公當訪我之舊游八命作牧榮疏出綍之恩十國為連兼總留臺之務紫盖黄旗接帝城之葱欝玉符金鑰䕶輦路之深嚴欲北小朝廷之風采用資賢賔客之才名道家蓬萊山豈不戀神仙之樂金陵佳麗地奈適闗旒冕之憂惟大江上下數十里宿南渡東西百萬師一相揭日月之光俯江淮而下燭萬乘分旌旗之半俾夷夏之聳觀雖節制獨顒於江面宻䕶京畿然威聲逺暢於邊頭期清河洛方輿勝覽卷十四
