body:
  text: 方輿勝覽卷六十五宋祝穆撰叙州宜賔宣化南溪慶符建置沿革禹貢梁州之域秦地東井輿鬼分野入參三度古􅈎國初秦嘗破滇畧通五尺道漢武帝遣唐蒙發巴蜀卒自􅈎道抵䍧牱鑿石開道通西南夷置􅈎道縣属犍為郡仍理􅈎道東漢晋宋犍為郡徙治武陽而􅈎道復為支縣南齊復為郡治梁武帝使先鐡討定夷獠乃立戎州梁又置六同郡於如廣縣以六合所同為郡之名隋廢郡而戎州存煬帝廢戎州為犍為郡唐初復為戎州移治南溪太宗時徙􅈎道在蜀江之西三江口明皇改為南溪郡復為戎州武帝時以大水移於蜀江之北即今治也皇朝陞為上州紹聖四年戎倅蘇時曰今車書同聲教一州名戎是夷其民也請易之遂改名叙州領縣四治宜賔事要郡名古戎南溪戎􅈎黄魯直作楊子建集序叙南嘉定志西漢􅈎道今丨丨也風俗朴而易治李宗丞園記云云然夷漢雜處蓬户茅簷髽䯽詭服頓首拊掌而歌士静而文同上其丨丨丨有丨夷夏雜居圖經云云某蠻獠之類不識文字椎䯻跣足鑿齒穿耳以鬼為證驗以殺傷為戯笑以涪翁重黄太史祠堂記戎州云云詩書禮義之澤漸漬至今形勝東距瀘水圖經云云西連大峨南通六詔北接三榮鈎帶二江黄魯直戎州舍利塔銘惟我戎州治漢􅈎道云云撫有蠻獠控扼諸蠻譙炎東楼記自漢以來號為重地蓋丨丨石門馬湖丨丨威德固兼用要必有以鎮壓而讋服之者負山濵江張鼎修忠利廟記州西南云云地勢險阻古􅈎道史公亮宜賔縣譙楼記叙州丨丨丨介兩蜀間圖經云云南征之道韋南康賛石門乃隋史萬嵗云云舟車之衝同上州雖小實當云云冠蓋徃來相望土産荔支郡國志􅈎在施夷中古謂之􅈎僮之富以丨丨為業黄魯直詩云王公權家荔支緑肥廖致平家緑荔支試傾一盃重碧色快剥千顆輕紅潑醅蒲萄未足􅂾堆盤馬乳則同時誰能同此勝絶味惟有老杜東楼詩苦笋黄魯直有丨丨賦云􅈎道苦笋冠冕兩川苦而有味如忠諫之可活國多而不害如舉士之皆得賢又詩云岑寂東園可散愁膠膠擾擾夢神遊萬竿苦竹旌旗卷兩部鳴蛙鼓吹休又從斌老求苦笋詩南園苦笋味勝肉籜龍稱寃䝉採録煩君便致蒼玉東明日風雨皆成竹山川東山在州城東門外有報恩寺塔髙二百尺蘭山在􅈎溪縣界圖經云蘭生於深林石門尤多有春蘭秋蘭崇蘭鳯尾蘭竹蘭石蘭春蘭花生於葉之下崇蘭花生於葉之上黄魯直幽芳亭記一榦兩三花而香有餘者蘭一榦十数花而香不足者蕙小梁山在宜賔縣四時常雨霖霪不絶俗呼為大漏天小漏天南山去宣化縣三里與犍為接境洞山在宣化縣西一里有登眺之勝夷牢山在宣化縣界南二蘇有過宜賔見丨丨亂山詩即此漢陽山在慶符縣下西接犍為朱提山在故開邉縣界漢書云丨丨丨出銀諸葛亮書漢嘉金朱提銀採之不足以自食韓退之贈立之詩我有雙飲醆其銀得朱提平蓋山在南溪縣西十五里分三山九隴惟平葢一山特出衆山之上山頂圓平峯巖在宜賔西百里山坡荔支連阡多属廖氏青衣江在南溪縣南十五里舊經云古有青衣國與叙州相隣其人因賈至蜀見漢衣冠遂求内属因以名焉馬湖江源出沉黎實大渡之支流從馬湖部落之後舟行十餘日方至平夷合石門江至三江口會蜀江汶江去南溪縣十歩鎻江兩岸大石屹立因置鐡絙横截其處控扼夷羗蘇溪自州治泝流十里有前後潭瀑布自懸崖千尺而下涪溪李嘉謀記黄太史紹興初章蔡用事以前史官得罪安置黔州二年移戎州方公之遷以涪州别駕因自號為涪翁放浪山水間初不知有遷謫困窮之意城南有溪公㳺而樂之命之曰涪溪其後溪山悉以是名滇池在州西二十里一名天池一名波凌池其池長五十里闊七里風雷一動波浪凌山中有芙荷别駕牟孔錫詩天池十里如鑑湖荷花可折魚可鱠黑水輿地志華陽黒水惟梁州今出南寕州南廣縣汾關山北至􅈎道縣入江一名皂水亭院東州道院在州治之内荔支㕔在倅㕔名曰萬朶紅最為佳品又一本在尉㕔一株四柯西南一柯獨肉厚而味甘黄魯直云江山偉觀在郡治大雅堂眉人楊素從黄庭堅謫戎州嘗曰安得一竒士而有力者盡刻杜子美東西州及䕫州詩使大雅之音復盈三巴之耳哉素聞之欣然拏舟訪黄於戎請攻堅珉募善工作華堂以宇之黄偉其言悉書子美詩潰之因名其堂曰大雅且為記樓亭西樓在州治陸務觀畫船衝雨入戎州縹緲山横杜若洲須信時平邉候靜傳烽夜夜到西樓東楼杜甫宴戎州楊使君東楼詩勝絶驚身老情忘發興竒坐從歌妓宻樂任主人為重碧拈春酒輕紅擘荔枝楼髙欲愁思横笛未休吹鎻江亭黄魯直鎻江亭酌酒詩西來雪浪如炰烹兩崖一葦乃可横酒盃未覺浮蟻滑茶鼎已作蒼蠅鳴山繞楼䑓鐘鼓晚江觸石磯碪杵鳴鎻江主人能致酒勸渠乆往莫終更鎻江亭上一樽酒山自白雲江自横陸務觀詩千尋鐡鎻還堪恨空鎻長江不鎻愁味諫軒桯史云戎州冇蔡次律者家于近郊魯直嘗過之延以飲有小軒極華潔檻外植甘子數株因乞名焉題之曰味諫軒後王子予以橄㰖遺之魯直有詩云方懷味諌軒中菓忽見金盤橄㰖來寺院無等院在州南門外魯直以元符間寓居作喬木庵今猶存其寺額亦魯直筆蹟陸務觀詩文章何罪觸雷霆風雨南溪自醉醒八十年間遺老盡壞堂無壁草青青壽昌院在城北門外有浮圖髙二百尺東坡過戎州艤舟遊此壁間有留題名宦先鐡梁武帝使先鐡計定夷獠乃立戎州以鐡為刺史張九宗為刺史撰花臺寺記云人物任永後漢李崇傳載永􅈎道人長於厯数公孫述招之托盲不至隗相事母孝母好飲江水中流有横石生為橋漢徵為郎黎幹叙之士人唐史有傳皇朝廖琮宜賔人同眉山二蘇登進士第名賢黄庭堅紹聖初以修史貶涪州移戎州安置自號涪翁題詠夜泊防虎豹岑參發犍為至泥溪作云云朝行逼魚龍一道鳴迅湍兩邉走連峯猿拂岸花落鳥啼巖樹重煙靄呉楚連泝沿湖海通亂山圍古郡子瞻叙州詩江水通三峽州城控百蠻云云市易帶羣蠻瘦嶺春耕少孤城夜漏闌往時邉有警征馬去無還自頃方從化年來亦欵關頗能貪漢布但未脱金環何足爭強弱吾民盡玉顔四六漢開􅈎道唐立戎州眷此叙南𨽻于蜀左郡在萬山之㡳俗居羣獠之中荔支紅熟曽吟杜叟之詩苦笋緑肥更入涪翁之賦雲出無心且聊爾陽臺之下春行有脚又移􅈎􅈎道之間懷安軍金水金堂建置沿革禹貢梁州之域天官東井輿鬼之分野周及春秋戰國為蜀地二漢属廣漢郡新都縣地晋属新都郡宋属廣漢郡南齊亦如之西魏置金淵縣及郡以金堂山為名隋廢郡属簡州唐避髙祖諱改金水縣属簡州又置金堂縣属益州前後蜀因之皇朝曹翰奏請建置為軍遂割簡漢支邑陞金水縣為懷安軍今領縣二治金水事要郡名金淵風俗土瘠民稚蹇汝明永惠院記懷安小國寡民邈處西南六十驛逺宅於深山大谷之中土瘠而無他産民稚而無他技士務力學前人軍學記土瘠人淳云云形勝環郡皆山蹇汝明澄江樓記云云其西北長岡峻嶺連亘相属山雄峙而江洪深金淵志山之雄峙從梁劔而來江之洪深自堋灌洛而至介山峽之阻李曼卿澄江楼記有云懷安丨兩川間丨丨丨丨地勢險要有雲峯月峽之勝金淵志懐安蕞爾國而云云英靈秀崒鍾為人物介三大府郡志壤地褊小介于益梓遂三大府之間城依雲麓晁公武作雨零堂記云云而中江縈之氣象葱欝巖壑洲渚之美映帶左右軍不如縣圖經懐安縣二而鎮九以縣而言金堂為大以鎮而言古城為富諺謂云云縣不如鎮山川東山在城東郡之主山雲頂山在城西十五里一名石城山上有神泉及祥符寺有楠樹已枯有石離而為二先是頭陁語曰五百年後寺當廢若楠再生石再合然後復興果如其言白神山在城西南髙五十歩周逥三里金水山在本縣北四十里本名銅官山三學山在金堂縣東北十里山有佛迹石理堅潤瑩白如玉非世間追琢所能又有神燈及有法海普濟廣濟三寺李義山為八戒和尚謝復三學精舍表云况丨丨丨夜有神燈朝明佛足風飄雨濕且無金燼落時蘚剥苔侵尚有寳花承處又有碧玉佛龕藕絲袈裟錦字多心經具葉金字湼槃經寺前後檜栢皆隋唐故物又有飛石乃自雲頂山飛來又有鸚鵡塔乃鸚鵡能念佛死遂瘞于塔王雍詩五色琉璃白晝寒當年佛脚印旃檀藕絲織出三衣妙具葉經傳一偈難夜看聖燈紅菡蓞曉驚飛石碧琅玕更聞鸚鵡因縁塔八十山僧試説看中江在軍西北源從漢州彌牟雒水毗橋等三水會為一江三江即大江中江北江也桞溪在金水縣南七里嘗有桞葉從穴出洛江在金堂縣北三十里堂閣淳簡堂在郡治之内紫雲閣在郡治之北名宦皇朝張天祺嘗宰金堂召為監察御史論新法不合王安石之意天祺曰不知天下笑參政也謫監鳯翔司竹監海内稱為小横渠人物叚翳後漢新都人習易經明風角今天慶觀即翳故宅王忳新都人范曄書忳為大度亭長即金堂也皇朝張正金水人也國朝建軍以來破荒登科自正始盖天慶間仕至太常少卿子公紀張公紀景祐間登第仕至太常少卿父正守筠公紀亦領衡陽比境分符范蜀公蘇老泉李大臨俱以詩餞送之及授代父同舟而歸且俱至常卿時人榮之謝湜字持正金堂人霧隱先生守中之子年十六伊川先生侍親官廣漢公往從之集中有與謝推官書是也題詠霈作東州雨羅大全送孫太冲守懷安詩願挽玻瓈江云云桃李照城郭勾龍行父送孫太冲詩金淵春三月云云石峽頳鯉魚時時醉賔幕四六䟽綸玉陛植㦸金淵深山大谷之僻居土風甚朴逹宦髙人之罕至地望亦輕陞一小縣雖斗壘之強名介三大邦獨雲山之差勝廣安軍渠江新明岳池和溪建置沿革古梁州之域東井輿鬼之分野統於鶉首春秋戰國為巴地秦及二漢属巴郡之宕渠墊江安漢三縣地晋蜀巴郡及巴西郡地宋属巴部巴西及南宕渠二郡地南齊因之西魏属流江宕渠墊江三郡隋属宕渠巴西涪陵三郡唐属渠合果三州皇朝初置廣安軍以合果渠三州相去差逺山川險僻多聚㓂攘故置為軍領縣四治渠江事要郡名賨城風俗賨人剽勇應劭風俗通云云人物間出郡縣志近世以來儒風尤勝云云不减果遂之風形勝南鄰渠水寰宇記隋大業間自賨城縣故城移於今理云云東枕大溪圖經云右倚秀屏左瞰渠江北接通川何云中宕渠廣安駐泊記南連巴徼云云複嶺東横清江西下林深箐宻巖穴幽邃介三州間圖經丨乎果合渠丨丨之丨土産紫梨廣安軍梨有数種入口即化者為上左太冲蜀都賦所謂丨丨津潤是也世謂廣安有十似紙似池席似蘇梨似耿魚似嘉猶之可也他則未必皆然若所謂金羮玉飯與夫紅腊丨丨則不為溢美金羮謂鴨也山川秀屏山即軍所倚峭壁森聳草木叢茂宛若屏障皛然山在廣安縣之東詳見渠州盖相接境龍穴山在岳池之封山去縣五里有唐何少卿讀書堂漢山在岳池縣南五里有王文雅者煉丹于此山在岳池縣東南三十里最髙大羊山此山下十許里有洞曰角竹元豐間張諫議廷堅諸公讀書于此渠江在城東三百歩濃水出於龍扶速山東流入渠江洄水下注渠水縈廽為潭篆水去渠江縣五里有石州水之灌輸其間者渦停渠别莫知其幾中兩渠相距二尺廣深半之可受流觴天巧致然非人力䟽鑿人多游焉井泉石龍泉在報德禪院經藏坐脚以自然全石為之初石工刻就龍形自爾龍口水滴今廢樓亭秀屏樓在郡治戯仙亭在渠江縣北十里相傳有女子游戯其上張無盡詩濃洄江水㵼髙灘中有神龍乆屈蟠衆樂妙音時響亮雙娃長袖忽瓓珊世間變化無非幻閣上登臨正好歡觀幻見真真亦幻谷花巖草謾凭欄名宦皇朝李晊開寶初建軍以晊知軍事朱昻知軍後入居翰林人物馮緄舉孝亷七遷為廣漢属國皇朝張庭堅渠江人為右正言後與黨籍黎錞渠江人任直講英宗以蜀士問毆陽脩對曰文行蘇洵經術黎錞帝大恱安丙字子文渠江人呉䂀即偽位丙矯宻詔誅䂀除四川宣撫使召為樞宻知潭州奉祠家居漢中叛兵莫簡張福等殺總領楊九鼎以叛再除宣撫未幾賊平西蜀再安題詠欲説賨城好憲使何志熈詩云云先誇萬物妍金羮收稻後紅腊落梅前照座梨偏紫堆槃荔更鮮雪藤尤異産應不数花牋四六塗鵶禁掖分虎賨城山峙秀屏石流曲水依巖負險多佩劔以撞搪宣化承流援建牙而弹壓畫㦸朱轓雖曰州城之陋紫梨紅腊頗夸方物之竒長寜軍安寜建置沿革禹貢梁州之域東井輿鬼之分野古夜郎之國漢犍為郡漢陽江陽縣地晋宋齊並属犍為郡之江陽縣朱鳶郡之漢陽縣隋属瀘川郡之江安縣唐属賢州之鹽泉縣唐置覊縻等十四州属瀘州唐末廢四川存者十州僖宗在蜀韓秀昇之亂淯井道梗偽蜀王建置淯井刺史國朝初置淯井監属瀘州神宗朝取夷人納十州地以属焉徽宗陞淯井監為長寜軍創武寜縣為軍治中興加沿邉都廵檢使舊差武臣自乾道始差文臣陞安夷寨為縣名曰安寜今領縣一治淯井監事要郡名武寕風俗地多瘴疫祥符年中運司申請云云漢夷交易長寜軍申運司漢户許典賣熟夷田漢户田土不許夷人買集夷為軍自大中祥符以來每有邉事則屯集名夷義軍為用屢獲功賞今安寜縣所管十姓十九姓􅈎戎皆義軍也國朝著令義軍之長咸命以官得世襲嵗給鹽絹及冬夏犒賜酒茗弛禁圖經極邉云云是以人樂其生王章嘉魚泉記兵厨之酒冠於東州聲教所漸同上唐因四夷内属之勢即西南夷部落開山洞置州縣雖貢賦版籍多不上户部而聲教所暨漸如華風形勝西境馬湖圖經云云南控烏蠻東介安溪北接綿水左連阿水趙招討平夷表云云右連石門外鄰蕃蠻圖經云云内接瀘戎僉㕔記控扼蠻蜒捍蔽瀘叙常當兵衝軍學記瀘南邉面闊逺有警則長寜云云土産鹽井圖經初人未知有井俄有牧人辨其鹹告之有司乃置監鬻鹽其井不鑿而自成十州五團記覊縻十州獻其鹽池官後為淯井監然自唐末僖宗朝淯井之鹽已給蜀用笻竹䈮醬郡志今夷衆開箐路芟去丨丨少有之惟多丨丨可以入藥山川寳屏山軍治之主山與棫山諸峯相對牛心山在軍治左筆架山在軍治右燕巖去軍北三里許在樓真洞路旁石巖森列数百虞易簡有記水簾洞去寜逺寨三里山泉扵巖前滴下楒子洞在郡北三十里内有朝真洞在絶頂棲真洞在山谷之坳名勝來游皆有詩介湖在郡治西城下中植荷芰東溪發源白崖山與嘉魚泉合西溪發源越王山與桃源溪合硯石溪在牛心山後岸石如磬可以為硯涇灘瀑布自山頂飛流而下幾數十丈下有深潭井泉嘉魚泉去城一里馬鞍山之趾泉漱石湧出有小魚四時如一不増不長故以名之邦人釀酒必用山後糯米及嘉魚泉則味極甘否則剛硬樓閣欎藍樓在介湖上臨流閣瞰嘉魚泉亭榭登雲亭在寳屏山上每嵗九日登髙于此小桃源相傳有耕者得一銅牌曰丨丨丨其上有詩云綽約去朝真仙源萬木春要知竊桃客定是會稽人其水發源筆架山在軍城冷水溪之上嘉定己巳太守張公市民田種植桃李創置亭榭曰仙津橋桃源洞亭曰蒸霞堂曰詥然小離堆在城北岸溪上崇德廟前溪中有恠石似離堆之象因作亭於此榜曰丨丨丨名宦皇朝劉堯年建軍之初以堯年權發遣軍事卜漏之變堯年以諸路兵為先鋒忠勇恊濟卒平㓂難甄援中興遺史載建炎間苗傳劉正彦為亂髙宗退居顯寜寺張浚吕頥浩等遣兵勤王遣援携蠟彈間行入顯寜寺髙宗始知勤王消息後以閣門宣賛權軍事譙樓記載其補天浴日之功盖謂此人物單演之乾道辛卯破荒以明經中外省題詠蠻錦織成詩歸田録載蘇子瞻嘗於淯井監得夷人所賣蠻弓衣其文織成梅聖俞春雪詩蓋其名重傳於夷狄醉眼誰能望夷落楊君登寶屏詩云云平生逸興斷鴻邉武陵勝處今何在張師䕫云云不聞沿流問花落四六瀘水遐陬肇唐室之覊縻夜郎故境成安夷之聚落儀鳯之初羅陽建郡天授以後思峩啟封右横筆架而下瞰藕湖背倚寳屏而前矗棫嶺淯井煑鹽或少禆於財計蠻鄉織錦亦能重於詩章富順監建置沿革禹貢梁州之域東井輿鬼之分野春秋戰國為巴地秦為巴郡漢武初置犍為郡東漢末劉璋分犍為立江陽郡江陽縣仍属焉江陽縣有富義井後周置洛源郡及富世縣隋廢郡以縣瀘州唐因之後避太宗諱改為富義縣皇朝平属以瀘州富義縣地置富義監尋改富順監熈寜置富順縣尋省今𨽻潼州府不領縣事要郡名釡川風俗俗慤而愿教授錢士開泮水巷記俗知禮遜同上天聖初赤崖斗郎春犯命旋即討平今之夷人多其子孫其丨尚多不中而髽近始服青布刺綉紋呼為上獠漸陶既乆習丨知有丨丨仍有夷風郡縣志云云士競於文泮水巷記云云形勝南距戎瀘李昌金山驛記云云北走普資大江環其下泮水巷記翠讞絡繹張其前丨丨繚繞丨丨丨奠梁蜀之東知監趙齊題名記富順云云為水陸之會擬於列藩金川驛記舊制等於諸縣嘉祐以新例云云土産鹽井寰宇記縣有丨丨人獲厚利故曰富世郡志劔南鹽井惟此最大舊日為額八百餘斤今日額千五百餘斤楊光清操堂記三榮富順産鹽其地號為貪泉山川東山在監治東龍山在監治後凌雲山在監西養秀山西北大江前横一峯突兀為監人登臨之地馬腦山在監西與凌雲相接西北諸山惟此最髙下即中巖聖燈山在監西五里養秀山在監西峯聳秀中巖在監西北二里富順三巖惟丨丨山勢盤薄林木葱茂有叢林氣象北巖在監北有五百羅漢洞及水簾内江發源漢州雒源歴監之南門自東而西此地因號金川西湖在監之西相傳有此監即有此湖皇祐間周侯延雋有記仍有亭榭堂舍霧隱堂在中巖趙丞相沂公謁中巖大士獲以夢告明年舉于卿公為文記之有雲霄横翔之語後人為建斯堂振文樓在監南魏了翁為記榕齋在監治以榕木名西疇由城之南絶江而上西行計六十里其地廣六十畝萬松森列嘉樹離立乃李氏丨丨趙公遡記有亭臺花木之勝盤㨿一山名宦皇朝張宗誨天聖間為守赤崖夷賊斗郎春等面縳請降人物丁處榮家於富義王均叛處榮與押衙李英恪詐降即擒斬斗郎春賜奨諭擢為州長史李見英恪之子隱神龜山有讀易洞李文淵治平間登第仕至朝議大夫題詠置吏撫南夷司馬君實送張寺丞知富順監詩漢家尺五道云云欲使文翁化兼令孟獲知盤堆䈮醬實歌雜竹枝辭夷居半巖壁韓子華送周知監詩云唐家諭巴蜀通道至卭􅈎列郡徼西南云云民俗半夷風韓縝詩劔外吾能説山川大扺同君行在巴徼云云火田租賦薄鹽井嵗時豐所資鹽井利韓子華詩土瘠事刀耕家無終嵗蓄云云持易他州粟山髙地窄江水惡韓繹詩蜀土風景信不好君之所治西南夷云云刀耕火種黎民疲街巷家家小酒旗解旦詩亭臺處處垂楊影云云四六䟽恩宸陛擢守富川雖云一監可擬列藩火田租薄故罕事於農耕監井利優故多趨於商販監特強名敢擬諸邦君之貴事雖專逹不過一大縣之封方輿勝覽卷六十五
