body:
  text: 方輿勝覽卷五十二宋祝穆撰崇慶府晉原江原新津永康建置㳂革禹貢梁州之域秦地天官東井輿鬼之分野入參一度秦置蜀郡在漢為蜀郡之江原縣莽曰卭原後漢復曰江原晉因之李雄據蜀分為漢原郡晉穆帝改晉原郡南齊為晉康郡西魏平蜀移為犍為郡理立多融縣後周廢郡以縣入蜀郡隋改属益州唐分益州四縣地於晉原縣立蜀州改唐安郡復為蜀州唐末及五代蜀王氏建孟氏昶有其地皇朝平蜀地歸版圖以髙宗潜邸陞為崇慶軍節度紹興陞府今領縣四治晉原事要郡名蜀郡晉康唐安並郡志風俗輕易褊阨漢志民食稲魚亡凶年之憂俗不愁苦而云云尚侈好文益州記其風俗丨丨而丨丨俗好歌舞常璩志云云危弦促管聲尤㴬切形勝土地肥美周職方巴蜀廣漢云云有山林竹木蔬食草實之饒連山特起張俞學記武陽西鄙云云四相牧州唐張柬之鍾紹京李峴王縉四公皆牧是州唐刺史皇甫澈壁記三千官栁劍南詩藁云蜀人謂唐安有云云四十琵琶故詩云歸心日夜逆江流官栁三千憶蜀州山川查山去永康縣五里上有寺龍華山唐詩紀事郭震留題云最好寺邊開眼處叚文昌有讀書堂鶴鳴山在晉原縣西八十里絶壁千尋李膺益州記張道陵登仙之所嘗有白鶴遊其上天國山在永康縣左連大面右連鶴鳴前臨獅子後枕大隋等山有龍池及融照寺青城山有八大洞此乃第五洞也有山曰香爐峰翠圍山在水康縣西八里上有院前有繩橋乃古王仙柯燒丹之處石門山在永康西七里上有天池及石龍又有化成寺縣人以元旦遊禮焉蟇頥山在永康縣西七里山有穴類丨丨丨中多鹿號鹿市天社山在新津縣南三里北枕大江南接連嶺益土有難人多依焉稠稉山在新津南八里有草名稠稉服之長生不死鄩江自青城縣南流入縣界味江入永康縣界注白馬文井兩江舊經蜀主征西畨有野人以壺酒獻王王使投之江中三軍飲之皆醉因名白馬江自晉源縣界入新津縣界東湖有趙清獻留題西湖在郡圃盖皂江之水皆道城中環守之居因瀦其居以為湖云黑水在永康縣西十一里流入青城縣溪石皆黒故名皂水自江源縣流入天社山下文溪自永康縣白崖流出大溪夜郎溪在新津北七里亭閣浮觴亭在西湖文與可輯之范蜀公有詩東閣杜甫招裴廸登東亭送客見梅丨丨官梅動詩興還如何遜在揚州此時對雪遥相憶送客逢春可自由幸不折来傷歲暮若為看去亂鄉愁江邊一樹垂垂發朝夕催人自白頭橋梁北橋杜甫詩望極春城上開筵近鳥巢白花簷外朶青栁檻前梢池水觀為政厨煙覺逺庖西山供望眼唯有此江郊竹橋杜甫陪李司馬皂江上觀造丨丨詩伐丨為丨結構同褰裳不渉往來通天寒白鶴歸華表日落青龍見水中顧我老非題柱客知君才是濟川功合歡却笑千年事驅石何時到海東寺觀修覺寺在新津縣南五里杜甫新津寺寄王侍郎詩何限倚山木吟詩秋葉黄蝉聲集古寺鳥影度寒塘風物悲遊子登臨憶侍郎老夫貪佛日隨意宿僧房遊丨丨丨詩野寺江天豁山扉花竹幽詩應有神助吾得及春遊徑石相縈帶川雲自去留禅枝宿衆鳥漂轉暮歸愁寺憶曾遊處橋憐再渡時江山如有待花栁更無私野潤煙光薄沙暄日色遲客愁全為减舍此復何之龍門院在永康縣六里青城大面三十六峰嵯峨萬仭盡在軒檻間張天覺記其本末且賦詩云四時積雪瞻岷嶺三𣲖飛泉出洞天太平院在府城有范鎮留題妙眞觀在永康縣西四十里昔有女子於此上昇有眞仙洞聖水池有燒藥爐投龍觀在新津縣南六里枕夜郎溪及白木水上有龍穴祈雨有驗祠廟蜀先主廟在晉原縣西二里有唐碑乃房琯文杜工部祠在江源縣邑宰趙抃建昔杜甫依髙適寓於此頗多題詠故為立祠文潞公祠在判官㕔盖公之父在天禧時來作判官令公受業於晉原大夫張錫之客任君後為立祠名宦髙適為蜀刺史張柬之為守皇甫澈詩周厯革元命天歩値艱阻烈烈張漢陽左袒誅諸武休明神器正文物舊儀覩南向朔大君西宫朝聖母茂勲著鍾鼎江山食茅土至今稱五王卓立邁千古皇朝趙抃皇祐初宰江源與邑之張景通遊有詩題其堂人物鍾紹京皇甫澈詩清宫閶闔啟滌穢氛沴滅紫陌重昭回皇天新日月從容廟堂上肅穆人神恱唐元佐命功輝煥何烈烈張令問本唐興人隠居不仕號天國山人與杜光庭詩試問朝中為宰相何如林下作神仙一壺美酒一爐藥飽聴山中清晝眠皇朝張商英字天覺新津人為童子時日記萬言十四嵗從其兄唐英遊學梁山鄉先生向子山見而大驚妻以女資使入京登治平第崇寜中入相以力詆蔡京之姦入元祐黨籍題詠城闕輔三秦李百藥送林少府之任蜀州詩云云風煙望五津與君離别意同是宦遊人煙綿劍道微宋之問送趙司馬赴蜀州詩餞子西南望云云橋寒金雁並林曙碧雞飛外邑水足野田芸鼓急永康令國表民題天林寺詩訟連多雨綠苔荒勝事閑隨日月長云云風回山焙茗旗香四六疏榮漢札擢守唐安惟蜀地之奥區有晉康之古郡趙清獻分符之地張丞相毓秀之鄉剖西川之符竹可謂勝遊賦東閣之官梅未妨佳致導玻瓈萬頃之江委諸汶井駐峨眉半輪之月照此唐安簡州陽安平泉建置㳂革禹貢梁州之域秦地東井輿鬼之分野秦屬蜀郡地漢武分蜀郡置犍為郡今州即犍為郡之牛鞞縣也属益州東漢及晉因之南齊於此置牛鞞戍又置縣西魏置資州及武康郡後周移資州於漢資中城隋文帝於此置簡州煬帝廢州唐分益州復置簡州又改陽安郡復為簡州號清化軍國朝割金水縣𨽻懷安軍今領縣二治陽安事要郡名陽安簡池風俗有鄒魯風劉昊記土厚水深民和俗阜云云四出大魁圖經云王歸璞偽蜀時狀元皇朝許將張孝祥及許奕云云皆此邦之人成都不如唐刺史韋宗卿壁記揆以氣候較似土宜雖云云也東之樸西之文關耆孫碑隂記東普慈西成都有丨丨丨有丨丨丨盖嘗出磊落瑰奇之士人多工巧隋志云云綾錦雕鏤之妙侔於上國郡治之古郡志設㕔棟宇盡唐制梁上題唐寳厯元年簡州刺史張炎建抵嘉定之壬午已三百九十有八年矣不被兵火郡守題名序云簡之先民有言蜀屢叛獨我州云云自唐貞觀丁亥距今開禧丁夘五百八十有一年形勝東界普慈關耆孫碑隂記南距赤水郡守郭由中叢桂樓記云云東距鴈江二水合流是為陽安之郡治東望漢江趙汝霖志民亭記丨丨丨丨雲煙連綿西望前溪林壑茂美控扼巴峽折栁亭記宻邇川府云云山不險而川平沈璞平泉縣題名記山峙而不險水流而且平土地肥美漢地理志鹽饒而田瘠靈恵廟記土産鹽郡守江見禮撰制置胡公生祠記淳熈六年有旨簡之郡産丨為最虚額尤多毎嵗計豁除折估錢五萬四千九百五十餘萬皆胡公奏蠲免山川頼山去陽安五十里又名頼憨東山在東江之外州治之左逍遥山在元都山去城三十里景德間有楊用晦者隱居此山其北有層崖命工發之得東西二室西室後刻二竈若養丹之所又鑿二窟中可坐五七人東西二壁鐫二孔雀二神人有漢安元年四月十八日㑹仙字自漢安至景德二年已九百二十餘年矣南巖在陽安縣有光孝寺前敞飛閣盡覽江山之勝左有洞可容數十人北巖在州北有寺及洞牛鞞戍在州城西岸西齊於此置戍赤水在陽安縣南七十歩鴈水在陽安縣東溪姚孳碧波亭詩賴簡池臺兩蜀誇東溪别是一仙家令人却憶康王谷坐看珠簾濺雨花三溪劉巨濟云三溪號一郡之勝前溪在陽安縣治之北南溪在夀昌寺之側㳂江行一里許是為東溪最勝三池郡以丨丨名或指賴簡池栁池鳯池以足三者之數頼簡池在陽安縣九十里隋髙祖立州名取此堂院清忠堂在倅㕔以趙丨獻范丨宣嘗按臨斯郡故以為名西州道院紹興間黎持道院記陽安隣於㑹府而有江山之勝處於髙仰而有魚稻之饒民事獄訟比之旁郡十無一二凡隱於吏者樂趨馬人目之為云云樓榭望湖樓在州治道院之後湖光山色交相輝映輕舟小艇時時撑出栁隂之中不謂重岡壘嶂間乃有瀟湘苕霅之景也江月樓在郡治下臨鴈赤二水之間小桃源在郡洽以桃花最多故名天水相接放目無際為西州之絶景㑹勝亭在郡治西北角繪趙清獻公像龕于壁公將漕西蜀按部至此賦詩詞十五年帥蜀復和前韻今皆刻於亭中琴軒在報恩寺以僧能琴故名趙清獻聴琴詩云輟飲搘笻㑹勝亭溪山佳處古琴横憑君傾耳慇懃聴一弄清風四座生橋梁忠宣橋熈寜間運使范丨丨公廵按始命架此丨折栁橋在朝天門外舊名情盡唐刺史陶雍詩從來只説情難盡何事敎名情盡橋自此改名為折栁任敎離恨一條條寺觀東巖院在陽安縣東五里唐智通禪師卓庵之地院居兩山之間溪流其中又有縣溜清響不絶旁有洞又有古柏可二十圍為一郡之望刹景德觀在郡南一里黄魯直詩序云覺範道人種竹於所居之東軒使君楊夢貺題其軒曰也足取古人所謂但有歲寒心兩三竿也足者仍為之賦詩余輒次韻詩云道人手種兩三竹使君忽來吐珠玉不湏客賦千首詩若是賞音一䕫足世人愛處但同流一絲不掛似太俗客來若問有何好道人優曇逺山綠天光觀在陽安縣東二十里仙人李八百煉丹於此有聖燈名宦何遐隨侍父世英為平原主簿嘗平朱泚之亂德宗在奉天命羣臣射鴈遐一發䨇鴈應弦而落韋臯贈詩曰腰間寳劔七星文掌上彎弓掛六鈞箭發雲中䨇鴈落始知秦地有將軍其子孫因家於平泉劉昊其先秦人也唐僖宗時為平泉令因家焉嘗遇異人告曰劉氏自是官矣既而子諷登第而子孫之登第者七世九人焉皇朝利師道為倅任孜為平泉令蘇子瞻贈詩曰平泉老令更可悲六十青衫貧欲死人物皇朝劉諷為都官郎官年六十三致仕宋景文贈詩云稱疾本避事辭官終引年還家三徑在敎子一經傳子孝孫為侍御史許奕慶元廷試為第一題詠城下江流金鴈水漕榮湮詩云云亭中人弄玊弦琴參差草樹連巴國熈寜間李珣詩云云依約雲煙遶楚臺兩江回合東南隅程端臨郡城好處西州無云云東溪清絶人最夸李良臣詩簡州何處景最佳云云四六塗鴉禁省分虎簡池維此東溪冠於西蜀地僻左而非走集之地山周遶而皆焼埆之田地産不豐所恃牢盆之利民生甚樸亦稀狴犴之姦江山頗勝曽標道院之名人物所鍾亦有掄魁之彦嘉定府龍遊峩眉夾江洪雅犍為建置㳂革禹貢梁州之域東井輿鬼之分野秦為蜀郡今府即漢犍為郡之南安縣地也梁武帝開通外徼立青州取青衣以為名西魏改青州為眉州取峨眉山以為名後周復曰青州又改曰嘉州取漢嘉郡以為名隋改嘉州為眉州唐復為嘉州改犍為郡復曰嘉州皇朝因之以寜宗潜邸陞嘉定府及嘉慶軍節度今領縣五治龍遊本路提刑置司事要郡名漢嘉李巽巖作雅州學田記昔公孫述據蜀青衣不賔光武嘉之後因改青衣曰漢嘉嘉陽嘉陵犍為南犍韓魏公詩云主人獨戀南犍樂只恐𤓰期未肯歸風俗地靈人秀鮮于繪議道堂記漢嘉背負三峨襟帶二江為西南州最清歸處云云任熈明教授題名記云蜀為西南巨屏繇漢以來號為多士莫盛於眉益二邦而嘉定次之人士俊乂華陽國志益州以蜀郡廣漢犍為三蜀土地沃美云云為風月主人海録碎事偽蜀歐陽郴守嘉州曰青山緑水中為二千石作詩飲酒丨丨丨丨丨豈不佳哉形勝西有熊耳華陽國志云云南有峨眉東接江陽同工云云西接廣漢南接朱提北接蜀郡地大且要蘇明允上吴職方書蜀之云云無如益與嘉者非漢夜郎輿地廣記漢武帝開夜郎置犍為郡而漢史地理志夜郎故縣乃属䍧牱郡則知今嘉州犍為縣非夜郎故地後世徒見嘉州名犍為郡又領犍為縣遂以為夜郎國失其真矣分巴割蜀華陽國志盖漢時云云以成犍廣二郡當荆蜀渝瀘要道字文粹中萬景樓記畵八景圖太守吕昌朝得宋復古丨丨丨丨來嘉州而其目曰洞庭晚靄廬阜秋雲平沙鴈落逺浦㠶歸雨暗江村雪藏山麓泉嚴古柏石岸孤松故東坡有八詠繼東吳之句三峨之勝聞天下楊輔貢院記漢嘉江山雄秀云云土産荔支吳中復詩莫愛荔子紅歲作嘉州孽橘柚文選蜀都賦户有丨丨之園注曰出犍為南安縣山川䝉山禹貢梁州之山四岷嶓蔡丨西丨背岷北山背嶓南山背蒙峨眉之在禹貢則蒙山之首也九頂山在城左有九峰曰鳳集棲鸞靈寳就日丹霞祝融擁翠望雲兊説㑹昌以前峯各有寺今惟存報恩一寺烏尤山一名離􅕞山在九頂山之左舊名烏牛突然於水中如犀牛狀至山谷題涪翁亭始謂之烏尤髙標山一名髙望乃府之主山巋然髙峙萬象在前海棠山在石碑山上皆植海棠為郡守宴賞之地梨花山過西津橋五里有寺金燈山即至樂山其趾有淵每嵗人日郡守於此修油卜故事謂以油灑水靣觀其文騐一歲之豐歉掦雄山在府治西有洞深邃子雲隠居於此今為延祥觀古像山在城西有石䥴彌勒佛如凌雲像而小或謂初作此以為大像之式錦江山在龍遊縣北四十里江自成都經此山大峨山在峨眉縣南百里兩山相對如峨眉山記云其山周匝千里有石龕百一十二大洞十二小洞二十八南北有臺凡遊大峨者自縣勝峯門出至華嚴院恰十五里前代於峨眉山剏寺六光相居山之絶頂為遊山之底華嚴居山之前峯為遊山之嚮導陳子昻詩浩然坐何慕吾蜀有峨眉念與楚狂子悠悠白雲期李白登峨眉山蜀國多仙山峨眉邈難匹周流試登覧絶恠安可悉青冥倚天開彩錯疑畵出泠然紫霞賞果得錦嚢術雲間吹瓊簫石上弄寳瑟平生有微尚歡笑自此畢烟容如在顔塵累忽相失倘逢騎羊子携手凌白日李白峨眉山月歌峨眉山月半輪秋影入平羗江水流夜發清溪向三峽思君不見下渝州蘇子瞻詩峨眉山西雪千里北望成都如井底春風日日吹不消五月行人凍如蟻田錫詩髙髙百里一屈盤八十四盤青雲端宋白詩不知立䖏髙多少只見星辰在下頭陸務觀詩三峨舊不到郡齋留與詩人供几案中峨山在峨眉縣南二十里又名覆蓬山有葛仙洞一穴初􅅻容人行數里漸寛其蝙蝠大如箕小峨山在峨眉縣南三十里一名鏵刄山又有季仙洞是為三峨龍門山在峨眉西十里分兩崖峭峙其形如削仰視青天􅅻餘一鏬修文山在洪雅縣西八里雅江所注驚湍怒濤名曰龍潭漁者不敢入阿吒山在洪雅縣西四十里有寺䥴石羅漢一百八身隱䝉山在洪雅縣南晉處士龎居士字𨼆䝉處此張綱山在犍為縣東北五里以張綱墓在其側後漢乆討張嬰以功授廣陵太守到郡一年卒百姓五百餘人素服行喪送至此山負土成墳東巖在城東佛峽山明水秀冇洞曰丨丨泉冝釀酒坡詩一時何與丨丨酒謂此也聖崗即郡治前崗杜甫詩逺村通後徑一郡隔前崗白雲洞在白崖山趙清獻為漕曽逰焉方響洞在丁東院洞腹有水如環珮聲黄魯直改今名大江一名汶江俗名通江自平𦍑縣界流入瀆江即岷江也陽江蜀南方之水所交會明月湖在州東大渡河一名沬水源出嶲州入龍遊縣界藝祖得天下以所持玉斧畫輿地圖自大渡為界此外吾不有也故二百年無外患逺慮如此漢水漢成帝時得古磬十六枚於水濱青衣水出盧山徼外東南流徑嚴道洪雅夾江至龍遊與岷江合青衣以縣名一名䝉水以山名一名大渡以溪名又曰雅州以江名夷惜水源出嶲州有嘉魚每年二月隨水而下八月逆水而上璧玉津隋置玉津縣以江有璧玉故名龍泓在龍遊縣井泉八卦井在城内皆晉郭璞所鑿樓亭明月樓在譙樓之右下瞰明月湖郭璞䜟欝姑欝姑將州對洛都但看千載後變成明月湖後隋欝姑將軍開此湖荔支樓陸務觀詩山横瓦屋披雲出水自䍧牁裂地來璧津樓在城東南隅下瞰三江三峨九嶺森列左右澄江樓在憲司左窺龍泓右瞰烏尤髙明爽塏得江山之勝萬景樓在郡治安樂園太守吕由誠建諸邑邉寨一目可盡范至能詩若為喚得涪翁起題作西南第一樓涪翁亭在萬景樓之前黄然詩清音妙絶東坡老方響名髙太史公水遶烏尤談笑外江連洪雅畵圖中競秀亭陸務觀詩竹葉泝江舡春薺隔樹烟太白亭在平𦍑鎭錦江寺之側清音亭在九頂山蘇子瞻書額寺觀凌雲寺在府之南山唐開元中僧海通於瀆江沬水濛水三江之合悍流怒浪之濱鑿山為彌勒大像髙踰三百六十尺建七層閣以覆之至韋臯時積十九年而工始偹臯有大像記又有清音亭邵博記天下山水之勝在蜀蜀之勝曰嘉州州之勝在丨丨丨寺之南山又其勝也蘇子瞻名其亭曰消音又南山之勝也岑參詩寺出飛鳥外青峰載朱樓摶壁躋半空喜得登上頭始知宇宙濶下看三江流天晴見峨眉如向波上遊薛能詩像閣與山齊何人致石梯萬烟生聚落一崦露招提司空文明題詩春山古寺遶滄波石磴盤空鳥道過百丈金身開翠壁萬龕燈㷔隔烟蘿雲生客到侵衣濕花落僧禪覆地多不與方袍同結社下歸塵世竟如何陸務觀凌雲謁大像詩出郭尋幽一笑新旋呼艇子截烟津不辭疾歩登重閣聊欲今生識偉人泉鏡正涵螺髻緑浪花不犯寳趺塵一泉泓然正在髫下每歲水漲不能及佛足始知神力無窮盡丈六黄金果小身觀無盡量經云或現小身丈六尺光相寺自白水至寺歴八十四盤山徑如線可通登躋如是者六十里至峯頂即普賢示現之處寺屋皆以板為之石洞院在小市黄太史自叙南經此有所作墨竹記東津院有黄魯直草書圎照太師小碑詩云赤旃檀塔六七級白菡蓞花三四枝禪客相逢只彈指此心能有幾人知能仁院陸務觀詩能仁院前有石像丈餘盖作大像時様也詩云江闕欲開千尺像雲龕先定此規模斜陽徙倚空三歎嘗試成功自古無天慶觀在城北有唐元和銅鐘重千斤祠廟花將軍廟在州之西邵氏聞見録云廟史匣藏唐鄭丞相告云花敬定將軍也髙適傳梓州副使叚子章反以兵攻東川節度李奐適率州兵與西川節度崔光逺攻子章斬之西川牙將花敬定者恃勇既誅子章大掠東蜀天子怒之杜子美戯作花卿歌成都猛將有花卿學語小児知姓名用如快鶻風火生見賊惟多身始輕綿州副使著柘黄我卿掃除即日平子章髑髏血模糊手提擲還崔大夫李侯重有此節度人道我卿絶世無既稱絶世無天子何不喚取守京都即此也名宦杜軫晉人弟列俱為犍為太守岑參唐人為守陸務觀讀岑嘉州詩漢嘉山水邦岑公昔所寓公詩信豪偉筆力追李杜趙昱嘗隠青城山隋煬帝起為嘉州太守時犍為潭中有老蛟為害昱率甲士千人夾江鼓噪昱持刀入水有頃江水盡赤昱左手執蛟首右手持刀奮波而出隋大亂隱去不知所終後嘉陵水漲蜀人見昱青霧中騎白馬從數獵者於波面過太宗賜封神勇大將軍廟食灌江口皇朝吳中復為犍為令土産紅桑紫竹荔枝三香為民害作三戒詩勒諸石宋白為玉津縣有貽田表聖詩云玉津縣裏三年悶金粟山前九月愁又竹底衙人吏花間押簿書石介為軍事推官魏華父作祠記云昔歐公嗜先生之文嘗為詩曰後世果不公至今無聖賢又曰我欲犯衆怒為子記此寃嗚呼後世必有發於斯言者矣楊儀之劉光祖縣學記峩眉自楊文荘為之邑長田公諫議客其門流風所被文敎興焉人物楚狂接輿費士戣歌鳳堂記云按晉皇甫謐作髙士傳宋劉孝標注世説唐陳子昻賦感遇詩皆以為避楚入蜀隠于峨眉接輿姓陸名通接輿其字也李宻犍為人晉武帝召為洗馬以祖母老上陳情表固辭宻與人交常公議其得失而切責之嘗言吾獨立於世顧影無儔皇朝田錫第二人及第仕至諌議大夫蘇子瞻為文集序曰田公古之遺直也公洪雅縣人属嘉眉二州題詠犍為古佳郡唐詩云云山水宜不惡縈我是犍為薛能初發嘉州詩云云南征又北移唯聞杜鵑夜不見海棠時巉巉九頂峯蘇子由初發嘉州詩放舟沬江濱往意念荆楚擊鼓樹兩旗勢如逺征戍紛紛上舡人㯭急不容語余生雖江陽未省至嘉樹云云可愛不可住飛舟過山足佛脚見江滸舟人盡歛容競欲揖其拇俄頃已不見烏牛在中渚移舟近山隂壁峭上無路云有古郭生此地苦箋注區區辨蟲魚爾雅細分縷洗硯去殘墨遍水如黒霧至今江上魚頂有遺墨處覧物悲古人嗟此空自苦余今方南行朝夕事鳴㯭至楚不復留上馬千里去誰能居深土永與禽獸伍此事誰是非行行重回顧不見故人十年餘杜甫寄岑嘉州詩云云不道故人無素書願逢顔色關塞逺豈意出守江城居外江三峽且相接斗酒新詩終自疎謝朓每篇堪諷誦馮唐已老聴吹嘘泊舡秋夜經青草伏枕青楓限玉除眼前所寄選何物贈子雲中䨇鯉魚重疉江山遶城郭李堯夫嘉州地僻天西南云云犍為城下䍧牱路陳羽城下聞夷歌云云空冡灘西賈客舟此夜可憐江上月夷歌銅鼓不勝愁竹籬西畔是雲南楊徽之俗遇臘辰持藥獻吏逢衙日隔花參耆宿因來問封部云云聊將八詠繼東吳蘇子瞻送吕昌朝知嘉州詩不羡三刀夢蜀都云云卧看古佛凌雲閣勅賜詩人明月湖得句會應緣竹鶴思歸寜復為蓴鱸横空好在修眉色頭白猶堪乞左符頗願身為漢嘉守蘇子瞻送張嘉州詩少年不願萬户侯亦不願識韓荆州云云載酒時作凌雲遊虚名無用今白首夢中却到龍泓口浮雲軒冕何足言唯有江山難入手峨眉山月半輪秋影入平𦍑江水流謫仙此語誰觧道請君見月時登樓笑談萬事真何有一時付與東巖酒歸來選受一大錢好意莫違黄髪叟公事無多厨釀美陸務觀詩平𦍑江水接天流凉入簾櫳已似秋云云此身端不負嘉州四六䟽恩北闕分牧南犍對月半輪好似漢嘉之太守披雲五朶乃是瀟湘之罪人風俗甚美有岑杜石典型之尚在髙山良美與彭蜀漢境土之相連太白對影成三人更弄平𦍑之明月東坡不願封萬户只尋古佛於凌雲方輿勝覽卷五十二
