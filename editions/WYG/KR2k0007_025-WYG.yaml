body:
  text: 方輿勝覽卷二十五宋祝穆撰郴州郴縣永興桂陽資興宜章桂東建置沿革禹貢荆州之域翼軫之分野春秋戰國屬楚秦屬長沙郡項羽徙義帝于長沙都郴即此地也漢髙祖屬荆州三國呉屬分荆州以湘水為界長沙江夏桂陽以東屬呉晋屬江州又属湘州隋廢桂陽立郴州因漢縣名也唐改桂陽郡復為郴州國朝因之中興領縣四寕宗朝以溪峒擾攘創資興桂東兩縣今領縣六治郴縣事要郡名郴陽見沿革注郴江風俗清淑之氣蜿蟺扶輿韓愈送廖道士序五嶽於中州衡山最逺南方之山巍然髙而大者以百数獨衡山為宗最逺而獨為宗其神必靈衡之南八九百里地益髙山益峻水清而益駛其最髙而横絶南北者嶺郴之為州在嶺之上測其髙下得三之二焉中州清淑之氣於是焉窮氣之所窮盛而不過必蜿蟺扶輿磅礴而鬰積衡山之神既靈而郴之為州又當中州清淑之氣蜿蟺扶輿磅礴而鬰積其水土之所生神氣之所感白金水銀丹砂石英鐘乳橘柚之包竹箭之美千尋之名材不能獨當竒也意必有魁竒忠信材德之民生其間而吾又未見也其母乃迷惑溺没於老佛之學而不出耶廖師郴民而學於衡山氣專而容寂多藝而善遊豈吾所謂魁竒而迷溺者耶廖師善知人若不在其身必在其所與遊訪之而不吾告何也于其别申以問之必有才德生其間見上民俗愿朴而勁朱作潜社壇記風俗脆薄許荆傳郡濵南州云云人才之盛李若谷郴江後序悼楚懷之徙嘉唐相之節叙三賢之政績紀三仙之功行呉仲權弔古賦蠟屐東山誦劉公之忠擊楫北湖味韓子之窮形勝古桂陽郡張浮休百詠詩序云云在湘之東南五六百里其地皆山谷實嶺之北麓也當五嶺未開之時郴為南方極逺之地今南有廣西有桂廣桂猶善部則郴可知西接九疑圖經云楚漢上游南接五嶺云云東南距湖北距衡山控扼交廣阮閱休䟦云云襟帶湖湘為湘楚上㳺郡守凌伯裕作郴江集序郴云云在海嶠之北練亨甫靈壽山記云郴環山而州云云衡湘之南州在百重山之内張浮休南遷録實嶺麓斗僻之地呉仲雍記郴古郡也而云云南直五嶺之衝陳純夫州學記北瞻衡嶽之秀云云鈎扶景象郴江續集序若昔社草堂韓昌黎筆端有神云云而郴江殆無遺賞自唐以山水名天下郴江前集序云云山川馬嶺山在郴縣東北七里舊名牛皮山又名蘇仙山輿地志昔有仙人蘇耽入山學道其母徃闖之見其乘白馬飄然故又謂之白馬嶺其上有壇黄岑山在郴縣南三十六里即五嶺之一或云即其田嶺五盖山在郴縣東西六十里湘中記山有五峯如盖鄉人每嵗占雪占豐年云五盖雪普米賤如土雪若不均米貴如銀萬壽山在郴縣南郡國志山有靈壽杖漢平帝賜孔光靈壽杖出於此又有冷暖二泉黄相山在郴縣東南九里閻孝忠詩東帶連山接五羊西分郴水下三湘路人到此休南去嶺外千峯盡瘴鄉耒山在桂陽縣南十里四面孤絶兠率山在郴縣資興寨旁有石像如僧十八北湖在縣西北隅城門外灌田項餘韓愈云航北湖之空明即此程鄉溪輿地廣記在郴縣之程鄉首置官醖于山下名曰程酒同酃酒焉陷池在郴縣北二十里又名陷浦相傳昔有萬氏居此一旦雷雨全家皆陷故以為名郴水過郡城一里始勝舟又北行四十五里至鯉園歩江口合東江始為大郴江入米水方有水程桂水在郴縣西南杜甫詩飄飄桂水遊井泉橘井在蘇仙故宅即今開利寺傳云仙君將去世謂母潘曰明年郡有災民大疫母取橘葉井水飲之如期疫果作郡人憶前言競詣飲飲下咽而愈日起百餘人以故争持錢敬謝潘元結詩靈橘無根井有泉世間如夢又千年鄉關不見重歸鶴姓字今為第幾仙風冷露壇人悄悄地閒荒徑草綿綿如何躡得蘇君跡白日霓旌擁上天沈彬詩眼穿林罅見彬州井里相逢側局楸味道不來閒處坐勞生更欲幾時休蘇仙宅古煙霞老義帝墳荒草木愁千古是非無處問夕陽西下水東流潮井在黄岑山上一日三湧三翁井郴縣土富山有銀井人鑿之轉深忽見三老翁授之以杖悉是銀故名圓泉郡志在州南二十里張浮休永慶寺記云世傳陸羽著茶經定水品張又新益水品為二十而丨丨第十八然永慶寺今易為州學在城内不能半里或以為即㑹勝寺劔泉在城内康㤗坊石罅間泉躍而出世傳項將英布卓劔處因成泉燕泉在城西燕來時泉生去時泉涸折彦質居郴時剪茅為亭今廢牛彘㳛飲其中熱泉在桂陽東百里其沸如湯堂閣清淑堂在州宅阮美成詩三仙一相有遺風清淑誰言到此窮寄語郴陽忠信士得名端合謝韓公覽秀閣在倅㕔道觀蘇仙觀在郡子城東門外即漢蘇耽故宅紹興封冲素普應真人觀名集靈成仙觀在郡子城外北後漢有成武丁者屍假而卒𦵏武丁岡今以其居為成仙觀露仙觀在子城外南王真人諱錫為郡衙校唐咸通間甘露䧏于所居竹木葉上真人食之遂仙古跡義帝都按史記義帝乃楚懷王孫心項羽陽尊為義帝後項羽徙義帝於長沙都郴有陵在城内明倫坊窊尊石在江畔張浮休有刻銘石羊在城南五里巨冡嶢然前有石如羊名宦楊璆前漢時人築州城衛颯后漢循吏傳序舉天下郡國歴三百餘年纔得十二人桂陽幸有其三河内丨丨南陽茨充㑹稽許荆皆以桂陽政得名茨充代颯為桂陽教民種植桑柘蔴紵許荆為設䘮紀婚姻制度李郴州韓愈有李郴州祈雨詩云乞雨女郎魂炰羞潔官且繁廟開鼯鼠呌神䧏越巫言旱氣期銷蕩陰想駿奔行㸔五馬入蕭颯已隨軒皇朝周頥為郴令移桂陽令唐介以言事謫監酒張舜民自號浮休謫監酒稅人物孟琯韓愈序云今年秋見孟氏子琯於郴手其文一編甚鉅名賢陳瓘謫居秦觀以黨籍安置陳師錫以言事謫題詠郴州頗凉冷杜甫送舅氏詩云云橘井尚凄清風起三湘浪桞宗元和楊尚書郴州登樓詩游鱗出陷浦唳鶴繞仙岑云云雲生萬里隂石路九疑深戴叔倫過郴州詩云地盡江南戍山分桂北林火雲三月合云云暗谷隨風過危橋共鳥尋羇魂愁似絶不復待猿吟城頭鶴立處桞宗元和楊侍郎郴州紀事詩旌節下朝臺分圭從此回云云蘇耽傳耽化為鶴立城東北隅驛樹鳯棲來圖經有鳯䧏于庭隅莎城百粤北張籍送嚴大夫之郴詩旌斾過湘潭幽竒得徧探云云行路九疑南有地多生桂無時不養蚕聽歌難辨曲風俗自相諳山作劔攅江㵼鏡韓愈郴江詩云云扁舟斗轉疾於飛回頭笑向張公子終日思歸今日歸千峯險似三川峽阮美成詩云云一水聲如八月潮四六惟郴古郡號楚上游眷惟楚望孰若郴邦乃眷郴江實居嶺麓眷惟斗頗帶煙嵐惟郴江之名郡實湘楚之上㳺橘暗蘇仙之井苔荒義帝之碑郴素稱於姱俗地新控於賊巢序考韓公鍾扶輿清淑之氣詩形杜老有淒清凉冷之風桂林池近雖當五嶺之衝橘井凄清幸據三湘之上來綰縣章勉繼周濓溪之政卑棲酒正永懷唐御史之風永州零陵東安祈陽建置沿革禹貢荆州之域楚地翼軫之分野春秋戰國屬楚秦屬長沙郡漢武分置零陵郡屬荆州蜀先主既得益州乃分荆州之湘水為界長沙江夏桂陽以東屬呉南郡零陵武陵以西屬蜀及闗羽敗零陵屬呉孫皓分零陵南部為始安郡分北部為邵陵郡晋穆帝分零陵立營陽郡南齊為零陵郡隋置永州唐復為永州五季後周時我藝祖皇帝以勝敵雋功加永州防禦使開祉發祥實由此邦有若漢之沛唐之晋陽也今領縣三治零陵事要郡名零陵二水桞宗元湘口館記瀟湘二水所㑹也州因二水而名永三吾浯溪唐亭峿臺皆元結命名風俗參百粤之俗桞集瀟湘云云又謝表地極三湘俗參百粤左衽居椎髻之半可懇乃石田之餘其人鬼且禨桞宗元息壤記居楚越間云云又曰惟是南楚風浮俗鬼舉棹則有些聲栁拱辰風土記云云如楚詞之些助語也歌則有欸乃聲同上云云欸乃郎所以發歌桞宗元西巖詩亦用之今樵夫野老之歌猶有此聲游觀之佳麗見後桞宗元所作南池記形勝北接衡嶽舊經南接九疑云云面傃瀟湘周中行撰元結祠堂記背負九疑云云古泉陵一縣地零陵志隋置永州之後割營道永陽置道州馮乘為賀州又析湘源灌陽二縣為全州存者惟零陵祈陽爾本朝雖析零陵増置東安為三縣然大要不過云云九疑之麓桞宗元新堂記永州實云云山水竒秀倪均題浯溪序云云土産異蛇桞宗元捕蛇説永州之野産丨丨黒質白章觸草木盡死以囓人無禦之者然得之以為餌可以已大風其始太醫以王命聚之歲賦其二募有能捕之者當其租入有蔣氏者專其利三世矣問之則曰吾祖死于是吾父死于是今吾嗣為之幾死者屡矣余悲之曰若毒之乎余將告於蒞事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也又安敢毒耶余聞而愈悲孔子曰苛政猛於虎也孰知賦斂之毒有甚於是蛇者乎故為之説以俟觀人風者得焉香茅山川記永之野有丨丨芬馥数里貢以縮酒盖禹貢荆州所貢而楚苞茅不入即此零香生湘源石磬産零陵石屏出祁陽山川永山在零陵縣南九十里州因山以名西山在州西瀟江之外桞宗元愛其勝槩有西山宴游記云攀援而登箕距而遨則凡数州之土壤皆在祍席之下桞子詩云漁翁夜傍西巖宿曉汲清湘燃楚竹煙銷日黯不見人欸乃一聲山水緑九疑山零陵郡之望山元結云方二千里四州各近一隅小石山桞記有積石無土壤而生嘉樹美箭香陵山在零陵縣東数里石角山在州東北十里桞詩石角恣出歩長鳥遂遐征磴回茂樹斷景晏寒川明洞庭山謝元暉送零陵内史范雲詩洞庭張樂地瀟湘帝子㳺石鷰山唐仰雍湘中記零陵有石燕得風雨則飛翔風雨止則還為石朝陽巖在零陵南二里下臨瀟湘舊經道州刺史元結曽維舟山下以地髙而東向遂名朝陽有記猶存元結詩丨丨丨下湘水深朝陽洞口寒泉清零陵徒有先賢傳水石為娛安可羨桞宗元詩髙巖瞰清江幽窟潜神蛟開曠延陽景回薄攅林稍黄魯直遊朝陽洞云徘􅆦水濵乆之有白雲出洞中散漫洞口咫尺不相見詩云嵌竇響笙磬洞中出寒泉同遊四五客拂石弄潺湲俄頃生白雲似欲駕我仙又作欸乃曲云千里楓林煙雨深無朝無暮有猿吟停橈靜得曲中意好是雲山韶濩音張魏公德逺詩路幽遲晚日巖古挹流湘杜陵有歌云朝陽巖下瀟水深朝陽洞中寒泉清零陵城郭夾瀟岸巖洞幽竒當郡城荒蕪自古人不見零陵徒有先賢傳水石為娯安可忘長歌一曲留相勸澹巖在零陵南二十五里巖有二門中有澹山寺楼殿屋室隱隙鏬中雖風雨不能及四顧石壁削成萬仭傍有石竅古今莫測其逺近目下者有長徃之意大中張顥記云出乎天巧盤伏於兩江之間其形如龜其勢如龍周回二里中有巖竇可容萬夫古有老人處其下以澹氏稱因為此山之名秦有周君貞寔避焚坑之禍隱于此石床石井猶存唐興有僧到巖下坐盤石敷演法華真常妙理見二蠎各長数十尺盤于前師曰若受吾訓當釋汝形頃化雙狐能飛鳴名曰訓狐師居巖中凡五十年黄魯直詩去城二十五里近與天隔盡俗子塵春鼃秋蠅不到耳夏凉冬暖總宜人巖中清磬僧定起洞口緑樹仙家春惜哉次山世味顯不得雄文鑱翠珉又詩云澹山澹氏人安在徴君避秦亦不歸石門竹徑幾時有翠䑓瓊室至今疑洞中明潔坐十客亦可呼樂舞翠衣閬州城南果何似永州城南天下稀桞巖在瀟水西五里零陵宰主淮記零陵人世傳有巖在愚溪之右桞司馬嘗遊焉既而失所在今乃得于荒谷中東巖在州治東子城外舊有湍流相傳牧守流觴此水華嚴巖在城南唐為石門精空㨿法華寺南隅崖下桞宗元詩稍疑地脉斷倐若天梯往火星巖在州西江外巨竹髙脩古木樛曲地勝景清為零陵最竒絶處暗巖去澹巖三里必秉燭乃可入其間廣袤可容数萬人丹崖在州南百里零陵隴下石色如丹唐永㤗中有隴水令唐莭去官家于崖下自稱丹崖翁元結刺道州路出崖下見節甚重之因為作宅刻銘曰磳磳丹崖其下誰家門前斷舟籬上釣車不知幾峯為其西墉竹出石磴泉飛户中石鏡在中興崖石之側有劉愿石鏡序曰以水澤之其光燦然江山之盤紆草木之榮悴皆不可得而遁也息壤在零陵縣南故龍宫寺中狀若鴟吻色若青石自地出尺餘寺之初興夷之益髙人不敢犯子厚以為息壤所以堙洪水事非經見因為記以辨之浯溪在祁陽縣南五里流入湘江水清石峻唐上元中容管經畧使元結家焉結作大唐中興頌顔真卿大書刻于此崖結又為峿䑓唐亭石室諸銘陳衍題浯溪圖云元氏始命之意因水以為浯溪因山以為吾山作屋以為吾亭三吾之稱我所自也制字從水從山與广我所命也三者之自皆自吾焉我所擅而有也元結大唐中興頌并序天寳十四年安禄山陷洛陽明年陷長安天子幸蜀太子即位於靈武明年皇帝移軍鳯翔其年復兩京上皇還京師於戯前代帝王有盛德大業者必見於歌頌若令歌頌大業刻之金石非老於文學其誰宜為頌曰噫嘻前朝孽臣姦驕為昏為妖邉將騁兵毒亂國經羣生失寕大駕南巡百僚竄身奉賊稱臣天將昌唐繄睨我皇匹馬北方獨立一呼千麾萬旟戎卒前駈我師其東儲皇撫戎蕩攘羣兇克復指期曽不逾時有國無之事有至難宗廟再安二聖重歡地闢天開蠲除妖炎瑞慶大來兇徒逆儔㴠濡天休死生堪羞功勞位尊忠烈名存澤流子孫盛德之興山髙日昇萬福是膺能令大君聲容沄沄不在斯文湘江東西中直浯溪石崖大齊可磨可鐫刋此頌焉何千萬年黄魯直讀中興頌詩春風吹船著浯溪扶藜上讀中興碑平生半世㸔墨本摩挲石刻鬢成絲明皇不作苞桑計顛倒四海由禄兒九廟不守乘輿西萬官奔竄鳥擇栖南内淒凉幾茍活髙將軍去事尤危臣結春秋二三䇿臣甫杜䳌再拜詩安和忠臣痛至骨世上但賞瓊琚詞同來野僧六七軰亦有文士相追隨斷崖蒼蘚對立乆凍雨為洗前朝悲張文潜詩玉環妖血無人埽漁陽馬厭長安草潼闗戰骨髙於山萬里君王蜀中老金戈鉄馬從西來郭公凜凜英雄才舉旗為風偃為雨洒埽九廟無塵埃元功髙名誰與紀風雅不繼騷人死水部胷中星斗文太師筆下蛟龍字天遣二子傳將來髙山百丈磨蒼崖誰持此碑入我室使我一見昏眸開百年興廢増嘆慨當時数子今焉在君不見荒凉浯水弃不収時有遊人打碑賣米元章詩胡羯自千紀唐綱竟不維可憐德業淺有愧此碑辭張安國詩綉綳兒啼思塞酥重床燎香駈羣胡黄裙錦襪無尋處一夜驚眠摇帳柱朔方天子神為謀三郎歸來長慶楼楼前拜舞作竒祟中興之功不贖罪日光玉潔十丈碑蛟龍盤拏與天齊北望神京淚雙落只今何人老文學潘大臨詩公汎浯溪春水船繫船啼鳥青崖邉次山作頌今幾年當時治亂春風前明皇聰明真晚謬乾坤付與歌奴手骨肉何傷九廟焚蜀山騎騾不囬首天下寕知再有唐皇帝紫袍迎上皇神器倉皇吾敢惜兒不終孝聽五郎父子幾何不豺虎君臣寕能責胡虜南内凄凉誰得知人間稱家作端午平生不識顔真卿去年不答髙將軍老來讀碑淚沾臆公詩與碑當並行不賞邉功寕有許不殺奏章猶未語雨淋日炙字未訛千秋萬歲所鑒多王叔瞻詩蜀日既衰洛日亾前星靈武騰光芒元功百戰兩京復萬里呵瞞歸故鄉干戈紛紛徧四海浯碑已立湘江旁太師艱難喜粗定作此大字龍鸞翔紙摹縑塌四百載家家傳寳踰琳琅唐文中世未變古燕許偶儷為班揚次山之文可也簡此頌未追周魯商禄山滔天等窮澆春秋之法誅無將騁兵二字斥邉將此語豈足懲姦強末篇三章頗辭費筆力不復能鏗鏘磨崖勒銘亦何有反復自賛乃爾詳向來各人過許與舉世附和無雌黄淮西仆碑無墨客惜哉不得逢鍾王范至能云頌者美盛德之形容以其成功告于神明者也商周魯之遺篇可以槩見今次山乃以魯史筆法婉辭含譏盖之而彰後來詞人復發明呈露則磨崖之碑乃一罪案何頌之有竊以為未安題五十六字刻之石傍與來者共商畧之云三頌遺音和者希丰容寕有刺譏辭絶憐元子春秋法却寓唐家清廟詩歌詠當諧琴摶拊䇿書自管壁瑕疵紛紛健筆剛題破從此磨崖不是碑趙汝鐺詩蒼崖挿浯溪清漲濕元頌費墨今屋髙千年此安用鯨翻天寳末雲滃朔方衆還都寕上皇嗚咽抱餘痛兩宫重宴樂萬國盡朝貢當時紀成功小雅見微諷顔公發勁畫金玉相錯綜我于碑刻間衆羽得孤鳯艱危人物難忠烈鬼神重摹取掛野堂英風凛生棟愚溪在州西一里桞宗元丨丨詩序灌水之陽有溪焉東流入于瀟水或曰冉氏嘗居也故姓是溪為冉溪或曰可以染也名之以其能故謂之染溪余以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉古有愚公谷今余家是溪而名莫能定土之居者猶斷斷然不可以不更也故更之為愚溪愚溪之上買小丘為愚丘自愚丘東北行六十歩得泉焉又買居之為愚泉愚泉凡六穴皆出山下平地盖上出愚也合流屈曲而南為愚溝遂負土累石塞其隘為愚池池之東為愚堂其南為愚亭池之中為愚島嘉木異石錯置皆山水之竒者以余故咸以愚辱焉夫水智者樂也今是溪獨見辱於愚何哉盖其流甚下不可以溉灌又峻急多坻石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利世而適類於余然則雖辱而愚之可也寗武子邦無道則愚智而為愚者也顔子終日不違如愚睿而為愚者也皆不得為真愚今余遭有道而違於理悖於事故凡為愚莫我若也夫然則天下莫能争是溪於得專而名焉溪雖莫利於世而善鑒萬類清瑩秀澈鏘鳴金石能使愚者喜笑眷慕樂而不能去也余雖不合于俗亦頗以文墨自慰潄滌萬物牢籠百態而無所避之以愚辭歌愚溪則茫然而不違昏然而同歸超鴻濛混希夷寂寥而莫我知也於是作八愚詩紀於溪石上髙溪在州北九十里有唐叟者世居溪上乾德中忽厭喧雜謂諸子曰吾船居矣生涯瀟然徃來垂釣伏臘暫歸受子孫謁見如此累年黄溪在州北九十里桞子厚記有云環永之治其間多名山水而丨丨最善南池在子城外桞宗元陪崔使君燕丨丨序零陵城南環以羣山延以林麓其崖谷之委㑹則泓然為池灣然為溪其上多楓柟竹箭哀鳴之禽其下多芡芰蒲蕖騰波之魚韜㴠太虚澹灔里閭誠㳺觀之佳麗者已崔公既來其政寛以肆其風和以亷既樂其人又樂其身于暮之春徴賢合姻登舟於兹水之濵連山倒垂萬象在下浮空泛景蕩若為外横碧落以中貫陵太虚而徑度羽觴飛翔匏竹激越熈然而歌婆然而舞持頥而笑瞪目而倨不知日之將暮則于向之物者可謂無負矣昔之人知樂之不可常㑹之不可必也當歡而悲者有之况公之理行宜去受厚錫而席之賢者率皆在官蒙澤方將脫鱗介生羽翮夫豈趦趄湘中為顦顇客耶余既萎廢于世常得與是山水為伍而悼兹㑹之不可再也故志之瀟水去零陵縣三十歩源出九疑山至永與湘水合湘水在零陵北十五里其源自全來永與瀟水合堂館新堂舊在九疑山之麓今在郡治唐太守韋宙立桞宗元記公之蠲濁而流清豈不欲廢貪而立亷公之居髙而望逺豈不欲家撫而户曉然則韋公之立是堂豈獨草木土石水泉之適山原林麓之觀歟康功堂在倅㕔胡明仲詩政拙催科永陵守寔頼賢僚相可否邦人復嗣海沂歌倉廩雖空閭里有又酒闌四壁讀前碑吏隱猶勝五馬隨千古濓溪周别駕一篇清獻錦江詩臨瀟館在州西江山竒秀浮梁直其下漁村蕭寺上下映帶唐韋宙以碧湘名之美蕖館在東湖之上即南池唐刺史李衢建今為館范忠宣嘗家于此其旁有思范堂張敬夫書亭軒萬石亭在子城北栁宗元記御史中丞清河崔公來蒞永州間日登城北墉臨于荒野藂翳之隙見恠石特出度其下必有殊勝歩自西門以求其墟伐竹披奥欹側以入綿谷跨溪皆大石林立渙若奔雲錯若置棊怒者虎闘企者鳥厲抉其穴則鼻口相呀捜其根則蹄股交峙環行愕目疑若摶噬於是刳闢朽壤剪焚榛薉决溝澮導伏流散為踈林洄為清池寥豁泓渟若造物者始判清濁效竒於兹地非人力也乃立游亭以宅厥中直亭之西石若掖分可以眺望其上青壁斗絶沉于淵潭莫究其極自下而望則合為千纉巒與山無窮明日州邑耋老雜然而至曰吾儕生是州藝是野眉龎齒鯢未嘗知此豈天墜地出設兹神物以彰我公之德歟既賀而請名公曰是石之􅂾不可知也以其多而命之曰丨丨丨耋老又言曰懿夫公之名號也豈專狀物而已哉公嘗六為二千石既盈其􅂾然而有道之士咸恨公之嘉績未洽于人敢頌休聲祝公于明神漢之三公秩號萬石我公之德宜受兹錫漢有禮臣惟萬石君我公之化始於閨門道合於古祐之自天野夫献辭公壽萬年宗元嘗以牋奏𨽻尚書敢專筆削以附零陵故事三亭桞宗元記河東薛存義來蒞零陵宿蠧藏姦披露首服然未嘗以劇自橈山水魚鳥之樂澹然自若也縣東有山麓泉出石中乃作丨丨陟䧏晦明髙者冠山巔下者俯清池游息具於是西亭在零陵縣東山法華寺栁宗元有留題雙鳯亭郡守彭合建學有異石伏壤間其上成文滌視之若羽而駢飛者盖鳯之形記云鳯文物也永之士將以文鳴歟玩鷗亭在州西汪彦章謫居日建自為記曰客有過而問焉者曰子之鷗信可玩乎余曰我與物同見於天地之間者以形而我之知物物之知我者以心使吾心有以勝物則李廣之石可使為虎使吾為物所勝則樂令之弓亦能為蛇是二者無情之木石也徒以人心之故使之若出於有情如此茍吾心反如木石而無所示焉則鷗莫得而闗矣何為而不可玩哉西軒在龍興寺桞宗元闢下瞰大江花月樓在州前雄冠一州古跡秦馳道在零陵東八十里闊五丈餘類今之河道兩岸如削夷險一致始皇命天下修道以備遊幸即此也懷素堂在州東五里相傳唐僧懷素嘗於此草書有墨池筆塜在其側漫郎宅在浯溪上曹輔詩峿臺倚溪雲唐亭枕溪石水石競竒麗中有丨丨丨畢方之恠桞宗元逐畢方文云永州元和七年夏多火炎人無安處老弱燔死晨不㸑暝不燭皆列坐屋上左右視盖類物之為者訛言相驚云有恠鳥莫實其狀山海經云章義之山有鳥如鶴一足赤文白喙其名曰畢方見則其邑有譌火若今火者其可謂譌歟而人有以鳥傳其畢方歟遂命邑中狀而圖之禳而磔之為之文而逐之云欎収孽暴禍兮混合恢台民氣不舒兮僵路顛頺又云祝融悔兮回禄屏氣太陰弛威兮𤣥冥行事螭室桞宗元云零陵城西有蛟室于江法曺史唐登浴其涯螭牽以入作愬螭文投之江名宦召信臣為守龍述字伯髙馬援戒其兄子曰龍伯髙端厚周謹願汝曹效之后為零陵太守桞宗元河東人正元間為監察御史裏行王叔文韋執誼得政引與計事擢禮部員外郎叔文敗貶永州司馬薛存義為守韋宙為刺史州負嶺轉餉艱險每飢人輒莩死宙始築常平倉収糴羨餘以濟皇朝周頥治平為倅嘗著拙賦今倅㕔有拙堂取此以名南軒作州學祠記曰本朝文忠宣公范内翰公鄒侍郎公皆建祠于學宫矣惟先生嘗倅此州遂即殿宇東偏闢祠胡安國紹興間知永州胡寅紹興八年以徽制知十年再知楊萬里為零陵城建誠齋紹熈賜宸翰人物蔣琬零陵湘鄉人為蜀丞相黄盖零陵泉陵人也仕蜀赤壁之役建䇿火攻領武陵太守元結后魏常山王十五代孫少居商餘山稱元子避時入猗浪洞稱猗琅子後居瀼濱自稱浪士天寳十二載舉進士第禮部侍郎楊浚見其文曰一第溷子耳有司得子是頼時人謂浪者亦漫為官遂呼漫郎及家樊上漫遂顯廣德元年拜道州刺史喜浯溪因家焉名賢皇朝蘇軾自昌化徙永州蘇轍自雷循徙永州黄庭堅謫宜州道過永州留連􅂾月邢恕謫永州丞相劉莘老有答恕書云永州佳處第徃以俟休復張浚謫居方疇字耕道以上書得罪謫居永州作困齋張南軒記題詠寓居湘岸四無鄰桞宗元詩云云世網難嬰毎日珍青玻璃盆挿千岑黄魯直慈氏閣詩云云湘水水清無古今何處拭目窮表裏太平飛閣暫登臨四六眷兹二水冠于三湘地連楚越水合瀟湘地極三湘俗參百粤文士辱臨地望増重况二水之名邦乃九疑之支麓濫承分虎之恩方軫捕蛇之念矧是永陽之古郡寔惟平楚之中流山靈因桞子之詩今猶晶采石崖有元郎之頌誰不品題濓溪夫子嘗因半刺以拜官山谷老人亦泛扁舟而懷古讀子厚之文當念斯民之重歛勒次山之頌更觀今日之中興願屬鈞陶益見容我等之数百軰待㸔勲業當為刻中興之第二碑方輿勝覽卷二十五
