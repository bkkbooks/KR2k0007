body:
  text: 方輿勝覽卷十八宋祝穆撰信州上饒玉山貴溪鉛山弋陽永豐建置沿革禹貢揚州之域吳地斗分野春秋戰國迭為吳楚之地秦屬九江會稽二郡漢屬豫章之餘干縣及會稽郡之太永縣三國又屬鄱陽郡葛陽縣之地晉宋及隋屬鄱陽東陽二郡陳改葛陽為弋陽縣唐析饒之弋陽衢之玉山常山及建撫二州之地置信州皇朝因之今領縣六治上饒事要郡名上饒寰宇記所謂丨丨者以其旁下饒州之故也廣信同上上元元年因江淮轉運使元載之請謂川原敻逺關防襟帶宜置州又謂其信可美也故名州風俗土瘠民貧郡國志其丨丨其丨丨文風日盛同上自本朝來云云形勝地控閩粵韓無咎修子城記丨丨丨丨鄰江淮引二浙隱然實要衝之會犬牙於閩同上陶氏義居記信安之地云云江吳閩越之交元絳靈鷲寺序地據云云為東南望鎮李彌大玉山海法院記當吳楚閩粵之交云云今為通要郡志福建湖廣江西諸道悉出其塗昔為左僻云云嗇於水泉洪駒父石井泉記富於巖岫云云山鬱珍竒鄱陽記産銅鉛鐵云云土産水晶靈山出丨丨王介甫詩靈山寧與世為仇斤斧侵凌自不休水玉比來聞長價市人無數起相酬梅宛陵送裴信州詩攢青歷歷向靈山刺史日坐雲屏間楚人競握水晶璞漢女買作玉佩環山川靈山在上饒西北九十餘里有七十二峯爾名靈鷲山為州之鎮山衆峯聳天末岡勢迤邐從北來州宅枕其趾韓無咎詩諸峯七十二磊砢略可推定知水晶宫開藏神所司南屏山在上饒其山由東南以來為波濤起伏之狀及至於州治前則周環拱護秀潤之氣可挹也銅山在上饒南四十里鐡山在上饒東南七十里懷玉山縣以此名鉛山在上饒西八十里象山在貴溪縣以形得名陸荆門九淵曩嘗作書院其上以待講學之士且以自號云龍虎山在貴溪西南百里方輿記兩石相峙山峯屹立狀若丨丨乃漢張道陵所居月巖在上饒西三十里上有穴穿出山背逺望如月朱喬年詩鑿破巉巗不計春山腰千古挂氷輪誰知擘破三峯石聊出娟戲路人陸務觀詩云幾年不作月巖遊萬里重來已白頭雲外連娟何所似平羌江上半輪秋南巖去上饒縣十里巖旁巨石儼然其下寬平可坐千人士女遊賞之地朝補之韓無咎皆有詩洞巖去玉山三十里林麓掩映巖石竒秀仙巖在貴溪南七十里峯巒削立髙出雲表巖石嵌空多為洞穴房室窗牖床榻倉廪棺槨雞犬禽鳥之狀朝太史以為大水時人宅山上所作或題詩云稽天巨浸洗南荒上有千峯骨立僵民未降邱應宅此舉頭天壁有囷倉徐巖在貴溪縣員外徐紹景讀書之所王介甫贈詩云茂林修竹翠紛紛坐占山阿與水濆笑傲一生雖自樂有司還欲選方聞丫頭山在弋陽西六十里有大石岐首故名或題詩云何不梳粧便嫁休長教人喚作丨丨后施逵續云只因未有良媒在直到如今萬萬秋分水嶺在信州崇安縣界朱文公詩水流無彼此地勢有西東若識分時異方知合處同雲洞去州二十餘里頗有遊者神石在弋陽東橫出大溪縣治賴以捍截波流玉溪在玉山縣前弋溪在弋陽東二十里有大石面如鐫弋字元絳詩玉露精神山合沓溪成文字水橫斜葛溪在弋陽施肩吾弋陽訪古詩行逄丨丨水不見葛仙人空拋青竹杖呪作葛帔神紫溪在鉛山縣南四十餘里有市鵝湖在鉛山縣西南十五里上有葛玄冡舊經謂昔有龔氏居山傍蓄鵝成羣有仁壽院張濱詩丨丨山下稻梁肥豚穽雞栖對掩扉桑柘影斜春社散家家扶得醉人歸淳熙初年晦庵朱文公象山陸公會于此地陸子靜詩墟墓生哀宗廟欽斯人千古最靈心涓流積至滄溟水拳石崇成泰華岑易簡工夫終久大支離事業竟浮沉欲知自下升髙處真偽先須辨古今朱元晦次韻德義風流夙所欽别離三載更關心偶扶藜杖過寒谷又枉籃輿度逺岑舊學商量加粹密新知培養轉深沉只愁説到無言處不信人間有古今二詩兩存之以俟后之君子學舍宗文書院在鉛山縣鵝湖寺淳祐庚戌江東提刑蔡抗建奏請于朝御書今額蓋文公朱先生象山陸先生曽講辨于此堂亭面山堂在州宅朝太史詩誰榜鈴齋作面山晦冥終日捲簾看賦成夜燭才銷寸衙退朝曦未半竿玉光亭在玉山縣廳東不知創始之自章希言詩千層懷玉對軒窗池上新亭號玉光抵此便堪為吏隱神仙官職水雲鄉王介甫詩傳聞天玉此埋湮千古誰分偽與真每向小庭風月夜却疑山水有精神軒榭絶塵軒韓無咎記貴溪尉舍舊有黃梅出於垣間元符己卯嵗廖明略舉宋廣平之事題曰能賦堂以况尉君曽敬之也明略既為之記而朝無咎題其后謂其於敬之逺矣又和其試茶看花二詩有兩絶塵之句則敬之為人固可知也後八十有二年福唐鄭肇之為尉于此乃葺堂而更新之訪梅之枿而增培之豫因榜之曰絶塵蓋取無咎詩中語也祠廟陸象山祠先生撫州人諡文安學者即象山書院而為之祠名宦栁渾為永豐縣令皇朝錢易為信倅楊大年送行詩家廟藏金劵京塵弊黑貂章得象為玉山令孔武仲為推官修學記謂為教授蓋權耳朝補之紹聖中嘗為酒官王愈汪彥章二喜後樂二堂碑云宣和間盜發清溪入睦入歙蹂十二州之地初部使者不以聞守州令邑者比疆連壤無一人奉尺書為朝廷言者獨信州王公曰賊不百里俯吾境萬一不戒如吾民何即斥金帛募士增陴浚隍修戰鬪具賊果以偏師嘗我克之已而盡鋭攻號數萬乃縱竒兵鏖擊大敗拔營去追奔俘䤋至不勝計縳其偽統軍以獻東南以平愈進職若官殊等人物陸鴻漸號東岡子在城北有故居皇朝張叔夜靖康間將勤王兵入京城為簽書樞密后死國難其家葬衣冠於靈鷲山后立廟賜名旌忠朱文公為記鄭驤玉山人知同州虜入寇死之遂與張叔夜立雙廟陳康伯弋陽人為相判信州汪應辰字聖錫玉山人本名洋紹興進士第一賜今名仕至端明韓元吉字無咎號南澗仕至尚書徐元杰上饒人壬辰廷對第一仕至國子祭酒禮部侍郎自號梅野趙茂實序其文集曰士君子有尊主庇民之學不幸當其時之所難積誠所感既足以回事勢於危疑矢鋒深忌竟殞其身於非命漢之蕭望之李固杜喬近日之梅野是也望之以身捍恭顯固喬以身捍梁冀梅野以身捍權臣或誤下廷尉死或同日以獄死或以非病死其死一也獄死者蓋甚明而非病死者至今未得明其尤可悲也夫梅野蚤從朱文公先生之門人陳君文蔚遊又嘗取正於真文忠公其學固已知大標本而心事真切禍福利害有所不入又其所素長也故自其對大廷已純正不雜而其後入告又皆忠實無隱學者稱之淳祐甲辰適值權臣起復六館之士譁然言于天子之廷天子疑焉公以二疏入對經幄明白懇到上當帝心自是靡言不聽權臣奪起復而杜立齋相遊克齋召矣當是時朝廷清明衆正來會公論為之大快臣知有忠子知有孝士大夫知有邪正上之嚮公意日甚而公身遂危矣公年事未衰頥養無玷一旦遽罹于死中外震驚行道之人莫不愀然以疑廟堂郎寺監百執事皆為之寢會食嗟夫孰不有死公之死亦異矣哉當是時朝廷詔獄而僉壬以身任折獄之責其事竟不得而明至今纍年矣忠臣義士未嘗一日不寃之追論往事至有為之泣下者近廷紳狂佞之夫忽唱異論謂公死實暍死且誣公以羽翼權臣曲學阿世而破千萬載公議之是非其疏一出萬口唾斥於公何傷而其人之亡忌憚乃至於是重為世道嘆也公之子直諒直方文學氣節克肖厥父以公遺文來請序余讀之盡卷其正大如望之其忠切如喬固而其歿又皆可閔故併論之淳祐己酉夏四月壬寅朔浚儀趙汝騰序名賢龐籍祥符中侍其父為鉛山令嘗𨽻業於崇夀院楊億字大年祖文逸宰玉山億生之夕文逸夢一羽衣自稱懷玉山人覺而億生億后有詩送表弟章得象知玉山縣云懷玉煙霞接武夷我思祖德涕沾衣縣齋製錦留遺愛庭樹藏環長舊圍彭澤公田今已廢遼東邑子半應非津亭送别空回首籍在金門未得歸題詠傳聲典信州杜子美送王信州詩云下詔選郎省云云強喚作知州徐俯詩云雲洞看雲坐月巖和月留元來是野老云云氷為溪水玉為山唐戴叔倫送人之廣信詩有云家在故林吳楚間云云更將善政化鄰邑遙見逋人相逐還地僻山深古上饒白居易送人貶信州判官詩云云士風平薄道程遙不惟遷客須棲屑見説居人也寂寥銅鉛滿穴山能富盧綸送信州姚使君詩云朱轓徐轉擁羣官猿鳥無聲郡宇寬楚國上腴收賦重漢家良牧得人難云云鴻鴈連羣地亦寒幾日政聲聞外户九江行旅得相歡四六疏榮中扆作鎮上饒惟信置郡自唐分疆眷言古郡間出異材近聨閩浙逺控江淮惟上饒之名郡折建撫二州之地矧楚尾吳頭之地實江左之奧區當江吳四塞之衝據閩商粵賈之衝地僻山深尚帶甌閩之俗峭壁竒岩朝大中歸於浲水民貧賦嗇偶聨江浙之區茂林修竹徐隱君應於方聞郡分江左奈士俗之素貧地近日邉幸政聲之易逹性覺心通得象山講論之要源同𣲖别參鵝湖酬唱之篇蹈白刃於艱危既髙氣節位黃扉於平治尤盛勳名蚤冠羣英有汪端明之學問見推巨擘為韓南澗之文章玉山氷水可知太守之清標雲洞月巖盡屬詩人之勝槩縣在水雲况是郇公之臨􅊩亭藏風月亦嘗荆國之留題饒州鄱陽樂平餘干德興浮梁安仁建置沿革禹貢揚州之域星紀之次牽牛須女分野春秋屬楚吳伐楚取畨秦為鄱陽縣屬九江郡漢屬豫章郡東漢至鄱陽屬廬陵郡隋改鄱陽郡為饒州唐因之南唐建饒州為永平軍國朝復為饒州今領縣六治鄱陽都大坑冶江東提刑置司事要郡名鄱陽見沿革注風俗物産豐饒徐湛鄱陽記云饒州之北有堯山嘗以堯為號又以地饒衍遂加食為饒通典曰隋置饒州丨丨丨丨家富戶羡吳孝中作餘干縣學記饒之為州壤土肥而養生之物多其名丨丨而丨丨為父兄者以其子弟不文為咎民不迫遽趙汝礪志處士夏侯君墓地有金錫絲枲魚稻之饒故其云云其人喜儒同上云云故其俗不鄙薦士德興為最汪彥章德興縣樓記環饒之境歲以士薦于州其縣六而德興為最雖其風氣使然亦山川有以相之有陶唐之遺風元祐餘干進士都頡曰堯山之民云云履畨君子故地劉禹錫答微之書瀕江之地饒為大云云漸甌越之遺風餘干有畝鍾之地武林有千章之材形勝據大江上流趙汝礪作墓志鄱江云云地沃土平歐陽詢法帖云年二十時至鄱陽縣喜其丨丨丨丨土産白金程逈撰重建德興廳事記元祐四年銀場廢以至于今耆老云方産丨丨時邑無俊造之民自後與計偕登科級者甲於饒之諸邑名儒巨公相望而出矣鎔銀擷茗唐元稹行齊照饒州刺史制饒為沃野而鄱有丨丨丨丨之利冶鑄之地開寶間置錢監於鄱陽後分於饒贑淳熙復併歸饒魚蝦之鄉郡志瀕江郡蓋云云山川堯山在鄱陽西相傳堯時浲水避難者居之芝山洪遵詩注云唐元朔間山産芝草故名又云饒瀕大江而丨丨院危坡屹起可以望范希文詩樓殿冠崔嵬靈芝安在哉雲飛過江去花落入城來石印山圖經吳時鄱陽歷陵山石文理成字諺云石印啓封天下太平餘干山一名羊角山兩峯面面相向狀如羊角有乘風亭為一邑絶覽之地天氣清明望見廬山今名吳楚冠冕樂平山在縣西十里一名石墨文筆峯乃妙果禪院一塔范希文曰此文章之應也名為丨丨丨下枕湖水目為硯池且謂二十年後當出狀元治平乙巳趙尚書汝礪果廷對第一石城巖在樂平縣南六十里凡十餘里間皆怪石李常名曰叢玉李伯時寫為圖曽肇諸人皆有詩洪巖在樂平東北九十里此巖最著其中雲氣泉聲相雜雷岡大丨丨雷義仲所居小丨丨雷煥所居鄱陽湖其湖綿數百里中有山鄱江三縣水合流入彭蠡湖琵琶洲在餘干縣南水中擁沙成洲狀如丨丨唐朝韓賓客裴尚書李侍郎故居方干詩戟户盡移天上去里人空説舊簮纓容齋三筆云紹興中汪洋一絶句云塞外風煙能記否天涯淪落自心知眼中風物參差是只欠江州司馬詩堂亭慶朔堂在州治范希文創取古諸侯藏朔之義公詩云丨丨丨前花自栽便移官去未曽開年年憶著成離恨秖記春風管勾來得心堂在州宅取吳芮得民心之義范希文名識山堂在州宅望廬山於三百里外最為楚東勝地四望亭在郡城上范希文建汪彥章詩縱橫盡得江山勝俯仰方知宇宙寬千里風煙環廣坐四時星斗轉危欄王龜齡詩有澤宜觀水無簷不礙山鄱君千里國俯仰一亭間秋香亭在坑冶范希文有賦白雲亭劉長卿餘干縣故城詩孤城上與白雲齊萬古荒涼楚水西官舍已空秋草緑女墻猶在夜烏啼平江渺渺來人逺落日亭亭向客低沙鳥不知陵谷變朝飛暮去弋陽溪黃魯直次韻吳可權詩曩誰築孤亭勝日有感遇永懷劉隨州因榜白雲句遺老不能談新陳忽成屢緑陰斤斧盡華屋風雨仆吳侯七閩英宰縣有真趣弦歌解民愠根節去吏蠧材收佛宫餘工有子來助厦成燕雀賀水滿鳬鴈翥四海名士來一笑佳客聚雲興碧山留雲隨清江去斯須成蒼狗皆道不如故至人親萬物誰有安立處寄語吳令君但遣糟床注干越亭與白雲亭相對李德裕建權載之詩丨丨丨邉嵗暮逄劉長卿詩云天南愁望絶亭下桞條青落日獨歸鳥孤舟何處人王龜齡詩云我來鄱君山水州山水入眼常遲留絶勝遙瞻雲錦洞清音下瞰琵琶洲干越亭前越風起湖繞鄱陽三百里曉來一雨洗清秋身在江東畫圖裏聚逺亭在德興縣中最勝處郭功父趙道皆有詩五峯亭張安國和鄱陽丨丨丨詩云廬山真滿眼秀句憶東坡樓臺鄱江樓在南城上唐有此名有錢起詩祠廟饒娥廟桞宗元丨丨丨碑云娥父醉渙風卒起不能舟遂以溺死娥聞父死走哭水上氣盡伏死明日黿魚鼉蛟浮死萬數鄉人葬娥鄱水西名宦周魴吳人吳芮漢人為鄱陽縣令得江湖間民心虞翻按會稽典録云文章之士則鄱陽太守丨丨也虞溥晉人為內史王廙晉人為內史立學北門內陸襄梁人為內史桞莊隋人梁文謙並為刺史張廷圭唐人顔真卿為刺史李德裕為餘干令皇朝范仲淹坐朋黨出知饒州冷齋夜話云公守饒日有書生獻詩甚工自言平生未嘗飽時歐陽率更薦福寺碑墨本直千錢文正為打干本使售京師紙墨已具一夕雷擊碎其碑東坡詩一夕雷轟薦福碑是也王安石為本路提刑人物陶侃鄱陽縣人今城中之延賞坊即其故居也後徙居潯陽皇朝洪皓樂平人奉使北朝不屈後講和好還朝兼權直院出知鄉郡三子適遵邁皆中詞科繼踵北門邁作謝表云父子相承四上鑾坡之直弟兄在望三陪鳯閣之遊時人榮之以為忠義之報適為相自號盤洲遵為樞密有别墅曰小隱邁為內翰有别墅曰野處孝宗御書二字趙汝愚居餘干為相趙蕃有詩云五王不解去三思石顯端能殺望之未到浯溪讀唐頌已留衡嶽伴湘纍生前免見焚書禍死后重刋黨籍碑滿地蒺藜誰敢哭謾留楚些作哀詞題詠江向弋陽斜李端送樂平苗明府詩云本自求彭澤誰云道里賖山從古壁斷云云暮色隨楓樹陰雲暗荻花諸侯舊調鼎應重宰臣家饒陽因得富州名唐章孝標送饒州張使君詩云云不謂農桑别有營日暖持箱依茗策天陰抱火入銀坑江寒魚動槍旗影山曉雲和鼓角聲太守能詩兼愛靜西樓見月幾篇成三出邉城鬢似絲范希文詩云云齋中瀟灑過禪師每踈歌酒緣多病不負雲山賴有詩半雨黃花秋賞健一江明月夜歸遲人間禍福何須道問著衰翁也自知惠及饒民幾萬家李深題范文正公祠堂詩一章奏免貢新茶云云遺老至今懷德政為余談此屢咨嗟杖藜携酒看芝山葉少藴石林詩話劉季孫以左班殿直監饒州酒稅王介甫為江東提刑循歷案務見屏間有詩云呢喃燕子語梁間底事驚回夢裏間説與傍人都未信云云公大稱賞問誰所作或以季孫對召之與語嘉嘆升車而去不復問務事既至傳舍郡學生請差官攝州學事公判監酒殿直一郡大驚遂知名云郡國開處是詩題姚合送饒州張使君鄱陽勝事聞難比千里連連是稻畦山寺去時通水路云云化行因免農人勸庭靜惟多野鶴栖飲罷春明門外别蕭條驛路夕陽低江到潯陽九𣲖分皇甫冉送李録事赴饒州北人南去雪紛紛鴈呌汀洲不可聞積水長天隨逺客孤舟極浦足寒雲山從建業千峯逺云云借問督郵才弱冠府中年少不如君四六榮分漢竹小駐鄱江維時饒郡自古興區州名饒富郡號豐腴江湖之濱水陸之會矧東楚之名邦實番君之故國乃眷舟車之會設為冶鑄之場眷吳頭楚尾之邦得召父杜母之政畨君山水之國惠然臨之范公廊廟之材自此升矣餘干乃番之故都有華作牧逺方聞滕之仁政必願受㕓廣谷大川當吳楚之交會流風善政有顔范之典刑州以富名擅擷茗鎔銀之利地皆沃土夸植桑播穀之饒拜顔魯公于堂已知磊落繼范文公之轍行即騫騰棠棣相輝有洪盤洲之人物公槐進位乃趙忠定之聲名地饒絲枲未忘逐末之風江富魚蝦亦足養生之具地沃土平請閲率更令之帖江寒山曉更吟章孝標之詩抗章而辭蓬島似厭直廬携酒而看芝山肯臨便郡番君得江湖之心定酬民望雷令候斗牛之氣乃借鄰光廣德軍廣德建平建置沿革禹貢揚州之域吳地斗分野春秋屬吳楚之伐吳及桐汭其地后屬越戰國屬楚秦置鄣郡漢改鄣郡為丹陽郡復以為廣德國封中山靖王之後後漢置廣德縣晉屬宣城縣宋立綏安縣梁分置石封縣隋改石封為綏安縣又屬宣州又更綏安縣為廣德縣皇朝建為廣德軍以郎步鎮置建平縣以𨽻焉領縣二治廣德事要郡名桐川廣德縣西南有桐水故名桐汭水內曰汭風俗民醇事簡桐汭志云云號江東道院食貨富饒南豐鼓角樓記形勝故鄣之墟同上云云體如大邦同上溪流枕其后郡志三峯拱其前云云山川靈山在軍南七十里泉石甲於一郡橫山城外五里最為髙峻鴉山産茶梅詢詩茶煮丨丨雪滿甌伍牙山在建平伍員伐楚經此東湖在朝陽門外三十里南湖去建平四十里入丹陽湖桐水在軍西北源出白石自宣城界流入丹陽湖堂亭靜治堂在郡治秀逺堂陳天麟詩云笋槊秧針入圖畫令人魂夢到家山樓臺鼓角樓曽子固記云熙寧元年冬廣德軍作新門丨丨丨成太守令文武賔屬以落之既而以書走京師屬鞏曰為我記之鞏辭不能書反覆至五六辭乃為文曰蓋廣德居吳之西疆故鄣之墟境大壤沃食貨富攘人力有餘而獄訟赴訴財貢輸入以縣附宣道路四阻衆不便利歷世久之太宗皇帝在位四年乃按地圖因縣立軍使得奏事專決體如大邦自是以來田里辨爭嵗時稅調始不勤逺人用宜之而門閎隘庳樓觀弗飾於以納天子之命出令行化朝夕吏民交通四方覽示賓客弊在簡陋不中度程治平四年尚書吏部員外郎知制誥錢公公輔守是邦始因豐年聚財積士將改而新之會尚書駕部郎中朱公壽昌來繼其任明年政成封內無事乃擇能吏揆時庀徒以畚以築以繩以削門阿是經觀闕是營不督不期役者自勸自冬十月甲子始事至十二月甲子卒功崇墉崛興復宇相瞰壯不及僣麗不及奢憲度政理於是出納士吏賓客于是馳走尊施一邦不失宜稱至於伐鼓鳴角以警昏昕下漏數刻以節晝夜則又新是四器列而樓之邦人士女易其聽觀莫不恱喜推美頌嘆夫禮有必隆不得而殺政有必舉不得而廢公於是兼而得之宜刻金石以書美實使是邦之人百世之下於二公之德尚有考也集仙臺在祠山絶頂乃張王興迹之地守梅詢建詢詩與郡守王渙曰我有集仙經始在勞君一到為重修祠廟張王祠在軍西五里祠山上顔真卿碑新室之亂野火焚其祠又云其靈迹自漢始著或云即張安世名宦皇朝范仲淹言行録范希文以進士解褐為廣德司理日抱其獄與太守爭是非守盛怒公不為屈歸必記其往復辨論之語於屏上比去至字無所容貧止一馬鬻馬徒步而歸孫覺莘老以詩紀其事云維時陛牢下枉直情畢通太守異趣舍挺然不曲從事事爭救之粉屏記其終官小俸祿薄家居率窮空賣馬以自給徒行氣彌充梅詢為太守孫覺為右正言因論青苗之害黜知廣德人物張介隱居城北紹聖間正言孫諤出守是邦嘗携酒造之與之酬唱有竹林藏月讀書家之句屢欲薦于朝力辭不就查深字道源力學隱居郡守錢公輔築堂延請教誘郡人子弟題詠濃緑浮空四面山李參政光留題郡子城三峯樓曰上虞李泰定提兵平宣城寇回登此留宿紹興壬子季春五日題一川花桞擁雕欄云云便欲携家來此住不將名姓落人間四六疏榮芝檢來牧桐川恭命竹符承流桐汭析宣城之雷邑創汭水之斗邦載仰行都未覺九重之天逺雖云支壘足當一路之風寒凝燕寢之香文書既簡煮鴉山之雪風味亦清指日待糧皆尺籍伍符之舊無時致餽當大車駟馬之衝髙牙列戟體未遜於大邦堅甲利兵偹實嚴於要地自孫莘老之分符尚存詩句及查道源之設教益盛文風事簡民醇昔蓋稱於道院財殫賦嗇今頗窘於軍需城角吹梅曽是曽南豐之作記圜扉鞠草况逄范文正之詳刑范文正盛時之名相理椽嘗臨曽南豐間世之大儒譙樓是記方輿勝覽卷十八
