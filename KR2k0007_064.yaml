body:
  text: 方輿勝覽卷六十四宋祝穆撰合州石照漢初巴川赤水銅梁建置沿革禹貢梁州之域秦地參井之分野古巴子之國秦以其地為巴郡今州即秦漢巴郡之墊江也東漢及魏晋因之宋於此置宕渠郡南齊以墊江縣屬寧蜀郡西魏置合州改墊江為石鏡縣改宕渠曰墊江郡後復曰宕渠隋廢宕渠郡改合州曰涪州煬帝置涪陵郡唐復為合州改巴川郡復為合州皇朝因之及分川陜為益梓利䕫四路而合𨽻梓州路今領縣五治石照事要郡名巴川墊江風俗土風朴厚華陽國志巴蜀之人質直好義云云有先民之流人多秀異墊江志表之以四山之環合中之以兩溪之襟帶田畝桑麻左右交映丨生其間丨丨丨而喜習詩書形勝乃古墊江按漢晋宋志巴郡之墊江縣今為合州之石鏡縣此丨丨之丨丨通典云魏恭帝始置忠州墊江縣後周改魏安隋開皇十八年復為墊江乃今忠州之墊江枕二江口趙協新堤記合州丨丨丨之丨衆水之湊也重修單公堤記涪漢合流州因以名巴蜀要津朝公武清華樓記魏大統初於丨丨丨丨置合州其山曰龍多銅梁上接岷峨下繚甌越或斷或續屬海而止所謂南戒也其水曰涪曰嘉陵合流於城下貫江沱通漢沔控引衆川偕入于海所謂南紀也山川銅梁山在石照縣南五里左思蜀都賦外負銅梁即此山縉雲馮時行序山有茶色白甘腴俗謂之水茶甲於巴蜀山之北趾即巴子故城多玉蘂花元和志出鐡及桃竹杖東山在石照縣東十里家子伯章之别業也下瞰涪江東臺山在石照縣東北七里東漢末薛融讀書於此牟山在石照縣西二十里唐康元良讀書於此學士山在石照縣東五里直郡治之江樓其髙不踰旁山而南峯斜崖諸山班班若出其下亦甚異也山西北張氏荔枝異本合幹唐文若曲端賦之釣魚山在石照縣東十里涪內水在其南西溪上流經其北郡人遊者以舟下涪水艤而上已乃繞山北沿西漢水而歸此遊觀之竒也山南大石砥平有巨人跡相傳異人坐其上投釣江中山以是名下有大剎曰護國每嵗二月八日郡守帥僚屬宴集於此純陽山在石照縣北三里州治在其寶陽唐女冠范志元得道處天間天使任安者至山中慕之而志元變為男子劉儀鳯詩曰誰家遊冶郎闖首窺幽闥但見臉如花不知心似鐡一夕變其軀雲姿映雲髮昔為桃李姿今作松篁節龍多山在赤水縣北五里按唐孫職方樵丨丨丨録有至道觀東有大池即唐武后時放生池中峯有鷲臺院東有佛慧院有萬竹竹徑圍尺有東巖廣五十丈多唐人刻字又有靈山院泉自巖出瀦為方池大旱不竭其山髙明窈深變態萬狀有駕鶴軒下視涪水如帶煙雲出沒山之偉觀也圖經云廣漢人馮蓋羅煉丹於丨丨丨之仙臺晋永嘉三年舉家十七人仙去孫樵丨丨丨録亦紀其事馮時詩兒童便讀山中記老大才登記裏山何騏詩世路聱牙赤水過故升天險問龍多書中舊識唐公昉圖裏又聞馮蓋羅龍門山在銅梁縣東北七十里山髙一里隱者蘇汝礪之居也有書院藏書三萬卷雙山在巴川縣南五十里相傳昔漁者網得二石其一失去其一留因即山築室而寶祠之石埋土中其可見者髙不盈咫廣尺有二寸聖燈山在巴川縣西六十里巖間夜有光熒然中峯在巴川縣東南六十里山環二十里如盤民錯居如畫有泉自山注下曰天池南峯在巴川縣東四十里髙五里是為峽山之首兩山復出對峙中廣十里塗左有竇謂之仙洞其深五里竇水流出為澗有嘉魚北巖在州北五里或附會為濮巖非也巖有木數千章率圍八九尺有定林院正月九日郡以故事設宴遊人盛集又有荔枝閣斜崖在石照縣東北八十里髙十餘里有石橫亘崖腹如拖修帛迤長四五里崖以此得名下有洞謂之龍洞水由中出墊江三國志謂先主詣丨丨即此內江在州南百步源出剛氏檄外有石屹立水心正圓如月其頂嶄岩如雲氣俗謂石鏡冬出水可三丈南流至渝州入江又名內江唐杜甫送十五弟使蜀詩數杯巫峽酒百丈內江船注水自渝上合州者謂之內江由戎瀘上蜀者謂之外江嘉陵江在石照縣東宕渠水酈道元水經謂之潜水又謂之渝水俗謂渠江在縣北十里西漢水在石照縣東百步天下之大川以漢名者二班固謂之東漢西漢而黎州之漢水源於飛越嶺者不與焉固之所謂東漢則禹貢之漾漢其源出於今興元之西縣嶓塜山徑洋金房均襄漢至漢陽入江者是也西漢則蘇代所謂漢中之甲輕舟出於巴乘夏水下漢四日而至五渚者其源出於西和州徼外徑階沔水與嘉陵水會俗謂之西漢又徑大安軍利劔閬果合與涪水會至重慶府入江堂樓沈厚堂取姚崇稱張柬之之言以名江樓在郡治清華樓在郡治有朝公記古跡什邡城九域志漢封雍齒為什邡侯即此巴子城在石照南五里仙柏在龍多山圍丈有二尺中空而柯葉敷腴名宦張柬之以諫諸王娶突厥女出守合州皇朝文同為銅梁縣令周頥僉書合州判官郡事不經先生手吏不敢决虞允文為守人物譙君黃仕漢成哀間為諫議大夫後避王莽不仕皇朝趙性赤水人紹興入對集英舟次至喜亭同年以故事酌酒相勞時秦檜用事氣焰薰灼更相多戒無及時事性奮然曰公等宜各行其志豈當盡掩士之口耶對䇿以正士大夫之心術為言且曰以括囊為得計臣知其人矣主和議者當之以首尾為圓機臣知其人矣杜言路者當之考官驚以為劉蕡無以過者題詠合水來如電蘇子瞻詩云云黔波緑似藍井徑東山縣范至能詩云云山河古合州木根拏斷岸急雨洗中流闕下嘉陵水沙頭杜老舟江花應好在無計會江樓江花未盡會江樓杜甫送祁録事歸合州因寄蘇使君詩君今起柂春江流余亦沙邉具小舟幸為逹書賢府尹云云銅梁山昏空翠重朝公武將發合州詩云云石鏡水落灘聲遲合州太守鬢將絲石守道以燕脂板浣花箋寄徐合州詩云云聞說歡情尚未衰板與歌郎拍新調箋共狎客寫芳詞四六問津蜀道作鎮墊江况兹一郡實會二江二水合流訪江樓之陳迹千巖競秀尋山寺之清遊竹符出守乃雍國之嘗臨蓮幕簡僚以元公而增重分漢上之竹蕃宣盍繼於柬之具沙邉之舟迎謁將陪於杜叟紹熙府榮德資官威逺應靈建置沿革禹貢梁州之域天文參井輿鬼之分野秦屬蜀郡漢為南安縣地李雄據蜀後夷獠居之所謂鐡山生獠也齊立南安郡隋以其地屬資陽又置大牢縣唐置榮州又改大牢為應靈州改和義郡復為榮州皇朝屬梓州路後以係光宗皇帝潜藩升紹熙府今領縣四治榮德事要郡名榮南三榮和義風俗有簡儉風圖經市井云云其人敬慧隋志云云慕文字蠻獠雜處寰宇記夏人少丨丨多男不巾櫛女衣班巾姓名顛倒不知禮法形勝其地四塞地理志云云山川重阻山環水繞圖經本為潜藩朝野雜記天子即位嘗所領州鎮自防禦州而下階升軍名若節鎮州則建為府光宗自榮州刺史進封榮王而榮州至今不錫軍名蓋中書之誤也山川榮德山在州東北四十二里州以此得名其山在川谷之中獨拔五百餘尺寸中有希夷觀老君祠刻石為像有小路至山頂以木為梯半山有唐刺史薛髙磨崖碑榮黎山在州東十五里山上有龍池祈禱無不應有松如盤龍竹有如龍形者俗謂之羅漢杖榮隱山在縣北三十里有丨丨先生修道于此五山州北凡丨丨以西為上州治據其首州學次之嘉祐寺又次之天慶觀又次之東郭外東嶽祠又次之州之西北曰鳯鳴山州之西南曰浮圖巖相連知畫屏鐡山在資官縣北百里出丨礦龍洞在州東南四里真如院巖穴峭深耆舊相傳以為洞洞之左石壁竒峭巨柏老蒼洞之右冇石角立舊經以為孫登嘯臺三者乃榮之勝處為四川之冠故州郡以為節序遊宴之地陸務觀詩峭壁磨天如立壁柟根橫走松倒植呀然一岫驚墮前空洞坡坨三百尺幽隂宜為異物託角爪㾗存猶可識嘯臺在富義門外一里號孫登丨丨陸務觀詩丨丨載酒雲生屨仙冗尋梅雨墊巾火穴在威逺縣西北雙溪在城北三里一從西來其水濁一從東來其水清會城下軒閣此君軒黃魯直題榮州祖無大師丨丨丨詩王師學琴三十年響如清夜落澗泉有酒如澠客滿門不可一日無此君當時初栽數寸碧聲挾風雨今連雲此君傾蓋如故舊骨相竒怪清且秀程嬰杵臼立孤難伯夷叔齊采薇瘦霜鐘堂上弄秋月微風入絃此君說君家周彥筆如椽此君語意當能傳橫溪閣陸務觀晚登丨丨丨詩賣蔬市近還家早煮井人忙下麥遲州多鹽井秋冬收薪茅最急名宦皇朝李虛己太宗親擢能吏給以御書麻紙曰布惠愛民奉法除奸者畫之時被選者二十餘人而虛己與其首列李畋名臣傳畋為國子直講求郡晨登講席諸生見畋巾兩熖火起是日報得榮州李燾紹興間自四川制置知榮州人物陳寧李義山集寧攝火井縣令瘦羸之氓戴如父母囊橐之盜畏如神明皇朝王夢易榮德人以正論不合棄官而歸范蜀公嘗贈以詩王庠夢易之子不仕號亷遜處士敕旌表門閭諡康節先生弟序為徽猷學士題詠江流入漢清皇朝類苑崔仰之送人牧榮州詩云山色臨巴逈云云傳者或云古夜郎陸務觀入榮州境詩渺然孤城天一方云云千里鬱為詩書鄉同上其民簡陋古甚良云云亂山缺處城樓呀陸放翁初到榮州詩云云雙旗蕭蕭晚吹笳煙深緑桂臨絶壁霜落淺瀨鳴寒沙廢臺已無隱士嘯遺宅尚有髙人家衙杯羹最珍慈鈴齊下榻約僧話松隂枕石放吏竹笋瓶水自養山薑花地爐堆獸熾石炭瓦鼎號蚓煎秋茶少年逺遊無百里一飢能使行天涯豈惟慣見蓬婆雪直恐遂泛星河槎故巢肯作兒女戀異境會向鄉關誇下杯徑醉幘自墮燈下髮影看髿髿四六寵膺一札來鎮三榮疏榮銅虎作鎮石龜風寒數處日費千金和義小壘光廟潜藩佐黔巫之東鄙守巴僰之南榮惟和義之斗絶實夜郎之奎隈升軍開府獨未霑恩視邦選侯率多就近熖起於巾暫出臨於千里松生於腹即入應於三公事簡地偏舊雖稱於道院吏貪俗悍今殆類於法場蓋一歲止五千石之經租而諸司近八十萬之折估與其捐潤下之鹹徒滋他族孰若助攻苦之淡以張吾軍昌州大足求川昌元建置沿革禹貢梁州之域鶉首之次井桞之度春秋戰國為巴蜀之境秦屬巴蜀二郡漢資中之東境墊江之西境江陽郡之北境唐為瀘普渝合資榮等六州地肅宗時割六州界置昌州尋為狂賊張朝等所焚州遂廢地各還所屬其後復置仍充靜南軍使以鎮蠻獠五代屬遂州皇朝升為上州𨽻潼州府路今領縣三治大足事要郡名靜南昌元九域志昌元郡軍事風俗其俗朴厚太守于保道院記昌介於資普富義瀘合之間云云又多秀民民勤而力穡靜南志云云不趨末作不事燕遊士願而勸學圖經云云深山窮谷户曉禮義尊道而重儒蒲傳正㯢州學記云云孳孳以事聖人為急物産不及他郡于保道院記凡衣食物資以養生者不及它郡雖無舟楫江沱之利而有桑麻粳稌之饒形勝東臨赤水元和志云云西枕營山北倚長巖同上云云最為險固環山為城太守于保道院記昌附三邑不滿千里郡云云其民才千百家山水竒秀楊子謨顯惠廟記靜南云云士大夫避地者多居焉仙靈逸迹尚有董葛之遺風土産鹽長編太平興國三年有司言昌州嵗收虛額十一萬八千五百餘斤及開寶中知州李佩率意掊斂以希課最於嵗額外别額部民煮鹽民甚以為苦轉運使以聞二月甲子詔悉除之松石在永川縣來蘇鎮相近有松花石石質而松理或二三尺許大可合抱然不過相望數山有之俗呼雷燒松杜詩所謂萬年松化石者即此類亦異産也山川南山在大足縣南五里上有龍洞醮壇旱禱輒應淳化間供奉官盧斌平蜀賊任誘等嘗駐兵此山土人云他郡有警則置烽火於此北山去城二里唐刺史韋靖於此置城陔山在大足縣東四十里接三華之秀氣屹然鼎立葛仙山在昌元縣南百五十里下臨中江上干霄漢以丨丨翁名煉丹巖洗藥池有甘露茶打子石藏馬崖在大足縣南相傳云王蜀時山中民任氏産龍馬日行千里歐陽云豫讀蜀書見龜龍騶虞盡出其國異哉則龍馬亦或有之英山洞在永川縣西三十里相傳山間有石洞窮絶處有一潭或漂出敗蓬破板疑與江河相接赤水溪在大足縣其水源自普州安溪縣界來樓閣三華樓在東街郡有丨丨山差逺莫相領會太守黃臯創丨以挹其勝五桂樓在正街西乾道辛卯郡五士同奏名外省太守曺岍創丨丨丨香霏堂冷齊夜話載有人調官都下踰年始得昌守己而求易便郡有淵才者聞而往見之曰昌佳郡也官欲易地有之乎曰然淵曰誤矣曰俸給優乎淵曰否訟簡乎淵曰否然則奚誤曰海棠患無香獨昌南者有香非佳郡而何故昌號海棠香國土人云地宜此花易植易蕃郡治丨丨丨一老樹重跌疊蕚每花或二十餘葉花氣醲郁餘不能及也太守品題詩甚多孔平仲談苑載淵才海棠詩云雨過溫泉浴妃子露濃湯餅試何郎捫參閣詩見題詠館驛牛尾驛鄭國華留題云龍尾道中退朝客雕鞍寶馬黃金勒誰憐逺使足馳驅夜半孤村丨丨丨何熙志續三韻云十年去國真悠悠祗今便可行歸休平生意氣羞牛後去踏金鰲頂上遊名宦假建中文昌之父嘗典榮昌二郡事見德裕成都資福寺記唐守之可稱者惟丨丨丨楊琯李師望韋君集四人皇朝雍之竒任大足縣令號為聖長官鮮于學士贈詩鄉閭舊號賢夫子士論今推聖長官人物譙南薰昌元人居鴨子池登皇祐五年進士第後以祕書丞知閬州李戡時昌元縣南二十里老鴉山有李戡李戣兄弟善棊會敵索棊戰於國朝詔求天下善奕者蜀帥以戡應詔敵望風知畏不敢措手文潞公贈以詩云昌元建邑幾經春百里封疆秀氣新鴨子池邉登第客老鴉山下著棊人題詠分手路悠悠江總别袁昌州詩河梁望隴頭云云徂年驚若電烈日欲成秋黃鵠飛飛逺青山去去愁不言雲易散更似水東流比屋談經史張孝芳詩昌言古佳郡云云山岡疊坡坨溪瀨為清泚蓄為靈秀窟磊落出髦士隆冬方似早春天宣和太守張唐民詩無訟正如髙隱地云云州民富庶風光好誰信賞憂滿二年訟簡民淳羡小州張唐民題捫參閣詩云云兩衙才退似歸休一懷山果三勝酒暮掩青峯即下樓四六眷維蜀左有若靜南民勤稼穡俗喜詩書州小而嘯詠雍容民淳而文書簡靜財匪鬼輸全仰作鹹之潤郡資井養詎堪竭澤之漁昔聞杜叟詠松石於名山今說淵才號棠香之佳郡渠州流江鄰水鄰山大竹建置沿革禹貢梁州之域秦地東井之分野春秋戰國為巴國地秦滅巴以為郡漢置宕渠縣屬巴郡因山以名蜀先主割巴郡之宕渠等三縣置宕渠郡晋初屬巴西郡惠帝又置宕渠郡宋屬南宕渠郡又自漢宕渠縣移理安漢故城南齊因之梁置北宕渠郡又置渠州後周改北宕渠郡為流江郡隋初仍為渠州煬帝改為宕渠郡唐復為渠州改為鄰山郡後為渠州領縣四治流江事要郡名宕渠風俗其人勇健輿地廣記云云好歌舞人才盛於漢華陽志先漢以來縣民車騎將軍馮緄大司農𤣥賀大鴻臚龎雄桂陽太守李溫皆建功立業有補於世地瘠民窶師師堂記州介䕫梓間云云形勝古之賨國元和志古賨國城在流江縣東北七十里晋中興書賨者廩君之苗裔也巴氏子務相乘土船而浮衆異之立為廩君子孫列巴中秦併天下薄其稅賦人出錢四十巴人謂賦為賨遂因名焉後佐髙祖定天下喜歌舞所謂巴渝舞也依山為郡天寧寺記曰宕渠古郡云云自葛嶺東下至石門伏而特起隱隱隆隆由郡北直南而下為馬鞍為登髙為西巖擁蔽坤維升髙降原始得郡治岡分嶺别俯首東向為袁氏之巖迤邐南轉為瞿氏之山下瞰巴江舒翼展脛直趍水濵而後已由瞿山之北袁巖以南川原開曠形勢之勝與郡治相埒是為天寧寺接連漢中按隋書地理志通川宕渠其地皆云云山川宕渠山一名大青山圖經在州東五十里其山東西兩門延運相接山澗長峽有似溝渠蜀都賦外負朝梁石渠八濛山在流江縣東北七里起伏八處有水環之不匝者一里常有煙霧濛其上故名三國志張郃自漢川進軍宕渠蒙頭蕩石與張飛相拒五十餘日飛率精兵萬餘人從他道邀郃軍交戰山道狹前後不得救飛遂破郃巴土乃得安緑沼山在流江縣北四十五里上有池水常緑樂山在流江縣北三十二里每嵗正月三日鄉人携鼓笛酒食登山娛樂以祈蠶事鄰山去本縣百餘里此山出鐵鱗比相次黑壤山在鄰山縣北百里其壤皆黑故名丨丨皛然山在鄰水縣之南相去三十餘里東有崖下有石乳三條呼為石鐘村民擊之以禱龍穴在鄰山金盤山下入龍門鎮有瀑布百八十尺號為散水渠江在流江縣東三百步其水二源一源自巴領一源出羅娛山下鄰水在本縣源出鄰山中有大磧懸流十丈渝水即流江也夾水上下皆賨氏所居井泉聖泉在州西七十步西巖院其後有虹飲焉亭榭虹飲亭在西巖佛寺冲相寺距城四十里乃定光佛道場舊傳唐相崔塗僖宗時避亂至蜀題詩云水流花謝兩無情送盡春風過楚城蝴蝶夢中家萬里杜鵑枝上月三更故園書動經年絶華髮春惟滿鐃生自是不歸歸便得五湖煙景有誰爭汧江寺鄭谷渠州丨丨丨作退居瀟灑寄禪關髙掛朝簮净室間孤島暫留雙鶴歇五龍爭放二龍間輕舟共泛花邉水野屐同登竹外山仙署金閨虛位久夜清應夢近天顔名宦第五倫後漢人嘗為宕渠令皇朝虞允文紹興中知渠州崅民窶常賦之外又行加橫斂公奏罷之歲减緍錢一萬有竒逺民鼓舞人物王平華陽志宕渠人丞相亮征隴西平以牙門屬馬謖謖違亮指大敗街亭惟平所領不敗皇朝彭戢鄰水人元豐擢第為兩浙提舉奉祠以歸嘗蓄雙鶴江右士大夫送行有扁舟載雙鶴萬卷貯羣書之句何拯為屯田員外郎祥符間兄弟接踵登科嘗有詩云嫦娥不惜蟾宫桂從此何家第二枝題詠渠江明净峽逶迤元徽之南昌灘有詩云云船過名灘拽􅜺遲櫓窡動搖妨作夢巴童指點笑吟詩畬餘宿麥黃山腹同上云云日背殘花白水湄物色可憐心莫恨此行都是獨行時四六今之宕渠古則賨國出綸禁掖分竹宕渠封疆介䕫梓之間歌舞帶巴渝之俗虞雍公之奏蠲橫斂民至今稱何屯田之掇取髙科士皆知勸枝上月夢裏家動崔塗之歸興竹外山花邊水尋鄭谷之舊遊方輿勝覽卷六十四
