body:
  text: 方輿勝覽卷二十二宋祝穆撰江州徳化湖口徳安彭澤瑞昌建置沿革禹貢荆揚二州之境尚書禹貢彭蠡既瀦又曰九江孔殷盖古三苗國斗牛之分春秋為吳西地為楚東境後屬楚秦屬廬江郡漢髙改九江曰淮南國晉置江州因江水為名又分尋陽柴桑二縣置潯陽郡屬江州陳理尋陽隋置江州移理湓城即今郡是也唐為尋陽郡復為江州南唐為奉化軍節度皇朝為江州大觀元年升為定江軍節度今領縣五治徳化事要郡名潯陽棲賢院記郡在大江之隂山在丨丨之北廬山記曰郡本大江之水尋水之陽故曰潯陽九江晃氏志太湖一湖而名曰五湖昭餘祁一澤而名曰九澤丨丨一水而名曰九江湓城詳見湓浦註風俗土髙氣清長慶集左康廬右江湖丨丨丨丨富有佳境土瘠民貧啚經習知武事同上形勝南面廬山啚經云云北背九江左挾彭蠡同上云云右傍通川引三江流而據其㑹北望九江廬山記太史公東逰登廬山而遐觀南眺五湖云云東西肆目若涉天庭陸通五嶺晉地道記云云江行岷漢亦一都㑹據三江口呂誨奏劄丨丨丨之丨三巴二廣水陸數十路沿沂上下舟車所聚之處江西重鎮江淮表裏論江西之鎮莫重潯陽而舒州實潯陽之表也襟帶上流寰宇記歴齊梁陳頗為重鎮弹壓九𣲖云云係年錄楊存中言九江上流要害之地請置都統以廣屯備江州軍自此而始險要必爭之地江淮論山川大孤山在德化縣東與都昌分界小孤山在彭澤縣北九十里今属舒州宿松界歐公云江南有大丨丨丨江側有彭即磯云彭即者小姑婿也余嘗過丨丨丨廣像一婦人而敕額為聖母豈止俚俗之誤哉陳簡夫詩云山川獨孤字廣塑女即形過客雖知誤行人但乞靈時稱佳句廬山在德化縣詳見南康晁補之詩南康南麓江州北五百僧房綴蜜脾盡是丨丨佳絶處不知何處合題詩楊萬里過江州丨丨詩云廬山山南刷銅緑黄金裾觧純蒼玉廬山山北澄波青碧羅帷裏翡翠屏昨日山南身歴徧今朝山北舟中看山如西子破𤓰歳山南是靣北是背廬山有十大禅刹而山南居其六鐘梵相聞於青嵐白雲中白樂天草堂記云康廬竒秀甲天下山上有漢陽峯蓮花峯獅子峯在五老峯之東又有三石梁長数尺廣不盈尺杳然無底廬山記云錦繡谷竒花異草三四月間紅紫匝地宛如錦繡李太白詩云廬山東南五老峯青天削出金芙蓉九江秀色可攬結吾將此地巢雲松廬山謡云我本楚狂人鳯歌笑孔丘手持緑玉杖朝别黄鶴樓五嶽尋山不辭逺一生好入名山逰廬山秀出南斗傍影落明湖青黛光金闕前開二峯頂銀河倒掛三石梁香爐瀑布遥相望廻崖疊嶂凌蒼蒼翠影紅霞隠朝日鳥飛不到吳天長登高壯觀天地間大江茫茫去不還黄雲萬里動風色白波九道流雪山好為廬山謡興因廬山發閑窺石鏡清我心謝公行處蒼苔没早服還丹無世情琴心三疊道初成遥見仙人綵雲裏手把芙蓉朝玉京先期汗漫九垓上願接盧敖逰太清又詩康廬為巨鎮風浪裏盤根平地安然者饒他五嶽尊石鍾山在湖口酈元謂下臨深潭微風鼓浪水石相摶響若洪鐘李渤謂扣而聆之南音涵糊比音清越蘇子瞻嘗汎舟至其下以為酈元所見殆與予同石門山寰宇記在山西兩岸對聳形如門闕當雙石之上垂流𢾗丈有石可坐千人謝靈運登丨丨最高頂詩晨䇿尋絶壁夕息在山棲䟽峯抗高舘對嶺臨廻谿長林羅戸庭積石擁基階連巖覺路塞宻竹使逕迷来人忘新術去子惑故蹊活活夕流駃噭噭夜猿啼沈冥豈别理守道自不攜心契九秋幹目翫三春荑居常以待終處順故安排惜旡同懐客共登青雲梯白居易詩嘗聞惠逺軰題詩此巖壁雲霞蒼苔封蒼然旡處覔柴桑山在徳化縣西南九十里近栗里源陶潜此中人香爐峯山南北皆有之權載之送孔江州詩九𣲖尋陽郡分明似畫圖秋光連瀑布晴翠辨丨丨五老峯及其餘諸峯並見南康軍山陽蘇子由遊廬山丨丨山上泉流自作溪行逄石缺㵼虹蜺定知雲外波瀾濶飛到峯前夲末齊入海明河驚照耀倚天長劒失攜提誰来臥枕莓苔石一洗塵心萬斛泥石鏡四蕃志山東有一圓丨明淨照人如丨九江尚書注江於此分為九道在德化縣一烏江二蚌江三烏臼江四嘉靡江五畎江六源江七廩江八隄江九箘江與前説不同當考彭蠡湖在徳化縣東四十里郡國志周廻四百五十里有石高数十丈大属刻石以紀功焉又有乞飯烏随舟行舟人常摶飯抛與則接之不遺一粒詳見南康南湖刺史李君濬之蓄水為湖瀼溪在瑞昌見元結注濓溪去軍城五里虎溪在彭澤縣南三十五里有橋逺師送客不過此橋李白詩東林送客處月出白猿啼别笑廬山去何煩過丨丨湓浦在徳化西一里郡國志有人於此洗銅盆墮水取之見一龍而出晋志作盆隋志作湓射蛟浦蘇子由詩萬騎廵逰徧千帆破浪輕射蛟江水赤教戰越人驚山轉楼舩影岸摧連弩聲祈昭旡為賦酣寝平生浦上積水相傳漢武帝教樓船于此谷簾水在徳安東北十里景徳觀詳見南康或云二水並流其輕重不同敷淺原在徳安縣亭軒琵琶亭在西門之外其下臨大江白居易貶江州司馬自序云送客湓浦聞舟中夜弹丨丨問其人本長安娼女年長色衰嫁為啇人婦為作琶琶行潯陽江頭夜送客楓葉荻花秋瑟瑟主人下馬客在船舉酒欲飲無管弦忽聞水上琵琶聲主人忘歸客不行移船相近邀相見添酒回燈重開宴千呼萬喚始出来猶抱琵琶半遮靣我聞琵琶已嘆息又聞斯語重唧唧同是天涯淪落人相逄何必曽相識莫辭更坐弹一曲為君翻作琵琶泣坐中泣下誰最多江州司馬青衫濕蘓子由詩湓江暮雨晴孤舟瞑將發夜聞胡琴語展轉不成别草堂寄東林雅意存北闕澘然涕泗下安用無生説虎渡亭在外門外取宋均虎渡江之義魯望亭在彭澤馬當山黄魯直有詩百花亭在都統司梁刺史邵陵王綸建潄玉亭蘇子由詩山回不見落銀潢餘溜喧豗響石塘目亂珠璣濺空谷足寒雷電繞飛梁入瓶銅鼎春茶白接竹齋㕑午飯香從此出山都不棄滿田秔稻挿新秧樓臺庾樓在州治後庾亮領江州刺史故名白居易詩重過蕭寺宿再上丨丨行郡人猶認得司馬詠詩聲王貞白雨後從陶即中登庾楼丨丨逄霽色紅日半斜曛虹截半江雨風驅大澤雲江邊魚艇聚天畔鳥行分此景誰堪畫文翁請属文前人晚望詩獨凭朱檻亦陵晨山色初明水色新竹霧晚籠啣嶺月蘋花暖送過江春子城隂處猶殘雪衙鼔聲前未有塵三百年来庾楼上曽經多少望鄉人佛寺東林寺晋武帝建逺師道場作殿時神運梁木白居易詩丨丨北堂水湛湛見底清中生百芙蓉菡蓞三百莖白日發光彩清颷散芳馨洩香銀囊破㵼露玉盤傾我慙塵垢眼見此瓊瑶英乃知紅蓮華虚得清淨名夏萼敷未歇秋房結纔成夜深衆僧寢獨起繞池行欲收一顆子逺寄長安城但恐出山去人間種不生西林寺晋太和中建水石之美亞於東林白居易詩下馬丨丨丨翛然進輕䇿朝為公府吏暮是雲山客二月康廬比氷雪始消釋陽叢抽茗芽隂竇洩泉脉又云是年淮㓂作處處興兵革智士勞思謀戎臣苦征役獨有不才人山中弄泉石大林寺白居易遊丨丨丨記云山高地深時莭絶晚初到恍若别造一世界者因成絶句云人間四月芳菲盡山寺桃花始盛開長隄春歸無覔䖏不知春向此中来且曰此地寔康廬第一境道觀紫極宫去州二里即今天慶觀李白丨丨丨詩何處聞秋聲蕭蕭北窓竹回薄萬古心攬之不盈掬靜坐觀衆妙浩然媚幽獨白雲南山来就我簷下宿懶從唐生訣羞訪李生卜四十九年非一徃不可復野情轉消散世道有翻覆陶令歸去来田家酒應熟太乙宫即祥符觀在徳化南二十里圖經昔漢董奉為人治病愈者令栽杏五株謂之杏林即此地杜子美詩巫山不見廬山逺松林蘭若秋風晚香爐峯色隐晴湖種杏仙家近白榆大平宫在徳化縣南三十里即唐九天使者祠明皇自言見使者降於殿庭因立祠今為丨丨興國丨祠廟靖節祠在徳化西南九十里柴桑里即其故居也白居易訪陶潛故宅詩今来訪故宅森若君在前不慕樽有酒不慕琴無絃柴桑古村路栗里舊山川不見籬下菊但聞爐中煙狄梁公祠在彭澤縣白公祠在湓江門徐鉉為記濓溪祠朱元晦作記云先生家春陵而老於廬山之下因取故里之號以名其川曰丨丨而築書堂於其上今其遺墟在九江治之南十里其荒茀不治則有年矣淳熈丙申潘侯慈明與通守呂侯勝已始復作堂其處揭以舊名以奉先生之祀書来属某記之惟先生不繇師𫝊黙契道體建圖属書根極領要當時見而知之有程氏者遂廣大而推明之使夫天理之微人倫之著事物之衆鬼神之幽莫不洞然畢貫于一嗚呼盛哉非天所畀其孰能與于此某切嘗伏讀先生之書而想見其人嘗欲一泛九江入廬阜濯纓此水之上以致其高山景行之意而病不得徃誠不自意乃今幸其獲因文字以附姓名于其間也古跡晉杉在疑寂稱傍逺公以晉義熈間卒葬此山杉盖當時所植浪井孫權念於灌嬰城湓江有風水麻動因名李白詩浪動灌嬰井尋陽江上風蘓子由詩江波浮陣雲岸壁立清鐵胡為井中泉湧浪時驚發水性夲無定得止自澄徹誰為女媧手補此天地裂名宦王嘉漢時為守宋均後漢時為郡守多虎為民患均飭属縣退奸貪進忠善一去䧟穽虎相與東渡江而去陶侃晉時為刺史勤於吏職嘗夢生八翅飛至天門登八重而不得入後乃為侍中太尉庾亮晋時領江荆豫州刺史陶潜刺史王𢎞每令人侯丨丨知其當徃廬山乃遣人賫酒于半道要之至州問其所乗曰素有脚疾向乗肩輿亦足自反嘗為彭澤令郡嘗遣督郵吏請束帶見之歎曰安能為五斗米折腰向鄉里小兒即觧印綬去賦歸去来詞在官八十餘日顔真卿詩嗚呼陶淵明奕葉為晋臣自以公相後每懐宗國屯題詩庚子歳自謂羲皇人手持山海經頭載漉酒巾孫愐太康中孫愐為尋陽守逍遥渚際見一輕舟淩波俄而漁父至神顔瀟洒垂綸長嘯愐異之乃問買魚漁父笑而答曰某釣非釣寕賣魚耶鼓棹而去愐益異焉王羲之為内史狄仁傑唐天授中為来俊臣所誣貶彭澤令生祠記云武后革唐為周公至邑塑高宗聖像於修真觀朔望朝拜白居易以言事貶江州司馬自作壁記云自武徳已来庻官以便宜制事大攝小重侵輕郡守之職總于諸侯師郡佐之職移于部從事故自五大都督府至于上中下郡司馬之事盡去唯員與俸在凢内外文武官左遷右移者逓居之凢執役事上與給事于省寺軍府者遥署之凢仕乆資高耄昏軟弱不任事而時不忍棄者寔􅊩之􅊩之者進不課其能退不殿其不能才不才一也若有人畜器貯用急於兼濟者居之雖一日不樂若有人養志忘名安于獨善者䖏之雖終身無悶官不官繋乎時也適不適在乎人也江州左匡廬右江湖土高氣清富有佳境刺史守土臣不可逺逰觀羣吏執事官不敢自暇逸惟司馬綽綽可以從容於山水詩酒間由是郡南楼山北楼水湓亭百花亭風篁石巖瀑布廬宫源潭洞東西二林寺泉石松竹司馬盡有之矣茍有志于吏隠者捨此官何求焉按唐典上州司馬秩五品嵗廪𢾗百石月俸六七萬官足以庇身食足以給家州民康非司馬功郡政壊非司馬罪無言責無事憂為國謀則尸素之尤蠧者為身謀則禄仕之優稔者予佐是郡行四年矣其心休休如一日二日何哉識時知命而已又安知後之司馬不有于吾合志者乎因書所得以告来者李渤號白鹿治長慶間為刺史築南湖堤號甘棠湖皇朝吕誨以論陳升之出守人物慧逺丨丨法師居廬山東林寺有白蓮池與劉遺民雷次宗周王之宗炳陶潜竺道生等十八人同修净土之法然逺公招陶潜入社終不能致謝靈運求入社而以心雜不許元結居瑞昌滚溪上自號滚溪浪士有詩云尤爱一溪水而能存讓名李白浮逰四方安禄山叛轉徙康廬山宿松間皇朝周頥字荗叔酷爱廬阜買田築室退居濓溪之上二程先生嘗過而問道焉明道曰吾再見荗叔吟風翫月而歸得吾與㸃也之意伊川曰吾再見荗叔論道遂厭科舉之習黄魯直序云荗叔人品甚高胷中洒落如風光霽月好讀書雅意林壑初不為人窘束世故權于仕籍不卑小官職思其憂中歳乞身老于湓城有水發源於蓮花峯下清潔紺寒下合于湓江荗叔築室於其上用其平生所安樂嫓水而成名曰濓溪與之㳺者曰溪名未足以對荗叔之美雖然荗叔短于取名而惠于求志薄于徼福而厚于得民菲于奉身而燕及㷀嫠陋于希世而尚友千古聞荗叔之餘風猶足以律貪則此溪之水配荗叔以永久所得多矣詩云溪毛秀兮水清可飯羮兮濯絲不漁民利兮何又有於名弦琴兮觴酒冩溪聲兮延五老以為夀蝉蜕塵埃兮玉雪自清聼泥溪兮鍳汀明激貪兮厚薄非青蘋白鷗兮誰與同樂津有舟兮蕩有蓮勝曰兮與客就間人聞拏音兮不知何處散髮醉高荷為盖兮倚芙蓉以當妓山清水寒兮舟著平沙八方同宇兮雲月為家懐連城兮佩明月魚鳥新人兮野老同社而爭席白雲䝉頭兮與南山為伍非夫人攘臂兮誰余敢侮夏竦徳安人為相封英公周紫芝號竹坡先生有詩名晚居九江題詠野水多於地白居易早秋晚望呈韋侍御詩九𣲖繞孤城城高生逺思人家半在煙云云夫君亦淪落此地同飄寄尋陽酒甚濃相勸時時醉湓城去鄂渚韓愈至江州寄鄂渚李大夫程詩云云風便一日耳不枉故人書無因泛江水作郡廬山下蘇子瞻詩讀書廬山中云云平湖浸山脚雲峯對虚榭紅蕖紛欲落白鳥時来下猶思隠居勝亂不驚湍㵼鄉户半漁翁周繇送江州薛尚書詩匡廬千萬峯影匝郡城中忽佩虎符去遥疑鳥道通煙霞時滿郭波浪暮連空樹翳楼䑓月帆飛鼓角風郡齋多嶽客云云王事行春外題詩寄逺公人家低濕水煙中白居易江州詩潯陽欲到思無窮庾亮楼南湓浦東樹木凋踈山雨後云云菰蒲餧馬行無力蘆荻編房臥有風遥見朱輪来出郭相迎勞動使君公浪生湓浦千層雪来明詩云云雲起爐峯一炷煙四六擢從朝路逺䕶江城榮剖魚符兼提虎旅乃眷潯陽宻連淮甸千䑺霧合萬騎雲屯眷潯陽之要地乃江右之名藩控西江之要地宿南渡之重師亦嘗大幕府之開號為小朝廷之勝據大江為深池宿勁兵為重鎮居襟帶之上流擁貔貅之萬騎惟湓浦柴桑之置郡依匡廬彭蠡以為城在東晋則視荆豫以揔提至紹興則連舒蘄而莭制版籍浩繁深有繭絲之責舟車舄奕適當郵傳之衝九江虎渡交騰来暮之歌十年鳳池恐有見晚之嘆彭澤遺祠無復就荒之菊濓溪故宅尚餘凈植之蓮湓亭江上緬懐樂府之新彭澤門前頓使官情之薄載駕朱轓和潯陽琵琶之曲行持紫槖聴長樂鐘鼓之聲興國軍永興通山大冶建置沿革禹貢荆州之域分野介於呉頭楚尾之間南斗十度為吳頭軫十一度為楚尾春秋属楚秦属南郡漢属江夏郡之鄂縣後漢因之孫權改鄂曰武昌郡分立陽新縣隋置鄂州改陽新曰富川縣又改富川曰永興縣唐因之皇朝太平興國三年陞興國軍今領縣三治永興要事郡名富川見沿革注風俗郡小民醇周紫芝記囹圄晝閉同上云云桁楊不施形勝西控荆楚同上妙香寮記東連江池云云山連楚嶠靈峯寳録云云水接湘川山川印山在永興縣西南百里形如印龍角山在永興西八十里兩峯相對鍾山在永興西南百七十里舊傳鍾繇學書于此有墨池通羊山在通山邑西八十里東方山在大冶縣北三十里丨丨朔之故隠也囬山在大冶東五十里山有泉元結名之曰異泉乃作銘吉祥山在大冶東武昌記呉主㣲時嘗隠于此羅隠詩呉王微時隠此山興都去後緑潺潺飛雲洞在回山之顛有元結書堂故基富池湖源出永興之翠屏六溪至丨丨口遂入大江散花洲在大冶縣大江中流世傳周瑜敗曹操于赤壁呉王迎之至此釃酒散花勞軍士謂之呉王散花洲堂亭十詠堂在軍治周紫芝有丨丨以形容風物之美滄浪亭在軍治放生池上荷花彌望遶堤皆楊栁羣山如列屏有浮屠突兀在雲煙紫翠間王龜齡記江山之勝似杭之西湖樓臺捲雪樓在富池忠勇廟臨大江張安國書扁名宦王琪慶厯間為守周紫芝紹興間為史官以非進士出身出治興國陸九齡為教授人物呉中復登景祐第其兄弟幾復嗣復聨名登科中復由御史登法從仁宗飛白鐵御史三字以賜呉鶚為光禄寺丞雅好山水尤竒廬阜題詠鶚渚他時縣周紫芝詩云云江南盡處州萬頃平湖几案間陶去㤗富川郡治居高閣云云公餘身在水雲鄉王龜齡詩滿目江山富一堂云云江圍蒲稗富川城江彦章次興國詩路入麕䴥亭子嶺云云北風捲地來元際西日銜山未肯晴絶浦踈梅和雪㸃長天數雁背人横侵尋短髮愁中老行盡江南春復生杭潁西湖堪鼎足王龜齡詩窮途喜見富川波已覺兹行所得多云云更懐六乙與東坡湖光十里皆荷花郡守周紫芝云湖中嵗取荷葉可貿百千一日曝之湖濱大風吹捲飛數十里俱盡遂賦詩云湖邉老守湖是家云云我來不見花如錦但聞荷葉飛天涯外邑居民山作城李傳正詩我愛通羊好云云眼前無俗事枕畔有灘聲白雲深處宿蔣頴叔詩我愛通山好青山便是城云云一枕玉泉聲四六拜命宸廷承流江國輟從朝路來䕶江城雖云斗大實控風寒江右名區富川要郡鄂渚創州此僅一同之地江南盡處今專千里之權自呉氏兄弟以同年而登科故永興縣邑取雙仙而名重襟江帶湖既近依於天險控淮連楚實足禦於風寒千里政成聊訪西湖之勝景一封詔下竚躋北闕之近班方世無虞郡政不勞於臥治属時多事軍需常恐於乏興南安軍大庾上猶南康建置沿革禹貢揚州之域為星紀之分野春秋時属呉及百粤戰國時属楚秦属九江郡漢分九江置豫章郡南壄預焉前漢南粤不賔遣將軍姓庾討之築城於此因為名今理大庾是也隋以大庾為鎮唐升大庾為縣属䖍州皇朝至太宗陞為南安軍今領縣三治大庾事要郡名横浦唐地理志在大庾縣西南康記昔漢將軍楊僕討呂嘉出章郡下丨丨即此南壄同上風俗儒術之富蘇子瞻作軍學記云南安江西之南境云云與閩蜀等而太守曹侯登所至必建學故南安之學甲於江西形勝南扼交廣范大用生祠記云云西距湖湘處江西盡頭楊邦彦䟦横浦集云云據江西上流重修軍學記云云接南荒之境同上云云當五嶺之一南康記秦守五嶺第一塞嶺即大庾也通道交廣此其喉咽土産茶磨石圖經以石門之石為之蒼碧縝宻䥴琢得所以磨盤與輪同璞者為佳其最謂之舀石猶硯之舊坑也脉紅如線極鮮明不過曹溪五㸃百大衆欲爭取之追至大庾嶺乆立告渇六祖拈錫杖石泉湧清冷甘羙衆皆驚駭而退名宦周頥東都事略舂陵人嘗為南安軍司理有囚法不當死運使深欲治之荗叔爭不勝授其告身以去曰如此尚可仕乎殺人以媚人吾不為也運使感悟因頼以活劉安世字器之號元城先生哲宗朝除右正言論蔡確章子厚黄履刑恕妄要定䇿之罪及子厚入相落職知南安軍名賢江公望蔡京用事與任伯雨俱貶南安張九成公與僧宗杲為莫逆交時徃来其間秦檜恐其議已於是言者論公遂有南安之謫結廬埽軌題于柱曰予平生嗜書老来自病執書就明于此者十四年矣倚立積乆䨇趹隠然自號横浦居士二程先生圖經云惟河南丨丨丨丨道徳性命之説天下所宗其初也侍父通守而濓溪周先生為理曹掾相從講學遂能紹千載不傳之秘題詠折梅逄驛使荆州記云呉陸凱與范曄相善自江南寄梅花一枝詣長安與曄贈詩云云寄與嶺頭人江南無所有聊贈一枝春西州南北護梅關章頴詩云云盡日人行石壁間地占江西最上頭前人詩路當嶺庾初通處云云地近嶺南冬不氷鄭億詩人逄嵗稔家餘粟云云南踰梅嶺陟嶙峋余安道詩行盡章江庾水濵云云上得梅山不見梅南安志嶺上有寺有婦人題云妾㓜侍父任英州司冦父代歸以大庾有梅嶺之名而反無梅遂植三十株於道傍又題此詩于壁間云英江開今日掌刑回云云輟俸買將三十本清香留與雪中詩人嘗説嶺頭梅張子野詩云云徃徃春風帶雪来回到嶺題詩花不見空将春夢又空四六問道江西分符嶺北光膺芝檢逺䕶梅封昔為雷邑今曰斗州欲撫峒蠻先遴郡將惟嶺下之小邦寔江西之窮處肇始隋家之鎮戍繼為唐代之縣隅廐傳據南北之㑹廪稍積前後之遭民力凋殘無以追随於富國地望卑下不足動摇於有司江源欲絶慨非澤國之規模嶺路初通漸有蛮方之氣象平反郡獄曽聞名世之片言撫字州民亦有先賢之遺愛郡置皇朝於是分賢侯之竹地瀕庾嶺不妨寄驛使之梅方輿勝覧卷二十二
