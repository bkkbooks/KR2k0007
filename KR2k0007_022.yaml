body:
  text: 方輿勝覽卷二十二宋祝穆撰江州德化湖口德安彭澤瑞昌建置沿革禹貢荆揚二州之境尚書禹貢彭蠡既瀦又曰九江孔殷蓋古三苗國斗牛之分春秋為吳西地為楚東境後屬楚秦屬廬江郡漢髙改九江曰淮南國晉置江州因江水為名又分尋陽柴桑二縣置潯陽郡屬江州陳理尋陽隋置江州移理湓城即今郡是也唐為尋陽郡復為江州南唐為奉化軍節度皇朝為江州大觀元年升為定江軍節度今領縣五治德化事要郡名潯陽棲賢院記郡在大江之隂山在丨丨之北廬山記曰郡本大江之水尋水之陽故曰潯陽九江晃氏志太湖一湖而名曰五湖昭餘祁一澤而名曰九澤丨丨一水而名曰九江湓城詳見湓浦注風俗土髙氣清長慶集左康廬右江湖丨丨丨丨富有佳境土瘠民貧啚經習知武事同上形勝南面廬山啚經云云北背九江左挾彭蠡同上云云右傍通川引三江流而據其會北望九江廬山記太史公東逰登廬山而遐觀南眺五湖云云東西肆目若涉天庭陸通五嶺晉地道記云云江行岷漢亦一都會據三江口呂誨奏劄丨丨丨之丨三巴二廣水陸數十路沿沂上下舟車所聚之處江西重鎮江淮表裏論江西之鎮莫重潯陽而舒州實潯陽之表也襟帶上流寰宇記歷齊梁陳頗為重鎮彈壓九𣲖云云係年録楊存中言九江上流要害之地請置都統以廣屯備江州軍自此而始險要必爭之地江淮論山川大孤山在德化縣東與都昌分界小孤山在彭澤縣北九十里今屬舒州宿松界歐公云江南有大丨丨丨江側有彭即磯云彭即者小姑壻也余嘗過丨丨丨廣像一婦人而敕額為聖母豈止俚俗之誤哉陳簡夫詩云山川獨孤字廣塑女即形過客雖知誤行人但乞靈時稱佳句廬山在德化縣詳見南康朝補之詩南康南麓江州北五百僧房綴蜜脾盡是丨丨佳絶處不知何處合題詩楊萬里過江州丨丨詩云廬山山南刷銅緑黃金裾解純蒼玉廬山山北澄波青碧羅帷裏翡翠屏昨日山南身歷遍今朝山北舟中看山如西子破瓜歲山南是靣北是背廬山有十大禪剎而山南居其六鐘梵相聞於青嵐白雲中白樂天草堂記云康廬竒秀甲天下山上有漢陽峯蓮花峯獅子峯在五老峯之東又有三石梁長數尺廣不盈尺杳然無底廬山記云錦繡谷竒花異草三四月間紅紫匝地宛如錦繡李太白詩云廬山東南五老峯青天削出金芙蓉九江秀色可攬結吾將此地巢雲松廬山謡云我本楚狂人鳯歌笑孔丘手持緑玉杖朝别黃鶴樓五嶽尋山不辭逺一生好入名山逰廬山秀出南斗傍影落明湖青黛光金闕前開二峯頂銀河倒挂三石梁香爐瀑布遙相望回崖疊嶂凌蒼蒼翠影紅霞隱朝日鳥飛不到吳天長登高壯觀天地間大江茫茫去不還黃雲萬里動風色白波九道流雪山好為廬山謡興因廬山發間窺石鏡清我心謝公行處蒼苔沒早服還丹無世情琴心三疊道初成遙見仙人綵雲裏手把芙蓉朝玉京先期汗漫九垓上願接盧敖逰太清又詩康廬為巨鎮風浪裏盤根平地安然者饒他五嶽尊石鍾山在湖口酈元謂下臨深潭微風鼓浪水石相摶響若洪鐘李渤謂扣而聆之南音涵糊比音清越蘇子瞻嘗泛舟至其下以為酈元所見殆與豫同石門山寰宇記在山西兩岸對聳形如門闕當雙石之上垂流𢾗丈有石可坐千人謝靈運登丨丨最高頂詩晨䇿尋絶壁夕息在山棲疏峯抗高館對嶺臨回溪長林羅戶庭積石擁基階連巖覺路塞密竹使徑迷來人忘新術去子惑故蹊活活夕流駃噭噭夜猿啼沈冥豈别理守道自不攜心契九秋幹目玩三春荑居常以待終處順故安排惜旡同懷客共登青雲梯白居易詩嘗聞惠逺輩題詩此巖壁雲霞蒼苔封蒼然旡處覔柴桑山在德化縣西南九十里近栗里源陶潛此中人香爐峯山南北皆有之權載之送孔江州詩九𣲖尋陽郡分明似畫圖秋光連瀑布晴翠辨丨丨五老峯及其餘諸峯並見南康軍山陽蘇子由遊廬山丨丨山上泉流自作溪行逄石缺㵼虹霓定知雲外波瀾濶飛到峯前夲末齊入海明河驚照耀倚天長劒失攜提誰來臥枕莓苔石一洗塵心萬斛泥石鏡四蕃志山東有一圓丨明淨照人如丨九江尚書注江於此分為九道在德化縣一烏江二蚌江三烏臼江四嘉靡江五畎江六源江七廩江八隄江九箘江與前説不同當考彭蠡湖在德化縣東四十里郡國志周回四百五十里有石高數十丈大屬刻石以紀功焉又有乞飯烏隨舟行舟人常摶飯拋與則接之不遺一粒詳見南康南湖刺史李君濬之蓄水為湖瀼溪在瑞昌見元結注濓溪去軍城五里虎溪在彭澤縣南三十五里有橋逺師送客不過此橋李白詩東林送客處月出白猿啼别笑廬山去何煩過丨丨湓浦在德化西一里郡國志有人於此洗銅盆墮水取之見一龍而出晉志作盆隋志作湓射蛟浦蘇子由詩萬騎巡逰遍千帆破浪輕射蛟江水赤教戰越人驚山轉樓船影岸摧連弩聲祈昭旡為賦酣寢平生浦上積水相傳漢武帝教樓船于此谷簾水在德安東北十里景德觀詳見南康或云二水並流其輕重不同敷淺原在德安縣亭軒琵琶亭在西門之外其下臨大江白居易貶江州司馬自序云送客湓浦聞舟中夜彈丨丨問其人本長安娼女年長色衰嫁為啇人婦為作琶琶行潯陽江頭夜送客楓葉荻花秋瑟瑟主人下馬客在船舉酒欲飲無管弦忽聞水上琵琶聲主人忘歸客不行移船相近邀相見添酒回燈重開宴千呼萬喚始出來猶抱琵琶半遮靣我聞琵琶已嘆息又聞斯語重唧唧同是天涯淪落人相逄何必曽相識莫辭更坐彈一曲為君翻作琵琶泣坐中泣下誰最多江州司馬青衫濕蘇子由詩湓江暮雨晴孤舟瞑將發夜聞胡琴語展轉不成别草堂寄東林雅意存北闕澘然涕泗下安用無生説虎渡亭在外門外取宋均虎渡江之義魯望亭在彭澤馬當山黃魯直有詩百花亭在都統司梁刺史邵陵王綸建潄玉亭蘇子由詩山回不見落銀潢餘溜喧豗響石塘目亂珠璣濺空谷足寒雷電繞飛梁入瓶銅鼎春茶白接竹齋厨午飯香從此出山都不棄滿田粳稻插新秧樓臺庾樓在州治後庾亮領江州刺史故名白居易詩重過蕭寺宿再上丨丨行郡人猶認得司馬詠詩聲王貞白雨後從陶即中登庾樓丨丨逄霽色紅日半斜曛虹截半江雨風驅大澤雲江邊魚艇聚天畔鳥行分此景誰堪畫文翁請屬文前人晚望詩獨憑朱檻亦陵晨山色初明水色新竹霧晚籠銜嶺月蘋花暖送過江春子城隂處猶殘雪衙鼓聲前未有塵三百年來庾樓上曽經多少望鄉人佛寺東林寺晉武帝建逺師道場作殿時神運梁木白居易詩丨丨北堂水湛湛見底清中生百芙蓉菡蓞三百莖白日發光彩清颷散芳馨泄香銀囊破㵼露玉盤傾我慙塵垢眼見此瓊瑶英乃知紅蓮華虛得清淨名夏萼敷未歇秋房結才成夜深衆僧寢獨起繞池行欲收一顆子逺寄長安城但恐出山去人間種不生西林寺晉太和中建水石之美亞於東林白居易詩下馬丨丨丨翛然進輕䇿朝為公府吏暮是雲山客二月康廬比氷雪始消釋陽叢抽茗芽隂竇泄泉脈又云是年淮寇作處處興兵革智士勞思謀戎臣苦征役獨有不才人山中弄泉石大林寺白居易遊丨丨丨記云山高地深時莭絶晚初到恍若别造一世界者因成絶句云人間四月芳菲盡山寺桃花始盛開長隄春歸無覔處不知春向此中來且曰此地實康廬第一境道觀紫極宫去州二里即今天慶觀李白丨丨丨詩何處聞秋聲蕭蕭北窗竹回薄萬古心攬之不盈掬靜坐觀衆妙浩然媚幽獨白雲南山來就我簷下宿懶從唐生訣羞訪李生卜四十九年非一往不可復野情轉消散世道有翻覆陶令歸去來田家酒應熟太乙宫即祥符觀在德化南二十里圖經昔漢董奉為人治病愈者令栽杏五株謂之杏林即此地杜子美詩巫山不見廬山逺松林蘭若秋風晚香爐峯色隱晴湖種杏仙家近白榆大平宫在德化縣南三十里即唐九天使者祠明皇自言見使者降於殿庭因立祠今為丨丨興國丨祠廟靖節祠在德化西南九十里柴桑里即其故居也白居易訪陶潛故宅詩今來訪故宅森若君在前不慕樽有酒不慕琴無絃柴桑古村路栗里舊山川不見籬下菊但聞爐中煙狄梁公祠在彭澤縣白公祠在湓江門徐鉉為記濓溪祠朱元晦作記云先生家春陵而老於廬山之下因取故里之號以名其川曰丨丨而築書堂於其上今其遺墟在九江治之南十里其荒茀不治則有年矣淳熙丙申潘侯慈明與通守呂侯勝已始復作堂其處揭以舊名以奉先生之祀書來屬某記之惟先生不繇師傳默契道體建圖屬書根極領要當時見而知之有程氏者遂廣大而推明之使夫天理之微人倫之著事物之衆鬼神之幽莫不洞然畢貫于一嗚呼盛哉非天所畀其孰能與于此某切嘗伏讀先生之書而想見其人嘗欲一泛九江入廬阜濯纓此水之上以致其高山景行之意而病不得往誠不自意乃今幸其獲因文字以附姓名于其間也古迹晉杉在疑寂稱傍逺公以晉義熙間卒葬此山杉蓋當時所植浪井孫權念於灌嬰城湓江有風水麻動因名李白詩浪動灌嬰井尋陽江上風蘇子由詩江波浮陳雲岸壁立清鐵胡為井中泉湧浪時驚發水性夲無定得止自澄徹誰為女媧手補此天地裂名宦王嘉漢時為守宋均後漢時為郡守多虎為民患均飭屬縣退姦貪進忠善一去陷穽虎相與東渡江而去陶侃晉時為刺史勤於吏職嘗夢生八翅飛至天門登八重而不得入後乃為侍中太尉庾亮晉時領江荆豫州刺史陶潛刺史王𢎞每令人侯丨丨知其當往廬山乃遣人賫酒于半道要之至州問其所乘曰素有腳疾向乘肩輿亦足自反嘗為彭澤令郡嘗遣督郵吏請束帶見之歎曰安能為五斗米折腰向鄉里小兒即解印綬去賦歸去來詞在官八十餘日顔真卿詩嗚呼陶淵明奕葉為晉臣自以公相後每懷宗國屯題詩庚子歲自謂羲皇人手持山海經頭載漉酒巾孫愐太康中孫愐為尋陽守逍遙渚際見一輕舟淩波俄而漁父至神顔瀟灑垂綸長嘯愐異之乃問買魚漁父笑而答曰某釣非釣寧賣魚耶鼓棹而去愐益異焉王羲之為內史狄仁傑唐天授中為來俊臣所誣貶彭澤令生祠記云武后革唐為周公至邑塑高宗聖像於修真觀朔望朝拜白居易以言事貶江州司馬自作壁記云自武德已來庶官以便宜制事大攝小重侵輕郡守之職總于諸侯師郡佐之職移于部從事故自五大都督府至于上中下郡司馬之事盡去唯員與俸在凡內外文武官左遷右移者遞居之凡執役事上與給事于省寺軍府者遙署之凡仕久資高耄昏軟弱不任事而時不忍棄者實􅊩之􅊩之者進不課其能退不殿其不能才不才一也若有人畜器貯用急於兼濟者居之雖一日不樂若有人養志忘名安于獨善者處之雖終身無悶官不官繫乎時也適不適在乎人也江州左匡廬右江湖土高氣清富有佳境刺史守土臣不可逺逰觀羣吏執事官不敢自暇逸惟司馬綽綽可以從容於山水詩酒間由是郡南樓山北樓水湓亭百花亭風篁石巖瀑布廬宫源潭洞東西二林寺泉石松竹司馬盡有之矣茍有志于吏隱者捨此官何求焉按唐典上州司馬秩五品嵗廪𢾗百石月俸六七萬官足以庇身食足以給家州民康非司馬功郡政壞非司馬罪無言責無事憂為國謀則尸素之尤蠧者為身謀則祿仕之優稔者豫佐是郡行四年矣其心休休如一日二日何哉識時知命而已又安知後之司馬不有于吾合志者乎因書所得以告來者李渤號白鹿治長慶間為刺史築南湖堤號甘棠湖皇朝吕誨以論陳升之出守人物慧逺丨丨法師居廬山東林寺有白蓮池與劉遺民雷次宗周王之宗炳陶潛竺道生等十八人同修淨土之法然逺公招陶潛入社終不能致謝靈運求入社而以心雜不許元結居瑞昌滚溪上自號滚溪浪士有詩云尤愛一溪水而能存讓名李白浮逰四方安祿山叛轉徙康廬山宿松間皇朝周頥字荗叔酷愛廬阜買田築室退居濓溪之上二程先生嘗過而問道焉明道曰吾再見荗叔吟風玩月而歸得吾與點也之意伊川曰吾再見荗叔論道遂厭科舉之習黃魯直序云荗叔人品甚高胸中灑落如風光霽月好讀書雅意林壑初不為人窘束世故權于仕籍不卑小官職思其憂中歲乞身老于湓城有水發源於蓮花峯下清潔紺寒下合于湓江荗叔築室於其上用其平生所安樂嫓水而成名曰濓溪與之遊者曰溪名未足以對荗叔之美雖然荗叔短于取名而惠于求志薄于徼福而厚于得民菲于奉身而燕及煢嫠陋于希世而尚友千古聞荗叔之餘風猶足以律貪則此溪之水配荗叔以永久所得多矣詩云溪毛秀兮水清可飯羮兮濯絲不漁民利兮何又有於名弦琴兮觴酒寫溪聲兮延五老以為夀蟬蛻塵埃兮玉雪自清聼泥溪兮鑒汀明激貪兮厚薄非青蘋白鷗兮誰與同樂津有舟兮蕩有蓮勝曰兮與客就間人聞拏音兮不知何處散髮醉高荷為蓋兮倚芙蓉以當妓山清水寒兮舟著平沙八方同宇兮雲月為家懷連城兮佩明月魚鳥新人兮野老同社而爭席白雲蒙頭兮與南山為伍非夫人攘臂兮誰余敢侮夏竦德安人為相封英公周紫芝號竹坡先生有詩名晚居九江題詠野水多於地白居易早秋晚望呈韋侍御詩九𣲖繞孤城城高生逺思人家半在煙云云夫君亦淪落此地同飄寄尋陽酒甚濃相勸時時醉湓城去鄂渚韓愈至江州寄鄂渚李大夫程詩云云風便一日耳不枉故人書無因泛江水作郡廬山下蘇子瞻詩讀書廬山中云云平湖浸山腳雲峯對虛榭紅蕖紛欲落白鳥時來下猶思隱居勝亂不驚湍㵼鄉户半漁翁周繇送江州薛尚書詩匡廬千萬峯影匝郡城中忽佩虎符去遙疑鳥道通煙霞時滿郭波浪暮連空樹翳樓臺月帆飛鼓角風郡齋多嶽客云云王事行春外題詩寄逺公人家低濕水煙中白居易江州詩潯陽欲到思無窮庾亮樓南湓浦東樹木凋踈山雨後云云菰蒲餧馬行無力蘆荻編房臥有風遙見朱輪來出郭相迎勞動使君公浪生湓浦千層雪來明詩云云雲起爐峯一炷煙四六擢從朝路逺護江城榮剖魚符兼提虎旅乃眷潯陽密連淮甸千帆霧合萬騎雲屯眷潯陽之要地乃江右之名藩控西江之要地宿南渡之重師亦嘗大幕府之開號為小朝廷之勝據大江為深池宿徑兵為重鎮居襟帶之上流擁貔貅之萬騎惟湓浦柴桑之置郡依匡廬彭蠡以為城在東晉則視荆豫以揔提至紹興則連舒蘄而莭制版籍浩繁深有繭絲之責舟車舄奕適當郵傳之衝九江虎渡交騰來暮之歌十年鳳池恐有見晚之嘆彭澤遺祠無復就荒之菊濓溪故宅尚餘淨植之蓮湓亭江上緬懷樂府之新彭澤門前頓使官情之薄載駕朱轓和潯陽琵琶之曲行持紫槖聽長樂鐘鼓之聲興國軍永興通山大冶建置沿革禹貢荆州之域分野介於吳頭楚尾之間南斗十度為吳頭軫十一度為楚尾春秋屬楚秦屬南郡漢屬江夏郡之鄂縣後漢因之孫權改鄂曰武昌郡分立陽新縣隋置鄂州改陽新曰富川縣又改富川曰永興縣唐因之皇朝太平興國三年升興國軍今領縣三治永興要事郡名富川見沿革注風俗郡小民醇周紫芝記囹圄晝閉同上云云桁楊不施形勝西控荆楚同上妙香寮記東連江池云云山連楚嶠靈峯寶録云云水接湘川山川印山在永興縣西南百里形如印龍角山在永興西八十里兩峯相對鍾山在永興西南百七十里舊傳鍾繇學書于此有墨池通羊山在通山邑西八十里東方山在大冶縣北三十里丨丨朔之故隱也回山在大冶東五十里山有泉元結名之曰異泉乃作銘吉祥山在大冶東武昌記吳主微時嘗隱于此羅隱詩吳王微時隱此山興都去後緑潺潺飛雲洞在回山之顛有元結書堂故基富池湖源出永興之翠屏六溪至丨丨口遂入大江散花洲在大冶縣大江中流世傳周瑜敗曹操于赤壁吳王迎之至此釃酒散花勞軍士謂之吳王散花洲堂亭十詠堂在軍治周紫芝有丨丨以形容風物之美滄浪亭在軍治放生池上荷花彌望繞堤皆楊栁羣山如列屏有浮屠突兀在雲煙紫翠間王龜齡記江山之勝似杭之西湖樓臺捲雪樓在富池忠勇廟臨大江張安國書扁名宦王琪慶厯間為守周紫芝紹興間為史官以非進士出身出治興國陸九齡為教授人物吳中復登景祐第其兄弟幾復嗣復聨名登科中復由御史登法從仁宗飛白鐵御史三字以賜吳鶚為光祿寺丞雅好山水尤竒廬阜題詠鶚渚他時縣周紫芝詩云云江南盡處州萬頃平湖几案間陶去泰富川郡治居高閣云云公餘身在水雲鄉王龜齡詩滿目江山富一堂云云江圍蒲稗富川城江彥章次興國詩路入麕麚亭子嶺云云北風捲地來元際西日銜山未肯晴絶浦踈梅和雪點長天數雁背人橫侵尋短髮愁中老行盡江南春復生杭潁西湖堪鼎足王龜齡詩窮途喜見富川波已覺兹行所得多云云更懷六乙與東坡湖光十里皆荷花郡守周紫芝云湖中嵗取荷葉可貿百千一日曝之湖濱大風吹捲飛數十里俱盡遂賦詩云湖邉老守湖是家云云我來不見花如錦但聞荷葉飛天涯外邑居民山作城李傳正詩我愛通羊好云云眼前無俗事枕畔有灘聲白雲深處宿蔣頴叔詩我愛通山好青山便是城云云一枕玉泉聲四六拜命宸廷承流江國輟從朝路來護江城雖云斗大實控風寒江右名區富川要郡鄂渚創州此僅一同之地江南盡處今專千里之權自吳氏兄弟以同年而登科故永興縣邑取雙仙而名重襟江帶湖既近依於天險控淮連楚實足禦於風寒千里政成聊訪西湖之勝景一封詔下佇躋北闕之近班方世無虞郡政不勞於臥治屬時多事軍需常恐於乏興南安軍大庾上猶南康建置沿革禹貢揚州之域為星紀之分野春秋時屬吳及百粵戰國時屬楚秦屬九江郡漢分九江置豫章郡南壄預焉前漢南粵不賔遣將軍姓庾討之築城於此因為名今理大庾是也隋以大庾為鎮唐升大庾為縣屬虔州皇朝至太宗升為南安軍今領縣三治大庾事要郡名橫浦唐地理志在大庾縣西南康記昔漢將軍楊僕討呂嘉出章郡下丨丨即此南壄同上風俗儒術之富蘇子瞻作軍學記云南安江西之南境云云與閩蜀等而太守曹侯登所至必建學故南安之學甲於江西形勝南扼交廣范大用生祠記云云西距湖湘處江西盡頭楊邦彥跋橫浦集云云據江西上流重修軍學記云云接南荒之境同上云云當五嶺之一南康記秦守五嶺第一塞嶺即大庾也通道交廣此其喉咽土産茶磨石圖經以石門之石為之蒼碧縝密鐫琢得所以磨盤與輪同璞者為佳其最謂之舀石猶硯之舊坑也脈紅如線極鮮明不過曹溪五點百大衆欲爭取之追至大庾嶺久立告渴六祖拈錫杖石泉湧清冷甘美衆皆驚駭而退名宦周頥東都事略舂陵人嘗為南安軍司理有囚法不當死運使深欲治之荗叔爭不勝授其告身以去曰如此尚可仕乎殺人以媚人吾不為也運使感悟因賴以活劉安世字器之號元城先生哲宗朝除右正言論蔡確章子厚黃履刑恕妄要定䇿之罪及子厚入相落職知南安軍名賢江公望蔡京用事與任伯雨俱貶南安張九成公與僧宗杲為莫逆交時往來其間秦檜恐其議已於是言者論公遂有南安之謫結廬掃軌題于柱曰豫平生嗜書老來自病執書就明于此者十四年矣倚立積久雙趹隱然自號橫浦居士二程先生圖經云惟河南丨丨丨丨道德性命之説天下所宗其初也侍父通守而濓溪周先生為理曹掾相從講學遂能紹千載不傳之祕題詠折梅逄驛使荆州記云吳陸凱與范曄相善自江南寄梅花一枝詣長安與曄贈詩云云寄與嶺頭人江南無所有聊贈一枝春西州南北護梅關章頴詩云云盡日人行石壁間地占江西最上頭前人詩路當嶺庾初通處云云地近嶺南冬不氷鄭億詩人逄嵗稔家餘粟云云南踰梅嶺陟嶙峋余安道詩行盡章江庾水濵云云上得梅山不見梅南安志嶺上有寺有婦人題云妾幼侍父任英州司冦父代歸以大庾有梅嶺之名而反無梅遂植三十株於道傍又題此詩于壁間云英江開今日掌刑回云云輟俸買將三十本清香留與雪中詩人嘗説嶺頭梅張子野詩云云往往春風帶雪來回到嶺題詩花不見空將春夢又空四六問道江西分符嶺北光膺芝檢逺護梅封昔為雷邑今曰斗州欲撫洞蠻先遴郡將惟嶺下之小邦實江西之窮處肇始隋家之鎮戍繼為唐代之縣隅廄傳據南北之會廪稍積前後之遭民力凋殘無以追隨於富國地望卑下不足動搖於有司江源欲絶慨非澤國之規模嶺路初通漸有蠻方之氣象平反郡獄曽聞名世之片言撫字州民亦有先賢之遺愛郡置皇朝於是分賢侯之竹地瀕庾嶺不妨寄驛使之梅方輿勝覽卷二十二
