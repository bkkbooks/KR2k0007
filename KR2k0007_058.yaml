body:
  text: 方輿勝覽卷五十八宋祝穆撰歸州秭歸興山巴東建置沿革禹貢荆州之域楚地翼軫之分野周為䕫子之國後屬楚秦屬南郡二漢因之魏武平荆州以秭歸縣屬臨江郡三國先屬蜀後屬吳景帝置建平郡晉因之宋屬荆州南齊屬巴州梁屬涪州後周置秭歸郡隋屬巴東郡之秭歸縣唐改為䕫州割秭歸巴東二縣置歸州皇朝因之中興割隸䕫州而䕫帥兼提舉歸陜兵甲今領縣三治秭歸事要郡名巴東建平秭歸郡志屈原既被放忽然暫歸有賢秭曰女嬃亦歸諭令自寛離騷所謂女嬃之嬋媛兮申申其詈予也袁崧以為丨丨之名始於此風俗郡少農桑荆州記建平云云農不如工工不如商最為墝瘠建平郡嘉禾詩序湖楚之北郡十有二歸之地云云最能操舟杜甫最能行峽中丈夫輙輕死少在公門多在水富豪有餘駕大舸貧窮取給隨艓子小兒學問止論語大兒結束隨商旅欹帆側柂入波濤撇旋稍噴無險阻朝發白帝暮江陵頃來目擊信有徵瞿唐漫天虎鬚怒歸州長年與最能此鄉之人氣量窄悞競南風疎北客若道土無英俊才何得山有屈原宅夷夏相半晏類要踏啼之歌同上有巴人焉有白虎人焉有蠻蜑人焉巴人好歌名踏啼白虎人事道蠻蜑人與巴人事鬼伐鼔以祭祀呌嘯以興哀詰朝為市男女錯雜日未午交易而退拔河之戲同上以麻絙巨竹分朋而挽水謂之拔河以定勝負而祈農桑形勝左荆襄右巴蜀秭歸志云云靣施黔背金房大江經其前香溪遶其後劉備故城同上云相傳蜀光主征吳連營七百里至秭歸此城蓋當時所築舊址四川之門户楊輔乞歸峽甲兵司奏狀䕫歸脣齒之邦云云國之藩表通鑑吳陸抗疾篤上疏曰西陵建平云云既處上流受敵二境若敵汎舟順流星奔雷邁非可恃援他部以救倒懸也增建平兵三國志晉將王濬自蜀沿江伐吳守將吳彦表皓曰請丨丨丨丨若建平不下晉師終不敢過皓不從山川巴山在巴東縣治所依朱雀山在秭歸縣南故名丨丨丨與州治相對臥牛山在秭歸縣治之後有翰林亭破石山在秭歸縣山有大石破為十字人登者咸經其間明月山在巴東山上有竅如明月石門山在巴東縣東北三十五里山有石逕深若重門劉備為陸遜所破走經石門追者甚急備乃燒鎧斷道然後得免八學士山在秭歸有八叠皆朝州治建陽峽在興山東七十里源出寧都曲折四十八渡約十餘里至建陽村中空舲峽在秭歸縣東絶崖壁立飛鳥不能棲有一火燼挿石崖間長數尺相𫝊堯洪水時行者泊舟繫於崖側故挿餘燼於此至今猶曰挿竈玉虛洞在興山縣南五十里舊經唐天寶有人遇白鹿於此山逐而視之乃有洞可容千人遂于洞側置觀雷鳴洞在秭歸縣大江之左駭浪激石聲若丨丨故名龍昌洞亦名三游洞在巴東有龍昌寺此非石洞有溪十里可浮舟往來大沱石在巴東縣歐公硯譜云歸州大沱石其色青黒斑斑其文微麄亦頗發墨杜詩奉使三年後長嘯得硯石吒溪在秭歸縣水石相激如噴吒之聲在雷鳴洞之南分三吒官槽口為上吒雷鳴洞為中吒黄石口為下吒吒心大潭如甕舟行多覆溺之患故名人鮓甕黄魯直詩命輕人鮓甕頭船合溪在秭歸縣兩溪合流香溪即昭君溪也下牢溪在秭歸縣西六十里杜甫詩始知雲雨峽忽盡下牢邊歐陽永叔詩隔谷聞溪聲尋溪度横嶺清流涵白石靜見千峰影巖花無時歇翠柏鬰何整安能戀潺湲俯仰弄雲景滑石灘在秭歸縣岸皆滑石井泉清冷泉出東溪石罅極清冷作亭其下因泉為名石碣尚存堂亭䨇鳯堂在秭歸縣治縣令鄧惟清生二子後俱參政事此堂因名白雲亭在巴東縣秋風亭在巴東縣並萊公建陸務觀詩江上秋風宋玉悲長官手自葺茅茨人生窮達誰能料蠟淚成堆又一時翰林亭在臥牛山下唐翰林李矗為刺史嘗建亭故名寺觀靈泉寺在州西三里西臨水狀若瀑市張無盡於此院著華合論詩云合道通為七卷經黙教開眼示羣生不須天女添瓶水自有靈泉一𣲖清雲居觀在秭歸縣有金銅混元皇帝像并二鐵真人皆唐開元間鑄祠廟三閭大夫祠晏類要在州東五里東漢地理志引荆門記云秭歸縣北一百里有屈原故宅累石為屋基名樂平里其東北十里又有女須廟𢷬衣石猶存陸務觀歸州逢端午詩屈原鄉國逢重午不比常年角黍盤黄魔神寰宇記載其廟記云咸通壬辰翰林蘭陵公蕭遘自右史竄黔南泝三峽次秭歸夢神人曰險不足懼公詰之曰我丨丨丨也居紫極宮之西北隅將祐助明公出于此境又廟記載李吉甫自忠州除替峽漲洶怒忽有神人湧出水上為之扶船李公祝而謝曰是何神也神曰我丨丨丨也本朝冦萊公經從吒灘亦有神扶船而下自號丨丨丨冦萊公祠在龍興觀之西又巴東亦有祠有萊公柏二株在縣庭民以比甘棠蘇子瞻詩萊公昔未遇寂寞在巴東聞道山中樹猶餘手種松明妃廟昭君名嬙避晉諱改曰明妃本縣人王攘之女也年十七漢元帝時待詔掖庭不得見後單于願壻漢氏於是以昭君行寰宇記在興山縣昔明妃入胡於馬上彈琵琶怨且歌曰黎萊萋萋其葉立黄有鳥處此集于苞桑昭君服毒而死單于舉國葬之胡中多白草而此塜獨青鄉人思之為之立廟州東北四十里有昭君村白居易詩靈珠産無種彩雲出無根亦如彼姝子生此遐陋村杜甫詩羣山萬壑赴荆門生長明妃尚有村一去紫臺連朔漠獨留青塜向黄昏又云若道巫山女麄醜何得此有昭君村李白詩漢月還從東海出明妃西嫁無來日燕支長寒雪作花蛾眉憔悴沒胡沙生乏黄金在圖畫死留青塜使人嗟又云丹青能使醜者妍無鹽翻在漢宮裏唐楊凌明妃怨漢國明妃去不還馬駝絃管向陰山匣中縱有菱花鏡羞對單于照舊顔王介甫詩當時枉殺毛延夀意態由來畫不成歐陽永叔詩誰能殺畫工於事竟何益耳目所及尚如此萬里安能制夷狄古跡丹陽城在秭歸東八里今屈沱楚王城是也北枕大江周十二里山海經云夏啟封盂除於丹陽城昔周武王封熊繹於荆丹陽之地即此與江南丹陽不同䕫子城寰宇記在秭歸縣東二十里春秋䕫子之都熊摯所治也高陽城在興山縣西三里山上歸鄉城在秭歸縣東五里即歸國也向王槍在巴東縣北臨大江旁有鐵槍頭長數丈經數百年不損目曰向王槍公孫樓柱盛宏之荆門記巴東有一折柱孤直高三丈可十圍相傳云是公孫述樓柱枯而不朽名宦杜延年封建平侯蔡邕為巴東守李嚴宰秭歸後輔蜀少主皇朝冦凖為巴東令有野水無人渡孤舟盡日橫之句王龜齡詩云澶淵一叚奇功業句在孤舟野水中陸務觀詩云巴東詩句澶淵策信手拈來盡可驚人物屈伯庸屈瑕之後采食於屈因氏焉生女􅎐及子平屈平字原仕楚懷為三閭大夫以讒被逐自沈汨羅宋玉屈原弟子為楚大夫閔其師以忠被放乃作九辯以述其志州東五里有故宅杜甫詩摇落深知宋玉悲風流儒雅亦吾師江山故宅空文藻雲雨荒臺豈夢思名賢張商英以忤蔡京安置歸州移峽州題詠看我過龍門秭歸集詩亂石烏牛伏驚濤白馬奔大家齊拭目云云楚水春多逆浪風白居易入峽次巴東詩巫山暮足霑花雨云云兩片紅旌數聲鼓使君艛艓上巴東竹籬茅舍作晚市范至能詩云云青蓋黄旗稱使君城邑舊為䕫子國王龜齡詩身乗蓽輅思熊繹詞誦離騷弔屈原云云民人多是楚王孫過眼黄牛竹節灘秭歸集詩驚心烏石蓮花淖云云征棹直從中溜過好山只得片時看四六巴東古郡蜀口要津建平小壘荆楚上流地雖要害境則蕭條雖云古地尚習蠻風山城分壘巳疇固圉之功野水橫舟行作濟川之具䕫子國蜀主城尚存遺址昭君村屈原宅曾入名篇地推瘠土民不富於田疇水亦奔湍俗善操於舟楫竹籬茅舍分符聊試於小邦金馬玉堂召對即躋於近列雲安軍雲安建置沿革禹貢梁州之域秦巴郡之地漢胊䏰縣也其地下濕多胊䏰蟲故名周武帝改為雲安縣屬巴東郡隋因之唐隸䕫州後為雲安監皇朝開寶以雲安縣陞為監中興以來分道置帥以雲安為䕫州屬邑差京朝官為軍使仍借服色葢雖以縣隸而軍額仍舊今領縣一事要郡名雲安風俗風俗淳厚唐商真君飛昇記雲安云云陶染真風如瞿法言揚雲外之徒繼出故琳宮秘館獨盛於它處猶存使名李􅌫雲安橘官堂記建炎中改軍為縣隸於䕫云云官儀仍備太守之略而時節得以需章自達于朝他邑莫比也形勝東有瞿唐張顥雲安鍾秀亭記云云灧澦之壯西有縉雲同上云云塗山之美土産鹽元和志郡有丨官橘官山川石城山在岷江北岸相去一里漢志朐䏰山有小大石城飛鳯山與縣治相對馬嶺山在縣北三十里扶嘉所謂三牛馬嶺曲水李㢲巖留題云雲安之西三十里有自然曲水泊舟横石灘歩往訪之水峻急不可流觴巖頂有永和間題字龍溪在縣西三十里堂亭徳輝堂晁公遡有記橘官堂李􅌫有記杜鵑亭杜甫詩云雲安有杜鵑水閣杜甫水閣朝霽奉簡嚴雲安詩東城抱春岑江閣臨石靣崔嵬晨雲白朝日射方甸雨檻臥花叢風牀展書卷鈎簾宿鷺起丸藥流鶯囀呼婢取酒壺續兒誦文選晚交嚴明府矧此數相見人物扶嘉按雜記漢廷尉丨丨朐䏰人也初嘉母於湯溪水側遇龍後生嘉長占吉凶巧發奇中高祖為漢王時與嘉相遇嘉勸定三秦高祖以嘉志在扶翼賜姓扶氏為廷尉食邑朐䏰嘉臨終有言曰三牛對馬嶺不出貴人出鹽井題詠天外巴子國劉禹錫始至雲安縣詩云云山頭白帝城波傾白帝盡雲散荒臺傾避暑雲安縣杜甫奉寄李秘書詩云云秋風早下來終日子規啼杜甫子規詩峽裏雲安縣江樓翼瓦齊兩邊山木合云云雲安縣前江可憐杜甫十二月一日詩今朝臘月春意動云云一聲何處送書鳫百丈誰家上瀨船未將梅蘂驚愁眼更取椒花媚遠天明光起草人所羡肺病幾時朝日邊日長巫峽雨濛濛唐戎昱雲安阻雨云云又説歸州路未通遊人不及西江水先得東流到渚宮雲安酒醲夾夕米賤范至能竹枝歌云云家家扶得醉人歸贈子雲安䨇鯉魚杜甫寄岑嘉州詩云眼前所寄選何物云云雲安沽水奴僕悲杜甫引水詩見䕫州義井注四六塗芝泥檢剖竹雲安名雖小邑體如大邦維雲安之蕞邑乃䕫峽之要區聽巫峽之䳌似催佳句聞雲安之鴈忽送尺書地分朐䏰之雷封强名郡治憂及雲安之斗水可想土風大寧監大昌建置沿革禹貢荆州之郡占翼軫之分野在峽之北於䕫為近春秋時䕫并於楚秦以為巫縣漢屬南郡三國迭有其地蜀分南郡立宜都郡吳孫休分宜都立建平郡晋置建昌縣又改泰昌屬建平郡後周又改曰建昌縣又改曰大昌郡隋屬巴東郡唐屬䕫州縣有鹽井其後劉晏為鹽鐵使以嘉興及大昌等為十監五代屬䕫州皇朝開寶六年於鹽井十七里置大寧監端拱間以大昌縣來屬今領縣一與監治自為兩處事要郡名大寧風俗最為褊陋知監黃中江山堂記大寧在巴峽云云軒冕者寡登科題名記大寧僻在東南云云而封略之内皆樂善之編氓田賦不滿六百碩大寧志序藉商賈以為國同上云云圖經一泉之利足以奔走四方吳蜀之貨咸萃于此辣茶辟嵐氣監地接朐䏰多瘴土人以茱萸嚥茶飲之可以辟嵐氣以其味辛名曰辣茶形勝地近巴䕫圖經云云有楚遺風又壁記云僻在䕫峽之左土産不及他郡中下亂山縈紆知監元克鳯山泉記境土延袤數百里大率皆云云一水經乎其中峽郡之桃源知監正子申大寧志序一溪前陳可濯可㳂衆峯巉絶如削如畫亦云云也土産鹽井晏類要山嶺峭壁之中鹹泉湧出土人以竹引泉置鑊煮鹽郡志鹽井隸監淳熙甲辰部使者楊公輔更法歸之漕司監不復與熙寧中嵗額四百餘萬斤紹興中以二百四十萬斤為額閏年加十萬斤為二百五十萬斤又云鹽泉有絞篊引泉踏溪每一筧用一篊其筧與篊經一年十月旦日以新易陳郡守作樂以臨之井民相慶謂之絞篊杜甫詩鹵中草木白青者官鹽烟官作既有程煮鹽烟在川汲井嵗榾榾出車日連連自公斗三百轉致斛六千君子慎止足小人苦喧闐我何良嘆嗟物理固自然山川鳯山直監治之東亦名東山際溪千仭木石蒼翠景物幽絶寶山在監北十七里半山有穴如瀑泉即鹹泉也山有牡丹芍藥蘭蕙氣象盤蔚大寧諸山惟此獨雄石柱山在監東四里一峯削成如巫峽所望剪刀峯與道士峯相連皆奇觀也石鍾山在監東北十五里與二仙山相望有巨石如鍾下有三足烟火之跡宛然父老以為爾朱丹爐云道士峯在監東四里與石柱山相連觀音巖在監治東鳯凰山郡守張孝芳愛其類湘中山水暇日窮討得月窟雲巖釣雪玉環浮玉寶華之勝二仙洞在鹽泉之側峭壁上有石紋如人相對起伏狀洞深不可測前有池不竭又有仙骨長丈餘馬連溪在監西五里中春清明郡守領客於江臯泛舟遊人亦買舟鼔吹隨之㑹飲於緑陰之下不減蠶市之樂千頃池在大昌縣西三十六里波瀾浩渺分為三道一道東流為當縣井源一道西流為雲安縣陽溪一道南流為奉節縣西瀼水樓榭絶雲樓在郡治藏春塢在縣治名宦皇朝雷説淳化中説知監見人戸汲泉強弱相凌多底于訟乃於穴傍創為石池以瀦之外設横板三十竅承以脩竹謂之筧筒孔嗣宗嘉定中嵗久滋弊朝廷乃遣榮州資官令孔嗣宗措置有不便于民者悉除去止存壠户資塩三色除去四色人物姚邦基調開封尉氏令以劉豫僣竊遂匿跡于山林高祖嘉之華以京秩王文義景徳中文義母疾篤剔股進藥母卒廬墓去水遠忽感夢得泉今名孝感泉崔守有文以記之題詠燒畬度地偏杜甫詩煮井為鹽速云云注云巫土瘠确煖氣晚達故民燒田而耕謂之火耕匣琴虛夜夜杜甫西閣期大昌嚴明府不至詩云云手板自朝朝分符真吏隠白㢲題江山堂詩云云燕寢傍巖棲四六光膺鳯綍榮佩虎符昔維置監今實為州官儀頗覺於森嚴地望無嫌於褊陋煮井為鹽既利權之莫擅燒畬度地復田賦之甚微環郡皆山疑是桃源之聚落陞邑為監均為竹使之蕃宣方輿勝覽卷五十八
