觀之賦直欲規恢升龍潛之大府地望本雄宿虎視之重屯軍容尤壯夜望揚州尚見城中之燈火秋臨京口益嚴江上之鼓鼙遊甘露而誦坡老之名章訪金山而懷韓公之雄概萬旅雲屯軍政必明于紀律一江天險舟師尤謹于隄防城髙鐡甕既嚴兵甲之屯境勝金山尤恃波濤之險臨江水以觀兵宜魏人之發嘆鑿河渠而通漕由隋帝之開端樓登多景可徒悵望于中原舟濟大江直欲誓清于此水京口卜居有元祐相臣之陳迹江心奏捷餘建炎大將之英風嘉興府嘉興海鹽華亭崇德建置沿革禹貢揚州之域吳地斗分野書於越敗吳于檇李即此地春秋由拳縣始皇時見山下出王氣使諸囚鑿之囚倦後人訛為由拳漢因之吳改為嘉禾縣又改為嘉興縣隋屬蘇州又屬杭州五代石晉時吳越文穆王元瓘始經邑為州置秀州國朝賜名嘉禾以孝宗誕聖之地升嘉興府領縣四治嘉興事要郡名嘉禾郡志吳黃龍五年丨丨生于由拳改今名檇李漢志曰由拳應劭曰即古之丨丨風俗風俗淳秀題名記惟秀介二大府旁接三江擅湖海魚鹽之利號澤國粳稻之鄉土膏沃饒云云文賢人物之盛前後相望百工衆技與蘇杭等慕文勤農圖經其俗尤丨丨儒頗丨丨務形勝秀澤國也見月波樓記若漢右扶風張元成嘉禾志序密拱鳯城云云負海控江章峴會浦河記丨丨丨丨土為上腴地為通津王銍壁記丨丨丨丨故井邑繁雄訟缿坌壅舟車走集使賓交馳急索疾呼殆無虛日土産鹽海丨縣序云昔吳王煮丨于此草布鄉落間績此布以為業蟹崇德學記稻丨之利轉徙數州山川胥山在嘉興縣東三十里舊經伍子胥經營于此水經云子胥死于吳而浮户于江吳人憐之立祠于江上名曰丨丨由拳山在嘉興縣其地産佳紙殳山在嘉興縣西南六十里昔道士殳基尸解于此鳯山在華亭縣崑山在華亭縣西北三十里按吳地記陸氏之祖葬于此因生機雲皆負詞學時人以玉出崑岡而名焉王介甫和唐詢十詠玉人出此山山宿傳此名崖風與穴水清越百餘音悲哉世所與一出受欹傾不如鶴與猿棲息尚全生金山在華亭縣南九十里上有寒穴舊經昔周康王遊鎮大海遂築城以接此山澱山在華亭縣東南三十里小湖中秦住山在海鹽縣十八里輿地志秦始皇常登因名之陳山在海鹽縣東北四十里有龍潭及廟祈雨必應華亭谷輿地志吳大帝以漢建安中封陸機為丨丨侯即以所居為封丨出嘉魚蓴菜又多白鶴清唳故陸機嘆曰千里蓴羮未下鹽豉及臨刑嘆曰華亭清唳不可復聞三女岡在華亭縣東南八十里相傳吳王葬妃于此王介甫詩自古世上雄慷慨擅功名豈時強有力能使死者生三女共一邱此憾亦難平音容若可作無乃傾人城鶴坡在華亭東七十里此地出鶴俗謂之丨丨瀚海在華亭縣西抵海鹽東抵松江柘湖在華亭縣南七十里湖中小山生柘因名吳越春秋海鹽縣淪沒為丨丨吳地記秦時有女人入湖為神今其祠存王介甫詩丨林著丨山菱葉蔓湖濱秦女亦何事能為此湖神年年賽雞豚漁子自知津幽妖屈險阻禍福易欺人南湖在嘉興又名鴛鴦湖按丨丨草堂記檇李澤國也東南皆陂湖而丨丨尤大其故履百有二十頃谷水在華亭縣南長百五十里舊記曰丨丨出吳小湖徑由拳縣故城下神異傳曰由拳縣秦長水縣也始皇時縣有童謡曰城門當有血城陷沒為湖有老嫗聞之旦旦往窺城門門侍欲縳之嫗言其故嫗去後門侍殺犬以血塗門嫗又往見血走去不敢顧匆有大水乃淪陷為谷矣因目長水城水曰丨丨白龍潭去嘉興縣五里淳熙中用太平廣記所載攪龍法以長繩繫虎頭骨投之即雨許同詩呼吸湖中水山椒寄此身洞門風雨夜電火逐霜鱗華亭水水自華亭谷行三百里入松江王介甫詩巨川非一源源亦在衆流此谷乃清淺松江能覆舟蟲魚何所知上下相沉浮徒嗟大盈此浩浩無春秋寒穴在華亭縣王介甫詩神泉冽氷霜髙穴與雲平空山渟千秋不出嗚咽聲山風吹更寒山月相與清北客不到此如何洗煩醒滬瀆在華亭縣東江之側蓋虞潭袁嵩防海之處韭溪在州南八里堂亭思堂在華亭丞廳章質夫建蘇子瞻記曰嗟夫余天下之無思慮者也遇事則發不暇思也未發而思之則未至已發而思之則無及以此終身不知所思是故臨義而思利則義必不果臨戰而思生則戰必不力若夫窮逹得喪死生則吾有命矣且夫不思之樂不可名也虛而明一而通安而不懈不處而靜不飲酒而醉不閉目而睡將以是記思堂不亦謬乎雖然言各有當也萬物並育而不相害道並行而不相悖以質夫之賢其所謂思者豈世俗之營營於思慮者乎易曰無思也無為也我願學焉詩曰思無邪質夫以之月波樓在州西北城上下瞰金魚池元祐令狐挺立後守毛滂重修記云望而見月無有逺近容光必照而秀澤國也水濱之人起居飲食與月波接意將覽取二者于一樓之上也鄭毅夫詩古壕鑿出明月貝樓閣飛來兔影中野色更無山隔斷天光直與水相通溪藏畫舫清紋接人在荷花碧玉叢若把金魚破袢暑晚雲深處待歸風浩燕亭在州宅取沈存中丨丨丨詩意米元章書花月亭張子野倅秀創此亭取雲破月來花弄影之句會景亭在春波門外列岫亭在普濟院張堯同吾州風物好唯是欠青山忽有洞庭色來從一笑間佛寺鹿苑寺在海鹽縣西北三十五里魯貫之初宰此邑夢胡僧來迎參政及瞻羅漢像即夢中所見招提寺在嘉興縣西有靜照堂王介甫范景仁一時諸賢皆留題祠墓陸宣公祠東萊吕伯恭記云贄蘇州嘉興人在晉時吳越王元瓘奏以嘉興置州今城東橋有以宣公名者相傳即公所生之地也其故宅今為寶花寺劉伶墓在嘉興縣東二十七里蘇小小墓在嘉興縣西南六十步乃晉之歌姬今有片石在通判廳題曰丨丨丨丨豈非家在錢塘而墓在嘉興乎徐凝寒食詩嘉興郭裏逄寒食落日家家拜掃回只有縣前蘇小小無人送與紙錢財古迹吳王獵場在華亭谷東陸遜子孫遊獵于此又名陸機茸故陸士衡云五茸春草雉媒嬌王介甫詩吳王好射虎但射不操戈匹馬掠廣地萬兵助遮羅時平事非昔此地桑麻多猛獸亦已盡牛羊在田坡秦皇馳道在嘉興西北崑山南四里相傳有大􅓾路即馳道也王介甫十詠穆王得八駿萬事不期修茫茫千載間復此好逺遊車輪與馬迹此地亦嘗留想當治道時勞者如山邱禦兒分境通典吳越分境之所國語吳用禦兒臨之張堯同詩云用此臨吳戰何人為越謀夫差終不寤亡國始知羞裴休宅去嘉興四里今為真如寺陸機宅在崑山王介甫詩故物亦已盡嗟此嵗月深野桃自著花荒棘徒生針芊芉谷水陽欎欎崑山陰俯仰但如昨逝者不可尋養魚池在城外即陸琄池又唐刺史丁延贊得金鯽魚于此即今之西湖王介甫詩野人非昔人亦復水上居紛紛水中遊豈是昔時魚吹波浮還沒競食糟粳餘吞舟不可見守此嵗月除顧野王讀書堆在海鹽縣東顧亭湖即今寶雲寺唐詢詩平林標大道曽是野王居往事將誰語凄涼六代餘顧林亭詩寥寥湖上亭不見野王居平林豈舊物嵗晚空扶踈自古聖賢人邑國皆邱墟不朽在名德千秋想其餘名宦周顒隱金陵之北山應詔出為海鹽令孔稚圭作北山移文譏之李諤為海鹽令在縣西境創閘二所蓄河灌田皇朝魯宗道為海鹽縣令龎籍知州召為殿中侍御史李綱為華亭尉人物陸遜為孫權海昌令即今鹽官墓在華亭縣西北二十三里陸抗遜之子守邉與晉羊祜交和墓在華亭縣北二十三里陸機成都王頴討長沙王乂假機後將軍河北大都督為孟玖譛於頴遇害于軍中與頴箋詞甚悽惋弟雲亦遇害陸雲機之弟號二陸閔鴻見雲竒之曰此兒若非龍駒當是鳯雛朱買臣嘉興縣北七里有死灣亭即丨丨丨為內史衣錦還鄉時其妻羞死之地皇朝陳舜俞嘉興人應賢良第一題詠月在江樓倚玉簫陸魯望和皮日休吳中即事雲藏野寺分金剎云云惆悵月中千嵗鶴胡曽詩云陸機西沒洛陽城吳國春風草又生云云夜來猶為唳華亭華亭驚夢九臯禽楊大年寄劉秀州騎置迢迢阻玉音左魚江海遂初心朱絃道直消浮謗春草才多動苦吟震澤析酲千樹橘云云郡樓晴日東西望幾處甘棠接翠隂潮上孤城帶月回沈存中秀州秋日草滿池塘霜送梅林踈野色近樓臺天圍故越侵雲盡云云客夢吟隨風葉斷愁心低逐鴈聲來流年又喜經重九可意黃花是處開外邑勤苦字人酬帝力方干贈嘉興許明府詩檇李傳聞風教好重門夜不上重關腰懸墨綬三年外身去青雲一步間云云從容對客問家山升沉路别情猶在不忘鄉中舊往還四六矧惟檇李密拱武林言從檇李少憩甘棠疏榮符竹趣鎮嘉禾乃今一麾如昔三輔清蹕定都作輔藩而增重阜陵育秀升府號以更新控江負海在藩翰而匪輕就日望雲去闕庭而不逺封圻廣袤是為槜李之區井里豐登庸表嘉禾之瑞經行郡境哦荆國之十詩俯仰思堂誦坡公之一記攬月波于層樓起居必接酌雲泉于寒穴襟抱俱清羞崑崙薄蓬萊孰窺雅志左扶風右馮翊欲展通材過宣公之祠下忠槩如生處章子之堂中記文有警方輿勝覽卷三
