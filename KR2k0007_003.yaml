body:
  text: 方輿勝覽卷三宋祝穆撰鎮江府丹徒金壇丹陽建置沿革禹貢揚州之域吳地斗分野春秋時屬吳其地為朱方後屬越及楚秦改為丹徒屬會稽郡西漢屬江都國東漢屬吳郡孫權自吳徙丹徒謂之京城亦曰京口晉元帝渡江於京口僑置南徐州宋以南徐治京口隋文帝於南徐置潤州取潤浦以名唐因之後改丹陽郡德宗為鎮海軍皇朝升鎮江軍節度後以徽宗皇帝潛邸升府領縣三治丹徒淮東總領置司事要郡名京口圖經其城因山為壘緣江為境爾雅邱絶髙曰京故名南徐見沿革注風俗人性驕奢見寰宇記習戰尚禮隋志京口人丨丨而君子丨丨六代之風流徐鎔甘露寺記云云人物綜萃於斯三吳之山川林泉肇發於此形勝東通吳會郡國志云云西連都邑南接江湖西接漢沔曽改潤州集序控江流之會云云北拒淮泗浙西門户繫年録知鎮江府劉寧上言云控扼大江同上內蔽日畿鎮江志序云云外連天塹望海臨江見南齊志險過金湯周世宗問孫忌對曰長江千里云云桑梓帝宅南齊志宋氏以來云云北府兵可用元溫嘗謂京口酒可飲云云劉貢父詩縹壺盈前京口酒紅斾相隨北府兵山川北固山在州北一里回嶺下臨長江其勢險固即府治所據及甘露寺基建康實録梁武帝幸京口登北固樓遂改名北顧五州山在城西蔡天啓詩西升崇邱望培塿見五州蒜山在城西三里山上多蒜故名蘇子瞻云丨丨可居花山在城東即東山蘇子美詩寺裏山因花得名皇甫冉詩東山復盛遊即此土山在城西劉禹錫有詩見後茅山在金壇縣六十五里即三十六洞天華陽第八洞天也漢有三茅來治故名真誥云金壇華陽之天茅盈之祖濛得道號金壇黃鶴山在城西南三里宋武帝潛龍時息此山有黃鶴飛舞因名一名戴公山南史戴顒世居剡中又徙京口止黃鶴山宋文帝每欲見之日吾東巡當宴戴公山京峴山在府治東五里謂之京鎮祥符圖經不載京口得名以此鮑昭有從京峴拜陵詩丹陽山古雲陽縣也秦時亦言其地有天子氣始皇鑿北坑以敗其勢截直道使阿曲故謂之晉曲阿天寶初號丹陽非晉漢之丹楊漢丹楊郡治宛陵丹楊郡治秣陵山多赤桞故名金山在江中去城七里唐李錡鎮潤州表名丨丨因裴頭陀開山得金故名山前有三島號石牌稱郭璞墓按唐書韓滉傳建中之難陳少遊在揚州以甲士三千臨江大閲滉亦總兵臨金山與少遊會則是建中之時已有丨丨之名非始於李錡也長編建炎四年夏烏珠回至鎮江韓世忠提兵駐揚子江金山以邀之敵衆數萬世忠戰士才八千烏珠約日會戰世忠募海船百餘艘泊金山下預命工煆鐡為長綆貫一大鈎比合戰世忠分海舟為兩道每縋一綆則曵一舟而入敵不得渡以輕船絶江而遁俘獲殺傷甚衆政和間嘗以金山龍遊寺改建神霄宫汪彥章記云父老相傳先唐時嘗以為龍遊觀已而為浮屠氏所有者幾二百年故金華楊氏洞天記曰中國洞天不載於名籍者尚多有之丨丨其一也蓋其前臨滄海周回大江獨立無倚與天為際風濤朝夕赴其吞吐日月晦冥環其左右攬𢾗州之秀於俯仰之間而下盤魚龍之宫神靈之府蓋宇宙區奧古今勝處也周洪道雜記云山在京口江心上有龍遊寺登妙髙峯望焦山海門皆歷歷此山大江環繞每風四起勢欲飛動故南朝謂之浮玉山别有山島相傳為郭璞墓大水不能沒下元水府亦在此諺云金山山褁寺焦山寺褁山楊廷秀曉登金山詩金山東金山西金山排霄南斗齊天將三江五湖水并作一江字揚子來從九天上㵼入九地底遇嶽嶽立摧逢石石立碎乾坤氣力聚此江一波打來誰敢當金山一何強上流獨立江中央一塵不隨海風舞一礫不隨海潮去四旁無蒂下無根浮空躍出江心住金宫銀闕起峯頭捶鼓撞鐘聞九州詩人踏雪來清遊天風吹儂上瓊樓不為浮玉飲玉舟大江端的替人羞金山端的替人愁唐韓垂詩云廬山一峯秀岌然殊衆山盤根大江底撑影浮雲間雷霆常間作風雨時往還象外懸清景千載長躋攀焦山在江中金焦二山相去十五里唐圖經云後漢焦先隱於此山因名雙峯在海門韓持國登潤州城詩一帶分江紀丨丨照海門大江在城北六里亦名京口三國志魏文帝將東征出廣陵臨大江戎卒數十萬旌旗𢾗百里不敢渡嘆曰波濤洶湧天所以限南北也魏雖有武騎千羣何所用之遂於馬上賦詩云觀兵臨江水水流何湯湯戈矛成山林玄甲曜日光猛將懷暴怒膽氣正縱橫誰云江水廣一葦可以航林大聲詩南徐江水天下雄沿江一水如盤龍楊傑詩海上波平千里白江東兵壯萬夫雄雲開雲合山頭月潮落潮生渡口風練湖去城四十里李華頌并序辭曰土反其宅水歸其壑先王因流下而導之故曰九川滌源因迤匯而瀦之故曰九澤既陂以疏天地之氣以利元元之用崇伯汨五行而殛羽山臺駘章大澤而封汾川洪範首之春秋載之地有廣狹事無今古大江具區惟潤州其藪曰丨丨幅員四十里菰蒲菱芡之多龜魚螺鱉之産饜飫江淮膏潤𢾗州其傍大族強家泄流為田專利上腴畝收倍鍾富劇淫衍自丹陽延陵金壇環地三百里數合五萬室旱則懸耜水則具舟人罹其害九十餘祀凡經上司紛紜與奪八十一斷嗚呼曲能掩直強者以得之老幼怨痛沈聲無告永泰元年王師大翦西戎西戎既駾矣生人舒息詔公卿選賢良先除二千石以江南經用所資首任能者是嵗十一月二十三日拜前常州刺史京兆韋公損為潤州聲如颷馳先詔而至吏人畏服男女相賀即日上無貪刻下無寃憤公素知截湖潤壤災甚螟蝥臨事風生指期以復羣謗雷動山鎮恬然中明獨裁文之以禮乃白本道觀察使兼御史中丞韋公元浦中丞撫掌愜心如公之謀且曰興利除害得其人而後行非常之政敢歸叔父公乃申戒縣吏率徒闢之人不俟召呼抃從役畚鍤蓋野峻臯成蹊增理故塘繚而合之廣湖為八十里像月之規儔金之固水復其所如鯨噀射洶洶隱地雷聞泉中先程三日若海之瀰望灝灝如吞吐日月沈沈如韞蓄風雨所潤者逺原隰皆春耕者飽憂者泰於是疏為斗門既殺其溢又支其澤沃塉均品河渠通流商恱奠價人勇輸賦遐邇受利豈惟此州每嵗萌隂乘陽二氣相薄大雨時行羣潦奔流水勢所入盈而無傷龍見方雩稼蒙其渥時前相國彭城公劉尚書宴統東方諸侯平其貢稅間而恱之白三事以聞詔書褒異焉彭城公宣命至江南捧詔授公公率元僚椽史令丞已下至于耆艾西向拜手欣戴皇明人心上感天降嘉澤如有神祗昭協厥志公正直而和專靜而斷嫉惡宥過惠人察姦純鈎精堅百鍊不耗伐冰之貴降從士禮詩云靖共爾位好是正直宜其享福也吏人入賀公拱而謝之曰尚書劉公觀察韋公奉行王澤也鄙何力之有焉丹陽令杜孟寅秉公之清白延陵令季令從如公之愛人金壇令胡玘稟公之成規及丹陽耆夀周孝瓌百姓湯原等拜首而請曰兊為澤兊恱也水歸於澤而澤恱於人百年浸塞而公啓之臣哉鄰哉克諧帝休永代是式三縣無災若不碣而刻之則王命不揚於厥後後之人無以依據也華嘗學古見訪為頌頌曰望沄沄兮視冥冥鳥間魚樂葭菼生膏腴利倍起訟爭斯人怨抑痛無聲韋公正直動神靈百年遊淀為漻清飢者飫兮病者寧詔書光寵恩霈榮劃然毦矒復皎明追琢刻頌揚棻馨潤浦在丹徒縣東二里州以此得名一曰東浦新亭渚李善注云十洲記在丹陽郡謝元暉别范零陵詩停驂我悵望輟棹子夷猶廣平聽方籍茂陵將見求西津渡戴叔倫詩云大江橫萬里古渡渺千秋孟浩然詩北固臨京口夷山對海濵江風白浪起愁殺渡頭人漕渠貫城中司馬遷曰禹之治水於吳則通渠三江五湖其來久矣六朝都建康凡三吳船避京江之險自雲陽西城鑿運瀆徑至都下隋平陳廢雲陽二瀆大業末穿河西京江至餘杭八百餘里面濶十丈擬通龍舟以偹東遊之役自是始復禹通渠故道唐世因之白居易詩平河七百里謂此河也堂亭衛公堂在府治之後蕭間堂在鐵甕門西接茅山洞中有丨丨居顧况詩蕭間隱洞房相公堂蘇京宰丹陽奉其父頌至邑遇誕日築堂為夀後人因名之向吳亭在府治陸龜蒙詩秋來懶上丨丨丨王介甫寄刁景純詩遙約丨丨丨下路寶墨亭蘇子美詩云山隂不見換鵝經京口今傳瘞鶴銘瀟灑集仙來見記風流太守為開亭樓觀望海樓在府治昔蔡君謨經此題曰丨丨丨城中最髙處旁視甘露金山如屏障中畫出信江南之絶致也後改曰連滄觀米元章和孫少述潤州丨丨丨詩雲間鐡甕近青天縹眇飛樓百尺連三峽江聲流筆下六朝山影落樽前幾畨畫角催紅日無事滄洲起白煙忽憶賞心何處在春風秋月兩茫然北固樓輿地志在北固山上天色晴明望見廣陵城如青霄中鳥道相去五十里李白詩丹陽北固是吳關晝出樓臺雲水間千巖烽火連滄海兩岸旌旗繞碧山僧仲殊詩海門礙日山雙聳江北迎人樹幾行范希文詩北固髙樓海氣寒使君曾此憑欄干春山雨後青無數借與淮南子細看多景樓在甘露寺曽子固詩欲收嘉景此樓中倚徙欄干四望通雲亂水光浮紫翠天含山氣入青紅一川鍾唄淮南月萬里帆檣海外風老去衣襟塵土在祗將心目羡冥鴻劉改之詩壯觀東南二百州景於多處最多愁江流千古英雄淚山掩諸公富貴羞北固秪今唯有酒中原在望莫登樓西風戰艦成何事只送年年使客舟又詩金山焦山相對起挹盡東流大江水一樓坐斷天中央收拾淮南數千里米元章題丨丨丨呈太守裴如晦學士六代蕭蕭木葉稀樓髙北固落殘暉兩州城郭青煙起千里江山白鷺飛海近雲濤驚夜夢天低月露濕秋衣使君豈負時平樂長倒金鍾盡興歸得江樓盤州洪景伯為之記喜雨樓在城內規模宏壯占一郡勝處頗有登覽之快城樓劉長卿和顔使君登潤州丨丨山城迢遞敞髙樓露冕吹鐃居上頭春草連天隨北望夕陽浮水共東流江田漠漠全吳地野樹蒼蒼故蔣州王粲曽為南郡客别來無處更銷憂萬嵗樓皇甫冉同客登樓詩髙樓直上思依依極浦遙山合翠微江客不堪頻北望塞鴻何事獨南飛維掦古渡寒煙積瓜步空洲逺樹稀聞道王師猶轉戰誰能談笑解重圍東軒在甘露寺周繇詩每日憐晴眺間吟只自娛山從平地有水到逺天無老樹多封楚輕煙暗染吳雖居此廊下入戶亦踟蹰北軒在甘露寺杜牧寄題曽上蓬萊宫裏行丨丨欄檻最留情孤髙堪弄桓伊笛縹眇宜聞子晉笙天接海門秋水色煙籠鹿苑暮鍾聲他年會著荷衣去不向山僧道姓名周繇詩曉色宜間望山風逺益清白雲連晉閣碧樹盡蕪城水靜沙䀶出煙銷火野平最堪佳此境為我長詩情月觀在譙樓西晉為萬嵗樓唐孟浩然有詩汪彥章記云京口以江山名天下其來尚矣而為國屏蔽尤重於齊梁晉宋之間觀其千嶂所環中橫巨浸風濤日夜駕百川而東之其形勢之雄實足以控制南北豈直為騷人羈客區區登覽之勝哉州治之西有樓焉並城而出名曰千秋者考諸圖志始於晉王恭之時繇樓西南循城百餘步忽飛簷曲檻崒然起於城隅之上望數百里見之者月觀也紹興八年吳興劉岑季髙來刺是州承廢亂之後公私掃地無復故時季髙以精明強敏之才易民觀瞻於談笑之頃既府寺閭井鳩集經營悉從其初始遑暇於遊息之地乃即丨丨之址輯而新之客有登而歎曰嗚呼壯哉未之見也前此頽甍圯棟蕪沒於蒼煙灌莾之中雖江山不與時變遷者亦莫吾覿今晨霏夕靄晴嵐煙翠復得於几席之上而風帆浪舶離鴻落鶩畢陳於樽爼之前如客得歸如蒙得發也季髙於此可謂能矣非政有餘力能至是哉或曰是未足以言季髙之政也季髙勞於侍從之事出分天子顧憂方時艱難此州實為襟要其經理規摹必有足大者嘗與豫四顧而望其東曰海門鴟夷子皮之所從逰也其西曰瓜步魏佛貍之所嘗至也若其北廣陵則謝太傳之所築埭而居於江之中流則祖豫州之所擊楫而誓也計其一時英雄懷抱憤中原之未復反虜之未禽欲吞之以忠義之氣雖狹宇宙而隘九州固其胸中之所積亦江山有以發之今攬而納諸數楹之地使千載之事了然在吾目中則季髙之志可知矣然自有天地則有山川其閲人多矣而山川勝處非人不傳襄陽峴首以羊叔子傳武昌南樓以庾元規傳蜀之籌畢驛以諸葛武侯傳吾知月觀與季髙之名籍籍天下矣姑書其本末以補京口故事之遺使後人知此觀復新自吾季髙始豈不可喜季髙曰可哉連滄觀楊廷秀題丨丨丨呈太守張幾仲詩云開窗納盡大江秋天半飛樓不是樓獨立南徐鰲絶頂下臨北顧虎回頭蒜山舊址空黃鶴瓜步新城照白鷗好事主人酌詩客風煙一眼到揚州臺榭妙髙臺在金山楊廷秀丨丨丨詩金山未到時羡渠奄有萬里之長江金山既到了長江不見只見千步廊老夫平生不耐事點檢風光難可意老僧覺我見睫眉引入妙髙臺上嬉不知老僧有妙手卷舒江山在懷袖挂上西窗萬丈間長江浮在爐煙端長江南邉千萬山一時飛入兩眼寒最愛簷前絶竒處江心巉然景純墓僧言道許乃浪傳龍宫特書珠貝篇初云謝靈運愛山如愛命掇取天台鴈蕩怪石頭疊作假山立中流又云王逸少草聖入神妙天賜琉璃筆格玉硯屏仍將大江作陶泓老僧聞二説沉吟未能決長年扺死催上船徘徊欲去空茫然橋梁清風橋在府南范希文建子瞻詩傷心范橋水漾漾舞寒藻千秋橋在府治西晉王恭作萬嵗樓於城上其下有橋故以千秋名寺院甘露寺在城東角土山上臨大江李德裕建時甘露降因名焉沈存中詩丞相髙齋半草萊舊冇風月滿亭臺地從日月生時見天到江山盡處回三國是非春夢斷六朝城闕野花開心隨潮水漫漫去流遍煙村半日來蘇子瞻逰丨丨丨有二客相過遂與偕行寺有石如羊相傳謂之狠石云諸葛孔明坐其上與孫仲謀論曹公也大鑊二按銘梁武帝所鑄畫獅子一菩薩二陸探微筆衛公所留祠堂在寺手植柏合抱矣近寺僧發古殿基得舍利七粒并石記乃衛公為穆宗造福所葬也詩云古郡山為城層梯轉朱欄樓臺斷崖上地窄天水寬一覽吞數州山長江漫漫却望大明寺惟見煙中竿狠石卧庭下穹窿如伏羱緬懷卧龍公挾策事雕鑽一談收猘子再説走老瞞名髙有餘想事往無留觀蕭公古鐡鑊相對空團團坡陀受百斛積雨生微瀾泗水逸周鼎渭城辭漢盤山川失故態怪此能獨完僧繇六合人霓衣挂氷紈隱見十二疊觀者疑夸謾破板陸生畫青猊戲盤跚上有二天人揮手如翔鵉筆墨雖欲盡典刑垂不刋赫赫贊皇公英姿凜以寒古柏手親種挺然誰敢干枝撑雲峯裂根入石窟蟠剃草得斷碑斬崖出金棺瘞藏豈不牢見伏理可歎四雄皆龍虎遺迹儼未刓方其盛壯時爭奪肯少安廢興屬造化遷逝誰控摶况彼妄庸子而欲事所難古今共一軌後世徒辛酸聊興廣武歎不待雍門彈盧肇詩云北固巖端寺佳名自上台地從京口斷山到海門回曙色煙中滅潮聲日下來一隅通雉堞千仞聳樓臺林暗疑降虎江空想度杯福庭增氣象仙磬落昭回覺路花非染流年景謾催隋宫凋緑草晉室散黃埃西蜀波湍盡東溟日月開如登最髙處應得見蓬萊周繇詩盤江上幾層峭壁半垂藤殿瑣南朝像龕禪外國僧海濤摏砌檻山雨灑窗燈日暮踈鍾起聲聲徹廣陵金山寺在金山上屹立江中真宗夢逰此寺後改名龍遊庚溪詩話載孝宗詩曰崒然天立鎮中流雄跨東南二百州敵騎每臨須破膽何勞平地戰貔貅有堂曰雄跨蓋取聖製中語張祐詩一宿金山頂微茫水國分僧歸夜船月龍出曉堂雲樹影中流見鍾聲兩岸聞因悲在朝市終日醉醺醺孫魴詩萬古波心寺金山名日新天多剩得月地少不生塵櫓過妨僧夢濤驚濺佛身誰言張處士題後更無人楊公濟陪潤州裴如晦學士逰金山回作世上蓬萊第幾洲長雲漠漠鳥飛愁海山亂點當軒出江水中分繞檻流天逺樓臺橫北固夜深燈火見揚州回船却望金陵月獨倚牙旗坐浪頭王介甫詩天末海雲橫北固煙中莎岸似西興已無船舫猶聞笛逺有樓臺秪見燈山月入松金破碎江風吹水雪崩騰飄然欲作乘桴計一到扶桑恨未能又詩北楫南檣泊四埀共憐金碧爛參差孤髙萬丈滄波底除却蛟龍世不知曽子固詩塵外岧嶤鷲嶺宫架虛排險出青紅林光巧轉滄波上海色遙涵白日東夜靜神龍聽呪食秋涼蒼鶻起摶風連荆控蜀長江水盡在回廊顧聁中羅隱詩老僧齋罷關門睡不管波濤四靣生又題僧院根盤蛟蜃路藤蘿四靣無塵輟棹過得似吾師始惆悵眼前終日有風波蘇儀甫詩僧依玉鑑光中住人踏金鰲背上行蘇子瞻遊金山寺詩長江欲盡開無邉金山當中惟一石潮平風靜自浮海縹眇樓臺轉金碧瓜洲初見石頭城城下波瀾與海平山中轉拖疑無岸泊舟未定僧先迎山中岑寂恐未足復將江水繞山麓四無鄰家羣動息鍾聲鏗鍠答山谷鳥鷹力薄墮中路惟有胡鷹石上宿誰知江海多行舟遊人上下集巖幽老僧心定身不定送往迎來何足竟朝遊未厭夜未歸愛山往往如今稀不待遊人盡歸去恐君未識山中趣郭功父金山行金山杳在滄溟中雪崖氷柱浮仙宫乾坤扶持自今古日月髣佛躔西東我泛靈槎出塵世搜索異境窺神工一朝登臨重太息四時想像何其雄捲簾夜閣挂北斗大鯨驚浪吹長空舟摧岸斷豈足數往往霹靂鎚蛟龍寒蟾八月蕩瑶海秋光上下磨青銅鳥飛不盡暮天碧漁歌匆斷蘆花風蓬萊久聞未成往壯觀絶致遙應同潮生潮落夜還曉物與數會誰能窮百年形影浪自苦便欲此地安微躬白雲南來入我望又起歸興隨征鴻蘇子