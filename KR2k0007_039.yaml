body:
  text: 方輿勝覽卷三十九宋祝穆撰鬱林州南流博白興業建置沿革古南越地前漢志為牛女分野唐志属翼軫秦置桂林郡漢改鬱林郡王莾改曰鬱平郡梁置定州又改為南定州隋改為尹州煬帝改鬱州尋改鬱林郎唐初曰尹州太宗改貴州尋析貴州置鬱州又改鬱林郡尋復為鬱林州皇朝因之今領縣三治南流事要郡名鬱林西甌郡國志永嘉為丨東甌鬱林為丨風俗俗反淳古蔡絛叢話嶺右僻且陋而博白又甚焉惟其僻陋之甚故云云且多長年博白城下有新柯吾曳杖其間至一村舍有兩老人坐飲乃兄弟也大者年九十四謂客曰此吾㓜弟纔七十八矣從旁環拱而侍之皆兩老人之曾孫是殆可入畫圖也力田務本修學記鬱林古郡居嶺海之間其民不誘扵末知孝弟云云而已好學者多倦㳺録鬱林風土比諸郡為盛良才秀民云云啜糟摶飯寰宇記夷人居山谷食用手摶酒名都林合糟共飲刻木契焉椎髻散髪古黨洞夷人女以烏色相間為裙用緋㸃綴裳下男丨丨女丨丨徒跣吹笙巢居夜泊形勝鬰林古郡見後劉敞送楊侯序居三州之境郡志鬱林為郡已併唐牢黨白三州之境前引長江政績堂記云云北背原阜形洩勢坦無嵐露烟瘴土産鱷魚狀如龜齒如鋸食人猩猩封溪有丨丨似黄狗人面善言音如女人㯽榔木樹如棕櫚高七八丈無枝柯籜堪為扇與蛤灰同食令人齒黒故有雕題黑齒之俗椰子木樹似㯽榔實大如𤓰堪為飲器文選曰㯽榔無枝椰葉無隂桄榔木似棕櫚心中出麵人面木春花夏實秋熟兩邉似人面山川寒山九域志南越尉佗遣人入山採橘七日方囘問其故云山中大寒不得歸故名大龍山在南流縣以形得名飛雲山在博白縣石上有巨人跡宴石山在博白縣西六十里其山皆盤石壁立峭絶北臨大江中有流泉萬石山在興業縣西南鬼門山郡國志在牢州界語云若度鬼門闗十去九不還言多瘴也隱仙巖在南流縣西一里有石室幽邃緑秀嶺在博白縣林泉秀絶因名丨丨丨大江源出容州入縣界羅望江在南流縣定川水在故牢州定川縣井泉濯纓泉即城南江邉石井堂亭尋山堂在博白縣劉子羽謫白州時所作賞心亭郡守王過有詩古跡越王船郡國志馬援造銅船濟海後令沉扵渚天晴水澄徃徃望見緑珠井太平廣記在白州雙角山下昔梁氏之女有容貎石季倫為交趾採訪使以真珠三斛買之梁氏之居舊井存焉汲飲者必誕美女里閭以美女無益遂以石填之黄魯直詩欲買娉婷供煮茗我無一斛明月珠用此事也祠廟伏波廟在鬼門山之隈司馬君實詩漢令班南海蠻兵避鬱林天涯分柱界徼外貢輸金坐失姦臣意誰名報國心一棺忠勇骨漂泊瘴烟深名宦谷永後漢南蠻傳永守鬱林以恩信招降烏滸人十餘萬内附皆受冠帯陸績唐陸龜䝉傳其逺祖績仕吴守鬱林歸裝舟輕不可越海取石為重人稱其亷號鬱林石皇朝楊侯劉父送楊鬱林序鬱林古郡也太守尊官也其任不輕矣然而當拜者輙以炎瘴霧露為解天子以謂此皆全軀保妻子之臣無憂國之風皆置不用而詔丞相擇刺史之賢者使舉竒偉倜儻之士以充其選扵是大人部荆州詔書先至則以楊侯聞天子可焉遂自郡從事遷廷尉丞假五品服以行賜錢十萬衆皆榮之然楊侯既受命退而治裝泛然不以為喜聞嶺海之說風土之異漠然不以為憂如它日焉人皆曰楊侯矯亢人也嗚呼前世之所以能治也為官擇人後世之所以不治也為人擇官彼庸庸之臣志得意滿生而養交以饕富貴真若長者一旦有境外之事憂畏首䑕堅以死辟若常庸之夫不可使徃春秋貶焉若無君子何以矯也吾以楊侯矯世之君子春秋之徒歟推此心也雖在嶺海之外而加千乘之國其有難治㢤于其行序以贈之名賢劉子羽紹興安置白州初子羽参宣幕吴玠統制軍馬頗相厚善後子羽坐事安置玠憐其母老力觧扵朝至納節請贖上高其義釋子羽且降詔奨諭題詠今到鬼門闗沈佺期入鬼門闗詩昔傳瘴江路云云土地無人老流落㡬客還訟訴榕庭空王履道和鬱林守詩宦逰梅嶺林云云波濤初過鬱林州張籍崑崙兒詩崑崙家住海中州蠻客將來漢地逰言語觧通秦吉了云云越裳濟海喜天晴陶弼寄郡守姚道源詩云云五葉戈船不渡兵堯舜逺夷皆樂國漢唐諸將半書生桂門闗在鬱林西始呼為鬼門闗近曺載作文辯之云寄語徃來荆楚客云云四六桂林遐陬鬱林古郡地雖僻陋民乃樸淳境包三郡之封郡雜羣蠻之俗漢賢守之分符是為古郡唐詩人之題句乃謂惡鄉序稽邍父豈辭炎嶺之鬱蒸詩誦初寮頗謂訟庭之清簡横州寧浦永定建置沿革古百越之地牽牛婺女之分野趙佗王越地亦屬之漢平南越置合浦郡合州即漢合浦郡之髙凉縣地今在高州界吴孫休分立合浦北部晉改立靜浦郡梁分立簡陽郡隋于寧浦置簡州又改為縁州煬帝廢寧浦縣屬鬱林郡唐以鬱林郡之寧浦樂山縣置簡州改南簡州又改曰横州改寧浦郡復為横州國朝因之今領縣二治寧浦事要郡名寧浦横槎寰宇記横州號横槎風俗地隘民瘠圖經俗惟種田同上形勝南瀕海徼同上云云西接徭洞東聯懷澤守章鎬貢院上梁文云云西接欽江實二州車馬之衝拒邕為鄰易祓記云云實犬牙相制之地三梁故縣寰宇記云云烏滸所巢山川東山在寧浦縣南三十里寳華山在寧浦縣南二十里山頂甞冇寳氣徐安國詩秀出城南號寳華翠微深處衲僧家百年臺殿歸煨燼一逕蒼苔落晚花古鉢山在寧浦縣西十里下有廟徐安國詩羣嶺中推逶古鉢尊山川羅列掌中存亭臺突兀聖婆廟邱垤迤山子村秀林山在寧浦縣十里山林秀鬱因名鬱江在寧浦縣清江在寧浦縣東十五里井泉古辣泉在桂海虞衡志云古辣乃實横間墟名以墟中泉釀酒既熟不煮但埋之地中日足取出色淺紅味甘可致逺雖行烈日中不至壞南州珍之樓亭望雲樓在郡治横浦樓在城上僊槎亭在登高嶺橋梁海棠橋梁該撰懷古亭記橋附城郭抱林麓大江横騖澗流屈折政爾幽趣故老云此橋之南北舊皆海棠有書生祝其姓者家焉少㳺甞醉宿其家明日題一詞而去所謂醉鄉廣大人間小是也祠廟慈感廟舊經唐貞觀中婦人陳氏居朝京門外有鬻魚者忽見白衣人謂陳曰魚不可食既市可擲扵水急上山頂避之陳如其言比至山巔囘望所居皆陷而為池矣陳既殁即山頂立祠徐安國詩有時風雨連村暗夜半龍逰古鉢歸名宦杜正倫夲傳由中書令出為横州刺史名賢皇朝秦觀字少㳺甞居横州有寧浦書懷詩云揮汗讀書不已人皆怪我何求我豈更求聞逹日長聊以消憂題詠一灣江抱海槎浮徐安國横浦詩萬疊山圍城堞古云云盡日江山對雙目賈成之横浦樓詩横槎三月江如練風浪縈䊸接天緑郡樓新剏挿雲飛云云四六疏綍掖垣分符寧浦維桂林之廣郡有寧浦之小邦昔為烏滸之故巢今乃虎符之重寄榮分符竹實為杜中令之舊邦試訪海棠猶誦秦淮海之佳句地僻民貧郡雖居扵遐嶠山圍江抱景如在扵仙槎邕州宣化武縁建置沿革禹貢九州之外揚州之南境天文星紀牽牛之次古越地秦併南越為桂林縣地漢平南越改為鬱林郡之領方郡也東漢因之晉分鬱林置晉興郡宋齊因之隋廢晉興為縣属簡州後又属鬱林郡唐置南晉州太守改為邕州以州近邕溪故名後以廣桂容邕安南五府皆隷廣府謂之五府節度名嶺南五管後改永寧郡復為邕州又置建武軍節度皇朝更晉興為樂昌今為邕州建武軍節度管溪洞羈縻州十三仍兼安撫都監領縣二治宣化事要郡名邕管建武樂昌風俗椎髻箕踞隋志人性輕悍而云云乃其舊風鼻飲之俗王介甫諭交趾文畧曰爾民頭飛我有車馬爾民丨丨我有酒食用華爾丨丨也爾民斷髪我有衣冠爾民鳥語我有詩書用教爾之禮也煌煌炎洲烟蒸霧煮我飛堯雲洒爾甘雨湯湯瘴海雲燒日鎔我張舜琴扇為薫風形勝唐為西道唐大詔令咸通三年分嶺南為東西道廣州為東道邕州為西道又為都督府三十六洞郡志先是兩江州洞各執山獠古銅印至治平四年凖朝廷給賜銅印左江十八面右江十八面今所謂三十六洞者此也繼此又降印識固不止此夢蛇示城址皇祐築城隨築輙壞役者苦之夜夢有蛇環地而行若示其址遂即其地而築焉號為大府雄州圖經皇祐丁寳臣新城記嶺南東西二部四十五州惟有桂邕丨丨丨丨雲南頭楚分尾杜光復風土歌云所莅最廣李大異書横山買馬圖云度嶺而西為州二十有五而道里延袤與蠻錯居有永平横山二寨永平通交趾暨于海外横山通自杞羅殿諸蠻控連巴蜀土産象出交趾山谷惟雄者有兩牙以鼻為用一軀之力皆在鼻將行先以鼻柱地乃移足知其足力劣于鼻也安南出象䖏曰象山嵗一捕之縛欄道旁中為大穽以雌象前行為媒遺甘蔗扵地傳藥蔗上雄象來食蔗漸引入欄閉其中就穽中教習馴擾之始甚咆哮穽深不可出收者以言語喻之久則漸觧人意不馴則告之云當為爾引雌來即聽山猪即豪猪身有棘刺能振彂以禦人二三百為羣以害苗稼蠻犬如獵狗警而猘諸丨率携一丨自防盗莫敢近孔雀生溪洞高山喬木之上而下溚沙上雄者尾長數尺生三年尾成長金碧晃耀時時自奮盡張其尾圎如錦輪俗謂之朝其朝無時秦吉了似鸜鵒鸚鵡能言倒挂緑毛常丨丨于樹枝翡翠人採其羽錦雞能吐錦久復収入山川武號山在州南二十里高五十丈馬退之在州西詳見栁宗元茅亭記羅秀山在州西昔有羅秀隱扵此後昇仙崑崙山在宣化縣東九十二里崑崙闗在焉鏌鎁山在武縁縣南三十二里山形盤薄地勢險隘鏌鎁闗在焉横山其山横截江河置横山寨扵此為市馬之地中興小厯紹興初五路既陷馬極難得韓肖胄建議宜即邕州置市馬塲取馬嶺表以資國用朝野雜記廣馬者建炎末廣西提舉峒丁李域始請市戰馬赴行在紹興初𨽻經畧司三年春即邕州置司提舉市于羅殿自杞大理諸蠻未㡬廢市馬司以帥臣領其事七年待制胡舜陟為帥嵗中市馬四千二百疋詔賞之其後馬益精嵗費黄金五鎰中金二百五十鎰錦四百端佗帛千疋㢘州鹽二百萬斤而得馬千五百疋必四尺二寸以上乃市之其直為銀四十両毎高一寸増銀十兩有至六七十兩者土人云其尤駔駿者在其出處或博黄金二百兩日行四百里但官價有定數不能致此耳然自杞諸蕃本自無馬又市之南詔南詔大理國也去自杞國可二十程而自杞至邕州横山寨二十二程横山寨至靜江府又二十餘程羅殿國又逺于自杞十程宜州溪洞廵檢常恭者赴闕持南丹州莫延甚表來乞就宜州市馬比之横山可省三十餘程張說在樞筦以其表聞李夀翁時為檢詳文字為說言邕逺宜近人孰不知前迃其塗亦豈無意况今黄氏方横乃欲為之除道而擅以互市之饒誤矣小吏妄作將啟邉釁請論如法說不聽命從義郎李宗彦以提㸃綱馬驛程徃宜州措置既而說罷政宻院乃奏宗彦所言邉防不便罷之時淳熙元年也又諸蕃多以馬易錦盖蠻人死即以一錦纒繞親友賻者亦以錦貴人至纒十數疋故須錦為急望仙坡在州東與羅秀山相對故名丨丨丨皇祐間狄青余靖孫沔平儂賊營扵上後郡守陶弼因而建堂左江出源州界至合江鎮與右江水合為一水流入横州號鬱水卜丨道隷太平永平寨右江道隷横江寨各管覊縻州右江源出峩利州界虞衡志丨丨水與大理大槃水通大槃在大理之威楚州而特磨道又與甚善闡府相應自邕道諸蠻至大理四五程北梗自杞南梗特磨故久不得至陶弼右江詩云昔年觀地志此水出牂牁邕溪源出欽州鬱水輿地廣記即夜郎溪水與温水合又與歡水合亦名駱越水郡縣志云在城西北兩江合處源出蠻地堂亭清風堂在郡志茅亭在馬退山栁宗元作邕州栁中丞丨丨記冬十月作新亭于馬退山之陽因高山之阻以面勢無欂櫨節梲之華不斵椽不剪茨不列墻以白雲為藩籬碧山為屏風昭其儉也是山崒然起于莾蒼之中馳奔雲矗亘數十百里尾蟠荒陬首注大溪諸山來朝勢若星拱蒼翠詭狀綺綰繡錯盖天鍾秀于是不限于遐裔也然以壤接荒服俗參夷徼周王之馬跡不至謝公之屐齒不及巖徑蕭條登探者以為嘆嵗在辛夘我仲兄以方牧之命試于是邦夫其徳及故信孚信孚故人和人和故政多暇由是常徘徊此山以寄勝槩廼塈廼塗作我攸宇不崇朝而木工告成每風止雨收烟霞澄鮮輙角巾鹿裘率昆弟友生冠者五六人歩山椒而登焉于是手揮絲桐目送還雲西山爽氣在我襟袖以極萬類攬不盈掌夫美不自美因人而彰蘭亭也不遭右軍則清湍修竹蕪沒扵空山矣是亭也僻介閩嶺佳境罕到不書所作使盛跡鬱湮是貽林澗之媿故志三公亭在望仙坡上陶弼詩異日誰相繼来書第四名謂狄青余靖孫沔三公也古跡銅鼓此古蠻人所用左右溪峒時得之相傳為馬伏波所製其形如坐墪而空其下滿腹皆細花紋極工緻四角有小蟾蜍兩人舁行拊之聲似鞞鼓銅柱漢伏波將軍馬援征蠻立柱界上又唐馬緫為安南都䕶獠夷安之建二丨丨扵漢故處鑱著唐徳以明伏波之裔故今左右江各有其一又其一在欽州蠻界其刻云丨丨折交人滅至今交人来徃累碎石于下不絶吕伯恭作銘曰溪獦洞䝤惕息奉詔約梏牛閑馬不敢飲啖漢芻水名宦馬援字文淵交趾女子徴側反拜援伏波將軍南擊交趾軍至浪泊上虜未滅之時下潦上霧毒氣薫蒸仰視飛鳶跕跕堕水中卧念少㳺平生時語何可得也今賴士大夫之力䝉被大恩且喜且慙吏士皆伏李翺文集載正元中翺守邕大首領黄氏帥其屬納質供賦黄氏儂氏皆群盗也韋氏不附率羣黄之兵以攻之而逐諸海黄氏既至羣盗皆伏于是十三部二十九州之蠻悉平皇朝狄青東軒筆録狄青之征儂智高也自過桂林即以辨色時先鋒行先鋒既行青乃出帳受衙罷命諸將坐飲酒一巵小餐然後中軍行率以為常及頓軍崑崙闗下翊日將度闗辰起諸將張立甚久而青尚未坐殆至日高親吏疑之遽入帳周視則不知青所在諸將方相頋驚怛俄有軍侯至曰宣徽傳語諸官請過闗喫食方知青已微服同先鋒度闗矣言行録青入邕州獲尸有衣金龍之衣者或言智高已死亂兵中當亟作奏者公曰安知其非詐寧失智高不敢欺朝廷也郡志時智高再犯邕或以告襄公賊必送死何者膿䖏邕而潰勢不可久也已而果然余靖為廣西經畧同狄青經制廣西盗賊作平蠻碑曰蠢兹狂㓂起乎徼外卒陷邕郛乘流東邁天生狄公仗節臨戎英材鱗集猛將風從賊之敢鬬實惟天誘僭補偽署叢然授首厥惟邕邉南國之紀九洞襟帯列城唇齒我公之來電掃雲開天聲逺揚繄公之材陶弼治平間以崇儀使知邕州撫定儂賊有功孔宗旦為司户逆料智高必反守陳珙不聽及城陷宗旦死扵賊蘇緘以右騏驥使知邕州儂賊攻城以戰而死今賜廟焉人物石鑑邕州人舉進士儂智高攻廣州不下還據邕州鑑與余靖言若使智高盡得邕州三十六洞之兵其為中國慮未可量鑑請說諭諸洞酋長使之不附智高靖遣鑑說諸洞酋長皆聽命惟結洞酋長黄守陵强暴智高深與相結鑑說守陵智高父子貪詐不可不為之備守陵由是稍疎智高智高怒遣兵襲之守陵先為之備逆戰破之遂不敢入結洞而奔逃于特磨名賢韓愈有論黄家賊事宜狀以為宜招討栁宗元有代裴中丞論黄家賊事宜狀題詠山川禹貢外唐子西詩云云城郭漢兵餘分野窮禹畫劉禹錫送張苕赴邕幕詩云云人煙過虞循不言此行逺所樂相知新恩浹黄儂族陶弼横山詩云云師還左右溪象隈銅柱卧成痕沈彬詩龍約海船行有氣云云路指鬼門幽且夐韓愈贈張十一詩云念君又署南荒吏云云五十溪州六萬丁陶弼詩南極諸蠻傲典刑斗間時復見飛星君王仁恕將軍老云云四六地標銅柱郡固金城俗陋而荒民驕以悍眷駱川之地重距螭陛之天遥地控龍編之逺嵗通駿骨之竒維兹建武之封越在嶠南之外矧一疊際窮荒之逺乃羣蠻來互市之衝自韓及栁備言討㓂之宜惟狄與余尤壯平蠻之䇿朱旛皂盖來分竹使之左符碧山白雲尚訪茅亭之佳致布揚威徳逺踰銅柱之封寧輯疆陲並壯金城之勢虎符出守盖總五千衆之屯馬政攸闗要謹十二閑之别互市散集闗馬政之重輕兵籍盈虚係蠻徭之畏侮亷州合浦石康建置沿革古越地牽牛婺女之分野秦属象郡漢置合浦郡即今州治也吴時改珠官郡復改合浦郡宋置越州隋煬帝改為禄州又改為合州又廢為合浦郡唐又為越州又置珠池縣改為㢘州皇朝移州治于長沙場開寳廢㢘州于海門鎮浦置太平州後又為㢘州今領縣二治合事要郡名合浦風俗青草黄茅瘴元和志自瘴江至此瘴癘尤甚中之者多死舉體如墨春秋雨時彌甚春謂青草瘴秋謂黄茅瘴馬援所謂仰視烏鳶跕跕墮水中即此也土人諳則不為病土少耕稼郡志形勝因洞為名元和志地冇大㢘洞故元徳五年置大㢘縣今縣雖廢而州名則以大㢘洞故名耳鑿山為城門宋陳伯紹為刺史云云以威服蠻獠距海二百里自州西南至㢘江入海處約二百里海口有梁徳鎮亦是徃来安南水路土産珠郡國志合浦縣海曲出珠號曰珠池唐貞觀五年置珠池縣嶺外代答云合浦産珠之地名曰斷望池去岸數十里蜑人沒而得蚌剖珠蜑家自云海中珠池若城郭然其中光怪不可向邇常有怪物護持蔡絛叢談云合浦珠池大抵皆居海中珠母者蚌也採珠必蜑丁皆居海艇中採珠以大舶環池以石懸大絙别以小䋲繫諸蜑腰沒水取珠氣廹則撼䋲䋲動舶人覺廼絞取人縁大絙上紹興二十六年詔㢘州嵗貢珠取之或傷人命自今可罷貢龍眼蘇子瞻丨丨詩云異哉南海濵珠樹羅𤣥圃纍纍似桃李一一流膏乳坐疑星隕空又恐珠還浦圖經未甞說玉食逺莫數獨喜皺皮生弄色映琱爼蠻荒非汝辱幸免妃子汚山川畫山在古縣北五十里其山百卉明艷如然狼頭山在合浦縣㢘江在州界又名合浦江鴈湖在古㢘州二百歩鴈所罕至故名明月溪合浦北八十里亭榭還珠亭陶弼有詩合浦還珠舊有亭使君方似古人清沙中蚌蛤胎常滿潭底蛟龍睡不驚海角亭見欽州天涯亭注名宦孟甞後漢循吏傳云甞遷合浦太守郡不産穀實而海出珠寶與交趾比境常通商販貨糴糧食先時宰守並多貪穢詭人採求不知紀極珠遂漸徙于交趾界甞到官革易前弊求民利病曽未踰嵗去珠復還百姓皆反其業商貨流通稱為神明名賢皇朝蘇軾紹聖初御史論軾貶昌化軍徽廟移㢘州陳瓘論蔡卞又詆曾布貶袁移㢘曾布坐薦趙諗及棄湟州地謫㢘州題詠荒凉海南北蘇子瞻宿興㢘村凈行院詩云云佛舍如雞栖忽落榕林中跨空飛拱枅當門冽碧井洗我兩足泥髙堂磨新塼洞戸分角圭倒床便酣寢鼻息如虹霓僮僕不肯去我為半日稽示我海濵石陶弼詠海石史君合浦來云云千巖秀掌上大者不盈尺四六拜寵玊宸分符珠浦已著還珠之瑞即歸鳴玊之班地不宜于稼寶海特富于驪珠孟太守之聲名與此邦而不朽蕭長公之氣節尚故老之能言㢘操冰清與郡名而相稱寛恩春播至海物而亦豐方輿勝覽卷三十九
