body:
  text: 方輿勝覽卷五十七宋祝穆撰䕫州路䕫州奉節雲安巫山建置沿革禹貢荆梁二州之域當翼軫之分野鶉首之次周初為魚復國春秋庸國之魚邑其後楚人秦人巴人滅庸分其地屬於巴秦置巴郡魚復𨽻焉二漢因之公孫述據蜀土自稱白帝更魚復曰白帝城東漢獻帝分巴郡為永寧郡劉璋又改為巴東郡蜀先主改為永安縣又於此置固陵郡蜀先主改固陵郡為巴東郡為蜀重鎮晉仍為魚復宋置二巴校尉治白帝梁置信州治白帝城周移治永安宮南即瀼西也總管王述移府於白帝隋楊素又復修之煬帝罷為巴東郡唐為信州改為䕫州又為雲安郡復為䕫州蜀主以施䕫忠萬置鎮江軍治䕫州後唐改寧江軍節度皇朝平蜀後徙治瀼西中興升為帥帶歸峽州兵甲司公事今統郡十五領縣三治奉節本路安撫轉運置司事要郡名䕫門固陵漢初平間分巴為三以胊䏰至魚復為丨丨郡三巴杜巴東歌注云劉璋分丨丨有中巴巴西巴東魚復巴東之屬也丨丨記閬白二水東南流三曲如巴字故曰三巴風俗其人豪李貽孫都督府記云丨丨丨其俗信鬼其稅易征其民不偷人多徑勇巴志郡與楚接云云少文學有將帥材雪不到地宋肇詩序䕫地暖云云惟山高處白燒地而耕杜詩注峽上磽確暖氣既達故民云云謂之火耕未嘗苦饑范至能勞禽耕序峽民平生不識粳稻而云云踏磧而逰圖經䕫人重諸葛武侯以人日傾城出逰八陳磧上謂之踏磧婦人拾小石之可穿者貫以綵索繫於叉頭以為一嵗之祥府帥宴於磧上王梅溪詩今日為人日傾城出江皋遨頭老病守呼賓酌春醪好遨蜀風俗䕫人貧亦遨陸務觀詩鬼門關外逢人日踏歌千家萬家出使女負薪杜甫作負薪行云䕫州處女髮半華四十五十無夫家更遭喪亂嫁不售一生抱恨長咨嗟土風坐男使女立應當門户女出入十猶八九負薪歸賣薪得錢應供給至老雙鬟只垂頸野花山葉銀叉並筋力登危集市門死生射利兼鹽井面粧首飾帶啼痕地褊衣寒困石根若道巫山女粗醜何得此有昭君村形勝據三峽之上寰宇記云郡城臨江而云云據荆楚上游歐陽穎引水記䕫州控二川限五溪云云為巴蜀要郡據三州要津趙奭之鈐轄㕔記瞿唐云云居瞿唐上游丁公言䕫州移城記云云即白帝舊址當全蜀之口董鉞制勝樓序䕫為一路丨左右丨丨丨丨堅完兩川丁公言記巴中郡多崖居岸泊登危履險以扼束要道蓋云云間隔三楚也咽喉巴峽丁公言記慿高控深云云介于巴楚徐粹中學記䕫之為州云云荆蜀之衝張天覺制勝樓序丨丨往來丨丨渝瀘施黔疆場之制鎮以灧澦報恩寺佛牙樓記䕫當全蜀衆水所㑹云云扼以瞿唐水陸津要吳簡言作慕容公禦冦記當云云乃蜀之東門也非古䕫國史記楚世家服䖍注䕫在巫山之陽秭歸鄉是也土産橘荔蜀都賦户有丨丨之園注胊䏰魚復二縣出橘王梅溪與曺夢良書有荔而不及涪有柑而不及果山川白帝山元和志即州城所據與赤甲山相接初公孫述殿前井冇白龍出因號丨丨丨杜甫遷居䕫州詩伏枕雲安縣遷居白帝城春知催栁别江與放船清農事聞人說山光見鳥情禹功饒斷石且就土微平注云㳂峽皆因開鑿而成故少平土惟䕫州稍平耳又詩嵯峨白帝城東西南有龍湫北虎溪赤甲山元和志在城北三里上有孤城漢時常取巴人為赤甲軍蓋犀甲之色也寰宇記公孫述築不生樹木土石悉赤如人袒臂故曰赤甲與舊白帝城相連類要赤甲城即古魚復縣基白鹽山在城東十七里崖壁五十餘里其色炳耀狀若白鹽杜甫詩卓立羣峰外蟠根積水邊他皆任厚地爾獨近高天白榜千家邑清秋萬里船詞人取佳句刻畫竟誰傳卧龍山在奉節縣有諸葛武侯祠及寺觀有泉極清冷麝香山在城東百三十里杜詩水生魚復浦雲暖丨丨丨女觀山在巫山縣東北四里有石如人形相傳昔婦人夫官于蜀登山望夫因化為石十二峰在巫山曰望霞翠屏朝雲松巒集仙聚鶴净壇上升起雲飛鳳登龍聖泉其下即巫山神女廟琵琶峰在巫山對蜀江之南形如琵琶此鄉婦女皆曉音律巫峽在巫山縣之西水經云杜宇所鑿以通江水圖經云此山當抗峯岷峨偕嶺衡獄凝結翼附並出青雲謂之巫山有十二峰上有神女廟陽雲臺高一百二十丈三峽謂西峽巫峽歸峽盛宏之荆州記丨丨七百里中兩岸連山略無闕處重巖疊嶂隱天蔽日自非亭午及夜分不見日月至於夏水襄陵泝沿阻絶或王命急宣有時朝發白帝暮至江陵其間一千二百里雖乘奔馳風不為疾也春冬之間則素湍緑潭回波平迤絶巘多生柳柏懸崖瀑布飛灑其間清榮峻茂良多雅趣每晴初霜旦林寒澗肅有高猿長嘯屬引凄異空岫傳響故漁者歌曰巴東丨丨巫峽長猿鳴三聲淚沾裳梁簡文蜀道難詩峽山七百里巴水三回曲笛聲下復高猿嗚斷還續杜甫客居詩峽開四千里水合數百源人虎居相半相殘終兩存又歸詩林中才有地峽外絶無天南鄉峽在奉節縣西五千里荆州記峽西八十里冇巴鄉村善釀酒村傍有溪曰龍門多靈夀木瞿唐峽在州東一里舊名西陵峽丨丨乃三丨之門兩崖對峙中貫一江望之如門杜甫瞿唐兩崖詩三峽傳何處雙崖壯此門入天猶石色穿水忽雲根猱玃髯鬚古蛟龍窟宅尊羲和冬馭近愁畏日車翻白居易夜入丨丨丨詩瞿唐天下險夜上信難哉岸以雙屏合天如匹練開逆風驚浪起挂􅜺暗船來欲識愁多少高於灔澦堆又云瞿唐呀直㵼灔澦屹中峙未夜黑巖昏無風白浪起范至能詩不知灔澦在船底但覺瞿唐如鏡平劍閣翻成蜀道易請看范子瞿唐行鬼門關在奉節縣東北三十里范至能詩百年㑹須作鬼無事先穿丨丨百牢關辛毗曰䕫州丨丨丨兵馬不可越杜甫詩中巴之東巴東山江水開闢流其間白帝高為三峽鎮䕫州險遇丨丨丨然觀此詩則當在興元灔澦堆在州西南二百步瞿唐峽口蜀江之心水經注白帝城西有孤石冬出二十餘丈夏即沒名丨丨丨土人云灔澦大如象瞿唐不可上灔澦大如馬瞿唐不可下峽人以此為水候又曰舟子取途不决名曰猶豫杜甫詩巨石水中央江寒出水長沉牛答雲雨如馬戒舟航天意存傾覆神功接渺茫干戈連解纜行止憶垂堂又詩灔澦既沒孤根深西來水多愁太陰江天漠漠鳥飛去風雨時時龍一吟舟人漁子歌回首估客胡商淚滿襟寄語舟航惡年少休翻鹽井橫黃金張祜詩不逺䕫州路層波灔澦連下來千里峽入去一條天樹色秋帆上灘聲夜枕前何堪正危側百丈半山巔白居易送人赴峽詩見說瞿唐峽橫斜灔澦根難於尋鳥道險過上龍門元稹詩倒入黃牛峽還驚丨丨丨古今流不盡流去不曽回張華詩象馬誠可驗彼神亦露機六一以為絶唱蘇子瞻丨丨丨賦天下之至信者惟水而已江河之大與海之深而可以意揣惟其不自為形而因物以成形是故千變萬化而有必然之理掀騰勃怒萬夫不敢前兮宛然聽命惟人之所使子泊舟乎瞿唐之口而觀乎灔澦之崔嵬然後知其所以開峽而不去者固有以也蜀江逺來兮浩漫漫之平沙行千里而未嘗齟齬兮其意驕逞而不可摧忽峽口之逼窄兮納萬頃於一杯方其未知其峽也而戰乎灔澦之下喧豗震掉盡力以與石鬪勃乎若萬騎之西來忽孤城之當道兮鈎援臨衝畢至於其下兮城堅而不可取矢盡劍折兮迤邐循城而東去於是滔滔汨汨相與入峽安行而不敢怒嗟夫物固有以安而生變兮亦有用危而求安得吾說而推之兮亦足以知夫物理之固然長江在灔澦之下杜甫丨丨詩衆水㑹涪萬瞿唐爭一門朝宗人共挹盜賊爾誰尊孤石隱如馬高蘿垂飲猿歸心異波浪何事即飛翻李白自白帝下江陵詩朝辭白帝彩雲間千里江陵一日還兩岸猿聲啼不盡須㬰却過萬重山龍脊灘在城東三里狀若龍脊夏沒冬見虎鬚灘在奉節縣杜詩瞿唐漫天虎鬚怒魚復浦漢之魚復縣基即奉節縣大瀼水在奉節縣州城以景德二年遷瀼西夷堅志䕫人龍澄逰瀼水見水中一石合命漁人探取之獲玉印五文字如星霞焰非世間篆籀比忽見天神侍立曰某乃九天使者所獲玉印乃上帝所寶昔禹治水拜而授之水土既平復藏之名山大川今守護不謹可亟投元處澄如其言後亦登科為桃源令杜甫詩瀼東瀼西一萬家江南江北春冬花相公溪在瀼東王龜齡云以丁公言得名水可烹茶井泉義泉源出卧龍山杜甫引水詩月峽瞿唐雲作頂亂石峥嶸俗無井雲安沽水奴僕悲魚復移居心力省白帝城西萬竹竿接筒引水喉不乾人生留滯生理難斗水何直百憂寬王龜齡詩䕫州苦無井俗癭殊可憐竹筒喉不乾可浣不可煎日汲卧龍水屢頳擔夫肩官費接筒竹民蠲沾水錢丁寧後來者莫負丨名丨樓亭白帝樓在城上杜甫丨丨城丨詩江度寒山閣城高絶塞樓翠屏宜晚對白谷㑹深逰急急能鳴鴈輕輕不下鷗夷陵春色起漸擬放扁舟又詩漠漠虛無裏連連啤睨侵樓光去日逺峽影入江深臘破思端綺春歸待一金去年梅栁意還欲攪邊心最高樓杜甫詩城尖徑仄旌斾悠獨立縹眇之飛樓峽拆雲霾龍虎睡江清日抱黿鼉逰扶桑西枝封斷石弱水東影隨長流杖藜歎世者誰子泣血迸空回白頭制勝樓王延禧詩䕫子城新築長江便作濠百蠻歸指掌三峽見秋毫白雲樓在計臺有三層登覽之勝甲於一郡江月亭在戎鈐司王龜齡詩長江何處水明月幾州天月與江無約相逢是偶然堂齊三峽堂在瞿唐宋肇建十賢堂在州治王龜齡記䕫州十賢屈大夫嚴刺史諸葛武侯杜少陵陸宣公章丞相諱處厚白文公栁文公冦萊公唐質肅公續得七人宋玉源乾曜李適之李吉甫溫造程伊川黃太史高齊陸務觀丨丨記少陵居䕫三徙居皆名丨丨其記曰次水門者白帝城之丨丨也曰依藥餌者瀼西之丨丨也見一川者東屯之丨丨也祠廟高唐神女廟在巫山縣西北二百五十步有陽臺浸叟詩話高唐事乃懷王非襄王也苕溪漁𨼆曰高唐賦云昔楚襄王與宋玉逰於雲夢之臺玉曰昔先王嘗逰高唐怠而畫寢夢一婦人曰妾巫山之女也李善注楚懷王則漫叟之言是也然神女賦復云襄王與宋玉逰雲夢之浦使玉賦高唐之事其夜與神女遇異同當考襄陽耆舊傳曰楚襄王逰於髙唐怠而晝寢見一婦人云我帝之女名瑶姬未行而亡封于巫山之臺乃辭去曰妾在巫山之陽髙邱之岨朝為行雲暮為行雨比旦視之如其言乃立廟號為朝雲年代已久今無遺跡劉禹錫詩星河好夜聞清佩雲雨歸時帶異香何事神仙九天上人間未就楚襄王白居易詩巫山廟花紅似粉昭君村栁緑於眉誠知老去風情少見此爭無一句詩李義山詩非關宋玉有微詞却是襄王夢較遲一自高唐賦成後楚天雲雨盡堪疑李羣玉宿巫山廟詩寂寞髙唐别楚君玉人天上逐行雲停舟十二峰巒下仙佩仙香半夜聞李賀詩巫山叢碧髙插天大江瀾翻神曳煙楚魂尋夢風颶然曉風飛雨生苔錢瑶姬一去一千年丁香笻竹啼老猿古祠近月蟾桂寒椒花墜雲濕雲間鮑溶巫山懷古詩十二峰巒鬪翠微石煙花霧犯容暉青春楚女妬雲老白日神人入夢稀誰傷宋玉千秋後留得青山辨是非韋莊謁廟詩亂猿啼處訪髙唐路入煙霞草木香山色未能忘宋玉水聲猶似哭襄王李涉詩巫峽雲開神女祠緑潭紅樹影參差不勞戍口初相問無義灘頭剩别離又詩十二山晴花盡開楚宮雙闕對陽臺細腰爭舞君沉醉白日秦兵天上來元微之詩楚王忽妖夢宋玉復淫詞萬事捐宮館空山雲雨期蘇子瞻詩遙觀神女石綽約誠有以世人喜狂怪論說驚幼稚蘇子由詩山中廟堂古神女楚巫婆娑奏歌舞空山日落悲風吹舉手睢盱道神語神仙潔清非世人瓦盎傾醪薦麋脯子知神君竟何自西方真人古王母飄然乘風逰九州朅渡西海薄中土白雲為車駕蒼虬驂乘湘君宓妃御天孫織絹素非素衣裳飄颻薄煙霧泊然冲虛眇無營朝食屑玉燕瓊乳下視人世安可據超江乘山去無所巫山之下江流清偶然愛之不能去湍崖激作相喧豗白花翻翻龍正怒堯使大禹導九川石隕山墜幾折股山前恐懼久無措稽首山下苦求助丹書玉笈世莫欺指示文字相爾汝擘山泄江幸無苦庚辰虞余實相禹功成事定世莫知空山俄頃千萬古廟中擊鼓吹長簫採蘭為餐蕙為肴玉缶薦芰香飄蕭龍勺取酒注白茅神來享之風飄飄荒山長河何所有豈有瓊玉薦泬寥神君聰明無我責為我驅獸攘龍蛟乘船入楚泝巴蜀濆旋深惡秋水髙歸來無恙無以報山下麥熟可作醪神君尊貴豈待我再拜長跪神所勞吳簡詩惆悵巫娥事不平當時一夢是虛成只因宋玉間唇吻流盡巫江洗不清朱元晦嘗云宋玉賦雖有思萬方憂國害開聖賢輔不逮之語亦屠兒之禮佛娼家之讀禮耳白帝廟在奉節縣東八里舊州城內有三石笋猶存公孫述據蜀自稱白帝杜甫詩白帝空祠廟浮雲自往來江山城宛轉棟宇客徘徊勇略今何在當年亦壯哉後人將酒肉虛殿日煙埃谷鳥鳴還過林花落又開多慙病無力騎馬入蒼苔蘇子瞻詩朔風催入峽慘慘去何之共指蒼山路來朝白帝祠荒城秋草滿古樹野藤垂浩蕩荆江逺凄凉獨客悲遲回問風俗涕泗閔興衰故國依然在遺民豈復知一方稱警蹕萬乘擁旌旗逺略初吞漢雄心豈在䕫﨑嶇來野廟閔默愧當時破甑蒸仙麥長歌唱竹枝荆都真壯士吳柱本經師失計雖無及圖王固已竒猶餘帝王號皎皎在門楣蜀先主廟去奉節縣六里杜甫詩蜀主窺吳幸三峽崩年亦在永安宫翠華想像空山裏玉殿虛無野寺中古廟杉松巢水鶴嵗時伏臘走村童武侯祠屋長鄰近一體君臣祭祀同丨丨丨詩云天下英雄氣千秋尚凜然勢分三鼎足業復五銖錢得相能開國生兒不象賢凄凉蜀故妓來舞魏宫前諸葛忠武侯廟在州城中八陳臺下後封威烈武靈仁濟王杜甫詩久逰巴子國屢入武侯祠竹日斜虛寢溪風滿薄帷君臣常共濟賢聖亦同時翊戴歸先主并吞更出師蟲蛇穿畫壁巫覡醉珠絲疑憶吟梁父躬耕起未遲古跡陽雲臺在巫山縣西北五十步寰宇記南枕大江宋玉賦楚王逰於丨丨之丨望髙唐之觀即此李白詩我到巫山渚尋古登陽臺天近彩雲滅地逺清風來神女知巳久襄王安在哉永安宮在奉節縣東七里魏武七年蜀先主自征吳為陸遜所敗還至白帝改魚復為丨丨丨居之明年寢疾而卒諸葛亮受遺於此蘇子瞻詩千古陵谷變故宮安得存徘徊問耆舊惟有䕫州門逰人雜楚蜀車馬晚喧喧不見重樓好誰知昔日尊吁嗟蜀先主兵敗此亡魂只因法正死使公去遭燔八陳磧荆州圖經云在奉節縣西南七里又云在永安宮南一里渚下平磧上有孔明八陳圗聚細石為之各髙五丈皆棊布相當中間相去九尺正中開南北巷悉廣五尺凡六十四聚或為人散亂及為夏水所沒及水退復依然如故又有二十四聚作兩層其後每層各十二聚成都圖經云武侯之八陳凡三在䕫者六十有四方陳法也在牟彌者一百二十有八當頭陳法也其在棊盤市者二百五十有六十營法也興元志興元西縣亦有八陳則八陳凡四矣杜甫詩云功蓋三分國名成八陳圖江流石不轉遺恨失吞吳蘇子瞻云嘗夢子美謂僕世人多誤㑹吾八陳圖詩以為先主武侯恨不滅吳非也我意謂吳蜀唇齒不當相圖晉所以能取蜀者以蜀有吞吳之意以此為恨耳此說甚長劉禹錫詩軒黃傳上略蜀相運神機水落龍蛇出沙平鵝鸛飛蘇子瞻詩平沙何茫茫髣佛見石蕝縱橫滿江上嵗嵗沙水齧孔明死已久誰復辨行列唯餘八陳圖千古壯䕫峽越公堂在瞿唐開城內隋楊公素所為也杜甫宴丨丨丨詩此堂存古制城上俯江郊落構垂雲雨荒階蔓草茅柱穿峰溜蜜棧缺燕添巢坐接春杯氣心傷艷蘂梢英靈如過隙宴術願投膠莫向東流水生涯未即拋杜少陵故宅陸務觀記東屯李氏居已數世上距少陵才三易主唐大厯初故劵猶存王龜齡云世傳計臺乃少陵舊宅今有祠堂舊經云少陵祠有三在漕臺奉節縣及東屯三處東屯乃公孫述留屯之所距白帝五里杜甫移居東屯詩白鹽危嶠北赤甲古城東平地一川穩髙齊四面同東屯有青苗陂杜詩云東屯稻田一百頃北有澗水通青苗晴浴狎鷗分處處雨隨神女下朝朝又云東屯復瀼西一種住青溪東屯之田可得百許頃稻米為蜀第一郡給諸官俸廩以高下為差帥漕月得九斗故王龜齡詩云少陵别業古東屯一飯遺忠甽畝存我輩月叨官九斗須知粒粒是君恩名宦鮑陋鎮白帝城為譙道福所圍城中無水鑿石開道以汲引道福不悟謂陋渴欲降之陋令人於江捕得生魚以遺道福乃解圍去開鑿之跡今猶存李孝恭唐高祖時封趙郡王拜山南招討大使數進策圖蕭銑帝嘉納源乾曜劉禹錫壁記云嘗為參軍修圖經言風俗甚備劉禹錫為刺史冇别䕫州官吏詩三年楚國巴城守一去揚州楊子津唯有九歌詞數首里中留與賽蠻神黃太史書之號為絶唱柏中丞大厯中鎮䕫杜甫詩柏公鎮䕫門滯務兹一掃皇朝慕容德琛淳化中為守值王小波李順之亂以孤城抗賊大破賊衆乘勢尅取一十郡丁謂咸平五年施黔蠻為冦以丨丨為䕫路轉運使謂乃罷兵屏從吏自入溪洞蠻酋田彥伊出迎謂言有詔赦不殺蠻酋皆感泣作誓刻石柱立境上唐介宰奉節今有祠堂王龜齡為記王十朋公逺牧古䕫朝廷初議以馬綱行水路巴蜀病之公力奏其不可公賦詩云村落尚餘煙火舍山林暫息斧斤痕坐看巴蜀回生意故我歡呼倒酒尊人物廖彥正郡人也以南平録參上書論時政後與黨籍李公京奉節人公京裳之子襲之姪公奕襲之子公京之從弟也父子叔姪五人相繼登科號李氏五桂袁師奭雲安人張九成榜登科師奭孝純之子師允師文之弟也父子兄弟四人相繼登科名賢李綱靖康中安置題詠傳聲典信州杜甫送王信州詩下詔選郎署云云唐志信州即䕫州也絶塞烏蠻北杜甫䕫府書懷詩云云孤城白帝邊又峽束滄江起巖排石樹圖拂雲霾楚氣潮海蹴吳天煮井為鹽速燒畬度地偏有時驚疊嶂何處覔平川鸂鶒雙雙舞獼猴壘壘懸碧蘿長似帶錦石小如錢黃牛峽出錦石有五彩花紋西南控百蠻杜甫詩峽口大江間云云城高連粉堞岸斷更連山開闢多天險防隅一水關亂離聞鼓角秋氣動衰顔城峻隨天壁杜甫詩云云樓髙更女墻江流思夏后風至憶襄王老去聞悲角人扶報夕陽公孫初恃險躍馬意何長地蒸餘破扇杜甫詩云云冬暖更纎絺家家養烏鬼杜甫詩異俗吁可怪斯人難並居云云頓頓食黃魚舊識難為態新知已暗疏冶生且耕鑿只有不關渠沈筆談曰峽中人謂鸕鷀為烏鬼漫叟詩話以為猪元稹詩病賽烏蠻鬼巫占瓦代龜嚴端常藝苑雌黃亦曰烏蠻鬼吳虎臣謾録曰老烏神若是養鸕鷀與猪則未為異俗可怪當是養鬼但養字讀作去聲粔籹作人情杜甫詩西歷青羌坂南留白帝城於莵侵客恨云云瓦卜傳神語畬田費火耕是非何處定高枕笑浮生粔籹以蜜和米煎之鐃管隨征斾唐劉駕送盧使君赴䕫州云云髙秋上逺巴白波連霧雨青壁斷蒹葭憑几雙瞳靜登樓萬井斜政成知俗變當應畫輪車青壁與城連盧綸送䕫州班使君詩曉日照樓船三軍拜峽前白雲隨浪起云云萬嶺岷峨雪千家橘䄂川還如赴河內天子許經年夜鼓祭神多司空曙送䕫府班使君詩魚國巴庸路麾幢漢守過曉檣爭市隘云云雲白當山雨風清滿峽波夷陵舊人吏猶誦兩岐歌天旋䕫子峽杜甫續得觀書定出三峽詩云云春近嶽陽湖民風雜莫徭陸務觀䕫府書懷詩云云封域近南詔凄凉黃魔宮峭絶白帝廟通衢舞竹枝譙門對山燒但見癭纍纍把鏡羞自照䕫府孤城落日斜杜甫秋興詩云云每依南斗望京華聽猿實下三聲淚奉使虛隨八月槎畫省香爐違伏枕山樓粉堞隱悲笳請看石上藤蘿月已映洲前蘆荻花赤甲白鹽髙刺天杜甫䕫州詩云云閻閣繚繞接山巔楓林大樹丹青合復道重樓錦繡懸白帝城中雲出門杜甫詩云云白帝城南雨翻盆髙江急峽雷霆鬪翠木長藤日月昏戎馬不如歸馬逸千家今有百家存哀哀寡婦誅求盡慟哭秋原何處村峽門江腹擁城隅杜甫詩云閬風𤣥圃與蓬壺中有高堂天下無借問䕫州壓何處云云南紀巫廬瘴不絶杜甫苦寒行云云太古以來無尺雪蠻夷長老怨苦寒崑崙天關凍應折𤣥猿噤口不能嘯白鶴垂翅眼流血安得春泥補地裂三峽星河影動搖杜甫閣夜詩五更鼓角聲悲壯云云蜀麻吳鹽自古通杜甫詩云云萬斛之舟行若風長年三老長歌裏白畫攤錢高浪中䕫峽民淳獄訟稀王龜齡詩云云使君無事只吟詩山從䕫子盡侵雲石湖范至能詩人入恭南多附贅云云壯憶公孫舞劍器陸務觀思䕫州有詩云云愁思賓客竹枝歌外邑今年强作歸杜甫巫山縣唐使君宴别題壁詩卧病巴東久云云故人猶逺謫兹日倍多違接宴身兼杖聽歌淚滿衣諸公不相棄擁别借光輝巴俗深留客黃魯直用韻云云吳儂但憶歸直知難共語不是故相違東縣聞銅臭蓋過巫山用銅錢江陵换夾衣丁寧巫峽雨謹莫暗朝暉宓子彈琴宰邑日杜甫題終明府水樓詩云云終軍棄繻英妙時承家節操尚不泯為政風流今在兹可憐賓客盡傾蓋何處老翁來賦詩楚江巫峽半雲雨清簟疏簾看奕棊竹枝歌白帝城頭春草生劉禹錫竹枝歌云云白鹽山下蜀江清試聽南來歌一曲北人莫上動鄉情山桃紅花滿上頭云云蜀江東水拍江流花紅易衰似郎意水流無限似儂愁瞿唐嶆嶆十二灘云云此中道路古來難長恨人心不如水等閒平定起波瀾巫峽蒼蒼煙雨時云云清猿啼在最高枝箇裏行人腸自斷由來不是此聲悲楊栁青青江水平云云聞郎江上唱歌聲東邊日出西邊雨道是無晴還有晴四六疇庸靈石改牧䕫藩古來䕫子地近烏蠻竊以䕫門當夫蜀隘眷此巴渝實鄰溪洞惟此巴䕫之寄介乎荆蜀之間西南四道之咽喉吳楚萬里之襟帶自蜀道分八使之權以䕫漕為諸司之冠顧卧龍之遺跡有化鶴之故城地荒半雜於猩㹳俗獷易罹於狴犴天旋䕫峽良費驅馳地重秦關徑煩彈壓惟巴山之三峽㑹瞿唐之一門竊惟䕫子之古邦實雜冉駹之蠻俗况巴渝十四州之地據吳蜀八千里之衝耀東壁之圖書光于列宿控西陵之門户專在三巴晨入太學而招諸生遽求外補夜發清溪而向三峽聊作西逰蛇退猿愁人何堪而至此狨啼猩嘯公所過以晏然瞿唐五六月自昔畏團團之天巫山十二峰何况霽朝朝之雨富媪孕靈坐溢牢盆之利姦胥落膽盡空訟缿之寃認常山之蛇默識木牛之運跨灔澦之象佇觀畫鷁之來假以節旄揔列城於帥閫侈之鼓吹兼他道之戎鈐烏蠻塞近猩鼯混夷獠之居白帝城高象馬卜瞿唐之險鳥蠻塞近古稱冉駹之居灔澦浪髙人占象馬之險白帝城高符節久煩於兼領烏孫國亂藩維有貴於預防白鹽赤甲久淹長城之賢紫誥黃麻行有左席之召一百八盤之天險率在部封五十四郡之星分兹為門户盧天彤弓新元戎之號令白鹽赤甲壯全蜀之藩垣畫舫青簾昔嘗觀灔澦之馬碧油紅斾今重認常山之蛇方輿勝覽卷五十七
