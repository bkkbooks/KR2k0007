body:
  text: 方輿勝覽卷六宋祝穆撰浙東路紹興府㑹稽蕭山山隂餘姚嵊虞上諸暨新昌建置㳂革禹貢揚州之域粤地星紀之次牽牛婺女之分野夏禹東狩㑹羣臣於㑹稽之山執玉帛者萬國至少康封少子無餘於㑹稽號曰於越後二十世勾踐稱王與呉王闔閭戰敗之檇李其後用范蠡計滅呉後為楚所倂秦立㑹稽郡漢以其地封同姓更屬江都國東漢以浙西為吴郡浙東為㑹稽郡晉因之隋改為越州唐改㑹稽郡又為越州唐末陞義勝軍節度尋改為鎮東軍皇朝中興陞紹興府兼帥鎭東軍節度今統郡七領縣八治㑹稽山隂二縣浙東提刑提舉置司事要郡名㑹稽史記㑹計也吴越春秋㑹計脩國之道因以名山山隂秦始皇移在㑹稽之北故曰丨丨越上見㳂革注風俗民性敏柔而慧三朝國史云云奢靡而無積聚文身斷髪吏記越世家云云黿鱓之與處食物常足漢志火耕水耨民食魚稲果窳蠃蛤云云有陂湖灌溉之利㑹稽西阻淛河東漸于海云云故嵗多順成有絲枲魚鹽之饒故俗重犯法以舟楫為車馬越絶書夫越性詭而愚水行山處云云形勝鑑水環其前王于鰲閣記云云卧龍擁其後稽山出其東秦望直其南天下繁劇宋略㑹稽編户三萬號為丨丨丨丨襟海帶江圖經晉元帝以為今之闗中江左諸公比之鄠杜之間盖其地云云方之千里實為東南一大都㑹也浮鄞達呉王龜齡賦航甌舶閩云云浪槳風帆千艘萬艫千巖萬壑顧凱之傳人問會稽山水荅曰丨丨競秀丨丨爭流草木蒙籠于上若雲興霞蔚山川之美王之敬云云使人應接不暇勝遊珍觀秦少游蔣公唱和集序㑹稽之為鎭舊矣豈惟山川形勢之盛實控扼於東南其丨丨丨丨相望乎楓柟竹箭之上枕帯乎荇藻芙蕖之濵可以從事雪月優游而忘年者殆非它州所及而卧龍山鑑湖尤為一郡佳處葢府治所占樓堞臺榭之所凴非若窮崖絶壑游鹿豕而家魚龍不可與民同樂土產剡紙舒元輿有弔剡溪古藤文其意葢謂今之為文者皆夭閼剡藤者也所以言弔竹紙曽文清詩㑹稽竹箭東南美來伴陶泓住管城可惜不逢韓吏部相從但説楮先生日鑄茶在㑹稽東南五十里有丨丨嶺其地産丨歐陽公嘗曰兩浙産茶日鑄第一山川卧龍山府治㩀其東麓越大夫種所葬處一名種山元稹州宅詩序子城因種山之勢盤繞囘扼若卧龍形故名蘇子瞻詩丨丨盤屈半東州萬室鱗鱗枕丨股蕺山在府西六里舊經云越王嗜丨采於此丨故名王羲之傳嘗在丨丨見一老姥持六角扇賣之羲之書其扇各為五字人競買之他日姥又持扇來羲之笑而不答宛委山在縣東南十五里遁甲開山圖禹開丨丨丨得赤珪如日碧珪如月長一尺二寸呉越春秋此山東南曰天柱號宛委中藏金簡書青玉為字編以白銀承以文玉覆以磐石禹廵衡山血白馬以祭之見赤繡文衣男子自稱𤣥夷蒼水使者云欲得簡書知導水之方請齋於黄帝之岳乃登山發石果得其文具知四瀆之限百川之理遂周天下而盡力於溝洫矣射的山在縣南十五里孔曄記山半有石室乃仙人射堂東峯有丨丨遥望丨壁有白㸃如射侯諺云射的白米斛百射的𤣥米斛千㑹稽山在州西二十里周禮揚州之鎮山曰丨丨又名衡山又名苗丨龜山白玉上經丨丨丨周廻三百五十里名陽明洞天一名極𤣥太元之天此三十六洞天之第十一也史記封禅書禹封㤗山禅㑹稽又云始皇上㑹稽祭天禹望于南海而立石刻頌秦徳司馬遷傳禹廵狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴遁甲開山圖禹治水至丨丨宿于衡嶺宛委之神奏玉匱之書十二卷以授禹禹未及持之四卷飛入泉四卷飛上天禹得四卷開而視之乃遁甲開丨圖因用以治水訖乃緘書於洞穴鄭宏山在縣東南三十里孔靈符㑹稽記射的山南有白鶴嘗為仙人取箭漢太尉丨丨嘗采薪得一遺箭頃有人覔見宏還之問何所欲宏識其神人也曰毎患若耶溪載薪為患願朝南風暮北風後果然故若耶溪風至今呼為鄭宏風亦名樵風宋之問詩歸舟何慮晚日暮有樵風若耶山在州東南四十里葛仙翁學道于此秦望山在州南四十里為衆峯之傑歴山在縣東八十里按本紀舜兾州人耕丨丨漁雷澤舜陶河濵者葢餘則知舜不居于越明矣今越有丨丨井象田姚縣周䖏風俗記舜之餘族所封舜姚姓故曰餘姚疑其子孫思舜之鄉取象於此亦猶漢新豐之義也塗山在山陰縣西北四十五里云禹會萬國之所東山在上虞縣西南四十五里王銍遊丨丨記㑹稽南則晉太𫝊文靖謝公安石丨丨也巋山出衆峯間如鸞飛鳳舞至山下于千峯掩抱間得㣲徑循石路而上今為國慶禅院即文靖故居也絶頂有謝公調馬路至此山川始軒豁呈露萬峯林立下視煙海渺然天水相接葢萬里雲景也文靖樂居其在兹乎山半有薔薇洞相傳文靖携妓處葛立之詩話云㑹稽臨安金陵皆有丨丨俱傳以為謝安携妓之所按謝安本傳初安石居㑹稽與王羲之許詢支遁遊䖏被召不至遂棲遲東土唐裴滉與呂渭等鑑湖聨句有云興衰還尋戴丨丨更問安此㑹稽之東山也本傳又云安石常住臨安山中坐石室臨峻谷悠然歎曰此與伯夷何逺今餘杭縣有東山蘇子瞻有游餘杭東西巖詩註云即謝安丨丨所謂獨携縹緲人來上東西山是也此臨安之丨丨也本傳又謂及登台輔于土山營墅棲館竹林甚盛每携中外子侄遊集今土山在建康上元縣崇禮鄉建康事跡云安石于此擬㑹稽之東山亦號丨丨此金陵之東山也李白有憶丨丨二絶云不到東山久薔薇幾度花白雲還自散明月落誰家又云我今携謝妓長嘯絶人羣欲報丨丨客開闗歸白雲不知何䖏之丨丨陳軒乃錄此詩於金陵集中将别有所據耶南史載宋劉勔經始鍾嶺以為棲息亦號丨丨金陵遂有兩東山矣城山在蕭山西九里闔閭侵越勾踐保丨丨山冡有泉多嘉魚王意其乏水以鹽菜來餽越取雙鯉報之吴兵夜遁華鎮詩兵家制勝舊多門贈答雍容亦解紛緩報一雙文錦鯉坐歸十萬水犀軍羅壁山在餘姚縣南十八里晉人郄愔故居之地華鎮詩郄家池館雖蕪沒金谷形容宛自然天姥山在新昌縣東四十五里接天台山謝靈運詩暝投剡中宿明登天姥岑高髙入雲電安期還可尋李白有夢遊丨丨歌見台州苧羅山在諸暨南五里吴越春秋越王使相者求美女于中國得之丨丨丨鬻薪之女西施鄭旦家飾以羅縠教以容歩三年學成而獻有西施家東施家葢姓施而在西也五泄山在諸暨山西南四十里㳂歴五級始下注溪壑故曰丨丨飛沫如雪淙激之聲雄於雷霆俗謂之小雁蕩下有龍湫檮雨輒應刁約詩西源窮盡見東源直注層崖五磴泉桐栢山在嵊縣東七十二里晏類要越有丨丨丨金庭養真之福地浙江在蕭山縣西詳見臨安有山居江中潮水衝山即回入海故曰丨丨漁浦在蕭山縣西二十里對岸則為杭之龍山西興渡在蕭山縣西十二里本名西陵吴越武肅王以非吉語改丨丨謝惠連西陵遇風詩云行行道轉逺去去情彌遲昨𤼵浦陽汭今宿浙江湄臨津不得濟佇楫阻風波積憤成疢痗無萱將如何鏡湖在州南二里後漢馬臻順帝永和五年為太守於㑹稽山隂二縣界築塘周廻三百一十里以畜水輿地志曰南湖在城南百許歩東西二十里南北數里縈帶郊郭連屬峯岫白水翠巖互相映𤼵若鑑若圖故王逸少云從山隂路上行如在鑑中遊湖水髙平疇丈許築塘以防之開以泄之水適中而止故山陰無荒廢之田李白詩鑑湖三百里菡蓞發荷花五月西施採人看隘若耶杜甫詩越女天下白鑑湖五月凉剡溪藴秀異欲罷不能忘若耶溪在㑹稽縣東南北流二十五里與照湖合越絶記薛燭對越王曰丨丨之丨涸而出銅唐徐浩遊之云曽子不居勝母之里吾豈遊丨丨之丨因改五雲溪西施採蓮歐冶鑄劔所李紳詩嵐光花影繞山隂山轉花稀到碧潯傾國美人妖艶逺鑿山良冶鑄罏深凌波莫惜登臨面瑩鍔當期出匣心應是蛟龍長不去若耶秋水尚沉沉剡溪在嵊縣南一百五十歩一名戴溪晉王子猷居山隂夜雪初霽月色清朗四望浩然獨酌酒詠左思退隐詩忽憶戴逵時在剡便夜乘小船詣之經宿方至造門不前而返人問其故子猷曰本乘興而前興盡而返何必見安道耶陵寢􅑼宫王明清揮麈錄紹興初昭慈聖憲皇后升遐曽䊸以江東漕兼攝二浙應辦用元符末京西漕陳向故事也朝論欲建山陵䊸議以為帝后陵寢今存伊洛不日復中原即歸祔矣冝以丨丨為名僉以為當後易􅑼為櫕實始于䊸之請也寕宗茂陵其地乃泰寕寺之舊址嘉定十七年冬命楊燁為按行使燁歸奏云獨泰寕寺之山山岡偉特五峯在前直以上皇青山之雄翼以紫金白鹿之秀宜為先帝弓劔之蔵遂遷寺定卜焉堂舍鎮越堂汪綱柱記由蓬萊而下凡三級始達㕔事承平時皆有堂宇廢圮已久後來者乃由中鑿磴道以便往來而享軍延見吏民之所遂為通行之路非獨失帥府之觀瞻其於隂陽家尤為妨忌郡寖不如昔民亦多艱未必不由於此於是補苴罅漏芟夷草萊築一堂于其上以鎮越名葢東南之鎮其山曰㑹稽而鎮東又越之軍鎮也名實而核地髙而爽堂奥而明秦望諸山皆欣然領㑹其效竒獻秀之勢又創行廊四十間於兩翼聨屬蓬萊且併與閣一新之山川朝拱氣象環合而斯堂之勝遂將獨擅於越中矣觀風堂紹興中曺詠建王龜齡詩薄俗澆風有萬端欲將眼力看應難但令心鏡無塵垢端坐斯堂即可觀清白堂在州治范希文記㑹稽府治㩀卧龍之南足其西巖之下有地方數丈宻蔓深叢一日闢之得廢井呼工出其泥滓曰嘉泉也又云引嘉賔以建溪日注卧龍雲居之茗試之則甘液華滋説人襟觀因署其堂曰丨丨丨棣蕚堂洪邁領帥以其兄适乾道中嘗出守取綸告中語命名州宅後枕龍卧靣直秦望唐元㣲之云丨丨居山之陽嘗以誇于白居易云州城縈繞拂雲堆照水稽山滿目來四面無時對屏障一家終日在樓䑓星河影向簷前落鼓角聲從地底囘我是玉皇香案吏謫居猶得小蓬萊居易和荅云賀上人囘得報書大誇丨丨似仙居知君暗數江南郡除却餘杭盡不如樓閣飛翼樓汪綱柱記越之為都距今二千年遺宫故苑漫不可考獨丨丨丨范蠡所築雄據西山之巔樓雖不存邦人猶有能指其處者中間易以為亭有曰望海曰五桂既而亭與桂俱廢復為望海寳慶丁亥六月余帥越至是六年矣望日大風雨屋瓦飛堕亭幾壓焉遂撤而新之為樓三楹於其上復丨丨之舊而丨之下則仍望海之名萬壑千巖四顧無際雲濤煙浪渺渺愁予使登斯樓者撫霸業之餘基思卧薪之雄槩感憤激烈以毋忘昔人復仇之義庶幾乎鴟夷子之風尚有嗣餘響於千百世者余老矣無能為役姑識嵗月云越王樓唐子西登樓詩左綿城北長安道馬足翻翻人自老丨丨髙丨蔵道邉道上行人迷不到樓前西日堕江紅一見如逢鄰舍翁向來何處識面目應在杜陵詩句中蓬萊閣在設㕔後卧龍山上吴越錢鏐所建名以丨丨者舊志云蓬萊山正屬㑹稽元㣲之有詩見州宅注滕子京知湖州送范希文詩為問玉皇香案吏丨丨何似水晶宮臺榭越王臺舊經在種山今在卧龍之西汪綱創氣象開豁極目千里為一郡登臨勝處月臺舊有此臺不知其址汪綱創在鎮越堂之前王龜齡詩明珠遥吐卧龍頭漸覺清光萬里浮人望使君如望月要湏如鏡莫如鈎蘭亭在山隂縣二十五里天章寺有曲水王羲之丨丨敘永和九年嵗在癸丑暮春之初㑹于㑹稽山隂之丨丨修禊事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管弦之盛一觴一詠亦足以暢敘幽情是日也天朗氣清恵風和暢仰觀宇宙之大俯察品彚之盛所以㳺目騁懐足以極視聽之娱信可樂也夫人之相與俯仰一世或取諸懐抱晤言一室之内或因寄所托放浪形骸之外雖趣舍萬殊静躁不同當其欣於所遇蹔得於已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間已為陳迹猶不能不以之興懷况修短隨化終期有盡古人云死生亦大矣豈不痛哉毎感昔人興廢之由若合一契未嘗不臨文嗟悼不能喻之於懷固知一死生為虚誕齊彭殤為妄作後之視今亦猶今之視昔悲夫故列敘時人錄其所述雖世殊事異所以興懷其揆一也後之覽昔亦將有感于斯文遯齊閒覽王右軍丨丨敘天朗氣清自是秋景以此不入選然絲竹管弦語亦重復續齊諧記晉武帝問尚書摯虞曰三月曲水其義何答曰漢章帝時平原徐肇以三月初生三女至三日而俱亡一村以為怪乃相携至水濵盥洗遂因洗以泛觴曲水之義起于此帝曰若所談非好事尚書束晳曰仲治小生不足以知此臣請説其始昔周公成洛邑因流水以泛酒故逸詩曰羽觴隨流波又秦昭王三日置酒河曲見有金人出奉水心劔曰今君制有西夏乃因其䖏立為曲水二漢相㳂皆為盛事帝曰善賜金五十斤左遷仲治為陽城令適南亭陸農師記㑹稽為越之絶而山川之秀甲於東南自晉以來髙曠宏放之士多在于此至唐餘杭始盛而與越争勝見于元白之稱然山川之勝殆有欝而未𤼵者也熙寕十年給事中程公出守是邦公吏師也下車未幾政成訟清與賔客沿鑑湖上蕺山以尋右軍秘監之跡登望稍倦未愜公意於是有以梅山之勝告公者葢指其地昔子真之所居也今其少西有里曰梅市其事應史公聞往焉初届佛刹見湖山一面之秀以為未造佳境也因至其上望之峯巒如列間見層出煙海杳冥風帆隐映有魁偉絶特之觀而髙情爽氣適相值也已而山之僧固髙築宇名之曰適南葢取莊周大鵬圖南之義暇日領賔從而賞焉於是闔州以為觀美而春時無貴賤皆往又其風俗潔雅嬉遊皆乘畵舫平湖清淺晴天浮動及登是亭四眺無路風輕日永若上蓬萊之上可謂竒矣雖然公之美志喜于發揚幽懿豈特賁一山而已凢此郷人蔵道蓄德晦於耕隴釣瀬屠市卜肆魚鹽之間者庶幾托公之翼摶風雲而上矣秋風亭汪綱柱記秋風亭辛幼安曽賦詞膾炙人口今廢矣予即舊基面東為亭復創數椽于後以為賔客往來館寓之地當必有髙人勝士如宋玉張翰者來逰其間㳺目騁懐幸為我㽞其母遽起悲秋思歸之興云冷香亭在倅㕔之東取曽子固憶越中梅詩冷香幽艶為誰開之句佛寺戒珠寺本王義之故宅門外有二池曰墨池鵞池雲門寺在㑹稽南三十一里今名雍熈為州之偉觀昔王子敬居此有五色祥雲詔建寺號雲門杜甫詩若耶溪雲門寺青鞋布韈從此始宋之問遊寺詩維舟深静域作禮事尊經投跡一蕭散為心自杳冥龕交大禹穴樓倚少㣲星沓嶂圍蘭若廻溪抱竹庭覺花塗砌白甘露洗山青雁塔鶱金地虹橋轉翠屏人天宵現影神鬼晝潜形理勝常虚寂縁空自感靈入禅從鴿繞説法有龍聼刼累終期滅塵躬豈暫寕摇摇不安寐待月詠巖扄又宿寺詩雲門若耶裏泛鷁路纔通寅縁綠篠岸遂得青蓮宮天香衆壑滿夜梵前山空漾漾潭際月飄飄杉上風茲焉多嘉遯數子今莫同鳳歸慨處士鹿化問仙公樵路鄭州北學井阿巖東永夜豈云寐曙華忽葱蘢谷鳥囀尚澁源桃驚未紅再來期春暮當造林端窮庶幾蹤謝客開山投剡中趙嘏浙東陪元相公遊詩松下山前一逕通燭迎千騎滿山紅溪雲乍斂幽巖雨曉氣初髙大斾風小檻宴花容客醉上方看竹與僧同歸來吹盡嚴城角路轉髙堂亂水東天衣寺在山隂南三十里于良史詩掬水月在手㺯花香滿衣寶相寺在新昌縣西南五里有齊僧䕶鑿百尺彌勒像道觀龍瑞宮在㑹稽東南二十里道家謂黃帝時嘗建候神館于此有龍現壇憲汪綱以旱來祈有物蜿蜒于壇上人皆知為神龍變化也繼而雨如傾注葉正則詩感格孰知汪仲舉歩虚未了龍來語㑹稽秦望都洗清越人喚作提刑雨千秋鴻禧觀初賀知章入道以其所居宅為觀始曰千秋尋改曰天長乾道四年郡守史浩奏移天長觀於㑹稽東南五里嘉定十三年賜名丨丨丨丨仍為祠官典領之地前有亭曰鑑湖一曲又一亭曰懷賀皆史浩建觀之前郡守汪綱築一園曰賜榮取李白憶賀監詩勅賜鑑湖水為君臺沼榮祠墓禹廟在㑹稽縣東南七里今為告成觀獨丨丨為舊址紹興間祠之前一夕忽光㷔閃爍入即其䖏􅓯之得古珪璧珮環蔵于廟然今所存者非其真矣李紳詩削平水土窮滄海畚挿東南盡會稽山擁翠屏朝玉帛穴通金闕駕雲霓秘文􅍢石蔵青壁寳檢封雲化紫泥清廟萬年長血食始知明德與天齊曹娥墓在㑹稽東七十二里典録云娥上虞人父盱迎江神泝濤為水溺娥年十二投江而死縣長度尚憐而葬之命邯郸子作碑蔡邕題其後云黃絹幼婦外孫虀臼後人又為立廟錢惟岳詩曹娥廟貌樹豐碑千古行人誦色絲苦恨當年題八字不旌賢孝只旌辭嚴光墓子陵本餘姚人古跡禹穴在龍瑞宮之側東萊云大石中斷成罅殊不古殆非司馬子長所揬也楊萬里謁永裕陵歸途遊龍瑞宮觀丨丨我昔騎鳳逰九嶷今復遇風登㑹稽禹穴下窺正深黑地老天荒知是非好峯髙處偏薄霧秋熱苦時恰輕雨囘頭却望昭陵松雲氣成龍或成虎窆石在禹廟舊經云禹葬以此石為丨石甕在丨帆山下號秦皇酒丨坐石在州西㑹稽山上輿地志秦始皇刻石前有方石廣數丈云是始皇座兩邊有方石入所云是丞相以下石梅梁在禹廟中按四明圖經大梅山在鄞縣東七十里葢漢梅子真舊隐也山頂有大梅木其上則伐為㑹稽禹廟之梁其下則為它山堰之梁禹廟之梁張僧繇畵龍於其上夜或風雨飛入鏡湖與龍鬬後人見梁上水淋漓而萍藻滿焉始駭異之乃以鐵索鎻于柱舊經云梁時修廟忽風雨飄一梁至乃丨丨也今梁在禹殿長不能尋丈乃他木耳猶絆以鉄索抑亦好事者為之也柯亭在山隂縣昔蔡邕避難㑹稽之丨丨仰見椽竹知有竒音取之作笛遂為寳器龍井在餘姚縣蘇子瞻詩餘姚古縣亦何有丨丨白泉甘勝乳王介甫詩山頭石有千年潤石眼泉無一日乾天下蒼生望霖雨不知龍向此中蟠浣紗石在諸暨南五里苧羅山下相傳云西施丨丨處名宦朱買臣吴人武帝時拜會稽太守懷其印綬邸吏見之曰會稽太守章也劉寵拜㑹稽太守郡中大化召為將作大匠將去山隂縣有五六老叟自若耶山谷間出人賫百錢以送寵攀車叩馬寵勞之為人選一大錢受之號一錢太守王羲之為㑹稽内史子凝之亦為内史元稹為浙東觀察使所辟幕職皆妙選當時文士鑑湖秦望之逰月三四焉副使竇鞏有海内詩名與稹唱酬號蘭亭絶唱顧凱之為山隂令理繁以約縣内無事書日埀簾門皆閑寂嚴助為㑹稽守帝賜書曰君厭承明之廬勞侍從之事懐故土出為太守丘仲孚梁時為山隂令有聲百姓稱之曰二傅沈劉不如一丘盖傅琰父子沈曼劉元明相繼宰山隂裴子野梁時為諸暨令不行鞠罰闔境無訟度尚後漢時為上虞長時人稱其神明皇朝范仲淹為守諡文正趙抃曽子固作趙公救菑記曰熈寕八年夏吴越大旱九月知越州趙公前民之未饑為書問属縣所被菑者二萬一千九百餘人公歛富人所輸及僧道食之羡者得粟四萬八千餘石又為之出官粟得五萬二千餘石或給或糶又僦民完城四千一百丈趙鼎以紹興元年知越州曽公亮為㑹稽令後相三朝曽鞏為郡倅楊時號龜山先生知蕭山縣汪綱以郎官為憲兼帥在任九年除待制召為户侍人物勾踐其先禹之苗裔夏后少康之庻子封于㑹稽奉禹祭祀文身斷髪披草萊孫綽㑹稽人著天台賦丁固㑹稽山隂人少夢松生腹上謂人曰松字十八公果為司徒謝安山隂人王徽之詳見剡溪注戴逵字安道居剡溪謝靈運陳郡人移籍㑹稽虞世南餘姚人賀知章乞為道士賜鑑湖一曲李白送賀知章詩鏡湖流水漾清波狂客歸舟逸興多山隂道士如相見應冩黄庭換白鵞張志和㑹稽山隂人詳見湖州注皇朝杜衍㑹稽人封祁國公陸佃字農師山隂人受經于王介甫而不以新法為是李光上虞人仕至恭政陸游山隂人左丞佃之孫自號放翁有劔南詩集莫子純狀元詹騤狀元王佐狀元題詠越郡佳山水權載之詩云云菁江接上虞枕戈憶勾踐杜甫詩云云渡浙想秦皇無家水不通張籍送朱餘慶歸越東南歸路逺幾日到鄉中有寺山皆遍云云湖聲連夜雨野氣稲花風州縣知名久争邀與客同㑹稽遊宦鄉王介甫送張宣義詩云云海物錯勾章土潤箭萌美水甘茶串香君今試暫屈他日恐難忘惟有西興渡靈胥或怒張西陵繞越臺李白送人尋越中山水聞道稽山去偏宜謝客才千巖泉灑落萬壑樹縈廽東海横秦望云云湖清霜鏡曉濤白雪山來八月枚乘筆三吴張翰盃此中多逸興早晚向天台梅市門何在張籍送李評事詩未習風塵事初為吴越遊露沾草湖晚日照海山秋云云蘭亭水尚流西陵待潮處知汝不勝愁海天東下越王州張伯玉詩云碧城繚繞環山丘春晴紫翠堆綺屋日暮煙雨蔵朱楼禹祠花底巖穴峻賀老門前銀漢秋何當獨把釣竿手笑撒一艘東去遊越絶溪山第一州陳希元詩云云越山長青水長白王介甫詩云云越人長家山水國蓬萊清淺水仙家唐人詩緑楊隂轉畵橋斜舟有笙歌岸有花盡日㑹稽山色裏云云郡樓對望千山月白居易聞元㣲之除浙東觀察喜得相隣稽山鏡水歡遊地犀帶金章榮貴身官職比君雖較小封疆與我且為隣云云江界平分兩岸春杭越風光詩酒主相看更合與何人路隔西陵三兩水秦少游詩林聲摵摵動秋風共躡丹梯上卧龍云云門臨南鎮一千峯湖吞碧落詩争𤼵塔湧青冥畵幾重非是登髙能賦客可怜猿鶴自相容外邑山深水急無艇子王介甫復至曺娥堰寄剡縣于元珍詩溪水渾渾來自北千山抱水清相射云云欲從故人安可得故人昔日此水上罇酒扁舟慰行役津亭把酒坐一笑我喜滿懐君動色今年却坐相逢䖏惆悵難求别時迹可憐溪水自南流安得溪船問消息靈胥引水清穿市王介甫送蕭山錢著作才髙諸人故無嫌兄弟同時舉孝亷東觀外除方黒綬西州相見已蒼髯云云神禹分山翠入簾好去絃歌聊自慰郡人誰敢慢陶潜南巖氣爽横郛郭趙嘏𤼵剡中正懐何謝俯長流更覽餘封識嵊州樹色老依官舍晚溪聲凉傍客衣秋云云天姥雲晴拂寺樓日暮不堪還上馬蓼花風起路悠悠四六眷今於越視漢左馮雄稱東輔宻爾行都䟽渥中宸保釐東土西掖出綸東郊作鎮矧東越之奥區有㑹稽之巨鎮矧越上之名城號浙東之都㑹今為闗輔之䧺更恃寝園之重復勾踐之故棲想神禹之遺迹連七州之封域摠一道之兵師惟稽山之巨屏實行殿之陪都風肅寝園朝百靈於禹㑹露零原廟祀列聖於漢陵野服黄冠羨季真於剡曲青鞋布韈相子美於雲間在周則猶鎬京之視雒邑於漢則譬咸陽之有左馮卧聼鼓角之聲疑從天下行視山川之色覺在鏡中嘗聞海岱報五月之政成豈俟㑹稽奉三年之訃最蓬萊閣已似為瀛洲之符錢塘江豈能作弱水之隔千巖競秀已儲維石之瞻一葦可杭歸作濟川之用由禹得名至勾踐遂為强國自秦置郡逮紹興始號陪都暮春天霽摩挲修楔之題半夜月明縦臾泛舟之興秦帝大書於丕績斷石空存曺娥嘗刻於豐碑色絲未冺登㑹稽探禹穴足騁壯懐從山隂訪戴溪聊乘佳興家住樓臺元稹大誇於州宅身輕軒冕季真願賜於鑑湖望芒碭之雲先兆已知於赤帝占南陽之氣中興果應於真人會稽東粤之奥區覽萬壑千巖之秀嶽牧西周之重任擅五侯九伯之征方輿勝覽卷六
