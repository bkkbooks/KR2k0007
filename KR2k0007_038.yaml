body:
  text: 方輿勝覽卷三十八宋祝穆撰廣西路靜江府臨桂修仁興安理定靈川古縣陽朔荔浦永福義寧建置沿革禹貢荆州之域翼軫之分鶉尾之次古百粵之地七國時楚越之交秦置桂林郡漢置零陵郡始興𨽻焉置蒼梧郡荔浦縣𨽻焉今州即始興縣地東漢為始安國吳置始安郡屬荆州晉屬廣州梁立桂州于蒼梧欎林之境因桂江以為名隋置始安郡唐置桂州總管府改始安郡又改建陵郡復為桂州置桂管都防禦等使升桂管為靜江軍節度皇朝兼廣西經略安撫以高宗潛藩升靜江府今統郡二十五領縣十治臨桂本路轉運提刑提舉置司事要郡名八桂桂林風俗俗比華風唐蕭昕送桂州刺史序云云化同內地多荒茅篁竹張敬夫靜江府壁記然其土素瘠云云風俗異西北民之生理甚艱是以賦入寡少郡縣亦例以迫束赤子龍蛇同上而又並邉非止一面蠻夷之性不常云云交致其恩威乃克無事故其任常重一日四時之氣備嶺外代答云冬月久晴不離葛衣紈扇夏月苦雨急須襲被重裘大抵早溫晝熱晚涼夜寒云云氣候與江浙頗類嶺外代答云雨下便寒晴便熱不論春夏與秋冬此蓋南方之氣候桂林與江浙頗類過桂林而南則大異矣風氣清淑范至能虞衡志序始豫自紫微垣出帥廣右姻親故人張飲松江皆以炎荒風土為戚余取唐人詩考桂林之地少陵謂之宜人樂天謂之桂林無瘴氣退之至以湘南江山勝于驂鸞仙去則宦逰之適寧有踰此者乎至郡則云云果如所聞士之秀美豈乏人張敬夫三先生祠記桂為郡山拔而水清云云形勝東控海嶺白居易制云云右控蠻荒西距雕題交趾韓雲卿平蠻頌云云南控夜郎昆明北洎黔巫衡湘彌亘萬里東接諸溪吳宗旦設廳記西連交趾南極炎海云云湘水之南李彥弼八桂堂記云云粵壤之西是為桂林秦以郡置唐以管分左控荆衡郭見義修城記云云右走區越枕灕湘之間為一都會南浮瓊崖唐弼安逺橋記西通道于交趾大理之區云云盡島夷之國與湖南犬牙虞衡志重江束隘栁宗元訾家洲記萬里而內云云聯嵐合暉千巖競秀唐韋宗卿隱山六洞記桂林郡郛云云山皆平地拔起倦逰録桂州左右山皆平地拔起數百丈竹木蓊欎石如黛染陽朔縣尤佳四面峯巒皆駢立居五嶺之表唐蕭昕送桂州刺史序云云控兩越之郊五管桂為大唐弼安逺記丨丨之地丨丨丨被山帶江控制數千里為西南會府李彥弼湘南樓記桂云云所以為襟蠻帶海用兵遣將之區地望隆重張敬夫壁記唐末升靜江軍節度然是時嶺南已分為東西路而西道所領實在雍管桂獨得察州十餘宋有天下四方萬里罔不臣規摹法制加詳於前代景祐二年詔桂州兼廣西兵鈐後十七年又詔兼經略安撫于是始得顓制云云其後復兼大都督之號控制雄劇同上合一路所領郡二十有五其外則羈縻之州七十有二又其外則諸小蕃羅殿自杞特摩白衣之屬環之又其外則交趾大理等國屬焉其地南入于海去帥治所水陸幾四千餘里其丨丨亦可謂丨丨矣襟喉二十有六州李彥弼八桂堂記云遙制海疆旁控蠻窟云云巍然為會府二廣為天子南庫范至能鹽法奏山川桂山在臨桂縣之東山海經云八桂成柱范至能虞衡志序余嘗評丨丨之秀宜為天下第一太行常山衡嶽廬阜皆崇高雄厚雖有諸峯之名政爾魁然大山其最奇秀莫如池之九華歙之黃山括之仙都溫之鴈蕩夔之巫峽此天下同珍之者然皆數峯而止又因重岡復嶺之勢盤而起桂之千峯皆旁無延緣悉自平地崛然特立玉笋瑶簪森列無際誠為天下第一觀韓愈詩柳宗元訾家洲記黃魯直詩則丨丨之竒在目中矣堯山在府城東北四十里舜山在城北有舜廟并唐人碑隱山寰宇記云唐李渤出鎮見石門大開有水淵徹乃夷剃蕪穢迹通巖穴上有六洞皆在西湖中丨丨之上一曰朝陽二曰夕陽三曰南華四曰北牖五曰嘉蓮六曰白雀泛湖泊舟自西北登山先至南華中有水十許步水傍平坦可坐數十人出洞而西至夕陽其深百丈水亦竟焉洞窮有石門可上出至北牖潭水沉黑巨魚躍然左右怪石萬狀潭上石室便房窗牖如琢玉出洞十許步至朝陽潭水尤清冽下通湖面其上石壁有碧石白石二盆中常有水數升㪺之不竭轉至一處别名雲户洞有石榻刻為博局故又名仙奕旁通虛明下臨湖山如指掌又西至白雀穴口隘狹側身入中有石室容數十人潭上石樓有二石人若倚樓中者有穴通嘉蓮多白蝙蝠有石榻石琴之類不可具載也西湖之外既有四山繞之碧玉數十峯倒映水面固已竒絶而湖心又浸丨丨諸洞之外别有竒峯繪畫所不及余名其最巧一峯曰沉香大略似雕鎪通脫沉香山子也湖山漣漪荷花時有泛舟故事勝賞甲于西南灕山在城南二里灕水之陽其山孤拔下有澄潭傍有洞穴廣數丈世亂民保以避寇陽朔山宋咸詩獨起獨高雄入漢相輝相映翠成堆若非羣玉崑西至即是三峯海上來疑有洞天通日月絶無樵路到塵埃如何得似巨靈手擘向天家對鳳臺南溪山在靈川縣西北三十里山下有洞南北相通水灌其中龍隱巖在水東七星山俗傳昔有龍蟠伏其間今江水泛舟至石壁下有大洞門高可百丈鼓棹而入兩壁石皆玉立仰視洞頂有龍迹夭矯若印泥然其長竟洞舟行僅一箭許别有洞門可出兩門虛明相射泊舟其間琴奕觴詠竒賞終日巖在洞側山半有小寺即巖為佛堂不復屋雉巖江濵獨山有小洞深百步許路窄不可窮劉仙巖在白龍洞之陽仙人劉仲逺所居磴道險峻攀援而上石室高寒出半山間佛子巖亦名中隱巖去城十里號最逺一山崒起莽蒼中山腰有上中下三洞下洞最廣如橫大艘入洞秉燭行亦有石液融結為人物轉一再曲道窄不可進中洞明敞高百許丈透出山背洞門垂石髙深如蟠蓋飛仙騰虬之屬以千百計仰視驚心奪目移晷忘去疊綵巖在八桂堂後大山屛開壁立山石層層橫斷如積疊錦綵躡支徑登大半有大洞門入洞行十許步則曲轉穿出山背北望平逺如畫前後洞門皆有蒼石嵌巖古苔封之如世所作仙聖宴坐之龕逰者徘徊不忍去前山腳有小洞幽暗不可窮昔有猴怪居之自有傳記屏風巖在平地斷山峭壁之下入洞門上下左右皆高廣百餘丈如康莊大逵延納光景內外明徹中有平地可宴百客仰視鍾乳森森然垂倒如珠玉瓔珞寶蓋者甚多石乳融結丈餘圓如囷廪外紋縠皺星燦極可觀躡石磴五十級有石穴通明逗穴而出則山川城郭恍然無際余因其處作壺天觀而命其洞曰空明讀書巖在獨秀峯下直郡治後為桂主山傍無坡阜突起千丈峯趾石屋有便房石榻石牖如環堵之室顔延年守郡時讀書其中伏波巖在灕江濵突然而起且千丈下有洞可容二十榻穿鑿通透户牖旁出有懸石如柱去地一線不合俗名馬丨丨試劒石五嶺李白詩桂水之丨丨衡山朝九疑嶺外代答自秦丗有丨丨之説皆指山名考之乃入嶺之途五耳白龍洞在溪南平地半山中龕然大石屋盛暑重裘而入半途有石室四壁悉是乳液所凝玉鱗雪花燦若寶所棲霞洞在七星山者七峯位置如北斗又一小峯在傍曰輔星石洞在山半腹入石門下行百餘級得平地可坐數十人穴口空明下燭高爽明豁政爾大空也盛暑無炎熇大冬溫然竟日忘出傍有兩路其一西行兩壁石液凝沍玉麟雪華摩挲奪目雖秉炬入石色亦自照人頂高數十丈路濶亦三四丈地亦甚平如行通衢中頓足曳杖彭鏗有鐘鼓聲蓋洞之下又有洞焉半里遇大壑不可進一步北行俯僂而入數步則寬廣傍十許丈石液融結多所形似鐘乳垂下纂纂凡乳床必因石脈方出不自頑石出也路高下曲折或須躋攀匍匐始可進里餘所見益竒如佛寺經藏高大莊嚴四般圍繞有如臺坐刻削平正疑仙聖之所盤旋石液滴至地凝為老稚人物幢蓋囷廩牛馬狻猊異獸之狀者不可勝紀又行食頃則多岐逰者恐迷路不敢進云通九疑山也唐人鄭冠卿遇日華君于洞中仙者與詩略云不因今丗行方便安得今朝會碧虛余于洞口作亭以碧虛榜之登覽之勝與千山觀齊名水月洞在宜山之麓其半浸江天然刓刻作大洞門透徹山背頂高數十丈其形正員望之映空明皎端正如大月輪元風洞去棲霞洞數百步風自洞中出寒如冰雪不可當户立曽公洞舊名冷水巖山根石門然入門石橋甚華曽丞相子宣所作有澗水莫知所從來自洞中石旋東流橋下復自右入莫知所往或謂流入于江也仰視怪石如垂蓮頽雲危欲下墮度橋有仙田數畝塍畛龍鱗過田路窄且濕俯視石罅尺餘匍匐而進旋復髙曠可通棲霞又復自左隅數十步回至澗旁其水清淺不流崖壁星星然南潛洞在西湖中羅家山上自南竇持炬入數步則豁然乳石中峙如經藏乳穗纍然地有迹如龍爪所劃俗名龍田下有水清深不可進山背復有小穴陡下丈餘得層洞其左即前所謂龍田者北潛洞在隱山之北中有石室石臺又有石果作荔子胡桃棗栗之狀人採取之或以釘盤相遺虛秀洞去城差逺大石室面平野室左右皆有徑隧各數十百步穿透兩旁亦臨平野以上所紀皆附郭可日涉者餘外邑巖洞尚多興安之乳洞雲泉之靈巖最竒乳洞上中下三洞有泉凝碧自洞中沿石壁流出窈然深黑水上有龍田溝塍如鑿每稜中常滿貯水未嘗竭水至洞門觸石噴激傾洞洞外有盤登山至中洞門有三石柱及石室石床雲氣常霏衣袂清泠自中洞左盤至上洞入門卻下入十步至平處秉炬入石乳玲瓏有五色石橫亘其上如飛霞有淺水揭厲可行水中亦多石果好事者名其下洞曰噴雷中曰駐雲下曰飛雲此洞與棲霞相甲乙靈巖尤殊絶大江洞其腹濶數十丈深不可測遙望山根橫光一線迫之乃知巖在山底水上表裏明徹而然巖口水面拍拍僅容小舟擊汰而入仰視巖腹與水面正平相去才丈餘深不可施篙仰撑巖腹以行而輔以楫篙楫之聲鍧然震動人聲發則山水皆響應大聲叱吒則砰砰然崩裂可駭當巖正中石穴隆起如蓋其下神龍所居嵗旱道官祈龍汲水歸禱往往有應故為逰觀常處陽朔亦有繡山羅漢華蓋白鶴味明五洞皆竒羅漢之高十尋繡山石壁如繡畫洞浸江可棹舟入焉陽朔在府城之南故余不能至又聞容州都嶠有三洞天融州有老君洞張舍人安國榜曰天下第一真仙之洞相傳不下桂林但皆在瘴地仕者罕到惟曽丞相子宣風洞詩云都嶠三天臨瘴水雲巖千里向蠻山君如咫尺臨風穴杖履時時一往還蓋桂山率去城密邇真杖屨間物天下所稀也又其風俗醇厚士民各安本業猶有太平遺餘宦逰者與之相安而登臨之勝又如此蓋忘其身之在嶺表云華景洞高廣如十間屋洞門亦然桂江在臨桂縣荔江在荔浦縣流入灕江陽江在臨桂縣南二里源出靈川縣界東流合于桂江灕水輿地廣記云灕水湘水二水皆出海陽山而分源南流為灕北流為湘漢討南粵戈船下將軍瀨出零陵下丨丨即此癸水范至能詩丨丨繞東城永不見刀兵西湖江文叔詩桂林佳麗冠群城父老從來不識兵粵嶠昔雖多勝槩丨丨今獨擅佳名訾家洲在臨桂縣南柳宗元訾家洲記桂州多靈山發地峭堅林立四野署之左曰灕水水之中曰訾氏之洲凡嶠南之山川逹于海上于是畢出而古今莫能知中丞裴公伐惡木刜奧草考極相方南為燕亭蓋非桂山之靈不足以環觀非是洲之曠不足以極視非公之鑒不能以獨得學校府學乾道間守張維徙學南軒張敬夫為記後南軒一新建造朱元晦記云靜江之學自唐觀察使李侯昌巙始立于牙城之西其後又徙于東南乾道間又徙于始安故郡之墟蓋其地自郡廢而為浮屠之室者三始議易置而部使者有惑異教持不可乃僅得其一以故規模褊陋至于今侯乃得并斥左右佛舍置他所度材鳩匠合其地而一新焉夫逺非鬼崇本教侯之為是既可書已侯名栻字敬夫丞相魏國忠獻公次子其學近推程氏以達于孔孟治已教人一以居敬為主明理為先嘗以左司副郎侍講禁中既而出臨此邦以幸逺民其論説政教皆有明法則士之學于是者可謂得師矣堂舍八桂堂在府治無倦齋在府治張敬夫云舊名緩帶豫懼其肆也更題曰丨丨且志其故昔者洙泗之門子張問政夫子首告之以無倦是知為政終始之道無越乎此也夫難存而易怠者心也吏者分天子之民而治焉受天子之土而守焉一日之間所為酬酢事物者亦不一端矣幾微之所形紀綱之所寓常隱于所忽而環于所因循纎毫之不謹而萬緒之失其機方寸之不存而千里之受其害又况欲動而物乘意佚而形隨其所差謬何可勝紀可不畏哉樓觀逍遙樓在城東角宋考功陪王都督登樓詩晦日登樓望江山一半天千山觀在西峯之絶頂羣峯回環西湖蕩漾為桂林登覽之會祠廟虞帝廟朱元晦記云靜江府故有丨丨丨在城東北五里而近虞山之下皇澤之灣蓋莫詳其始所自立而有唐世刻詞在焉淳熙二年春祕閣張侯栻撤而新之時又方按國典毁諸淫祠不如法者因悉致其美材文石以奉兹役新安朱熹又作此歌以遺桂人使聲于廟侑牲璧焉其迎神詞曰皇胡為兮山之幽翳長薄兮俯清流渺冀州兮何有眷茲土兮淹留皇之仁兮如在子我民兮不窮以愛沛皇澤兮橫流暢威靈兮無外潔尊兮肥羜九歌兮招舞嗟莫報兮皇之祐皇欲下兮儼相羊烈風雷兮暮雨其送神曰虞之陽兮灕之滸皇降集兮巫屢舞桂酒湛兮瑶觴皇之歸兮何許龍駕兮天門羽旄兮繽紛俯故宫兮一慨越宇宙兮無鄰無鄰兮奈何七政協兮羣生嘉信元功兮不宰猶倣佛兮山阿三先生祠在府學濂溪明道伊川也南軒祠記云師道之不可不立也久矣良材美質何世無之而後世之人才所以不古如者以夫師道之不立故也繼自今瞻丨丨丨之在此丨也其各起敬起慕求其書而讀之味其言考其旨講論細繹心存而身履以進于孔孟之門墻將見人才之作興與灕江相為無窮矣名宦顔延之宋時為始安守常衮為桂管安撫使皇朝陳堯叟為廣西運使勸民廣植麻苧請以苧麻充折桑柘又其俗有疾不服藥唯禱神丨丨以集驗方刻石桂州驛舍自後始有服藥者嶺外少林木井泉丨丨為植木道傍鑿井置亭舍至今為利余靖五朝言行録儂智高叛交趾請出兵討賊詔不許公曰雍州與交趾接境今不納必忿而反助智高乃以便宜趣交趾會兵公曰使不與智高合足矣及智高入雍州遂無外援又遣人入特磨襲取智高母獻于京師范成大為漕及帥作虞衡志汪應辰繫年録丨丨倅靜江帥臣吕願中欲殺走卒王超丨丨諫而止有録事周某者恃與秦檜有舊嘗以國忌命妓丨丨欲糾之周懷憾使人持書告檜以丨丨嘗遣使渡海餉趙鼎又與李光交通超以計竊其書易之丨丨乃得免張栻嶺外代答南軒為帥請于朝以三分鹽息分諸州而免諸州民户苗米每一石二斗耗又毁淫祠新學校人物王世則太平興國八年以安州貫中進士第一為右正言題詠江作青羅帶韓愈送桂州嚴大夫詩蒼蒼森八桂茲地在湘南云云山為碧玉篸户多輸翠羽家自種黃柑逺勝登仙去飛鸞不服驂宜人獨桂林杜甫寄楊五桂州詩五嶺皆炎熱云云梅花萬里外雪片一冬深聞此寬相憶為邦復好音江邉送孫楚逺附白頭吟桂林無瘴氣白居易送嚴大夫赴桂州詩地壓坤方重官兼憲府雄云云柏署有清風山水衙門外旌旗艛艓中大夫應絶席詩酒與誰同南州實炎德謝靈運詩云云桂樹凌寒山桂水通百粵孟浩然詩英英桂林伯韓愈云云實惟文武材嶺頭分界堠王建送嚴大夫詩云云一半屬湘潭水驛門旗出山蠻洞主參辟邪犀角重解酒荔支甘莫道中華逺安南更有南南島鯨波駕梁安世詩列城二十五去國一百舍西夷蟻穴通云云行路九疑南張籍送嚴大夫之桂州詩旌斾過湘潭幽竒得遍探莎城百粵北云云有地多生桂無時不養蠶聽歌疑似曲風俗自相諳我所思兮在桂林張衡賦云云欲往從之湘水深桂嶺環城如鴈蕩黃魯直到桂州詩云云平地蒼玉忽嵯峨李成不生郭熙死奈此百嶂千峯何湖如杭穎共佳名姚少彭山接衡湘多爽氣云云八桂西南天一握王安中詩云云重江今古水雙流二十四州民樂否張安國詩云云莫教一物怨窮途瘴連梅嶺月多昏木湜送陳希元赴廣西漕詩云雨歇桂林秋更暖云云棹衝秋霧瘴江流楊侃送陳希元詩云馬困炎天蠻嶺路云云外邑碧蓮峯裏住人家唐沈彬題陽朔縣詩陶潛彭澤五株栁潘嶽河陽一縣花兩處爭如陽朔縣云云瀑布聲中窺案牘陶弼時云青壁森森繞縣衙不離床衽見煙霞民烹紫芋為朝食僧煮黃藤代晚茶云云女蘿隂裏勸桑麻欲知言偃弦歌處水墨屏風數百家榕葉隂中掩縣門前人桂花香裏尋僧寺云云四六申命九宸開藩八桂楓陛選賢桂林作牧桂居五管地接諸蠻水接重湖山當五嶺有唐五管之雄南越一都之會帝惟嶺嶠地逺朝廷西控龍編東連鯨海玊簮羅帶雪片梅花蒼梧直斗牛之次桂林當楚越之交羈縻餘七十州封畛蓋四千里一札十行自天而下五羊八桂易地皆然信行銅柱之蠻邦威肅樓船之故道外接南詔六蕃西連交趾九道唐分五管以建節度宋専一道以制邉陲指麾部屬多至二十五城綏撫蠻徭不知幾千萬落外則羅殿自杞諸小蕃之部落逺而占城大理數外國之梯航洗炎州之瘴霧盡變清涼驅滄海之波濤一歸約束垂矣建臺何八桂軍民之未遇復兹開府乃七星風月之有緣貪如羊狠如狼每難控御好則人怒則獸正賴撫綏裴中丞登譽洲之逰寧容久外張曲江自桂管而入佇正登庸英英桂林之伯願懋膚功渺渺洞庭之波尚資餘潤羇縻幾百餘種連特磨自杞之間節制二十五州到渤海滄溟之外玉簮羅帶固知風土之宜人卉服鴂音抑見蠻夷之向化玉簮羅帶江山分一半之天金節油幢庭户行千里之地别江東日暮之雲不妨移鎮賦五嶺梅花之雪趂得班春李百藥請郡暫輟侍郎而除張九齡還朝旋膺相國之拜柳州馬平柳城洛容建置沿革古百粵地牽牛婺女之分野秦平百粵屬桂林郡漢改欎林郡又為欎林郡之潭中縣地梁置龍州隋以馬平縣置象州屬始安郡唐置南昆州又改為栁州以當栁星之下又置崖山縣又置洛封洛容縣改龍城郡復為栁州更洛封曰洛曹皇朝仍為栁州以洛曹隸宜州改龍城為栁城省象縣入洛容今羈縻思順歸化二州領縣三治馬平事要郡名栁江栁城龍城風俗古為南夷栁宗元孔子廟碑風俗與全永不相逺圖經栁雖古荒服而實連湖湘云云風氣與中州不甚異南豐曾子固送李材叔知栁州序云談者謂南越偏且逺其風氣與中州異故官者皆不欲久居往往懈弛無憂且勤之心然越與閩蜀始俱為夷閩蜀皆已變而越獨尚陋豈其俗不可更歟蓋為吏者莫致其治教之意也噫彼不知繇京師而之越水陸之道皆安行非閩漢峽江蜀棧之不測則均之吏於逺此非獨優歟其風氣吾所諳之與中州亦不甚異起居不違其節未嘗有疾苟違節雖中州寧能不生疾耶其物産之美果有荔子龍眼蕉柑橄欖花有素馨山丹含笑之屬食有海之百物纍嵗之酒醋皆絶于天下人少鬬訟喜嬉樂吏者惟其無久居之心故謂之不可如其有久居之心為越人滌其陋俗而歐于治居閩蜀上其事出千年之表則其美之巨細可知也豫知其材之頴然過于衆人能行吾説者李材叔而已今材叔為栁州其越人之幸也夫其可賀也夫至唐始循法度孔子廟碑云云栁河東之教化圖經地近桂林號無瘴且山水清曠中朝名士如王初寮輩嘗避地寓居耳濡目染或者耻于為非韓碑言云云其所由來者逺矣唐多遷客圖經序自唐以來多著遷客山哀浦思翰墨俱存絃誦為嶺南諸州冠汪彥章學記大觀中士子之絃誦者至三百人云云登科自甘翔始龍城志嶺南云云翔乃景祐張唐卿榜蠶不能帛郡志云云率以為纊聚巫用卜唐栁宗元大雲寺記云越人信祥而易殺傲化而偭仁病且憂則聚巫師用雞卜始則殺小牲不可則殺中牲又不可則殺大牲而又不可則訣親戚飭死事曰神不置我已矣因不食蔽面死形勝州界栁嶺寰宇記云云因以為名山石竒秀同上云云平地忽崛起數百韋曲鄠社蓋無之土産荔丹龍眼見前曽鞏序小魚圖經武陽丨丨大如針候蟲異于他所窮冬猶鳴山川背石山栁宗元山水記云古之州治在潯水南山石間今徙在水北直北四十里南北東西皆水匯北有雙山夾道曰丨丨丨甑山南絶水有山無麓廣可尋高五丈上下若一曰丨丨駕鶴山甑山之南皆大山多竒又南且西曰丨丨丨壯聳環立古州治負焉有泉在坎下常盈而不流屏山南有山正方而崇類屏者故名四姹山其西曰丨丨丨皆獨立不倚北流潯水瀨下仙奕山又西曰丨丨之丨可上其上有穴穴有屏有室有宇其宇下有流石成形東入小穴常有四尺則豁然甚大無竅正黑燭之僅見其宇皆流石怪狀由屏南室中入小穴倍常而上始黑已而大明為上室由室而上有穴北出之乃臨大野飛鳥皆視其背其始登者得石枰于上黑肌而赤脈十有八道可奕石魚山全石無大草木山小而高其形如立魚在多秭歸西龍壁有支川東流入於潯水其東有曰丨丨下多秀石可觀雷塘雷山兩崖皆東西雷水出焉蓄崖中曰丨丨能出雲氣作雲雨變見有光禱用爼魚豆彘修形糈酒隂虔則應以上並見栁文栁水一名潯水源自牂牱出辰沅經融州東會于郡又東過潯藤至廣州入海龍江源出冝州會于栁井泉靈泉山麓泉大類轂雷鳴西奔二十尺有洄在石澗因伏無所見多緑青之魚及石鯽多倏堂樓柑子堂栁宗元城西種柑詩手植黃柑二百株春來新葉遍城隅方同楚客憐皇樹不學荆州利木奴幾嵗開花聞噴雪何人摘實見垂珠若教坐待成林日滋味還堪養老夫陶弼詩子厚才名甲有唐謫官分得荔支鄉羅池水盡黃柑死獨有空碑在畫堂明秀堂在郡治王安中書扁龕石刻甚富南樓在郡治摹刻張安國鄂州本榜之東亭在就日門外栁宗元有記祠廟文宣王廟栁宗元記仲尼之道與王化相逺邇帷栁州古為南夷椎髻卉裳攻劫鬭暴雖唐虞之仁不能柔秦漢之勇不能威至于有國始循法度置吏奉貢咸若采衛冠帶憲令進用文事學者道堯舜孔子如取諸左右執經書引仁義旋辟唯諾中州之士猶或病焉然後知唐之德大以遐孔氏之道尊而明元和十年八月州之廟屋壞幾毁神位刺史栁宗元始至大懼不任以墜教基丁未奠薦法齊時事禮不克施乃合初亞終獻三官衣布洎于贏財取土木金石徴工僦功祗完舊蓋新十月乙丑王宫正室成乃安神棲乃正法庭會羣吏卜日之吉虔告于王靈曰昔者夫子嘗欲居九夷其時門人猶有惑聖言今夫子代千有餘載其教始行至于是邦人去其陋而夲于儒孝父忠君言及禮義又况巍然炳然臨而炙之乎惟夫子以神道設教我今罔敢知欽若茲教以寧其神追思昔誨如在于前苟神之在曷敢不虔居而無陋罔二昔言申陳嚴祀永永是尊麗牲有碑刻在廟門雷塘廟見丨丨注栁宗元禱雨文云惟神之居為坎為雷専此二象宅干巖隈風馬雲車肅焉徘徊能澤地産以祛人災欽茲有靈爰以廟饗嵗既旱暵害于生長敢用昭告期于肹響羅池廟韓愈撰廟碑云丨丨丨者故刺史栁侯廟也栁侯為州不鄙夷其民動以禮法三年民各自矜奮曰兹土雖逺京師吾等亦天氓今天幸惠仁侯若不化服我則非人于是老少相教語莫違侯令凡有所為于其鄉閭及于其家皆曰吾侯聞之得無不可于意否莫不忖度而後從事凡令之期民趨勸之無有後先必以其時于是民業有經公無負租流逋四歸樂生興事宅有新屋步有新船池園潔修豬牛鴨雞肥大蕃息子嚴父詔婦順夫指嫁娶葬送各有條法出相弟長入相慈孝先時民貧以男女相質久不得贖盡沒為隸我侯之至按國之經故以傭除本悉奪歸之大修孔子廟城郭巷陌皆治使端正樹以名木栁民既皆恱喜嘗與其部將魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄于時而寄于此與若等好也明年吾將死死而為神後三年為廟祀我及期而死三年孟秋辛卯侯降于州之後堂歐陽翼等見而拜之其夕夢翼而告曰館我于丨丨其月景辰廟成大祭過客李儀醉酒慢侮堂上得疾扶出廟門即死明年春魏忠歐陽翼使謝寧來京師請書其事于石余謂栁侯生能澤其民死能驚動禍福之以食其土可謂靈也已作迎享送神詩遺栁民俾歌以祀焉而并刻之栁侯河東人諱宗元字子厚賢而有文章嘗位于朝光顯矣已而擯不用其辭曰荔子丹兮蕉葉黃雜肴蔬兮進侯堂侯之船兮兩旗度中流兮風泊之待侯不來兮不知我悲侯乘駒兮入廟慰我民兮不嚬以笑鵝之山兮栁之水桂樹團團兮白石齒齒侯朝出逰兮暮來歸春與猿吟兮秋鶴與飛北方之人兮為侯是非千秋萬嵗兮侯無我違福我兮夀我驅癘鬼兮山之左下無苦濕兮高無乾粳稌充羡兮蛇蛟結蟠我民報事兮無怠其始自今兮欽于世世名宦栁宗元墓志云子厚少精敏無不通少年取進士第靳然見頭角衆謂栁氏有子矣議論證據今古出入經旨百子踔厲風彂率嘗屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之劉蕡蕡以對策直言下第令狐楚牛僧儒表之入幕竟為宦者所嫉誣貶栁州司户人物皇朝甘翔郡人景祐登第張亞卿再試擢第王之才進士題名記栁有巷談兩過南宫鴈行侍從為張亞卿丨丨丨登科設也名賢王安中字履道北嶽居號初寮道人建人建炎中避地于郡與吳少宰汪丞相折樞密逰得郡人熊氏園植桃數百本號曰小桃源題詠種栁栁江邊栁宗元詩栁州栁刺史云云談笑成故事推移成昔年垂隂當覆地聳幹會參天好作思人樹慙無惠化傳寄書龍城守唐韓愈詩云云君驥何時秣謂子厚也讀書教蠻獠蘇子瞻詩莫學栁儀曹云云印文生緑經旬合栁宗元詩云云硯匣留塵盡日封狼荒猶得紀山川栁宗元南省轉牒令道風俗故事詩聖代提封盡海壖云云華夷圖上應初録風土記中殊未傳椎髻老人難借問黃茅深洞敢留連南宫有意求遺俗試檢周書王會篇共來百粵文身地栁宗元登栁州城樓詩云城上高樓接大荒海天愁思正茫茫驚風亂颭芙蓉水密雨斜侵薜荔墻嶺樹重遮千里目江流曲似九回腸云云猶自音書滯一鄉榕葉滿庭鶯亂啼栁宗元栁州二月榕葉落盡偶題宦情羈思共悽悽春半如秋意轉迷山城過雨百花盡云云剩種庭前木槲花前人詩秖應長作龍城守云云青箬裹鹽歸洞客栁宗元氓洞詩郡城南下接通津異服殊音不可親云云緑荷􅊶飯趂墟人鵝毛禦臘縫山罽雞骨占年拜水神愁向公庭問重譯欲投章甫作文身山腹雨晴添象迹前人嶺南江行詩瘴江南去入雲煙望盡黃茅是海邊云云潭心日暖長蛟涎射工巧伺逰人影颶母偏驚旅客船從此憂來非一事豈容華髮待流年正北三千到錦州栁宗元栁州寄京中親故詩林邑山聯瘴海秋牂牁水向郡前流勞君逺問龍城地云云四六輟班鷺序作鎮龍城出綸楓陛作牧栁城朱幡皂蓋肯惠顧于偏州青裘緑包示不忘于逺俗儒學冠于嶺南物産絶于天下因栁記而夫子之教行何拘夷俗有韓碑而郡侯之功著是即吏師方輿勝覽卷三十八
