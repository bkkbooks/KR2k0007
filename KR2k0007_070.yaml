body:
  text: 方輿勝覽卷七十宋祝穆撰西和州長道祐川大潭建置沿革禹貢雍州之域右西羌地東井輿鬼之分野在秦為隴西郡之臨洮縣自秦末至兩漢迄魏晉並為隴西郡地西魏文帝於此置岷州南有岷山故名仍領同和郡又改臨洮郡隋為岷州煬帝又改臨洮郡恭帝又改岷州唐因之改政和郡復為岷州宣宗時為歸義軍莭度後為吐蕃奴部渾末所據神宗時下河州破木征而岷州木令征以城降復為岷州𨽻熙河路後𨽻秦鳯路紹興間叛將慕容有等相繼降敵而洮岷之地復失宣撫吳玠復五路以李永琪守岷遂移治於白石及金人請和朝廷從之改岷曰西和以郡為政和故也又淮西亦有和州故加西字以别之附於利州路今領縣三治長道事要郡名西岷崆洞風俗其俗悍徑郡志云云地瘠少田同上其丨丨丨可耕之丨形勝內則屏翰蜀門郡志張士佺乞築城奏云云外則控制邊境北並洮疊圖經州境東直吐谷渾青海之塞南直白馬氐之地西連熙鞏云云在西河為重地秦城起於州界通鑑秦始皇三十三年蒙恬斥逐胸奴收河南地築長城因地形用制險塞築臨洮長城起今州城二十里崆洞山自山傍洮水而東僑治白石鎮丙午金人初犯中原越五年陕西盡陷是州北臨洮州與吐蕃接西直疊州去蜀逺徑絶無輔熙河偏將關師古率熙河兵戍于本州之白石鎮外控強敵內為全蜀之保鄣州遂僑治於此據南山建城紹興間安撫李永琪始徙鎮云云以禦突騎而帑藏刑獄咸在山川岷山元和志在縣南一里九域志丨丨土黑無樹木其西有天女神洮水經其下禹於此見長人受黑玉書祁山在長道縣南十里上有城極巖固開山圖云漢陽西南有丨丨乃九州之名阻天下之竒峻蜀志云諸葛亮率諸軍攻祁山南安天水安定郡叛魏應亮即此隴山在漢陽縣按通典漢陽有大坂曰隴坁亦曰丨丨其坂九回上者七日乃越通鑑建武八年隗囂反使王元拒壠坻即此地也元和志每山東西行役升此眺望莫不悲思隴上有水東西分流因號為分水嶺行人歌曰隴頭流水鳴聲嗚咽遙見秦川肝腸斷絶西頃山即禹貢丨丨丨在縣西南都尉部是也朱圉山在大潭縣漢地理志天水冀縣有丨丨丨崆洞山在古溢樂縣西二十步通靈山去大潭縣七十里四山環合二水縈流有清泉巖飛落如玉繩亦勝境也屏風峽在長道縣西四十里大觀間郭思作祁山神廟記以此為正祁山鐡堂峽唐杜甫詩云山風吹遊子縹眇乘險絶硤形藏堂隍壁色立積鐡徑摩穹蒼蟠石與厚地裂修纎無垠竹嵌空太始雪威遲哀壑底徒旅慘不恱水寒長氷橫我馬骨正折生涯秪弧矢盜賊殊未滅飄蓬踰三年回首肝肺熱南北岈在長道縣二岈有萬餘家諸葛亮上表言祁山去沮五百里有人萬户瞻其邱墟信為殷矣十八盤路在大潭縣百二十里白江源出疊州歷巖昌入江油花石峽過武階下文龍抵昭化合嘉陵江洮水漢地理志出西羌中經岷山之下北至抱罕東入于河漢水在長道縣南有諸葛亮故壘清水在大潭縣西南從畨界流來古迹白石鎮古城乃唐宣宗築按漢時星隕于地成白石狀如龜故名唐郭思詩云落年一石幾千年門外何人扣漢川仇池城晉時楊難當竊據築城自山之上屬長道下屬成州同谷名宦辛公義開皇間為岷州刺史州人大疫公義命兜置庭下為具醫藥身自省問皇朝种諤國朝元祐間為岷州郡守人物李翕東漢為漢陽人實秦州也薑維本秦州天水縣人世代居鐡堂峽今有子孫王仁裕天水郡漢陽人年二十五方有意於學忽夢西江神剖其腸胃到西江以水澆之睹水中沙石皆有篆文因取而吞之自是文頓進五代漢髙帝即位充翰林承旨後充少保題詠亂山深處一茅廬郡人詩云云元是薑公舊隱居惟有鐡堂空峽在六韜留於子孫無四六出綸北闕作牧西岷北連青海之塞南直白馬之氐孔明師出於祁山子美詩成於鐡峽源尋洮水古戎落之封疆地重岷山今蜀門之扞蔽千里金城秦蒙恬之遺迹一廬鐡峽蜀薑維之故居同慶府同谷栗亭建置沿革禹貢梁州之域鶉首之次東井輿鬼之分野古西戎地戰國時羌戎居之為白馬氐羌國有山曰仇池地方百頃白馬氐據焉秦逐西羌置隴西郡漢武置武都郡治下辨今州是界于隴西武都二郡之間西晉末楊荗搜保據百頃關後為仇池王後楊定稱藩於晉為仇池郡治歷城魏於此置仇池鎮理百頃岑上後又改為仇池郡梁改為南秦州西魏改為成州隋煬帝改曰漢陽郡治上祿唐復為成州又改為同谷郡復為成州沒于吐蕃於同谷西泥功山權置行州收復之後復置成州朱梁改為汝州皇朝屬陕西尋以秦隴鳯階成州鳯翔府自為一路中興𨽻利州路升同慶府今𨽻西路領縣二治同谷事要郡名仇池嘉祐石洵直郡守題名記郡曰丨丨州曰南秦東監同谷張行成裴公湖記關外四川丨丨為最風俗其民以耕織為生李修已記云云居養自足以射獵為先漢書天水隴西及安定此地上郡西河皆迫近戎狄修習武備尚氣力云云俗重冬至郡志里人重此節饋遺慶賀頗盛或謂地近西周故以周正為重有崆洞之氣石洵直其民質撲徑勇云云有古桃源風張行成雙梧堂記川原平衍而褊隘生生之具足自給不能波及於人上下以儉約自持若陋而甚朴云云形勝南則棧道朝以道發興閣記其丨丨丨丨窈窕望西崖以極白沙郡介秦隴間同谷志成為云云古為用武之國髙祖以曺參攻下辨今同谷是也石洵直云襟帶秦隴其田沃壤雜以原隰背山面池石洵直記城郭之勝云云羊腸盤道晏類要云云三十六間俗鄰羌戎仙巖亭記成之云云據山谷易於動難於安可以恩惠臨不可以刑法制山川寶井山石洵直記長慶中始遷於寶井其傍曰紫金山即今郡治所據鳯凰山在州東南十里下為鳯村溪中有二石如闕山腰有瀑布名迸璣泉天寶間哥舒翰有留題刻半巖間相傳漢世有鳯凰棲其上號鳯凰臺杜甫詩亭亭鳯凰臺北對西康州西伯今寂寞鳯聲亦悠悠山峻路絶蹤石林氣髙浮安得萬丈梯為君上上頭恐有無母雛飢寒日啾啾我能割心血飲啄慰孤愁心以當竹實炯然忘外求血以當醴泉豈徒比清流所重王者瑞敢辭微命休坐看綵翮長舉意八極周自天䘖瑞圖飛下十二樓圖以奉至尊鳯以埀鴻猷再光中興業一洗蒼生憂深𠂻止為此羣盜何淹留仇池山在郡西百里寰宇記在今成州上緑縣其山萬峯萬向山勢自利東西二門盤道可七里史記所謂秦得百二之固也元和志載宋書氐胡傳云仇池地方百頃四面斗絶髙平地方二十餘里羊腸盤道三十六回山上豐水泉煮土成鹽范曄後漢書河池方百頃左右皆白馬氐矣許靖過仇池樹下有碑靖一覽無遺故杜詩云讀記憶仇池謂此也又萬古仇池穴潛通小有天神魚人不見福地語真傳近接西南境長懷十九泉何時一茅屋送老白雲邉鹿玉山在郡東十里雲徑如線有獅子洞乃神仙之家天井山在郡西二十里有白龍潭及漢耿勳磨崖碑雞頭山在郡城西南十五里史記黃帝東至海登岱宗至崆洞登雞頭山人指為此山泥功山在郡西二十里唐正元五年權置行州今有舊城基泥功廟乃石像天成古怪殊甚唐趙鴻泥功廟詩立石泥翁狀天然詭怪形未嘗私禍福終不費丹青杜甫詩朝行青泥上暮行青泥中泥濘非一時版築勞人功不畏道路永反將汨沒同白馬為鐡驪小兒成老翁哀猿透却墜死鹿力所窮寄語北來人後來莫匆匆方山在郡東西四十里晉書武都氐羌飛炎鐡等殺隴西太守姚回略三十餘家據丨丨即此醉仙巖巖壁間有仙像如世間所畫醉仙狀有詩見天水軍注飛龍峽在仇池山下氏楊飛龍者據仇池因得名其東乃杜甫天寶避亂居此有龍灣虎穴杜甫詩停驂龍潭雲回首虎崖石又寄贊上人詩徘徊虎穴上面勢龍泓頭木皮嶺在郡東二十里郡志黃巢之亂王鐸置關於此以遮秦隴路極險杜甫詩首路栗亭西尚想鳯凰村季冬携童稚辛苦赴蜀門南登丨丨丨艱險不可論汗流被我體祁寒為之暄逺岫爭輔佐千巖自崩奔始知五嶽外别有他山尊仰干塞大明俯入裂厚坤再聞虎豹鬪屢局風水昏髙有廢閣道摧折如短轅下有冬青林石上走長根西崖特秀發煥若靈芝繁潤聚金碧氣清無沙土痕憶觀崑崙圖目擊玄圃存對此欲何適默傷垂老魂石龕在成州近境杜甫詩熊羆號我東虎豹號我西我後鬼長嘯我前狨又啼天寒昏無日山逺道路迷驅車丨丨下仲冬見虹霓伐竹者誰思悲歌上雲梯為官采美箭五嵗供梁齊苦云直幹盡無以充提携奈何漁陽騎颯颯驚蒸黎裴公湖舊傳乃裴冀公牧蜀日所開上有湖山堂天水發源經栗亭縣東南流入河池界合嘉陵江萬丈潭在同谷縣東南七里舊經昔冇黑龍自潭飛出杜甫詩青溪合冥漠神物有顯晦龍依積水盤窟壓萬丈內局步凌垠堮側身下煙靄前臨洪濤寬却立蒼石大山危一徑盡岸絶兩壁對削成根虛無倒影埀淡濧黑知灣環底清見光炯碎孤峯倒來深飛鳥不在外髙蘿成帷幄寒木疊旌斾逺川曲通流嵌竇潛泄瀨造幽無人境發興自我輩告歸遺恨多將老斯遊最閉藏修鱗蟄出入巨石礙何事炎天過快意風雨會龍泓一在飛龍峽一在天井山井泉玉繩泉在州南七里龍峽之下萬丈潭之傍有秦鳯憲喻陟題詩萬丈潭邉方丈山山根一竇落飛泉玉繩自我題巖石流作人間美事傳軒榭清風軒在郡治朝説之記云守居之東隅有軒曰清風壘障前後為之屏几清風無時而不來也吾郡漢武都郡之所領也有漢武都太守河陽李翕伯都竟陵四年之碑在魚竅峽其辭曰民歌德惠穆如清風昔人本諸此而名斯軒歟樓閣八景樓取仇池子美祠鳯臺醉仙崖仙人龕鹿玉山泥功山裴公河八景名宦亷范歷武威武都太守孔奮為武都太守馬融為守李翕靈帝時為守開西陕及天井道虞詡為守初到羌衆萬餘攻圍赤亭詡奮擊大破之郡遂以安皇朝种師道權同谷縣朝説之字以道自號景迂宣和領郡人物趙一漢陽西縣人光和間往造河南羊陟陟與語大竒之明日從車騎奉謁名動京師十辟公府不就王澤同谷農家六世同居名賢杜甫乾元中寓居同谷縣作七歌末章云男兒生不成名身已老三年飢走荒山道長安卿相多少年富貴應須致身早山中儒生舊相識但話宿昔傷懷抱嗚呼七歌兮悄終曲仰視皇天白日速朱元晦嘗書七歌仍跋其後云杜陵此歌豪宕竒崛詩流少及之者顧其卒章嘆老嗟卑則志亦陋矣人可以不闐道哉題詠同谷為咽喉杜甫送韋評事充同谷郡防禦判官詩鑾輿駐鳯翔云云西扼弱水道南鎮枹罕陬府中韋使君道足示懷柔受詞太白腳走馬仇池頭居人有萬家杜甫秦州雜詩州圖領同谷驛道出流沙降虜兼千帳云云能官聖主聞岑參送程使君赴成州詩程侯新出守好日發行軍拜命時人羡云云江樓黑塞雨山郭冷秋雲竹馬諸童子朝朝待使君江分白馬氐魯百能詩山占仇池地云云潭深龍自蟄亭逈鳯曽棲按部由兹得柅車杜正獻公按部過此留題詩仇池行館最清虛云云對竹只宜思冗鳯臨流不可見淵魚嶺接青泥入劔天史渝詩云溪從沮水流嶓冡云云下辨土風殊不惡郭執中詩云云我生薄賦自多屯外邑邑有佳主人杜甫同谷縣積草嶺詩云云情已如會面來書語絶妙逺客驚深眷食麻不顧餘茅茨眼中見四六仇池勝境同谷名藩背山面河襟秦帶隴鳯山獅洞之標名虎穴龍泓之占勝關外四州地望獨隆於同谷樓中八景詩篇當似於東陽杜少陵寓處之鄉江山增耀亷叔度承流之郡田里相安龕邉虎豹雖云絶險之區臺上鳯凰行應中興之瑞車繞羊腸有閣道難攀之路戟森燕寢為仇池小有之天文州曲水建置沿革禹貢梁州之域周為雍州之境星土分野與階成同春秋戰國及秦為氐羌地漢武帝開西南夷置陰平道屬廣漢郡東漢安帝以為屬國都尉别領三城曰陰平道曰甸氐道曰剛氐道晉為陰平郡自李雄據有其地故諸志並不録西魏平蜀後周因之始以葭蘆改文州理陰平郡隋廢州屬武都郡唐平隴蜀復為文州改陰平郡復為文州德宗以舊城在平地窄小難守遂移於故城東四里髙原上即今州理是也皇朝因之中興初帶沿水邉管內安撫尋罷今𨽻利西路領縣一治曲事要郡名文臺譙樓記故地在直西五里平地唐吐蕃之難徙兹髙阜號曰丨丨文南隂平閻伯才譙門記文南古丨丨郡為氐羌地風俗俗同秦隴楊甫學記云文南郡本邉壘地雜羌夷其丨視吾蜀不類頗丨丨丨無可耕之野慈霈廟記亂山環合云云形勝東接漢中華陽志云云南接梓泉潼西接隴右北接酒東望劔嶺張覺民清暉樓賦北顧秦壤之廣莫兮南盼江油之水湄西窮鳥獸之穴處兮云云之參差西北出入之地重修譙門記鑿山通道攀木緣崖冒萬死而得之其西則征西將軍之所以入也國小民疲智窮力竭僥幸於萬一而失之其北則輔漢將軍之所以出也唐吐蕃域圖經云云自昔用武之國居萬山中鮮于子駿題文州詩序文臺云云郡宅髙原左山右河宇文之邵申狀云云可耕之田無幾蒼崖絶壁慈霈廟記自城闉四出云云屹為巨限為蜀門戶同谷志文州有平陰道云云古今記今天下根本在蜀蜀屏翳在文州寰宇記先主都蜀此地為邉陲要厄其後鍾會伐蜀薑維請偹陰平道先主不從故敗又鄧艾自陰平景谷道懸兵束馬經江油出綿竹以滅蜀即此路山川南山過橋而左則為東墅右則為丨丨間蒼舒詩老夫睡熟青天帳只借南山作畫屏龍頭山在龍西七里從故松州黨藂山來至當州絶故以形名龍女山前如大屏相傳蜀廣政間有郡守夢一女子於南山自號龍女遂立廟素嶺山在故扶州尚能縣冬夏積雪太白山在縣南五十里山髙多雪滴水巖在州北亂山矗立劃開兩峰如丫髻對峙有飛泉千尺置槽引之以給州人麻關谷上有鄧艾薑維故城飛卭洞在州西其髙接天上清洞在州北四十里深逺不可窮隂平道同谷志秦蜀出入之道漢武開西南夷置隂平道蜀先主劉偹以為邉陲要厄諸葛亮定之因為西蜀之防玉枕石山有石狀如玉枕色白在巉巖絶壁間人迹所不能到有驛曰玉女驛楊槱詩棧道險復險客懷愁更愁萬山俱絶壁一水不通舟雲下田邑有耕天村其田之良者謂之云云天池亦名天湫尚書朱輅山叟記云豫斥居階州進士杜防言自階接文州界山上合衆山凹為大壑環百五十里積水其中防嘗登焉水平山之顙不見畔岸黑水出羌中白水出城外五十步發源於州赤磨嶺下堂亭安靜堂在州治吕澤父詩峽束秋空一線青萬山深處長官廳此堂虛曠無餘物面面齊開碧玉屏坐嘯亭吕澤父詩使君坐嘯無餘事楊桞陰中放早衙得要亭吕澤父詩人在江山窟裏居江山雖好不關渠使君獨具登臨眼亭上江山盡不如祠廟文王廟在郡治後孫諤詩秋空獨見周王廟夜月猶懸蜀將營名宦宇文之邵廣漢綿竹人為曲水令嵗飢轉運使以絹髙價抑配之邵言民貧不可重困忤運使意遂乞致仕司馬君實曰志不行顧祿仕如錙銖道不同視富貴如土芥今於之邵見之後纍召不起建亭於綿竹名曰止止皇朝周嗣武孝宗朝為夔路漕建言蜀號天險舍劍門無他道近嵗文州輒開青雲嶺利州輒開馬道院皆不由劍閣别架剗道以引商販兾收其算宜杜邉境萌隙奏悉撤之人物張覺民郡人元祐間進士第七人與馬涓等六十人上書言得失忤歡貴坐黨錮題詠官路縈迂水石間鮮于子駿普門寺詩江流屈曲林巒際云云寺址劃開青靄破僧居長與白雲間邉人髙入白雲耕孫正臣詩煙籠合處日華明龍女山橫擁郡城番馬逺隨流水至云云四六乃眷文臺實遮蜀境襟帶梓潼控扼秦隴互市守羈縻之術警巡兼彈壓之權郡落萬山對玉屏之環立賦需一縣人依崖谷以耕耘溪流一水惜畫舸之難通廩給千兵嵗偹羌蕃之侵擾龍州江油清川建置沿革禹貢梁州之域秦地東井輿鬼之分野春秋及秦為氐羌之地西漢屬廣漢郡為北部都尉治所東漢為屬國都尉後置陰平郡會羌反其後巴郡板楯蠻救漢中大破羌始復郡治置助郡都尉劉先主入漢中諸葛亮遣陳戒拔武都隂平郡屬益州魏亦遙置隂平郡屬雍州及鄧艾伐蜀自隂平行無人之地七百里鑿山通道造作樓閣至江油即此地也晉於此置武平縣屬陰平郡至梁有楊李二姓分據其地各稱藩於梁後魏得其地置江油郡西魏立龍州後周仍改為江油郡隋復為縣煬帝廢為武平郡唐改為龍州郡加西字又為龍州改江油郡復為龍州皇朝因之徽宗朝避龍字改政州尋復舊今領縣二治江油事要郡名武平唐志為平武郡隋志為丨丨郡龍城風俗性多質直隋地理志人尤徑悍云云務農工獵同上仰食於綿劔治平間江油令許醇民謡序所向皆山石少平陸鮮穀稻人悉云云鄰邑巖居谷處舊經云巖居谷處多學道教罕有儒術關譏出入蒲規修造記通階秦路禁出入與劍門關為比形勝境帶靈山唐升都督府詔江油舊壤云云緣以劔閣蜀都賦云云阻以石門山髙水峻寰宇記云云人多瘤癡聾蓋山水之氣使然也峭壁雲棧蒲翰十景記云云聨屬百里郡連氐羌隋地理志武平云云圖經西北與羌戎接壤乃蜀捍蔽圖經龍州云云不獨以偹氐羌也山川鳯朝山在州城北髙數十丈龍門山在江油縣東北二十里馬盤山在州北二百里髙三千三百丈重巒層障極為險阻牛心山在江油縣西一里玉案山在江油北一里天柱山在江油縣東北五里鹿苑大師道場弩牙山在郡城東二百三十里髙三千七百丈水山在江油縣東南上有飛泉太華山在江油縣東一百四十里有三峯竒怪崆洞山在州西二百五十里接蕃部山谷深險不通行人朝陽洞在州南八十里陰洞潛穴氣蒸成川有飛泉下流百里入劍州十二關曰涪水距城一里曰秦隴南至清川縣十五里曰兜率在清川縣曰木蕊在楮株口三店原去州八十餘里餘不盡載六閣在江油縣左擔路上涪水崖壁上曰青崖曰蟇頥曰石回曰七里曰東閣曰石城凡六閣又縣有二閣曰猿臂曰黃林左擔路自文州略青塘嶺至州百五十里地理志自北至南者右肩不得易所負故云左擔此則鄧艾伐蜀路石門在江油縣東百里有石門戍與氐分界見蜀都賦涪江在江油縣北一里金盤溪南至綿州以此溪為界醍醐水在清川縣北堂舍吏隱堂在倅廳簽判趙衆詩滿耳江聲滿目山此身疑不在人寰民含古意村村靜吏束刑書日日間司馬君實和詩四望逶迤萬疊山微通雲棧訪雲鬟誰知吏道自可隱未必人間有此間范景仁花陰桞榻常欹枕月色侵門不下關因諷君詩想佳景夜涼依約夢魂間龍陽十景蒲翰記曰朝陽洞龍門峽瀑布明月潭濺珠泉太白臺月泉巢雲閣躡翠亭雲根亭郡守趙善齡有十詩亭臺太白臺在江油縣太白與江油尉往來故有臺在尉廳蒲翰為之記祠廟李龍仙廟按道教靈驗記李虎葬龍川之牛心山又牛心山靈異記梁武陵王紀理益州使龍遷築城於牛心山龍遷既沒即葬於山側鄉里立祠號李古人廟武德中改為觀其後武氏革命鑿斷山脈明皇幸蜀有老人蘇坦奏曰龍州牛心山國之祖壠今日蒙塵之禍乃則天握鑿所致明皇即命刺史蘇邈併工修填如舊明年誅祿山復宫闕至德二年乃升龍州為都督府號靈應郡僖宗幸蜀宗子李特請遣道士醮山祈福明年遂復兩京以二記考之則李虎與龍仙即一人也又按唐書髙祖紀七世祖曰皓為梁昭武王生歆歆生重耳重耳生熙熙生天錫天錫生虎虎生昞昞生淵是為唐髙祖當西魏時賜姓大野氏是虎祗仕西魏亦非仕梁也名宦辛昻隴西狄道人魏尉遲逈平蜀表為龍州長史威惠洽著民畏而愛之陸騰代人魏孝武時拜龍州刺史通江油路直出南秦皇朝許醇先是龍州官兵廪給就遷左綿租以足之嘉祐丁酉有請運縑三千匹於江油清川兩邑博糴故米價增重嘉祐癸卯前部使者李穆乞移綿米四千斛輸龍州權罷糴以俟豐年既而奉常史照將漕懼後復行乃移綿邑米五萬斛輸龍州仍奏罷博糴江油令許醇作民謡以紀其事題詠土産唯宜藥許崇送龍州樊使君詩曽見卭人説龍州地未深碧溪飛白鳥紅斾映青林云云王租只貢金政成間宴日誰作使君吟龍陽古昔惟荒野江油令許醇民謡云云石險山深甲天下始聞魏將征蜀時閣道通行有來者又緣崖傍澗縈居止風景寧將他郡比地稀平陸少稻梁菽麥蕎􅐘而已矣此土瘠薄不出穀稅廩不踰三百斛我朝設官屯戍兵供億常於左綿督亂山深處指龍州邵稽仲詩峭壁陰森古木稠云云猿啼鴉噪溪雲暮不是愁人亦是愁四六疏榮鳯闕作鎮龍城惟武平之名郡控全蜀之奧區事簡頗宜於吏隱山深不似於州居百蠻境接當嚴護於數關五馬山行試品題於十景野無耕地賦輸既嗇於田租境有屯兵供億每資於鄰郡階州福津將利建置沿革禹貢雍梁之域古西戎之地東井輿鬼之分野戰國時白馬氐居焉氐即西戎之别種也漢武帝以其地為武都郡後漢為武都道魏武徙武都於美陽即今好畤縣界也西晉復為武都郡永嘉南遷武都又為氐楊茂搜所據宋髙祖封茂搜之孫元盛為武都王文帝又封楊難當為武都王西魏宣武帝復置武階郡改置武州後周改武都郡隋廢唐置武州復為行州及收蕭開復立武州即今州是也更名階州皇朝因之今領縣二治福津事要郡名武都風俗性多質直同谷志人尤悍徑云云又曰其人半秦多勇戅地雜羌氐漢志云云文王理化寰宇記文王為西伯理化西羌文王薨後羌人感其化婦人為孝髽角至今未泯務農習獵同谷志云務農習獵形勝東接梓潼華陽志云云西接天水北接始平道通隴蜀曽曲阜行鄭玠知階州制壤接羌戎云云土地險阻華陽志云云天地大澤漢地理志武都郡云云在縣西以有大澤故謂之都土産紫泥封璽晏類要隴右記武都紫水有泥其色紫而粘漢朝貢之用以封璽書故謂之泥詔山川石雞山在福津縣石鶴山在福津縣鹿玉山在縣東南七十里郡縣志魏將鄧艾與蜀將薑維相持於此置葭萌戍後於此置縣楊家崕郡縣志即階州家計寨控白江月掌山路建炎紹興間吳玠兄弟繼為大將保蜀口時四州未有城命逐州各擇地為寨而家計寨最控扼險阻又素有積粟水泉之類寇至常不能破角弩谷在沮水西即蜀將薑維勦五部氐羌之所青閣在福津縣又有牛圈閣及赤閣鵝鼻閣紫水出紫泥可封璽又出上品雄黃色如雞冠羌水在將利縣白水江源出西蕃界東流到州入文州合嘉陵江名宦虞詡以有將帥之略遷武都太守王宏贄後漢人為階州刺史到任添主客户三千餘户請置將利福津二邑皇朝李公璹祥符中為城守東北隅有河為害公命鑿山回河俾東南流導入於江郡人德之人物未詳題詠闕四六輟班文石出守武都雜羌氐之俗通隴蜀之郊為蜀之蔽已欣牧守之得人歷階而升行慶公卿之選表方輿勝覽卷七十
