body:
  text: 方輿勝覽卷六十宋祝穆撰梁山軍梁山建置沿革禹貢梁州之域天文屬鶉首之次本漢胊䏰縣地西魏分置安鄉郡又改為萬川郡後周又分胊䏰縣地置梁山郡因界內高梁山以為名隋屬巴東郡唐置浦州梁山以縣屬焉尋改浦州為萬州五代僞蜀在今軍治置務曰石氏屯田務皇朝平蜀土豪石處贇納莊田八所遂廢屯田務移縣于此因升為軍今領縣一治梁山事要郡名高梁都梁風俗閲旬無訟郡守題名記其民未嘗造難聽之訟以溷有司守居蕭然云云牒至庭下稻田蕃廡劉煥題名序云云常多豐年又云西境之田獨平衍可耕形勝前涪後峽同上云云挾以䕫萬皆祟山環委介䕫梓之間圖經與萬州表裏同上丨丨丨為水陸丨丨要地䕫子咽喉續題名記控扼巖險同上山川高梁山去城四十餘里按江源記云蜀中望之若長雲垂天蟠龍山在城東二十里孤峙秀傑突出衆山之上下有二洞洞中有二石龍狀首尾相蟠故名旁曰噴霧崖洞中之泉下注垂崖約二百餘丈噴薄如霧張無盡嘗游留題云水味甘腴偏宜煮茗非陸羽莫能辨范石湖以為天下瀑布第一峰門山在軍東十五里其山高大頂有寒泉兩崖對峙如門故名多喜山在軍南五十里山或丹光夜現則是境之人必丨丨事陳希夷嘗修煉于此有丹井石枕猶存白雲山在軍西百里奇峯突出如筆亦名筆山張無盡詩丨丨丨上揖世尊各以願力濟羣生識者知其有宰相器書院峽在軍東五十里峽石市之北每風雨冥冥如聞讀書聲故其中有夫子崖子貢壩寒泉洞在軍之西龍鎮十里許有洞曰丨丨勝槩不減盤龍桂溪兩岸多桂御史灘在軍西百里張無盡丞相游學之地及為丨丨與親朋燕飲于此故名丙穴在梁山南十里拍技山産嘉魚其美同於蜀漢樓亭垂雲樓在縣城之北左瞰萬石右倚梁山景物奇麗峽中所未有飛練亭在蟠龍山瀑布之下舊取徐凝詩名曰丨丨東坡以為惡詩今取歐陽公六月飛雪灑石矼之句改曰飛雪瑞豐亭在郡圃端敏堂之右陸務觀詩峽中地偏常苦貧政令愈簡民愈淳本來無事只畏擾擾者才吏非庸人都梁之民獨無苦須晴得晴雨得雨父老羅拜豐年賜縱産芝房非上瑞名宦人物並闕題詠梁山鎮地險張文琮蜀道難云云積石阻雲端飛梁架絶嶺棧道接危巒梁山薤黃妙天下何少卿子應詩云云玉筯金叉盈大把梁山薤黃所産特奇其色鮮黃其味脆美四六䕫峽上流梁山要地聯絡涪萬控扼梓䕫郡稱蓮幕之清間俗喜稻田之平衍昔屯田而置務厥望猶輕今植戟以升軍其權實重瀑泉飛灑尋張無盡之舊遊年穀常豐和陸放翁之佳句施州清江建始建置沿革古荆梁二州之域亦蠻夷之境翼軫之分春秋巴國之界戰國為楚巫郡之地秦屬黔中郡後漢為巫山縣之境隸南郡漢武平西南夷置牂牱郡蜀先主分南郡置宜都郡銀山隸焉吳孫休置建平郡建始沙渠隸焉晉析牂牱置夜郎郡縣隸焉東晉末亘元誕竄太陽蠻中築城臨施水號施王城子孫襲王至後周保定初平之以其地置施州而清江郡隸焉州乃施王之餘址故以名焉尋改為亭州又改為庸州又為清江郡恭帝復置施州唐改清江郡又改清化郡復為施州皇朝因之今領縣三治清江事要郡名清江風俗地雜夷落黔中記施之丨雖丨丨丨猶近華風故鄉音則蠻夷巴漢言語相混伐木燒畬同上其山岡砂石不通牛犁唯云云以種五穀冬暖夏寒圖經隆冬可單盛夏可夾形勝夜郎故地歌羅寨本夜丨縣丨丨唐置珍州乾德四年蠻酋珍州刺史田景遷內附納土以酉江為界自是酉江以北所謂夜郎縣丨丨盡入施州山川扞山去州二十里永寧村古吳蜀分境之處阻深據高便於扞敵故名銀山在州東七十餘里祿山在州城之南百五十里山富有禽獸足充夷人之庖洞蠻恃以為廩祿連珠山在州東二里五峯相丨如貫丨施之望丨也猿啼山在州東八十里林木深茂啼猿聲韻比諸山最多黃魯直弟知命詩云大猿啼罷小猿啼箐裏行人白晝迷惡藤牽頸石齧足嫗牽兒隨行陸續我亦行下莫啼哭都亭山後漢南蠻傳江夷水出西丨丨蓋此丨也隋書云後周置亭州取此山以為名東門山在歌羅寨西北五十里東即夜郎故地古來夷夏分界入貢之門户州基山在建始縣東三十五里隋建業州于此瘦驢嶺黃魯直詩老馬飢嘶驢瘦嶺病人生入鬼門關病人甘作五溪臥老馬猶嘶十二間劔南詩藁嶺在施黔間前輩或用作驢瘦嶺蓋誤也故雜感詩有艱危寧度丨丨丨奔走莫隨肥馬塵之句清江圖經一名夷水蜀中江水皆濁惟此獨清故名麒麟溪在州西八里藥山下盤龍溪在州驛北馬公泉腳下昔有丨丨于此鐵溝蘇子瞻丨丨行贈喬太博云城東坡壠何所似風吹海濤低復起城中病守無所為走馬來尋丨丨水丨丨水淺不容舟恰似當年韓與侯有魚有魚何足道駕言聊復寫我憂祠廟竹王祠在歌羅寨西北五十里東門山即夜郎侯祠也華陽國志初有女子浣於遁水有三節竹流至聞其中有嬰兒聲剖竹得男歸而養之及長材武遂自立為夜郎王以竹為姓捐竹於地遂成竹林崇寧間賜靈惠廟額磨嵯神廟在州治南百步按磨嵯山屬黔州界山極高深洛浦蠻依為巢穴頗為邊害孟蜀王擊破之及祥符中歸順故老云洛浦蠻犯邊神每以陰兵助官軍擊賊靈跡顯著所在祠之名宦南承嗣范陽人霽雲之子柳子厚雎陽廟碑云為婺州别駕歷施涪二州服忠思孝無替負荷皇朝丁謂為䕫路漕以施近蠻食常不足而有鹽井之利使鋪卒三十人往者負粟以次達施州返者負鹽以次達巫山至是民無轉餉之勞而諸寨粟皆可給人物詹邈元祐為狀元題詠南謁裴施州杜甫鄭典設自施州歸詩吾賢滎陽秀冒暑初有適名賢慎出處不肯妄行役旅兹殊俗遠竟以屢空迫云云氣合無險僻攀援懸根木登頓入天石青山自一川城郭洗憂戚聽子話此邦令我心恱懌其俗則純朴不知有主客溫溫諸侯門禮亦如古昔敕㕑倍常羞杯盤頗狼藉時雖屬喪亂事貴當匹敵中宵愜良㑹裴鄭非遠戚羣書一萬卷博涉供務隙他日辱銀鈎森疏見矛戟倒屣喜旋歸畫地求所歷乃聞風土質又重田疇闢刺史似冦恂列郡宜競借音迹北風吹瘴癘羸老思散䇿渚拂蒹葭寒嶠穿蘿蔦幕此身仗兒僕高興潛有激孟冬方首路强飯取崖壁歎爾疲駑駘汗溝血不赤終然備外飾駕馭何所益我有平肩輿前途猶凖的翩翩入鳥道庶脫蹉跌厄廊廟之具裴施州杜甫寄裴施州詩云云宿昔一逢無此流金鐘大鏞在東序氷壺玉鑑懸清秋自從相遇减多病三嵗為客寬邊愁堯有四嶽明至理漢二千石真分憂幾度寄書白鹽北苦寒贈我青羔裘霜雪廽光避錦袖蛟龍動篋蟠銀鈎紫衣使者辭復命再拜故人謝佳政將老以失子孫憂後來況接才華盛雞號黑暗通蠻貨胡人謂犀為黑暗蘇子瞻送喬施州詩恨無負郭田二頃空有載行書五車江上青山橫絶壁雲間細路躡飛蛇云云蜂閙黃昏採蜜花共怪河南門下士不應萬里向長沙一别施州向十霜黃魯直寄施州張使君詩云云傳聞佳句望風降空弮不易當堅敵振臂猶思起病創夜郎自古流遷客黃魯直和張仲謀送别詩云云聖世初投第一人不是施州肯回首五溪三峽更誰親外邑看君自是青田質黃魯直次韻清江簿趙彥成詩日轉溪山幾百遭厭聞虎嘯與猿號笙歌忽把二天酒風雨猶驚三峽濤已作齊民尋要術安能痛飲讀離騷云云清唳當聞徹九臯四六巫峽故疆清江名郡民雜侏􅍣俗稱純朴眷惟分虎之邦乃近啼猿之境夜郎郡蠻貊之邦胡然惠顧裴施州廊廟之具行矣召還朱轓皂蓋暫輟為太守之行玉鑑氷壺敢重獻詩人之句紹慶府彭水黔江建置沿革禹貢荆州之域楚地翼軫之分野古蠻夷地戰國時楚威王使莊蹻將兵略江上自巴黔以西屬楚秦惠王請以武關之外易黔中地昭王使司馬錯攻楚黔中拔之秦武安君定巫黔中初置黔中郡漢改為武陵郡武帝於此置涪陵縣蜀先主又於五溪立黔安郡晉永嘉後地沒蠻夷宇文周時涪陵蠻田思鶴以地內附因置奉州又改黔州自周隋州郡易名遂與秦漢黔中犬牙難辨隋為黔安郡唐改黔州唐末升武泰軍移黔南就涪州為行府皇朝因之太宗朝復歸黔置理所後改紹慶府今領縣二治彭水事要郡名黔中黔安黔南並郡志風俗巴渝同俗隋地理志草木少凋舊經陰雨多晦云云少有蠶絲同上云云人多布衣蠻獠雜混同上地接蕃蠻境連桂廣雖稱州號人户星居道路崎嶇多阻崖壁行處則跣足露頭契約則結繩刻木號為難治黃魯直黔江縣題名記黔工縣治所蓋楚開黔中郡時歌羅蠻聚落也於今為縣二鄉七里戶千有二百其秋賦庸雇不登三十萬錢以地産役於公者八十有五其義軍二千九百招諭夷自將其衆者五百七十其役於公之人質野畏事大略與義軍夷將領不殊也使之非其義或跳梁不為用决訟失其情或虜掠以償直暗則小智者亦溷疆畔而為欺懦則細黠吏亦能用其柄市麝臍以百計市蜂蠟以千計則夷以長吏為侮寬則以利啖胥徒而茍免猛則鳥獸駭而走箐中矣至令得其人櫛垢爬癢民以安堵而異時號為難治吾不知其為說也形勝古蠻蛋聚落晏公類要云相傳楚子滅巴巴子兄弟五人流入五溪各為一溪之長一說謂五溪蠻皆槃瓠子孫自為統長乃云云為楚西南徼道權載之黔州觀察使㕔記黔中云云在漢為武陵莊蹻循江以略地唐䝉浮船以制越地近荆楚舊經云云候如巴蜀五溪襟束同上云云為一都㑹多倚溪巖舊經路途闊遠亦無館舍凡至宿泊云云就水造餐鑽木出火土産茶鹽舊經云夏供茶蠟秋輸米糧彭水縣有鹽泉有左右監官收其課山川狼山郡國志云丨丨出野狼眼在背上能食諸獸蒟醬山在故都濡縣壺頭山方輿記山形似壺馬援曽戰于此摩圍山在彭水縣西隔江四里與州城對岸夷獠呼天曰圍言此山摩天故名伏牛山在彭水縣方輿記山左右有鹽井州人置竈煮以充食用三峿山九域志云昔鄧芝用師于此小歌羅山在黔江縣東北四十九里內江相傳江心有石魚見則豐稔之兆杜甫送弟使蜀詩數杯巫峽酒百丈內江船巴江又名白沙涪陵江自本州西北流入涪州三百二十里入蜀江彭水在候寧縣即古黔中地五溪謂酉辰巫武元等五溪賈耽四夷述云即武陵丨丨蠻之西界館驛歌羅驛黃魯直嘗作竹枝歌題丨丨丨云撐崖拄谷蝮蛇愁入箐攀天猿掉頭鬼門關外莫言遠五十三驛是皇州浮雲一百八盤縈落日四十九渡明鬼門關外莫言遠四海一家皆弟兄尺五攀天天慘眼鹽烟溪瘴鎖諸蠻平生夢亦未嘗處聞有鴉飛不到山風黑馬跪驢瘦嶺日黃人度鬼門關黔南此去無多遠想在夕陽猿嘯間竹竿坡面蛇倒退摩圍山腰胡孫愁杜鵑無血可續淚何日金雞赦九州命輕人鮓甕頭船日瘦鬼門關外天北人墮淚南人笑青壁無梯聞杜鵑古跡黔之驢柳文黔無驢有好事者船載以入則無可用放之山下虎見驢龎然大物也以為神它日驢一鳴虎大駭然往來視之覺無異能稍近益狎驢怒蹄之虎喜曰技止此耳因跳踉大口闞斷其喉盡其肉乃去名宦馬植自安南都護徙黔州觀察使太平廣記植移黔南時維舟岸下夜見白衣吟曰截竹為筒作鳯吹鳯凰池上鳯凰飛勞君更向黔南去即是釣陶萬物時公不久遂拜相人物柳莊敏漢人舉孝亷有碑在州治名賢長孫無忌郡志謫黔州皇朝蕭公名犯髙廟諱寰宇記載歸州紫極宮黃魔神廟記云咸通壬辰瀚林蕭公自右史竄黔南遊三峽次秭歸夢神人曰險不足懼公詰之曰我黃魔神也居紫極宮之西北隅將祐助明公出于此境尋為宰相黃庭堅豫章人以修實録被謫黔中與秦太虛書曰某屏棄不毛之鄉以禦魑魅耳目昏塞舊學廢忘是黔中一老農耳題詠山色夜郎西唐人送侍御赴黔中詩莫向黔中丨路令人到欲迷水聲巫峽裏丨丨丨丨言語多重譯唐詩紀事竇羣詩云云壺觴每獨謠地遠官無法劉長卿送任侍郎黔中充判官詩不識黔中路今看遣使臣猿隨萬里客鳥似五溪人云云山深俗易淳須令荒徼外亦解懼埋輪郡響蠻江漲許常寄黔南李校書詩從我巫峽外吟興更應多云云山昏濁雨過官俸請丹砂杜荀鶴送人尉黔中詩盤山行幾驛水路復通巴峽漲三川雪圍開四季花公庭飛白鳥云云知尉黔中後高吟採物華白白江魚入饌來杜甫送王判官扶侍還黔中詩大家東征逐子回大家指其母風生洲渚錦帆開青青竹笋迎船出云云離别不堪無限意艱危深仗濟時才黔陽信使應稀少莫怪頻頻勸酒杯四六昔號蠻邦今升潛府維黔中之古郡接湖右之要區使蠻烟瘴雨之中沐瑞露和風之化槃瓠子孫頗雜蠻風之狼戾羅歌聚落蓋慿巖險之崎嶇山深而俗易淳雖載劉長卿之句夷雜而號難治尚稽黃太史之言重慶府巴縣壁江江津建置沿革禹貢梁州之域東井輿鬼之分野西南有巴國因水以為名武王伐紂巴蜀之屬髳微預焉武王克商封宗姬支庶於巴是為巴子春秋時亦為巴國戰國時巴與蜀俱稱王秦以其地置巴郡劉璋分墊江以上為巴郡理安漢縣墊江以下為永寧郡理江津縣蜀先主又以固陵為巴東郡故巴郡分而為三蜀後主屬益州曹魏屬梁州梁武陵王置楚州後魏改為巴州周愍帝又改楚州隋改渝州復為巴郡唐為渝州改為南平郡復為渝州皇朝因之崇寧改恭州以光宗潛藩升重慶府今領縣三治巴縣本路提刑置司事要郡名南平三巴見沿革秦蜀分為丨丨丨丨記閬白二水東南流曲折三回如巴字故曰丨丨風俗剛悍生其方文選蜀都賦云云風謠尚其武奮之則賨旅玩之則渝舞鋭氣剽於中葉蹻容盛於樂府善歌舞蜀都賦注引應劭風俗通云巴人剽勇高祖為漢王時閬人范目說高祖募取賨人定三秦封目為瓷鳬鄉侯並復除目所發賨人盧朴呇鄂度夕襲七姓不供租賦閬中有渝水賨人左右居鋭氣善舞髙祖樂其猛勇數觀其舞後令樂舞習之晉禮樂志巴部丨丨丨高祖愛其舞韶樂府習之巴渝舞是也重屋纍居華陽國志郡治江津地勢峻急皆云云結舫水居五百餘家閣欄以居寰宇記今渝之山谷中有狼鄉俗構屋高樹謂之閣欄不解絲竹唯敲銅鼓觀木葉以别四時父子同諱夫妻共名商販旁午舊題名記二江丨丨舟楫丨丨形勝西控𤏡道郡縣志東連魚復云云北接漢中南至牂牱在岷江之北寰宇記巴城云云漢水之南承三江之㑹華陽志云云蜀將古城郡縣志先主令李嚴鎮此又鑿南山欲㑹汶涪二水使城在孤洲上㑹嚴被召不卒其事今鑿處猶存山川浮山在巴縣堯時洪水不沒故名巴山在巴縣西南百二十里其山高聳上有白水相傳黃帝於此山合神丹方山在巴縣五十里瀛山在故南平縣西百七十里以其高峻象海片之蓬瀛故名塗山重慶太平濠州皆有之然重慶非禹之丨丨也白崖山在府城北三十里有市及寺君井山在江津縣西五十里有井泉常以水之盈縮卜牧宰之賢否重壁山在壁山縣四面高山中有平田周二百里龜停山在江津縣西一里岷江中其山若龜形明月峽在巴縣石壁高四十丈有孔若丨丨又有廣德等丨亦謂之三峽巴江在巴縣水折三回如巴字鮮于侁詩三川㑹合繞城下巴字體勢何盤盤却疑天工敕水帝戲寫鳥迹傾波瀾涪江在巴縣西來自合州西北至州城北㑹岷江岷江在巴縣東北來自江津縣界至州城北合涪江內外江水自渝上合州者謂之內江自渝西戎瀘上蜀者謂之外江杜甫詩云百丈內江船白水在州南二百二十里其色如練故名赤水在故南平縣西四里井泉溫泉在城北百餘里有寺查仲本詩浴罷臨泉一整冠令人搔首憶長安御湯搖蕩雙龍影疑是羌人簇馬鞍樓圃香草樓在江津縣西南旁有仙池多植丨丨故名荔支圃在巴縣名宦張汭漢人為巴郡太守有德政碑王濬晉人蘇子瞻答李鄂州書晉丨丨為巴郡太守巴生子皆不舉濬嚴其科條寬其徭役所活數千人及後伐吳所活者皆堪為兵其父母戒之曰王府君活汝汝必死之柳玭昭宗時以渝州刺史遷瀘州刺史柳氏自公綽以來世以孝悌禮法為士大夫所宗玭嘗戎其子弟曰凡門第高可畏不可恃也立身行已一事有失則得罪重於他人死無以見先人於地下矣皇朝張浚自山南府士曹改秩調恭州司録參軍人物謁渙江津人為汝南太守然溫江津人為度遼將軍桂陽郡太守皇朝逢時行巴縣人嘗知萬州紹興初以斥和議忤秦檜坐廢題詠山帶烏蠻濶杜甫渝州候嚴侍御不到下峽詩云云江連白帝深船經一柱過留眼共登臨看君妙為政杜甫送鮮于萬州遷巴州詩京兆先時傑琳琅照一門朝廷偏注意接近與名藩祖帳棑舟數寒江觸石喧云云他日有殊恩思君不見下渝州李白峨眉山月歌夜發清溪向三峽云云故自渝南擲郡章劉禹錫送周使君罷渝州歸郢中詩思君郢上吟歸去云云荔支春熟向渝瀘鄭谷之瀘郡遇裴晤詩我拜師門更南去云云四六中巴古郡西蜀要衝旌麾臨巴字之江襦袴藹渝歌之俗有易擾難安之俗多欺孤負弱之奸盛蹻容而剽鋭氣盡屬惠綏妙為政而有殊恩竚聞命召渝為潛邸獨據十四州之上游帝念遠民必付二千石之良吏南平軍南川隆化建置沿革禹貢梁州之域東井輿鬼之分野春秋戰國為巴地秦屬巴郡西漢屬巴郡之江州及枳縣地漢武開西南夷置牂牱郡今軍之南則牂牱郡之境北則巴郡之故疆也東漢晉宋齊因之後為蠻夷所據唐初置南州更名𤏡州復為南州治南川縣此南州建置之本末也南平獠遣使內欵以其地隸渝州太宗分渝州巴縣南界至南平州改為霸州此南平州建置之本末也二郡俱在渝南境唐衰棄之皇朝平蜀南州即先歸化升為懷化軍隸渝州其後收復疆土建南平軍今領縣二治南川事要郡名南平渝南牂牱並郡志風俗風俗朴野王元申簿尉㕔壁記云云服食儉陋化為中華何麒軍學記四民冠昏相襲耕桑被野云云圖經又云自唐賔服開拓為郡今衣冠宮室一皆中國真景元送南平江知軍序南平故漢巴渝地至唐猶以獠名我朝元豐中聲教遠浹始即其地置軍焉百三四十年間浸以道德薰以詩書斌斌焉與東西州等矣紹定四年冬豫友江君往為之守將行請曰南平地雜民夷有赤子龍蛇之異擾而馴之政未易也將何以教我豫惟江君之先象州以吏治名當世江君以世學踵儒科嘗令靖之永平即倅靖廉白清簡人便安之以其治靖者治南平直易易耳顧弗自足而求助於豫此樂正子好善之心孟氏所謂優於天下者也推以治平何鄉不可獨南平乎哉然嘗竊歎古之為政者變戎而華今之為吏者驅民而狄昔者箕子八條之化孔子九夷之居皆聖人事吾不敢以律後世若錫光任延漢守將爾於交趾能興其禮義之俗於九真能迪以父子之性是不曰變戎而華乎今之叨虐吏羅市郡縣細者為虻為蚋以噆人之膚大者為猰㺄為鑿齒以血人之顱以刃其家以封其孥於是民始蒿然喪其樂生之志而甘自棄於盜賊之徒矣是不曰驅民而狄乎故為政者以厚視其人雖戎而華可也以薄待其人雖民而狄弗難矣循其本而觀之為吏者不自狄其身然後能不狄其民蓋黷貨而忘義者狄也喜殺而偭仁者狄也以中國之士大夫為天子之命吏而其所為無異於狄亦何怪其民之狄哉豫方疾當世之吏穽吾民於狄故因君之請而一吐之儻以為然則願風示屬縣之為吏者使皆懋於仁而聳於義不亦可乎江君曰然遂書以贈尚鬼信巫圖經風俗與恭涪類云云巴蜀之舊形勝南獠故地熊本建軍奏夷人即古巴郡板盾七蠻南獠故地夜郎夷界南平縣題名記云云犬牙相錯藉為保鄣西連𤏡道舊經云云南極牂牱外控諸酋陳復亨判官㕔壁記南平邊夜郎云云圖經又云南平跨漢二郡唐五州之境封疆闊遠控扼蠻夷之要地也跨接溪洞晏殊撰劉孝標墓銘土地曠遠云云山高谷深簿尉壁記四寨九堡自熊本平夷獠木斗得地五百里云云建南平軍山川瀛山在軍西北七十里周廽九十里崖壁峭峻林翳葱蔚山類三峽有四十八面而皆不同劉觀臺詩山盤四十八面險是也南山在瀛山之對岡勢甚遠其上平廣有石笋峯嶄然秀拔最高山在軍東南九十里高十五里林箐深密視衆山猶培塿永隆山在隆化縣西二十餘里縣以此名鳯凰山在隆化縣北七十二里以形得名九遞山在隆化縣東六十里絶壁如銀色人視其色之昏明以候晴雨上有水瀦為洞又有石龍初非鐫刻洞以龍名獅子峯與鳯凰山相距不數里兩山為一邑之冠㺐崖在軍之西有獠居之匱崖在軍東南百里峭崖壁立有洞其門有匱白錦堡去播州三百里係納土官楊光榮子孫世襲守之鹿箇堡去溱溪三十里其先夷大姓木匱大觀中納土賜姓趙名亨子孫亦世襲三溪蓋𤏡溪東溪葛溪三溪水合流也𤏡溪從夜郎境流過軍城下東溪在軍之西北上有小市有孝感橋紹興甲戌有里婦從其姑過溪其姑墮水即隨入拯之漂至灘下忽若有人扶之而出兩人俱活故以名橋四十八渡水在隆化縣東三十里兩山壁立一水灣環其中涉是溪者凡四十有八渡其門有穴如户牖堂閣雲山堂劉夷叔詩山繞郡樓秋過雨月臨池樹晚生烟北閣在軍治規模宏壯園驛塞樂園在軍西一里南川驛蒲公詩鶯花非舊棟宇尚唐餘漢名宦皇朝陳少遊為南平縣令有政聲改桂州刺史劉孝標守南州日請置郡縣後建軍壘遠人安之晏殊為撰墓銘人物尹珍漢武帝時人從汝南許叔重受五經還牂牱以教授其鄉於是南域始知學題詠封疆接播溱趙彥邁詩風俗連巴楚云云蕞地曾無一掌平趙彥邁嵗熟詩云云由來作郡亦强名峯連萬翠山橫翠川合三溪水繞城崖深經夏不融雪李曼詩四六出綸西掖分竹南川內雜蠻風外連夷界地析古之牂牱俗雜今之溪洞禹九州之域既嘗入於版圖漢五溪之蠻亦久漸於聲教置軍而壘肇從劉孝標之時變戎而華更驗真西山之序方輿勝覽卷六十
