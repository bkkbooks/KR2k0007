body:
  text: 方輿勝覽卷五十六宋祝穆撰威州保寧通化建置沿革本漢徼外冉駹之地秦地東井輿鬼之分野漢武帝開之屬汶山郡蜀劉禪時姜維馬忠等討汶山叛羌此其地也自晉以後羌夷或降或叛隋討叛羌以其地置薛城戍屬㑹州唐初白茍羌首領鄧賢佐內附於姜維故城置維州以統之太宗時叛羌州縣皆罷復立維州始以羈縻州屬茂州後為正州改維川郡復為維州五代王氏孟氏繼有其地徙就中州城即今治也皇朝平蜀後以京遞發濰州誤至維州因改曰威州類要唐置此州以威制西羌故也今領縣二治保寧事要郡名維川維城風俗工習射獵隋地理志地本氐羌人尤徑悍性多質直云云文羯羊皮􅛘䩙郡國志云云懸珠為飾同上婦人多戴金花穿云云形勝冉駹之地九域志南界江城李宗諤圖經云云岷山連嶺而西不知其極北望雪山同上云云積雪如玉東望成都同上云云若在井底據高山絶頂李文饒集云云在瀘戎平川之衝是漢地入邊之路三靣臨江圖經云云是西蜀按吐蕃之要衝地甚險固元和志地接蕃部通略韓億知益州以維茂二州云云以其嵗至永康官場鬻馬因熟道路恐覘兩川遂奏徙黎州境上山川雪山在保寧縣西南連乳川白茍嶺山有九峰山冇積雪春夏不消花崖山在保寧縣水合大江高碉山今州縣治並據此山三靣懸崖姜維故城在焉定廉山在故定廉縣東十里下有鹽溪白茍嶺與雪山連沱水東經保寧至汶州與大江合赤水在保寧縣古跡無憂城圖經李德裕築吐蕃號曰丨丨丨名宦王重華司空表聖集云重華深究韜鈐從擊胸奴著勞盟府厯維州刺史皇朝桂堂彭山人熙寧登第諸司薦堂守威是時羈縻保霸二州交惡堂自攜牛酒至通化軍㑹二州酋長諭以禍福乃降題詠窗含西嶺千秋雪杜甫詩云云門泊東吳萬里船四六疏榮漢札作鎮維城外聯蕃郡內控蜀都得名實自於姜維築壘亦由於德裕虎符分鎮蓋將威制於羌戎鳳詔趣裝行即班高於禁籞身被羯羊蓋雜夷人之俗符分銅虎有隆郡將之權邛州臨邛大邑依政蒲江安仁火井建置沿革禹貢梁州之域秦地鶉首之次天官東井輿鬼之分野秦為蜀郡地今州即蜀郡之臨邛縣地自滇以北君長以十數漢武帝十三部刺史在益州之部東漢屬蜀郡晉因之宋及齊梁不置郡縣惟豪家能服獠者名為保主揔屬益州梁益州刺史蕭範於蒲水口立栅以備生獠名為蒲口頓武陵王紀於蒲口頓改置邛州西魏置蒲陽郡後因置臨邛縣隋廢郡為縣屬雅州唐割雅州五縣置邛州治依政縣移治臨邛縣僖宗置永平軍皇朝復為邛州今領縣六治臨邛事要郡名臨邛南接卭崍山因名臨卭邛崍圖經序風俗其人敏慧隋志臨邛風俗大率與漢中不别云云頗慕文學郡多富人司馬相如傳臨邛多富人卓王孫僮客八百人程鄭赤數百人華陽國志秦始皇徙上郡人以實之又按史記卓王孫之先趙郡人因遷徙到臨卭則是秦徙民之驗也夷獠相雜寰宇記云形勝外接邛筰蜀自臨邛外即接邛筰界圖經序山曰邛崍浸曰邛水淵曰邛池毛曰邛竹東接大城通判題名記云云南通沈黎越嶲之邦後接秦塞筰都之表土産鹽井蘇子瞻志林蜀去海逺取鹽於井陵州井最古淯井富順監亦云久矣惟卭州蒲江縣乃祥符中民王鸞所開利入至厚自慶厯皇祐以來蜀始創筒井用圜刀鑿山如碗大深者數十丈以巨竹去節牝牡相銜為井以隔橫入淡水則鹹泉自上又以竹之差小者出入井中為桶無底而竅其上懸熟皮數寸出入水中氣自呼吸而啓閉之一筒致水數斗凡筒井皆用機械利之所在人無不知後漢書有水鞲法此法淮蜀中鐵冶用之大略似丨丨取水筒太子賢不識妄以意解非也張上行曰此郡昔有四利今有四害曰茶曰鹽曰酒曰鐵為利有四他郡或有其一或有其二而吾邛獨全昔以為利民競豪富今以為害民皆貧薄山川霧山與石城山相連張少俞詩丨丨環合自雲川户有青溪種玉田萬木桃花不知處幾人曽得問秦年邛崍山山海經云山出邛竹杖蜀記漢張騫奉使尋河源得高節竹植於邛山堪為杖白鶴山在城西八里常璩曰臨邛名山曰四明亦曰羣羊即今白鶴也漢胡安嘗於山中乘白鶴仙去弟子即其處為白鶴臺魏華父營造記曰州之西直冶城十里所有山曰白鶴林麓蒼翠江流縈紆蔚為是州之望山故為浮屠之宮自隋唐迄令庵院凡十四所逺有胡安先生授易之洞近有常公諌議讀書之庵泉有滴珠樹有木蓮白鶴有臺玉兔有蹤中峰並美平雲之觀西巖翠屛萬竹之境皆山中勝處壁間繪像率范瓊杜揩邱丈播諸人名筆雖丹青剝落而筆法具在七盤山在臨邛銅官山在臨邛縣南二里鄧通所封史記蜀卓氏之先趙人也秦破趙卓氏夫妻推輦而行曰吾聞岷山下沃野有蹲鴟乃求逺遷致之臨卭即山鑄錢即此山也華陽國志臨邛縣有石山有石鏡大如蒜子火燒成鐵其剛因置鐵官漢文帝時以銅鐵山賜鄧通通假民卓王孫嵗取千匹故王孫貨纍巨萬億鄧通錢亦遍布天下鳳凰山在大邑縣北平山在依政縣二十四化之一也相臺山在火井縣東北唐袁天綱登此山以相縣治故名青霞嶂劍南詩藁云丨丨丨碧玉潭皆山水佳處詩云千巖角逐互吞吐一峯拔起矜崔嵬日光微漏見潭底水氣上薄雲成堆後巖在鳳凰山下七八里水尤竒絶陸務觀詩云丨丨在眼中飛去無羽翼西湖距城八里邛水出邛崍山下入青衣江䣢水在臨卭布濮水在臨邛縣出獠界來合火井牡丹池在大邑縣牡丹平或纎芥墜其水中則鴛鴦野鶩即銜去之浴丹池在蒲江縣崇真觀世傳軒轅修煉於此井泉火井在臨邛縣西南八里文選蜀都賦丨丨沉熒於幽泉高熖飛煽於天垂注曰欲出其光先以家火投之須臾隆隆如雷聲熖出通天光輝十里以筒盛之接其光而無炭今無復見異苑云當漢室之隆則炎赫彌熾暨威靈之際火勢漸微諸葛一闞而更盛故曰高熖飛煽於天埀井有二水取井火煮之一斛水得五斗鹽家火煮之利無幾虎擘泉在大邑縣之鳳凰山文與可記唐契覺道人結庵于此有虎為之擘地出泉樓閣南樓濱大江翠屏閣在西巖陸務觀詩把酒孤亭半日留四巖獨擅鶴山秋亭館平雲亭在大邑之靜惠山蓋蜀郡文忠范公所居公熙寧間上疏論新法致仕既還蜀窮山水勝處徜徉此山詩云平日蘭溪隱春雲蕙帳眠定應猿鶴怪歸去執蘆鞭刀磴道誰云險肩輿亦可行坐來知日永立處與雲平信美亭勾龍庭實丨丨丨詩云䣢罌古渡水西頭東靣一亭無限幽火井江潮盤附郭浮屠天際表吾州萬松亭在臨邛三十里靈巖之絶頂盡得一境江山之勝白鶴館館中有文與可所作怪木竹石真蹟號曰墨林古跡騎鯨柏在鳳凰山紫柏十圍根盤巨石之上如騎鯨然相如琴臺在臨邛或云在成都文君井在臨邛陸務觀詩落魄西州泥酒杯酒酣幾度上琴臺青鞋自笑無拘束又向丨丨丨上來名宦袁天罡舊史云天罡為火山令按圖經云天罡嘗登相臺山相縣治則當是火井令柏正節丹陽集云杜子美柏中允除官制詩舊注以為柏耆之人以為柏丨丨按杜詩云紛然喪亂際見此忠孝門蜀中冦已甚柏氏功彌存三止錦江沸獨清玉壘昏當是有功於蜀者方是時假子璋反於上元徐知道反於實應而柏丨丨為邛州刺史數有功則是正節無疑矣皇朝楊繼勳司馬君實日厯云楊繼勳以閻門祗候知邛州王均反繼勳伏兵於竹林殱之乘勝逼成都檄諸州皆㑹賊由是不能犯他州文同皇祐問自州判官攝蒲江縣事又通判邛州王介甫送文學士倅邛州詩文翁出治蜀蜀士始文章司馬唱成都嗣音得王楊犖犖漢守孫千秋起相望操筆賦上林脫身選為郎擁書天祿閣竒字校偏傍忽乘駟馬車牛酒過故鄉時平無喻檄不訪碧雞祥問君行何為關隴正繁霜中和助宣布循吏綴前芳豈時為親勞區區夸一方人物嚴遵臨邛人詳見成都司馬相如本傳字長卿成都人素與臨邛令王吉相善相如往舍都亭冨人卓王孫聞令有貴客為具召之并召令酒酣令前奏琴曰切聞長卿好之願以自娛相如為鼓一再行是時卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之相如時從車騎甚都文君竊從户窺心悅而好之相如乃令侍人重賜文君侍者通殷勤文君夜亡奔相如與俱之臨邛盡賣車騎買酒舍乃令文君當壚相如自著犢鼻禈滌器於市中卓王孫恥之不得已分與文君僮百人錢百萬及其嫁時衣被財物居久之以子虛賦得召㑹邛筰之君長願為臣妾乃拜相如為中郎將建節往使至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨邛諸公皆因門下獻牛酒以交歡乃厚分與其女財與男等相如以通邛筰還報天子大恱林問字公孺臨邛人善學揚雄師之甘寧臨邛人仕吳為折衝將軍今廟食於富池口皇朝李公泰依政人纍遷至起居舍人仁宗春秋高未有繼嗣公因侍祠高禖奏賦上嘉納之常安民臨卭人哲宗朝為御史與蔡確有連確為相絶不與通子同亦為言官常同為言官忤時宰出知衢州湖州汪應辰撰墓碑陳賓號白衣御史登第後上書論蔡京之奸魏了翁自號鶴山仕至參政題詠雲水繞重城榮咨道詩平生林壑性客官久羈束得麾卭江隈雖逺愜所欲云云青山長在目緑髮監州册府歸唐許渾送人之任卭州詩云云還家樂事我先知羣童竹馬交迎日二老蘭觴初見時鄉郡榮歸及壯時王介甫送李大防才元知邛州詩朝廷孝治稱今日云云關吏相呼迎印綬兒童爭出望旌麾北堂已足夸三釜南畝當令識兩岐獨我尚留真有命天於人欲本無私四六疏綸涣渥趣鎮臨卭火井標竒珠泉紀勝昔擅銅山之利今夸鹽井之饒過灔澦百牢之關甫兹憑軾叱卭徠九折之坂俄復乘軺胡氏之易相如之賦在漢有聞常公之諫鷠山之文于令尤盛黎州溪源建置沿革禹貢梁州之域天文東井輿鬼分野古西南夷自越嶲以東北君長以十數徒筰都最大秦時嘗為郡縣至漢興而罷自唐䝉使略通夜郎而卭筰之君請為內臣及漢誅且蘭卭君并殺筰侯乃以卭都為越嶲郡筰都為沈黎郡尋罷郡置兩部都尉一治旄牛主外羌一治青衣主漢民並𨽻蜀郡李雄又立沈黎漢原二郡晉立南陰平宋齊並為沈黎郡後周置黎州隋置沈黎郡及登州唐置南登州已而復置黎州改為洪源郡後曰漢源郡復為黎州僖宗又置永平軍國朝復為黎州繼升平陽軍莭度今領縣一治溪源事要郡名沈黎筰都元鼎五年以丨丨為沈黎郡風俗黎常多風梁益記云云雅常多雨嵐霧常晦唐古碑云山林參天丨丨丨丨漢蕃傳易不用錢寰宇記云云漢以紬絹茶布蕃用紅椒鹽馬氊裘椎髻郡守余授朱櫻堂記蠻商越駔云云交錯於闤闠中形勝內捍右蜀圖經云云外捍蠻夷元和志西與蕃接南與蠻接北與羌接南鄰六詔樊柔直侯寶堂記全蜀五十餘州沈黎為襟喉地云云三靣鄰絶澗元和志南唐以來徙治大渡河內而水源在城外韋皋始築今城東西南云云惟北面稍平地多井泉與諸城鎮戍烽火相通誠西南之險要處越嶲邛蜀之中唐古碑云為蜀西門王已盤陀寨記蜀為今日之重地而沈黎又云云關沫若司馬相如傳注張楫曰以沫若水為關沫水出蜀廣平徼外若水出旄牛徼外徼牂柯同上南至牂柯為徼張楫曰徼謂以木水石為界南北二路郡志自黎州清溪關出邛部川經姚州入雲南謂之南路自戍州石門外出魯望昆川經拓東城至雲南謂之北路棄羈縻州寰宇記唐羈縻州五十四皆徼外生蠻本朝太守題名記太祖以玉斧畫大渡河外云云土産卭竹杖生於卭崍山市馬務國朝以後設茶馬買馬兩務成都府市於文黎珍叙等州號川馬梁武陵王紀在蜀十七年有馬八千匹通鑑唐昭宗天復二年朱全忠遣王殷聘蜀蜀王建與之宴殷言蜀甲兵之盛但乏馬耳建乃集諸州馬大閲於星宿山官馬八千私馬四千部隊甚整建本騎將故得蜀之後於文黎雅茂州市胡馬十年之間逺及兹數此川馬之始也山川卭崍山在州北本名卭筰乃卭人筰人界也又曰卭人自蜀入度此山故名卭崍漢書作郲華陽國志作崍水經作來開路記作萊又有卭崍關距州七十里昔有楊氏婦造閣其上登高山在州西五里上有小阜曰望州坡笋筤山在州西北五十餘里有前筤山後筤山多笋故名春時州人百十為羣入山探笋紹興問守臣始立租以贍學嵗收緍錢八十千山又採林木樵蘇者以為衣食之源和尚山在州東南百里與峨眉瓦屋為三乘山常有五色光現天晴極為竒觀白崖山在州西北二百五十里山外即生界險峻不通人跡鏤靈山漢書謂通靈山道也九折坂在邛崍山其坂阻峻曲回九折乃至山上凝冰夏結冬則極寒漢書王陽為益州刺史行部至邛徠丨丨丨歎曰奉先人遺體奈何數乘此險後以病去及尊為刺史至其坂問吏曰此非王陽所畏道耶史對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣風穴在白崖山之右有巨穴如井不知淺深穴口四圍津津如汗問有氣出騰空如白雲須㬰風起怒號如雷里人見雲即知風氣散則風定細則風小盛則風猛窒其穴風雖少而民多瘴開之風如故而瘴亦衰東湖在郡圃方廣十丈架橋其中大渡河寰宇記丨丨丨自吐蕃界經雅州諸部落至黎州東界流入通望界於黎州為南邊要害之地唐時大渡之戍一不守則黎雅邛嘉成都皆擾建隆三年王全斌平蜀以圖來上議者欲因兵威復越嶲藝祖皇帝以玉斧畫此河曰外此吾不有也於是為黎之極邊曩時河道平廣可通漕身自玉斧畫河之後河之中流忽陷下五六十丈河流至此澎湃如瀑從空而落舂撞號怒波濤洶湧船筏不通名為噓口殆天設險以限夷狄父老常云舊有寨將欲將杉木版於楊山入嘉定貿易以數片板試之板至噎口為水所舂沒須㬰但見其板片片自水下浮出蠻人知此益不敢妄有窺伺漢水發源自飛越嶺寰宇記云在漢源縣西百二十里地名通望合入大渡河夏秋常有瘴氣中人為瘧疾橋孫水漢書孫水出臺登縣南入若水顔曰於孫水上作橋也龍池在州東十里蘭若寺前方廣十數丈池上冇龍祠水中有枯楂三株隱然如龍狀觸之則暴風卒雨變於俄頃嵗旱祈雨立應井泉白雲泉在州宅東從白塔谷前取水穴城東以入始以木槽承之分四大井堂亭靜鎮堂在州治宏敞邃深為郡治之冠思仙堂圖經昔有人駕牛採樵入䝉秦化見二老人奕棊其人係牛坐斧而觀局未終老人謂曰非汝久留之所樵者起而斧柯巳爛牛已為枯矣詩云思仙亭上望䝉秦此間昔有避秦人不應棊罷却歸去再見桃花且問津藜㕔在州治小㕔之東隅世傳唐三藏師逰西域經行植藜杖於此云他日州治在此後果遷如師言杖成株高五十尺圍九十尺余授詩神僧曽西征目覽江山異深林植杖藜他日成州地名宦皇朝蕭定基明道中為守郡始無舉進士者得寧誠誨之逾年以文貢禮部虞允文紹興間自鈐轄司幹辦公事攝郡時有㫖下制司市真珠蓋秦檜之意公持之不下㑹檜沒而止題詠偏城越嶲東知郡余授詩絶塞邛崍外云云山含初夏雪林偃夕陽風地僻無參謁同上云云民淳少訟爭睡餘兵放教衙退吏歸耕萬重山裏到沉黎提刑李師錫詩窮冬按部極西陲烏道盤空積雪迷報國憂民寧憚逺云云四六惟此沉黎介在雪嶺疏恩楓陛出鎮藜㕔乃眷憑熊之地實為市駿之區持玉斧以畫河實存深意分銅符而治筰當奉寬恩下方國十行之書寵承委寄陟邛崍九折之坂來任蕃宣石泉軍石泉神泉龍安建置沿革禹貢岷山之域秦地井鬼之分野蜀郡入井三度古氐羌地至秦漢時君長以十數冉駹最大漢誅且蘭君冉駹恐請臣遂以冉駹為汶山郡靈帝以汶江蠶陵廣柔三縣立汶山郡廣柔即今石泉也後周屬汶州隋屬蜀州及㑹州唐改為南㑹州又改為茂州太宗始析汶山地置石泉縣屬茂州其後吐蕃內侵茂州以西被兵無寧嵗皇朝神宗時靜州夷冦邊攻茂州室隴東以孤石泉成都守孫羲叟經畫事宜以石泉為邑介綿茂之間道里濶逺緩急不相應非扼其衝要不足捍外患於是詔改石泉縣為軍今領縣三治石泉事要郡名石泉風俗習尚靜約圖經云云不存侈心形勝西接汶山舊經東北接汶茂同上控扼蕃路夔帥張上行奏狀地介夷壤成都帥席貢議石泉利害國乎衆山之隈圖經山川浮山在龍安縣南二十里有十二峰峭拔如屏梁楊孠真人上升于此石紐山本屬茂州今在石泉縣南石城山在石城縣東一里鳳凰山在軍北二水合流其下三靣山在石泉北六十里三靣內向上有龍湫徑不及四寸而水流不竭瓜菜山在神泉北二里樓真人上升于此松嶺山去龍安縣四十里出附子雖産不可食龍安山在龍安縣北十里有林泉之勝隋開皇中蜀王秀立亭館以避暑赤溪在神泉東北二里天鏵山之衆水出焉黑水在神泉北百餘里合大江水皆大石湍險不通舟綿水在神泉縣西南四十餘里積石水在龍安西三十餘里銀線潭在神泉縣南山相傳白龍往來其問水靣有銀線一道以物撓之即不見波定如故井泉神泉在縣西平地冬溫夏沸氣如附子能愈衆疾堂舍愛山堂在郡治取杜甫為愛丈人山之句祠廟大禹廟在石紐山下江邊按帝王世紀以為鯀納有莘氏臆胸折而生禹於石紐郡人以禹六月六日生是日熏修祼享嵗以為常又見茂州皇朝張上行字道從漢州德陽人登元豐第後㑹石泉夷人犯邊朝廷命孫羲叟帥蜀召公問計公曰按唐王涯傳云吐蕃有兩道一由龍州清川縣抵松州一由綿州威蕃撫抵雞城皆虜險要之處今石泉三十里威蕃亭地名柵底即唐之威蕃柵宜先築堡寨以禦其來次升石泉為軍以重其權然後調思黔義軍以制其暴則收功一時為利後世不然蜀之憂未艾也羲叟盡用其䇿且命公調軍馳步兵至境急擊大破之夷人自是服蜀以無事魏僖守郡十三載治狀最著民思不忘立祠在郡圃雞心山春秋嘗奉之四六雖為小壘實係要衝訟簡獄稀賦微用嗇石紐山乃神禹之所生冉駹郡至漢靈而後創析而置邑昔非廣於封疆升以為軍今欲威於夷落內當寬疲瘵以令民力之蘇外當嚴訓閲以使邊烽之息方輿勝覽卷五十六
