body:
  text: 方輿勝覽卷三十六宋祝穆撰潮州海陽揭陽潮陽建置㳂革禹貢揚州之域牽牛之分野古閩越地秦屬南海郡秦末屬南越漢武屬南海郡今州即漢南海之揭陽縣地晉成帝分立東官郡安帝又分東官之義安郡及海陽縣梁置東揚州又改瀛州陳廢為義安郡隋廢郡置潮州煬帝復為義安郡唐復為潮州改潮陽郡復為潮州皇朝因之今領縣三治海陽事要郡名潮陽古瀛鳯城以鳯皇山得名金城以是州舊屬於金氏鱷渚以丨魚名風俗士篤於文行見韓廟碑州人知書自文公始圖經聮名桂籍自太平興國始同上稻得再熟寰宇記云云蠶亦五收夷獠遂生皇甫持正韓文公神道碑洞丨海丨陶然丨丨鱷魚稻蟹不暴天物形勝大海在其南韓愈祭鰐魚文閩南兩越之界韓愈胡公墓碑在廣府極東韓愈潮州謝表臣所領州云云界上去廣府雖云才二千里然來往動皆經月過海口下惡水濤瀧壯猛難計程期颶風鱷魚患禍不測州南近界漲海連天毒霧瘴氣日夕發作臣少多病年才五十髮白齒落理不久長居瘴癘之地蓋與魑魅鄰茍非陛下哀而憐之誰肯為臣言者山川韓山與州山相對湖山與韓山對其麓寺觀錯立東山在州東文公舊遊之地今多亭榭蛇山皇甫持正送簡師序適潮不顧丨丨鱷渚萬里之險鳯凰山在海陽縣昔有爰居來集因名之山海經南方有戇巨人人面長唇黑身有毛反踵見人笑亦笑笑則唇蔽其面寰宇記有神名山都即此金城山九域志山上有韓木韓愈所植不知其名士人觀其華之疏密以知登第之多寡獅子巖在郡東山坡上雙旌石州東山之二峯東湖在韓山之後四面回環荷花彌望西湖縈繞於州之太平橋下徑湖以橋鱷溪舊名惡溪産鱷魚其身黃四足修尾其形如而舉止趫疾口森鋸齒往往害人鹿走崖岸之上羣鱷嘷呌其下鹿必怖懼落崖亦物之相懾服也按韓愈傳潮之惡溪有鱷魚食民畜産且盡愈令其屬秦濟以一羊一豕投溪水而祝之其略曰鱷魚有知其聽刺史言潮之州大海在其南今與鱷魚約盡三日其率醜類南徙于海以避天子之命吏三日不能至五日五日不能至七日七日不能是終不肯徙也刺史則選材技吏民操強弓毒矢以與鰐魚從事必盡殺乃止其無悔是夕暴風震電起溪中數日水盡涸徙六十里自是潮無鱷魚之患周洪道云韓退之逐鱷事李翺行狀及皇甫湜神道碑皆不載豈以鱷近怪故刪去乎樓榭揭陽樓韓愈建今之韓亭即其地東齊在揭陽縣治丞相梁克家嘗曰館於是梅花忽大開梁賦詩九鼎燮調終有待百花羞澀敢言芳後魁天下不十年登宰輔水簾亭在州東梅花院在倅㕔取陳文惠丨丨庭丨竹青青之句祠廟韓文公廟蘇子瞻作廟碑匹夫而為百世師一言而為天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所為故申吕自嶽降傅說為列星古今所傳不可誣也孟子曰我善養吾浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辨是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起歷唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸於正蓋三百年於此矣文起八代之衰道濟天下之溺忠犯人主之怒而勇奪三軍之帥豈非參天地關盛衰浩然而獨存者乎蓋嘗論天人之辨以謂人無所不至惟天不容僞智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鰐魚之暴而不能弭皇甫鎛李逄吉之謗能信于南海之民廟食百世而不能使其身一日安於朝廷之上蓋公之所能者天也所不能者人也始潮之人未知學公命趙德為之師自是潮人皆篤於文行延及齊民至於今號稱易治信乎孔子之言君子學道則愛人小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入為艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公為師民既恱服則出令曰願新公廟者聽民歡趨之卜地於州城之南七里期年而廟成或曰公去國萬里而謫于潮不能一嵗而歸殁而有知其不眷戀于潮也審矣軾曰不然公之神在天下者如水之在地中無所往而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元祐十年詔封公昌黎伯故榜曰昌黎伯韓公之廟潮人請書其事于石因為作詩以遺之使歌以祀公其詞曰公昔騎龍白雲鄉手抉雲漢分天章天孫為織雲錦裳飄然乘風來帝旁下與濁世掃粃糠西遊咸池略拱桑草木衣被昭回光追逐李杜參翺翔汙流籍湜走且僵滅沒倒影不能望作書詆佛譏君王要觀南海窺衡湘歷舜九疑吊英皇祝融先驅海若藏約束鮫鱷如驅羊釣天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於粲荔丹與蕉黃公不少留我涕滂翩然被髮下大荒古蹟韓木楊廷秀詩云笑為先生一問天身前身後兩般看亭前樹子關何事也得天公賜姓韓名宦裳衮為刺史所歷有丞相嶺韓愈以論佛骨貶潮州刺史謝表云與官吏百姓等相見具言朝廷治平天子神聖威武慈仁子養億兆人庶無有親疏逺邇雖在萬里之外嶺海之陬待之一如畿甸韓湘公之姪孫落魄不羈嘗賦詩云解造逡巡酒能開頃刻花公曰子安能奪造化開花乎湘曰直易事耳取土聚之以盆覆其上須臾曰花已發矣及啓視之花葉上有小金字乃詩一聫云雲橫秦嶺家何在雪擁藍關馬不前公亦莫曉其意湘曰事久乃驗後公以言佛骨事貶潮州途中俄有一人冒雪而來乃湘也謂公曰頗憶前日花上之句乎此地即藍關也公嘆異乃足成一聫曰一封朝奏九重天夕貶潮陽路八千欲為聖明除弊事豈於衰朽計殘年云云知汝逺來因有意好收吾骨瘴江邉湘曰公非久即當回矣遂别而去李德裕為司户皇朝陳堯佐類苑陳希元以言事切直謫潮州通判時潮人張氏子濯於江邉為鰐魚食之公曰昔韓吏部以文投惡溪鰐為逺徙今鰐魚食人則不可赦矣乃命吏督漁者網而得之因鳴鼓告其罪戮之于市人物趙德韓文公請置鄉校牒云丨丨秀才排異端而宗孔氏皇朝許申為本路漕詳見惠州吳復古字子野有道之士見知於待制李師中曰白雲在天引領何及蘇子瞻名其室曰逺遊且為銘名賢趙鼎紹興間坐與秦檜不協安置潮州中丞詹大方乞竄鼎逺方乃移吉陽軍時鼎子汾力請侍行鼎不忍使之俱死瘴鄉乃手書付之曰紹聖初吕微仲丞相謫嶺南惟一子曰景山愛之不令同行而景山堅欲隨去將過嶺吕顧其子謂曰吾萬死何恤汝何罪欲俱死瘴鄉耶我不若先死尤有後也吕遂縱飲而死吾不令汝侍行亦微仲意也微仲大防字也題詠鱷魚大於船韓愈詩云惡溪瘴毒聚雷霆常洶洶云云牙眼怖殺儂颶風有時作同上詩州南數十里有海無天地云云掀擹真差事鱟實如惠文韓南食貽元十八詩云云骨眼相負行蠔相粘為山百十各自生蒲魚尾如蛇口眼不相營蛤即是蝦䗫同實浪異名章舉馬甲柱鬭以怪自呈其餘數十種莫不可歎驚我來禦魑魅自宜味南烹調以鹹與酸芼以椒與橙腥臊始發越咀吞面汗騂惟蛇舊所識實憚口眼獰開籠聽其去鬱屈尚不平買爾非我罪不屠豈非情不祈靈珠報幸無嫌怨并聊書以記之又以告同行海氣昏昏水拍天韓詩潮陽未到人先說云云魚鹽城郭民熙熙陳希元送潮州李孜主簿詩云潮陽山水東南竒云云海邊鄒魯是潮陽陳希元送王生及第歸潮陽詩休嗟城邑住天荒已得仙枝躍故鄉從此方輿載人物云云四六演綸鰲禁剖竹鳯城城號鳯棲溪傳鰐去眷今古瀛實望南粵惟時嶺右莫盛潮陽惟潮陽之偏壘實廣右之奧區封疆雖𨽻於炎方雖境土有閩廣之異文物不殊於上國而風俗無潮漳之分千里秀民已習韓昌黎之教纍朝故老能言陳文惠之賢土俗熙熙無福建廣南之異人文郁郁自昌黎趙德而來魚佩虎符香自凝於燕寢鳯城龍首患何有於鰐魚文章政事曽逄嶺表之韓陳氣習風聲今號海邉之鄒魯梅州程鄉建置㳂革禹貢揚州之域牽牛之分野古閩越地秦漢並屬南海郡晉屬東官郡晉末及宋並屬義安郡梁屬東揚州又改屬瀛州隋置潮州而程鄉以縣屬焉煬帝屬義安郡唐復屬潮州僞漢劉氏割潮之程鄉縣置敬州皇朝以敬州犯翼祖諱改名梅州賜名義安郡中興以來廢而復置今領縣一治程鄉事要郡名義安風俗土曠民惰圖經云云而業農者鮮悉藉汀贑僑寓者耕焉其俗信巫尚鬼同上云云捨醫而即神形勝在廣之極東同上介汀贑之兩間同上云云土産菱米同上不知種之所自出植於旱山不假耒耜不事灌溉逮秋自熟粒米粗糲山川西陽山在程鄉縣東南四十五里明山在州東三十里相傳昔有叟黃姓者採茶於山值兩人坐石而奕遺叟以拳石歸視之白金也叟後來亦絶粒不知所終東巖在州東五里西巖在州西七里中有蘭若元祐間元城嘗登覽賦詩南田石洞在州西北六十里郡之名士古姓者詩云仙客有靈千古在洞門無鑰四時開石窟洞距城八十里中有石鼓天窗又有小溪程江在州西北七十里蓋因程敀姓氏而名百花洲在城南介兩水之間古䜟云百花洲尾齊州前此地出狀元井泉曽井曽姓者所鑿泉甘而清人若瘴癘一㰱疾即止亭樓東亭在東城上銜逺山吞長江為一郡登覽之勝望雲樓在城上名宦方漸知梅州嘗謂梅人無殖産教以讀書人物程敀圖經云不知何代人或云隋人家于程江口性嗜書恬榮進結廬江濵環堵蕭然人服其行義有不平不詣官府而質於敀名賢皇朝劉安世紹聖初章子厚入相公謫知南安軍又貶英州徙梅州先生謫南七年未嘗一日病問其故則曰絶欲斷酒以是無恙後北歸十年壽幾八十張致逺詩曽井有泉消毒瘴程江無屋祀髙賢題詠市小山城寂楊廷秀詩云云船稀野渡忙金暄梅蘂日玉冷草根霜只為梅花也合來楊廷秀云自彭田鋪至楊田道傍梅花十餘里有詩云一行誰栽十里梅下臨溪水恰齊開此行便是無官事云云循州過了到梅州楊廷秀題瘦牛嶺行盡天涯意未休云云平生不慣乘肥馬老去須教過瘦牛深入循梅瘴癘鄉前人云云煙雲浮動日蒼凉連年踏遍嶺南土賴有仙翁肘後方四六疏榮魏闕出守程江眷是義安介于東廣析隋唐之一縣雖號偏州介汀贑之兩間頗存獷俗昔由隋縣剖符竹以更新今似誠齊為野梅而一到中和宣布洗蠻煙瘴雨之餘稚耄歡呼在春風和氣之內惠州歸善海豐博羅河羅建置㳂革古南粵之地星紀之次秦屬南海郡漢因之今州即漢博羅縣之地也梁置梁化郡隋置循州煬帝改龍川郡唐復置循州今惠州本循州之舊理也僞漢劉鋹移舊循州立禎州國朝避仁廟諱改曰惠州今領縣四治歸善事要郡名惠陽羅浮龍川浮陵皮日休有浮陵集鵝城舊經相傳有古仙放木鵝流而至于此因建城故至今稱為丨丨鵝嶺風俗吾州以東坡重圖經潮州以昌黎重云云文物不下他州郡學記古成之第進士張宋卿祕郎魁南宫皆惠人為南越倡故此邦云云盤游飯谷董羔土人好造盤游飯取鮓蒯膾炙皆埋之飯中又好作谷董羔取凡飲食雜烹之陸道士詩投醪谷董羔鍋口掘窟盤遊飯碗中蘇子瞻見之大喜啖蜜唧蘇子瞻詩曰朝盤見蜜唧夜枕聞鵂鶹蓋土人取鼠未生毛開眼者飼以蜜以箸挾而啖之謂之蜜唧以其唧唧作聲也鵂鶹者惡鳥土人惡之紅螺白餅紅螺蜆屬也冬間甚盛土人多以配白酒故名形勝軒轅所居皮日休題羅浮云乃昔軒轅皇帝所居南海之濵郡志山川羅山在博丨西北三十里漢志浮丨自㑹稽浮來博於丨丨故又名博丨丨羅浮記云蓬萊之一島堯時洪水所漂浮海而來與丨丨合而為一今山上猶有東方草木及翡翠五距越王山雞元和志山之峯四百三十有二南越志髙三千六百丈周回三百二十七里十五嶺三十二峯九百八十瀑泉茅君內傳曰丨浮丨有洞周回五里名曰朱明曜真天又曰勾曲洞天東通王屋北通岱西通峨眉南通丨浮是也丨有洞房石室七十里所有巨竹皆十圍謂之籠葱竹有瀑布垂流三十仞有竒石勢如削成謂之石樓山有上湖岸周回數里常應海潮又云山有鐡橋石柱人罕到者又有啞虎巡山晉葛洪為岣嶁令遂將子姪至廣州刺史鄧嶽留不聽去乃止丨浮丨劉禹錫丨浮丨見日詩陰陽迭用事乃俾夜作晨咿喔天雞鳴扶桑色昕昕赤波千萬里湧出黃金輪蘇子瞻同過子遊丨浮丨詩人間有此白玉京羅浮見日雞一鳴南樓未必齊日觀欎儀自欲朝朱明東坡之師抱朴老真契久已交前生玉堂金馬久流落寸田尺宅今誰耕道華亦嘗啖一棗契虛正欲仇三彭鐡橋石柱連空橫杖藜欲趂飛猱輕雲溪夜逄瘖虎伏斗壇晝出銅龍獰小兒少年有竒志中宵起坐存黃庭近者戲作凌雲賦筆勢髣佛離騷經負書從我盍歸去羣仙正草新宫銘汝應奴𨽻蔡少霞我亦季孟山𤣥卿還須略報老同叔贏糧萬里尋初平白水山在羅浮東麓有寺及懸水崖有巨人跡名佛迹巖蘇子瞻詩何人守蓬萊夜半失左股浮山如鵬蹲忽展垂天羽根株互連絡崖嶠爭吞吐神功自爐鞴融液相綴補至今餘隙罅流出千斛乳方其欲化時天匠麾月斧帝觴分餘瀝山骨醉后土峯巒尚開闔澗谷猶呼舞海風吹未凝古佛來布武當時汪罔氏投足不蓋拇青蓮雖不見千古落花雨雙溪匯九折萬馬騰一鼓奔雷濺玉雪潭洞開水府潜鱗有饑蛟掉尾取渴虎我來方醉從濯足聊戲侮回風卷飛雹掠面過強弩山靈莫惡劇微命安足賭北山吾欲老慎勿厭求取溪流變春酒與我相賔主當連青竹筒下灌黃精圃白鶴峯在江之東舊稱惠陽為鶴嶺者以此山下有合江樓蘇子瞻所居石埭山在郡西七里崖石壁立有水簾洞玳瑁山在羅浮山之東山下池中有丨丨龍穴山在河源縣相傳有五色龍乘雲出入南海在海豐縣多鮫鯢其大吞舟又有䱜魚朝出食暮則宿其母腹西江發源九龍山二百里至郡城釣潭在歸善縣北抵西江有盤石小潭可以埀釣蘇子瞻嘗遊因作江郊詩曰江郊葱朧雲水蒨絢崎岸斗入回潭輪轉先生恱之布席開燕初日下照潜鱗俯見意釣忘魚樂此竿線優哉游哉玩物之變豐湖在郡西廣五十里亦名西湖楊廷秀過惠游丨丨詩三處西湖一色秋錢塘潁水更羅浮東坡元是西湖長不到羅浮便不休龍塘在郡南有龍居之井泉湯泉在白水山蘇子瞻詩積水焚大槐畜油灾武庫驚燃丞相井疑浣將軍布自憐耳目隘未測陰陽故欎攸火山烈觱沸丨丨注豈惟渴獸駭坐使癡兒怖安能長魚鱉僅可燖狐兔山中惟木客户外時芒屨雖無傾城浴幸免亡國汚卓錫泉唐子西記云人之精神亦何所不至哉揮戈可以退日搏膺可以隕霜悲泣可以頺城浩嘆可以决石而况于得道者乎諸妄既除表裏皆空一真之外無復餘物則其精神之外又何如哉吾遊羅浮至寶積之寺飲泉而甘寺僧曰此丨丨丨也昔梁景泰禪師始居此山其徒以無水難之師笑而不答已而庵成師卓錫於地泉湧數尺自是得井山中逮今賴之知水者以為甲於嶠南而自梁以來未有紀其事者夫師之為人誠不可得而知然吾聞世間萬有皆心想所生而古之學道未有不用定慧得者完則深定慧則流通以深完流通之精神而致吾心想中物如父之使子君之使臣有必得之勢其於此也特未足多也或曰前世之士如李廣利耿恭之徒皆功名進取之人以成敗得喪為心其精神之富不踰常人而喑嗚叱咤飛泉為之湧溢與師無異此何理也曰二人者皆一時貴臣左氏所謂用物精多至於神明方其由於絶域之中感激奮發於萬死一生之時其用意至到與精進二體惟其出於一切之誠而無定慧之素以故得之艱勤非若師之頥指目使既捷而且逸也嗟乎事之不立也我知之矣志意耗於思慮聰明流於視聽則精神所感不行於父子兄弟之間而尚何有於物茍能全吾之精神則雖山石之堅水泉之柔雍容談笑之間堅者可使闢其柔者可使激而躍也獨不得於人乎吾是以知天下之善無不可立者樓閣合江樓在郡東昔蘇子瞻嘗居焉詩云海上葱朧氣佳哉二江合處朱樓開蓬萊方丈應不逺肯為蘇子浮江來平湖閣在豐湖泗洲寺前枕湖倚山最為勝遊之地取鰐湖平以名亭臺松風亭在嘉祐寺蘇子瞻有松風亭下梅花詩云春風嶺上淮南村昔年梅花曽斷魂豈知流落復相見蠻風蛋雨愁黃昏長條半落荔支浦卧樹獨秀桄榔園豈惟幽光留夜色直恐冷艷排冬溫松風亭下荆棘裏兩株玉蘂明朝暾海南仙雲墮砌月下縞衣來扣門酒醒夢覺起繞樹妙意有在終無言先生獨飲勿嘆息幸有落月窺清尊野吏亭在州宅太守陳希元建平逺臺在無量壽院前為一郡遊覽之勝橋梁東新橋在郡東蘇子瞻詩羣鯨貫鐡索背負橫空霓首搖翻雪江尾插崩雲溪機牙任信縮漲落隨髙低轆轤卷巨索青蛟挂長堤奔舟免狂觸脫筏防撞擠一橋何足云歡傳廣東西父老有不識喜笑爭攀躋魚龍亦驚逃雷電生馬蹄嗟此病涉久公私困留稽姦民食此險出沒如鳬鷖似賣失船壺如去登樓梯不知百年來幾人隕沙泥豈知濤瀾上安若堂與閨往來無晨夜醉病休扶携使君領我言妙割無牛雞不云二子勞歎我捐腰犀我亦壽使君一言聽扶藜常當修未壞勿使後噬臍西新橋在郡豐湖上蘇子瞻詩昔橋本千柱掛湖如斷霓浮梁陷積淖破版隨奔溪笑看逺岸沒坐覺孤城低聊因三農隙稍進百步堤炎洲無堅植潦水輕推擠千年誰在者鐡柱羅浮西獨有石鹽木白蟻不敢躋似開銅駝峯如鑿鐡馬蹄岌岌類鞭石山川非㑹稽嗟我久閣筆不書紙尾鷖蕭然無尺箠欲駕飛空梯百夫下一杙㭬此百尺泥探囊賴故侯寶錢出金閨父老喜雲集簞壺無空携三日飲不散殺盡西村雞似聞百嵗前海近湖有犀那知陵谷變挂瀆生茭藜後來勿忘今冬涉水過臍寺觀栖禪寺在湖山蘇子瞻葬妾朝雲于此容齊三筆云東坡既至惠州殘臘獨出至棲丨丨不逄一僧其詩云江邉有微行詰曲背城市平湖春草合步至棲禪寺堂空不見人老稚掩門睡所營在一食食已寧復事客行豈無得施子净掃地松風獨不靜送我作鼓吹白鶴觀觀廢蘇子瞻請其地築室以居堂曰德有鄰齊曰思無邪蘇子瞻詩云前年家水東回首夕陽麗去年家水西濕面春雨細東西兩無擇緣盡我輒逝今年復東徙舊館聊一憩已買丨丨峯規作終老計長江在北户雪浪舞吾砌青山滿墻頭䰀鬐幾雲髻雖慙抱朴子金鼎陋蟬蛻猶嫌桞桞州廟爼薦丹荔吾生本無待俯仰了此世念念自成劫塵塵各有際下觀生物息相吹等蚊蚋冲虛觀有朱明洞朱真人朝斗壇蘇子瞻云近於壇上獲銅龍六銅魚一古跡蘇公堤在豐湖左蘇子瞻出上所賜金錢築之將軍樹陳文惠祠下有公手植荔支郡人謂之丨丨丨蘇子瞻詩丞相祠堂下丨丨大丨旁炎雲駢火實瑞露酌天漿爛紫埀光熟髙紅掛逺揚分甘遍鈴下也到黑衣郎名宦皇朝陳堯佐閬州志載公以潮倅權惠守携潮士許申偕行艤舟于岸新月初出才甲夜有馬騎數人指呼甚嚴云丞相與漕使會宿於此其或踈虞豪髮不赦公與申相對驚喜莫測其由明日行訪其地有姚娘廟焉及居相位遣人祭告申亦任本路轉運使一如其言陳稱為守嘗奏罷豐湖魚租時子瓘隨侍即了翁也名賢趙師雄龍城録載隋開皇中丨丨丨遷浮羅一日天寒日暮於松林間酒肆旁舍見美人淡粧素服出迎時已昏黑殘雪未銷月色微明師雄與語言極清麗芳香襲人因與之扣酒家門共飲少頃一緑衣童來笑歌戲舞丨丨醉寢但覺風寒相襲久之東方已白起視大梅花樹上有翠羽啾嘈相顧月落參橫但悵惘而已容齊隨筆參星見於昏若至曉則已殁故蘇子瞻梅詩云耿耿獨與參橫昏也皇朝蘇軾紹聖元年謫居蘇子瞻在惠州有詩云為報先生春睡美道人輕打五更鐘傳至京師章子厚笑曰蘇子尚爾快活耶故有昌化之命黃魯直詩東坡謫嶺南時宰欲殺之飽喫惠州飯細和淵明詩淵明千載人東坡百世士出處雖不同氣味仍相似陳鵬飛字少南永嘉人以言事謫死惠州初居郡之舍人巷面湖榜曰謫官湖唐子西詩湖邊冷艷浸秋浦湖上寒光轉夜烏太白持杯問月夜豫為題作謫官湖唐庚謫居沙子步有故宅題詠犀象滿城邑唐殷堯藩寄嶺南張明甫詩云瘴雨出虹蝀蠻煙渡江急嘗聞島夷俗云云散䇿桄榔林蘇子瞻惠州上元夜詩前年侍玉輦端門萬枝燈璧月掛罘罳珠星綴觚稜去年中山府老病亦宵興紅旗穿夜市鐡馬響春冰今年江海上雲房寄山僧亦復舉膏火松間見層層云云林踈月鬅鬙使君置酒罷簫鼓轉松陵狂生來索酒一舉輒數升浩歌出門去我亦歸瞢騰鄰翁餽蛙蛇蘇子瞻詩何以侑一杯云云蠻果粲蕉荔蘇子瞻遊栖禪詩凄凉羅浮館風壁頽雨砌棲禪晚置酒云云蠻菊秋未花蘇子瞻詩登山作重九云云梅雨翛翛荔子然蘇子瞻見顧秀才談惠州風物之美詩云到處聚觀香案吏此邦宜著玉堂仙江雲漠漠桂花濕云云聞道黃柑常抵鵲不容朱橘更論錢恰從神武來𢎞景便向羅浮見稚川置酒椰葉桄榔間蘇子瞻詩云云艤舟蛋户龍岡窟嶺南萬戶皆春色蘇子瞻詩云云㑹有幽人客寓公蝦菜賤時皆丙穴唐子西詩云云茅柴美處即郫筒四六矧兹偏壘鵝城斗大邈在炎陬鰐穴淵深視翠羽於梅梢難尋故迹酌天漿於荔子聊和新詩飽惠州之飯和淵明之詩使渤海之民霑宣帝之化㵸泉誦卓錫之記貫以精神渡江讀新橋之詩施於惠政方輿勝覽卷三十六
