body:
  text: 方輿勝覽卷十三宋祝穆撰興化軍莆田興化仙遊建置沿革星土分野與泉州同陳文帝朝陳寶應走至莆口其地始見載籍唐析泉州置豐州領縣二曰南安曰莆田又置武榮州莆田𨽻焉后武榮州改為泉州莆田自此常為屬縣五代初屬王氏又屬留從效後屬陳洪進國朝太宗時洪進納土于泉州遊洋百丈鎮置太平軍尋改為興化軍及置興化縣併割莆田仙遊等縣以屬焉又以遊洋地不當衝要移於莆田縣為軍理今領縣三治莆田事要郡名莆田見沿革注莆陽莆中風俗秀民特多陳長卿作貢院記云莆蕞爾介與福泉之間市㕓戶版不能五之一而云云焉比屋業儒遊驛通判題名記民物繁夥云云號衣冠盛處至今公卿相望儒風非在常衮後郡志梁陳以來已有鄭露書堂及唐正元林藻伯仲因之𨽻業歐陽詹來自泉山原其所倡蓋非常衮入閩之后形勝南揖壺公莆田志郡治自遊洋徙建始因都巡檢廨為之即異僧黃涅槃所指之地北枕陳岩云云東薄寧海西縈石室木蘭夀溪環流左右山川之秀同上云云甲于閩中介泉福之間遊醳記莆田云云通海道舟車所會土産荔支徐師仁壺山集云蔡君謨譜荔支以宋家香為上品至和丙申宋氏老嘗以餉公公謝以詩其叔云世傳此植已三百年黃巢兵過欲伐之時王氏主其木媼抱木願并戮巢兵為之不伐今雖老矣其實益滋繁味益甘滑真佳植也子魚王介甫詩長魚爼上通三印蘇子瞻詩通印丨丨猶帶骨黃魯直詩丨丨通印蠔破山山川烏石山在城北一里郡志莆田荔支為天下第一烏石荔支為莆田第一讖云烏石山前官職聨聨自唐以來曰林陳黃方曰宋劉王鄭李皆世居之壺公山在城南二十里頂有泉脈通海視潮盈縮舊經云昔隱者遇一老人於絶頂為言神仙事恍惚如夢中宮闕臺殿似非人間老人曰此壺中日月也因名唐諫議翁承贊詩井邑斜連北蓬瀛直倚東秋高巖溜白日上海波紅御史黃滔詩日月中時近龍蛇蟄處腥又云井通鰌吐脈僧隔虎栖禪注云正元中有僧號法通曽下山遇虎爭一牛隔而分之福平山在郡西北二十里歐陽詹讀書之所雙髻山在莆田東五十里亦名筆架山梁山在仙遊西四十里平田之中突起一峯層巒插溪多為神祠佛寺百丈山在興化東北山有六巖湄州山去郡東北七十里在海上與流求國相望出博石可為黑白碁子州峯在軍治之西陳巖在城北十里古有陳姓者隱此山上有石洞廣可數丈旁有巨人迹石茶竈石棊枰石室巖在城西三里有二石室北山巖在興化北十里有石室可坐百人鄭樵詩云倚杖巖頭秋獨坐稀踈煙壠是人間蔡溪巖在興化西六十里陳聘君易隱居于此粘蠔石在陳巖山上距海七十里山頂有石蠔山粘殼猶在方以雲詩纍纍蠔山著石靣此非所有能無疑細看太石深孔竅舟人撑篙迹猶遺乃知此山千載前洶湧尚作海渺瀰蛟龍魚龞占窟宅不省造化能密移仙石在陳巖巨石坦平文迹縱橫若篆書方次雲詩如讀岣嶁神禹碑上溪在莆田縣西二里蔡君謨詩尋溪因過上溪遊雨後溪渾水亂流因傍堤邊郤飛蓋為聞山鳥輟鳴騶赤湖在莆田縣四十里子魚潭在莆田縣東北五十里迎仙橋下潭僅數百步所産之魚為真而不可得王介甫諸賢皆曰通印按藝苑雌黃云古人以為食味之珍通印者言其不可容印今潭之旁有雙魚山上有小廟政和間里人劉仲審題其額曰通印實在王介甫作詩之后或者遂謂通應子魚豈非傳襲之訛井泉蟹井在壺山石穴中有雙蟹嵗旱縣官率詣祈禱以茅葉引之至缶中迎歸即雨劉子翬詩髣佛小雙蟹控御蛟龍隨學校㴠江書院在涵頭去軍二十里知軍事楊棟建景定四年知軍事徐直諒奏請于朝御書今額時祝洙任山長併露章特薦云臣世郡弗迹誤渥還班䘖荷聖恩蔑然稱塞惟有薦進賢士圖報萬分臣恭惟本朝以人文化天下道學大明濓洛諸儒發其祕於前考亭朱熹集其成于後陛下臨御以來尤尊尚朱熹之學是以登其門者如陳文蔚黃幹蔡元定製其傳者如真德秀蔡抗或蒙褒録或蒙擢用天下咸知聖意之所向矣臣竊見迪功郎宜差興化軍㴠江書院山長祝洙趨向不凡學問有本其祖姑實為朱熹之母朱熹嘗述外大父遺事且俾時出以厲其子孫洙生也後雖不及親炙其父穆隱德弗仕從朱熹於雲谷之間微言緒論目染耳濡洙其家庭講論精密嘗讀朱熹四書集注見其間有引而不發者遂掇諸家語録附注于逐章之下名曰附録參稽互考曲暢旁通洙嵗在丙辰蒙恩賜進士第于時宰執程元鳯蔡抗嘗取其書進呈乙覽有旨與升擢差遣洙一第八年方爾初筮孤寒安分不求躁進比來涵江闡揚師説發明經旨講篇時出士論稱之臣察其人觀其學蓋得朱熹之正者若進進不已當亦能以其道鳴于世臣嘗以關升奏舉之矣私竊又念陛下不鄙踈逺小臣之請特賜御書㴠江書院四大字聖恩沛然吾道榮甚而洙適居長席逢千載之幸會伏望睿慈特賜録用若後不如所舉臣甘坐繆舉之罰謹録奏聞伏候敕旨堂舍壺公堂在郡治之內共樂堂在州峯之巔為城中登眺勝處蔡君謨詩曽巒高與赤霄通嵗節歡娛衆庶同庭有美音非獨樂會當炎暑自多風山川勝勢欄干下井徑追遊月色中共賞編民居客在使君樽酒未應空陳應求詩共樂堂前花木深登臨當暑豁塵襟紅垂荔子千家熟翠擁篔簹十畝隂老退已尋居士服清歡時伴醉翁吟慿欄四望豐年稼差慰平生憂國心國清堂鄭耕老詩六月丨丨丨上望依稀身更在西湖祠廟聖妃廟在海島上舟人皆敬事之名宦皇朝薛奎嘗為莆田令盡削王氏無名之租以便民廖剛南劒人為陳瑩中所知時蔡氏當國剛未嘗造其門外補興化劉子翬通判人物林藻唐人仕至侍御史林藴藻之弟元和間為西川節度推官劉闢有逆謀藴切諫闢戒行刑者抽刀磨其頂藴叱之曰死即死我頂豈礪石耶闢知不可屈乃釋之歐陽詹有墓在靈叢浮屠之隂林攢事母孝有白烏甘露之瑞旌表門閭歐陽詹為之記黃滔唐光化中為御史翁承贊天啓中為諫議皇朝蔡襄莆田人歐陽永叔論書云蔡君謨獨步當世此為至言行書第一小楷第二草書第三王龜齡過端明故居詩懷章道出蔡公鄉駐馬遙瞻數仞墻丹荔枝枝經品藻喬松葉葉廕清涼四賢詩出人增氣三諫章成國有光真是濟川三昧手清源遊戲作虹梁陳次升入元祐黨籍徐鐸狀元劉夙南省第二人遷著作佐郎上封事詆近習劉朔南省第一人召對論近習鄭樵以布衣召鄭厚長於易葉顒丞相陳俊卿歷侍御首劾韓仲通黨附秦檜論奪大將楊存中兵請起張浚尋授尚書左僕射諡正獻龔茂良參知政事鄭僑廷試第一仕至樞密黃公度廷試第一唐御史滔之孫林光朝專心踐履之學自號艾軒仕至工部侍郎鄭鑑字自明莆田人朱元晦祭文比年以來士氣衰弱觀時俯仰徇勢前却其心有一身而無天下其口有唯唯而無諤諤偉哉自明之為人信所謂喧啾百鳥之羣忽見秋天之一鶚者也蓋自其布衣而已有憂天下之心其揖遜人主之前則直欲排佞幸之萌而折其角其言明白切至磊磊落落憤激峻厲嶢嶢嶽嶽明主所為虛心而嘉歎羣公所為變容而駭愕善類所為喜幸而心開邪黨所為戚歎而氣索偉哉自明之為人凛乎其有古爭臣之風求之近世則措之鄒陳之間而無怍者也夫何天命之不延竒禍一朝而遽作使前日之悲者喜而喜者悲紛慶弔之交錯嗚呼哀哉君昔過我寒泉之濵一語定交情義日親逮上饒之草次語宵分而更僕謂當擇善以潛心毋以一長而自足粵今兹之秋孟又扎書以申之眷豫心之悃欵實千載以為期書適往而訃來噭然號其焉及我殄瘁之悲詩坌百憂之來集惟平生之忠赤諒雖死而不忘跪陳情於一酹詞與淚而俱揚題詠莆陽朱紫半古讖云水繞壺公山此時方好看壺公山欲斷云云蔡君謨興水利灌民田引水繞壺公山而登第者較前為多一方文武魁天下薛奕熙寧九年武舉第一時徐鐸亦擢進士第一神宗御製詩賜之云云萬里英雄入彀中海國民皆興禮義陳長卿送葉守詩云云潢池盜已息干戈農桑四境豐年屢笛鼓千村叶氣多四六抗章楓陛作鎮莆田環城千里並海一隅閩嶠將窮海邦尤盛水繞壺山地窮海嶠乃眷莆陽之郡實為荔子之鄉維莆水之為邦實桐城之析壤地不大於曹滕俗已幾於鄒魯七閩衣冠之區蔚為小壘千里袴襦之慶宛在細侯燕寢香凝但覺壺天之永龍墀詔下即為文石之趨端明筆法蓋坡老之所推艾軒心傳自程門而有得荔錦離離暇日閲端明之譜稼雲渺渺豐年歌正獻之詩爼登通印之魚詩夸荆國品貴莆田之荔譜述端明陳退傳之全名大節巍巍堂堂鄭正字之讜論危言嶢嶢嶽嶽瀕海而居頗擅漁鹽之利自閩而論素稱文物之鄉介二大國版籍較泉福而獨微考諸名儒文風自梁唐而已盛漳州龍溪龍巖章浦長泰建置沿革自唐以前並同泉福武后時析閩州西南境置漳州以南有漳浦故名初置于漳浦縣南八十里後徙治李澳川改漳浦郡復為漳州徙治龍溪今州理是也唐末光州刺史王緒渡江陷漳州為王潮所殺遣王審知圍泉州拔之遂有漳泉之地梁封王審知為閩王至后晉齊王時朱文進擅命以程贇為漳州刺史既而泉州留從效聞之亦殺程贇迎王繼成為刺史從效遂據泉漳二州改漳州為南州從效卒陳洪進有其地皇朝乾德以南州為漳州太宗朝陳洪進獻漳泉二州今領縣四治龍溪事要郡名漳浦見沿革注臨漳龍溪風俗其民務本傅自得道院記云云不事末作而資用饒給俗故窮陋朱元晦作龍巖縣學記云豫聞龍巖為縣斗僻介於兩越之間云云其為士者雖或負聰明朴茂之姿而莫有開之以聖賢之學是以自其為縣以來今數百年未聞有以道義功烈顯于時者是豈為材之不足哉殆為吏者未有以興起之也因告其諸生曰夫所謂聖賢之學者非有難能難知之事也孝弟忠信以養其心禮義亷恥以修其身而求師取友誦詩讀書以窮事物之理而已是二端者豈二三子之所不知不能哉惟在反是心以求之而一用其力則實大聲閎將有自然不可掩者矣形勝地曠土沃傅自得記建州泉潮之間唐垂拱間陳元光威烈廟記云公乞丨一丨於丨丨丨丨以控嶺表即其屯置郡以控嶺表同上居閩會之極南登科記序云婆娑乎山水之間郭功父記為守令者得云云山川梁山在城西古記梁嶽閩中之望也秀麗而崇圓又名圓山大峯一有二圖經序云丨丨紀董奉之遊郭功父詩廟食丨丨忘歲年自言耽酒未能還身披羽衣手持藥時時混迹在人間潘存實詩盤根來楚蜀作鎮表甌閩九侯山在漳浦圖經謂丨丨傳夏后之緒似指為夏之子孫而蔡如松漳南十辨則云九峯之神各主一山不同登高山在州治之西二里岐山郭功父有岐山仙亭巖乃作十詠天城山一白名第山后有周潘書堂遺基石獅巖李彌遜詩翠合峯巒萬葉稠雲擎佛屋出巖幽春光不到庭隂樹曉日光明竹外樓蓮峯石即前梁山中峯相傳為齊武帝所賞晉亭在其西張登詩孤髙齊帝石瀟灑晉亭峯漳江在梁山下徐俯有丨丨晚望詩龍溪即九龍山下水梁大同中有九龍遊戲此江今祭九龍翁甚盛南溪端明蔡君謨有詩東湖在州東郭功父有詩西湖泉極甘美可以辟瘴癘蔡君謨詩湖上山光一望青佛宮高下倚巖扄井泉瀑布泉在梁山蔡希遽詩會稽之南羅浮北中有大梁神仙宅瀑流古今挂長虹寫下銀河數千尺亭臺序賔亭蔡君謨有詩清白亭王鞏嘗有詩雙清亭林迪有詩白雲亭在開元寺蔡君謨有詩月淵亭在淨衆院郭功父詩仰攀明月輪俯瞰滄海淵乾坤惜形勢此地何其偏靈溪九龍躍仙山一峯圓邂逅攝邦守所樂多林泉得仙亭在名第山程瑀詩危亭誰結據山椒名第仙人不可招繞郭溪山敞圖畫萬家樓閣插雲霄澤露亭李亨伯守雍管丁內艱邊郡不許解官五章哀請而后許明年甘露降其家庭柏之上張商音作詩以賦其事鄒志完陳瑩中皆有詩臨漳臺唐張登有詩嘯臺郭功父詩縹眇臨渚峯幔捲濃雲開秀特不可掩擎天碧崔嵬半漳臺郭功父詩簷飛突兀壓層邱見盡臨漳一半州池館滿月池在開元寺蔡君謨嘗有詩臨漳道院郡志官於此者往往樂其風俗之簡靜號為丨丨丨丨漳浦驛蔡君謨王陶有詩樓閣南樓唐尹􅐂有陪韓漳州登丨丨詩齊雲閣蔡君謨詩紫閣青梯壓翠岑春愁秋思昔登臨雨嵐供眼橫千仞星漢垂簷直半尋祠墓陳侯祠廟碑云公姓陳諱元光永隆二年盜次潮州公擊賊降之請置漳州委公鎮撫久之蠻賊復嘯聚公因戰殁廟食于漳李顒詩當年嶺北正危時數郡生靈未可知不是有人橫義概也應無計保藩維義塜危稹記人死曰歸葬曰藏歸者復其所也藏者欲人之不得見也故先王制禮喪葬有期下至於士則踰月而已何漳之為子若孫者乃有不葬之俗耶其親死往往舉其柩而置之僧寺是蓋始於茍簡中則因循久而忘之矣嗚呼已則忘之矣而不知虛廊冷殿之間寒聲泣霜弱影弔月其望于子孫一旦之興念者猶未已也蓋常命官僚核其事近城之五里乃有未瓦棺合二千三百有竒爰擇于城之西南北高燥地立為義塜三每所大為之域既封覆以青莎使如舊壠前塗白堊書其有名氏者庶幾子孫猶來祭享也訖事郡人合辭以請記余曰義之名立其始於不義而后見也此其不義果起於誰乎曰僧人其作俑者也是間層山疊林梵宇無數廊廡間率不置神若佛類為土室其入如竇黯然無光斯皆誘愚俗以來殯者也彼棘人者舉其親而即安于彼死者一入杳無葬期使其子若孫良心陷溺不復知有天理之正人道之終此有識者之所深恨也原道曰不塞不流不止不行近因為令下諸浮圖必令盡改其室以為僧房不改則鞭其人而俗之籍其田而公之蓋治盜之法治其藏者此法常存則誘者始有所畏死者始有所歸矣是為記名宦皇朝蔡襄常為州判官胡銓知州朱熹知州欲行經界法不果人物周康物唐人漳之擢第自康物始皇朝李亨伯郡人仕至全州守王鞏作神道碑劉安世書其碑隂曰自嘉祐以來引年而去者如歐陽永叔以六十五范景仁以六十三公挂冠方六十四耳目之所覩者三人而已高登朱元晦作東溪先生高公祠記云公靖康間遊太學與陳公少陽伏闕拜疏以誅六賊留种李為諸用事者欲兵之不為動也紹興初召至政事堂又與宰相秦檜論不合去為靜江府古縣令后投檄以歸秦聞大怒奪官徙容州名賢趙鼎自潮量移漳居住劉子羽謫居題詠剖竹海邊州郭士元送陸員外赴漳州詩含香臺上柏云云言送漳州牧白居易送呂漳州今朝一壺酒云云城標漲海頭張登詩漳州悲逺道地里極東甌境曠窮山外云云閩山到漳窮王介甫送李宣叔倅漳州詩云云地與南越錯山川鬱霧毒瘴癘春冬作荒茅篁竹間蔽虧有城郭居人特鮮少市井宜蕭索野花開無時變酒持可酌窮年不用客誰與分杯杓朝廷尚賢俊磊砢充臺閣君能喜節行文藝又該博超然萬里去識者為不似樂豫聞君子居自可救民瘼茍能禦外物地得無美惡聞最南方比客令勿藥林麓換風氣獸蛇雕毒蠚如漳猶近州氣冷又銷鑠珍足海物味其厚不為薄章舉馬甲柱固已輕羊酪蕉黃荔子丹又勝柤梨酢縫衣比多士往往在邱壑從容與笑語豈不慰寂寞太守好觴詠嘉賔應在幕想即有新詩流傳至京洛南盡封郵見好山楊發漳浦驛詩云云蒼蒼桂嶺類商顔誰憐后夜思鄉處白葦黃茅舊漢關風候已應同嶺北常衮漳浦驛詩云云雲山仍喜似終南漳溪郡有佳山水桑維翰云云遷客因之作勝遊怪得千峯聳晴巘枯槎百尺擁寒流庾嶺東邊吏隱州唐韓泰詩云云溪山竹樹亦清幽往往六月披重袍郭功父詩長風吹海作寒霧云云仙魚通印勝梟炙郭功父詩云云荔子丹艷疑蟠桃漳州畫戟擁詩人陳與義贈漳守綦叔厚詩過盡蠻荒興復新云云水繞漳城潮已平張至能詩云云向來有記出公卿白袍不倦三冬學錦綬行看駟馬榮符節恩深隔瘴雲陳陶贈漳州張怡使君舊德徐方天下聞當年熊軾繼清芬井田異政光蠻竹云云已見嘉祥生比戶嘗嫌夷貃蠧南薰幾時徴拜征西鉞學著縵胡從使君回峰疊嶂繞庭隅歐陽詹詩云云散點煙霜勝畫圖月暮華軒卷長箔太清雲上對蓬壺外邑蠻煙漁火接鯨波陳希元題漳浦縣壁云云樹樹花枝處處歌况是天涯好行樂莫教憔悴鬢霜多四六疏榮鳯闕出守龍溪分符丹闕問道清漳維漳為郡與潮相鄰臨漳古邦閩嶠窮處蓋七閩窮絶之鄉實今日安間之地眷臨漳之小壘居區越之窮陬地居漲海之濵城俯清漳之上人生五馬賸收及物之功山有九龍豈少專城之樂摩挲壁記乃朱文公所蒞之邦點檢圖經亦趙忠簡曽遊之地魚佩虎符香自凝於燕寢鳯城龍渚患何有於鰐溪青梯橫星漢盍尋端明之舊遊畫戟擁詩人為和簡齋之妙句地瀕嶺嶠不無瘴霧之侵郡屬甌閩尤覺文風之盛道院名標務本考傳公之記漳州氣冷産珍夸荆國之詩虎榜儒科自元和而已盛龍巖學記欲伊洛之有傳剖海邊半竹有郭正元之賦詩送漳州一壺乃白居易之載酒汀州長汀武平寧化清流上杭蓮城建置沿革禹貢揚州之域閩在揚州東南汀又在閩之南周職方氏有七閩猶列於荒服秦併天下逐閩粵王無諸列其地為閩中郡後漢屬會稽郡晉分建安郡置晉安郡又立新羅縣而汀州始基於此宋而後無所考據唐開撫福二州山洞置汀州因長汀以為名治新羅改臨汀郡復為汀州初置州在新羅後移理長汀白石村唐王緒陷汀漳二州不能有而王潮又陷福建汀等州潮卒其弟審知繼有其地國朝平江南地歸版圖今領縣六治長汀事要郡名臨汀鄞江即東溪平沙圖經水際平沙曰汀又云南丁位也以水合丁於文為汀風俗民生尚武鄞江志島居安漁鹽同上丨丨者丨丨丨之利山居任耕織丨丨者丨丨丨之勞形勝南通交廣張潛修學記云云北逹江右實甌閩之奧壤也西接贑水戴覺同慶寺羅漢閣記云云南鄰百粵深林茅竹之間南接潮海鄞江郡志云云實江西二廣往來之衝後枕卧龍黃啓宗記前直圓峯云慿山負海杜佑通典閩越遐阻僻在一隅云云在閩山之窮處戴覺記汀為州云云復嶂重巒亘數百里介於虔梅之間鄭強移創州學記汀在西南境云云銅鹽之間道所往山川南山在州南一里屹然如屏其下坦夷有文殊同慶二寺陳軒詩吁然碧玉洞屹立分雙户天生護佳景常恐塵土汚卧龍山州主山圓珠山在州正南一里隂陽家為應山梁山在武平東三十里山上有仙巖銅鼓山在武平東南二百里石壁上有倒書千年字今猶存金山在上杭縣西十里康定中産金因名雞籠山在長汀縣郭功父詩神仙之府名雞籠千尋翠玉擎寒空靈洞山在武平有湯泉大洞三十六小洞二十八南安巖去武平八十里郭功父詩汀梅之間山萬重南安巖竇何玲瓏青瑶屹立敞四壁巧匠縮手難為工按定光佛泉州人姓鄭名自嚴乾德二年駐錫武平南安巖淳化二年别立草庵居之景德初遷南康郡盤古山祥符四年汀守趙遂良即州宅創後庵延師至八年終于舊巖見周必大定光庵記侍郎巖在清流縣乃熙豐中侍郎張駕祭酒楊時左司陳瓘少時讀書之所舊傳三公肄業其間不置卧榻啜粥飲水終嵗不到巖下獅子巖在長汀東南五十里定光佛初振錫于此蒼玉洞在城東五里洞口兩石壁天然成門清氣逼人潭飛磜在寧化縣南鄉重岡復嶺環布森刻登陟極難磜居其中坦然而平山環水合有田有池草茂林深易于藏聚寇恃其險為私販為剽盜根據百年莫敢誰何此紹定間始禍之地未幾為淮兵蕩平之因置南平寨焉三溪水東溪水自鄞坑來西溪水自湘洪來合陳軒詩一川逺匯三溪水千嶂深圍四面山寅湖在長汀縣東二里居郡寅位五百灘自汀抵潮其灘險有五百堂亭三瑞堂在州治橫翠亭在東禪寺中門之左山光野色橫在目前樓閣南樓郡志郭功父有詩北樓陳丨丨郭功父有詩謝公樓張九齡詩謝公樓上好醇酒二百青蚨買一斗雙清閣在濟川門之左或謂有滕王閣氣象名宦陳劒唐人為刺史先是開元置郡纍遷東方口劔始更卜卧龍之白石與汀相為終始焉皇朝陳軒為守黃魯直贈詩平生所聞陳汀州蝗不入境年屢豐郭祥正為别駕與陳軒登山臨水觴詠酬唱極多人物羅彧長汀人登太平興國第當真廟親征彧扈從至澶淵與宰相參議軍務虜人乞和遣彧為報使還京丐歸里賜錦衣金帶錦旗二仍繡八字云明時折桂衣錦還鄉領本州刺史鄭文寶寧化人登太平興國第官至工部侍郎嘗題緱氏山云秋隂漠漠秋雲輕緱氏山頭月正明帝子西飛仙馭逺不知何處夜吹笙歐陽永叔亦稱其詩一聨云水暖鳬鷖行哺子溪深桃李卧開花湯莘叟郡人能詩嘗有馬上吟曰宿雨洗山新緑嫩曉風吹杏淺紅乾沙頭路暖日欲上行客揚鞭不覺難名賢曽肇元祐間貶汀州李光以論蔡攸朱靦謫監汀州酒稅題詠全家逺過九龍灘張籍送汀州元使君詩云曽成趙北歸朝計因拜王門最好官為郡暫辭雙鳯闕云云山鄉秪有輸蕉户水鎮應多養鴨欄地僻尋常來客少刺桐花發共誰看木犀花發認春香孫奮學詩慈竹笋生翻夏籜云云花繼臘梅長不歇陳軒云云鳥啼春谷半無名地有銅鹽家自給陳軒詩居人不記甌閩事遺迹空傳福撫山云云嵗無兵盜戍長間水與潮陽作上流陳軒山連庾嶺為南嶠云云嵐煙蒸濕同梅嶺郭功父詩云云地脈逶迤接贑城四六疏榮中扆趣鎮平沙顯膺渙綍出守臨汀雖連閩部實邇炎方秀氣攸鍾異材間出雖居南粵之窮陬實有中州之雅俗幸賦輸之易集亦獄訟之甚稀里閭安循吏之撫摩景物繼詩人之題詠析福撫二州之山洞肇創此州接梅潮兩郡之鄰封獨推雅俗峻升奎閣之清自天錫命為愛汀州之好特地分符自洞寇敢矜於地險輒肆慿陵幸淮兵克振於天聲乞從掃滌地瀕庾嶺豈無瘴霧之侵境接閩山頗覺文風之盛郡城更卜自唐刺史以開先年穀屢豐惟陳汀州而鮮儷巖谷盤旋有張楊之遺迹郡齋酬唱多陳郭之名篇辭雙鳯闕抗章自詭於民庸過九龍灘滌籕俶開於藩府斗絶一隅罕車馬往來之迹雲埋疊嶂多銅鹽負販之姦方輿勝覽卷十三
