body:
  text: 方輿勝覽卷五十宋祝穆撰黃州黃岡麻城黃陂建置沿革禹貢荆州之域楚地翼軫之分野春秋時為黃國之地楚滅黃而有其地楚宣王滅邾徙其君于此又名邾城秦屬南郡漢為西陵縣及邾縣地屬江夏郡晉為西陽國宋為西陽郡蕭齊分西陽為齊安郡北齊别置衡州隋改為黃州煬帝改永安郡唐復為黃州置總管府于麻城縣置亭州于黃陂縣又置南司州後並廢屬黃州國朝因之或兼本路提刑今領縣三治黃岡事要郡名齊安見前沿革注黃岡風俗其民寡求而不爭蘇子瞻跋韓忠獻贈詩云云其士朴而不陋同上其士靜而文朴而不陋尊德樂道異于他邦形勝東望夏口蘇子瞻赤壁賦云云前介大江唐咸通中修文宣王廟記云云後據崇阜襟帶湘漢齊安志通接巴蜀云云介乎淮楚之交地連雲夢王元之謝表云云城倚大江濵江帶山蘇子瞻書云云多適耳目之好而生事百須亦不難致山靈川媚許端夫瑞慶堂記云云嘗生大賢為國瑞慶楚東北之鄙張文潛撰雜志云黃州蓋云云與靳大江沔光夀一藪澤山川赤山在黃岡縣之楊林店南山蘇子瞻詩丨丨一尺雪雪盡山蒼然澗谷深自暖梅花應已繁使君厭騎從車馬留山前行歌招野叟共步青林間柯山一名柯邱黃岡山瑞慶堂記齊安郡治據依丨丨丨來自天柱赤壁山水經載赤鼻山齊安拾遺遂以赤鼻山為丨丨丨以三江下口為夏口以武昌縣華容鎮為曹操敗走華容道其説乖謬蓋周瑜自柴桑至武昌縣樊口而後遇于赤壁則赤壁當在樊口之上今赤鼻山在樊口對岸何待進軍而後遇之乎又赤壁初戰操軍不利引次江北而後有烏林之敗則赤壁當在江之南岸今赤壁乃在江北亦非也然蘇子瞻赤壁賦乃疑似語而大江東去之詞亦云人道是三國周郎赤壁又可見矣子瞻嘗云黃州守居之數百步為赤壁或言即周瑜破曺操處不知是否斷崖壁立江水深碧二鶻巢其上有二蛟或見之遇風浪靜輒至其下赤壁賦壬戌之秋七月既望蘇子與客泛舟逰于赤壁之下清風徐來水波不興舉酒屬客誦明月之詩歌窈窕之章少焉月出于東山之上裴回于斗牛之間白露橫江水光接天縱一葦之所如凌萬頃之茫然浩浩乎如慿虛御風而不知其所止飄飄乎如遺世獨立羽化而登仙于是飲酒樂甚扣舷而歌之歌曰桂棹兮蘭槳擊空眀兮泝流光渺渺兮豫懷望美人兮天一方客有吹洞簫者倚歌而和之其聲嗚嗚然如怨如慕如泣如訴餘音嫋嫋不絶如縷舞幽壑之潛蛟泣孤舟之嫠婦蘇子愀然正襟危坐而問客曰何為其然也客曰月明星稀烏鵲南飛此非曺孟德之詩乎西望夏口東望武昌山川相繆鬱乎蒼蒼此非孟德之困于周郎者乎方其破荆州下江陵順流而東也舳艫千里旌旗蔽空釃酒臨江橫槊賦詩固一世之雄也而今安在哉况我與子漁樵于江渚之上侣魚蝦而友麋鹿駕一葉之扁舟舉匏樽以相屬寄蜉蝣于天地渺滄海之一粟哀吾生之須臾羡長江之無窮挾飛仙以遨逰抱眀月而長終知不可乎驟得託遺響于悲風蘇子曰客亦知夫水與月乎逝者如斯而未嘗往也盈虛者如彼而卒莫消長也蓋將自其變者而觀之則天地曽不能以一瞬自其不變者而觀之則物與我皆無盡也而又何羡乎且夫天地之間物各有主苟非吾之所有雖一毫而莫取惟江上之清風與山間之明月耳得之而為聲目寓之而成色取之無窮用之不竭是造物者之無盡藏而吾與子之所共食客喜而笑洗盞更酌肴核既盡杯盤狼籍相與枕藉乎舟中不知東方之既白後赤壁賦是嵗十月之望步自雪堂將歸于臨臯二客從豫過黃泥之坂霜露既降木葉盡脫人影在地仰見明月顧而樂之行歌相答已而歎曰有客無酒有酒無肴月白風清如此良夜何客曰今者薄暮舉網得魚巨口細鱗狀如松江之鱸顧安所得酒乎歸而謀諸婦婦曰我有斗酒藏之久矣以待子不時之需于是携酒與魚復逰于赤壁之下江流有聲斷岸千尺山髙月小水落石出曽日月之幾何而江山不可復識矣豫乃攝衣而上履巉巖被蒙茸踞虎豹登虬龍攀棲鶻之危巢俯馮夷之幽宫蓋二客不能從焉劃然長嘯草木振動山鳴谷應風起水湧豫亦悄然而悲肅然而恐凛乎其不可留也反而登舟放乎中流聽其所止而休焉時夜將半四顧寂寥適有孤鶴橫江東來翅如車輪玄裳縞衣戛然長鳴掠豫舟而西也須臾客去豫亦就睡夢二道士羽衣翩躚過臨臯之下揖豫而言曰赤壁之逰樂乎問其姓名俯而不答嗚呼噫嘻我知之矣疇昔之夜飛鳴而過我者非子也耶道士顧笑豫亦驚悟開户視之不見其處朱元晦云前赤壁賦言吾與子之所共食食如食邑之食今人改作共樂非矣後賦前言二道士後言孤鶴東坡親迹亦然則或是茟誤耳聚寶山在石壁之上山多小石紅黃粲然東坡蘇子瞻所作怪石供即此也徐公洞蘇子瞻云非有洞穴但深邃耳圗經云徐邈不知何人烏林按水經述江水源流至今巴陵之下云江水左徑止丨丨南酈道元注云右徑赤壁山北則赤壁丨丨相去二百餘里又赤壁初戰操軍不利引次江北而後有丨丨之敗二戰初不同日後漢紀揔書為丨丨赤壁故荆州記臨嶂山南峯謂之丨丨峯亦謂之赤壁寰宇記引圗經以烏林為赤壁皆失之要之道元乃後魏人去三國尚近考驗必得其真武湖郡縣志在黃陂縣乃黃祖習戰閲武之所宋謝晦走丨丨戌即此夏澳在州西南二里許夏子喬為守鑿水入陂以藏舟峥嶸洲晉劉毅破桓元處在黃岡與武昌相近井泉君子泉郡倅孟震亨有賢德時稱孟君子庭中有泉蘇子瞻名之曰丨丨丨黃魯直詩雲夢澤南丨丨丨水無名字託人賢堂館雪堂在州治東百步蜀人蘇子瞻謫居黃三年故人馬正卿為守以故營地數十畝與之是為東坡以大雪中築室名曰丨丨繪雪于堂之壁西有小橋堂下有暗井七年移汝州去黃之日遂以雪堂付潘大臨兄弟居焉崇寧壬午黨禁既興堂遂毁其後邦人屬神霄宫道士李斯立重建何斯舉作上梁文其警聯云嵗在辛酉蔚為鸞鳳之棲堂毁崇寧奄作鼪鼯之野又云前身化鶴當陪赤壁之逰故事博鵝無復黃庭之字蓋佳語也其後韓子蒼為守日逰赤壁詩緩尋翆竹白沙逰更挽藤梢到上頭豈有危巢尚棲鶻亦無塵迹但飛鷗經營二頃將歸去眷戀羣山為少留百日更君何足道空餘詩句滿江樓相隱堂在司理廳龎公籍初為郡司理後邦人即廳建丨丨丨思賢堂在黃陂尉廳二程先生生于此故名清暉堂在州治臨臯館在朝宗門外舊曰臨臯亭東坡嘗寓居焉故相秦檜之父艤舟其下秦檜生于是館橫江館在赤壁南李宗諤圗經以為晉龍驤將軍蒯恩建杜牧留題孫家兄弟晉龍驤馳騁功名業帝王畢竟江山誰是主苔磯空屬釣魚郎樓亭竹樓王元之記黃岡之地多竹大者如椽竹工破之剖去其莭用代陶瓦比屋皆是以其價廉而工省也豫城西北隅雉堞圮毁蓁莽荒穢因作小竹樓二間與月波樓通逺吞山光平挹江瀨幽閴遼敻不可具狀夏宜急雨有瀑布聲冬宜密雪有碎玉聲宜鼓琴琴調虛暢宜咏詩詩韻清絶宜圍碁子聲丁丁然宜投壺矢聲錚錚然皆丨丨之所助也公退之暇披鶴氅戴華陽巾手執周易一卷焚香默坐消遣世慮江山之外苐見風帆沙鳥煙雲竹木而已逮其酒力醒茶煙歇送夕陽迎素月亦謫居之勝概也彼齊雲落星髙則髙矣井幹麗譙華則華矣止于貯妓女藏歌舞非騷人之事吾所不取吾聞竹工云竹之為瓦僅十稔若重覆之得二十稔噫吾以至道乙未嵗自翰林出滁上丙申移廣陵丁酉乂入西掖戊戌嵗除日有齊安之命己亥閏三月到郡四年之間奔走不暇未知明年又在何處豈懼竹樓之易朽乎幸後之人與我同志嗣而葺之庶斯樓之不朽也月波樓在郡廳後涵暉樓曽史君詩雪浪逾千頃雲波列萬艘後改名無盡藏棲霞樓在儀門外之西南軒豁爽塏為一郡竒景蘇子瞻所為賦鼓笛慢者也和王鞏詩賓州在何處為子上棲霞四望亭在雪堂南髙阜之上唐劉嗣之立李紳記快哉亭蘇子由記江出西陵始得平地其流奔放肆大南合湘沅北合漢沔其勢益張至于赤壁之下波流浸灌與海相若清河張君夢得謫居齊安即其廬之西南為亭以覽觀江流之勝而余兄子瞻名之曰快哉蓋亭之所見南北百里東西一舍濤瀾洶湧風雲開闔晝則舟楫出沒于其間夜則魚龍悲嘯于其上變化倐忽洞心駭目不可久視今乃得玩之几席之上舉目而足西望武昌諸山岡陵起伏草木行列煙消日出漁父樵夫之舍皆可指數此其所以快哉者也至于長洲之濵故城之墟曹孟德孫仲謀之所睥睨周瑜陸遜之所馳騖其流風遺俗亦足以稱快世俗云覽春亭在州治韓魏公嘗作詩序萬松亭在麻城縣西縣令張毅夾道植松萬株立亭其中蘇子瞻詩云千年栽種百年規好德無人助我儀為問幾株能合抱殷勤記取角弓詩軒榭鴻軒張文潛記云丨丨者文潛讀書舍也客有言曰吾聞之時其往來以避寒暑之害而髙飛逺舉能使弋人無慕者鴻也今子以戅暗不見事幾得譴辱于聖世蒙垢忍恥于泥塗苟升斗以自養而欲自比于鴻不亦愧乎張子曰子之言是也然余居此以己卯之秋其遷也庚辰之春與夫嗷嗷陂澤中獵食以活秋至而春去者得無類乎客曰然祠廟二程先生祠朱元晦記云齊安在江淮間最為窮僻而國朝以來名卿大夫多辱居之如王翰林韓忠獻公蘇文忠公邦人至今樂稱而于蘇氏尤致詳焉至于河南兩程夫子則亦生于是邦而未有能道之者蓋王公之文章韓公之勳業皆已震耀于一時而其議論氣節卓犖竒偉尤足以驚動世俗之耳目則又莫若蘇公之盛也若程夫子則其事業湮鬱既不足以表于當年文詞平淡又不足以夸于後世獨其道德之妙有不可誣者而又非知德者莫能知之此其遺迹所以不能無顯晦之殊亦其理勢之宜然也蓋天聖中洛人太中大夫程珦初仕為黃陂尉秩滿不能去而遂家焉實以明道九年壬申生子曰皓字伯淳又以明年癸酉生子曰頤字正叔其後十有餘年當慶厯丙戌丁亥之間攝二南安乃得獄掾舂陵周公惇頤而與之遊于是二子因受學焉而慨然始有求道之志既乃得夫孔孟以來不傳之緒于遺經遂以其學為諸儒倡則今所謂明道先生伊川先生是也先生之學以大學論語中庸孟子為標指而達于六經使人讀書窮理以誠其意正其心修其身而自家而國以及于天下其道坦而明其説簡而通其行端而實是蓋將有以振百代之沉迷而內之聖賢之域其視一時之事業詞章議論氣節所擊孰為重輕所施孰為短長當有能辨之者而世非徒不之好也甚者乃或目以為道學之邪氣而必翦滅之于斯時也苟無遭其伐木而削迹焉斯已幸矣尚何望其餘哉今太守李侯乃能原念本始追誦遺烈立二夫子之祀于學宫以風厲其人而作興之非其自信之篤而不以世俗之趨舍動其心其孰能與于此李侯名諶字誠之其為此邦勤事愛民固多可紀特于此舉尤足以見其操行之不凡而非衆人之所能及是以因其請記而具論之以告來者使有考焉古迹五關李埴奏乞復丨丨之險夫虎頭關形勢最險兩山千仭一澗衝激黃土關形勢聳峭白沙關相去密邇敵人往來俱由此關山路峭壁委折而上大城關山關不甚髙峻而橫斜盤繞據髙臨下北望二十里皆在目中霖雨積雪日見壞爛切聞敵人初破黃土白沙亦由小路以犯大城騎兵數千先至關內適射雉者六七人與之遇遂用射雉之弩連斃兩騎敵疑有伏竟以退走不敢犯關向使諸關之兵據險效死敵豈能遽入乎東坡張安國詩繫船著西日曵杖到東坡暗井蛙成部荒祠鳥作窠老仙騎鶴去稚子飯牛歌興廢何須問斯文自不磨韓魏公讀書堂在安國寺名宦杜牧為刺史郡齋獨酌詩前年鬢生雪今年鬢帶霜往往自撫已淚下神蒼茫御史詔分洛舉趾何猖狂闕下諫官集拜疏無文章尋僧解幽夢乞酒緩愁腸豈為妻子計未去山林藏平生五色線願補舜衣裳絃歌教燕越蘭芷浴河湟腥膻一灑揥凶狠皆披攘生人但眠食夀域富農桑孤吟志在此自亦笑荒唐江郡雨初霽刀好截秋光池邊成獨酌擁鼻菊枝香醺酣更唱太平曲仁聖天子夀無疆見樊川集皇朝龎籍為户掾溫公集以為任理掾王元之以修實録出為守州境有二虎鬭其一死而食其半羣雞夜鳴經月不止元之上疏引洪範傳申戒且自劾真宗詢日官則公守臣當其咎亟移知蘄州元之謝表云宣室鬼神之問敢望生還茂陵封禪之書正期身後至郡未踰年而卒年四十八黃魯直嘗題其墨迹後云掘地與斫木智不如機舂聖人懷餘巧故為萬物宗世有斫泥手或不待郢工往時王黃州謀國極匪躬朝聞不及夕百壬避其鋒九鼎安盤石一身轉孤蓬浮雲當日月白髮照秋空諸君發蒙耳汲直與君同程珦西洛程遹寓居黃陂子珦為黃陂尉生二子曰皓號明道先生曰頤號伊川先生今尉廳有思賢堂張耒謫監黃州酒稅繼為倅又為守凡三至焉榜其所居曰鴻軒劉摯為相落職知黃州韓駒字子蒼為黃州守有詩名洪芻黃魯直之甥為黃之酒正榜其室曰壁隂軒黃公為之銘人物潘大臨郡人字邠老有詩名何頡之黃岡人從蘇子瞻逰陳慥字季常寓居黃之陂亭號龍丘子東坡為作方山子傳名賢韓琦諡忠獻封魏公嘗寓居于黃州蘇軾諡文忠嘗謫居于黃州題詠雲夢澤南州杜牧憶齊安詩平生睡足處云云一夜風吹竹連江雨送秋格卑嘗汨汨力學強悠悠終掉塵中手瀟湘釣漫流太守政如氷杜牧詩傍村林有虎方干詩弭節齊安郡孤城百戰殘云云帶郭縣無官暮角梅花怨清江桂影寒黍離緣砥事撩我起長歎赤壁風月笛黃魯直和蘇子瞻詩云云玉堂雲霧窗黃岡壓上遊王元之詩淮甸為內地云云官間無一事舒人朱載為黃教官有詩云云蝴蝶上階飛蘇子瞻見之稱賞使君家似野人居杜牧齊安晚秋詩栁岸風來影漸疏云云雲容水態還堪賞嘯志歌懷亦自如雨暗殘燈棊欲散酒醒孤枕鴈來初可憐赤壁爭雄處惟有衰翁坐釣魚茅屋數間依竹葦蘇子瞻入任伋通判黃州詩黃州小郡夾溪谷云云知命無憂我何病見賢不薦誰當耻試問淮南風月主黃魯直詩云云今年桃李為誰開陂陀山上使君衙董乂望江南有詩云縹眇煙中漁父槳云云風帆一日到潯陽董乂詩雲影萬重連鄂渚云云長江繞郭知魚美蘇子瞻詩云云好竹連山覺笋香為買烏犍三百尾黃出水牛蘇子瞻詩卻下關山入蔡州云云四六申命嚴宸擁麾重鎮出綸丹禁紆紱黃岡眷兹名郡控彼窮邉肅擁州麾榮兼憲節維邾城之名郡實淮甸之要衝擁黃岡之要地據赤壁之上遊切觀雲夢之南州素號江淮之要地登覽故迹多名勝嘯詠之餘參考前聞亦豪傑驅馳之會橫槊釃酒悼孟德一世之雄揮扇岸巾想公瑾當年之鋭黃堂勝槩傳王杜之風流赤壁威稜餘孫劉之雄烈橫槊賦詩繼烏鵲南飛之句舉酒屬客歌大江東去之詞訟牒晝稀吏既欣于靜治戎亭夜寂民更樂于奠居郡將堅城養鋭不輕于一試賊兵卷甲逃形遂解于重圍固境息民豈獨専于守禦訓民積粟當力贊于修攘往者開邉赤子橫遭于糜爛今而固圍黃童思脫于呻吟光州定城光山固始建置沿革禹貢揚州之域楚地翼軫之分野上應鶉尾在春秋為強國黃國蔣國後併于楚秦屬九江郡漢屬汝南郡之弋陽國及期思縣江夏郡之西陽縣及車犬縣東漢兼屬固始侯國魏置弋陽郡晉立光城縣宋末于光城縣置光州隋改弋陽郡唐為光州又自光山徙定城皇朝因之以神宗潛邸升光山軍節度中興以來改為蔣州復為光州今領縣三治定城事要郡名浮光風俗人性躁徑隋志江都弋陽云云氣習果決視死如歸俗好儉約同上其丨尚淳質而丨丨丨俗美民淳郡守任詩勸學文云云其異才秀民業儒術以自見于世地雄物夥浮光志序云云士尚名教郡志西漢之時其俗急疾有氣勢東漢冇月旦評汝潁復多竒士本朝拊摩習俗雅循靖康之難海陵之城不陷于金云云居田里者亦畏禮法形勝面山負野茹令芑賞心堂記云云限淮為圻襟帶長淮郡志云云控扼潁蔡為一方巨屛下濕墝埆漢孫叔敖廟碑楚莊王頡封孫叔敖之子子辭曰如楚不忘臣父而欲賞必于潘國云云人所不貪遂封潘即固始山川杏山在固始亦名弋山上有抱朴子仙迹甚多皇朝元符間郝及中詩佩蘭隱者今何在煉杏仙翁去不還浮光山在固始縣西八十里一名浮弋山水經云此即弋陽山出名玉及黑石棊子梅林山在固始自此山隘口至􅑕港皆山險去處可以守禦鐵林山在固始可以把守石額山在固始縣紹興初忠義軍統領張昻據之為寨石盤山在沙窩之西自山腰盤旋取道而登其勢險峻可屯千餘人五關在光山縣西南一曰白沙二曰土門三曰斗木嶺四曰黃土嶺五曰修善嶺又見黃州中渡市在光山縣北十里與蔡彰息縣灌陽對境沙窩市在光山縣東百八十里有寨金漿湖源出固始縣大蘇山唐陳德順命名淮水去固始縣六十里澮水在故殷城縣五里淠水在固始縣西五十里潢水在城北龍塘在固始縣北世傳漢髙祖從此遁去墮玉鞭塘中井泉金線泉在北外河水名堂閣煙水堂在光山縣西張紫微詩此堂縱逐人俱廢亦有陽氷篆字存愚閣見盛文肅弋陽十詠樓臺鎮淮樓在州城潢橋門上籌邉樓即雙櫻樓舊基修竹臺宋盛度詩我來小小郡愛此髙髙臺前對蒼筤竹萬竿球琳材祠廟溫公祠記云公父池以天禧甲午自湖南赴闕夫人有娠次光山驛一夕生公相傳有光山驛裏生司馬之句因以名之或謂即父為光山令時名宦臧宫後漢人封期思侯屈突通唐人封蔣國公皇朝盛度為守諡文肅司馬池陕州人盛度守光州池為光山令大內火詔諸州市竹木期以三日畢輸池以土不産轉市于鄰郡非三日可得度怒甚而光山為諸邑先池于民有信而不俟于催督也王堯臣知光州嵗旱民發倉廪吏法當死公謂飢民求食減死遂以為令後拜相諡文忠鄭俠字介夫福唐人嘗從王安石學舉進士調光州司法秩滿言青苗免役用兵之害坐責詳見福州朱勝非宣撫人物孫叔敖為楚相黃歇世傳州治即歇故宅丁蘭今固始有丁母塜祖尚樂安人唐有傳題詠山城信夷曠盛度詩我來佩竹使方且憩熊轓云云公庭接園樊居常郡事簡前人詩云云間或囹户空分得方州在淮澨前人詩前年斗直涒灘嵗云云潢河繞出郡城樓趙彥珗詩云云樓枕潢南城上頭天闊星連翼軫分地長川帶漢江流四六光山名郡淮甸奧區隱然巨屏端若長城重兵出戍聿嚴萬竈之屯要地分符兼恃五關之險以司馬公育秀之鄉宜知遺烈以盛文肅分符之郡盍繼流芳平日承流盡是龔黃之惠一朝排難羣推張許之忠方輿勝覽卷五十
