body:
  text: 方輿勝覽卷二十九宋祝穆撰岳州巴陵臨湘平江華容建置沿革禹貢荆州之境古三苖國也楚分翼軫之次春秋麋羅二國秦属長沙郡漢属南郡吳以為重鎮晉属長沙郡宋曰巴陵郡梁置巴州又置羅州隋曰岳州又置玉州復曰巴陵郡唐置巴州改岳州國朝因之以英宗潜邸領岳州團練使陞岳陽軍節度中興改純州華容軍尋復為岳州及岳陽軍節度領縣四治巴陵事要郡名岳陽居天岳山之陽風俗人性悍直郡志土厚水深故云云女子皆服力役郡志云云芻蕘儥賣力奪男夫否則恥之以漁為生同上諸巴之地面背江湖每遇霖潦則壞堤决埽民無安止中人之産不過十金以舟為家云云者十室而四五其土人則以潭户名之形勝左洞庭右彭蠡同上古三苗國云云背衡嶽面重湖譙門記云云北通巫峽同上云云南極瀟湘湘水環其左同上云云岷山揖其右兼有江湖之勝郡志地有四瀆江為之長五湖洞庭為之最江湖之勝巴陵兼有之城小而固舊經云魯肅所立唐天寳初裴光贊重加版築今以前史考之侯景之亂湘東王繹以王僧辯為大都督軍至巴陵遺僧辯書曰但守巴邱以逸待勞又謂僚佐曰巴陵云云僧辯足可委任景水陸並進僧辯乗城固守偃旗卧鼓安若無人景服其膽勇荆潭黔蜀四㑹之衝歐陽偃虹堤記據衡湘巴蜀荆楚之㑹滕宗諒桂亭記山川天岳山在洞庭湖一名幕阜前有培塿曰巴蛇冢髙一萬八千尺周亘五百餘里昔有真人艾君居之石崖壁立飛鳥莫息壁有文夏禹治水嘗至此東隅有温泉三穴郡縣志山臨大江吳使魯肅以萬人屯巴邱即此又云蜀先主稱尊號凡文誥䇿命皆劉巴所作卒葬岳陽後人因號為巴陵尋江記羿屠巴蛇於洞庭其骨若陵故謂之巴陵白鶴山在巴陵縣山之南有兩池池潛巨蠎吕翁招而出化而為劒南阜有老木木末悉稿蔓草翳焉翁嘗憇其下有人自木杪降而拜之惟松之精翁授之藥小説有江叟者好吹笛嘗遇樵叟而髯髯遺江銕笛毎於君山之龍潭吹之無聲一日携笛登丨丨丨吹於紫荆䑓響震林谷忽有兩女子出授神藥云服此當為水仙後不知所終女子盖龍云道巖山在巴陵縣有巨石中窽而邃東西可以輿馬往返容屋百楹上下流泉不竭有斷石云許旌陽嘗以礪劍斬蛟君山在湖中方六十里亦名洞庭之山昔舜之二女居之曰湘夫人又曰湘君所逰故名丨丨湘中記昔秦皇欲入湘觀衡山而遇風浪幾溺至此山而免郡志君山狀如十二螺髻北夢瑣言湘江北流至岳陽達蜀江夏潦後蜀江漲遏住湘波溢為洞庭湖凡數百里而君山宛在水中秋水歸此山復居於陸惟一條湘川而已劉禹錫詩湖光秋色兩相和潭面無風鏡未磨遥望洞庭山水翠白銀盤裏一青螺黄魯直詩滿川風月獨凭欄綰結湘娥十二鬟可惜不當湖水滿銀山堆裏㸔青山湘中老人者有洞庭客吕雲卿嘗遇之於丨丨側索酒數行老人歌曰湘中老人讀黄老手挼紫藟坐碧草春至不知湘水深日暮忘却巴陵道蘇子瞻云唐末有人誦此詩殆是李謫仙輩老人真遁世者也酒香山湘州記君山上有美酒飲者不死漢武帝遣欒巴求得之未進御東方朔竊以飲帝怒欲殺之對曰茍殺臣臣亦不死已死酒亦無騐遂赦之𤣥石山亦名墨山在華容縣楚詞有云馳余車於元石即此地也石門山張説詩序丨丨與墨山相連有禪堂道觀天下絶境石牛山在平江上有井泉可以避地烏黎山亦名烏林郡志漢沔在夏口北赤壁在夏口南烏林在赤壁南巴陵又在烏林南華容道在巴陵西楞伽峯在巴陵東南有無姓和尚居之栁宗元為記三江郡縣志巴陵城對丨丨岷江為西江江為中江湖湘為南江洞庭湖在巴陵縣西西吞赤沙南連青草横亘七八百里日月若出沒其中風土記鼎澧沅湘合諸蠻黔南之水匯于洞庭至巴陵與荆江合王直方云老杜有過洞庭詩曰蛟室圍青草龍堆擁白沙䕶江盤古木迎棹舞神鴉破浪南風正收㠶畏日斜雲山千萬疊底處上仙槎李希聖云得之江心小石上孟浩然詩八月湖水平涵虛混太清氣蒸雲夣澤波撼岳陽城欲濟無舟楫端居恥聖明可憐垂釣者空有羨魚情李白逰洞庭詩洞庭西望楚江分水盡天南不見雲日落長沙秋色逺不知何處弔湘君小説開寳中有賈知微遇曽城夫人及二妃於洞庭歌曰黄陵廟前春草生黄陵女児茜羅帬輕舟短棹唱歌去水逺天長愁殺人歌畢贈之羅巾而去劉元方嘗宿湖岸驛中夜聞歌聲朝閲楹間有題云爺娘送我青楓根不記青楓幾囘落當時手刺衣上花今日成灰不堪着青草湖一名巴邱湖北洞庭南瀟湘東納汨羅之水自昔與洞庭並稱赤亭湖在華容縣郡縣志有赤亭城三面臨水即梁遣胡僧祐所據城赤沙湖與洞庭通㴩湖在巴陵南十里左傳定公四年吳人敗楚於雍澨即此郡志夏潦奔注則泆為此湖冬霜既零則涸為平野雲夢澤禹貢曰雲土夢作乂則是二澤也按左傳桓公四年載邙夫人使棄諸夢中言夢而不言雲定公四年載楚子涉睢濟江入于雲中言雲而不言夢正與禹貢合杜預注雲夢跨江之南北漢陽圗經雲在江之北夣在江之南西水郡志荆江六七月間其水暴漲逆泛洞庭旬日乃復謂之西水五瀦資水沅水澧水湘水同注洞庭北㑹大江謂之丨丨戰國䇿秦與荆戰大破之於洞庭五瀦金沙堆在洞庭湖中延袤數里張安國有賦鱘魚觜風土記昔傳有異人䜟曰江西沙洲過岳陽樓即出狀元鴨欄磯即建昌侯孫慮作閗鴨欄於此楊子洲在華容縣昔日荆佽飛斬蛟之所偃虹堤城濠東北湖面百里毎西南風濤聲萬鼓晝夜不息漱囓城下滕子京欲為丨丨丨以捍之預求記於歐陽公未幾滕去遂不果築建安胡明仲詩云有時風浪戰城西何翅漁陽萬鼓鼙狎水蚩蚩忘墊溺誰人能續丨丨丨盖傷之也井泉雲母泉在華容大雲寺李華詩序元石山盡生雲母如列星井泉溪澗色皆純白樓閣燕公樓在岳陽樓北滕子京序張説謫守作岳陽樓在郡治西南西面洞庭左顧君山不知創始為誰唐開元四年中書令張説出守是邦日與才士登臨賦詠自爾名著滕宗諒作而新之范希文為之記蘇子美書其丹邵踈其首時稱四絶范希文記云慶歴四年春滕子京謫守巴陵郡越明年政通人和百廢具興乃重修岳陽樓増其舊制刻唐賢今人詩賦於其上属予作文以記之予觀夫巴陵勝狀在洞庭一湖銜逺山吞長江浩浩蕩蕩横無際涯朝輝夕陰氣象萬千此則岳陽樓之大觀也若夫霪雨霏霏連月不開陰風怒號濁浪排空日星𨼆耀山岳潛形商旅不行檣傾楫摧薄暮冥冥虎嘯猿啼登斯樓也則有去國懐鄉憂讒畏譏滿目蕭然感極而悲者矣至若春和景明波瀾不驚上下天光一碧萬頃沙鷗翔集錦鱗㳺泳岸芷汀蘭郁郁青青而或長烟一空皓月千里浮光躍金静影沉璧漁歌互答此樂何極登斯樓也則有心曠神怡寵辱皆忘把酒臨風其喜洋洋者矣嗟夫予嘗求古仁人之心或異二者之為何哉不以物喜不以己悲居廟堂之髙則憂其民處江湖之逺則憂其君是進亦憂退亦憂然則何時而樂耶其必曰先天下之憂而憂後天下之樂而樂歟噫微斯人吾誰與歸顔延年與張湘州登巴陵城樓作江漢分楚望衡巫奠南服三湘淪洞庭七澤藹荆牧經途延舊軌登闉訪川陸水國周地險河山信重複却倚雲夢林前瞻京䑓囿清雰霽岳陽曽輝薄瀾澳悽矣自逺風傷哉千里目萬古陳往還百代勞起伏存沒竟何人烱戒在明淑請從上世人歸來藝桑竹韓愈岳陽樓詩洞庭九州間厥大誰與讓南維羣崖水北注何奔放瀦為七百里吞納各殊狀自古澄不清環混無歸嚮炎風日搜攪幽怪多冗長軒然大波起宇宙隘而放巍峩㧞嵩華騰躍較健壯聲音一何宏轟磕車萬輛猶疑帝軒轅張樂就空曠蛟螭露筍簴縞練吹組帳鬼神非人世節奏頗跌蕩陽施見夸麗陰閉咸悽愴朝廽宜春口極北缺隄障夜䌫巴陵洲叢苪纔可傍星河盡涵泳俯仰迷下上餘瀾怒不已喧聒鳴甕盎明登岳陽樓輝煥朝日亮飛㢘戢其威清宴息纎纊泓澄湛凝緑物影巧相况江豚時出戱驚波忽蕩瀁時當冬之孟隙竅縮寒漲前臨指近岸側坐𦕈難望滌濯神魂清幽懐舒以暢主人童孩舊握手乍欣悵怜我竄逐歸相見得無恙開筵交履舄爛熳倒家釀盃行無停留髙柱送清唱中盤進橙栗投擲傾脯醬歡窮悲心生婉孌不能忘念昔始讀書志欲干霸王屠龍破千金為藝亦云亢愛才不擇行觸事得讒謗前年出官日此禍最無妄公卿採虛名擢拜識天仗姦猜畏彈射斥逐恣欺誰新恩趍府庭逼仄厠諸將吁嗟苦駑緩但懼失宜當追思南渡時魚腹甘所葬嚴程廹風㠶劈箭入髙浪顛沉在須㬰忠鯁誰復諒生還真可喜剋已自懲創庶從今日後粗識得與喪事多改前好趣有獲新尚誓耕十畆田不敢萬乘相細君知蚕織稚子已能餉行當掛其冠生死君一訪杜甫登樓詩昔聞洞庭水今上岳陽樓吳楚東南坼乾坤日夜浮親朋無一字老病有孤舟戎馬闗山隔凭髙涕泗流李白詩樓觀滄海盡川逈洞庭開鴈引愁心去江衘好月來雲間逢下榻天上接行盃醉後凉風起吹人舞袖廻白居易題岳陽城下水漫漫獨上危樓凭曲欄春岸緑時連夢澤夕陽紅處近長安猿攀樹立啼何苦雁㸃湖飛渡亦難此地惟堪畫圗障華堂張與貴人看館驛洞庭南館張祐題詩云一逕逗霜林朱欄遶碧岑地盤雲夢角山鎮洞庭心樹白看烟起沙紅見日沉還因此悲屈惆悵又行吟佛寺興國寺在城南寺有西閣李白詩明湖落天鏡香閣凌雲闕法寳寺唐曰龍興下瞰㴩湖李白嘗與賈舎人于此剪桐望㴩湖作詩云剪落青桐枝㴩湖坐可窺雨洗秋山净林光澹碧滋祠廟三閭廟屈平沉沙之處曰汨羅江在岳州境内正廟以漁父配享唐末有洪州衙前軍將題一絶云蒼藤古木幾經春舊祀祠堂小水濵行客謾陳三酹酒丈夫元是獨醒人名宦張説唐人謫守岳詩益凄惋人謂得江山之助劉長卿為觀察使皇朝王旦為平江宰人物胡廣後漢人居華容縣鄭田自唐以来隠者凡七八人曰丨丨二劉山人嵇處士而劉長卿李頻王昌齡鄭谷輩皆有詩見稱吕巖客字洞賔河中府人唐禮部侍郎謂之孫㑹昌中兩舉進士不第去逰廬山遇異人得長生訣多逰湘潭岳鄂之間人莫之識也岳陽風土記岳陽樓上有吕先生留題云朝逰北粤暮蒼梧袖有青蛇膽氣麄三入岳陽人不識朗吟飛過洞庭湖東軒筆録滕宗諒守巴陵有華州囘道士上謁風骨聳秀滕知其異人口占以贈之曰華州回道士来到岳陽城别我逰何處秋空一劍横回聞之憮然大笑而别或云宗諒因密令畫工傳其像今岳陽樓傳本狀貌清俊與俗本特異名賢韓註以直言忤代宗貶岳陽杜甫贈韓諫議詩今我不樂思岳陽身欲奮飛病在牀美人娟娟隔秋水濯足洞庭望八荒鴻飛𡨕𡨕日月白青楓葉赤天雨霜玉京羣帝集北斗或騎麒麟翳鳳凰芙蓉旌旗雲霧樂影動倒景摇瀟湘星宫之君醉瓊漿羽人稀少不在旁似聞往者赤松子恐是漢代韓張良昔隨劉氏定長安帷幄未改神惨傷國家成敗吾豈敢色難腥腐飡楓香周南留滯古莫惜南極老人應夀昌美人胡為隔秋水焉得置之貢玉堂陳與義嘗假館郡圃所居室自號簡齋題詠江國踰千里杜甫詩云云山城僅百層岸風翻夕浪舟雪灑寒燈留滯才難盡艱危氣益増圗南未可料變化有鵾鵬地圗封七澤竇庠酬退之詩云云天限鎖重髙清晨登巴陵李白詩云云周覽無不極城郭蜂房綴朱頔詩岳陽多邱山云云瀟湘春水來杜牧早春寄岳州李使君李善棊愛酒情地閑雅云城髙倚峭巘地勝足樓䑓朔漠暖鴻去云云縈盈幾多思掩抑若為裁返照三聲角寒香一樹梅烏林芳草逺赤壁健㠶開往事空遺恨東流豈不迴分符潁川政弔屈洛陽才拂匣調珠柱磨鉛勘玉杯棊飜小窟勢壚撥凍醪醅此興予非薄何時得奉陪猿呌洞庭秋雍陶送徐使君赴岳州詩渺渺楚江上風旗摇去舟馬歸雲夣晚云云别思滿南渡鄉心生北樓巴陵山水郡應稱謝公逰四六問津湖右分壘岳陽控連七澤彈壓重湖維郡之分據水之㑹北通巫峽西極瀟湘惟岳陽之凋郡占湖右之要衝分符夣澤之濱息駕洞庭之野地分千里以維均郡以一樓而増重面湖背嶽乃形勝之要區囊山帶江亦往来之孔道吞雲夢八九於胸方將坐嘯展洞庭萬里之眼自足生春啼猿嘯虎聊尋駭異之觀翳鳳騎麟行慶清華之召京洛雲山外方佇來儀乾坤日夜浮又煩坐鎮壁題巖客之詩知非俗境樓有范公之記喜得壯逰先天下之憂後天下之樂不在兹乎有刺史之榮無刺史之難亦足試矣峽州夷陵長陽宜都逺安建置沿革禹貢荆州之域鶉尾之分野春秋及戰國属楚秦漢為南郡魏武置臨江郡蜀改宜都郡吳曰西陵晉宋齊並為宜都郡梁置宜州西魏改為托州後周以地扼三峽之險改托為硤隋改夷陵郡唐改峽州始從山國朝因之中興移治于紫陽山又于石鼻山尋復故今領縣四治夷陵事要郡名夷陵西陵峽口風俗民俗儉陋郡志常自足無所仰於四方業儒者鮮同上地僻而逺歐陽永叔至喜亭記云云地僻而貧歐陽永叔記曰云云故夷陵為下縣而峽為小州形勝西通全蜀荆渚記夷陵郡居大江之上云云故夷陵有安蜀古城北轅襄漢張商英記云云南下荆鄂陸輦秦鳳歐陽永叔至喜亭記曰云云距三峽之口郭見義三㳺洞記云云介重湖之尾在吳蜀之介寰宇記云云西陵重鎮元和志郡城陸抗所築吳改丨丨以為丨丨楚之西塞袁崧宜都山川記云南有荆門山北有虎牙山相對云云也在今宜都國之西門通鑑吳陸抗曰西陵建平國之藩表臣父遜昔上言西陵云云若有不守則荆州非吴有也峽險至此平夷歐陽末叔送田秀才序巴丨之丨丨丨地始丨丨西陵勝景三張安國記丨丨之丨丨丨亭曰至喜樓曰楚塞洞曰三㳺夏后疏鑿文選江賦巴東之峽云云楚王墳墓夷堅志丨丨丨丨之地土産米麫魚歐陽永叔與尹師魯書夷陵有丨丨丨如京洛椒紙漆歐陽公記有丨丨丨以通商賈夷陵紙不甚精熟然最奈久歐公紙説三省中帳籍惟峽州者不壊山川夷陵山一名西陵峽在夷陵縣西北二十五里吴志云陸遜破劉備還屯丨丨守峽口以備蜀即此丨是也宜陽山有風井穴大如甕夏出冬入有樵人置笠穴口風噏之後扵長陽溪口得笠則知潛通也落鍾山系本云廩君之先故出巫峽丨丨丨石穴中穴有二所廩君出扵赤穴餘姓出於黒穴黄牛山荆州記南崖有重嶺疊起崖間有石色如人牽牛人黒牛黄成就分明加以江湍紆迴行途經宿猶望見之行者歌曰朝𤼵黄牛暮發黄牛白居易詩白狗次黄牛灘如竹節稠路穿天地險人續古今愁虎牙山在夷陵東南三十五里荆州記丨丨二丨臨江楚之西塞馬鞍山在夷陵縣通鑑陸遜攻劉備備升丨丨丨陳兵自遶即此山石鼻山夷陵志後周移峽州州治於此其山隔大江髙五百餘仞廣袤二十里下臨江流中有石横六七十丈如簰筏又呼為石簰重山在長陽上有風穴夏則風出秋則風入春秋分則静孤山在逺安縣有陸抗城袁崧嘗登此山謂俯見大江舟如鳬雁丹山在逺安時有赤氣故名鹿溪山在逺安西六里鹿苑寺之側山皆鹿疃梁居士陸法和云著脚名山多矣未有如鹿溪者遂棲隠焉石龕猶存百井山在逺安西四十五里髙三千五百丈有清泉數十級絶頂望見江陵望州山在宜都縣可望見州巫峽其間首尾百六十里謂之丨丨宋玉賦我帝之季女名曰瑶姬未行而亡封於丨丨之陽髙唐之岨旦為雲暮為雨朝朝暮暮陽䑓之下故為立廟號朝雲焉明月峽在夷陵倚江干崖面其白如月又如扇西陵峽楊烱詩絶壁聳萬仞長波射千里盤薄荆之門㴞㴞南國紀楚都昔全盛髙邱烜望祀秦兵一旦侵夷陵火潛起四維不復設關塞良難恃洞庭且忽焉孟門終已矣自古天地闢流為峽中水行旅相贈言風濤無極已及余踐斯地環竒信為美江山若有靈千載伸知已白起洞在夷陵世傳白起燒夷陵時駐此三游洞白居易與弟知退及元徽之㑹於夷陵尋幽踐勝知退曰斯景勝絶天地間有幾乎蘇子瞻三游洞詩一逕遶山翠縈紆似去蛇忽驚溪水急争看洞門呀滑磴攀秋蔓飛橋踏古槎三扉迎北吹一穴向西斜難息煙雲老追思嵗月遐唐人昔未到古俗此為家歐陽永叔詩漾檝泝晴川捨舟縁翠嶺探竒冒層嶮因以窮人境弄舟終日愛雲山徒見青蒼杳靄間誰知一室煙霞裏乳竇雲腴凝石髓蒼崖一徑横查渡翠壁千尋當户起昔人心賞為誰留人去山河迹更幽青蘿緑桂何岑寂山鳥嘐嘐不驚客松鳴澗底自生風月出林間来照席仙境難尋復易迷山回路轉幾人知惟應洞口春花落流出巖前百丈溪即下牢溪也蘇子由詩洞前危徑不容足洞中明曠坐百人蒼崖硉兀起成柱亂石散列如驚麏清溪百丈下無路水滿沙上如魚鱗夜深明月出山頂下照洞口纔及唇沉沉深黒若大屋野老構火青如燐平明欲出㳺上下洞氣飄亂為横雲深山大澤亦有是野鳥鳴噪孤熊蹲三人一去無復見至今冠盖長滿門清江在宜都寰宇記云一名夷水東自施州開蠻界流入昔巴蠻五姓未有君長令各乗土舟約浮者為君惟務相獨浮因共立之為廩君乃乗土舟從夷水下因立城其傍四姓臣之青溪唐田逰巖愛夷陵青溪上廬其側髙宗親至門謂曰先生此佳否答曰臣所謂泉石膏肓煙霞痼疾赤溪在夷陵昔陸抗封步闡自青溪築城至故市即此緑羅溪歐陽永叔送田秀才序曰逰東山窺丨丨丨滄茫溪在宜都溪生五色石細紋紅如瑪瑙青如玻璃夏雨過人競採掇姜詩溪在州南歐陽永叔詩叢林已廢姜祠在事跡難尋楚語訛詩廣漢人故郭璞詩青溪千仞餘中有一道士借問是何人云是鬼谷子諸灘曰青草曰西蛇曰難禁曰三溜曰偏刼曰叱波曰趍灘曰老翁曰大蛇曰鹿角曰南北兩席頭曰上狼尾皆在州西北硯池在州南昔郭景純注爾雅汲水于此有黒水出焉鳳凰洲在逺安縣昔令韋臯有美政鳳凰㕠集蝦蟇碚在夷陵縣之南凡出蜀者必酌水以瀹茗陸羽第其品為第四唐張又新水記言峽州扇子峽石中突而洩水獨清冷俗謂蝦蟇石其水煎茶為第一黄魯直云蝦蟇碚從舟中望之頤項口吻甚類蝦蟇尋泉源入洞中石氣清寒流泉出石骨若虬龍吼蘇子瞻詩蟆背似覆盂蟆頥如偃月謂是月中蟆開口吐月液根源來甚逺百尺蒼崖裂當時龍破山此水隨龍出入江江水濁猶作深碧色稟受苦清潔獨與凡水隔豈惟煑茶好醸酒應無敵歐陽永叔石溜吐陰崖泉聲滿空谷能邀弄泉客繫舸留岩腹陰精分月窟水味標茶籙共約試春芽槍旗幾時緑井泉五眼泉在宜都西三十五里有龍今有祠堂亭絳雪堂在州治歐陽永叔集云峽州署中舊有千葉紅梨花知郡朱郎中始加欄檻命坐客賦之公詩云風輕絳雪尊前舞日煖繁香露下聞四賢堂在州治二蘇歐黄也六一堂在夷陵縣至喜亭歐陽永叔作亭記云蜀於五代為僭國以陸為虞以富自足舟車之跡不通於中國者五十有九年宋受天命一海内四方次第平太祖改元之三年始平蜀然後蜀之絲枲織文冨衣被于天下而貢輸商旅之往来者陸輦秦鳳水通岷江不絶于萬里之外岷江之来合蜀衆水出三峽為荆江傾折回直悍怒閗激束之為湍觸之為旋順流之舟頃刻數百里不及顧視一失毫釐與崖石遇則縻潰漂沒不見蹤跡故凡蜀之可以充内府供京師而移用乎諸州者皆陸出而其羨餘不急之物乃下於江若棄之然其為險且不測如此夷陵為州當峽口江出峽始漫為平流故舟人至此者必瀝酒再拜相賀以為更生尚書虞部郎官朱公再治是州之三月作至喜亭於江津以為舟者之停留也且誌夫天下之大險至此而平夷以為行人之喜幸夷陵固為下州廩與俸皆薄而僻且逺雖有善政不足為名譽以資進取朱公能不以陋而安之其心喜夫人之去憂患而就簡易詩所謂愷悌君子者矣自公之來嵗數大豐因民之餘然後有作惠于往來以館以勞動不違時而人是頼是皆宜書故凡公之佐吏因相與謀而属筆於修焉天開圗畫在城東五里雲際院楚西第一在州對江普濟院山巔望夷陵甚偉樓䑓南紀樓胡明仲詩西望巫峽峯東望洞庭湖南望大江横北望楚王墟平時十萬户鴛瓦百賈區夜半車擊轂差鱗銜舳艫麥麻謾沃衍家家足粳魚又云古來上流地最重荆州符形勢在東南横跨此其樞楚塞樓在州宅許自誠詩雄當蜀道三千里巍壓荆南十五州何麟詩但見岑樓名楚塞不知元是國西門爾雅臺在州宅方輿記郭璞注爾雅於此臺有廟祠廟黄牛廟在黄牛峽名靈應廟相傳佐禹治水有功蜀後主建興初諸葛武侯建祠然三國時西陵建平非蜀土而任清臣記亦不言日月歐陽永叔為夷陵令日作黄牛廟詩曰大川雖有神淫祀亦有俗石馬繫祠門山鴉噪林木後子瞻䟦云嘗聞之於公予昔以西京留守推官為館閣校勘時同年丁寳臣元珍適來京師夢與予同舟泝江入一廟中拜詔堂下予班元珍下方拜時像起既出門見一馬隻耳覺而語予固莫識也已而元珍除峽州判官余亦貶夷陵令一日與元珍泝峽謁黄牛廟入門惘然皆夢中所見予為縣令固班元珍下而門外鐫石為馬缺一耳相視大驚乃留詩廟中盖私識其事也名宦張飛先主既定江南以飛為宜都太守陸遜領宜都太守許紹為峽州刺史蕭銑圍峽州紹擊走之悉獲戰艦云韋臯為建安令顔真卿代宗時以言祭器不飭元載以為誹謗由刑書貶峽州皇朝歐陽修以切責諫官遂貶峽州夷陵縣令人物何參夷陵縣人居篤學坊以博學孝義著不求聞達人稱曰處士郭雍河南府人父忠孝從伊川先生二十年頗得其學後持憲陜西死扵金人之難雍隠扵長陽縣之下魚山懼父學之湮没乃推先志纂前書乾道初召力辭授冲晦處士有易中庸説名賢程頤貶涪州移峽州劉安世為正言論蔡確章子厚責嶺外後復貶峡州張商英以斥蔡京謫峽州題詠巫山夾青天李白上三峽題詩曰云云巴水流苦兹巴水忽可盡青天無到時三朝上黄牛三暮行大遲三朝又三暮不覺鬢成絲闊狹各一葦白居易初入峡詩上有萬仞山下有千丈水蒼蒼兩崖間云云巖腹有穿壙蘇子瞻出峽忽聞巫峽尾云云仰見天蒼蒼石室開兩向宣尼古廟宇叢木作幃帳鐵循横半空俯瞰不計丈古人誰架構下有不測浪石竇見天囷瓦棺非古葬玉虛悔不至實為舟人誑退思偶成篇聊贈舟人唱峽口巴江水司空曙送史申之峡州詩云云無風浪亦飜蒹葭新有雁雲雨不離猿江客思鄉逺愁人頼酒昏檀郎好聮句莫滯謝家門一條白練峽中央白居易詩萬丈赤幢潭厎日云云一葉纔通石罅間雍陶峡中行兩崖開盡水回環云云楚客莫言山勢險世人心更險于山出峽朝天第一州劉長源詩云云史君重敞最髙樓蜀江雪浪初平處楚國金城欲盡頭江轉荆湖第二州張權題詩巴渝東畔楚西畔云云夷陵城闕倚朝雲胡曽詠詩云云戰敗秦師縱火焚何事三千珠履客不能西禦武安君岡勢元依陸抗城查籥詩云浪痕自記彭岑壘云云南標銅柱北虎牙王龜齡詩云云天險城邊古西塞外邑夷陵雖小邑蘇子瞻至喜亭詩云云自古控荆吳形勝今無用英雄久已無誰知有文伯逺謫自王都人去年年改堂傾嵗嵗扶追思猶咎吕感歎亦憐朱舊種孤楠老新霜一橘枯清篇留峽洞醉墨寫邦圗故老問行客長官今白鬚著書多念慮許國减歡娱寄語公知否還須數倒壺四六西陵古郡南國上㳺荆為重地峽占上㳺逺聮胡嶠近接岷江山號虎牙灘名狼尾巴蜀恃為咽喉荆楚倚為根柢據南楚之上游控西蜀之要㑹載惟三峽之偏州乃是六朝之要地壤鄰襄漢當折衝禦侮之機地控東南為深根固蔕之所雖云僻郡固難要譽以進身然念逺民尤在承流而宣化杖藜登水榭而揮翰宿春天前稱杜老漾檝泛晴川而捨舟縁翠嶺後美歐公公將把麾豋至喜之亭熟覽醉翁之迹僕方杜門繼歸來之賦敢希靖節之風荆門軍長林當陽建置沿革星土分野三代以前並同江陵府前漢南郡有臨沮當陽編都縣皆荆門之地而編都乃今長林也晉立武寜軍扵故編縣其属有長林縣隋省入長寧縣属南郡改長寜為長林唐置基州後廢属荆州尋以舊基州之地長林縣立荆門縣属江陵府五代朱梁割據為荆門軍皇朝以荆南之荆門鎮為軍後廢為縣属江陵元祐間知荆南唐義問請復為軍從之今領縣二治長林事要郡名荆門春秋時楚地故曰丨丨風俗冠盖旁午朱震惠泉詩序荆門控扼要衝丨丨丨丨于道形勝東帯漢水朱震鼔角樓記云云西被峽石西控巴峽滿中行壁記云云扼其咽喉東連鄢郢為之襟帯南距江陵張式鼓角樓記云云北界漢水北抗沮川晏類要介荆襄之兩間張師中撰鼓角樓記云云信荆楚之門户滿中行荆門軍記云云襄漢之藩垣與襄陽相犬牙荆門軍記云云為用武之國朱漢圖經序云俯雲夢連巫峽據襄陽之阻通沮漳之利由楚漢迄唐季云云山川荆門山宜都山記即楚西塞張式記峯巒對起厥狀如門章山在長林縣九域志云即禹貢所謂内方也䝉山一名硤石山在軍城西百餘步兩巒對起如蛾眉有二泉水發其麓曰蒙惠屏風山在長林西北三十五里壁立如屏幃絶頂平衍中有兩泉紹興間郡守建盧其上為避地之計開禧丙寅郡守李直柄亦徙居焉磨劍山在長林縣馬鞍山西有秦王磨劔石上多礪痕東山去軍城一里許西山在城西三里有洞及海會院靈鷲山在長林北舊有寺有穴曰龍洞有石臺甚髙金薄山在長林有金石如雲母中城山在軍城磨林溪之東觀有石碑上有城壘極峻險紫盖山在當陽縣有二峯四垂若繖有觀及丹井葛立方送舒殿丞詩紫葢亭亭秀荆渚股分綵水穿林莽尚想當年老阿瞞燕騎蛇矛走先主緑林山元和志在當陽縣東南百二十里漢光武起兵于此輿地廣記即所謂當陽之長坂也曹公追先主而張飛拒之于此後漢劉元傳諸亡命共攻離鄉聚藏於緑林中圓臺山在當陽縣東六十里俗傳唐玉真公主建粲霞觀于此方山在當陽北三十里漳水之上四顧峰巒環列玉泉山山有寒泉過客多題詩左溪在長林縣盖蠻人姓左所居蠻水在鷄鳴澗北即夷水也桓温父名彛改曰丨丨王建詩荆門行喚起官舡渡丨丨漳水在當陽縣北左傳江漢沮漳楚之望也綵水出紫盖山下綵碧馨香建水在郡北百里金龍潭在當陽北二十五里徽廟時嘗投金龍鎮潭中井泉南泉出白崖麓之南其水溉田千頃䝉泉在城西䝉山南曰蒙泉北曰惠泉晝夜兩潮水溢數寸世傳南出玉北出珠朱震詩序詩人才客臨流濯纓賦詩紀行徘徊乎清冷之濵而不忍去沈傳師詩京路馬駸駸塵勞日向深䝉泉聊息駕可以洗君心蘇子瞻詩楚人少井飲地氣常不洩蓄之為惠泉坌若有所折楊繪詩注一派白謂之雄一派碧謂之雌源有雌雄分碧白孫僅詩孤城深鎻亂雲間城上雲開面面山負郭惠泉誰共訪衛公詩碣緑苔班歐陽永叔詩淹留桂樹幾經春野鳥岩花識使君使君今是尊前客誰與山泉作主人惠泉在荆門蘇子由詩泉源何從來山下長溪𤼵油然本無營誰使自激烈茫茫九地底大水浮一葉使水皆為泉地已不勝洩應自衆水中獨不容至潔涓涓自傾㵼奕奕見清澈石泓净無塵中有三尺雪下為百丈溪冷不受魚鱉脱衣浣中流解我雙足熱樂哉泉上翁大旱不知渴亭榭湖北道院在郡治荆岑偉觀在郡治潛玉亭在䝉山亭序云有卞氏抱玉亭在疆内則此山之有美玉信矣李衛公詩明珠雖秘彩美玉詎藏珍寒亭在玉泉山人多題詩獨一篇云朔風凜凜雪漫漫未是寒亭分外寒六月火雲天不雨請君來此凭欄干佛寺玉泉寺在當陽縣西南二十里玉泉山陳光大中浮屠知覬自天台飛錫來居此山寺雄於一方殿前有金龜池玉泉詩序山水之勝甲天下張曲江孟浩然輩嘗託於詩以冩其勝名宦皇朝陸九淵為守號象山人物皇朝胡安國有故居在金龍潭上題詠䇿馬傍荆岑張九齡詩指途躋楚望云云荆門蔽三巴孟浩然詩云云塵土荆門路劉禹錫歌云飛煙紀南城云云天寒多獵騎走上樊姬墓春水月峽來李白荆門浮舟望蜀江詩云云浮舟望安極正見桃花流依然錦江色玉馬朝周從此辭劉禹錫後梁宣明二帝陵詩云云園林寂寞對豐碑千行宰樹荆門道暮雨瀟瀟聞子規宋臺梁館尚依依劉禹錫荆門道中南國山川舊帝畿云云霜落荆門江樹空李白秋下荆門詩云云布帆無恙掛秋風斜分漢水横湘水王建作詩云云山青水緑荆門間土風南去接荆蠻孫僅送岳州舒殿丞詩江路北來通漢水云云看炊紅米煮白魚王建荆門行峴亭西頭路多曲櫟林深深石簇簇云云夜向灘頭店家宿楚俗嵗時多雜鬼歐陽永叔詩春山四顧亂無涯雞犬蕭條數百家云云蠻風言語不通華四六疏恩魏闕紆紱荆門擁江帶漢控蜀接淮有嚴要害之防兼制剽輕之俗是為要地乃古人交戰之場雖曰小邦實今日必争之地千里分疆守險壯貔貅之旅五方雜處受㕓多鴻雁之民其在荆襄實相依於唇齒若論巴蜀亦有係于襟喉廢而為邑賦租褊嗇而不優陞以作邦保鄣要衝而當守方輿勝覽卷二十九
