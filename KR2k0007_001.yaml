body:
  text: 方輿勝覽卷一宋祝穆撰臨安府臨安府錢塘於潛仁和新城餘杭鹽官臨安昌化富陽建置沿革禹貢揚州之域寰宇記牽牛婺女呉地斗分野漢地理志春秋時初屬越越敗屬呉呉㓕又屬越越敗屬楚秦併天下屬㑹稽郡漢因之東漢分浙西為呉郡陳立錢塘郡隋平陳置杭州唐改為餘杭郡後復為杭州國朝錢俶納土改為寧海軍分浙東西為兩路陞為帥府中興駐蹕陞杭州為臨安府仍舊浙西安撫使兼兵馬鈐轄統郡八領縣九治錢塘仁和兩縣兩浙轉運置司事要郡名行在所漢書天子以四海為家故所居曰丨丨丨國朝紹興八年詔昔在光武之興雖定邦於洛而車駕往返見於前史者非一用能奮揚威靈逓行天討上繼隆漢朕甚慕之朕荷祖宗之休克紹大統夙夜危懼不常厥居比者廵幸建康撫綏淮甸既已申固邊圉奬率六軍是故復還臨安内修政事繕治甲兵以定基業非厭雨露之苦而圗宫室之安也遂定都故今日以臨安府為丨丨丨脩門見宋玉賦京華見選詩武林以山得名錢塘九域志錢塘初為潮水所損州人華信以私錢作塘捍潮因號丨丨餘杭寰宇記夏禹捨舟航登陸于此因名風俗其俗輕揚圗經古揚州丨丨勁躁而丨丨故曰揚州其民好用劔漢志吴越之君尚勇故云云輕死易𤼵其君子尚禮隋志云云庸庻厚厖其習俗工巧見後有美堂記邑屋華麗同上俗尚侈靡臨安志米珠薪桂馬子才送陳自然西上序畧曰朔風驚沙枯梢號寒子行亦良苦聞之京師曰丨如買丨丨如束丨膏肉如玉酒樓如登天驟雨至矣黒潦滿道則馬如㳺龍清霜激風客衣無襦抱膝而苦調則火如紅金以舟檝為車馬吴越春秋人性脆水行山處以舟為車以檝為馬商賈並凑隋志餘杭有海陸之饒云云五方雜處周淙告詞輦轂之下云云豪强輕扵犯法姦伏易以乗間巧偽充斥奸獄繁興非得材臣罔克彈治形勝西界浙河唐杜牧云云東奄左海内抱湖山秦少㳺雪齋記杭大州也外帯濤江漲海之險云云竹林之勝其俗工巧羞質朴而尚靡麗其事佛為最勤為一都㑹見有美堂記平陸皆江之古地蘇子瞻六井記潮水避錢塘而東擊西陵所從来逺矣沮洳斥鹵化為桑麻之區而久乃為城邑聚落凡今州之云云輦轂之下先彈壓唐栁仲郢云天下之形勢晁无咎七述云杭之故封左浙江右具區北大海南天目萬川之所交㑹萬山之所重複或瀨或湍或灣或淵或岐或孤或袤或連滔滔湯湯渾渾洋洋纍纍浪浪隆隆卭卬若金城天府之疆其民既庶而且有既姣而多娱可導可疏可航可桴可跂可踰可檋可車若九洲三山接乎人世之廬連延迤邐環二十里邑居攸聚蟻合蜂起髙城附之如帯繞指隠以為春折以為尾湮河塹華不足方比方城漢水胡敢競美當昔夫差之盛時内姑蘇以為心腹而外城此以為身革車千乗甲士萬人粟支十年帛散千屯灑汗成雨連衽成雲乃有大夫伯嚭行人伍貟之徒通其謀將軍孫武公子夫差之徒用其衆嘗以國政之閒𤼵徒截江命習戰事扵是張翆羽之葢靡魚須之斿擢鵞足之楫曵龍尾之舟凌鱣黿之車戲賁育之儔飄鼓吹乎下風隘戈矛乎上流乍往乍還乍後乍先若亂而若聨乍止乍馳乍合乍離迭唱而迭随驚鮫人泣馮夷清江忽兮怒濤颷風為之揚旗已而即次食具樂作三軍皆賀響震山壑其强如此故姑蘇恃以為南蔽而能驅唐蔡蹂齊魯侵尋乎百粤隳突乎三楚栖勾踐乎窮山鞭平王乎頽墓此亦天下之形勢也過其地者必駐軾西征記自浙江艤舟古岸下登其上曰杭州横空列城為國大藩乗熊軾而建隼旟必王公巨人非刺史郡太守常貳千石比也觀其閩商海賈雲赴輻凑犀貝魚鹽駢羅于其中龍山據其首西湖蟠其腹天竺聳其膺東山卧其背樓臺上下如錦繡圗被髪文身者吴越之舊俗也水犀射首者戰江之餘勇也金堤玉渠靈臺廣榭者錢氏之故基也霓裳羽衣綽約靡曼者蘇小之遺態也故過其地者必軾焉山川鳳凰山在城中下瞰大江直望海門今大内在焉郭璞地記天目山前兩乳長龍飛鳳舞到錢塘吴山在錢塘縣南六里上有伍子胥廟命曰胥山有井泉清而且甘孤山去錢塘舊治四里湖中獨立一山人多留題紹興十六年建四聖延祥觀張祜詩斷橋蒼蘚合空院落花深包家山在嘉㑹門外多植桃春時都人㳺觀㝡為勝賞武林山在錢塘舊治之北半里今為錢塘門裏太一宫道院土阜是也元名虎林避唐朝諱改虎為武寳蓮山在呉山之北龍山在城南十里郭璞所謂龍飛鳳舞天目山在臨安縣西五十里有兩峰峰頂各一池左右相對名曰丨丨丨有洞府三十六所嘗有徐五仙張道陵飛昇定山在錢塘南四十七里突出浙江数百丈潮至此輒抑聲過此復雷吼霆怒沈約早𤼵詩夙齡愛逺壑晚涖見竒山標峰綵虹外置嶺白雲間傾壁忽斜竪絶頂復孤圎歸海流漫漫出浦水濺濺野棠開未落山櫻發欲然忘歸屬蘭杜懐祿寄芳荃眷言採三秀徘徊望九仙浮山在錢塘舊治東南四十里蘇子瞻奏狀云潮山東来勢若雷霆而丨丨峙于江中犬牙錯入以亂潮水廟山在錢塘縣南七十里突出江心潮勢至此方殺臨平山晉武帝時丨丨丨崩出一石鼓擊之無聲以問張華華云可以蜀中桐木刻作魚形扣之赤松山在富陽縣赤松子嘗駕鶴于此萬松山去錢塘十里夹道栽松白居易詩萬株松木青山上十里沙堤明月中慈雲嶺在嘉㑹門外上有錢王郊壇風篁嶺修篁恠石風韻凄然因名丨丨丨鷲嶺在府西十二里有巖石龍泓洞十三洲記曰錢塘武林山泉源出焉晉咸和中有西乾梵僧登此山歎曰此武林山是中天竺國靈丨山之小丨不知何年飛来乃創靈隠寺北髙峯在靈隠山後南髙峰在南山石塢煙霞洞後飛来峰又名天竺山乃葛仙翁得道之所郭功甫詩誰從天竺國移得一峰来占盡湖山秀最宜煙雨開王介甫詩飛来山上千尋塔聞説雞鳴見日昇不畏浮雲遮望眼自緣身在㝡髙層此亦可見公被遇神考始終人不能間也呼猿洞在飛来峯下其洞有路可透天竺水樂洞在南山泉流空谷中自然宫商東陽亦有之風水洞去錢塘舊治五十里在楊村慈巖院洞極大流水不竭洞頂又有一洞清風㣲出故名九里松乃入天竺路蘇公堤元祐間蘇子瞻築堤湖上自孤山抵北山夹道植栁林子中榜曰丨丨丨章子厚詩天面長虹一綫痕直通南北兩山春後吕恵卿奏毁之乾道作新堤自南山净慈寺前直抵北山湖分為兩逰人大舟不能達扵北山紹興中始造二髙橋出北山達扵大佛頭舟行往来始無礙浙江在錢塘荘子云浙河即浙江取其曲折以為名吴王既賜子胥死乃取其屍盛以鴟夷之革浮之江中子胥因流揚波依潮来往蕩激隄岸勢不可禦或有見其乗白馬素車在潮頭者因為之立廟每嵗仲秋既望潮水極大杭人以旗鼓迓之弄潮之戲盖始乎此然或有沉溺者治平中郡守蔡君謨作戒㺯潮文云斗牛之分吴越之中維江濤之㝡雄乗秋風而益怒乃其習俗于以逰觀厥有善泅之徒競作弄潮之戲以父母所生之遺體投魚龍不測之深淵自為矜夸時或沉溺精魄永淪扵泉下妻孥望哭扵水濵生也有涯盍終扵天命死而不弔重棄扵人倫推予不忍之心示爾無窮之戒所有今年觀潮並依常例其軍人百姓輒敢㺯潮並行科罰海潮江源自歙州界經州又東北流入于海江濤每日晝夜再上常以月十日二十五日最小月三日十七日極大小則水漸漲不過數尺大則濤湧髙數丈每年八月十八日數百里士女共觀舟人漁子泝濤觸浪謂之迎潮髙麗圗經云潮汐往来應期不爽為天地之至信古人嘗論之在山海經以為海鰌出入之度浮屠書以為神龍之變化竇叔蒙海嶠志以為水随月之盈虧盧肇海潮賦以謂日出于海衝擊而成王充論衡以為水者地之血脉随氣進退率未之盡大抵天包水水承地而一元之氣升䧏扵太空之中地乗水力以自持且與元氣升䧏互為抑揚而人不覺亦猶坐扵船中而不知船之自運也方其氣升而地沉則海水溢上而為潮及其氣䧏而地浮則海水縮而為汐計日十二辰由子至已其氣為陽而陽之氣又自有升䧏以運乎晝由午至亥其氣為隂而隂之氣又自有升䧏以運乎夜一晝一夜合隂陽之氣凡冄升再䧏故一日之間潮汐皆再焉然晝夜之攻擊乗日升䧏如應乎月日臨扵子則陽氣始升月臨扵午則隂氣始升故也夕潮之期日皆臨子晝潮之期月皆臨午焉又日行遲月行速以速應遲每二十九度過半而月行及之日月之㑹謂之合朔故月朔之夜潮日亦臨子月朔之晝潮日亦臨午焉且晝即天上而言之天體西轉日月東行自朔而往月速漸東至扵漸遲而潮亦應之以遲扵晝故晝潮自朔後迭差而入扵夜此所以一日午時二日午末三日未時四日未末五日申時六日申末七日酉時八日酉末也至夜即海下而言之天體東轉日月西行自朔而往月速漸西至扵漸遲而潮亦應之以遲扵夜故夜潮自朔後迭復而入扵晝此所以一日子時二日子末三日丑時四日丑末五日寅時六日寅末七日夘時八日夘末也以時有交變氣有盛衰而浙潮之所至亦因之為大小當夘酉之月則隂陽之交也氣以交而盛故潮之大也獨異扵餘月當朔望之後則天地之變也氣以變而盛故潮之大也獨異扵餘日今海中有魚獸殺取皮而乾之至潮時則毛皆起豈非氣感而類應之自然歟吴越備史梁開平四年武肅王錢氏始築捍海塘在候潮通江門之外潮水晝夜衝激版築不就因命强弩數百以射潮頭又致禱扵胥山祠既而潮水避錢塘東擊西陵遂成隄岸劉禹錫詩八月濤聲吼地来頭髙數丈觸山囬須臾却入海門去卷起沙堆似雪堆李白詩浪打天門石壁開海神来過惡風廽浙江八月何如此潮似連山噴雪来楊巨源送章孝標歸杭州詩曽過靈隠江邉寺獨宿東樓看海門潮色銀河鋪碧落日光金柱出紅盆蘇子瞻望海樓詩海上濤頭一線来楼頭指顧雪成堆從今潮上君須上更看銀山十二囬横風吹雨入樓斜壯觀應須好句夸雨過潮平江海碧電光時掣紫金蛇江神河伯兩醯鷄海若東来氣吐蜺安得夫差水犀手三千强弩射潮低楊廷秀海潮詩海湧銀為郭江横玉繫腰漁浦潭在州南丘希範旦發丨丨丨詩漁潭霧未開赤亭風已颺擢歌𤼵中流鳴鞞響沓障村童忽相聚野老時一望詭怪石異象嶄絶峯殊狀森森荒樹齊析析寒沙漲藤垂島易陟崖傾嶼難傍信是永幽棲豈徒暫清曠坐嘯昔有委卧治今可尚西湖在州西周廽三十里其澗出諸澗泉山川秀發四時畫舫遨逰歌鼓之聲不絶好事者嘗命十題有曰平湖秋月蘇堤春曉斷橋殘雪雷峯落照南屛晚鐘曲院風荷花港觀魚栁浪聞鶯三潭印月兩峯挿雲蘇子瞻修西湖奏狀昔西漢之末翟方進為丞相始决壊汝南鴻源陂父老怨之歌曰壊陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰言者兩黄鵠盖民心之所欲而託之天以為有神下告我也孫皓時吴郡上言臨平湖自漢末草穢壅塞今忽開通長老相傳此湖開天下平皓以為已瑞已而晉武帝平吴由此觀之陂湖河渠之類久廢復開事關興運雖天道難知而民心所欲天必從之杭州之有丨丨如人之有眉目盖不可廢也唐天慶中白居易為刺史方是時西湖溉田千餘頃及錢氏置撈湖兵士千人日夜開浚自國初以来稍廢不治水涸草生漸成葑田熙寧中臣通判本州則湖之葑合者盖十二三年至今纔十六七年之間遂塞其半父老皆言十年以来水淺葑合如雲翳空倐忽便滿更二十年無西湖矣使杭州無西湖如人而去眉目豈復為人乎臣愚較之竊謂西湖有不可廢者五天禧中故相王欽若奏以西湖為放生池禁捕魚鳥為人主祈福自是以来每嵗四月八日郡人数萬㑹于湖上所放羽毛鱗介以百萬數皆西北向稽首仰祝千萬嵗夀若一旦堙塞使蛟龍魚鼈同為涸轍之鮒則臣子坐觀亦何心哉此西湖之不可廢者一也杭之為州本江海故地水泉鹹苦居民零落自唐李泌始引湖水作六井然後民足扵水井邑日富百萬生聚待此而汲食今湖狭水淺六井漸壊若二十年之後盡為葑田則舉城之人飲鹹苦其勢必自耗散此西湖之不可廢者二也白居易作西湖石函記云放水溉田每减一寸可溉十五頃可無凶嵗今雖不及千頃而下湖數十里間茭葑榖木所獲不貲此西湖之不可廢者三也西湖深濶則運河可以取足扵湖水若湖水不足則必取江潮潮之所過泥沙渾濁一石五斗不出三嵗輒調兵夫十餘萬工開浚而河行市井中盖十餘里吏卒搔擾泥水狼籍為居民莫大之患此西湖之不可廢者四也天下酒税之盛未有如杭者也嵗課二十餘萬緍而水泉之用仰給于湖若湖水漸狭水不應溝則當勞人取山泉嵗不下二十萬工此西湖之不可廢者五也臣以侍從出膺寵寄目覩西湖有必廢之漸有五不可廢之憂伏望聖斷賜臣度牒若干道使得畢志半年之間目見西湖復唐之舊環三十里際山為岸則農民父老與羽毛鱗介同詠聖澤無有窮己臣不勝大願白居易錢塘湖春行詩孤山寺北賈亭西水面初平雲脚低最愛湖東行不足綠楊隂裏白沙堤湖上泛舟詩排比管絃行翆袖指麾船舫㸃紅旌慢牽好向湖心去恰似菱花鏡上行西湖留别詩征途行色慘風煙祖帳離聲咽管絃翆黛不須留五馬皇恩只許住三年綠藤隂下鋪歌席紅藕花中泊妓船處處囬頭盡堪戀就中難别是湖邊蘇子瞻懐西湖寄美叔詩西湖天下景誰能得其全三百六十寺尋幽遂窮年君持使者節風采爍雲煙胡不屛騎從暫借僧榻眠讀我壁間詩清净洗煩煎湖上詩水光瀲灔晴方好山色空濛雨亦竒好把西湖比西子淡粧濃抹縂相宜蘇子瞻云杭有西湖潁亦有西湖皆為逰賞之勝而子瞻連守二州其初得潁也有潁人在坐云内翰但只消逰湖中便可了郡事言其訟簡也及守杭秦少㳺有詩云十里荷花菡萏初我公所至有西湖欲将公事湖中了見説官閒事亦無林君復詩混元神巧本無形匠出西湖作畫屛春水净扵僧眼碧晚山濃似佛頭青宫殿大内在鳳凰山東以臨安舊子城増築南曰麗正門門外建東西闕庭東西待漏院北曰和寧門門外亦建百官待漏院東曰東華門朝野雜記丨丨即杭之州治慈寧宫朝野雜記紹興九年和議成太后有歸耗命有司作丨丨丨徳夀宫中興小厯紹興三十二年望仙橋新葺宫成詔以丨丨丨為名重華宫夀皇遜位處此即徳夀宫慈福宫即徳夀宫夀慈宫即徳夀宫夀康宫朝野雜記寧宗受禪丞相趙汝愚議以祕書省為泰寧宫已而不果行以慈懿皇后外第為之光宗不欲遷因以舊寧福殿為丨丨丨而更建寧福殿焉崇政殿紹興十二年始作行大朝㑹之禮又有丨丨丨説書之職垂拱殿紹興十二年始作紫宸殿紹興十二年以射殿作崇政殿遇朔權作丨丨丨寧福殿紹興二十八年始作祥曦殿同上文徳殿䧏赦則御焉集英殿策士御焉大慶殿講武殿復古殿端平元年重修選徳殿孝宗新創扵御座後作金漆大屛風分畫諸道各列監司郡守扵兩行以黄簽標識居官者職位姓名其背為華夷圗東宫朝野雜記丨丨舊無冇但聴讀扵資善堂孝宗為皇太子始居東宫在麗正門内其地甚隘光宗之為太子孝宗謂輔臣曰朕宫中空閒不用宫殿甚多可掇移修立皇城㑹要紹興三十八年殿前都指揮使楊存中乞通展十三丈以五丈作御路六丈令民居將来聖駕親郊由候潮門徑從所展御路直抵郊臺宗廟太廟在瑞石山之左朝野雜記京師丨丨舊十六楹其十四楹為七室東西二楹為夹室及哲宗祔廟七室已滿用李邦直議祔哲宗主于東夹室室既隘神帳祭器至不能容乃裁削其制創立崇寧始改曰行在太廟九廟之制朝野雜記太廟自仁宗以来皆祀七世崇寧初始取王肅説謂二祧在七世之外乃建九廟奉翼祖宣祖咸歸本室焉紹興中徽宗祔廟以與哲宗同為一世故無所祧及升祔欽宗始祧翼祖髙宗與欽宗同為一世亦不祧由是淳熙末年太廟祀九世十二室及阜陵復土趙汝愚為相遂祧僖宣二祖而祔孝宗有㫖集議時朱熹方在講筵獨以九廟為正其議曰今日宗廟之制未能如古姑以權宜而論莫若以僖祖擬周之后稷而祭扵太廟之初室順祖為昭翼祖為穆宣祖為昭而藏其祧主于西夹室太祖擬周之文王為祖而祭于太廟之第二室太宗為昭擬周之武王而祭扵太廟之第三室其太祖太宗又皆百世不遷而謂之世室真宗為穆其祧主亦且權藏于西夹室仁宗為昭為宗而祭于第四室亦為世室如太宗之制英宗為穆蔵主如真宗之制神宗為昭祭第五室哲宗為穆祭第六室徽宗為昭祭第七室欽宗為穆祭第八室髙宗為昭祭第九室孝宗為穆祔第九室異時亦當為宗為世室如太宗仁宗之制三嵗祫享則僖祖東享如故而自順祖以下至于孝宗皆合享焉則于心為安于禮為順盖尊太祖以東享者義也奉僖祖以東享者恩也義者天下臣子今日之願也恩者太祖當日之心也與其伸義屈恩以快天下臣子之願孰若全義伸恩以慰太祖當日之心乎韓愈所謂祖以孫尊孫以祖詘者正合此意而又以為四時各祭其廟則所伸之祭常多三年然後一祫則所詘之祭常少亦中事情神御殿在大内朝野雜記東都舊有之號欽先孝思殿紹興十五年秋始創在崇政殿之東凡朔望莭序生辰上皆親酌獻行香盖用家人之禮也景靈宫在新莊橋之西朝野雜記祖宗帝后神御皆寓道釋之館神宗元豐中始倣漢原廟之制即丨丨丨之東西為六殿以奉宣祖以下後殿以奉母后至徽宗時又立丨丨西丨建炎改元之日即建丨丨丨于江寧而不克成