難忘也梅公清謹好學君子也視其所好可以知其人焉中和堂光堯太上皇帝御製詩一首云六龍轉淮海萬騎臨吴津王者本無外駕言蘇逺民瞻彼草木秀感此瘡痍新登堂望稽山懐哉夏禹勤神功既盛大後世蒙其仁願同越勾踐焦思先吾身艱難務遵養聖賢有屈伸髙風動君子屬意種蠡臣又御書謂斯堂偉特之觀無愧上都薰風南来我意雖快願與衆人共之後改為偉觀堂先是趙閲道詩老来重守鳳凰城千里人心豈易平樂職古賢形歎詠中和終不為虚名虚白堂白居易詩刻石堂上羅隠丨丨丨牡丹詩云莫背欄杆便相笑與君俱受主人恩盖謂居易植此花又有紫㣲兩本亦謂居易所植蘇子瞻有詩堂今廢三賢堂在孤山竹閣今在湖上盖樂天君復子瞻也冷泉亭在飛来峯下杭州刺史元藇建白居易亭記東南山水餘杭郡為㝡由郡言靈隠寺為尤由寺觀丨丨丨為甲亭在山下水中央寺東南隅髙不倍尋廣不累丈而撮竒得要地捜勝㮣物無遯形春之日吾愛其草薰薰木欣欣可以導和納粹暢人血氣夏之夜吾愛其泉渟渟風泠泠可以蠲煩析酲起人心情山樹為盖巖石為屏雲從棟生水與階平坐而翫之者可翟足于牀下卧而狎之者可垂釣于枕上矧又潺湲㓗澈粹冷柔滑若俗士若道人眼耳之塵心舌之垢不待盥滌見輒除去潜利隂益可勝言哉斯所以最餘杭而甲靈隠也杭自郡城抵四封叢山複湖易為形勝先是領郡者有相里君造虚白亭有韓僎僕射臯作候仙亭有裴庶子棠棣作觀風亭有盧給事元輔作見山亭及右司郎中河南元藇㝡後作此亭扵是五亭相望如指之列可謂佳境殫矣能事畢矣後来者雖有敏心巧目無所加焉故吾繼之述而不作孝宗皇帝御製冷泉亭詩一堂虚敞臨清沼宻䕃交加森羽葆山頭草木四時春閲盡嵗寒長不老蘇子瞻呈唐林夫詩靈隠寺前天竺後兩澗春淙一靈鷲不知水從何處来跳波赴壑如奔雷無情有意兩莫測肯向冷泉亭下相縈廽我在錢塘六百日山中暫来不暖席今君欲依靈隠居葛衣草履随僧蔬能與冷泉作主一百日不用二十四考書中書浙江亭錢起宴浙江西亭詩漁浦浪花摇素壁西興樹色入秋窓夢兒亭在武林山類要謝靈運㑹稽人也世不宜子息乃扵錢塘杜明甫舍寄養明甫是夜夢有賢人相訪及曉乃靈運至樓閣豐樂樓在湧金門外瞰湖楊靖建四照閣在孤山鄭毅夫詩湖山天下之絶境羣山繞湖十百重碧筍四挿明鏡緑此閣正落明鏡中佛寺天竺寺在北山李心傳繫年錄紹興十二年虜使劉苦等往上天竺焚香因以為例中天竺在二者之間下天竺葛灃帝都賦傍西深入巖谷益秀白居易天竺詩一山門作兩山門兩寺元從一寺分西澗水流東澗水南山雲起北山雲前臺花𤼵後臺見上界鐘清下界聞遙想吾師行道處仙花桂子落紛紛綦母潜詩郡有化城㝡西窮疊嶂深松門當澗口石路在峯心幽見夕陽霽髙逢暮雨隂佛身瞻紺髪實地踐黄金雲間竹溪盡月從花泂臨因物成真悟遺世在兹岑陶翰詩松栢亂巖石西山㣲徑通天關一峯見宫闕生虚空正殿倚霞壁上方標石叢夜来猿鳥静鐘梵響雲中峰翆映湖月泉聲亂溪風心超諸境外了與懸觧同明𤼵氣候改起視長崖東湖色濃蕩漾海光漸朦朧葛仙迹尚在許氏道猶崇獨往古今事幽懐期二公天竺觀音像石晉天福間僧道翊一夕見山間光明往視之得竒木乃命匠者孔仁謙刻觀音像㑹僧勲従洛陽持古佛舍利來納之頂間妙相具足吴越時忠懿王夜夢白衣仙人求治其居左右曰天竺觀音白衣仙像也乃一新道場凡水旱必禱焉至今如此靈隠寺在錢塘十二里靈隠天竺兩山由一門而入宋之問逰靈隠夜吟云鷲嶺鬱岧嶤龍宫隠寂寥久不能續有老僧坐禪曰何不道樓觀滄海日門對浙江潮桂子月中落天香雲外飄捫蘿登塔逺劄木引泉遙云云遲明僧不見人以為駱賔王也蘇子瞻次李寺丞韻君不見錢塘湖錢王壯觀今已無屋堆黄金斗量珠運盡不勞折簡呼四方官逰散其孥宫闕留與閒人娱盛衰安樂兩須臾何用多憂心鬱紆溪山處處皆可廬㝡愛靈隠飛来孤喬松百丈蒼髯鬚擾擾下笑栁與蒲髙堂㑹食羅千夫撞鐘擊鼓喧朝晡凝香方丈眠氍毹絶勝絮被縫海圗清風時来驚睡餘遂超羲皇傲几蘧歸時棲鴉正畢逋孤煙落日不可摹净慈寺在暗門外湖上周顯徳建祥符改今額寺有五百羅漢各身髙數丈大數圍又有大鐡鑊蘇子瞻逰丨丨丨謁本長老詩云卧聞禪老入南山净掃清風五百間孤山寺白居易西湖晚歸囬望孤山寺詩栁湖松島蓮花寺晚動歸橈出道場盧橘子低山雨重栟櫚葉戰水風凉煙波澹蕩摇空碧樓殿參差倚夕陽到岸請君囬首看蓬莱宫在水中央又遇雨詩拂波雲色重灑葉雨聲繁水鳥䨇飛起風荷一向翻空濛連北岸蕭颯入東軒或擬湖中宿留舡在寺門張祜詩樓臺聳碧岑一徑入湖心不雨山長潤無雲水自隂斷橋荒蘚澁空院落花深猶憶西窓月鐘聲在北林徑山寺在餘杭縣北圗經徑山乃天目山之東北峯也中有徑路後通天目故名徑山有龍井事狀云國一大師因獵者導自重崗之西至扵危峯之北有頃素衣老人前而致拜請師登山絶頂入五峯之間願捨此地為師立錫之所有大湫指謂師曰吾家若去此湫當涸留一水穴幸勿堙之我將時至而衛師言訖雲霧晦冥風雨驟作及明既霽湫水盡涸惟一穴尚存謂之龍井今菴基見在諸草不生蘇子瞻逰詩衆峯来自天目山勢若駿馬奔平川中途勒破千里足金鞭玉鐙相廽旋人言山住水亦住下有萬仭蛟龍淵道人天眼識王氣結茅宴坐荒山顛精神貫山石為裂天女下試顔如蓮寒窓暖足来扑握衣鉢呪水䧏蜿蜒雪睂老人朝叩門願為弟子長參禪爾来廢興三百載奔走吴㑹輸金錢飛樓湧殿壓山破朝鐘暮鼓驚龍眠晴空偶見浮海蜃落日下數投林鳶有生共處覆載内擾擾膏火同烹煎近来愈覺世議隘每到寛處差安便嗟余老矣百事廢却尋舊學心茫然問龍乞水歸洗眼欲看細字銷殘年大佛石乃秦皇繫纜石僧思净刻作大佛頭寳所塔在大佛頭之上雷峯塔在西湖之南山六和塔開寳中建在龍山月輪峯之開化寺初九級後廢紹興再造七層蘇子瞻詩話云舊讀蘇子美六和塔詩松橋待金鯽盡日獨遲留初不喻此語及倅錢塘乃知寺後池中有此魚如金色也昨日復㳺池上投餅餌乃略出不食復入則此魚自珍貴久矣搢紳脞説張君房為錢塘令宿月輪山寺僧報曰桂子下塔君房登塔望之紛紛如煙霧囬旋成穂散墜如牽牛子黄白相間咀之無味道觀四聖觀在西湖孤山之上祠祐聖翊聖天猷天蓬四聖靖康末上自北邸北使將就馬或見四金甲神執弓劍以衛顯仁后聞之曰我事四聖香火甚謹必有隂助乃令曹勛奏上宜加崇奉其像乃沉香斵之洞霄宫在餘杭縣四十八里漢武帝元封開創祥符間改為丨丨丨按真境録宫有五洞交扃九峯四挹千巖萬谷秀聚其中蘇子瞻詩上帝髙居愍世頑故留瓊管在凡間青山九鎻不可到作者七人相對閑亭下泉流翆蛟舞洞中飛䑕白鴉翻長松怪石宜霜鬢不用金丹苦駐顔又和張子野過舊㳺便欲洞霄為隠吏一菴閑地且相留祠廟胥山祠盧元輔銘并序元和七年冬十月朝散大夫杭州刺史上柱國某視事三嵗塵天子書上畏羣靈下慙蒸乂乃啟真祠銘而序曰維唐敷祀典于天下廢淫置明資父事君罔有不舉寢廟既設我命厥新有周行人伍公字子胥陪吴之職得死直言國人求忠者之屍禱水星之舍將瞰鴟革遂臨浙江千五百年廟貌不改漢史遷曰胥山今云青山者繆也吁善父為孝記曰父讐不與共戴天諌君為忠經曰諸侯有諍臣不失國當訪于宋鄭絶楚出疆在平為末官在奢為既壯子坎壈仗莭乞師于吴軍鼔丁寧于五戰至郢先詰王建邦啟土著以話言戴后惟大人虐惟后成湯用為大義孔子立為大經子胥修為大仇騷人賦為大怨咸令在上慢惡不生則前戈鞭墓非倒行也後戈走昭非逆施也夫差既王宰嚭受賂二十年内越祀又顛太伯廟血將乾闔閭劍光且失公朝焉宴焉入則諫焉孰謂矢毒孰謂力寒雖言屢出口而車甲已困扵齊矣蟹稻已奪于嵗矣屬鏤之賜竟及其身鴟夷盛屍投于水濵憤悱致怒配濤作神迄今一日再至来也海鴟羣飛陽侯夹從聲逺而近聲近而逺奮于吴怫于越夕于楚乃退扵是仲秋闕望杭人以旗鼔迓之笳簫和之百城聚覩大耀威靈卷沙墨裂地炭截若岸坼成坑迎潮民格之如吕梁丈人為靈戈威矛瀲浪百重渚塞不先跳檣掲舷再飯之間絶其音聲蕩漭千里洪濤砥平有滑有腯有鹹有腥遙實乎下庭山海梯航雞林扶桑交臂于夘堦金狄在戸雷鼓在堂魏樽漢豆六代笙簧可謂奉天爵之馨香獲神人之盛禮佐皇震怒驅叱大邪萬里永清人觀叶氣銘曰武王鉞紂子胥鞭平為人為父十死一生矯矯伍貟執弓挟矢仗其寳劔以謁吴子稽首楚罪皆中紂理烝報子妻殱鉏直士赫赫王閭實聽竒謨錫之金鼓以號以誅黄旗大舉右廣皆朱戮墓非赭瞻昭乃烏後王嗣位執書以泣顛越言潤宰噽讒輯歩光欲飛姑蘇待執吾則切諫抉眼不入投于河上自古波濤晝夜兩至懐沙類騷洗滌南北簸蕩東西蠻夷卉服罔敢不来雖非命祀不讓瀆齊帝帝王王代代明明表我忠誠古跡陳朝檜在廣化寺蘇子瞻詩雙榦一先神物化九朝三見太平年仙姥墩在府西五里按葛洪神仙傳王方平過蔡經家以千錢與餘杭姥求沽酒須臾信還得酒五斗許又東晉初有裴氏姥不知何許人居此墩采衆花醖酒沽貧者貰與經數年忽有三人至姥所各飲數斗不醉謂姥曰予非常士知姥當仙故来相命因授藥數丸姥餌之月餘不知所在王介甫送恵思歸錢塘詩綠净堂前湖水綠歸来正復有荷花花前若見餘杭姥為道仙人憶酒家名宦袁仁敬唐明皇自擇仁敬為刺史嘗種九里松宋璟為刺史在官清㢘李泌為刺史引西湖水為六井白居易為刺史築堤捍錢塘皇朝錢鏐蘇子瞻代趙閲道撰表忠觀碑云熙寧十年十月資政殿大學士右諫議大夫知杭州軍州事臣抃言吴越國王錢氏墳廟及其父祖妃夫人子孫之墳在錢塘者二十有六在臨安者十有一皆蕪廢不治父老過之有流涕者謹按故武肅王鏐始以鄉兵破走黄巢名聞江淮復以八郡兵討劉漢宏併越州以奉董昌而自居于杭及昌以越叛則誅昌而倂越盡有浙東西之地傳其子文穆王元瓘至其孫忠顯王仁佐遂破李景兵取福州而仁佐之弟忠懿王俶又大出兵攻景以迎周世宗之師其後卒以國入覲三世四王與五代相終始天下大亂豪傑蜂起方是時以數州之地盜名字者不可勝數既覆其族延及于無辜之民罔有孑遺而吴越地方千里帶甲十萬鑄山煑海象犀珠玉之富甲于天下然終不失臣莭貢獻相望于道是以其民至于老死不識兵革四時嬉逰歌舞之聲相聞至于今不廢其有徳于斯民甚厚皇宋受命四方僣亂以次削平而蜀江南負其嶮逺兵至城下力屈勢窮然後束手而河東劉氏百戰守死以抗王師積骸為城釃血為池竭天下之民力僅乃克之獨吴越不待告命封府庫籍郡縣請吏于朝視去其國如去傳舍其有功于朝廷甚大昔竇融以河西歸漢光武詔右扶風修理其父祖墳塋祠以太牢今錢氏功徳殆過于融而未及百年墳廟不治行道傷嗟甚非所以勸奬忠臣慰荅民心之義也臣願以龍山廢佛祠曰妙因院者為觀使錢氏之孫為道士曰自然者居之凡墳廟之在錢塘者以付自然其在臨安者以付其院之净土寺僧曰道㣲嵗各度其徒一人使世掌之籍其地之所入以時修其祠宇封植其草木有不治者縣令丞察之甚者易其人庶㡬永終不墜以稱朝廷待錢氏之意臣抃昧死以聞制曰可其妙因院改賜名曰表忠觀銘曰天目之山苕水出焉龍飛鳳舞萃于臨安篤生異人絶類離倫奮梃大呼從者如雲仰天誓江日星晦蒙强弩射潮江海為東殺宏誅昌奄有吴越金券玉冊虎符龍莭大城其居包絡山川左江右湖控引島蠻嵗時歸休以燕父老曄如神人玉帯毬馬四十一年寅畏小心厥篚相望大貝南金五朝昏亂罔堪託國三王相承以待有徳既獲所歸弗謀弗咨先王之志我維行之天胙忠孝世有爵邑允文允武子孫千億帝謂守臣治其祠墳毋俾樵牧愧其後昆龍山之陽巋然新宫匪私于錢唯以勸忠非忠無君非孝無親凡百有位視此刻文張詠為守嵗歉聼民鬻鹽又民家子與壻訟家財云妻父臨終令異日以十之三付㓜子餘七分與壻詠覽之曰汝妻父以子㓜故託汝儻以家財十之七與子則子死于汝手矣亟命兩易之人皆服其明斷范仲淹以參政知州梅摯知杭州李及知杭州薛映知杭州陳襄知州務先學校薦達人才趙抃兩知杭州諡清獻蘇軾熙寧四年通判杭州髙麗使者過杭但稱甲子遂却其書使者亟稱本朝年號圗經云元祐四年知州適值水旱請于朝减上供米三之一故榖價不翔全活者衆又蘇氏家傳子瞻知杭州以疾疫多裒羨緍𤼵私橐作病坊州民全活者甚衆梅詢知仁和縣毛滂元祐中蘇子瞻守杭滂為法曹掾秩滿辭去有小詞卒章云今夜山深處斷魂分付潮囬去坡曰郡僚有詩人而不及知軾之罪也留之數日人物顧歡鹽官人年六七嵗父使田中驅黄雀歡作黄雀賦而歸雀食稻父怒欲撻之見賦而止貧無以授業每扵舍後倚聽隣人誦書夕則燃松節讀書隠居不仕禇遂良錢塘人工𨽻楷為諫議大夫進拜中書令許逺杭人與張廵同年生唐祚艱難守死成名羅隠新城人有能詩名唐光啟間為錢塘令辟掌書記後為給事中遷𤼵運使皇朝錢易章聖在東宫嘗圗山水扇命易作歌其卒章有好開今日太平基萬里山河歸掌握之句帝賞愛之沈括字存中錢塘人為翰林學士林逋錢塘人故廬在孤山處士橋死葬扵廬側仁宗賜諡曰和靖先生喜為詩其語孤峭澄淡居西湖二十年未嘗入城市李及薛映知州事每造其廬清談終日而去有梅詩云疎影横斜水清淺暗香浮動月黄昏又云雪後園林唯半樹水邉籬落忽横枝又有詩云草泥行郭索雲木呌鈎輈皆為士大夫所稱其臨終一絶云湖上青山對結廬墳前修竹亦蕭疎茂陵他日求遺藁猶喜曽無封禪書筆談云逋隠孤山蓄兩鶴縦之則飛入雲霄久之復入籠中泛舟逰西湖諸寺有客至則童子開籠縦鶴逋即棹小舟以歸盖嘗以鶴為騐也洪皓詩話縂龜餘干進士洪皓熙寧間負笈㳺上庠力學不偶十年不歸其父年七十思之寄皓詩云太學何蕃久不歸十年甘㫖誤庭幃休辭客路三千逺須信人生七十稀腰下雖無蘇子印箧中幸有老莱衣歸時㝎約春前後免使髙堂賦式㣲皓得詩即日辭歸題詠東南第一州仁宗賜梅摯知杭州詩地有湖山美云云剖符宣政化持橐掇才流暫出論思列遙分旰昃憂循良勤撫俗来暮聴歌謳呉國水中央殷堯藩送客逰吴云云波濤白渺茫衣逢梅雨漬路入稻花香海戍通鹽竈山村帯客房欲知蘇小小君試到錢塘夜艣隔城聞顧非熊經杭州郡國遶江濆人家近白雲晚濤臨檻看云云浦轉山初盡虹斜雨未分有誰知我意心緒逐鷄羣樹引越山禽方干旅次錢塘詩此地似鄉國堪為終日吟雲藏吴相廟云云潮去海人散鐘遲秋寺深我来無舊識終見寂寥心三吴佳致悦髙情真宗賜王欽若詩二浙奥區期恵化云云雲麓漫抄云酈道元水經注吴興郡㑹稽郡謂之三吴餘杭形勝世間無白居易詩云云州傍青山縣枕湖遶郭荷花三十里拂城松木一千株夢兒亭古傳名謝教妓樓新道姓蘇獨有使君年太老風流不稱白髭鬚大屋簷多装雁齒白居易守蘇日荅客問杭州詩為我踟蹰停酒盞與君約畧説杭州山名天竺堆青黛湖號錢塘㵼綠油云云小航船亦畫龍頭所嗟水路無三百官繫因何得再逰唯有憫農心尚在蘇子瞻同周徐二令禱雨靈隠詩百重堆案掣身閒一葉秋聲對榻眠云云起占雲漢更茫然笑歌長在綺紈間王介甫送張仲容赴杭州辟詩萬屋相夸漆與丹云云綵舡春戲城邉水畫燭秋尋寺外山望海樓眀照曉霞白居易杭州春望詩云云䕶堤紅白踏晴沙濤聲夜入伍員廟栁色春藏蘇小家紅袖織綾夸栁葉青旗沽酒趂梨花誰開湖寺西南路草綠裙腰一道斜外邑旦及富春郭謝靈運富春渚詩宵濟漁浦潭云云㝎山緬雲霧赤亭無淹泊􅘦流觸驚急臨圻阻參錯亮乏伯昏分子險過吕梁壑洊至宜便習兼山貴止託平生協幽期淪躓困㣲弱久露干祿請始果逺逰諾初心漸申冩萬事俱零落懐抱既昭曠外物徒龍蠖人行山頂半天上汪彦章餘杭縣詩云云舟遶溪流亂石中古邑居民半海濤蘇子瞻千佛閣詩金鯽池邉不見君蘇子瞻往富陽李莭推先行留風水洞見待詩春山磔磔鳴春禽此間不可無我吟路長漫漫傍江浦此間不可無君語云云追君直過定山村路人皆言君未逺騎馬少年清且婉風巖水穴舊聞名只隔山溪夜不行溪橋曉溜浮梅萼知君繫馬巖花落出城三日尚逶遲妻帑怪罵歸何時世上小兒誇疾走如君相待今安有四六寵疏漢札尹正周畿擢拜月卿就兼天府粤繇起部就尹神臯申命侍臣就兼京尹欲觀王佐之才乃付神州之政控于滄海實曰大藩培基固本强榦弱枝本根攸繋膏澤宜先眷三吴之奥壤屬千里之京畿擢從宥府兼尹神州百司庶府萬旅連營浙右奥區餘杭故壤天子千里之畿京師諸夏之本惟浙西之都㑹冠天下之浩穰控吴越之要區帶湖山之勝景暫屈帝城之彈壓仍兼王所之論思奉玉音而分尹就宣彈壓之威聼金鑰以待朝仍罄論思之益惟三輔幅員之大萃四民囊橐之姦分吏六百貟禁暴止貪之非易居民百萬户𤼵姦摘伏之尤難湖山信美于他邦獄市亦繁于諸路下丞相一等西府之任既隆尹京兆十年南渡以来未有水陸抗舟車之㑹衣冠當風俗之樞出則尹正忽傳中夜之敇書入則論思又奏明朝之封事忽半夜由中而批敇至黎明交印以尹京長樂漏催聲撼趍朝之騶導集英臚唱喜觀擢第之錦標雖六蜚暫駐扵東南而二浙實為扵畿甸民居莫枕當嚴周火城之防嵗課流錢尤重漢𣙜酤之制皇皇千里之畿悉令奠枕翼翼四方之則無用置筩前朝後市拱日象之尊嚴左江右湖控地形之雄麗文昌八座之賢久儀禁路商邑四方之極就尹神京擢長月卿妙斡大農之計就兼天府式觀命世之才千里為畿握麟符而彈壓九重列衛陪豹尾以論思夜月九街列兩行之寳貨春風十里看弗捲之珠簾閩商海賈来萬里之貨珍越女吴娃妙九衢之歌舞販銅謀利當嚴江上之雲帆持楮易錢盍驗市間之茗肆凛凛壯懐肯受湖間之豢養蕭蕭真隠不知朝市之繁華于時廬旅無非即芮鞫之濵到處舟航何異處江湖之上漢世以来待張敞王尊之輩我朝所選若韓維包拯其人萬戸千門之營繕應辦不移百司庶府之請求供需匪易飱月香水影之清文章京様覽雲陣銀山之壯意氣天豪堤邉翆葢遺簮墮珥而不辭湖上畫船脆管繁絃之交奏夜市三更燦爛樓臺之燈火春風萬井喧闐簾幙之笙歌百萬户之民雜襲訟牒實繁十三庫之酒盈虧利源所繫度支領二十使是安用于拙疎京兆須第一流願更求于賢俊提封百萬井有列司庶府之供需飛甍十二衢乃四海羣方之走集方輿勝覽卷一
