body:
  text: 方輿勝覽卷六十八宋祝穆撰蓬州蓬池良山儀壠伏虞營山建置㳂革禹貢梁州之域東井輿鬼之分野古巴國之地秦屬巴郡漢即巴郡之宕渠縣地東漢置巴西郡晋因之後李特據蜀不置郡縣宋屬歸化郡齊因之梁立伏虞郡後周武帝立蓬州隋廢以其地入清化宕渠巴西三郡唐初復置蓬州改為咸安郡又改為蓬山郡復為蓬州皇朝分川陕為四路蓬州𨽻利州東路今領縣五治蓬池事要郡名咸安風俗其民純朴咸安志云云好義勿事華侈少商多儒同上丨為丨丨為丨家詩户書文物甚盛務農力作同上云云田里墾闢㛰禮必親迎同上丨丨雖賤丨丨丨尤為近古形勝巴國之墟同上云云梁州之分環蓬皆山圖經云云而北山為之主兩蓬髙峙同上溪山竒秀云云屹然雲霄多神仙隱士山多蘭菊同上山多崇蘭黃花每春秋開時清香滿山谷間劔外他州罕有也山川大蓬山在城東南七十里狀若海中蓬萊因以為名州名亦以此按列仙傳葛由乘木羊上綏山隨者皆得仙綏山即丨丨之始號也小蓬山一名秀立與大蓬對峙相去二里北山在蓬池縣西北郡之主山衮山在城西十五里𨽻營山縣有鳯凰院山之頂有鳯皇臺傳以為鳯曽栖其上有龍馬槽石壁隱隱如龍鱗之狀郡守吳幾復詩蒼石皺紋龍跡在清泉涵泳海源通儀隴山在本縣西三十里山頂石刻儀壠字伏虞山在本縣東南六十五里甚險夷獠被征即入此山中透明巖亦名栖真岩在大蓬山前俯瞰縣郭天氣清明渠逹諸山隱隱可數東巖在龍章山俯瞰大溪前眺歌陽安固諸山歷歷可數為一郡登眺之勝西巖在報恩寺西南隅岩壑竒秀前有閣曰松風為一郡勝槩嘉陵江在城西六十里屬營江縣青溪水在營江縣西南五十里平溪水在儀隴縣東北十里鰲水去儀隴縣三十里水湧突出一石如鰲故名堂館蓬萊堂在郡治蓬山館記云蓬之為郡以蓬山得名故自昔傳與神仙相接其地靈人傑足以發紓千古江山之勝名宦顔真卿本傳上元元年李輔國遷明皇于西內真卿率百僚上表請問起居輔國惡之貶蓬州長史郡志真卿在蓬四年往來新政縣鮮于氏家為書離堆記今在崖石間又書鮮于仲通里門記復以小字書之又大書磨崖碑數丈今在崖石間其書體尤為真妙皇朝王旦端拱間為守人物何造自成都徙蓬其後子綘侯孫修輔曽孫恪非俱第進士題詠去天一尺古蓬州唐子西贈杜守詩云云除守年來得勝流使旌巡稼欲觀農郡守吳幾復往鳯皇院觀稼詩云云賞景留賔大峽東四六輟班楓陛連巴引梓作牧蓬山蔽蜀控䕫環郡皆山是謂神仙之境分封而守宜煩嶽牧之才名麾赴鎮直宜蓬島之仙居小隊出郊聊訪衮山之勝槩顔長史離堆之書尚存崖石元微之蓬萊之守有似州名巴州化城魯口難江通江恩陽建置㳂革禹貢梁州之域鶉首分野古巴國之地秦漢屬巴郡宕渠縣後漢分宕渠北界置漢昌縣今州理是也劉先主分蜀巴西郡晉因之至李特擅蜀此地遂為獠所有宋武帝置歸化水北二郡歸化即今州理是也齊因之魏於漢昌縣理置大谷郡又於郡北置巴州隋改為清化郡唐改為巴州又為清化郡復為巴州皇朝平蜀地歸版圖今領縣五治化城事要郡名清化字江三巴中巴按華陽國志載漢末劉璋為益州牧以墊江以上為巴郡江州至臨江為永寧郡胊至固陵巴道分矣此居其中為丨丨風俗地僻民淳張忞修州學記地大俗阜州學振文堂記安於簡儉清化志風俗云云樂於歌舞同上以歌舞遨遊為樂形勝名因古巴國寰宇記因古巴國以名山海經昔太皥生咸鳥咸鳥生乘釐乘釐生后昭是為巴人郭璞注云巴之始祖尚書云髳微蓋今巴蜀之地併壁集二州振文堂記惟兹巴土實云云之地今難江縣即故集州通江縣即故壁州也包錯萬山洪邁丹梯書院記云今之巴非昔之巴也然云云一水環縈實曰字江因川形而成州名水成巴字輿地廣記巴峽丨屈曲丨丨丨或云江分三流中有小流橫貫成巴字故以為名控扼南鄭紹興張忠獻奏疏巴州云云要路乃命知州兼管內安撫掎角利閬王子明作髙士瑰畫像記巴蜀扼梁洋吾蜀孔道形勢絶劍關之險飛磴踰棧道之危云云連衡綿劔遮蔽東西川最為襟喉要地李石與太守郭郊書三巴吾蜀要地土産桃笙桞宗元詩云丨丨葵扇安可常子瞻云偶閲方言簟宋魏謂之笙乃悟丨丨以桃竹為簟桃竹出巴渝間杜子美有桃竹杖引又見潼川府竹根酒注假氏蜀記巴州以竹根為酒注為時所珍米膏餅廣雅云荆巴間採茶作餅既成以米膏出之欲煮餅先炙令色變濤末甕器中以湯澆覆之用葱疆芼之山川化城山在城南相去三里崑山在城東四十里出璞石玉山在化城南六十里多玉石然深險不可取王望山在江之北岸自郡城絶江而登山髙二里許巖徑極險占一郡之勝相傳云王真人得道此山真人名蒙故名王蒙山舊志云唐元宗控白􅐒至此山望見京闕曰此去京師不逺故名丨丨米倉山繫年録紹興三年云巴之北境即丨丨丨下視興元出兵之孔道孤雲山與兩角山相連在難江縣北九十里又見興元府王子韶詩孤雲兩角去天一握有石刻云漢相國邀韓信至此大唐集州刺史楊師謀記登科山在恩陽縣東北一里鄉人謝周卿謝耕王紹謝震讀書于此壁山在通江縣西下枕諾水與縣治相對歌籟山在通江縣東上有石鼓擊之聲聞數里連擊即雨方山在通江北十五里突出衆山其狀如斗十二峯在難江縣四十里馬盤灣巉巖聳秀大小丨丨丨最為竒觀有客題詩曰插立翠屏峯十二為君喚作小巫山雪峯去魯口縣十里衆山特出一峯大巴嶺在城北小巴嶺此山之南即古巴國巴江一名字江見前注几水在舊竒章縣水屈曲如几字清水清化縣界東流入化城縣明水在難江縣北五十餘里水間出硯屏林木山川之形隱于石間井泉虎井在州學前凡有聲如雷則其年必有人登科樓亭擊甌樓唐張禕詩駐旌元帥遺風在擊缶髙人逸興酣水轉巴文清溜急山連蒙岫翠光涵流觴亭在西龕寺唐乾元間嚴鄭公武所創其水屈曲可以流觴楊士諤有詩館驛氷清驛姚彥遊詩見說巴南一小州孤城寂寞字江頭名宦王濬為巴郡太守兵士苦役生男多不育濬乃嚴其科條寬其徭課所全活者數千人及後伐吳所活者皆堪為兵其父母戒之曰王府君活汝汝必死之見東坡與朱鄂州書蘇味道降集州刺史嚴武至德初坐房琯事貶巴州刺史薛逄為巴州刺史人詠之曰日出而耕日入而歸吏不到門夜不掩扉有孩有童願以名埀何以字之薛孫薛兒楊士諤出吉甫之門後貶巴州刺史有流杯十四詠士諤能詩有直聲人物洛下閎巴郡人武帝太初元年詔壺遂司馬遷等議造漢歷方士唐都丨丨丨與焉甘寧仕吳為大將通江人今有甘谷即其所居也張飛有塜在刺史大㕔東皇朝李森魯口人登第為中執法嘗劾王黼出知復州惠演居思成溪早與范蜀公同往太學范貴惠方釋褐范贈以詩云相逄三十年前話記得途中並馬䘖顧我倦遊成白首喜君新命得青衫題詠何路出巴山杜甫寄嚴大夫詩不眠持漢節云云地僻炎瘴昏杜甫寄巴州嚴使君詩云云山稠隘石泉看看妙為政杜甫送鮮于萬州遷巴川詩云云他日有殊恩巴水急如箭唐李白巴女詞云云巴船去若飛十月三千里郎行幾嵗歸南國浮雲水上多杜甫寄馬巴州詩云扁云舟繫岸河邉久云東巴集壁西梁洋杜甫云云問誰腰鎌胡與羌卧向巴山落月時嚴武答杜甫詩云云兩鄉千里勢相思江頭赤葉楓愁落籬外黃花菊對誰巴童聲節渝兒舞韓翊送楊巴州詩白雲縣北千山口青嵗欲開殘雪後前驅錦帶魚皮鞮側佩金璋虎頭綬南鄭侯家醉落暉東關陌上著鞭歸愁看野馬隨官騎笑取春人帶客旗使君下車憂疾苦豪吏銷聲出公府萬里歌鍾相慶時云云四六出綸詞掖來牧字江維三巴之舊域控全蜀之左隅後連延於秦隴前迤邐於荆吳耀東壁之圖書光于列宿控西陵之門户專在三巴三刀夢應乃當水流成字之邦五袴髙興已遍民俗喜歌之境金州西城石泉漢隂平利洵陽上津建置㳂革禹貢梁州之域秦楚之交東井輿鬼兼翼軫之分野虞舜居之謂之媯墟周為庸國之地春秋戰國皆屬楚秦惠文王置漢中郡今州即漢中郡之西城縣也西漢屬漢中郡東漢末置西城郡魏文帝改西城為魏興郡晋因之安康西城以縣𨽻焉宋分魏興之安康縣置安康郡齊因之梁為東梁州西魏以其地出金改為金州置金城郡仍領魏興郡隋為西城郡唐復為金州改安康郡又改漢南郡復為金州置昭信軍防禦改戎昭軍五代前蜀王建改雄武軍石晋置懷德軍皇朝平蜀改昭化軍節度舊𨽻京西中興以來改𨽻利路或帶金房開逹四郡安撫或兼管內安撫今領縣六治西城事要郡名金城昭化安康風俗深有楚風寰宇記漢髙祖發巴蜀伐三秦遷巴中渠帥七姓居商洛其俗多獵山伐木云云詞訟絶少陳彭年奏劄本州諸縣率皆人戶蕭踈路岐荒僻云云租賦甚微俗重寒食郡志每嵗是日傾家上冡相饋相飲其俗大類漢中遊人相逄先淺慢數拜後急深六七拜如是者三次乃止則又類洋州是即皇祐間洋守王冲詩所謂鳴佩相逄拜不休是也形勝東接襄沔安康郡志云云南通巴逹西連梁洋北控商虢北阻方山元和志云南臨漢水秦頭楚尾圖經自渡江以後舟車輻輳商賈接踵遂為云云一大都會金多平曠同上自漢中而東則謂金多山嶺由均房而西則謂云云山川西城山在州北五里魏山在城西南九里其山東西南三面險絶不通昔晉吉挹為梁州督護苻堅使韋鍾伐之挹於急口岐山為壘固守鍾三年不能下即此山也牛山在城北五里為金州羣山之冠上有泉禱雨輒應鳯凰山去漢隂縣百五十里山有十二層懸竦萬仞天柱山在上津縣懸崖壁立有洞饒風嶺乃洋州來路極險要紹興二年薩里罕與四太子盡發簽軍聲言東歸太原反自於商出漢陰搗梁洋金州失守吳玠率兵徑趨金洋與敵大戰饒風嶺上敵敗衄薩里罕潜軍間道踰蟬漢嶺出官軍斷公歸路公按兵徑趨西縣扼其吭敵便旋中梁山浹月一夕潜遁鶻嶺在上津縣防遏商州來路地極險要安康石圖經嵗飢則見嵗豐則沒於沙磧之下漢水元和志去城百步書云嶓冢導漾東流為漢歷洋州縈紆數千百里而後至金之境井泉金泉井在子城東取金生水之義亭榭忘歸亭陳師道亭記云廢邱故宫頺城敗塜逹于四境狐鳴鳥聲日夜間作翠光亭楊徽之詩云釣舟浮淺瀨岡舍俯重林雲放千峯出花藏一徑深古跡伎陵城晏類要在洵陽縣庾雍漢水記即木蘭寨蜀軍救孟逹之所牛山黃獸王明清揮麈録黃巢凌劫州縣唐中和三年有太白山人謁金州刺史崔堯封云請奏掘破牛山則賊自敗堯封遂發義丁萬人掘之有一石桶桶中有黃腰獸其上有一劍獸見劍自撲而死黃巢至秋果衰是嵗中原尅平名宦吉挹通鑑晋太元四年秦兵拔魏興太守吉挹不食而死詔贈益州刺史姚合為守姜公輔為金州刺史置石泉縣李翺為郡刺史皇朝陳彭年為守魯有開為守人物漢隂丈人莊子云子過漢陰遇一丈人方為圃畦鑿隧而入抱甕而出子貢曰有機於此日浸百畦挈水若抽名曰桔橰丈人曰有機心吾不為也錫光漢西城縣人為交趾太守王莾篡位據郡不附世祖嘉其忠遂拜為大將軍題詠帆入漢隂山方千金州客舍卷箔雲峯暮蕭條未掩關江流嶓冢雨云云落葉欹眠後孤砧倚望間此情偏耐醉難遣酒罍閒山程踐白雲賈島贈李金州詩云綺里祠前後云云山缺通巴峽馬戴寄金州姚使君老懷清淨化乞去守洵陽廢井人應滿空山虎自藏迸泉疏石竇殘雨發椒香云云江流帶楚檣勸農生野思禱廟結雲裝覆局松移影聽琴月墮光鳥鳴開郡印僧去置禪床貢罷金休鑿凌寒笋更長退公搜鶴氅髙士隔鵷行相見朱門內麾幢拂曙霜刺郡輟仙曺李洞送李郎中赴金州詩雲明漆嶺髙云云危棧窺猿頂公庭掃鶴毛簿書嵐氣裏姚合金州書事詩云云鼓角水聲中井邑神州接帆檣海路通衙庭看鶴多項斯贈金州姚合郎中詩為郎名更重領郡是蹉跎官壁題詩盡云云城池連草塹籬落帶椒坡未覺旗幡貴閒行觸處過樹勢連巴沒方干送姚合員外赴金州受詔從華省開旗發帝州野烟新驛曙殘照古山秋云云江聲入楚流惟應化行後吟句上閒樓數里時逄一兩花方干路入金州絶句棹尋椒岸縈廽去云云知是從來貴金處江邉牧豎亦披沙四六被命玉除出臨金管地分南楚邑號西城岡連子午路接褒斜城連於漢水境接於秦川寄重一麾竚課藩宣之最名同五管有隆彈壓之權刺郡輟仙曹又屈粉闈之貴題詩盡官壁當知鈴閣之清楚尾秦頭是亦舟車之會召父杜母已𫝊旌騎之臨數路風寒方重邉壘憑熊之寄列營霜肅難希衙庭看鶴之娛洋州興道真符西鄉建置沿革禹貢梁州之域益州分野參實臨之周𨽻雍州春秋戰國為楚地秦置漢中郡城固縣地漢𨽻益州郡蜀分城固縣立南鄉縣晋改為西鄉縣魏廢縣仍於豐寧戌置豐寧縣廢帝於此置洋州又立洋州儻城二郡隋置洋州鎮屬漢中郡唐復於西鄉立洋州改洋州郡自西鄉縣移理興道即今州理是也復為洋州又置武定軍節度孟蜀避孟知祥諱改名源州皇朝平蜀地歸版圖復為洋州𨽻利州東路改武康軍節度領縣三治興道事要郡名武康洋川風俗好氣勇鬪郡志云云如燕趙信鬼不信醫同上云云如荆楚健訟少文藝郡志云云孟春解繳孟春四日居人遊江上遇藤葛纒繳草木者解之取解殃繳咎之意因而有會謂之解繳繫石宜蠶孟春中浣遊人集於江上求石之穿者以絲繫歸謂之宜蠶祝佛送耗孟春中浣後一日州人將五穀攢於寺觀中因而丨丨以祛禳虛耗謂之丨丨午節踏石五月五日太守率僚屬觀競渡謂之踏石臘日揭蒲冬月成蒲藻蓋鵝公潭上寒魚皆往依之丨丨太守率僚屬泛舟張樂揭取之遊人縱觀謂之丨丨形勝東連襄漢洋州志序云云西接秦鳯南蔽巴蜀同上云云北直長安境臨秦雍吕彥珂懷昌堰云云地接金商上通荆楚文同乞修城狀云云旁出雍竒貿易畢至之地衣被秦蜀有足仰者楚之北境蔡交修學記云云居華山陽郡志云云要地有三曰褒谷曰駱谷曰子午谷而駱谷子午谷在洋國家於駱谷口置石佛堡子午谷置陽嶺寨西城路置渭門寨分水寨皆備禦之要也置關有八白椒關水碓關桐木關蒻嶺關三嶺關重陽關華陽關以上並總於青座寨山川興勢山蜀先主遣諸葛亮出駱谷戍丨丨丨指掌圖以為在興元寰宇記云在興道縣北四十三里今郡城所枕形如一盆外險而內有大谷為盤道上數里方及四門因名太白山去真符縣四百五十里山面𨽻鳯翔府山背屬真符縣天寶中於山崖下得玉册遂改為真符縣韓愈南山詩西南雄太白突起莫間簉念佛巖在興道縣下有潭黃金谷在興道縣海録碎事楊難當令魏興太守薛健據金戍姜寶據鐡戍即此谷也郡縣志黃金水出縣西百畝山丨丨丨南流經縣西去其谷水陸艱險魏遣曹爽由駱谷伐蜀蜀將王平拒之於興勢張旗至黃金谷子午谷在州東百六十里又見興元郡縣志舊子午道在金州安康縣界梁將軍王神念以緣山避水橋梁百數多有毁壞乃别開乾路更名子午道即此路是也魏延請直從褒中出循秦嶺而東當子午而北不十日可至長安又張郃由子午攻漢中晋桓溫命梁州刺史司馬勳出子午道州東二十里曰龍亭此出入子午谷之路至谷六百六十里洋州志楊妃嗜生荔支詔驛自涪陵由逹州取西鄉入子午谷至長安才三日香色俱未變杜甫詩百馬死山谷至今耆舊悲駱谷在真符縣又見興元屈回八十里凡八十四盤蜀姜維出丨丨魏曹爽自丨丨入漢中魏鍾會由斜谷丨丨伐蜀晋司馬勳出丨丨並古之出入丨丨者也赤坂在州東二十里龍亭山色頳蜀建興八年魏司馬懿伐蜀丞相亮待之於城固丨丨清凉川寰宇記在西鄉縣北唐德宗幸梁洋中書舍人齊映從駕至此見旌旗蔽野上心駭謂泚之兵追路至此見梁帥嚴震具軍容拜馬前上喜令震登馬與朕作主人映叱嚴震與至尊導馬頃之上次洋州行宫召映責以儒生不逹機權映曰山南士庶只知有嚴震不知有陛下今令蜀士民知天子之尊上於是嗟嘆久之洋水出廢洋川縣巴嶺郡因此水得名漢水在興勢縣南入金州界駱水在興勢縣西一里壻水在興道縣因神仙唐公昉盡室升天其壻不得偕升遂以名水及鎮小龍溪在興道縣東北三十餘里大石上有赤書字曰展溪張魯女因卧石上便孕後生二龍即此也鵝公潭去興道縣十三里漢江之南有石鵝一對堂軒襲美堂在州宅韓忠憲公億與子縝嘗守是邦郡人以其父參大政子居鼎席故名書軒在州宅潁濵詩緑竹覆清渠塵心日日疏使君遺癖在依舊讀文書樓閣望雲樓在郡圃文與可詩巴山樓之東秦嶺樓之北樓上卷簾時滿樓雲一色秦雲閣在興道縣治北望秦山雲物變態皆几案間物也天漢臺文與可詩漾水東流見舊經銀河左界上通靈此臺試向天文覔閣道中間第幾星亭榭披錦亭蘇子瞻詩烟紅露緑曉風香燕舞鶯啼春日長誰道使君貧且老繡屏錦帳咽笙簧擁翠亭在倅㕔眺望叢山為一竒觀二樂榭在郡圃北望秦嶺一目數萬里劉光祖詩同登丨丨丨擬續四賢詩郡圃文同詩湖上雙禽泛泛橋邉細桞埀埀日永庭中無事使君來此吟詩鮮于子駿詩朝陽動湖水春色入名園邑人千萬户日日望朱轓篔簹谷守文與可作蘇子瞻記豫詩云漢州修竹賤如蓬斤斧何曽赦籜龍料得清貧饞太守渭濵千畝在胸中是日與可同妻遊谷中燒笋晚食發函得詩失笑噴飯滿案館驛望雲驛元稹丨丨丨詩云駱駝山下斧創堆望秦嶺下堆頭石五六百里真符縣四十八盤青山驛寺院醴泉院在興道院又名開化院和凝遊丨丨丨詩萬山嵐靄覆洋城數處禪齊盡有名古柏八株堆翠色靈泉一液逗寒聲名宦班超後漢人封為定逺侯有故城在今漢中西鄉縣南蔡倫桂陽人後漢元初二年鄧太后封為龍亭侯龍亭即今之洋州興道縣東龍亭之人至今造紙者特盛齊映見前清凉川注于興宗嘗為洋州節度有政績和凝天成中以檢校工員來為掌書記皇朝韓億東軒筆録祥符二年韓忠憲公知洋州日有李申以財豪於鄉里誣其兄子以為他姓公察其寃一日盡召其黨立庭下出乳醫示之皆伏罪子母復如初韓縝忠憲之子嘉祐五年為守後相秦陵韓琦皇祐間拜武康軍節度使文同熙寧為守開元院有古柏八株根節礧砢公有留題筆勢飛動人物李固城固縣人有墓在南鄭今之洋即古之城固張猛漢元帝時騫之孫也皇朝雍退翁洋州人見興元人物注題詠清凉是德鄰劉禹錫和令狐相公寄洋州崔侍御詩云金牛蜀路逺玉樹帝城春來往皆回首云云武定新雄闕蔡交詩云云豐寧舊粵墟川會漢洋舒乾酒香村落美生金富里閭陸會尋穿石江遨揭聚魚繳將藤解拆耗用榖驅除知在青山緑水邉和凝詩云華夷圖上見洋川云云官間最好遊僧舍江近應須買釣船駱谷轉山圍境內韓宗魏詩云云漢江奔浪繞城邉又南浦揭蒲當凜冽西溪踏石正暄妍又楊桞影中沽酒市芰荷香裡釣魚船戚姬廟宇青蕪沒和相詩碑緑蘚㳂三縣俗淳宜靜理兩衙公退稱閒眠四六虎符地重駱谷山髙惟洋雖曰小州在蜀最為善地况武康之為鎮據全蜀之上游粵從南渡以來今號西陲之極封疆密接於長安風物不同於他郡盛時常均逸於公卿佳境亦寄情於名勝桐木韓家之父子襲美麾符和相曽臨於蓮幕六字題詩眉山蘇氏之兄弟留題亭榭文侯亦剖於竹符𢾗篇紀詠弓刀萬騎藹壯士之雲屯鐘鼓三更帶江城之月色大安軍三泉建置沿革禹貢梁州之域星土分野與興元同春秋戰國為蜀地秦屬蜀郡二漢屬廣漢郡為葭萌地蜀改為漢夀郡屬梓潼郡晋末屬晋壽郡唐初析綿谷置三泉縣於縣置南安州尋廢州以縣屬利州改屬梁州又置縣於關城倉陌沙水西即今縣理唐末岐蜀交兵始戍三泉後唐伐蜀戰於三泉皇朝平蜀先下三泉建為大安軍未幾廢為縣中興以來諸將屯三泉以護蜀口後以縣令權輕奏復為軍今領縣一治三泉事要郡名龍門風俗純朴好勇郡志其民云云務農習獵同上云云形勝東北通秦隴圖經云云西南控川蜀同上云云介居二大國間同上曰云云冠蓋往來之衝棧道連空同上云云極天下之至險興利州至三泉縣橋閣共一萬九千三百十八間護險偏欄共四萬七千一百三十四間州宅如在山林相業堂記云云山川龍門山去軍城五里官道之旁懸壁環合上透碧虛中敞大洞下潄清泉宛然天造水簾懸夏氷柱凝冬真異境也文潞公詩壺中别有境天下更無竒宋景文趙清獻王素韓絳田况吕公弼吕大防諸公皆有留題行三里又有後洞蘇元老龍洞記自利至興行五百里幾半蜀道而巖洞之可喜者莫如龍洞重簷厦屋深不可窮唐沈雲卿詩長竇亘五里宛轉復嵌空伏湍照潛石瀑水生輪風潭毒山繫年録紹興三年薩里罕入興元府劉子羽退屯三泉縣以丨丨丨形勢斗拔其上寬平有水乃築壁壘於是軍勢復振玉簮山江山井邑盡在目前為一郡登覽之要龜山去軍五里往江之北有净法院魚山在江之南滴水巖在軍之西七十里兩山峭拔其中一峯有飛瀑千丈下至山根白崖在軍東北八十里半山有洞百牢關在縣西漢於此置關萬勝平在軍東北平川五里嘉陵江晏類要西半里其源出大巖至魚關始通舟楫韓溪源出崑崙山里人以蕭何追韓信至此得名考之唐碑當以巴州為是漾水在縣南有關井泉三泉丨丨記云在今軍東門外瀕江蒼石上窪然為泉者三如小車輪如古盤盎品列鼎峙不越步武幽竇之溜涓涓而注汲而負者甫就擔肩而泉之水霎頃又滿館驛金牛驛在大安縣東六十里見通典胡曽丨丨丨詩云山嶺千重擁蜀門成都别是一乾坤五丁不鑿丨丨道秦惠何由得井吞名宦未詳人物未詳題詠透石飛梁下蘇頲經三泉路詩云三月松作花春行日漸賖竹鄣三鳥路藤蔓野人家云云尋雲絶磴斜桞花漠漠嘉陵岸陸務觀大安酒病詩云云别是天涯一假愁四六疏綸鰲掖作鎮龍門近控益䕫旁聫秦隴特一小縣之地介二大邦之間蜀門要地欲增重於事權棧道連空當謹防於關隘斗壘遐陬已課惟良之最水簾勝槩不妨小隊之遊方輿勝覽卷六十八
