丨有墓在郫縣南一里與鼈靈墓相對杜甫詩云君不見昔日蜀天子化為杜䳌似老烏寄巢生子不自啄群鳥至今為哺雛雖同君臣有舊禮骨月滿眼身覊孤業工竄伏深樹裏四月五月偏號呼其聲哀痛口流血所訴何事常區區爾豈摧殘始發憤羞帶羽翮傷形愚蒼天變化誰料得萬事反復何所無萬事反復何所無豈憶當殿羣臣超周公祠前代以丨丨為先聖至唐正觀始從房元齡等議更祀孔子至開元册諡為文宣王位南嚮自是號文宣王殿而周公之祀遂廢然舊象猶存帥袁説友乃為殿祀之金馬碧雞祠在金馬坊前漢宣帝聞益州有丨丨丨丨之神遣諌議大夫王褒持節醮祭而致之本朝賜為昭應廟封其神為靈光侯關張祠俱在府西七里恵陵左右江瀆祠在成都縣南四里郊祀志載秦併天下立江水祠於蜀至今歲祀焉太祖平蜀依唐志立夏日祭丨丨於成都蜀先主廟成都記在府南八里杜甫詩慘澹風雲㑹乘時各有人力侔分社稷志屈偃經綸復漢留長策中原仗老臣雜耕心未已歐血事酸辛覇氣西南歇雄圖厯數屯錦江元過楚劔閣復通秦舊俗存祠廟空山泣鬼神虛簷交鳥道枯木半龍鱗竹送青谿月苔移玉座春閭閻兒女換歌舞歲時新絶域歸舟逺荒城繫馬頻如何對摇落况乃乆風塵孰與關張並功臨耿鄧親應天才不小得士契無鄰遲暮堪帷幄飄零且釣緍向來憂國淚寂寞洒衣巾劉夢得詩天下英雄氣千秋尚凜然勢分三足鼎業復五銖錢得相能開國生児不象賢凄凉蜀故妓來舞魏宫前武侯廟在府西北二里今為乘煙觀孔明表云薄田十頃桑八百株即此地孔明初亡百姓遇節朔各私祭於道上李雄稱王始為廟於少城内桓温平蜀夷少城獨存孔明廟後封武興王廟至今祠祀不絶杜甫詩丞相祠堂何處尋錦官城外柏森森映階碧草自春色隔葉黄鸝空好音三顧頻繁天下計兩朝開濟老臣心出師未㨗身先死長使英雄淚滿襟張忠定祠淳化咸平間公兩治蜀自蜀召歸嘗留畵一軸遺僧希白曰後十年開僧聞訃開視乃公像衣布褐大綿巾褁自為賛曰乖則違俗崖不利物乖崖之名聊以表德嘉祐四年建祠於馬務街張文定祠蘇老泉作畵像記至和元年秋蜀人傳言有冦至邊邊軍夜呼野無居人妖言流聞京師震驚方命擇帥天子曰母養亂母助變衆言朋興朕志自定外亂不作變且中起既不可以文令又不可以武競惟朕一二大吏孰為能處茲文武之間其命往撫朕師乃惟曰張公方平其人天子曰然公以親辭不可遂行冬十一月至蜀至之日歸屯軍徹守偹使謂郡縣冦來在我無爾勞苦明年正月朔旦蜀人相慶如他日遂以無事又明年正月相告留公像于浄衆寺公不能禁眉陽蘇洵言於衆曰未亂易治也既亂易治也有亂之萌無亂之形是謂將亂將亂難治不可以有亂急亦不可以無亂弛惟是元年之秋如器之欹未墜於地惟爾張公安坐於其旁顔色不變徐起而正之既正油然而退無矜容為天子牧小民不倦惟爾張公爾繄以生惟爾父母且公嘗謂我言民無常性惟上所待人皆曰蜀人多變於是待之以盗賊之意而繩之以盗賊之法重足屏息之民而以碪斧令於是民始忍以其父母妻子之所倚頼之身而棄之於盗賊故每每大亂夫約之以禮驅之以法惟蜀人為易至於急之而生變雖齊魯亦然吾以齊魯待蜀人而蜀人亦自以齊魯之人待其身若夫肆意於法律之外以威刼齊民吾不忍為也嗚呼愛蜀人之深待蜀人之厚自公而前吾未始見也皆再拜稽首曰然蘇洵又曰公之恩在爾心爾死在爾子孫其功業在史官無以像為也且公意不欲奈何皆曰公何事於斯雖然於我心有不釋焉今夫平居聞一善必問其人之姓名與其鄰里之所在以至於其長短小大善惡之狀甚者或詰其生平所嗜好以想見其為人而史官亦書之於其傳意使天下之人思之於心則存之於目存之於目則其思之於心也固由此觀之像亦不為無助蘇洵無以詰遂為之記公南京人為人慷慨有大節以度量雄天下天下有大事公可属系之以詩曰天子在祚歲在甲午西人傳言有冦在垣庭有武臣謀夫如雲天子曰嘻命我張公公來自東旗纛舒舒西人聚觀于巷于塗謂公暨暨公來于于公謂西人安爾室家無敢或訛訛言不祥往即爾常春爾條桑秋爾滌場西人稽首公我父兄公在西草木駢駢公宴其僚伐鼓淵淵西人來觀祝公萬年有女娟娟閨門閑閑有童哇哇亦既能言昔公未來斯須棄捐禾麻芃芃倉庾崇崇嗟我婦子樂此歲豐公在朝廷天子股肱天子曰歸公敢不承作堂嚴嚴有廡有庭公像在中朝服冠纓西人相告無敢逸荒公歸京師公像在堂古跡太城府子城張儀所築少城張儀既築太城後一年又築丨丨唯西南北三壁東即左城之西墉容齋續筆晉益州刺史治太城蜀郡太守治少城猶言大城小城耳芙蓉城孟昶在蜀僣擬宫苑城上盡種丨丨謂左右曰真錦丨也錦官城一名錦里言丨丨猶合浦之珠官也龍壇在萬歲池唐開元中有僧誦法華經有老叟來聴僧問之曰我池中龍也僧曰今方旱何不降雨叟曰凡雨須天符不爾天誅之今當為師降雨師其葬我是夕大雨質明池邉大蛇斬而兩僧取焚之為立塔呼為丨丨名宦李氷秦昭王時為守宋祁作廟碑云氷為蜀鑿離堆遂捍水以溉所及常無旱年西人德之因言氷身與水怪闘闘不勝死自是江無暴流蛟蜃怖蔵人恬以生故侈大房殿歲擊羊豕雉魚伐鼓嘯籥傾數十州之人奔走鼓舞以娱悦人文翁景帝末為守宋祁作廟碑云翁之治蜀開學校以詩書敎人澡熨故俗長長少少親親尊尊百姓順頼其後司馬相如王褒揚雄以文章倡張寛以愽聞顯嚴遵李仲元以有道稱何武入為三公漢家號令典章赫然與三代等蜀有儒自公始初公為禮殿以舍孔子及七十二子之象殿右廡作石室舍公像於中王尊先是王陽為益州刺史至九折坂歎曰奉先人遺體奈何乘此險遂以疾去官後丨丨為刺史至坂自叱其馭驅之曰王陽為孝子丨丨為忠臣張堪成都志云光武伐公孫述拜堪蜀郡太守去職之日乘折轅車布被嚢而已王褒蜀人何武傳宣帝時天下和平益州刺史丨丨頌漢德作中和樂職詩武年十四五與成都楊覆衆等習歌之廉范建中初為太守民歌之曰廉叔度來何暮不禁火民安作平生無襦今五袴王濬為廣漢太守夜夢三刀懸於屋梁上湏臾又益一刀濬甚惡之李毅曰三刀為州字又益一刀者明府其臨益州乎果遷益州刺史嚴武武節度劔南東西川甫往依焉武再帥劔南表甫為參謀檢校工部員外郎武以世舊待甫甚善親詣其家甫見之或時不巾而性褊躁傲誕嘗登武床瞪視曰嚴挺之乃有此児武亦暴猛外若不為忤中衘之一日欲殺甫及梓州刺史章彛集史于門武將出冠鈎于簾三左右白其母奔救得止獨殺彛杜甫居嚴武幕皇朝張詠知成都府嘗曰前日李順脅民為賊今日吾化賊為民不亦可乎在蜀有録曹參軍老病廢事公責之曰何故不歸明日參軍求去且以詩留别其略曰秋光多似官情薄山色不如歸興濃公驚歎曰吾過矣同僚能詩而吾不知留而慰薦之麈史乖崖守蜀兵火之餘人懐反側一日令軍旅大閲始出衆遂嵩呼者三乖崖亦下馬東北望而三呼復攬轡行衆不敢誰何趙抃知成都神宗召知諌院故事自成都還者必更省府大臣以為疑帝曰吾頼其言耳及謝帝曰聞卿匹馬入蜀以一琴一鶴自隨政簡易亦稱是耳未幾擢為參知政事熈寜五年再知成都屏去龜鶴止一蒼頭執事張公裕以詩送之云馬諳舊路行來滑龜放長江不共來宋祁東軒筆録子京知成都府帶唐書於本任刋修每宴罷盥潄畢開寢門垂一簾燃二椽燭媵婢夾侍和墨仲紙逺近觀者皆知尚書修唐書望之如神仙焉薛奎天聖四年守蜀蜀人以比張公詠而不苛薛簡肅公知成都范蜀公方為舉子一見愛之即於府第俾與子弟講學每曰范君廊廟人也公益自謙退乘小駟至銅壺閣下即歩行趍府門踰年人不知為帥客也簡肅還朝載蜀公以去或問簡肅曰自成都歸得何奇物曰蜀珍産不足道吾歸得一偉人耳文彦博慶厯間以宻直知益州多燕集有飛語至京師御史何郯聖從謁告歸蜀上遣伺察之張俞少愚潞公客也迎見聖從於漢州同郡㑹有營妓掦其姓者善舞聖從喜之少愚因取其項帕題詩曰蜀國佳人號細腰東臺御史惜妖嬈從今喚作楊䑓栁舞盡春風萬萬條後數日聖從至成都頗嚴重一日潞公大作樂以燕之迎其妓雜府妓中歌少愚之詩以酌聖從聖從每為之醉聖從還朝潞公之謗乃息此與陶榖使江南郵亭詞頗相類云潞公少時從其父赴眉州幕官過成都潞公入江瀆廟祠官接之甚勤且言夜夢神令洒埽祠庭明日有宰相來公笑曰宰相非所望若為成都當使廟宇一新及知益州謁江瀆廟若有感焉即經營改造忽江漲大木數千章蔽流而下取以為材廟成壯觀甲于天下並聞見録張方平為守奏减橫賦四十萬馮京知成都夷人冦雞標闗京出兵夷人懼請降議者欲蕩其巢穴京禁侵掠給稼器粮餉使歸夷人出大豕盟願世為漢藩召知宻院以疾未至神宗夢京造朝甚慰乃賜京詔有渇想儀刑不忘夢寐之語司馬池寜武志云池為郫縣尉邑人妄傳蠻人將入冦富室争瘞金玉避於山谷間池攝縣事上元乃張燈作樂縦民遊觀凡三日民心遂安人物司馬相如字長卿成都人嘗慕藺相如之為人更名相如著子虗賦上林賦武帝有朕不得與此人同時之歎詳見卭州欒巴後漢人為尚書郎正朝大㑹得酒不飲西南噀之有司奏巴大不敬巴謝曰臣本縣成都失火故噴酒以為雨後成都奏火得雨而㓕雨中作酒氣也揚雄字子雲蜀郡人著法言及太𤣥經嚴遵字君平按西漢王貢叙傳君平卜筮於成都市以為卜筮者賤業而可以恵衆人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣裁日閱數人得百錢足自養則閉肆下簾而授老子博覧亡不通依老子莊周之指著十餘萬言揚雄少時從㳺學其論曰蜀嚴湛冥不作茍見然未嘗仕其風聲足以激貪勵俗近古之逸民也李白蜀郡人皇朝梅摯新繁人慶厯中為御史嘗論張堯佐縁宫掖以進恐上累聖德仁宗曰摯言事有體范鎭華陽人神宗朝論新法不合遂請致仕司馬温公言勇决不如范景仁范祖禹鎭從姪温公辟同修通鑑進帝學政典唐鑑之書紹聖初責化州卒與范鎭范百禄號曰三范成都隱者二程侍父入蜀至大悲寺有箍桶者口吟易數就揖之挽歸質所疑酬答如響問其姓名不答竟去宇文虛中廣都人建炎二年使北朝不如所請遂不與還每宻令人懷蠟彈奏虛實願早為北伐之訃和議既定金人來取虛中一家秦檜發往盡為所害名賢李郃南鄭人善河洛風星為郡候吏和帝遣二使微行至蜀宿郃候舍郃問曰君來時寜知二使何日發耶二人怪之郃指星曰有二使者入益部題詠蜀道之難李白歌云噫吁嘻危乎髙哉蜀道之難難於上青天蠶叢及魚鳬開國何茫然爾來四萬八千歲不與秦塞通人烟西當太白有鳥道可以横絶峨眉巔地崩山摧壯士死然後天梯石棧相鈎連上有横河斷海之浮雲下有衝波逆折之囬川黄鶴之飛尚不得過猿猱欲度愁攀縁青泥何盤盤百歩九折縈巗巒捫參厯井仰脅息以手撫膺坐長歎問君西逰何當還畏途巉巗不可攀但見悲鳥號古木雄飛雌走遶林間又聞子規啼夜月愁空山蜀道之難難於上青天使人聴此凋朱顔連峰去天不盈尺枯松倒掛倚絶壁飛湍瀑流争喧豗砯崖轉石萬壑雷其險也如此嗟爾逺道之人胡為乎來哉劍閣峥嶸而崔嵬一夫當闗萬夫莫開所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難於上青天側身西望長咨嗟西蜀稱天府隋盧思道詩云云由來擅沃饒雲浮玉壘夕日映錦城朝南尋九折路東上七星橋琴心若易觧令客豈難要分土跨梁岷禇亮列宿光輿井云云公來雪山重杜甫八哀詩云諸葛蜀人愛文翁儒化成云云公去雪山輕吳蜀水相通杜甫詠蜀道畵圖詩日臨公館静畵列地圖雄劔閣星橋北松州雪嶺東華夷山不斷云云興與煙霞㑹清樽幸不空閣道通丹地杜甫送嚴公入朝詩鼎湖瞻望逺象闕憲章新四海猶多難中原憶舊臣與反安反側自昔有經綸感激張天歩從容静塞塵南圖囬羽翮北極奉星辰漏鼓還思晝宫鶯罷囀春空留玉帳術愁殺錦宫人云云江潭隠白蘋此生那老蜀不死㑹歸秦公若登台輔臨危莫愛身説尹終在口杜甫遭田父泥飲美嚴中丞詩歩屧隨春風村村自花栁田翁遭社日邀我嘗春酒酒酣夸新尹畜眼未見有語多雖雜亂云云萬里至揚州武元衡詩蜀國春與秋岷江朝夕流長波東接海云云政簡坤維静司馬君實寄成都吳龍圖同年詩云云仁深絡井安情依節制尊杜甫寄嚴公詩跡忝朝廷舊云云舊俗接魚蠶蘇子瞻詩遺民悲昶衍云云文章四子盛雍陶詩云云道路五丁開元戎小隊出郊坰杜甫嚴中丞見過云云問栁尋花到野亭川合東西瞻使節地分南北任流萍扁舟不獨如張翰皂帽應兼似管寜寂寞江天雲霧裏何人道有少微星魚知丙穴由來美杜甫寄嚴鄭公詩得歸茅屋赴成都直為文翁再剖符但使閭閻還揖遜敢論松竹乆荒蕪云云酒憶郫筒不用沾五馬舊曽諳小徑幾回書札待潜大枉沐旌麾出城府杜甫奉酬嚴公寄題野亭詩云拾遺曽奏數行書懶性從來水竹居奉引濫騎沙苑馬幽棲真釣錦江魚謝安不倦登臨費阮籍焉知禮法疎云云草茅無逕欲教鋤竹裏行厨洗玉盤杜甫嚴公仲夏枉駕草堂携酒饌詩云云花邊簇馬立金鞍非闗使者徴求急自識將軍禮數寛百年地闢柴門逈五月江深草閣寒看弄漁舟移白日老農何有罄交歡重鎭還須濟世材杜甫呈嚴大夫詩殊方又喜故人來云云常怪偏禆終日待不知旌節隔年囬欲辭巴徼啼鶯合逺下荆門去鷁催身老時危思㑹靣一生襟抱向誰開錦里逢迎有主人杜甫寄嚴公詩雪山斥堠無兵馬云云甘棠終少海棠多范至能有詩云手開花逕錦城窠浩蕩春風載酒過來歲游人應觧笑云云少城風物似揚州范至能詩十里珠簾都捲上云云石犀江下春波緑陸務觀云云金雁橋邊夜燭紅桑麻接畛無餘地王介甫送人赴成都詩槃礴西南江與岷石犀金馬世稱神云云錦綉連城别有春四六庭揚成渙閫制全坤輟賢禁甬作鎭少城疏恩北闕作牧西陲疏渥天庭出鎭坤軸距上國萬里之遥為西蜀一都之㑹躋班禹閣宅牧蜀都進直奎文借留井絡火井沉熒雪山増重其民務本而力穡其士好學而有文天有井絡地稱坤維宣揚兊澤告戒坤垠眷此坤方號稱天府許以金城之便宜盡䕶玉關之疆埸仰止髙才屹然方面帝念岷峨地連關陕井鬼名疆岷峨㑹府况從漢棧之囂闐不見秦兵之耐戰維蜀一方去天萬里捫參厯井挹斗翕箕夢協三刀恩覃兩劔方謹戍西山之雪何因近南斗之星有可福虛危之次諒何憚參井之捫擁元戎之小隊布方國之細書張忠定嚴明為政趙清獻簡易臨民天使為入蜀之星人已卜擒蠻之月長沙千里之平成都萬事之好召從瞿唐灧澦之間歸奉閶闔明光之對駕風鞭霆已上蓬萊之島捫參厯井遂登蜀道之天非天府前腴而後瘠殆雪山昔重而今輕就日望雲不覺長安之逺捫參厯井重經蜀道之難去来關雪山之重輕出入係蜀道之難易遮日而走長安幾穿破履登天而攀蜀道忽得舊氊益州疲弊民不聊生劍閣峥嶸君誰與守古来天府之腴莫如益部今使雪山之重是在我公惟漢有文翁廉范之規在唐有德裕元衡之略萬甕萬牛窘韋臯之去鎮一琴一鶴欠清獻之乘軺惟真學士象十二月之班而大府帥總六十州之重星紀一周未皇皇而奠枕風寒數處屹在在之長城逾沔入渭兩經鳥䑕之邦歴井捫參再造魚鳬之國蠶叢啟國魚鳬羽化於湔山望帝開基鼈靈復生於岷水松陵笠澤雖賖故國之歸期錦江草堂聊竊老師之補處周家地官方賴小司徒之職益州天府遽勤大元帥之行臨民簡易有趙清獻之餘風馭下嚴明繼張忠定之遺躅千二百里之邊面威令風行六十餘郡之人心驩呼雷動江路市橋想已遂碧雞之訪天梯石棧得無憐黃鶴之飛孔明用蜀府中實委之費禕嚴武鎮川幕下因謀之杜甫雲門陸澤夙稱要害之膏腴石棧天梯素忌吮磨之牙血厭承明勞侍從乆陪工雍之祠望太白横岷峨爰馳諭蜀之檄出鎭踰歲月共期裴相之來歸小隊駐郊坰復喜嚴公之因任撫五十四州之軍民瘡痍帖泰壯一百八盤之門戸氣色晶明三分籌䇿小試渭濱耕戰之謀百二山河行復闗中帝王之業魚鳬以來幾千年素稱用武之國貔貅之衆百萬騎今為足食之謀載惟魚鳬之國幾千歲今則不殊使有熊羆之士不二心誰其敢侮惟成都夙稱陸海海已近於揚塵而益部舊號使星星今同於隕石謂江漢朝宗於海必導岷而導嶓當荆益跨有之時欲保吳則保蜀方輿勝覽卷五十一
