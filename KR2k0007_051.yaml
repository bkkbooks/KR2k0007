body:
  text: 方輿勝覽卷五十一宋祝穆撰成都府路成都府成都温江華陽䨇流郫縣廣都新都靈泉新繁建置㳂革禹貢梁州之域秦地鶉首之次天官東井輿鬼之分野人參一度古蜀國也歴夏商不改周武王伐商蜀人從焉周官職方氏以梁合雍又為雍州之地及周哀蜀僣號稱王秦恵王時蜀人來朝巴蜀相攻秦使司馬錯張儀伐蜀㓕之貶蜀王為侯於成都置蜀郡因蜀山以為名漢武帝改古梁州曰益州蜀郡𨽻焉王莽改益州曰庸部蜀郡曰導江公孫述改益州曰司𨽻蜀郡曰成都郡東漢靈帝末劉焉為益州牧自綿竹徙治成都蜀先主有蜀於益州置牧蜀郡置守魏鍾會鄧艾伐蜀蜀降分益州置梁州晉武帝改蜀郡為成都國宋齊並為益州梁置始康郡後周置益州總管及置蜀郡隋罷州為蜀郡唐改蜀郡為益州總管府又陞為大都督府置劔南節度使改益州為蜀部明皇幸蜀駐蹕成都及還京改蜀郡為成都府長史為尹又分劔南東西川各置節度使五代孟蜀繼有其地而知府始於前蜀皇朝分西川為兩路又分益梓䕫利四路而成都為益州路復陞為成都府以益州路為成都府路中興以來罷兼西路始帶一路安撫使後兼四路更名安撫制置大使以成都而得行四川民事自張燾始制置不與宣撫並除用兵則宣制二司間或置司利沔二州休兵則本府始帶成都府路安撫今統郡十六領縣九治成都華陽兩縣本路安撫轉運四川提舉茶馬置司總論開國之初寰宇記蜀之先肇於人皇之際至黃帝子昌意娶蜀人女生帝嚳後封其攴庶於蜀歴夏殷周始稱王者自名蚕叢次曰栢灌次曰魚鳬其後有王曰杜宇宇稱帝號望帝自恃功德髙乃以褒斜為前門熊耳靈關為後户玉壘峨眉為池澤時有荆人鼈靈其尸隨水上荆人求之不可得鼈靈至汶山下復生見望帝帝立以為相後帝自以其德不如鼈靈因禪位於鼈靈號開明遂自亡去化為子鵑故蜀人聞子鵑鳴曰是我望帝也自開明而上至蚕叢凡四千歲自開明而下五葉有尚始立宗廟尚書牧誓所謂庸蜀者即此通鑑愼靚王五年巴蜀相攻俱告急於秦秦使張儀司馬錯伐蜀㓕之貶蜀王更號為侯後以其地為蜀郡總論四路定差諭蜀編云定差之法逐路漕司分四孟定差銓量就權皆漕使主之注闕之後類聚申部給換𦍑劄闕有三等有本司闕則漕使得專予奪有部闕則申部給換差劄制司闕則制司自辟若辟闕則監司具申以聽朝廷之予奪若得就權帖則可先期赴上定𦍑之闕非特蜀人東南士夫移籍入蜀皆可入闕總論四路辟差辟差不拘川南貫籍皆可或資格不及亦可辟往往逐司使長遴選而辟制司可辟漕司亦可同辟教官則提學司主之㳂邉倅貳則制司主之買馬州郡則茶司主之或小小州郡往往取制閫之命路鈐則多属帥閫及制閫大郡則必俟朝廷降旨也總論四路觧省試朝野雜記紹興二十四年並以中秋日引試惟四川則悉用三月十五日其類省試舊以九月二十九日制置司言去行在地逺恐舉人赴御試不及請以八月鎻院許之今以八月初一日鎻院十五日引試九月十四日開院又云建炎元年命諸道即漕司所在州類試紹興五年始試進士於南省惟四川即試宣撫司後又移付制置司二十七年言者請悉令赴南省楊椿言於朝曰蜀士多貧而使之狼狽萬里可乎欲革此弊一監試得人足矣又云自慶元後監試考官率以南士餘官選南方及蜀人參之然去取之柄多在南人無復曩時之弊矣總論蜀兵華陽國志周赧王七年秦司馬錯率巴蜀之士十萬大舶舡萬艘浮江伐楚取商於之地為黔中郡漢髙帝發賨民兵定三秦蜀劉禪之降也甲士十萬二十晉王濬用蜀兵伐吳戍卒八萬梁武陵王紀在蜀器甲殷積有馬八千匹元和郡縣志劔南節度唐都管兵三萬四千七百人馬三千匹盖唐止偹西南二邉故兵數不多蜀檮杌云蜀王建武成二年講武於星宿山歩騎二十萬官馬八千私馬四千通鑑後唐明宗天成元年初郭崇韜時蜀騎兵三千歩兵二萬四千孟知祥増置六千人營羅城内萬六千人分戍管内州縣四千人分戍成都境内六千人分戍濵江諸州長興三年知祥克遂閬利䕫黔梓六鎭得東兵三萬孟蜀之兵垂十萬矣孟昶之降有十四萬人齊觧甲之句則五代已前蜀兵之數可考也總論蜀鹽朝野雜記有龍州之仙井卭州之蒲江榮州之公井大寜富順之井監西和州之鹽官長寜軍之淯井皆大井也若隆榮等十七州則皆竹筒小井用力甚難惟大寜之井鹹泉出於山竇間有如飛瀑民間分而引之又有彭山之瑞應井味稍硝得隆榮鹵餅雜煎之然後成鹽元豐崇寜兩嘗禁止以食者多病故也仙井歲産鹹二百餘萬斤𨽻轉運司蒲江亞之𨽻總領所大寜鹽二百五十餘萬斤歲取其四分𨽻總領所淯井鹽四十餘萬斤歲取其嬴五萬餘緍為軍食之用自祖宗以來民間自煮鹽歲輸課利錢八十萬緡又云自紹興初趙應祥變鹽法增至四百餘萬緡又逃絶之井許人増其額以承認鹽既益多遂不可售紹熈三年楊嗣勲總計棧閉助筒二千鹽由是頓易自後井户稍舒而民愈食貴鹽矣總論蜀酒中興小厯建炎三年張浚以趙開兼本司隨軍轉運使總領三川財賦大變酒法自成都始朝野雜記云建炎中總為緡錢一百四十萬趙開變法置隔釀民願釀者米一斛輸錢三千徧四路行其法於是増至六百九十餘萬緡王瞻叔為潼川漕請罷監糟務許撲賣四川酒課累减之餘猶為緡錢四百一十餘萬䕫路自祖宗以來不搉酒趙應祥始搉之歲取錢四萬二千九百餘引鄭剛中為宣撫奏除之眉州志云范成大帥四川議减鹽酒課以蘇蜀民朱時敏白范曰榜賣之法不除則今日之恵有時而盡後時敏為都司奏曰陛下睠念全蜀歲捐上供對减酒課四十八萬德至渥也未减之前元管酒額五百五十萬既减之後今甫七年又増近五百四十餘萬矣欲乞罷榜賣之法而用推排孝宗可其奏總論四川總領朝野雜記古無其官靖康末髙宗駐軍濟州命梁揚祖總領措置財用然未以名官也建炎末張魏公用趙應祥總領四川財賦總領之官自此始四川始制都轉運司故四川總領又廢巾興小厯紹興十年侍御史汪勃請置四川總領治利朝野雜記云東西三總領皆仰朝廷科撥獨四川總領專掌利源即有軍興朝廷亦不問故趙應祥擢鹽酒而王瞻叔栝白契以佐軍需中興小厯紹興三年初趙開言自改修茶鹽酒已壊之法歲有常息起建炎己酉至紹興癸丑共收一千五百餘萬緡兼陜西茶䭾及陜西造銅錢引紐計川錢又八百三十餘萬緡朝野雜記去紹興休兵之初歲費二千六百六十五萬緡始紹興五年四川收錢物總三千三百四十二萬緡而所多五十二萬緡趙應祥既與武安不恊遂丐免十二年朝廷罷兵鄭亨仲為宣撫副使以後始節節寛减亨仲召歸而宣總所椿積錢至五千餘萬休兵之力也又中興小厯紹興三十年王之望總領四川財賦時本以見錢引一千四百四十餘萬道粮三百餘萬石朝野雜記乾道中淮東淮西湖廣三總領所支僅當四川一年之數盖川中雜買歲為八百三十餘萬緡而東南三總領收正色米故也總論四川茶馬朝野雜記川秦搉牧自元豐以來雖各有兩司然大扺川秦皆止除一使紹興中乃合為一司熊克通略云元豐元年初蜀茶額歳三十萬緡熈寜中四十萬及李稷加為五十萬至是陸師閔加至一百六十萬詔定以百萬為額中興小厯建炎二年趙開奏搉茶馬乞依嘉祐故事併歸漕司及開主管川陜茶馬事開乃先更茶法酌政和都茶場法印給茶引使茶商執引與茶户交易改成都茶場為合同場仍置茶市交易者必由市引與茶相隨四年買馬踰二萬匹茶收錢一百七十餘萬緡十六年先是茶馬司設買馬兩務一在成都府市於文叙黎珍等州號川馬一在興元府市於西和之宕昌寨階之峰貼峽號秦馬十九年歳發川馬二百匹進御而以四千匹付諸處屯軍鎮江建康荆鄂各七百五十匹江池各五百匹又秦馬三千五百匹付三衙殿前司一千五百匹侍御兩軍各一千匹又七百二匹付宣撫司總計八千四百二十疋朝野雜記云乾道川秦苶馬之類歲為萬有一千九百匹川司六千秦司五千九百其後文州改𨽻秦司而川司增珍州之額共為四千八百九十六秦司六千一百二十合兩司為萬有一千十有六匹此慶元初之額也嘉㤗末川司增為五千一百九十六匹秦司増為七千七百九十八匹兩司為萬有二千九百九十四匹然累歲所市多不及額焉成都府馬務每年排發江上諸軍馬五十八綱興元府馬務每年排發三衙馬一百十二綱容齊隨筆云蜀道諸司惟茶馬一䑓最為富盛東坡有送周漢詩云茶馬西南病甿俗記二李何人折其鋒矯矯六君子又朝野雜記云殿前取馬官彭輅賂蘇師旦自言西人知馬政翌日召輅見韓平原遂有分司之命王大過與輅分領之大過置司成都輅置司興元總論四路監司論蜀編云成都路漕置司成都憲置司嘉定而漕不及憲潼川路漕置司遂寜憲置司潼川而憲不及漕利路憲置司興元漕置司利州而憲過於漕䕫路憲置司重慶漕置司䕫門而漕過於憲夔路郡守監司帥臣皆在三路之下獨漕為八監司之最盖專一路鹽利故也事要郡名錦城錦里西川龜城張儀之初築城也屢築屢頺忽有大龜出於江儀異之以問巫巫曰隨龜築之功果就故名成都盖取史記所謂三年成都之義益州風俗記疆壌益廣故號益州釋名曰隘阨也言其險阨風俗民性循柔田况四蜀蕃夷圖序云云喜文而畏兵華陽志云益州之俗文多於質故其民柔弱其俗好文寰宇記其人尚侈云云學者比齊魯見文翁注江漢炳靈蜀都賦云云世載其美蔚若相如皭若君平王褒韡曄而秀發揚雄含章而挺生奮之則賨旅同上若乃剛悍生其方風謡尚其武云云翫之則渝舞銳氣剽於中葉蹻容世於樂府地險物侈張俞送黄士安序外戎内華云云國富民殷漢龎統說先主曰益州云云户口百萬寳貨無求於外今可權借以定大事工商結駟常璩華陽國志丨丨致丨丨連騎豪族服王侯美衣寳藪珍藏文同成都漕㕔讌思堂記惟劔南西川原壄衍沃甿庶豐夥金繒紵絮天洒地發裝餽日報舟浮輦走以給中府以贍諸塞號居大農所調之半縣官倚之為云云樂國豐壤田况序蜀視四方云云珍産纚連而錯出其間無所不足萬商之淵蜀都賦夜市三鼓成都志載古詩云錦江丨丨連丨丨石室書齋徹五更遨頭宴集成都逰賞之盛甲於四蜀俗好娱樂凡太守歲時宴集騎從雜㳫車服鮮華倡優鼓吹出入擁導四方竒技幻怪百變序進於前以從民樂歲率有期謂之故事及期則士女聞道嬉遊以坐具列於廣庭謂之遨床謂太守為丨丨蠶市藥市成都古蠶叢之國其民重蠶事故一嵗之中二月望日鬻花木蠶器於某所者號丨丨五月鬻香藥於觀街者號丨丨鬻器用者號七寳市形勝西抗吐蕃元和志西川節度使云云南撫蠻獠東接廣漢華陽志云云北接汶山西接漢嘉犍為州治大城郡治少城上絡東井河圖曰岷山之地上為井丨帝以㑹昌神以建福郭璞云岷山之精云云作紀南夏外負銅梁蜀都賦云云宕渠内函要害膏腴華陽西極揚雄益州箴云云黒水南流靣越負秦成都記左巴右凉云云岷嶓鎭其域華陽志蜀之為邦天文井絡輝其上地理云云五嶽華山表其陽四瀆汶江出其徼蕃衍三州廣土萬里包玉壘以為宇蜀都賦夫蜀都者盖肇基於上世開國於中古豁靈關而為門云云帶二江之䨇流抗峨眉之重阻水陸所凑兼六合而交㑹焉豐蔚所盛茂八區而菴藹焉靈關今在雅州玉壘今在茂州以褒斜為前門河圖括地象云云熊耳靈關為後戸玊壘峨眉為城郭江潜綿絡為地澤汶山為畜牧南中為園苑緣以劔閣蜀賦却皆華容北指崑崙云云阻以石門金城石郭同上賦云云兼匝中區既麗且崇實號成都雲門陸澤同上其封域之内則有原隰墳衍通望彌博演以潜沬浸以綿絡溝洫脉散疆里綺錯黍稷油油粳稲莫莫指渠口以為雲門灑滮池而為陸澤雖星畢之滂沱尚未齊其膏液注言水自渠而灌田指渠口為丨丨猶雲來則雨至也滮池畜水池也言自此而灑田實為丨地之潤丨地稱天府華陽志丨丨丨丨原曰華陽坤維大都㑹范謩砌街記市區櫛比衢遂棊布太少二城云云陳子昻傳蜀為西南一都㑹國之寳府地大且要蘇明允吳職方書蜀之云云無如益與嘉眉為諸郡綱領一人守隘蜀賦若臨谷為寨因山為障峻岨塍埒長城豁險呑若巨防云云萬夫莫向公孫躍馬而稱帝劉宗下輦而自王由此言之天下孰尚故雖兼諸夏之富有猶未若茲都之無量也二九之門同上闢丨丨丨通丨漢元鼎間立大城九門少城九門揚一益二見廣陵志土産蜀牋有薛濤十色牋濤蜀妓也以紙為業南部新書云元和之初薛濤好製小詩惜其幅大不忍長賸乃狹小之丨中才子後减諸丨因號為薛濤牋李義山送崔珏詩卜肆至今多寂㓕酒壚從古擅風流浣花牋紙桃花色好好題詩詠玉鈎楊文公談苑載韓浦與弟洎皆有辭藻洎語人曰吾兄為文譬如繩樞草舍聊避風雨予之為文是造五鳯樓手因寄丨丨仍贈詩曰十様蠻牋出益州寄來新是浣溪頭老兄得此渾無用助爾添修五鳳樓蜀錦錦江橋之水濯錦則鮮明嘉魚細鱗蜀中謂之拙魚海棠本出蜀中而杜甫獨無此詩故鄭谷詩云濃淡方春滿蜀鄊半隨風雨斷鶯腸浣花溪上堪惆悵子美無情為發揚陸務觀驛舍見故屏風畵丨丨有感云成都二月海棠開錦繡褁城迷巷陌燕宫最盛號花海覇國雄風有遺跡桐花鳯桐花中有小鳥紅翠碧相間生於花間人畵丨丨丨扇即此也山川雪山一名雪嶺在城西又名西丨杜甫詩雪嶺界天白見萬百橋注又云東郭滄江合西山白雪髙武擔山在城北二百歩一名武都山蜀記云武都山精化為女子蜀王納為妃不習水土而死王遣五丁於武都山擔土為冡故曰丨丨今丨有石照表其門焉開明悼念不已為作臾邪之歌龍歸之曲今成都及毗橋有一折石長三丈相傳是五丁擔土擔聖燈山在廣都縣東南四十里世傳鄊人茍瑜奉釋敎於此普賢丨丨出現蜀太后有看聖燈詩所恨風光看未足却驅金翠入龜城大塔山在廣都縣東四十里有阿育王塔因名天涯石與昭覺寺相對地角石見羅城記支機石因話録載漢書張騫窮河源言其奉使之逺實無天河之說惟張茂先博物志説近世有人居海上每年八月見槎來不違時齎一年粮乘之到天河見婦人織丈夫飲牛遣問嚴君平云某年某月某日客星犯牛斗即此人也後人相傳云得織女丨丨丨持以問君平今成都嚴真觀有一石呼為丨丨丨余寳厯中下第還家於京師途中逢官差逓夫舁張騫槎不知是何物相襲訛謬縱出雜詩亦不足據也石笋在城内寰宇記蜀之五丁毎一王死輒為立大石長三丈重千鈞以為墓誌今丨丨是也杜甫詩君不見益州城西門陌上丨丨雙髙蹲古來相傳是海眼苔蘚蝕盡波濤痕雨多往往得瑟瑟此事恍惚難明論恐是昔時卿相墓立石為表今仍存惜哉俗態好蒙蔽亦如小臣媚至尊政化錯迕失大體坐看傾危受厚恩嗟爾丨丨擅虚名後生未識猶駿奔安得壯士擲天外使人不疑見本根石犀去城三卜五里犀浦太守李氷作五丨丨沉江以壓水怪杜甫詩君不見秦時蜀太守刻丨立作三丨牛自古雖有厭勝法天生江水向東流蜀人矜夸一千載泛溢不近張儀樓今年灌口損户口此事或恐為神羞終藉隄防出衆力髙擁木石當清秋先王作法皆正道詭怪何得參人謀嗟爾三犀不經濟缺訛只與長川逝但見元氣常調和自免洪濤恣凋瘵安得壯士提天綱再平水土犀奔茫石牛在成都縣鄧艾廟之南即秦恵王所遺蜀者石婦在錦城門西十五里昔有婦守節後人刻丨象之白居易詩至今為丨者見者孝心生不比山頭石空有望夫名石鏡在武擔山杜甫詩蜀王將此鏡送死至空山冥漠憐香骨提携近玉顔衆妃無復歎千騎亦虗還獨有傷心石湮淪玊宇間三江一名汶江一名流江經縣南七里蜀守李氷穿二江成都中皆可行舟溉田萬頃蜀中又謂流江為笮橋水此水濯錦鮮於它水皇朝郡縣志初太守鑿離堆乆開二渠由永康過新繁入成都謂之外江一渠由永康過郫入成都謂之内江髙駢未築羅城内外江皆從城西入自駢築城遂從西北作縻枣堰堰外江遶城北而東注於合江復回内江水循城南而與外水俱注又名錦江杜甫詩錦江春色來天地玉壘浮雲變古今沲江在新繁縣禹貢岷山導江别為沲岷江支流過温江縣西二里東南分入成都䨇流縣界浣花溪在城西五里一名百花潭按吳中復冀國夫人任氏碑記云夫人微時以四月十九日見一僧墜汚渠為濯其衣百花滿潭因名曰百花潭觧玊溪在大慈寺之南韋臯所鑿用其沙觧玊則易為功皂水在温江縣李膺記云相林寺前清丨二丨是也粉水一名都江水在郡城西水宜造粉池井躍龍池在成都縣東南十二里隋開皇中欲伐陳鑿大池以敎水戰偽蜀王衍乾德元年以丨丨丨為宣華苑即此隋蜀王秀取土築廣子城因為池有胡僧見之曰摩訶宫毗羅盖胡僧謂摩訶為大宫毗羅為龍謂此池廣大有龍耳又云摩訶池或云蕭摩訶所開杜甫陪嚴武泛舟有詩云湍駛風醒酒舡回霧起隄諸葛井孔明欲通井絡王氣故為井通仙井在嚴真觀相傳此井與廣漢綿竹縣君平宅井相通往歲有人淘井得銅錢三徑可二寸因恍惚不安復投井中立愈或謂此君平擲卦錢也樓臺錦樓在龜城之上前瞰大江岸列花木西眺雪嶺東望長松二江