body:
  text: 方輿勝覽卷五十九宋祝穆撰開州開江清水建置沿革禹貢梁州之域東井輿鬼之分野秦漢為巴郡朐䏰縣地後漢獻帝分朐䏰西北界今州南二里置漢豐縣屬固陵郡蜀先主改為巴東郡西魏恭帝於達州新寧縣置開州因開州以為名後周置漢豐縣為永寧縣自東關郡城移開州於今理今州西九十里濁水故地是也隋煬帝改永寧為盛山縣恭帝於盛山縣置萬州及萬嵗郡唐重置開州改盛山郡復為開州皇朝因之今領縣二治開江事要郡名盛山朐䏰天寶更名丨丨劉禹錫云丨丨蚯蚓也地濕多此蟲故名風俗俗重田神寰宇記云云績文相高學記士以云云有溫造栁公綽之餘烈唱竹枝歌寰宇記男女皆云云形勝漢中支郡權載之作開州刺史新宅記云云曰盛山所理厄狹禹服荒略溫造宿雲亭記云郡當丨丨之丨丨巴封之徼隧水陸所湊隋志巴東等郡云云貨殖所萃蓋一都會也山川盛山在州北三里山下有宿雲亭隱月岫流杯渠琵琶臺繡衣石熊耳山在州東北其南至夔州界青岡山在開江縣西南百四十里石門山在清水縣東北十里有石穴至深靈洞在州南五里溫井後兩江開江清江又名疊江墊江發源高梁山流至縣南白水溪在清水縣西南亭臺宿雲亭在盛山堂溫造有記韋處厚詩薺平連郭栁帶繞抱城江翠薌亭夏侯孚先記云盛山風物冠冕峽郡其間十二景唐宋巨公更酬迭唱云雲鴻亭賈偉有詩四并臺張皓有詩名宦韋處厚韓愈開州韋處厚侍講盛山十二詩序韋侯昔以考功副郎守盛山人謂韋侯美士考功顯曹盛山僻郡奪所宜處納之惡地以枉其材韋侯將怨且不釋矣或曰不然夫得利則躍躍以喜不得利則戚戚以泣若不可生者豈韋侯之謂哉韋侯讀六藝之文以探周公孔子之意又妙能為辭章可謂儒者夫儒者之於患難茍非其自取之其拒而不受於懷也若築河隄以障屋霤其容而消之也若水之於海氷之於夏日其玩而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲况一不快於考功盛山一出入息之間哉未幾果有以韋侯所為十二詩遺余者其意方且以入溪谷上巖石追逐雲月不足日為事讀而詠歌之令人欲棄百事往而與之遊不知其出於巴東以屬朐䏰也于時應而和者凡十人及此年韋侯為中書舍人侍講六經禁中名處厚和者通州元司馬名稹為宰相洋州許使君名康佐為京兆忠州白使君居易為中書舍人李使君景儉為諫議大夫黔府嚴中丞武為祕書少監溫司馬造為起居舍人皆集闕下於是盛山十二詩與其和者大行于時聯為大卷家有之焉慕而為者將日益多則分為别卷韋侯俾余題其首栁公綽為守劉禹錫為屯田郎舉以自代宋申錫唐書文宗朝王守澄黨鄭注誣告申錫貶開州司馬許渾有聞開江丨相公丨丨下世詩云必竟功成何處是五湖雲月一帆開皇朝劉源遂寧人為開州萬嵗令即清水也嘗疏鑿縣灘號曰開灘長官張堯佐為開州太守題詠開州入夏皆涼冷杜甫寄常徵君有詩云云不如雲安熱毒新拄笏看山尋盛字蓋山如盛字也盛山更在天上頭謝諤詩金房開達皆名州云云四六言從涪水易守固陵眷惟峽郡莫若盛山自魚鳬之開國析朐䏰以為利蜀道數千里靡憚載驅盛山十二詩正將屬和編元子之樞機多傳詩賦奏韋侯之金石又妙辭章雖云僻郡不無奪所宜處之嫌其在清朝即有選諸所表之慶達州通川新寧巴渠東鄉永睦明通建置沿革古巴子國秦地鶉首之分野秦為巴郡漢為巴郡宕渠縣之東界後漢分宕渠置宣漢郡即今通州理所劉璋分屬巴西郡晉省宣漢縣宋武帝又置宣漢縣屬南宕渠蕭齊又屬巴渠郡梁於宣漢縣置萬州及東關郡因界內萬頃池故名西魏廢帝以郡居四達之地改通州隋廢通州郡唐改通州皇朝平蜀以淮南有通州改達州今領縣六治通川事要郡名古通通川寶城並郡志風俗地濕墊卑褊唐詩紀事元稹受通之初有習通之熟者曰云云人士稀少邑無吏市無貨百姓茹草木刺史以下計粒而食大有虎豹蛇虺之患小有蟆蚋浮塵蜘蛛之類皆能鑽囓肌膚使人瘡痏夏多陰霪秋為痢瘧元微之集通之地叢穢卑褊蒸瘴陰鬱土地肥美地理志云云有江水沃野山林蔬食果實之饒任俠尚氣通川志山高水深民俗秀野云云有楚公黃歇之風質朴無文隋志云云不甚趍利俗不耕桑九域志男女不耕桑貨賣用雜物以代錢地無醫藥圖經夏秋多瘴白居易詩人稀地僻醫巫少夏旱秋霖瘴瘧多又酬元刺史詩來時子細説通州州在山根峽岸頭四靣千重雲火合中心一道瘴江流又云匼匝巔山萬仭餘人間恰似甑中居元稹酬樂天詩君避海鯨驚浪裏我隨巴蟒瘴煙中一樹梅花數升酒醉尋江岸笑春風又云三冬有電連春雨九月無霜盡火雲併與巴南終嵗熱四時誰道各平分茅舍竹籬元稹酬樂天詩茅苫屋舍竹籬州虎怕偏蹄蛇兩頭暗蠱有時迷酒影浮塵終日似波流沙含水弩多傷骨田仰畬刀少用牛知得共君相見否近來魂夢轉悠悠白居易詩蛇蟲白日攔官道蚊蟆黃昏撲郡樓父罷母㜷楊晨云齊人呼母為㜷今巴俗亦然呼父為罷山中人亦呼為罷故詩云結網㜷教女採舟罷詬男形勝東瀉巴水陳升翠玉軒序通川之境云云西峙鐵嶺南對戞雲北望鳯山郡居四達見沿革其州枕江寰宇記山水之國曹溈雙清閣記蓋四萬室元稹告三陽神文通川為郡云云寰宇記土居十萬戶水居三千戶為四川咽喉宣撫司謝升上言明通東鄉兩縣云云土産魚鹽絲枲朱肱記通川在諸郡為最優茶鹽魚米漢中有不如者常氏馬鳴山記水航與蜀陸段於雍持金易絲枲者不絶于道假氏蜀記産鹽漆之利山川竹山在通川縣東南十餘里鐵山馬璘有詩鳯凰山在通川縣西五里金華山去通川縣四十里與石城山相接楊晨詩吾州金華峙霄漢上有兜率香飄帷石城山四面懸絶眺公遡有詩八疊山張之才有詩七盤山在永睦縣東北三十里北巖巖壁聳然下有平池春時遊人甚盛垂虹巖在太原市之西有水自巖巔流下春夏甚壯若垂虹焉巴嶺在故宣漢縣東十里赤溪在巴渠縣東五里黑潭在安居鎮潭上有穹巖枵然其下平廣巖東偏有溪水自上流下作水簾狀丙穴在明通縣井峽中其穴凡十其中皆産嘉魚春夏之前魚即出穴秋社即歸其出也止於巴渠龍脊灘首有黑點謂照映星象相感而生長身細鱗肉白如玉其味自鹹蓋食鹽泉也樓亭六相樓李僑自宰相劉晏自京兆尹皆貶為刺史元稹自拾遺貶為司馬與前刺史李適之後皆登相位熙寧中張天覺為通川主簿兼令後亦為相建炎丁未余應求記後以韓滉為州長史共為丨丨丨又有韋昭範貶通州昭宗時為平章事戞雲亭在南山元稹為司馬時立下瞰江流周覽城邑勝江亭在州西三里郡守王蕃因讀江州司馬白居易寄通州司馬元稹詩有通州猶似丨丨州之句因以名丨名宦李適之遷通州刺史李嶠武后時出為福州刺史改通州韓滉休之子為通州郡長史代宗時調發糧帛當時賴之元稹字微之自御史左遷司馬權知州事微之到通州日授館未安塵壁間有數行字乃是僕十五年前初及第時贈長安妓阿軟絶句緬思往事杳若夢中懷舊感今因酬長句呈白居易詩云十五年前似夢遊曽將詩句結風流昔教紅袖佳人唱今遣青衫司馬愁劉晏自京兆尹出為通州刺史皇朝韓廣叔赴通川日黃太史以言贈之曰惟勤能辦公家惟清能律貪吏嚴而信則吏不病民簡而敏則民多在野張商英公初調通川簿渝州蠻反詔夔漕張詵討之惟王衮未降詵檄公往王袞見而下拜蠻遂平陳并以上書斥蔡京之黨謫監達州茶場後亦與黨籍余應求欽宗擢為御史以論事謫監達州茶場人物羅戩通川人以剛直聞于鄉里為武學諭上幸學百官先集蔡京於坐談兵戬昻視屋角不聽觸怒奪官謝升資州人父立為達州推官同家焉以上書救鄒浩斥為邪等題詠芒屩泅牛婦元稹酬樂天百詠云云丫頭蕩槳夫酢醅荷裏賣醨酒水淋沽江郭船添店元稹詩夷音啼似笑蠻語謎相呼云云山城木竪郛楚風輕似蜀巴地濕如吳天與通州繞郡山元稹詩愛山欲得山中住云云睡到日西無一事月儲三萬買教間别君緣是在通州元稹别李十一詩京城每與間人别猶自傷心欲白頭今日别君心更苦云云江館無人虎印泥元稹見樂天詩通州到日日平西云云忽向破簷殘漏處見君詩在柱中題偏梁閣道上通州白居易雨夜憶元九詩一種雨中君最苦云云閣欄都大似巢居元稹酬樂天詩平地才應一頃餘云云四六巫峽奧區通川名郡地居四達山列千峯據四川之通道總六邑之提封火雲電雨奈天氣之多炎茅舍竹籬亦土風之甚陋絲枲魚鹽備載通川之記蟲蛇蚊蟆乃表長慶之詩乃眷通川之太守地望雖輕曽逢長慶之詩人州符特重萬州南浦武寧建置沿革秦地鶉首之分野春秋及戰國並屬巴國又為楚之西鄙秦屬巴郡今州即漢巴部朐䏰縣之地東漢末劉璋以朐䏰屬巴東郡蜀後主立南浦郡屬巴東此南浦郡之所自始也後周分朐䏰縣置安鄉郡又改萬川郡又兼置南州於此隋廢郡及萬州改萬川縣為南浦縣唐初創信州之南浦縣置南浦州復立浦州太宗改為萬州皇朝平蜀割梁山縣置梁山軍又升萬州今領縣二治南浦事要郡名萬川南浦風俗風俗朴野圖經尚鬼信巫同上云云乃巴蜀之舊民賴魚罟寰宇記土地多泉云云立魚泉縣形勝北環梁山張白雲濟川亭記北接夔門南浦記云云前控歸峽略有楚風南帶長川同上岷江流于前西池記萬川枕都櫪山足云云苧溪出其右處岷嶓之下唐假文昌岑公洞記云云據三峽之上扼束巴楚濟川亭記云云有舟車之會萬川八景郡守趙公有詩曰岑公洞曰西山曰秋屏曰魯池曰江會泉曰天生橋曰峨眉磧曰古練石山川西山距州治二里初泉荒草蕪郡守馬元頴魯有開元翰修丨丨池亭種運栽荔支雜果凡三百本白雲張俞作詩於至和間云池光復涵徹萬象皆鏡入蜀公范鎮作詩於熙寧云丨丨瞰大江迤邐龍鱗濕郡守王綯記曰丨丨之勝聞天下蓋以張范二詩重故亭以詩名王侶岑公洞記丨丨如一帶翠屏下浸湖面南浦令史元頴云萬州丨丨為峽上絶勝黃魯直留題丨丨勤封院云西渡大壑稍陟半山竹柏薈翳水泉瀦為大湖亭榭環之僧舍樓觀重復出沒煙霏之間光影在水景物清絶為夔路第一南山下瞰大江水落石出曰娥眉磧即州之對山也都歷山在郡北一峯突出衆山之上峛崺為平阜氣象融結蓋郡之主山高梁山在州北四十里江源記云山尾東跨江西首劒閣東西數千里望之若長雲垂天俯視衆山泯若平原劒閣銘所謂巖巖梁山積石峩峩者是也下巖黃魯直云萬州之丨丨唐末有劉道者聞道於雲居膺禪師為開巖第一祖法號道微自鑿石龕曰死便藏龕中不用日時門人奉其命二百年來遊者題詩不可勝讀莫能與之開巖者故豫作詩表見之云空巖靜發鐘磬響古木倒挂藤蘿昏莫道蒼崖鎖靈骨時應持鉢到諸村岑公巖在大江之南廣六十餘丈深四十餘丈石巖盤結若華蓋左右方池有泉湧出巖簷遇盛夏注水如簾松篁藤蘿蓊蔚蔥翠真神仙窟唐刺史馬冉詩南溪有仙洞咫尺非人間泠泠松風下日暮空蒼山范蜀公詩洞壑獨嵌空壁溜珠玉濺黃太史詩肩輿欲到岑公洞正怯衝泥傍險行應是岑公閟清境春光一夜雨連明古練巖在州西一里有寺絶塵龕在西山石壁間幽人勝士之所遊覽有唐人題記大江即岷江也在州東其左有二石穴名天倉地倉地倉滿則豐天倉滿則歉南溪在州南苧溪在州西魯池在西山即太守魯有開所鑿廣百畝植以紅蓮井泉包泉在西山或謂與惠泉相上下樓堂江會樓在州治桂華樓在州宅太守侯賔以郡士二人同年登科故名四望樓白居易寄題楊萬州丨丨丨詩江上新樓名四望東西南北水茫茫無由得與君擕手同憑闌干一望鄉七賢堂太守魯有開白雲張俞蜀公范鎮老泉蘇洵東坡蘇軾潁濵蘇轍山谷黃庭堅先後經行取其詩翰刻置堂上仍繪七賢像橋梁天生橋在苧溪乃一巨石自然成橋其長與溪等而平濶如履平地溪流出其下寺觀白鶴寺在武寧縣三蘇皆有題詠白鶴觀在武寧縣許旌陽舊宅名宦皇朝嚴挺之為萬州司戶魯有開宗道乃其從父皇祐間為守西山池亭自公發之馮時行紹興間為守號縉雲先生人物甘寧臨江人即今武寧縣地佐吳為折衝將軍輕財敬士名賢苗拯柳文先友記云上黨人有學術峭直以諫議大夫漏省中語貶萬州題詠青山繞萬州鄭谷寄南浦謫官詩白首為遷客云云醉歌梅障曉歌壓竹枝秋我懷巴東守白居易初到忠州登東樓寄萬州楊八使君前見忠州云云本是關西賢平生已不淺流落重相憐水梗漂萬里籠禽囚五年新恩同雨露逺近鄰山川書信雖往復封疆徒接連其如美人面欲見杳無緣廽頭望南浦白居易寄楊萬州詩云云南浦淒淒别白居易南浦詩云云西風嫋嫋秋南州煙水北州雲白居易答楊使君登樓見憶詩忠萬樓中南北望云云兩州何事偏相憶各自籠禽作使君東都緑李萬州栽白居易和楊萬州嘉慶李詩云云君子封題我手開把得欲嘗先悵望與渠同别故鄉來峽中天下最窮處陸務觀憶萬州短歌云云萬州蕭條誰肯顧南浦尋梅雪滿舟西山載酒雲生屨四六出綍西垣分符南浦雖峽中之窮處乃天下之名區據三峽之上遊有諸賢之遺迹南浦尋梅頗動雪舟之興西山載酒尚為蠟屐之遊五馬雙旌暫向名邦而出守萬川八景不妨小隊之行春方輿勝覽卷五十九
