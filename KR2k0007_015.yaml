body:
  text: 方輿勝覽卷十五宋祝穆撰太平州當塗繁昌蕪湖建置㳂革禹貢揚州之域吳地斗分野春秋屬吳後屬越又屬楚秦屬鄣郡漢武改鄣郡曰丹陽郡晉平吳分丹陽置于湖縣成帝時以江北之當塗縣流人過江在于湖者僑立為塗縣屬淮南郡宋以來或治姑孰或徙于湖隋徙當塗於姑孰𨽻蔣州唐屬宣州五代立新和州又為雄遠軍皇朝改平南軍太平興國二年與興國軍並建分紀年以名之今領縣三治當塗事要郡名于湖當塗姑孰並㳂革注風俗民安俗阜郡國志其丨丨其丨丨田利倍他壤曽子固靜應山修造記云丨丨之入丨於丨丨魚蝦竹葦柿栗之貨既足以自資而其江山之勝又天下之竒處也形勝鐵甕直其東洪景巖記姑孰在大江之南左天門右牛渚云云石頭枕其北襟帶秦淮自孫吳迄于陳常為巨屏牛渚北臨陳宣帝詔龍山南指云云江津之要丹陽記斯為上游金陵記姑孰之南淮曲之陽置南豫州六代英雄迭居於此云云廣屯兵甲建築墻壘至隋平陳改南豫州為宣州徙當塗於姑孰山川青山在當塗縣東南三十里有寰宇記齊宣城大守謝眺築室於山南址猶存絶頂謝公池唐天寶年改為謝公山眺詩云還望丨丨郭山下有青草市一名謝家市如郭功父懷丨丨草堂詩三峯連延一峯尊龍山白紵兒孫重岡復嶺控官道北望金陵真國門石崩廢井謝公宅龜仆斷碣長庾墳斯人白骨已化土英氣往往成煙雲龍山在當塗縣南十里舊經載孟嘉落帽事按丨丨當在江陵而元和志及寰宇皆云此山采石山在當塗北三十里山下有江源記人於此取石因名上有蛾眉亭下有廣濟寺中元水府廟及承天觀采李白懇求還山帝賜金放還白嘗乘月與崔宗之自石至金陵著宫錦袍坐舟中旁若無人郭功父采石渡頭風浪惡九道驚湍注山腳金牛出沒人不知翠壁㠝岏嶮如削上有藤蘿羃霧張羽蓋下有洞窟崩澌震天樂水神開府志嵗年犀燭朱衣馬爭躍皇朝受禪掃寰區夜半虹橋自天落萬羣羆虎下金陵巨斧連營剖城郭霸主張纓來就俘摧殘頭角龍變魚羅綺半隨灰燼滅珠樓玉殿成荒墟衣冠文物歸中國誰道長江限南北日輪赫午閶闔開煙波自與蘆花白我來覽古憑陽春高吟未遇謝將軍騎鯨捉月去不返空餘緑草翰林墳風期亢爽非今古冥漢神交兩相許倒提金斗傾濁醪滴瀝招魂寂無語斜陽衡山暝潮退兩兩漁舟迷向背我欲因之垂釣竿六鰲一擲天門外興曹彬大敗江南軍二萬衆於采石磯中興小歷紹三十一年金亮入冦欲由采石渡江時詔王權至行在以李顯忠代之命中書舍人虞允文趣顯忠交軍時防江諸軍未有統屬允文自建康至固督統制官時俊盛新等以海鰍船逆擊之皆死鬬敵舟沉溺者以萬數其回北岸者金主皆殺之遂不能濟允文具以捷聞牛渚山在當塗縣北三十里山下有磯古津渡也與和州橫江陵相對隋師伐陳賀若弼從此北渡六朝以來為屯戍之地輿地志丨丨丨昔有人潛行云此處與洞庭旁逹無底見金牛狀異乃見怪而出可溫嶠平蘇峻亂進録尚書事還至牛渚磯水深不測或云下多怪物嶠遂燃犀照之須㬰水族覆火竒形異狀或乘車馬或赤衣衣幘其夜夢人謂曰與君幽明道别何意相照嶠至鎮未旬而卒在謝尚鎮牛渚嘗秋夜乘月與左右微服㲹江㑹袁宏舫中諷詠聲既清暢詞又藻拔遂迎升舟與之談論宏自此名譽日茂改劉禹錫泊牛渚詩蘆葦晚風起秋江鱗甲生殘霞忽色逺鴈有餘聲戍鼓音響絶漁家燈火明無人能詠史獨自月中行李白詩牛渚西江夜青天無片雲登山望秋月空憶謝將軍余亦能髙詠斯人不可聞明朝挂帆席楓葉落紛紛又詩絶壁臨巨川連峯勢相向亂石流洑澗回波自成浪但驚羣木秀莫測精靈狀更聽猿夜啼憂心醉江上介甫詩歷陽之南有牛渚一風微起萬舟阻華戎蠻蜀交百川合為大江神所纒山盤水怒不得泄到此乃有無窮源朱衣乘波作官府操制生殺元非權隂靈袐怪不欲露檓犀得怪却偶然天門山在當塗西南三十里又名蛾眉山夾大江東曰博望西曰梁山丨李白詩丨丨中斷楚冮開碧水垂流至此回兩岸青相對出孤帆一片日邉來李白銘有曰梁山博望關扄楚濵夾據洪流實為吳津兩坐錯落如鯨張鱗惟海有石惟川有神牛渚怪物日圍車輪光射島嶼氣凌星辰卷砂揚濤溺馬殺人國泰呈瑞時訛返珍開則九江納錫閉則五嶽飛塵天險之地無德匪親褐山在當塗西南楊行密攻趙鍠戰於此白紵山在當塗東五里按寰宇志名楚山恆溫領妓遊山奏樂好為白紵歌因名可王介甫詩云丨丨衆丨頂江湖所縈帶浮雲卷晴明見九州外肩輿上寒空置酒故人㑹巒峯張錦繡草木吹竽籟登臨信地險俯仰知天大留歡薄日晚起視飛鳥背殘年苦局束往事嗟摧壞歌舞不可求柏公井空在慈姥山山在當塗縣之西北四十五里按地志山上出竹堪為簫管採李白曰丨丨丨竹作簫笛有妙聲府丹陽記自伶倫竹嶰谷後見此竒故歷代常給樂又呼為鼓吹山條王褒洞簫賦原夫簫幹之所生兮于冮南之丘墟洞暢而罕節兮標敷紛以扶疏李白詩野竹攢石生含煙映江島翠色落波深虛聲帶寒早龍吟曽未聽鳳笛吹應好不學蒲柳凋貞心常自保望夫山在當塗縣正對和州郡樓昔人往楚纍嵗不還其妻登此山化為石李白詩寫望臨碧空怨情感離别江草不知愁巖花但爭發雲山萬重隔音信千里絶春去秋復來相思幾時歇劉禹錫詩終日望夫夫不歸化為孤不苦相思望來已是幾千載只似當初初望時叔後山詩話望夫石在處有之古今人詩共用一律黃達魯直之弟也以顧况為第一云山頭日日風和雨行人歸來石應語橫望山在當塗東北六十里漢晉以來陶氏諸墓域環繞山麓靈墟山在當塗南十里郡志丁令威遼東人學道登仙於丨丨丨後化鶴歸遼集華表柱歌云有鳥有鳥丁令威去家千年今始歸城郭如故人民非何不學仙冢纍纍李白詩丁令辭人世拂衣向仙路伏鍊丸丹成方隨五雲去松蘿蔽幽洞桃杏隱深處不知曾化鶴遼海歸幾度二梁山楊廷秀題東西丨丨丨詩二梁雙黛㸃東西牛渚看來活底眉阿敞畫時微失乎一眉高著一眉低獨𫝊道臨春惜麗華不從陳帝入隋家將六國千年恨留下雙顰寄岸花三山磯在繁昌東北四十里風郡志陳希元泊舟丨丨丨有老叟曰來日午時有大舟行必覆冝避之來口午黑雲起大風暴至怒濤若山行舟皆溺公驚歎又見前叟曰某江之遊奕將也以公他日當位宰相故相告蟂磯在蕪湖西南十里蟂毛蛟也黃魯直書丨丨云蟂似蛇四足能隱伏賈生所謂偭蟂獺以隱處者也姑孰溪在縣南二里西入大江待李白詩愛此溪水間乘流興無極漾楫怕鷗驚垂竿魚食波翻曉霞影岸疉春山色何處浣紗人紅顔未相識丹陽湖在當塗縣東南七十里止李白詩湖與元氣連風波浩難天外賈客歸雲間片帆起龜遊蓮葉上鳥宿蘆花果少女棹輕舟歌聲逐流水慈湖在當塗北六十五里郡志晉陶侃與蘇峻戰于丨丨花蘇子瞻丨丨阻風詩稗索桅竿立嘯空篙師酣寢浪中故應管蒯知心腹弱能爭萬里風蕪湖在當塗西南八十里源出丹陽湖寰宇記以其地卑蓄水非深而生蕪藻故名繁昌浦劉孝綽詩夕逗丨丨丨暮煙生逺渚歸馬赴前洲隔山聞戊鼓堂亭江東道院在設㕔西北楊灝詩道院由來不浪傳兩衙封印日蕭然絶無爭俗煩刑禁嬴得功夫弄簡編姑孰臺在清和門外千郭功父詩誰謂江南地褊小丨丨之丨天下臺少丹湖里浸城東蒲葦藏烟春渺渺牛渚對峙凌歊長江倒挂天門開有時浪止皓月滿琉璃宇宙無纎埃帆檣隱隱飛鳥沒漁歌細下天邉來蛾眉亭在采石山上望見天門山嶄郭功父詩前登千丈峯萬里瞰瀰漫丨丨聳雙碧嶄天塹斷披榛結危亭突兀出天半丈壁間有詩曰中分黛色三千不著人間一㸃愁四望亭在當塗縣東十詠亭在城東蓋姑孰溪丹陽湖謝公宅凌歊臺桓公井慈姥山望夫石牛渚磯靈墟山天門山十詠也蘇子瞻有云余嘗舟次姑孰堂下讀姑孰丨丨怪其語淺近不類李白王平甫云此李赤詩也赤見柳子厚集自比李白故名赤其後為厠鬼所惑以死今觀其詩止此而以李白自此則其人心疾久矣非厠鬼之罪也夢日亭在蕪湖北二十里乃晉王敦鎮姑孰明帝時敦將舉兵內向帝密知之乘巴滇駿馬微行至湖隂察敦營壘敦正晝寢丨丨環其城驚起曰此必黃鬚鮮卑奴來也乃使五騎追帝帝亦馳去見逆旅賣食嫗以七寶鞭與之曰後有騎來可以此示之俄而追者至因以鞭示之五騎傳玩稽留帝僅獲免由是樂府有湖隂曲亭名以北吳波亭張安國書取溫庭筠曲丨丨不動楚山碧之句玩鞭亭楊廷秀老賊平欺晉鼎輕一輪五色夢中驚寶鞭脫急非無䇿何似休將日繞營問著無聲是阿兄坐看家賊只吞聲戮尸大放經綸手長柄判將鍚茂𢎞但韓無咎詩黃鬚鮮卑勇無䇿自騎駿馬來窺賊賊奴怪日繞營起看飛塵已無迹寶鞭不惜棄道傍坐令老嫗知興亡百年社稷有天意姦鋒逆熖徒鴟張孤城遺跡森在目平湖無復春草緑却對青山憶謝公父老猶嫌人姓木邉兵已重朝士輕中原有路何由行柙中虎兕不可制江左夷吾浪得名則張文潛云須逰蕪湖問父老湖隂所在皆莫知之然帝至于湖當為斷句乃作干湖曲以志之武昌雲旗蔽天赤夜作于湖洗鋒鏑巴滇緑駿風作蹄去如滅沒來不嘶日圍萬里纒孤壁虜氣如霜已潛釋蛇矛賤士識天顔玉帳髯奴落妖魄君不見銅駝陌上塵沙起胡騎春來飲瀍水浮江天馬是龍兒蹙踏揚州開帝里王氣高懸五百秋弄兵老濞空白頭石頭戰骨卧秋草更欲君王分上流古跡凌歊臺在城北黃山上宋武帝南逰嘗登此臺具建離宫焉間李白詩曠望登古臺臺髙極人目疉嶂列遠空雜花平陸閒雲入窗牖野翠生松竹欲覽碑上文苔侵豈堪讀桓公井在白紵山廢李白詩丨丨名已沒丨曾未竭石甃冷蒼苔寒泉映孤月秋來桐漸落春至桃還發路遠人罕窺誰能見清徹謝公宅在城東青山李白詩青山日將暝寂寞丨丨丨竹裏無人聲池中虛月色荒庭衰草遍廢井蒼苔積惟有清風閒時時起泉石祠墓李白墓郡志李白初葬采石後遷青山去舊墳六里按李陽氷草堂集序唐書及墓碣皆謂李白以疾終小說多載太白過采石酒狂捉月恐好事者為之而梅聖俞詩云采石月下逢謫仙夜被錦袍坐釣船醉中愛月江底眠手弄日月身翻然不應暴落飢蛟涎便當騎鯨上青天據小說而為之說也新唐書云李陽氷為當塗令白依之是時當塗未為州𨽻宣城而陽氷序謂白疾亟枕上授簡俾為集序無捉月之說豈古不弔溺古史氏為白諱耶抑小說多妄而詩老好竒姑以發新意耶蘇子瞻丹元子所示孛大白真二首云天人幾何同一漚謫仙非謫乃真游麾斥八極溢九州化為兩鳥鳴相酬一鳴一止三千秋開元有道得少留縻之不可矧肯求君西望太極橫峨岷眼髙四海空無人大兒汾陽郭令小兒天台坐忘真平生不識髙將軍手汚吾足乃敢嗔作詩一笑君應聞名宦周瑜孫䇿時為新穀令即姑孰也陸遜嘗出鎮姑孰謝尚以衛威將軍鎮牛渚李陽氷客游燕趙間為當塗令高才尚氣自言其書後千年有人吾不知之後千年無人將盡於斯矣皇朝蔡確為繁昌宰宋敏求為守或送詩浪蕩春流水蕪湖候吏迎旌旟曉日麗鉦鼓野風清暫起紅塵逺休嗟素髮生專城方四十自古以為榮曽鞏司户召為編修黃庭堅為守吕希哲為守李之儀為編修徽廟時范純仁口占遺表有惟宣仁之誣謗未明致保佑之憂勤不顯皆權臣務快於私忿非泰陵實謂之當然命李之儀次第之小人附㑹以為儀之撰謫知太平州人物謝朓宋人居青山文章清麗為齊隨王子隆鎮西功曹長史王秀之以朓年少相動欲以啓聞朓知之因事求還道中為詩寄西府曰常恐鷹隼擊時菊委嚴霜寄言罹羅者寥廓已髙翔皇朝郭祥正當塗人其母夢李大白而生自號謝公山人梅聖俞一見呼為謫仙仕至殿中丞所居有醉吟菴東坡過而題詩名賢石待問蜀人以諫營昭應官坐謫滁州又卜居蕪湖縣卒因葬焉黃魯直書其墓曰有宋賢良方正九謫不悔自下劘上眉山石公之墓題詠平原周遠近謝眺積水照頽霞髙臺望歸翼云云連汀見紆直故壘猶連謝尚城潘逍遙遊當塗詩扁舟不復見袁宏云云山連吳楚周遭起揚皓詩云云水合湖湘洶湧來暮潮聲帶九江來李冲元詩晴嶂勢吞三楚盡云云說著蕪城是勝遊郭功父蕪湖詩有云詩中長愛杜池州云云外邑人事旋生當路縣杜甫鶴贈秋浦張明府詩君為秋浦三年宰萬慮關心兩鬢知云云吏才難展用兵時農夫背上題軍號賈客船頭插戰旗他日親知問官況但教吟取杜家詩四六疏綍鰲扉分符牛渚眷惟州治實控江津江為天險地控風寒乃脊鈐韜實稱道院矧當塗之樂土實江左之雄藩惟當塗之巨鎮恃采石之驚濤龍山方賴於論思牛渚乃資於鎮撫擇地屯兵自晉已為重鎮沿江設險至今尤號要衝中興擊賊曾欣采石之捷聞今日防江尤覺當塗之地重運際升平固可稱於道院舊時多事詎敢怠於兵防上車强顔又作甘泉之仙令開緘見面重逢采石之謫仙豈但詩人能發山川之秀正須郡將益圖藩翰之功山標白苧肩輿追荆國之遊湖泛丹陽倚櫂和謫仙之句載酒龍山尋孟嘉之風味泛舟牛渚賦太白之詩篇青山故宅永懷羅罻之莫施采石扁舟尚想錦袍之同泛寧國府宣城寧國南陵旌德涇縣太平建置㳂革禹貢揚州之域吳地斗分野春秋時屬吳後屬越戰國屬楚秦置鄣郡漢改為丹陽郡治宛陵即今治也東漢立宣城郡宋齊因之梁置南豫州隋改為宣州唐昭宗時號寧國軍皇朝為宣州仍為寧國軍節度繼以孝宗潛藩升寧國府今領縣六治宣城事要郡名宛城宣城陵陽宛陵風俗民安俗阜唐盧肇新興寺碑其土樂其丨丨其丨丨清涼髙爽韓愈與崔羣書宣州雖稱云云然皆大江之南風土不並以止惟宣州為多賢韓愈送楊儀之序舟車繁㑹之鄉唐尉遲樞新安院記陵陽古稱名郡今日為最雄乃丨丨丨丨丨丨風俗和柔之境土廣人庶白居易制陵陽奧壤云云形勝據吳上游陳勢大寧塔記惟宛陵郡作藩南夏丨丨丨丨地産氣序之平夷江漢岡巒之襟帶阻山帶江唐陳簡甫良吏記宣州秦故郊之地云云銅陵鐵冶繁阜其中水石幽竒王元之送姚著作序云云土産紫毫白居易詩起居郎侍御史爾知紫毫不易致每嵗宣城進筆時紫毫之價如金貴謹勿空將彈失儀謹勿空將録制詞紅線毯白居易丨丨丨詩美人踏上歌舞來羅襪繡鞋隨步沒太原毯澀毳縷硬蜀都褥薄錦花冷不如此毯溫且柔年年十月來宣州大守加樣織自謂為臣能竭力百夫同擔進宫中線厚絲多捲不得宣城太守知不知一千毯千雨絲地不知寒人要暖少奪人衣作地衣木瓜宣州人種丨丨始成顆則鏃紙花以貼其上夜露日曝而變紅花紋如生可愛山川陵陽山在宣城一峯為疉嶂樓一峯為譙樓一峯為景德寺敬亭山在宣城北已謝靈運丨丨丨詩兹山亘百里合沓與雲齊隱淪既託靈異居然棲上干蔽白日下屬帶回溪交藤荒且蔓樛枝聳復低獨鶴方朝淚飢此夜啼泄雲已漫漫多雨亦凄凄我行雖結組兼得尋幽蹊緣源殊木極歸路窅如迷要欲追竒趣即此凌丹梯皇恩竟已矣兹理庶無睽李白詩敬亭一回首目盡天南端仙者五六人常聞此遊盤溪流琴髙水石聳麻姑壇白龍降陵陽黃鶴呼子安羽化騎日月雲行翼鴛鸞下視宇宙間四溟皆波瀾決絶目下事從之復何難百嵗落半途前期浩漫漫强食不成味清晨起長歎願隨子明去煉火燒金丹角劉禹錫詩丨丨之丨黃索漠元如斷岸無稜宣城謝守一首詩遂使聲明齊五嶽昭亭山在宛陵之北雙羊山在宣城南五里以山有雙羊石故名梅聖俞詩風雪丨丨路梅花丨下村響山在宣城縣南五里宛李白詩築土接丨丨俯臨水湄中山一名獨山有白兔出傳為筆精妙丨韓愈作毛頴傳惟君丨者能繼父業籍山在宛陵縣乃邑鎮山水西山在涇縣西五里林壑深邃事郡志唐宣宗詩長安若問江南說道風光在水西石壁山在旌德三十里峯巒對起清溪中流安定胡公有詩黃山在太平縣南三十里舊經黃帝棲真之地山當宣徽二州之境有三十二峯三十六源二十四溪八大巖丹李白送溫處士歸丨丨詩黃山四千仞三十二連峯崖夾石柱菡蓞金芙蓉仙人煉玉處羽化有遺蹤他日還相訪乘橋躡綵虹文脊山在寧國西三十里舊名曷山府治以為案有六洞梅聖俞有留題魁峯在涇縣南七十里諺云丨丨頂秀玉女峯髙入仕路者紫綬金章疉嶂在陵陽山之上陽坡杜子美詩丨丨好種瓜注云毛錫茶譜宣城有塢如山其東為朝日所燭號曰丨丨雙溪在城下二水合流那楊廷秀詩敬亭宛水故依然疉嶂丨丨在邉謝守不住梅花死倩誰海內掌風烟宛溪在宣城東百李白詩吾憐丨丨水尺照心明句溪在宣城東五里清溪李白詩丨丨清我心水色異諸水借我清安江見底何如此人行明鏡中鳥度屏風裏向晚猩猩啼空悲遠逰子涇溪李白别山僧涇川作云何處名僧到水西乘舟弄月宿丨丨澀灘李白下涇縣至丨丨詩澀灘鳴嘈嘈雨山足猿猱白波若捲雪側石不容舠漁人與舟人撑折萬丈篙六刺灘李白下陵陽溪三門丨丨丨詩三門橫峻灘六刺走波瀾石驚虎伏起水狀龍縈盤何慙七里灘使我欲垂灣堂亭宛陵堂在便㕔西丨吕居仁詩疉嶂樓前納涼處丨丨下探梅時景日堂在旌德簿㕔吕獻可嘗為此官曲肱亭黃魯直題宛陵張待制丨丨丨詩仲蔚蓬蒿宅吟哦詩句中展雞催不起擁被聽松風謝公亭在宣城縣北二里舊經云謝元暉送范雲零陵內史之地李白詩池花春映日窗竹夜鳴秋謝公離别處風景每生愁高齊在府治東謝元暉有詩樓閣疉嶂樓在府治唐刺史獨孤霖建而獨孤霖書云郡地四出皆即阜以垣故於樓為易賦名必著其當正據扉亦雄矑競侈由是繚步逾千萬目相瞪則壯邦麗廨之勳慊在第一繁絲機羅錯卉障錦春以融獨峯揉雲雙波屹風暑以澄曉黛嚬入夕蟾娟來秋以揚雲併半空氷偏一岸冬以明此概舉覼縷不盡也然而月話方狎獨醉始酣則防城健卒籌三而環警緒至越活筵走奏榻彚呼去族譟雖黃庭展和不能不慨而斁嚮之厯舉四美悉估而陪之不足贖矣余春至逮秋偶步他北得小亭之直上居然最勝因命植棟鬬梁出城屋之脊周方數間小亭如初而中與諸樓相差者自為一地其上則朗出髙際平與空等向所謂越譟者不復逰慮則其四美不俟說而聞不假到而見非聞非見其然也始聞始見其向之未必然也且聞且見而今之所以然也向既舉概今不可默夫北望條風清暑之流皆遍壇攸戡莫全厥美或能伸左臂或睇右目或獨全正面總而冇諸則我無讓斯又聞不見而以其然為然矣郡以溪山著名而溪小負則疉嶂之名為宜至於欄干踏道沙子門户等咸有曲百成於新致舉之則縷將煩於概故抑之而中地亦晦而不彰咸通十二年十二月辛亥宣州刺史某書北樓謝朓建雙李白詩江山如畫裏山曉望晴空雨水夾明鏡橋落彩虹人烟寒橘柚秋色老梧桐誰念丨丨上臨風懷謝公雙溪在府治取宛句雙流以名開元寺杜牧詩六朝文物草連空天淡雲橫今古同鳥去鳥來山色裡人歌人哭水聲中深秋簾幕千家雨落日樓臺一笛風惆悵無因見范蠡參差煙樹五湖東名官庾亮晉人為宣城內史范曄遷宣城大守不得志乃刪衆家後漢書為一家之作江淹為太守謝朓字元暉為太守羊元保宋文帝善棊與元保奕元保賭得宣城大守當日敇受人以為虛受顔彥卿為觀察使李翶盧坦刺宣城辟置幕下崔羣韓愈送楊儀之支使歸湖南序嘗聞當今藩翰之賔客惟宣州為多賢愈與之逰者有二人馬隴西李博清河丨丨羣與博之為人吾知之道不行於其主人與之處者非其類雖有享之以季氏之富不一日留也以羣博論之凡在宣州之幕下者雖不盡與之游皆可信而得其為人矣愈未嘗至宣州而樂頌其主人之賢者以其取人知之也沈傳師嘗為觀察使杜牧為判官杜荀鶴牧之子田頵守宣城延置幕下嘗賦詩云風暖鳥聲碎日髙花影重時稱佳句皇朝沈括謫知宣州張耒為大守晏殊殊為樞副坐以笏擊從者齒出知宣州余靖為司理後至尚書胡宿為通判孫覺太平令吕士龍知宣州好打官妓會杭州一妓至士龍喜之一日欲笞一妓妓曰不敢辭但杭妓不能安也士龍愍而釋之梅聖俞作莫打鴨詞云莫打鴨打鴨驚鴛鴦鴛鴦新向西池落不比孤洲老秃鶬人物蔣華宣城人李白集有詩哭之梅詢宣城人梅堯臣宣城人王晦叔見其文曰二百年無此作矣歐陽永叔論其詩曰世謂詩少達而多躬蓋詩非能窮人殆窮者而後工也名賢黃庭堅因承天院記使者觀望宰相趙挺之意以庭堅有幸災之言貶宣州題詠平楚正蒼然謝朓郡城登望詩借問下車日匪真望舒回寒城以一眺云云山積陵陽阻溪流春穀泉威䊸距遙甸巉巖帶遠天切切隂風暮桑柘起寒烟悵望心已極悄愧魂屢遷結髮倦為旅平生早事邉誰規鼎食盛寧要狐白鮮方棄汝南諾言稅遼東田髙閣常晝掩謝朓在郡卧病呈沈尚書云云荒階少諍詞珍簟清夏室輕扇動涼颸嘉魴聊可薦緑蟻方獨恃夏李沉朱實秋藕折輕絲良辰竟有許夙昔夢佳期坐嘯徒可積為邦嵗已朞絃歌終莫取撫几今日嗤窗中列遠岫謝元暉答吕法曹詩結構何迢遞曠望極髙深云云庭際俯喬林已有池上酌復此風中琴非君美無度孰為勞寸心惠而能好我問以遙乖音若遺金門步見就玉山岑遠近聞佳政張九齡寄裴宣州詩云故人宣城守亦作江南篇云云平生仰大賢如何分虎符相與問山川氷壺照清川李白贈宣城宇文大守詩君從九卿來水國有豐年魚鹽滿市井布帛如雲烟下馬不作威云云霜眉邑中叟皆美太守賢宗英佐雄郡李白贈從弟宣州長史淮南望江南千里對我行我行倦過之半洛青天外云云水陸相映帶長川豁中流千里㵼吳會君心亦如此包納無小大搖筆起風霜推誠結仁愛訟庭垂桃李賔館羅軒蓋何意蒼梧雲飄然息相㑹才將聖不偶命與時俱背獨立山海間空老聖明代知音不易得挂劔增感慨當結九萬期中途莫先退土控吳兼越杜牧云云州連歙與池山河地襟帶軍鎮國藩維晚樓明宛水黃魯直詩試說宣城郡停杯且細聽云云春騎簇昭亭䆉稏豐墟戶桁楊卧訟庭謝公歌舞處時對換鵝經宣城四面水茫茫王建詩云云􅒝蓋江城竹夾墻謝朓青山李白樓陸龜䝉詩陵陽佳地昔年遊云云碧落神仙擁使君晏同叔送凌侍郎詩江南藩郡古宣城云云江山謝守髙吟地風月朱公故里情虎丘換得敬亭山吳郡志載林希疉嶂樓有樓吳門朱伯原詩云云句水松陵數舍間天下難如兩州好君恩乞與一身閒宣州水西天下勝曾紆宣州水西詩杖藜出郭一水近石磴古路穿松筠萬仞絶壑倚天末八節驚州灘當寺門泉聲飛下錦繡谷殿影插入玻瓈盆云云州城南何足云四六疏綍宸庭建牙江國眷是冝城介于江國徽池鄰境庾謝舊邦惟宣置郡以江為城惟宛陵之名郡實帝子之潛藩惟地望之推髙因詩人而增重在三江二浙之閒占疉嶂雙溪之勝溪山行樂方乘擇勝之車老稚縱觀俄擁班春之斾澄江如練行將賡謝朓之詩疉嶂有樓抑且續獨孤之句地稱髙爽清涼韓文載紀民無嘆息愁恨漢治重逢誦明鏡彩虹之句昔已流傳作晚樓春騎之詩今尤繪畫一州六邑夙稱藩翰之雄疉嶂雙峯尢覺江山之勝謝宣城五字之詩古今絶唱黃山谷一篇之詠山水增光溪訟甚勝冝不廢於登臨獄自清政何妨於嘯詠不惟太守賦詩踰謝朓之才更想賔僚入幕盛崔羣之品方輿勝覽卷十五
