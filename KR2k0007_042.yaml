body:
  text: 方輿勝覧卷四十二宋祝穆撰髙州電白茂名信宜建置沿革古越地牽牛婺女之分野星紀之次秦属南海郡漢武帝平南越置合浦郡今州即漢合浦郡之髙凉縣地吴孫權立髙凉郡又立髙興郡梁討平俚洞置髙州隋為髙凉郡唐復置髙州移州治于舊州南三十里電白縣界置皇朝廢髙州入竇州尋復置髙州今領縣三治電白事要郡名髙凉投荒録土厚而山環繞髙而稍凉因以名焉舊經有云一日常具四時天氣至三伏間反無畏暑命名似不茍然郡境自有髙凉山昔人名郡或取諸此風俗民尚簡儉圗經云云易于取足祭鬼祈福元城先生曰此間飲食粗足絶無醫藥土人遇疾惟祭鬼以祈福多燠少寒圗經郡㨿叢山之中去海百里四時之候云云春冬遇雨差凍頃刻日出復如四五月號為瘴鄉同上五嶺之南云云諺曰髙竇雷化説着也怕椎髻跣足寰宇記云榖熟時里閈同取戌日為臘男女盛服椎髻跣足聚㑹作歌悉以髙欄為居號曰干䦨三日一市形勝依山為郡舊經郡不濵海云云去海百里同上土産樹石屏洪景嚴記云祁陽石藉人力磨治此即混然天成畧無斧鑿一跡山川寳山在州治之後去城二里創登髙亭于上為一郡登臨勝處髙凉山在郡西四十里羣山森然盛夏如秋因名銅魚山與郡治對頼仙翁風土歌一條丁水銅魚塞三十年来舊相識龍湫山在電白縣東二十里一泉出岩石之下四時常湧有坎甚深相傳有龍伏其間名曰龍湫井每遇嵗旱鄉民相率祭于井上因以竹木刺之則雷雨立至因以立廟以為祈禱之地大海在平定縣界東百里髙源水在信宜縣西北源出髙源嶺入茂名縣界名宦馮盎祖馮業燕人浮海奔宋居新㑹自業至孫融丗為羅州刺史融子寳為髙凉太守聘蠻酋洗氏之女為婦李遷仕反洗氏擊定之孫盎隋仁夀初為宋唐今潮成等五州獠叛詔盎擊平之後以地降髙祖授以髙州總管洗氏封譙國夫人又封靈順誠敬夫人有廟皇朝杜介之瓊州人為髙州司法李光有詩贈曰南極當老人及見九代孫君生古崖州氣質清且温今年八十二頗覺行步奔白髪映紅顔疑是羲皇人名賢劉安世號元城先生安置英州移髙凉題詠嶺外向潘州唐詩紀事李眀逺謫為潘州司馬潘州今属髙州詩云北鳥飛不到南人誰去逰天涯浮瘴水云云四六地髙而凉民朴而儉在天一涯去海百里雖居炎瘴之鄉乃是髙凉之境馮将軍之故封是為古郡劉元城之寓處宜有秀民考禹貢之分疆固非侯服稽唐詩之紀事是謂潘州容州普寧陸川北流建置沿革古越州其次星紀其星牽牛秦開五嶺置南海桂林象郡漢置合浦郡属交趾今州即合浦縣地宋立南流郡属越州隋為合浦永平二郡地唐于今州理北置銅州即合浦之北流縣永平之普寕縣也又改銅州為容州以州西帯銅山囙以為名改普寕郡置容州管内安撫使初唐嶺南舊五管廣桂邕容安南皆𨽻嶺南節度自蔡京制置嶺南始奏以廣州為東道邕州為西道又割容管藤嚴二州𨽻邕管又置寕逺軍于容州國朝因之初王拱辰請放唐制益以東路之潮西路之邕容各為總制與桂廣為五管不果行中興以来陞寕逺軍今領縣三治普寕縣事要郡名容管普寧風俗人性剛悍十道志云云重死輕生不習文學同上鼻飲跣行同上夷多夏少云云好吹葫蘆笙擊銅鼔習射弓弩無蚕桑績葛以為布呼市為虚同上云云五日一集地多瘴氣寰宇記云云春謂青草瘴秋謂黄茅瘴禮度同中州容管志云渡江以來北客避地留家者衆令衣冠丨丨並丨丨丨仕五管者多至卿相唐容管經畧刺史題名記宋璟李勉杜佑馬植盧鈞李渤王渤軰皆一時名臣由五管罷歸多至卿相形勝介桂廣間容管志容云云盖粤徼也由漢始登版籍普寕郡志序云五嶺以南禹貢職方所不載丨丨以来丨丨丨丨山川容山寰宇記在陸川縣其山迥濶故曰容山州以此得名勾漏山在普寕縣其岩穴多勾曲而穿漏故名平川中石峯千百皆矗立特起周廽三十里相傳葛仙嘗脩煉于此都嶠山寰宇記在普寕山上有八峯曰兠子馬鞍八疊雲盖香爐仙人中峯丹竈而八疊竒秀視諸峯最髙有南北兩洞俱有石室南洞寛坦中刻浮屠大象儀制甚古北洞差狭為星壇凡八二洞虚爽天造地設非他洞穴幽翳之比虞衡志云三洞天不下桂林白石山在陸川縣山色潔白四面懸絶上有飛泉瀑布下有勾芒木可為布普照岩吴元美記山如覆釡登岩却顧則黄坡翠與石峯相對歴歴落落尤可觀也獨秀岩吴元美記度普照岩而西平野中欝然孤峙者獨秀岩也洞門宏邃古木蕭森與韜眞抗衡室中可容數千人石乳掛壁上如彌陀大士像白沙洞吳元美記云秉燭從竇入俯偃扶伏凡經六七竇每過益寛而所見益竒行里餘乃至中洞千態萬状不可殚盡勾漏甲于天下而此洞為勾漏之次鬼門闗舊唐書云在北流縣之南有兩石相對俗號鬼門闗漢伏波将軍馬援討林邑蠻路由此立碑石龜尚在昔時趨交趾皆由此關其南尤多瘴癘去者罕得生還諺曰鬼門闗十人去九不還唐李德裕貶崖州經此賦詩云一去一萬里千知千不還崖州在何處生度丨丨丨容江在普寕縣郡國志即馬援所謂仰視飛鳶跕跕墮水中者是也繡江在普寕縣前石湖在陸川縣崑崙水在陸川縣水中有石似崑崙亭榭迎富亭與滄浪亭相對容俗以二月二日為迎富節因以丨丨名丨繡江亭在州西南子城外江流横陳都嵪諸峰一覧可盡道觀韜其觀出洞天門其東曰丨丨丨觀中碣偽漢時中官陳君所經始觀當勾漏之中旁隣玉虚面揖玉田東望寳圭西抵普照獨秀靈寳觀在州西勾漏山寳圭洞天江之千古之漏城也羣峯森羅在上而其道出間行者駭愕觀直當其門户觀後石峯㧞起千仭獨以一柱擎天名宦葛洪字稚川欲煉丹聞交趾出丹砂求為勾漏令曰非以為榮為有丹砂耳杜甫詩逺慚勾漏令不得問丹砂元結授容管經畧使身諭蠻豪綏定八州民樂其教至立石頌德韋丹丹為容州刺史始城容州周十二里韓文公銘其墓題詠直傍青天崖賈島送張校書季霞詩云容州幾千里云云泉歸滄海近栁宗元酬徐中丞普寕池舘詩日月落朱檻繁花照羽觴云云樹入楚山長燒香翠羽帳杜牧送容州中丞赴鎮詩交趾同星座龍泉佩斗文云云㸔舞欝金裙鷁首衝瀧浪犀渠拂嶺雲莫教銅柱北空說馬将軍浪經蛟浦闊歐公歸田録載僧惠崇送遷客詩云云山入鬼門尋盡洞中天陶弼詩云一年勾漏守云云郡有勾漏白石都嶠等山所謂三洞天也佛記盧藏用藏用太雲寺記石髙丈二尺仙壇葛稚川見勾漏山醒心西驛水韋丹建閣下有石泉並記燒眼碧池邉後唐李復作池木檝記曰北池植蓮数萬詩碑與酒泉我豈无新事云云並陶弼詩萬松亭下清風滿劉禹錫傷秦姝行池北含烟瑶草短云云北池與萬松皆容州之勝㮣有唐曾宿萬家兵陶弼詩云云節制東南十一城此若得人無盗賊昔之為守盡公卿四六出綍嚴宸分符容管介於桂廣雜以民夷元次山之故封葛稚川之仙境漢控百蠻闗實雄于林邑唐為五管鎮尤重于銅州勾漏名山夙號神仙之宅普寕置管實為卿相之階欽州安逺靈山建置沿革古越地非九州之域其次星紀其星牽牛秦為象郡地尉佗王越地亦属焉今州即合浦郡之合浦縣也在亷州界二漢吳晋並属合浦郡宋置宋夀郡𨽻交州後𨽻越州齊属交州梁武帝于今欽江縣南置安州隋改曰欽州取欽江以為名改欽州為寕越郡唐復為欽州又置玉州南亭州並𨽻欽州總管府改為寕越郡復為欽州國朝因之初治欽江後治靈山今領縣二治安逺事要郡名寕越風俗人戴白巾寰宇記今鄉村云云赤裩短褐同上又有獠子巢居海曲每嵗一移椎髻鑿齒云云食用手摶同上俚人不觧言語文肱椎髻云云水從鼻飲之用臘日為嵗同上又有一種夷人不種田入海捕魚為業婚嫁不避同姓云云逄掖之士盖鮮見南軒州學記形勝南轅窮途同上瀕海而郡同上土産欽鹽朝野雜記建炎十二年議者以欽州鹹土生發嵗産鹽三十餘萬斤商人不通請服官賣許之後又改為鈔法乾道四年罷鈔令漕司自認鈔錢嶺南極以為患淳熈初張欽夫為帥始與漕司詹體仁叶議立為定額定直且條上之邕州官賣鹽毎斤百錢二公既去漕趙公瀚增其六十欽州嵗賣鹽千斛公瀚亦増其五六年侍御史江漕以為言上出公瀚詔閩廣發賣塩自有舊額及定直自今毋得擅有増添山川三山在安南縣南五里桂山在安逺東二十里孔雀山在州西南五里三峯峙立仍多孔雀上有亭羅浮山在州西北六十里形似惠之羅浮三海岩在靈山縣西一曰錢岩一曰月岩一曰龜岩治平間陶弼訪得之詩云新邑西南古洞天我来方信海為田無名不入州圗載有路惟聞野老傳海嶺在安逺縣之北去海一十里峯子嶺在靈山即縣之主山五湖在城外江岸上有亭欽水自城外東南流入於海羅浮水在州南四十里入於海瀑布灣在那容村其瀑自石頂飛激下成深灣嵗旱則投石於灣以禱之雨立至學校州學張敬夫州學記云安陽岳侯霖為欽州之明年政通人和乃經理其州之學悉易故之庳陋廟堂齋廡次第一新伻来謁記久未暇也又眀年其學之教授周去非秩滿道桂復以侯意来請且曰欽之為邦僻在海隅地近鹽而俗上利逄掖之士盖鮮有焉惟侯不敢以其陋而鮮加忽也故新其學以勸之且求一言以示後庻或有起也某於是而歎曰是可書也已夫所謂建學者固欲其士之衆多也今夫通都大邑操觚習辭發䇿决科肩摩袂属必如是而後謂之多士乎哉殆未然也夫寡國鮮士亦何病十室之邑必有忠信之質者焉其成就與否則異乎學與不學而已學也者所以成才而善俗也今欽雖僻而陋也其士雖鮮也然其間亦豈無忠信之質者乎無以揭之曷其昭之無以導之曷其通之為之嚴學宫於此詳其啟廸以夫人倫之教聖賢之言行薰濡之以漸由耳目以入其心志其質之美者能不有所感發乎有所感發則将去利就義以求夫為學之方而又訓其子弟率其朋友則多士之風豈不庶幾矣異時人才成就風俗醇美其必由侯今日之舉有以發之請刻記于學亭軒天涯亭在東門北畔臨水嶺外代荅欽州有丨丨丨亷州有海角亭二郡並南轅窮途也欽逺於亷則天涯之亭甚于海角之可悲矣昔余㐮公守欽為直鈎軒於亭之東偏即江濵之三石命曰鈞石醉石卧石云直鈎軒在天涯亭之東余靖陶弼有詩古跡銅柱漢馬伏波平交趾五銅柱為極西界唐馬揔為安南都䕶夷獠為建二銅柱於伏波之處以明揔為伏波之嗣是銅柱在安南矣按欽境有古森洞與安南抵界有馬援銅柱有誓云銅柱折交人滅安南人每過其下人以一石培之遂成丘陵又見邕州名宦李邕元宗時自陳州刺史左遷欽州遵化尉皇朝余靖為守楊友紹興初太守丨丨以交趾責使争地界公植鐵槍于庭謂之曰若必要地界請鏖戰一場交使惕息而退今邦人誌之呼為楊鐵槍名賢張説説為鳳闕舎人辨張易之誣䧟魏元忠忤㫖流欽州皇朝吕祖泰上書辨趙于直之忠乞誅韓侂胄及蘇師旦周筠而罷逐陳自强之徒以周必大任其事遂謫欽州題詠客懼蠻螺作酒盃陶弼寄欽州洪遹侍御詩僧憐海石為棊子云云自笑平生喜韜畧此時何計上金臺民樂占城稲米豐陶弼三山亭詩商夸合浦珠胎賤云云火炬影沉江岸北潮聲流過郡城東紅螺紫蠏新鱸膾陶弼詩云云白藕黄柑晚荔支酒盡月斜潮半落山翁不省上舡時四六䟽渥宸庭分符欽管渺居廣右越在天涯眷惟嶺外之郡實接安南之境牢盆頗羨故多逐末之民縫掖者稀故罕業儒之士訪㐮公之釣磯惟知直道讀南軒之學記一洗陋風雷州海康徐聞遂溪建置沿革古越地牽牛婺女之分野秦属象郡漢平吕嘉置合浦郡統縣六其一為徐聞𨽻合浦郡梁分合浦郡立合州又改南合州隋為合州置海康縣属合浦郡隋置南合州改海康曰徐聞又改名曰雷州復置遂溪縣改海康縣復為雷州皇朝省徐聞遂溪入海康紹興間髙居弁知雷州莭制高容亷化四州軍馬今領縣三治海康事要郡名海康雷陽國史補雷州春夏多雷無日無之秋日則伏地中其狀如彘人取而食之投荒錄以其雷聲近在簷宇之上與他郡不同故名雷陽風俗風俗頗淳余安道學記海康郡瀕海之樂郊也地域雖逺云云聖訓涵濡人多嚮學實雜黎俗圗經本州云云故有官語客語黎語居民富實同上州多平田沃壌又有海道可通閩浙故云云市井居廬之盛甲於廣右夷多欄居寰宇記地濵炎海人惟夷獠多欄居以避時欝氣候倍熱圗經州居海上之極南云云所謂除夜納凉者容有之徐聞交易元和志漢置左右候官在徐聞縣南七里積貨物于此交易諺曰欲㧞貧詣徐聞以己酉為臘郡志或云路伏波之闢九郡也徐聞之人以冬己酉日遇害故州人以是日為臘而祭其先潁濵和陶弼詩曰人飲嘉平漿酒如江注云雷人以十月臘祭盖其年己酉在十月耳以鵲巢占颶風同上州人以鵲巢為占盖巢低則有颶風巢髙則無之呼遷客為相公折彦質記陳瑩中云嶺南人見逐客不問官之尊卑盡呼相公豈非相公爱遊此乎近日瑩中赴龍城士美相繼過桂又報伯紀来因念瑩中言發一笑云形勝三面並海圗經土産浮留藤左太冲蜀都賦云蒟醤流味于畨禺之鄉本章蒟醤注蔓生葉似王瓜而厚大實似桑椹皮黒肉白其苗為浮留藤合梹榔食之辛香又呼萎藤山川擎雷山在海康縣南八里昔被雷震而有水英髙山在海康西南百三十里兩峯聳峙有泉湧出徒㑹山在海康南百三十里西海中上有岩穴竒怪又有泉螺岡在海康北八十里大海在城外學校州學張敬夫記廬陵戴君為雷州之眀年以書抵栻曰雷之地窮服嶺而並南海士生其間不得與先生長者接于見聞為寡而其風聲氣習亦未有能遽變者某惟念所以善其俗宜莫先於學校願不鄙為記以詔之予嘗觀孟子論王政其于學曰謹庠序之教申之以孝弟之義而後知先生所以建庠序之意以教之孝弟為先戴君之所以教宜莫越于是矣樓館北樓舊名楚閣思亭希白先生為記蓬莱館在蓬莱坊英録山有亭榭十餘所祠廟雷公廟嶺表異録云雷州西南八里有雷公廟每嵗州人造雷鼔雷車置廟内有以魚彘肉同食者立有霆震人皆畏惮丁謂撰記曰舊記云州南七里有擎雷水今南渡是也始者里民陳氏家無子因射獵中獲一大卵圍及尺餘携歸家不知其何名忽一日霆霹而開遽生一子鞠育撫養遂成其家鄉俗異之曰雷種陳天建二年也今其廟曰震顕威武廟蘇子瞻廟記漢有兩伏波皆有功德于嶺南之民前伏波邳離路侯也後伏波新息馬侯也南越自三代不能有秦雖逺通置吏旋復為夷邳離始伐滅其國開九郡然至東漢一女子側貳反海南震動六十餘城時世祖初平天下民勞厭兵方閉玉関謝西域况南荒何足以辱王師非新息苦戰則九郡左袵至今矣由此論之兩伏波廟食于嶺南均也古今所傳莫能定于一自徐聞渡海適朱崖南望連山若有若無杳一髪耳艤舟将濟眩栗䘮魄海上有伏波祠元豐中詔封忠顯王凢濟海者必卜焉曰某日可濟乎必告而後敢濟使人信之如度量衡石必不吾欺者嗚呼非盛德其孰能如此自漢以来朱崖儋耳或置或否楊雄有言曰朱崖之棄捐之力也否則介鱗易我衣裳此言施于當時可也自漢末至五代中原避亂之人多家于此今衣冠禮樂盖班班然矣其可復言棄乎四州之人以徐聞為咽喉南北之濟者以伏波為指南事神其可不恭某以罪謫儋耳三年今乃獲還海北徃返皆順風無以荅神貺乃碑而銘之至險莫測海與風至幽不仁此魚龍至信可恃漢兩公寄命一葉萬仭中自此而南洗汝胷撫循民夷必清通自此而北端汝躬屈伸窮逹常正忠生為人英歿愈雄神雖無言我意同莱公廟在報㤙寺紹興年間勅賜廟額曰旌忠名賢李邕邕坐與張柬之善貶雷州皇朝冦凖字平仲相真宗天禧末為丁謂所誣再貶雷州司户及境吏以圖獻抵海岸凡十里公忧然悟曰少時有到海秪十里過山應萬重之句乃今日意爾人生得䘮豈偶然耶上庠錄公之貶雷州也丁晋公遣中使賫勅徃授之以錦嚢貯劍掲于馬前既至莱公方與郡官宴飲驛吏言状莱公遣郡官出逆之中使避不見入傳舎中不出問其所以来之故不答上下皆惶恐不知所為公神色自若使人謂之曰朝廷若賜凖死願見勅書中使不得已乃以勅授之莱公乃從録事参軍借緑衫着之短纔至膝拜受勅于庭升階復宴坐至暮而罷丁謂天聖元年為眞宗山陵使内侍雷允恭擅移域貶崖州司户後徙雷州公從者聞丁當来有欲謀不利于丁者公知之陳大席一廡間設戯具悉召坐且命之博奕因隐几觀焉聞行乃罷初謂之貶崖州也作陳情表假家書附商販行詳見崖州章子厚徽宗朝貶雷州司戸初蘓子由謫雷不許占官舍遂僦民屋子厚以為強奪民居下州追民䆒治以僦券甚眀乃已及子厚謫雷州亦問舍於民民曰前蘓公來為章㡬破我家今不可也人以為報蘓轍子由既謫雷州子瞻亦謫儋耳相遇於藤同至海康月餘郡人呉國鑑特築室以處焉其後黨錮浸宻屋亦漸廢靖康丙午海康令買而有之且開遺直軒繪二公像於中秦觀謫居有詩云白髪坐釣黨南遷瀕海州灌園以餬口身自雜蒼頭籬落秋暑中碧花蔓牽牛誰知把鋤人舊日東陵侯李綱留題云余謫萬安次雷陽邉海南黎㓂猖獗艱阻留寓天寕丈室累月聞官軍既破賊即日成行南渡次瓊管不三日祗奉徳音䝉恩聽還徃返纔十日復天寜舊管建炎己酉書又云故翰林蘓公謫儋耳既北歸作漢伏波廟記迨今踰三十年未克建立綱以罪謫居萬安遣子宗之攝祭黙禱於神異時倘得生還當信蘓公所作廟碑以荅神貺人物呉國鑑海康人為太廟齋郎紹聖中蘇子由貶雷州僦國鑑宅居為創一小閣元符初本聞路走馬承受段諷言其事詔提舉常平董必具實狀以必至雷置獄根治詔轍移循州知州張逄以下降罰有差國鑑編管題詠囬望古今州蘓子瞻寄子由詩云云屬此琉璃鍾離别何足道我生豈有終同落百蠻裏前人詩與子各行意云云猶在寰海中蘓子由詩我遷海康郡云云風露凄凉西館靜冦平仲海康西館有懐云云悄然懐舊一長歎海雲銷盡金波冷半夜無人獨凭欄聖恩尚許遥相望蘓子瞻寄子由詩莫嫌瓊雷隔雲海云云老去仍栖隔海村前人詩儋耳在海南故云兹逰竒絶冠平生蘓子瞻詩九死南荒吾不恨云云四六出綸天上作鎮雷陽今之海康夷言莫辨古者越地海氣常昏既有農田之沃亦居海道之衝東坡廟碑謂禮樂衣冠之地南軒學記皆仁義道徳之言馬路兩伏波苦戰澤在斯民冦丁二相國謫居論公後世方輿勝覧卷四十一
