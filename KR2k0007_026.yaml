body:
  text: 方輿勝覽卷二十六宋祝穆撰寳慶府邵陽新化建置沿革禹貢荆州之域於辰在巳楚之分野春秋戰國屬楚秦為長沙郡漢為昭陵縣屬長沙國東漢屬長沙零陵二郡漢又改昭陵縣為昭陽縣呉立邵陵郡屬荆州即今郡是也晋武改昭陽曰邵陽縣隋廢郡地屬潭州唐置南梁州改為邵州皇朝乾德間陞為中州以理宗潜藩陞寳慶府領縣二治卲陽事要郡名邵陽邵陵並見沿革澬川風俗其人尚氣而貴信邵陽郡志序曰云云喜直而惡欺節儉而不奢朴直而不恌其水宜稻吕稽中豐年堂記其陸饒黍稷麻麥同上記形勝東距洞庭郡志西連五嶺同上東南據衡山南接蒼梧云云據三湘上游僧希白開元寺塔記接九疑之形勢丨丨丨之丨丨土穰地靈實南楚之望也為湖嶺衝要侯延慶脩門記自熈寕中納梅山為省地通道置驛而郡云云控引溪蠻任質言脩城記云云盤錯𢾗百里介于長沙零陵之間郡志序云云有脣齒輔車之勢山川熊山昔黄帝登丨丨意其此也龍山介于二邑之間秀峯四出上有龍池泉梅山與中攔寺相連文仙山在新化西二十里晋亭平脩養之地上有三峯石壁峭絶半山之間有石室旁有龍池青山洞在新化北蒼石環起竒恠萬狀邵水去郡一里澬水在新化縣東流入益陽西湖上有渚亭井泉濓泉在通道坊以周茂叔得名亭臺光風霽月在郡治望仙亭在郡圃歐陽識詩云澬水西來兼邵水龍山横騖際梅山法華堂在東山絶頂下瞰長江實卲陽勝槩名宦周頥治平五年以永倅來攝郡遷家於郡東郡學有祠朱元晦記卲陽太守潘侯燾以書來曰郡學故有濓溪先生祠既有以故府張九成之學為出於先生也則亦祠以侑焉切惟先生之學實得孔孟不傳之緒以授二程先生而道以大明然自再傳之後則或僅得其髣髴或遂失其本真而不可以若是班矣乃更闢堂東一室特祀先生以致區區尊嚴道統之意且為之嘆曰先生之精立圖以示先生之藴因圖以發而其所謂無極而太極者又一圖之綱領所以明夫道之未始有物而實為萬物之根柢也夫豈以為太極之上復有所謂無極者哉近世讀者不足以識此而或妄議之既以為先生病史氏之傳先生者乃増其語曰自無極而為太極則又無所依据而重以病夫先生故嘗欲援故相蘇公請刋國史草頭木脚之比以正其失而恨其力有所不逮也張九成字子韶號無垢先生紹興十年守是邦人物胡曽居邵之永成鄉有詠史詩一百首名賢陳與義號簡齋建炎初避地邵陽周氏之家長於詩後為恭政題詠水邉花氣薫章服朱慶餘送邵州林使君詩軒車此去也逢時地屬湘南頗入詩一月計程那是逺中年出守未為遲云云嶺上嵐光濕畫旗想得化行風土變州人應為立生祠驛路筭程多是水姚少監送人赴邵州詩詔書飛下五雲間才子分符不等閑云云州圖管地少於山江頭斑竹應尋遍洞裏丹砂自採還清静化人人自理終朝無事更相闗俗朴應無争競人張籍送林邵詩有云詞客南行寵命新瀟湘郡入曲江津山幽自足探微處云云郭外相連排殿閣市中多半用金銀知君不作家私計遷日還同到日貧路在好山寜厭多章子厚過石槽鋪詩瘴癘潜銷瑞氣和梅峯千里潤煙蘿人逄雙堠雖云逺云云人家迤邐見板屋章子厚開梅山詩云云火耕磽确口名畬田長藤釣酒跪而飲何物爽鹽為先此地從來寒暑偏張迪詩云云扇紈不曽遭棄捐四六榮膺鳯綍出守龍藩旁連百粤近控羣蠻雖曰小邦有隆潜邸乃眷邵陽甲于楚地眷澬川之名邦據楚國之上游接九疑之勝境據三國之上流地攙楚尾之餘封壤接梅山之故境地少於山安得膏腴之可種道通於嶺當知寒暑之亦偏恵綏民俗載觀侯度之賢鎮撫峒蠻尤藉使君之重念濓溪遊宦之邦當明道統考朱子誨人之意則有記文粤從分虎昔特謂之偏州爰自潜龍今有隆於此地全州清湘灌陽建置沿革禹貢荆州之西境楚地翼軫之分野春秋戰國屬楚秦屬長沙郡漢屬長沙國洮陽縣屬焉即今湘源武帝分置零陵縣即今灌陽三國屬呉隋改零陵郡為永州五代晋髙祖時改永州之湘源縣為清湘縣置全州割永之清湘灌陽二縣𨽻焉皇朝因之今領縣二治清湘縣事要郡名清湘湘源風俗風俗儉陋郡志云云獄訟希簡民訟甚簡王元之云云兵賦甚鮮不漁則樵李之儀全州隱静堂記清湘間山深水闊可耕而廬者十無二三凡為生云云土地風氣雖與閩粤不同而生理則易形勝南扺桂嶺郡志序北為湘水栁開記云舟抵嶺下問其嶺之名即分水嶺分水即湘灕水也二水異流謂其東出海隅至此分南北而離也云云南為灕水漢洮陽之地寰宇記云云在湘江之西岸介西嶺之下王鞏休休亭記云云當湖南窮處清湘郡志鄙于蠻䝤陸濟撰郡守壁記郡云云而復當交廣之衝陸走山巖貢院記道衡嶽而南云云水浮浯瀬縈回曲折極於荆楚而得所謂湘源故名雲泉竹樹王元之送桞無礙倅湘源序江山猿鳥云云為天下甲山川湘山在郡治後黄華山在湘源縣即今之清湘礲巖在清湘北十五里虚明深窈有飛泉𢾗百丈縈如飛練羅水在清湘西百里北流入湘江灌水在灌陽南五十歩自靜江界來洮水在清湘北五十里出文山南流于湘江水北為陽故漢置縣以洮陽名龍川水在灌陽縣之西北學校清湘書院魏華父記吾友林岊守全得桞侯仲塗讀書遺址築室館士今守趙必原増而大之樓閣楚南偉觀在子城西湘春樓在郡治西捲煙閣桞開有詩皆山閣楊廷秀記衡湘以僻左自逺於中州而亦以山水重天下名宦桞開知全州有西溪洞粟氏常抄掠開選牙吏勇辯者三軰使諭之粟氏懼率其首俱來作時鑑一篇刻石戒之遣其首入朝李亨伯為守年六十四即掛冠詳見漳州人物蔣舉居母䘮結茅墳側芝生於石紹興間旌表門閭題詠瀟水連湘水唐戴叔倫詩云云千波萬浪中知君未得去慙愧石尤風郡城如在畫圖中陶弼詩南北東西幾萬峯云云煙郭遥聞向晚雞杜牧晚次湘源縣云云水平舟靜浪聲齊髙秋帶雨楊梅熟曲岸籠雲謝豹啼四六塗芝丹禁分竹清湘地居荆楚水合瀟湘夷獠雜居邉圉所繫封圻雖狹民物實繁惟湘源之古郡實南楚之上游眷彼湘源之逺實惟嶺管之衝郡境雖連於南粤土風猶接於中州天開洞府疑仙聖之去來壌接炎荒尚蠻猺之錯雜泝湘江之窮處乃建偏州當嶺嶠之要衝有同逺俗山深水闊地固少於可耕俗陋訟稀郡亦稱於無事雖考序文有竹石雲泉之勝然觀壁記亦山巖水瀬之多桂陽軍平陽藍山臨武建置沿革禹貢荆州之域於辰在巳楚之分野春秋戰國屬楚秦屬長沙郡漢髙帝分長沙為桂陽郡臨武分桂陽南平興郡後郴縣衡州隋屬焉東漢因之呉置始屬東改東衡州為郴州又改桂陽郡唐置郴州憲宗時即平陽縣置桂陽監以其地在桂洞之南故曰桂陽皇朝陞桂陽軍今領縣三治平陽事要郡名桂陽見沿革注風俗淳朴近古桂陽志云云畏法少訟侏􅍣其言同上志峒徭斑斕其衣云云稱盤王子孫或遣子入學減嵗貢銀長編開寳二年上覽桂陽監嵗入白金𢾗謂宰相曰山澤之利雖多頗聞採納不易詔减三分之一户只貢銀類要云云無夏秋稅形勝襟帶江湘陳亨甫五雲觀記云云控引交廣外撫五峒紹興二十二年乞陞改軍額奏狀云内轄三縣云云土産白金郡志産丨丨丹砂水銀錫碧之寳長柟文梓霞桑美箭之材山川藍山在平陽縣壇山在平陽唐髙祖詔南方有山巍險中有聖人足跡大凑山在城西舊經云出銀鑛當其盛時爐煙蓊然上接雲漢烹丁紛錯商旅輻輳因名鹿頭山在東門山有石如鹿龍渡山在軍南三十里有神甚靈陳傳良為文記之芙蓉山在城西諸峯特出下有泉曰蒙泉巋水在藍山縣又名舜水與舂陵水合流湟水漢武帝使路博德將兵出桂陽下丨丨以代南越藍湖在軍治左豐湖水源出寳積寺前流入子城堂亭湖南道院在郡治甘露堂在郡治元豐甘露䧏石林亭去城二里有石刻空職方郎中黄照鄰父子讀書於此名宦衛颯為桂陽太守鑿山通道列亭置驛皇朝李綱以常博知監人物黄照鄰見石林亭注題詠奏最謁承明楊持寄朗陵兄詩刺舉官猶屈風謡政已成行㸔換龜組云云桂水横煙不可渉李白送族弟歸桂陽詩秦雲連山海相接云云嶺開越嶠通交趾潘正夫桂陽詩云云路轉荆門入九嶷地連五嶺雜蠻風石景立游鹿山詩峰對九疑聞鶴唳云云不征榖粟只征銀章侁詩官中逐月催租稅云云四六出綍楓宸建牙桂水昔惟一監今號十同惟桂陽之為郡極湘水之盡頭嶺外名邦湖南道院竊稽漢史之封不但衛颯之政茨充之代此郡俗始農桑許荆之繼是邦民知教化盤孫鴂舌之與居土風雜習蠻壌犬牙之相入冦穴在旁育蚕植柘將課效於前修飛鳯塗芝即召環於前列武岡軍武岡新寕綏寕建置沿革禹貢荆州之域楚地翼軫之分野春秋戰國為楚地秦屬長沙郡自漢武分長沙為零陵郡而都梁夫夷二縣皆屬焉呉分零陵北部為邵陵郡晋分都梁立武岡縣隋置武攸縣唐復為武岡皇朝崇寕陞為武岡軍以制溪洞今領縣三治武岡事要郡名都梁今武岡山東五十里有漢都梁故城風俗風俗儉陋都梁志云云獄訟亦簡市井稠宻崇寕勅牒云疆境闊户口繁云云商旅徃還形勝當湖南僻處都梁志楚際南壌置軍勅牒云云元冥所不統黔山之㠝桞宗元武岡銘控制溪峒唐開元間勅牒云云彈壓諸蠻紹興用文臣軍志云自置軍後守臣用武自紹興十六年守臣始用文臣山川雲山在武岡縣此山為一郡勝處又有月華山杏花塢投龍洞猿藤水道者岩侯公洞第六十九福地也李思聰詩杏花塢接投龍洞瀑濺蒼崖鶴骨寒武岡山去軍城五里舊經東漢代五溪蠻保此崗故曰武岡左右岡對峙相去可二里桞宗元銘并序云元和七年四月黔巫東鄙蠻獠雜擾盗㺯庫兵賊脅守帥南鈎䍧牱外誘西原置魁立伍殺牲盟誓洞窟林麓嘯呼成羣皇帝下銅獸符發庸蜀荆漢南越東甌之師四面討問畏罪慿阻逃不即誅時惟潭部戎帥御史中丞桞公綽練立將校提卒五百屯于武岡不震不驚如山如林告天子威命明白信順亂人大恐視公之師如百萬視公之令如風雷怨號呻吟喜有攸訴投刃頓伏願完父子卒為忠信奉職輸賦進比華人無敢不龔母弟生壻繼來于潭咸致大庭皇帝休嘉式新厥命兇渠同惡革面向化如醉之醒如狂之寕公為藥石俾復其性詔書顯異進臨江漢益兵三倍為時碩臣殿于大邦文儒申申有此武功於是夷人始服聞公之去相與髙蹈涕呼若寒去裘昔公不夸首級為己能力專務教誨俾邦斯平我老洎㓜由公之仁小不為虺蜮大不為鯨鯢恩重事特不邇而逺莫可追已願歸武岡首以慰我思以昭我類以示我子孫彌億萬年俾我奉國如令之誠鄰之我懷如公之勤其辭曰黔山之㠝巫水之磻魚駭而離獸犯而殘户恐谷竄披攘仍亂王師來誅期死以緩公明不疑公信不欺援師定命俾邦克正皇仁天施我反其性我塗四闔公示之門我愚抵死公示之恩既骨而完既亡而存奉公之訓貽我子孫我始蝥賊由公而仁我始冦讎由公而親山畋澤輸賦于都陶穴刊木室我姻族烹牲是祀公受介福揲蓍以占公宜百福皇懋公功保于大邦逺哉去我誰嗣其良有穴之丹有犀之顛匪曰余固公不可賂視鄰之德常遵公則勉余之世永謹邦制南夷作詩刻示來裔金城山在武岡縣界是石真人所治之處第六十八福地也李思聰詩杏花洞天路﨑嶇曽見千年石斛奴寳坊山去軍城五里有法相寺又有巖洞八所紫陽山有千尋石室即周諌議讀書處前瞰溪陳簡齋所謂雷霆鬼神之所為非人力所就者是也都梁水源出都梁縣西南百里與邵水合紫苑洲洲上産此藥亭榭湖光亭在郡城漁父亭即屈原見漁父處清凉境界在郡志雲山不夜在郡治七十二峯閣在郡治名宦王導以討華軼功封武岡侯陶侃按陶侃補武岡令與太守吕岱有嫌遂棄官歸為郡小中正桞公綽見前武岡注人物鄧處訥五代時為邵州刺史㑹節度使閔育為周岳所殺處訥興兵問罪積八年攻岳斬之其子孫鄧遇為駕部郎中元恭為殿中丞延繼為大理皇朝周儀登雍熈科子湛登天禧第少讀書山中後為諌議稱嘉祐名臣題詠前江後嶺通雲氣陳去非詩云云萬壑千巖送雨聲松花照夏山無暑陳去非詩南澗題詩風滿面東橋行樂露沾衣云云桂樹留人吾豈歸山中城裏總非家陳去非詩風送孤蓬不可遮云云四六都梁樂土嵗租仰於永邵巫水舊藩峒窟接於辰沅盖一嵗止萬石之租而四郊無百金之子崇寕㧞縣而陞軍甫百餘嵗此地之峻嶺崇岡羣賢罕至嘉定揠僉而置倅亦三十年同坐之清風明月半刺平分民徭雜處窘於獷性之難調控八百團之溪洞黙寓恩威營戍猥多困於鄰饟之莫繼瞻二千衆之戎兵尤難供億鄰餉不繼則費用不容無節弊穴素多則渗漏烏得弗稽茶陵軍茶陵建置沿革自漢以前沿革與衡州同西屬長沙國武帝時封長沙定王子新為茶陵侯漢為長沙縣界莾改曰聲鄉齊屬湘東郡隋屬湘潭唐立南雲州仍立茶陵縣武帝因故縣復置南茶陵縣即今理也中興以來湖南路安撫提刑奏陞軍額知縣曰茶陵軍使兼知茶陵縣事仍𨽻衡州今領縣一治茶陵事要郡名雲陽風俗頗有蠻風圖經云云尚勇好鬬民貧山居見下注形勝古茶王城郡志茶陵者陵谷名也今攸縣東北四十里有茶陵故城是漢所理俗名茶王城山川茶山在軍城之東彌勒山在茶陵縣東五十里髙一千二十丈大悲山在軍東十里雲陽山在茶陵縣丹臺録黄初平自號赤松子治于南嶽之陽即此地有松髙百丈茶水源在縣西百二十里出景陽山北流至隴下十餘里合白鹿泉桃源溪出雲陽五洞溪至此溪二百里合雲陽水至縣五十里合茶水靈巖泉在縣東二十里名宦邱旭字孟陽宣城人南唐狀元及第自江寕尉調邑簿吕聖功判銓曰吾以為古人今乃見之薦試學士院不中乆之為茶陵縣秩滿致仕見江南野史皇朝彭友方熈寕王茶陵簿民貧而山居輸潭州造船木以折嵗租江行千餘里其費𢾗倍民益困友方白䕶漕朱初平請均出木即縣造舟公私兩便人物唐譚子茶陵雲陽人失其名以文章隱居山谷元次山居九疑扁舟徃從之遊有送譚山人歸雲陽序題詠闕四六寵膺恩綍榮擢專城名雖邑寄權實州符自軍號之更新加使名而増重名雖小邑有疊組以兼榮體若大邦可片辭而專决撫摩蠻俗痾癢不異於邑民節制兵權號令實均於郡將俗多私販毎嘯聚於羣兇事可便宜庶肅清於千里方輿勝覽卷二十六
