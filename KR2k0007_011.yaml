body:
  text: 方輿勝覽卷十一宋祝穆撰建寧府建安崇安甌寧政和嘉禾松溪浦城建置沿革禹貢掦州之域星紀須女之分古閩越地秦屬閩中郡漢立無諧為閩越王王閩中故地武帝立為冶縣屬會稽郡後漢改為東侯官其後分冶地為會稽東南二郡都尉東曰臨海南曰建安是也吳孫休分南部為建安郡隋廢為縣屬泉州煬帝立建安郡隋末改為泉州唐改建安郡後為建州唐末為閩王所有改鎮安軍又改鎮武軍南唐改永安軍又改忠義軍國朝初𨽻江南又𨽻兩浙南路尋以𨽻福建路又升為建寧軍孝宗潛邸升建寧府領縣七冶建安歐寧兩縣福建轉運提舉置司事要郡名建安韓無咎丨丨縣題記自秦收閩粵漢始縣閩丨丨中分東侯官益置丨丨縣蓋用漢年也富沙古有丨丨驛城北有大洑洲意者以此得名歟東甌郡國志建安縣有古丨丨城漢吳王世子劉駒發兵圍丨丨即此也風俗尚侈而好浮郡志處市井者云云田里者勤身而樂業尚業而喜節同上云云易鬬而輕生君子勇於為善小人敢於為惡其民之秀者狎於文韓無咎記賦其厲氣者亦悍以徑韓無咎記云云佩刀挾矢開起而為鬬暴不則匿役避賦持短長以競其私民猱黠而易隨盛均論建州之民云云家有詩書韓無咎記云云户藏法律三歲貢籍甲東南道義之鄉郡志自朱元晦倡道東南彬彬然云云山多田少郡志云云溪峻水湍力耕崔嵬朱行中詩云水無涓滴不為用山到崔嵬猶力耕形勝當閩之上遊韓無咎記東閩劇地權載之送建州趙使君序是邦為云云故相安平穆公常理焉襟山束水盛均送建安郡守序閩嶠一臂西指則建安在焉其郡云云東接括蒼建安志云云北距上饒西南抵延平同上南北帶溪碧水丹山楊大年談苑吾鄉山水竒秀梁江淹為浦城令以為云云珍木靈草平生所愛不覺行路之逺溪行石中韓無咎記土産書籍行四方富沙崇化兩坊産書號為圖書之府朱元晦嘉禾縣學藏書記云建陽版本丨丨丨丨丨者無逺不至而學于縣之學者乃以無書可讀為恨今知縣事姚某始鬻書于市上自六經下及訓傳史記子集凡若干卷以充入之又云嗚呼讀聖賢之言而不通于心不有于身猶不免為書肆況其所讀又非聖賢之書哉以此道人乃欲望其教化行而習俗美豈不難哉貢龍鳯等茶北苑焙在城東二十五里鳯凰山南唐保大間命建州製的乳茶號曰京鋌臘茶之貢自此始遂罷陽羡茶貢郡志其品大概有四曰銙曰截曰鋌而最粗為末國朝太平興國二年始置龍焙造龍鳯茶咸平丁晉公為本路漕監造御茶進龍鳯團慶厯間蔡公端明為漕始改造小龍團仁廟尤所珍惜是後最精者曰龍團勝雪外有密雲龍一品號為竒絶方靈芽初折之時常先民焙十餘日異時進發飛騎疾馳不出中春頭綱已至京師韓無咎記云其地不富于田物産瘠甚而荈利通天下每歲方春摘山之夫十倍耕者黃魯直謝送壑源揀芽詩矞雲從龍小蒼璧元豐至今人未識壑源色貢第二春緗奩碾香供玉食眷思殿東金井欄甘露薦碗天開顔橋山事嚴庀百局補衮諸公省中宿中人傳賜夜未央雨露恩光照宫燭右丞似是李元禮好事風流有涇渭肯憐天祿校書郎親收家庭遣分似春風飽識天官羊不慣腐儒湯餅腸搜攪十年燈火讀令我胸中書傳香已戒應門老馬走客來問字莫載酒王介甫送元厚之詩新茗齋中試一旗茶芽謂之一槍一旗韓無咎次韻沈清臣遊龍焙詩武夷山人厭塵埃金鞭白馬飛崔嵬丹砂已就不可識尚有瑤草分靈栽千花翦巧綴密露秀色不待春風催東溪路入三千里山如舞鳯連翩來䅮旗未動供採掇疊鼓夜作空山雷蒼虬繞圭龍護璧面為鐵石心瓊瑰烹煎鬬水出好事珠瓔玉字相榮回巳嗟雙井甘退步況復日注真難儕我來竊食端為此把玩一日三徘徊手㪺清泉吊陸子底用濁酒供歡咍頭風快愈春睡散老眼尚為羣書開知君此遊故不惡坐有纎纎時奉杯兔毫盞出甌寧之水吉黃魯直詩曰建安瓷碗鷓鴣班又君謨茶録建安所造黑盞紋如兔毫然毫色異者土人謂之毫變盞其價甚高且艱得之紅緑錦出嘉禾有濁錦橋又號嘉禾為小西川紙被出松溪縣陸務觀謝朱待制丨丨之況二首紙被圍身度雪天白于狐腋暖于錦放翁用處君知否不是蒲團夜坐禪又詩云木枕藤床席見經卧看飛雪入窗櫺布衾丨丨元相似只欠高人為作銘山川雞籠山城東北五里又有馬鞍山在城東北三里皆以形得名二山連屬乃府治之主山也鐵獅頂在城南三里即府治對山也山之巔有菴有鐵鑄文殊獅子像先是隂陽家謂府治來山若猛虎出林溪西諸山若對羊然欲其不為傷也乃於對山置鐵獅以鎮之宣和間移置開元寺未幾葉范二寇繼作且有虎波河之異紹興間守劉子翼復還故處或云恐鐵獅下視城中仍于府治之廳事及建安堂柱下埋小獅二十四以明子母相應之義紫芝峯在鐵獅之左王審知據閩日其山産丨丨雲際山在鐵獅之右有陸羽泉疑後人託為此名楊大年詩陸羽不到此標名慕昔賢黃華山在東北二里寰宇記元嘉初太守華瑾之徙郡治于此山之西南建炎初韓世忠討范汝為屯兵其上白鶴山在郡城東二里東晉時望氣者言此山有異氣命工鑿之已而有白鶴雙翔其上因名今立嶽祠于山之麓有靈泉有病者飲之輒愈鳯凰山在城東北二十五里蘇子瞻鳯咮石硯銘序云北苑龍焙山如翔鳯下飲之狀當其殊有石熙寧中大原王頤取以為硯余名之鳯咮然其産不富或以黯黮灘石為之狀酷類而多拒墨云壑源山在鳯凰山之南北山之茶為外焙冠梨山在郡城十五里梅山在城南三里方輿記梅福嘗煉丹于此有升仙壇響山在城南三里其山空洞行人相語則響答菴山在嘉禾縣東南十五里舊志後唐時有處士姓石名湖結菴此山因名今有廟神像乃石所刻成雲谷朱元晦記云在嘉禾西北七十里蘆山之巔處地最高而羣峯上蟠中阜內寬外密自為一區雖當晴晝白雲坌入則咫尺不可辨倐忽變化則又莫知其所如往乾道庚寅豫始得之因作草堂間榜曰晦菴又云昔有王君子思者棄官棲遁學練形辟穀之法數年而去今東尞即其居之遺址也然地高氣寒又多烈風飛雲所霑器用衣巾皆濕如沐非志完神旺氣勝而骨強者不敢久居其四面而登皆緣崖璧援蘿葛﨑嶇數里非雅意林泉不憚勞苦者則亦不能至也百丈山在崇安朱文公記其上皆蒼藤古木雖盛夏停午無暑氣東南望見瀑布自前巖穴瀵湧而出投空下數十尺其沫乃如散珠噴霧日光燭之璀璨奪目不可正觀龜山在嘉禾有萬夀院陳軒讀書于此及第後重遊詩云寒樹似添新喜色野猿猶聽舊吟聲硯山在嘉禾縣東北三十五里山之西有石如巨硯相傳華子期師甪里先生于此夢筆山在蒲城縣西五里其下有江淹祠遊果山在遷陽鎮之南乃周朴真人修煉之所武夷山在建安南三十里山多獼猴按神仙傳第十六升真元化洞天昔有神仙降此山曰豫為武夷君統録地仙受館于此由是得名武夷志云周回百二十里凡峯巒岩石三十有六此外以名著者復不下十餘所古紀云昔有神降于山自稱武夷君後人因名曰武夷又云混沌初開有神星曰聖姥母子二人來居此山秦時號為聖姥衆仙立為皇太姥聖母又天台山玄虛老君華真仙師遣第七子屬仁乘雲駕鶴遊歷此山銓敘地仙今稱控鶴仙人是也又云昔有張湛孫綽趙元竒彭令昭劉景顧思逺白石先生馬鳴生并胡氏李氏二魚氏三姓女子四人凡十二人同詣此山求道偕謁魏王值魏王祭仙祈雨湛等獻詩仙人甚喜乃遣何鳯兒往天台山取仙籍回歸探視具載魏王子騫與張湛一行先于上筵飲酒過度觸犯黃元真人謫居此山八百年後方得換骨歸天時仙人既見此籍各有姓名因語魏王等至八百年後可所取黃心木為函於小藏岩中沖化迄今存焉朱元晦武夷圖序云武夷君之名著自漢世祀以乾魚不知果何神也今崇安有山名武夷相傳即神所宅峯巒巖壑秀拔竒偉清溪九曲流出其間兩崖絶壁人迹所不能到處往往有枯查插石罅間以度舟船棺柩之屬柩中遺骸外列陶器尚皆未壤頗疑前世道阻未通川壅未決時夷俗所居而漢祀者即其君長蓋以避世之士生為衆所臣服而傳以為仙也今山之羣峯最高且正尢以大王為號半頂有小丘焉豈即君之居耶然舊記相傳詭妄不足考信故有版圖迫迮漶漫亦辨識今沖佑羽人高君文舉始復更定此本于是鄉偕隱顯之間為能有以盡發其祕且屬隱屏精舍仁智堂主為之題其首以袪舊傳之惑云趙閲道遊山詩武夷之山千萬峯一溪詰曲流其中尋真結勝舟楫過登舟仰視竒靈蹤白鶴不翥寫峭壁雕虎一嘯來清風遺棺蛻骨遺化外絶壑駕船神鬼功寒巖鼎灶失雞犬密搖松檜盤蛇龍行行自喜亡塵容觀身頓覺辟樊龍當年今日是高會左仙右仙之曲紅紫皇歸去曾孫散不見漫亭橋跨虹余亦捫心有素藴待逃韁鎖追鴻濛可得洪崖浮邱輩揖袂拍肩吾適從建守陳覺民武夷詩升真洞口接天門靈草丹桃日日春聽説列仙來瑞世三朝德業在斯民蓋章聖出自武夷事見楊大年家集神考哲宗朝武夷真君應世故此有三朝德業之句事見氏族編楊大年詩靈嶽標真牒孤峯入紫氛藤蘿暗仙穴猿鳥駭人羣白道千年在懸流萬壑分漢壇秋蘚駁曽祀武夷君朱元晦詩秋聲入庭户殘暑不敢驕起趂汗漫期兩袂天風飄眷焉此家山名號列九霄相與一來集曠然心朗寥棲息共雲屋追尋喚漁舠一水屢縈回千峯鬱岧嶤蒼然大隱屏林端聳孤標下有雲一壑仙人久相招授我黃素書贈我英瓊瑤茅茨幾時見自此遺紛囂方伯謨過武夷作丹崖石氣凝高秋碧溪上引天河流金堂石室不可到玉棺莓苔生古愁仙人昔乘紫雲去白馬搖鞭在何處茫茫塵世那得知幔亭空記當年事君不見茂林松竹已蕭疏乾魚猶祭同亭祠車錢山古記云聖姥嘗鞭牛以車載錢于此因名幔亭峯一名鐵佛嶂古記云秦始皇二年八月十五日武夷君致酒殽會鄉人于丨丨丨上初召男女二千餘人如期而往乃見山徑平坦虹梁架空體輕心喜不覺其倦至山頂有縵亭綵屋玲瓏映隱前後左右可數百間就幔亭北壁中間設一寶床謂之太姥玉皇座北壁西厦設一寶床謂之太姥魏真人座北壁東厦設一寶床謂之武夷君座悉施紅雲裀紫霞褥初鄉人至幔亭外聞擊鼓聲少頃空中有呼鄉人為曾孫男由東序女由西序進既而聞讀讃者云汝汝曽孫可拜又聞讚者云命鼓師張安陵打引引鼓趙元竒拍副鼓劉小禽坎鈴鼓曽少重擺鼗鼓喬智滿振嘈鼓高子春持短鼓管師鮑公希吹橫笛板師何鳯兒拊節板于是東幄奏賓雲左仙之曲次命弦師董嬌娘彈坎篌謝英妃撫長琴吕荷香戛圓鼓琵琶管師黃次姑噪悲栗簞篥秀淡鳴洞簫朱小娥運居巢笙金師羅妙容揮䤶銚銅鈸于是西幄奏賓雲右仙之曲行酒進食百味珍竒皆非世俗之所有乃令歌師彭令昭唱人間可哀曲詞曰天上人間兮合會疏稀日落西山兮夕鳥歸飛百年一餉兮志與願違天宫咫尺兮恨不相隨歌罷彩雲四合環珮人馬之音亘空而至俄而聞讃者云曽孫可再拜而别乃下山則風雨暴至回顧山頂無復一物但蔥翠峭拔如初耳鄉人感幸因相與立祠其山號同亭云天柱峯一名大王峯在武夷山東南隅石壁上有室曰升真洞洞中有神仙蛻骨莫計其數室前有黃心木棧又有四木船兩兩相覆亦盛仙骸半枕室棧不墜不壞峯南一隅稜層三出可編梯級而上近峯之頂有天鑑池絶頂有投龍洞洞門小而且直下縋緶百二十丈乃可至水每朝家遣使投金龍玉簡之屬悉詣之峯上有嘉竹仙柏仙橘仙李仙荔枝之類蕭子開建安記巖石悉紅紫二色其石間有木碓礱簸籮箸什物昔魏王子鶱于此得道有張湛等十二人偕謁魏王會天旱魏王置酒脯祭仙祈雨時控鶴仙人乘紫雲跨白馬從空而下大霈雨澤湛等獻詩云武夷山上武夷君白馬垂鞭入紫雲空裏只聞三奠酒龍潭波上雨氛氛玉女峯辛幼安詩丨丨丨前一棹歌煙鬟霧髻動情波遊人去後後楓林夜月滿空山可奈何鶴巖在溪北峭壁化仙鶴仙學堂巖在溪南半岩有石室其間几按具在蓋仙家翰墨之館仙掌巖掌面三處石紋紅潤如掌有瀑流界于仙掌學堂二山直下三尺仙機巖在武夷溪北水際巖上有石室石機杼猶存石堂院巖在溪北岩石環列景物俱勝先是我朝天聖十年四月一日子夜大風雷雨院東白面岩開剝巨石一片飛下覆壓院宇五十餘間翼旦鄉鄰視之已為深沼矣小藏巖在溪南下際無底之淵上亘斗絶之壁中間數室皆插版木望之如棧室中有器圓者如斛方者如笥又有如盤如杵之狀者古記云昔有仙雞棲鳴其間故又名仙雞岩鼓樓巖在武夷溪北岩間有樓其下四楹有路可以攀援而上舊記云是仙家鼓樓旁有鼎灶換骨巖在幔亭峯北中岩一室平廣可六七丈室前路斷數尺不可度舊有黃心木一根為橋不知年代而堅固不壞故世人得以造其間室內有仙脫九函又有四柱樓一所如世俗庋閣其上置脫函函中仙脫皆質小而色紅相傳方外之士得道尸解者悉于此岩換骨不獨武夷一洞天而已虎嘯巖昔嘗有虎嘯于此金雞巖在崇安縣北十五里岩有瀑布下有龍井深不可測舊記云或見二金雞翔集其上故名升真洞在大王石東隅石壁之上谽谺一室徑數丈而深倍之中冇雷文瓷􅣙五盛仙脫其一置石窖中不可出窖口狹而束故也餘􅣙列布窖外洞室之前悉以黃心木縱橫為棧若可通神仙往來者洞室之上又有一穴橫插雙木為橋修踰三丈橋之西壁近在十數步之內别開一罅方廣丈餘中有香爐藥瓶之屬可望而不可親也洞室之下直裂一隙具旁鼎爐存焉相傳仙人煉丹之所毛竹洞在西溪上流去武夷山百餘里遍生毛竹每節出一幹其巨細與根等李義山詩只得流霞泛一杯空中簫鼓當時回武夷洞裏生毛竹老盡曽孫更不來風洞在九曲之上其中謂之一線天玉清洞在郡之水西天慶觀側深潭中蕭子開建安志云昔漁人入潭中見石室金字題額曰玉清之洞有一青衣童子出曰此司命真君之府也三娘石亦名玉女峯並肩而立紅膩玉色古記云秦時三少女遊其上兜擔石一名賭婦岩古記云昔有娶婦者與仙人賭而隨其去遺下兜擔化而為石三姑石在換骨岩北三十步三石連屬紅白鮮膩舊記云秦時冇三女遊此石因名絪縩石石紋縷絡如卷縩之狀城高石山形高峙長亘五十餘丈儼若城壁大隱屏在武夷山朱元晦詩上有蒼石屏百仭聳雄觀蔪岩露垠堮突兀倚霄漢公自注云此峯夷上鋭下拔地峭立如方屋帽遂築武夷精舍于此九曲溪在武夷山西南隅發源于毛竹洞灣環九曲貫于羣岫洪邁赴建安守泛舟遊九曲詩武夷之山如畫圖中有玉洞藏仙都一溪穿空舞澎湃九曲度盡方盤紆細看直疑路中斷已轉始覺川平鋪諸峯削成鳥亦怖危磴豈復人能踰機岩學館第傳授鼓樓石床知有無坐令丹梯化一鶴又喚立笋成三姑遊人來觀但借問道士指説猶驚呼神君曽孫在何許想見幔亭空藥爐千崖萬壑心賞倦正喜松風清坐隅歸舟瞥然箭脫手醉目眩我雙明珠李左史詩溪流玉雪三三曲山鎖煙霞六六峯朱元晦棹歌武夷山上有仙靈山下泉流曲曲清欲識個中竒絶處棹歌間聽兩三聲一曲溪邊上鈎船幔亭峯影蘸晴川虹橋一斷無消息萬壑千岩鎖翠煙二曲亭亭玉女峯插花臨水為誰容道人不復荒臺夢興入前山翠幾重三曲君看架壑船不知停棹幾何年桑田海水今如許泡沫風煙敢自憐四曲東西兩石岩岩花垂露碧毶毶金雞呌罷無人見月滿空山水滿潭五曲山高雲氣深長時煙雨暗平林林間有客無人識欵乃聲中萬古心六曲蒼屏繞碧灣茅茨終日掩柴關客來倚棹岩花落猿鳥不驚春意間七曲移船上碧灘隱屏仙掌更回看人言此處無佳景只有石堂空翠寒八曲風煙翠欲開鼓樓岩下水縈回莫言此處無佳景自是遊人不上來九曲將窮眼豁然桑麻雨露見平川漁郎更覔桃源路除是人間别有天龍潭溪在武夷山之東南隅建溪源出武夷至城外今東溪驂鸞渡在郡城南蕭子開建安記真人上升墜馬于山之西松溪因曰墜馬洲渡曰丨丨丨瀑布泉在浦城西北四十五里萬葉寺後亘地數百尺天下號為第三瀑布水簾在九曲溪之上流堂榭玉仙堂在郡圃以玉清洞梅仙山合名修貢堂在漕臺觀妙堂在武夷山沖佑觀李彌遜觀妙堂遇雨既渡復回一日竟遊九曲而行賦詩二首人間何地寄衰翁偶到神仙一葦中可是仙君謝逋客船頭無處避罡風渡口回舟未忍移淨舫聽雨坐題詩餘齡儻有尋真路試與披雲問鳯兒朱元晦跋云觀妙堂東楹李公侍郎遺墨語意清婉字畫端徑至其下輒諷玩不能去然歲久剝裂又適當供帳處後十數年當不復可讀矣别為模刻授道士使陷置壁間庶幾來者得以想見前輩風度李公諱某時以力詆和議出守臨漳云慶元乙卯正月新安朱某謹奉書紫霞洲在郡圃取幔亭紫霞褥之義舊記其水發源于處之龍泉至烏龍窠口有一澗南注經月城僧舍穿城而入至閩王無諸祠東折絶濠達于子城以郡郡圃紅雲島在龍焙丹青閣在開元寺側元豐初太守石禹勤建宣和中趙季四命名且賦詩云跨壑飛簷屋數楹上橫山色下溪聲等間題作丨丨丨未必丹青畫得成徐璣留題云翠靄空扉忽有無筆端誰著此功夫溪山本被人圖畫却道溪山是畫圖晝寒亭在崇安縣五夫里之密庵朱文公嘗遊韓無咎詩紅塵熱客那知此赤腳青松意自間聚星亭在嘉禾之考亭朱元晦作畫屏贊并序云按世説陳太丘詣荀朗陵貧儉無僕役乃使元方將車季方持杖從後長文尚少載著車中既至荀使叔慈應門慈明行酒餘六龍下食文若亦小坐著膝前于時太史奏真人東行考亭陳氏故有離榭名以聚星蓋取續陽秋語中更廢壞近始作新適邇敝廬因得相其役事既又為之本原事迹畫著屏上并為之贊以視來者云猗歟陳子神嶽鍾英文淵懿範道廣心平危孫汚隆卷舒自我是曰庶幾無可不可獻身安衆弔孺全邦炯然方寸秋月寒江願言懷人曰我同志故朗陵君荀季和氏連峯對起麗澤潛滋僾而不見有黯其思薄言造之顧無僕役獨呼二兒駕子以出青芻黃犢布幰柴車策紀前衛杖諶後趍所造伊何高陽之里維時荀君聞至而喜顧謂汝靖往應于門七龍矯二布席開樽靖肅而前翁拜其辱何悟斯晨得見清穆命爽行觴旅饋次陳獻酬交錯禮度情親載笑載言罔非德義益邁乃猷以輔斯世髧髦兩雅亦置膝前源深本固莫出匪賢維此慈明特謝儔匹晚際國屯敢憚濡迹贅旒之命恃以少延邦朋之最孰與為先彧乃附曹羣亦忘漢嗣守之難古今共嘆崇臺回極于以占天猶曰茲野德星萃焉我宇有亭舊蒙斯號今刺前聞象儀以告高山景行好德所同課忠責孝獨概豫衷百爾窺臨鏡考毋怠死國承家永奉明戒今士大夫亦多以此圖繪于屏云滄海精舍朱元晦築于考亭以館四方之學者周益公題扁今為祠堂武夷精舍朱元晦築于五曲大隱屏之下韓無咎記武夷在閩粵直北其山勢雄深槃礴自漢以來見于祀事閩之諸山皆後出也其峯之最大者豐上而斂下巋然若巨人之戴辨緣隙蹬道可望而不可登世傳避秦而仙者蛻骨在焉溪出其下絶壁高峻皆數十丈岸則巨石林丘磊落竒秀好事者一目不能盡則卧小舟杭溪而上號為九曲以左右顧視至其地或平衍景物環會必為之停舟曳杖徙倚而猶不忍去山故多王孫鳥則白鷴鷓鴣聞人聲或磔磔集崖上散漫飛走而無驚恐之態水流有聲其深處可泳草木四時敷華道士即溪之窮僅為一廬以待遊者之食息往往酌酒未半已迫曛暮而不可留矣山距驛道才一二里許逆旅遙望不憚僕夫馬足之勞幸而至老氏之宫宿焉明日始能裹飯命舟而溪之長復倍於驛道之逺促促而來遽遽而歸前後踵相屬也豫舊家閩中兩官于建安蓋亦遽歸之一耳吾居于五夫山在武夷一舍而近若其後圃暇則遊焉與其門生弟子挾書而誦取古詩三百篇及楚人之詞我而歌之得酒嘯詠留必數日蓋山中之樂悉為元晦之私也豫每愧焉淳熙十年元晦既辭使節於江東遂賦祠官之祿則又曰吾今營其地果盡有山中之樂矣蓋其遊益數而于其溪之五折負大石屏規之以為精舍取道士之廬猶半也誅鋤草茅僅得數畝面勢幽清竒石佳木拱揖映帶若隂相而遺我者使弟子輩具畚鍤集瓦竹相率成之元晦躬畫其處中以為堂旁以為齋高以為亭密以為室講書肄業琴歌酒賦莫不在是豫聞之恍然如寐而醒如酲而析隱隱猶記其地之美也且曰其為我記之夫元晦儒者也方以學行其鄉善其徒非若畸人隱士遁藏山谷服氣茹芝以慕夫道家者流也然秦漢以來道之不明久矣吾夫子所謂志於道亦何事哉夫子聖人也其步與趍莫不有則至于登泰山之嶺而誦言於舞雩之下未嘗不遊胸中蓋自有地而一時弟子鼓琴鏗然春服既成之詠乃獨為聖人所豫古之君子息焉者豈以是拘拘乎元晦既有以識之試以告夫來學者相與酬酢於精舍之下俾或自得其視幔亭之風抑以為何如也是歲八月潁川韓無咎記朱元晦行視武夷精舍作神仙九折溪沿泝此中半水深波浪闊浮緑春渙渙上有蒼石屏百仭聳雄觀嶄岩露垠堮突兀倚霄漢淺麓下縈回深林久叢灌胡然閟千載逮此開一旦我乘星村船輟棹青草岸榛莽喜誅鋤面勢窮考按居然一環堵妙處豈輪奐左右矗竒峯躊躇極佳玩是時芳節闌紅緑紛有爛好鳥時一鳴王孫逺相喚暫遊意已愜獨往身猶絆珍重舍琴人重來足幽伴詩云琴書四十年幾作山中客一日茅棟成居然我泉石仁智堂我暫仁智心偶自愛山水蒼崖無古今碧澗日千里隱求齋晨蔥林影間夜枕山泉嚮隱去復何求無言道心長觀善齋負笈何方來今朝此同席日用無餘功相看俱努力止宿寮故人肯相尋共宿一茅宇山水為留行無勞具雞黍石門塢朝開雲氣擁暮掩碧蘿深自笑晨門者那知孔氏心寒棲館竹間彼何人抱甕靡遺力遙夜更不明焚香坐看壁晚對亭倚笻南山嶺卻立有晚對蒼峭矗寒空落日明影碎鐵笛亭舊名奪秀亭故侍郎胡公明仲嘗與山之隱者劉君兼道遊陟而賦焉劉少豪勇遊俠使氣晚更晦迹自放山水之間善吹鐵笛有穿雲裂石之聲胡公詩有更煩橫鐵笛吹與衆山聽之句何人轟鐵笛噴薄兩崖開千載留餘響猶疑笙鶴來釣磯削成蒼玉稜倒景寒潭碧永日靜垂竿茲心竟誰識茶竈仙翁遺石竈宛在水中央飲罷方舟去茶煙裊細香魚艇出載長煙重歸裝片月輕千岩猿鶴友愁絶掉歌聲以上係朱文公武夷雜詠晞真館起居舍人龔原記在第六曲仙掌峯之側以為遊人一息之地李伯記云奈今夏夢乘舟亂石間四顧峯巒竒秀有如玉色者覺頗異之及謫官劒浦道武夷山小舟泝流水落石出遍覽勝槩至丨丨丨雪作岩石皆白恍如舊遊然後信出處之分定而斯遊之清絶已先兆于夢寐之間雖欲不到不可得也作小詩以紀其事詩云清夢先曽到武夷玉峯積雪倍幽竒小舟遊罷尋歸路恰似翛然夢覺時晦菴朱文公建廬峯上詩云憶昔屏山翁示我一言教自信久未能岩棲冀微效夢筆山房魏華父記世傳江文通為吳興令夢人授五色筆繇是文藻日新令浦城縣故吳興也縣故有孤山里人因以丨丨稱之鄉先生楊文莊公嘗讀書其間比歲真希元于山之麓得數畝地藝卉木營闔廬為息遊藏修之所既為文莊識其事又以書扺了翁曰子為我發之了翁每惟由周而上聖賢之生鮮不百年蓋厯年彌久則德盛仁熟故雖從心所欲罔有擇言皆足以信今貽後詩三百聖賢憂憤之所為者十六七六藝之作七篇之書亦出于厯聘不遇凡皆坦明敷暢日星垂而江河流也聖人之心如天之運純亦不已如川之逝不舍晝夜雖血氣盛衰所不能免而才壯志堅始終弗二曷嘗以老少為鋭惰窮達為榮悴者哉靈均以來文詞之士興已有虛驕恃氣之習魏晉而後則以織文麗藻為學問之極致方其年盛氣強位亨志得往往時以所能譁世眩俗歲滔月邁血氣隨之則不惟形諸文詞衰颯不振雖建功立事蓄縮顧畏亦非復盛年之比無他非有志以基之有學以戍之徒以天資之美口耳之知才驅氣駕而為之耳如史所書任彥升丘靈鞠江文通諸人皆冇才盡之嘆而史于文通末年至謂夢張景陽奪錦郭景純徴筆才不逮前夫才命于氣氣稟于志志立子學者也此豈一夢之間他人所得而豫乎窮當益堅老當益壯而他人亦可以奪之乎為此言者不惟昧先王夢䘲之義亦未知先民志氣之學由是夢筆之事如王允琳紀少瑜李巨山李太白諸人史不絶書而杜子美歐陽永叔陳履常庶幾知道者亦曰老去才盡曰詩隨年老曰才隨年盡雖深自抑損亦習焉言之不知二漢時猶未有是説也希元用力于聖賢之學今既月異歲殊忘隨年長其自今所資益深所居益廣則息遊藏修于是山也其必謂吾言然矣睿聖武公年九十五作抑之詩曰相在爾室尚不愧于屋漏嗚呼為學不倦如此才可盡而志可躓乎既以復于希元又以自警云橋梁平政橋跨大溪立趾十有一各高七十二尺釃水之道有九梁空而行復為屋二百六十楹于其上而欄翼之萬石橋在北津為趾十有五屋一百七十有二楹長百四十餘丈朝天橋在嘉禾縣南拱辰橋在嘉禾縣北佛寺開元寺在郡西有丹青閣相傳為吕蒙故宅東西二端相院在封山崇峽兩保之間唐天后垂拱二年正月八日有佛像從空而降漸隱入地飯牛姥適見之抱持號呼逺近皆至掘得半軀于是刻木以續之高七尺一寸手結盧舍那佛印因號天降盧舍那佛兩保居民爭奉事之遂建二院更迭迎奉瑞巖院在崇安乃扣氷禪師道場俗姓翁名藻光崇安人母將娠父感夢老北丘荷錫求宿乃生襁褓中視經像輒有笑容出家得度參雪峯真覺師深肯之謂曰汝後必為王侯師嘗移錫霄厯道場院前有溪遇冬輒扣氷而浴常衣楮衣不為暑變云舊傳唐末有唐葛周三將軍隱于此又傳古有雙劒藏于巖下趙清獻公詩寒氷扣曉人無垢古劒藏秋谷有聲道觀沖佑觀在崇安縣武夷山舊名武夷觀保大間更曰會仙泉宋紹聖二年改賜金額聽秩二千石奉祠者領之觀之北有漢社壇存焉祠廟朱文公祠先生子子在今煥章待制建從士友之請也祝和父撰上梁文云先儒講道續泗水之正宗後學建祠宅富沙之勝槩非徒崇于香火將昭示于典型恭惟故太師徽國朱文公為百世師承千聖統自孔子以來未有豈孟氏之後無傳乃若四書尤勤乙覽巍巍丹扆恨不與之同時濟濟青襟悵莫親于前哲故或生長燕遊之地以寓其焄蒿悽愴之心然孕靈匪屬于吾州而卜宅又居于外邑曾是大府維桑之敬獨無精廬釋菜之儀宜國人于是推尊實天下所同嚮慕逺想元公于湓浦近稽吕氏于金華皆即鄉邦立為祠宇援例朋來于學子合詞共請于都堂雖吾道無終窮當自識其大者然名世不常有要使聞而知之盍略倣于舊規庶共知其景行今則侍郎欽承朝旨來相城邑爰卜室廬是即肯堂之意先建宗廟未忘過庭之時眷兹幾楹闤闠之㕓闢此數畝高明之址將奉安于遺像幸甫就于僝功要皆士友之僉謀豈特人子之私願鄉黨恂恂朝廷侃侃宛如親見于平生雲山蒼蒼江水泱泱相與永存于奕世用陳短韻敬舉修梁拋梁東編簡常存道不窮孔孟以來千百載泰山今復仰文公拋梁西道統如今説建溪好似雷霆驚衆瞶又如日月覺羣迷拋梁南隃望延平古劒潭弦歌已創新書院道統寧忘舊晦菴拋梁北一葦可航懷舊宅精神如水行地中鑿井得泉隨所得拋梁上升堂再拜瞻遺像云胡必擇郡城中祇為邦人知所嚮拋梁下玩索遺編毋暫捨儻將持敬為入門何患淵源不遊夏伏願上梁之後教雨潛施文風益暢天開休運表章既重于聖經代有偉人啓沃必推于家學抑使甌閩之俗永為鄒魯之鄉澤民廟在城東十五里梨山祥符郡守盧幹立碑謂唐宗室李回按本傳則回未嘗仕閩運使鄭士秀以為李頻蓋頻為建州刺使郡人立廟祀之當以鄭碑為正靈濟廟在建安縣登仙里神姓倪諱産松大唐人祖居貴溪世授龍虎山天師法遊建安家于黨溪威懷廟在嘉禾縣南二十五里地名蓋竹神姓陳諱昔為邑録事以直方清幹為己任子三人俱以行義稱當唐正元中父子以讒同時遇害投于溪泝流而上數千里邑人收而瘞之庇民廟在嘉禾縣東三步神姓李第三偽閩時王從珂舉兵侵州境李嘗率義兵拒守授銀青光祿大夫檢校太保領嘉禾縣崇樂鎮公事以戰殁葬于水南之後版名宦江淹方輿志浦城邑本漢東侯官之北鄉吳永安三年改為吳興縣圖經晉尚書陸邁梁尚書郎江淹皆為吳興令陸長源唐人為太守皇朝龎籍景祐中為轉運使陳襄以密直知浦城人有失物捕得莫知的為盜者述古乃紿之曰某廟有鐘能辨盜不為盜者摸之無聲為為盜者摸之則有聲述古率同列禱鐘甚肅乃隂使人以墨塗鐘祭訖以帷圍之引囚逐一令引手入帷摸之出乃驗其手惟一囚無墨訊之遂伏見筆談趙抃為崇安寄立祠于學朱元晦記汪應辰以正字轉對及和議有上下相蒙之語出為建州倅陳俊卿王淮梁克家並以宰相判傳自得為漕子伯夀伯成並為守韓元吉為建安宰自作廳壁記云用廣而賦嗇貿遷鹹鹺以佐其費折獄蔽訟之外計量猶大商也人物顧野王其先吳郡人因官居建嘗撰建安記後又撰玉篇輿地志為陳光祿卿今有坊江為嘉禾人有詩名今靖安寺乃其故居殿院陳洙詩云處士亡來一百年故居牢落變祇圈詩名長共江山在劒氣尚磨星斗昏潘佑郡人為南唐禮書今有坊存焉皇朝章得象浦城人為相章楶章授葉煥並省魁楊億浦城人生之夕祖父夢懷玉山人來楊儀之浦城人諡曰文莊祖秀實釋褐狀元葉齊端拱初廷試第一徐奭郡人今建安有狀元坊章衡浦城人大魁楊蟠建安人嘉祐間有詩名吳育建安人中賢良科慶厯中參大政吳充育之弟知禮院章子厚浦城人作相嘗與蘇子瞻遊南山抵仙遊潭下臨絶壁萬仞岸甚狹子厚推軾下潭書壁軾不敢子厚攝衣而下以漆墨濡筆大書石壁上曰蘇軾章惇來軾拊其背曰子厚必能殺人子厚大笑阮逸嘉禾人景祐初上樂論十二篇與布衣胡爰同召校定新舊樂律柳耆卿崇安白水人長于詞范蜀公嘗曰仁宗四十二年太平鎮在翰苑十餘載不能出一語歌詠乃于耆卿詞見之仁宗嘗曰此人任從風前月下淺斟低唱豈可令仕宦遂流落不偶卒于襄陽死之日家無餘財羣妓合金葬之于南門外每春月上冢謂之弔栁七陳升之嘉禾考亭人為相後居潤州陳洙考亭人仁宗朝上疏助司馬光論建儲且飲藥而卒以明無所顗望陳師錫為殿中侍御史論蔡京蔡卞者四論章子厚者三陳軒嘉禾人元祐中廷試居第二先是進士賜袍笏例于廷下脫白服緑軒衣如懸鶉上解黃衣賜之至今賜袍笏有淡黃衣自軒始後知汀州遊酢嘉禾人徽廟朝為監察御史朱元晦作州學祠記云按龜山楊文靖公作先生墓記云豫元豐中受學明道先生兄弟之門有友二人焉曰上蔡謝顯道公其一也初伊川先生以事至京師一見公謂其資可以適道是時明道知扶溝縣事先生兄弟方以唱明道學為己任設庠序聚邑人子弟教之召公來識學事欣然往從之得其微言于是盡棄其學而學焉其後得邑河清豫往見之伊川謂豫曰遊君德器粹然問學日進政事亦絶人逺甚于師門見稱如此其所造可知已又云乃悉論著楊公本語而不敢輒贊一辭云劉韐崇安人靖康時東京城陷虜聞其名必欲得之宰相遣韐往虜欲用之韐曰當以死報國耳遂自經死諡忠顯子子羽寶學侍郎孫珙為樞密胡安國崇安人高宗朝張浚薦公遂進春秋傳後諡文定子寅號致堂以論秦檜謫新州著讀史管見寧嘗仕亦忤秦檜遂被論罷去宏不仕自號五峯敬軒從之遊有知言皇王大紀胡憲居崇安之籍溪嘗為本州教官召為正字朱元晦以詩送之並呈劉共甫云先生去上藝香閣閣老新峩豸角冠留取幽人卧空谷一川風月要人看又云甕牖前頭列畫屏晚來相對靜儀刑浮雲一任間舒卷萬古青山只麼青後胡五峯更為一章云幽人偏愛青山好為是青山不老山中出雲雨太虛一洗塵埃山更好朱元晦為之跋云右衡山胡子詩也初紹興庚辰某卧病山間親友仕于朝者以書見招某戲以兩兩代代書報之曰云云或傳以語胡子子謂其學者張欽夫曰吾未識此人然觀此時知其庶幾能有進矣特其言有體而無用故吾為是詩以針之庶其聞之而有發也明年胡子卒又四年某始見欽夫而後獲聞之恨不及見胡子而卒請其目也因敘其本末而書之于策以無忘胡子之意云劉子翬崇安人號屏山先生有文集劉勉之字致中少入辟雍從涪陵譙定明易象之學諫議劉公安世一見器之以白衣再召至闕竟引疾而歸朱熹新安人後居嘉禾之考亭甫冠屏山劉子翬字公以元晦而祝之曰木晦于根春華曄敷人晦于身神明內腴故號晦菴云年十九登第仕至侍講諡文後御筆以所著四書有補治道特贈太師先是太常章徠撰諡議云公躬履純誠潛心問學近承伊洛逺接洙泗居鄉則信于朋友而有講切之功居官則信于吏民而以教化為務為郡太守則勤恤民隱如恐傷之任部使者則糾發大吏雖忤時相必得其職乃已至于立朝則從容奏對極言無隱方權臣初得志竊弄威福知其漸不可長乃指陳時事抗章極論繼于講筵密奏雖知取禍弗顧也尋以論者詆為偽學奪職而公繼亦下世矣劉議正覆議云公中科第時猶少也薄遊徑隱閉門潛思朝夕每以好官召莫能屈不得已而出惟恐去之不早官滿考者九而間居者四十餘年山林之日長學問之功深也嗚呼師友道喪人各自是公力扶聖緒本末宏闊而弄筆墨小技者以為迃㿑于山澤與世無競而汨沒朝市者以為矯自少至耄動以禮法而跅弛捐繩墨者姍笑以為誕世嘗以是病孔孟矣公何恨焉魏掞之嘉禾人自號艮齊以白衣召為國録天子悅之擢為學官在職末幾數上書論政事以至力遏近幸之不當進者遂不安而告歸以卒真德秀浦城人中宏博科仕至參政諡文忠王邁作文集序云先生壯年遊蓬山直鼇嶺立螭坳每上一諫疏草一制誥朝大夫與都人士爭相傳寫出而駕使開大藩府凡囊封驛奏之達于上若庭諭壁戒之布于下鋟梓一出深山長谷窮櫩委巷之氓鳥蠻象郡風帆浪舶之賈競售之如獲至寶中間嘗勇退間居執經問難于學易之齋蓋有來自岷蜀萬里者題詠春灘建水狂羅昭諫送沈侍侍御閩中詩建溪富竒偉蘇子瞻詩云云葉氏方隱淪惸獨困吏叨黃魯直送劉士彥赴福建運判詩紅葉雨墮來冥鴻天資高車馬氣成霧九衢行滔滔中有寂寞人靈府扄銷牢西風持漢節騎從嚴弓刀維閩七聚落云云土敝禾黍惡水煩鱗介勞南驅將仁氣百城共一陶察人極涇渭問俗及豚羔官間得勝日杖履之林臯人間閲忠厚物外訪英豪漢廷初拜建安侯劉長卿送建州陸使君詩云云天子臨軒寄所憂從此向南無限路雙旌已去水悠悠四六疇咨明牧易鎮潛藩建水上遊富沙名郡建安古郡甌粵奧區溪行石中田墾山上劉龜城之雄據竇龍邸之初潛惟建溪之作屏實代邸之啓封當一路之屏藩亦八州之睂目向多名德之相忘今亦人才之輩出眷真主潛龍之邸實大臣歇馬之邦習俗輕生而好鬬比閭多忿而喜爭試言白玉之堂蚤陪後乘修貢紅雲之島幾作先驅雄稱大府台符之所肯臨對峙崇臺地望於焉增重肆夏升歌擬宣麻于文德陽春有腳還擷茗于武夷列營增竈務莫急于軍儲滄海熬波利每虧于私鬻朱幡皂蓋分刺史之左符碧水丹山入詩人之吟筆鄭由槖座而分符俄歸枋地傅自玉堂而出牧旋拜樞庭修貢春山尋端明之舊譜懷賢雲谷訪侍講之遺編問俗及羔豚山谷之詩云耳羡君超鸞鶴玻仙所詠非耶家有伊洛之書見聞逺矣俗如鄒魯之國文物藹然桑麻被隴知農業之甚勤茶笋連山喜土風之差勝生武夷之下其稟至清近考亭之居所漸者逺或以布衣而力排于近習或以聘幣而高卧于故山文章則楊內相得其宗氣節則劉忠顯為之冠章陳秉鈞輔慶厯熙寧之際遊胡講學承伊川明道之傳牙籖玉軸産人間未見之書玉乳金甌貢天上至珍之味兩橋虹卧素稱宏壯之規模萬室星聨頗有繁華之氣象武夷洞天訪仙子履船之遺迹大隱精舍誦儒宗倚棹之清歌方輿勝覽卷十一
