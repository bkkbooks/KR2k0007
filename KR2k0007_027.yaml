body:
  text: 方輿勝覽卷二十七宋祝穆撰湖北路江陵府江陵松滋公安石首潜江松江監利建置沿革禹貢荆及衡陽為荆州楚地翼軫之分野鶉尾之次春秋時謂之郢都秦以其地置南郡項羽時封共敖為臨江王都江陵漢為南郡後漢因之三國鼎立荆州亦分為三關羽既沒南郡屬吳荆州之名南北雙立魏立荆州理穰宛今南陽郡是也吳立荆州理江陵今郡城是也晉武帝以南郡為荆州治所晉或理武昌王澄還治江陵自桓溫於江陵營城府此後嘗以江陵為荆州理所宋文帝嘗鎮荆州魏於穰宛置荆州於是復有二荆州陳置荆州於公安以長江為界隋廢南荆州為公安鎮煬帝罷荆州為南郡唐改江陵郡復為荆州置荆南節度使又置南都以荆州為江陵府尋罷都國朝以髙繼冲為江陵尹中興升為帥府改荆南府復為江陵府荆南節度今統郡十六領縣七治江陵事要郡名古荆釋名曰荆州取名於荆山又曰荆驚也南蠻數冦常置警備故謂之荆荆臺在監利縣西三十里土洲之南家語云楚王游丨丨司馬子禖諌王怒令尹子西賀即此地是也南楚孟康漢書注三楚舊名江陵為丨丨西荆陶潜還江陵詩曰遙遙赴丨丨注時京在東故謂荆州為西荆鶴澤晉羊祐鎮荆州江陵澤中多有鶴常取之教舞以娛賔客因名丨丨後人因之遂呼江陵郡名為鶴澤風俗蠻荆之地詩蠻荆來威晉元康記荆州為古丨丨丨丨五方雜居寰宇記唐至德之後流傭浮食者衆云云風俗大變衣冠藪澤僉載江陵號云云彥謂琵琶多於飯甑措大多於鯽魚競渡之戲隋志荆州尤重淫祀屈原為制九歌蓋此由也原以五月五日赴汨羅土人追至洞庭不見湖大船小莫得見者乃歌曰何由得競渡因此爭歸競㑹亭上習以相傳為競渡形勝東連吳㑹通鑑諸葛亮語劉備曰荆州方城為城漢水為池北據漢沔利盡南海云云西通巴蜀此用武之國也南有洞庭史蘇秦說楚威王曰楚西有黔中巫郡東有夏州海陵丨丨丨丨蒼梧北有涇塞郇陽地方五千里帶甲百萬此霸王之資也南通五嶺髙武信王神道碑云云旁帶一江接壤吳蜀舟車四逹北繞潁泗淮南子曰楚地南卷沅湘云云西包巴蜀東裏郯邳潁汝以為城江漢以為池垣之以鄧林綿之以方城控扼巴蜀胡旦開河記丨丨丨丨襟帶吳越可出三川繫年録知郢州王庶言左吳右蜀利盡南海云云涉大河以圖中原曹操所以畏關羽者也下瞰京洛趙鼎奏荆襄左顧川陜右視湖湘而云云在三國所必爭真帝王之宅也楚有七澤張孝芳景濓堂記云云水物之美甲於天下離騷所述雲夢所賦非涉其境者安能知之史記江陵故郢西通巴巫有雲夢之饒熊繹所封周封熊繹於楚國之西門通鑑晋何充云為吳蜀之門户皇朝繫年録吳拱遺大臣書荆南云云襄陽為荆州之藩籬有西陜之號郡縣志東晉以後皇居在建業以揚州為京師根本荆州為上流之重鎮此周召之分陜故云云據江湖之㑹重修渚宫記南夏劇鎮云云即西川江南廣南都㑹之衝通鑑云穆昭嗣曰荆南云云既克此則水陸皆可趨蜀甲兵所聚通鑑宋紀曰晉氏南遷為京畿榖帛所資者皆出焉以荆州為重鎮故丨丨丨丨者在焉為四戰之地通鑑楚將王瓌曰江陵云云得人則中原可定通鑑晉永和庾翼既卒朝議欲以庾爰之代其任何充曰荆楚國之西門户口百萬北帶強胡西鄰徑蜀云云失人則社稷可憂置使視揚益皇甫持正集山川荆山郡志其首曰景山金玉所出卞和得玉於此獻厲王及武王皆以為石刖其兩足和抱璞哭於丨丨之下龍山在江陵縣西有落帽臺紀山在府北四十里自荆門西山而來蓋州治主山江陵志後梁宣明二帝陵林木欎然巴山在松滋縣左傳巴人伐楚按荆南志云巴人後逋而歸有巴復村故名九岡山在松滋縣西九十五里昔人詩江分三峽濁山帶九岡青畫扇峯荆州記修竹亭西一峯逺而望之如畫扇然息壤淮南子曰鯀湮洪水盜帝之丨丨帝使祝融殺人於羽淵今荆州南門外有石狀若屋宇陷入地中不可犯畚鍤又頗以致雷雨嵗旱有應唐元和中裴宇牧荆州掘之得石城與江陵府同中徑六尺八寸徙棄之是年霖雨不止遂埋之見息壤記蘇子由詩南郡城南獨何者平地生長殊不休江水出岷山南過江陵漢水杜預曰禹貢漢水至大别南入江沮水出漢中房陵縣東南至枝江縣入于江漳水出臨沮南至枝江入于沮左傳云江漢漳沮楚之望也此水也夏水楚詞過夏首而西浮即此左傳吳戍楚至于夏汭注今名夏口東湖在公安門外五里佛華寺東北張商英建廣袤數里為遊賞之勝髙沙湖在江陵梅回州上四蕃志齊聘士文範先生嘗家焉黃魯直詩不趨吏部曹中板且膾髙沙湖裏魚三海江陵以水為險陸抗之築大堰建隆間髙勉得之名北海是也紹興逆亮將渝盟李師䕫匱上下海以為遏敵之計開禧兵端既開劉帥甲又再築上中下三海吳帥獵繼之引漳沮及諸湖之水注三海綿亘𢾗百里濔漫相連又為八匱丁邜春虜犯荆門距江陵才百餘里而去亦知有三海之險也漕河在江陵縣北四里紹興元年省劄江陵府城下舊有漕河若略加開淘則江陵城下綱運順流從江漢直逹襄峴契勘本府漕河乃晉元帝建武初所鑿自羅堰口出大漕河由里社穴沌口沔水口直通襄漢二江張孝芳修渠記國朝端拱元年閻文遜奏開東漕渠自獅子口以入于漢以逹于襄陽遂發丁夫治荆南漕河至漢可勝二百石舟上游之人利焉天禧末尚書李夷庚濬古渠逹夏口以通賦輸蓋自襄而郢順流也勢易也自郢而襄遡流也勢難也且有風濤不測之險百洲松江縣江津中有九十九洲楚諺曰洲不滿百故不出王者桓𤣥有問鼎之意乃增其一僣號旬時及其傾覆洲亦銷滅至宋文帝在藩忽生一洲果龍飛江表龍陽洲在江陵縣界舊經云後漢李衡於洲上作宅種橘史記江陵千樹橘其人與千户侯等菊潭十道記云荆州菊潭其源旁芳菊被涯其滋液極甘馨谷中有三十餘家不得穿井仰飲此水上壽二三百中壽百餘其七十八十猶以為夭沙頭市去府十五里四方之商賈輻輳舟車駢集元稹江陵玩月詩闐咽丨丨丨玲瓏竹岸窗寸金堤在府城外萬壽寺西張孝祥記樓觀仲宣樓在府城東南隅後梁時髙秀興建名以望沙樓魏志王粲山陽髙平人少而聰慧有大才仕為侍中時董卓作亂仲宣避難荆州依劉表遂登江陵城樓因懷歸而有此作述其進退危懼之情也賦曰登兹樓以四望兮聊假日以銷憂覽斯宇之所處兮實顯敞而寡仇挾清漳之通浦兮倚曲沮之長洲背墳衍之廣陸兮臨臯隰之沃流北彌陶牧西接昭邱華實蔽野黍稷盈疇雖信美而非吾土兮曽何足以少留遭紛濁而遷逝兮漫踰紀以迄今情眷眷而懷歸兮孰憂思之可任憑軒檻以遙望兮向北風而開襟平原逺而極目兮蔽荆山之髙岑路逶迤而修逈兮川既漾而濟深悲舊鄉之壅隔兮涕橫墜而弗禁昔尼父之在陳兮有歸歟之歎音鍾儀幽而楚奏兮莊舄顯而越吟人情同於懷土兮豈窮逹之異心惟日月之逾邁兮俟河清其未極冀王道之一平兮假髙衢而騁力懼匏瓜之徒懸兮畏井泄之莫食步棲遲以倚徙兮白日忽其將匿風蕭瑟而並興兮天慘慘而無色獸狂顧以求羣兮鳥相鳴而舉翼原野闐其無人兮征夫行而未息心悽愴以感發兮意忉怛而慘惻循階除而下降兮氣交憤於胸臆夜參半而不寐兮悵盤桓以反側明月樓劉孝綽所建顔之推詩屢陪明月樓曲江樓舊有南樓張曲江嘗登樓賦詩張南軒建樓因易今名朱元晦記廣漢張敬夫守荆州之明年歲豐人和幕府無事顧常病其學門之外即阻髙墉乃直其南門外通道以臨白河且為樓觀以表其上一日與客往而登焉則大江重湖縈䊸渺瀰一目千里而西陵諸山空濛暗靄又皆隱見出沒於雲空煙水之外敬夫於是歎曰此亦曲江公所謂江陵郡城南樓者耶昔公相去而守於此其平居暇日登臨賦詠蓋皆翛然有出塵之想至是傷時感事寤歎隱憂則其心未嘗一日不在於朝廷而汲汲然惟恐其道之終不可行也七澤觀在東南隅城門帥張安國名一柱觀郡縣志在松滋東邱家湖中按渚宫故事宋臨川王義慶在鎮於羅公洲立觀甚大而惟一柱梁劉孝綽詩經從一柱觀出入三休臺杜甫詩孤城丨丨丨落日九江秋亭臺樂楚亭鄭毅夫有記繡林亭在石首縣陽岐寺黃魯直題扁南極亭在松滋縣山谷有丨丨丨與鄒天錫詩濯纓臺在監利東三里屈原濯纓處落帽臺見龍山注李白詩九日龍山飲黃花笑逐臣醉看風丨丨舞愛月隨人胡矩落帽臺記曰萬年固佳士然所事非其人風伯為之免冠耳館驛江陵館羅隱荆州江陵館詩西遊象闕愧知音東下荆溪稱越吟風動芰荷香四散月髙樓閣影相侵間欹别枕千般夢醉送征帆萬里心薜荔衣裳木蘭楫異時煙雨好追尋古跡郢城左傳襄子臨終謂子庚必城郢荆州記云掘得石函曰楚都郢鄖城在江陵縣南二百里楚昭王時鄖公所築今松滋楚城號丨丨修門離騷曰來入丨丨王逸注郢城門也渚宫郡縣志楚别宫左傳楚子西沿漢泝江將入郢王在丨丨今之城楚船宫地也梁元帝名以丨丨唐髙從誨鑿城西南隅為池築亭名曰渚宫蘇子瞻詩渚宫寂寞依古郡楚地荒茫非故基二王臺閣已鹵莾張髙何况逺問縱橫詩楚王獵罷擊靈鼓猛士操船水嬉釣魚不復數魚鱉大鼎千石烹蛟螭當其經營造宫殿意思妙絶般與倕飛樓百尺照湖水上有燕趙千蛾眉臨風揚揚意自得長使宋玉作楚詞秦兵西來取鍾虡故宫禾黍秋離離千年壯觀不可復今之存者蓋已卑地空野逈樓閣小惟有深竹藏狐狸臺中綘帳誰復見臺下野鴨浮清漪緑窗朱户春盡閉想見深屋彈朱絲腐儒亦解愛聲色何用白首談孔姬沙泉半涸草堂在破窗無紙風颸颸陳公蹤跡最未逺七瑞寥落今何之百年人事知幾變直恐荒廢成空陂誰能為我訪遺迹草中應有湘東碑章華臺晉杜預云在今南郡華容城中華容即今監利張文昌樂府有章華行綘帳臺郡志東漢馬融教授弟子于此今鼓角樓之西是其處也劉莘老詩馬融號耆舊太守南郡來橫經坐絳帳自處何崔嵬帳前列徒弟帳後歌管陪書生貧賤遽以聲色回萊公竹在潜江藥師院冦萊公卒于海康詔許歸葬道出公安邑人祭於道斷竹插地以掛紙錢竹遂不根而生邑人立廟于側奉祀甚謹侍讀王公樂道紀其事於石名宦郭賀為荆州刺史百姓歌之嘗以章服勑行部去䄡帷露冕使百姓見其容服以章有德馬融為南郡太守教養諸生常以千數坐髙堂施綘帳前授生徒後列女樂今子城西有絳帳臺法雄為守先是猛獸為害雄令毁去陷穽虎暴遂去因名虎渡里出本傳劉昆為江陵令時縣連年火災昆輒向火叩頭雨降風止人稱其至誠所感劉宏白氏六帖宏為荆州每有手書郡國丁寧欵密人皆感之曰得劉公一紙書賢於十部從事陶侃代王舒為刺史治江陵勤於吏職終日斂膝危坐閫外事千緒萬端罔有遺漏逺近書疏莫不手答引接踈逺門無停客諸參佐或以手談廢事侃命取其酒器蒱博之具投之江嘗語人曰大禹聖人乃惜寸陰至於衆人當惜分隂謝安桓溫辟為征西司馬既至溫甚喜言平生歡笑竟日既出溫問左右頗嘗見我有此客否溫嘗詣安值其理髮安性舒緩久而方罷使取帽溫見留久之曰令司馬著帽其見重如此謝奕為桓溫司馬在坐岸幘嘯詠無常溫曰我方外司馬王徽之字子猷為桓溫恭軍蓬首散帶不綜府事又為車騎桓冲騎兵恭軍冲問卿署何曹對曰似是馬曹又問管幾馬曰不知冲嘗謂曰卿在府日久比當相料理徽之不答直髙視以手板柱頰云西山朝來致有爽氣耳孟嘉為桓溫幕府九日遊龍山僚佐畢集並著戎服有風至吹嘉帽落嘉不之覺溫命孫盛作文嘲之嘉答之其文甚美張九齡以爭牛仙客事貶荆州長史常以文史自娛賦詩云謬忝為邦寄多慙理人術陳力儻無效謝病從芝木張柬之武后曰安得一竒士用之仁傑曰荆州長史張柬之雖老宰相材也用之必盡節於國姚崇天寶遺事崇牧荆州三年授代闔境民吏泣擁馬首不使之去所乘之馬鞭鐙民皆截留元結安史之亂以討賊遷荆南節度使假文昌帥荆南或旱禬解必雨或久雨遇出遊必晴民為語曰旱不苦禱而雨雨不愁公出遊孟浩然張九齡為荆州辟浩然置幕府嘗賦觀獵詩韓愈德宗時為監察御史上疏論宫市貶陽山令正元移荆州法曹參軍韓朝宗李白與韓荆州書白聞天下談士相聚而言曰生不願封萬户侯但願一識韓荆州何人之景慕一至於此君侯不以長揖見拒若必接之以髙宴縱之以清談請日試萬言倚馬可待今天下以君侯為文章之司命人物之權衡一經品題便作佳士而今君侯惜階前盈尺之地不使白揚眉吐氣激昂青雲耶元稹字微之憲宗時拜監察御史不避中人仇士良怒擊稹敗面宰相謂稹年少輕立威失憲臣體貶江陵士曹參軍皇朝陳堯咨祥符中知荆南母馮氏問曰汝典郡有何治效堯咨曰稍精於射母曰汝不務仁政而專一夫之技杖而擊之元綘湘山野録公成童時侍錢塘府君於荆南每從學於龍安僧舍後三十年以龍圖二卿為帥昔僧猶有存者公因建堂名曰碧落詩云九重侍從三明主四紀乾坤一老臣鄭獬帥江陵劉忠肅摯為察推章子厚為帥屬後人以為一時盛事劉摯治平中為察推張商英以言事出監荆南商稅胡安國為江陵察推改除教授今江陵北地名新店文定故宅在焉張栻為帥張孝祥為帥嘗有送舉人赴省詩云解苞珍貢入琢玉寶光寒簇仗春旗裏看君䇿治安人物老萊子寰宇記楚人事親至孝常服斑斕之衣年七十尚為嬰兒啼戲於親前漢陰叟寰宇記楚人居漢水之陰子貢南遊見丈人為圃鑿池抱甕出灌園用力多子貢教之鑿木為桔橰丈人曰吾聞有機事者必有機心也陸通接輿楚人謂之楚狂接輿宋玉有故宅杜甫詩曽聞宋玉宅每欲到荆州胡廣華容人西漢平帝時大司徒馬宫辟之值王莽居攝廣解衣冠垂府門而去遂亡命交趾隱於屠肆莽敗歸鄉岑文本家江陵封江陵縣子或勸其營産業文本曰吾漢南一布衣以文墨致宰相奉稍已重尚何殖産耶皇朝唐介荆南人仁宗朝為御史論張堯佐除四使因劾宰相文彥博介貶英州别駕仁宗朝參大政因與王安石榻前論事不屈發疽死唐恪靖康為少宰朱昂太宗朝為翰林學士引年請休上以荆南故苑賜之力辭乃賜城東一坊為宅是時知制誥陳堯咨為尹乃題坊曰垂車孫諭元祐末掛冠同時退休者吳師道梁宏宋光復賈亨彥張叔逹布衣唐愈為七老人㑹飲酒賦詩五日一集田偉燕人歸朝授江陵尉因家焉作博古堂藏書至五萬七千卷無重復者黃魯直過之曰吾校中祕書及遍遊江南文士圖書之富未有過田氏者題詠江漢分楚望文選顔延年詩云云行巫奠南服三湘淪洞庭七澤藹荆牧巴國山川盡陳子昂詩云云荆門煙霧開地利西通蜀杜甫江陵望幸詩云云天文北照秦漢水照天碧白居易和江陵士曹元微之詩云云楚山拂雲霄北行連鄧許蘇子瞻詩云云南去極衡湘楚地盡平川蘇子瞻詩游人出三峽云云北客隨南賈吳檣間蜀船江侵平野斷風卷白沙旋欲問興亡事重城千古堅風煙紀城南杜甫北南歌云云塵土荆門路關梁豁五湖張九齡登荆州城樓詩此府雄且大韓愈赴江陵法曹寄王翰林詩云云騰凌盡戈矛槃槃此都㑹李頻詩楚地八千里云云巍峩數里城逺水相映帶府中丞相閣孟浩然陪張丞相登荆城樓云云江上使君灘兵符下渚宫劉禹錫寄荆州嚴司空詩蠻水阻朝宗云云三楚多秀士阮籍詠懷詩白魚如切玉杜甫詩云云朱橘不論錢僮橘過霜收李維詩使梅和雪賞云云南荆西蜀大行臺劉禹錫與嚴司空成都武相公唱和煙開碧樹渚宫秋武元衡酬荆南嚴司空見寄詩簾捲青山巫峽雨云云千里江陵一日還李白詩朝辭白帝彩雲間云云兩岸猿聲啼不盡輕舟已過萬重山清江依舊繞空城杜牧送劉秀才歸江陵詩鄉人來話亂離情淚滴殘陽向楚荆白社已應無故老云云起居八座太夫人杜甫送蜀州别駕將中丞命赴江陵起居衛尚書太夫人示從弟位詩中丞問俗畫熊頻愛弟𫝊書綵鷁新遷轉五州防禦使云云楚宫臘送荆門水白帝雲偷碧海春與報惠連詩不惜知吾斑鬢總如銀荆州佳境不須山鄭毅夫夷陵張仲孚以荆州無山為戲作云云自有碧江無限好漢家太守治才髙司馬君實送齊學士知荆南詩云云楚國山川氣象豪旌斾逶迤盤夢澤樓船贔壓江濤來依絳帳馬融州黃魯直詩誰謂石渠劉校尉云云地連雲夢水無邉張商英詩云云天斷夷陵欲盡山曽是劉虬髙飲地不知何處扣𤣥闕江村竹樹多於草姚合從陳彤之江陵從事云云山路塵埃半是雲只有灘聲似舊時陸務觀楚城詩江上荒城猿鳥悲隔江便是屈原祠一千五百年間事云云脊令飛急到沙頭杜甫喜舍弟到沙頭詩鴻鴈影來連峽內云云兩岸緑楊遮虎渡公安人張景居城南之方城仁宗召見問曰卿在江陵何處居景對曰云云一畨青草覆龍洲上喜其對外邑野曠吕䝉營杜甫公安懷古云云江深劉備城縣吏迎來怪到遲張籍送枝江劉明府詩家僮促去愁行逺云云定訪玉泉幽院宿應過碧澗早茶時四六演綍北門開藩南紀坐專方靣遙制邉頭帥閫尊嚴兵威震肅肅清三楚彈壓重湖眷荆楚之西門實江漢之南紀惟全楚之上流實皇家之要屏摘山之黨搖毒而方張荷戈之卒弛備而不武惟重湖之重地乃全楚之奧區伊荆州用武之國最今日任人之先南連嶺嶠之奧北倚襄漢之長惟是重湖之外實連三楚之區渺焉蒲澤之深阻甚者潢池之繹騷雖為魚米富饒之鄉亦號盜賊出沒之地控引吳蜀財賦之所委輸通逹關河舟車之所走集由中興百餘載以來最為重鎮凡屬部二千石以下悉𨽻元戎洞庭青草無可戮之鯨鯢武陵桃源皆相安之雞犬貔貅萬竈肅先聲於營壘之間蜂蟻千屯戡大憝於笑談之頃田土膏腴莫盡新耕之利人煙蕭瑟靡聞舊觀之還控持中原是為四通八逹之地考按前古豈但三國六朝所爭地控上游允謂江淮之屏蔽兵屯重鎮尤為巴蜀之輔車一江天險處咽喉控扼之中萬旅雲屯屬襟帶驅馳之下漢陽軍漢陽汊川建置沿革禹貢荆州之域在天文為翼軫之分野春秋時鄖國地戰國屬楚秦屬南郡漢為江夏郡安陸縣地魏初定荆州屯沔陽以為重鎮晉立沔陽縣而江夏郡自上昶城移理焉後移理夏口縣晉陶侃為荆州刺史鎮沔口即此宋齊梁因之後周於此置復州隋改為沔州以沔水為名尋復為沔陽郡唐置沔州周世宗以漢陽漢川二縣置軍國朝嘗廢為縣屬鄂州尋復為軍今領縣二治漢陽事要郡名古沔沔陽見沿革注沔口漢水入江處曰丨丨風俗美化行江漢詩文王之時丨丨丨乎丨丨之域形勝沔口重鎮輿地志漢入江處謂之沔口魏及吳人皆以為重鎮吞江納漢吳都賦云前枕蜀口元和志云云北帶漢水却負大别李知新學記云云路通荆雍通鑑梁武帝曰云云控引秦梁左武昌陳澤鳯棲經藏記漢水合大江夾江而城丨丨丨右漢陽山川鳯棲山軍治在其陽劉辟強記昔有丨丨于丨故名大别山在沔陽縣東一名魯山郡志云梁武帝築漢口城以守魯山即今漢陽軍城是也史本新經云上有橫江將魯肅祠豈因是而名山歟梁武帝曰漢口不闊一里以前道交至不若遣軍逼郢吾自圍魯山以通漢沔使鄖城竟陵之粟方舟而下潘大臨登丨丨眺望詩云人爭漢口渡日落陽臺坂鼓吹隔岸聞樓觀排雲見赤壁山在汊川縣西八十里輿地紀勝里人多言是周瑜破曹操處按曹操舟師自江陵順流而下周瑜自柴桑泝流而上兩軍相遇於赤壁則赤壁當臨大江臨嶂及汊川皆非臨江處舊經云今江漢間言赤壁者有五黃州嘉魚江夏漢陽漢川其說各有所據惟江夏之說近古而合於中臨嶂山在漢陽西六十里晉置沔陽縣江夏郡自上昶城移理焉湖蓋山在漢陽縣山形似蓋南臨漢水西帶大湖故名陽臺山在漢川縣南三十五里或言宋玉作髙唐賦處有裴敬碑載其事當考郎官湖李白郎湖詩序故人尚書郎張渭出使夏口沔陽牧桂公漢陽宰王公觴於江城之南湖方夜水光如練清光可掇白因舉酒酹水號之曰丨丨丨亦鄭圃之有僕射陂也但白詩謂沔州城南今乃在城北不同耳李白詩張公多逸興共泛沔城隅郎官愛此水因號郎官湖又詩南湖秋月白王宰夜相邀笛聲喧沔郡歌曲上雲霄江水在軍南漢水按桓宣傳宣鎮襄陽石季龍使騎七千渡沔襲之則丨丨自襄陽以下在晋時皆名沔水杜牧漢江詩溶溶漾漾白鷗飛渌淨春深好染衣南去北來人自老夕陽長送釣船歸劉澄之山水記沔口古以為滄浪水即屈原遇漁父作歌處漢陽渡李白贈漢陽輔録事詩鸚鵡洲橫丨丨丨水引寒煙沒江樹又云漢口雙魚白錦鱗今傳尺素報情人煙波灣在漢陽西北三十里唐崔皓詩日暮鄉關何處是煙波江上使人愁鎖穴在大别山即孫皓以鐵鎖鎖江處堂亭漢廣堂在軍治南紀樓在軍治夏倪詩江發岷山如甕口漢從嶓冢又東流滔滔從此為南紀我憶禹功時倚樓秋興亭在軍治後山巔唐刺史賈載建中書舍人賈至云詩人之興秋最髙故以名亭竹齊唐張渭題從弟沔州判官丨丨詩竹裏藏公案花間隱使車名宦陶侃王敦表丨丨為荆州刺史鎮沔陽皇朝游酢為知軍彭乘益州人為漢陽判官乞歸侍養冠凖薦之召為集賢校理求便親得知普州舊制蜀人不許赴蜀官特恩自乘始名賢李白乾元間遷夜郎過此嘗游南湖題詠漢陽抱青山唐李羣玉詩云云飛樓映襄渚白雲蔽黃鶴緑樹藏鸚鵡水從嶓冢來王貞白曉泊漢陽渡詩雲向蒼梧去云云西州風物好溫庭筠詩云云遙見武昌樓漢水橫衝蜀浪分杜牧之寄牛相公詩云云夾江分命兩諸侯曽子固送漢陽守詩楚國封疆最上頭云云四六疏綍嚴宸擁麾古沔分南北之一江置東西之二郡湖浸郎官之風月洲橫處士之煙波禹貢披圖大别之名自古周南紀詠漢廣之化至今源出蜀江欲重上流之勢州臨沔水遂分太守之符畫地為疆昔特稱於支邑夾江分命今仍託於附庸燕凝多暇不妨泛月於南湖馹召亟馳行即就雲於北闕方輿勝覽卷二十七
