body:
  text: 方輿勝覽卷四十五宋祝穆撰真州揚子六合建置㳂革禹貢揚州之域為斗牛之分星紀之次春秋為吳楚二國之境五代並屬揚州僞吳置迎鸞鎮國朝太祖升迎鸞鎮為建安軍尋以揚州之永正縣𨽻焉又割揚州之六合縣併𨽻於軍六合本楚之棠邑也真宗以鑄聖像成升為真州淳化始建漕臺或兼大使後又升為儀真郡今領縣二治揚子淮東轉運置司事要郡名儀真見前㳂革注白沙見名宦門陳德林注風俗其俗躁徑郡國志云云市井荒陋郡志屢經焚掠云云茅簷草屋未盡革也民以魚鹽為業同上形勝望於淮右壯觀亭記朝廷次第郡邑固已丨丨丨丨當東南之水㑹見後歐陽公東園記江淮一都㑹司馬君實送吳處厚知真州序東南水陸要衝繫年録梁揚祖云云大江奔流壯觀亭記丨丨日夜丨丨羣山古今秀峙羅列目前應接不暇山川橫山在揚子西三十里與丫山方山鼎峙方山隋朝六宫居之瓜步山鮑昭丨丨丨文云因逈為髙據絶作雄凌清瞰逺擅竒含秀小銅山去揚子縣二十里相傳吳王鼓鑄之所赤岸山其山巖與江岸數里土色皆赤羅君章詩云丨丨若朝霞郭景純江賦云鼓洪濤於丨丨六合山即定山在縣北八十里其山有六峰相接連吳敏白鼉泉逹磨觀音兩巖序巖壑之秀殆非淮南有蜀岡在揚子縣西北自胥浦至江都界並謂之丨丨以其來逺也揚子江在揚子縣南與鎮江分界運河在城南其東通維揚胥浦詩話總龜子胥解劍渡江之所五馬渡在宣化山之陽為建康往來津渡之要晉五王南渡於此回軍渡在六合縣藝祖皇于帝以舟師伐李璟瓜步振旅凱旋因名云瓦梁堰即滁塘也王謂滁河而上數百里巨細駢比合五十四流輻凑於此堰亭圃壯觀亭在城北五里山之頂米元章書榜有賦云壯哉江山之觀也又詩云邀賔丨丨不辭寒玉立風神氣上干欲識謝公清興處千山萬嶺雪漫漫溪隂亭在縣東范氏園蘇子瞻嘗有詩東園施正臣許子春為發運使作歐陽永叔記云真為州當東南之水㑹所謂丨丨者流冰橫其前清池漫其右髙臺起其北臺吾望以拂雲之亭池吾俯以澄虛之閣水吾泛以畫舫之舟敞其中以為清宴之堂闢其後以為射賔之圃芙蕖芰荷之的歷幽蘭白芷之芬芳與夫佳花美木列植而交隂此前日之蒼煙白露而荆棘也髙甍巨桷水光日景動搖而下上其寬間靚深可以答逺響而生清風此前日之頺垣斷塹而荒墟也嘉時令節州人士女嘯歌而管弦此前日之晦冥風雨鼪鼯鳥獸之嘷音也吾於是信有力焉王介甫詩十年遍歷人間事却繞新花認故叢南北此身知幾日山川長在淚痕中蔡君謨書時謂三絶舫齊在州治頗深廣寺觀長蘆寺元在丨丨鎮章獻明肅太后少隨父至京師長老勉之入京及垂簾聽政長老已往後問所需曰丨丨無三門后乃以本閣服用器物成之淳熙十二年徙於滁口山之東劉邠詩云越舶吳商倚萬橈紺園金剎起中霄魚龍聽法因多雨江海歸心每上潮林黑夜深燈影白川平天濶梵聲遙心知水陸俱調伏惜取靈犀不用燒王介甫舟過詩云木落草搖洲渚昏泊船深閉雨中門回燈秪欲尋歸夢兒女紛紛解笑言黃魯直阻風八丨丨丨詩福公開百室不借鄰國權法筵森龍象天樂下管弦我來雨花地依元薰爐煙金碧動江水鍾魚到客船茗碗洗昏著經行數阻年歲寒風落山故鄉喜言旋林回負赤子白璧乃可捐持親如履氷風雨渺暗川永定寺在六合縣其北有芳草澗韋應物過丨丨丨詩云獨憐幽草澗邊行上有黃鸝深樹鳴春潮帶雨晚來急野渡無人舟自橫儀真觀祥符間司天臺言建安軍西山有旺氣詔即其地鑄聖像時有青鸞白鶴景雲盤繞爐冶之處詔建丨丨丨立青鸞白鶴亭名宦唐王績為六合丞以周易老子置牀頭他書罕讀也著五斗先生傳醉鄉記自號東臯子皇朝胡宿為揚子尉大水溺民居令不能救宿曰拯溺吾職也即率公私舟以前所活數千人胡宗愈英宗朝李定自信州推官除御史知制誥蘇頌李大臨不草制皆落職歸班宗愈以舍人封還詞頭坐落職通判真州陳德林嘗為真州守蘇子瞻詩白沙何必煩此翁真州唐永正白沙鎮也吳處厚司馬君實送丨丨丨知真州詩云鄉託星屏駕今隨丞相車終朝容懶拙經歲庇迂踈共此趍雲闕旋聞建隼旟江淮一都會遊刃必多餘人物蔡薿自元祐中居其州崇寧間魁多士後任尚書蔡京宗盟結死黨詳見言行録孫洙錫之子錫年十九登第洙年十九亦登第舉制科與二蘇李邦直同選在三十三人之數題詠維舟至長蘆李白送趙明府赴長蘆詩云云目送煙霞髙搖扇對酒樓把袂持蟹螯江聲六合暮韓翃送郭贊善歸淮南駿馬淮南客歸時引望新云云楚色萬家春白紵歌西曲黃苞寄北人不知心賞後早晚見行塵金山只隔水蘇子由送董掾詩云云時復聽晨鐘分符江海衝前人奏課西南最云云夜江看斗辨西東歐陽永叔知滁州出儀真泛大江詩孤舟日日去無窮行色蒼茫杳靄中山浦轉帆迷向背云云升州一日到真州彭汝礪真州江亭詩潮落淮風起不收云云多情楊柳能青眼底事波瀾亦白頭當使淮人服教條王介甫送吳仲純守儀真詩江上齊船駐彩橈鳴笳應滿緑楊橋久為漢吏知文法云云拱木延陵瞻故國叢祠瓜步認前朝登臨莫負山川好終欲東歸聽楚謡四六分符江國將漕淮壖臺府兼榮節麾交耀遂以偏師獨當一面每嚴素備自折遐衝維儀真之名郡控揚子之要津內護江流之險外當淮甸之衝當樵蘇供億之繁賴醝茗阜通之利使節肅持既重將輸之任州符兼綰尤嚴保鄣之圖闤闠蕭條蓋薦經於蹂􅏳里閭安靜尤有賴於撫摩居東南之水㑹可謂要津控西北之風寒實為重鎮郡圃相羊細讀東園之記江樓倚徙好賡北固之詩通州靜海海門建置㳂革禹貢揚州之域星土分野與泰州同春秋屬吳滅屬越戰國屬楚秦屬九江郡漢屬臨淮東漢晉屬廣陵郡隋初郡廢屬江都郡唐屬揚州南唐氏於海陵之東境置靜海都鎮制置院周世宗建靜海軍為通州皇朝因之後改曰崇川尋復為通州今領縣二治靜海事要郡名通川崇川其民苦窳而貧朱彥海山樓記訟庭多虗郡守楊阜作通州圖序云云囹圄空隙殆有古之淳風仕宦之樂土曽曲阜行宋湜知通州制淮海之濵專城而治不領於吏部而選於朝廷非以其獄訟稱簡魚稻饒足為云云耶利市州談苑先是數舉士人至辟雍者皆不利大觀中朱侍郎彥為守始移壯武營射垜不使壓州學上當年所解三名至辟雍皆上舍選太守教官及考官皆轉一官以其全榜皆過御筆添解額十名通州號為丨丨丨魚稻饒足曽曲阜行宋湜知通州制民以魚鹽為業俞授能劄子形勝瀕海控江俞授能劄子通之為郡云云南通閩粵北通齊魯旁通吳越揚阜序南瀕吳會列壤相望云云東北當海口繫年録知通州郭凝奏云云南接大江最為要害極淮之南海山樓記通為州云云距海之濵風帆海道揚阜序云云土産鹽户納鹽長編云云舊以布泉茶米等折償其直開寶庚辰詔折以錢今官為鹽鈔山川狼山在靜海縣南五山相連陶隱居注曰狼五山在海中對勾章岸今直呼為丨丨山下有拇窠上有鞭迹皆著石或云始皇履是山且鞭以投海中不知何據尚書郎齊郭有歌曰祖龍神兵驅不得揮電成鞭有遺迹及觀六帖云始皇作石橋過海有神人能驅山下石去不速者神輒鞭之云淳化中邑長楊鈞乞改狼為琅趙閲道詩云丨丨五峯髙下壓淮壖郡任伯雨詩狼去青山迹已陳惟餘樓閣向南薰軍山在江際海門島長編國初以來犯死獲貸者多配𨽻登州沙門島通州丨丨丨皆有屯兵使者領護料角海門有丨丨其中有鹹淡二水不相混雜舟人不待汲能辨之形勢控扼紹興中差舟師把隘其沙脉坍漲不當潮小則委蛇曲折水路可見潮大水則一槩漫沒非熟於往來者未易知也李實膠西之捷以此大海去海門縣東八十里澠水燕談熙寧四年髙麗遣使修貢將由四明登岸為海風飄至新港先以狀致通州云望斗極以乘槎初離下國指桃源而迷路誤到仙鄉其同行朴寅亮詩尤精如泗州龜山詩門前客棹洪濤急竹下僧棊白日閒大江在靜海縣南十五里運河周世宗侯仁矩鑿渠四十里接泰州時被其利南布洲舊是大海其中沙漲復為洲東布洲元是海嶼沙島之地堂亭淮南道院楊廷秀談苑通州南阻江東北瀕海士大夫罕至居民以魚鹽自給不為盜賊訟希事簡仕宦者最為逸士大夫號通州為丨丨丨丨三㑹亭在狼山東顧巨海南瞰長江吳楚煙雲勝槩一覽周盡樓閣海山樓在城上陳瑩中作青玉案云碧空黯淡寒雲繞聽枕上風聲峭明透紗窗初欲曉珠簾才捲美人驚報一夜青山老使君留客金樽倒正千里瓊瑶未經掃欺壓梅花春信早十分農事滿城和氣管取來年好陳博古有詩云門下丨濤奔鐵騎檻前丨背擁金鼇南門樓鄉僧妙瑛云崇寧門有青巾白袍偉丈夫見於其上蓋吕洞賔也狼山閣賢良齊唐有詩海腹藏吳楚天樞轉斗牛夜分驚日浴潮退見鯨遊名宦王素為守吕夷簡嘗通判通濠二州往河北接行水灾還奏免天下農器之算范仲淹監西溪倉建白於朝請築堤於三州之境以衛民田元絳知靜海縣時私販鹽至二十斤請坐徒絳曰海旁之民斥鹵不毛恃鹽以生自是非羣販者止笞罰沈興宗為海門令王介甫為撰海門興利說嶽飛為通泰鎮撫使人物吳及字幾道年十七以進士起家直昭文館兼知桂州姚原道知吉州黃太史嘗志其墓張東喬以父䕃補官年十六以文潞公起復調泰興簿包孝肅公司馬溫公皆愛重之張次山公明直節受知包孝肅及溫公嘗知泰州題詠曲渚留越船趙閲道詩云云遙岑辨吳分逺水南回建業船夏子喬侍父監通州鹽場登狼山賦詩云渡口人稀黯翠煙登臨嘗怯夕陽天殘雲右倚維揚樹云云山引亂猿啼古樹電驅甘雨過聞田季鷹死後無歸客江終上鱸魚不直錢公時年十七識者謂甘雨過閒田雖有為霖之志無澤物之功江氣南吞吳分野楊士彥題狼山詩云云海波北撼楚封陲四六輟從朝路擢守海邦通川名郡淮甸奧區左臨淮甸右控海沂彈壓江流隄防海道以洙泗之遺教易淮海之陋風富商豐魚鹽之利章甫喧弦誦之聲豈特富魚鹽之利抑將資保鄣之雄海邦千里幸安魚稻之居魏闕九重徒結鼓鐘之戀觀山海上重尋清獻之舊遊詠雪樓頭曽入了齊之樂府通浙並淮昔宦遊之樂土控江瀕海今備禦之要津泰州海陵如臯建置㳂革禹貢揚州之域為牛斗之分星紀之次春秋屬吳後屬越戰國屬楚秦屬九江郡漢初以封吳王濞海陵屬焉東晋分廣陵置海陵郡唐初置吳州更海陵縣曰吳陵縣南唐升為泰州相傳以為取通泰之義皇朝中興為通泰鎮撫使後仍為州今領縣二治海陵淮東提刑提舉置司事要郡名海陽郡志晉以海陵為丨丨以其地並海而髙故名吳陵唐改海陵曰丨丨風俗性多朴野吳陵志見下注俗務儒雅吳陵志雖窮巷茅茨之下往往聞弦誦聲有屯田煮海之饒按江南李主時㕔壁記以海陵云云因建為泰州幽邃肥美吳陵郡志引晉中興書云海陵丨丨而地丨丨故民事耕桑樵漁而性多朴野耻以浮薄相夸鮮出機巧謀利雖無富强豪右而家亦自給賜鼓角門㦸皇祐間大㕔題名載周世宗云云海陵倉粟流衍枚乘說吳王曰吳實富天子轉粟西鄉陸行不絶水行滿河不如海陵之倉左思吳都賦䚕丨丨之丨則紅丨丨丨土産鹽課與解池等皇朝皇祐間通泰二州云云歲終四百萬緍山川天目山在海陵縣東六十里寰宇記云土山也山有雙井相對其水清冽發運使蔣之竒開古井獲金龍玉璧三十六羅浮山在海陵縣澤藪中不為水所沒遙望如丨丨丨摩訶山在揚子江中流亦名蝦蟆吕城山縣東三十里髙一丈形如城於祈湖縣東北四十里雞雀湖縣東北五十里包老湖縣北四十里湖水清而無滓挈壺氏取以供滴漏捍海堰在海陵縣百五十三里大唐李承創范仲淹重築吕伯恭修桑子河堰記淳熙元年夏六月泰州東部湖大上敗丨丨丨詔州與使者參治維堰初作於文正范公首起海陵尾屬鹽城衡二縣間百餘里及是半圯於水有司繕築未幾以訖工聞獨桑子河以南徑如臯境繚許氏莊後皆文正規略所未及詔以委今魏侯甫半月堰成井泉天女繅絲井在西溪鎮西廣福院相傳漢董永所居井即丨丨汲以丨丨者樓閣望京樓曽密公詩見後題詠安邊樓在郡城上可以逺眺芙蓉閣曽正臣詩云參差紅菡萏迤邐緑菰蒲沙鷺窺吟捐風蟬入坐隅堂舍淮東道院在州治大㕔之東海陵地僻少訟故以丨丨丨丨名之左丞陸農師到任謝表云飛蚊漸少頗無澤國之風過客甚稀至有道堂之號清風堂自五代時疊石為山髙三丈五尺東西十丈有五尺翼以兩徑為登陟之階咸平中曽密公以户部員外郎知州事有郡圃山亭六詠丨丨丨詩云更無塵土當軒起只有松蘿繞檻生紹興間其孫文昭公肇復典是郡文昭之父易占又嘗知如臯縣以三世守官海陵遂立三至堂云文㑹堂范希文書滕子京從事丨丨丨詩云東南滄海郡幕府清風堂詩書對周孔琴瑟視羲黃君子不獨樂我朋來無方又云一學許周查三仙周陳唐德星一聚㑹千載有餘光五賢堂在光孝寺內祠張發運綸范希文富彥國嘗侍父為征官讀書於此又增郡之先賢胡侍講王內翰為丨丨丨狀元坊在市河西即王右司所居宣和間為大魁而郡志不書其名古跡髙麗鼓在西溪鎮聖果院相傳保大中海沙飄至范希文詩千年人已化三昧語空傳唐世今尤在丨丨丨半穿即此也古井欄在聖果院相傳僞唐保大中造舊有人迹深寸許今復生合而志文亦漫滅莫辨蓋活石云按歐陽公集古目録有李陽氷書縉雲三碑篆刻最細瘦世言此三碑皆活歲久漸生刻處幾合故細耳亦此類也富鄭公讀書堂在景德寺之東韓子蒼詩藤床瓦枕快清風破悶文書亦謾供鄉信未傳霜後鴈旅懷生怯曉來鐘淹留已辦三年計流落應無萬户封猶有壁間詩句在他時誰為寫塵客小兒塜在州宅之東有墳數十宋江南初主本徐溫養子及僣號遷徐氏於海陵中主繼統用謀士齊丘計徐氏無男女少長皆殺之後齊丘有一丨丨病有老樂工作一詩書紙鳶上放入齊丘第中其詩云化家為國實良圖總是先生畫計謨一箇小兒拋不得上皇當日合何如謂此也名宦皇朝曽致堯為守曽肇致堯孫為守韓琦以侍中知泰州時以卧病適夢以手捧天者再不覺驚悟其後受顧命援英宗於藩邸翼神宗於春宫捧天之祥已肇於此矣吕夷簡監西溪鹽場皇朝類苑云吕文靖嘗官於此手植牡丹一本有詩刻其後范文正亦嘗臨涖復題一絶云陽和不擇地海角亦逄春憶得上林色相看如故人以二公詩筆故題詠極多而花亦為人所貴重范仲淹公為西溪鹽官嘗築捍海堤景德寺有生祠監倉楊阜作畫像詩云青衫下僚名世髙節捍患禦灾豈不在余又云我思范公水逺隄長滕子京為郡從事劉攽自道山倅海陵詩云壁間金闕倚天開五見宫花落晚梅明日扁舟滄海去却尋雲氣訪蓬萊蘇子瞻送行詩君不見阮嗣宗臧否不掛口休誇舌在齒牙牢是中惟可飲醇酒吳本中調海陵縣尉張次山為守嘗有鸛集戒石前若有所訴次山諭鸛使先飛令兵官隨往鸛集一大木上蓋鄰側有取其二雛烹食者即以其人至府鸛亦同至次山為治其罪鸛乃飛去張綸為制置發運後自請兼州築堤堰范希文為作生祠記詩云海陵嗷嗷古防弗牢萬頃良膏嵗凶於濤又云草奏屢逹狂議四遏心過金鐵對天不奪又云盤盤偃偃百里而逺如天作旱奠萬家産朝以公賢兼于蕃宣云云趙抃知海陵縣嶽飛建炎四年為通泰鎮撫使人物查道南唐文徽之孫鑿氷求鱖以飬母竹間見一蹄金而掩之查陶南唐近臣太宗知其名除監察御史後贈兵部尚書周孟陽終天章閣待制少遊經山賦詩有地髙多與風雲㑹天近常為日月鄰之句人以為遭遇英宗之符胡瑗字翼之海陵邑人自明道景祐以來學者稱海陵先生暨泰山孫明復石守道先生嘗為湖州州學教授邊防水利各居一齊王觀洽聞强記善屬文王覿為翰林學士後以黨禍奪官題詠人家匝海隅曽正臣望京樓詩云望京樓上望望久思踟蹰境上連江徼云云隔山人隱映近郭水縈紆雨過風腥檻潮來岸浸蘆野水粘天鸛鶴飛吕本中至海陵詩江村遇雨蓬麻亂云云吏散重門印不開鮑容寄海陵縣韓長官詩云云玉琴招鶴舞徘徊野人為此多東望雲雨仍從海上來香粳炊熟泰州紅陸務觀對食戲作云云苣甲蓴絲放箸空四六眷惟海陵實冠甸海眷此海邦號稱名郡有煮海摘山之大利當航川梯嶠之要津鹽鹺轉餉嵗益於商緡薪粲論輸日交於吏案暫違丹闕望雲氣於蓬萊來駕朱轓息風濤於瀚海土風淳厚人自足於魚鹽吏隱豐餘地不驚於烽燧海隄功著想范文正之遺風道院名標追陸左丞之故事方輿勝覽卷四十五
