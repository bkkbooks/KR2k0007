  text: 欽定四庫全書史部十一地理類二總志之屬
  hash: sha256:f61628df09a0b8ef9c8528ce2eb496dd0c84fff925181ca65dd32bd33de9804e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0007_WYG_000-1a, image: WYG0471/WYG0471-0521a.png}
body:
  text: 方輿勝覽目録宋祝穆撰今將每郡事要標出卷首餘並倣此郡名風俗形勝土産山川學館堂院亭臺樓閣軒榭館驛橋梁寺觀祠墓古迹名宦人物名賢題詠四六卷一浙西路共八州行在所臨安府古杭州節度寧海軍九縣錢塘於潛仁和新城餘杭鹽官臨海昌化富陽本路安撫兩浙轉運置司事要如前卷二平江府古蘇州節度平江軍六縣吳縣常熟長洲吳江崑山嘉定浙西提刑提舉置司事要如前卷三鎮江府古潤州節度鎮江軍三縣丹徒金壇丹陽淮東總領置司嘉興府古秀州四縣嘉興海鹽華亭崇德事要並如前卷四安吉州古湖州節度昭慶軍六縣烏程長興歸安德清安吉武康常州四縣晉陵無錫武進宜興事要並如前卷五建德府古睦州節後改嚴州遂安軍度六縣建德分水淳安遂安桐廬夀昌江隂軍一縣江隂事要並如前卷六浙東路共七州紹興府古越州節度鎮東軍八縣會稽蕭山山隂餘姚嵊縣上虞諸暨新昌本路安撫提刑提舉置司事要如前卷七慶元府古明州節度奉國軍六縣鄞縣慈溪奉化象山定海昌國衢州五縣西安常山江山開化龍逰婺州保寧軍節度七縣金華永康東陽武義義烏浦江蘭溪事要並如前卷八台州五縣臨海寧海黃巖仙居天台事要如前卷九瑞安府古溫州四縣永嘉平陽瑞安樂清處州七縣麗水縉雲龍泉青田松陽慶元遂昌事要如前卷十福建路共八州福州威武軍節度十三縣閩縣古田侯官長樂連江福清懷安永福閩清長溪福安羅源寧德本路安撫提刑西外宗正置司邵武軍四縣邵武泰寧光澤建寧事要並如前卷十一建寧府古建州節度建寧軍七縣建安崇安甌寧松溪嘉禾政和浦城福建轉運提舉置司事要如前卷十二南劔州五縣劔浦將樂順昌尤溪沙縣泉州平海軍節度七縣晉江永春南安安溪同安德化惠安南外宗正福建市舶置司事要並如前卷十三興化軍三縣莆田興化仙逰漳州四縣龍溪龍巖漳浦長泰汀州六縣長汀武平寧化清流上杭蓮城事要並如前卷十四江東路共九州建康府古升州節度建康軍五縣上元溧水江寧溧陽句容本路安撫兼留守本路轉運淮西總領置司事要如前卷十五太平州三縣當塗繁昌蕪湖寧國府寧國軍節度六縣宣城寧國南陵旌德涇縣太平事要並如前卷十六徽州古歙州六縣歙源婺休寧績溪祈門黟池州六縣貴池銅陵青陽石堞建德東流事要並如前卷十七南康軍三縣星子都昌建昌事要如前卷十八信州六縣上饒貴溪玉山鉛山弋陽永豐饒州六縣鄱陽樂平餘干德興浮梁安仁都大坑冶江東提刑置司廣德軍二縣廣德建平事要並如前卷十九江西路共十一州隆興府古洪州節度鎮南軍八縣南昌武寧新定豐城奉新進賢分寧靖安本路安撫轉運置司袁州四縣宜春萍鄉分宜萬載事要並如前卷二十贑州古虔州節度昭信軍十縣贑縣會昌寧都瑞金雩都石城興國安逺信豐龍南江西提刑置司吉州八縣廬陵龍泉吉水永新安福永豐太和萬安瑞州古筠州三縣髙安新昌上髙事要並如前卷二十一撫州五縣臨川金溪崇仁樂安宜黃江西提舉置司建昌軍四縣南城新城南豐廣昌臨江府三縣清江新喻新淦事要並如前卷二十二江州定江軍節度五縣德化湖口德安彭澤興國軍三縣永興通山大冶南安軍三縣大庾上猶南康事要並如前卷二十三湖南路共十州潭州武安軍節度十二縣長沙攸縣善化湘鄉衡山安化湘潭益陽醴陵瀏陽寧鄉湘隂湖南轉運置司事要並如前卷二十四衡州五縣衡陽常寧耒陽茶陵安仁道州四縣營陽寧逺江華永明事要並如前卷二十五郴州六縣郴縣永興桔陽資興宜章桂東永州三縣零陵東安祁陽事要並如前卷二十六寶慶府古中州二縣邵陽新化全州二縣清湘灌陽桂陽軍三縣平陽藍山臨武武岡軍三縣武岡新寧綏寧茶陵軍一縣茶陵事要並如前卷二十七湖北路共十五州江陵府古荆南府度荆南軍節七縣江陵松滋公安石首潛江松江監利漢陽軍二縣漢陽汊川事要並如前卷二十八鄂州武昌軍節度六縣江夏咸寧蒲圻通城崇陽嘉魚湖廣總領湖北轉運置司夀昌軍一縣武昌事要並如前卷二十九嶽州四縣巴陵臨湘平江華容峽州四縣夷陵長陽宜都逺安荆門軍二縣長林當陽事要並如前卷三十常德府古鼎州節度武平軍四縣武陵龍陽桃源沅江湖北提刑提舉置司澧州四縣澧陽石門安鄉慈利辰州四縣沅陵辰溪盧溪溆浦事要並如前卷三十一沅州三縣盧陽黔陽麻陽靖州三縣永平通道會同德安府古安州節度安逺軍四縣安陸孝感應城雲夢復州二縣貴陵玉沙信陽軍二縣信陽羅山事要並如前卷三十二京西路共七州襄陽府古襄州四縣襄陽宜城榖城南漳本路安撫轉運提刑提舉置司隨州崇信軍節度二縣隨縣應山事要並如前卷三十三棗陽軍一縣棗陽郢州二縣長夀京山均州武當軍節度二縣武當鄖鄉房州保康軍節度二縣房陵竹山光化軍一縣光化事要並如前卷三十四廣東路共十四州廣州清海軍節度八縣南海東莞畨禺增城清逺新會懷集香山本路經略轉運提舉市舶置司肇慶府肇慶軍節度二縣髙要四會事要並如前卷三十五德慶府永慶軍節度二縣端溪瀧水封州二縣封川開建英德府古英州二縣真陽浛光韶州五縣曲江仁化翁源乳源樂昌廣東提刑置司事要並如前卷三十六潮州三縣海陽揭陽潮陽梅州一縣程鄉惠州四縣歸善海豐博羅河源事要並如前卷三十七循州三縣龍川長樂興寧連州三縣桂陽連山陽山南雄州二縣保昌始興南恩州二縣陽江陽春新州威塞軍節度一縣新興事要並如前卷三十八廣西路共二十五州靜江府古桂州節度靜江軍十縣臨桂修仁興安理定靈川古縣陽朔荔浦永福義寧本路經略轉運提刑提舉置司柳州三縣清平柳城洛容事要並如前卷三十九鬱林州三縣南流博白興樂橫州二縣寧浦永定雍州建武軍節度二縣宣化武緣廉州二縣合浦石康事要並如前卷四十象州三縣陽夀武仙來賔潯州二縣桂平平南藤州二縣鐔津岑溪梧州一縣蒼梧貴州一縣鬱林昭州四縣平樂龍平茶城立山事要並如前卷四十一融州清逺軍節度二縣融水懷逺賔州三縣嶺方上林遷江慶逺府古宜州節度慶逺軍五縣宜山思恩欣城河池天河賀州三縣臨賀桂嶺富川化州三縣石龍石城吳川事要並如前卷四十二髙州三縣電白茂名信宜容州寧逺軍節度三縣普寧陸川北流欽州二縣安逺靈山雷州三縣海康徐聞遂溪事要並如前卷四十三海外四州屬廣西路瓊州靖海軍節度五縣瓊山臨髙澄邁樂會文昌吉陽軍古崖州一縣寧逺昌化軍古儋州一縣宜倫萬安軍二縣萬寧陵水事要並如前卷四十四淮東路共九州揚州淮南軍節度二縣江都泰興本路安撫制置置司事要如前卷四十五真州二縣揚子六合淮東轉運置司通州二縣靜海海門泰州二縣海陵如臯淮東提刑提舉置司事要並如前卷四十六淮安軍古楚州三縣山陽淮隂鹽城寶應州一縣寶應髙郵軍二縣髙郵興化事要並如前卷四十七滁州三縣清流全椒來安招信軍古盱眙三縣盱眙招信天長事要並如前卷四十八淮西路共九州廬州保信軍節度三縣合肥舒城梁縣本路安撫制置轉運置司無為軍三縣無為廬江巢縣淮西提刑提舉置司安豐軍四縣夀春霍丘安豐六安濠州二縣鍾離定逺事要並如前卷四十九和州三縣厯陽烏江含山安慶府古舒州節度安慶軍五縣懷安望江桐城太湖宿松蘄州五縣蘄春廣濟蘄水羅田黃梅事要並如前卷五十黃州三縣黃岡麻城黃陂光州三縣定城光山固始事要並如前卷五十一成都府路共十六州成都府古益州九縣成都溫江華陽雙流郫縣廣都新都靈泉新繁本路安撫轉運四川制置總領提舉茶馬置司事要如前卷五十二崇慶府古蜀州節度崇慶軍四縣晉原江原新津永康簡州二縣陽安平泉嘉定府古嘉州節度嘉慶軍五縣龍逰峩眉夾江洪雅犍為本路提刑置司事要並如前卷五十三眉州四縣眉山丹稜彭山青神隆州四縣仁夀貴平井研籍事要並如前卷五十四彭州三縣九隴濛陽崇寧漢州四縣雒縣綿竹什邡德陽綿州五縣巴西羅江彰明鹽泉魏城事要並如前卷五十五雅州五縣嚴道百丈名山榮經盧山茂州二縣汶山汶川永康軍二縣導江青城事要並如前卷五十六威州二縣保寧通化邛州六縣臨邛大邑依政蒲江崇仁火井黎州一縣溪源石泉軍三縣石泉神泉龍安事要並如前卷五十七夔州路共十六州夔州寧江軍節度三縣奉節雲山巫山本路安撫轉運或四川制置置司事要如前卷五十八歸州三縣秭歸興山巴東雲安軍一縣雲安大寧監一縣大昌事要並如前卷五十九開州二縣開江清水達州古通州六縣通川新寧巴渠東鄉永睦明通萬州二縣南浦武寧事要並如前卷六十梁山軍一縣梁山施州二縣清江建始紹慶府古黔州二縣彭水黔江重慶府古渝州三縣巴縣壁江江津本路提刑置司南平軍二縣南川陸化事要並如前卷六十一涪州三縣涪陵武龍樂溫咸淳府古忠州五縣臨江南賔墊江龍渠豐都珍州二縣樂源綏陽思州三縣務川安夷卭水事要並如前卷六十二潼川府路共十五州瀘州三縣瀘川合江江安本路安撫置司潼川府古梓州十縣郪縣鹽亭平江飛烏涪城銅山通泉東關射洪永泰本路提刑置司事要並如前卷六十三遂寧府古遂州五縣小溪青石蓬溪遂寧長江本路轉運置司順慶府古果州四縣南充相如西充流溪資州四縣盤石內江資陽龍水普州三縣安嶽樂至安居事要並如前卷六十四合州五縣石照漢初巴川赤水銅梁紹熙府古榮州四縣榮德資官威逺應靈昌州三縣大足永川昌元渠州四縣流江鄰水鄰山大阡事要並如前卷六十五敘州古戎州四縣宜賔宣化南溪慶符懷安軍二縣金水金堂廣安軍四縣渠江新明嶽池和溪長寧軍一縣安寧富順監不領縣事要並如前卷六十六利州東路共十州興元府古褒州五縣南鄭褒城廉水西縣城固本路安撫提刑或制置置司利州四縣綿谷昭化葭萌嘉川本路轉運或四川總領置司事要並如前卷六十七隆慶府古劔州五縣普安武連隂平普成梓潼劔門關一縣劔門閬州七縣閬中奉國南部新政新井西水蒼溪事要並如前卷六十八蓬州五縣蓬池良山儀隴伏靈營山巴州五縣化城曽口難江通江恩陽金州昭化軍節度六縣西城石泉漢隂平利洵陽上津洋州三縣興道真符西鄉大安軍一縣三泉事要並如前卷六十九利州西路共八州沔州古興州二縣略陽長舉本路安撫置司天水軍一縣天水鳳州三縣梁泉河池兩當事要並如前卷七十西和州三縣長道祐川大潭同慶府古成州二縣同谷栗亭文州一縣曲水龍州二縣江油清川階州二縣福津將利事要並如前欽定四庫全書史部十一方輿勝覽地理類總記之屬提要臣等謹案方輿勝覽七十卷宋祝穆撰穆字和甫建陽人建寧府志載穆父康國從朱子居崇安穆少名丙與弟癸同受業于朱子宰執程元鳳蔡杭録所著書以進除迪功郎為興化軍涵江書院山長是書前有嘉熙已亥吕午序蓋成于理宗時所記分十七路各係所屬府州軍于下而以行在所臨安府為首蓋中原隔絶久已不入輿圖所述者惟南渡疆域而已書中體例大抵于建置沿革疆域道里田賦户口關塞險要他志乘所詳者皆在所略惟于名勝古迹多所臚列而詩賦序記所載獨備蓋為登臨題咏而設不為考證而設名為地記實則類書也然採托頗富雖無裨于掌故實有益于文章摛藻掞華恆所引用故自宋元以來操觚家不廢其書焉考葉盛水東日記稱元絳閔忠詩石刻在康州方輿勝覽乃載在封州又誤以為魏矼作亦偽數字幸真迹石刻尚存三洲巖中則小小舛錯亦所不免要不害其大致之詳贍爾乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀方輿勝覽序輿地有書尚矣自上世九丘既逸而夏之禹貢周之職方燦然明備至秦郡縣天下兩漢遂有地理郡國志厯代多放之唐圗十道皇朝志九域皆是物也然秉筆紀載實難文獻不足無以參稽而互考非足履目覩則真贋詳略何從信之司馬遷貫紬經傳旁採子史又聞長老之所稱而必觀九江望五湖闞洛汭行淮泗而後成河渠之書東方朔誦詩書二十二萬言三冬文史足用又隨師踐赤縣遨五嶽行澤陂厯名山猶以所見參酌山海經而後神異經十洲記始作學問不博聞見不廣涉厯不親而欲會集四海九州山川風俗土産景物人材文章名數沿革之詳特誣而已建陽祝穆和父氏新安人朱文公先生之母黨也幼從文公諸大賢遊性溫行淳學富文贍雅有意于是書嘗往來閩浙江淮湖廣間所至必窮登臨與豫有舊每相見必孜孜訪風土事經史子集稗官野史金石刻列郡志有可採托必晝夜抄録無倦色蓋為紀載張本也且許異日成編當以相示如是者纍年近訪豫錢塘馬城之竹坡曰編成矣敢名以方輿勝覽而鋟梓以廣其傳庶人人得勝覽也君幸為序以冠其首豫丕視所載辭簡而暢事備而核各州風物見于古今詩歌記序之佳者率全篇登入其事實有可拈出者則纂緝為儷語附于各州之末較之録此而闕彼舉略而遺全循訛而失實泛濫于著述而不能含咀其英華者萬萬不侔也信乎其為勝覽矣學士大夫端坐􅐼几而欲周知天下操弄翰墨而欲得助江山當覽此書毋庸他及所謂執璿璣以觀大運據要會以觀方來不勞餘力盡在目中信乎其為勝覽矣雖然我瞻四方禹迹茫茫思日闢于先王慨未歸于故疆必也志存乎修攘步極乎亥章使吾和父涉厯彌長聞見彌詳紀載益鋪張而勝覽益輝煌是乃為邦家之光豫尚得以攫攘其旁嘉熙己亥良月望日新安吕午序自序始豫逰諸公間強豫以四六之作不過依陶公樣初不能工也其後稍識户牖則酷好編輯郡志如耆昌歜豫亦自莫曉其癖所至輒借圗經積十餘年方輿風物收拾略盡出以諗豫友乃見譏曰還如食小魚所得不償勞豫恍然自失益搜獵古今記序詩文與夫稗官小説之類摘其要語以附入之豫友又唶曰天吳與紫鳳顛倒在短褐豫復愧其破碎斷續而首末之不貫也又益取夫巨篇短章所不可闕者悉載全文大書以提其綱附注以詳其目至三易藁而體統粗備豫友亦印可焉豫猶未敢以為然也既又携以謁今御史吕公竹坡先生幸不斥以狂僣辱為之序走不足以當也嗟夫昔者孔子嘗曰為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之夫以一命令之出猶更四賢之手矧豫陋聞謏見徒以兩耳目之所及而欲該天下之事事物物坎蛙窺天其不量甚矣雖然世有揚子雲必知是編之不苟豈直為四六設哉若夫網羅遺逸啓發愚蒙豫方有望于博雅君子嘉熙己亥仲冬既望建安祝穆和父書先君子遊戲翰墨編輯方輿勝覽行于世者三十餘年學士大夫家有其書每恨板老而字漫爾益部二星聚臨閩分文昌實堂先生吳公漕兼府事乃遣工新之中書朔齋先生劉公府兼漕事又委官董之厥書克成兩先生賜也惟重整凡例拾遺則各附其州新增則各從其類合為一帙分為七十卷本朝名賢不敢書其諱依文選例謹以字書之此皆先君子欲更㝎之遺意洙又嘗記先君子易簀時語州郡風土續抄小集東南之景物略盡中原吾能述之圗經不足證也且朗吟陸放翁絶筆之詩曰王師北㝎中原日家祭毋忘告乃翁堂堂忠憤之志若合符節厥今君王神武江東將相又非久下人者雪恥百王除凶千古洙泚茟以俟大書特書不一書鋪張金甌之全盛于勝覽有光云咸淳丁卯季春清明孤從政郎新差監行在文思院洙謹跋今具引用文集于后是編搜獵名賢記序詩文及史傳稗官雜説殆數千篇若非表而出之亦幾眀珠之暗投今取全篇分類以便檢閲其一聯片語不成章者更不贅録蓋演而伸之則為一部郡志總而會之則為一部文集庶幾旁通曲暢云元本拾遺各入本州之下新增五百餘條除山川風俗等無詩文者餘並標出覽者詳之記秦少遊龍井記臨安下同歐陽永叔有美堂記白居易冷泉記蘇子美滄浪亭記平江下同朱元晦撰吳公祠記黃直卿撰尹公祠記錢君倚義田記孫逢吉普明記蘇子美水月禪院記新增范至能三髙祠記新增蕭㝎延陵季子廟記新增汪彥章月觀記鎮江蘇子瞻思堂記嘉興白居易太湖石記安吉范希文撰子陵祠記建德獨孤及新泉記常州新增陸農師適南亭記紹興吕伯恭修城記台州朱元晦經史閣記福建福州下同曽子固道山亭記朱元晦李忠定祠記朱元晦雲谷記建寧下同魏華父夢筆山房記朱元晦遊御史祠記武夷山古記㡢亭峰古記朱元晦髙士軒記泉州朱元晦龍巖縣學記漳州下同危逢吉義塜記朱元晦新安道院記徽州下同汪彥章清風堂記汪彥章書錦堂記朱元晦藏書閣記朱元晦三先生祠記范至文金蓋堂記新增曽子固思政堂記池州下同王平甫溪亭記杜牧蕭相樓記新增吕伯恭白鹿書院記南康下同朱元晦直節堂記朱元晦氷玉堂記張敬夫撰濂溪祠記朱元晦劉屯田祠記韓無咎絶塵軒記信州曽子固鼓角樓記廣德韓愈重修滕王閣記隆興下同朱元晦濂溪祠記李太白州學記袁州皇甫湜刺史廳壁記吉州黃魯直瑞芝亭記瑞州曽子固擬峴臺記撫州下同朱元晦拙齋記曽子固顔魯公祠記顔真卿麻姑壇記朱元晦濂溪祠記江州下同白居易司馬廳壁記張敬夫嶽