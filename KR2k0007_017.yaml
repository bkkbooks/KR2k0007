body:
  text: 方輿勝覽卷十七宋祝穆撰南康軍星子都昌建昌建置沿革禹貢荆揚二州之域吳地斗分野春秋吳楚之地戰國屬楚秦屬九江郡漢屬豫章晉置潯陽郡宋齊因之隋屬九江及豫章唐屬江州及洪州偽吳以其地立星子鎮國朝升為縣屬江州太宗時升南康軍又割洪之建昌饒之都昌𨽻焉今領縣三治星子事要郡名星渚康廬並見山川注風俗其在康哉太平興國六年相國張師亮轉漕江表請改邑為軍詔曰南方之俗云云可賜名南康軍以興教善俗為務張敬夫作濓溪祠記新安朱侯首云云乃立濓溪祠于學宫揖先儒淳固慤實之餘風吕伯恭作白鹿洞記云詳見後形勝負康廬面彭蠡南康志云云其西五峯彭圖南致霖亭記云云峭壁隱然在望者為廬阜其南巍嵐疊疊若來向者為蘇山十大禪剎廬山云云而山南居其六曰歸宗開元萬松棲賢羅漢慧日是也鐘梵相聞於青嵐白雲中唐吕和叔作裴氏海昏集序廬山云云山川廬山在城北十五里周武王時有匡俗兄弟七人皆有道術結廬於此山中仙去廬在故曰丨丨大史公亦嘗登廬山白樂天草堂記康廬竒秀甲天下李白丨丨謡我本楚狂人鳯歌笑孔丘手持緑玉杖朝别黃鶴樓五嶽尋仙不辭逺一生好入名山遊丨丨秀出南斗傍屏風九疊雲錦張影落明湖青黛光金闕前開二峯長銀河倒挂三石梁香爐瀑布遙相望廽崖疊嶂凌蒼蒼翠影紅霞隱朝日鳥飛不到吳天長登髙壯觀天地間大江茫茫去不還黃雲萬里動風色白波九道流雪山好為丨丨謡興因丨丨發間窺石鏡清我心謝公行處蒼苔沒早服還丹無世情琴心三疊道初成遙見仙人綵雲裏手把芙蓉朝玉京先期汗漫九垓上願接盧敖遊太清歐陽永叔作丨丨髙贈同年劉中允丨丨髙哉幾千仞芎根盤幾百里截然屹立乎長江長江西南走其下是為揚瀾左蠡兮洪濤巨浪日夕相舂撞雲消風止水鏡淨泊舟登岸而逺望兮上摩青蒼以杳靄下壓后土之鴻龎試往造乎其間兮攀緣石磴窺空谾千巖萬壑響松檜懸崖巨石飛流淙水聲聒聒亂人耳六月飛雪灑石矼仙翁釋子亦往往而逢兮吾嘗惡其學幻而言厖但見丹崖翠壁逺近映樓暗晨鐘暮鼓杳靄羅幡幢幽花野草不知其名兮風吹露濕香澗谷時有白鶴飛來雙幽尋逺去不可極便欲絶世遺紛厖羡君買田築室老其下插秧盈疇兮釀酒盈缸欲令浮嵐暖翠千萬狀坐卧常對乎軒窗君懷磊砢有至寶世俗不辨珉與玒䇿名為吏二十載青衫白首困一邦寵榮聲利不可以茍屈兮自非青雲白石有深趣其氣兀硉何由降丈夫壯節似君少嗟我欲説安得巨筆如長杠朱元晦詩登車閩嶺嶠息駕康山陽康山髙不極連峯欎蒼蒼金輪西崖峩五老東昻藏想象仙聖集似聞笙鶴翔林谷下凄迷雲關杳相望千巖雖競秀二勝終莫量仰瞻銀河翻俯視蛟龍驤長吟謫仙句和以玉局章疇昔勞夢思姟今幸徜徉尚恨忝符竹未愜棲雲房已尋兩峯間結屋依陽岡上有飛瀑駛下有清流長循名協心期弔古增悲涼壯齒乏竒節頺䄵矧昏荒誓將塵土蹤暫寄雲水鄉封章儻從願歸哉澡滄浪朝無咎題南康南麓江洲北五百僧房綴蜜牌盡是丨丨佳絶處不知何處合題詩王貞白題嶽立正南楚雄名天下聞五峯髙閉日九疊翠連雲夏谷雪猶在陰巖晝不分惟應嵩與華清峻得為羣屏風山在城南北四十里晏類要山有九疊川有九𣲖郡志丹崖紫壁縈繞磅礴若丨丨焉歐山在建昌相傳有歐岌得道此山蘇山在都昌吳時有蘇耽居于此乃七十二福地之數釣磯山在都昌郡國志晉陶侃嘗釣于此后得一梭化為龍而去石壁山在都昌有謝靈運樂石壁精舍靈運詩昏旦變氣侯山水含清暉清輝能娛人遊子淡忘歸出谷日尚早入舟陽已微林壑斂瞑色雲霞收夕霏芰荷迭映蔚蒲稗相因依披拂趨南徑愈悅偃東扉慮淡物自輕意愜理無違寄言攝生客試用此道推大小孤山在湖中詳見江州石鍾山同上石門山同上並不重載五老峯在廬山五峯相連故名浮圖老子之宫皆在其下李白詩云廬山東南丨丨丨青天削出金芙蓉九江秀色可攬結吾將此地巢雲松雙劒峯在開先院南香爐峯在城北山南山北皆見其形圓聳常出雲氣故名白居易詩倚石攀蘿歇病身青笻竹杖白紗巾他時畫出廬山障便是香爐峯上人紫霄峯在西北塔院后有夏禹石刻洪駒父詩塊視落星石柸觀彭蠡湖又云荒哉秦漢君抗旌上﨑嶇永懷太史公九江觀禹謨漢陽峯在廬山上獅子峯在五老峯之東金輪峯在歸宗寺後有丨丨丨三大字鐵船峯許旌陽傳旌陽與吳猛乘鐡船二龍挾而行戒勿妄視至紫丨丨茂林戞擊有聲舟人竊視之龍即委之而去船墮于此凌霄峯在昭德之北巉巖萬狀凌雲峯在城東十三里上插空碧下吞江湖上霄峯始皇嘗登于此蓮花峯在廬山行峯言如丨丨而朝北斗也山上有淵明醉石右軍鵝池楊廷秀詩淵明醉眠處石上印耳迹逸少玩鵝池蘚花漬餘墨石鏡峯在金輪峯側下有溪三石梁潯陽記廬山有丨丨丨長𢾗尺廣不盈尺杳然無底吳猛與弟子躡石梁而度見金闕玉房地皆五色見一老翁坐桂樹下以玉杯承露與猛青牛谷在五老峯下九江録昔有道士洪志乘青牛得道于此張固白鶴觀記豫昔至九江士石室之崖以瞰青牛蓋天下山川秀拔處也唐楊衡詩隨雲步入丨丨丨青牛道士留我宿可憐夜靜月明中惟有壇邉一枝竹錦繡谷廬山記竒花異草不可殫述三四月間紅紫匝地如丨丨故名王介甫送黃吉父赴官南康詩還家一笑即芳辰好與名山作主人邂逅五湖乘興往相邀丨丨丨中春彭蠡湖在城東南五里禹貢丨丨既瀦又曰東匯澤為丨丨又名宫亭丨又名左蠡湖謝靈運詩客遊倦水宿風潮難具論洲島驟廽合坼岸屢崩奔乘月聽哀狖浥露馥芳蓀春晚緑野秀巖髙白雲屯千念集日夜萬感盈朝昏攀崖照石鏡牽葉入松門三江事多往九𣲖理空存靈物吝珍怪異人祕精魂金膏滅明光水碧輟流溫徒作千里曲絃絶念彌敦李白詩謝公入彭蠡因此遊松門余方窺石鏡兼得窮江源前賞迹可見后來道空存而欲繼風雅豈惟清心魂雲海方助興波濤何足論青嶂憶遙月緑蘿鳴愁猿緑碧或可採金膏祕莫言古今將振衣羽化出塵煩朱元晦詩茫茫彭蠡春無地白浪春風濕天際東西捩拖萬舟回千嵗老蛟時出戲少年輕事鎮南來水怒如山帆正開中流蜿蜒見春尾觀者膽墮豫方咍衣冠今日龍山路廟卜沽酒山前住老矣安能學佽飛買田欲棄江湖去有宫亭廟能分風黃魯直詩云左手作圓右手方世人機敏便可爾一風分送南北舟斟酌鬼神宜用此井泉溫泉在建昌白居易詩一眼湯泉流向東潯泥燒草暖無窮驪山溫水因何事流入金鋪玉甃中朱元晦詩連山西南來中斷還崛起干霄幾千仞據地三百里飛峯上靈秀衆壑下清美逮兹勢力窮猶能出竒偉誰燃丹黃焰㸑此玉池水客來爭解帶萬劫付一洗當年謝康樂弦絶今久矣水碧復流溫相思五湖裏自注云康樂湖中詩云水碧綴流溫豈未見此水耶明月泉在郡治嘗以名酒黃太史有銘學校白鹿書堂唐李渤與兄涉俱隱于此山嘗養一白鹿因名之南唐升元中建學館以李道為洞主掌其教授長編云太平二年知江州周述言廬山白鹿洞學徒嘗𢾗千百人乞賜九經使之肄習詔國子給本仍傳送之吕伯恭白鹿洞書院記淳熙六年南康軍秋雨不時髙仰之田告病郡守新安朱侯熹行視陂塘並廬山而東得白鹿書院廢址慨然顧其僚曰是蓋唐李渤之隱居而太宗皇帝驛送九經俾生徒肄業之地也書院創於南唐其事至鮮我太宗於訙掃區宇日不暇給之際奬勸封殖如恐弗及規模逺矣中興五十年釋老之宫圮于寇戎者斧斤之聲相聞各復其初獨此地委于榛莽過者太息庸非吾徒之恥哉郡雖貧薄顧不能築室𢾗楹上以宣布本朝崇建人文之大指下以續先賢之風聲於方來乎乃屬軍學教授揚君大法星子縣令王君仲傑董其事又以書命祖謙記其成祖謙切嘗聞之諸公長者國初斯民新脫五季鋒鏑之厄學者尚寡海內向平文風日起儒先往往依山林即間曠以講授大率多至𢾗十百人嵩陽嶽麓睢陽及是洞為尤著天下所謂四書院者也祖宗尊右儒術分之官書命之祿秩賜之扁榜所以寵綏之者甚偹當是時士皆上質實下新竒敦行義而不偷守訓詁而不鑿雖學問之淵源統紀或未深究然甘受和白受采既有進德之地矣慶歷嘉祐之間豪傑並出講論益精至于河南程氏橫渠張氏相與倡明正學然後三代孔孟之教始終條理於是乎可考熙寧初明道先生在朝建白學制教養考察賓興之法綱條甚悉不幸王氏之學方興其議遂格有志之士未嘗不嘆息於斯焉建炎再造典型文憲浸還舊觀關洛緒言稍出於毁棄剪滅之餘晚進小生驟聞其語不知親師取友以講求用力之實躐等陵節忽近慕逺未能窺程張之門庭而先有王氏髙自聖賢之病如是洞之所傳道之者或鮮矣然則書院之復豈茍云哉此邦之士盍相與揖先儒淳固慤實之餘風服大學離經辨志之治教由博而約自下而髙以答楊熙陵開迪樂育之大德則於賢侯之勸學斯無負矣至於考方志記人物亦有土者所當謹若李濬之之遺迹固不得而略也侯於是役重民之勞賦功已狹率損其舊十七八力不足而意有餘矣興廢始末見於當塗郭祥正所記者皆不書朱元晦詩清冷寒澗水窈窕青山阿昔賢有幽尚眷言此婆娑事往今幾時髙軒絶來過學館空廢址鳴弦息遺歌我來勸相餘杖䇿塞緑蘿謀野欣有獲披圖知匪訛永懷當年盛莘莘襟佩多博約感明恩涵濡熙泰和凄涼匆荒榛俯仰驚頺波發教逮綱紀喟然心匪他伐木循陰岡結屋依陽坡一朝謝塵濁歸哉碩人薖昔人讀書地町疃白鹿場世道有升降兹焉更表章矧今中興年治具一以張弦歌獨不嗣山水無輝光荒榛適剪除聖謨已汪洋亦有皇華使肯來登此堂問俗良懇惻懷賢增慨慷雅歌有餘韻絶學何能忘堂舍五老堂蘇子由詩五老髙間不入城開軒肯就使君迎坐中不著間賔客物外真成大弟兄黃太史月明如晝九江水天靜無雲丨丨峯直節堂在郡圃朱元晦記云庭有八杉欒城蘇文定公為郡守徐君師回作記又手書而刻石焉某來領郡問堂所在則既無有而杉亦不存求之記文則又非復故刻而委之他所矣獨廳事之旁有堂旡額而庭中有老柏焉焚斫之餘生意殆盡而屹立不僵如志士仁人更歷百變而剛毅特立凜然不衰者因取直節寓之此堂而輦記石陷壁間以倣佛前賢之意云氷玉堂劉渙隱廬山子恕取蘇轍所謂潔亷不撓氷清玉剛之語名其祠張耒為記朱元晦記云郎劉凝之故居之遺址顧今百年之外臺傾沼平鞠為灌莽而使樵兒牧子皆得以嘯歌躑躅於其上又何其可悲也郡守曽侯致虛出少府羡錢贖於民間遂作氷玉之堂而繪劉公父子之象於其上且聞陳忠肅公之嘗館於是也又繪其象以侑焉愛蓮堂周茂叔嘗守是邦後人作是堂於郡圃朱元晦書丨丨二字濓溪愛蓮説云水陸草木之花愛者甚蕃晉陶淵明愛菊自李唐來世人甚愛牡丹豫獨愛蓮出於淤泥而不染濯於清漣而不妖中通外直不蔓不枝香逺益清亭亭淨植可逺觀不可褻玩焉豫謂菊花之隱逸者也牡丹花之富貴者也蓮花之君子者也噫菊之愛陶后鮮有聞蓮之愛同豫者何人牡丹之愛宜乎衆矣拙齋朱元晦書扁以濓溪拙賦命名樓觀黃雲觀在書院東北五里折桂院後取李白萬里黃雲動風色之句朱元晦詩城中東北望五老何蒼蒼下有前朝寺一原頗深窗亦明潔著此瑞錦張林澗幽屋后雲木蒼間更能理枯筇步上林北岡仰視天宇闊俯瞰江流長受書彼何人姓字不足詳竹帛有遺臭桂樹徒芬芳李逢吉嘗讀書此院以故得名金芙蓉觀在郡圃朱元晦取唐李白菡蓞金芙蓉之句以命名卧龍庵在城西北二十里朱元晦繪諸葛武侯像於庵中為記云豫少時讀龜山先生楊公詩見其説卧龍劉君隱居辟榖木食澗飲蓋已度百嵗而神清眼碧客至輒先知之庵中怒瀑中㵼大壑淵深有黃石𢾗丈在激浪中蜿蜒飛鬭故名丨丨又緣名潭之義畫漢丞相諸葛公象置之堂中朱元晦詩空山龍卧處蒼峭神所鑿下有寒潭幽上有明河落我來愛佳名小築寄幽壑永念千載人丹心豈今昨英姿儼繪事凛若九原作寒藻薦芳馨飛泉奉明酌公來識此意顧步慘不樂抱膝一長吟神交付冥漠清淨退庵在棲賢西三里劉凝之舊隱作亭取黃太史詩語朱元晦詩凌兢度三峽窈窕復一原絶壁擁蒼翠奔流逝潺湲聞昔避世人寄此茅三間壯節未云逺髙風杳難攀尋深得遺址縳屋臨清灣坐睍寒木杪飛泉舞雲關兹遊非昔遊纍解身復間保此清淨退當歌不能諼亭榭折桂亭在郡治背倚五老峯面對大江千島萬溆出沒煙雲波浪間真竒觀也玉淵亭在棲賢寺門外澗中白石不以𢾗計如卧羊故曰丨丨張安國書二字仍作詩云靈源直上與天通借路來從五老峯試向欄杆敲柱杖為君喚起玉淵龍漱玉亭楊廷秀詩山根玉泉仰面飛飛出山頂却下馳自從廬阜㵼雙練至今銀灣乾兩支雷聲驚裂龍伯眼雪點濺濕嫦娥衣寄言蘇二李十二莫愁瀑布無新詩橋梁三峽橋楊廷秀題栖賢寺丨丨丨詩棲賢與楞伽初本共一山古潭宅神龍醒厭久跧是夕起雷雨震得天地翻此山坼為兩一溪斷中間下窺黑無地上攀青到天從此兩禪寺路絶不往還祖師見之笑彈指見神姦問天借橫霓搭渡溪兩邉倒傾千崖雪飛下一玉淵餘怒尚雷吼聲拔諸峯根我來不能去輕生倚危欄忽然心為動毛骨森以寒玉人指斷岸猶帶初坼痕三峽石橋在廬山郭功父丨丨丨丨行銀河源源天上流新秋織女望牽牛洪波欲渡渡不得比鵲為橋誠拙謀胡不見廬山三峽水此源亦接明河底擘崖裂嶂何其雄崩雷泄雲勢披靡飛鳥難過虎豹愁四時白雲吹不收燈龍此地無行迹六月遊子披貂裘誰將巨斧鑿大石突兀長橋跨蒼壁行車走馬安如山下視龍門任蹤激寄言牛女勿相疑地下神工尤更竒喚取河邉作橋棟一年不必一佳期蘇子由詩三峽波濤飽泝沿過橋雷電記當年江聲髣佛瞿唐口石角參差灔澦前應有夜猿啼古木已將秋葉作歸船老僧未省遊巴蜀松下相逄問信然館驛五桞館在都昌縣棲隱寺即淵故宅虛白館在尋真觀之右正當五老峯九疊屏之下雙澗支流别是一壺天也歸去來館在歸宗西五里有陶公醉石是館乃朱文公建詩云豫生千載後尚友千載前每尋髙士傳獨嘆淵明賢及此逄醉石謂言公所眠况復巖壑古縹眇藏風煙仰看喬木隂俯聽橫飛泉景物自清絶優遊可忘年結廬倚蒼峭舉觴酹潺湲臨風一長嘯詞以歸來篇樓閣星子樓胡致隆詩葛中藤杖竹蘧蒢靜夜江樓縱目初海獸擎山出彭蠡玉龍㗸水下羌廬三更雲盡猿啼露十里月寒人捕魚已問湖山借圭角他年來此老樵漁重湖閣在潯陽門外延慶院極目湖波與天無際寺院開先寺在城西十五里三國時李中主嘗建此寺舊傳梁昭明太子棲隱之地寺後有瀑布山南瀑布無慮𢾗十皆積雨方見惟此不竭水源在山頂人未有窮者或曰西入康王谷為水簾東為開先瀑布文與可妙明庵記棲賢石橋不為混沌氏之所設非工能之開先瀑布不可量其髙逺奔騰傾涌若決星漢此尤天下之勝處世間不復更有之絶觀也李白詩日照香爐生紫煙遙看瀑布挂長川飛流直下三千尺疑是銀河落九天徐凝詩虛空落泉千仞直雷奔入江不暫息今古長如白練飛一條界破青山色蘇子瞻詩帝遣銀河一𣲖垂古來惟有謫仙詞飛流濺沫知多少不為徐凝洗惡詩子瞻云余遊廬山南北得十五六竒勝殆不可勝紀懶不作詩獨摘其尤者作漱玉亭三峽橋二篇開先漱玉亭詩云髙巖下赤日深谷來悲風擘開青玉峽飛出兩白龍亂沫散霜雪古潭搖青空餘流滑無聲快㵼雙石谼我來不忍去月出飛橋東蕩蕩白銀闕沉沉水晶宫願從琴高主腳踏赤鯶公手扶白芙渠下清冷中朱元晦詩竒哉康山陽雙劒屹對起上有橫飛雲下有瀑布水崩騰復璀璨佳麗更雄偉勢從三梁外影落明湖裏平生兩仙句詠嘆深仰止三年落星灣悵望空眼眛今朝隨杖履得此弄清泚更誦玉虹篇塵襟諒昭洗渤棲賢寺李渤徙寺於是山有水曰鸞溪又有方橋潭陸羽以其水為第六陳舜俞詩辟蛇行者應開寺拭眼髙僧尚冇墳龍帶雨歸三峽水鳥㗸花出五峯雲寺有三峽橋為廬山之雄觀蘇子由記水行石間聲如雷霆如千乘車行者震悼不能自持雖三峽之險不能過也蘇子瞻三峽橋詩吾聞泰山石積日穿線溜况此百雷霆萬世與石鬪深行九地底險出三峽右長輸不盡溪欲滿無底竇跳波翻潛魚震響落飛狖清寒入山骨草木盡堅瘦空濛煙雨間澒洞金石奏灣灣飛橋出瀲灔半月彀玉淵神龍近雲雨亂晴畫垂瓶得清甘可咽不可潄朱元晦詩兩岸蒼壁對直下成斗絶一水從中來蕩潏知幾折石梁遽其會迎望逺明滅倐至走長蛟捷來翻素雪聲雄萬霹靂勢倒千嵽足悼不自持魂驚詎堪説老仙有妙句千古擅竒崛尚想化鶴來乘流弄明月雲居寺在山之顛諺云天上雲居地下歸宗言其相亞云歸宗寺在城西二十五里即王羲之宅墨池鵝池存焉唐寶歷中有赤眼禪師居之朱元晦和提舉尤延之遊山詩金輪紫霄上寶界鸞溪邉往昔王內史頥香有餘煙千年今一歸景物還依然澗水既蕩潏山花亦清妍不辭原隰勞樂此賓從賢訪古共紆欎勞農獨勤拳憐我華勝踐裂箋寄真詮逃禪公勿遽且畢區中緣蘇子由詩我聽丨丨早晚鐘疲勞懶上紫霄峯墨池漫疊溪中石白塔微分嶺上松佛宇爭推一山甲僧厨坐待十方供欲遊山北東西寺巖谷相連更幾重此寺王逸少所置云有墨池在焉落星寺輿地廣記昔有僧墜水化為石夏秋之交湖水方漲則星石泛于波瀾之上至隆冬水涸則可以步涉寺居其上曰法安院有清輝閣玉京軒嵐漪軒黃魯直詩巖巖康俗先生廬其下宮亭水所都北辰九關隔雲雨南極一星在江湖北風捲沙過夜窗枕底鯨波撼蓬島箇中即是地行仙但使心間白難老又詩云星宫遊空何時落著地亦化為寶坊詩人畫吟山入坐醉客夜江撼床蜜房各自開户牖蟻穴或夢為侯王不知青雲梯幾級更借瘦藤尋上方丨丨開士深結屋龍閣老翁來賦詩小雨藏山客坐久長江接天帆到遲晏寢清香與世隔畫圖妙絶無人知蜂房各自開户牖處處煮茶藤一枝王介甫詩窣雲臺殿起崔嵬萬里長江一酒杯坐見山川吞日月杳無車馬送塵埃鴈飛雲路聲低過客近天門夢亦廽勝槩推時可收拾不才羞作等間來朱元晦詩浩浩長江水東逝無停波及此一回薄平湖煙浪多孤嶼屹中川層嘉知周阿晨望愛明滅夕遊驚蕩磨極目青𡨕茫回瞻碧嵯峩不復車馬迹惟聞榜人歌我願辭世紛兹焉老漁蓑會有滄浪子鳴航夜相過又詩四面真誠開玉鑑三山應是失金鰲萬杉寺在廬山僧大超植杉萬本仁有宗賜御製篆金仙寶殿額今御書及國泰清淨四大字朱元晦詩休沐聊命駕言將何所之行尋慶雲寺想象昭陵時門前杉徑深屋後杉色竒空山嵗年晚欎欎凌寒姿當年雨露恩千載有餘滋匠石不敢睨孤標儼相持更啓石室藏仰瞻天象垂願以清淨化永為太平基蘇子由詩萬本青衫一手栽滿堂白佛九天來涓涓石溜供厨足四方山屏繞寺開半榻松隂秋簟冷一杯香飯午鐘催安眠飽食平生事不待山僧喚始廽芝山寺范希文詩樓殿冠崔嵬靈芝安在哉雲飛過江去花落入城來得食鴉朝聚開經虎夜回偶臨西閣望五老夕陽開二林寺釋無可寄題廬山丨丨丨詩廬嶽東南秀香花惠逺蹤名齊松嶺峻氣比沃洲濃積岫連何處幽崖越幾重霜流湓隱隱九𣲖悼憧憧山限東西寺林交旦暮鐘半天傾瀑溜數郡見爐峯巖並金繩道潭分玉像容江微匡俗路日杲晉朝松棕徑新苞拆梅籬故葉壅嵐光生疊砌霞熖發髙墉窗籟虛聞狖庭煙黑過龍定僧仙嶠起逋客秃溪逄濩落垂楊户荒涼種杏封塔留紅舍利池吐白芙蓉畫壁披雲見禪衣對鶴縫喧經泉滴瀝沒履草丰茸翠竇欹攀乳苔橋側杖笻探竒盈夢想搜峭滌心胸𡨕奧終難盡登臨惜末從上方薇蕨滿歸去養乖慵廬山寺馬戴詩白茅為屋宇編荆𢾗處階墀石疊成東谷笑言西谷響下方雲雨上方晴鼠驚樵客緣蒼壁猿戲山頭撼紫柳别有一條投澗水竹筒斜引入茶鐺楞伽院在城北三十五里子瞻記余友李公擇嘗讀書於五老峯白石庵之僧舍公擇既去山中之人思之指為李氏山房藏書九千餘卷子瞻過公擇故居詩彭蠡東北源廬阜西南麓何人修水上種此一雙玉思之不可見破宅餘修竹四鄰戒莫犯十畝森似束我來仲夏初解籜呈新緑幽鳥向我鳴野人留我宿徘徊不忍去微月挂喬木遙想他年歸解組巾一幅對床老兄弟返雨鳴竹屋卧聽林寺鐘書窗有殘燭又詩偶尋流水上崔嵬五老蒼然一笑開若見謫仙煩寄語匡山頭白早歸來朱元晦詩躡石循急澗穿林度重岡倪入幽谷邃仰見竒峯蒼李公英妙年讀書此雲房一去上臺閣致身何慷慨蘇公記藏書文字有耿光餘事亦騷雅戲墨仍風霜兩公不歸來歲月忽已荒何用建遺烈寒泉薦孤芳道觀景德觀舊記昔秦始皇并吞六國楚王避難此地有康王觀二十里入康王谷又十五里有水如簾布巖而下者三十餘𣲖陸羽茶經其水為天下第一朱元晦詩循澗西北騖﨑嶇幾經邱前往荒溪斷豁然清溪流一涉臺殿古再涉川原幽縈紆復屢渡乃得寒巖陬飛泉天上來一落散不收披崖日璀璨噴壑風颼飀追薪㸑絶品瀹茗澆窮愁敬酹古陸子何年復來遊簡寂觀在城西二十三里宋陸修靜封丹元真人明帝召至建康卒于崇虛館諡簡寂此即修靜故居今名太虛觀後有二瀑布及白雲樓夢溪筆談云觀有竹相傳修靜所植出苦笋而味反甜歸宗寺造鹹虀而味反淡蓋山中佳物也山中人語云簡寂觀中甜苦笋歸宗寺裏淡鹹虀楊傑詩紫霄峯下陸先生飛出紅塵鶴羽輕斗壇石礙雲三尺丹井泉寒月一泓錢聞禮詩先生舊隱在廬山幽谷千年竹萬竿偃松拂盡煎茶石苦笋撑開禮斗壇朱元晦詩髙士昔遺世築室蒼崖陰朝真石壇峻煉藥古井深結交五桞翁屢賞無弦琴相携白蓮社一笑傾夙心嵗晚更市朝故山鎖雲岑柴車竟不返鸞鶴空遺音我來千載餘舊事不可尋四顧但絶壁苦竹寒蕭椮蘇子由詩山行但覺鳥聲殊漸近神仙簡寂居門外長溪淨客足山腰苦笋助盤蔬喬松定有藏丹處大石仍存拜斗餘弟子蒼髯年八十養生世世授遺書白鶴觀在城西北二十里今名為承天觀觀記云廬山峯巒之竒秀巖穴之怪邃林泉之茂美為江南第一此觀復為廬山第一漁隱叢話蘇子瞻云司空表聖自論其詩得味外味棊聲花院閉幡影石幢髙此句最善吾嘗獨遊五老峯入白鶴院松陰滿地不見人惟間棊聲然後知此句之工蘇子由詩云五老相携欲上天玄猿白鶴盡疑仙浮雲有意藏山項流水無聲入稻田古木微風時起籟諸峯落日盡生煙歸鞍草草還城市慙愧幽人正醉眠延真觀在城北四十里舊名昭德唐艾真李騰空所居騰空宰相李林甫之女李白送女真歸廬山詩羡君相門女學道愛神仙一往屏風疊乘鸞著玉鞭尋真觀在城北二十五里道藏經三十六洞天此其一也正唐元女冠蔡尋真居屏風疊之南李騰空居屏風疊之北符祥觀觀記云秦末有武士三人留此一夕雷電化成二溪溪中盤石上有玉簡天篆曰神化靈溪金簡標題真人受旨玉簡潛栖康王觀在城西七十里按舊經楚康王避難於此山梁大同元年張道士置在洞裏至隋開皇丁道士移出洞銅馬廟場置觀祠廟陶威公祠劉羲仲記云子瞻嘗為豫言陶公忠義之節橫秋霜而貫白日晉史所書折翅之事豈有是乎吳澥辨云蘇峻之誅庾亮恥為之屈既士行溘先朝露後嗣零落庾氏謗之耳五賢祠朱元晦祝文云誤膺朝命來守是邦至止之初得拜劉李二公之像于學欽聳髙風考觀正論既有以慰夙心者既又咨訪得陶公栗里故居於郡境且知祕亟劉公蓋嘗祿于管庫而忠肅陳公又嘗辱為遷民也濓溪祠朱元晦立張敬夫記蓋自近世以來先生之書遍天下士知尊敬講習者寖多而其間未免或失其旨妄意髙逺不由其序遊談相夸不踐其實反以病夫真若是者適為吾道之罪人耳夫惟端篤懇惻近思躬履不忽於卑下而審察乎細微是為不負先生之訓三賢祠在廬山楞伽寺楊廷秀呈南尉太守曽致虛詩山房牙簽三萬軸六丁六取歸羣玉空餘坡老枯木枝雪骨霜筋插雲屋楞伽老僧懷兩賢作堂要與祠千年只供清風薦明月不用秋菊兼黃泉江西杜裏曽常柏李家玉潤蘇家客併遣巫陽招取來分坐廬山泉上石劉西澗祠黃魯直拜劉凝之畫像詩棄官清潁尾買宅落星灣身在菰蒲中名滿天地間誰能四十年保此清淨退往來澗谷中神光射牛背名宦韋應物唐人為刺史嘗遊賞于簡寂觀其詩卒章云曠嵗懷兹賞行春始重尋聊將橫笛吹一寫山水音何易于攝建昌令築縣西捍水堤皇朝周頥春陵人嘗以吕公著薦擢廣東運判以提刑以病求知南康軍病劇上印分司南京朱熹淳熙中為守值歲歉救荒有功後又請于朝建白鹿書院人物康俗漢武帝時封俗為大明公稱廬君詳見廬山陶潛義熙中為彭澤令郡遣督郵至曰吾不能為五斗米折腰向鄉里小兒遂棄官去賦歸去來詞嘗居廬山栗里籃輿往來醉輒卧大石上今號醉石李常字公擇仕至御史詳見楞伽院注名賢翟道潯陽人晉王導辟不就隱于廬山之南祖父子孫四世皆隱稱潯陽四隱劉麟之字子驥一字遺民即桃源記中劉子驥者也石林過庭録逺法師白蓮社中遺民最勝周續鴈門人徙居建昌詣范寧受業入廬山與劉遺民陶淵明號潯陽三隱熊仁瞻海昏人丁母憂哀毁廬墓有慈烏來巢大厯中旌表門閭朱文公嘗遣祭立門李白圖經白性喜名山飄然有物外志以廬阜水石佳處遂往遊焉卜築五老峯下有書堂舊基後北歸猶不忍去指廬山曰與君再會不敢寒盟丹崖緑壑神其鑒之杜甫詩匡山讀書處頭白早歸來或以為綿之匡山李渤詳見書堂注皇朝劉渙字凝之筠州人為潁上令挂冠歸隱廬山嘗作騎牛歌曰我騎牛君莫笑世間萬事從吾好號西澗先生歐陽修作廬山髙以贈之朱元晦記云豫假守南康訪求先賢遺迹得故尚書屯田員外郎劉公凝之之墓于城西門外草棘中豫惟劉公清名髙節著于當時而聞于後世不幸饋奠無主而其邱墓之寄於此邦者又如此亦是長民者之責也乃作小亭於前立門墻以限樵牧用歐陽公語名其亭以壯節因屬友人黃銖大書以揭焉劉恕字道原渙之子司馬君實修資治通鑑以史事之紛錯者委之王介甫引為三司條例不就劉羲仲字壯輿渙之孫詔為編修至京自宰相以下並不造謁未幾致仕蘇子由有詩陳舜俞字令舉嘉禾人少登制科為嘉禾令以不奉行青謫官居山南與劉凝之乘黃犢往來以六十日盡南北之勝龍眼李白時畫為圖今有碑刻陳瓘坐論蔡氏父子最後謫南康蘇庠字養直丹陽人少作清江曲東坡見之嘆賞卜築廬山屢詔不起題詠急呼疾索初不聞王介甫題望雲亭詩南康父老傳使君云云未曽遣汲谷簾水三載秪望香爐雲雲徐無心靜無澤使君恬淡亦如此歘然一去掃遺隂便覺煩􅒱悵千里歸田負戴子與妻岡蔬園果西山西出門亭臯百頃緑望雲才喜一犂足我知新亭望雲好欲斸比鄰成二老莫嫌雞黍𢾗往來為報襄陽得公嫂四六疏綍天閽分符星渚眷此康廬控于匯澤維地千里據江上流即此星斗創夫樓壘矧南山之道院為江左之名邦康廬萬古之山川白鹿幾年之文物渺彭澤以為恩波聳康廬而侔治迹俗朴訟稀號山南之道院民貧土瘠資江上之商征歸宗寺古訪內史之墨池栗里源幽卧陶公之醉石鈐齋豐暇迎五老於清尊學館靜深對諸儒於黃卷長庚之詠瀑布題后無詩鴻漸之第水簾經中絶品李氏山房尚訪森修之竹即山南北之分疆尤欣接畛濓溪故宅有懷淨植之蓮豈江東西之異道遂靳餘波白鹿書堂之創遺址猶存紫陽夫子之來斯文大暢郡得循良無急索疾呼之政山多竒秀有微吟緩諷之遊棲賢峽漱玉亭壯矣坡仙之句玉京軒落星寺竒哉山谷之章丹崖翠壑為青蓮仙客之舊遊皂蓋朱轓振白鹿儒宗之奧學誦李仙屏風九疊之謡神遊汗漫讀歐子廬山千仭之句心厭寵榮雖云小郡環井邑於山光水色之中猶幸大江通商賈於蠻煙瘴雨之外方輿勝覽卷十七
