body:
  text: 方輿勝覽卷四十八宋祝穆撰淮西路廬州合肥舒城梁縣建置沿革禹貢揚州之域吳地斗分野春秋時屬舒戰國屬楚秦為合肥縣漢分立廬江國東漢為合肥侯國仍𨽻九江郡又更為淮南國合肥𨽻焉魏晉為重鎮宋齊二代皆為廬江郡地梁改合肥為汝隂郡尋改為合州隋改合州為廬州以廬江名舊經云古廬專國此蓋惑于應劭之説非也又引左氏云自廬以往振廩同食此乃中廬之地去合肥逺矣煬帝改為廬江郡唐為廬州後唐升為昭順軍節度周世宗改為保信軍節度皇朝因之紹興兼淮西安撫使馬步軍都總管後復兼制閫統州七軍二領縣三治合肥本路安撫制置轉運置司事要郡名合肥見下肥水注風俗人性躁徑隋地理志廬江云云風氣果決包藏禍害視死如歸好戰而貴詐俗尚淳質同上自平陳之後其丨頗丨丨丨好儉約喪禮婚姻率漸于禮廬江記云人物語音風土明茂皆勝淮左諸郡唐羅珦德政碑云不好學而信鬼神廣占田而不耕人稀而病于吏衆藝桑鮮而布帛疏濫舊經云率性真直賤商貴農自更戎馬遺氓存者不什二而江浙轉徙之民實居之故嚚訟喜爭率不如古非其風土然也酷信淫祠唐刺史羅珦德政碑廬江之俗不好學而云云嚚訟好爭郡志自兵火之後江浙之民實居之流移多于土著于是乎淳厚之風不如古而云云者紛然非其風土本然也形勝南臨江湖魏滿寵云丨丨丨丨北達夀春龍眠蟠其前曹明之新城記云云紫金跨其北淮海之郡廬為大羅珦德政碑云云封略濶而土田瘠人産寒薄井賦尤重地大以要葉祖洽撰三至堂記云廬于淮西為一道都會人物之富甲兵之強四方商旅遊士之多不比他郡云云故選守常重廬為淮西根本崔琳撰田侯廟記云云合肥號金斗曹明之記入肥入斗度最多故號金斗江北恃為唇齒曹明之新城記云云淮右襟喉之地亦一都會前漢志夀春合肥受南北湖皮革鮑木之須云云地有所必爭魏明帝曰先帝東置合肥南守襄陽西向祁山敵來輒破于三城之下云云腹巢湖控渦潁韓無咎風鶴亭記云淮之南故秦九江郡也至漢孝文析其郡又為廬江實今西路也自春秋季年吳嘗會于橐臯而漢封王皆在于六及孫曹紛爭則以合肥屬揚州之治築為新城晉人扼肥水以敗秦師周世宗屬兵正陽攻戰于紫金山下遺迹猶存故今廬州形勝云云膺濡須枕潛皖隱然為用武之郊山川潛山今州治所據言舒之丨丨其二支至而伏大蜀山在合肥縣西二十里爾雅釋山蜀者獨也此山獨起無岡阜連屬故名小蜀山在合肥縣西四十里龍穴山在合肥縣西百三十里穴上有池張又新以此水為第十四頂山在合肥縣東南寰宇記作四濎郡國志魏伯陽煉丹之所羅隱詩勝景天然别精神入畫圗一山分四頂三面瞰平湖過夏僧無熱凌冬草不枯逰人來至此願剃髮和鬚雞鳴山在合肥縣西北四十里紫蓬山在合肥縣西南七十里龍眠山在舒城縣西南八十里如卧龍狀李公麟因取此山自號春秋山在舒城縣南三十里有李公麟讀書堂浮槎山在梁縣東南三十五里按隋志云有浮闍山俗傳自海上來昔有梵僧過而指曰此耆闍一峯也梁天監間帝女揔持大師于此建道林寺無諸釋用孫嘗題詩云山為浮來海莫沉蕭梁曽此布黃金梵僧親指耆闍路帝女歸傳達磨心地控好峯排萬仭澗餘流水落千尋靈蹤斷處人何在日夕雲霞望轉深人謂可得山中大槩歐陽公水記云碑隂有元豐七年洛陽景謨逰山留刻云寺有榴花根幹偉茂世傳昔梁武帝女尼所植也有井泉陸羽所謂乳泉漫流者也歐陽公水記丨丨丨與龍穴山皆在廬州界內較其水味不及浮槎逺甚北峽關在舒城南四十五里官兵守把為入蘄黃之要地肥水在合肥縣南應劭曰夏水出父城東南至此與淮合故曰合肥爾雅云歸異出同曰肥廬江四辨曰水出雞鳴山北流二十里出夀春而投于淮二水皆曰肥郡志載梁韋睿為豫州刺史討魏至合肥乃堰丨丨通戰艦髙與合肥城等城遂潰巢湖港汊大小三百六十周圍四百里與合肥舒城巢廬江四邑接境詳見無為軍藏舟浦在金斗門外長八十丈濶十丈舊經云昔魏將張遼掘巨浦禦孫權藏戰艦于此唐貞元間刺史杜公作斗門與肥水相接浦內島嶼花木頗為佳景小史港在城東門內按太平寰宇記廬江府小史焦仲卿妻劉氏為姑所出自誓不嫁其家逼之乃投水死仲卿聞之自縊因以為名李太白廬江主人婦詩云孔雀東飛何處栖廬江小史仲卿妻為客裁縫君自見城烏獨宿夜空歸龍潭在梁縣治不十步有蜃母居焉鵲岸在舒城縣西北左傳昭公五年楚伐吳吳人敗諸丨丨杜預注云謂廬江舒縣鵲尾渚堂亭安邉堂在州治衣錦亭在州治天禧中馬忠肅公歸守鄉郡創此亭因名三至堂在州治陳文惠公三守是邦故名祠廟張龍公祠在合肥縣西百三十里龍穴山按歐陽公集古録載唐布衣趙耕撰張龍公碑云張公諱路斯潁上百社人仕隋為宣城令罷歸每夕出自戌至丑歸常體濕且冷其夫人石氏異而詢之公曰吾龍也蓼人鄭祥逺亦龍也吾據池屢與龍戰明日取決可令吾子持弓矢射之繫鬛以青綃者鄭也綘綃者吾也子遂射中青綃者鄭怒東北去投合肥西山死今龍穴山是也其後蘇內翰軾作丨丨丨丨記亦載此事山之東南隅有池傍有一廟遇旱鄉人即請水以禱詳見龍山山穴注廣惠王廟在合肥縣西二十里按廟碑有云唐貞觀間有僧慧滿結庵此山誦經忽有布衣造門曰我東海龍王之少子屬時苦旱僧令其降雨答曰盜布天澤罪當殛死須臾膏澤隨霈三日龍死于山隅僧乃携以葬而民為之立祠其後水旱禱之必驗古迹石牛在土地堂前有二丨丨父老相傳初濬治肥河得之土中形製甚精對峙為角抵狀後塑二牧童橫笛跨其上飛騎橋即今西津橋大觀間所立碑乃曰飛騎且謂吳孫權為魏將張遼所襲橋丈餘無板權乘駿馬越而獲去因此得名教弩臺在懷德坊明教寺舊經云昔魏武帝築臺教強弩五百人以禦孫權棹船大厯間因得鐵佛髙一丈八尺刺史裴緝奏請為明教寺明逺臺在梁縣城內西南隅回環皆水中有一洲古老相傳鮑明逺讀書于此名宦劉馥魏太祖表為揚州刺史暨受命單馬造合肥空城建立州治興治芍陂及茹陂吳塘諸堰朱敬則唐朝為刺史代還無淮南一物所乘止一馬子曹步從以歸鄭綮為刺史黃巢掠淮南綮移擊請無犯州境巢笑為斂兵李翺為廬州刺史皇朝陳堯佐知州以方嚴肅下馬亮合肥人兩為本郡守包拯苕溪漁隱曰拯合肥人守本郡不肯少屈法以阿鄉曲之好故流俗稍稍謗議公乃為詩見意曰直幹終為棟堅剛不作鈎其守正不回如此孫覺以司諫知州蘇子瞻有詩送之周美成為教授馮京為守人物周瑜仕吳廬江舒人陶侃仕晉廬江人楊行密合肥人墓在鐵索澗皇朝李公麟字伯時舒城人博學好古多識竒字以丹青妙絶一世號為龍眠居士題詠西江天柱逺李白送裴大擇赴廬州長史詩云云東越海門深去割辭親戀行憂報國心好風吹落日流水引長吟五月披裘者應知不取金平湖阻城南張祁詩云云長淮帶城西壯哉金斗勢曹瞞築合肥多幸逢時擁斾旌唐鄭綮題合肥郡齋詩九衢城裏一書生云云醉裏眼開金使字紫旌風動耀昆明襟帶東南第一州郭功父澄惠寺詩云云揚鞭得從使君逰蜀山逈出千螺秀郭功父舒城眺望詩云云肥水長縈乛帶廽猶有金城藏後浦不惟銅雀起髙臺郡城百里即龍舒劉貢父詩云云留滯頻驚嵗月除沃壤欲包淮甸盡朱服詩昔年吳魏交兵地今日承平會府開云云堅城猶抱蜀山廽栁塘春水藏舟浦蘭若秋風教弩臺獨有無情原上草青青還入燒痕來四六申命宸廷總戎制閫開大幕府號小朝廷淮甸極邊合肥重鎮惟合肥之重鎮接古夀之長淮邊城蹂躪之餘野馬也塵埃也制閫經營之始繭絲乎保障乎升文昌垣獻納之班重合肥水守禦之寄得李績之才見謂城堅于金斗知裴度之績未嗟人老于玊關胡人不敢縱南下之牧天子遂可寬西顧之憂分陕之西則合肥既為重鎮自閫以外則元戎實總中權擁元戎之旌纛名震江淮建大將之鼓旗威行蠻貊開關延敵精兵發弩以飇馳射賊勤王敵騎棄圍而星遁折衝禦侮寬南面之顧憂畫策運籌壯西淮之屛蔽宿重兵百萬之屯前鏖大敵總元戎十乘之寄進取中原無為軍無為廬江巢縣建置沿革禹貢揚州之域吳地斗之分野商時為巢伯之國春秋戰國屬楚秦為九江郡漢髙帝更為淮南國以黥布為王景帝為廬江郡統縣十一而居巢臨湖襄安𨽻焉即今無為之地也曹操屯軍居巢後屬吳周瑜為居巢長梁屬南豫州又屬合州隋屬廬州唐武德以居巢縣為巢州皇朝太平興國間析舊廬州廬江縣為巢縣以無為鎮為無為軍乂耆舊相傳云無為軍本號城口鎮𨽻巢縣淳化中鎮居土豪侯仁信等進狀乞創軍壘時僣偽悉平思與天下安于無事因取無為而治之意以名之熙寧間又析巢縣廬江之六鄉置無為縣今領縣三治無為本路提刑提舉置司事要郡名濡須寰宇記魏築無為城臨丨丨水上源尋為無為監乃江淮之要津圗經所謂城口鎮者因此丨丨城得名風俗習於干戈郡志其民云云勇于戰鬭風氣果決隋地理志頗務農桑郡志承平以來云云形勝古南譙郡郡志晉咸康中置南譙郡即今之南譙鄉在巢縣滆江上遊錢惟嶽雙峯院記無為潭之捷徑據丨之丨丨北聨和廬無為郡志秀峯驛記云云南接舒蘄在淮甸實為要衝江淮要津寰宇記吳魏相持於此無為志云云東關之北岸吳築城西關之南岸魏置柵山川巢山在巢縣西南百里姥山在巢湖中湖陷姥升此山有廟羅隱詩臨堂古廟一神仙繡幌花容色儼然為逐朝雲來此地因隨暮雨不歸天眉分初月湖中鑑香散餘風竹上煙借問邑人沈水事已經秦漢幾千年紫芝山在無為縣錦繡溪西皇祐間生紫芝八公山在巢縣西非苻堅時所望草木為晉兵之山水經注云山無草木唯重阜耳上有淮南王安廟漢髙帝之子折節下士好神仙祕法鴻寶之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無駐衰之術未敢聞八公咸變成童白日升天餘藥在器雞犬舐之者皆得上升故山以八公為目王介甫詩淮山但有八公名鴻寶燒金竟不成身與仙人守都厠可能雞犬得長生銀瓶山在軍城之西時有雲氣以形得名亞父山在巢縣東十二里昔范增居此山之陽七寶山在巢縣濡須山謂之東關丨丨丨謂之西關王喬山在巢縣西南九十里昔有王子喬于此山採藥遂得名卧牛山在巢縣城內九華山蘇子由過九華題詩云南遷私自喜看盡江南山孤舟少僮僕此志還復難局促守破窗聨翩過重巒忽驚九華峰髙拱立我前蕭然九仙人縹眇凌雲煙碧霞為裳衣首冠青琅玕揮手謝世人可松望不可攀我行竟草草安能拍其肩但聞有髙士卧聽風眠松根得茯苓狀若千嵗黿煮食一朝盡終身棄腥羶腹背生緑毛輕舉如翔鸞相逢欲借問已在長松端何年脫罪罟出處良自便芒鞋拄藤杖逢山即盤桓斯人求可求岩室倘復安西江岷山導江至此號丨丨巢湖在巢縣西周圍四百里由合肥舒城廬江巢縣四邑境郡志云昔有巫言居巢縣門有四石龜口出血此地當陷為湖未幾有人以豬血置龜口巫嫗見之南走其地遂陷青瑣髙議云今巢湖古巢縣一日江漲港有巨魚漁者取以貨于市合郡食之有一姥獨不食遇老叟曰此吾子也汝獨不食吾厚報汝若東門石龜目赤城當陷姥日往視有稚子訝之姥以實告稚子欺之以朱傅目姥見急出城有青衣童子曰吾罷之子乃引姥登山而免然東漢永平之時丨丨出黃金則城陷之説妄矣杜荀鶴過巢湖詩世人貪利復貪榮來向湖邊始至誠男子登舟與登陸把心何不一般行濡須水在軍北二十五里源出巢湖東流經亞父山曺吳相拒于此月餘曹公箋曰春水方生公宜速去公曰權不敢欺孤遂還錦繡溪在城內天慶觀前堂舍仰髙堂在郡治米元章建并記後張孝祥題扁寶晉齋米元章建中藏晉人法帖羣山觀在漕廳之東遙揖江南繁昌鍾阜諸山樓閣南樓楊次公詩云此樓此景他州無山川形勢吞三吳九華樓在移風門上米元章建江南九華諸峯屹然相向眀逺樓在楚澤門郡守米元章所建下臨百萬湖聚山閣在郡圃北羣山橫列惟二山為勝銀瓶之深秀則喬松所居寶峯之壯險則吳魏之所守也園池西園亭館為一郡之勝槩墨池在郡廳米元章所鑿寺觀太寧院在軍東南六十里地名臨湖當濡須潛水之交有湖山林泉之勝吕坦夫詩飄然吟魄到鼇山好句空留水石間眼愛清虛心不息浮生能有幾人間紫微觀去巢鄉北八里有紫微山及洞道書所謂苐十八金庭福地此山乃王喬登仙之處有碑云乘鳬馭鶴吹笙脫履而歸舉手長别其碑皴刻難讀今亦不存矣玉虛觀在廬江南一里又曰南臺東漢左慈真人之故隱也後有人自稱劉方題詩于壁曰南臺舊觀再焚修鸞鳳徘徊無樹留芳草滿時迷白鹿落花深處卧青牛九天宛轉雲常在萬象縱橫月不收應是廬江人不識蟾宫遺下水晶樓人謂左真人復來也觀後有水簾洞古迹巢縣堯世巢父即巢之者艾也書稱成湯放桀於南巢旅獒稱巢伯來朝左傳文公十三年羣舒叛楚遂圍巢襄公二十六年吳伐巢昭公九年城巢即今丨丨也亞父井在巢縣廳之西廡云亞父宅基拓臯在巢縣即春秋哀公十二年會吳于橐臯是也紹興十一年烏珠入寇劉錡敗之于丨丨潛城在廬江縣南六里左昭二十七年吳公子燭庸帥師圍潛濡須塢亦名偃月城在巢縣東南四十里接巢湖西北至合肥界湖東南有石渠鑿石通水是名關口相傳云夏禹所鑿其地髙峻險狹實守扼之所故天下有事是為必爭之地矣吳魏相持于此初孫權欲作塢諸將皆曰上岸擊賊洗足上船何用塢為吕蒙曰兵有利鈍戰無百勝如有邂逅賊步騎蹙人不暇及水其得八船乎權曰善遂築之曹公攻之不能破嘉平四年諸葛恪于東關作大隄遏巢湖左右依山夾築兩城各留千餘人使全端留略守之魏遣諸葛誕胡遵圍東關將壞其隄諸葛恪率衆四萬大破之遂退阮户部東西關詩笻杖芒鞋上短蓬半篙春水飽帆風兩關三寺山無數藏在濛濛煙雨中龔相詩南北安危限兩關迅流一去幾時還凄涼千古干戈地春水方生鷗自間名宦周瑜三國志本傳吳中呼為周郎以恩信著于廬江袁術欲以為將瑜觀術終無成求為居巢長遂還吳劉知幾唐人封居巢子皇朝米芾字元章傳云善書畫初宣仁聖烈皇后在藩時母出入邸中後以恩補校書郎嘗為太學博士擢禮部員外郎然元章性好石守無為日初到公廳適有一石甚竒元章見大喜曰吾當以兄事之遂再拜未幾言路有論其怪不可治民者徽廟薄其罪陳瓘以論蔡京謫揚州料院續知無為軍李公麟字伯時廬州舒城人自號龍眠居士有才名馳譽丹青元豐中為無為司尸參軍夏商以來鐘鼎尊彞皆辨測欵識撰百刻漏箭合古法度今譙樓銅壺上刻吳道子所載者乃伯時所製也楚建中為守與文潞公耆英會吕夷簡為倅人物范增鄛人年七十居家好竒計王介甫詩云鄛人七十謾多竒為漢驅民了不知誰合軍中稱亞父直須推讓外黃兒文翁廬江人嘗為蜀郡太守朱邑廬江人為大司農嘗為桐江嗇夫皇朝焦蹈無為縣人四為舉首元豐八年魁多士六日而終左慈廬江人嘗在曹操以銅盤貯水以竹竿餌釣于盤中引鱸魚鱠之詳見蘇州題詠掩映軍城隔水鄊林君復詩云云人煙物景共蒼蒼酒家樓閣搖風斾茶客舟船簇雨檣殘笛逺砧聞野墅老苔寒檜看僧房狎鷗更有西湖興珍重江頭白一行山橫大秀一峯髙楊次公詩云云水入平湖千里逺四六疏榮禁掖分壘巢湖雖云小壘乃是次邉惟吳魏相持之地乃江淮至要之津濡須立塢素稱壁壘之雄淳化創軍實據江淮之險外連肥水之衝足為保障內護長江之險實固藩籬州麾肅擁分千里以鎮臨地望雄誇建兩臺而對峙人煙物景曽歸和靖之新萹樓扁亭名尚灑元章之妙墨安豐軍夀春霍丘安豐六安建置沿革禹貢揚州之域吳地斗分野春秋時為六蓼國地後屬楚椘考烈王自陳徙都夀春命曰郢秦漢屬九江郡東漢為揚州刺史治所魏即安豐縣升為郡晉為淮南郡治夀春東晉為豫州刺史治所梁以夀陽為豫州隋曰夀州唐玄宗改夀春郡後復為夀州後唐升為順化軍莭度南唐改為清淮軍周平淮南徙夀州治下蔡以清淮軍為忠正軍自此州治始在淮北而舊州廢為夀春縣仍𨽻焉國朝因之後升為夀春府紹興問升安豐縣為軍今領縣四治夀春事要郡名夀陽風俗人習戰爭伏滔正淮論其俗尚勇力而多勇悍其云云而貴詐偽文辭巧而少信漢書地理志形勝臯陶所封晏類要臯陶子孫封于英六皇覽云臯陶塜在六安縣春秋文公五年椘人滅六與蓼臧文仲聞六與蓼俱滅嘆曰臯陶庭堅不祀忽諸古夀州地圗經宣撫使張浚札子欲將夀春縣改為夀春府以淮北夀春府為下蔡縣仍𨽻焉其安豐軍却合改作縣使𨽻夀春府又云古夀春在淮南自周世宗攻劉仁瞻于此惡其險遂徙夀州治于淮北下蔡是安豐即丨丨丨南引荆汝之利晉伏滔正淮論東連三吳之富云云北接梁宋平塗幾七百里西援陳許水陸千里外有江湖之阻同上云云內保淮淝之固有陂澤之饒宋地理志為淮南苐一都會地方千里云云為要害之地郡縣志自東晉至唐云云城郭如帛繞花宋武帝嘗登八公山劉安故臺曰丨丨丨匹丨丨叢丨山川霍山元和郡縣志漢武帝以丨丨為南嶽遂祭其神今其土俗呼南嶽隋以江南衡山為南嶽八公山在夀春北四里苻堅伐晉望山上草木皆人形謝玄暉和王著作丨丨丨詩二别阻漢坻雙崤望河澳兹嶺復巑岏分區奠淮服東限琅琊臺西距孟諸陸阡綿起雜樹檀欒蔭修竹日隱澗凝空雲聚岫如復出沒眺樓雉逺近送春目戎州昔亂華素景淪伊穀阽危賴宗衮謝安微管寄明牧玄玄長蛇固能翦奔鯨自此曝道峻芳塵流業遙年運倐平生仰令圗吁嗟命不淑浩蕩别親知連翩戒征軸再逺館娃宫兩去河陽谷風煙四時犯霜雨朝夜沐春秀良已凋秋場庶能築大别山漢書云禹丨丨丨在霍山縣圗經在安豐縣西南硤石山寰宇記云兩岸相對淮水經中過山上立二城以防津要故名為丨丨丨紫金山在夀春南或云即八公山周顯德四年征淮太祖率殿前諸軍擊丨丨丨連珠寨拔之遂平夀州青岡去夀春縣三十里晉書謝玄敗苻堅于丨丨死者如麻即此地也淮水經夀陽西北淝水東南自安豐縣界流入夀春果經縣北二里入淮晉謝玄傳苻堅率兵次于項城衆號百萬詔以玄為前鋒都督諸軍衆凡八萬進屯夀陽列陳臨淝玄玄軍不得玄玄使謂苻融曰君逺涉吾境而臨水為陳是不欲速戰諸君稍却令將士得周旋僕與諸君緩轡而觀之不亦樂乎衆皆曰宜阻淝水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過而我以鐵騎數十萬向水逼而殺之融亦以為然麾使却陳衆因亂不能止于是玄與從弟琰中郎將柏伊等以精鋭八千涉渡丨丨決戰堅中流矢臨陳斬融堅衆奔潰自相蹈籍投水死者不可勝計丨丨為之不流餘衆棄甲宵遁聞風聲鶴唳皆以為王師至獲堅乘輿軍資寶皆山積逃蛟澗在六安縣舊傳淠河有蛟為人害楚公子芉乙㩧弓矢射之蛟走邑人德之為立廟芍陂在豐安縣東崔實月令曰孫叔敖作期思陂即此郡縣志周廽三百二十里灌四萬頃與陽泉陂大葉陂並孫叔敖作鄧艾修之淮廣陵等十鎮皆仰給于此疆場豐稔無復轉輸之勞小吏堰在安豐縣魏武帝遣小吏何友憲開因以為名後遣大將宋玉劉昶攻夀春北齊豫州刺史桓崇祖乃于城西北立堰塞淝水堰北起小城使數千人守之及魏軍薄攻小城崇祖決丨丨丨水勢奔下魏軍溺死甚衆遂退走井泉咄泉在夀春縣東北十里人至其傍大呌則大湧小呌則小湧亭院慶豐亭下瞰芍陂故有是名名宦竇融漢封安豐侯時苗為夀春令牛生一犢留之而去今有飲犢池鄧艾魏邵陵厲公嘗屯于芍陂詳見前芍陂劉仁贍南唐時李景稱臣割地而仁贍獨守夀春不下故治夀春世宗以其難尅遂徙下蔡而復其軍曰忠正軍曰吾以旌仁贍之節也漁隱叢話曰曰王旐遊金陵升元寺見房壁上有繪金紫大夫上題詩陳前金牌生無愧鼓下蠻奴死合羞三尺生綃暗塵土凛然霜鶻欲橫秋不能解卷畫歸示其父平甫曰此丨丨丨像袁世弼詩也皇朝陳舜俞字令舉為判官眀鎬通判夀州薛基稱其有廊廟才曽致堯嘗為兩浙漕諫議魏庠知蘇州介舊恩以進致堯奏劾其罪太宗曰是敢治魏庠可畏也知夀州人物英布六人臯陶之後梅福夀春人召信臣九江夀春人陸贄授鄭縣尉省母歸至夀春刺史張鎰有名當時大加賞識既别鎰以貨泉為贐且曰碩以此奉太夫人一日之膳丨丨悉辭之領新茶一串而已皇朝吕夷簡字坦老河南人祖龜祥知夀州因家于此仁宗皇帝朝拜平章事封申國公題詠風獵紅旗入夀春劉禹錫寄楊夀州詩云云滿城歌舞向朱輪八公山下清淮水千騎塵中白面人四六簡求人傑彈壓邉城塗芝禁掖兮竹夀陽昔為男國今號侯邦眷夀陽之小壘當淮右之要衝南控荆湖之地北連梁宋之郊犢池慕時苗之介芍陂懷鄧艾之功分斗大之一州初無地險禦風寒之萬里賴有人謀望公山草木之狀儼若旌旗聞淝水風鶴之聲凜如鼙鼓方苻秦率衆以來俄而大敗自夀春移鎮之後罕此竒功以孤城而當一面始歎其難及百戰而解重圍終知其勇精兵八千而破敵重逢前代之謝玄強敵百萬而解圍蓋有當今之杜預濠州鍾離定逺建置沿革禹貢揚州之域吳地斗分野塗山氏之國春秋時為鍾離子之國嬴姓徐子之别封戰國屬楚秦併天下屬九江郡漢置鍾離縣屬九江莽曰蠶富縣東漢為鍾離侯國宋立徐州齊改西椘州隋改濠州皇朝因之領縣二治鍾離事要郡名濠州郡志濠水中有石梁故名臨濠唐地理志濠州作豪天寶改從濠風俗性率真直寰宇志云云賤商務農其食粳稻其衣絁布地帶淮濠皆通舟楫文詞並興錢文子修學記濠水之上江淮之間惠莊隱士昔所逰處淮南賓客集而著書流風所被云云非南北二邊比形勝長淮橫其北連南夫修城記濠之為城也丨丨桐柏之流丨丨丨石梁會衆水之流環其西兩水中注介于城闉背渦口之曲流魏王粲浮山賦云云兮望馬丘之髙澨遺録云五代時渦口為控扼之地阻滯帶山郡縣志舊有二城昔魏中山王英圍鍾離梁韋睿救之曺景宗募軍士賫敕潛行水砥得達東城則知州有東西城舊矣自建炎間連南夫作郡守謂濠水介于兩城不合一始決濠水徑達于淮而不復介于城中城始為一矣南北朝為重鎮郡縣志山川塗山在鍾離縣西九十五里左傳昭公四年禹有丨丨之會杜預注在夀春東北今有禹會村紹興亦有丨丨未知孰是蘇子瞻濠州丨丨詩川鎖支祁水尚渾地埋汪罔骨猶存樵蘇已入黃羆廟烏鵲猶朝禹會村左傳稱鯀化為黃羆蘇子由詩娶婦山中不肯留會朝山下萬諸侯古人辛苦今誰信只見清淮入海流荆山在鍾離縣西八十三里梁魏爭戰時又築堰以灌夀陽杏山在鍾離南六十里世傳董奉居此山種杏為人治病畫山在鍾離西七十里崔確崔白李從升張藻皆郡人以畫名人謂此山炳靈韭山在㝎逺縣東北四十里其山多韭繫年録鍾離人王惟忠嘗據山上纍石為城民之依者九萬餘人金人以孫興知濠州惟忠不從偽命率衆歸莭制劉位為左軍統領臨淮山一名浮山去鍾離九十里山下有穴名浮山洞夏潦不能及而冬不加髙故人疑其浮也蘇子瞻詩人言洞府是鼇宫升降隨波與海通共坐船中那得見乾坤浮水水浮空雲母山在鍾離南四十里出雲母彭祖取服其上有廟蘇子瞻詩跨厯商周看盛衰欲將齒髮鬭蛇龜空餐丨丨連丨盡不見蟠桃著子時橫澗山在定逺西北七十里兵火中為屯禦之地濠水州臨丨丨故名西丨丨出鏌鎁山東丨丨出濠塘山淮水出桐柏山洺水出定逺縣下流入淮井泉漢泉在定逺縣世傳漢軍至此渴因大呼泉遂出楚泉在定逺縣其流稍微吕坦夫有詩云地與分雙派天方鬭二雄堂亭威信堂在郡治淳熙間守王回陛辭上諭曰守邊之道無出威信二字一品亭在子城西南隅遺録云王欽若父郁為郡判官作亭後文穆天聖初知濠州亭尚在公之孫仲徽守濠增大之遂名今廢翛然亭在倅廳子城上舊名觀瀾元祐中王雍為郡丞有言晉簡文逰華林園謂左右曰會心處不必在逺翛然臨水便有濠濮間趣覺鳥獸禽魚自來親人當知濠自是佳處雍喜遂易亭名翛然三槐亭在倅廳通判王淮名既以三槐在其側又以王欽若吕夷簡曽懷皆為倅故名短李亭即四望亭唐李紳分司東路過濠州為作記紳矮小時號丨丨因名丨丨蘇子瞻詩頽垣破礎沒柴荆故老猶言丨丨丨敢請使君重起廢落霞孤鶩换新銘樓臺清雅樓張頔詩觀魚惠子臺蕪沒夢蝶莊生冢木秋唯有清淮供四望年年依舊背城流觀魚臺在鍾離縣西南七里莊子逰于濠梁上見鯈魚出遊從容莊子曰是魚樂乎惠子曰子非魚安知魚之樂耶莊子曰子非我安知我不知魚之樂耶蘇子瞻詩欲將同異較錙銖肝膽猶能楚越如若信萬殊皆一理子今知我我知魚逍遙臺在開元寺後唐開元中刺史梁延嗣纍石為臺刻莊子像于其上蘇子瞻詩常怪劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懷館驛水館張祜濠州丨丨詩髙閣去煩燠客心遂安舒清流中浴鳥白石下遊魚秋樹色凋翆夜橋聲裊虛南軒更何待坐見玉蟾蜍橋梁望仙橋相傳藍采和登仙時人聚此橋以望石上有藍采和足迹古迹夢蝶坊在開元寺之西莊子云周夢為蝴蝶栩栩然蝴蝶也俄然覺則蘧蘧然周也不知周之夢為蝴蝶歟蝴蝶夢為周歟解帶石在清流門外昔項羽敗垓下投薛公薛公不納解帶飯石上而去今清流門外有丨丨丨隂陵髙適東征賦次靈壁之逆旅面垓下之遺墟嗟魯公之慷慨聞楚聲而悒于歌拔山而涕洟切霸國以狼狽至丨丨以躊躇虞姬冢在定逺縣南今宿州亦有墓相傳靈壁葬其身此葬其首蘇子瞻詩帳下佳人拭淚痕門前壯士氣如雲倉皇不負君王意只有虞姬與鄭君奕壇在州西七里石臨河刻棋局又鑿窊可置棋子上刻唐人詩字甚古渦口城去鍾離九十里唐李正已反張萬福馳至渦口悉發漕船相銜以進賊兵倚岸熟視不動郡縣志自貞元後西渦口置兩城刺史常帶兩城使垂花塢在逍遙臺南十餘步上有樛藤垂花唐獨孤及甚愛之名曰丨丨丨又詩云紫蔓青滌覆酒壺落花時與竹風俱歸來自負花前醉笑向遊魚問樂無乘龍洲去州二十里在淮水中周世宗征濠夜遣兵持炬乘橐駝絶淮濠兵驚以為鬼乘龍也因以名洲斷梅谷周世宗征淮以荆塗二山乃濠州之朝岡有王者氣命名斷之有梅族居此因名斷梅山宦張萬福李己己反德宗以丨丨丨為濠州刺史召謂曰先帝改爾名正者所以褒也朕謂江淮草木亦知爾威名若從所改恐賊不曉卿復舊名萬福獨孤及為刺史嵗飢賑貸鄰郡流亡而此州獨安皇朝梅詢詢仕于朝嘗請守濠王文正公訪問之曰欲溫故耳文正曰當除一通判伴讀于是吕申公夷簡通判州事今州治倅廳之兩間有梅吕讀書之所存焉王旦王文正公旦吕文靖公夷簡尹公洙皆為通守于此元祐四年通判王雍刻石題名甚詳近世丞相曽懷亦嘗為倅議者謂倅廳多賢達趙抃清獻公王欽若文僖公遊酢定夫先生並為守人物莊周為漆園吏墓在開元寺後魯肅吳人字子敬臨濠東城人也周瑜為居巢長將數百人往見肅并求資糧肅家有米兩囷各三千斛乃指一囷與之肅嘗仕吳為橫江將軍皇朝郭延澤知建州代還致仕居濠州城南傳寫書籍至萬卷號為書藏景德中遣使詣其家取三館所闕書至三千卷以進題詠傳語濠州賢刺史黃魯直道中寄景珍兼簡庾元鎮云云隔年詩債幾時還塗山廣大納萬國王韶詩云云帝禹于此分江河四六乃眷濠梁實臨邊境昔為男國今乃侯邦惟其當要害之衝所以重蕃宣之任得塞翁之馬初亦何心觀莊氏之魚大過初望古稱别駕率多公衮之曽逰今得名流可卜緹屛之必貴地當邊徼敢論分虎之榮時急軍需何有觀魚之樂自澆烽灌燧之餘久陶眷澤遂鑿井耕田之樂殆若中州方輿勝覽卷四十八
