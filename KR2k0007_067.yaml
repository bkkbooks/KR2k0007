body:
  text: 方輿勝覽卷六十七宋祝穆撰隆慶府普安武連隂平普成梓潼建置㳂革禹貢梁州之域東井輿鬼之分野春秋戰國為蜀地秦属蜀郡漢属廣漢郡之梓潼縣武帝属益州劉先主立梓潼郡諸葛武侯相蜀于此立劔門以大劔山至此有隘東之路故曰劔門以閣道三十里至險乃有閣尉蜀尉姜維拒鍾會於此晋以其地入梓潼郡元温入蜀于晋壽置劔閣縣属梁州後武帝分梓潼北界立晋壽郡梁置南梁州又分立安州西魏改為始州兼置普安郡隋廢州為普安郡唐初為始州置劍門縣改為劔州皇朝伐蜀破劔門遂平蜀後以孝宗潜藩陞隆慶府普安軍節度今領縣五治普安事要郡名普安劔陽風俗人性謙和郭茵隂平縣記地湧香泉池名百頃山河横阻云云世有俊彦華陽國志云云侔於巴蜀形勝西接岷峨山海經髙梁之山云云東到荆衡東接巴西華陽志云云南接廣漢西接隂平北接漢中前瞰巨澗元祐郭忱靜照堂記云云後倚層巒多﨑嶇髙下之勢鮮平夷亢爽之地縁以劔閣左太冲賦云云史記蔡澤謂范睢曰今君廣秦棧道千里通于蜀漢竒峯森列秦坦春風樓記云云躍入青漢髙下眩轉隔閡雲雨兩川咽喉郡守題名記云云守土之寄重焉邉山立州春風樓記丨丨而丨是丨一逕坡地中貫大溪太守之居已在半山内外居民悉在山上其下原野濃淡若相次第林壑升降若有等級望之若圖畫卷舒歴歴可見山川梁山在普安縣西北四十九里一名大劍山姜維拒鍾會于此詳見利州及劍門内註卧龍山在普安縣東二里髙百丈盤繞府城馬閣山在隂平縣北六十里峻峭崚嶒極為艱險鄧艾伐蜀軍行至此路不得通乃懸車束馬造作棧閣始通江油因名馬閣葛山在梓潼縣北二十五里昔諸葛亮置營于此鴈門山在梓潼縣南三十餘里山東西起兩嶺鴈從中過故曰鴈門五盤山見利州七盤山在武連縣西縣令何琰按圖記郭璞云縣路翠武㓛貴縣路青武㓛榮遂刻石焉九龍山在武連縣山腹有洞洞前石壁如屋普翠山在普成縣郭外一里混一真人棲真之地秀巖普安縣後有池貯泉劔閣張孟陽丨丨銘巖巖梁山積石峩峩逺属荆衡近綴岷嶓南通卭𤏡北逹褒斜狹過彭碣髙踰嵩華唯蜀之門作固作鎮是曰劔閣壁立千仭窮地之險極路之峻世濁則逆道清斯順閉由徃漢開自有晉秦得百二區一并吞諸侯齊得十二田生獻籌矧兹狹隘土之外人荷㦸百人䞱趄形勝之地匪親勿居昔在武侯中流而喜山河之固見屈呉起興實在德險亦難恃洞庭孟門二國不祀自古及今天命匪易慿阻作昏鮮不敗績公孫既㓕劉氏銜壁覆車之軌無或重跡勒銘山河敢告梁益桞宗元銘序唯蜀都重險多貨混同戎蠻人厖俗剽嗜為㓂亂皇帝元年八月師䘮衆暴羣疑不制妖孽扇因怙恃富強滔天阻兵攻䧟他部北包劔門慿負邱陵以張驁猛堅利鋒鏑以拒大順謂雷霆之誅莫已加也惟梁守臣禮部尚書嚴公以國害為私仇以天討為己任推仁仗信不待司刑而人致其命立義抗憤不待渫血而士一其心悉師出次祇候明詔凡諸侯之師必出於是儲峙饗賚取其豐穣乃遣前軍嚴秦奉揚王誅誕告南土十一月右師逾利州蹈㓂地乘山斬虜以遏奔衝左師出于劔門大攘頑狼諭引刼脅蟻潰䑕駭險無以為固収奪利地以湏王師刲刳腎膓振㧞根抵俾無以肆毎用集我勲力鼖鼓一振元戎啟行取其渠魁以為大戮由忠勇憤悱授任堅明謀猷𢎞長用能啟闢險阨夷為大塗衰沮害氣對乎天意帝用休嘉議功居首増秩師長進為大藩宅是南服将校羣吏願刋山石昭著公之功垂號無窮銘曰井絡坤垠時唯外區界山為門環于蜀都叢險積貨混并羌髳狂猾窺隙狺狺嘯呼慿㨿勢勝厚其㓙徒皇帝之仁宥而不誅暴非德馴害及巴渝乃出王旅乃咨列岳牧臣司梁當其要束器偹攸積糗粮是蓄人無増賦師以饒足渫血誓士𤣥機在握分命貔貅陳為犄角右逾岷山左直劔門攻出九地上披重雲攀天踏空夷坦阻艱破裂層壘殄殱羣頑内獲固圉外臨平原天兵徐驅卒乘嘽嘽大憝囚戮戎夏咸歡帝圖厥功惟梁是先開國進位南服于藩邦之清夷人以完安銘功鍳亂永代是觀杜甫詩維天有設險劔閣天下壯連山抱西南石角皆北向兩崖崇墉倚刻畫城郭狀一夫怒臨關百萬未可傍珠玉走中原岷峨氣悽愴三皇五帝前雞犬莫相放後王尚柔逺職貢道已䘮至今英雄人髙視見霸王并吞與割㨿極力不相讓吾將罪真宰意欲鏟疊嶂恐此復偶然臨風黙惆悵李白蜀道難見成都題詠飛仙閣在梁山杜甫詩土門山行笮微徑緣秋豪棧雲欄干峻梯石結構牢方壑欹踈林積隂帶奔濤寒食外淡泊長風中怒號歇鞍在地􅔄始覺所歴髙徃來雜坐卧人馬同疲勞浮生有定分飢飽豈可逃嘆息謂妻孥我何陋汝曹石櫃閣詩見利州石牛道在梁山詳見劔門關註百頃垻七曲山之上可以望見其地極平衍而豐腴嘉陵江自鳯州大散関發源從利州下流入劔門縣界潼江水在梓潼縣西四里源出陰平馬閣山蜀志夏禹于泥陳山伐梓樹神化為童子故其水曰潼水華容水蜀都賦却背華容白沙渡杜甫詩畏途隨長江渡口下絶岸差池上舟楫窈窕入雲漢天寒荒野外日暮中流半我馬向北嘶山猿飲相喚水清石礧礧沙白灘漫漫逈然洗愁辛多病一踈散髙壁抵嶔崟洪濤越凌亂臨風獨囬首攬轡復三歎水會渡一名水囬渡杜甫詩山行有常程中夜尚未安微月沒已乆崖傾路何難大江動我前洶若溟渤寛篙師暗理楫歌笑輕波瀾霜濃木石滑風急手足寒入舟已千憂陟仍萬盤廽眺積水外始知衆星乾逺逰令人痩衰疾慙加餐井泉香泉在陰平縣二十五里平地湧出周廻八十歩其水香碧故名劔泉在梓潼縣北十二里昔蜀五丁至此見大蛇入穴兄弟忿而㧞之山摧五丁斃焉餘劔隠于路隅化為一泉每庚申甲子日其劔見光靈泉劍南詩藁云過武連縣安國院有二泉傳云唐僖宗幸蜀至此飲泉賜名靈泉陸務觀有詩云滴瀝珠璣翠壁間遭時曽得奉龍顔聞泉即東園也唐正元中蘇洪之刻聞泉賦治平中太守王綱有聞泉十二詠樓亭春風樓在郡圃重陽亭在郡東山之陽唐大中間太守蒋侑創亭李商隱作亭銘古跡古隂平道鄧艾所出丨丨丨丨在今文州漢陰平也其地與江油為鄰此隂平縣自晋宋始置北陰平郡非鄧艾之陰平也上亭驛在梓潼武連二郡之界唐明皇幸蜀聞鈴聲之地又名琅璫驛羅隠詩山雨霏微宿上亭雨中應想雨淋鈴貴為天子猶魂斷窮着荷衣好涕零楊子方詩時平㧾忽忠臣語世亂仍遭弄臣侮至今説到忒琅璫行路猶能痛千古祠廟李杜祠按劔門題詩以太白子美為重而世未有並祠之者會從李參預壁得所賜阜門陵御書蜀道難又從李左史得趙忠定汝愚大書劔詩因建祠刻二詩於前榜其堂曰文熖取韓退之詩語也靈應廟即梓潼廟在梓潼縣北七八里七曲山按圖志神姓張諱亞子其先越雋人也因報母仇遂䧟縣邑徙居是山僖宗幸蜀神于利州桔柏津見䕶駕甚有禮敬暨囬封濟順王親幸其廟王鐸詩云為報山東諸将相拄天功業頼陰兵名宦李頻唐人為劍州刺史李義山有赴職梓潼詩皇朝張知白景德間為守人物邊孝先居梓潼縣南五里長卿山景鸞入儒林傳李業入蜀行傳題詠丹嶂五丁開唐明皇廵狩言歸詩劔閣横空峻鸞輿出狩囬翠屏千仭合云云絶壁劔為峯宋之問借問梁山道嶔岑幾萬重遥州刀作字云云山髙人盡畊雷周輔詩地險客湏到云云牢落三年坐劔州杜甫寄别李劔州使君髙義驅今古云云但見文翁能化蜀當知李廣未封侯路經灧澦䨇蓬鬂天入滄浪一釣舟戎馬相逄更何日春風囬首仲宣楼井邑全居水國中姜遵詩城隍盡枕溪巖畔云云地控咽喉限蜀城范百禄詩山連襟帶通秦嶺云云四六塗芝禁掖剖竹普安乃眷州城實依閣道分銅虎符控石牛道昔號偏州今陞潜府自漢以來保蜀必嚴于棧道至唐而後司梁尤重于牧臣維天設險猿猱欲度而愁攀以人守関貔虎莫如其虓勇後岩前澗鮮平夷亢爽之區昔袴今𥜗頼豈弟中和之政太白之歌少陵之句日月争光子厚之序孟陽之銘山川増重劔門闗劍門建置㳂革禹貢梁州之域東井輿鬼之分野上應参宿春秋戰國為蜀地秦属蜀郡漢属廣漢郡為葭萌縣地蜀先主以霍峻為梓潼太守是時有劔門縣有閣道至險及有閣尉諸葛亮于此立劔門秦苻堅遣徐成冦蜀攻二劔克之始有二劍之號隋置閣之地皆有闗官而于二劒尚未置闗唐置劔門縣劔門始置闗唐又有大劔戌小劔鎮五代時董璋遣兵扼劔門闗為七砦又于関北置永定闗皇朝伐蜀克劔門擒蜀将王昭逺以劔門縣𨽻劔門闗兵馬都監主之中興以來劍門関亦列在利路十七郡之数今領縣一治劔門事要郡名劔関風俗直行申發文字圖經云関官許令直受頒䧏詔赦亦許云云聖節月旦亦有表䟽異時訓飭関吏至親洒宸翰皆所以重設險之計也貨殖所萃普安志其地四塞山川重阻水陸所凑云云盖一都會也形勝界山為門桞宗元劔門銘云云環于蜀都詳見隆慶府壁立千仭張載劔閣記惟蜀之門云云窮地之險極路之峻韋表微劔閣銘天作梁山坤維之壘發地千仭連岡萬里左右絶壁秦坦記云云仰見天鏬蜀土外户劉儀鳯劔門関記梁山之險丨丨所恃以為丨丨蜀之金城黄冕仲脩関議劔門云云崇墉兩崖其髙切雲綿数千里包裹全蜀中出棧道行者側立雖有百萬之衆安所用之為西南戸樞明善堂記蜀云云何介連山亭記有云劔門㨿蜀樞為天下壯劔嶺據其會張衍羅漢閣記蜀之襟帶云云挾楚包漢慶厯張俞劔閣銘極險之險莫如劔閣截野横天犇峯倒壑云云呀秦擁蜀控扼羗蜀趙正亮紀事西南之險山曰劔門云云襟帶京洛萬夫莫當向韜議劔門天險一夫荷戈云云晋張載劔閣記一人守險萬人趦趄無内顧憂通鑑趙季良語偽蜀主孟知祥乞守劔門曰若併兵守劔門大軍雖未至云云山川大劔山在劔門縣亦名梁山又有小劔山在其西北三十里又有小劔故城在益昌縣西南五十里輿地廣記山有小石門穿山通道六丈有餘昔秦伐蜀而不知道則作五石牛以金置尾下言能糞金欲以遺蜀蜀王負力而貪乃令五丁開道引之秦因使張儀司馬錯引兵尋路滅蜀謂之石牛道至永平中司𨽻楊厥又鑿而廣之自縣東南經益昌戌又東南入劔州普安縣界即鍾會伐蜀之路其地連山絶險又謂之劔閣道大劔雖號天險有阨塞可守崇墉之間徑路頗夷小劔則鑿石架閣有不容越太白所謂一夫當闗萬夫莫開者是也又按二劔古不以閣名寰宇記云諸葛亮相蜀鑿石駕空為飛閣道以通行路于此立劔門縣以大劔山至此有隘束之路故曰劔門晋建康中李特隨流人入蜀至劔閣顧盼險阻曰劉禪有此地而面縳于人豈非庸才耶龍巖在劔門縣西一里洞穴可坐百許人雪齋小説云王建為盗朝廷捕之急逃於劔門巨石穴中劔閣銘詩並見隆慶府劔門李德裕題竒峰百仭懸清眺出嵐烟逈若戈廻日髙疑劒倚天參差霞壁聳合㳫翠屏連想是三刀夢森然在目前玉女臺在大劔山絶頂上峭壁千仭下瞰古道行人如蟻有小石刻云玉女煉丹之所大劔水又有小劔水見大劔山註樓閣思賢樓在水門上有張孟陽李太白杜子美桞子厚畫像因以為名寺觀誌公寺劉竢誌公殿記云劔閣之下有壽聖寺石壁之西偏由益昌道中望之隠隠如行僧頂伽帽每秋時出或見光景仙女觀在梁山之頂李宗諤圖經云在縣東五十里北崖頂唐先天二年置道士㷊脩去觀僅一里渡仙女橋有燒丹臺岩畔有仙女影近代以來改為禪院名宦皇朝李士衡咸平間知劔州益州賊王均破漢州未趍劔公乃㷊倉庫守劔州與劔門之兵合以拒賊公逆擊大破之題詠劔門當石隘文苑英華陳宇送許中庸詩云云棧道入雲危劔閣峥嶸而崔嵬李白蜀道難詩云云全篇見成都府劔壁門髙五千丈李白廵南京歌胡塵輕拂建章臺聖主西廵蜀道來云云石為樓閣九天開劔閣重闗蜀北門李白詩云云鍵閉諸蠻屏帝都唐李商隱題劔門先寄上西蜀司徒杜公詩云峭壁横空限一隅劃開元氣建洪區梯航百貨通邦計云云西蹙犬戎威北狄南吞荆郢制東吴千年管鑰誰鎔範只自先天造化爐鑄為䨇劔倚蒼穹杜光庭誰運乾坤陶冶功云云題詩曽駐三天駕礙日長含八海風倚天䨇劔峯巒峻楊日嚴云云控蜀三刀郡府雄倚劔峯巒插太虗趙閲道詩云云髙門中闢限坤隅奸雄莫謂防闗險一百年來自坦途四六肅奉渙綸出臨坤户五百餘里之石穴萬夫莫當之劔門環数千里而行者側立縱百萬衆而誰其敢當因石為闗正欲守関于坤軸平戎有劔豈徒倚劔于天津守當要地是謂䨇劍之門體若大邦式應三刀之夢所謂一夫當闗而萬夫莫開何必三里為城而七里之郭閬州閬中奉國南部新政新井西水蒼溪建置㳂革禹貢梁州之域東井輿鬼之分野晋梁益分野臨参宿唐一行定鶉首之次井桞之度周梁合於雍又為雍州地春秋為巴地巴子後理閬中秦為巴郡閬中縣兩漢因之劉璋改為巴西郡晋改巴西𨽻梁州李雄之亂郡縣荒蕪宋立北巴西郡梁又即巴西立南梁州西魏典畧曰此州古有隆城故又謂之南隆治古閬中城又改巴西郡為盤龍郡隋廢郡而州存煬帝属巴西郡唐改為隆州又改閬州取閬水以為名曰閬中郡復為閬州後唐為保寕軍節度皇朝改安德軍節度初𨽻西川後𨽻利州路中興𨽻利東路今領縣七治閬中事要郡名閬苑唐時魯王靈䕫滕王元嬰以衙中卑陋遂脩餙宏大之擬于宫苑是之謂隆苑其後以明皇諱隆基改曰閬苑閬中閬山四合於郡故曰丨丨風俗地暖氣清太守李獻卿南樓詩序地僻人富唐周庠説王建曰閬州云云地險人豪同上云云恭儉而文馮忠恕記其民云云在西南為佳郡民淳事簡南樓詩序云云銳氣喜舞三巴記閬州有渝水賨民云云漢髙祖使人習之故樂府中有巴渝舞剛悍生其方左思蜀都賦云云風謡尚其武奮之則賨旅玩之則渝舞人才之盛元祐中里人有閬苑三學士錦屏三狀元之語學士謂雍元直蒲𫝊正鮮于端夫也狀元謂陳堯叟堯咨馬㳙也形勝東接巴郡巴志云云南接梓潼北接梁西城土地平衍馮忠恕記其云云而沃山川秀麗同上記云云在羣山磽确之中董丕思政堂記閬中在劔南巴峽云云當梁洋梓益之衝馮忠恕設㕔記閬之為郡云云有五城十二樓之勝槩或謂閬苑山丨丨丨丨丨丨今有五城而楼尚闕宋公德之為守乃建碧玉楼于衙城之西南隅亦名十二楼以成閬苑之勝槩山川閬山在城南唐先天改名錦屏山在城南三里對郡治其山四合于郡山上有四院曰碼碯寺羅漢院畫錦院西橋院後又築閬峯䑓以眺望焉陸務觀詩城中飛閣連危亭處處軒窓對錦屏渉江親到錦屏上却對城郭如丹青靈山周地圖昔蜀王鼈靈登此山因名蟠龍山在閬中縣東南三里以形得名蘭登山在新井縣東二十里相傳嚴君平隠居於此雲臺山在蒼溪縣東南三十五里一名天柱山張道陵昇仙之地蒲𫝊正詩閬州勝絶是雲臺十里松蘿殿閣開小錦屏在蒼溪縣之對頗類錦屏東巖在城東五里有寺鑿山為岩北巖在州北五里有曰繖盖山乃髙僧宣什道場南巖在閬中縣東南五里有曰大像山乃南唐髙士安隠居之所太平興國中陳堯叟兄弟讀書于此亦曰台星巖停雲巖在南部縣蒲景珣家于此岩前為居室至者不知其為巖離堆巖在新政縣東有山曰離堆鑿腹為岩唐鮮于仲通與弟叔明潜修于此有顔魯公磨崖記閬水晏公類要亦曰閬江又曰渝水出鳯州梁泉縣郡志一名西漢水源出秦州嘉陵谷又名嘉陵江元稹蒼溪縣寄揚州兄弟詩蒼溪縣下嘉陵水入洞穿江帶海流李義山有望喜驛詩見利州註海棠溪在州城對江多海棠龍爪灘雍熈中閬州光聖院山下嘉陵江有丨丨丨出焉未幾陳氏二元繼出元豐間大像山東北嘉陵江又有灘生里人亦以龍爪名之元祐六年馬涓果擢第一南池在髙祖廟傍東西四里南北八里漢志彭道將池在今丨丨也魚池在今郭池也然則此池本彭之所開杜甫詩峥嶸巴閬間所向盡山谷安知有蒼池萬頃浸坤軸呀然閬城南枕帶巴江腹芰荷入異縣粳稻共此屋皇天不無意羙利戒止足髙田失西城此物頗豐熟清源多衆魚逺岸富喬木獨嘆楓香林春時好顔色南有漢王祠終朝走巫祝歌舞散靈衣荒哉舊風俗髙堂亦明王魂魄猶正直不應空波上縹緲親酒食崇杞自古昔非唯一川瀆干戈浩茫茫地僻傷極目平生江海興遭亂身局促駐馬望漁舟躊躇慰羈束堂舍整暇堂在州治黄魯直記無事而使物物得其所可以折千里之衝之謂整有事而以逸待勞以實撃虗彼不足而我有餘之謂暇夫不素偹而應卒可􅗲􅗲幸於無患而其顛沛狼戾者十常八九也豈唯人事哉昔者晋欒鍼使於楚楚執政問晋國之勇對曰好以衆整又問如何曰好以暇雖晋楚争盟務以辭相勝充其情楚豈能與中國抗衡哉今之郡守古諸侯也提千里之兵以守関要平居燕安拙者奉三尺而有餘至倉卒變故巧者應事機而不足此不知整暇故也治平園國朝治平初太守朱壽昌築東園于牙城東内有郎官庵三角四照紅藥之亭清風明月之臺錦屏閣花塢桞槁曲池文與可嘗賦十詠詩樓亭錦屏樓在郡治南樓閬州江山文秀聞天下直前㨿其㑹曰丨丨者唐滕王元嬰所建也李獻卿丨丨詩三面江山抱城郭四圍山勢領烟霞馬鞍嶺上渾如鐡繖盖門前半是花㑹景樓雍子儀建于將相坊蘇子瞻為題滕王亭即滕王元嬰所建在玉臺觀杜甫詩君王臺榭枕巴山萬丈仙梯尚可攀春日鶯啼脩竹裏仙家犬吠白雲間清江碧石傷心麗嫩蕊濃花滿目班人到于今歌出牧來遊此地不知還奪錦亭在西岩陸務觀詩奪錦軒中醉倚闌錦屏紫翠挿雲端平生不喜言争奪付與遊人自在㸔紫㣲亭即三陳布衣時所予交游之地後諸陳既貴鮮于康肅寄詩當時未識紫㣲星獨到漁陽訪此亭今日園林為勝地好將前事載圖經鮮于乃子駿之父嘗期三陳以公輔捧硯亭司馬君實侍親逰三陳讀書岩題名其末云司馬光捧硯勾龍瞻可請以捧硯為名寺觀東寺丹陽集云元白齊名有自來矣盖元㣲之冩白居易詩於閬州東寺壁白居易冩元詩百篇合為屏風更相傾慕如此居易詩云憶君無計寫君詩盡寫千行説向誰題在閬州東寺壁幾時知是見君時慈光院㓂平仲過新井丨丨丨留題海棠詩暄風花雜滿欄香盡日幽吟嘆異常翻笑牡丹虚得地玉階開落對君王玉臺觀在州北七里唐滕王嘗逰有亭及墓杜甫詩中天積翠玉臺遥上帝髙居絳莭朝遂有馮夷來擊皷始知嬴女善吹簫江光隠見黿鼉窟石勢参差烏鵲橋更有紅顔生羽翼便應黄髪老漁樵祠廟張侯祠在州治東盖張飛為巴東太守曽子固記侯以智勇為將號萬人敵當蜀之初與魏将張郃相拒於此能破郃軍以安此土可謂功施于人矣其殁也又能澤而賜之則其食於閬人也宜哉顔魯公祠在新政縣詳見蓬州馬存撰祠記上元中顔魯公為蓬州長史過新政作離堆記四百餘言書而刻之石壁上字徑三寸雖崩壞剥裂之餘而典型具在使人見之凛然也元符三年余友強叔來尹是邑始為公作祠堂于其側而求文以為記余謂仁之勝不仁乆矣然有時乎不勝而反為所䧟焉命也史臣論公晚莭偃蹇為奸臣所擠見殞賊手是未必然公孫丞相以仲舒相膠西梁兾以張綱守廣陵李逄吉以韓愈使鎮州而盧杞以公使希烈其用意正相類爾然于数君終不能有所傷而公獨不免于虎口由是觀之士之成敗存亾豈不有命耶而小人軒然自以為得計不亦繆乎且吾聞之古之尚友者以友天下善士為未足又尚論古之人誦其詩讀其書思見其人而不可得則方且欲招屈子于江濵起士會于九原盖其志所願則超然慕之于数千百載之後而况于公乎公之功名事業已絶于人而文學之妙亦不可及用其遺畫之所在而祠之此昔人尚友之意也嘗試與強叔登離堆探石室觀其遺迹而有味其平生則公之精神丰采猶或可以想見也夫名宦滕王元嬰為刺史詳見前閬苑註韋諷杜甫東津送丨丨閬州録事詩聞説江山好憐君吏隱兼寵行舟逺泛惜别酒頻添推薦非承乏操持必去嫌他時如按縣不得慢陶潜皇朝文彦博公舞勺之年侍先令公監征閬州紫極宫道士何守真謂公實南極之靈降而為國申甫公遂自號南極真子唐庚字子西眉州人為閬中令以清嚴著庭下風生有惜海賦朱壽昌嘉祐中為守郭奕中興遺史紹興元年三月張俊自陕西囬過漫天坡奕為詩曰大漫天是小漫天小漫天是大漫天只因大小漫天後遂使生靈入四川後奕罷宣司幹官與通判不赴徃普州賣蒸餅為生晏如也人物范目王伯夫序云佐髙祖起漢中譙隆字伯同閬州人漢景帝時為上林令遷成臯令洛下閎字長公閎中人隠於洛亭武帝徵造太初厯鮮于仲通唐書志與鮮于叔明相繼為京兆皇朝鮮于侁仲通之後登景祐第為本路轉運判官方行新法諸路騷動公獨平心處之奉使九年東坡蘇公以為上不害法中不傷民下不廢親為三難云司馬温公當國除為京東轉運曰子駿福星也陳堯叟文忠公堯佐文惠公堯咨康肅公皆新井人堯叟堯咨皆狀元及第而堯佐登宰輔人皆謂陳氏三公先是三陳未第時訪華山陳搏謂之曰三子皆將相才仲子伯季不逮也父省華致仕閑居賔至則三子衣金紫侍立蒲宗孟新井人為尚書左丞家多書厰閣曰清風以藏之嘗作訓戒諸子弟曰寒可無衣飢可無食至于書不可一日失馬涓南部人父從政未有子買妾見髪間繫白而紅其上問之乃曰父母死不克塟自鬻以塟從政嗟歎即歸妾不理所負後夢一老翁來謝曰我妾父也聞之上蒼矣願君家富貴涓涓不絶及得子名涓元祐六年廷對第一後入黨籍張唐英為御史嘗撰蜀檮杌及撰昭陵名臣傳題詠閬州城東靈山白杜甫作閬山歌云云閬州城北玉臺碧松浮欲盡不盡頭江動將傾未傾石那知根無鬼神會已覺氣與嵩華敵中原格闘且未歸應結茅齋傍青壁閬州城南天下稀杜甫作閬水歌嘉陵江色何所似石黛碧玉相因依正憐日破浪花出更復春從沙際歸巴童蕩槳欹側過水雞銜魚來去飛閬州勝事可斷腸云云溪行盡日無村塢杜甫發閬中詩前有毒蛇後猛虎云云江風蕭蕭雲拂地山木惨惨天欲雨女病妻憂歸意速秋花錦石誰復数到家三月一得書避地何時免愁苦花落空山入閬川鄭谷逰蜀詩云雲横逺塞遮秦甸云云語音漸正近咸秦陸務觀閬中詩遨樂無時冠巴蜀云云外邑送客蒼溪縣杜甫詩云云山寒雨不開直愁騎馬滑故作泛舟廽青惜峯巒過黄知橘柚來江流大自在坐稳興悠哉四六出綍禁庭分符閬苑雖劔外之遐陬有閬中之佳郡若非蓬島之仙居安得錦屏之勝槩五城十二樓是謂閬中之勝四蜀六十郡此為天下之稀山圍海上之閬風夙推閬苑水冩人間之巴字益壯巴風觀魯公碑尚想清忠之節讀山谷記當為整暇之圖持絳節而遊玉臺决非凢俗結茅齋而傍青壁正託帡幪方輿勝覽卷六十七
