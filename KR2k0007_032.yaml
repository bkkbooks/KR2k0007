body:
  text: 方輿勝覽卷三十二宋祝穆撰京西路襄陽府襄陽宜城榖城南漳建置沿革禹貢荆豫二州之域楚地翼軫之分野扵周諸國則榖鄧鄾盧羅郡之地春秋時属楚襄陽城本楚之下邑秦兼天下自漢以北為南陽今鄧州是也自漢以南為南郡今荆州是也襄陽乃南陽南郡二郡之地東漢劉表為荆州刺史始理襄陽魏分南郡置襄陽郡自赤壁之敗魏失江陵南守襄陽西晉為荆州治所羊祜杜預皆鎮襄陽東晉于襄陽僑置雍州遂為雍州刺史治所梁置南雍州西魏改曰襄州隋唐皆為襄州唐復陞為山南東道莭度以襄州為襄陽府皇朝因之真宗潜藩陞襄陽府寳慶以京湖制置安撫兼領今統郡七領縣四治襄陽京西轉運提刑提舉置司事要郡名古雍古峴襄漢榖城古榖伯國鄼城在榖城縣蕭何所封鄧城古樊邑仲山甫之國風俗其民尚文舊志宋玉王逸張悌習鑿齒之徒實生于此土故云云田土肥良蕭子顯齊志雍州序襄陽云云桑梓野植盖處處而有俗尚豪侈舊志魚洪徐鯤皆襄陽人尚豪侈人化之府中謡曰北路魚南路徐雜難理曲江襄州刺史遺愛銘序江漢間州以十數而襄陽為大昔名三輔之雄今則一都之㑹故在晉稱南雍在椘為北津厥繇丨丨亦云丨丨形勝北據漢沔諸葛亮説先主曰荆州云云利盡南海東連吴㑹西通巴蜀此用武之國西接梁益庾翼疏襄陽荆楚之舊云云與闗隴咫尺北去河洛不盈千里土沃田良方城險峻進可以掃盪秦隴退可以保據上流外帶江漢魯肅説孫權曰云云内阻山陵有金城之固沃野萬里士氏繁富北接宛許庾亮表云云南阻漢水其險足固其土足食南包臨沮習鑿齒記云云北接隂鄧獨雄漢上趙善俊告詞爰念襄陽云云蔽淮右而處荆河之奥壤接洛南而據漢沔之要區田土肥良山澤淵邃西控蜀漢張松告詞襄陽重地控制上流云云東帶吴楚自古用武之地三國之所必争吳㑹上㳺本郡志江漢之紀居丨丨之丨丨楚蜀之交以襄陽為重鎮峴山亘其南前人云云檀溪帯其西挟大漢以為池晉順陽碑文云云面崇山以為固壓平楚之千里魏泰文選楼賦漢流東下楚山南峙西挟沮漳北通鄧鄙据蜀粤之上流云云雲夢七澤之富方城漢水之大畫工吟茟之所不能盡者皆致吾几席之中南北必争之地郭見義營造記跨荆豫之逺走江淮之衝號丨丨丨丨丨丨襄陽江陵勢同脣齒郡志云由江陵歩道五百里至襄陽勢同脣齒無襄陽則江陵受敵臂淮楚面巴蜀孫冲賦丨丨丨而丨丨丨足交廣而首畿甸山川峴山去襄陽十里十事道志羊祜嘗與從鄒潤甫登丨丨垂泣曰自有宇宙便有此山由来賢達勝士登此逺望者多矣皆湮没無聞潤甫對曰公徳冠四海道嗣前哲令聞令望當與此山俱傳後人思慕遂立羊公廟并碑李白丨丨懐古詩訪古登峴首慿髙眺襄中天清逺峯出水落寒沙空弄珠見㳺女醉酒懐山公感歎𤼵秋興長松鳴夜風李渉詩方城漢水舊城池陵谷依然身世移歇馬特来尋故事逄人惟説峴山碑襄山荆楚記水駕山而下者皆呼為襄萬山在襄陽西十里有觧佩渚即鄭交甫遇龍女觧珠之所詳見復州鳳山在襄陽東南梁韋叡立寺伏龍山襄陽榖城皆有之曽鞏知州嘗祈雨扵此山卧龍山在襄陽縣有髙陽池白馬山在襄陽城東南十里以白馬泉名每年三月三日刺史褉飲于此馬鞍山一名登楚山髙處有三磴即劉洪山簡九日宴處百丈山在襄陽南二十里舊傳云有麝香獸劉表遣人採藥得麝香數斗榖山在榖城西北六十里寰宇記諸山雲起此山無雲終不䧏雨屛風山在榖城北九十里有白玉堂仙人扵此得素書獨樂山在鄧城西七里諸葛亮嘗登于此作梁父吟荆山在南漳縣西北八十里禹貢云荆及衡陽惟荆州即此是也有抱璞巖云是卞和宅鹿門山在宜城東北六十里上有二石鹿故名後漢龎徳公與龎藴孟浩然皮日休俱隠于此漢江出嶓冡蘇子瞻詩襄陽逄漢水宛似蜀江清文王化南國逰女儼如卿襄水亦名洓水在襄陽西北五里沮漳水水在中廬鎮粉水在榖城北六里南雍州記蕭何夫人漬粉鮮㓗異扵諸水故名檀溪在襄陽縣西南郡縣志云蜀先主乗的顱馬西走至此溪一躍而過沉碑潭杜預南征紀功勒為二碑一沉萬山之下一立峴山之上鮑溶詩襄陽太守沉碑意身後身前㡬年事漢江千里未為沉水厎魚龍應識字井泉金沙泉在宜城縣東一里造酒極美世謂之宜城春又名竹葉酒亭臺漢廣亭在府治南望羣山環繞有漢水映帯平陸萬里故名峴山亭歐陽永叔記峴山臨漢上望之隠然葢諸山之小者而其名獨著于荆州者豈非以其人哉其人謂誰羊祐叔子杜預元凱是已方晉與吴以兵争常倚荆州以為重而二子相繼于此遂以平吴而成晉業其功業已葢于當世矣至于流風餘韻藹然被于江漢之間者至今人猶思之而扵思叔子也尤深盖元凱以其功而叔子以其仁二子所為雖不同然皆足以垂于不朽余頗疑其反自汲汲扵後世之名者何哉傳言叔子嘗登兹山慨然語其属以為此山常在而前世之士皆已湮㓕于無聞因自顧而悲傷然獨不知兹山待已而名者也元凱著功于二石一置兹山之上一投漢水之淵是知陵谷有變而不知石有時而磨㓕也豈皆自喜其名之甚而過為無窮之慮歟將自待者厚而所思者逺歟山故有亭世傳以為叔子之所逰止也故自其屢廢而復興者由後世慕其名而思其人者多也熙寧元年余友人史君中輝以光祿卿来守襄陽明年因亭之舊廣而新之周以囬廊之壯又大其後軒使與亭相稱君知名當世所至有聲襄人安其政而樂従其逰也因以君之官名其後軒為光祿堂又欲紀其事于石以與叔子元凱之名並傳于久逺君皆不能止也乃来以記属于余余謂君知慕叔子之風而襲其遺迹則其為人與其志之所存者可知矣襄人愛君而安樂之如此則君之為政于襄者又可知矣此襄人之所欲書也若其左右山川之勝勢與夫草木雲煙之杳靄出沒于空曠有無之間而可以備詩人之登髙寫離騷之極目者宜其覽者自得之至于亭屢廢興或自有記或不必究其詳者皆不復道望海亭在卧龍山頂上李紳題烏盈兔缺天涯逈鶴背松梢拂檻低湖鏡坐隅看匣滿海濤生處辨雲齊夕嵐明㓕江帆小煙樹蒼茫客思迷蕭索感心俱是夢九天應共草萋萋呼鷹臺在鄧城東南一里蘇子瞻詩莫上丨丨丨平生笑劉表表有野鷹来曲館驛善謔驛襄州有驛名善却唐之丨丨丨也乃淳于髠放鵠處栁宗元和劉禹錫丨丨丨奠淳于先生者即此池古蹟冠葢里荆州記峴首山南至宜城百餘里其間雕墻峻宇漢宣末有刺史二千石數十家朱軒華葢晻映扵太山下號丨丨丨杜審言詩冠葢仍為里臺池尚識名文選樓梁昭眀太子立聚賢士共集文選習家池襄陽記峴山南有習郁大魚池依范蠡養魚法當中築一釣臺將亾敕其兒曰必葬我近魚池山季倫每臨此必大醉而歸按郁後漢人封襄陽公即鑿齒之先也大隄城今城是也李白有大隄曲李善美大隄曲云酒旗相望大隄頭隄下連墻隄上楼日暮行人争渡急槳聲幽軋滿中流長渠在宜城縣曽子固記荆及康狼楚之西山也水出二山之間春秋之世曰􅋣水楚屈瑕伐羅及鄢亂次以濟是也其後曰夷水水經所謂漢水過宜城是也其後避桓温父名改曰蠻水是也秦昭王使白起攻楚去􅋣百里立碣壅是水為渠以灌􅋣􅋣楚都也遂拔之漢恵帝改曰宜城宋武帝築宜城之大隄為城今縣治是也而更謂􅋣曰故城􅋣入秦而白起所為渠因不廢引􅋣水以灌田田皆為沃壤今丨丨是也令孫永曼叔理渠皆復其舊謁余文以為之記名宦劉表為荆州刺史軍馬入宜城遂理襄陽關羽字雲長攻曹仁扵樊圍吕常扵襄陽破降于禁威震華夏曹操議徙都以避其鋭羊祜字叔子太山南城人出鎮南夏甚得江漢之心後卒百姓為建碑于峴山望其碑者莫不墮淚杜預名曰墮淚碑祜與吴將陸抗相對使命交通抗嘗病祜饋之藥抗服之無疑心人多諫抗抗曰丨丨豈酖人者時談以為華元子反復見于今杜預字元凱京兆人羊祐舉預自代都督荆州山簡字季倫河内懐人也為征南将軍都督荆湘鎮襄陽每至習家池未常不大醉而歸時人歌之曰山公何所詣往至髙陽池日暮倒載歸酩酊無所知醉時能騎馬倒著白接䍦舉鞭問葛强何似并州兒李白襄陽歌落日欲沒峴山西倒著接䍦山下迷襄陽小兒齊拍手攔街争唱白銅鞮傍人借問笑何事笑殺山公醉似泥君不見晉朝羊公一片石龜頭剝落生莓苔淚亦不能為之墮心亦不能為之哀清風明月不用一錢買玉山自倒非人推舒州杓力士鐺李白與爾同死生襄王雲雨今何在江水東流猿夜聲陶侃劉洪為荆州辟侃為南蠻長史裴度為莭度使沈約為襄陽令元結嘗參山南東道攝領府事皇朝潘美為山南東道莭度使趙普為山南道莭度使岳飛繫年錄紹興五年復郢州遂引兵復襄陽六年為京西宣撫使置司襄陽尹洙授山南道掌書記人物宋玉宜城人有宅在城内陸龜蒙詩自從宋玉賢特立冠耆舊離騷既日月九辯即列宿卓然悲秋詞合在風雅右王逸宜城人注楚詞龎徳公後漢南郡襄陽人也居峴山南廣昌里未嘗入城府夫妻相敬如賓時劉表延請不能屈乃就候之曰先生若居畎畝而不肻官祿後世何以遺子孫公曰世人皆以危今獨遺之安後遂携妻子登鹿門山採藥不返司馬徳操嘗詣龎徳公值徳公上冡徳操徑入其室命徳公妻子速作黍云徐元直當来就此共談其妻子供設須㬰徳公還直入相就不知何者是客也龐統字士元襄陽人從父徳公以為鳳雛習鑿齒襄陽人博學洽聞以文章稱馬良諺曰馬氏五常白眉㝡良張柬之以賢良召年七十餘對策第一孟浩然襄陽人也隠鹿門山年四十逰京師王維私邀入内省俄而𤣥宗至詔浩然出問其詩云不才明主棄多病故人疎𤣥宗曰朕亦何嘗葉才因放還山今郡治有孟亭杜審言襄陽人有孫曰甫有故宅在焉曽子固嘗有詩以紀其事皇朝胡旦鄧城人進士冠天下魏泰襄陽人章子厚欲官之拂袖還家米芾襄陽人題詠送别峴山頭梁簡文帝詩分手桃林岸云云君欲寄音信漢水向東流江漢變鄒魯元帝示荆州吏民詩方今丨丨士丨為丨丨俗漢池水如帶沈約别謝文學詩云云巫山雲似盖一望沮漳水寧思江漢㑹南關繞桐柏江淹望荆州詩奉詔至江漢始知楚塞長云云西岳出魯陽控帶荆門逺韓愈送李尚書赴襄陽詩帝憂南國切改命付忠良壤畫星摇動旗分獸簸揚五營兵轉肅千里地還方云云飄浮漢水長賜書寛属部戰馬隔鄰疆縦獵雷霆迅觀棊玉石忙風流峴首客花艶大隄娼富貴由身致誰教不自强盧羅遵古俗陸龜蒙續襄陽耆舊傳作詩云漢水碧于天南京豁然秀云云鄢郢迷昔囿訪古登髙峴李白詩云云慿髙眺襄中天晴逺峯出水落沙塞空山色郡城頭岑參詩别乗向襄州蕭條楚地秋江聲官舍裏云云夜入橘花宿前人云云朝穿楓葉紅果得槎頭鯿孟浩然詩試垂竹竿釣云云漢水鯿魚極美襄人以槎斷水因謂槎頭鯿鬬訟日已稀蘇子瞻㳺峴山題詩吏民憐我懶云云我来無時莭杖屨自排扉煙雨接三湘崔湜襄陽作廟堂初觧印郡邸忽腰章按莭廵河右鳴騶入漢陽城臨南峴出樹繞北津長好學風猶扇誇才俗未亡江山跨七澤云云蛟浦荷菱净魚舟橘柚香醉中求習氏夢裏憶襄王宅毁仍思鳳碑存更憶羊下車慙政美閉閣幸時康多謝征南術于今尚不忘玉節前臨南雍州劉禹錫詩金貂曉出鳳池頭云云重與江山作主人張籍詩商路雪開旌斾逺楚堤梅𤼵驛亭春襄陽風景由来好云云平眀旌斾入襄州戎昱收復襄陽詩二首悲風慘慘雨瀟瀟峴北山低草木愁暗𤼵前軍連夜戰云云五營飛將擁霜戈百里僵屍滿濜河日暮歸来看劔血將軍却恨殺人多南通交廣西峨岷歐陽永叔詩言語輕清㣲帯秦云云人道使君如羊杜蘇子瞻詩襄陽春逰樂何許峴山之陽漢江浦使君朱斾来翻翻云云襄陽州望古為雄王介甫詩云云耆舊相傳有素風四葉表閭唐尹氏一門逃世漢龎公逰人多是弄珠仙顔堯詩爽籟盡成鳴鳳曲云云四六眷是邉城屹然制閫控此上㳺式是南服峴山同峻漢水俱清奬率貔貅掃清狐免眷荆襄之沃壤據江漢之要津在晉則稱南雄在楚則為北津帝眷西郵之名部地鄰北國之極邉方城漢水素稱用武之區峴首習池亦號勝逰之地毋矢我陵尺地莫非王土各守爾典黎獻共為帝臣休兵屯田正須元凱之規畫輕裘緩帯㑹繼叔子之功名北控闗河拓祖宗之故境東連楚泗據江漢之上流夜奏㨗書請繼旌斾入襄陽之句晨開幕府更歌江山作主人之詩随州随縣應山建置沿革禹貢豫州之域韓地角氐亢分野春秋為随國楚以為縣秦属南陽郡二漢因之晉属義陽郡後分置隨郡梁曰随州西魏扵随郡置并州唐為随州改漢東郡國初陞為崇義軍節度改崇信軍中興以来䧟扵偽齊岳飛始復随州今領縣二治随縣事要郡名漢東随陽風俗其地僻絶曽子固尹公亭記随去京師逺云云其俗醇厚范公擇長慶寺碑其人繁阜云云庳貧薄陋同上云云自古然也常有賢者太平興國改崇信軍詔随扵春秋雖號小國然觀其接應鄰敵云云山澤無美材歐陽永叔李氏東園記丨丨之産丨丨丨土地之貢無上物形勝實下州同上雖名藩鎮而丨丨丨未嘗通中國同上在春秋世云云盟㑹朝聘僻特居荆夷葢於蒲騷鄖蓼小國之間大耳介襄郢申安之間漢東志山川大洪山在州西南隅乃慈悲盧尊者道塲舊為竒峯寺今為保夀院山崛起一方巉然雲間四面斗絶其絶頂峯巒崖石中有大湖常見雲氣在下靖康避冦之人立寨栅自保賊竟不能破以斗絶不可躋攀也厲山禮記祭法云厲山氏之有天下也其子農能殖百榖注云厲山氏黃帝也起扵丨丨西漢志注随故厲國也皇甫謐今随之厲鄉荆州記山有二穴云是神農所生遂即此地為神農社常年祀之四望山在随縣東㝡髙四望皆見夀山在州東北三十五里詳見徳安府髙貴山在應山縣西有靈濟祠前有龍井聖泉大義山在州東北㡬環百里民居其間貧富自相取足有義風故名九十九岡自棗陽至厲鄉道路交錯素號丨丨丨丨溳川在随縣劉長卿詩淮南摇落客心悲丨丨悠悠怨别離早雁初辭舊闗塞秋風先入古城池武河西南流五里至樊老湖合縣東河檀溪在随縣汶水在應山縣北槎水左傳云楚人除道梁槎營軍臨随即此㵐水在州城西北陳師道詩云㵐溳䨇水絶城隅髙誼前聞李大夫九十九岡風俗厚人人况已握靈珠天井澗在應山東澗之内有平原寨丙寅北敵侵犯居民皆在此寨樓亭漢東樓沈括詩野草粘天雨未休客心自冷不關秋寨西便是猿啼䖏滿目傷心悔上樓白雲樓邢居實賦云洞庭之北兮漢水之東髙樓之特起兮羣山環峙曽不知其㡬重溳隂亭張天覺丨丨丨詩駕言晨出㵐臺隅溳上登臨酒拍壺不似峴山羊叔子心随漢水欲吞吴古跡舜井斷碑碑字漫㓕惟碑隂有五大夫字相傳秦時碑舊在舜子苍草間今在漢東閣下元祐間許覺之詩一千二百餘年外萬古消磨不可尋舜子井泉誰記古随人閭苍祗如今𨽻書字雜科蟲體民爵名存樂石隂登覽時来醒醉眼也勝他物在園林名宦栁元景宋元嘉為守斬獲羣蠻李繁容齋随茟云韓愈詩盖謂丨丨時為随州刺史藏書既多且記性警敏故籖軸嚴整如是耳韓愈詩鄴侯家多書挿架三萬軸一一懸牙籖新若手未觸為人强記覽過眼不再讀偉哉羣聖文磊落載其腹皇朝吕大防紹興為宰范純仁以忤章子厚落職為守人物季梁使随侯修政楚不敢伐見左傳周章後漢時随人為諫大夫論竇憲皇朝連舜賔應山人嵗飢出榖萬石捐價以糶恵及鄰邑歐陽公表其墓李堯輔歐陽永叔作昌黎文集序云予寓漢東大姓李氏子堯輔頗好學予多㳺其家得昌黎集六卷因乞李氏以歸讀之見其源深而雄博名賢尹洙慶厯中貶随州寓居金燈院後人立尹公亭沈括神宗永洛城䧟括以始議謫随州題詠彼美漢東國李白詩云云州藏明月輝誰知喪亂後更有一珠歸陸産不萬一王安中詩随岡百欠一云云鈴齋終日敞門扉范純夫詩山郡經時無好客云云四六疏榮天上剖竹漢東曽屈名賢来臨此郡聚落随山之下煙嵐溳水之濵井邑蕭條既苦無扵陸産里閭窮陋亦不富扵農田寂寞山城雖舟車之罕至慈祥郡政幸襦袴之相安洪山斗絶或為移治之謀漢郡星羅即奏歸疆之㨗指日鼓行奨率貔貅之衆聞風奔遯掃除狐兎之羣方輿勝覽卷三十二
