body:
  text: 方輿勝覽卷二十一宋祝穆撰撫州臨川金溪崇仁樂安宜黃建置沿革禹貢揚州之境於天文為星紀之分野春秋為吳境後屬越又屬楚秦屬九江郡漢為豫章郡之南城縣後漢分南城北境為臨汝縣三國時吳王孫亮分豫章之東部南城臨汝二縣置臨川郡隋罷郡為州時總管楊武通奉使安撫即以撫州為名唐平林士洪置撫州領臨川南城邵武宜黃崇仁永城東興將樂八縣尋省東興永城將樂三縣又割邵武屬建州南唐為建武軍國朝仍為撫州今領縣五治臨川江西提舉置司事要郡名臨川水名臨汝水名風俗其民樂於耕桑見後擬峴臺記其俗風流儒雅溪堂云昔有右軍康樂魯公為之守故云云喜士而尚氣節樂讀書而好文詞同上有晏元獻王文公為之鄉人故其人云云人物盛多周洪道進士題辭曰此邦非特地大人庶而云云若元獻之進賢好善荆公之文學行誼南豐之主盟斯文汪公革以竒才冠南省陳公孺以版授遜大魁皆後來所當思齊者形勝地大人庶同上瀕汝水以為城謝靈運集序云云粵閩犬牙其疆獨孤及撫州新亭記與兩丨七丨丨丨丨丨非通道擬峴臺記云云五峯三市臨川志城中有丨丨丨丨或謂青雲嶺逍遙嶺鹽嶺蕭家嶺與慶嶺而五土産清江紙黃魯直謝陳適惠紙蠻溪工藤卷盈匹側釐羞滑繭絲白想當鳴杵砧面平桄榔葉風溪水碧山川靈谷山在臨川縣東三十里荀伯子臨川記云懸巖半岫有瀑流分於木未映日望之如掣練王介甫丨丨丨詩序曰吾州之東南有丨丨者江南之名丨也龍蛇之神虎豹翬翟之文章楩楠豫章竹箭之材皆自此出而神林鬼冡魑魅之穴與夫仙人釋子詭譎之觀咸付託焉至其淑靈和氣盤礡委積於天地之間萬物之所不能得者乃屬之於人羊角山在郡治譙樓前舊有詩云丨丨丨髙吹畫角虎頭洲畔釣靈鼇峩峯山在臨川西四十里謝靈運有詩參政李璧嘗作丨丨書堂以面之英巨山在臨川縣巖內有石人坐盤石上有塵穢則興風潤則致雨臨川山在崇仁縣南六十里豐材山在崇仁西百九十里登之者望廬嶽彭蠡皆在其下寶蓋山在崇仁縣號江南絶頂有形如丨丨上有浮休壇乃玉郭二真人升仙之地顔魯公為之記玉笥山在崇仁縣顔魯公有記翠雲山在金溪縣有瀑布治平中儒士胡采發榛荆而出之有躍馬泉試茗泉鳴玉亭皆見於荆公詩銅斗山曽文昭記在金溪南二十里山能出雲雨弭災害為一川五縣之望踈山在金溪唐大中初有何仙舟棄官讀書于此今遺址猶存下有寺其景尤勝軍山曽子開丨丨廟碑丨丨南豐之望也其髙十有九里餘二百步其上四峯崛起望之蒼然其旁飛瀑一㵼千尺其下龍穴投以鐡石雨即隨至縣固多山而兹山傑出見於百里之外宜為此邦之望也又云舊傳吳芮攻南粵駐軍此山其將梅鋗祭焉禮成若有士騎麾甲之狀因號曰軍山邦人祀之蓋自此始唐開元中復見靈迹白華巖在金溪巖主是寶月禪師王介甫李生丨丨丨修道詩丨丨丨主是金仙假此山僧學道禪珍重此行吾不及為傳消息問因緣烏石岡距臨川三十里下有塘王介甫烏塘詩烏塘渺渺緑平堤堤上行人各有携試問春風何處好辛夷如雪柘岡西柘岡在臨川王介甫送黃吉父歸金溪詩丨丨西路白雲深想子重歸得重尋亦見舊時紅躑躅為言春至每傷心石廪在臨川東荀伯子記廩口開則歲歉閉則年豐石䂬在宜黃石梁橫空孫公覿詩烏鵲填成天上路鬼神鞭出海中山汝水在臨川東北六里臨川水在縣東九十餘里出定川流十里與汝水合清江渡在金溪縣出劄紙文昌堰地讖以堰合為大魁之讖溫湯在臨川西三十二里驪塘王介甫故居在焉送鄧監簿詩不見丨丨路于今四十春臺閣擬峴臺曽子固記尚書司門員外郎晉國裴君治撫州之二年因城之東隅作臺以遊而命之曰丨丨丨謂其溪山之形擬乎峴山也數與其屬與州之寄客者遊而間獨求記於余初州之東其城因大邱其隍因大溪其隅因客土以出溪上其外連山髙陵野林荒墟逺近髙下壯大宏闊壯竒可喜之觀環撫之東南者可坐而見也然而雨隳潦毁蓋藏委棄於榛藂茀草之間未有即而愛之者也君得之而喜增甓其土易其破缺去榛與草發其亢爽繚以橫檻覆以高甍因而為臺以脫埃氛絶煩囂出雲氣而臨風雨然後溪之平沙漫流微風逺響與夫浪波洶湧破山拔木之奔放至於髙桅徑櫓沙禽水獸下上而浮沉者皆出乎履舄之下山之蒼顔秀色巔崖拔出挾光景而薄星辰至於平岡長陸虎豹踞而龍蛇走與夫荒蹊聚落樹陰暗曖遊人行旅隱見而斷續者皆出乎祍席之內若夫雲煙開斂日光出沒四時朝暮雨暘明晦變化之不同則雖覽之不厭而雖有智者亦不能窮其狀也或飲者淋漓歌者激烈或靚觀微步旁皇徙倚則得於耳目與得之於心者雖所寓之樂有殊而亦各適其適也撫非通道故貴人富賈之遊不至多良田故水旱螟之災少其民樂於耕桑以自足故牛馬之牧於山谷者不收五穀之積於郊野者不垣而晏然不知桴鼓之警發召之役也君既因其土俗而治以簡靜故得以休其暇日而寓其樂於此州人士女樂其安且治而人得遊觀之美亦將同其樂也故豫之為記其成也王介甫詩君作新臺擬峴山羊公千載得追攀歌鍾隱地登臨處花木移春指顧間城似大隄來宛宛溪如清漢落潺潺時平不比征吳日緩帶尤宜向此間見山閣在倅廳王介甫作記清風閣在州宅介甫詩飛甍孤起下州墻勝勢崢嶸壓四方逺引江山來控帶平看鷹隼去飛翔髙蟬感耳何妨靜赤日焦心不廢涼况是使君無一事日陪賓從此傾觴堂亭五峯堂在州宅用南豐詩中語射亭在金溪縣即飲歸之亭也曽子固嘗作記云金溪尉汪君為尉之三月斥其四垣為丨丨既成教士於其間而名之曰飲歸之亭王介甫詩因射築兹亭序賢仍閲兵庶民觀禮教羣寇避威聲拙齋郡守趙景明建朱元晦記云便坐之北循廡而西入叢竹間得前人所為秋聲齋者老屋數椽人迹罕至嘆曰是室之陋非豫之拙則孰宜居之乃更其榜曰丨丨抑嘗聞之天下之事不可勝窮其理則一而已矣君子之學所以窮是理而守之也其窮之也欲其通於一其守之也欲其安以固以其一而固也是以近於拙蓋無所用其巧智之私而惟理之從極其言則正其誼不謀其利明其道不計其功是亦拙而已矣思軒在倅廳林慥所立王介甫題云名郎此地昔徘徊天誘良孫接踵來萬屋尚歌餘澤在一軒還向舊堂開名郎指慥之祖水部也祠廟謝康樂祠在郡治顔魯公祠在郡圃曽子固記云初公以忤國忠斥為平原太守䇿安祿山必反為之備祿山既舉兵公與常山太守杲卿伐其後賊之不能直窺潼關以公與杲卿撓其勢也在肅宗時數正言宰相不悅斥去之又為御史唐旻所構連輒斥李輔國遷大上皇居西宫公首率百官請問起居又輒斥代宗時與元載爭論是非載欲有所壅蔽公極論之又輒斥楊炎盧杞既相德宗益惡公所為連斥之猶不滿意李希烈陷汝州把即以公使希烈希烈初慙其言後卒縊公以死是時公年七十有七矣公殁埀三十年小人繼續任政天下日入於弊大盜繼起天子輒出避之唐之在朝臣多畏怯觀望能居其間一忤於世失所而不自悔者寡矣至於再三忤於世失所而不自悔者蓋未有也至於起且仆以至於七八遂死而不自悔者則天下一人而已若公是也王文公祠在城內即公故宅古迹康樂翻經臺在城內寶應寺顔真卿為記右軍故宅荀伯子臨川記羲之為臨川內史置宅於郡城東名曰新成旁臨回溪特據層阜其地爽塏右軍墨池在臨川學宫曽子固記云王羲之嘗慕張芝臨池學書池水盡黑教授王君書丨丨丨丨以揭之此為其故迹豈信然耶韓子蒼雜記池中匆時水黑謂之墨龍此物每見士之試于有司者得人必多率以此為驗咸平間御史黃公符詩往往吐烏雲依依如皂蓋卧氷池在郡城東王祥乃琅琊人豈祥避地廬江遂成遺迹耶張右丞詩雖贋猶堪賞前賢况可師魏夫人壇在臨川縣西北六里按神仙內傳夫人姓魏名華年八十有三不飲不食以成道咸和九年嵗在甲子用臧景文法託形神劒化成死孩既而羣仙來迎乘風輪之車言會於陽洛之宫也所修行壇上有天然石龜其首不見故老相傳昔烏龜源有石龜每犯田苗被人擊之首折即其處也刺史顔真卿撰仙壇碑花女壇花姑姓黃名令徴顔真卿撰碑云戒壇在城內寶應寺顔真卿記金石臺讖云丨丨丨分丞相出文昌堰合狀元生金柅園臨川郡舊有丨丨丨晏同叔詩臨川樓上柅園中十五年前此會同一曲清歌滿樽酒人生何處不相逄名宦王羲之晉人為臨川內史謝靈運為內史杜佑為刺史有去思碑戴叔倫為刺史有遺愛碑皇朝黃庭堅為太和令人物樂史宜黃縣人嘗編寰宇記晏殊瑞州志殊祖墉唐咸通中官江西始著籍於髙安祖父客遊臨川故殊生撫州中童科仁宗朝為相范仲淹歐陽修孔道輔皆出其門富弼楊察皆其壻也王安石臨川人神宗朝為宰相封荆國公諡曰文王安國安石之弟也初吕惠卿諂事安石安國惡之一日安石與惠卿論新法於其第安國好吹笛安石曰宜放鄭聲安國曰願兄逺佞人惠卿深銜之乃因鄭俠獄陷安國坐罪放歸田里謝逸臨川人自號溪堂黃庭堅語及江南文士每嘆賞焉從弟薖字幼槃自號竹友時人目為二謝劉堯夫以釋褐魁上舍汪革魁南省陳孺以版桀遜大默羅點榜眼仕至樞密王克勤自童科至館閣陸九淵號象山有書院在貴溪題詠鶴髮州民擁使車權德輿得撫州報戴員外詩云云人人自説授恩初如今天下無寃氣乞為邦人雪謗書內史宅邉今有恨羅隱贈撫州阮兵曹詩雪晴天外見晴容幽軋行輪有去蹤云云步兵厨畔肯相容十年别鬢疑朝鏡千里歸心著晚鍾若不他時更青眼未知誰肯薦臨卭畫堂煙雨五峯秋曽子固薦撫州錢郎中詩名郎元是足風流得郡東南地更優翠幕管絃三市晚云云黃柑巧綴星垂檻香稻新翻雪滿甌應與謝公咨健筆邦人才薄詎能酬四六疏榮北門往鎮西川寵膺渙綍共理臨川棊分五邑鱗次萬峰管絃三市簾幕萬家眷臨川之重地為江右之名邦肆頒漢札之十行來牧汝溪之千里瞻言顔謝之名邦宜得龔黃之循吏墨池清淺不妨簸弄明月之珠若論地望蓋外麗而中枵英巨崔嵬正好頡頏飛霞之佩既得賢侯宜上恬而下樂祠象儼存蓋康樂平原之舊治民頑健訟相師成珥筆之風儒風浸盛本荆公元獻之故鄉吏黠多姦玩習弄舞文之弊建昌軍南城新城南豐廣昌建置沿革禹貢揚州之域為斗牛之分野於古為荒服之國春秋時為吳南境戰國屬楚秦屬九江郡漢屬豫章郡南城縣𨽻焉後漢因之吳分豫章東郡置臨川郡治南城隋罷臨川郡置撫州唐末五代為唐升南城縣為建武軍皇朝改建昌軍今領縣四治南城事要郡名旴江西漢地理志南城縣注云旴水西北至南昌入湖漢丨丨之名肇於此或謂江南旴村有老姥自此山去故號丨母丨見南唐韓熙晟旴江亭記或謂旴真君窮水源至血木四因此得名風俗其民氣剛而才武朱元晦建昌進士題名記建昌之為郡據江西一道東南上遊其地山髙而氷深云云其士多以經術議論文章致大名如直講李公中書翰林曽公兄弟尤所謂傑然者也其他能以詞藝致身取髙科而登顯仕者亦不絶於當世鄉先逹乃考自國初以至今日得若干人且將礱石記之以俟來者之嗣書焉比屋弦誦張允修平逺臺記建昌佳山水云云市肆繁密吳鑑撰設廳記云云其邑屋華好形勝控五嶺唐南城縣羅城記丨丨丨封疆之要捍七州寇徼之虞控三吳胡幹化詩丨丨丨之襟帶抗禦七閩王平叔建昌軍記云云牽制百粵其城壁堅峻吳鑑記云云其地山髙而水清朱元晦序水土衍沃曽子固軍山廟碑曰地迫兩粵其風氣和平云云林竒谷秀唐刁尚羅城記云云水繞川環兩溪合流於其下陳起云蠻嶂聫屬如翠屏云云山川鳯凰山在郡城北二里蓋郡之主山也相傳丨丨曽降於此麻姑山在城西南十五里髙九里五十步周回四百一十四里至山麓有尋真亭東隅石磴盤旋山腰而上乍平乍峻至山之半有界青軒對第二谷水飛流而下又攀援二里間有瀑布淙下三十餘丈立雙練枕流二亭又登萬巘旁有石池百餘步入山門榜曰丹霞小有洞天至忘歸亭亭跨清流其下有水簾岩舊有龍居之夾兩山間東望逺峯煙雨杳靄秀出如畫自是而入地勢寬平膏腴數百畝路之東南隅則碧蓮池仙壇記所謂紅蓮變白今又碧之處也玳瑁石介其左由池畔坦途一望間有會仙亭入觀門澗水冬夏長流乃蔡經宅麻姑王方平所會之處劉禹錫詩雲蓋青山龍卧處日臨丹洞鶴歸時霜凝上界花開晚月冷中天果熟遲沈彬詩花洞路中逄鶴信水簾岩底見龍眠李太伯丨丨丨賦路蹊盤欎前後相失岡巒崒嵂左右馳突鳴泉百雷躍下雲窟喬松萬矛舞破煙霄曽子固丨丨丨送南城尉羅君詩麻姑之路摩青天蒼苔白石松風寒峭壁直上無攀援懸磴十步九屈盤上有錦繡百頃之平田山中遺民耕紫煙又有白玉萬仞之飛泉噴崖直㵼蛟龍淵豐堂廣殿何言言階腳插入斗牛間樛枝古木不記年空槎枵然卧道邉幽花自嬋娟林深為誰妍但見塵銷境靜翔白鶴吟清猿幽禽野獸往往嘷荒顛却視來徑如緣絙千重萬疊穹岩蠻下有嵳峩窈窕之羣山又有甌閩一髮之平川奕棊縱橫逺近布魚鱗比接參差髙下分岡原千竒萬異可意得筆墨秃盡誰能傳丈夫舒卷要宏逹世路俯仰多拘牽偶來到此醒心目頓覺兩耳辭嚻喧羅夫子一日逺補東南官愛此層崖峻壑之絶特開軒把酒可縱觀喜此坡霧插漢之敻起出門舉足得餘看羅夫子一尉東南方屈盤此邦人人衣食足問境年年鼛鼓間几案剸裁得休暇山水登躡遺紛煩我送行之思故國引領南望心長懸軍山在南豐一名南山重九於此登髙乃上旴絶頂杉嶺在南城縣界謝道韞詩古昔地多杉煙光鎖翠嵐夜來風景好宿處嶺之南飛猿嶺在南城東五十里謝靈運詩朝發丨丨丨暮宿落峭石仙人岩去南城五十里臨溪峭壁數百仞五岩連屬上二岩有二棺用小瓦石平其下華子岡謂仙人華子期謝靈運詩南州實炎德桂木凌寒山銅陵映碧澗石磴㵼紅泉既枉隱淪客亦棲肥遁賢險徑無測度天路非術阡遂登羣峯首邈若升雲煙羽人絶髣佛丹邱徒空筌圗牒復磨滅碑版誰聞傳若辨百世後安知千載前且申獨往意乘月弄潺湲常充俄頃用豈為古今然秦人洞去仙都觀二里李泰伯詩秦法雖甚苛秦吏若猶拙山林不數里便爾逃得絶丹霞洞在觀西七里係小有洞天彌望皆黃茅白葦紹興甲寅郡人避寇登其上忽見一庵有道人觀書麻源在南城縣西十里有三谷循溪而入茂林修竹有橋方石在南豐東半里古讖云沙洲到丨丨前南豐出狀元曬禾石在南豐東四十五里鄉人於此丨丨紹興間風雨晝晦雷震石上忽成介我黍稷四篆字郡境屢豐湖在南城東五里地鈴云丨丨衝破狀元生今衝破已久而未應石虎潭去南城半里地鈴有丨丨丨填出宰相之語紹興中潭填曽魯公布正拜盱水見前注曽布詩軍山流泉初濫觴繞東出為盱江峯巒隱映淵源長地靈物秀雄吾邦井泉鳯山泉在郡西偏其泉甘冽釀酒醇美虎跑泉在秦人峯下舊傳有丨至山爪地丨湧李泰伯吕灌園陳都官皆有詩堂亭平逺堂在郡治東地勢髙爽眺望江山宛若圖畫取郭熙善畫山水丨丨以名之十賢堂在仙都觀顔魯公祠內祀郡先達陳彭年李覯魯鞏曽布曽肇王無咎吕南公鄧潤甫朱京朱彥鳯山亭在郡治後寺觀雲門院舊射圃名覲德亭唐德琳禪師卓庵之地仙都觀在麻姑山今為祠官典領之聀乃王方平陰長生學道得仙之山蘇子由詩道士白髮尊面黑嵐氣染自言王方平學道古有驗道成白晝飛人世不留窆後有陰長生此地亦所占並驅雙翔龍霞綬紫雲襜揚𬒮玉堂上與世作豐歉古迹麻姑壇顔真卿記丨丨者葛稚川神仙傳云王逺字方平欲東之括蒼山過吳蔡經家教其尸解如蛇蟬也經去十餘年忽還語家言七月十日王君當來過到期日方平乘羽車駕五龍各異色旌旗導從既至見經父兄遣人與麻姑相聞麻姑至蔡經亦舉家見之是好女子年十八九許頂中作髻餘髮埀之至腰其衣有文章而非錦繡得見方平坐定各進行厨金盤玉杯多是諸華而香氣逹于內外劈麟晡行之麻姑自言接待以來見東海三為桑田矣方平笑曰海中行復揚塵也麻姑手似鳥爪蔡經心中念言背癢時得此爪爬背乃佳也方平心知即使人牽經鞭之七星杉在仙都觀殿後嶺園二三丈髙切雲漢橫列有七株名宦謝靈運臨川內史顔真卿為內史皇朝楊傑嘗為南豐令人物曽致堯旴江貢士擢第自致堯始第四子易簡第五子易占俱登第易占五子鞏布肇曽鞏長於史學仕至中書舍人號南豐先生王介甫送子固詩曽子文章衆旡有水之江漢星之斗曽布仕至尚書右僕射諡文肅封魯公曽肇為翰林學士後諡文昭陳彭年南城人在翰林十餘載皆文翰清祕之目人謂其銜為一條氷後仕至參政李泰伯南城人為文自成一家嘗試制科六論不得其一曰吾書無不讀必孟子注疏也擲筆而出人再檢視果然范仲淹余靖薦補將士郎海門簿召為太學説書葬鳯凰山下無子孫每嵗春秋守令同學官拜掃以為故事鄧溫伯名潤甫從李泰伯學後為尚書左丞朱軾南豐人三子相繼登第仲子彥以從官出守金陵錢塘迎侍就養邦人榮之曽漸為省元名賢李綱謫居題詠軍壘近仙山梅堯臣嘗題詩云云麻姑第三谷靈運詩亦存魯公記可讀此邦人人衣食足見麻姑山注南豐送羅尉詩四六輟自道山出臨旴水郡創旴江地鄰閩嶠臨川支邑旴水名邦澤國上遊旴江勝槩道通百粵山川地分翼軫之奧區本屬臨川之支邑堂紀十賢人物境接神仙之真宅今為江右之名邦中更變故半為瓦礫之場久被撫摩仍是袴𥜗之俗為南豐之瓣香既知正學賦靈運之詩句足紀勝遊左臨旴水帶雙江之清流右瞰麻源綿三谷之翠色銅陵石磴尋謝屐之風流金盤玉杯識顔碑之氣骨山多隱逸谷通華子之岡地富仙靈壇近蔡經之宅臨江軍清江新喻新淦建置沿革禹貢揚州之域天文斗分野春秋時屬吳後屬越戰國屬楚秦為九江郡地漢初屬淮南郡後屬豫章郡三國吳為豫章安成巴丘三郡地隋屬洪吉袁三州唐因之國朝以清江縣置臨江軍𨽻江南西路仍以新淦新喻𨽻焉今領縣三治清江事要郡名清江見沿革注風俗君子善居室小人勤耕稼隋志尚禮教而畏清議臨江志其君子云云崇德齒而尚名檢勤力而知分同上其小人云云形勝當四會之衝南唐吳鸞建清江縣議當南粵虔吉舟車四會之衝碧嶂清江宋羅知古詩層層碧嶂來無盡衮衮清江逺莫追閣皂玉笥為鎮山境內之名山新淦嘗為制置治所同上楊行密得吉州欲圖贑用嚴可求之䇿以新淦為都制置治所國朝樊知古奏廢土産黃雀酢昔吕嘉問為守荆公以詩送之曰黃雀有頭顱常行萬里餘想因君出守暫得免苞苴山川章山在郡城西偏郡之來山也宣和中太守汪師心修郡圃得碑石於地中始知岡名富夀閣皂山在新淦縣北六十里淦山南一里為神仙之攸館臨江志云山形如閣山色如皂故以名道書云第二十福地即漢張道陵丁令威葛孝先修煉之地陶弼詩萬仞天然閣皂形陰陽不似衆山青一區海上神仙宅數曲人間水墨屏華表鶴歸春谷響玉京龍起夜潭腥可憐張葛無人繼三級髙壇拂杳冥玉笥山在新淦縣上有群玉峯九仙臺金牛坡白龍岩棲霞谷山中有蕭子雲宅詩云郁木坑頭春鳥呼雲迷帝子在時居風流掃地無尋處只有寒藤學草書山谷題玉笥山梅真壇詩吳門不作南昌尉上疏歸來朝市空笑拂岩花問塵世故人子是國師公又題丨丨丨鄧仙詩九真承詔上龍湖盡是驪山所送徒唯有鄧公留不去松根榰鼎煮菖蒲清江發源清江縣淦水漢書地理志豫章郡宜春南水東至新淦入湖蕭洲舊志名蕭灘鎮韓文云自袁州還京孟簡乘舸邀我於丨丨堂舍富壽堂在軍治太守汪師心建又見章山注文公堂天禧辛酉王益損之為軍判官其子荆公實生於此坐嘯堂在軍治司諫韓璜為之記亭臺吸川亭在判官廳面對大江眼界甚竒清江臺在軍圃頗髙爽名宦皇朝王益荆公之父嘗為軍判官龐籍為守人物孫冕新淦人引年挂冠詳見蘇州王欽若新喻人為相劉式字叔度清江人國朝平江南入京歷華要長子立本以特旨出身次立言立德立禮相繼登第皆位星郎孫敞攽皆至侍從立德四世孫靖之清之相繼登第朱文公劉氏墨莊記云劉清之五世祖工部府君仕太宗朝佐邦計者十餘年既沒而家無餘資獨有圖書數千卷夫人陳氏指以語諸子曰此乃父所謂墨莊也海陵胡公先生聞而賢之為記其事其後諸子及孫比三世果以文章器業為時聞人云云劉敞字原父於諸書無所不通有公是集行於世劉攽字貢父博極群書有公非集行於世孔文仲字經父刻苦學問自經史傳注百氏之書無不精究孔武仲字常父嘉祐禮部第一孔平仲字毅父並坐元祐黨籍題詠葛峯相對為文筆李與詩云云蕭水回環當墨池説與晚衙休報事長官亭上有新詩亭扁江西太史詩楊琳詩云云名埀詩逸幾經時四六塗芝丹掖分竹清江出綍天門分符斗壘爰自皇朝始為佳郡民力於農士知所學介乎大國若聲望之不侔藐是小邦亦賦輸之易辦峯標玉笥尚存山谷之舊題水紀蕭洲重訪昌黎之陳迹文風最盛是為劉孔之鄉民俗亦醇易奏龔黃之最文章爵位有王劉孔之諸賢土地人民析瑞吉袁之三邑方輿勝覽卷二十一
