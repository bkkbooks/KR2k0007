body:
  text: 方輿勝覧卷四十一宋祝穆撰融州融水懐逺建置沿革春秋戰國為百越地漢制以為牛女之分野唐志以為翼軫之分野漢為欝林郡潭中縣地吳分欝林郡置欝林縣蕭齊置齊熈郡梁置東寕州隋改東寕為融州又改齊熈郡為義熈縣煬帝𨽻始安郡即今之桂州也唐置融州改融水郡皇朝復為融州大觀中陞清逺軍莭度今領縣二治融水事要郡名玉融風俗氣候不殊荆湖圗經云云民猺雜居同上昔石湖范至能帥桂林嘗請於朝每嵗令猺人預聖莭錫宴除属縣塞堡外州庭幾千人列坐兩廡下皆椎髻罽衣以青紅染紵織成花縵為服吹匏笙為樂聼之如聚蚊聲十數連袂眩轉而舞以足頓地為節刻木為契約字畫如梵書不可曉形勝東南接桂林同上云云都㑹之境西北有䍧牱夜郎之地潭江合荆湖數路之水黔南帥府郡志大觀初置云云三年罷陞清逺軍鎮壓諸蠻乞建莭鎮奏状云云安静邉界曲阜行李巽制融水並邉兼撫夷落山水為天下最山水岩洞序云玉融云云而眞仙岩老人岩之類又其最也山川銅鼓山在城西二十里昔諸葛武侯浮䍧江而下以銅鼓散埋用壓蠻徼後得于此山故名石門山在縣西十八里山相對如門眞仙岩本名靈岩山又名老君洞在州南五里洞髙二十丈仰視髙逺靈夀溪貫串中出玲瓏清響如環珮聲有白石髙四五丈巍然一天尊像道服冠髯偉岸如眞舊傳老君南逰至融語人曰此洞天絶勝不復西渡流沙我當隠焉一夕身為石匪雕匪鐫大質具焉石獅丹竈羅列後先玉柱擎天龍鱗印地仙逰履迹顯然可攷咸平中勅改為眞仙岩頒降太宗御書一百二十軸藏岩内張安國磨崖大書天下第一眞仙之岩老人岩在城西五里舊傳有垂白老人拄杖悠揚其上洞在山半髙峻不可登旁有一洞穿出濶五六丈深二十丈郡因其勢增建屋閣凭欄一視如在半天大江横其前支流遶其下縈迂清淺可濯可游潭江在融水縣融水在州北六里接叙州界清潭在州南七里其水無源而自成潭堂舎亷静堂在郡治玉融道院在郡治眞仙書院在眞仙岩之前太守李興時建名宦皇朝岳飛清逺軍莭度使名賢傅自得忠肅公察之子知興化以體䆒趙令衿在泉時事劾徙融州四年陳文恭公奏聞得從自便題詠遊遍眞仙洞府中陶弼題仙岩詩溪僧過此説山公云云乳石崖邊得靈草可能封裹寄衰翁四六渙綸西掖分竹東寕䟽榮金闕作鎮玉融維東寕之列郡乃南土之名麾山居谷聚控並海之蠻夷地大物荒㨿仙城之襟帯拜二千石之尊官暫綏逺俗揭第一岩之佳號頗稱英逰賔州嶺方上林遷江建置沿革古越地漢志牽牛婺女之分野唐志翼軫之分野秦置桂林象郡漢更為欝林郡今州即欝林郡之嶺方縣也吳改嶺方縣曰臨浦梁立嶺方郡隋為嶺方縣属尹州唐置南方州太宗又析南方州之嶺方琅琊思于南尹州之安城縣置賔州更南方州曰登州改安城郡又改嶺方郡復為賔州皇朝廢賔州𨽻邕州尋復改唐以南方州地析為賔州與澄州至本朝合而歸之賔州又益以思剛州是以唐之三州併為一州而三縣即唐之三州也今領縣三治嶺方事要郡名南賓安城風俗民醇事簡圖經云云俗阜物廉視他州為樂土巢居崖處圗經巢居崖處盡力農事築室如巢窟范太史曰賔人計口云云屋壁以木為筐竹織不加塗塈民雜素冠圗經云云虚市所集白黑相半前軰詩云簫鼓不分憂樂事衣冠難辨吉凶人野不植桑同上賔俗工于織布煮練如雪縝宻可爱婦不織蚕云云野蠶乃食楓葉漁者取其絲以為綸或取織紬採木綿茅花同上羅紈絲帛仰給它郡俗多云云揉作絮棉以禦冬寒惟事雞卜同上病者不求醫藥云云郡守蒋國愽刻方書一册邦人稍為之變慱扇為昏同上羅奉嶺去城七里春秋二社士女畢集男女未婚嫁者以歌詩相應和自擇配偶各以所執扇帕相慱謂之慱扇歸日父母即與成禮擊鼓吹笙寰宇記云其俗有禮㑹丨丨丨葫蘆丨以為樂形勝西接建武余鏞譙樓記云云北拒欽逺欽象横貴皆擬其境無大江以泄水氣圗經賔之為州云云民居皆沮洳卑􅊜故人多腿重脚軟之患山川嶺方山在上林縣南五里風土記且説賔州一片地金龜出海勢正骨乾来自嶺方此地稍安康五代蠻獠雜處郡治遷徙靡定開寳間始遷今州治鏌鋣山在上林縣南三十三里昔人有得古劔于此銅錢山在州東十五里相傳有藏銅錢于此仙影山在觧鞍驛北陶弼詩月氅星冠七大夫逺㸔雖有近還無瑤池侍女双成過遺下羣仙聚飲圖葛仙岩在州西十五里有洞深窈非執炬不可入縁石磴而上直至岩西南諸山皆在目前眀鏡湖在州南三十五里濶五頃寳水在嶺方縣西南十五里中有陂堰可以溉田賔水在州西五里賀水在遷江縣其水流入栁江浮江水在嶺方縣南二里瑯琊水在故瑯琊縣西一里馬潭在州東七里嵗遇旱投潭以虎頭謂之閗龍即感應也樓觀環山樓舊名凌霄翠中樓在城北墉最髙琅琊竒觀在郡治名宦皇朝陶弼弼之父及姪皆嘗為守有繼政堂王鞏字定國素之子也従東坡遊嘗坐軾黨貶賔州酒稅坡既北歸出侍兒柔奴勸坡酒坡問柔奴嶺南應自不好柔奴曰此心安處便是吾鄉坡因綴定風波其詞曰誰羨人間琢玉郎天教乞與點酥娘自作清歌傳皓齒風起雪飛炎海變清凉萬里歸来顔愈少笑時猶帯嶺梅香試問嶺南應不好却道此心安處是吾鄉狄青言行録載青宣撫廣西時儂智髙守崑崙関青至賔州值上元莭令大張燈饗軍校次夜二鼓時青忽起如内乆之使人諭孫元規令暫主席行酒至曉客未敢退報者云是夜三鼔狄宣府已奪崑崙関矣人物韋厥漢韋元成之裔唐武德七年持莭壓伏生蠻開拓化外詔領澄州刺史後隠于智誠洞公與諸子皆封矦廟食為廟者九名賢范祖禹紹聖初言者論祖禹朋附司馬光青永州移賔州題詠賔州在何許蘓子瞻在黄州詩云云為子上棲霞凍笋蒼崖坼蘇子瞻和王鞏詩云春蔬黄土軟云云民俗不知金鼓聲陶弼詩官曹惟識簿書字云云金鼓聲闌劍㦸収前人詩云云使君廽上雅歌樓尊前一闋清商曲消盡窮邉萬里愁安城太守知邉計前人詩云徃嵗傳聞南詔檄近時方築伏波城云云菡蓞花中閲水兵莫教絃管作蠻聲前人詩勤把鈆黄記官様云云外邑思剛置縣衙邑令秦宻遷江紀實詩廣右開炎服云云覊縻唐世及正朔聖朝加又鄉分今賀水邑𨽻古琅琊泉脉通明鏡封隣接鏌鎁盖縣為覊縻思剛州本朝改為遷江縣有明鏡湖及鏌鎁山四六出綸北闕分牧南賔事簡訟稀物亷俗阜惟嶺方之小郡乃越駱之通都陶刺史之舊詩可知風土狄武㐮之陳迹猶記威聲雖蠻風之雜襲見謂陋邦然物産之豐盈頗為樂土慶逺府宜山思恩忻城河池天河建置㳂革粤地牽牛分野秦属象郡漢属交趾日南二郡界並同南安府後沒于蠻夷唐招降所置初曰粤州後曰環州改為龍水郡復為粤州改為宜州皇朝詔嶺南覊縻環州鎮寕州金城州智州懐逺軍並依前𨽻宜州又以覊縻足圻歸恩經三州地為圻城縣来属以英宗潜邸陞慶逺軍莭度咸淳元年八月二日係今上潜藩之地陞慶逺府今領縣五治宜山又管五砦覊縻之州十有八事要郡名龍江宜陽風俗人風獷戾寰宇記山川險峻云云常持兵甲以事戰争以岩穴為居止同上左袵椎髻禮異俗殊云云形勝為嶺南要害之地郡志控䍧牱昆明等十五部云云控扼夷蠻嶺外代答廣西云云曰邕曰宜邕屯全将宜屯半将本朝皇祐間分宜州為一路帥所統多夷州後罷為郡今守臣猶兼廣西都監為慶逺節度宜之西境有南丹州安化州三州一鎮又有撫水五洞龍河茅灘荔波等蠻及陸家砦其外有龍羅方石張五姓謂之淺蠻又有西南韋畨及蘇綺羅坐夜囬計利流求謂之生蠻又其外則有羅殿毗那大蠻皆徑路直抵宜城之境上土産宜砂虞衡志宜之山人云出砂處與湖北相犬牙山北曰辰砂山南曰宜砂然地脉不殊無甚分别也宜錫出蠻峒中山川宜山宣和更龍水曰宜山南山山中有隠龍洞及神祠日山在城東九里月山在城西十五里風土記東有日山西有月年年征戰無休歇謂此也繼之曰頼得西水向東流世代永無憂髙峯山九域志昔有陸猿仙隠此山拜相山又名天門山二峯如笋崒嵂参天馮三元祖塋在其下龍江在城北一百歩石岸峭嶮東流至栁象潯藤梧等州一千餘里至廣州入於南海謂江道如龍故名云小江在州城北合龍江洛蒙江在城南六十里通龍水北流至崖山合龍江井泉龍泉去郡城二里宜陽志龍泉湧其前龍江遶其後是也其水湧出猶勺合然而潤澤丘畆綽有餘裕學校州學張敬夫學記宜為州被邊所控制非一前此為州者日夜䆒切偹禦繕治財計之不暇莫遑他議韓侯壁至官既舉其職慨然念學校委廢議所以修復之盖積累而後成廟宫既嚴講肄有堂師生有舎門廡庖湢悉具合境人士歎息誦詠伻来請記方韓侯之為是舉也或者竊笑以為在邉州乃不急之務且曰宜固寡士亦何必汲汲為栻獨以為不然盖爼豆之修則軍旅之事斯循序而不忒教化興行則祸難之氣坐銷於冥冥之中詩曰既作泮宫淮夷攸服是有寔理非虚言也建學于此使為士者知名教之重禮義之尊脩其孝弟忠信則其細民亦将風動胥勸尊君親上恊力一心守固攻克又孰禦焉近而吾民既已和輯則夫境外聚落聞吾風者亦豈不感動有以服其心志柔其肌膚其孰有不順况干秉彛之心人皆有之竒才之出何間逺邇逺方固曰寡士然如唐張公九齡出於曲江姜公公輔出於日南皆表然著見于後世宜之士由是而作興安知異日不有繼二公而出者乎然則其可以寡士而忽諸堂舎宜山堂在郡治四賢堂在宜山堂後謂黄山谷馮三元趙清献吕兖公也南樓有山谷所書范孟博傳石刻在焉名宦曹克明嘗知邕州既而宜州澄海軍校陳進反㑹欝江暴漲州城摧克明伐木造舟為虚城水上以偹守禦仍募溪洞兵趣象州賊遂南去廵撫使曹利用召克明㑹兵至貴州遇賊斬首四百餘級賊平利用專其功克明恥自言趙抃嘗倅是邦有一卒殺人當死方繫獄病疽未潰公使醫療得不死㑹赦以免公爱人之周如此人物馮京慶厯間廷對第一觧省又俱與首選時號三元其母𦵏長沙有讀書堂在㫪陵其觧試寓鄂渚其生長于宜其逰學隨所至而徃祖塋在龍江浪歩之北今有馮村區革嘗與黄魯直交逰後為瓊州秋椽魯直以青玉案送之有送我之官窮海上鯨吞舟楫蜃嘘樓観落筆添清壮之句名賢黄庭堅太府丞余伯山禹績之六世祖若著倅宜州日山谷謫居是州時黨禁甚嚴若著為之經理舎館遣二子滋滸從之游一旦請曰先生今日舉動無愧東都黨錮諸賢願寫范孟博一傳許之遂黙誦大書盡卷僅有二三字疑誤次年遂仙去潘大臨别魯直于江夏詩翰墨精神全漢魏文章波瀾似春秋可是中州著不得江南已逺更宜州徐得之試雙井茶詩先生老作宜州鬼誰與一甌同注湯至今捧着雙井椀猶帯是翁書傳香題詠孤城溪洞裏陶弼詩云云聞説已堪哀蠻水如鮮血瘴天已死灰吏憂民置毒巫幸鬼為灾去作宜州夢黄魯直寄翠岩禅師詩云山谷青石牛自負萬鈞重八風吹得行處處是日用又将十六口云云四六塗芝禁掖剖竹宜城䟽榮鼇禁懐紱龍江維今分虎之郡乃昔潜龍之邸民多獷戾境實接于蠻風郡固荒凉土頗饒于珍産趙清献題輿之郡地望固隆馮三元毓秀之邦人才不乏賀州臨賀富川桂嶺建置沿革禹貢荆州之域分野當星紀鶉尾之次春秋属越七國属楚秦置南海郡趙佗王南越其地属焉漢武帝平南越置蒼梧郡属交州今州即蒼梧郡之臨賀縣也後漢因之吴大帝為臨賀郡𨽻荆州宋改為臨慶齊為臨賀國隋置賀州改臨賀郡其後又更為綏越郡唐置賀州因賀水以名皇朝平嶺南賀州首入版圗開寳四年省蕩山封陽二縣及寳城場入臨賀馮乗縣入冨川今領縣三治臨賀事要郡名臨賀輿地廣記云臨水西流右合賀水縣對二水之㑹故以臨賀為名風俗俗重雞卜寰宇記俗重鬼嘗以雞骨卜架木為巢同上俗多云云以避瘴氣所居謂之栅好吹匏笙同上莭㑹則鳴銅鼔云云俚人則筋竹為箭以葉羽之名曰圭黎民少瘴癘圗經氣候稍近湖外山清水秀云云民不飢寒同上云州二十里深山大澤間多猺人所居丨俗耕種雖無資積亦丨丨丨士知為學同上賀之為州云云民知力田雖溪洞蠻猺亦皆委順服従無剽敓之患鴈塔有人同上自咸平三年歐陽陟登科之後題名雁塔時有其人形勝崇山峻嶺裴氏記自九疑之南云云髙排霄漢綿亘数百里皆賀之境也山清水秀見上山川甑山在州西五里舊名幽山唐李郃出守山有新烟覆其上因名橘山在臨賀東二十里其山七十一峯多橘株秦山在冨川縣西百八十里北連道州荆州記昔孫權時此山夜雷暴震開為六洞陳去非有逰秦山詩桂山在徃嶺縣東北十三里山多桂竹東接連北接道白雲山去冨川縣五十里乃丹霞福地銀殿山去富川縣百五十里舊馮乗縣山上常有白雲故名萌渚嶠元和志在馮乗縣北一百三十里即五嶺之第四也按今州與道州華縣分界于此嶠之上臨水源出舊馮乗縣西北靈山下南流至縣界賀水源出冨川縣地名石龍亘郡城合桂嶺水至三江口謂賀江梧江封江也橘水出橘山合賀江桂水順流至州城東南合于賀江富江在冨川縣西四十里南入昭州竈溪水在冨川西五十里相傳天師煉丹取此水故名亭閣荔枝亭在郡治譚良佐建清音閣在城西五里佛寺之西有瀑布岩故名名宦李郃唐文宗時舉賢良劉蕡對䇿極言宦官考官不敢取郃曰劉蕡不第我軰登科能無厚顔乃上䟽言臣所對不及蕡逺甚内懐愧恥乞囬所授以旌蕡直帝不納中人深疾蕡誣貶彬州司尹郃遂出知賀州為政有聲聞見李時亮古碑摠錄皇朝岳飛神武軍副都統紹興初曹成再入賀州飛引兵擊成大破之名賢范祖禹紹興初言者論所修寔錄誣詆又論乳媪事以為離間兩宫貶賀州移賔州再移化州卒吕居仁避地于此陳與義避地于此題詠罅開蠻俗合陶弼桂嶺詩云捨轡歴天險身疑出鳥羣云云脊盡瘴江分賀州城西丹甑山郭功父詩云云一亭遥挿紫雲間龍墀譲䇿名猶在鶴馭凌風去不還善政再来應瑞物勝逰安得伴酡顔元戎詞翰鐫金玉千古長如碧澗潺四六明嶠遐陬賀江古郡兹剖竹符乃依桂嶺龍墀遜第未聞賢守之髙風虎帳論功尚想元戎之妙畧甑山盛事偹陳郭功父之詩秦洞勝逰尚訪陳簡齋之迹化州石龍石城吳川建置沿革禹貢職方所不載五嶺之外古越地牽牛婺女之分野秦属象郡漢為合浦郡髙凉縣之地髙凉縣在今髙州界吳孫權立髙凉郡又立髙興郡梁因之仍置羅州唐以髙州之石龍吴川二縣置羅州又于石龍縣置南石州尋改南石州為辯州改羅州曰招義郡辯州曰陵水郡皇朝廢羅州入辯州又改辯州曰化州中興復置石城今領縣三治石龍事要郡名陵水羅川風俗其俗信鬼圗經云云好滛祠無復文身㫁髪同上夷俗悉是左袵今士民被禮遜之教頗衣冠相尚雖賤𨽻亦襟袵云云之舊形勝大海環其南同上三江繞其東北同上云云濵海數郡惟此地炎風不蒸三水遶城以泄嵐瘴民少痁疫境多土山同上云云無甚峻嶺山川東山起髙凉拱于州治之左南山起雷陽拱於州治之右有龍母廟麗山在古幹水縣東北二十里帽子山山在石龍縣之南五里大海東去吴川縣四里陵水寰宇記在石龍縣源出容州界㑹羅水合流羅水在廢陵羅縣西北五里自覊縻禺州羅辯縣界南流下合陵水州治在陵羅二水之間隂陽家謂其得浮龜之形零烈水在廢縣南三十里源出亷江入大江堂亭清心堂在治州歸鴻亭在龍母山之巔淳熈辛丑冦平取歸民安集之義名宦皇朝李丹紹興初為守有甃城之績廖顒為守麦鈇之擾有招諭之功人物楊思勉石城人唐元憲朝嘗平諸蠻見唐本傳名賢范祖禹紹聖初言者論祖禹朋附司馬光永州安置再貶賀州移賔州又移化州卒窆之南山後歸𦵏焉沈長卿先是紹興戊午李光自洪州召歸長卿以啟賀之云縉紳兢守和親甘出婁欽之下䇿夷狄難以信結孰虞吐蕃之刼盟與其竭四海以奉豺狼之歡何至辱萬乗而下穹廬之拜至紹興甲戌通判常州以吟詩謫化州莫伋湖州人自號月湖紹興間謫居于此題詠羅川帯郭古南州郡守詩云云陵水環城小庾樓雲淡青林無過雁雨涵丹荔集鳴鳩叨榮銅竹三經夏勸課農桑屡有秋好趂湍流下吴㑹章䑓無栁繫歸舟四六䟽恩黼扆分牧羅川農桑粗足獄訟亦稀越居五嶺之外近臨二水之間自唐丗人才已盛偹見平蠻至皇朝郡縣更新足知向化雖周職方之不載越在炎陬然唐郡治之屡遷頗稱善地方輿勝覧卷四十一
