body:
  text: 方輿勝覽卷十六宋祝穆撰徽州歙黟休寧婺源祁門績溪建置㳂革禹貢揚州之域呉地斗分野春秋屬呉後屬越又屬楚秦置鄣郡漢武改為丹陽郡而丹陽都尉分治于歙黟歙二縣皆屬馬呉孫權分丹陽郡置新都晉武改新都為新安郡隋置歙州焬帝改為新安郡復為歙州皇朝因之宣和間改為徽州今領縣六治歙縣事要郡名新安古歙風俗人性剛而喜鬭見後朱元晦道院記君子則務為髙行竒節同上云云異材間出朱元晦跋東溪勝侯傳云婺源為縣窮僻斗入重山複嶺間而百十年来云云如翰林汪公及我君子大史公皆以學問文章顯重於世地雜甌駱吕和叔集博陵崔某狀歙州云云號為難理形勝歙大州也見後韓愈送陸歙州亭云山峭厲而水清激見後道院記有佳山水權載之送陸歙州序新安云云以資勝踐在萬山間郡志新安為邦云云其地險隘而不夷其土騂剛而不化至於大山深谷民之田其間者層累而上殆十數級不能為一畝快牛剡耜不得旋其間刀耕而火種之十日不雨則仰天而呼倘遇雨澤山水暴出則糞壤與禾蕩然一空葢地之勤民力也如此鳥道縈紆同上自睦州青溪縣界至歙州皆云云曽待制出守於兩岸上駐兵下瞰來路雖蚍蜉之㣲皆可數賊不敢犯後移屯山谷間遂䧟州治復還故處朱元晦記外大父祝公遺事云方臘之亂郡城為墟鄉人有媚事權貴者挾墨敇徙州治北門外以便其私而所徙家下􅕙漲輒平地三尺衆皆不以為便將列其事以訢諸朝者餘二千人而莫敢為之首公奮然以身任之其人忿疾復取特㫖坐公以違御筆之罪公為變姓名﨑嶇遁外猶下諸路迹捕不置如是累年時事變更羣小破散然後得免州治以還故處鄉人至今頼之土産硯歐陽永叔研譜端石出端溪色理瑩潤本以子石為上子石者在大石中生葢精石也而流俗傳訛遂以紫石為上又以貯水不耗為佳有鸜鵒眼為貴眼石病也然惟北巖石則有之然十無一二發墨者但充玩好而已歙石出於龍尾溪其石堅勁大抵多發墨故前世多用之以金星為貴其石理㣲麄以乎摩之索索有鋒鋩者尤佳余少時又得金坑礦石尤堅而發墨然世亦罕有端溪以北巖為上龍尾以深溪為上較其優劣龍尾逺出端溪上而端溪以後出見貴耳紙有麥光白滑氷翼凝霜之目今歙縣績溪界有地名龍鬚者紙出其間大抵新安之水清澈見底利以漚楮故紙如玉雪者水色所為也墨李廷珪本姓奚易州人父名超南遷至此南唐賜姓李氏故老云昔李後主嘗用其墨今則無矣而世言歙州具文房四寳其實三爾歙本不出筆墨山出美材郡志云云嵗聮為桴下淛河者往往多取富又云祁門水入鄱陽民以茗漆紙墨行江西仰其米自給柿心黒木圖經新安貢丨丨丨丨黟之名縣職此之由茶有勝金嫩桑仙芝来泉先春運合華英之品又有不及號者曰片茶山川黄山舊名黟山在歙縣西北百二十八里山髙一百八十仞郡志其山有摩天戞日之髙宣歙池饒江等州山並是此山之交脉明矣諸峯有如削成煙嵐無際雷雨在下其霞城洞室巖竇瀑泉則無峰不有信靈山之窟宅西北類太華山有峯二十六其水源亦三十六溪二十四洞十有二巖八水流而下合揚之水為浙江之源第四峯有泉沸如湯嘗湧朱砂世傳黄帝嘗命駕輿容成子浮丘公同遊合舟于此其後又有仙人曹阮之屬唐李白送人歸丨丨黄鶴峯詩丨丨四千仞三十二蓮峯丹崖夾石柱菡蓞金芙蓉伊昔陞絶頂下窺天目松仙人煉玉處羽化留餘蹤亦聞温伯雪獨往今相逢採秀辭五嶽攀巖厯萬重歸休白鵝嶺渇飲丹砂井鳯吹職時来雲東爾當整去去陵陽東行行芳桂叢逥溪十六度碧嶂盡晴空他日還相訪乗橋躡彩虹烏聊山在歙縣西北漢建安之亂歙人毛甘以萬戸屯此山隋末越國公亦屯兵于此義寧中遷州治此山下鳯凰山在歙縣北十五里嘗有鳳来集問政山在歙縣東五里唐有于方外者自荆南掌書記棄妻從大白山道士學養氣之術時後弟德晦為歙州刺史方外来訪之德晦為築䑓于此號問政房縣人聶師道少事方外後入呉為國師號問政先生今有觀攀詩話總龜云歙州丨丨丨聶道士所居嘗有人陟險蘿至絶壁於巖下嵌空處見題詩一首雖苔蘚昏蝕而文尚可辨題云黄台詞不知台何人也詩曰千尋練帶新安水萬仞花屏丨丨丨自少雲霞居物外不多塵土到人間壺懸仙島吞舟罷椀浸星宫沉水閒實籙篋垂金縷帶綘囊絛鎻玉連環靜張棊勢鋪還打㸃考仙經補义剛床並葛鞋雙兎伏窓横檉几老龍跧溪童乞火朝敲竹山鬼聽琴夜撼闗草長碧潭思勾曲松昏紫氣度回欄龜成淺甲毛猶緑鶴化𤣥裳頂更殷阮洞神仙分藥去蔡家兄弟寄書還黄精苗嫩啣斑鹿紅杏枝低掛白鷴容易煮茶供客用辛勤栽果與猿攀常尋靈穴通三島擬過流沙化百蠻新隠漸開侵月窟舊林猶恍枕沙灣乎疏俗禮慵非傲肘䕶靈方臂不慳海上使頻青鳥㸃篋中嵗久白驢頑笻枝健柱舊蒲節篛笠髙簮玳瑁斑花氣薰心香馥馥澗聲冷耳響潺潺髙墳自掩浮生骨短晷難窮不死丹早晚重逢蕭塢客願隨芝葢出塵寰台國初時任屯田員外郎世有全篇城陽山在歙縣南二里唐許宣平嘗隠於此紫金山在歙縣東三十五里石鼓山在歙縣南天有雨則往往聞鼓角之聲紫陽山在歙縣其下有觀孔靈山在歙縣二十五里晉孔愉避地入新安山讀書墨嶺山在歙縣南六十里出石墨赤嶺山在祁門縣北百二十里下冇大溪昔有人為梁取魚魚不得下遂夜飛越嶺而去人復於嶺上張網其飛不過者皆化為石遇雨丨丨故名丨丨而浮梁縣亦因此得名呉都賦所謂文鰩夜飛而觸綸葢此類歟岐山在休寧縣西六十里有石室石橋埀瀑百仞乾元中有道士龔棲霞隠於此率山在休寧縣東南四十里寰宇志三天子都在馬白嶽山在休寧西四十里絶壁斷崖松蘿森靄龍尾山在婺源東南百里西連武溪開元中獵人葉氏見石瑩潔䥴粗成研子孫持以獻令今訪匠琢由是世始傳一名羅紋山有石理所似為名大鄣山在績溪東六十里郭璞云三天子都在焉雲峯在黟縣南十五里孤峭如削徽嶺在績溪縣西北十里渡王介甫度丨丨詩曉藤溪霜落後夜過翬嶺月明中樵貴谷在黟縣北昔土人入山行之七日至谷穴豁然周三十里中有十餘家云是秦人入此避地桃按邑圖有潜村至今有數十家自為一村或謂之小源李白詩黟縣小桃源烟霞百里間地多靈草木人尚古衣冠釣臺在黟縣南十八里亦名潯陽臺相傳李白嘗釣於此有詩云磨盡石嶺墨潯陽釣赤魚靄峯尖似筆堪畫不堪書新安江自歙縣来者出黟山自休寧者出率山自績溪者出大鄣山自婺源者出浙山自浙江沂休寧者為灘三百六十李白送人之東陽詩聞説京華渡東連五百灘他年一携手摇艇入丨丨言沈休文云丨丨丨水至深淺深見底貽京邑同好眷訪舟客兹川信可珍洞澈隨深淺皎鏡無冬春千仞䉣喬樹百大見游鱗滄浪有時濁清濟涸無津豈若乘斯去俯映石磷磷紛吾隔囂滓寧假濯布巾願以潺湲水沾君纓上塵黄墩湖一名蛟潭其湖有蜃嘗與吕湖蜃鬬程靈洗好勇而善射夢蜃化為人告之曰吾為吕湖蜃厄君若助吾必厚報束帛練者吾也明日靈洗彎弓助之正中後蜃後有一道人教靈銑求善墓地靈洗隨陳武帝有功為佐命功臣績溪圖經與乳溪相去一里離而復合謂之丨丨人寰宇記臨溪有石方圓三丈其平如砥水宜浣紗婦於石上績而守之羅昭諫詩云野雲如火照行塵㑹丨丨邉去問津婺水在丨源丨繞縣三而堂院新安道院朱文公記休寧大夫信安祝侯汝玉以書来曰休寧之為邑雖有難治之名而吾之為之已再嵗矣始也不能不以人言為慮中乃意其不然而今則遂有以信其果不然也葢其封域實鄣山之麓而浙江出焉山峭厲而水清激故稟其氣食其土以有生者其性情習尚不能不過剛而好鬬然而君子則務以其劇為髙行竒節而尤以不義為羞故其俗難以力服而易以理勝茍吾之所為者出於公論之所是則雖或拂於其私而卒不敢以為非也以是吾之始至葢不能無不悦者而今則翕然無與為異吾嘗困於事之不勝其繁而今則豁然無事之可為也吾將更葺㕔事之東參采賔佐屬詠之什而榜之以丨丨丨丨子能為我記之則後之君子益知所以為治而無吾始者之慮矣子惟汝玉之為此可以見其政之成民之販而官曹之無事矣然道之得名正以人所共由之路而非無事之謂也以汝玉之始至坐於堂皇之上則左簿書右法律日夜苦心勞力而不得休其或少暇則又不免衝寒風冐烈日以出入乎阡陌之中而不敢怠凡所以勸民之善而懲其惡興民之利而除其害者非有道以行之則何以致今日之無事哉顧其名此乃若專取乎今日之無事而反序前日之瘽事非道其母乃出於老子浮屠之謂而汝玉未之思耶抑嘗計之天下之事雖有動靜勞逸之殊而所謂道者則無彼此精粗之間汝玉之學固有以知此矣彼其所以喜於政成之無事而不避異學之滛名豈非方寸之間猶欲從容於此以深思前日之已行而益求其所未至而卒以究夫無彼此精粗之間者而大𤼵於功名事業之間乎予故邦人且汝玉予舊也樂其意為書木末以示来者使於此邦之俗賢宰之志尚有考云清風堂汪彦章記云婺源去州二百餘里皆取道山間攀縁不可舟車之地當四方之窮非人物都㑹土著之民且十方寡来而易足多負豪使氣爭為長雄疑難於彈治故吏之宰婺源者往往畏避隠去如探湯然䝉被惡聲既久而不衰然邑冇溪山之秀足以登臨有魚稻之珍足以宴樂卒嵗無過客使者㕑傳之樂足以安佚其人實聰明亷武好義而尚施茍幸而得其平有終身不肯違法者故至而悉其風土者亦樂而安之崇寧三年叔孫元功之為政也胷中涇渭甚明既来而得民所以易治之意則略除煩苛一鎮之以清靜葢未朞月而數百年之陋坐失於談笑之間於是昔之吏俗朋黨投隙扺巇為鑿穴首鼠者既化而為心膂股肱而椎埋慓輕武斷鄉里為奔峰乳虎者亦從而為嬰兒處女元功多民之洗濯刮磨果可以與治也乃築燕居之堂而以清風名之余聞而嘆曰天下之物葢無不可化者然其所以化非深於理者不與焉今夫徜徉於萬物之表而人得之以滌煩觧暑者惟風為然是故至人之所御隠君子之所賞騷人才子大夫之所樂致足樂也如使不善為政者結意於䋲墨之端置民於牛羊之地物我俱弊矣乃始絲棼而禽獮之政之愈勞而愈熾而其於治日益遠矣尚能知清風所以滌煩觧愠之理而與民同快適之樂哉惟元功才有餘而不區區俗務之所營徒以從容無為使其民灑然以新釋然以喜而元功亦將鴻漸於此而羽儀於無朝也宜其所得清風為無多且吾邑雅多秀民安知無儒者作穆如之頌歌詠吾子以配斯堂之永久者元功博古情深君子也觀其命名之意即足以知其為人黄山堂自唐以來已有之舍蓋堂范至能記徽在江左多名山少平陸州所治衡從不能十里而陵衍猶相半坦然砥如者太守之居而已泝新安江枝而西屬之休陽山益叢美檆生之斧斤所材浮歙浦入于濤江以輸行都當匠鄉費什八而徽人顧不事華屋雖仙佛之廬厪支壓傾不可風雨其能獨以壯麗稱者亦莫如大守之居而東序之正寢尤其奐焉者也寢成之二十五年前守怵於物恠之説棄去弗處後皆因之間無足音又十七年而當紹興己夘畨陽洪公實来典城明年正月既報政為廣厦遂廢可惜乃規以為便坐易其面勢賔出日撤兩翼之重檐以納光景洞三隅之複壁使可羅胡怵數卜與諸吏及四方之賔客共之避而不專鄉故名之曰舍蓋暇日列觴豆揮麈劇談㫖逺情深遠響来荅問登前榮之傑觀挹山川之神以稽舊聞其右則問政紫陽羣峰綿子聨許聶蜕蟬之隠居也左在黄山天齊雲雨在下容成浮丘公颷車羽輪所往来烟消日出猶髣髴具音塵客之從遊者皆有馭長風籋倒景以方羊天地間意知有樂乎斯堂而不知前日之蛛絲鼠壤空虚幽暗而扄鐍也初公以忠臣子擢殊科登道家山輒自列去國天子方以更化望人命公至州四千里而遥有詔朌輔郡符節引以自近其不留外久之知凡簿書期㑹之報冝非所以煩公然始至之日不鄙野其吏民端委聽直無倦棟容於是六邑之留獄窒訟皆湊於府朝案其説纍牘充數十年弗堅定者卻批折隨刃迎觧狡獪之流雖欲並縁瀾辭以珥筆豪州里情見勢屈噤無從發端訟獄清静而州里宴然庭中無復事從容燕居於斯堂之上而其民歡欣歌舞於溪山千里之外惟恐外之百須儉陋而不足以安公閒其登新堂而樂則相與傳舍葢之名而珍之以為琳房綺寮神仙之居徒以公在焉故也嗚呼孟子所謂賢者而後樂此者㡬是歟公書於𨽻尤工得先魏古法鍾繇元常而下無譏也堂既名大書其榜屬參軍事范成大為之記後之来者覽觀心畫之妙而咨製名之意必有指斯名而告者焉亭榭翠眉亭在績溪其韓無咎記歙之績溪縣西隅有亭曰丨丨不知何人作也前則二小山對出自亭而望嫵然如眉地勢平衍於木茂蔚元豐末蘇文定公為縣愛其清幽時往遊焉賦詩其上公去而邑人思之即亭為祠紹興中好事者即縣廨一堂名以景蘓後令曹訓刻公在績溪所為詩凡三十六篇於石而摹公之象於丨丨丨云嵗寒亭在歙縣蘓子由在績溪時賦詩今刻石亭上藏書閣在州學朱又公記云道之在天下其實原於天命之性而行於君臣父子兄弟夫婦朋友之間其文則出於聖人之手而存於易禮樂春秋孔孟氏之道本末相須人言相發皆不可一日而廢者也又云某故徽人也而客於閩兹以事歸而拜於其學郷人子弟相率踵門曰子誠未㤀先人之國獨不能因是而一言以曉之哉於是切記所聞以告鄉人之願學者祠廟三先生祠朱文公記云婺源大夫周侯始作周程丨丨丨丨於其縣之學而使人以書來曰子故吾邑之人也先生之學其始終本末之趣願吾子之悉陳之也某發書慨然曰今既得以日見先生之貎相而瞻仰之則曷若遂讀其書求其㫖以及諸身而功行之乎諸君其亦免之哉朱文公祠州學及婺源縣學皆立其祠五通廟在婺源縣乃祖廟兄弟凡五人本姓蕭每嵗四月八日来朝者者四方雲集名宦任昉為守亷潔著名後歸船中惟桃花米二十石初昉因行春愛其雲溪尋幽累日傍有大石徃徃坐釣其上因名昉溪村今有任公寺在休寧縣徐摛梁書髙祖謂曰新安大好山水任昉並經為之卿為我卧治此郡張率嗜酒為新安守遣家童載米三千石還呉既至遂耗大半率問其故曰鼠雀耗率笑曰壯哉鼠雀竟不研問薛稷善畫鶴嘗為黟縣令後位至少保皇朝蘇轍為績溪邑宰吕大防以大常博士謫知休寧縣鮮于侁字子駿為黟令又攝婺源豪强畏之後為東京轉運司馬公曰福星往矣崔鷃為績溪宰人物呉少㣲新安人開元中為中舍吕文仲新安人景德為刑部侍郎謝泌歙縣人為諌議查道休寧人擢賢良俞獻可歙縣人龍圖侍制弟獻卿侍郎聶冠卿歙縣人為内翰吕溱士元之子景祐進士弟汪伯彦祁門人拜尚書左僕射汪藻婺源人為内翰汪勃黟縣人仕至樞宻子作礪提刑孫義和侍御史義端給事中祝確歙人乃朱文公之外祖文公嘗記其遺事云外家新安祝氏世以貲力順善聞于州鄉其邸肆生業幾有郡城之半因號半州祝家有諱景先者號二翁尤長者元祐黄太史賛其畫象大書百許字辭甚瓌偉經亂而逸某少時見外大父猶頗能誦其語至諸舅則皆已不復能記憶矣二翁諸子皆讀書外大父其第二子也諱確字永叔特淳厚孝謹少時聞父母將為謀昏逃避累日家人驚索得之猶涕泣不能己問其故則曰審爾則將不得與父母兄弟蚤夜相親矣親喪廬墓下手植名木以千數率誦佛書若干過乃植一本比終制而歸則所植已欎然成隂矣一兄一弟先後死熈河皆親往致其喪往復徒歩不啻萬里所舍輙悲號上食如禮夜寢柩旁不忍跬歩離去路人皆為太息時四妹猶未行公獨竭已貲以遣之其一歸同郡汪公勃汪公後登二府終身德公不能㤀人兩賢之嵗太疫親舊有盡室病卧者雖至親莫敢闖其門公每清旦輙擕粥藥造之偏飲食之而後反日以為常其他濟人利物之事不勝記雖傾貲竭力無吝色鄉人髙其行學試又多占上列是時先君子年甚少未為人所知公獨器重以女歸之後卒以文學致大名世乃以公為知人年八十三以終身二男一女伯舅嶠少敏悟有文叔舅莘後公十餘年亦即世今惟叔舅之子康國家建之崇安而康國之子穆已總髪能誦書矣某惟外大夫之淳德懿行先人後已其誠心所格固冝有後天之報施將在於此乎某竊感陶公作孟府君傳及近世眉山蘇公亦記程公遺事不勝凱風寒泉之思書此以遺康國使藏於家時出而訓習之以厲其子孫云某既序此事而濟之弟以疾不起其子穆相從於建陽因書畀之依仰今昔為之涕下不能已祝有道新安志云黄山谷謫黔中歙人丨丨丨訪之山谷為書帖云凡士大夫胷中不時時以古今澆之則俗塵生其間照鏡則面目可憎對人亦語言無味又贈以詞所謂長楊風挑青驄尾者也又有八月十七夜張寛夫圜待月有詞云老子平生江南江北最愛臨風笛孫郎㣲笑坐來聲噴霜竹蜀人謂笛音如牘故用之今俗本改笛為曲非也朱松婺源人自號韋齋娶祝氏生太師文公熹按傳自得作韋齋集序云公㓜小喜讀書綴文冠而擢第未嘗一日捨筆硯年二十七八聞二程先生之遺論皆先賢未發之奥始捐舊習從事於其間雖兩入東觀三為尚書郎卒不待年而殁又云建炎紹興間公詩聲滿天下間嘗為予舉簡齊開門知有雨老樹半身濕及韋蘇州諸生時列坐共愛風滿林之句且言古之詩人貴衝口直致葢與彭澤採菊東籬下悠然見南山同一闗捩題詠江傳水至清劉長卿送鄭説之歙州謁薛侍郎詩漂泊来千里謳謡滿百城漢家傳太守魯國重諸生俗變人難理云云船經危石住路入亂山行老得滄州趣春傷白首情嘗聞馬南郡門下有康成千山帶夕陽皇甫曾題劉長卿碧澗别業詩南憶新安郡云云黟水含香繞郡流喬伍為歙州倅寄張翰林詩黄山向晚迎軒翠云云遥想郡齋多暇日花時誰伴出城遊千尋練帶新安水聶夷詩云云萬仞花屏問政山四六輟自蓬山出臨黟水維歙為州因山築壘維千里地在萬山間號為名郡開出異材維古歙之名地有防溪之勝㮣竊以新安之古郡溪山一隅號為名郡實為江左之名區農桑千里實曰富州官尊州大不輕刺史之符山峭水清尤號人材之藪自孔愉之隠遁地望已清及查之賢良文風益盛古曰富州自昌黎而推重今為佳郡以任昉之曾臨雖曰山城亦羣珍之所産載瞻京邑惟一韋而可航道傳雲谷遠間清廟之音文檀龍溪夸作玉堂之様鄣山左麓田數十級而後耕浙江上游灘三百餘而難泝道院一碑實救異端之害文房四寳尤夸竒産之多尊若徐摛古歙之城州甚大亷如任昉新安之江水益清池州貴池銅陵青陽石埭建徳東流建置㳂革禹貢揚州之域吳地斗分野春秋及秦漢為古鄣郡之地漢屬丹陽晉屬宣城郡梁屬南陵郡隋廢南陵置秋浦縣唐置池州皇朝中興為池州路安撫使尋罷今領縣六治貴池事要郡名池陽秋浦並見㳂革注風俗民醇氣和盛約中和堂記丨丨丨丨衆貨畢集人物稠夥同上雖丨丨丨丨而有訟必嚚雖賦租浩穰而聞令必集土風清和李虚已記井邑平曠云云形勝俯瞰大江同上丨丨丨丨仰倚崇嶠清溪南来盛約記丨丨丨丨九華東引洪流環繞沃野彌望鎮以齊山徐鉉作天慶觀浸以秋浦丨丨丨丨依貴池據石城裴度撰池州㕔壁記丨丨丨之美丨丨丨之固山川清曠胡兆作秋浦志序有曰九華五松清溪秋浦玉鏡之潭水車之嶺成紀白笴之陂大白樂天牧之論文垂釣問山弄水登覽遐躅隠然在人耳目山川風物清和平曠土産劄紙王介甫酬贈池紙㣲之出守秋浦時權氷㸔擣萬榖皮波工龜手咤今様魚綱肯數荆州池霜䊵奪色賈不售虹玉喪氣山無輝方船穩載獻天子善價徐取供吾私千年零落尚百一持以贈我隨凊詩君寜舊寄金榖地方執賜筆磨拗螭當留此物朝上國日侍帝側書新儀不然名山副史本褒拔元凱誅窮竒咨予文章非世用書縷空爾麋冰脂揮毫才足記姓字切學又恥從師宜怱怱㸃汙亦何忍嘉貺但覺難為辭篇終有意責趙璧窮國恐悞連城歸傾囊倒篋聊以報安敢坐以秦為雌山川齊山在貴池南五里按王晢丨丨記有十餘峰其高等故名丨丨或曰以齊映得名上杜牧之九日登丨丨詩江涵秋影雁初飛與客擕壺翠㣲塵世難逢開口笑菊花須挿滿頭歸但將酩酊酬佳節不用登臨歎落暉古往今来只如此牛山何必淚沾衣九華山在青陽界舊名九子山李白以有峯如蓮華改為丨丨有詩云昔在九江上遥望九華峯天河掛綠水秀作九芙蓉崔總郡樓望九華歌有時朝峯變踈宻八峰和煙一峰出有時風卷天雨晴聚立連連如弟兄潘逍遥詩將齊華嶽猶多六若並巫山又欠三好是雨餘江上望白雲堆裏發濃藍王介甫詩峩然九女鬟爭出一鏡奩五松山在銅陵縣要李白詩我愛銅官好千年未擬還須回舞袖拂盡丨丨丨馬當山在東流横枕大江梁陸龜䝉文云言天下之險者在山曰太行在水曰吕合二險而為一吾又聞乎馬當此之為險也屹乎大江之旁怪石慿怒跳波發狂日黯風助摧牙折檣幸而脱死神魂飛揚殊不知堅輪蹄者夷乎太行仗忠信者通乎吕梁使舟楫而行乎丨丨舍是三險而未為敵小人方寸之包藏半巖李元方嘗刻碑於有侍岩謂齊山大小泉凡十一而丨丨為勝秋浦千重嶺而水車嶺最竒岩壁之號十五而有侍為大壑之號九而上清為最洞之號十四而潜虬為竒又有洞五曰丨丨曰寄隠曰子昭曰妙峯曰翠㣲翠㣲特髙尤冝登眺水車嶺郭公父追和李白秋浦歌萬文丨丨丨還如九疉屏北風来不斷六月自生氷五溪在青陽縣源出九華㑹于龍池溪曹溪漂溪蘭溪入江玉鏡潭李白秋浦晏詩清溪丨丨丨溪當大樓南秋浦池陽記北帶郡城南連驛道為舟楫之路斷李白詩玉笛梅花引吳溪隴水清寒山丨丨月腸玉闗情牽丨丨多白猿超騰若飛雪引條上兒飲弄水中月白笴陂李白詩丨丨夜長嘯爽然溪谷寒魚龍動丨水處處生波瀾貴池郡縣志梁昭明太子以其魚美封為丨丨堂舍思政堂曽子固記云所與由之必人之所安也所與違之必人之所厭也如此者未有不始於思然後得於己得於己故謂之德正己而治人故謂之政政者豈止於治文書督賦斂斷獄訟而已乎然及其已得矣則無思也已思矣則亦豈止於政哉古君子之治未嘗有易此者也亭榭弄水亭杜牧詩使君四十四兩佩左銅魚為吏非循吏讀書讀㡳書晩花紅艷靜髙樹緑隂初亭午清無比溪山畫不如嘉賔能嘯詠官妓巧粧梳逐日愁皆碎隨時醉有餘偃須求五鼎陶祇愛吾廬趍尚人皆異賢豪莫笑渠貴池亭同上勢比凌歊宋武臺分明百里遠帆開蜀江雪浪西江滿强半春寒去却来如剡亭在倅㕔浦李白詩愁作秋曲强㸔秋浦花山川如剡縣風日似長沙清溪亭王介甫記臨池州之溪上𨽻軍事判官之府京兆杜君建夫呉楚荆蜀閩越之徒出入於是而離離洞庭鄱陽之水浮於日月之無窮四方萬里之人飛帆鼓楫上下於波濤之中犯不測之險於朝暮之際而吾等乃於數楹之地得偉麗之觀於寢食坐作之間是可喜也君曰夫憊其形於事者宜有以佚其勞厭其視聽之喧囂則必之乎空曠之野然後能無患於晦明飛禽之啁啾怒浪之洶湧漁蓬樵蹻嘯於前而歌於後孰與夫訟訴笞榜之交於耳也岸憤穿屨弦歌而詩書投壺飲酒談古今而㤀賔主孰與夫擎跽折旋之宻接於吾目也此亭之所以作也翠㣲亭楊廷秀詩序云從提舉黄元章登齊山寺後上清岩丨丨丨望郡城左清溪右大江葢絶境云西山落日浴長江併貫清溪作一光十嶂圍来天四合孤城涌出水中央樓臺玉塔雲間見楊柳金堤鏡裡長客子要窮秋浦眼丨丨丨上上清旁樓臺蕭相樓在州治北唐蕭復建後杜牧重建休王鞏詩盧把姦邪四海憂相君邦國自同分符朝去雲中闕開府南来江上州百尺樓髙瞻故國九華山色倚晴眸定知直道傳千古杜牧文章在上頭杜牧池州重建丨丨丨記蕭丞相為刺史時樹樓於大㕔西北隅上藏九經書下為刺史便㕔事大厯十年乙夘建會昌四年甲子材木悉朽壞無一可取者刺史李方𤣥具材刺史杜牧命工南北霤相距五十六尺東西四十五尺十六柱三百七十六椽上下凡十二間上有其三焉皆仍舊制以會昌五年五月畢自初至再凡七十一年丞相諱復實相德宗黄帝焉九華樓即子城東門樓九峯樓杜牧登丨丨丨寄張祐詩有感中来不自由角聲孤起夕陽樓碧山終日思無盡芳草何年恨始休睫在眼前猶不見道非身外更何求誰人得似張公子千首詩輕萬戸侯名宦齊映為太守見齊山注蕭復為太守即八葉宰相者裴度為觀察使杜牧為太守皇朝包拯為太守吕頤浩以大使兼人物杜荀鶴自號九華山人題詠紅斾行春到九華按唐詩紀事載湯文圭贈池州張守詩絳幃夜坐窮三史云云只怕他人留不住别遷征鎮擁高牙外邑吾愛崔秋浦李白贈崔秋浦詩云云宛然陶令風門栽五楊柳井夾雙梧桐山鳥下㕔事簷花落酒中懷君未忍去惆悵意無窮公庭人吏稀同上秋浦舊蕭索云云因君樹桃李此地怱芳菲摇筆望丹閣開簾當翠㣲時来引山月縱酒酣清輝四六暫綴朝班出臨秋浦雖曰偏州實為重鎮江左要衝池陽重鎮山紀齊侯樓標蕭相矧今池陽之重鎮乃昔江右之帥垣州偏揭魯公之筆壁記遺裴令之文桑麻六邑既有待於撫摩介胄三軍亦豈輕於統御暇日謹包桑之戒重兵嚴細柳之屯壯老羆當道之勢端在斯時和飛雁涵江之詩姑遲他日竊考唐朝乃杜牧把摩之舊共臨秋浦亦齊侯解組之餘干戈載戢則必佩服包桑之戒兵農雜居則必洽比細柳之屯方輿勝覽卷十六
